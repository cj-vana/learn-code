# Run from the prebuilt GHCR images instead of building locally:
#
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up
#
# The repo checkout is still required — content/ is mounted as data. Pin a
# release with LEARN_CODE_TAG (defaults to latest), e.g. LEARN_CODE_TAG=1.2.0.
services:
  web:
    image: ghcr.io/cj-vana/learn-code-web:${LEARN_CODE_TAG:-latest}
  api:
    image: ghcr.io/cj-vana/learn-code-api:${LEARN_CODE_TAG:-latest}
  runner-broker:
    image: ghcr.io/cj-vana/learn-code-runner-broker:${LEARN_CODE_TAG:-latest}
    environment:
      PYTHON_RUNNER_IMAGE: ghcr.io/cj-vana/learn-code-python-runner:${LEARN_CODE_TAG:-latest}
  python-runner:
    image: ghcr.io/cj-vana/learn-code-python-runner:${LEARN_CODE_TAG:-latest}
