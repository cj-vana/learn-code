name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # Sequential installs so the CLI's learn-code-api dependency resolves
      # against the local editable install instead of PyPI.
      - name: Install packages
        run: |
          pip install -e "apps/api[test]" pytest-timeout
          pip install -e "apps/cli[test]"
          pip install -e "services/runner-broker[test]"
      - name: Repo guard
        run: python scripts/check_repo.py
      - name: Compose config
        run: docker compose config > /dev/null
      - name: Tests
        run: python -m pytest -q

  content:
    # Structure, references, path ordering, and every exercise's sample
    # solution executed against its own tests.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install packages
        run: |
          pip install -e "apps/api"
          pip install -e "apps/cli"
      - name: Validate content library
        run: learn-code validate-content

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Tests
        run: npm test -- --run
      - name: Build
        run: npm run build
