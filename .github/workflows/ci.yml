name: CI

# Path-aware gated pipeline. The changes job maps what a push or PR touched
# to the jobs that actually need to run; untouched areas report skipped,
# which satisfies branch protection. Pushes to main and release tags run
# everything, because that's what the publish stage ships from.
on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python == 'true' || steps.full.outputs.all == 'true' }}
      content: ${{ steps.filter.outputs.content == 'true' || steps.full.outputs.all == 'true' }}
      web: ${{ steps.filter.outputs.web == 'true' || steps.full.outputs.all == 'true' }}
      docker: ${{ steps.filter.outputs.docker == 'true' || steps.full.outputs.all == 'true' }}
      workflows: ${{ steps.filter.outputs.workflows == 'true' || steps.full.outputs.all == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Full run on main and release tags
        id: full
        run: |
          if [ "$GITHUB_REF" = "refs/heads/main" ] || case "$GITHUB_REF" in refs/tags/v*) true;; *) false;; esac; then
            echo "all=true" >> "$GITHUB_OUTPUT"
          else
            echo "all=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'apps/api/pyproject.toml'
              - 'apps/cli/pyproject.toml'
              - 'services/runner-broker/pyproject.toml'
              - 'pyproject.toml'
              - 'content/**'
              - 'docker-compose.yml'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            content:
              - 'content/**'
              - 'schemas/**'
              - 'apps/api/learn_code_api/content/**'
              - 'apps/cli/**'
              - '.github/workflows/ci.yml'
            web:
              - 'apps/web/**'
              - '.github/workflows/ci.yml'
            docker:
              - 'apps/api/**'
              - 'apps/cli/**'
              - 'apps/web/**'
              - 'services/**'
              - 'docker-compose.yml'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'

  lint:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ruff lint
        run: pipx run ruff==0.15.20 check apps/api apps/cli services/runner-broker services/python-runner scripts
      - name: Ruff format
        run: pipx run ruff==0.15.20 format --check apps/api apps/cli services/runner-broker services/python-runner scripts

  actionlint:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint workflows
        run: docker run --rm -v "$PWD:/repo" --workdir /repo rhysd/actionlint:1.7.7 -color

  python:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # Sequential installs so the CLI's learn-code-api dependency resolves
      # against the local editable install instead of PyPI.
      - name: Install packages
        run: |
          pip install -e "apps/api[test]" pytest-timeout
          pip install -e "apps/cli[test]"
          pip install -e "services/runner-broker[test]"
      - name: Repo guard
        run: python scripts/check_repo.py
      - name: Compose config
        run: docker compose config > /dev/null
      - name: Tests
        run: python -m pytest -q

  content:
    # Structure, references, path ordering, and every exercise's sample
    # solution executed against its own tests.
    needs: changes
    if: needs.changes.outputs.content == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install packages
        run: |
          pip install -e "apps/api"
          pip install -e "apps/cli"
      - name: Validate content library
        run: learn-code validate-content

  web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc -b --noEmit
      - name: Tests
        run: npm test -- --run
      - name: Build
        run: npm run build

  docker:
    # Every Dockerfile must build; PRs get this gate without publishing.
    name: docker-${{ matrix.name }}
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: web
            context: apps/web
          - name: api
            context: apps/api
          - name: runner-broker
            context: services/runner-broker
          - name: python-runner
            context: services/python-runner
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  e2e:
    # Boot the real compose stack and grade a submission through the
    # sandboxed runner — the quick-start promise, exercised end to end.
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up --build -d --wait --wait-timeout 300
      - name: Web serves
        run: curl -sf -o /dev/null http://127.0.0.1:5173/
      - name: API healthy through proxy
        run: curl -sf http://127.0.0.1:5173/api/v1/health | grep -q '"ok"'
      - name: Grade a submission through the sandboxed runner
        run: |
          result=$(curl -sf -X POST http://127.0.0.1:8000/api/v1/exercises/run \
            -H "Content-Type: application/json" \
            -d '{"exercise_id":"exercise.seed.sum-delivery-minutes-001","source":"def sum_delivery_minutes(minutes):\n    return sum(minutes)\n"}')
          echo "$result"
          echo "$result" | grep -q '"status":"passed"'
      - name: Stack logs on failure
        if: failure()
        run: docker compose logs --tail 100
      - name: Tear down
        if: always()
        run: docker compose down -v

  publish:
    # The gate: images reach GHCR only after every check above passes (or was
    # legitimately skipped), and only from main or a release tag.
    needs: [changes, lint, actionlint, python, content, web, docker, e2e]
    if: >-
      !cancelled() && !contains(needs.*.result, 'failure') &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    name: publish-${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: web
            context: apps/web
          - name: api
            context: apps/api
          - name: runner-broker
            context: services/runner-broker
          - name: python-runner
            context: services/python-runner
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
