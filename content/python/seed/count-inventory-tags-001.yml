prompt_markdown: |
  You are helping a neighborhood tool library review inventory labels. Write
  `count_tags(tags)` so it returns a dictionary whose keys are tag strings and
  whose values are the number of times each tag appears.

  Preserve the original capitalization of each tag. An empty list should return
  an empty dictionary.
starter_code: |
  def count_tags(tags):
      return {}
function_name: count_tags
input_mode: function
solution_sketch: Use a dictionary and increment the count for each tag as you scan the list once.
sample_solution: |
  def count_tags(tags):
      counts = {}
      for tag in tags:
          counts[tag] = counts.get(tag, 0) + 1
      return counts
hints:
  - level: 1
    text: Track one count per distinct tag.
  - level: 2
    text: A dictionary can map each tag to its current count.
  - level: 3
    text: Update with counts.get(tag, 0) + 1 inside the loop.
tests:
  public:
    - name: empty
      input: []
      expected: {}
    - name: one
      input: [red]
      expected:
        red: 1
    - name: repeat
      input: [red, red, blue]
      expected:
        red: 2
        blue: 1
  validation:
    - name: mixed
      input: [a, b, a]
      expected:
        a: 2
        b: 1
    - name: case
      input: [A, a]
      expected:
        A: 1
        a: 1
    - name: long
      input: [x, x, x]
      expected:
        x: 3
explanation_markdown: |
  A dictionary stores one counter for each tag. For every tag in the input list,
  read the old count with a default of zero, add one, and store the new count.
common_mistakes:
  - Returning None instead of the dictionary.
  - Treating differently capitalized tags as the same tag.
  - Resetting the dictionary inside the loop.
