explanation_markdown: |
  Sliding a fixed window keeps the running total in O(n), and finding *where* the
  best window sits only needs one extra variable. Start with the sum of the first
  `span` hours, then update it as the window advances, recording the start index
  `i - span + 1` whenever the total is strictly larger than the best so far. Using
  a strict comparison means the earliest window wins any tie.
common_mistakes:
  - Returning the best total instead of the index where it starts.
  - Using >= so a later equal window overwrites the earliest one.
  - Computing the start index as i instead of i - span + 1.
