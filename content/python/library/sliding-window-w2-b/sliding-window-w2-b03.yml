prompt_markdown: |
  A wind turbine logs how many kilowatt-hours it produces each hour of the day.
  A technician wants to schedule a demonstration during the strongest continuous
  stretch, and asks for exactly where that stretch begins.

  Write `best_window_start(data)` where `data` is a dict with two keys: `output`
  (a list of hourly kilowatt-hour readings) and `span` (the number of consecutive
  hours to consider). Return the 0-based starting index of the window of `span`
  consecutive hours with the greatest total output. If more than one window ties
  for the greatest total, return the earliest starting index. You may assume
  `1 <= span <= len(output)`.
starter_code: |
