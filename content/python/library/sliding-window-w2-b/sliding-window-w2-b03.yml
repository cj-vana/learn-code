      return 0
function_name: best_window_start
input_mode: function
solution_sketch: Slide a running-sum window and remember the start index whenever a strictly larger total appears.
sample_solution: |
  def best_window_start(data):
      output = data["output"]
      span = data["span"]
      window = sum(output[:span])
      best = window
      best_start = 0
      for i in range(span, len(output)):
          window += output[i] - output[i - span]
          if window > best:
              best = window
              best_start = i - span + 1
      return best_start
hints:
  - level: 1
    text: Track both the best total seen so far and the index where that best window started.
  - level: 2
    text: The start index of the window ending at position i is i - span + 1.
  - level: 3
    text: Only update the remembered start when the new total is strictly greater, so earlier ties win.
