function_name: longest_varied_stretch
input_mode: function
solution_sketch: Grow a window on the right and shrink it from the left whenever it holds more than limit distinct genres.
sample_solution: |
  def longest_varied_stretch(data):
      genres = data["genres"]
      limit = data["limit"]
      if limit <= 0:
          return 0
      counts = {}
      left = 0
      best = 0
      for right in range(len(genres)):
          g = genres[right]
          counts[g] = counts.get(g, 0) + 1
          while len(counts) > limit:
              leaving = genres[left]
              counts[leaving] -= 1
              if counts[leaving] == 0:
                  del counts[leaving]
              left += 1
          if right - left + 1 > best:
              best = right - left + 1
      return best
