explanation_markdown: |
  This is a variable-length window. The right edge always advances, adding the
  new song's genre to a count dictionary whose length is the number of distinct
  genres in view. Whenever that length exceeds `limit`, the left edge advances,
  removing songs until the window is valid again; a genre is deleted from the
  dict when its count falls to 0. Because each song enters and leaves the window
  at most once, the scan runs in O(n), and the largest valid width seen is the
  answer.
common_mistakes:
  - Forgetting to delete a genre from the dict when its count reaches 0, so the distinct count stays too high.
  - Only shrinking the window once instead of using a while loop until it is valid.
  - Not handling limit 0, which should always yield 0.
