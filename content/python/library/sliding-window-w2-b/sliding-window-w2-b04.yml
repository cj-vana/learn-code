prompt_markdown: |
  A radio host queues songs as a list of genre labels in play order. To keep a
  segment feeling cohesive, they want the longest continuous run of songs that
  uses at most a set number of distinct genres.

  Write `longest_varied_stretch(data)` where `data` is a dict with two keys:
  `genres` (a list of genre-label strings in play order) and `limit` (the maximum
  number of distinct genres allowed in the run). Return the length of the longest
  continuous stretch containing at most `limit` distinct genres. If `limit` is 0
  the answer is 0, and an empty list returns 0.
