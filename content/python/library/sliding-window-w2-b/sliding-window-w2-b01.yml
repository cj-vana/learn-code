      return 0
function_name: quietest_stretch
input_mode: function
solution_sketch: Sum the first span days, then slide the window forward tracking the smallest running total.
sample_solution: |
  def quietest_stretch(data):
      usage = data["usage"]
      span = data["span"]
      window = sum(usage[:span])
      best = window
      for i in range(span, len(usage)):
          window += usage[i] - usage[i - span]
          if window < best:
              best = window
      return best
hints:
  - level: 1
    text: Only the two days at the edges of the window change when the window slides.
  - level: 2
    text: Sum the first span days once, then update that total as you move one day at a time.
  - level: 3
    text: When the window moves right, add usage[i] and subtract usage[i - span], then keep the minimum.
