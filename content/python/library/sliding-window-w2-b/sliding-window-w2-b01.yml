explanation_markdown: |
  A fixed-length sliding window turns an O(n*span) rescan into one O(n) pass.
  Compute the sum of the first `span` days once, then move the window forward a
  day at a time: each step adds the newly included day and subtracts the day that
  just fell off the left edge. Tracking the minimum of these running sums finds
  the least-thirsty stretch without ever re-summing a whole window.
common_mistakes:
  - Re-summing every window from scratch instead of updating the running total.
  - Forgetting to subtract the day that leaves the window when sliding.
  - Initialising the best value to 0, which is wrong when every window totals more than 0.
