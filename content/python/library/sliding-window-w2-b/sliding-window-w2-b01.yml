prompt_markdown: |
  A rooftop greenhouse logs how many litres of water its plants drink each day.
  During a drought the caretaker wants to find the most water-efficient stretch
  so they can plan a maintenance visit around it.

  Write `quietest_stretch(data)` where `data` is a dict with two keys: `usage`
  (a list of non-negative daily litre counts) and `span` (the number of
  consecutive days to consider). Return the smallest total litres used across any
  block of `span` consecutive days. You may assume `1 <= span <= len(usage)`.
starter_code: |
