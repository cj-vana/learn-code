      return 0
function_name: peak_crop_days
input_mode: function
solution_sketch: Count matches in the first span days, then slide adjusting only the entering and leaving letters.
sample_solution: |
  def peak_crop_days(data):
      log = data["log"]
      span = data["span"]
      crop = data["crop"]
      count = sum(1 for c in log[:span] if c == crop)
      best = count
      for i in range(span, len(log)):
          if log[i] == crop:
              count += 1
          if log[i - span] == crop:
              count -= 1
          if count > best:
              best = count
      return best
hints:
  - level: 1
    text: Count how many matching letters sit inside the first window before you start sliding.
  - level: 2
    text: When the window advances, only the entering letter and the leaving letter can change the count.
  - level: 3
    text: Add 1 if log[i] matches, subtract 1 if log[i - span] matches, then track the largest count.
