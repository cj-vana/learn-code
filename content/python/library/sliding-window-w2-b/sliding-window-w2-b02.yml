explanation_markdown: |
  Counting matches in every window from scratch would cost O(n*span), but the
  count barely changes as the window slides. Tally the matches in the first
  `span` days, then for each step add 1 when the entering letter matches and
  subtract 1 when the leaving letter matches. Keeping the maximum of these
  running counts finds the busiest crop stretch in a single O(n) pass.
common_mistakes:
  - Recounting the whole window each step instead of adjusting only the edges.
  - Subtracting for the entering letter or adding for the leaving letter by mixing up the two ends.
  - Assuming the crop is always the letter T rather than reading it from the data.
