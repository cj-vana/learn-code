prompt_markdown: |
  A community garden records what it planted each day as a single uppercase
  letter, one letter per day, joined into a string (for example `T` for tomato,
  `C` for carrot, `P` for pepper). A volunteer wants to find the busiest stretch
  for one particular crop.

  Write `peak_crop_days(data)` where `data` is a dict with three keys: `log`
  (the planting string), `span` (the number of consecutive days to consider),
  and `crop` (the single letter to count). Return the greatest number of days
  matching `crop` found in any block of `span` consecutive days. You may assume
  `1 <= span <= len(log)`.
starter_code: |
