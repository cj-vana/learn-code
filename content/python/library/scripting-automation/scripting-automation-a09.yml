function_name: find_export_collisions
input_mode: function
solution_sketch: Reduce each path to its lowercased base name, tally the names in a counter, then return the sorted names whose tally exceeds one.
sample_solution: |
  from collections import Counter
  from pathlib import PurePosixPath


  def find_export_collisions(paths):
      names = [PurePosixPath(path).name.lower() for path in paths]
      counts = Counter(names)
      return sorted(name for name, total in counts.items() if total > 1)
