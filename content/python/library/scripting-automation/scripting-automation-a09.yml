explanation_markdown: |
  Collision detection is a counting problem in disguise. The trust boundary here is
  the case-insensitive destination filesystem, so the *key* you tally on is not the
  raw path but `PurePosixPath(path).name.lower()` — the flattened, case-folded base
  name. Once every path is reduced to that key, a `Counter` gives you how many
  sources map to each destination in one pass, and any key with a count above one
  is a genuine overwrite risk.

  Sorting the offenders makes the report deterministic and easy to scan. Note that
  folders are deliberately ignored: because the copy flattens everything into one
  directory, two files that were peacefully distinct in `exports/` and `archive/`
  become rivals the moment they share a lowercased base name. Building the counter
  is O(n) and the final sort is O(k log k) over the distinct names.
common_mistakes:
  - Comparing full path strings instead of base names, so files in different folders never register as colliding.
  - Forgetting to lowercase, which lets "Report.PDF" and "report.pdf" slip through on a case-insensitive target.
  - Reporting every occurrence of a repeated name instead of collapsing each colliding name to a single entry.
