prompt_markdown: |
  A print shop collects finished jobs from many nested folders and copies them all
  into one flat output directory before burning a disc. That output directory lives
  on a case-insensitive filesystem, so two source files whose **base names match
  once lowercased** would silently overwrite each other. Before running the copy,
  the shop wants a report of every colliding name so an operator can rename first.

  Write `find_export_collisions(paths)` that takes a single list of source path
  strings. Consider only each path's base name (the final component), lowercased.
  Two or more paths collide when their lowercased base names are equal.

  Return a sorted list of the **lowercased base names** that appear more than once
  across the input. Each colliding name appears exactly once in the output.

  Rules and edge cases the tests cover:

  - An empty input list returns `[]`.
  - Files in different source folders still collide if their base names match,
    because the destination is flat: `exports/Report.PDF` and `archive/report.pdf`
    both land on `report.pdf`.
  - The comparison is case-insensitive, so `X.csv` and `x.CSV` collide.
  - A name that appears three or more times is still reported once.
  - When nothing collides, return `[]`.

  Example:

  ```python
  find_export_collisions([
      "exports/Report.PDF",
      "archive/report.pdf",
      "exports/summary.txt",
  ])
  # -> ["report.pdf"]
  ```
starter_code: |
