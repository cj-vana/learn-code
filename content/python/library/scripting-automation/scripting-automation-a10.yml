      input: {"path": "dir/file.log", "pattern": "{ext}{ext}", "index": 0, "pad": 1}
      expected: ".log.log"
explanation_markdown: |
  A template renderer has two independent jobs: computing the field values and
  substituting them safely. Pathlib handles the first cleanly — `PurePosixPath`
  exposes `.name`, `.stem`, `.suffix`, and `.parent`, and because `.parent` of a
  directory-less path is `.`, its `.name` is the empty string, which is exactly
  the "no parent" behavior you want for free. The padded index is a formatting
  detail: `str(index).zfill(pad)` pads to at least `pad` characters and leaves
  longer numbers untouched.

  Substitution is where a naive approach breaks. Chained `str.replace` calls or a
  bare `pattern.format(**fields)` would choke on unknown tokens like `{date}` (a
  `KeyError`) or misfire on stray braces. Driving the replacement through
  `re.sub(r"\{(\w+)\}", callback, pattern)` scopes substitution to well-formed
  `{word}` tokens only, and returning `match.group(0)` for unrecognized keys
  leaves them verbatim. That is why `{ }` and a lone `{` pass through untouched:
  they never match the placeholder shape in the first place.
common_mistakes:
  - Using `pattern.format(**fields)`, which raises KeyError on an unknown token like `{date}` and mishandles literal braces.
  - Reading the extension as everything after the first dot, so `backup.tar.gz` wrongly yields stem `backup` and ext `.tar.gz`.
  - Padding with `str(index).zfill(pad)` but forgetting that a wider number (123 with pad 2) must stay `123`, not be truncated.
