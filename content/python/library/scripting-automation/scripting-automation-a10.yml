prompt_markdown: |
  A photography studio renames its RAW exports with a small template language so
  every delivery follows the same naming scheme. Your job is the rendering engine:
  given one source path and a pattern string, produce the new name by substituting
  placeholders drawn from the path.

  Write `render_rename(request)` that takes a single dictionary:

  - `"path"`: the source path string.
  - `"pattern"`: the template string.
  - `"index"`: an integer sequence number.
  - `"pad"`: the minimum width to zero-pad `"index"` to.

  A placeholder is written as `{word}` where `word` is one or more letters,
  digits, or underscores. Substitute exactly these placeholders:

  - `{name}` -> the base name, e.g. `IMG_0007.CR2`
  - `{stem}` -> the base name without its final suffix, e.g. `IMG_0007`
  - `{ext}`  -> the final suffix **including the dot**, e.g. `.CR2`; an empty
    string when the base name has no dot
  - `{parent}` -> the name of the immediate parent directory, e.g. `italy`; an
    empty string when the path has no directory component
  - `{index}` -> the sequence number as a string, left-zero-padded to at least
    `"pad"` characters (so index `7` with pad `3` becomes `007`; a `"pad"` of `0`
    means no padding)

  Rules and edge cases the tests cover:

  - Literal text in the pattern is copied through unchanged.
  - Any `{word}` token that is **not** one of the five names above is left in the
    output exactly as written, braces included (e.g. `{date}` stays `{date}`).
  - Text like `{ }` (with a space) or a lone `{` is not a valid `{word}` token and
    is copied through literally.
  - Only the final suffix is the extension: `backup.tar.gz` has stem `backup.tar`
    and ext `.gz`.
  - The same placeholder may appear more than once.

  Example:

  ```python
  render_rename({
      "path": "trips/italy/IMG_0007.CR2",
      "pattern": "{parent}_{stem}_{index}{ext}",
      "index": 7,
      "pad": 3,
  })
  # -> "italy_IMG_0007_007.CR2"
  ```
