solution_sketch: Derive name/stem/ext/parent from a PurePosixPath plus the zero-padded index, then use re.sub over the pattern with a replacement callback that substitutes known placeholders and returns the raw match for anything unknown.
sample_solution: |
  import re
  from pathlib import PurePosixPath


  def render_rename(request):
      path = PurePosixPath(request["path"])
      fields = {
          "name": path.name,
          "stem": path.stem,
          "ext": path.suffix,
          "parent": path.parent.name,
          "index": str(request["index"]).zfill(request["pad"]),
      }

      def replace(match):
          key = match.group(1)
          return fields.get(key, match.group(0))

      return re.sub(r"\{(\w+)\}", replace, request["pattern"])
