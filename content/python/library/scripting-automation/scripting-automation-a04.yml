prompt_markdown: |
  A backup vault wants to hunt down duplicate files, but hashing every file is
  expensive. The cheap first pass is to group files by their byte size: two files
  can only be duplicates if they are the same size, so any size shared by two or more
  files is worth a closer look, and any size held by a single file can be ruled out
  immediately.

  You receive a list of file records, one dict per file shaped like
  `{"name": "vault-a.bin", "size": 50}`.

  Write `find_duplicates_by_size(records)` that returns a dict mapping each **shared**
  size to the sorted list of file names at that size.

  - Only include sizes that are held by two or more files.
  - Within each size bucket, list the file names in ascending (dictionary) order.
  - Drop any size that only one file has.

  An empty input returns an empty dict `{}`, and so does an input where every file
  is a unique size. This is a planning scan over records; nothing on disk is read or
  compared byte-for-byte.
starter_code: |
  def find_duplicates_by_size(records):
      return {}
function_name: find_duplicates_by_size
input_mode: function
solution_sketch: Bucket names by size with dict.setdefault, then build a result dict of only the buckets with two or more names, sorting each surviving bucket's names.
sample_solution: |
  def find_duplicates_by_size(records):
      by_size = {}
      for record in records:
          by_size.setdefault(record["size"], []).append(record["name"])
      return {
          size: sorted(names)
          for size, names in by_size.items()
          if len(names) >= 2
      }
