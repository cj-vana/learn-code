explanation_markdown: |
  This is a two-phase pattern that shows up all over automation: **group, then
  filter the groups**. The first pass buckets every name under its size with
  `setdefault`, an O(n) walk. The second pass keeps only the buckets that earned
  their place — `len(names) >= 2` — because a size held by a single file can never
  be a duplicate and only adds noise. Sorting each surviving bucket makes the output
  deterministic so a rerun produces byte-identical results, and it keeps the report
  easy to scan. Size-bucketing is the standard cheap prefilter before you spend real
  effort (a hash or byte compare) confirming the true duplicates inside a bucket.
common_mistakes:
  - Returning every size bucket, including the singletons that can never be duplicates.
  - Leaving each bucket's names in input order instead of sorting them, so the output is not deterministic.
  - Comparing file names for equality instead of grouping by the size field the scan is meant to key on.
