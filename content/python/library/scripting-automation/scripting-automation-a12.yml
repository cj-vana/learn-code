tests:
  public:
    - name: empty_manifest
      input: []
      expected: {"file_count": 0, "total_size": 0, "by_extension": {}, "by_directory": {}, "largest": null}
    - name: single_file
      input: [{"path": "data/report.csv", "size": 12}]
      expected: {"file_count": 1, "total_size": 12, "by_extension": {".csv": {"count": 1, "total_size": 12}}, "by_directory": {"data": 1}, "largest": "data/report.csv"}
    - name: mixed_manifest
      input: [{"path": "logs/night/a.log", "size": 30}, {"path": "logs/night/b.LOG", "size": 20}, {"path": "logs/summary.txt", "size": 50}, {"path": "README", "size": 5}]
      expected: {"file_count": 4, "total_size": 105, "by_extension": {".log": {"count": 2, "total_size": 50}, ".txt": {"count": 1, "total_size": 50}, "": {"count": 1, "total_size": 5}}, "by_directory": {"logs/night": 2, "logs": 1, ".": 1}, "largest": "logs/summary.txt"}
  validation:
    - name: largest_tie_breaks_on_path
      input: [{"path": "b.bin", "size": 100}, {"path": "a.bin", "size": 100}]
      expected: {"file_count": 2, "total_size": 200, "by_extension": {".bin": {"count": 2, "total_size": 200}}, "by_directory": {".": 2}, "largest": "a.bin"}
    - name: no_extension_grouping
      input: [{"path": "bin/run", "size": 7}, {"path": "bin/exec", "size": 9}]
      expected: {"file_count": 2, "total_size": 16, "by_extension": {"": {"count": 2, "total_size": 16}}, "by_directory": {"bin": 2}, "largest": "bin/exec"}
    - name: double_suffix_extension
      input: [{"path": "backups/db.tar.gz", "size": 40}]
      expected: {"file_count": 1, "total_size": 40, "by_extension": {".gz": {"count": 1, "total_size": 40}}, "by_directory": {"backups": 1}, "largest": "backups/db.tar.gz"}
    - name: deep_nesting_directories
      input: [{"path": "a/b/c.txt", "size": 1}, {"path": "a/b/d.txt", "size": 2}, {"path": "a/e.txt", "size": 3}]
      expected: {"file_count": 3, "total_size": 6, "by_extension": {".txt": {"count": 3, "total_size": 6}}, "by_directory": {"a/b": 2, "a": 1}, "largest": "a/e.txt"}
    - name: case_insensitive_ext_and_tie
      input: [{"path": "x.PNG", "size": 5}, {"path": "y.png", "size": 25}, {"path": "z.jpg", "size": 25}]
      expected: {"file_count": 3, "total_size": 55, "by_extension": {".png": {"count": 2, "total_size": 30}, ".jpg": {"count": 1, "total_size": 25}}, "by_directory": {".": 3}, "largest": "y.png"}
explanation_markdown: |
  This is a multi-axis group-by, and the discipline is to compute every axis in a
  single pass rather than looping the manifest four times. Each record contributes
  to four running structures: the scalar `total_size`, an extension bucket, a
  directory tally, and the running "largest so far". Seeding `by_extension` buckets
  with `setdefault(ext, {"count": 0, "total_size": 0})` lets you fold count and
  size into the same nested dict without a separate initialization step, and
  `dict.get(directory, 0) + 1` is the idiomatic counter for the directory axis.

  Two pathlib facts do the heavy lifting: `PurePosixPath(path).suffix.lower()`
  normalizes the extension (and is `""` for dotless names, giving you the empty-key
  bucket for free), and `str(PurePosixPath(path).parent)` yields `"."` for a
  root-level file — which is why no special-casing is needed for files without a
  directory. The `largest` tie-break — greater size wins, and on a tie the smaller
  path wins — makes the result deterministic no matter what order the manifest
  arrives in. The whole report is O(n).
common_mistakes:
  - Returning tuples or forgetting the nested `{"count", "total_size"}` shape, so `by_extension` values do not match.
  - Breaking size ties arbitrarily (keeping whichever came first) instead of choosing the lexicographically smaller path.
  - Special-casing root-level files instead of letting `str(PurePosixPath(path).parent)` produce the `"."` directory key.
