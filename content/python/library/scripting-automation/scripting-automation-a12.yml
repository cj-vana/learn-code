solution_sketch: One pass over the records accumulates the count, total, per-extension bucket (via setdefault), and per-directory count, while tracking the largest file with a size-then-path tie-break; assemble the summary dict at the end.
sample_solution: |
  from pathlib import PurePosixPath


  def summarize_manifest(files):
      summary = {
          "file_count": len(files),
          "total_size": 0,
          "by_extension": {},
          "by_directory": {},
          "largest": None,
      }
      best_path = None
      best_size = None
      for record in files:
          path = record["path"]
          size = record["size"]
          pure = PurePosixPath(path)
          summary["total_size"] += size

          ext = pure.suffix.lower()
          bucket = summary["by_extension"].setdefault(ext, {"count": 0, "total_size": 0})
          bucket["count"] += 1
          bucket["total_size"] += size

          directory = str(pure.parent)
          summary["by_directory"][directory] = summary["by_directory"].get(directory, 0) + 1

          if best_size is None or size > best_size or (size == best_size and path < best_path):
              best_size = size
              best_path = path
      summary["largest"] = best_path
      return summary
