prompt_markdown: |
  A city archive runs a nightly backup mirror and wants a one-glance report over
  the manifest before it commits the snapshot. You build the report as a pure
  transform over the file records — no disk access, just the path strings and
  sizes.

  Write `summarize_manifest(files)` that takes a single list of record
  dictionaries, each with a `"path"` string and an integer `"size"`. Return a
  summary dictionary with exactly these keys:

  - `"file_count"`: the number of files.
  - `"total_size"`: the sum of all sizes.
  - `"by_extension"`: a dict keyed by the lowercased final suffix **including the
    dot** (e.g. `".log"`), using the empty string `""` for files with no
    extension. Each value is a dict `{"count": <int>, "total_size": <int>}`.
  - `"by_directory"`: a dict keyed by the immediate parent directory as a POSIX
    string, mapping to how many files live directly in it. A file with no
    directory component uses the key `"."`.
  - `"largest"`: the `"path"` of the largest file by `"size"`. When two files tie
    on size, pick the one whose path sorts first lexicographically. Use `None`
    when there are no files.

  Rules and edge cases the tests cover:

  - An empty list returns
    `{"file_count": 0, "total_size": 0, "by_extension": {}, "by_directory": {}, "largest": None}`.
  - Extensions are grouped case-insensitively: `a.LOG` and `b.log` both count under
    `".log"`.
  - Only the final suffix is the extension: `db.tar.gz` counts under `".gz"`.
  - Directory keys are the parent path, so `logs/night/a.log` counts under
    `"logs/night"` and a root-level `README` counts under `"."`.

  Example:

  ```python
  summarize_manifest([
      {"path": "logs/night/a.log", "size": 30},
      {"path": "logs/night/b.LOG", "size": 20},
      {"path": "logs/summary.txt", "size": 50},
      {"path": "README", "size": 5},
  ])
  # -> {
  #   "file_count": 4,
  #   "total_size": 105,
  #   "by_extension": {".log": {"count": 2, "total_size": 50},
  #                    ".txt": {"count": 1, "total_size": 50},
  #                    "": {"count": 1, "total_size": 5}},
  #   "by_directory": {"logs/night": 2, "logs": 1, ".": 1},
  #   "largest": "logs/summary.txt",
  # }
  ```
