tests:
  public:
    - name: empty_files
      input: {"files": [], "key_fields": ["size"]}
      expected: []
    - name: dedupe_by_size_same_ext
      input: {"files": [{"path": "cam1/a.jpg", "size": 100}, {"path": "cam2/b.jpg", "size": 100}, {"path": "cam1/c.jpg", "size": 200}], "key_fields": ["size"]}
      expected: ["cam1/a.jpg", "cam1/c.jpg"]
    - name: different_ext_not_duplicate
      input: {"files": [{"path": "x.png", "size": 50}, {"path": "y.jpg", "size": 50}], "key_fields": ["size"]}
      expected: ["x.png", "y.jpg"]
  validation:
    - name: multi_field_key
      input: {"files": [{"path": "a.raw", "size": 10, "camera": "A"}, {"path": "b.raw", "size": 10, "camera": "B"}, {"path": "c.raw", "size": 10, "camera": "A"}], "key_fields": ["size", "camera"]}
      expected: ["a.raw", "b.raw"]
    - name: case_insensitive_ext
      input: {"files": [{"path": "one.JPG", "size": 5}, {"path": "two.jpg", "size": 5}], "key_fields": ["size"]}
      expected: ["one.JPG"]
    - name: missing_field_is_none
      input: {"files": [{"path": "p.txt", "size": 1}, {"path": "q.txt", "size": 1, "tag": "x"}, {"path": "r.txt", "size": 1}], "key_fields": ["tag"]}
      expected: ["p.txt", "q.txt"]
    - name: empty_key_fields_dedupes_by_ext
      input: {"files": [{"path": "a.log", "size": 1}, {"path": "b.log", "size": 2}, {"path": "c.txt", "size": 3}], "key_fields": []}
      expected: ["a.log", "c.txt"]
    - name: all_unique
      input: {"files": [{"path": "f1.dat", "size": 1}, {"path": "f2.dat", "size": 2}, {"path": "f3.bin", "size": 1}], "key_fields": ["size"]}
      expected: ["f1.dat", "f2.dat", "f3.bin"]
explanation_markdown: |
  Deduplication is a "seen set" scan, and the whole design lives in the key. Here
  the key is a tuple that always starts with the lowercased extension from
  `PurePosixPath(path).suffix.lower()` and then folds in each requested field. Two
  choices make it robust: using a *tuple* keeps the key hashable so a `set` can
  answer membership in O(1), and reading fields with `record.get(field)` means a
  missing field contributes `None` instead of raising `KeyError` — so every
  record with that field absent collapses onto the same key.

  Because you add to `seen` only when a key is new and you append the path in the
  same moment, the first copy of each key survives and later copies are silently
  dropped, preserving the manifest's original order. The empty-`key_fields` case
  falls out naturally: the key is just the one-element extension tuple, so files
  are merged by type alone. One pass, O(n) membership checks.
common_mistakes:
  - Keying on the field values but forgetting the extension, so a 100-byte `.png` and a 100-byte `.jpg` wrongly merge.
  - Indexing `record[field]` instead of `record.get(field)`, which crashes when a record lacks one of the key fields.
  - Building the key as a list, which is unhashable and cannot be stored in a set.
