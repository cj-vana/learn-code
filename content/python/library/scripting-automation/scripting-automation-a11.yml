solution_sketch: For each record build a hashable key of (lowercased suffix, then each key-field value via dict.get so missing fields become None); keep the record only when its key has not been seen, tracking seen keys in a set.
sample_solution: |
  from pathlib import PurePosixPath


  def dedupe_manifest(request):
      files = request["files"]
      key_fields = request["key_fields"]
      seen = set()
      kept = []
      for record in files:
          suffix = PurePosixPath(record["path"]).suffix.lower()
          key = (suffix,) + tuple(record.get(field) for field in key_fields)
          if key not in seen:
              seen.add(key)
              kept.append(record["path"])
      return kept
