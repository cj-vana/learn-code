prompt_markdown: |
  A field research team pulls several camera memory cards into one shared manifest
  after every expedition, and the same shot often lands on more than one card. A
  file is treated as a duplicate of an earlier one when it shares the **same file
  extension** (compared case-insensitively) **and** has identical values for every
  field the team chose to compare on. The team keeps the first copy it sees and
  drops the rest.

  Write `dedupe_manifest(request)` that takes a single dictionary:

  - `"files"`: a list of record dictionaries. Every record has a `"path"` string
    and may carry extra scalar fields (like `"size"` or `"camera"`).
  - `"key_fields"`: a list of field names to compare on, in the order given.

  Build each record's dedupe key from its lowercased final suffix followed by the
  value of each name in `"key_fields"`. Keep only the first record for each
  distinct key and drop later duplicates. Return the `"path"` strings of the kept
  records, in their original order.

  Rules and edge cases the tests cover:

  - An empty `"files"` list returns `[]`.
  - The extension is always part of the key: two files with the same `"size"` but
    different extensions are **not** duplicates.
  - Extensions compare case-insensitively, so `one.JPG` and `two.jpg` share the
    same extension key.
  - If a record is missing one of the `"key_fields"`, treat that field's value as
    `None` (all missing-field records share the `None`).
  - An empty `"key_fields"` list means records are deduplicated by extension alone.
  - The first occurrence of each key is kept; order is preserved.

  Example:

  ```python
  dedupe_manifest({
      "files": [
          {"path": "cam1/a.jpg", "size": 100},
          {"path": "cam2/b.jpg", "size": 100},
          {"path": "cam1/c.jpg", "size": 200},
      ],
      "key_fields": ["size"],
  })
  # -> ["cam1/a.jpg", "cam1/c.jpg"]
  ```
