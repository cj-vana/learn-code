solution_sketch: Walk each record, keep those whose PurePosixPath suffix lowercases to ".log" and whose modified night is below the cutoff, then return the collected paths sorted.
sample_solution: |
  from pathlib import PurePosixPath


  def stale_log_candidates(request):
      files = request["files"]
      cutoff = request["cutoff"]
      candidates = []
      for record in files:
          path = record["path"]
          if PurePosixPath(path).suffix.lower() == ".log" and record["modified"] < cutoff:
              candidates.append(path)
      return sorted(candidates)
