tests:
  public:
    - name: empty_directory
      input: {"files": [], "cutoff": 100}
      expected: []
    - name: mixed_extensions
      input: {"files": [{"path": "logs/app.log", "modified": 50}, {"path": "logs/app.txt", "modified": 10}, {"path": "logs/db.LOG", "modified": 30}], "cutoff": 60}
      expected: ["logs/app.log", "logs/db.LOG"]
    - name: cutoff_boundary_excludes_equal
