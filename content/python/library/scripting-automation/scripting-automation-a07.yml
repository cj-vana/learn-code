      expected: ["keep.log"]
    - name: no_extension_excluded
      input: {"files": [{"path": "README", "modified": 1}, {"path": "trace.log", "modified": 5}], "cutoff": 10}
      expected: ["trace.log"]
    - name: sorted_output
      input: {"files": [{"path": "z.log", "modified": 1}, {"path": "a.log", "modified": 2}, {"path": "m.log", "modified": 3}], "cutoff": 10}
      expected: ["a.log", "m.log", "z.log"]
    - name: uppercase_and_boundary
      input: {"files": [{"path": "one.LOG", "modified": 5}, {"path": "two.Log", "modified": 20}, {"path": "three.log", "modified": 19}], "cutoff": 20}
      expected: ["one.LOG", "three.log"]
explanation_markdown: |
  A sweep script is a filter with two independent predicates: the file must be
  the right *kind* (a `.log`) and it must be old *enough* (modified before the
  cutoff). Splitting the extension with `PurePosixPath(path).suffix` is the
  pathlib idiom that reads the final component after the last dot — which is why
  `rotate.log.gz` reports `.gz`, not `.log`. Lowercasing before the comparison
  makes the type check case-insensitive without altering the path you return.

  The strict `<` against the cutoff is the load-bearing detail: a file modified
  *on* the cutoff night is not yet stale, so equality is excluded. Collecting the
  survivors and returning `sorted(...)` gives a stable, predictable order for the
  downstream archive step. The whole pass is O(n log n) because of the final sort.
common_mistakes:
  - Using `>=` or `<=` against the cutoff, which wrongly sweeps a file modified exactly on the cutoff night.
  - Checking `path.endswith(".log")` without lowercasing, so `.LOG` files are missed.
  - Treating `rotate.log.gz` as a log by searching for ".log" anywhere in the name instead of reading only the final suffix.
