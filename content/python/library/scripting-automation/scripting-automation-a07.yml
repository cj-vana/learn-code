prompt_markdown: |
  A mountaintop observatory writes a fresh telescope log every observing night,
  and a nightly janitor script decides which old `.log` files are safe to sweep
  into cold storage. Time is modelled as an integer "night number" so the puzzle
  stays deterministic (no real clock).

  Write `stale_log_candidates(request)` that takes a single dictionary:

  - `"files"`: a list of record dictionaries, each with a `"path"` string and a
    `"modified"` integer (the night the file was last written).
  - `"cutoff"`: an integer night number.

  Return a list of the `"path"` strings for every file that is **both**:

  - a log file — its final path suffix is `.log`, compared case-insensitively so
    `.LOG` also counts; and
  - stale — its `"modified"` night is **strictly less** than `"cutoff"`.

  The returned paths must be sorted in ascending (lexicographic) order.

  Rules and edge cases the tests cover:

  - An empty `"files"` list returns `[]`.
  - A file whose `"modified"` equals `"cutoff"` is *not* stale and is excluded.
  - Only the **final** suffix decides the type: `rotate.log.gz` has suffix
    `.gz`, so it is not a log file. A path with no dot (like `README`) has no
    suffix and is excluded.
  - Match the suffix case-insensitively but return the original path unchanged.

  Example:

  ```python
  stale_log_candidates({
      "files": [
          {"path": "logs/app.log", "modified": 50},
          {"path": "logs/db.LOG", "modified": 30},
          {"path": "logs/app.txt", "modified": 10},
      ],
      "cutoff": 60,
  })
  # -> ["logs/app.log", "logs/db.LOG"]
  ```
