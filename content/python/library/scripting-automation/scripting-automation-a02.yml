explanation_markdown: |
  A tuple sort key is the clean way to express "order by this, then by that":
  `(record["mtime"], record["name"])` tells Python to compare timestamps first and
  fall back to the name only when timestamps tie. That fallback matters for
  automation — without it, two files stamped at the same second could come back in
  either order across runs, and a rerun-safe script wants a single deterministic
  answer. `sorted()` returns a new list and leaves the caller's records untouched,
  and the final comprehension projects out just the names in the freshly sorted
  order. Sorting is O(n log n).
common_mistakes:
  - Sorting by mtime alone, so files with equal timestamps come back in an unpredictable order.
  - Returning the whole record dicts instead of just the name strings the prompt asks for.
  - Using .sort() on the input and mutating the caller's list when a fresh sorted() result was expected.
