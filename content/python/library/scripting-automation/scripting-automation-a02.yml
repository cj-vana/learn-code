prompt_markdown: |
  A community darkroom digitizes rolls of film on a shared scanner, and the batch
  processor always works the backlog oldest-first so nothing waits forever. You are
  handed a list of scan records, one dict per file shaped like
  `{"name": "roll-a.tif", "mtime": 1700}`, where `mtime` is an integer timestamp
  (larger means more recently written).

  Write `sort_files_by_mtime(records)` that returns just the file names ordered from
  oldest to newest.

  - Order primarily by ascending `mtime` (smallest first).
  - When two files share the same `mtime`, break the tie by file name in ascending
    (dictionary) order so the result is always deterministic.
  - The returned value is a list of the `name` strings only, not the whole records.
  - An empty input returns an empty list `[]`.

  Do not mutate anything on disk; you are only computing a processing order from the
  records.
starter_code: |
  def sort_files_by_mtime(records):
      return []
function_name: sort_files_by_mtime
input_mode: function
solution_sketch: Sort the records with a key of (mtime, name) so ties fall back to the name, then project out the name field into a new list.
sample_solution: |
  def sort_files_by_mtime(records):
      ordered = sorted(records, key=lambda record: (record["mtime"], record["name"]))
      return [record["name"] for record in ordered]
hints:
  - level: 1
    text: sorted() with a key function lets you order records by a field without changing the original list.
  - level: 2
    text: Return a tuple key (record["mtime"], record["name"]) so Python compares mtime first and only uses the name to settle ties.
  - level: 3
    text: After sorting the records, build the answer with a comprehension that pulls record["name"] from each one in the new order.
