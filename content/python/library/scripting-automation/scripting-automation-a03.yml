explanation_markdown: |
  The trick is to normalize both sides of the comparison to the same shape once, up
  front. Wanted types arrive in mixed forms (`"pdf"`, `".pdf"`, `"PDF"`), so
  `ext.lstrip(".").lower()` strips any leading dots and case, collapsing them into a
  single canonical entry. Storing those in a `set` makes each membership test O(1),
  so the whole sweep is O(n) over the files. Each file is reduced to the same
  canonical form with `PurePath(name).suffix[1:].lower()`, and because you iterate
  `request["files"]` in order and only append matches, the surviving names keep
  their original ordering — which matters when the downstream step expects a stable
  manifest.
common_mistakes:
  - Comparing raw extensions without lowercasing, so BANNER.PNG slips past a keep list of ["png"].
  - Forgetting that keep entries may include a leading dot, so ".pdf" never matches the bare "pdf" you parsed from the file.
  - Using str.endswith on the whole name, which makes "notes.gz" also match a wanted "tes.gz" or mishandles multi-dot names.
