prompt_markdown: |
  A print shop's export folder is a jumble of working files and finished
  deliverables. When a job ships, an automation sweeps the folder and keeps only the
  file types the client actually receives.

  Because the grader calls your function with a single argument, the job comes in as
  one request dict:

  ```python
  {
      "files": [{"name": "poster.pdf", "size": 900}, {"name": "draft.txt", "size": 3}],
      "keep": ["pdf", ".svg", "PNG"]
  }
  ```

  Write `filter_files_by_extension(request)` that returns the list of file names
  whose extension is one of the wanted types, keeping them in their original input
  order.

  Matching rules:

  - A file's extension is the text after its final dot, compared case-insensitively:
    `BANNER.PNG` matches a wanted `"png"`.
  - Each entry in `keep` may be written with or without a leading dot and in any
    case, so `"pdf"`, `".pdf"`, and `"PDF"` all mean the same type.
  - A multi-dot name matches on its last piece only: `archive.tar.gz` matches a
    wanted `"gz"`.
  - Files whose extension is not wanted are dropped.

  An empty `keep` list keeps nothing (returns `[]`), and an empty `files` list also
  returns `[]`. No real files are touched — you filter the records.
starter_code: |
  from pathlib import PurePath


  def filter_files_by_extension(request):
