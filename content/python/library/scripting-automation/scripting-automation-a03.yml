function_name: filter_files_by_extension
input_mode: function
solution_sketch: Normalize every wanted extension to a bare lowercase form into a set, then keep each file whose PurePath suffix (also normalized) is in that set, preserving input order.
sample_solution: |
  from pathlib import PurePath


  def filter_files_by_extension(request):
      wanted = {ext.lstrip(".").lower() for ext in request["keep"]}
      result = []
      for record in request["files"]:
          ext = PurePath(record["name"]).suffix[1:].lower()
          if ext in wanted:
              result.append(record["name"])
      return result
hints:
