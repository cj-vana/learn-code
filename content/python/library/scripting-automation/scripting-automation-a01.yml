prompt_markdown: |
  Each morning a mountaintop observatory dumps the night's captures into an export
  bin. The overnight process hands you a list of file records, one dict per file
  shaped like `{"name": "orion.fits", "size": 820}`. Before anything gets archived
  you need to bucket the filenames by their extension.

  Write `group_files_by_extension(records)` that returns a dict mapping each
  extension to the list of file names that carry it, keeping names in the order
  they appear in the input.

  Rules for the extension key:

  - The extension is the text after the final dot in the file name, lowercased and
    written **without** the leading dot. So `orion.fits` and `M31.FITS` both group
    under `"fits"`.
  - A name with more than one dot uses only its last piece: `backup.tar.gz` groups
    under `"gz"`.
  - A name with no extension (`README`) or a dot-only name (`.env`) has an empty
    extension, so it groups under the empty-string key `""`.

  An empty input returns an empty dict `{}`. This is pure planning logic: you never
  open a real file, you only read the record dicts.
starter_code: |
