explanation_markdown: |
  `PurePath` parses path *strings* without ever touching a disk, which is exactly
  what an automation pre-flight wants: it plans against records, not live files.
  `.suffix` returns the final extension with its dot (`".fits"`) or `""` when there
  is none, so `suffix[1:].lower()` normalizes every file to a bare, case-folded
  bucket key. Building the dict with `setdefault(ext, [])` means the first file of a
  kind creates its list and every later file of the same kind appends to it, so the
  names inside each bucket stay in first-seen order. The whole pass is O(n) over the
  records.
common_mistakes:
  - Splitting on the first dot instead of the last, so backup.tar.gz lands under "tar" rather than "gz".
  - Forgetting to lowercase, which scatters orion.fits and M31.FITS into separate "fits" and "FITS" buckets.
  - Leaving the leading dot on the key so groups look like ".fits" instead of "fits".
