  def group_files_by_extension(records):
      return {}
function_name: group_files_by_extension
input_mode: function
solution_sketch: For each record, take PurePath(name).suffix, drop the leading dot and lowercase it, then append the name to that key's list built with dict.setdefault.
sample_solution: |
  from pathlib import PurePath


  def group_files_by_extension(records):
      groups = {}
      for record in records:
          ext = PurePath(record["name"]).suffix[1:].lower()
          groups.setdefault(ext, []).append(record["name"])
      return groups
