explanation_markdown: |
  A running total over groups is the accumulator pattern with a dict as the tally
  sheet: `totals.get(group, 0)` treats a never-seen group as starting at zero, and
  each file adds its `size` on top. The only branch is *how you name the bucket*.
  When `group_key` is `"extension"` the bucket is computed from the path string with
  `PurePath(name).suffix[1:].lower()`, the same normalization used to group by type
  elsewhere; otherwise the bucket is just a field read off the record. Deciding the
  group first and accumulating second keeps the loop a single clean O(n) pass, and
  because addition is commutative the totals do not depend on the order the files
  arrive in.
common_mistakes:
  - Overwriting totals[group] with the current size instead of adding to the accumulated value.
  - Assuming records always carry the group field, then crashing when group_key is "extension" and no such field exists.
  - Forgetting to lowercase the extension, so tides.csv and WIND.CSV land in separate buckets.
