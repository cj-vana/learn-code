function_name: total_size_by_group
input_mode: function
solution_sketch: Loop the files accumulating size into a totals dict; when group_key is "extension" derive the bucket from PurePath(name).suffix, otherwise read the named field, using dict.get(group, 0) as the running total.
sample_solution: |
  from pathlib import PurePath


  def total_size_by_group(request):
      group_key = request["group_key"]
      totals = {}
      for record in request["files"]:
          if group_key == "extension":
              group = PurePath(record["name"]).suffix[1:].lower()
          else:
              group = record[group_key]
          totals[group] = totals.get(group, 0) + record["size"]
      return totals
hints:
  - level: 1
    text: Keep a totals dict and add each file's size into the entry for its group as you walk the list.
  - level: 2
    text: totals[group] = totals.get(group, 0) + record["size"] starts a group at zero the first time you see it and accumulates after that.
  - level: 3
    text: Decide the group before adding — when group_key == "extension" use PurePath(name).suffix[1:].lower(), otherwise use record[group_key].
