prompt_markdown: |
  A harbor keeps a manifest of every data export leaving its logging station, and
  the dockmaster wants running totals of how many bytes each category ships. Because
  the grader calls your function with a single argument, the request arrives as one
  dict:

  ```python
  {
      "files": [
          {"name": "tides.csv", "size": 10, "crew": "mira"},
          {"name": "wind.csv", "size": 5, "crew": "jon"}
      ],
      "group_key": "crew"
  }
  ```

  Write `total_size_by_group(request)` that returns a dict mapping each group value to
  the sum of the `size` fields of the files in that group.

  The `group_key` decides how to bucket:

  - If `group_key` is the special string `"extension"`, group each file by its file
    extension — the text after the final dot, lowercased and without the dot (so
    `tides.csv` and `WIND.CSV` both count toward `"csv"`). A file with no extension
    groups under the empty-string key `""`.
  - Otherwise `group_key` names a field present on every record (such as `"crew"` or
    `"project"`), and files are grouped by that field's value.

  An empty `files` list returns an empty dict `{}`. This is pure tallying over the
  manifest records; no real file is opened.
starter_code: |
  from pathlib import PurePath


  def total_size_by_group(request):
