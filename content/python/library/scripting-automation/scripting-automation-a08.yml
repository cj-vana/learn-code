      input: {"files": [], "limit": 100}
      expected: []
    - name: two_crates
      input: {"files": [{"path": "a/one.bin", "size": 60}, {"path": "a/two.bin", "size": 50}, {"path": "a/three.bin", "size": 30}], "limit": 100}
      expected: [["one.bin"], ["two.bin", "three.bin"]]
    - name: exact_fit_stays_together
      input: {"files": [{"path": "x.dat", "size": 40}, {"path": "y.dat", "size": 60}], "limit": 100}
      expected: [["x.dat", "y.dat"]]
  validation:
    - name: oversize_file_alone
      input: {"files": [{"path": "big.iso", "size": 500}, {"path": "small.txt", "size": 10}], "limit": 100}
      expected: [["big.iso"], ["small.txt"]]
    - name: everything_fits_in_one
      input: {"files": [{"path": "dir/p.a", "size": 10}, {"path": "dir/q.b", "size": 10}, {"path": "dir/r.c", "size": 10}], "limit": 100}
      expected: [["p.a", "q.b", "r.c"]]
    - name: each_over_limit
      input: {"files": [{"path": "m/one", "size": 100}, {"path": "m/two", "size": 100}], "limit": 50}
      expected: [["one"], ["two"]]
    - name: deep_base_name
      input: {"files": [{"path": "a/b/c/deep.log", "size": 10}], "limit": 100}
      expected: [["deep.log"]]
    - name: fills_then_overflows
      input: {"files": [{"path": "f1", "size": 70}, {"path": "f2", "size": 30}, {"path": "f3", "size": 1}], "limit": 100}
      expected: [["f1", "f2"], ["f3"]]
explanation_markdown: |
  This is first-fit-decreasing's simpler cousin: a single greedy pass that never
  looks back. The invariant is that `total` always equals the sum of the sizes in
  `current`. When the next file would break the budget, you seal the current crate
  and open a fresh one — but only if the current crate has something in it, which
  is exactly what lets an oversize file land alone instead of forcing an empty
  crate in front of it.

  Two details make the greedy rule correct. First, the comparison is `>` not `>=`,
  so a file that brings the total up to precisely `limit` still fits. Second, the
  post-loop flush matters: the last crate is still open when the loop ends, so it
  must be appended explicitly or the final files vanish. Reducing each path to
  `PurePosixPath(...).name` keeps the manifest readable regardless of how deep the
  source directories were. The pass is O(n).
common_mistakes:
  - Forgetting to append the final `current` crate after the loop, dropping the last group of files.
  - Using `>=` instead of `>`, which splits a crate that lands exactly on the limit.
  - Flushing an empty crate when the very first file is oversize, producing a stray empty list at the front.
