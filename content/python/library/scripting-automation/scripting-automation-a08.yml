prompt_markdown: |
  A harbor office ships its daily export files to headquarters in "upload crates",
  and every crate has a strict size budget the network link can carry at once. The
  packing rule is simple and greedy: walk the files in the order given and keep
  dropping each one into the current crate; only start a new crate when adding the
  next file would push the current crate **over** the budget.

  Write `plan_upload_batches(request)` that takes a single dictionary:

  - `"files"`: a list of record dictionaries, each with a `"path"` string and a
    positive integer `"size"`.
  - `"limit"`: the integer size budget for one crate.

  Return a list of crates. Each crate is a list of file **base names** (the final
  path component, e.g. `docs/report.pdf` packs as `report.pdf`), in the order the
  files were packed.

  Packing rules and edge cases the tests cover:

  - An empty `"files"` list returns `[]`.
  - A crate may be filled up to exactly `"limit"`; only a running total that would
    become **strictly greater** than `"limit"` forces a new crate.
  - A single file whose `"size"` already exceeds `"limit"` still gets packed — it
    simply sits alone in its own crate.
  - The original file order is preserved across and within crates.

  Example:

  ```python
  plan_upload_batches({
      "files": [
          {"path": "a/one.bin", "size": 60},
          {"path": "a/two.bin", "size": 50},
          {"path": "a/three.bin", "size": 30},
      ],
      "limit": 100,
  })
  # -> [["one.bin"], ["two.bin", "three.bin"]]
  ```
starter_code: |
