function_name: plan_upload_batches
input_mode: function
solution_sketch: Track the current crate and its running total; before adding a file, flush the crate to the result if it is non-empty and the total would exceed the limit, then append the file's base name and add its size. Flush any leftover crate at the end.
sample_solution: |
  from pathlib import PurePosixPath


  def plan_upload_batches(request):
      files = request["files"]
      limit = request["limit"]
      crates = []
      current = []
      total = 0
      for record in files:
          size = record["size"]
          if current and total + size > limit:
              crates.append(current)
              current = []
              total = 0
          current.append(PurePosixPath(record["path"]).name)
          total += size
      if current:
          crates.append(current)
      return crates
hints:
