prompt_markdown: |
  A photographer's import tool never renames files blindly — it first drafts a plan
  you can review, then applies it. Your job is the drafting step.

  Because the grader calls your function with a single argument, the request arrives
  as one dict:

  ```python
  {
      "files": [{"name": "IMG_0001.cr2"}, {"name": "IMG_0002.cr2"}],
      "pattern": "shoot-{index}.{ext}"
  }
  ```

  Write `rename_plan(request)` that returns a list of `{"from": <old>, "to": <new>}`
  dicts, one per file, in the same order as `files`. Compute each new name by filling
  the `pattern` with these placeholders:

  - `{name}` — the file's full original name (`IMG_0001.cr2`).
  - `{stem}` — the name without its final extension. For a multi-dot name only the
    last extension is removed, so `backup.tar.gz` has stem `backup.tar`. A name with
    no extension is its own stem.
  - `{ext}` — the final extension **without** the dot, with its original letter case
    preserved (`cr2`, or `JPG` from `PIC.JPG`). A name with no extension has an empty
    `ext`.
  - `{index}` — the file's 1-based position in the list. Because it is a number, a
    format spec like `{index:03d}` zero-pads it (`001`, `002`).

  An empty `files` list returns an empty list `[]`. This is a dry run: you only build
  the planned names as strings and never rename anything on disk.
starter_code: |
  from pathlib import PurePath


  def rename_plan(request):
      return []
function_name: rename_plan
input_mode: function
solution_sketch: Enumerate the files from 1, parse each name with PurePath for stem and dotless suffix, then str.format the pattern with name, stem, ext, and index, collecting from/to dicts.
sample_solution: |
  from pathlib import PurePath


  def rename_plan(request):
      pattern = request["pattern"]
      plan = []
      for index, record in enumerate(request["files"], start=1):
          name = record["name"]
          path = PurePath(name)
          new_name = pattern.format(
              name=name,
              stem=path.stem,
              ext=path.suffix[1:],
              index=index,
          )
          plan.append({"from": name, "to": new_name})
      return plan
hints:
  - level: 1
    text: enumerate(files, start=1) gives you the 1-based index alongside each record in a single loop.
  - level: 2
    text: PurePath(name).stem is the name minus its last extension and PurePath(name).suffix[1:] is the extension without its leading dot, keeping the original case.
  - level: 3
    text: Call pattern.format(name=name, stem=path.stem, ext=path.suffix[1:], index=index); passing index as an int lets a spec like {index:03d} zero-pad it.
