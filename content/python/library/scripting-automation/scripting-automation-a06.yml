    - name: no_extension_appends_suffix
      input:
        files:
          - name: LICENSE
        pattern: "{stem}.bak"
      expected:
        - from: LICENSE
          to: LICENSE.bak
    - name: zero_padded_index
      input:
        files:
          - name: a.jpg
          - name: b.jpg
        pattern: "img-{index:03d}.{ext}"
      expected:
        - from: a.jpg
          to: img-001.jpg
        - from: b.jpg
          to: img-002.jpg
    - name: keeps_full_name
      input:
        files:
          - name: draft.md
          - name: final.md
        pattern: "{index}-{name}"
      expected:
        - from: draft.md
          to: 1-draft.md
        - from: final.md
          to: 2-final.md
    - name: extension_case_preserved
      input:
        files:
          - name: PIC.JPG
        pattern: "{stem}.{ext}"
      expected:
        - from: PIC.JPG
          to: PIC.JPG
explanation_markdown: |
  Planning before acting is the core discipline of safe automation: build the full
  list of `{"from": ..., "to": ...}` moves as strings, review it, and only then let a
  separate step touch disk. `enumerate(files, start=1)` supplies the human-friendly
  1-based counter, and `PurePath` does the string parsing — `.stem` peels off exactly
  the last extension (so `backup.tar.gz` keeps `backup.tar`) and `.suffix[1:]` yields
  the extension without its dot and without changing its case. `str.format` with
  named fields fills the template, and because `index` is passed as a real integer, a
  spec like `{index:03d}` can zero-pad it for sortable names. Nothing here mutates the
  filesystem, which is what makes the plan reviewable and the whole operation
  rerun-safe.
common_mistakes:
  - Starting the index at 0 (plain enumerate) so the first file is numbered 0 instead of 1.
  - Passing index as a string, which makes a {index:03d} zero-pad spec raise instead of padding.
  - Using name.split('.') for the stem, which mangles multi-dot names like backup.tar.gz.
