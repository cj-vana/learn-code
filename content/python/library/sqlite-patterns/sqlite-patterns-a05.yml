prompt_markdown: |
  A farmers market keeps two ledgers. One lists each vendor by the stall they
  rented; the other logs every crate sold, also tagged with a stall number. To
  see who sold what, you join the two on the shared stall column.

  Write `join_two_tables(request)` where `request` is a single dictionary with
  three keys:

  - `"table_a"`: a list of row dictionaries (the vendor roster)
  - `"table_b"`: a list of row dictionaries (the sales log)
  - `"join_key"`: the name of the column both tables share

  Load each list into its own in-memory SQLite table and run an inner join on the
  join key. Return the matched rows as a list of dictionaries whose keys, in
  order, are: the join key first, then every other column of `table_a` in its
  original order, then every other column of `table_b` in its original order.

  Order the result the way a nested loop would produce it: walk `table_a` in
  insertion order, and for each of its rows emit every matching `table_b` row in
  insertion order. A row in one table with no partner in the other contributes
  nothing. If either table is empty, return an empty list. You may assume every
  row within a table shares the same columns and that the column names are plain
  identifiers.
