tests:
  public:
    - name: one_to_one
      input:
        table_a:
          - {stall: 1, vendor: Rosewood}
        table_b:
          - {stall: 1, crates: 4}
        join_key: stall
      expected:
        - {stall: 1, vendor: Rosewood, crates: 4}
    - name: no_overlap
      input:
        table_a:
          - {stall: 1, vendor: Rosewood}
        table_b:
          - {stall: 9, crates: 4}
        join_key: stall
      expected: []
    - name: one_to_many
      input:
        table_a:
          - {stall: 1, vendor: Rosewood}
          - {stall: 2, vendor: Hillcrest}
          - {stall: 3, vendor: Marsh}
        table_b:
          - {stall: 1, crates: 4}
          - {stall: 1, crates: 2}
          - {stall: 2, crates: 5}
        join_key: stall
      expected:
        - {stall: 1, vendor: Rosewood, crates: 4}
        - {stall: 1, vendor: Rosewood, crates: 2}
        - {stall: 2, vendor: Hillcrest, crates: 5}
  validation:
    - name: empty_left
      input:
        table_a: []
        table_b:
          - {stall: 1, crates: 4}
        join_key: stall
      expected: []
    - name: empty_right
      input:
        table_a:
          - {stall: 1, vendor: Rosewood}
        table_b: []
        join_key: stall
      expected: []
    - name: many_to_many
      input:
        table_a:
          - {stall: 1, vendor: Ashby}
          - {stall: 1, vendor: Birch}
        table_b:
          - {stall: 1, crates: 2}
          - {stall: 1, crates: 3}
        join_key: stall
      expected:
        - {stall: 1, vendor: Ashby, crates: 2}
        - {stall: 1, vendor: Ashby, crates: 3}
        - {stall: 1, vendor: Birch, crates: 2}
        - {stall: 1, vendor: Birch, crates: 3}
    - name: three_columns_each
      input:
        table_a:
          - {stall: 2, vendor: Hillcrest, region: north}
        table_b:
          - {stall: 2, crates: 5, day: sat}
        join_key: stall
      expected:
        - {stall: 2, vendor: Hillcrest, region: north, crates: 5, day: sat}
explanation_markdown: |
  An inner join is the intersection of two tables over a shared key: only stall
  numbers present in both the roster and the sales log survive, and every
  matching pair becomes one output row. That is why a one-to-many relationship
  fans out — stall 1 with two crate entries yields two joined rows — and why a
  vendor with no sales simply disappears from the result.

  The one place you cannot use a `?` placeholder is a column or table name;
  identifiers have to be written into the SQL text itself. That is safe here
  because the names come from your own schema, but it is also why the prompt
  guarantees plain identifiers. Selecting `a.rowid` and `b.rowid` in the ORDER BY
  turns SQLite's otherwise-unspecified row order into the deterministic
  nested-loop sequence the tests expect.
common_mistakes:
  - Emitting the join key twice by copying every column from both tables instead of dropping the duplicate key from table_b.
  - Leaving out the ORDER BY, so the row order depends on SQLite's internal choices and drifts from the expected nested-loop order.
  - Trying to bind a table or column name with a ? placeholder, which SQLite rejects because placeholders stand in for values, not identifiers.
