solution_sketch: Create two tables from the first row's keys, insert every row with parameterised INSERTs, then SELECT the join-key plus each table's remaining columns across an inner join ordered by a.rowid then b.rowid, and map each result tuple back to a dict.
sample_solution: |
  import sqlite3


  def join_two_tables(request):
      table_a = request["table_a"]
      table_b = request["table_b"]
      join_key = request["join_key"]
      if not table_a or not table_b:
          return []
      a_cols = list(table_a[0].keys())
      b_cols = list(table_b[0].keys())
      conn = sqlite3.connect(":memory:")
      a_defs = ", ".join(a_cols)
      b_defs = ", ".join(b_cols)
      conn.execute(f"CREATE TABLE a ({a_defs})")
      conn.execute(f"CREATE TABLE b ({b_defs})")
      a_marks = ", ".join(["?"] * len(a_cols))
      b_marks = ", ".join(["?"] * len(b_cols))
      conn.executemany(
          f"INSERT INTO a ({a_defs}) VALUES ({a_marks})",
          [tuple(row[c] for c in a_cols) for row in table_a],
      )
      conn.executemany(
          f"INSERT INTO b ({b_defs}) VALUES ({b_marks})",
          [tuple(row[c] for c in b_cols) for row in table_b],
      )
      result_cols = (
          [join_key]
          + [c for c in a_cols if c != join_key]
          + [c for c in b_cols if c != join_key]
      )
      select_terms = (
          [f"a.{join_key}"]
          + [f"a.{c}" for c in a_cols if c != join_key]
          + [f"b.{c}" for c in b_cols if c != join_key]
      )
      sql = (
          f"SELECT {', '.join(select_terms)} FROM a "
          f"JOIN b ON a.{join_key} = b.{join_key} "
          "ORDER BY a.rowid, b.rowid"
      )
      rows = conn.execute(sql).fetchall()
      conn.close()
      return [dict(zip(result_cols, row)) for row in rows]
