explanation_markdown: |
  `GROUP BY` folds many rows into one row per distinct key, and the aggregate
  functions run inside each fold: `COUNT(*)` counts the rows in the group and
  `SUM(agg_col)` adds up the chosen column for just those rows. Doing both in a
  single query is the whole point — the database makes one pass and hands back a
  tidy per-orchard summary instead of you looping and bookkeeping by hand.

  Columns you neither group by nor aggregate are simply left out of the SELECT,
  which is why an extra `day` column rides along in storage but never touches the
  result. The `ORDER BY` on the group column is what makes the output stable:
  without it, the order of groups is not guaranteed, so sorting by the orchard
  name turns the summary into a predictable, repeatable report.
common_mistakes:
  - Returning the raw grouped rows without ORDER BY, so the group order is left to SQLite and fails the expected ordering.
  - Selecting a non-aggregated extra column alongside the group, which pulls in an arbitrary row's value instead of a clean summary.
  - Forgetting that COUNT(*) counts rows while SUM adds values, and swapping which one feeds the count versus the total key.
