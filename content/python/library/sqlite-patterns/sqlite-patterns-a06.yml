function_name: aggregate_group_by
input_mode: function
solution_sketch: Build a table from the first row's keys, insert every record with a parameterised INSERT, then SELECT the group column, COUNT(*), and SUM(agg_col) grouped by the group column and ordered ascending, mapping each tuple to a three-key dict.
sample_solution: |
  import sqlite3


  def aggregate_group_by(request):
      records = request["records"]
      group_col = request["group_col"]
      agg_col = request["agg_col"]
      if not records:
          return []
      cols = list(records[0].keys())
      conn = sqlite3.connect(":memory:")
      col_defs = ", ".join(cols)
      conn.execute(f"CREATE TABLE t ({col_defs})")
      marks = ", ".join(["?"] * len(cols))
      conn.executemany(
          f"INSERT INTO t ({col_defs}) VALUES ({marks})",
          [tuple(row[c] for c in cols) for row in records],
      )
      sql = (
          f"SELECT {group_col}, COUNT(*), SUM({agg_col}) "
          f"FROM t GROUP BY {group_col} ORDER BY {group_col} ASC"
      )
      rows = conn.execute(sql).fetchall()
      conn.close()
      return [
          {group_col: group_value, "count": row_count, "total": crate_total}
          for (group_value, row_count, crate_total) in rows
      ]
