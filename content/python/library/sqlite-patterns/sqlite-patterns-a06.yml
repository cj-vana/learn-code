prompt_markdown: |
  A cider press logs every apple delivery as it arrives, tagging each load with
  the orchard it came from and the number of crates. At the end of the day the
  press wants one line per orchard: how many deliveries arrived and how many
  crates in total.

  Write `aggregate_group_by(request)` where `request` is a single dictionary with
  three keys:

  - `"records"`: a list of row dictionaries (the delivery log)
  - `"group_col"`: the column to group by (here, the orchard)
  - `"agg_col"`: the numeric column to total

  Load the records into an in-memory SQLite table and run a single grouped query.
  Return a list of dictionaries, one per distinct group value, each with exactly
  three keys: the group column (its value), `"count"` (how many rows fell in that
  group, via `COUNT(*)`), and `"total"` (the `SUM` of the aggregate column for
  that group). Order the result by the group value ascending. An empty record
  list returns an empty list. Records may carry extra columns beyond the two you
  use; ignore them. You may assume every row shares the same columns.
