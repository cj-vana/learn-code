explanation_markdown: |
  `COUNT(*)` is the database answering "how many?" without shipping the rows
  themselves back to your program — it evaluates the `WHERE` clause row by row and
  returns a single number. Because the result is one row of one column, a single
  `fetchone()` and a tuple unpack (`(count,) = ...`) is all you need.

  There is a deliberate lesson in *what* is spliced versus bound. The row values
  went in through `?` placeholders during the insert, because values are exactly
  the thing you must never build by string concatenation. The predicate, by
  contrast, is a fragment of SQL logic authored by the application itself — a
  saved filter — so it becomes part of the query text. That is only safe because
  it is trusted; if the expression ever came from an untrusted source you could
  not drop it into a query this way, and you would restructure the feature to
  offer a fixed menu of parameterized filters instead.
common_mistakes:
  - Fetching all rows and counting them in Python, which throws away the whole point of asking the database for an aggregate.
  - Forgetting that fetchone returns a one-element tuple, then comparing that tuple to an integer.
  - Trying to bind the predicate as a ? parameter; a WHERE expression is SQL text, not a single value, so it cannot be a placeholder.
