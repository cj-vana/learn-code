function_name: count_rows_matching
input_mode: function
solution_sketch: "Short-circuit to 0 on empty rows, otherwise build an in-memory table from the row keys, insert every row with parameterized values, run SELECT COUNT(*) FROM t WHERE <predicate> splicing the trusted predicate into the query text, and return the single integer from fetchone."
sample_solution: |
  import sqlite3


  def count_rows_matching(request):
      rows = request["rows"]
      predicate = request["predicate"]
      if not rows:
          return 0
      columns = list(rows[0].keys())
      col_list = ", ".join('"%s"' % c for c in columns)
      placeholders = ", ".join("?" for _ in columns)
      conn = sqlite3.connect(":memory:")
      conn.execute("CREATE TABLE pantry (%s)" % col_list)
      conn.executemany(
          "INSERT INTO pantry (%s) VALUES (%s)" % (col_list, placeholders),
          [tuple(row[c] for c in columns) for row in rows],
      )
      query = "SELECT COUNT(*) FROM pantry WHERE %s" % predicate
      (count,) = conn.execute(query).fetchone()
      return count
hints:
  - level: 1
    text: Seed the table from the row keys exactly as any insert would, then think of the count as one aggregate query on top of it.
  - level: 2
    text: COUNT(*) returns a single-row, single-column result, so fetchone gives you a one-element tuple to unpack.
  - level: 3
    text: The predicate is trusted schema logic, so place it directly into the WHERE clause text; only row values were bound with ? during the insert.
