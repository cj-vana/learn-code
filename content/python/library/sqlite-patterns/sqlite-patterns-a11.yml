prompt_markdown: |
  A mountain refuge tracks its pantry as one row per item, a dict like
  `{"item": "oats", "grams": 800, "shelf": "A3"}`. The warden keeps a handful of
  **saved filters** — short SQL boolean expressions such as `grams >= 500` — and
  wants to know how many pantry items match a given filter without listing them.

  Write `count_rows_matching(request)` where `request` is a single dict:

  - `"rows"`: the pantry, a list of dicts that all share the same keys.
  - `"predicate"`: a SQL boolean expression written against those columns, for
    example `"grams >= 500"` or `"shelf = 'A3' AND grams > 100"`.

  Load the rows into an in-memory SQLite table, run a single
  `SELECT COUNT(*) FROM ... WHERE <predicate>`, and return the resulting count as
  an integer.

  Rules:

  - The predicate is a *trusted, warden-authored* filter — one of the refuge's
    own saved expressions — so you splice it into the `WHERE` clause as query
    text. (It is **not** raw text typed by a stranger; that would need a very
    different, locked-down approach.)
  - A predicate that matches nothing returns `0`.
  - If `"rows"` is empty, return `0` without needing to consult the predicate.

  Open `sqlite3.connect(":memory:")` inside the function and touch no files.
