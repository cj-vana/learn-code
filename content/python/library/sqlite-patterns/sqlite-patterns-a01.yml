explanation_markdown: |
  `sqlite3.connect(":memory:")` gives you a genuine relational database that never
  touches the filesystem and vanishes when the connection closes, which is exactly
  what you want for a deterministic, sandbox-safe drill. The lifecycle here is the
  one every SQLite program follows: create the schema once, insert rows with bound
  `?` placeholders, commit, then query. Returning `SELECT COUNT(*)` rather than
  `len(arrivals)` proves the rows actually landed in the table instead of trusting
  the input, and it means an empty logbook and a five-vessel morning both report
  the count the database itself holds. `executemany` binds each tuple in turn, so
  parameterisation also protects you from any awkward characters in a vessel name.
common_mistakes:
  - Returning len(arrivals) instead of querying the table, which never verifies the inserts and defeats the point of using a database.
  - Formatting values straight into the SQL string instead of binding them with ? placeholders, which is both unsafe and error-prone.
  - Forgetting to create the table before inserting, so the first INSERT raises an OperationalError about a missing table.
