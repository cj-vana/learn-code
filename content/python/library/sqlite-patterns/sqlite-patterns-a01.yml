function_name: create_and_insert
input_mode: function
solution_sketch: Connect to an in-memory database, CREATE the arrivals table, executemany a parameterised INSERT over the records, then SELECT COUNT(*) and return the single integer.
sample_solution: |
  import sqlite3


  def create_and_insert(arrivals):
      conn = sqlite3.connect(":memory:")
      try:
          conn.execute("CREATE TABLE arrivals (vessel TEXT, tonnage INTEGER)")
          conn.executemany(
              "INSERT INTO arrivals (vessel, tonnage) VALUES (?, ?)",
              [(row["vessel"], row["tonnage"]) for row in arrivals],
          )
          conn.commit()
          (count,) = conn.execute("SELECT COUNT(*) FROM arrivals").fetchone()
          return count
      finally:
          conn.close()
hints:
