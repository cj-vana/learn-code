prompt_markdown: |
  A harbormaster starts every shift with an empty logbook and records each vessel
  as it arrives. Model that logbook with a real SQLite database created fresh in
  memory, so nothing touches the disk.

  Write `create_and_insert(arrivals)` where `arrivals` is a list of dictionaries,
  each with two keys:

  - `"vessel"`: the ship's name, a string
  - `"tonnage"`: its displacement, a non-negative integer

  Inside the function, open an in-memory database with
  `sqlite3.connect(":memory:")`, create a table with a `vessel` text column and a
  `tonnage` integer column, insert one row per arrival using a parameterised
  `INSERT`, and return the number of rows now stored in the table (obtained with a
  `SELECT COUNT(*)`, not `len(arrivals)`).

  An empty list creates the table but inserts nothing, so the count is `0`.
  Duplicate vessel names are still separate arrivals and each counts once.
