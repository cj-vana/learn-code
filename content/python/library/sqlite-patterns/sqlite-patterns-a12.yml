prompt_markdown: |
  A herbarium is digitising its specimen drawers. Each specimen is a record dict,
  and a drawer is a list of those dicts that all share the same keys, for example:

  ```
  [
    {"accession": 1, "height_cm": 12.5, "species": "fern", "notes": None},
    {"accession": 2, "height_cm": 8.0,  "species": "moss", "notes": "brittle"},
  ]
  ```

  Before the drawer can be stored, you must draft a table schema from the data
  itself. Write `schema_from_records(request)` where `request` is a single dict
  with one key, `"records"` (the list of specimen dicts).

  Infer each column's SQLite type by scanning that column's values across every
  record, ignoring `None` values while deciding the type:

  - If any non-null value is a string, the column is `TEXT`.
  - Otherwise, if any non-null value is a float, the column is `REAL`.
  - Otherwise, if any non-null value is an int, the column is `INTEGER`.
  - If the column has **no** non-null values at all, default it to `TEXT`.

  A column is **nullable** when at least one record has `None` for it; otherwise
  it is not nullable.

  Prove the schema is real by using it: create an in-memory SQLite table whose
  columns are declared with the inferred types (and `NOT NULL` where the column
  is not nullable), insert every record with parameter placeholders, then read
  the schema back with `PRAGMA table_info`. Return a list — in column order — of
  dicts shaped `{"column": name, "type": TYPE, "nullable": bool}`, built from
  what the pragma reports.

  Edge cases:

  - Column order follows the key order of the first record.
  - An empty `"records"` list has no columns, so return an empty list.
  - Because a not-nullable column never contains `None`, inserting the records
    can never violate the `NOT NULL` you declared for it.

  Open `sqlite3.connect(":memory:")` inside the function; touch no files.
