prompt_markdown: |
  A botanical seed vault tracks one row per seed lot: a dict like
  `{"lot": "TOM-19", "grams": 40, "shelf": "A3"}`. When a new shipment of an
  existing lot arrives you do not want a duplicate row — you want that lot's row
  updated in place. When the lot is brand new, you want it appended. That combined
  "update if present, otherwise insert" move is an **upsert**.

  Write `upsert_record(request)` where `request` is a single dict:

  - `"rows"`: the current inventory, a list of lot dicts. These are already unique
    on the key column, and every row shares the same keys.
  - `"record"`: one incoming lot dict with the same keys as the rows.
  - `"key_col"`: the name of the identifying column, for example `"lot"`.

  Load the current rows into an in-memory SQLite table whose key column carries a
  `UNIQUE` constraint, then apply the incoming `record` with a single
  `INSERT ... ON CONFLICT(key_col) DO UPDATE` statement. Return the full table
  afterward as a list of dicts, sorted ascending by the key column.

  Behavior to guarantee:

  - If `record`'s key already exists, every non-key column of that row is
    overwritten with the incoming values.
  - If `record`'s key is new, it is added as another row.
  - If `"rows"` is empty, the result is just the incoming record.

  Each record has the key column plus at least one other column. Open
  `sqlite3.connect` on an in-memory database inside the function; touch no files.
