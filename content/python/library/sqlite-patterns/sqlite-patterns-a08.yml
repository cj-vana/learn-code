solution_sketch: "Create an in-memory table where the key column is declared UNIQUE, insert the existing rows, then run one INSERT ... ON CONFLICT(key) DO UPDATE SET col=excluded.col for each non-key column; finally SELECT everything ordered by the key column and rebuild dicts."
sample_solution: |
  import sqlite3


  def upsert_record(request):
      rows = request["rows"]
      record = request["record"]
      key_col = request["key_col"]
      columns = list(record.keys())
      defs = []
      for c in columns:
          if c == key_col:
              defs.append('"%s" UNIQUE' % c)
          else:
              defs.append('"%s"' % c)
      col_list = ", ".join('"%s"' % c for c in columns)
      placeholders = ", ".join("?" for _ in columns)
      conn = sqlite3.connect(":memory:")
      conn.execute("CREATE TABLE lots(%s)" % ", ".join(defs))
      conn.executemany(
          "INSERT INTO lots(%s) VALUES(%s)" % (col_list, placeholders),
          [tuple(row[c] for c in columns) for row in rows],
      )
      updates = ", ".join(
          '"%s"=excluded."%s"' % (c, c) for c in columns if c != key_col
      )
      conn.execute(
          'INSERT INTO lots(%s) VALUES(%s) ON CONFLICT("%s") DO UPDATE SET %s'
          % (col_list, placeholders, key_col, updates),
          tuple(record[c] for c in columns),
      )
      fetched = conn.execute(
          'SELECT %s FROM lots ORDER BY "%s" ASC' % (col_list, key_col)
      ).fetchall()
      return [dict(zip(columns, row)) for row in fetched]
