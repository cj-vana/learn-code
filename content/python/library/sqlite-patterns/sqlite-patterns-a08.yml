explanation_markdown: |
  An upsert collapses a read-then-branch dance ("does this key exist? if yes
  UPDATE, else INSERT") into one atomic statement. SQLite spells it
  `INSERT ... ON CONFLICT(target) DO UPDATE`. The conflict target has to be a
  column the database can police for collisions, which is why the key column is
  declared `UNIQUE`. Inside the `DO UPDATE SET` clause, the pseudo-table
  `excluded` holds the row you *tried* to insert, so `shelf = excluded.shelf`
  copies the incoming value over the stored one.

  Building the `SET` clause from "every column except the key" is the general
  version of the pattern: the key stays fixed (that is the whole point of matching
  on it) while the rest of the record is refreshed.
common_mistakes:
  - Forgetting the UNIQUE constraint on the key column, so the conflict never triggers and you silently get a duplicate row instead of an update.
  - Including the key column in the DO UPDATE SET clause; it should stay fixed while only the other columns are refreshed from excluded.
  - Reaching for a manual "SELECT then decide" round trip instead of the single ON CONFLICT statement, which is both slower and not atomic.
