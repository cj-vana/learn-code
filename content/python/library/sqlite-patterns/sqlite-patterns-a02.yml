solution_sketch: Seed an in-memory table from the records, confirm the column is one of the three allowed names, then run a SELECT that interpolates the validated column but binds the value with a ? placeholder, and rebuild each returned row into a dict.
sample_solution: |
  import sqlite3


  def select_where(request):
      records = request["records"]
      column = request["column"]
      value = request["value"]
      allowed = {"part", "bin", "quantity"}
      if column not in allowed:
          raise ValueError(f"unknown column: {column}")
      conn = sqlite3.connect(":memory:")
      try:
          conn.execute("CREATE TABLE inventory (part TEXT, bin TEXT, quantity INTEGER)")
          conn.executemany(
              "INSERT INTO inventory (part, bin, quantity) VALUES (?, ?, ?)",
              [(r["part"], r["bin"], r["quantity"]) for r in records],
          )
          conn.commit()
          rows = conn.execute(
              f"SELECT part, bin, quantity FROM inventory WHERE {column} = ? ORDER BY rowid",
              (value,),
          ).fetchall()
          return [{"part": p, "bin": b, "quantity": q} for (p, b, q) in rows]
      finally:
          conn.close()
hints:
  - level: 1
    text: Seed the table exactly as you would for any insert, then think about the WHERE clause separately; a column identifier and a compared value are handled in two different ways.
  - level: 2
    text: Only the value can be a ? placeholder. Check that column is one of "part", "bin", or "quantity" and splice that trusted name into the query string, while binding value with ?.
  - level: 3
    text: Add ORDER BY rowid so results come back in insertion order, then turn each (part, bin, quantity) tuple from fetchall into a dictionary with those keys.
