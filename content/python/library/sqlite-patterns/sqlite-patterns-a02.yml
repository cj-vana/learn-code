prompt_markdown: |
  A workshop clerk keeps inventory in a table where every part has a name, a
  storage bin, and a quantity. Build that table fresh in memory and pull back just
  the rows matching a lookup.

  Write `select_where(request)` where `request` is a single dictionary with three
  keys:

  - `"records"`: a list of dictionaries, each with keys `"part"` (string),
    `"bin"` (string), and `"quantity"` (integer)
  - `"column"`: the column to filter on, always one of `"part"`, `"bin"`, or
    `"quantity"`
  - `"value"`: the value that column must equal

  Insert every record into an in-memory SQLite table, then run a
  `SELECT part, bin, quantity ... WHERE <column> = ?` that keeps only the rows
  where the chosen column equals `value`. Return the matching rows as a list of
  dictionaries with the same three keys, in the order they were inserted.

  A column name cannot be a bound `?` parameter, so validate it against the three
  allowed names and place it into the query text; the compared `value`, however,
  must always be bound with a `?` placeholder. When nothing matches, or the record
  list is empty, return an empty list.

  Example: filtering `"part"` equal to `"bolt"` over rows for a bolt in bin `A1`,
  a nut in bin `A1`, and a bolt in bin `B2` returns the two bolt rows.
