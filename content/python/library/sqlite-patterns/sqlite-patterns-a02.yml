explanation_markdown: |
  This is the split every SQLite programmer has to internalise: a bound `?`
  placeholder can stand in for a value, but never for a table or column name. The
  database engine needs the identifier `bin` or `quantity` while it is parsing the
  statement, long before your value is ever substituted, so the column has to be
  part of the query text. That is precisely why you validate it against a fixed
  allow-list first, splicing in only a name you already trust, while the
  user-supplied `value` rides in safely on a `?`. `ORDER BY rowid` keeps results in
  insertion order, since SQLite makes no ordering promise without it, and rebuilding
  each returned tuple into a dictionary gives callers the same shape they handed in.
common_mistakes:
  - Trying to bind the column name with a ? placeholder, which filters on the literal string instead of the column and matches nothing.
  - Formatting the value into the query string alongside the column, reopening the injection hole the allow-list was meant to close.
  - Omitting ORDER BY, so the returned rows can drift out of insertion order and fail the exact-match comparison.
