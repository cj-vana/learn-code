prompt_markdown: |
  A natural-history museum runs a ticket desk whose staff paste SQL query
  templates into a review console before anything reaches the database. A
  template is safe when every value it needs is bound through a `?` placeholder.
  It is a risk when a value would instead be spliced in with Python string
  formatting, because that is exactly how SQL injection sneaks in.

  Write `detect_injection_risk(template)` where `template` is a single SQL
  string. Return `True` when the template shows a string-formatting marker and
  `False` otherwise. Treat these as markers:

  - An opening brace `{` — the start of a `str.format()` field or an f-string
    interpolation. So both `WHERE code = {}` and `WHERE code = {code}` are risky.
  - A printf-style conversion `%s`, `%d`, or `%f` — a `%` immediately followed by
    one of the letters `s`, `d`, or `f`, where that letter is the last character
    of the string or is followed by a non-letter. A `LIKE '%sale%'` wildcard is
    NOT a conversion, because the `s` right after the `%` is followed by another
    letter, so that template stays safe. A `LIKE '%rain%'` wildcard is safe for
    the same reason.

  A template that binds its values only through `?` placeholders, or that carries
  no markers at all, returns `False`.
starter_code: |
  def detect_injection_risk(template):
      return False
function_name: detect_injection_risk
input_mode: function
solution_sketch: An opening brace anywhere is an immediate risk. Otherwise scan for a percent sign followed by s, d, or f, and count it only when the letter after that is the end of the string or a non-letter.
sample_solution: |
  def detect_injection_risk(template):
      if "{" in template:
          return True
      conversions = {"s", "d", "f"}
      length = len(template)
      for index, char in enumerate(template):
          if char != "%":
              continue
          nxt = index + 1
          if nxt < length and template[nxt] in conversions:
              after = index + 2
              if after >= length or not template[after].isalpha():
                  return True
      return False
hints:
  - level: 1
    text: A template that only uses ? for its values is safe; the danger is a value pasted in with Python string formatting.
  - level: 2
    text: An opening { always signals a format field, so return True the moment you see one. For percent markers, look for % followed by s, d, or f.
  - level: 3
    text: A percent conversion counts only when the letter after % is the last character or is followed by a non-letter, which is what separates %s from a LIKE '%sale%' wildcard.
