explanation_markdown: |
  Parameterised queries defeat injection because the driver keeps your SQL and
  your data on separate tracks: the `?` placeholders describe structure, and the
  bound values are never parsed as SQL. Every string-formatting marker is a sign
  the two tracks were about to be merged into one string, which is the crack an
  attacker slips through.

  The boundary rule is what keeps the check honest. A naive "does it contain `%`"
  test would condemn a perfectly safe `LIKE '%rain%'` wildcard. By requiring the
  conversion letter to sit at the end or before a non-letter, `%s` and `%d` are
  flagged while `%sale%` and `%rain%` pass. Real linters such as Bandit lean on
  the same kind of heuristic; it is not a full SQL parser, so a contrived pattern
  like `LIKE '%d%'` could still trip it, which is one more reason production code
  binds `LIKE` patterns as parameters rather than baking them into the template.
common_mistakes:
  - Flagging every percent sign, which wrongly condemns a legitimate LIKE '%rain%' wildcard.
  - Missing the named-field form {code} by only checking for the empty {} pair.
  - Treating a ? placeholder as a risk; it is the safe form the detector is meant to reward.
