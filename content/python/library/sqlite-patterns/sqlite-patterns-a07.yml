explanation_markdown: |
  `ORDER BY` plus `LIMIT` is how a database hands you a leaderboard without pulling
  every row into your program. The one subtlety is stability: SQLite does not
  promise to keep equal rows in any particular order, so tied vessels could come
  back either way across versions. Adding `, rowid ASC` as a second sort key pins
  ties to insertion order, because each inserted row gets a monotonically
  increasing implicit `rowid`.

  Notice what is a parameter and what is not. The `LIMIT` value is untrusted data,
  so it is bound with `?`. The sort *direction* and *column* are identifiers, which
  cannot be bound as parameters — you assemble them into the query text yourself,
  which is safe here because they come from your own schema rather than raw user
  input.
common_mistakes:
  - Trying to bind the column name or DESC/ASC as a ? parameter; only values can be bound, identifiers and keywords are part of the query text.
  - Forgetting the rowid tiebreak, so tied rows come back in an unspecified order and the test that checks input-order stability fails.
  - Assuming a LIMIT larger than the row count is an error; SQLite simply returns every available row.
