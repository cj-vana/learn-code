function_name: order_and_limit
input_mode: function
solution_sketch: "Create an in-memory table whose columns are the row keys, insert the rows, then SELECT them back with ORDER BY the chosen column DESC or ASC plus a rowid tiebreak and a bound LIMIT; rebuild dicts from the fetched tuples."
sample_solution: |
  import sqlite3


  def order_and_limit(request):
      rows = request["rows"]
      if not rows:
          return []
      order_col = request["order_col"]
      limit = request["limit"]
      direction = "DESC" if request["descending"] else "ASC"
      columns = list(rows[0].keys())
      col_list = ", ".join('"%s"' % c for c in columns)
      placeholders = ", ".join("?" for _ in columns)
      conn = sqlite3.connect(":memory:")
      conn.execute("CREATE TABLE berths(%s)" % col_list)
      conn.executemany(
          "INSERT INTO berths(%s) VALUES(%s)" % (col_list, placeholders),
          [tuple(row[c] for c in columns) for row in rows],
      )
      query = 'SELECT %s FROM berths ORDER BY "%s" %s, rowid ASC LIMIT ?' % (
          col_list,
          order_col,
          direction,
      )
      fetched = conn.execute(query, (limit,)).fetchall()
      return [dict(zip(columns, row)) for row in fetched]
