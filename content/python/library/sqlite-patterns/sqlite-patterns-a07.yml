prompt_markdown: |
  A busy fishing harbor keeps a live berth board: every vessel tied up right now is
  one row, a dict shaped like `{"name": "Marlin", "tons": 50}`. The harbormaster
  wants the board narrowed to just the heaviest (or lightest) few vessels.

  Write `order_and_limit(request)` where `request` is a single dict:

  - `"rows"`: the list of vessel dicts. Every row shares the same set of keys.
  - `"order_col"`: the column name to sort by, for example `"tons"`.
  - `"descending"`: `True` sorts largest-first, `False` sorts smallest-first.
  - `"limit"`: how many rows to keep from the top of the sorted board.

  Load the rows into an in-memory SQLite table, run a single `ORDER BY ... LIMIT`
  query, and return the surviving rows as a list of dicts with the same keys as the
  input rows.

  Rules for every edge case:

  - Ties on `order_col` keep the vessels in their original input order (a stable
    ordering).
  - If `limit` is larger than the number of rows, return every row.
  - If `limit` is `0`, return an empty list.
  - If `"rows"` is empty, return an empty list.

  This is real SQL: open `sqlite3.connect(":memory:")` inside the function, never a
  file on disk.
