explanation_markdown: |
  A transaction is the database's promise of *atomicity*: the statements between
  `BEGIN` and `COMMIT` are treated as one indivisible move. By committing the
  baseline first and then wrapping only the batch inserts in a single
  transaction, you give the whole batch a shared fate. When the fifth insert
  trips the `UNIQUE` constraint and raises `IntegrityError`, `ROLLBACK` rewinds
  the table to exactly where `BEGIN` found it — the four rows that already
  inserted cleanly vanish too, because they were never committed.

  The reason the sample sets `conn.isolation_level = None` is control. In that
  mode SQLite does not silently open transactions for you, so `BEGIN`, `COMMIT`,
  and `ROLLBACK` mean precisely what they say and the batch boundary is
  unambiguous. Catching the error around the *entire* loop — not around each
  individual insert — is what makes one bad ticket discard the whole batch
  rather than just skipping itself.
common_mistakes:
  - Catching IntegrityError inside the loop and continuing, which posts the good rows and drops only the duplicate instead of rolling the whole batch back.
  - Committing after every insert, so a later failure can no longer undo the earlier rows and atomicity is lost.
  - Leaving isolation_level at its default and mixing implicit and explicit transactions, which can raise "cannot start a transaction within a transaction" or leave rows half-committed.
