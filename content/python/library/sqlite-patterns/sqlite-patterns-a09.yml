solution_sketch: "Create an in-memory table with UNIQUE on the key column, insert and commit the baseline rows, then switch to manual transaction control and BEGIN a single transaction around inserting every batch row; on sqlite3.IntegrityError ROLLBACK the whole batch, otherwise COMMIT, and finally SELECT everything ordered by the key column."
sample_solution: |
  import sqlite3


  def post_order_batch(request):
      committed = request["committed"]
      batch = request["batch"]
      key_col = request["key_col"]
      seed = committed if committed else batch
      if not seed:
          return []
      columns = list(seed[0].keys())
      col_list = ", ".join('"%s"' % c for c in columns)
      placeholders = ", ".join("?" for _ in columns)
      defs = ", ".join(
          '"%s" UNIQUE' % c if c == key_col else '"%s"' % c for c in columns
      )
      conn = sqlite3.connect(":memory:")
      conn.isolation_level = None
      conn.execute("CREATE TABLE orders (%s)" % defs)
      insert = "INSERT INTO orders (%s) VALUES (%s)" % (col_list, placeholders)
      if committed:
          conn.executemany(
              insert, [tuple(row[c] for c in columns) for row in committed]
          )
      if batch:
          conn.execute("BEGIN")
          try:
              for row in batch:
                  conn.execute(insert, tuple(row[c] for c in columns))
              conn.execute("COMMIT")
          except sqlite3.IntegrityError:
              conn.execute("ROLLBACK")
      fetched = conn.execute(
          'SELECT %s FROM orders ORDER BY "%s" ASC' % (col_list, key_col)
      ).fetchall()
      return [dict(zip(columns, row)) for row in fetched]
hints:
  - level: 1
    text: Commit the baseline rows first, then wrap only the batch inserts in a single transaction so they share one all-or-nothing fate.
  - level: 2
    text: Set conn.isolation_level = None and drive the batch yourself with conn.execute("BEGIN") then a loop of inserts, so you control exactly when COMMIT or ROLLBACK happens.
  - level: 3
    text: Catch sqlite3.IntegrityError around the whole insert loop; on that error run ROLLBACK to erase every batch row inserted so far, otherwise run COMMIT, then SELECT ordered by the key column.
