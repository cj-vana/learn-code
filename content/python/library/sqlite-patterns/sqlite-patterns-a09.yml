prompt_markdown: |
  A cooperative bakery keeps its order book in a table: one row per order, a dict
  shaped like `{"ticket": 101, "item": "rye", "qty": 6}`. Every morning a runner
  posts a whole **batch** of the night's new orders at once, and the rule is
  strict: either the entire batch lands on the books or none of it does. If any
  order in the batch reuses a ticket number that is already taken — whether by an
  order already on the books or by an earlier order in the same batch — the runner
  tears up the whole batch and posts nothing.

  Write `post_order_batch(request)` where `request` is a single dict:

  - `"committed"`: the orders already safely on the books, a list of order dicts.
    Their `key_col` values are already unique. Every row shares the same keys.
  - `"batch"`: the list of new order dicts to post together in one transaction.
  - `"key_col"`: the name of the unique identifying column, for example `"ticket"`.

  Build an in-memory SQLite table whose `key_col` carries a `UNIQUE` constraint,
  insert and commit the `committed` rows as the baseline, then open **one**
  transaction and try to insert every `batch` row. Commit only if all of them
  succeed; if any insert raises a uniqueness violation, roll the whole
  transaction back so none of the batch survives. Return the final table as a
  list of dicts sorted ascending by `key_col`.

  Guarantees to honour:

  - A single duplicate anywhere in the batch discards the **entire** batch, not
    just the offending row.
  - An empty `batch` leaves the books exactly as the committed rows.
  - If both `committed` and `batch` are empty, return an empty list.
  - When `committed` is empty but the batch is clean, the result is the batch.

  This is real SQL run atomically: open `sqlite3.connect(":memory:")` inside the
  function and manage the batch with explicit `BEGIN`/`COMMIT`/`ROLLBACK`. Touch
  no files on disk.
