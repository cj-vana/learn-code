prompt_markdown: |
  An observatory receives nightly uploads for its star catalog: a list of rows,
  each a dict like `{"catalog_id": "HD-4021", "magnitude": 5.1}`. Before the
  upload is accepted, a clerk checks that the identifying column really is unique
  across the whole file, because two rows claiming the same catalog id would
  corrupt the catalog.

  Write `unique_constraint_violation_check(request)` where `request` is a single
  dict:

  - `"rows"`: the uploaded rows, a list of dicts that all share the same keys.
  - `"unique_col"`: the column that must hold no repeated value, for example
    `"catalog_id"`.

  Build an in-memory SQLite table whose `unique_col` carries a `UNIQUE`
  constraint, then insert the rows **one at a time in order**. Stop at the first
  insert that raises a uniqueness violation. Return a dict describing what
  happened:

  - `"ok"`: `True` if every row inserted cleanly, otherwise `False`.
  - `"first_conflict"`: the `unique_col` value of the first row that collided,
    or `None` when there was no collision.
  - `"inserted"`: how many rows inserted successfully before you stopped (so on a
    clean upload this equals the number of rows).

  Details that matter:

  - If `"rows"` is empty, the upload is trivially clean:
    `{"ok": True, "first_conflict": None, "inserted": 0}`.
  - SQLite treats `NULL` as distinct from every other `NULL`, so multiple rows
    whose `unique_col` is `None` do **not** collide — let the database decide
    this rather than special-casing it yourself.

  Open `sqlite3.connect(":memory:")` inside the function; do not touch any files.
