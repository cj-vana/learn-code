solution_sketch: "Create an in-memory table declaring the unique column UNIQUE, loop over the rows inserting one at a time inside a try/except for sqlite3.IntegrityError; on the first error return ok False with that row's key value and the running inserted count, otherwise return ok True with None and the full count."
sample_solution: |
  import sqlite3


  def unique_constraint_violation_check(request):
      rows = request["rows"]
      unique_col = request["unique_col"]
      if not rows:
          return {"ok": True, "first_conflict": None, "inserted": 0}
      columns = list(rows[0].keys())
      col_list = ", ".join('"%s"' % c for c in columns)
      placeholders = ", ".join("?" for _ in columns)
      defs = ", ".join(
          '"%s" UNIQUE' % c if c == unique_col else '"%s"' % c for c in columns
      )
      conn = sqlite3.connect(":memory:")
      conn.isolation_level = None
      conn.execute("CREATE TABLE catalog (%s)" % defs)
      insert = "INSERT INTO catalog (%s) VALUES (%s)" % (col_list, placeholders)
      inserted = 0
      for row in rows:
          try:
              conn.execute(insert, tuple(row[c] for c in columns))
              inserted += 1
          except sqlite3.IntegrityError:
              return {
                  "ok": False,
                  "first_conflict": row[unique_col],
                  "inserted": inserted,
              }
      return {"ok": True, "first_conflict": None, "inserted": inserted}
hints:
  - level: 1
    text: Declare only the unique column with a UNIQUE constraint when you CREATE the table; the other columns stay plain.
  - level: 2
    text: Insert the rows one by one inside a try block and increment a counter after each successful insert.
  - level: 3
    text: Catch sqlite3.IntegrityError; the row you were inserting when it fired is the first conflict, and the counter already holds how many landed before it. Let NULL values flow through untouched so SQLite's NULL-distinct rule applies.
tests:
  public:
    - name: clean_upload
      input:
        rows:
          - {catalog_id: HD-4021, magnitude: 5.1}
          - {catalog_id: HD-4099, magnitude: 6.3}
          - {catalog_id: HD-5100, magnitude: 4.0}
        unique_col: catalog_id
      expected:
        ok: true
        first_conflict: null
        inserted: 3
    - name: duplicate_id
      input:
        rows:
          - {catalog_id: HD-4021, magnitude: 5.1}
          - {catalog_id: HD-4099, magnitude: 6.3}
          - {catalog_id: HD-4021, magnitude: 9.9}
        unique_col: catalog_id
      expected:
        ok: false
        first_conflict: HD-4021
        inserted: 2
    - name: empty_upload
      input:
        rows: []
        unique_col: catalog_id
      expected:
        ok: true
        first_conflict: null
        inserted: 0
  validation:
    - name: first_two_collide
      input:
        rows:
          - {catalog_id: HD-1, magnitude: 2.2}
          - {catalog_id: HD-1, magnitude: 3.3}
        unique_col: catalog_id
      expected:
        ok: false
        first_conflict: HD-1
        inserted: 1
    - name: nulls_are_distinct
      input:
        rows:
          - {catalog_id: null, magnitude: 5.1}
          - {catalog_id: null, magnitude: 6.3}
        unique_col: catalog_id
      expected:
        ok: true
        first_conflict: null
        inserted: 2
    - name: numeric_unique_column
      input:
        rows:
          - {band: 1, flux: 30}
          - {band: 2, flux: 40}
          - {band: 1, flux: 55}
        unique_col: band
      expected:
        ok: false
        first_conflict: 1
        inserted: 2
    - name: single_row
      input:
        rows:
          - {catalog_id: HD-7, magnitude: 1.0}
        unique_col: catalog_id
      expected:
        ok: true
        first_conflict: null
        inserted: 1
explanation_markdown: |
  Rather than hand-rolling a duplicate scan, this lets the database enforce the
  rule and reports what it enforced. A `UNIQUE` column makes SQLite reject the
  first colliding insert with `sqlite3.IntegrityError`, so the row you were
  holding at that moment is exactly the first conflict, and the counter you kept
  tells you how many rows made it in first. Inserting one at a time (instead of
  one `executemany`) is what lets you pinpoint *which* value broke the rule.

  The subtle case is `NULL`. In SQL a `NULL` is not considered equal to anything,
  not even another `NULL`, so a `UNIQUE` column happily accepts many `NULL`
  rows. Because you pass the values straight through to the database, you inherit
  that behaviour for free — and it is the correct behaviour, which is why the
  two-`None` upload reports `ok: True`.
common_mistakes:
  - Using a single executemany, which does flag a duplicate but cannot tell you which value collided or how many rows preceded it.
  - Special-casing None as a duplicate, which contradicts SQL's rule that NULL is distinct from every other NULL.
  - Counting the failed row as inserted, so the reported inserted total is one too high.
