prompt_markdown: |
  Crates sit in a row on a conveyor, each with a non-negative integer weight in
  the list `weights`. Write `balance_point(weights)` returning the leftmost index
  where the total weight of all crates strictly to its left equals the total
  weight of all crates strictly to its right. The crate at the index itself
  counts toward neither side. If no such index exists, return -1. An empty list
  returns -1.
starter_code: |
  def balance_point(weights):
      return -1
function_name: balance_point
input_mode: function
solution_sketch: Track the running left-side total; the right side is the grand total minus the left total minus the current weight.
sample_solution: |
  def balance_point(weights):
      total = sum(weights)
      left = 0
      for i, weight in enumerate(weights):
          right = total - left - weight
          if left == right:
              return i
          left += weight
      return -1
hints:
  - level: 1
    text: For each index you need the sum of everything before it and the sum of everything after it.
  - level: 2
    text: Once you know the grand total, the right side is total minus the left side minus the current crate.
  - level: 3
    text: Sweep left to right keeping a running left total, and return the first index where left equals right.
