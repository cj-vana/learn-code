explanation_markdown: |
  Computing the grand total once lets each index's right-side sum be derived in
  O(1) as `total - left - weights[i]`, while a running `left` accumulates as the
  sweep moves right. The whole scan is O(n) with O(1) extra state. Returning on
  the first match yields the leftmost balance point, and a single crate balances
  at index 0 because both sides are empty.
common_mistakes:
  - Recomputing the left and right sums from scratch at every index, giving O(n^2) work.
  - Including the current crate's weight in one of the two sides.
  - Returning a later balance point instead of the leftmost one.
