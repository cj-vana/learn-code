prompt_markdown: |
  A stadium has a north and a south turnstile. Each one records entry times (as
  minute counts) in non-decreasing order. Write `merge_entry_times(data)` where
  `data` is a dict with keys `north` and `south`, each a sorted list of integer
  times. Return one combined list of all entry times in non-decreasing order.
  Duplicate times may appear and must all be kept.
starter_code: |
