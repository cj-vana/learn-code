explanation_markdown: |
  A fixed-size sliding window keeps a running total of the current block. After
  the first sum, each new block reuses the previous one by adding the reading
  that enters on the right and subtracting the reading that leaves on the left,
  so the whole scan is O(n) instead of O(n * window). Guarding invalid window
  sizes avoids indexing past the end of the list.
common_mistakes:
  - Re-summing each window from scratch, giving O(n * window) work.
  - Forgetting to subtract the reading that leaves the window when sliding.
  - Not handling a window larger than the readings list.
