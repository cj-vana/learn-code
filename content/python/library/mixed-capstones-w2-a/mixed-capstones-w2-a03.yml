prompt_markdown: |
  A rooftop solar array logs the kilowatt-hours it produces each day. Write
  `best_energy_window(data)` where `data` is a dict with `readings` (a list of
  non-negative integers) and `window` (an integer number of consecutive days).
  Return the largest total energy produced over any block of `window`
  consecutive days. If `window` is not a valid size (zero, negative, or larger
  than the number of readings), return 0.
starter_code: |
