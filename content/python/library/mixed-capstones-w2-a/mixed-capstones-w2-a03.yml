      return 0
function_name: best_energy_window
input_mode: function
solution_sketch: Sum the first window, then slide it by adding the entering reading and subtracting the leaving one, tracking the max.
sample_solution: |
  def best_energy_window(data):
      readings = data["readings"]
      window = data["window"]
      n = len(readings)
      if window <= 0 or window > n:
          return 0
      current = sum(readings[:window])
      best = current
      for i in range(window, n):
          current += readings[i] - readings[i - window]
          if current > best:
              best = current
      return best
hints:
  - level: 1
    text: The answer is the maximum over every block of exactly window consecutive days.
  - level: 2
    text: Recomputing each block from scratch is wasteful; reuse the previous block's total.
  - level: 3
    text: Slide the window by adding the newly entering reading and subtracting the one that just left.
