explanation_markdown: |
  A non-decreasing list splits cleanly into a "below goal" prefix and an
  "at or above goal" suffix, so binary search finds the boundary in O(log n).
  The loop narrows `[lo, hi)` toward the leftmost qualifying index; if that index
  equals the list length, no day ever reached the goal and the answer is -1.
common_mistakes:
  - Returning any qualifying index instead of the first (leftmost) one.
  - Scanning linearly and losing the O(log n) benefit of the sorted counts.
  - Forgetting the -1 case when the final count still falls short of the goal.
