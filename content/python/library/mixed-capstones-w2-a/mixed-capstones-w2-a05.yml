prompt_markdown: |
  A newsletter tracks its total subscriber count at the end of each day. Because
  counts only grow, `counts` is a non-decreasing list of integers (day 0 first).
  Write `first_day_reaching_goal(data)` where `data` is a dict with `counts` and
  an integer `goal`. Return the 0-based index of the first day whose count is at
  least `goal`. If no day reaches the goal, return -1.
starter_code: |
  def first_day_reaching_goal(data):
      return -1
function_name: first_day_reaching_goal
input_mode: function
solution_sketch: Binary search for the leftmost index whose count is at least the goal, returning -1 if the search runs past the end.
sample_solution: |
  def first_day_reaching_goal(data):
      counts = data["counts"]
      goal = data["goal"]
      lo = 0
      hi = len(counts)
      while lo < hi:
          mid = (lo + hi) // 2
          if counts[mid] >= goal:
              hi = mid
          else:
              lo = mid + 1
      return lo if lo < len(counts) else -1
hints:
  - level: 1
    text: The counts never decrease, so once the goal is met it stays met.
  - level: 2
    text: That sorted structure means you can binary search instead of scanning every day.
  - level: 3
    text: Search for the leftmost index where count is at least goal; if it lands past the last day, return -1.
