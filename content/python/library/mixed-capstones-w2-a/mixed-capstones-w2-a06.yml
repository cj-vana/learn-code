      return 0
function_name: best_pair_within_budget
input_mode: function
solution_sketch: With one pointer at each end of the sorted prices, record affordable pair sums and move inward to seek a larger valid total.
sample_solution: |
  def best_pair_within_budget(data):
      prices = data["prices"]
      budget = data["budget"]
      lo = 0
      hi = len(prices) - 1
      best = 0
      while lo < hi:
          total = prices[lo] + prices[hi]
          if total <= budget:
              if total > best:
                  best = total
              lo += 1
          else:
              hi -= 1
      return best
hints:
  - level: 1
    text: The prices are sorted, so start with the cheapest and most expensive items.
  - level: 2
    text: If a pair fits the budget, try to raise the total by moving the low pointer up; if it overshoots, move the high pointer down.
  - level: 3
    text: Track the best affordable total seen, and stop when the two pointers meet.
