explanation_markdown: |
  Two pointers exploit the sorted order: pairing the current cheapest and most
  expensive items gives an immediate read on whether the total is affordable.
  When it fits, only a larger cheap item can improve the total, so `lo` moves up;
  when it overshoots, the priciest item is too expensive for any remaining
  partner, so `hi` moves down. The scan is O(n) and never needs to check every
  pair.
common_mistakes:
  - Comparing every possible pair, which is O(n^2) instead of a single O(n) sweep.
  - Returning the first affordable pair rather than the largest affordable total.
  - Forgetting the 0 result when there are fewer than two items or nothing fits.
