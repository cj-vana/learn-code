prompt_markdown: |
  A gift shop lists its item prices in a sorted list `prices` (ascending). A
  shopper wants to buy exactly two different items and spend as much as possible
  without going over their budget. Write `best_pair_within_budget(data)` where
  `data` is a dict with `prices` and an integer `budget`. Return the largest
  combined price of two distinct items that does not exceed `budget`. If no pair
  fits (or there are fewer than two items), return 0.
starter_code: |
