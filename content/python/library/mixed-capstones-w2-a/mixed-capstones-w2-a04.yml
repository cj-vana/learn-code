explanation_markdown: |
  Building a prefix-sum array where `prefix[i]` holds the total of the first `i`
  days costs one O(n) pass. After that, any inclusive range `start..end` is
  answered in O(1) as `prefix[end + 1] - prefix[start]`, so q queries cost
  O(n + q) overall instead of O(n * q). The leading zero in the prefix array
  makes the day-0 case fall out without a special branch.
common_mistakes:
  - Using prefix[end] - prefix[start], which drops the last day of an inclusive range.
  - Recomputing each range with a fresh loop, giving O(n * q) work.
  - Forgetting the leading 0 that lets ranges starting at day 0 work cleanly.
