prompt_markdown: |
  A weather station records daily rainfall in millimetres across a season. Write
  `rainfall_totals(data)` where `data` is a dict with `rainfall` (a list of
  non-negative integers, day 0 first) and `queries` (a list of `[start, end]`
  pairs of 0-based day indices). For each query return the total rainfall from
  day `start` through day `end`, inclusive. Return the list of totals in the same
  order as the queries. No queries returns an empty list.
starter_code: |
  def rainfall_totals(data):
      return []
function_name: rainfall_totals
input_mode: function
solution_sketch: Build a prefix-sum array once, then answer each inclusive range in O(1) as prefix[end + 1] - prefix[start].
sample_solution: |
  def rainfall_totals(data):
      rainfall = data["rainfall"]
      queries = data["queries"]
      prefix = [0]
      for value in rainfall:
          prefix.append(prefix[-1] + value)
      totals = []
      for start, end in queries:
          totals.append(prefix[end + 1] - prefix[start])
      return totals
