explanation_markdown: |
  With non-negative values, extending the window on the right only raises the
  total and shrinking from the left only lowers it, so a variable-size sliding
  window finds every shortest qualifying run in O(n). Each hour enters once and
  leaves at most once. Starting `best` above the maximum possible length lets the
  "no run reaches the target" case return 0 cleanly.
common_mistakes:
  - Only shrinking once per step instead of while the total still meets the target.
  - Assuming a fixed window size when the answer's length varies.
  - Returning a large sentinel instead of 0 when the target is never reached.
