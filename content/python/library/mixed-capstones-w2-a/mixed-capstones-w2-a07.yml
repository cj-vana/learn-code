      return 0
function_name: shortest_busy_stretch
input_mode: function
solution_sketch: Grow a window on the right adding sales, and while the total meets the target, record the length and shrink from the left.
sample_solution: |
  def shortest_busy_stretch(data):
      sales = data["sales"]
      target = data["target"]
      n = len(sales)
      best = n + 1
      total = 0
      left = 0
      for right in range(n):
          total += sales[right]
          while total >= target:
              length = right - left + 1
              if length < best:
                  best = length
              total -= sales[left]
              left += 1
      return best if best <= n else 0
hints:
  - level: 1
    text: You are looking for the smallest number of consecutive hours whose sales sum reaches the target.
  - level: 2
    text: Because sales are non-negative, a window can expand on the right and contract on the left without missing shorter answers.
  - level: 3
    text: While the window's total meets the target, record its length and drop the leftmost hour to try to shrink it further.
