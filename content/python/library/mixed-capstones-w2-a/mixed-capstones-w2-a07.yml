prompt_markdown: |
  A cafe logs how many cups it sells each hour of a shift as a list `sales` of
  non-negative integers. Write `shortest_busy_stretch(data)` where `data` is a
  dict with `sales` and an integer `target`. Return the length of the shortest
  contiguous run of hours whose combined sales reach `target` or more. If no run
  reaches the target, return 0.
starter_code: |
