explanation_markdown: |
  Counting with a dictionary gives O(1) updates, so a single pass builds the
  tally in O(n). Filtering the items to those with a count of at least two, then
  sorting, gives the repeated barcodes in a predictable order regardless of the
  order they were scanned.
common_mistakes:
  - Returning barcodes with a count of exactly one instead of two or more.
  - Forgetting to sort, so the result order depends on scan order.
  - Listing a repeated barcode more than once instead of a single distinct entry.
