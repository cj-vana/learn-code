prompt_markdown: |
  A warehouse scanner records the barcode of every crate that passes the belt.
  Write `scanned_twice(barcodes)` where `barcodes` is a list of barcode strings.
  Return a sorted list of the distinct barcodes that were scanned two or more
  times. Barcodes scanned exactly once are left out. An empty list returns an
  empty list.
starter_code: |
  def scanned_twice(barcodes):
      return []
function_name: scanned_twice
input_mode: function
solution_sketch: Count each barcode in a dict, then return the sorted keys whose count is at least two.
sample_solution: |
  def scanned_twice(barcodes):
      counts = {}
      for code in barcodes:
          counts[code] = counts.get(code, 0) + 1
      return sorted(code for code, total in counts.items() if total >= 2)
hints:
  - level: 1
    text: First find out how many times each barcode appears.
  - level: 2
    text: A dictionary mapping barcode to count lets you check repeats in one pass.
  - level: 3
    text: Keep only the keys whose count is 2 or more, then wrap them in sorted().
tests:
