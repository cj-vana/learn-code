explanation_markdown: |
  Round-robin scheduling is a queue in action: the front job is always served
  next, and an unfinished job goes to the very back so it waits behind everyone
  else before its next pass. Because each cycle through the queue gives every
  remaining job exactly one pass, a job needing fewer passes finishes in an
  earlier cycle, and jobs that need the same number of passes finish in their
  original relative order (the queue never reorders equals). Carrying the
  remaining pass count with each id lets one FIFO loop produce the finishing
  order directly.
common_mistakes:
  - Serving from the back or re-inserting at the front, which breaks the fair round-robin order.
  - Recording a job as finished on every pass instead of only when its remaining passes hit zero.
  - Mutating the input dicts' passes in place instead of tracking the count in the queue.
