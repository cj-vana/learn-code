prompt_markdown: |
  A small print shop runs its jobs **round-robin**: it takes the job at the front
  of the queue, runs exactly one printing pass on it, and then, if that job still
  needs more passes, sends it to the **back** of the queue. It repeats until every
  job is done.

  Write `finish_order(jobs)` where `jobs` is a list of dicts, each shaped like
  `{"id": <name>, "passes": <count>}`. The list is the starting queue order (front
  first) and every `passes` count is at least `1`. Return the list of job ids in
  the order the jobs **finish** their last pass. An empty queue returns an empty
  list.
starter_code: |
