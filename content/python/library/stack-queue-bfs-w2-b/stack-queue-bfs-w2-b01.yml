      return []
function_name: finish_order
input_mode: function
solution_sketch: Load the jobs into a queue and repeatedly serve the front for one pass, re-enqueueing it at the back until its passes reach zero, recording ids as they finish.
sample_solution: |
  from collections import deque

  def finish_order(jobs):
      queue = deque((job["id"], job["passes"]) for job in jobs)
      finished = []
      while queue:
          job_id, passes = queue.popleft()
          passes -= 1
          if passes > 0:
              queue.append((job_id, passes))
          else:
              finished.append(job_id)
      return finished
hints:
  - level: 1
    text: Serve jobs strictly from the front and send unfinished ones to the back, so every job waits its turn before getting another pass.
  - level: 2
    text: A queue (collections.deque with popleft and append) models the round-robin order; carry each job's remaining passes alongside its id.
  - level: 3
    text: Pop the front job, subtract one pass, re-append it if passes are still above zero, and record its id only when passes reach zero.
