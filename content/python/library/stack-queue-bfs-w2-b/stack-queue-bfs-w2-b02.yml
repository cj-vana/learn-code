prompt_markdown: |
  A long shelf holds a row of book piles, given left to right as a list of
  integer heights. For each pile you want to know the height of the **nearest
  pile to its left that is strictly shorter** than it.

  Write `nearest_shorter_left(heights)` returning a list the same length as
  `heights`, where position `i` holds the height of the closest strictly-shorter
  pile somewhere to the left of pile `i`. If no pile to the left is shorter (or
  there is nothing to the left at all), use `0` for that position. An empty shelf
  returns an empty list.
starter_code: |
  def nearest_shorter_left(heights):
      return []
function_name: nearest_shorter_left
input_mode: function
solution_sketch: Sweep left to right keeping a stack of candidate heights that is increasing from bottom to top, popping any that are not shorter than the current pile before reading the answer.
sample_solution: |
  def nearest_shorter_left(heights):
      result = []
      stack = []
      for height in heights:
          while stack and stack[-1] >= height:
              stack.pop()
          result.append(stack[-1] if stack else 0)
          stack.append(height)
      return result
hints:
  - level: 1
    text: The answer for a pile can only be a shorter pile that appears earlier, so scan left to right and keep the earlier piles that might still matter.
  - level: 2
    text: Maintain a stack whose heights increase from bottom to top; before handling a new pile, discard tops that are not strictly shorter than it.
  - level: 3
    text: After popping every stack top that is greater than or equal to the current height, the remaining top (if any) is the nearest shorter pile; then push the current height for later piles.
