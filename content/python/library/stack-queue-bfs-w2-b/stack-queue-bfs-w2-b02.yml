explanation_markdown: |
  This is the classic "previous smaller element" pattern solved with a monotonic
  stack. The stack holds heights of earlier piles that are still candidates,
  arranged so they strictly increase from bottom to top. When a new pile arrives,
  any stack top that is greater than or equal to it can never be the nearest
  shorter pile for this pile or for any later one, so those tops are popped. The
  height left on top is exactly the nearest strictly-shorter pile to the left, or
  the stack is empty and the answer is `0`. Each height is pushed and popped at
  most once, so the whole sweep runs in O(n) time.
common_mistakes:
  - Popping while the top is strictly greater rather than greater-or-equal, which lets an equal-height pile count as shorter.
  - Rescanning all earlier piles for each position, giving O(n^2) work instead of one monotonic-stack pass.
  - Recording the index of the shorter pile instead of its height, or forgetting the 0 default when the stack is empty.
