prompt_markdown: |
  BM25 is the ranking function behind most keyword search engines. Given a query
  and one document, it produces a relevance score that rewards matching terms,
  discounts common ones, and penalises documents that are merely long. You will
  compute it for a single document from a kelp-forest dive log.

  Write `bm25_score(job)` where `job` is a single dict:

  ```
  {
    "query": ["otter", "kelp"],
    "doc": ["otter", "otter", "kelp", "crab"],
    "df": {"otter": 1, "kelp": 2, "crab": 3},
    "N": 3,
    "avgdl": 4.0,
    "k1": 1.5,
    "b": 0.75
  }
  ```

  where `df` maps a term to its corpus document frequency, `N` is the total number
  of documents in the corpus, `avgdl` is the average document length, and `k1`,
  `b` are tuning constants.

  Let `dl = len(doc)` be this document's length. For each **distinct** term `t` in
  the query, let `f` be the number of times `t` occurs in `doc` and `df_t` be
  `df.get(t, 0)` (treat a term missing from `df` as `0`). Its contribution is

  ```
  idf(t)  = ln( 1 + (N - df_t + 0.5) / (df_t + 0.5) )
  score(t) = idf(t) * ( f * (k1 + 1) ) / ( f + k1 * (1 - b + b * dl / avgdl) )
  ```

  The BM25 score is the sum of `score(t)` over the distinct query terms. A query
  term that never appears in the document has `f = 0`, so its contribution is `0`.
  Return the total **rounded to 4 decimal places** with `round(value, 4)`.

  For the example the total works out to `1.8712`.
