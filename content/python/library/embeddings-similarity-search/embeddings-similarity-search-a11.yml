solution_sketch: Count the document's term frequencies, compute the length-normalisation factor once, then sum the BM25 idf-weighted saturation term over the distinct query terms and round to 4 places.
sample_solution: |
  import math
  from collections import Counter


  def bm25_score(job):
      query = job["query"]
      doc = job["doc"]
      df = job["df"]
      n = job["N"]
      avgdl = job["avgdl"]
      k1 = job["k1"]
      b = job["b"]
      dl = len(doc)
      tf = Counter(doc)
      score = 0.0
      for term in dict.fromkeys(query):
          f = tf.get(term, 0)
          df_t = df.get(term, 0)
          idf = math.log(1 + (n - df_t + 0.5) / (df_t + 0.5))
          denom = f + k1 * (1 - b + b * dl / avgdl)
          score += idf * (f * (k1 + 1)) / denom
      return round(score, 4)
hints:
  - level: 1
    text: Count how many times each word appears in the document once up front, then look up f for each query term. The length factor k1 * (1 - b + b * dl / avgdl) does not depend on the term, so you can reuse it.
  - level: 2
    text: Iterate over the distinct query terms so a word repeated in the query is not counted twice. dict.fromkeys(query) preserves order while removing duplicates.
  - level: 3
    text: For each distinct term compute idf = math.log(1 + (N - df_t + 0.5) / (df_t + 0.5)) with df_t = df.get(term, 0), then add idf * (f * (k1 + 1)) / (f + k1 * (1 - b + b * dl / avgdl)) to a running total; a missing term has f = 0 and adds nothing. Round the sum to 4 places.
