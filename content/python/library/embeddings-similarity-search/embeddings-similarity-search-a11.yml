explanation_markdown: |
  BM25 has three moving parts. The IDF factor `ln(1 + (N - df + 0.5) / (df + 0.5))`
  down-weights terms that appear in many documents; the `+1` inside the log keeps
  it from going negative for very common terms. The numerator `f * (k1 + 1)` grows
  with in-document frequency but the `f` in the denominator makes it **saturate**,
  so the tenth occurrence of a word adds far less than the second. The factor
  `1 - b + b * dl / avgdl` is length normalisation: with `b = 0.75` a document
  longer than average is penalised, and with `b = 0` length is ignored entirely.

  Iterating over the distinct query terms keeps a repeated query word from being
  double-counted, and defaulting `df` to `0` lets a brand-new term still receive
  the maximum IDF instead of raising a `KeyError`.
common_mistakes:
  - Summing over every query token including duplicates instead of the distinct terms.
  - Dropping the plus-one inside the logarithm, which is the difference between the modern non-negative IDF and the older form that can go negative.
  - Recomputing or misplacing the length factor so that b, dl, and avgdl end up in the numerator instead of the denominator.
