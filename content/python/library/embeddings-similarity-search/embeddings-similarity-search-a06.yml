prompt_markdown: |
  Retrieval usually returns a ranked shortlist, not just the single best match.
  Score every corpus vector against the query with cosine similarity:

      cos(a, b) = (a . b) / (|a| * |b|)

  where `a . b` is the dot product and `|a|`, `|b|` are the vector magnitudes.
  **Round each score to 4 decimal places**, then sort the results from highest
  score to lowest, breaking ties by lower index.

  A recommender ranks tea blends by how close they sit to a query blend. Write
  `top_k(job)` where `job` is a dictionary shaped like
  `{"query": [1, 0], "corpus": [[1, 0], [0, 1], [1, 1]], "k": 2}`. Return a list
  of `[index, score]` pairs for the top `k` matches in ranked order, where each
  `score` is that corpus vector's cosine similarity rounded to 4 decimal places.
  If `k` is 0 return an empty list; if `k` is larger than the number of corpus
  vectors, return all of them ranked. Assume the query and every corpus vector
  are non-zero.
