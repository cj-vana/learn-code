explanation_markdown: |
  The pattern is score, rank, truncate. Keeping the index next to each score is
  what lets you return positions after sorting scrambles the original order.
  Sorting on the tuple `(-score, index)` sorts by score descending while still
  breaking ties on the smaller index, because Python compares tuples
  element-by-element. Rounding the scores before sorting means equal displayed
  values also tie in the ordering, so the tie-break is on index alone. Slicing
  with `scored[:k]` transparently handles both edge cases: `k` of 0 yields an
  empty list, and a `k` past the end simply returns everything.
common_mistakes:
  - Sorting by score ascending, or forgetting the index tie-break so equal scores come out in an unpredictable order.
  - Losing the original index by sorting the corpus itself instead of (index, score) pairs.
  - Special-casing k when it exceeds the corpus length instead of letting a plain slice handle it, and mishandling k == 0.
