function_name: top_k
input_mode: function
solution_sketch: Build [index, rounded_score] pairs for every corpus vector, sort by score descending then index ascending, and slice the first k pairs.
sample_solution: |
  import math


  def top_k(job):
      query = job["query"]
      corpus = job["corpus"]
      k = job["k"]

      def cosine(a, b):
          dot = sum(x * y for x, y in zip(a, b))
          mag_a = math.sqrt(sum(x * x for x in a))
          mag_b = math.sqrt(sum(y * y for y in b))
          return dot / (mag_a * mag_b)

      scored = [[i, round(cosine(query, vec), 4)] for i, vec in enumerate(corpus)]
      scored.sort(key=lambda pair: (-pair[1], pair[0]))
      return scored[:k]
