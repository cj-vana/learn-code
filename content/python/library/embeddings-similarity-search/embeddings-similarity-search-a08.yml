explanation_markdown: |
  Term frequency answers "how much of this document is about each word?" Dividing
  the raw count by the token total makes short and long documents comparable: a
  word that fills half a two-word note and half a hundred-word essay both score
  0.5. On its own, term frequency over-rewards common filler words, which is why
  the next step pairs it with an inverse-document-frequency weight to build a full
  TF-IDF vector.

  Rounding matters because these floats are later compared for equality. Values
  like `1 / 3` are non-terminating in binary, so `round(count / n, 6)` pins each
  entry to a fixed, reproducible number.
common_mistakes:
  - Returning raw counts instead of dividing by the total token count, which is not a frequency.
  - Dividing by the number of distinct words rather than the total number of tokens.
  - Skipping the empty-input guard and hitting a ZeroDivisionError on len(tokens) == 0.
