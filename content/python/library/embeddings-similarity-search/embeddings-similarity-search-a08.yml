prompt_markdown: |
  A sparse text vector starts with **term frequency**: how often each word occurs,
  divided by how many words there are in total. Here the words are the tasting
  notes scribbled on a tea-blend card.

  Write `term_frequency(tokens)` that takes a list of word strings and returns a
  dict mapping each distinct word to its relative frequency

  ```
  tf(term) = count(term) / len(tokens)
  ```

  **rounded to 6 decimal places** with `round(value, 6)`.

  For example, `["chai", "chai", "mint"]` has three tokens, so `chai` appears
  `2 / 3 = 0.666667` of the time and `mint` appears `1 / 3 = 0.333333`, giving
  `{"chai": 0.666667, "mint": 0.333333}`.

  If `tokens` is empty, return an empty dict `{}` (there is no total to divide by).
starter_code: |
  def term_frequency(tokens):
      return {}
function_name: term_frequency
input_mode: function
solution_sketch: Count occurrences of each token (e.g. with collections.Counter), then divide every count by the total token length and round to 6 decimals.
sample_solution: |
  from collections import Counter


  def term_frequency(tokens):
      n = len(tokens)
      if n == 0:
          return {}
      counts = Counter(tokens)
      return {term: round(count / n, 6) for term, count in counts.items()}
hints:
  - level: 1
    text: First tally how many times each word appears. collections.Counter does this in one call, or you can build the tally with a plain dict.
  - level: 2
    text: Capture the total number of tokens once before dividing, because you reuse it for every term.
  - level: 3
    text: Return a dict comprehension mapping each term to round(count / len(tokens), 6), and handle the empty input by returning {} to avoid dividing by zero.
