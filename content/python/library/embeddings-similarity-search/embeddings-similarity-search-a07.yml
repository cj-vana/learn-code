prompt_markdown: |
  Before you can embed a long document, you split it into overlapping **chunks**
  so that ideas straddling a boundary still land inside at least one chunk. Here
  the "document" is already tokenised into a list of words from a reef survey log.

  Write `chunk_text(job)` where `job` is a single dict:

  ```
  {"words": ["urchin", "kelp", "otter", "crab", "eel"], "size": 3, "overlap": 1}
  ```

  - `size` is the number of words per chunk.
  - `overlap` is how many words a chunk shares with the one before it.
  - The **step** between chunk starts is `step = size - overlap`.

  Produce chunks that start at positions `0, step, 2*step, ...`. Each chunk is the
  slice `words[i:i + size]`. **Stop after the first chunk that reaches or passes
  the end of the list** (that is, once `i + size >= len(words)`), and include that
  final chunk even if it is shorter than `size`.

  Return a list of chunks, where each chunk is itself a list of words.

  Guards: if `words` is empty, if `size <= 0`, or if `overlap` is **not** strictly
  less than `size` (which would make `step <= 0` and never terminate), return an
  empty list `[]`.

  Example: with the input above, `step = 2`, so you take `words[0:3]` =
  `["urchin", "kelp", "otter"]`, then `words[2:5]` = `["otter", "crab", "eel"]`,
  which reaches the end, giving
  `[["urchin", "kelp", "otter"], ["otter", "crab", "eel"]]`.
