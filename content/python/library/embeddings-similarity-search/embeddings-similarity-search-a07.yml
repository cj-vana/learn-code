explanation_markdown: |
  Overlapping chunking is the standard first stage of a retrieval pipeline: each
  chunk becomes one embedded vector, and the overlap keeps a sentence that spans a
  boundary retrievable from either side. The whole trick is the step size
  `size - overlap`. A larger overlap means a smaller step, more chunks, and more
  redundancy; an overlap of zero gives disjoint windows.

  The stopping rule (`break` once `i + size >= len(words)`) matters: without it you
  would keep advancing and emit extra tail chunks that repeat words already
  covered. Guarding `overlap >= size` is essential too, because then
  `step <= 0` and the start index would never move, looping forever.
common_mistakes:
  - Forgetting the guard when overlap is greater than or equal to size, which makes step zero or negative and loops forever.
  - Continuing to add chunks after the window already reached the end, producing redundant trailing chunks.
  - Dropping the final partial chunk because it is shorter than size, losing the last words of the document.
