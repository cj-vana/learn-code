solution_sketch: Guard invalid configs, then walk a start index by step = size - overlap, appending words[i:i+size] each time and breaking once i + size reaches the end.
sample_solution: |
  def chunk_text(job):
      words = job["words"]
      size = job["size"]
      overlap = job["overlap"]
      if not words or size <= 0 or overlap >= size:
          return []
      step = size - overlap
      chunks = []
      i = 0
      n = len(words)
      while i < n:
          chunks.append(words[i:i + size])
          if i + size >= n:
              break
          i += step
      return chunks
hints:
  - level: 1
    text: The distance between the start of one chunk and the start of the next is size minus overlap. Compute that step first, then move a start index forward by it.
  - level: 2
    text: Slicing past the end of a list is safe in Python, so words[i:i+size] automatically returns a short final chunk. You only need to decide when to stop.
  - level: 3
    text: Append words[i:i+size], then break out of the loop when i + size >= len(words); otherwise add step to i and continue. Return [] up front when words is empty, size <= 0, or overlap >= size.
