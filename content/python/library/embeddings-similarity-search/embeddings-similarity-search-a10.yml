prompt_markdown: |
  Now combine the two halves. A **TF-IDF vector** turns one document into a fixed
  list of numbers, one slot per vocabulary term, so documents can be compared by
  their coordinates. Here the document is a list of tokens from a trail journal.

  Write `tfidf_vector(job)` where `job` is a single dict:

  ```
  {
    "doc": ["fern", "fern", "moss"],
    "idf": {"fern": 0.0, "moss": 0.693147, "lichen": 1.386294},
    "vocab": ["fern", "moss", "lichen"]
  }
  ```

  Return a list of numbers, one per term in `vocab` **in that exact order**. For a
  term `t`:

  - Its term frequency is `tf(t) = count(t in doc) / len(doc)`.
  - Its component is `tf(t) * idf[t]`, **rounded to 6 decimal places** with
    `round(value, 6)`.
  - If `t` is **not a key in `idf`**, its component is `0.0` (an unweighted,
    out-of-corpus term).
  - If `doc` is empty, every component is `0.0`.

  For the example, `doc` has 3 tokens. `fern` has `tf = 2/3` but `idf = 0.0`, so its
  component is `0.0`. `moss` has `tf = 1/3` and `idf = 0.693147`, giving
  `0.231049`. `lichen` is absent from `doc`, so `tf = 0` and its component is `0.0`.
  The result is `[0.0, 0.231049, 0.0]`.
