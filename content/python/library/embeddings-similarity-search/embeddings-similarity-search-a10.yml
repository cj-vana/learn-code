function_name: tfidf_vector
input_mode: function
solution_sketch: Count the document's tokens, then walk vocab in order emitting round(count/len(doc) * idf[term], 6), or 0.0 when the doc is empty or the term is missing from the idf table.
sample_solution: |
  from collections import Counter


  def tfidf_vector(job):
      doc = job["doc"]
      idf = job["idf"]
      vocab = job["vocab"]
      n = len(doc)
      counts = Counter(doc)
      vector = []
      for term in vocab:
          if n == 0 or term not in idf:
              vector.append(0.0)
          else:
              tf = counts.get(term, 0) / n
              vector.append(round(tf * idf[term], 6))
      return vector
hints:
  - level: 1
    text: The output length always equals len(vocab), and the order of the output must follow vocab, not the order words appear in the document.
  - level: 2
    text: Precount the document's tokens once so each term lookup is a dictionary read; a term missing from the document simply has count 0.
  - level: 3
    text: For each vocab term, emit 0.0 when the document is empty or the term is not a key in idf; otherwise append round(counts.get(term, 0) / len(doc) * idf[term], 6).
