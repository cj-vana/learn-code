explanation_markdown: |
  Fixing the coordinate order with `vocab` is what makes two TF-IDF vectors
  comparable: slot 0 always means the same term in every document, so a dot product
  or cosine similarity between documents lines up term-for-term. That shared
  coordinate system is the whole reason sparse retrieval works.

  The two escape hatches encode real modelling choices. A term absent from `idf` is
  outside the fitted corpus vocabulary, so it earns no weight (`0.0`) rather than
  crashing the lookup. An empty document has no meaningful frequencies, so it maps
  to the zero vector. Everything else is `tf * idf`, rounded so the floats compare
  cleanly.
common_mistakes:
  - Emitting the vector in the document's word order instead of the fixed vocab order.
  - Letting a term that is missing from the idf table raise a KeyError instead of contributing 0.0.
  - Rounding the term frequency and the idf separately in a way that drifts from rounding the final product once.
