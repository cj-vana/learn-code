function_name: cosine_similarity
input_mode: function
solution_sketch: Compute both magnitudes first; if either is 0 return None, otherwise divide the dot product by the product of magnitudes and round to 6 places.
sample_solution: |
  import math


  def cosine_similarity(job):
      a = job["a"]
      b = job["b"]
      mag_a = math.sqrt(sum(x * x for x in a))
      mag_b = math.sqrt(sum(y * y for y in b))
      if mag_a == 0 or mag_b == 0:
          return None
      dot = sum(x * y for x, y in zip(a, b))
      return round(dot / (mag_a * mag_b), 6)
hints:
