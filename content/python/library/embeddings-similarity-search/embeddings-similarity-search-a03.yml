prompt_markdown: |
  A raw dot product grows whenever the vectors are large, which makes it a poor
  judge of *direction*. **Cosine similarity** fixes this by dividing the dot
  product by both magnitudes, so it measures only the angle between two vectors
  and always lands between -1 and 1:

      cos(a, b) = (a . b) / (|a| * |b|)

  Here `a . b = a0*b0 + ... + a(n-1)*b(n-1)` is the dot product and
  `|a| = sqrt(a0^2 + ... + a(n-1)^2)` is the magnitude. A score of 1 means the
  vectors point the same way, 0 means they are perpendicular, and -1 means they
  point in opposite directions.

  Each telescope observation records a star as a short light-spectrum vector.
  Write `cosine_similarity(job)` where `job` is a dictionary with two vectors
  under keys `"a"` and `"b"`, for example `{"a": [1, 2, 3], "b": [1, 2, 3]}`.
  Return their cosine similarity rounded to 6 decimal places. If either vector
  is all zeros its magnitude is 0 and the angle is undefined, so return `None`.
