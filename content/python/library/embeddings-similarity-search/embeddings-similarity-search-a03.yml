explanation_markdown: |
  Dividing by both magnitudes cancels out how *long* each vector is and leaves
  only how they are *oriented*, which is why a vector and any positive scaling
  of it (like [2, 4] and [1, 2]) score exactly 1.0. That scale-invariance is
  the whole reason cosine similarity dominates text and image retrieval: two
  documents about the same topic should match even if one is much longer. The
  zero-vector guard matters because a vector with no length has no direction, so
  the ratio would divide by zero; returning None signals "undefined" cleanly.
common_mistakes:
  - Dividing by only one magnitude, or by their sum instead of their product.
  - Computing the magnitudes after the zero check, so an all-zero vector still triggers a division by zero.
  - Forgetting that opposite-pointing vectors give -1, and clamping or taking an absolute value that hides it.
