explanation_markdown: |
  The dot product multiplies each pair of matching components and adds the
  results, so it grows when two vectors are large and point the same way, and
  shrinks (even going negative) when they disagree. It is the workhorse behind
  almost every similarity score you will meet later. Using zip keeps the two
  lists aligned by position, and summing a generator expression avoids building
  an intermediate list. Rounding to 6 places keeps floating-point noise from
  leaking into the answer.
common_mistakes:
  - Adding the components (a0 + b0 + ...) instead of multiplying matching pairs and then summing.
  - Looping over a single index range but forgetting one of the vectors, so only one list is used.
  - Returning the raw float without rounding, which can differ from the expected value in its last digits.
