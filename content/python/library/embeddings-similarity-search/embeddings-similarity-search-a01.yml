prompt_markdown: |
  An embedding turns something (a word, a song, a cup of tea) into a list of
  numbers so a computer can compare items with plain arithmetic. The most basic
  comparison is the **dot product**. For two vectors
  `a = [a0, a1, ..., a(n-1)]` and `b = [b0, b1, ..., b(n-1)]` of the same
  length, it is the sum of the products of matching components:

      a . b = a0*b0 + a1*b1 + ... + a(n-1)*b(n-1)

  A tea shop describes each blend by how strongly it registers on a few taste
  probes (floral, malty, smoky). Write `dot(job)` that takes a single
  dictionary holding two equal-length vectors under the keys `"a"` and `"b"`,
  for example `{"a": [1, 2, 3], "b": [4, 5, 6]}`, and returns their dot product
  rounded to 6 decimal places. Both vectors have the same length; an empty pair
  sums to 0.
starter_code: |
  def dot(job):
      return 0.0
function_name: dot
input_mode: function
solution_sketch: Pair up matching components with zip, multiply each pair, sum the products, and round to 6 places.
sample_solution: |
  def dot(job):
      a = job["a"]
      b = job["b"]
      total = sum(x * y for x, y in zip(a, b))
      return round(total, 6)
hints:
  - level: 1
    text: Pull the two vectors out of the dictionary with job["a"] and job["b"], then walk both lists together.
  - level: 2
    text: zip(a, b) hands you matching pairs; multiply each pair and add the results into a running total.
  - level: 3
    text: sum(x * y for x, y in zip(a, b)) gives the dot product in one line; wrap it in round(total, 6) before returning.
