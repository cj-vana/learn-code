prompt_markdown: |
  Common words appear in almost every document and tell you little; rare words are
  the ones that make a document distinctive. **Inverse document frequency (IDF)**
  turns that intuition into a weight. Here each "document" is a list of species
  tokens from one entry of a field guide.

  Write `idf(job)` where `job` is a single dict:

  ```
  {"docs": [["fern", "moss"], ["fern", "lichen"]]}
  ```

  Let `N` be the number of documents. For each term, let `df(term)` be its
  **document frequency**: the number of documents that contain the term **at least
  once** (repeats inside one document count only once). Return a dict mapping every
  term that appears anywhere to

  ```
  idf(term) = ln(N / df(term))
  ```

  where `ln` is the natural logarithm (`math.log`), **rounded to 6 decimal places**
  with `round(value, 6)`.

  In the example, `N = 2`. `fern` is in both documents, so `df = 2` and
  `idf = ln(2 / 2) = 0.0`. `moss` and `lichen` each appear in one document, so
  `idf = ln(2 / 1) = 0.693147`. The result is
  `{"fern": 0.0, "moss": 0.693147, "lichen": 0.693147}`.

  If `docs` is empty, return an empty dict `{}`.
