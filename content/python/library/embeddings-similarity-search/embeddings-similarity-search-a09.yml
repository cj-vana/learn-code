function_name: idf
input_mode: function
solution_sketch: Count, for each term, how many documents contain it by iterating over the set of each document, then map each term to round(math.log(N / df), 6).
sample_solution: |
  import math
  from collections import Counter


  def idf(job):
      docs = job["docs"]
      n = len(docs)
      if n == 0:
          return {}
      df = Counter()
      for doc in docs:
          for term in set(doc):
              df[term] += 1
      return {term: round(math.log(n / df[term]), 6) for term in df}
hints:
