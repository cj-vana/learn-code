explanation_markdown: |
  IDF is the counterweight to term frequency. A word in every document scores
  `ln(N / N) = 0`, so it contributes nothing to a document's identity, while a word
  in a single document out of many scores highest. Multiplying a term's frequency
  by its IDF (the next exercise) yields TF-IDF, the classic sparse retrieval
  weighting.

  The subtle part is that document frequency counts **documents, not tokens**.
  Wrapping each document in `set(doc)` before tallying guarantees that a species
  named three times in one entry still only proves that entry contains it once.
common_mistakes:
  - Counting total occurrences of a term instead of the number of documents it appears in.
  - Forgetting to deduplicate within a document, so repeated words inflate the document frequency.
  - Using log base 10 or log base 2 instead of the natural logarithm math.log expects by default.
