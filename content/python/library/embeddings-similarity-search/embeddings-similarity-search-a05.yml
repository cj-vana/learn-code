prompt_markdown: |
  A retrieval system answers "which stored item is most like my query?" by
  scoring every stored vector against the query and keeping the best match. The
  score is cosine similarity:

      cos(a, b) = (a . b) / (|a| * |b|)

  where `a . b` is the dot product `a0*b0 + ... + a(n-1)*b(n-1)` and `|a|` and
  `|b|` are the vector magnitudes (sqrt of the sum of squares).

  A birdsong archive stores each recording as a short vector. Write
  `most_similar(job)` where `job` is a dictionary shaped like
  `{"query": [1, 0], "corpus": [[0, 1], [1, 0], [1, 1]]}`. Return the **index**
  of the corpus vector with the highest cosine similarity to `query`. If two
  vectors tie for the highest score, return the lower index. Assume `corpus`
  has at least one vector, and that the query and every corpus vector are
  non-zero.
