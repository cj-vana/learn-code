function_name: most_similar
input_mode: function
solution_sketch: Score each corpus vector against the query with cosine similarity; track the best score and its index, replacing only on a strictly higher score so ties keep the lower index.
sample_solution: |
  import math


  def most_similar(job):
      query = job["query"]
      corpus = job["corpus"]

      def cosine(a, b):
          dot = sum(x * y for x, y in zip(a, b))
          mag_a = math.sqrt(sum(x * x for x in a))
          mag_b = math.sqrt(sum(y * y for y in b))
          return dot / (mag_a * mag_b)

      best_index = 0
      best_score = cosine(query, corpus[0])
      for i in range(1, len(corpus)):
          score = cosine(query, corpus[i])
          if score > best_score:
              best_score = score
              best_index = i
      return best_index
hints:
  - level: 1
    text: Compare the query against every corpus vector one at a time and remember which comparison scored highest.
  - level: 2
    text: A small cosine(a, b) helper keeps the loop readable; start best_index at 0 using the first vector's score.
  - level: 3
    text: Update the best only when a later score is strictly greater (use >, not >=), so an equal score never displaces the lower index.
