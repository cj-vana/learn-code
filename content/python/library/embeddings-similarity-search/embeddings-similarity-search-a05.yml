explanation_markdown: |
  This is nearest-neighbour search in miniature: score the query against the
  whole corpus and keep the arg-max. Because cosine similarity ignores length,
  a corpus vector that merely points the same way as the query (like [2, 2] for
  query [1, 1]) already scores the maximum of 1, which is why the tie case
  resolves to the earliest such vector. Updating only on a strictly greater
  score is the standard way to make ties deterministic without a separate
  check. Real systems use an index to avoid scanning every vector, but the
  scoring rule is exactly this.
common_mistakes:
  - Using >= when updating the best, which lets a later tie overwrite the lower index the prompt asks for.
  - Returning the best score or the best vector itself instead of its index.
  - Seeding best_score with 0 or negative infinity incorrectly, then mishandling the all-negative-score case.
