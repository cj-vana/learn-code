prompt_markdown: |
  **Normalizing** a vector rescales it to length 1 while keeping its direction.
  Retrieval systems store normalized vectors so that later comparisons depend
  only on direction, never on size. To normalize, divide every component by the
  vector's magnitude:

      unit(v) = [v0/|v|, v1/|v|, ..., v(n-1)/|v|]

  where `|v| = sqrt(v0^2 + v1^2 + ... + v(n-1)^2)`.

  Each chili blend on a spice rack is a vector of heat, sweetness, and
  earthiness scores. Write `normalize(v)` that takes one such list and returns
  its unit vector, with every component rounded to 6 decimal places. If the
  vector is all zeros its magnitude is 0 and it has no direction, so return
  `None`.
starter_code: |
