  def normalize(v):
      return None
function_name: normalize
input_mode: function
solution_sketch: Compute the magnitude; if it is 0 return None, otherwise divide each component by the magnitude and round each result to 6 places.
sample_solution: |
  import math


  def normalize(v):
      mag = math.sqrt(sum(x * x for x in v))
      if mag == 0:
          return None
      return [round(x / mag, 6) for x in v]
hints:
  - level: 1
