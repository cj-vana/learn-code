explanation_markdown: |
  Dividing by the magnitude guarantees the result has length 1: if you fed the
  output back into a magnitude function you would get 1.0 (up to rounding).
  Because only the shared scale factor changes, the direction is untouched, so
  [3, 4] and any positive multiple of it normalize to the same [0.6, 0.8]. Once
  vectors are normalized, cosine similarity reduces to a plain dot product,
  which is why search indexes normalize everything up front. Compute the
  magnitude once and reuse it rather than recomputing it inside the loop, and
  round each component independently.
common_mistakes:
  - Dividing by the sum of the components or by the number of components instead of the magnitude.
  - Rounding the magnitude first and dividing by the rounded value, which drifts away from true length 1.
  - Returning the original vector unchanged when the magnitude is 0 instead of returning None.
