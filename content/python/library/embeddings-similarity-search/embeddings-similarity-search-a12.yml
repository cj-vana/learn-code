explanation_markdown: |
  Softmax is the standard bridge from scores to probabilities, whether the scores
  are retrieval similarities, reranker logits, or the final layer of a classifier.
  Because it exponentiates, the gap between the top score and the rest gets
  amplified: a lead of one point already gives roughly a 73/27 split.

  The max-subtraction trick is the point of the exercise. Mathematically
  `exp(x - m) / sum(exp(x_j - m))` equals `exp(x) / sum(exp(x_j))` because the
  factor `exp(-m)` cancels. Numerically it is the difference between working and
  overflowing: `exp(1000)` is infinity in floating point, but `exp(1000 - 1000)`
  is just `1.0`. Rounding each output independently means the returned values may
  not sum to exactly 1.0, which is expected.
common_mistakes:
  - Exponentiating the raw scores without subtracting the max, which overflows to inf on large inputs and yields nan.
  - Normalising by the count of scores or by the max instead of by the sum of the exponentials.
  - Subtracting the max only in the numerator, breaking the cancellation and returning wrong probabilities.
