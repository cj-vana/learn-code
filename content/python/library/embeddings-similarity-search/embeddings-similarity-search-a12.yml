prompt_markdown: |
  A retriever hands back a raw similarity score per candidate passage, but a
  reranker or a reader usually wants a **probability distribution** over the
  candidates. `softmax` does that conversion: it turns any list of real numbers
  into positive values that sum to (about) one, with larger scores getting larger
  shares.

  Write `softmax(scores)` that takes a list of numbers and returns a list of
  probabilities. The definition for the `i`-th score is

  ```
  softmax(scores)[i] = exp(scores[i]) / sum(exp(scores[j]) for all j)
  ```

  Compute it in the **numerically stable** way by subtracting the maximum score
  before exponentiating (this changes nothing mathematically because the shift
  cancels between numerator and denominator, but it prevents `exp` from
  overflowing on large inputs). Concretely, let `m = max(scores)` and use
  `exp(scores[i] - m)` in both the numerator and the denominator.

  Round each probability to **6 decimal places** with `round(value, 6)`.

  For example, `[0.0, 0.0]` returns `[0.5, 0.5]`, and `[1000.0, 1000.0, 1000.0]`
  returns `[0.333333, 0.333333, 0.333333]` without overflowing.

  If `scores` is empty, return an empty list `[]`.
