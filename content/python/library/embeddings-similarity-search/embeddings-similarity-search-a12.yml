function_name: softmax
input_mode: function
solution_sketch: Subtract the max score, exponentiate each shifted value, divide by the sum of those exponentials, and round every result to 6 places.
sample_solution: |
  import math


  def softmax(scores):
      if not scores:
          return []
      m = max(scores)
      exps = [math.exp(s - m) for s in scores]
      total = sum(exps)
      return [round(e / total, 6) for e in exps]
hints:
  - level: 1
    text: Find the largest score first and subtract it from every score before calling math.exp. The shifted values are all zero or negative, so exp stays small and safe.
  - level: 2
    text: Build the list of shifted exponentials once, then sum it to get the normaliser you divide each element by.
  - level: 3
    text: Return [round(e / total, 6) for e in exps] where exps = [math.exp(s - max(scores)) for s in scores] and total = sum(exps); guard the empty input by returning [].
