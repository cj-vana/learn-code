prompt_markdown: |
  The **magnitude** of a vector (also called its L2 norm or Euclidean length)
  measures how far it reaches from the origin. For a vector
  `v = [v0, v1, ..., v(n-1)]` it is the square root of the sum of its squared
  components:

      |v| = sqrt(v0^2 + v1^2 + ... + v(n-1)^2)

  A field biologist records each little penguin as a vector of scaled body
  measurements (bill length, flipper span, mass). Write `magnitude(v)` that
  takes one such list of numbers and returns its magnitude rounded to 6 decimal
  places. The magnitude of the empty vector or an all-zero vector is 0.
starter_code: |
  import math


  def magnitude(v):
      return 0.0
function_name: magnitude
input_mode: function
solution_sketch: Square every component, sum the squares, take the square root with math.sqrt, and round to 6 places.
sample_solution: |
  import math


  def magnitude(v):
      total = sum(x * x for x in v)
      return round(math.sqrt(total), 6)
hints:
  - level: 1
    text: Magnitude is the straight-line distance from the origin, found by squaring, summing, then taking a square root.
  - level: 2
    text: sum(x * x for x in v) gives the sum of squares; feed that into math.sqrt.
  - level: 3
    text: Return round(math.sqrt(sum(x * x for x in v)), 6); an empty vector sums to 0 and sqrt(0) is 0.
