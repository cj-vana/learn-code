explanation_markdown: |
  Squaring each component makes every contribution positive, so the sign of a
  measurement never cancels another out; the square root then converts the sum
  of squares back to the same units as the inputs. This length is what you
  divide by when you normalize a vector or compute cosine similarity, so it is
  the first building block of direction-based comparison. The classic 3-4-5 and
  2-3-6 cases land on whole numbers, while [1, 1] gives the irrational
  sqrt(2) ≈ 1.414214, which is why rounding is stated up front.
common_mistakes:
  - Forgetting the square root and returning the raw sum of squares instead of the length.
  - Squaring the sum of the components rather than summing the squares of each component.
  - Assuming negative inputs shrink the magnitude; squaring makes -3 and 3 contribute identically.
