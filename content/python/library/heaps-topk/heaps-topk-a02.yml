explanation_markdown: |
  Because `heapq` gives you only a min-heap, negation is the standard way to reach
  the maximum. The smallest stored value `-30` corresponds to the largest real
  value `30`, so popping in ascending order of the negatives yields the real
  temperatures in descending order. Building the heap is O(n) and each of the n
  pops is O(log n).
common_mistakes:
  - Forgetting to negate a second time on the way out, returning the negated numbers.
  - Reaching for sorted(temps, reverse=True) instead of practising the heap push/pop cycle.
  - Assuming the heapified list is already fully sorted rather than only rooted at its minimum.
