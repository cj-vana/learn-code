function_name: warmest_first
input_mode: function
solution_sketch: Push each negated value into a heap, then pop and negate back until it drains, yielding descending order.
sample_solution: |
  import heapq


  def warmest_first(temps):
      max_heap = [-t for t in temps]
      heapq.heapify(max_heap)
      result = []
      while max_heap:
          result.append(-heapq.heappop(max_heap))
      return result
hints:
  - level: 1
    text: A min-heap hands back the smallest stored value first, so store the negatives to surface the largest real value.
  - level: 2
    text: Build a list of -t for every temperature, heapify it, then pop repeatedly.
  - level: 3
    text: Each pop returns the most negative stored number; negate it once more to recover the real temperature before appending.
