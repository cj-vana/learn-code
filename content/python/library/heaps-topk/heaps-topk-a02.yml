prompt_markdown: |
  A greenhouse controller logs the temperature (a whole number of degrees) every
  time a vent cycles. The gardener wants the readings listed from warmest to
  coolest. `heapq` only builds *min*-heaps, so simulate a **max-heap by negating**
  every value on the way in and negating again on the way out.

  Write `warmest_first(temps)` that returns the temperatures in descending order
  using a negated min-heap. An empty log returns an empty list. Use `heapq`, not
  `sorted`.
