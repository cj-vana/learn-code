prompt_markdown: |
  An optics lab has a filter tuned to a target wavelength and a tray of sample
  wavelengths (integers). It wants the `k` samples **closest** to the target.

  Write `k_nearest(data)` where `data` is a dict with keys `samples` (a list of
  integers), `target` (an integer), and `k` (a non-negative integer). A sample's
  closeness is `abs(sample - target)`. Return the `k` nearest samples **sorted
  ascending**. Break ties in closeness by preferring the **smaller** wavelength.
  If `k` is `0` return an empty list; if `k` is at least the number of samples,
  return all of them sorted ascending.

  Maintain a size-`k` heap keyed so that the *worst* kept candidate sits at the
  root, ready to be evicted when a nearer sample arrives.
