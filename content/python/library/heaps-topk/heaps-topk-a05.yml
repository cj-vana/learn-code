solution_sketch: Keep a size-k max-heap keyed on (distance, value) via negation so the worst kept candidate is evicted first, then return the kept samples sorted.
sample_solution: |
  import heapq


  def k_nearest(data):
      samples = data["samples"]
      target = data["target"]
      k = data["k"]
      if k <= 0:
          return []
      heap = []  # min-heap of (-distance, -value); root is the worst kept candidate
      for value in samples:
          key = (abs(value - target), value)
          entry = (-key[0], -key[1])
          if len(heap) < k:
              heapq.heappush(heap, entry)
          else:
              worst = (-heap[0][0], -heap[0][1])
              if key < worst:
                  heapq.heapreplace(heap, entry)
      kept = [-entry[1] for entry in heap]
      return sorted(kept)
hints:
