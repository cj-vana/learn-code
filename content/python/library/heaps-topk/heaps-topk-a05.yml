explanation_markdown: |
  Closeness plus a tie-break is naturally a *tuple* comparison: `(distance, value)`
  orders candidates exactly the way the problem asks, since Python compares tuples
  field by field. Keeping the k smallest such pairs is a top-k problem in reverse,
  so you keep a size-k max-heap (built by negating both fields) whose root is the
  worst survivor. Each sample costs at most O(log k), and the final sort of k
  values is cheap. Sorting the surviving samples ascending gives the required
  output order regardless of the order they were evicted in.
common_mistakes:
  - Forgetting the tie-break, so equally close samples come out in an unpredictable order.
  - Keeping a min-heap of the best candidates, which evicts the wrong end when the heap is full.
  - Returning distances or negated values instead of recovering the original samples before sorting.
