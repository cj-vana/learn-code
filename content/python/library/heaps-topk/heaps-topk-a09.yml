solution_sketch: Sort jobs by submit time, then repeatedly admit all jobs submitted by the current clock into a heap keyed on (priority, submit, id) and run the heap's top, advancing the clock or jumping to the next submission when idle.
sample_solution: |
  import heapq


  def run_press(data):
      jobs = sorted(data["jobs"], key=lambda job: job[1])
      ready = []
      order = []
      clock = 0
      i = 0
      n = len(jobs)
      while i < n or ready:
          while i < n and jobs[i][1] <= clock:
              job_id, submit, priority, duration = jobs[i]
              heapq.heappush(ready, (priority, submit, job_id, duration))
              i += 1
          if not ready:
              clock = jobs[i][1]
              continue
          priority, submit, job_id, duration = heapq.heappop(ready)
          order.append(job_id)
          clock += duration
      return order
hints:
  - level: 1
    text: Keep a heap of jobs that have been submitted but not yet run, ordered by (priority, submit_time, id).
  - level: 2
    text: Before choosing a job, admit every job whose submit time is at or before the current clock; then pop the heap's top and advance the clock by its duration.
  - level: 3
    text: If the heap is empty but jobs remain, the press is idle, so jump the clock forward to the next unsubmitted job's submit time before admitting again.
