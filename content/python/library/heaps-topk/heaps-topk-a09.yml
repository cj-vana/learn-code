explanation_markdown: |
  A non-preemptive scheduler only makes a decision when the press is free, so the
  simulation loops on those moments. A heap keyed on `(priority, submit_time,
  job_id)` makes "pick the most important waiting job" an O(log n) `heappop`, with
  the extra tuple fields encoding the exact tie-break rules. Admitting jobs whose
  submit time has passed before each choice models the queue filling up over time,
  and jumping the clock to the next submission when the heap is empty models an
  idle press. Sorting the jobs by submit time once lets you admit them with a
  single moving index, giving O(n log n) overall as a clean pure function.
common_mistakes:
  - Choosing among all jobs instead of only those already submitted by the current clock.
  - Forgetting the idle case, so an empty ready heap loops forever or errors instead of jumping the clock.
  - Encoding the tie-breaks in the wrong order, letting a later or higher-id job jump ahead of an equally important earlier one.
