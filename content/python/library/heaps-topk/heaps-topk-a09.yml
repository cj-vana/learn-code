prompt_markdown: |
  A print shop runs a single press. Jobs are submitted over the day, each with a
  submission time, a priority (a smaller number means more important), and a run
  duration. The press works one job at a time and never interrupts a running job.

  When the press becomes free it starts the **most important waiting job** (lowest
  priority number); ties go to the **earlier submission time**, and any further tie
  to the **smaller job id**. If no job has been submitted yet, the press idles
  until the next submission arrives.

  Write `run_press(data)` where `data` is a dict with key `jobs`, a list of jobs.
  Each job is a list `[job_id, submit_time, priority, duration]` of integers.
  Return the list of `job_id`s in the order the press completes them. Assume all
  ids are distinct and the press starts at time `0`.
