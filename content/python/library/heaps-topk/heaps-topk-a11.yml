explanation_markdown: |
  Because each log is already sorted, the globally smallest reading you have not
  taken yet is always sitting at the current front of one of the logs. A min-heap
  that holds one `(value, row, col)` tuple per active log lets you pull that global
  minimum in `O(log R)` time, where `R` is the number of logs. Every time you pop
  the front of a log, you replace it with that log's next element, keeping exactly
  one candidate per log in the heap. Doing this `k` times walks through the merged
  order without ever building it in full, so the value from the `k`-th pop is the
  answer. Tagging tuples with the row and column indices is what tells you which
  log to advance after each pop. The total work is `O(R + k log R)` and the extra
  memory is only `O(R)`, versus `O(total)` if you concatenated and sorted.
common_mistakes:
  - Concatenating every log into one list and sorting it, which the prompt forbids and wastes O(total) memory.
  - Pushing all readings from a log at once instead of only the next single element after each pop.
  - Forgetting to guard c + 1 against the length of that specific log, causing an IndexError when a short log is exhausted.
  - Storing only the value in the heap, losing track of which log and position to advance next.
