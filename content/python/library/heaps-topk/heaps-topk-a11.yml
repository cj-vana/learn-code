solution_sketch: Seed a min-heap with the first element of every non-empty log tagged by (value, row_index, col_index), then pop k times, each pop pushing the next element from that same log.
sample_solution: |
  import heapq


  def kth_smallest(data):
      rows = data["rows"]
      k = data["k"]
      heap = []
      for r, row in enumerate(rows):
          if row:
              heap.append((row[0], r, 0))
      heapq.heapify(heap)
      value = None
      for _ in range(k):
          value, r, c = heapq.heappop(heap)
          if c + 1 < len(rows[r]):
              heapq.heappush(heap, (rows[r][c + 1], r, c + 1))
      return value
hints:
  - level: 1
    text: The very smallest reading has to be the first element of one of the logs, so a heap only ever needs to hold one "front" candidate per log at a time.
  - level: 2
    text: Push tuples like (value, row_index, col_index) so the heap orders by value while remembering which log the value came from and where in that log you are.
  - level: 3
    text: Pop exactly k times. Each time you pop from log r at column c, push (rows[r][c+1], r, c+1) if that log still has a next element; the value from the k-th pop is the answer.
