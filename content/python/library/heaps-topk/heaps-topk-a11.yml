prompt_markdown: |
  A weather station keeps one log per sensor, and each sensor writes its
  temperature readings **already sorted ascending**. Analysts often want the
  `k`-th **coldest** reading across *all* sensors combined, but the logs are huge
  and stitching them into one giant sorted list wastes memory.

  Write `kth_smallest(data)` where `data` is a dict with two keys:

  - `rows`: a list of lists, where each inner list is a sensor log sorted in
    ascending order (logs may have different lengths, and some may be empty).
  - `k`: a positive integer (1-indexed) with `1 <= k <= total number of readings`.

  Return the single `k`-th smallest value across every log, found by a **heap-based
  k-way merge** using `heapq` -- advance through the logs in value order and stop
  as soon as you have popped `k` readings. Do **not** concatenate all logs and sort
  them.

  For example, `{"rows": [[1, 4], [2, 3]], "k": 3}` returns `3`, because the merged
  order is `1, 2, 3, 4` and the 3rd value is `3`.
