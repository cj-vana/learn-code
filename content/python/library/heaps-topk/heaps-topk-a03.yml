explanation_markdown: |
  Keeping a min-heap of the current winners means the weakest kept value sits at
  `winners[0]`, so the test `value > winners[0]` is an O(1) gate that rejects most
  candidates before any heap work happens. Each accepted value costs O(log k) via
  `heapreplace`, giving O(n log k) overall and only O(k) memory, far cheaper than
  the O(n log n) of sorting the whole stream when k is small.
common_mistakes:
  - Using a max-heap of the whole stream, which spends O(n) memory instead of O(k).
  - Comparing against the wrong end of the heap; winners[0] is the smallest kept value, not the largest.
  - Returning the heap in raw order, which is only partially sorted, instead of sorting it descending.
