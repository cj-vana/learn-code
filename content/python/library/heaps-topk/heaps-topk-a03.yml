prompt_markdown: |
  An observatory streams a brightness reading for each star it scans, but only the
  `k` brightest are worth recording tonight. Rather than sorting the whole stream,
  keep a **min-heap of size k**: its root is the weakest star you are currently
  keeping, so a new reading only earns a spot if it beats that root.

  Write `k_brightest(data)` where `data` is a dict with keys `stream` (a list of
  integer brightnesses) and `k` (a non-negative integer). Return the `k` largest
  brightnesses in **descending** order. If `k` is `0` return an empty list; if `k`
  is at least the length of the stream, return every reading sorted descending.
