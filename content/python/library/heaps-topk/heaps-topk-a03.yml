function_name: k_brightest
input_mode: function
solution_sketch: Maintain a size-k min-heap, replacing its root whenever a larger value arrives, then return the heap sorted descending.
sample_solution: |
  import heapq


  def k_brightest(data):
      stream = data["stream"]
      k = data["k"]
      if k <= 0:
          return []
      winners = []
      for value in stream:
          if len(winners) < k:
              heapq.heappush(winners, value)
          elif value > winners[0]:
              heapq.heapreplace(winners, value)
      return sorted(winners, reverse=True)
hints:
  - level: 1
    text: To keep the k largest values, a min-heap of size k lets you evict the smallest survivor cheaply.
  - level: 2
    text: While the heap has fewer than k items, just push; afterwards only act when value > winners[0].
  - level: 3
    text: Use heapq.heapreplace to pop the weak root and push the newcomer in one step, then sort the heap descending at the end.
