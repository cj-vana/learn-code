function_name: live_ranks
input_mode: function
solution_sketch: Keep a sorted list of seen scores; for each new score record bisect_left (count strictly below), then insort it.
sample_solution: |
  import bisect


  def live_ranks(scores):
      seen = []
      ranks = []
      for score in scores:
          ranks.append(bisect.bisect_left(seen, score))
          bisect.insort(seen, score)
      return ranks
hints:
  - level: 1
    text: The number of earlier scores strictly below the newcomer is exactly where it would be inserted at the left.
  - level: 2
    text: bisect.bisect_left returns that leftmost insertion index, counting only strictly smaller values.
  - level: 3
    text: Record bisect_left before inserting, then bisect.insort the score so the list stays sorted for the next arrival.
