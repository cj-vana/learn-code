explanation_markdown: |
  `bisect_left` returns the leftmost position where the value could be inserted
  while keeping the list sorted, which equals the number of existing elements
  strictly less than it, so equal scores never count as "below." The search is
  O(log n); `insort` finds its spot in O(log n) but shifts later elements, making
  the insertion O(n). Since you need the whole collection ordered for every
  future rank query, that shifting cost is the price of keeping a plain list
  sorted, and it is exactly when a heap would not help, because a heap exposes
  only its extreme, not an arbitrary rank.
common_mistakes:
  - Using bisect_right, which counts equal scores as below and reports the wrong rank on duplicates.
  - Inserting the score before recording its rank, so it counts itself.
  - Re-sorting the list on every arrival instead of using insort to keep it ordered incrementally.
