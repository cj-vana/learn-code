prompt_markdown: |
  A climbing gym posts scores to a leaderboard one at a time. As each new score
  arrives, the display shows how many **already-posted** scores are strictly lower
  than it, then the new score is filed into the sorted board.

  Write `live_ranks(scores)` where `scores` is a list of integers arriving in
  order. Return a list the same length as `scores`: entry `i` is the count of
  earlier scores strictly less than `scores[i]` at the moment it arrives. Maintain
  the seen scores as a **sorted list** using the `bisect` module so each lookup is
  a binary search rather than a full scan.
