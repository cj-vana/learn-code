function_name: merge_logs
input_mode: function
solution_sketch: Seed the heap with the first element of each non-empty list tagged by its list and element index, then repeatedly pop the smallest and push that list's successor.
sample_solution: |
  import heapq


  def merge_logs(logs):
      heap = [(lst[0], i, 0) for i, lst in enumerate(logs) if lst]
      heapq.heapify(heap)
      out = []
      while heap:
          value, i, j = heapq.heappop(heap)
          out.append(value)
          if j + 1 < len(logs[i]):
              heapq.heappush(heap, (logs[i][j + 1], i, j + 1))
      return out
hints:
  - level: 1
    text: The smallest unused element overall is always the smallest among the current fronts of the lists.
  - level: 2
    text: Store tuples of (value, list_index, element_index) so the heap compares by value but remembers where to fetch the next candidate.
  - level: 3
    text: After popping (value, i, j), push (logs[i][j+1], i, j+1) if that list still has more elements.
