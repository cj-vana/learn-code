prompt_markdown: |
  Several delivery depots each hand you a log of dispatch timestamps (integers)
  that is **already sorted ascending**. You want one merged log, still sorted,
  without throwing away the fact that each input is ordered.

  Write `merge_logs(logs)` where `logs` is a list of sorted lists. Return a single
  sorted list containing every timestamp. Some depot logs may be empty, and
  `logs` itself may be empty. Use a heap holding **one pending entry per log** so
  the merge never inspects more than one candidate from each list at a time.
