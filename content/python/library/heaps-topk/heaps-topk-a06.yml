explanation_markdown: |
  The merge front is at most one element per list, so a heap of that size lets you
  always extract the global minimum in O(log k) for k lists. Tagging each value
  with its `list_index` and `element_index` lets the heap compare on the value
  while carrying the bookkeeping needed to advance exactly one list per pop. With
  n total elements the merge is O(n log k) time and O(k) heap space, and skipping
  empty lists at seed time keeps the loop simple.
common_mistakes:
  - Concatenating everything and calling sorted, which discards the pre-sorted structure and costs O(n log n).
  - Seeding the heap with empty lists and hitting an index error on lst[0].
  - Storing only the value, so after popping you cannot tell which list to advance.
