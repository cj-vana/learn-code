explanation_markdown: |
  A min-heap capped at size k always contains the k largest values seen so far,
  and its root is the smallest of those, i.e. the k-th largest overall. Duplicates
  simply occupy separate slots, so positional counting falls out for free. The
  scan is O(n log k) with O(k) memory, beating a full O(n log n) sort whenever k is
  much smaller than the log.
common_mistakes:
  - Sorting the whole list and indexing, which works but wastes time and misses the streaming pattern.
  - Building a max-heap and popping k times, using O(n) memory instead of O(k).
  - Returning the root before the loop finishes, when the heap has not yet seen every value.
