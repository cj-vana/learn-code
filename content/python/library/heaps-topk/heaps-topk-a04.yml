function_name: kth_longest
input_mode: function
solution_sketch: Keep a size-k min-heap of the largest values seen; its root is the k-th largest after the pass.
sample_solution: |
  import heapq


  def kth_longest(data):
      distances = data["distances"]
      k = data["k"]
      heap = []
      for value in distances:
          if len(heap) < k:
              heapq.heappush(heap, value)
          elif value > heap[0]:
              heapq.heapreplace(heap, value)
      return heap[0]
hints:
  - level: 1
    text: If a min-heap holds only the k largest values seen so far, its smallest element is the k-th largest overall.
  - level: 2
    text: Fill the heap to size k, then replace its root whenever a larger value appears.
  - level: 3
    text: After processing every distance, return heap[0]; duplicates are handled automatically because each occupies its own slot.
