prompt_markdown: |
  A freight depot records the distance of every haul its trucks complete. A
  dispatcher wants the `k`-th **longest** haul without sorting the whole log.

  Write `kth_longest(data)` where `data` is a dict with keys `distances` (a
  non-empty list of integers) and `k` (an integer with `1 <= k <= len(distances)`).
  Return the single integer that is the `k`-th largest distance, counting
  duplicates by position: in `[9, 9, 4]` the 1st longest is `9`, the 2nd longest
  is also `9`, and the 3rd is `4`. Keep a **min-heap of size k** so its root is
  exactly the answer once every distance has been considered.
