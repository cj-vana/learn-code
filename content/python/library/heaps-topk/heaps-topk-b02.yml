prompt_markdown: |
  A trading desk subscribes to several price feeds. Each feed arrives already
  sorted by timestamp, as a list of `[timestamp, price]` entries. You need to
  merge them into a single stream that is still sorted by timestamp, cheaply,
  without concatenating everything and re-sorting.

  You are given `job` with this shape:

  ```
  {"feeds": [[[1, 100], [4, 40]], [[2, 20], [3, 30]]]}
  ```

  `feeds` is a list of feeds; each feed is a list of `[timestamp, price]` pairs in
  non-decreasing timestamp order. Timestamps and prices are integers.

  Write `merge_price_feeds(job)` that returns one merged list of `[timestamp,
  price]` pairs sorted by timestamp. When two pairs share the same timestamp,
  break the tie by **feed order**: the entry from the earlier feed (smaller index
  in `feeds`) comes first, and within a single feed the original order is kept.

  Cases the tests cover: a single feed passes straight through; some feeds may be
  empty and contribute nothing; a list of only empty feeds returns an empty list;
  equal timestamps across feeds resolve by feed index.
