function_name: merge_price_feeds
input_mode: function
solution_sketch: >-
  Seed a min-heap with the first pair of every non-empty feed, keyed by
  (timestamp, feed_index, position); repeatedly pop the smallest, emit its
  [timestamp, price], and push the next pair from that same feed until every feed
  is exhausted.
sample_solution: |
  import heapq


  def merge_price_feeds(job):
      feeds = job["feeds"]
      heap = []
      for feed_index, feed in enumerate(feeds):
          if feed:
              timestamp, price = feed[0]
              heapq.heappush(heap, (timestamp, feed_index, 0, price))

      merged = []
      while heap:
          timestamp, feed_index, position, price = heapq.heappop(heap)
          merged.append([timestamp, price])
          nxt = position + 1
          if nxt < len(feeds[feed_index]):
              n_timestamp, n_price = feeds[feed_index][nxt]
              heapq.heappush(heap, (n_timestamp, feed_index, nxt, n_price))
      return merged
hints:
  - level: 1
    text: You never need more than one pending entry per feed at a time, because each feed is already sorted. Keep the current front of every feed in a heap and always take the smallest.
  - level: 2
    text: Push a tuple that starts with the timestamp so the heap orders by time. When you pop a feed's front, push that feed's next pair to replace it.
  - level: 3
    text: To break timestamp ties by feed order, put the feed index in the heap key right after the timestamp, like (timestamp, feed_index, position, price). Never let the price decide ordering.
