explanation_markdown: |
  Because every feed is already sorted, the smallest unemitted pair across all
  feeds must be at the *front* of one of the feeds. That is exactly the situation a
  min-heap handles: keep one entry per feed -- its current front -- and the heap
  top is always the next pair to emit. After emitting it, you advance that one feed
  and push its new front. This is the classic k-way merge, and it costs
  `O(total_entries * log k)` where k is the number of feeds, versus
  `O(total_entries * log total_entries)` for dumping everything into one list and
  sorting.

  The tie-break is where the encoding matters. Two feeds can offer the same
  timestamp, and the desk wants the earlier feed first. If your heap key were just
  `(timestamp, price)`, ties would be decided by price, which is wrong -- and if two
  equal timestamps also had equal prices, Python would try to compare the next
  field. Putting the **feed index** immediately after the timestamp,
  `(timestamp, feed_index, position, price)`, makes the ordering fully determined
  and stable: same timestamp resolves by feed, and the index is unique so
  comparison never falls through to the price. Empty feeds simply never get seeded,
  so they contribute nothing.
common_mistakes:
  - Concatenating every feed and calling sort, which produces sorted output but is not a k-way merge and can reorder equal timestamps unpredictably.
  - Keying the heap by (timestamp, price) so equal timestamps are broken by price instead of by feed order.
  - Seeding empty feeds or indexing feed[0] without checking the feed is non-empty, causing an error on empty feeds.
