solution_sketch: Count with Counter, then heapq.nlargest by key (count, -value) so higher counts win and ties favour the smaller value; return just the values.
sample_solution: |
  import heapq
  from collections import Counter


  def top_k_frequent(data):
      values = data["values"]
      k = data["k"]
      counts = Counter(values)
      top = heapq.nlargest(k, counts.items(), key=lambda item: (item[1], -item[0]))
      return [value for value, _count in top]
hints:
  - level: 1
    text: Start by tallying how many times each code appears; collections.Counter turns the list into a code-to-count mapping in one step.
  - level: 2
    text: You want the largest counts, so heapq.nlargest is a natural fit; pass counts.items() and a key so it ranks by count.
  - level: 3
    text: Use key=lambda item (item[1], -item[0]) so a bigger count wins and, for equal counts, the smaller code sorts first; then pull out just the code from each pair.
