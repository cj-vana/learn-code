explanation_markdown: |
  The job splits into two parts: counting and ranking. `Counter(values)` does the
  counting in a single O(n) pass, giving a mapping from each code to how many
  times it was pinned.

  For the ranking, `heapq.nlargest(k, items, key=...)` keeps only the k best
  pairs using a heap of size k, which costs O(n log k) rather than sorting the
  whole thing. The trick is the sort key `(count, -value)`. `nlargest` picks the
  pairs whose key is largest, so a higher count always wins first. When two codes
  tie on count, comparing `-value` means the code with the smaller value has the
  larger key and is chosen ahead of the bigger one, and the results come back in
  that same descending-key order. Finally we discard the counts and return just
  the codes.
common_mistakes:
  - Forgetting the tie-break, so equal-count codes come out in an arbitrary order instead of smallest value first.
  - Using +value instead of -value in the key, which reverses the tie-break and prefers the larger code.
  - Returning the (value, count) pairs from nlargest instead of extracting just the code from each pair.
