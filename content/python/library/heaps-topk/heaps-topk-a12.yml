prompt_markdown: |
  A community notice board logs a numeric tag code every time someone pins a
  message. At the end of the day the volunteers want the short list of codes that
  came up most often.

  Write `top_k_frequent(data)` where `data` is a dict with two keys:

  - `values`: a list of integer tag codes (may be empty, may contain repeats)
  - `k`: an integer, how many of the most frequent codes to return

  Return a list of the `k` most frequent codes ordered by their count from
  highest to lowest. When two codes share the same count, the smaller code comes
  first. If `k` is 0 or `values` is empty, return an empty list. If `k` is larger
  than the number of distinct codes, just return all distinct codes in that same
  order.

  Example: `{"values": [1, 1, 2, 2, 2, 3], "k": 2}` returns `[2, 1]`, because 2
  appears three times, 1 appears twice, and 3 (appearing once) is left off.
