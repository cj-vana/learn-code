explanation_markdown: |
  Heapifying is O(n) and each of the n pops is O(log n), so draining the whole
  queue costs O(n log n) overall, the same as sorting but expressed as a live
  priority queue. The key property you rely on is that `heappop` always removes
  the current minimum, so appending each popped value produces a fully ascending
  sequence.
common_mistakes:
  - Mutating the caller's list in place by heapifying it directly instead of copying first.
  - Reading heap[0] repeatedly without popping, so the same minimum is recorded forever.
  - Assuming the list is already in sorted order after heapify; only index 0 is guaranteed to be smallest.
