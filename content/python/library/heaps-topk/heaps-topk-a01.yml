prompt_markdown: |
  A bicycle workshop stores each waiting repair as a numeric priority, where a
  smaller number means a more urgent job. Write `drain_queue(priorities)` that
  returns every priority in ascending order (most urgent first) by loading them
  into a min-heap and popping until it is empty. An empty input returns an empty
  list. Use `heapq`, not `sorted`, so you practise the push/pop cycle.
