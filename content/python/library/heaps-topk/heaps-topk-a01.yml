function_name: drain_queue
input_mode: function
solution_sketch: Heapify the list, then repeatedly heappop into a result list until the heap is empty.
sample_solution: |
  import heapq


  def drain_queue(priorities):
      heap = list(priorities)
      heapq.heapify(heap)
      result = []
      while heap:
          result.append(heapq.heappop(heap))
      return result
hints:
  - level: 1
    text: A min-heap always hands back its smallest element first, so popping repeatedly yields ascending order.
  - level: 2
    text: Copy the input into a list, call heapq.heapify on it, then loop while the heap is non-empty.
  - level: 3
    text: Inside the loop, append heapq.heappop(heap) to your result each iteration; stop when the heap is empty.
