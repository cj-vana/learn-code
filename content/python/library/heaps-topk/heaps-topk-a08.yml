solution_sketch: Maintain a negated max-heap (lower half) and a min-heap (upper half) kept balanced with the lower half never smaller; the lower median is the top of the lower half.
sample_solution: |
  import heapq


  def median_service(commands):
      low = []   # max-heap via negation: smaller half
      high = []  # min-heap: larger half
      out = []
      for command in commands:
          if command[0] == "add":
              x = command[1]
              if low and x > -low[0]:
                  heapq.heappush(high, x)
              else:
                  heapq.heappush(low, -x)
              if len(low) > len(high) + 1:
                  heapq.heappush(high, -heapq.heappop(low))
              elif len(high) > len(low):
                  heapq.heappush(low, -heapq.heappop(high))
          else:
              out.append(-low[0])
      return out
