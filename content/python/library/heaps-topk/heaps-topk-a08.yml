prompt_markdown: |
  A latency monitor accepts a stream of commands. Each command is a list: either
  `["add", x]` to record an integer latency sample `x`, or `["median"]` to ask for
  the current median of everything added so far.

  Write `median_service(commands)` that returns a list with one integer per
  `"median"` command, in order. Use the **lower median** convention: with an odd
  number of samples it is the middle value; with an even number it is the smaller
  of the two middle values. A `"median"` command never appears before at least one
  `"add"`.

  Keep the samples split across **two heaps** — a max-heap for the lower half and
  a min-heap for the upper half — so each query is answered from a heap top rather
  than by re-sorting.
