explanation_markdown: |
  Two heaps turn "give me the middle" into "peek at a heap top." The lower half is
  a max-heap (stored negated) so its top is the largest small value; the upper half
  is a min-heap so its top is the smallest large value. By keeping the lower half
  equal in size to the upper half or exactly one larger, the lower median is always
  `-low[0]`. Each `"add"` routes the value to a half and then does at most one
  cross-heap move to restore the size invariant, so every command is O(log n),
  decisively better than re-sorting on each query.
common_mistakes:
  - Letting the two halves drift apart in size, so the top no longer marks the median.
  - Comparing the newcomer against the wrong heap top when deciding which half it joins.
  - Answering a "median" from the upper heap, giving the higher median instead of the required lower one.
