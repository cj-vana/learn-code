prompt_markdown: |
  A coastal tide gauge reports the water level one reading at a time, and the
  station wants the **median** level updated after every reading so far -- not just
  at the end. Sorting the whole history again after each reading would be wasteful,
  so you keep the numbers balanced across two heaps and read the middle off the top.

  Write `running_median(stream)` that takes a list of numbers and returns a list of
  the same length: element `i` is the median of the first `i + 1` readings.

  The median rule:

  - When an odd number of readings have arrived, the median is the single middle
    value.
  - When an even number have arrived, the median is the average of the two middle
    values, which may be a fraction. Return that average as produced by ordinary
    division (so an even-count median is a float such as `1.5`, and `4.0` when the
    two middles are both `4`).

  Cases the tests cover: an empty stream returns an empty list; a single reading
  returns that reading; readings may arrive out of order and may be negative or
  repeated.
