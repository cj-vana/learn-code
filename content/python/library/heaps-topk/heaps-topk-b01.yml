explanation_markdown: |
  The trick is to never sort. Split the readings so far into a lower half and an
  upper half, and store each half in the heap that puts its boundary element on
  top: a **max-heap** for the lower half (so its largest value is on top) and a
  **min-heap** for the upper half (so its smallest value is on top). Python's
  `heapq` is a min-heap, so the lower half is stored as negated numbers.

  After inserting each reading you rebalance so the lower heap is the same size as
  the upper heap or exactly one element larger. That single invariant makes the
  median trivial to read: with an odd total the extra element sits on top of the
  lower heap and *is* the median; with an even total the two tops straddle the
  middle and their average is the median. The average uses true division, so even
  counts yield floats -- `15.0`, `1.5`, and so on -- while odd counts return the
  stored value unchanged.

  Each insert does a constant number of `O(log n)` heap operations, so producing
  all n medians costs `O(n log n)`, far better than re-sorting each prefix.
common_mistakes:
  - Recomputing the median by sorting the whole prefix each step, which is correct but defeats the purpose of the two-heap structure.
  - Letting the heaps drift out of balance so a top element is no longer the true boundary of the two halves.
  - Using integer division for the even case, which drops the fractional half and reports the wrong median.
