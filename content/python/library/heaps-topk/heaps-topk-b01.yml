solution_sketch: >-
  Keep a max-heap of the lower half and a min-heap of the upper half, rebalancing
  after each insert so the low heap holds the same number of elements as the high
  heap or exactly one more; the median is then the low heap's top (odd count) or
  the average of the two tops (even count).
sample_solution: |
  import heapq


  def running_median(stream):
      lower = []  # max-heap (store negated values)
      upper = []  # min-heap
      medians = []
      for value in stream:
          if not lower or value <= -lower[0]:
              heapq.heappush(lower, -value)
          else:
              heapq.heappush(upper, value)

          if len(lower) > len(upper) + 1:
              heapq.heappush(upper, -heapq.heappop(lower))
          elif len(upper) > len(lower):
              heapq.heappush(lower, -heapq.heappop(upper))

          if len(lower) > len(upper):
              medians.append(-lower[0])
          else:
              medians.append((-lower[0] + upper[0]) / 2)
      return medians
hints:
  - level: 1
    text: Keep the smaller half of the numbers in one heap and the larger half in another. If the two tops are the boundary of the halves, the median is right there without any sorting.
  - level: 2
    text: Use a max-heap for the lower half (push negated values so heapq gives you the largest) and a min-heap for the upper half. After each insert, move one element across if the sizes drift more than one apart.
  - level: 3
    text: Keep the lower heap either equal in size to the upper heap or exactly one larger. Then an odd total makes the lower top the median, and an even total makes the average of the two tops the median.
