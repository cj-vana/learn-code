explanation_markdown: |
  Every pair sum can be pictured as a cell in a grid whose rows and columns are
  each sorted, so the smallest unused sum is always adjacent to a sum you have
  already taken. Seeding the heap with `(a[0]+b[0], 0, 0)` and, after each pop,
  pushing only the two neighbours `(i+1, j)` and `(i, j+1)` explores the grid in
  weight order while touching far fewer than all `len(a) * len(b)` pairs. The
  visited set stops the same cell from entering the heap along both of its
  approaches. Extracting k pairs costs O(k log k), independent of how long the
  belts are.
common_mistakes:
  - Building every pair sum and sorting, which is O(len(a) * len(b)) and defeats the point.
  - Pushing neighbours without a visited set, so cells reachable two ways are counted twice.
  - Comparing sums by index instead of value, or forgetting to carry i and j needed to find neighbours.
