solution_sketch: Seed a heap with the (a0+b0, 0, 0) pair, then pop k times, each time pushing the (i+1, j) and (i, j+1) neighbours guarded by a visited set.
sample_solution: |
  import heapq


  def lightest_loadouts(data):
      a = data["a"]
      b = data["b"]
      k = data["k"]
      if not a or not b or k <= 0:
          return []
      heap = [(a[0] + b[0], 0, 0)]
      seen = {(0, 0)}
      out = []
      while heap and len(out) < k:
          total, i, j = heapq.heappop(heap)
          out.append(total)
          if i + 1 < len(a) and (i + 1, j) not in seen:
              seen.add((i + 1, j))
              heapq.heappush(heap, (a[i + 1] + b[j], i + 1, j))
          if j + 1 < len(b) and (i, j + 1) not in seen:
              seen.add((i, j + 1))
              heapq.heappush(heap, (a[i] + b[j + 1], i, j + 1))
      return out
hints:
  - level: 1
    text: The lightest load-out is always a[0] + b[0]; the next lightest is one step down either belt from a pair you have already taken.
  - level: 2
    text: Store each candidate as (sum, i, j) so the heap orders by weight while remembering which crates formed it.
  - level: 3
    text: After popping (sum, i, j), push (i+1, j) and (i, j+1) but guard with a visited set so the same index pair is never queued twice.
