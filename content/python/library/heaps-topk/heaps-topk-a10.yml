prompt_markdown: |
  A loading dock has two conveyor belts of crate weights, each **sorted ascending**.
  A load-out takes exactly one crate from belt A and one from belt B, and its
  weight is the sum of the two crates. The dock wants the `k` **lightest** possible
  load-outs, but the belts are long, so enumerating every pair is too slow.

  Write `lightest_loadouts(data)` where `data` is a dict with keys `a` and `b`
  (sorted lists of integer weights) and `k` (a non-negative integer). Return the
  `k` smallest pair sums in **ascending** order. If either belt is empty or `k` is
  `0`, return an empty list; if `k` exceeds the number of pairs, return every pair
  sum sorted ascending.

  Explore pairs lazily with a heap: start from the lightest pair `(a[0], b[0])`
  and, each time you extract a pair, only then push its immediate neighbours.
