prompt_markdown: |
  A vending machine accepts a fixed set of coin values and has an unlimited
  supply of each. Write `count_exact_change(data)` where `data` has keys `coins`
  (a list of distinct positive coin values) and `amount` (a non-negative
  integer). Return how many distinct combinations of coins add up to exactly
  `amount`. Combinations are unordered, so using a `1` then a `2` is the same
  combination as a `2` then a `1`. An amount of 0 has exactly one combination:
  using no coins.
starter_code: |
  def count_exact_change(data):
      return 0
function_name: count_exact_change
input_mode: function
solution_sketch: Recurse over an index; at each coin either use it again (stay) or skip to the next coin, counting a hit when the remainder reaches 0.
sample_solution: |
  def count_exact_change(data):
      coins = data["coins"]
      amount = data["amount"]

      def ways(i, remaining):
          if remaining == 0:
              return 1
          if remaining < 0 or i >= len(coins):
              return 0
          return ways(i, remaining - coins[i]) + ways(i + 1, remaining)

      return ways(0, amount)
hints:
  - level: 1
    text: Reaching an amount of exactly 0 is one valid combination; going negative or running out of coin types is none.
  - level: 2
    text: To keep combinations unordered, decide per coin whether to use it (possibly again) or move past it forever.
  - level: 3
    text: Add ways(i, remaining - coins[i]) for using coin i again to ways(i + 1, remaining) for skipping it.
