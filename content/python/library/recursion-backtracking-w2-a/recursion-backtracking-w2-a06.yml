explanation_markdown: |
  The recursion makes one decision per step: either use the current coin `coins[i]`
  again -- staying at index `i` so it can be reused -- or skip it for good by
  moving to index `i + 1`. Because a coin is only revisited while the index does
  not advance, and skipped coins are never revisited, each unordered combination
  is counted once. The base cases are a remainder of exactly 0 (one valid way) and
  either a negative remainder or running out of coin types (no way).
common_mistakes:
  - Recursing on i + 1 after using a coin, which forbids reusing that coin.
  - Recursing on i (not i + 1) when skipping, causing an infinite loop.
  - Counting ordered sequences, which overcounts by treating 1 then 2 as different from 2 then 1.
