explanation_markdown: |
  Each call inspects only the outer pair of characters and hands the shrinking
  middle to the next call. If the ends ever disagree, the whole string fails
  immediately. Otherwise the string keeps shrinking by two characters until it
  reaches length 0 or 1 -- the base case -- and returns `True`. Slicing with
  `code[1:-1]` produces the inside, which is why an even-length mirror collapses
  to the empty string and an odd-length mirror collapses to its middle character.
common_mistakes:
  - Forgetting the base case, so the recursion runs past an empty slice.
  - Comparing only the first and last characters and never checking the middle.
  - Using code[1:len(code)] instead of code[1:-1] and leaving the last character in.
