prompt_markdown: |
  A transit turnstile accepts a badge code only if it reads the same forwards and
  backwards. Write `is_mirror_badge(code)` that returns `True` when the string
  `code` is a mirror (its reverse equals itself) and `False` otherwise. Solve it
  recursively: compare the outer pair of characters, then check what remains
  inside. An empty string or a single character counts as a mirror.
starter_code: |
  def is_mirror_badge(code):
      return False
function_name: is_mirror_badge
input_mode: function
solution_sketch: If the first and last characters differ, fail; otherwise recurse on the slice with both ends removed.
sample_solution: |
  def is_mirror_badge(code):
      if len(code) <= 1:
          return True
      if code[0] != code[-1]:
          return False
      return is_mirror_badge(code[1:-1])
hints:
  - level: 1
    text: A mirror string has matching characters at its two ends, and the inside must also be a mirror.
  - level: 2
    text: The base case is a string of length 0 or 1, which is always a mirror.
  - level: 3
    text: Compare code[0] with code[-1]; if they match, recurse on code[1:-1].
