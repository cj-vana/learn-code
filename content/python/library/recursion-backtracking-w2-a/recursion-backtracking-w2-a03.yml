explanation_markdown: |
  This is tree recursion over a dict. Each direct report contributes itself
  (the `1`) plus the size of its own subtree, which the same function computes by
  looking `report` up as the new `top`. A leaf has an empty report list, so the
  loop runs zero times and returns 0 -- the base case. Summing over the direct
  reports adds up all the descendants exactly once, because each person is
  reached through their single manager.
common_mistakes:
  - Counting the top person as well, returning one too many.
  - Adding only the direct reports and forgetting to recurse into their subtrees.
  - Assuming every name is a key; leaves still map to an empty list here.
