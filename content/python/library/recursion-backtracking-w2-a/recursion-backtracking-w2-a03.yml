prompt_markdown: |
  A company stores its reporting structure as a dict called `chart` that maps
  each person's name to a list of the people who report *directly* to them. A
  person with no direct reports maps to an empty list. Write
  `count_subordinates(data)` where `data` has keys `chart` (the reporting dict)
  and `top` (a name). Return how many people sit anywhere below `top` in the
  structure -- direct reports plus their reports, and so on, all the way down.
  The person named in `top` is not counted.
starter_code: |
  def count_subordinates(data):
      return 0
function_name: count_subordinates
input_mode: function
solution_sketch: For each direct report, count that person (1) plus everyone below them via a recursive call.
sample_solution: |
  def count_subordinates(data):
      chart = data["chart"]
      name = data["top"]
      total = 0
      for report in chart.get(name, []):
          total += 1 + count_subordinates({"chart": chart, "top": report})
      return total
hints:
  - level: 1
    text: The people under someone are their direct reports plus everyone under each of those reports.
  - level: 2
    text: Loop over the direct reports; each report counts as 1 and drags in its own subtree.
  - level: 3
    text: For each direct report, add 1 plus a recursive count that uses the same chart but sets top to that report.
