prompt_markdown: |
  A band organizes a concert setlist into groups, and any group may itself hold
  smaller groups nested to any depth. Each plain entry is a song label (a
  string). Write `flatten_setlist(groups)` that returns a flat list of every
  song label in left-to-right order, with all the nesting removed. An empty list
  returns an empty list.
starter_code: |
  def flatten_setlist(groups):
      return []
function_name: flatten_setlist
input_mode: function
solution_sketch: Walk the list; append plain labels and recurse into any nested list, extending the flat result.
sample_solution: |
  def flatten_setlist(groups):
      flat = []
      for item in groups:
          if isinstance(item, list):
              flat.extend(flatten_setlist(item))
          else:
              flat.append(item)
      return flat
hints:
  - level: 1
    text: Each entry is either a song label to keep or a nested group to look inside.
  - level: 2
    text: When an entry is itself a list, call the same function on it and add every label it returns.
  - level: 3
    text: Use isinstance(item, list) to decide between flat.extend(flatten_setlist(item)) and flat.append(item).
