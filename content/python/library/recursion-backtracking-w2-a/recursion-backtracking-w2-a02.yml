explanation_markdown: |
  A nested list is a tree: plain labels are leaves and inner lists are branches.
  The loop appends leaves directly and, for each branch, recurses to flatten that
  branch before extending the running result. Because `extend` preserves order,
  the labels come out in the same left-to-right order they appear in the nested
  structure. The base case is implicit: iterating an empty list adds nothing.
common_mistakes:
  - Using append instead of extend on the recursive result, producing nested lists.
  - Trying to add a nested group directly rather than recursing into it.
  - Building a new list inside the loop and losing earlier labels.
