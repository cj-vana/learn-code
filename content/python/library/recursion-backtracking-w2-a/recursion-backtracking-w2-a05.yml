prompt_markdown: |
  A parking-garage elevator descends from floor `n` to the ground (floor 0) by a
  fixed rule. On an even floor it makes one express move that halves the floor
  number. On an odd floor it makes one move down to the next lower floor. Write
  `steps_to_ground(n)` that returns how many moves it takes to reach floor 0 from
  floor `n`, where `n` is 0 or greater. Floor 0 needs no moves.
starter_code: |
  def steps_to_ground(n):
      return 0
function_name: steps_to_ground
input_mode: function
solution_sketch: Base case n at 0 needs no moves; otherwise add one move and recurse on n // 2 if even or n - 1 if odd.
sample_solution: |
  def steps_to_ground(n):
      if n <= 0:
          return 0
      if n % 2 == 0:
          return 1 + steps_to_ground(n // 2)
      return 1 + steps_to_ground(n - 1)
hints:
  - level: 1
    text: Every move counts as one, and after it the elevator is on a smaller floor.
  - level: 2
    text: An even floor recurses on n // 2; an odd floor recurses on n - 1.
  - level: 3
    text: Return 0 at floor 0, otherwise 1 + steps_to_ground(next floor).
