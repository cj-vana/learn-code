explanation_markdown: |
  Each move reduces the floor and adds 1 to the count, so the answer is `1` plus
  the moves needed from the next floor. The parity of the floor decides which
  smaller floor comes next: `n // 2` when even, `n - 1` when odd. The recursion
  is guaranteed to shrink toward the base case at floor 0, because halving and
  subtracting one both strictly reduce a positive floor. Tracing floor 6 gives
  6 -> 3 -> 2 -> 1 -> 0, which is four moves.
common_mistakes:
  - Halving an odd floor with integer division and skipping the step-down move.
  - Forgetting the base case at floor 0 so the count is off by one or never stops.
  - Returning the next floor number instead of adding 1 for the move taken.
