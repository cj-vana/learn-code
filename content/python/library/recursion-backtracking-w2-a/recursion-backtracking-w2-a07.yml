explanation_markdown: |
  Two equal groups means each group must total half of the whole. If the whole
  total is odd, no split can work, so the function fails fast. Otherwise it
  backtracks: for each leg it either places the leg in the target group
  (subtracting its distance) or leaves it out (moving on). Reaching a remaining
  target of exactly 0 means the target group is complete and the rest form the
  matching group. `[10, 3, 7, 4]` sums to 24, but no subset totals 12, so even an
  even total can still fail.
common_mistakes:
  - Assuming an even total guarantees a split without searching for the subset.
  - Forgetting the exclude branch and only ever adding legs to one group.
  - Missing the negative-remainder cutoff, wasting work after overshooting the target.
