      return False
function_name: can_split_fairly
input_mode: function
solution_sketch: If the total is odd it is impossible; otherwise backtrack to find any subset that sums to half the total.
sample_solution: |
  def can_split_fairly(distances):
      total = sum(distances)
      if total % 2 != 0:
          return False
      target = total // 2

      def reach(i, remaining):
          if remaining == 0:
              return True
          if remaining < 0 or i >= len(distances):
              return False
          return reach(i + 1, remaining - distances[i]) or reach(i + 1, remaining)

      return reach(0, target)
hints:
  - level: 1
    text: Two equal groups are only possible when the whole distance is an even number.
  - level: 2
    text: Finding one group that sums to half the total leaves the rest forming the other group.
  - level: 3
    text: For each leg, try including it or excluding it, and stop when the remaining target hits 0.
