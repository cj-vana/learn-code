prompt_markdown: |
  A relay race is built from legs of given distances, and the organizer wants two
  teams that each run the same total distance using every leg exactly once. Write
  `can_split_fairly(distances)` where `distances` is a list of positive integers.
  Return `True` if the legs can be divided into two groups with equal totals, and
  `False` otherwise. An empty list splits into two empty groups, so it returns
  `True`.
starter_code: |
