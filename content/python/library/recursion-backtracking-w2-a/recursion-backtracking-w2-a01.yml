    - name: negative_guard
      input: -2
      expected: "liftoff"
explanation_markdown: |
  Each recursive call handles one number and defers the rest of the chant to a
  smaller call. The base case (`n <= 0`) returns `"liftoff"` and stops the chain.
  Every other call prepends its own number and a hyphen to whatever the smaller
  call returns, so the string is assembled from the innermost call outward. The
  guard on `n <= 0` also protects against negative inputs, which would otherwise
  recurse forever.
common_mistakes:
  - Forgetting a base case so the recursion never stops.
  - Converting n with str only in some branches, causing a type error when concatenating.
  - Placing the hyphen so the result ends with a trailing dash before liftoff.
