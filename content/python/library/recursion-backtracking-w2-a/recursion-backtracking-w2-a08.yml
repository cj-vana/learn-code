function_name: climb_routes
input_mode: function
solution_sketch: Depth-first backtracking; append each allowed segment that fits, record a route when the remainder hits 0, and undo before trying the next segment.
sample_solution: |
  def climb_routes(data):
      target = data["target"]
      steps = data["steps"]
      routes = []

      def build(remaining, path):
          if remaining == 0:
              routes.append(list(path))
              return
          for step in steps:
              if step <= remaining:
                  path.append(step)
                  build(remaining - step, path)
                  path.pop()

      build(target, [])
      return routes
