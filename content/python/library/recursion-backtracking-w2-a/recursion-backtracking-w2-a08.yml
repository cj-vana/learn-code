prompt_markdown: |
  A hiker covers a trail of length `target` by walking segments, where each
  segment must be one of a few allowed lengths and may be reused. The *order* of
  segments matters because it describes the route taken. Write
  `climb_routes(data)` where `data` has keys `target` (a non-negative integer)
  and `steps` (a list of positive segment lengths). Return a list of every route
  whose segment lengths add up to exactly `target`. Each route is a list of the
  segment lengths in the order they are walked. Try the segment lengths in the
  order they appear in `steps`, so routes come out in that depth-first order.
