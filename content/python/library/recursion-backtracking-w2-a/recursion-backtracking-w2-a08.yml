explanation_markdown: |
  This is classic backtracking. `path` holds the segments chosen so far and
  `remaining` is how much trail is left. When `remaining` reaches 0 a full route
  is recorded (copied with `list(path)` so later edits do not corrupt it). At each
  step the loop tries every allowed segment that still fits, recurses, then pops
  the choice to explore the next option. Because the loop follows the order of
  `steps`, the routes are produced in a predictable depth-first order, and reusing
  segments is allowed since the loop always starts from the full `steps` list.
common_mistakes:
  - Appending path itself instead of a copy, so every recorded route ends up empty.
  - Forgetting to pop after recursing, leaving stale segments in later routes.
  - Trying a segment longer than the remaining distance and producing overshoot routes.
