prompt_markdown: |
  Two warehouses each keep a stock count of parts. Write `merge_counts(data)`
  where `data` is a dict with keys `first` and `second`, each a dict mapping a
  part name to its count. Return one dict with the combined counts: a part in
  both warehouses should have its counts added together.

  The bug to avoid: updating the merged dict with `merged[key] = value`
  overwrites the running total instead of adding to it, so shared parts lose the
  first warehouse's count.
starter_code: |
  def merge_counts(data):
      return {}
function_name: merge_counts
input_mode: function
solution_sketch: Accumulate each dict's entries with get(key, 0) + value so shared keys sum.
sample_solution: |
  def merge_counts(data):
      merged = {}
      for source in (data["first"], data["second"]):
          for key, value in source.items():
              merged[key] = merged.get(key, 0) + value
      return merged
hints:
  - level: 1
    text: A part present in both warehouses must have its counts combined.
  - level: 2
    text: Assigning merged[key] = value throws away any count already there.
  - level: 3
    text: Use merged[key] = merged.get(key, 0) + value for every entry.
tests:
  public:
    - name: overlap
      input: {first: {a: 2, b: 1}, second: {b: 3, c: 4}}
      expected: {a: 2, b: 4, c: 4}
    - name: both_empty
      input: {first: {}, second: {}}
      expected: {}
