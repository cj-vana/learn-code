      input: {first: {red: 1}, second: {red: 1, blue: 2}}
      expected: {red: 2, blue: 2}
    - name: zero_counts
      input: {first: {a: 0}, second: {a: 0}}
      expected: {a: 0}
    - name: three_parts
      input: {first: {p: 3, q: 2}, second: {q: 5, r: 1}}
      expected: {p: 3, q: 7, r: 1}
explanation_markdown: |
  Merging counts is an accumulation problem. Iterating over both source dicts and
  writing `merged[key] = merged.get(key, 0) + value` starts each key at 0 the
  first time it appears and adds to the existing total afterward. Plain
  assignment would replace a shared part's total with only the second
  warehouse's count, silently dropping stock.
common_mistakes:
  - Overwriting with merged[key] = value instead of adding.
  - Using dict.update, which replaces shared counts rather than summing them.
  - Missing parts that appear in only one of the two warehouses.
