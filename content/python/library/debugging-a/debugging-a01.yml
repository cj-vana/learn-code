prompt_markdown: |
  A pottery studio labels its drying shelves starting at 1. Write
  `shelf_labels(n)` returning a list of the shelf numbers `[1, 2, ..., n]`.

  A common beginner bug is looping over `range(n)`, which starts at 0 and stops
  one short. Make sure the first label is 1 and the last label is exactly `n`.
  When `n` is 0 there are no shelves, so return an empty list.
starter_code: |
  def shelf_labels(n):
      return []
function_name: shelf_labels
input_mode: function
solution_sketch: Loop over range(1, n + 1) and collect each number into a list.
sample_solution: |
  def shelf_labels(n):
      labels = []
      for shelf in range(1, n + 1):
          labels.append(shelf)
      return labels
hints:
  - level: 1
    text: The first shelf is numbered 1, not 0.
  - level: 2
    text: range(n) gives 0..n-1, which is off by one at both ends.
  - level: 3
    text: Use range(1, n + 1) so the loop covers 1 through n inclusive.
tests:
  public:
    - name: none
      input: 0
      expected: []
    - name: one
