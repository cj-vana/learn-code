explanation_markdown: |
  Beginners often reach for `range(n)`, but that yields 0 through n-1. Since the
  shelves start at 1 and end at n, the correct bound is `range(1, n + 1)`. The
  upper argument to `range` is exclusive, so `n + 1` is what makes `n` appear.
common_mistakes:
  - Using range(n), which starts at 0 and stops at n-1.
  - Forgetting the +1 so the last shelf n is dropped.
  - Returning None instead of an empty list when n is 0.
