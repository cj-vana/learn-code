explanation_markdown: |
  Comparing an average to a limit is the same as comparing the window's total to
  `limit * span`, so the whole problem stays in integer arithmetic. A fixed-length
  sliding window keeps the current total up to date in constant time per step: add
  the hour entering the window and subtract the hour leaving it. Each window whose
  total lands at or below the threshold is counted, giving an O(n) scan.
common_mistakes:
  - Dividing to get an average and running into floating-point rounding instead of comparing totals.
  - Using a strict less-than and missing windows whose average exactly equals the limit.
  - Rebuilding the window total from scratch each step rather than sliding it.
