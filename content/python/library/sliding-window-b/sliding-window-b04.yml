function_name: calm_windows
input_mode: function
solution_sketch: Slide a fixed window while keeping its running total, counting each window whose total is at most limit times span.
sample_solution: |
  def calm_windows(data):
      readings = data["readings"]
      span = data["span"]
      limit = data["limit"]
      if span <= 0 or span > len(readings):
          return 0
      threshold = limit * span
      total = sum(readings[:span])
      count = 1 if total <= threshold else 0
      for i in range(span, len(readings)):
          total += readings[i] - readings[i - span]
          if total <= threshold:
              count += 1
      return count
hints:
  - level: 1
    text: An average of at most limit over span hours is the same as a total of at most limit times span, which avoids fractions.
  - level: 2
    text: Keep a running total for the current window and slide it one hour at a time.
  - level: 3
    text: After each slide, add the new hour and subtract the departing hour, then check the total against limit * span.
