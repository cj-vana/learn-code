prompt_markdown: |
  A city sensor reports an air-quality index (AQI) once per hour. Health officials
  want to know how many stretches of a fixed number of hours were comfortable on
  average, meaning the average AQI over the stretch was at most a healthy limit.

  Write `calm_windows(data)` where `data` is a dict with three keys: `readings`
  (a list of hourly AQI values), `span` (the number of consecutive hours in a
  stretch), and `limit` (the highest acceptable average). Return how many stretches
  of exactly `span` consecutive hours have an average AQI of at most `limit`. To
  avoid rounding, compare the window's total against `limit * span`. You may assume
  `1 <= span <= len(readings)`.
starter_code: |
