prompt_markdown: |
  An internet radio station records how many people are tuned in during each
  minute of a show. The producer wants to know the busiest continuous stretch of
  a given length so they can schedule the big announcement then.

  Write `busiest_window(data)` where `data` is a dict with two keys:
  `listeners` (a list of per-minute listener counts) and `span` (the number of
  consecutive minutes to consider). Return the largest total number of listeners
  across any block of `span` consecutive minutes. You may assume
  `1 <= span <= len(listeners)`.
starter_code: |
  def busiest_window(data):
      return 0
function_name: busiest_window
input_mode: function
solution_sketch: Sum the first span minutes, then slide by adding the new minute and dropping the one that left the window.
sample_solution: |
  def busiest_window(data):
      listeners = data["listeners"]
      span = data["span"]
      window = sum(listeners[:span])
      best = window
      for i in range(span, len(listeners)):
          window += listeners[i] - listeners[i - span]
          if window > best:
              best = window
      return best
hints:
  - level: 1
    text: You never need to re-add every minute; only the two minutes at the edges of the window change as it moves.
  - level: 2
    text: Start with the sum of the first span minutes, then update it as the window slides forward.
  - level: 3
    text: When the window moves right by one, add listeners[i] and subtract listeners[i - span], then compare against the best so far.
