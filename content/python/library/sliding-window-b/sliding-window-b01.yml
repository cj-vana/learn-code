explanation_markdown: |
  A fixed-length sliding window turns an O(n*span) scan into a single O(n) pass.
  Compute the sum of the first `span` minutes once, then move the window forward
  one minute at a time: each step adds the newly included minute and subtracts the
  minute that just fell off the left edge. Tracking the maximum of these running
  sums gives the busiest stretch without ever re-summing a full window.
common_mistakes:
  - Re-summing every window from scratch, which is slower and easy to get wrong at the edges.
  - Forgetting to subtract the minute that leaves the window when sliding.
  - Initialising the best value to 0, which fails if some counts are meant to be compared as the only window.
