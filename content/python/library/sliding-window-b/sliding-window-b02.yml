function_name: longest_run
input_mode: function
solution_sketch: Grow a window on the right; whenever the running total exceeds the budget, shrink from the left until it fits, tracking the widest valid width.
sample_solution: |
  def longest_run(data):
      leftovers = data["leftovers"]
      budget = data["budget"]
      left = 0
      total = 0
      best = 0
      for right in range(len(leftovers)):
          total += leftovers[right]
          while total > budget and left <= right:
              total -= leftovers[left]
              left += 1
          current = right - left + 1
          if current > best:
              best = current
      return best
hints:
  - level: 1
    text: Because leftovers are never negative, extending the window can only raise the total and shrinking it can only lower it.
  - level: 2
    text: Keep two indices marking the window's edges and a running total of the days between them.
  - level: 3
    text: After adding each new day on the right, advance the left edge while the total is over budget, then measure the window width.
