prompt_markdown: |
  A neighbourhood bakery records how many pastries go unsold each day. Management
  wants to celebrate the longest streak of consecutive days where the total waste
  stayed within a set budget.

  Write `longest_run(data)` where `data` is a dict with two keys: `leftovers`
  (a list of non-negative daily leftover counts) and `budget` (the maximum total
  waste allowed across a streak). Return the length of the longest run of
  consecutive days whose leftovers sum to at most `budget`. If no single day
  fits within the budget, return 0. An empty list returns 0.
starter_code: |
