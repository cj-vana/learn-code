explanation_markdown: |
  With non-negative values, the running total is monotonic in the window's width,
  which is exactly what makes a variable-length sliding window work. Extend the
  right edge one day at a time and add each day to the total. Whenever the total
  exceeds the budget, advance the left edge, subtracting days until the window is
  valid again. The widest valid window seen along the way is the answer, and each
  index moves forward at most once, so the whole scan is O(n).
common_mistakes:
  - Trying every start and end pair, which is O(n^2) and unnecessary here.
  - Forgetting to subtract the leftmost day's leftovers when shrinking the window.
  - Not handling a day whose own leftovers already exceed the budget, which should leave the streak at 0 for that day.
