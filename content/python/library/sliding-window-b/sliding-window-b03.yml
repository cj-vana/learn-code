explanation_markdown: |
  Each block overlaps the previous one in all but its first and last day, so once
  you know one block's total you can get the next in constant time: add the day
  entering on the right and subtract the day leaving on the left. Starting from the
  sum of the first `window` days, one pass produces every block total in O(n).
  Guarding against a window longer than the data (or a non-positive window) keeps
  the function from returning bogus blocks.
common_mistakes:
  - Producing the wrong number of blocks by looping past the last valid start day.
  - Recomputing each block sum from scratch instead of sliding.
  - Forgetting the empty-list result when the window does not fit the data.
