prompt_markdown: |
  A weather station stores the millimetres of rain that fell on each day. To spot
  wet spells, an analyst wants the total rainfall for every block of consecutive
  days of a fixed length, listed in order from the earliest block to the latest.

  Write `rolling_totals(data)` where `data` is a dict with two keys: `rainfall`
  (a list of daily rainfall amounts) and `window` (the block length in days).
  Return a list where each entry is the sum of one block of `window` consecutive
  days. If `window` is larger than the number of days recorded, or is not
  positive, return an empty list.
starter_code: |
  def rolling_totals(data):
      return []
function_name: rolling_totals
input_mode: function
solution_sketch: Sum the first block, then slide one day at a time by adding the incoming day and dropping the outgoing one, appending each total.
sample_solution: |
  def rolling_totals(data):
      rainfall = data["rainfall"]
      window = data["window"]
      if window <= 0 or window > len(rainfall):
          return []
      total = sum(rainfall[:window])
      result = [total]
      for i in range(window, len(rainfall)):
          total += rainfall[i] - rainfall[i - window]
          result.append(total)
      return result
hints:
  - level: 1
    text: The number of blocks is the number of days minus the window length, plus one, when the window fits.
  - level: 2
    text: Compute the first block's total directly, then reuse it for the next block instead of re-adding everything.
  - level: 3
    text: Sliding forward means adding rainfall[i] and subtracting rainfall[i - window], then appending the new total.
