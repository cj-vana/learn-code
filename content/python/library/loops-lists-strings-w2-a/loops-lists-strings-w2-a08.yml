explanation_markdown: |
  Starting from the second character, each step asks whether the current character
  matches the previous one. A match extends the current run; a mismatch restarts it
  at 1. A separate `best` remembers the longest run seen so far, updated whenever the
  current run grows past it. Guarding the empty string up front keeps `best` from
  reporting 1 for a signal with no characters.
common_mistakes:
  - Returning `current` at the end instead of the tracked `best` run.
  - Resetting the run to 0 rather than 1 after a mismatch.
  - Forgetting the empty-string case and returning 1 for it.
