prompt_markdown: |
  A lighthouse logs its beam once per second as a string of characters, for example
  `'x'` when the beam is on and `'.'` when it is off. Write `longest_streak(signal)`
  that returns the length of the longest run of the *same* character appearing in a
  row. An empty string returns 0.
starter_code: |
  def longest_streak(signal):
      return 0
function_name: longest_streak
input_mode: function
solution_sketch: Walk the string comparing each character to the previous one, growing the current run on a match and resetting it otherwise, while tracking the best run seen.
sample_solution: |
  def longest_streak(signal):
      if not signal:
          return 0
      best = 1
      current = 1
      for i in range(1, len(signal)):
          if signal[i] == signal[i - 1]:
              current += 1
              if current > best:
                  best = current
          else:
              current = 1
      return best
hints:
  - level: 1
    text: Compare each character with the one just before it.
  - level: 2
    text: Grow the current run when they match and reset it to 1 when they differ.
  - level: 3
    text: Keep a separate best value that only ever increases, and return it.
