    - name: decreasing
      input: [10, 5, 1]
      expected: [10, 15, 16]
explanation_markdown: |
  A single running sum carries the total so far. Each day you add that day's
  rainfall and then append the new total, so position `i` always reflects every day
  up to and including day `i`. Recording the sum *after* adding is what makes the
  totals inclusive, and the whole thing is one O(n) pass.
common_mistakes:
  - Appending the running sum before adding the current day, shifting every total.
  - Resetting the running sum inside the loop and losing the accumulation.
  - Returning only the final total instead of the list of partial totals.
