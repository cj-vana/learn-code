prompt_markdown: |
  A rain gauge records how much rain fell each day, in millimeters. Write
  `running_rainfall(daily)` that returns a new list where each position holds the
  total rainfall from the first day up to and including that day. For example, the
  third position holds the sum of days one, two, and three. An empty list returns `[]`.
starter_code: |
  def running_rainfall(daily):
      return []
function_name: running_rainfall
input_mode: function
solution_sketch: Keep a running sum, appending it to the output after adding each day's rainfall.
sample_solution: |
  def running_rainfall(daily):
      totals = []
      running = 0
      for amount in daily:
          running += amount
          totals.append(running)
      return totals
hints:
  - level: 1
    text: Keep one number that grows as you move through the days.
  - level: 2
    text: Add the current day's rainfall to that running sum before recording it.
  - level: 3
    text: Append the updated running sum to the result on every iteration.
tests:
  public:
    - name: empty
      input: []
      expected: []
    - name: single_day
      input: [5]
      expected: [5]
    - name: three_days
      input: [1, 2, 3]
