explanation_markdown: |
  Using `caption.split()` with no argument splits on any run of whitespace and
  discards empty pieces, so leading, trailing, and doubled spaces are handled for
  free. Because `split()` never yields an empty word, `word[0]` is always safe, and
  `word[0].isupper()` is `True` only for an initial `A`-`Z`, ignoring digits and
  punctuation.
common_mistakes:
  - Calling `split(" ")`, which keeps empty strings when spaces are doubled.
  - Checking `isupper()` on the whole word instead of just the first character.
  - Assuming every word is non-empty without letting `split()` filter the blanks.
