prompt_markdown: |
  A photo caption is a string of words separated by whitespace. Write
  `count_capitalized(caption)` that returns how many words begin with an uppercase
  letter (`A` through `Z`). Words may be separated by any amount of whitespace, and
  extra spaces at the ends should be ignored. An empty caption returns 0.
starter_code: |
  def count_capitalized(caption):
      return 0
function_name: count_capitalized
input_mode: function
solution_sketch: Split into words on whitespace, then count the words whose first character is uppercase.
sample_solution: |
  def count_capitalized(caption):
      total = 0
      for word in caption.split():
          if word[0].isupper():
              total += 1
      return total
hints:
  - level: 1
    text: str.split() with no argument breaks on runs of whitespace and drops empties.
  - level: 2
    text: The first character of a word is `word[0]`.
  - level: 3
    text: str.isupper() on that first character tells you whether the word starts capitalized.
tests:
