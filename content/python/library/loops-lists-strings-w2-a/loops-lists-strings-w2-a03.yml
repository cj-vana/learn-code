explanation_markdown: |
  Start by assuming the first stop is busiest, then walk the rest of the list. You
  replace the remembered position only when a later count is *strictly* larger, so
  an equal count never overtakes an earlier stop and ties resolve to the earlier
  one. Adding 1 converts the zero-based index into the human-friendly stop number.
common_mistakes:
  - Using `>=` in the comparison, which makes a tie jump to the later stop.
  - Returning the count itself instead of the stop position.
  - Forgetting the empty-route case and indexing into an empty list.
