prompt_markdown: |
  A city bus records how many riders boarded at each stop along its route, in the
  order the stops were visited. Write `busiest_stop(boardings)` that returns the
  **1-based** position of the stop where the most riders boarded. If two stops tie
  for the most, return the earlier one. An empty route returns 0.
starter_code: |
  def busiest_stop(boardings):
      return 0
function_name: busiest_stop
input_mode: function
solution_sketch: Track the index of the largest boarding seen so far, replacing it only on a strictly larger value so ties keep the earlier stop.
sample_solution: |
  def busiest_stop(boardings):
      if not boardings:
          return 0
      best_index = 0
      for i in range(1, len(boardings)):
          if boardings[i] > boardings[best_index]:
              best_index = i
      return best_index + 1
hints:
  - level: 1
    text: Remember the position of the biggest count you have seen so far.
  - level: 2
    text: Only move that position when you find a strictly larger count.
  - level: 3
    text: The route positions are 1-based, so add 1 to the stored index at the end.
