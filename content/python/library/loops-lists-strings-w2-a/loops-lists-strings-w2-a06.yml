prompt_markdown: |
  At a busy on-ramp, two lanes take turns merging: one car from the left lane, then
  one from the right, then left again, and so on. Write `zipper_merge(lanes)` where
  `lanes` is a dict with `"left"` and `"right"`, each a list of car IDs. Return a
  single list with the cars interleaved, starting with the left lane. When one lane
  runs out, append the remaining cars of the longer lane in their original order.
starter_code: |
  def zipper_merge(lanes):
      return []
function_name: zipper_merge
input_mode: function
solution_sketch: Step an index across both lanes, appending the left car then the right car whenever each still has a car at that index.
sample_solution: |
  def zipper_merge(lanes):
      left = lanes["left"]
      right = lanes["right"]
      merged = []
      i = 0
      while i < len(left) or i < len(right):
          if i < len(left):
              merged.append(left[i])
          if i < len(right):
              merged.append(right[i])
          i += 1
      return merged
hints:
  - level: 1
    text: Walk one shared index across both lanes at the same time.
  - level: 2
    text: At each index, add the left car (if any) and then the right car (if any).
  - level: 3
    text: Keep looping while either lane still has a car at the current index.
tests:
  public:
    - name: equal_lengths
      input: {left: [1, 3], right: [2, 4]}
      expected: [1, 2, 3, 4]
    - name: both_empty
      input: {left: [], right: []}
      expected: []
    - name: left_longer
      input: {left: [a, c, e], right: [b]}
      expected: [a, b, c, e]
  validation:
    - name: right_longer
      input: {left: [x], right: [1, 2, 3]}
      expected: [x, 1, 2, 3]
    - name: left_empty
      input: {left: [], right: [7, 8]}
      expected: [7, 8]
    - name: single_each
      input: {left: [k], right: [q]}
      expected: [k, q]
explanation_markdown: |
  A single index walks both lanes together. At each step you add the left car when
  the left lane still reaches that index, then the right car under the same guard,
  which naturally alternates the two lanes. The loop keeps going while *either*
  lane has a car left, so once the shorter lane is exhausted the longer lane's
  remaining cars are appended in order.
common_mistakes:
  - Stopping at the length of the shorter lane and dropping the leftover cars.
  - Adding the right car before the left one and breaking the required order.
  - Using one index per lane and losing the lock-step interleaving.
