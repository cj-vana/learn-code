prompt_markdown: |
  A loading dock weighs every package before a forklift lifts it. The forklift can
  only handle packages up to a weight limit, so heavier ones must be moved by hand.
  Write `count_overweight(shipment)` where `shipment` is a dict with `"weights"`
  (a list of numbers, in kilograms) and `"limit"` (a number). Return how many
  packages weigh *strictly more* than the limit. An empty list of weights returns 0.
starter_code: |
  def count_overweight(shipment):
      return 0
function_name: count_overweight
input_mode: function
solution_sketch: Read the weights and limit from the dict, then count how many weights exceed the limit in one pass.
sample_solution: |
  def count_overweight(shipment):
      weights = shipment["weights"]
      limit = shipment["limit"]
      total = 0
      for weight in weights:
          if weight > limit:
              total += 1
      return total
hints:
  - level: 1
    text: Pull the list and the limit out of the dict before you loop.
  - level: 2
    text: Keep one counter and check each weight against the limit.
  - level: 3
    text: Use a strict greater-than so a package exactly at the limit does not count.
tests:
