explanation_markdown: |
  Unpack `weights` and `limit` from the dict, then scan the list once with a
  running counter. The comparison `weight > limit` uses strict greater-than, so a
  package sitting exactly at the limit is fine and is not counted. One pass makes
  this O(n).
common_mistakes:
  - Using `>=` and counting packages that sit exactly at the limit.
  - Forgetting to read both keys out of the dict before looping.
  - Returning the heaviest weight instead of the count.
