body_markdown: |
  `sorted(seq)` returns a brand-new sorted list and leaves the original
  alone, while `seq.sort()` rearranges the list in place and returns
  `None`. Mixing those up is a common bug:

  ```python
  times = [31, 12, 27]
  print(sorted(times))  # [12, 27, 31]
  print(times)          # [31, 12, 27]  (unchanged)
  ```

  To sort by something other than the raw value, pass a `key` function.
  Python calls it on each item and sorts by what it returns. Here we sort
  runners by their finish time, the second slot of each tuple:

  ```python
  runners = [("Ada", 31), ("Bo", 12), ("Cy", 27)]
  runners.sort(key=lambda r: r[1])
  print(runners)  # [('Bo', 12), ('Cy', 27), ('Ada', 31)]
  ```

  With no key, tuples compare position by position: first elements decide
  the order, and ties fall through to the next element. Add `reverse=True`
  to flip the direction:

  ```python
  print(sorted([(1, 9), (1, 3), (0, 8)]))  # [(0, 8), (1, 3), (1, 9)]
  ```
checkpoints:
  - question: How does `sorted(xs)` differ from `xs.sort()`?
    answer: sorted(xs) returns a new sorted list and leaves xs unchanged, while xs.sort() reorders xs in place and returns None.
    explanation: One is a function that produces a copy; the other mutates the list and gives back None.
  - question: How would you sort a list of (name, age) tuples by age?
    answer: "Pass key=lambda pair: pair[1] to sorted or .sort()."
    explanation: The key function selects the second element so ordering is driven by age instead of name.
  - question: When two tuples are compared with no key function, what decides which comes first?
    answer: The first elements are compared, and if they tie the next elements break the tie, and so on.
    explanation: Tuple comparison is lexicographic, working left to right until it finds a difference.
