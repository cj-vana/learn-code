body_markdown: |
  An `if` statement does not need a real `True` or `False`. Python will take
  *any* value and decide whether it is "truthy" or "falsy". A small set of
  values are treated as falsy: the number `0`, an empty string `""`, an empty
  list `[]`, an empty dictionary `{}`, and the special value `None`. Almost
  everything else is truthy.

  ```python
  name = ""
  if name:
      print("Hello", name)
  else:
      print("No name was given")   # this runs, because "" is falsy
  ```

  You can see how Python judges a value by passing it to `bool()`:

  ```python
  print(bool(0))      # False
  print(bool(42))     # True
  print(bool(""))     # False
  print(bool("hi"))   # True
  print(bool([]))     # False
  ```

  This lets you write natural checks like `if items:` to mean "if the list has
  anything in it" instead of the longer `if len(items) > 0:`.
checkpoints:
  - question: What does bool("") evaluate to?
    answer: "False"
    explanation: An empty string is one of Python's falsy values, so bool("") is False.
  - question: Is the integer 0 truthy or falsy?
    answer: Falsy
    explanation: Zero of any numeric type is falsy, while any non-zero number is truthy.
  - question: Given items = [], does the body of `if items:` run?
    answer: No, the body is skipped
    explanation: An empty list is falsy, so the condition is False and the block does not execute.
