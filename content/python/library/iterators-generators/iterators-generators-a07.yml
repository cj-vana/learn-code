explanation_markdown: |
  The `areas` generator has no natural end, so responsibility for stopping sits
  with the consumer. The `for` loop pulls one area at a time and breaks the instant
  an area is no longer strictly below `limit`, which is why an area equal to
  `limit` (like `25` when the limit is `25`) is excluded. Because the generator
  computes each square only when asked, the loop touches just a handful of values
  and never tries to build the impossible infinite list.
common_mistakes:
  - Calling list() on the infinite generator, which loops forever.
  - Using > instead of >= so an area equal to the limit sneaks in.
  - Appending first and breaking afterward, which includes one area too many.
