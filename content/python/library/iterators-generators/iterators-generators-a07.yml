prompt_markdown: |
  A quarry cuts square tiles of ever-increasing side length: side 1, side 2,
  side 3, and so on, forever. The area of the tile with side `n` is `n * n`. Write
  `tiles_under(limit)` that returns a **list** of the tile areas that are strictly
  less than `limit`, starting from side 1 and going up.

  The catch: model the tiles with an **infinite generator** (a `while True` loop
  that yields `n * n` for growing `n`). Since it never stops on its own, you must
  control consumption yourself, breaking out as soon as an area reaches `limit`.

  For example, `tiles_under(30)` returns `[1, 4, 9, 16, 25]`.
starter_code: |
  def tiles_under(limit):
      # Make an infinite generator of square areas, then break once area >= limit.
      return []
function_name: tiles_under
input_mode: function
solution_sketch: An infinite generator yields 1, 4, 9, ...; loop over it, appending until an area reaches the limit, then break.
sample_solution: |
  def tiles_under(limit):
      def areas():
          n = 1
          while True:
              yield n * n
              n += 1

      result = []
      for area in areas():
          if area >= limit:
              break
          result.append(area)
      return result
hints:
  - level: 1
    text: An infinite generator is safe as long as something outside it stops pulling values.
  - level: 2
    text: Loop over the generator and break the moment an area is not strictly less than the limit.
  - level: 3
    text: In the loop, if area >= limit break; otherwise append it. This stops right before the first area that meets the limit.
