prompt_markdown: |
  A choir director calls singers to the stage one roster at a time, cycling through
  the sections so nobody waits too long: the first name from section one, then the
  first from section two, and so on, then back to the second name of section one.
  When a section runs out it is simply skipped on later passes, and the remaining
  sections keep alternating.

  Write `interleave_rosters(job)` where `job` is a dictionary with one key
  `"rosters"`, a list of lists (the sections, which may be of **unequal length**).
  Return a single **list** with every name in this round-robin order.

  You must build the result by driving the raw iterator protocol yourself: turn
  each roster into an iterator with `iter()`, pull one value at a time with
  `next()`, and use a `try`/`except StopIteration` to notice when a roster is
  exhausted. Do **not** flatten the rosters first, and do **not** use `itertools`.

  Rules for the edges: an empty `"rosters"` list, or rosters that are all empty,
  produce an empty list. Empty sections contribute nothing but do not stop the
  others.

  For example, `interleave_rosters({"rosters": [[1, 2, 3], [10, 20], [100]]})`
  returns `[1, 10, 100, 2, 20, 3]`.
starter_code: |
  def interleave_rosters(job):
      # Turn each roster into an iterator with iter(), then pull one value
      # per roster each pass using next(), catching StopIteration to drop
      # exhausted rosters. Do not flatten first; do not use itertools.
      return []
function_name: interleave_rosters
input_mode: function
solution_sketch: Build one iterator per roster, then loop in passes. On each pass, walk the surviving iterators, call next() on each, keep the ones that yielded, and drop the ones that raised StopIteration. Stop when no iterators survive a pass.
sample_solution: |
  def interleave_rosters(job):
      iterators = [iter(roster) for roster in job["rosters"]]
      result = []
      while iterators:
          survivors = []
          for it in iterators:
              try:
                  result.append(next(it))
              except StopIteration:
                  continue
              survivors.append(it)
          iterators = survivors
      return result
hints:
  - level: 1
    text: Convert each roster into its own iterator with iter() so you can advance them independently, one step per pass, instead of indexing into the lists.
  - level: 2
    text: On each pass, try next(it) for every iterator still in play. If it yields a value, append it and keep that iterator; if it raises StopIteration, drop that iterator from the next pass.
  - level: 3
    text: Repeat passes until no iterators survive. Rebuild the list of live iterators each pass so exhausted rosters fall away while the rest keep alternating in their original order.
