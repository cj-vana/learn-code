explanation_markdown: |
  Round-robin merging is easy to get wrong if you index into the lists, because the
  sections have different lengths and you would have to keep checking bounds. Driving
  the iterator protocol directly sidesteps that: each roster becomes an iterator, and
  `next()` hands back the next name or signals exhaustion by raising `StopIteration`.
  A pass over the surviving iterators appends one name from each roster that still has
  one, and rebuilding the survivor list means an exhausted roster is quietly dropped
  before the next pass, while the rest keep alternating in order.

  This is exactly the machinery a `for` loop hides for you, made explicit. The loop
  ends when a whole pass produces no survivors. Every name is pulled once and appended
  once, so the work is linear in the total number of names across all rosters.
common_mistakes:
  - Flattening the rosters or reaching for itertools instead of pulling from iterators, which defeats the point of the drill.
  - Letting one StopIteration end the whole merge, dropping names that remain in the longer rosters.
  - Advancing every iterator the same fixed number of times, which reads past the end of the shorter sections.
