function_name: spot_check
input_mode: function
solution_sketch: An iterator holds a position starting at k-1 and advances by k each step, raising StopIteration once the position passes the end.
sample_solution: |
  def spot_check(spec):
      class Stride:
          def __init__(self, items, k):
              self.items = items
              self.k = k
              self.pos = k - 1

          def __iter__(self):
              return self

          def __next__(self):
              if self.pos >= len(self.items):
                  raise StopIteration
              value = self.items[self.pos]
              self.pos += self.k
              return value

      return list(Stride(spec["items"], spec["k"]))
hints:
