explanation_markdown: |
  The iterator carries one piece of state, the current index `pos`, and every call
  to `__next__` reads `items[pos]` then jumps ahead by `k`. Starting `pos` at
  `k - 1` lands on the k-th element (lists are zero-indexed), and the
  `pos >= len(items)` guard raises `StopIteration` the moment the stride would
  step off the end. Because `list()` keeps calling `next()` until that signal, it
  collects exactly the sampled items with no bounds errors.
common_mistakes:
  - Starting pos at k instead of k - 1, which skips the first sample.
  - Checking the bound with > instead of >=, causing an index error on the item just past the end.
  - Advancing pos by 1 instead of by k, sampling every item.
