prompt_markdown: |
  On a bottling line, a quality inspector does not check every bottle. Standing at
  the belt, they grab the `k`-th bottle, then the `2k`-th, then the `3k`-th, and
  so on. Write `spot_check(spec)` where `spec` is a dict with keys `"items"` (the
  list of bottles in belt order) and `"k"` (the sampling stride, a positive
  integer). Return a **list** of the sampled bottles.

  Build a custom **iterator class** (with `__iter__` and `__next__`) that walks
  the list in strides of `k`, starting at the `k`-th item (index `k - 1`). Let
  `list()` drive it. If the stride steps past the end, iteration stops.

  For example, `spot_check({"items": [10, 20, 30, 40, 50, 60], "k": 2})` returns
  `[20, 40, 60]`.
