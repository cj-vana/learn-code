  - level: 2
    text: In __next__, stop with StopIteration once the position is past the last index; otherwise read the item and advance the position by k.
  - level: 3
    text: Store pos = k - 1 in __init__; each __next__ checks pos >= len(items), returns items[pos], then does pos += k.
