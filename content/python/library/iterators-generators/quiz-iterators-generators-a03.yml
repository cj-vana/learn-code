questions:
  - id: q1
    prompt: |
      What does this print?

          def g():
              for n in [1, 2, 3]:
                  yield n * n
          print(list(g()))
    choices:
      - '[1, 4, 9]'
      - '[1, 2, 3]'
      - '[2, 4, 6]'
      - '9'
    correct_choice: '[1, 4, 9]'
    explanation: |
      The generator yields each number squared, and list() collects them into
      [1, 4, 9].
    concepts:
      - python.iterators_generators
  - id: q2
    prompt: |
      What does this print?

          g = (n for n in [1, 2, 3])
          print(sum(g))
          print(sum(g))
    choices:
      - |
        6
        0
      - |
        6
        6
      - |
        0
        6
      - |
        6
        12
    correct_choice: |
      6
      0
    explanation: |
      The first sum() exhausts the generator, giving 6. The generator is now empty,
      so the second sum() sees no values and returns 0.
    concepts:
      - python.iterators_generators
  - id: q3
    prompt: |
      What does this print?

          def counter():
              n = 0
              while True:
                  n += 1
                  yield n
          c = counter()
          print([next(c) for _ in range(3)])
    choices:
      - '[1, 2, 3]'
      - '[0, 1, 2]'
      - '[1, 1, 1]'
      - it loops forever
    correct_choice: '[1, 2, 3]'
    explanation: |
      Although counter() is infinite, only three next() calls are made, pulling 1,
      2, and 3 before stopping.
    concepts:
      - python.iterators_generators
  - id: q4
    prompt: |
      What does this print?

          def evens(nums):
              for n in nums:
                  if n % 2 == 0:
                      yield n
          def plus_one(nums):
              for n in nums:
                  yield n + 1
          print(list(plus_one(evens([1, 2, 3, 4]))))
    choices:
      - '[3, 5]'
      - '[2, 4]'
      - '[1, 3]'
      - '[3, 4, 5]'
    correct_choice: '[3, 5]'
    explanation: |
      evens yields 2 and 4; piping those into plus_one yields 3 and 5, so the chain
      produces [3, 5].
    concepts:
      - python.iterators_generators
      - patterns.filtering
  - id: q5
    prompt: |
      What does this print?

          def totals(nums):
              t = 0
              for n in nums:
                  t += n
                  yield t
          print(list(totals([4, 0, 2])))
    choices:
      - '[4, 4, 6]'
      - '[4, 0, 2]'
      - '[0, 4, 6]'
      - '[6, 6, 6]'
    correct_choice: '[4, 4, 6]'
    explanation: |
      The running total is yielded after each addition: 4, then 4 + 0 = 4, then
      4 + 2 = 6.
    concepts:
      - python.iterators_generators
      - patterns.running_total
