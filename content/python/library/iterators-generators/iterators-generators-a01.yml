    - name: negative
      input: -2
      expected: []
explanation_markdown: |
  The generator `ticks` pauses at each `yield`, handing back one number and
  resuming only when the next value is requested. Wrapping it in `list()`
  *exhausts* the generator, pulling every yielded value into a real list. Because
  the `while n > 0` guard is false from the start when `seconds` is zero or
  negative, no values are yielded and the list comes back empty, exactly what we
  want.
common_mistakes:
  - Using return inside the loop, which stops after a single value instead of yielding many.
  - Forgetting to wrap the generator in list(), so the function returns a generator object that never equals the expected list.
  - Counting up instead of down, or including 0 in the output.
