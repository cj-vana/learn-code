prompt_markdown: |
  Before an observatory opens its dome, it counts down out loud. Write
  `countdown_frames(seconds)` that builds and returns a **list** of the countdown
  numbers from `seconds` down to `1`.

  Do it with a *generator*: write a small generator (using `yield`) that produces
  each number one at a time, then hand it to `list()` to collect the results. If
  `seconds` is `0` or negative, the list should be empty.

  For example, `countdown_frames(3)` returns `[3, 2, 1]`.
starter_code: |
  def countdown_frames(seconds):
      # Write a generator with yield, then return list(...) of it.
      return []
function_name: countdown_frames
input_mode: function
solution_sketch: A generator yields seconds, seconds-1, ... down to 1; list() exhausts it into the result.
sample_solution: |
  def countdown_frames(seconds):
      def ticks(n):
          while n > 0:
              yield n
              n -= 1
      return list(ticks(seconds))
hints:
  - level: 1
    text: A generator function looks like a normal function but uses yield instead of return to hand back each value.
  - level: 2
    text: Inside a while loop that runs while n > 0, yield n and then decrement n by one.
  - level: 3
    text: Define ticks(n) that yields n, n-1, ... while n > 0, then return list(ticks(seconds)) to materialize it.
tests:
  public:
