prompt_markdown: |
  A vineyard measures the sugar level (in brix) of grape samples. Readings outside
  an acceptable band are sensor noise and should be dropped; the survivors are
  reported relative to the band's floor. Write `ripeness_pipeline(spec)` where
  `spec` is a dict with keys `"readings"` (a list of numbers), `"low"` and
  `"high"` (the inclusive band), and `"base"` (a number to subtract). Return a
  **list** of the kept readings, each with `base` subtracted, in original order.

  Build this as a **chain of two generators**: one that yields only the readings
  inside `[low, high]`, and one that yields each of those minus `base`. Feed the
  first generator straight into the second, then materialize with `list()`.

  For example, `ripeness_pipeline({"readings": [15, 22, 30, 25], "low": 18,
  "high": 26, "base": 18})` returns `[4, 7]`.
