function_name: ripeness_pipeline
input_mode: function
solution_sketch: One generator yields readings within the band, a second yields each minus base, and the first pipes into the second before list() collects the result.
sample_solution: |
  def ripeness_pipeline(spec):
      def in_band(readings, low, high):
          for r in readings:
              if low <= r <= high:
                  yield r

      def shift(readings, base):
          for r in readings:
              yield r - base

      filtered = in_band(spec["readings"], spec["low"], spec["high"])
      return list(shift(filtered, spec["base"]))
