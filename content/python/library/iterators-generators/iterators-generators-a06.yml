explanation_markdown: |
  Each stage is a lazy generator, and connecting them means a reading flows all
  the way through, filtered and then shifted, before the next one is pulled. No
  intermediate list of filtered readings is ever built; `shift` simply iterates
  whatever `in_band` hands it. The band check uses an inclusive `low <= r <= high`,
  so the endpoints are kept, and iterating the source in order preserves the
  original order of the survivors. `list()` at the very end drives the whole
  pipeline to completion.
common_mistakes:
  - Subtracting base before filtering, so the band comparison runs on already-shifted numbers.
  - Using an exclusive comparison and dropping readings exactly on the boundary.
  - Materializing the filtered readings into a list first, which defeats the point of chaining lazy generators.
