explanation_markdown: |
  This is the machinery a `for` loop uses under the hood. `list()` calls `iter()`
  once to get the iterator (here the instance returns itself), then calls `next()`
  repeatedly. Each `__next__` hands back the current serial and updates its own
  state, and when `remaining` reaches zero it raises `StopIteration`, the agreed
  signal that iteration is over. Because the object *is* its own iterator, it is a
  one-shot: after `list()` drains it, nothing is left, which is fine here since we
  materialize it exactly once.
common_mistakes:
  - Forgetting to raise StopIteration, so iteration never terminates.
  - Advancing the counter but returning the already-incremented value, which is off by one.
  - Having __iter__ return something without a __next__ method, so list() cannot drive it.
