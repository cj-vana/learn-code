function_name: stamp_serials
input_mode: function
solution_sketch: A class tracks the current serial and how many remain; __next__ raises StopIteration when none remain, and list() collects the rest.
sample_solution: |
  def stamp_serials(spec):
      class Serials:
          def __init__(self, start, count):
              self.current = start
              self.remaining = count

          def __iter__(self):
              return self

          def __next__(self):
              if self.remaining <= 0:
                  raise StopIteration
              value = self.current
              self.current += 1
              self.remaining -= 1
              return value

      return list(Serials(spec["start"], spec["count"]))
