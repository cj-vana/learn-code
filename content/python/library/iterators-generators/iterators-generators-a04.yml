prompt_markdown: |
  A foundry stamps a run of cast plates with consecutive serial numbers. Write
  `stamp_serials(spec)` where `spec` is a dict with keys `"start"` (the first
  serial number) and `"count"` (how many plates to stamp). Return a **list** of
  the serials, in stamping order.

  Do it by hand-building an **iterator class** that implements the iterator
  protocol: an `__iter__` method that returns the iterator, and a `__next__`
  method that returns the next serial or raises `StopIteration` once the run is
  finished. Then let `list()` drive it. A `count` of `0` returns an empty list.

  For example, `stamp_serials({"start": 40, "count": 3})` returns `[40, 41, 42]`.
