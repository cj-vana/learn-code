prompt_markdown: |
  A print shop logs ink-drop readings, some of which are zero or negative because
  of sensor glitches. Write `positive_squares(readings)` that returns a **list**
  containing the square of every reading that is strictly greater than zero, in
  their original order.

  Build it with a **generator expression** (round parentheses, not square
  brackets) and pass it straight to `list()`. Non-positive readings are skipped.

  For example, `positive_squares([-1, 2, 3, 0])` returns `[4, 9]`.
starter_code: |
  def positive_squares(readings):
      # Use a generator expression: list(n * n for n in readings if ...)
      return []
function_name: positive_squares
input_mode: function
solution_sketch: A filtered generator expression yields n*n for each positive n; list() collects them.
sample_solution: |
  def positive_squares(readings):
      return list(n * n for n in readings if n > 0)
hints:
  - level: 1
    text: A generator expression looks like a comprehension but uses round parentheses, and stays lazy until consumed.
  - level: 2
    text: The filter goes at the end as an if clause, so only readings greater than zero contribute.
  - level: 3
    text: Return list(n * n for n in readings if n > 0).
