explanation_markdown: |
  A generator expression `(n * n for n in readings if n > 0)` describes the work
  without doing it up front. Passing it to `list()` drives the generator to
  completion, computing each square only as it is pulled. The `if n > 0` clause
  filters out zeros and negatives before squaring, and iterating the source in
  order preserves the original order of the survivors.
common_mistakes:
  - Squaring before filtering, so a negative reading sneaks in as a positive square.
  - Using square brackets, which builds an eager list comprehension rather than the requested lazy generator expression.
  - Including zero because the condition uses >= instead of >.
