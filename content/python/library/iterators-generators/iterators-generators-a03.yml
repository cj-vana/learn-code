prompt_markdown: |
  A greenhouse logs how many litres it pours into its tank each hour, and the
  keeper wants a *running ledger*: after each pour, how much water has gone in so
  far. Write `water_ledger(amounts)` that returns a **list** where each element is
  the cumulative total up to and including that hour.

  Build it with a **generator function**: use `yield` to hand back the running
  total one step at a time, then wrap the generator in `list()` to collect the
  ledger. An empty log returns an empty list.

  For example, `water_ledger([2, 3, 5])` returns `[2, 5, 10]`.
starter_code: |
  def water_ledger(amounts):
      # Write a generator that yields the running total, then return list(...) of it.
      return []
function_name: water_ledger
input_mode: function
solution_sketch: A generator keeps a total, adds each amount, and yields the total after every addition; list() collects them.
sample_solution: |
  def water_ledger(amounts):
      def ledger(nums):
          total = 0
          for n in nums:
              total += n
              yield total
      return list(ledger(amounts))
hints:
  - level: 1
    text: Keep one running total variable and yield it again after each new amount is added.
  - level: 2
    text: Inside the generator, start total at 0, then for each amount do total += n and yield total.
  - level: 3
    text: Define ledger(nums) that accumulates total and yields it every iteration, then return list(ledger(amounts)).
