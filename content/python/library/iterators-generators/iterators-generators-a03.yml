explanation_markdown: |
  A running total needs *state that survives between values*, and that is exactly
  what a generator gives you: the `total` variable persists across every `yield`.
  Each iteration adds the current amount and then yields the new total, so the
  generator emits the ledger one entry at a time. Wrapping it in `list()` exhausts
  the generator into the concrete list the grader compares against. Because the
  loop never runs for an empty input, the ledger comes back empty.
common_mistakes:
  - Yielding the raw amount instead of the accumulated total.
  - Resetting total to 0 inside the loop, which discards the accumulation.
  - Returning the generator object itself instead of wrapping it in list().
