solution_sketch: An inner generator guards the degenerate sizes, then walks the start index from 0 to len(readings) - size, slices each window, and yields [min(window), max(window)]. The outer function returns list() of that generator.
sample_solution: |
  def windowed_stats(job):
      readings = job["readings"]
      size = job["size"]

      def windows(seq, width):
          if width <= 0 or width > len(seq):
              return
          for start in range(len(seq) - width + 1):
              window = seq[start:start + width]
              yield [min(window), max(window)]

      return list(windows(readings, size))
hints:
  - level: 1
    text: There are len(readings) - size + 1 windows when size fits. Let the window's starting index run over range(len(readings) - size + 1).
  - level: 2
    text: For each start index, take the slice readings[start:start + size] and yield [min(slice), max(slice)]. Using yield makes the function a generator that produces windows lazily.
  - level: 3
    text: Guard the degenerate cases first by returning from the generator (yielding nothing) when size is 0 or negative or larger than the list, then wrap the generator in list() in the outer function.
