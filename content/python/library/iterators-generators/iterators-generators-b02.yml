prompt_markdown: |
  A harbour tide gauge logs a long series of water-level readings, and the
  forecasters want the lowest and highest reading within every fixed-width window
  as the window slides one step at a time. Write `windowed_stats(job)` where `job`
  is a dictionary with keys:

  - `"readings"`: a list of numbers, and
  - `"size"`: the window width `n`.

  Return a **list** where each element is the two-item list `[min, max]` for one
  window, in left-to-right order. The windows are consecutive slices of length `n`
  sliding by one, so a series of length `L` yields `L - n + 1` windows.

  Compute the windows with a **generator defined inside the function** that yields
  one `[min, max]` pair per window, and finish by wrapping it with `list()`, so the
  windows are produced lazily rather than all at once.

  Edge rules: if `size` is `0` or negative, or larger than the number of readings,
  or the readings list is empty, return an empty list. When `size` is `1`, every
  window is a single reading, so each pair is `[x, x]`.

  For example, `windowed_stats({"readings": [4, 2, 7, 3], "size": 2})` looks at the
  windows `[4, 2]`, `[2, 7]`, `[7, 3]` and returns `[[2, 4], [2, 7], [3, 7]]`.
