explanation_markdown: |
  A sliding window of fixed width has a predictable count -- `L - n + 1` positions --
  so the whole job is walking a start index across that range and summarising each
  slice. Writing it as a generator with `yield` means the pairs are produced one at a
  time, which is the lazy style you would want if the reading series were huge or
  arriving as a stream; calling `list()` on it simply materialises them all here.

  The guards matter as much as the loop. A width of zero or a width larger than the
  series has no valid window, and an empty series has nothing to summarise, so the
  generator returns immediately and `list()` collects nothing. Slicing plus `min`
  and `max` per window is straightforward but does O(n) work per window; that is fine
  for this exercise, and it keeps the intent obvious.
common_mistakes:
  - Looping the start index over the full length instead of stopping at len(readings) - size, which runs off the end and yields short final windows.
  - Returning tuples like (min, max) when the prompt asks for two-item lists, so the compared values differ in type.
  - Forgetting the guards, so a size of 0 or a size larger than the series raises or produces bogus windows instead of an empty list.
