prompt_markdown: |
  A transit system collects raw turnstile entries as `[line, riders]` pairs. You
  need a small reporting pipeline. Write `turnstile_report(spec)` where `spec` is a
  dict with keys `"entries"` (a list of `[line, riders]` pairs), `"allowed"` (a
  list of line names that count), and `"factor"` (an integer weight). Return a
  **list** of weighted rider counts, in order, keeping only entries that both have
  a positive rider count *and* belong to an allowed line, each multiplied by
  `factor`.

  Build it as a **multi-stage generator pipeline** with a separate generator for
  each step: unpack the pairs, drop non-positive counts, drop lines that are not
  allowed, then scale. Compose them and finish with `list()`.

  For example, `turnstile_report({"entries": [["red", 4], ["blue", 0], ["green",
  3], ["red", -2]], "allowed": ["red", "green"], "factor": 10})` returns
  `[40, 30]`.
