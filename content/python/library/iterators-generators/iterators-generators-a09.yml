explanation_markdown: |
  Because every stage is a lazy generator, an entry travels the whole pipeline,
  unpacked, checked for a positive count, checked against the allowed set, and
  scaled, before the next entry is ever pulled. Nothing accumulates in the middle.
  Keeping `(line, riders)` tuples flowing until the final stage lets each filter
  see both fields; only `scale` collapses a survivor down to a single weighted
  number. Converting `allowed` to a `set` makes the membership test fast, and
  iterating the source in order keeps the output in order.
common_mistakes:
  - Collapsing to just the rider count too early, so a later stage can no longer filter by line.
  - Combining every rule into one loop, which is harder to read and loses the composable-stage structure the task asks for.
  - Forgetting that both conditions must hold, letting a positive count on a disallowed line through.
