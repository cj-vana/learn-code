function_name: turnstile_report
input_mode: function
solution_sketch: Four chained generators unpack the pairs, filter by positive riders, filter by allowed line, and scale by factor before list() collects the result.
sample_solution: |
  def turnstile_report(spec):
      def unpack(rows):
          for line, riders in rows:
              yield line, riders

      def positive(pairs):
          for line, riders in pairs:
              if riders > 0:
                  yield line, riders

      def allowed_only(pairs, allowed):
          for line, riders in pairs:
              if line in allowed:
                  yield line, riders

      def scale(pairs, factor):
          for _, riders in pairs:
              yield riders * factor

      allowed = set(spec["allowed"])
      stream = unpack(spec["entries"])
      stream = positive(stream)
      stream = allowed_only(stream, allowed)
      stream = scale(stream, spec["factor"])
      return list(stream)
