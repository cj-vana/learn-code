function_name: first_palindromes
input_mode: function
solution_sketch: An infinite generator counts up, a second yields only values whose string equals its reverse, and next() pulls the first n.
sample_solution: |
  def first_palindromes(n):
      def counting():
          k = 1
          while True:
              yield k
              k += 1

      def palindromes(numbers):
          for x in numbers:
              text = str(x)
              if text == text[::-1]:
                  yield x

      gen = palindromes(counting())
      return [next(gen) for _ in range(n)]
