explanation_markdown: |
  The endless `counting` generator never stops, but that is fine: the `palindromes`
  stage only pulls from it as needed, and the final `next()` loop pulls only `n`
  palindromes before quitting. So although there are infinitely many candidates,
  the code does a bounded amount of work. The palindrome test converts each number
  to a string and compares it with its reverse, `text[::-1]`. Chaining a filter
  onto an infinite source and capping consumption at the end is the standard way to
  answer "give me the first n things with this property."
common_mistakes:
  - Trying to build a list of all palindromes up front, which never terminates.
  - Comparing the number to its reverse numerically instead of comparing the digit strings.
  - Taking n + 1 or n - 1 values because of an off-by-one in the range.
