function_name: merge_manifests
input_mode: function
solution_sketch: Two iterators track a current head each; yield the smaller head and advance that iterator, then drain the remaining one, using None as the exhausted sentinel.
sample_solution: |
  def merge_manifests(spec):
      def merged(a, b):
          ia = iter(a)
          ib = iter(b)
          x = next(ia, None)
          y = next(ib, None)
          while x is not None and y is not None:
              if x <= y:
                  yield x
                  x = next(ia, None)
              else:
                  yield y
                  y = next(ib, None)
          while x is not None:
              yield x
              x = next(ia, None)
          while y is not None:
              yield y
              y = next(ib, None)

      return list(merged(spec["a"], spec["b"]))
hints:
  - level: 1
    text: Keep the current head of each stream; compare the two heads and yield the smaller, then advance only that stream.
  - level: 2
