explanation_markdown: |
  This is the merge step at the heart of a merge sort, written as a lazy generator.
  Two iterators each expose one "current head" at a time; comparing the heads and
  yielding the smaller keeps the output sorted, and advancing only the stream you
  took from means nothing is skipped. Using `next(it, None)` as a sentinel turns
  "is this stream finished?" into a simple `is None` check. Once one side empties,
  the two drain loops flush whatever remains, and since each input was already
  sorted, the drained tail is already in order. Duplicates survive because equal
  heads are handled by `x <= y`, yielding from `a` first.
common_mistakes:
  - Concatenating and sorting instead of walking the two streams, which ignores the point of consuming iterators.
  - Advancing both iterators each step, which drops values from one side.
  - Forgetting the drain loops, so the tail of the longer manifest is lost.
