prompt_markdown: |
  Two loading docks each produce a manifest of parcel weights, already sorted in
  ascending order. Dispatch needs a single combined manifest that is still sorted.
  Write `merge_manifests(spec)` where `spec` is a dict with keys `"a"` and `"b"`,
  each a list of numbers sorted ascending. Return a **list** containing every
  weight from both manifests, in sorted order (duplicates kept).

  Do the merge with a **generator that consumes two iterators**: use `iter()` and
  `next(..., None)` to walk both inputs at once, always yielding the smaller
  current value, then drain whichever iterator still has values. Finish with
  `list()`. Do not simply concatenate and call `sorted`; walk the two streams.

  For example, `merge_manifests({"a": [1, 4, 7], "b": [2, 3, 8]})` returns
  `[1, 2, 3, 4, 7, 8]`.
