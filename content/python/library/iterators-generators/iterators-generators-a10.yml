explanation_markdown: |
  The generator carries a `bucket` list across iterations. Each item is appended,
  and the moment the bucket reaches `size` it is yielded as a completed box and
  replaced with a *fresh* empty list, so the next box starts clean. When the loop
  ends, any items still in the bucket form a smaller final box, which is why the
  post-loop `if bucket:` check matters, and why an empty input yields nothing at
  all. Reassigning `bucket = []` (rather than clearing it in place) ensures each
  yielded box keeps its own contents.
common_mistakes:
  - Clearing the bucket in place with bucket.clear() after yielding, which mutates the already-yielded box to empty.
  - Forgetting the post-loop yield, dropping the final partial box.
  - Yielding an empty leftover bucket when the items divide evenly, adding a stray [] to the output.
