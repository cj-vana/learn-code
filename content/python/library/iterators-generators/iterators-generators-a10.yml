prompt_markdown: |
  A bakery packs pastries into boxes that each hold a fixed number. Pastries come
  off the line in order and get boxed as soon as a box fills; whatever is left at
  the end goes into a smaller final box. Write `pack_boxes(spec)` where `spec` is a
  dict with keys `"items"` (the list of pastries in order) and `"size"` (box
  capacity, a positive integer). Return a **list of lists**: each inner list is one
  box, full except possibly the last.

  Write a **generator** that accumulates items and yields a box whenever it reaches
  `size`, then yields any leftover items as a final partial box. Materialize with
  `list()`.

  For example, `pack_boxes({"items": [1, 2, 3, 4, 5], "size": 2})` returns
  `[[1, 2], [3, 4], [5]]`.
starter_code: |
  def pack_boxes(spec):
      # Generator: collect items into a box, yield it when full, yield leftovers at the end.
      return []
function_name: pack_boxes
input_mode: function
solution_sketch: A generator gathers items into a bucket, yields it once it reaches size and starts a fresh one, then yields a non-empty leftover bucket after the loop.
sample_solution: |
  def pack_boxes(spec):
      def boxes(items, size):
          bucket = []
          for item in items:
              bucket.append(item)
              if len(bucket) == size:
                  yield bucket
                  bucket = []
          if bucket:
              yield bucket

      return list(boxes(spec["items"], spec["size"]))
hints:
  - level: 1
    text: Keep a growing bucket list; when it reaches the box size, yield it and start a brand-new bucket.
  - level: 2
    text: After the loop ends, a partly filled bucket may remain; yield it only if it is non-empty.
  - level: 3
    text: Append to bucket; when len(bucket) == size, yield bucket then set bucket = [] (a fresh list); finally, if bucket, yield it.
