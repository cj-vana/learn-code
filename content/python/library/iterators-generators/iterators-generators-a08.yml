function_name: beat_times
input_mode: function
solution_sketch: An infinite generator accumulates step each tick; call next() count times to collect a fixed prefix.
sample_solution: |
  def beat_times(spec):
      def beats(step):
          t = step
          while True:
              yield t
              t += step

      gen = beats(spec["step"])
      return [next(gen) for _ in range(spec["count"])]
hints:
  - level: 1
    text: The generator can run forever; you decide how many values to take from the outside.
  - level: 2
    text: Build the generator once, then call next() on it count times to collect a fixed number of beats.
  - level: 3
    text: A list comprehension like [next(gen) for _ in range(count)] pulls exactly count values from the infinite generator.
tests:
