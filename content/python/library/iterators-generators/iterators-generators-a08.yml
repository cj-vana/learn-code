prompt_markdown: |
  A rehearsal metronome ticks at a steady interval: the first beat lands at `step`
  milliseconds, the next at `2 * step`, the next at `3 * step`, and so on forever.
  Write `beat_times(spec)` where `spec` is a dict with keys `"count"` (how many
  beat times to report) and `"step"` (the interval). Return a **list** of the
  first `count` beat times.

  Model the beats with an **infinite generator**, then pull exactly `count` values
  from it using `next()`. A `count` of `0` returns an empty list.

  For example, `beat_times({"count": 3, "step": 5})` returns `[5, 10, 15]`.
starter_code: |
  def beat_times(spec):
      # Make an infinite generator of beat times, then take exactly count values with next().
