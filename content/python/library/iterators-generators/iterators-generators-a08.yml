explanation_markdown: |
  The `beats` generator would tick forever, but pairing it with a fixed number of
  `next()` calls turns "endless" into "as many as I asked for." Building the
  generator once and pulling from it `count` times keeps its internal `t` moving
  forward across calls, so each beat is `step` larger than the last. The
  comprehension `[next(gen) for _ in range(count)]` is just a compact way to take
  that prefix, and it naturally yields an empty list when `count` is zero.
common_mistakes:
  - Rebuilding the generator inside the loop, which restarts it at the first beat every time.
  - Using range(count + 1) or an off-by-one loop, which takes the wrong number of beats.
  - Trying to list() the infinite generator instead of taking a bounded prefix.
