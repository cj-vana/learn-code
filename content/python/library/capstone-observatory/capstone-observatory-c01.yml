prompt_markdown: |
  Welcome to the first stage of **The Observatory Night Logs**. A mountaintop
  observatory writes one line to disk each time its main instrument locks onto a
  target. Every well-formed line looks exactly like this:

      [2026-07-01 22:14] TELESCOPE target=vega mag=0.03 seeing=1.20

  That is, in order:

  - a timestamp `[YYYY-MM-DD HH:MM]` inside square brackets,
  - the literal word `TELESCOPE`,
  - `target=` followed by a name of letters, digits, underscores, or hyphens,
  - `mag=` followed by a decimal that may be negative (bright stars go below zero),
  - `seeing=` followed by a non-negative decimal.

  Write `parse_log_line(line)` that returns a dictionary:

      {"timestamp": "2026-07-01 22:14", "target": "vega", "mag": 0.03, "seeing": 1.2}

  where `timestamp` and `target` are strings and `mag` and `seeing` are floats.

  A line is **malformed** if it does not match this shape *exactly* end to end.
  That includes: a missing bracket, the wrong keyword, a `mag` or `seeing` written
  as a bare integer with no decimal point, or any trailing junk after the seeing
  value. For a malformed line, return `None` (do not raise). Both `mag` and
  `seeing` must contain a decimal point to count as valid.
