prompt_markdown: |
  The final stage of **The Observatory Night Logs**: assemble everything the
  pipeline computed into the plain-text **morning report** that gets pinned to the
  dome door. The format is fixed, and it must match exactly, character for
  character.

  Write `night_report(job)` that takes **one dictionary**:

  - `"date"`: the night's date as a string, e.g. `"2026-07-01"`.
  - `"targets"`: a list of dictionaries `{"name": <str>, "count": <int>, "best_mag": <float>}`.
  - `"sessions"`: an integer, the number of observing sessions.
  - `"events"`: an integer, the number of flagged transient events.

  Build the report as a single string with lines joined by `"\n"` (no trailing
  newline), in this exact order:

  1. A header line: `Night Log for <date>`.
  2. One line per target, sorted by `count` **descending**, and for equal counts
     by `name` **ascending** (alphabetical). Each line reads:
     `<name>: <count> obs, best mag <best_mag>` where `best_mag` is formatted to
     **exactly two decimal places** (use `f"{best_mag:.2f}"`, so `0.0` prints as
     `0.00` and `-1.5` prints as `-1.50`).
  3. A line `Sessions recorded: <sessions>`.
  4. A line `Events flagged: <events>`.

  If `targets` is empty, the report is just the header line followed by the two
  summary lines (no target lines in between).

  Example call:

  ```python
  night_report({
      "date": "2026-07-01",
      "targets": [{"name": "vega", "count": 3, "best_mag": 0.02},
                  {"name": "altair", "count": 2, "best_mag": 0.77}],
      "sessions": 2,
      "events": 4,
  })
  ```

  returns the string:

  ```
  Night Log for 2026-07-01
  vega: 3 obs, best mag 0.02
  altair: 2 obs, best mag 0.77
  Sessions recorded: 2
  Events flagged: 4
  ```
