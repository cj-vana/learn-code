solution_sketch: Start a list of lines with the header, sort the targets by (-count, name), append one formatted line per target with the magnitude at two decimals, append the sessions and events summary lines, then join everything with newlines.
sample_solution: |
  def night_report(job):
      lines = [f"Night Log for {job['date']}"]
      targets = sorted(job["targets"], key=lambda t: (-t["count"], t["name"]))
      for target in targets:
          lines.append(f"{target['name']}: {target['count']} obs, best mag {target['best_mag']:.2f}")
      lines.append(f"Sessions recorded: {job['sessions']}")
      lines.append(f"Events flagged: {job['events']}")
      return "\n".join(lines)
