explanation_markdown: |
  The report is assembled as a list of lines and joined once at the end, which is
  the clean way to control exact output: you never manage separators by hand, and
  `"\n".join(...)` leaves no trailing newline. The header comes first, the two
  summary lines come last, and the target lines slot in between.

  The ordering is the only real logic. Sorting with the key `(-count, name)` gives
  a two-level sort in one pass: negating the count makes larger counts sort first
  while the name still sorts ascending, so ties break alphabetically without any
  extra code. Formatting each magnitude with `:.2f` guarantees a stable two-decimal
  column, so `0.0` reads as `0.00` and a bright, negative magnitude reads as
  `-1.50`. When there are no targets, the loop simply adds nothing and the header
  sits directly above the summary lines, which is exactly the required empty-night
  shape.
common_mistakes:
  - Sorting by count ascending, or sorting name and count in separate passes, which produces the wrong line order on ties.
  - Printing best_mag with str() or default formatting, so values like 0.0 show as 0.0 instead of the required 0.00.
  - Adding a trailing newline (for example ending each line with "\n") so the whole string fails an exact-match comparison.
