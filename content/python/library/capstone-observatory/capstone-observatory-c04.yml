explanation_markdown: |
  This is a rolling-window comparison. Each reading is judged only against the `n`
  readings immediately before it, so the baseline slides forward one step at a time
  as `i` advances. Starting the loop at `i = window` handles the "not enough
  history yet" rule for free: there is no way to look back `n` readings before that
  point, so those early readings simply never enter the test.

  The mean is `sum(previous) / window`, and the fire test is `value - mean >
  threshold`. Using strict `>` means a jump that only reaches the threshold exactly
  is treated as ordinary variation rather than an event, matching the spec. Because
  the baseline recomputes from the raw values each step, the detector adapts: after
  a spike passes out of the window, the baseline returns to normal and later spikes
  are judged fairly, which is why two distinct events can both fire.
common_mistakes:
  - Comparing against the mean of all readings so far instead of only the previous window, which drowns out short spikes.
  - Starting the loop at index 0 and dividing by a partial or empty window for the first few readings.
  - Using >= for the threshold test, which fires on jumps that only reach the threshold exactly instead of exceeding it.
