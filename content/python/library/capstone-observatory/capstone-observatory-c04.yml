prompt_markdown: |
  The photometer streams a brightness value every few minutes, and the astronomers
  want the pipeline to **flag transient events**: moments where the signal jumps
  well above where it has recently been sitting. A jump is measured against the
  recent baseline, not the whole night.

  Write `detect_events(job)` that takes **one dictionary**:

  - `"readings"`: a list of `[timestamp, value]` pairs in time order, where each
    timestamp is a string and each value is a number.
  - `"window"`: an integer `n`, the number of previous readings that form the
    baseline.
  - `"threshold"`: a number `t`.

  For each reading at position `i`, compute the mean of the **previous `n`
  readings** (positions `i - n` through `i - 1`). If the reading's value exceeds
  that mean by **strictly more than** `t`, that is, `value - mean > t`, then flag
  it. The very first `n` readings have fewer than `n` readings before them, so they
  can never fire.

  Return a **list** of the timestamps that fire, in the order they occur. A jump
  that clears the mean by exactly `t` does **not** fire.

  Example call:

  ```python
  detect_events({
      "readings": [["22:00", 10], ["22:01", 10], ["22:02", 10], ["22:03", 30]],
      "window": 3,
      "threshold": 5,
  })
  # -> ["22:03"]  (mean of the three 10s is 10; 30 - 10 = 20 > 5)
  ```
starter_code: |
