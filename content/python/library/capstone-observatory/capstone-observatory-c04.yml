function_name: detect_events
input_mode: function
solution_sketch: Loop i from window to the end; take the previous n values as a slice, average them, and if the current value minus that mean is strictly greater than the threshold, append the current timestamp.
sample_solution: |
  def detect_events(job):
      readings = job["readings"]
      window = job["window"]
      threshold = job["threshold"]
      flagged = []
      for i in range(window, len(readings)):
          previous = [readings[j][1] for j in range(i - window, i)]
          mean = sum(previous) / window
          timestamp, value = readings[i]
          if value - mean > threshold:
              flagged.append(timestamp)
      return flagged
hints:
  - level: 1
    text: The first window readings can never fire, so start your loop index at window rather than 0.
  - level: 2
    text: For position i the baseline is the values at positions i - window through i - 1. Collect those values and divide their sum by window to get the mean.
  - level: 3
    text: Flag the reading only when value - mean > threshold, using strictly greater than so an exact-threshold jump does not fire; append readings[i][0], the timestamp.
