solution_sketch: Parse each timestamp with datetime.strptime, track the current session's start and the previous timestamp, and whenever the minute gap to the next timestamp exceeds gap_minutes close the current session and open a new one; append the final open session at the end.
sample_solution: |
  from datetime import datetime


  def sessionize(job):
      timestamps = job["timestamps"]
      gap_limit = job["gap_minutes"]
      if not timestamps:
          return []
      fmt = "%Y-%m-%d %H:%M"
      sessions = []
      start = timestamps[0]
      prev = timestamps[0]
      for current in timestamps[1:]:
          minutes = (datetime.strptime(current, fmt) - datetime.strptime(prev, fmt)).total_seconds() / 60
          if minutes > gap_limit:
              sessions.append([start, prev])
              start = current
          prev = current
      sessions.append([start, prev])
      return sessions
hints:
  - level: 1
    text: Convert two timestamp strings to datetime objects with datetime.strptime and subtract them; the result is a timedelta whose total_seconds() divided by 60 is the gap in minutes.
  - level: 2
    text: Keep two markers as you loop, the start of the session in progress and the previous timestamp. When the gap from previous to current exceeds gap_minutes, the previous timestamp closes a session.
  - level: 3
    text: After the loop ends there is always one session still open (start..prev) that you must append. Remember exactly equal to gap_minutes stays in the same session, so compare with strictly greater than.
