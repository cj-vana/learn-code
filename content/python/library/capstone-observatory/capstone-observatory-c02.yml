prompt_markdown: |
  A night at the observatory is not one continuous run. Clouds roll in, the dome
  closes, the instrument re-slews, and each break splits the night into separate
  **observing sessions**. Your job is to reconstruct those sessions from the
  timestamps alone.

  Write `sessionize(job)` that takes **one dictionary**:

  - `"timestamps"`: a list of instrument timestamps as strings `"YYYY-MM-DD HH:MM"`,
    already sorted in ascending (chronological) order.
  - `"gap_minutes"`: an integer `g`.

  Walk the timestamps in order. Two consecutive timestamps belong to the same
  session as long as the gap between them is `g` minutes or fewer. A gap of
  **strictly more than** `g` minutes starts a new session. A gap of exactly `g`
  minutes does **not** split.

  Return a **list** of `[start, end]` pairs, one per session, in order. `start` is
  the first timestamp of the session and `end` is its last timestamp (both as the
  original strings). A session with a single timestamp has that timestamp as both
  its start and end.

  Example call:

  ```python
  sessionize({
      "timestamps": ["2026-07-01 22:00", "2026-07-01 22:20", "2026-07-01 23:10"],
      "gap_minutes": 30,
  })
  # -> [["2026-07-01 22:00", "2026-07-01 22:20"], ["2026-07-01 23:10", "2026-07-01 23:10"]]
  ```

  If `timestamps` is empty, return an empty list.
