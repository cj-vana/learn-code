explanation_markdown: |
  Sessionizing is a single left-to-right pass. You never need to compare every
  pair of timestamps, only each neighbour to the one before it, because the input
  is already sorted. `datetime.strptime` turns each string into a comparable
  moment; subtracting two of them yields a `timedelta`, and `total_seconds() / 60`
  converts to minutes.

  The subtle parts are the boundary and the tail. The rule is "strictly more than
  `g` splits," so a gap that equals `g` keeps the run together, which is why the
  comparison is `>` and not `>=`. And because a split only happens when you *see*
  a large gap, the final session is still open when the loop ends, so you append
  it once more after the loop. Crossing midnight needs no special handling at all:
  the date is part of each timestamp, so `datetime` computes the true elapsed time
  for you.
common_mistakes:
  - Forgetting to append the last in-progress session after the loop, which drops the final block of the night.
  - Using >= instead of > for the gap test, which incorrectly splits runs that are exactly gap_minutes apart.
  - Subtracting the timestamp strings directly or comparing only hours and minutes, which breaks as soon as a session crosses midnight.
