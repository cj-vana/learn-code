prompt_markdown: |
  Now that individual lines are parsed, the observatory wants a **nightly
  summary** that folds all the night's records together. Each record is a
  dictionary in the shape produced by stage one:

  ```python
  {"timestamp": "2026-07-01 22:00", "target": "vega", "mag": 0.05, "seeing": 1.10}
  ```

  Write `nightly_summary(records)` that takes a **list** of such records and groups
  them by the pair `(date, target)`, where the date is the first 10 characters of
  the timestamp (`"YYYY-MM-DD"`). For each group produce a dictionary:

  - `"count"`: how many records fell in the group,
  - `"best_mag"`: the **smallest** `mag` in the group (smaller magnitude means
    brighter, so the minimum is the best),
  - `"avg_seeing"`: the mean of the group's `seeing` values, rounded to 2 decimal
    places with `round(value, 2)`.

  Return a dictionary keyed by the string `"date|target"` (the date, a literal
  pipe, then the target). The keys must be inserted in **ascending sorted order**
  so that iterating the result walks the summary alphabetically by date and then
  by target.

  Example call:

  ```python
  nightly_summary([
      {"timestamp": "2026-07-01 22:00", "target": "vega", "mag": 0.05, "seeing": 1.10},
      {"timestamp": "2026-07-01 23:00", "target": "vega", "mag": 0.02, "seeing": 1.30},
  ])
  # -> {"2026-07-01|vega": {"count": 2, "best_mag": 0.02, "avg_seeing": 1.2}}
  ```

  An empty list returns an empty dictionary.
