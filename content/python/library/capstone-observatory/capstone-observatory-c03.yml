function_name: nightly_summary
input_mode: function
solution_sketch: Bucket records into a dict keyed by "date|target" using setdefault, then walk the keys in sorted order building the summary dict with len for count, min of the magnitudes, and round(mean, 2) for the average seeing.
sample_solution: |
  def nightly_summary(records):
      groups = {}
      for record in records:
          date = record["timestamp"][:10]
          key = f"{date}|{record['target']}"
          groups.setdefault(key, []).append(record)
      summary = {}
      for key in sorted(groups):
          bucket = groups[key]
          mags = [item["mag"] for item in bucket]
          seeings = [item["seeing"] for item in bucket]
          summary[key] = {
              "count": len(bucket),
              "best_mag": min(mags),
              "avg_seeing": round(sum(seeings) / len(seeings), 2),
          }
      return summary
