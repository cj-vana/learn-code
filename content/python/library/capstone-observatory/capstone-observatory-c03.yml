explanation_markdown: |
  This is the classic group-then-aggregate shape. The first pass buckets records
  into a dictionary of lists keyed by `"date|target"`; `setdefault(key, [])` gives
  you the bucket whether or not it already exists, so you can append in one line.
  Slicing `timestamp[:10]` is enough to pull the date because the format is fixed
  width, so no date parsing is required.

  The second pass turns each bucket into its three statistics. `min` finds the
  brightest magnitude, `len` gives the count, and the mean is `sum / len` rounded
  to two places. Iterating with `sorted(groups)` is what guarantees the output
  keys land in ascending order, because a dictionary preserves the order in which
  keys are first inserted. Rounding the mean at the end also protects you from the
  tiny floating-point drift that `sum` of decimals can introduce.
common_mistakes:
  - Using max instead of min for best_mag, which reports the faintest observation rather than the brightest.
  - Inserting keys in first-seen order and forgetting sorted(groups), so the summary is not in ascending key order.
  - Rounding each seeing value before averaging instead of rounding only the final mean, which distorts the average.
