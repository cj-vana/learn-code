prompt_markdown: |
  Each observation records where the telescope was pointed, but the astronomers
  need to know **which catalogued object** it actually caught. That is a
  cross-match: line up each observation with the nearest catalog entry whose
  coordinates are close enough on both axes.

  Write `cross_match(job)` that takes **one dictionary**:

  - `"observations"`: a list of dictionaries `{"name": <str>, "ra": <float>, "dec": <float>}`
    where `ra` and `dec` are the two sky coordinates.
  - `"catalog"`: a list of dictionaries `{"name": <str>, "ra": <float>, "dec": <float>}`.
  - `"tolerance"`: a number `tol`.

  A catalog entry is a **candidate** for an observation only if it is within `tol`
  on **both** axes, that is `abs(obs.ra - cat.ra) <= tol` **and**
  `abs(obs.dec - cat.dec) <= tol` (the boundary of exactly `tol` counts as inside).
  Among an observation's candidates, pick the **nearest** one, measuring distance
  as the squared separation `(dra)**2 + (ddec)**2`. If two candidates tie on
  distance, prefer the one that appears **earlier in the catalog**.

  Return a dictionary with two entries:

  - `"matched"`: a dictionary mapping each matched observation's name to its chosen
    catalog entry's name.
  - `"unmatched"`: a list of the names of observations with no candidate at all, in
    the original observation order.

  Example call:

  ```python
  cross_match({
      "observations": [{"name": "obs1", "ra": 10.0, "dec": 10.0}],
      "catalog": [{"name": "far", "ra": 10.4, "dec": 10.0},
                  {"name": "near", "ra": 10.1, "dec": 10.0}],
      "tolerance": 0.5,
  })
  # -> {"matched": {"obs1": "near"}, "unmatched": []}
  ```
