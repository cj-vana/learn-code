function_name: cross_match
input_mode: function
solution_sketch: For each observation scan the catalog in order, keeping the entry with the smallest squared separation among those within tolerance on both axes; a strict less-than comparison keeps the earlier catalog entry on ties. Record the winner in matched or add the observation to unmatched when nothing qualifies.
sample_solution: |
  def cross_match(job):
      observations = job["observations"]
      catalog = job["catalog"]
      tol = job["tolerance"]
      matched = {}
      unmatched = []
      for obs in observations:
          best_name = None
          best_distance = None
          for entry in catalog:
              dra = obs["ra"] - entry["ra"]
              ddec = obs["dec"] - entry["dec"]
              if abs(dra) <= tol and abs(ddec) <= tol:
                  distance = dra * dra + ddec * ddec
                  if best_distance is None or distance < best_distance:
                      best_distance = distance
                      best_name = entry["name"]
          if best_name is None:
              unmatched.append(obs["name"])
          else:
              matched[obs["name"]] = best_name
      return {"matched": matched, "unmatched": unmatched}
hints:
