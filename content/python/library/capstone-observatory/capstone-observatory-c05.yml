explanation_markdown: |
  Cross-matching here is a brute-force nearest-neighbour search: for every
  observation you look at every catalog entry, which is fine for the modest lists a
  single night produces. The tolerance is a box, not a circle, because both axes
  must independently be within `tol`; the boundary is inclusive, so `<=` is
  correct. Among the entries that fall inside that box, the winner is the one with
  the smallest separation.

  Two details make the result deterministic. First, ranking by the **squared**
  separation avoids a square root while ordering candidates identically to true
  distance, so there is no floating-point rounding from `sqrt` to worry about.
  Second, scanning the catalog in order and replacing the best only on a **strict**
  improvement means that when two candidates are equally close, the one seen first,
  the earlier catalog entry, keeps the match. Observations with an empty candidate
  box never set a best, so they fall through to the unmatched list in their
  original order.
common_mistakes:
  - Requiring closeness on only one axis, or summing the two axis errors, instead of requiring each axis independently within tolerance.
  - Replacing the best match on distance <= best (not strictly <), which flips ties to the later catalog entry and breaks the tie-break rule.
  - Forgetting to record unmatched observations, so the result silently drops observations that matched nothing.
