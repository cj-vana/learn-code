      input: [{name: zoe, wins: 2, losses: 2}, {name: amy, wins: 2, losses: 2}]
      expected: [amy, zoe]
    - name: wins_then_losses
      input: [{name: ana, wins: 3, losses: 1}, {name: ben, wins: 3, losses: 0}, {name: cid, wins: 5, losses: 4}]
      expected: [cid, ben, ana]
    - name: mixed_field
      input: [{name: liu, wins: 0, losses: 0}, {name: mae, wins: 1, losses: 9}, {name: kai, wins: 1, losses: 3}]
      expected: [kai, mae, liu]
explanation_markdown: |
  A tuple sort key sorts by its first element, breaking ties with the next, and
  so on. Here `(-wins, losses, name)` puts the most wins first (negating flips
  the ascending order), then favors fewer losses, then falls back to
  alphabetical name. `sorted` is stable, but the name tie-breaker makes the
  order fully deterministic regardless of input order.
common_mistakes:
  - Sorting by wins ascending and forgetting to reverse or negate it.
  - Returning the whole player dicts instead of just the names.
  - Handling only wins and ignoring the losses and name tie-breakers.
