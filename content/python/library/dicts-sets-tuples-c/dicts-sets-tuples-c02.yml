prompt_markdown: |
  A neighborhood chess club keeps a ladder of players. Each player is a dict
  with a `name`, a `wins` count, and a `losses` count.

  Write `rank_players(players)` that returns a list of player names ordered by
  standing: most wins first, then fewer losses, then name alphabetically as the
  final tie-breaker. An empty list returns an empty list.
starter_code: |
  def rank_players(players):
      return []
function_name: rank_players
input_mode: function
solution_sketch: Sort the players with a tuple key of (-wins, losses, name) and pull out the names.
sample_solution: |
  def rank_players(players):
      ordered = sorted(
          players,
          key=lambda player: (-player["wins"], player["losses"], player["name"]),
      )
      return [player["name"] for player in ordered]
hints:
  - level: 1
    text: Python can sort by several fields at once when the sort key is a tuple.
  - level: 2
    text: Ascending order on losses and name is what you want, but wins should come out largest-first.
  - level: 3
    text: 'Use key=lambda p: (-p["wins"], p["losses"], p["name"]) so higher wins sort earlier.'
tests:
  public:
    - name: empty
      input: []
      expected: []
    - name: single
      input: [{name: ana, wins: 3, losses: 1}]
      expected: [ana]
    - name: by_wins
      input: [{name: ben, wins: 1, losses: 0}, {name: ana, wins: 4, losses: 2}]
      expected: [ana, ben]
    - name: break_by_losses
      input: [{name: cid, wins: 2, losses: 5}, {name: dot, wins: 2, losses: 1}]
      expected: [dot, cid]
  validation:
