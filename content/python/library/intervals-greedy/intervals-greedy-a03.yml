explanation_markdown: |
  Sorting by start time guarantees that the only block a new window could join
  is the one you are currently building, so a single sweep suffices. You seed
  the result with the first window and, for each later one, ask whether it starts
  before the current block ends. If it does, you stretch the block's end to
  `max(current_end, new_end)` — the `max` is essential so a window nested inside
  the block (like `[3, 4]` within `[1, 10]`) does not shrink it. If it does not,
  the window opens a fresh block. The strict `<` keeps back-to-back windows
  apart, matching the greenhouse's logging rule.
common_mistakes:
  - Assigning last_end = end instead of max(last_end, end), which shrinks the block when a nested window has a smaller end.
  - Forgetting to sort, so windows that belong together are never adjacent during the sweep.
  - Merging on start <= last_end, which incorrectly fuses back-to-back windows.
