prompt_markdown: |
  A greenhouse controller logs every stretch of time the misters run as a
  `[start, end]` window. Overlapping windows waste log space, so write
  `merge_windows(windows)` that returns the windows collapsed into the fewest
  continuous blocks, sorted by start time. Each block is a `[start, end]` list.

  Windows that overlap merge into one. Windows that only touch at an endpoint
  (`[1, 3]` and `[3, 5]`) are back to back and stay **separate**. An empty log
  returns `[]`.
starter_code: |
  def merge_windows(windows):
      return []
function_name: merge_windows
input_mode: function
solution_sketch: Sort by start, then sweep, extending the current block whenever the next window starts before it ends.
sample_solution: |
  def merge_windows(windows):
      if not windows:
          return []
      ordered = sorted(windows)
      merged = [list(ordered[0])]
      for start, end in ordered[1:]:
          last = merged[-1]
          if start < last[1]:
              last[1] = max(last[1], end)
          else:
              merged.append([start, end])
      return merged
hints:
  - level: 1
    text: Sort the windows by start time so any window that can merge with the current block comes next.
  - level: 2
    text: Keep a list of merged blocks; for each window either extend the last block or start a new one.
  - level: 3
    text: Extend when start < last_end using last_end = max(last_end, end); use strict < so touching windows stay separate.
