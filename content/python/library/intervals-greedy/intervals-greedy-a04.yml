prompt_markdown: |
  A pottery studio's kiln logs each firing as a `[start, end]` interval in
  minutes. Because several sensors log the same firing, the intervals overlap.
  Write `hot_minutes(firings)` that returns the total number of distinct minutes
  the kiln was hot — overlapping time must be counted **once**, not twice.

  For example, `[0, 30]` and `[20, 50]` cover the union `[0, 50]`, which is 50
  minutes. An empty log returns `0`. Touching intervals like `[0, 30]` and `[30,
  40]` cover a continuous 40 minutes.
starter_code: |
  def hot_minutes(firings):
      return 0
function_name: hot_minutes
input_mode: function
solution_sketch: Sort by start, sweep the merged coverage, and add each finished block's length to a running total.
sample_solution: |
  def hot_minutes(firings):
      if not firings:
          return 0
      ordered = sorted(firings)
      total = 0
      cur_start, cur_end = ordered[0]
      for start, end in ordered[1:]:
          if start <= cur_end:
              cur_end = max(cur_end, end)
          else:
              total += cur_end - cur_start
              cur_start, cur_end = start, end
      total += cur_end - cur_start
      return total
hints:
  - level: 1
    text: Overlapping minutes must not be double counted, so think about the merged coverage rather than summing raw lengths.
  - level: 2
    text: Sort by start, keep a current covered block, and extend it while the next interval starts within it.
  - level: 3
    text: When an interval starts after the current block ends, add (cur_end - cur_start) to the total and reset the block; add the final block after the loop.
