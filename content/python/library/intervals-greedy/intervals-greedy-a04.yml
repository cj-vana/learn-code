explanation_markdown: |
  The danger here is double counting the minutes where firings overlap. The fix
  is to measure the *union* of the intervals. After sorting by start, you sweep a
  single current block: while the next interval begins at or before the current
  block ends, you absorb it by taking `max` of the ends. When an interval starts
  past the current block, that block is finished, so you add its length
  `cur_end - cur_start` to a running total and open a new block. One final add
  after the loop counts the last block. Because each covered stretch is measured
  exactly once, overlapping sensor readings never inflate the count. Note the
  `<=` here: touching intervals extend the same continuous hot stretch, so they
  should merge for a length measurement.
common_mistakes:
  - Summing every interval's length directly, which counts overlapping minutes more than once.
  - Forgetting the final total += cur_end - cur_start after the loop, dropping the last block.
  - Using max on the wrong variable and letting a nested interval shorten the current block.
