function_name: car_pooling
input_mode: function
solution_sketch: Turn each trip into a +passengers boarding event and a -passengers alighting event, sweep left to right, and check the running load never exceeds capacity.
sample_solution: |
  def car_pooling(data):
      trips = data["trips"]
      capacity = data["capacity"]
      events = []
      for passengers, start, end in trips:
          events.append((start, passengers))
          events.append((end, -passengers))
      events.sort()
      aboard = 0
      for _stop, delta in events:
          aboard += delta
          if aboard > capacity:
              return False
      return True
hints:
  - level: 1
    text: Instead of tracking whole intervals, track only the moments the passenger count changes — a boarding adds passengers, an alighting removes them.
  - level: 2
    text: Build one event per boarding (+passengers at start) and one per alighting (-passengers at end), then sort all events by stop.
  - level: 3
    text: Sorting the (stop, delta) tuples puts negative deltas before positive ones at the same stop, so alightings are processed before boardings and the exclusive end works out. Sweep the events and return False the moment the running total tops capacity.
