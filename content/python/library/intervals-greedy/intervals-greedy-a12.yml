prompt_markdown: |
  An airport shuttle runs a fixed loop, and dispatch has a list of booked
  trips for the day. Each trip is `[passengers, start, end]`: that many
  passengers board the shuttle at stop number `start` and get off at stop
  number `end`. The `end` is exclusive — a passenger who alights at stop `5`
  frees their seat for anyone boarding at stop `5`.

  Write `car_pooling(data)` where `data` is a dict with:

  - `"trips"`: the list of `[passengers, start, end]` bookings (may be empty).
  - `"capacity"`: the maximum number of passengers the shuttle can hold.

  Return `True` if the shuttle can serve every booking without ever exceeding
  `capacity` at any point along the loop, and `False` otherwise. The count is
  allowed to reach `capacity` exactly — only going over it is a problem. With
  no trips at all, the shuttle trivially stays under capacity, so return `True`.

  For example, `{"trips": [[2, 1, 5], [3, 3, 7]], "capacity": 4}` returns
  `False` (5 passengers are aboard between stops 3 and 5), while the same
  trips with `"capacity": 5` return `True`.
