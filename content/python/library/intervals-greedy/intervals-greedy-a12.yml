explanation_markdown: |
  Checking every stop against every trip would be slow and fiddly. The sweep-line
  trick is to stop thinking about intervals and think about *changes* to the
  passenger count. Each trip contributes exactly two moments: at `start` the load
  goes up by `passengers`, and at `end` it goes back down by `passengers`.

  Collect those as `(stop, delta)` events and sort them. Because Python sorts
  tuples by the first element and then the second, events at the same stop are
  ordered with the negative deltas first — so alightings are applied before
  boardings. That is exactly what the exclusive `end` demands: a seat freed at
  stop `5` is available to someone boarding at stop `5`. Sweeping left to right
  and keeping a running `aboard` total, the shuttle is over capacity precisely
  when that total exceeds `capacity`, so you can bail out with `False` the instant
  it happens; if the sweep finishes, every stop was safe and you return `True`.
  With no trips there are no events, `aboard` stays `0`, and the answer is `True`.
common_mistakes:
  - Processing boardings before alightings at the same stop, which double-counts a seat and wrongly rejects back-to-back trips that share an endpoint.
  - Using `aboard >= capacity` instead of `aboard > capacity`, which rejects trips that fill the shuttle to exactly its limit.
  - Comparing each trip to every other trip in nested loops instead of sweeping sorted events, which is both slower and easy to get wrong at the boundaries.
