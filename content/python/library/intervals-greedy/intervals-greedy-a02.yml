prompt_markdown: |
  A tennis club keeps one court and a booking sheet of slots, each a `[start,
  end]` pair, arriving in no particular order. Write `sheet_has_conflict(slots)`
  that returns `True` if any two bookings overlap, and `False` if the whole
  sheet is conflict-free.

  Back-to-back bookings that share an endpoint (one ending at 3, the next
  starting at 3) do **not** conflict. An empty sheet or a single booking is
  always clean.
starter_code: |
  def sheet_has_conflict(slots):
      return False
function_name: sheet_has_conflict
input_mode: function
solution_sketch: Sort by start time, then a conflict exists if any booking starts before the previous one ends.
sample_solution: |
  def sheet_has_conflict(slots):
      ordered = sorted(slots)
      for i in range(1, len(ordered)):
          if ordered[i][0] < ordered[i - 1][1]:
              return True
      return False
hints:
  - level: 1
    text: In a random order, conflicting bookings can be anywhere; sorting brings neighbours next to each other.
  - level: 2
    text: After sorting by start time, you only need to compare each booking with the one right before it.
  - level: 3
    text: A conflict exists when ordered[i][0] < ordered[i-1][1]; scan once and return True on the first such pair.
