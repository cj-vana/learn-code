explanation_markdown: |
  Sorting by start time is the move that makes this easy. Once the bookings are
  in order, any overlap must involve two *adjacent* entries: if booking `i`
  starts before booking `i-1` ends, they share time. You never have to look
  further back, because everything earlier ends no later than booking `i-1`
  begins would allow. A single left-to-right scan after the sort finds a
  conflict in O(n) time, and the strict `<` keeps back-to-back slots legal.
common_mistakes:
  - Comparing bookings in their original order without sorting first, missing conflicts between distant entries.
  - Using <= so that legal back-to-back bookings are reported as conflicts.
  - Comparing starts to starts (or ends to ends) instead of the next start to the previous end.
