prompt_markdown: |
  A delivery depot charges electric vans overnight. Each van needs a bay for an
  interval `[plug_in, unplug]`. A single bay serves one van at a time, but a van
  that unplugs exactly when another plugs in (`[1, 5]` then `[5, 9]`) can hand
  the bay straight over. Write `bays_needed(vans)` that returns the minimum
  number of bays so no van ever waits — that is, the greatest number of vans
  charging at the same instant.

  An empty list needs `0` bays.
starter_code: |
