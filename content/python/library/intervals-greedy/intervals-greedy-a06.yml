explanation_markdown: |
  The number of bays you must build equals the peak concurrency — the most vans
  ever charging at once. Merging the intervals would hide that, so instead you
  sweep a line across the night. Sorting the start times and end times into two
  separate lists lets you replay the evening as a sequence of events: each start
  raises the count of bays in use, each end lowers it, and the running maximum is
  your answer. The comparison `starts[i] < ends[j]` is what lets a van reuse a
  bay the instant another frees it: when a start and an end coincide, the end is
  processed first, so the count dips before it climbs and no extra bay is
  charged. Both lists are walked once, so the work is dominated by the sort.
common_mistakes:
  - Returning the number of vans or the number of merged blocks instead of the peak simultaneous count.
  - Using <= in the start-versus-end comparison, which allocates an extra bay for a clean hand-off.
  - Comparing whole intervals in start order and losing track of when each van actually unplugs.
