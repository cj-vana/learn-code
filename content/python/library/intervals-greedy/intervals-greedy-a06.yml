      return 0
function_name: bays_needed
input_mode: function
solution_sketch: Sort start times and end times separately, then sweep both to track and cap the running count in use.
sample_solution: |
  def bays_needed(vans):
      if not vans:
          return 0
      starts = sorted(v[0] for v in vans)
      ends = sorted(v[1] for v in vans)
      i = j = 0
      in_use = 0
      peak = 0
      while i < len(starts):
          if starts[i] < ends[j]:
              in_use += 1
              peak = max(peak, in_use)
              i += 1
          else:
              in_use -= 1
              j += 1
      return peak
hints:
  - level: 1
    text: The answer is the largest number of vans that are ever plugged in simultaneously, not the total number of vans.
  - level: 2
    text: Pull all start times into one sorted list and all end times into another, then walk them with two pointers.
  - level: 3
    text: When the next start is strictly before the next end, a van plugs in (count up); otherwise a van leaves (count down). Track the peak count.
