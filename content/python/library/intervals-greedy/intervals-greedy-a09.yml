prompt_markdown: |
  A night market has many stalls, and each stall is open during a closed time
  window `[open, close]` measured in minutes, so a stall counts as open at both
  `open` and `close` and every minute between. A single roving inspector can show
  up at one integer minute and, in that one visit, tick off *every* stall whose
  window contains that minute.

  Write `min_arrows(windows)` where `windows` is a list of `[open, close]` pairs
  (in any order). Return the minimum number of visits needed so that every stall
  is ticked off by at least one visit.

  Two windows that merely touch at a shared endpoint — like `[1, 3]` and
  `[3, 5]` — can both be covered by a single visit at that shared minute, because
  the windows are closed. If `windows` is empty, no visits are needed, so return
  `0`.
starter_code: |
