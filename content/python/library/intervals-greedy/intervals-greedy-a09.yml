function_name: min_arrows
input_mode: function
solution_sketch: Sort by close time, visit at the earliest close, and only spend a new visit when a window opens after the last visit minute.
sample_solution: |
  def min_arrows(windows):
      if not windows:
          return 0
      ordered = sorted(windows, key=lambda w: w[1])
      visits = 1
      last = ordered[0][1]
      for open_, close in ordered[1:]:
          if open_ > last:
              visits += 1
              last = close
      return visits
hints:
  - level: 1
    text: If you sort the windows by their close time, the smallest close is the tightest deadline — any single visit that covers it should happen exactly at that close minute.
  - level: 2
    text: Keep the minute of your most recent visit. A window is already covered if it opens at or before that minute; only a window that opens strictly after it forces a brand-new visit.
  - level: 3
    text: Start with one visit placed at the first (smallest) close time. Walk the rest in sorted order; whenever open_ > last, add a visit and move last to that window's close.
