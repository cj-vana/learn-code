explanation_markdown: |
  Each visit is a single point, and a stall's window `[open, close]` is covered
  when that point lands anywhere from `open` to `close` inclusive. The greedy
  insight is to sort the windows by their `close` time and always place a visit at
  the *earliest* close still uncovered. That close is the tightest constraint: any
  point that covers it can be no later than `close`, so pushing the visit right up
  to `close` is never worse and covers as many later-opening windows as possible.

  After placing a visit at `last`, walk the remaining windows in close-time order.
  A window with `open <= last` already contains the visit minute, so it is free.
  The moment you hit a window with `open > last`, no existing visit can reach it,
  so you spend a fresh visit and slide `last` to that window's close. Because the
  list is sorted by close, that new close is the next tightest deadline, and the
  argument repeats. The whole thing is one pass after an `O(n log n)` sort, and
  the `>` comparison (not `>=`) is exactly what lets two windows touching at a
  shared endpoint share a single visit.
common_mistakes:
  - Sorting by open time instead of close time, which breaks the greedy and can overcount visits.
  - Using open_ >= last instead of open_ > last, which wrongly forces a second visit for windows that merely touch at a shared closed endpoint.
  - Forgetting the empty-list case and starting visits at 1 before checking whether there are any windows at all.
