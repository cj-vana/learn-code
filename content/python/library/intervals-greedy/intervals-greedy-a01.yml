prompt_markdown: |
  A rehearsal studio has one stage. Two bands each request a slot, written as
  `[start, end]`. Write `rehearsals_clash(pair)` where `pair` is a list of the
  two slots, `[slot_a, slot_b]`. Return `True` if the two slots overlap in time,
  and `False` otherwise.

  Follow the studio's rule: slots that merely touch — one ending exactly when
  the other begins, like `[1, 3]` and `[3, 5]` — are back to back and do **not**
  clash.
starter_code: |
  def rehearsals_clash(pair):
      return False
function_name: rehearsals_clash
input_mode: function
solution_sketch: Two slots overlap only when each one starts strictly before the other ends.
sample_solution: |
  def rehearsals_clash(pair):
      a, b = pair
      return a[0] < b[1] and b[0] < a[1]
hints:
  - level: 1
    text: Two ranges overlap only if neither one sits entirely to the left of the other.
  - level: 2
    text: Slot a overlaps slot b when a starts before b ends AND b starts before a ends.
  - level: 3
    text: Return `a[0] < b[1] and b[0] < a[1]`, using strict < so touching endpoints count as no clash.
