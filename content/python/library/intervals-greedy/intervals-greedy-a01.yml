explanation_markdown: |
  Two intervals fail to overlap in exactly two situations: the first ends at or
  before the second starts, or the second ends at or before the first starts.
  The negation of both cases collapses to a single clean condition — `a[0] <
  b[1] and b[0] < a[1]` — which is true precisely when the slots share real time.
  The strict `<` is what encodes the back-to-back rule: when one slot ends
  exactly as the other begins, one of the comparisons becomes `3 < 3`, which is
  false, so no clash is reported.
common_mistakes:
  - Using <= instead of <, which wrongly flags back-to-back slots as clashing.
  - Only checking a[0] < b[1] and forgetting the symmetric b[0] < a[1] condition.
  - Assuming the slots always arrive in start-time order and comparing just endpoints.
