      expected: [[1, 2], [3, 4], [9, 10]]
explanation_markdown: |
  Because the route is already sorted and disjoint, you can insert in one pass by
  thinking in three phases. First, copy every block that ends at or before the
  rush block starts (`route[i][1] <= new_start`) — these lie safely to the left,
  and the `<=` leaves a merely-touching earlier block separate. Second, absorb
  every block that starts before the rush block ends (`route[i][0] < new_end`),
  widening the rush block with `min` of the starts and `max` of the ends as you
  go. Append the widened block once. Third, copy whatever remains to the right.
  No re-sort is needed because you preserved the existing order throughout, so
  the whole insert is O(n).
common_mistakes:
  - Appending the whole route then re-sorting and re-merging, which throws away the given order and does redundant work.
  - Using route[i][1] < new_start for the first phase, which drops a touching earlier block into the merge stage by mistake.
  - Forgetting to widen new_start with min, so an overlapping block that starts earlier than the rush loses its left edge.
