prompt_markdown: |
  A courier's day is a list of `[start, end]` delivery blocks that are already
  sorted by start time and never overlap. A new rush delivery comes in. Write
  `insert_delivery(data)` where `data` is a dict with:

  - `"route"`: the existing sorted, non-overlapping blocks.
  - `"rush"`: the new `[start, end]` block to add.

  Return the updated route, still sorted and non-overlapping, merging the rush
  block with any blocks it overlaps. Blocks that merely touch the rush block at
  an endpoint stay separate. Do it in one left-to-right pass, not by re-sorting
  from scratch.
starter_code: |
  def insert_delivery(data):
      return []
function_name: insert_delivery
input_mode: function
solution_sketch: Copy blocks that end before the rush starts, absorb every block that overlaps it, then copy the rest.
sample_solution: |
  def insert_delivery(data):
      route = data["route"]
      new_start, new_end = data["rush"]
      result = []
      i = 0
      n = len(route)
      while i < n and route[i][1] <= new_start:
          result.append(list(route[i]))
          i += 1
      while i < n and route[i][0] < new_end:
          new_start = min(new_start, route[i][0])
          new_end = max(new_end, route[i][1])
          i += 1
      result.append([new_start, new_end])
      while i < n:
          result.append(list(route[i]))
          i += 1
      return result
hints:
  - level: 1
    text: Split the work into three phases — blocks entirely before the rush, blocks that overlap it, and blocks entirely after.
  - level: 2
    text: A block is entirely before if its end <= rush start; it overlaps if its start < rush end.
  - level: 3
    text: While overlapping, widen the rush block with min of starts and max of ends; append it once, then copy the remaining blocks unchanged.
