function_name: interval_intersection
input_mode: function
solution_sketch: Walk both lists with two pointers; the overlap of the current pair is [max(starts), min(ends)] when that is non-empty, then advance whichever block ends first.
sample_solution: |
  def interval_intersection(data):
      first = data["first"]
      second = data["second"]
      result = []
      i = 0
      j = 0
      while i < len(first) and j < len(second):
          lo = max(first[i][0], second[j][0])
          hi = min(first[i][1], second[j][1])
          if lo <= hi:
              result.append([lo, hi])
          if first[i][1] < second[j][1]:
              i += 1
          else:
              j += 1
      return result
hints:
  - level: 1
    text: Keep one pointer into each list. At every step you only compare the two blocks the pointers currently point at.
  - level: 2
    text: The overlap of two blocks is [max of the two starts, min of the two ends]; it is a real block only when that low end is <= that high end.
  - level: 3
    text: After handling the current pair, advance the pointer of whichever block has the smaller end, since that block can never overlap anything later.
