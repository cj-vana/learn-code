prompt_markdown: |
  Two friends each keep a list of the minute ranges during which they were
  listening to the same live radio show. Each list is a series of `[start, end]`
  blocks that are already sorted by `start` and never overlap one another (within
  a single list). You want the minutes when they were BOTH listening.

  Write `interval_intersection(data)` where `data` is a dict with:

  - `"first"`: the first friend's sorted, pairwise-disjoint `[start, end]` blocks.
  - `"second"`: the second friend's sorted, pairwise-disjoint `[start, end]` blocks.

  Return the list of `[start, end]` overlap blocks, in order, where the two
  friends' listening times intersect. Use a two-pointer sweep that walks both
  lists at once. Two blocks that merely touch at a single endpoint DO count as an
  intersection (a zero-width block like `[5, 5]`). If there is no overlap
  anywhere, return `[]`. If either list is empty, return `[]`.

  Example: `{"first": [[0, 2], [5, 10]], "second": [[1, 5], [8, 12]]}` returns
  `[[1, 2], [5, 5], [8, 10]]`.
starter_code: |
