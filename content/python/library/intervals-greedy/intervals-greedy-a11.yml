explanation_markdown: |
  Because each list is already sorted by start and internally disjoint, you never
  need to compare a block against anything except the one the other pointer is on
  right now. For the current pair, the overlap runs from the later of the two
  starts, `max(first[i][0], second[j][0])`, to the earlier of the two ends,
  `min(first[i][1], second[j][1])`. If that low value is less than or equal to the
  high value, the pair overlaps and you record `[lo, hi]`; using `<=` (not `<`)
  keeps zero-width touches like `[5, 5]`.

  The key move is deciding which pointer to advance. The block with the smaller
  end cannot possibly overlap any later block in the other list, since every later
  block starts even further right. So you retire that block by advancing its
  pointer, and the other block stays in play to be checked against the next one.
  Each step advances exactly one pointer, so the sweep is O(m + n) and the results
  come out already in order. When either list runs out (including the empty-input
  case), the loop never starts or stops early and you return what you have.
common_mistakes:
  - Using lo < hi instead of lo <= hi, which drops single-point touches such as [3, 3] that should be included.
  - Advancing both pointers every iteration, which skips over blocks that still had overlap left to contribute.
  - Advancing the pointer with the larger end (or always advancing the same list), which loses valid later intersections.
  - Assuming the two lists are already aligned index-for-index instead of sweeping them independently with two pointers.
