body_markdown: |
  A community darkroom lets members reserve the enlarger in time blocks. Each
  booking is a pair `[start, end]`, and the manager wants a tidy summary: any
  reservations that touch or overlap should be collapsed into one continuous
  block. This is the *interval merging* pattern, and almost every interval
  problem starts the same way — **sort, then sweep**.

  Why sort? When bookings arrive in random order, a block that overlaps another
  could sit anywhere in the list, so you would have to compare every pair. Once
  you sort by start time, any interval that overlaps the one you are currently
  building must come *next*. That single guarantee turns an O(n squared) tangle
  of comparisons into one linear pass after the sort.

  Here is the convention we use across this whole module: an interval `[start,
  end]` runs from `start` up to `end`, and two blocks that merely touch — one
  ending exactly when the next begins, like `[1, 3]` and `[3, 5]` — are
  considered *back to back*, not overlapping. So we merge only when the next
  interval starts *strictly before* the current block ends.

  ```python
  def merge_bookings(bookings):
      if not bookings:
          return []
      ordered = sorted(bookings)          # sort by start, then end
      merged = [list(ordered[0])]
      for start, end in ordered[1:]:
          last = merged[-1]
          if start < last[1]:             # strict: touching does not merge
              last[1] = max(last[1], end)
          else:
              merged.append([start, end])
      return merged
  ```

  Trace it on `[[9, 11], [10, 12], [13, 14]]`. After sorting the order is
  unchanged. We seed `merged` with `[9, 11]`. The next block `[10, 12]` starts
  at 10, which is before 11, so we stretch the end to `max(11, 12) = 12`, giving
  `[9, 12]`. The final block `[13, 14]` starts at 13, which is not before 12, so
  it becomes a fresh entry. Result: `[[9, 12], [13, 14]]`.

  Notice the `max(last[1], end)`. It matters when one interval fully swallows
  another, such as `[9, 20]` followed by `[10, 12]`. The second block starts
  inside the first, but its end is *smaller*, so we must keep the larger end 20
  rather than shrinking the block. Forgetting that `max` is the single most
  common merging bug.

  The shape of this code — sort once, keep a "current" thing, decide per element
  whether to extend it or start a new one — is the reusable skeleton behind
  merging, gap-finding, and conflict detection alike. Learn it here and the rest
  of the module becomes variations on a theme.
checkpoints:
  - question: Why does sorting the intervals by start time let you finish the merge in a single linear pass?
    answer: Because after sorting, any interval that can overlap the block you are currently building is guaranteed to come next in the list, so you never have to look backward or compare distant pairs.
    explanation: The sort is the O(n log n) step; the sweep that follows is O(n), and together they replace the O(n squared) work of comparing every possible pair.
  - question: When extending the current block, why do we write last[1] = max(last[1], end) instead of last[1] = end?
    answer: Because the next interval might be fully contained inside the current block, ending earlier than it does; taking the max keeps the larger end so a nested interval never shrinks the block.
    explanation: For inputs like [9, 20] then [10, 12], plain assignment would wrongly cut the block down to [9, 12].
  - question: Under this module's convention, do the blocks [1, 3] and [3, 5] merge?
    answer: No. They are back to back, and we merge only when the next start is strictly less than the current end, so 3 < 3 is false and they stay separate.
    explanation: Treating a shared endpoint as non-overlapping keeps merging, conflict detection, and room counting consistent across every exercise in this area.
