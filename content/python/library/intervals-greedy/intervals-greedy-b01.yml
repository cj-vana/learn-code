prompt_markdown: |
  A photography studio rents out its single shooting floor. Each booking request
  names a start time, an end time, and the revenue it would bring in. Only one
  shoot can use the floor at a time, so you must pick a set of bookings that never
  overlap, and you want the set that earns the **most total revenue** -- which is
  not always the set with the most bookings.

  You are given `job` with this shape:

  ```
  {"bookings": [[1, 3, 50], [3, 5, 20], [1, 5, 60]]}
  ```

  Each booking is `[start, end, revenue]` with integer times and revenue, and each
  occupies the half-open span from `start` up to `end`. Two bookings are compatible
  when they do not overlap; because the spans are half-open, a booking ending at
  time `t` and another starting exactly at `t` are compatible (the floor is free the
  instant one ends).

  Write `weighted_bookings(job)` that returns the maximum total revenue of any set
  of pairwise-compatible bookings, as an integer.

  Cases the tests cover: an empty sheet earns `0`; two overlapping bookings force a
  choice of the richer one; back-to-back bookings that touch at a boundary can both
  be taken; and a single long lucrative booking may beat several short ones or lose
  to them.
