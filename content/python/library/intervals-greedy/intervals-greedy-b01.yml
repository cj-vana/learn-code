solution_sketch: >-
  Sort bookings by end time, then for each booking binary-search the latest earlier
  booking that finishes at or before it starts; a DP where dp[i] is the best
  revenue using the first i bookings takes max(skip this booking, its revenue plus
  the best compatible prefix).
sample_solution: |
  import bisect


  def weighted_bookings(job):
      bookings = job["bookings"]
      if not bookings:
          return 0
      bookings = sorted(bookings, key=lambda b: b[1])
      ends = [b[1] for b in bookings]
      n = len(bookings)
      dp = [0] * (n + 1)
      for i in range(1, n + 1):
          start, end, revenue = bookings[i - 1]
          compatible = bisect.bisect_right(ends, start, 0, i - 1)
          dp[i] = max(dp[i - 1], revenue + dp[compatible])
      return dp[n]
