explanation_markdown: |
  This is weighted interval scheduling, and the weights are what rule out the
  greedy tricks that work when every booking is worth the same. With revenue on the
  line, "fit the most shoots" can be wrong: in `two_shorts_beat_one_long` the two
  back-to-back shoots earn 70 together while the single overlapping shoot earns 60,
  yet in `long_lucrative_wins` one long booking worth 200 plus a tiny one beats a
  cluster of shorter ones.

  The clean solution sorts bookings by **end time** and builds a DP. Define `dp[i]`
  as the most revenue obtainable using only the first `i` bookings in that sorted
  order. For the `i`-th booking you have two choices: skip it, keeping `dp[i-1]`; or
  take it, earning its revenue plus the best you could do among bookings that finish
  at or before it starts. Because the list is sorted by end, those compatible
  bookings are a prefix, and `bisect_right(ends, start, 0, i-1)` counts exactly how
  many there are -- call it `p` -- so the "take it" value is `revenue + dp[p]`. The
  half-open spans are why `bisect_right` is right: a booking ending at `t` is
  compatible with one starting at `t`.

  Sorting is `O(n log n)` and each of the n steps does an `O(log n)` binary search,
  so the whole thing is `O(n log n)`.
common_mistakes:
  - Greedily taking the most bookings or the earliest-ending ones, which ignores revenue and undercounts when a pricey booking is better.
  - Treating the spans as closed so touching bookings are wrongly judged to overlap, using bisect_left where bisect_right is needed.
  - Searching the whole ends list instead of only the prefix before the current booking, letting a booking pair with itself or a later one.
