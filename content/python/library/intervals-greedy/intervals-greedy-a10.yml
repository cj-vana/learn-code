prompt_markdown: |
  A field station logs each sensor's active window as a `[start, end]` pair on a
  shared timeline. To simplify a report, the operators want to drop any window
  that is *fully covered* by another one, keeping only the windows that pull real
  weight.

  A window `a` covers a window `b` when `a[0] <= b[0]` and `b[1] <= a[1]` — that
  is, `b` sits entirely inside `a` (endpoints may coincide). Write
  `remove_covered(intervals)` where `intervals` is a list of `[start, end]`
  pairs. Return a single integer: how many windows REMAIN after every covered
  window is removed.

  For example, `[[1, 4], [3, 6], [2, 8]]` returns `2`, because `[3, 6]` sits
  inside `[2, 8]` and is dropped, leaving `[1, 4]` and `[2, 8]`. An empty list
  returns `0`.
starter_code: |
  def remove_covered(intervals):
      return 0
function_name: remove_covered
input_mode: function
solution_sketch: Sort by start ascending then end descending, sweep once, and count each window whose end pushes past the running max end.
sample_solution: |
  def remove_covered(intervals):
      ordered = sorted(intervals, key=lambda iv: (iv[0], -iv[1]))
      remaining = 0
      max_end = float("-inf")
      for start, end in ordered:
          if end > max_end:
              remaining += 1
              max_end = end
      return remaining
hints:
  - level: 1
    text: Sort the windows first. If you sort by start ascending, every window that could cover the current one comes earlier in the list.
  - level: 2
    text: When two windows share the same start, put the one with the larger end first (end descending) so the wider window is seen before the narrower one it covers.
  - level: 3
    text: Sweep left to right tracking the largest end seen so far. A window survives only when its end is strictly greater than that running max; otherwise some earlier window already covers it.
