explanation_markdown: |
  A window is covered when some other window starts at or before it and ends at or
  after it. Sorting by start ascending guarantees that any potential coverer is
  processed before the window it might cover, so the only thing left to check is
  the end.

  The tie-break matters: when two windows share a start, the one with the larger
  end must come first (end descending), otherwise the wider window would be
  scanned after the narrow one and we would wrongly count the narrow one as a
  survivor. With the sort in place, keep a running `max_end`. Each window whose
  end is strictly greater than `max_end` reaches past everything seen so far, so
  nothing covers it — count it and raise `max_end`. Any window whose end is `<=`
  `max_end` fits inside an earlier survivor and is dropped. One pass after the
  sort makes this O(n log n) overall.
common_mistakes:
  - Sorting only by start and forgetting the end-descending tie-break, so two windows with the same start count as two survivors when the shorter is actually covered.
  - Using end >= max_end instead of end > max_end, which counts an exact-duplicate or same-end window twice.
  - Returning the list of surviving windows instead of the required integer count.
