prompt_markdown: |
  An observatory rents its telescope during a nightly window and wants to
  advertise the *free* slots. Write `free_slots(data)` where `data` is a dict
  with two keys:

  - `"bookings"`: a list of `[start, end]` reservations, possibly overlapping and
    in any order.
  - `"window"`: a `[open, close]` pair for when the telescope is available.

  Return the free gaps inside the window as a list of `[start, end]` slots,
  sorted by start time. Bookings may spill past the window edges; only report
  free time that lies inside `[open, close]`. If the window is fully booked,
  return `[]`.
