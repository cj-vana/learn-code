function_name: free_slots
input_mode: function
solution_sketch: Clip bookings to the window and merge them, then emit the gaps between consecutive covered blocks.
sample_solution: |
  def free_slots(data):
      bookings = data["bookings"]
      open_t, close_t = data["window"]
      covered = []
      for start, end in sorted(bookings):
          s = max(start, open_t)
          e = min(end, close_t)
          if s >= e:
              continue
          if covered and s <= covered[-1][1]:
              covered[-1][1] = max(covered[-1][1], e)
          else:
              covered.append([s, e])
      gaps = []
      cursor = open_t
      for start, end in covered:
          if start > cursor:
              gaps.append([cursor, start])
          cursor = max(cursor, end)
      if cursor < close_t:
          gaps.append([cursor, close_t])
      return gaps
hints:
  - level: 1
    text: First clip every booking to the window, dropping any part that falls outside [open, close].
  - level: 2
    text: Merge the clipped bookings into covered blocks, then the free slots are the spaces between them.
  - level: 3
    text: Sweep a cursor from open; before each covered block emit [cursor, block_start] if there is a gap, then jump cursor to the block end; finally emit [cursor, close] if any time remains.
