explanation_markdown: |
  Finding free time is the mirror image of merging. First you clip each booking
  to the rentable window, because time booked before `open` or after `close` is
  irrelevant; a clipped interval with `s >= e` disappears entirely. Merging the
  clipped bookings gives the covered blocks. Then a single cursor sweeps from
  `open`: whenever the next covered block starts beyond the cursor, the space
  between them is free, so you emit `[cursor, block_start]`. After each block the
  cursor jumps to the block's end. Any time left between the final block and
  `close` is one last free slot. Back-to-back bookings leave no gap because the
  cursor lands exactly on the next block's start.
common_mistakes:
  - Reporting free time that lies outside the window because bookings were not clipped to [open, close] first.
  - Forgetting the trailing gap between the last covered block and close.
  - Advancing the cursor with cursor = end instead of max(cursor, end), which moves it backward when a nested block ends early.
