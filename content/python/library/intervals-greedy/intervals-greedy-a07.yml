explanation_markdown: |
  The winning greedy rule is to always take the film that *finishes* earliest
  among those that still fit. Sorting by end time lets you scan once, holding
  only `last_end`, the finish time of the most recent film you committed to. A
  film fits when it starts at or after `last_end`, so `start >= last_end` (the
  `>=` permits back-to-back screenings). Every earliest-finishing choice leaves
  the maximum remaining time for later films, which is exactly why the greedy is
  optimal — an exchange argument shows any optimal schedule can be reshaped to
  begin with the earliest finisher without losing any films. Sorting by start
  instead would let one sprawling early film block the scan.
common_mistakes:
  - Sorting by start time, which lets a single long early film crowd out several short ones.
  - Using a strict start > last_end and rejecting legal back-to-back screenings.
  - Trying to maximise total screen time rather than the count of films, which is a different problem.
