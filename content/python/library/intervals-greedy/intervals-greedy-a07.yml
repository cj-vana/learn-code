prompt_markdown: |
  A one-screen cinema hosts a festival and wants to screen as **many** films as
  possible in a day. Each film is a `[start, end]` slot, and no two screenings
  may overlap on the single screen. Write `most_films(films)` returning the
  largest number of non-overlapping films you can schedule.

  A film starting exactly when another ends (`[1, 3]` then `[3, 5]`) is allowed —
  back-to-back is fine. An empty lineup schedules `0` films.
starter_code: |
  def most_films(films):
      return 0
function_name: most_films
input_mode: function
solution_sketch: Sort by end time and greedily take each film that starts at or after the last one taken ends.
sample_solution: |
  def most_films(films):
      ordered = sorted(films, key=lambda f: f[1])
      count = 0
      last_end = None
      for start, end in ordered:
          if last_end is None or start >= last_end:
              count += 1
              last_end = end
      return count
hints:
  - level: 1
    text: Neither the shortest film nor the earliest-starting film is the right greedy pick.
  - level: 2
    text: Sort the films by their end time so you can always commit to whichever finishes soonest.
  - level: 3
    text: Walk the end-sorted list keeping last_end; take a film when start >= last_end, then update last_end to its end.
