explanation_markdown: |
  The clever part is that you defer every refuelling decision. As the airship flies,
  it keeps `fuel` equal to the farthest distance it can currently reach. Every
  station whose position is within that reach gets dropped into a **max-heap** of
  available reserves -- but you do not spend any of them yet. Only when the reach
  falls short of the target do you actually stop, and then you greedily take the
  single largest reserve you have flown over so far. Adding the biggest available
  reserve extends your reach the most per stop, which is exactly what minimises the
  number of stops.

  Each stop pops one reserve and increments the counter, and popping may bring new,
  farther stations into reach, which you then add to the heap. If the reach is short
  of the target and the heap is empty, every reachable station has already been used
  and none carries you farther, so the crossing is impossible and you return `-1`.
  When the start fuel already covers the target, the loop never runs and the answer
  is `0`.

  Sorting the stations is `O(n log n)` and each is pushed and popped at most once, so
  the whole sweep is `O(n log n)`. Note `even_spacing` needs two stops even though
  three stations exist, because greedily banking the reserves lets the airship skip
  paying for one it does not need.
common_mistakes:
  - Refuelling at a station the instant you reach it, which stops more often than necessary instead of banking reserves for when they are needed.
  - Taking the nearest or first available reserve rather than the largest, so each stop buys less reach and the count comes out too high.
  - Forgetting the impossible case, so an empty heap while still short of the target returns a stop count instead of -1.
