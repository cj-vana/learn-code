prompt_markdown: |
  A cargo airship must cross a strait to a landing mast `target` units away. It
  starts with `start_fuel` units of fuel, and one unit of fuel carries it exactly
  one unit of distance. Along the way float refuelling stations, each at a known
  distance from the launch point and each holding a fixed amount of fuel the airship
  can take on in full if it stops there.

  You are given `job` with this shape:

  ```
  {"target": 100, "start_fuel": 10, "stations": [[10, 60], [20, 30], [60, 40]]}
  ```

  Each station is `[position, fuel]`: its distance from launch and the fuel it
  offers. The airship can only take a station's fuel if it can actually reach that
  station with the fuel it currently has (reaching a station's exact position
  counts). Stopping at a station is optional.

  Write `min_fuel_stops(job)` that returns the **minimum number of refuelling stops**
  needed to reach `target`, or `-1` if no sequence of stops gets the airship there.

  Cases the tests cover: enough starting fuel means `0` stops; an unreachable target
  with no usable station returns `-1`; and stations may be passed without stopping
  and revisited in memory later when fuel runs low.
starter_code: |
  def min_fuel_stops(job):
      # Return the fewest stops to reach target, or -1 if impossible.
      return -1
function_name: min_fuel_stops
input_mode: function
solution_sketch: >-
  Sort stations by position and sweep forward tracking the farthest distance
  reachable; whenever that falls short of the next station or the target, take the
  single largest fuel reserve among all stations already passed (a max-heap),
  counting one stop each time, and report -1 if the heap is empty when you stall.
sample_solution: |
  import heapq


  def min_fuel_stops(job):
      target = job["target"]
      fuel = job["start_fuel"]
      stations = sorted(job["stations"])
      passed = []  # max-heap via negated fuel amounts
      stops = 0
      index = 0
      count = len(stations)
      while fuel < target:
          while index < count and stations[index][0] <= fuel:
              heapq.heappush(passed, -stations[index][1])
              index += 1
          if not passed:
              return -1
          fuel += -heapq.heappop(passed)
          stops += 1
      return stops
hints:
  - level: 1
    text: You do not have to decide to refuel the moment you pass a station. Remember every reserve you have flown over, and only cash one in when you would otherwise stall.
  - level: 2
    text: Track the farthest distance you can currently reach. Add every station within that reach into a max-heap of available fuel. If your reach is still short of the target, take the biggest reserve from the heap and add it to your fuel.
  - level: 3
    text: Each time you pop the largest reserve, count one stop. If your reach falls short and the heap is empty, no station can help, so return -1. Stop as soon as your reach meets or exceeds the target.
