prompt_markdown: |
  A museum mounts a row of artefacts along a straight display beam, each with a
  known weight. A conservator wants to find a support post position so that the
  total weight strictly to the left of that post equals the total weight strictly
  to the right of it. The artefact sitting at the post position is carried by the
  post itself and counts for neither side.

  Write `balance_point(weights)` that returns the smallest 0-based index where the
  left and right totals are equal, or `-1` if no such position exists. For
  `[3, 1, 5, 2, 2]` the answer is `2`, because `3 + 1` equals `2 + 2`.
starter_code: |
  def balance_point(weights):
      return -1
function_name: balance_point
input_mode: function
solution_sketch: Track the left prefix sum and derive the right side from the total minus left minus the current weight.
sample_solution: |
  def balance_point(weights):
      total = sum(weights)
      left = 0
      for i, weight in enumerate(weights):
          right = total - left - weight
          if left == right:
              return i
          left += weight
      return -1
hints:
  - level: 1
    text: The right side equals the whole total minus the left side minus the weight at the current index.
  - level: 2
    text: Sum everything once, then sweep left to right growing a running left total.
  - level: 3
    text: At index i compare left with total - left - weights[i]; add weights[i] to left only after the check.
