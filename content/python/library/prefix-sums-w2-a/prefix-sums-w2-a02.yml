explanation_markdown: |
  Precomputing the grand total lets each index test its balance in O(1): the right
  side is `total - left - weights[i]`. Growing `left` as you pass each artefact
  keeps the whole sweep O(n). A lone artefact balances at index 0 because both
  empty sides sum to 0, and an empty beam has no position, so it returns `-1`.
common_mistakes:
  - Including the current index's weight in the left or right side instead of excluding it.
  - Adding weights[i] to the left total before comparing, which shifts every check.
  - Recomputing the right sum with a fresh loop at each index, making it O(n^2).
