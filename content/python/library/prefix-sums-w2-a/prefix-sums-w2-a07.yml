prompt_markdown: |
  A museum logs how many visitors pass through the doors on each day of a season.
  The press office keeps asking for total attendance across different date ranges,
  so you precompute once and answer each request instantly.

  Write `range_visitor_totals(data)` where `data` is a dict with keys `visitors`
  (a list of daily visitor counts) and `queries` (a list of `[start, end]` pairs
  of 0-based day indices, both ends inclusive). Return a list with the total
  attendance for each query, in the order the queries are given.
starter_code: |
  def range_visitor_totals(data):
      return []
function_name: range_visitor_totals
input_mode: function
solution_sketch: Build a prefix-sum array once, then answer each inclusive range as a subtraction of two prefixes.
sample_solution: |
  def range_visitor_totals(data):
      visitors = data["visitors"]
      queries = data["queries"]
      prefix = [0]
      for count in visitors:
          prefix.append(prefix[-1] + count)
      result = []
      for start, end in queries:
          result.append(prefix[end + 1] - prefix[start])
      return result
hints:
  - level: 1
    text: Precompute cumulative attendance so any range total is a single subtraction.
  - level: 2
    text: Let prefix[k] be the total of the first k days, with prefix[0] equal to 0.
  - level: 3
    text: An inclusive range [start, end] totals prefix[end + 1] - prefix[start].
