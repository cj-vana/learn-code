explanation_markdown: |
  Building the prefix array costs O(n) once, after which every range query is an
  O(1) subtraction, so `q` queries take O(n + q) instead of O(n * q). The extra
  leading `0` lets a range that starts on day 0 work without a special case, since
  `prefix[start]` is then `prefix[0]`, which is 0.
common_mistakes:
  - Using `prefix[end] - prefix[start]` and dropping the final day of the range.
  - Omitting the leading 0, which breaks any query that begins at day 0.
  - Re-summing the slice for each query, which defeats the purpose of prefix sums.
