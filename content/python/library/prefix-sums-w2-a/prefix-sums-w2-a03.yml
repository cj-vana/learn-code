explanation_markdown: |
  The running total is a prefix sum, and the answer is the first prefix that clears
  the goal. One left-to-right pass finds it in O(n) without ever re-adding earlier
  pledges. Because the check is `>=`, a pledge that lands exactly on the goal still
  counts, and an empty campaign never triggers it, so it reports `-1`.
common_mistakes:
  - Using a strict `>` so a pledge that hits the goal exactly is missed.
  - Returning the running total or the pledge value instead of the index.
  - Forgetting the -1 result when the goal is never reached.
