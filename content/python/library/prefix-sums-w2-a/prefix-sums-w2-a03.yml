prompt_markdown: |
  A crowdfunding campaign receives pledges one at a time in the order they arrive.
  Organisers want to know exactly which pledge pushes the running total to the
  funding goal.

  Write `funding_reached(data)` where `data` is a dict with keys `pledges` (a list
  of pledge amounts) and `goal` (a number). Return the 0-based index of the pledge
  at which the running total first reaches or exceeds `goal`, or `-1` if the
  campaign never gets there.
starter_code: |
  def funding_reached(data):
      return -1
function_name: funding_reached
input_mode: function
solution_sketch: Accumulate a running total and return the first index where it meets the goal.
sample_solution: |
  def funding_reached(data):
      pledges = data["pledges"]
      goal = data["goal"]
      running = 0
      for i, pledge in enumerate(pledges):
          running += pledge
          if running >= goal:
              return i
      return -1
hints:
  - level: 1
    text: Keep a running sum of pledges as you scan left to right.
  - level: 2
    text: After adding each pledge, check whether the running total has reached the goal.
  - level: 3
    text: Return the index the moment running >= goal; if the loop finishes, return -1.
