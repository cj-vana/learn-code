prompt_markdown: |
  A neighbourhood bakery records how many loaves it pulls from the oven each hour
  of the morning. Write `cumulative_loaves(counts)` that returns a new list where
  position `i` holds the total number of loaves baked from the first hour up to
  and including hour `i`.

  For example, `[2, 5, 3]` gives `[2, 7, 10]`. An empty morning returns an empty
  list.
starter_code: |
  def cumulative_loaves(counts):
      return []
function_name: cumulative_loaves
input_mode: function
solution_sketch: Carry one running total and append it after adding each hour's count.
sample_solution: |
  def cumulative_loaves(counts):
      totals = []
      running = 0
      for count in counts:
          running += count
          totals.append(running)
      return totals
hints:
  - level: 1
    text: Each answer is the previous total plus this hour's loaf count.
  - level: 2
    text: Keep a single running sum and walk the list from left to right.
  - level: 3
    text: After adding each count to the running total, append that total to the result.
