explanation_markdown: |
  A prefix-sum list answers "how many so far" in a single left-to-right pass. By
  carrying one `running` total and appending it after each hour, the work is O(n)
  instead of re-summing every earlier hour at each position.
common_mistakes:
  - Resetting the running total inside the loop, which discards earlier hours.
  - Re-summing counts[:i+1] at each hour, which is O(n^2) instead of O(n).
  - Appending the current count instead of the accumulated total.
