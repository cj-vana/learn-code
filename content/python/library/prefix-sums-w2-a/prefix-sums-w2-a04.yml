      expected: 1
explanation_markdown: |
  Each balance is a prefix sum of the movements, so one pass tracks it in O(n).
  Counting the steps where that prefix is strictly negative answers the question
  directly. Note that a balance of exactly 0 is not in the red, so a movement that
  returns the till to 0 is not counted.
common_mistakes:
  - Counting balances of exactly 0 as red by using `<=` instead of `<`.
  - Counting negative movements rather than negative running balances.
  - Resetting the running balance during the loop and losing earlier movements.
