prompt_markdown: |
  A market stall starts the day with an empty till holding 0 dollars. Throughout
  the day cash moves in and out in order: a positive number is money added and a
  negative number is money taken out. The till is "in the red" whenever its
  running balance drops below 0.

  Write `count_red_moments(movements)` that returns how many movements leave the
  running balance below 0. For `[-2, 1, -3, 5]` the balance passes through
  `-2, -1, -4, 1`, so three movements end in the red.
starter_code: |
  def count_red_moments(movements):
      return 0
function_name: count_red_moments
input_mode: function
solution_sketch: Track the running balance and count each step where it falls below zero.
sample_solution: |
  def count_red_moments(movements):
      running = 0
      red = 0
      for movement in movements:
          running += movement
          if running < 0:
              red += 1
      return red
hints:
  - level: 1
    text: The till's balance after each movement is a running prefix sum.
  - level: 2
    text: Update the running balance, then check whether it is below zero.
  - level: 3
    text: Increment a counter every time the running balance is negative after a movement.
tests:
