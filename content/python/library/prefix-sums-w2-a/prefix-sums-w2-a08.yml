explanation_markdown: |
  Every contiguous block is the difference of two prefix sums, so a block totals
  `target` exactly when an earlier prefix equals the current prefix minus `target`.
  Recording only the first index where each prefix value appears lets each match
  measure the widest possible span, and the whole scan stays O(n). Seeding the map
  with `{0: -1}` handles blocks that start at the very first episode, and repeated
  prefixes from zero-length episodes correctly stretch a matching run.
common_mistakes:
  - Overwriting a prefix's stored index on later occurrences, which shortens the measured span.
  - "Forgetting to seed the map with {0: -1}, missing blocks that begin at episode 0."
  - Falling back to checking every start and end pair, which is O(n^2) instead of O(n).
