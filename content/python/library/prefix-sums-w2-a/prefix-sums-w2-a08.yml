      return 0
function_name: longest_exact_run
input_mode: function
solution_sketch: Scan prefix sums, storing the first index each prefix appears, and measure the widest gap to a prefix that is target smaller.
sample_solution: |
  def longest_exact_run(data):
      episodes = data["episodes"]
      target = data["target"]
      first_seen = {0: -1}
      running = 0
      best = 0
      for i, length in enumerate(episodes):
          running += length
          needed = running - target
          if needed in first_seen:
              span = i - first_seen[needed]
              if span > best:
                  best = span
          if running not in first_seen:
              first_seen[running] = i
      return best
hints:
  - level: 1
    text: A block from index a+1 to i sums to prefix[i] minus prefix[a], so an exact-target block needs an earlier prefix that is target smaller.
  - level: 2
    text: As you build the running prefix sum, look for the value running - target among prefixes you have already seen.
  - level: 3
    text: "Store only the first index where each prefix value appears (seed with {0: -1}) so the span you measure is as long as possible."
