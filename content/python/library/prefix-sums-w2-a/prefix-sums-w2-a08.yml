prompt_markdown: |
  A podcast feed lists its episodes in order, each with a length in minutes. A
  listener has a commute of exactly `target` minutes and wants to fill it with the
  longest possible run of consecutive episodes that adds up to exactly that many
  minutes.

  Write `longest_exact_run(data)` where `data` is a dict with keys `episodes` (a
  list of episode lengths) and `target` (a number). Return the number of episodes
  in the longest contiguous block whose lengths sum to exactly `target`, or `0` if
  no block matches.
starter_code: |
