prompt_markdown: |
  A service elevator begins the shift parked at ground level, floor 0. It then
  performs a sequence of moves: a positive number lifts it up that many floors and
  a negative number lowers it that many floors.

  Write `times_at_ground(moves)` that returns how many moves finish with the
  elevator back exactly at floor 0. For `[2, -2, 3, -3]` the elevator visits floors
  `2, 0, 3, 0`, returning to the ground twice.
starter_code: |
  def times_at_ground(moves):
      return 0
function_name: times_at_ground
input_mode: function
solution_sketch: Accumulate the current floor as a running sum and count each time it lands on zero.
sample_solution: |
  def times_at_ground(moves):
      floor = 0
      count = 0
      for move in moves:
          floor += move
          if floor == 0:
              count += 1
      return count
hints:
  - level: 1
    text: The current floor after each move is a running prefix sum of the moves.
  - level: 2
    text: Add each move to the running floor, then check whether it equals 0.
  - level: 3
    text: Increment a counter every time the running floor returns to 0 after a move.
tests:
