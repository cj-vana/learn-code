    - name: dips_below_first
      input: [-2, 2, -5, 5]
      expected: 2
explanation_markdown: |
  Tracking the elevator's floor is a running prefix sum of the moves, so one O(n)
  pass reveals every moment it is back on the ground. Counting the steps where that
  prefix equals 0 gives the answer. The elevator may dip below ground and still
  return, so both upward and downward trips are handled the same way.
common_mistakes:
  - Counting moves of 0 net effect instead of the running floor being 0.
  - Only checking the final floor rather than every intermediate stop.
  - Assuming the elevator only ever moves upward, missing returns from below ground.
