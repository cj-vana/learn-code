prompt_markdown: |
  A relay race is split into legs of given lengths in kilometres. The organisers
  place a distance marker at the start line and at the end of every leg, so each
  marker shows the total distance covered so far.

  Write `distance_markers(legs)` that returns the list of marker values. It starts
  with `0` for the start line, so the result has one more entry than the number of
  legs. For `[5, 3, 2]` the markers are `[0, 5, 8, 10]`. No legs still gives the
  start marker, `[0]`.
starter_code: |
  def distance_markers(legs):
      return [0]
function_name: distance_markers
input_mode: function
solution_sketch: Seed the result with a leading 0 and append each cumulative distance as you add legs.
sample_solution: |
  def distance_markers(legs):
      markers = [0]
      for leg in legs:
          markers.append(markers[-1] + leg)
      return markers
hints:
  - level: 1
    text: Start the result with a single 0 for the start line before any leg.
  - level: 2
    text: Each new marker is the last marker plus the current leg's length.
  - level: 3
    text: Append markers[-1] + leg for every leg so the list grows by one each time.
