explanation_markdown: |
  This is the classic prefix-sum array: `markers[k]` is the sum of the first `k`
  legs, and the leading `0` represents the start line before any distance is run.
  Building it costs O(n), and its real value shows later, because the distance of
  any single leg or stretch becomes a subtraction of two markers.
common_mistakes:
  - Forgetting the leading 0, so the markers are misaligned by one leg.
  - Returning only the final total instead of every marker.
  - Recomputing each marker by re-summing all earlier legs, which is O(n^2).
