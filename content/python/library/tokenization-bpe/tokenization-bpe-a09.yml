    - name: merge_into_marker
      input:
        text: "cats"
        merges: [["s", "</w>"]]
      expected: ["c", "a", "t", "s</w>"]
    - name: two_merges_two_words
      input:
        text: "tea time"
        merges: [["t", "e"], ["t", "i"]]
      expected: ["te", "a", "</w>", "ti", "m", "e", "</w>"]
    - name: run_of_letters
      input:
        text: "aaa"
        merges: [["a", "a"]]
      expected: ["aa", "a", "</w>"]
    - name: no_merges
      input:
        text: "go"
        merges: []
      expected: ["g", "o", "</w>"]
explanation_markdown: |
  Real tokenizers run per word so that merges never reach across a space, which
  is why splitting comes first and the token lists are only concatenated at the
  end. The `"</w>"` marker is what lets the vocabulary distinguish a suffix that
  ends a word (`"s</w>"`) from the same letters mid-word, and because it is just
  another symbol a merge like `["s", "</w>"]` can fuse it onto the preceding
  letter. Each word costs `O(m * k)` for `m` merges and word length `k`, so the
  whole line is linear in its total length times the number of merges.
common_mistakes:
  - Forgetting to append '</w>' to each word, so word-final tokens are indistinguishable and marker merges never fire.
  - Splitting the whole text into characters up front, which lets merges cross word boundaries.
  - Resetting or replacing the result list per word instead of extending one shared list, losing earlier words.
