tests:
  public:
    - name: empty_text
      input:
        text: ""
        merges: []
      expected: []
    - name: two_words
      input:
        text: "low lower"
        merges: [["l", "o"], ["lo", "w"]]
      expected: ["low", "</w>", "low", "e", "r", "</w>"]
    - name: repeated_word
      input:
        text: "ab ab"
        merges: [["a", "b"]]
      expected: ["ab", "</w>", "ab", "</w>"]
