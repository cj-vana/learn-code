solution_sketch: Split on whitespace; for each word form list(word) + ['</w>'], apply each merge with the greedy non-overlapping sweep, and extend one shared token list with the result.
sample_solution: |
  def tokenize_text(job):
      merges = job["merges"]
      tokens = []
      for word in job["text"].split():
          symbols = list(word) + ["</w>"]
          for pair in merges:
              left, right = pair[0], pair[1]
              joined = left + right
              rebuilt = []
              i = 0
              n = len(symbols)
              while i < n:
                  if i < n - 1 and symbols[i] == left and symbols[i + 1] == right:
                      rebuilt.append(joined)
                      i += 2
                  else:
                      rebuilt.append(symbols[i])
                      i += 1
              symbols = rebuilt
          tokens.extend(symbols)
      return tokens
