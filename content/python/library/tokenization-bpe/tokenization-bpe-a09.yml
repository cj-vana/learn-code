prompt_markdown: |
  A lighthouse keeper wants to feed her nightly log into a byte-pair encoding
  (BPE) tokenizer. Full-text tokenization has three steps: split the text into
  words, break each word into symbols, then merge the symbols.

  Write `tokenize_text(job)` where `job` is a dict with:

  - `"text"`: the log line, a string.
  - `"merges"`: a list of learned merges, each a two-item list `[x, y]`.

  Steps:

  1. Split `text` into words on whitespace using `text.split()` (runs of spaces
     collapse and there are no empty words). An empty or all-space text yields no
     words at all.
  2. For each word, build its symbol list as the word's characters **plus a final
     end-of-word marker** `"</w>"`. So `"ab"` starts as `["a", "b", "</w>"]`. The
     marker lets the tokenizer tell a word-final piece from a word-internal one,
     and merges may glue a letter onto it.
  3. Apply every merge to that symbol list, in order. To apply `[x, y]`, scan
     left to right and replace each adjacent `x`-then-`y` with the joined symbol
     `x + y`, greedily and non-overlapping (advance past both consumed symbols).
  4. Concatenate the merged symbol lists of all words, in order, into one flat
     token list.

  Example: `job = {"text": "ab ab", "merges": [["a", "b"]]}` returns
  `["ab", "</w>", "ab", "</w>"]`.
starter_code: |
  def tokenize_text(job):
      tokens = []
      for word in job["text"].split():
          symbols = list(word) + ["</w>"]
          tokens.extend(symbols)
      return tokens
function_name: tokenize_text
