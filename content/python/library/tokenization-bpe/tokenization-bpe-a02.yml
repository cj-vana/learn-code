  public:
    - name: two_identical_words
      input: [["l", "o", "w", "</w>"], ["l", "o", "w", "</w>"]]
      expected: {"l o": 2, "o w": 2, "w </w>": 2}
    - name: single_word
      input: [["t", "e", "a", "</w>"]]
