prompt_markdown: |
  A byte-pair-encoding tokenizer decides what to merge by looking at which two
  neighbouring symbols sit side by side most often. Your job is the counting
  step.

  Write `pair_counts(corpus)` where `corpus` is a list of words and each word is
  itself a list of symbol strings (for example the output of the previous
  exercise). Look at every **adjacent pair** of symbols inside each word. Build a
  dictionary whose keys are the two symbols joined by a single space (the pair
  `"l"` then `"o"` becomes the key `"l o"`) and whose values count how many times
  that ordered pair appears across the whole corpus.

  For example, `[["l", "o", "w", "</w>"], ["l", "o", "w", "</w>"]]` has the
  adjacent pairs `l o`, `o w`, and `w </w>` in each word, so the result is
  `{"l o": 2, "o w": 2, "w </w>": 2}`. A word with fewer than two symbols
  contributes no pairs, and an empty corpus returns an empty dict.
starter_code: |
  def pair_counts(corpus):
      return {}
function_name: pair_counts
input_mode: function
solution_sketch: For each word, walk indices 0..len-2, build the space-joined key from symbols[i] and symbols[i+1], and increment its count in a dict.
sample_solution: |
  def pair_counts(corpus):
      counts = {}
      for symbols in corpus:
          for i in range(len(symbols) - 1):
              key = symbols[i] + " " + symbols[i + 1]
              counts[key] = counts.get(key, 0) + 1
      return counts
hints:
  - level: 1
    text: An adjacent pair is symbols[i] together with symbols[i + 1], so the last valid i is len(symbols) - 2.
  - level: 2
    text: Build the dictionary key by concatenating the two symbols with a single space between them.
  - level: 3
    text: Use counts.get(key, 0) + 1 to add one, which handles both the first sighting and later repeats of a pair.
