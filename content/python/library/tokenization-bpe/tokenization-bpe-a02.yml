    - name: repeated_letter_word
      input: [["a", "a", "a", "</w>"]]
      expected: {"a a": 2, "a </w>": 1}
    - name: shared_neighbours
      input: [["m", "o", "o", "n", "</w>"], ["m", "o", "o", "n", "</w>"], ["s", "o", "o", "n", "</w>"]]
      expected: {"m o": 2, "o o": 3, "o n": 3, "n </w>": 3, "s o": 1}
explanation_markdown: |
  Counting adjacent pairs is the heartbeat of BPE: whichever pair is most common
  is the next candidate to be merged into a single symbol. Each word of length
  `n` contributes `n - 1` pairs, so the loop runs from index `0` to `n - 2`. The
  space-joined string key keeps each ordered pair distinct and human-readable,
  and `dict.get(key, 0) + 1` accumulates counts without a separate check for
  whether the key already exists. The whole pass is `O(total symbols)`.
common_mistakes:
  - Looping to len(symbols) instead of len(symbols) - 1, which reads past the end when forming symbols[i + 1].
  - Forgetting the space in the key so "l" + "o" collides with a real symbol named "lo".
  - Counting pairs per word only and overwriting instead of accumulating across the whole corpus.
