prompt_markdown: |
  A byte-pair encoding (BPE) tokenizer can only emit symbols in its vocabulary.
  When it meets a piece it never learned, it substitutes a special unknown token
  `"<unk>"`. A radio operator decoding a noisy word wants that fallback, but with
  one extra rule: a run of consecutive unknown pieces should collapse into a
  single `"<unk>"` so the noise reads as one gap, not many.

  Write `unknown_handling(job)` where `job` is a dict with:

  - `"word"`: a single word, a string.
  - `"merges"`: a list of learned merges, each a two-item list `[x, y]`.
  - `"vocab"`: a list of the tokens the tokenizer knows.

  Steps:

  1. Tokenize the single word: build its symbols as `list(word) + ["</w>"]`, then
     apply every merge in order. Each merge `[x, y]` replaces adjacent `x`-then-`y`
     with `x + y`, scanned left to right, greedily and non-overlapping (advance
     past both consumed symbols).
  2. Walk the resulting tokens left to right. Keep each token that is in `vocab`;
     replace any token that is not in `vocab` with `"<unk>"`.
  3. Collapse adjacent unknowns: if replacing a token with `"<unk>"` would place it
     immediately after a `"<unk>"` you already kept, drop it instead. A run of
     several unknown tokens therefore becomes a single `"<unk>"`. Known tokens are
     never collapsed, even identical ones.

  Return the resulting token list.

  Example: `job = {"word": "qrst", "merges": [], "vocab": ["t", "</w>"]}` tokenizes
  to `["q", "r", "s", "t", "</w>"]`; `q`, `r`, `s` are all unknown and collapse to
  one `"<unk>"`, giving `["<unk>", "t", "</w>"]`.
starter_code: |
