solution_sketch: Tokenize the single word with the end marker and the merge sweep, then map each token to itself or '<unk>', skipping an unknown when the previous kept token is already '<unk>'.
sample_solution: |
  def unknown_handling(job):
      symbols = list(job["word"]) + ["</w>"]
      for pair in job["merges"]:
          left, right = pair[0], pair[1]
          joined = left + right
          rebuilt = []
          i = 0
          n = len(symbols)
          while i < n:
              if i < n - 1 and symbols[i] == left and symbols[i + 1] == right:
                  rebuilt.append(joined)
                  i += 2
              else:
                  rebuilt.append(symbols[i])
                  i += 1
          symbols = rebuilt

      vocab = set(job["vocab"])
      result = []
      for token in symbols:
          piece = token if token in vocab else "<unk>"
          if piece == "<unk>" and result and result[-1] == "<unk>":
              continue
          result.append(piece)
      return result
