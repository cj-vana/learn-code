explanation_markdown: |
  Out-of-vocabulary handling is what lets a fixed tokenizer cope with text it was
  never trained on. Two ideas combine here. First, tokenizing still runs
  normally: the word is split, the marker is appended, and the merges fire, so a
  piece the vocabulary does know (like the merged `"zz"`) is preserved even when
  its neighbors are unknown. Second, the fallback replaces every unrecognized
  piece with `"<unk>"`, and the collapse rule keeps a stretch of noise from
  exploding into a long row of identical unknown tokens — a single check against
  the last kept token turns any run into one gap. Note that the collapse only
  applies to unknowns; two identical *known* tokens (as could happen with `"o"`
  appearing twice) are both kept, because they carry real information.
common_mistakes:
  - Collapsing known tokens too, or collapsing an unknown against a known neighbor, instead of only merging consecutive '<unk>' tokens.
  - Comparing against the original token rather than the last item already appended, so a '<unk>' following a known token gets wrongly dropped.
  - Skipping the '</w>' marker or the merge pass, so tokens that should be known are misclassified as unknown.
