prompt_markdown: |
  A BPE tokenizer merges one pair at a time, always the pair that currently
  appears most often. When two pairs are tied for most frequent, real
  implementations need a **deterministic** rule so the same corpus always
  produces the same tokenizer. We break ties alphabetically by the pair's key.

  Write `best_pair(counts)` where `counts` is a dictionary mapping a space-joined
  pair key (like `"l o"`) to its integer frequency. Return the single key string
  with the highest count. If several keys share the highest count, return the one
  that comes **first in alphabetical (ascending string) order**. If `counts` is
  empty, return `None`.

  For example `{"l o": 5, "o w": 5, "w </w>": 2}` returns `"l o"`, because `l o`
  and `o w` are tied at 5 and `"l o"` sorts before `"o w"`.
starter_code: |
  def best_pair(counts):
      return None
function_name: best_pair
input_mode: function
solution_sketch: Iterate keys in sorted (alphabetical) order and keep the first key whose count strictly exceeds the best seen so far, which yields the max with an alphabetical tie-break.
sample_solution: |
  def best_pair(counts):
      if not counts:
          return None
      best_key = None
      best_count = None
      for key in sorted(counts):
          count = counts[key]
          if best_count is None or count > best_count:
              best_count = count
              best_key = key
      return best_key
hints:
  - level: 1
    text: The answer is an argmax over the dictionary values, but ties must be resolved the same way every time.
  - level: 2
    text: If you walk the keys in sorted() order and only replace your best when you find a strictly larger count, the earliest alphabetical key among the maxima wins.
  - level: 3
    text: Handle the empty dict up front by returning None, then loop with a strict > comparison so equal counts never overwrite an earlier (smaller) key.
