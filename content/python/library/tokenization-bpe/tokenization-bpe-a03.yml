explanation_markdown: |
  Greedy BPE always fuses the most frequent adjacent pair, so this argmax is the
  decision maker for every training round. The subtlety is reproducibility: with
  no tie-break, dictionary iteration order could hand back different pairs on
  different runs and produce different tokenizers. Sorting the keys first and
  replacing the running best only on a **strict** increase guarantees that among
  all pairs sharing the maximum count, the alphabetically smallest key is
  returned. Scanning costs `O(m log m)` for `m` pairs because of the sort, which
  is negligible compared to the rest of a training loop.
common_mistakes:
  - Using >= instead of > so a later, larger-sorting key overwrites the correct alphabetical winner on a tie.
  - Returning the count or the (key, count) pair instead of just the key string.
  - Forgetting the empty-dictionary case, which should return None rather than raising.
