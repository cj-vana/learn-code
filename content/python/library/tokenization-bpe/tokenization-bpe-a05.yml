prompt_markdown: |
  A single BPE merge has to touch every word in the corpus, not just one. Having
  built a single-word merge, you now apply it everywhere.

  Write `merge_corpus(job)` where `job` is a dict with two keys:

  - `"corpus"`: a list of words, each word a list of symbol strings
  - `"pair"`: a two-element list `[x, y]` naming the pair to merge

  Return a **new** list holding each word after the pair `[x, y]` has been merged
  inside it. Use the same rule as before: scan each word left to right and, every
  time symbol `x` is immediately followed by symbol `y`, replace the two with the
  glued symbol `x + y`, continuing after the merge so occurrences never overlap.
  Words with no occurrence are copied unchanged. An empty corpus returns an empty
  list.

  For example, merging `["l", "o"]` across
  `[["l", "o", "w", "</w>"], ["l", "o", "w", "e", "r", "</w>"]]` gives
  `[["lo", "w", "</w>"], ["lo", "w", "e", "r", "</w>"]]`.
