function_name: merge_corpus
input_mode: function
solution_sketch: Reuse the single-word non-overlapping merge and map it over every word in the corpus, collecting the rewritten words into a new list.
sample_solution: |
  def merge_corpus(job):
      corpus = job["corpus"]
      x, y = job["pair"]

      def merge_word(symbols):
          result = []
          i = 0
          n = len(symbols)
          while i < n:
              if i < n - 1 and symbols[i] == x and symbols[i + 1] == y:
                  result.append(x + y)
                  i += 2
              else:
                  result.append(symbols[i])
                  i += 1
          return result

      return [merge_word(word) for word in corpus]
