tests:
  public:
    - name: two_words
      input: {corpus: [["l", "o", "w", "</w>"], ["l", "o", "w", "</w>"]], pair: ["l", "o"]}
      expected: [["lo", "w", "</w>"], ["lo", "w", "</w>"]]
    - name: mixed_lengths
      input: {corpus: [["l", "o", "w", "</w>"], ["l", "o", "w", "e", "r", "</w>"]], pair: ["l", "o"]}
      expected: [["lo", "w", "</w>"], ["lo", "w", "e", "r", "</w>"]]
    - name: empty_corpus
      input: {corpus: [], pair: ["a", "b"]}
      expected: []
  validation:
    - name: only_some_match
      input: {corpus: [["c", "a", "t", "</w>"], ["c", "o", "t", "</w>"]], pair: ["c", "a"]}
      expected: [["ca", "t", "</w>"], ["c", "o", "t", "</w>"]]
    - name: overlapping_within_words
      input: {corpus: [["a", "a", "a", "</w>"], ["a", "a", "</w>"]], pair: ["a", "a"]}
      expected: [["aa", "a", "</w>"], ["aa", "</w>"]]
    - name: merge_before_marker
      input: {corpus: [["t", "e", "a", "</w>"], ["s", "e", "a", "</w>"]], pair: ["e", "a"]}
      expected: [["t", "ea", "</w>"], ["s", "ea", "</w>"]]
explanation_markdown: |
  A BPE training round is "pick a pair, then apply that pair to the whole
  corpus," and this function is the second half. Because each word merges
  independently, the corpus-wide step is just the single-word merge mapped over
  every word, which is why factoring the per-word logic into a helper keeps the
  code clean. Building a brand-new list rather than mutating the input matters:
  the training loop compares symbol counts before and after, so the caller relies
  on the original corpus staying intact until it chooses to replace it.
common_mistakes:
  - Mutating each word list in place instead of returning freshly built lists, which can corrupt the caller's data.
  - Re-implementing the merge slightly differently per word and reintroducing the overlapping-match bug.
  - Returning a flat list of symbols instead of a list of per-word symbol lists.
