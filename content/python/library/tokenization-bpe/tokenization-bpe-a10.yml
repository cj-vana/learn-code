explanation_markdown: |
  Detokenization is the mirror image of tokenization. The tokenizer discarded the
  original spaces and instead recorded each word ending with `"</w>"`, so the
  restore path is to concatenate everything, then swap every marker back to the
  space it stood in for. Doing the join first is what makes fused tokens like
  `"s</w>"` work: after joining, the marker is still a contiguous substring, so a
  single `.replace("</w>", " ")` handles both standalone and fused markers. The
  closing `.strip()` cleans up the trailing space left by the very last word.
common_mistakes:
  - Joining tokens with a space, which inserts separators between subword pieces of the same word (turning 'low' + 'e' + 'r' into 'low e r').
  - Forgetting to strip, so the trailing marker leaves an extra space at the end of the string.
  - Replacing '</w>' with an empty string instead of a space, which fuses adjacent words together.
