prompt_markdown: |
  A byte-pair encoding (BPE) tokenizer turns text into subword tokens where the
  marker `"</w>"` records where each word ended. To read the tokens back as plain
  text you invert that process.

  Write `detokenize(tokens)` that takes a list of token strings and returns the
  restored text as a single string. The rule has exactly three steps:

  1. Concatenate all tokens into one string with no separators (`"".join(tokens)`).
  2. Replace every occurrence of the marker `"</w>"` with a single space. Each
     end-of-word marker was where a word finished, so it becomes the space that
     follows that word.
  3. Strip leading and trailing whitespace from the result (`.strip()`), since the
     final word's marker leaves a trailing space.

  A token may carry the marker fused onto letters, like `"s</w>"` — the `.replace`
  still turns the `"</w>"` part into a space, leaving the letters. An empty token
  list returns the empty string.

  Example: `tokens = ["c", "a", "t", "s</w>"]` returns `"cats"`; and
  `["te", "a", "</w>", "ti", "m", "e", "</w>"]` returns `"tea time"`.
starter_code: |
  def detokenize(tokens):
      text = "".join(tokens)
      return text
function_name: detokenize
input_mode: function
solution_sketch: Join the tokens into one string, replace every '</w>' with a space, then strip the leading and trailing whitespace.
sample_solution: |
  def detokenize(tokens):
      joined = "".join(tokens)
      spaced = joined.replace("</w>", " ")
      return spaced.strip()
hints:
  - level: 1
    text: Because the tokenizer glued a word's pieces together with no separators, joining the tokens with an empty string rebuilds the raw stream first.
  - level: 2
    text: Every '</w>' marked a word ending, so turning each one into a space recreates the word boundaries in one replace call.
  - level: 3
    text: The last word's marker becomes a trailing space, so finish with .strip() to remove leading and trailing whitespace.
