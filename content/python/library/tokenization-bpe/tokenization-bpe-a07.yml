explanation_markdown: |
  Byte-pair encoding grows subword tokens by repeatedly gluing the pair of
  adjacent symbols the rules say to merge. The key subtlety is the greedy,
  non-overlapping sweep: once you consume `symbols[i]` and `symbols[i+1]` into a
  joined token you must advance the index by two, otherwise a run like `aaaa`
  would double-count the middle `a`. Because merges run in order and each one
  rebuilds the list, a later rule can operate on tokens an earlier rule created
  (as in `['s','s'] -> 'ss'` then `['i','ss'] -> 'iss'`). Each merge is a single
  left-to-right pass, so applying `m` merges to a word of length `n` costs
  `O(m * n)`.
common_mistakes:
  - Stepping the index by 1 after a successful merge, which lets overlapping pairs double-count symbols in runs like 'aaaa'.
  - Mutating the list in place while iterating instead of building a fresh list for each merge pass.
  - Applying merges by frequency or all at once rather than strictly in the given learned order.
