function_name: merge_pair_in_word
input_mode: function
solution_sketch: Walk an index i through the list; when symbols[i]==x and symbols[i+1]==y append x+y and advance by 2, otherwise append symbols[i] and advance by 1.
sample_solution: |
  def merge_pair_in_word(job):
      symbols = job["symbols"]
      x, y = job["pair"]
      result = []
      i = 0
      n = len(symbols)
      while i < n:
          if i < n - 1 and symbols[i] == x and symbols[i + 1] == y:
              result.append(x + y)
              i += 2
          else:
              result.append(symbols[i])
              i += 1
      return result
hints:
  - level: 1
    text: A for loop with a fixed step is awkward here because a match consumes two positions; use a while loop with a manual index instead.
  - level: 2
    text: At each position check whether symbols[i] and symbols[i + 1] equal x and y, but only when i + 1 is still a valid index.
  - level: 3
    text: On a match append x + y and do i += 2 so the second symbol cannot start another overlapping match; otherwise append symbols[i] and do i += 1.
