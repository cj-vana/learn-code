prompt_markdown: |
  Once BPE has chosen a pair to merge, it must rewrite every word so that each
  occurrence of those two neighbouring symbols becomes one glued symbol. Your job
  is the rewrite for a single word.

  Write `merge_pair_in_word(job)` where `job` is a dict with two keys:

  - `"symbols"`: a list of symbol strings, for example `["l", "o", "w", "</w>"]`
  - `"pair"`: a two-element list `[x, y]` naming the pair to merge

  Scan the symbols **left to right**. Whenever a symbol equal to `x` is
  immediately followed by a symbol equal to `y`, replace those two entries with
  the single concatenated symbol `x + y` (no space) and continue *after* the
  merged pair, so occurrences never overlap. Everything else is copied
  unchanged. Return the new list.

  For example, merging `["l", "o"]` in `["l", "o", "w", "</w>"]` gives
  `["lo", "w", "</w>"]`. Merging `["a", "a"]` in `["a", "a", "a", "</w>"]` glues
  the first two into `"aa"` and leaves the third `"a"` alone, giving
  `["aa", "a", "</w>"]`.
