explanation_markdown: |
  This is the surgery step of BPE: every training round picks one pair and then
  rewrites all words with this exact routine. The while loop with an explicit
  index is what makes non-overlapping left-to-right merging correct. When a match
  is found, jumping ahead by two (`i += 2`) means the symbol that was just
  consumed as the right half can never also act as the left half of the next
  match, which is why `["a", "a", "a"]` yields `["aa", "a"]` and not two
  overlapping merges. Guarding the lookahead with `i < n - 1` avoids reading past
  the end when the last symbol cannot begin a pair.
common_mistakes:
  - Advancing by 1 after a merge, which lets the right half start an overlapping match.
  - Checking symbols[i + 1] without first confirming i + 1 is in range, causing an IndexError on the last symbol.
  - Joining the merged pair with a space ("x y") instead of concatenating into a single symbol ("xy").
