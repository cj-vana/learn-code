solution_sketch: Tokenize each word to characters plus "</w>", then loop k times counting adjacent pairs, selecting the max pair with an alphabetical tie-break, appending [x, y] to the merge list, and rewriting every word with the non-overlapping merge; stop early when no pairs remain.
sample_solution: |
  def train_bpe(job):
      words = job["words"]
      k = job["num_merges"]
      corpus = [list(word) + ["</w>"] for word in words]
      merges = []
      for _ in range(k):
          counts = {}
          for symbols in corpus:
              for i in range(len(symbols) - 1):
                  key = symbols[i] + " " + symbols[i + 1]
                  counts[key] = counts.get(key, 0) + 1
          if not counts:
              break
          best_key = None
          best_count = None
          for key in sorted(counts):
              count = counts[key]
              if best_count is None or count > best_count:
                  best_count = count
                  best_key = key
          x, y = best_key.split(" ")
          merges.append([x, y])
          new_corpus = []
          for symbols in corpus:
              result = []
              i = 0
              n = len(symbols)
              while i < n:
                  if i < n - 1 and symbols[i] == x and symbols[i + 1] == y:
                      result.append(x + y)
                      i += 2
                  else:
                      result.append(symbols[i])
                      i += 1
              new_corpus.append(result)
          corpus = new_corpus
      return merges
hints:
  - level: 1
    text: This exercise stitches together the earlier steps -- tokenize, count pairs, pick the best pair, merge the corpus -- inside a loop that runs at most num_merges times.
  - level: 2
    text: Each iteration recounts pairs on the current corpus, so a merge from the previous round can create a brand-new pair (like "lo" then "w") that becomes the next winner.
  - level: 3
    text: Break ties by scanning sorted(counts) with a strict > comparison, split the winning key on its single space to recover x and y, record [x, y], and break out of the loop the moment counts is empty.
