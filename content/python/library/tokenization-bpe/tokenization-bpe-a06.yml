explanation_markdown: |
  This is the full BPE training algorithm. The subtle part is that the corpus
  evolves between rounds: after `l` and `o` fuse into `lo`, the very next count
  sees the new pair `lo w`, which is exactly how BPE grows longer and longer
  subwords out of characters. Recounting from scratch each round keeps the logic
  simple and correct, and the alphabetical tie-break makes the learned merge list
  fully deterministic for a given corpus. Two stopping conditions matter: the
  loop runs at most `num_merges` times, and it also breaks the moment no adjacent
  pairs remain (every word has collapsed to a single symbol), so a large
  `num_merges` never invents merges that do not exist. Each round costs about
  `O(total symbols)` to recount, giving `O(k * total symbols)` overall.
common_mistakes:
  - Counting pairs once before the loop instead of recounting each round, so merges that create new pairs are never discovered.
  - Recording the merge as the joined string "x y" instead of splitting it back into the two-element list [x, y].
  - Forgetting the early stop, then crashing or looping when every word is already a single symbol and there are no pairs to pick.
  - Reusing a mutated corpus reference so an in-place merge corrupts the counts for the same round.
