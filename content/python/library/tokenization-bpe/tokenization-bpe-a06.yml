prompt_markdown: |
  Now assemble the whole pipeline. Byte-pair encoding *learns* a tokenizer by
  repeatedly counting adjacent symbol pairs, merging the most frequent one, and
  recording that merge. The ordered list of merges it learns is the trained
  tokenizer.

  Write `train_bpe(job)` where `job` is a dict with two keys:

  - `"words"`: a list of raw word strings, for example `["low", "low", "lower"]`
  - `"num_merges"`: an integer `k`, the maximum number of merges to learn

  Run this loop:

  1. Turn each word into symbols: its characters in order followed by the marker
     `"</w>"`. (Repeated words stay as separate entries, so their pairs are
     counted multiple times.)
  2. Repeat up to `k` times:
     - Count every adjacent pair across all words, keyed as two symbols joined by
       a single space (`"l o"`).
     - If there are **no** pairs left, stop early.
     - Pick the most frequent pair, breaking ties by taking the
       alphabetically-smallest key. Split that key back into its two symbols
       `x` and `y` and record the merge as the list `[x, y]`.
     - Rewrite every word, gluing each non-overlapping left-to-right occurrence
       of `x` then `y` into the single symbol `x + y`.
  3. Return the ordered list of merges, for example
     `[["l", "o"], ["lo", "w"], ["low", "</w>"]]`.

  With `num_merges` of `0` (or when no pairs remain) the result is the empty
  list `[]`.
