function_name: flag_anomalies
input_mode: function
solution_sketch: First tally how many entries share each (date, vendor, item, qty) signature; then scan entries adding flags into a set for over-qty, over-total, and any signature seen at least twice; finally sort the set into a list of lists.
sample_solution: |
  def flag_anomalies(job):
      entries = job["entries"]
      max_qty = job["limits"]["max_qty"]
      max_total = job["limits"]["max_total"]
      counts = {}
      for entry in entries:
          signature = (entry["date"], entry["vendor"], entry["item"], entry["qty"])
          counts[signature] = counts.get(signature, 0) + 1
      flags = set()
      for entry in entries:
          date = entry["date"]
          vendor = entry["vendor"]
          if entry["qty"] > max_qty:
              flags.add((date, vendor, "qty over limit"))
          if entry["total"] > max_total:
              flags.add((date, vendor, "total over limit"))
          signature = (date, vendor, entry["item"], entry["qty"])
          if counts[signature] >= 2:
              flags.add((date, vendor, "duplicate entry"))
      return [list(flag) for flag in sorted(flags)]
hints:
  - level: 1
    text: Do a first pass to count how many entries share each (date, vendor, item, qty) tuple, so you can tell later whether an entry is a duplicate.
  - level: 2
    text: Collect flags in a set of (date, vendor, reason) tuples. A set removes duplicate rows for free, which matters because two identical entries would each try to add the same duplicate flag.
  - level: 3
    text: Use strictly greater than for both limit checks, then return [list(flag) for flag in sorted(flags)] so the tuples become lists in Python's default sorted order.
