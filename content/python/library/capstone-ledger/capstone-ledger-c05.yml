  public:
    - name: nothing_suspicious
      input:
        entries:
          - {"date": "2026-06-01", "vendor": "Rosewood Farm", "item": "basil", "qty": 5, "unit_price": 1.0, "total": 5.0}
        limits: {"max_qty": 100, "max_total": 1000}
      expected: []
    - name: quantity_over_limit
      input:
        entries:
          - {"date": "2026-06-01", "vendor": "Rosewood Farm", "item": "heirloom tomatoes", "qty": 50, "unit_price": 3.0, "total": 150.0}
        limits: {"max_qty": 20, "max_total": 1000}
      expected:
        - ["2026-06-01", "Rosewood Farm", "qty over limit"]
    - name: duplicate_line
      input:
        entries:
          - {"date": "2026-06-01", "vendor": "Hillside Dairy", "item": "butter", "qty": 2, "unit_price": 4.0, "total": 8.0}
          - {"date": "2026-06-01", "vendor": "Hillside Dairy", "item": "butter", "qty": 2, "unit_price": 4.0, "total": 8.0}
        limits: {"max_qty": 100, "max_total": 1000}
      expected:
        - ["2026-06-01", "Hillside Dairy", "duplicate entry"]
  validation:
    - name: total_over_limit
      input:
        entries:
          - {"date": "2026-06-02", "vendor": "Bramble Orchard", "item": "cider", "qty": 3, "unit_price": 100.0, "total": 300.0}
        limits: {"max_qty": 100, "max_total": 100}
      expected:
        - ["2026-06-02", "Bramble Orchard", "total over limit"]
    - name: two_reasons_one_entry
      input:
        entries:
          - {"date": "2026-06-02", "vendor": "Rosewood Farm", "item": "heirloom tomatoes", "qty": 200, "unit_price": 4.5, "total": 900.0}
        limits: {"max_qty": 100, "max_total": 500}
      expected:
        - ["2026-06-02", "Rosewood Farm", "qty over limit"]
        - ["2026-06-02", "Rosewood Farm", "total over limit"]
    - name: duplicate_collapses_to_one_row
      input:
        entries:
          - {"date": "2026-06-01", "vendor": "Rosewood Farm", "item": "basil", "qty": 7, "unit_price": 1.15, "total": 8.05}
          - {"date": "2026-06-01", "vendor": "Rosewood Farm", "item": "basil", "qty": 7, "unit_price": 1.15, "total": 8.05}
          - {"date": "2026-06-02", "vendor": "Hillside Dairy", "item": "butter", "qty": 2, "unit_price": 4.0, "total": 8.0}
        limits: {"max_qty": 100, "max_total": 1000}
      expected:
        - ["2026-06-01", "Rosewood Farm", "duplicate entry"]
    - name: flags_sorted_by_date
      input:
        entries:
          - {"date": "2026-06-03", "vendor": "Zenith Farm", "item": "kale", "qty": 500, "unit_price": 0.1, "total": 50.0}
          - {"date": "2026-06-01", "vendor": "Ash Grove", "item": "plums", "qty": 5, "unit_price": 1000.0, "total": 5000.0}
        limits: {"max_qty": 100, "max_total": 1000}
      expected:
        - ["2026-06-01", "Ash Grove", "total over limit"]
        - ["2026-06-03", "Zenith Farm", "qty over limit"]
    - name: boundary_values_not_flagged
      input:
        entries:
          - {"date": "2026-06-01", "vendor": "Rosewood Farm", "item": "basil", "qty": 100, "unit_price": 10.0, "total": 1000.0}
        limits: {"max_qty": 100, "max_total": 1000}
      expected: []
explanation_markdown: |
  An audit that only walks the list once cannot spot duplicates, because you do not
  know an entry is repeated until you have seen the whole batch. So this is a
  two-pass job: the first pass builds a tally of every `(date, vendor, item, qty)`
  signature, and the second pass consults that tally to decide whether an entry is
  a duplicate while it also checks the two numeric limits.

  Collecting flags in a set is the quiet hero. Two identical duplicate lines would
  each independently produce the same `duplicate entry` flag, and the treasurer
  wants that reported once, not once per copy - a set enforces exactly that. Using
  strictly-greater-than for the limits means a value sitting right on the limit is
  allowed, which is why the boundary test produces no flags. Sorting the tuples at
  the end gives a stable, readable report regardless of input order.
common_mistakes:
  - Trying to detect duplicates in a single pass, so the first copy of a repeated line is never flagged.
  - Using >= for the limits, which wrongly flags an entry that lands exactly on max_qty or max_total.
  - Collecting flags in a list, so two identical duplicate lines emit the same row twice.
  - Including unit_price in the duplicate signature, so genuine keyed-twice sales with a mistyped price slip through.
