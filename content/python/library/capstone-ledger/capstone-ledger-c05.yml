prompt_markdown: |
  Stage 5 of the Market Ledger capstone: before the statements go out, the
  treasurer wants an audit pass that flags anything suspicious - a quantity that
  looks like a typo, a total that is too large, or the same sale keyed in twice.

  Write `flag_anomalies(job)` where `job` is a dictionary with two keys:

  - `"entries"`: a list of parsed sale dicts (the Stage 1 shape, with `"date"`,
    `"vendor"`, `"item"`, `"qty"` int, `"unit_price"` float and `"total"` float).
  - `"limits"`: a dict with `"max_qty"` and `"max_total"` numbers.

  Produce a flag `[date, vendor, reason]` for each of these conditions:

  - `"qty over limit"` - the entry's `"qty"` is **strictly greater** than
    `"max_qty"`.
  - `"total over limit"` - the entry's `"total"` is **strictly greater** than
    `"max_total"`.
  - `"duplicate entry"` - the entry shares its `"date"`, `"vendor"`, `"item"` and
    `"qty"` with at least one other entry in the list (unit price is ignored for
    this check).

  A single entry can trigger more than one condition, and each condition it
  triggers is its own flag. Return the flags as a **sorted** list of
  `[date, vendor, reason]` lists (Python's default list ordering: by date, then
  vendor, then reason). The result must contain **no duplicate rows** - if the
  same `[date, vendor, reason]` would be produced more than once, it appears only
  once. When nothing is suspicious, return an empty list `[]`.

  Example:

  ```python
  flag_anomalies({
      "entries": [
          {"date": "2026-06-02", "vendor": "Rosewood Farm", "item": "heirloom tomatoes",
           "qty": 200, "unit_price": 4.5, "total": 900.0},
      ],
      "limits": {"max_qty": 100, "max_total": 500},
  })
  # qty 200 > 100 and total 900.0 > 500 -> two flags
  # -> [["2026-06-02", "Rosewood Farm", "qty over limit"],
  #     ["2026-06-02", "Rosewood Farm", "total over limit"]]
  ```
starter_code: |
