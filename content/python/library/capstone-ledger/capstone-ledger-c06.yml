explanation_markdown: |
  Rendering is the mirror image of parsing: Stage 1 turned text into structured
  data, and Stage 6 turns structured data back into text a person reads. The key
  idea is that alignment is not achieved by counting spaces by hand - it comes from
  format specifiers. `{:<20}` pads a string on the right to width 20, `{:>8}`
  pads on the left to width 8, and `{:>8.2f}` does the same while forcing exactly
  two decimals so every money column ends flush.

  Assembling the whole thing as a list of finished lines and joining with `"\n"`
  at the end is what guarantees there is no stray trailing newline - a detail that
  quietly breaks exact-match comparisons if you build the string with `+= "\n"`
  in a loop instead. Because the label fields and the number fields reuse the same
  widths on every row, the item lines and the Gross/Fee/Net footer share one clean
  right-hand column.
common_mistakes:
  - Ending the string with a trailing newline by joining with "\n" and then adding one more, or by building it with += inside the loop.
  - Hand-padding with manual spaces instead of format specifiers, which drifts the moment a value changes width.
  - Using {:>8} instead of {:>8.2f} for the money rows, so a value like 8.0 prints without its two decimals.
  - Reordering the item lines (for example sorting them) instead of following the items dict's own order.
