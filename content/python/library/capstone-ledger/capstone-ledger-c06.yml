prompt_markdown: |
  Stage 6 of the Market Ledger capstone: everything comes together as a printed
  statement the vendor takes home. Your last job is to render one vendor's record
  into an exact fixed-width text block.

  Write `render_statement(job)` where `job` is a dictionary with three keys:

  - `"vendor"`: the vendor's name (string).
  - `"statement"`: that vendor's fee-adjusted record from Stage 4, a dict with
    `"gross"` (float), `"items"` (a dict mapping item name to integer quantity),
    `"days_active"` (int), `"fee"` (float) and `"net"` (float).
  - `"date_range"`: a two-element list `[start, end]` of date strings.

  Return a single string built from these lines, joined with `"\n"` and with **no
  trailing newline**:

  1. `Vendor: ` followed by the vendor name.
  2. `Period: ` then the start date, ` to `, then the end date.
  3. `Market days: ` followed by `days_active`.
  4. A rule line of exactly 28 dashes (`-` repeated 28 times).
  5. One line per item, in the order the items appear in the `"items"` dict, where
     the item name is left-justified in a field of width 20 and the quantity is
     right-justified in a field of width 8. Use `"{:<20}{:>8}".format(name, qty)`.
     (An item name longer than 20 characters is not truncated; it simply fills
     past the column.)
  6. A second rule line of 28 dashes.
  7. `Gross`, left-justified in width 20, then the gross right-justified in width 8
     with exactly 2 decimals: `"{:<20}{:>8.2f}".format("Gross", gross)`.
  8. The same layout for `Fee` and its value.
  9. The same layout for `Net` and its value.

  Example output (spaces are significant):

  ```
  Vendor: Rosewood Farm
  Period: 2026-06-01 to 2026-06-07
  Market days: 1
  ----------------------------
  heirloom tomatoes         12
  basil                      7
  ----------------------------
  Gross                  50.05
  Fee                     2.50
  Net                    47.55
  ```
starter_code: |
