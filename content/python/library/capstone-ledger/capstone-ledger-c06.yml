solution_sketch: Build a list of lines - three header lines, a dash rule, one formatted line per item, another rule, then Gross/Fee/Net formatted with the same width specifiers - and join them with newlines.
sample_solution: |
  def render_statement(job):
      vendor = job["vendor"]
      statement = job["statement"]
      start, end = job["date_range"]
      rule = "-" * 28
      lines = [
          f"Vendor: {vendor}",
          f"Period: {start} to {end}",
          f"Market days: {statement['days_active']}",
          rule,
      ]
      for item, qty in statement["items"].items():
          lines.append("{:<20}{:>8}".format(item, qty))
      lines.append(rule)
      lines.append("{:<20}{:>8.2f}".format("Gross", statement["gross"]))
      lines.append("{:<20}{:>8.2f}".format("Fee", statement["fee"]))
      lines.append("{:<20}{:>8.2f}".format("Net", statement["net"]))
      return "\n".join(lines)
hints:
  - level: 1
    text: Build the statement as a list of finished line strings, then return "\n".join(lines) at the very end so there is no trailing newline.
  - level: 2
    text: "The alignment comes entirely from format specifiers: {:<20} left-justifies text in width 20 and {:>8} right-justifies in width 8. For money use {:>8.2f} to force two decimals."
  - level: 3
    text: Iterate statement["items"].items() in its natural order for the item lines, and reuse the exact same width specifiers for the Gross, Fee, and Net footer rows so the columns line up.
