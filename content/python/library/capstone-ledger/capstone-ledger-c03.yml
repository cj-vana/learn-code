function_name: vendor_statements
input_mode: function
solution_sketch: Keep one statement per vendor plus a side set of that vendor's dates; fold each entry's total, per-item qty, and date in, then convert each date set to its length and round the gross at the end.
sample_solution: |
  def vendor_statements(entries):
      statements = {}
      dates = {}
      for entry in entries:
          vendor = entry["vendor"]
          if vendor not in statements:
              statements[vendor] = {"gross": 0.0, "items": {}, "days_active": 0}
              dates[vendor] = set()
          statement = statements[vendor]
          statement["gross"] += entry["total"]
          item = entry["item"]
          statement["items"][item] = statement["items"].get(item, 0) + entry["qty"]
          dates[vendor].add(entry["date"])
      for vendor, statement in statements.items():
          statement["gross"] = round(statement["gross"], 2)
          statement["days_active"] = len(dates[vendor])
      return statements
hints:
  - level: 1
    text: Create a vendor's statement the first time you see them, seeding gross at 0.0, items at an empty dict, and tracking their dates in a set on the side.
  - level: 2
    text: For each entry add total to gross, and update the item count with statement["items"].get(item, 0) + qty so a repeated item accumulates.
  - level: 3
    text: A set automatically discards duplicate dates, so days_active is just len(that vendor's date set). Round gross once at the end to avoid a floating-point tail.
