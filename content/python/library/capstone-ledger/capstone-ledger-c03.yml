prompt_markdown: |
  Stage 3 of the Market Ledger capstone: the parsed entries from Stage 2 are a
  flat stream of sales, but each vendor wants their own statement. Time to group.

  Write `vendor_statements(entries)` where `entries` is a list of parsed sale
  dicts, each with the keys `"date"`, `"vendor"`, `"item"`, `"qty"` (int),
  `"unit_price"` (float) and `"total"` (float) - exactly the Stage 1 shape.

  Return a dictionary that maps each distinct vendor to a statement dictionary
  with exactly these keys:

  - `"gross"`: the sum of that vendor's `"total"` values, rounded to 2 decimals.
  - `"items"`: a dictionary mapping each item the vendor sold to the total `"qty"`
    of that item across all their sales.
  - `"days_active"`: the number of **distinct** dates on which the vendor made a
    sale (an integer count, not the dates themselves).

  Vendors appear as keys in the order each vendor is **first seen** in `entries`.
  An empty `entries` list returns an empty dictionary `{}`.

  Example:

  ```python
  vendor_statements([
      {"date": "2026-06-01", "vendor": "Rosewood Farm", "item": "heirloom tomatoes",
       "qty": 12, "unit_price": 3.5, "total": 42.0},
      {"date": "2026-06-01", "vendor": "Rosewood Farm", "item": "basil",
       "qty": 7, "unit_price": 1.15, "total": 8.05},
  ])
  # -> {"Rosewood Farm": {"gross": 50.05,
  #                       "items": {"heirloom tomatoes": 12, "basil": 7},
  #                       "days_active": 1}}
  ```
