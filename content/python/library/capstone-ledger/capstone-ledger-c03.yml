explanation_markdown: |
  Grouping turns a stream into a summary, and the shape of the accumulator is the
  whole design. Each vendor needs three different kinds of running state at once:
  a single number (gross), a nested tally (items), and a set of things seen
  (dates). Trying to force all three into one structure gets awkward, so the clean
  move is a statement dict for the two results the caller wants plus a side set of
  dates while you work.

  The set is doing real work here: `days_active` is not "how many sales" but "how
  many distinct days", and a set collapses repeats for free, so two sales on the
  same date count once. `items.get(item, 0) + qty` is the standard fold for a
  count that has no natural starting value per key. Rounding gross a single time
  at the end keeps the arithmetic exact right up to the moment you present it.
common_mistakes:
  - Counting total sales instead of distinct dates for days_active, so two sales on one day report 2.
  - Overwriting an item's quantity instead of adding to it, losing earlier sales of the same item.
  - Rounding gross on every addition, which can still drift; round once at the end instead.
  - Reordering vendors (for example by sorting) when the caller expects first-seen order.
