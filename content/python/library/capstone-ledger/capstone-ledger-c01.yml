prompt_markdown: |
  Stage 1 of the Market Ledger capstone: the Riverbend farmers' market cooperative
  is replacing its paper sales book with a ledger program, and every stage you
  build feeds the next. It all starts with a single line.

  Each sale is recorded as a pipe-delimited string with exactly five fields:

      YYYY-MM-DD|vendor|item|qty|unit_price

  For example `2026-06-01|Rosewood Farm|heirloom tomatoes|12|3.50`.

  Write `parse_entry(line)` that turns one well-formed line into a typed
  dictionary with exactly these keys:

  - `"date"`: the date field, left as a string.
  - `"vendor"`: the vendor field, left as a string.
  - `"item"`: the item field, left as a string.
  - `"qty"`: the quantity as an `int`.
  - `"unit_price"`: the price as a `float` rounded to 2 decimal places.
  - `"total"`: `qty * unit_price`, also a `float` rounded to 2 decimal places.

  A line is **malformed** if any of the following hold, checked in this order.
  Later stages reuse these exact reasons, so keep the precedence:

  1. **wrong field count** - splitting on `"|"` does not give exactly 5 fields.
  2. **non-numeric qty** - the quantity field is not a whole number.
  3. **non-positive qty** - the quantity parses but is `0` or negative.
  4. **non-numeric price** - the price field is not a number.

  For any malformed line, return `None`. You may assume a well-formed line always
  has a sensible date and non-empty vendor and item.

  Example:

  ```python
  parse_entry("2026-06-01|Rosewood Farm|heirloom tomatoes|12|3.50")
  # -> {"date": "2026-06-01", "vendor": "Rosewood Farm",
  #     "item": "heirloom tomatoes", "qty": 12,
  #     "unit_price": 3.5, "total": 42.0}
  ```
