solution_sketch: Split on the pipe, reject unless there are 5 fields, then convert qty with int() and price with float() inside try/except, rejecting non-positive quantities; round the price and total to 2 places.
sample_solution: |
  def parse_entry(line):
      fields = line.split("|")
      if len(fields) != 5:
          return None
      date, vendor, item, qty_text, price_text = fields
      try:
          qty = int(qty_text)
      except ValueError:
          return None
      if qty <= 0:
          return None
      try:
          price = float(price_text)
      except ValueError:
          return None
      unit_price = round(price, 2)
      total = round(qty * unit_price, 2)
      return {
          "date": date,
          "vendor": vendor,
          "item": item,
          "qty": qty,
          "unit_price": unit_price,
          "total": total,
      }
hints:
  - level: 1
    text: Start with line.split("|"); if the resulting list is not exactly 5 items long the line is malformed no matter what else is true.
  - level: 2
    text: int() and float() raise ValueError on bad text, so wrap each conversion in its own try/except and return None on failure. Check qty <= 0 only after the int conversion succeeds.
  - level: 3
    text: Round both unit_price and total with round(value, 2) so the money fields carry exactly two decimals, then assemble the six-key dictionary.
tests:
  public:
    - name: well_formed_line
      input: "2026-06-01|Rosewood Farm|heirloom tomatoes|12|3.50"
      expected: {"date": "2026-06-01", "vendor": "Rosewood Farm", "item": "heirloom tomatoes", "qty": 12, "unit_price": 3.5, "total": 42.0}
    - name: too_few_fields
      input: "2026-06-01|Rosewood Farm|heirloom tomatoes|12"
      expected: null
    - name: qty_not_a_number
      input: "2026-06-02|Hillside Dairy|goat cheese|many|6.00"
      expected: null
  validation:
    - name: zero_quantity_rejected
      input: "2026-06-02|Hillside Dairy|goat cheese|0|6.00"
      expected: null
    - name: price_not_a_number
      input: "2026-06-03|Bramble Orchard|cider|3|market"
      expected: null
    - name: total_rounds_to_two_places
      input: "2026-06-03|Rosewood Farm|basil|7|1.15"
      expected: {"date": "2026-06-03", "vendor": "Rosewood Farm", "item": "basil", "qty": 7, "unit_price": 1.15, "total": 8.05}
    - name: too_many_fields
      input: "2026-06-01|Rosewood Farm|basil|7|1.15|extra"
      expected: null
    - name: whole_number_price
      input: "2026-06-04|Hillside Dairy|butter|2|4"
      expected: {"date": "2026-06-04", "vendor": "Hillside Dairy", "item": "butter", "qty": 2, "unit_price": 4.0, "total": 8.0}
explanation_markdown: |
  Parsing is where messy real input meets a clean internal shape, so the function
  does two jobs at once: it validates and it converts. The field-count check comes
  first because nothing else can be trusted until the line splits into the five
  parts you expect. After that, `int()` and `float()` are the natural validators -
  they already raise `ValueError` on junk, so a narrow `try/except` around each
  turns "this text is not a number" into a clean `None` without a pile of manual
  character checks.

  Ordering the checks matters because Stage 2 will report *why* a line was
  rejected, and it must agree with this precedence. Rounding both money fields to
  two places keeps every downstream sum honest: if the per-line totals already
  carry cents-level precision, the cooperative's grand totals will too.
common_mistakes:
  - Using a bare except that also swallows a genuine bug, instead of catching ValueError from the number conversions specifically.
  - Checking qty <= 0 before converting the text, so a value like "0" or "-3" is compared as a string.
  - Forgetting to round, so unit_price or total carries a long floating-point tail that breaks later comparisons.
  - Treating a line with too many fields as valid by unpacking only the first five and ignoring the rest.
