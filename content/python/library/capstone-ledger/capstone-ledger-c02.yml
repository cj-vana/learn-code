solution_sketch: Walk the lines with a 1-based counter, running the Stage 1 checks; on the first failing check record a [number, reason] pair, otherwise append the parsed dict to entries.
sample_solution: |
  def intake_ledger(lines):
      entries = []
      rejects = []
      for number, line in enumerate(lines, start=1):
          fields = line.split("|")
          if len(fields) != 5:
              rejects.append([number, "wrong field count"])
              continue
          date, vendor, item, qty_text, price_text = fields
          try:
              qty = int(qty_text)
          except ValueError:
              rejects.append([number, "non-numeric qty"])
              continue
          if qty <= 0:
              rejects.append([number, "non-positive qty"])
              continue
          try:
              price = float(price_text)
          except ValueError:
              rejects.append([number, "non-numeric price"])
              continue
          unit_price = round(price, 2)
          entries.append({
              "date": date,
              "vendor": vendor,
              "item": item,
              "qty": qty,
              "unit_price": unit_price,
              "total": round(qty * unit_price, 2),
          })
      return {"entries": entries, "rejects": rejects}
hints:
  - level: 1
    text: enumerate(lines, start=1) gives you the 1-based line number and the line together on each pass.
  - level: 2
    text: Run the same four checks Stage 1 used, but instead of returning None, append a [number, reason] pair and use continue so a bad line never reaches the entries list.
  - level: 3
    text: The precedence is fixed - field count, then int() of qty, then the qty <= 0 test, then float() of price - so the reason you record for a given line is deterministic.
