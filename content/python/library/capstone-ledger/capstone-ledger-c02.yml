explanation_markdown: |
  Batch intake is Stage 1 wrapped in a loop, but the design choice that matters is
  what to do with a bad row. Throwing the whole batch out because one line is
  broken would be useless to a bookkeeper; silently dropping bad lines would hide
  real data-entry mistakes. The reject pile threads that needle - good rows flow
  straight into `entries`, and each bad row is logged with the exact line number
  and a reason precise enough to act on.

  The `continue` after each failed check is what enforces the precedence: once a
  line is rejected for the first thing that is wrong with it, later checks never
  run, so a line that is both a bad quantity and a bad price is reported by its
  first fault only. Keeping `enumerate(..., start=1)` in charge of the counter
  means the numbers always line up with what a human sees in the file.
common_mistakes:
  - Numbering rejects from 0 instead of 1, so the bookkeeper looks at the wrong line.
  - Forgetting continue after logging a reject, so a malformed line falls through and crashes a later check or gets partially parsed.
  - Collecting multiple reasons for one line instead of stopping at the first fault the precedence names.
  - Appending the raw line to entries instead of the parsed dictionary, so downstream stages get strings they cannot sum.
