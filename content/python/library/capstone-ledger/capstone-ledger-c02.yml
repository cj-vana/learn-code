prompt_markdown: |
  Stage 2 of the Market Ledger capstone: the cooperative's till exports a whole
  day of sales as a list of raw lines, and not every line is clean. You need to
  keep the good rows and hand the bookkeeper a numbered reject pile so bad lines
  can be fixed by hand.

  Write `intake_ledger(lines)` where `lines` is a list of pipe-delimited strings
  in the Stage 1 format `YYYY-MM-DD|vendor|item|qty|unit_price`. Return a
  dictionary with exactly two keys:

  - `"entries"`: a list of the successfully parsed rows, each a dict with the
    keys `"date"`, `"vendor"`, `"item"`, `"qty"` (int), `"unit_price"` (float, 2
    decimals) and `"total"` (float, 2 decimals) - the same shape Stage 1
    produced - in the same order the good lines appeared.
  - `"rejects"`: a list of `[line_number, reason]` pairs, where `line_number` is
    **1-based** (the first line is line 1) and `reason` is one of these exact
    strings, decided in this precedence order:

    1. `"wrong field count"` - the line does not split into exactly 5 fields.
    2. `"non-numeric qty"` - the quantity is not a whole number.
    3. `"non-positive qty"` - the quantity is `0` or negative.
    4. `"non-numeric price"` - the price is not a number.

  The rejects appear in the order the bad lines occurred. An empty input returns
  `{"entries": [], "rejects": []}`.

  Example:

  ```python
  intake_ledger([
      "2026-06-01|Rosewood Farm|heirloom tomatoes|12|3.50",
      "2026-06-01|bad line",
  ])
  # -> {"entries": [{"date": "2026-06-01", "vendor": "Rosewood Farm",
  #                  "item": "heirloom tomatoes", "qty": 12,
  #                  "unit_price": 3.5, "total": 42.0}],
  #     "rejects": [[2, "wrong field count"]]}
  ```
