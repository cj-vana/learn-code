prompt_markdown: |
  Stage 4 of the Market Ledger capstone: the cooperative funds itself by charging
  each vendor a percentage fee on their gross, and the rate climbs in tiers - the
  more you sell, the higher your bracket. You must post each vendor's fee and net.

  Write `apply_fees(job)` where `job` is a dictionary with two keys:

  - `"statements"`: the Stage 3 output - a dict mapping each vendor to a statement
    dict with `"gross"` (float), `"items"` (dict) and `"days_active"` (int).
  - `"fee_tiers"`: a list of `[threshold, rate]` pairs, **given in no particular
    order**. Each pair means "if a vendor's gross is at least `threshold`, the fee
    rate is `rate`". You may assume the tiers always include a base tier with
    threshold `0`, so every non-negative gross matches at least one tier.

  For each vendor, find the tier with the **highest threshold that is less than or
  equal to** the vendor's gross, and use that tier's rate. Then add two keys to
  that vendor's statement:

  - `"fee"`: `gross * rate`, rounded to 2 decimals.
  - `"net"`: `gross - fee`, rounded to 2 decimals.

  Return the statements dictionary with `"fee"` and `"net"` added to every vendor,
  keeping all the existing keys and the original vendor order.

  Example:

  ```python
  apply_fees({
      "statements": {
          "Rosewood Farm": {"gross": 50.05,
                            "items": {"heirloom tomatoes": 12, "basil": 7},
                            "days_active": 1},
      },
      "fee_tiers": [[50, 0.05], [0, 0.0]],
  })
  # Rosewood's gross 50.05 clears the 50 tier -> rate 0.05
  # fee = 2.5, net = 47.55
  ```
starter_code: |
  def apply_fees(job):
      return job["statements"]
function_name: apply_fees
input_mode: function
solution_sketch: Sort the tiers by threshold ascending, then for each vendor scan upward keeping the rate of every threshold that does not exceed gross, stopping at the first one that does; compute fee and net rounded to 2 places.
sample_solution: |
  def apply_fees(job):
      statements = job["statements"]
      tiers = sorted(job["fee_tiers"])
      result = {}
      for vendor, statement in statements.items():
          gross = statement["gross"]
          rate = 0.0
          for threshold, tier_rate in tiers:
              if threshold <= gross:
                  rate = tier_rate
              else:
                  break
          fee = round(gross * rate, 2)
          updated = dict(statement)
          updated["fee"] = fee
          updated["net"] = round(gross - fee, 2)
          result[vendor] = updated
      return result
hints:
  - level: 1
    text: Sorting the tiers by threshold turns "pick the highest qualifying one" into a simple upward scan, because sorted([[threshold, rate], ...]) orders by the first element.
  - level: 2
    text: Walk the sorted tiers keeping the rate of every threshold <= gross; the moment a threshold exceeds gross you can stop, and the last rate you kept is the right one.
  - level: 3
    text: fee is round(gross * rate, 2) and net is round(gross - fee, 2). Copy the statement with dict(statement) before adding fee and net so you keep items and days_active intact.
