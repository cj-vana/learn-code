explanation_markdown: |
  The trap in a tiered schedule is that the tiers arrive unsorted, so you cannot
  just take the last one that matches in input order. Sorting by threshold first
  makes the rule mechanical: scan from the smallest threshold upward, remember the
  rate of every tier your gross clears, and the moment a threshold is too big you
  are done - everything past it is even bigger. The last rate you kept belongs to
  the highest qualifying tier.

  Because `sorted` on a list of `[threshold, rate]` pairs orders by the first
  element, one call does the heavy lifting. Copying each statement with
  `dict(statement)` before adding `"fee"` and `"net"` preserves the items and
  day-count from Stage 3 while extending the record, and rounding both money
  fields keeps net exactly equal to gross minus the posted fee.
common_mistakes:
  - Assuming fee_tiers arrive sorted and reading them in input order, which picks the wrong bracket.
  - Using a strict threshold < gross so a gross that lands exactly on a threshold drops to the tier below.
  - Computing net from the unrounded fee, so net and the posted fee do not reconcile to the cent.
  - Replacing the statement with a bare fee/net dict and dropping the items and days_active keys.
