function_name: booked_minutes
input_mode: function
solution_sketch: Sort Booking objects by start via __lt__, sweep once merging overlapping or touching ranges, and sum their lengths.
sample_solution: |
  def booked_minutes(bookings):
      class Booking:
          def __init__(self, start, end):
              self.start = start
              self.end = end

          def __lt__(self, other):
              return self.start < other.start

      objs = sorted(Booking(start, end) for start, end in bookings)
      if not objs:
          return 0

      total = 0
      cur_start = objs[0].start
      cur_end = objs[0].end
      for booking in objs[1:]:
          if booking.start <= cur_end:
              cur_end = max(cur_end, booking.end)
          else:
              total += cur_end - cur_start
              cur_start = booking.start
              cur_end = booking.end
      total += cur_end - cur_start
      return total
