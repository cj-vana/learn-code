prompt_markdown: |
  An observatory's single telescope is reserved in bookings measured in whole
  minutes past midnight. Bookings can overlap or touch, and the director wants to
  know the total number of minutes the telescope was reserved for at least one
  booking -- counting any overlapping stretch only once.

  Complete `booked_minutes(bookings)`, where `bookings` is a list of `[start, end]`
  pairs with `start < end`. Inside the function, define a `Booking` class that
  stores a start and end and defines `__lt__` so bookings sort by start time. Sort
  your `Booking` objects, merge any that overlap or touch (an end equal to the next
  start joins them), and return the total covered length in minutes as an integer.
