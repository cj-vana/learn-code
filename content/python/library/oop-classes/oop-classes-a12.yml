explanation_markdown: |
  Merging overlaps only works if the ranges are in order, so the class defines
  `__lt__` to sort `Booking` objects by start time. After sorting, one sweep keeps a
  running merged range: a booking that starts at or before the current end overlaps
  (or touches) and extends it, while a later start banks the finished range and
  opens a new one. Summing each finished range -- including the last one after the
  loop -- gives the total covered minutes, counting shared time once.
common_mistakes:
  - Summing every booking length directly, which double-counts overlapping minutes.
  - Using a strict start < cur_end test, so exactly touching bookings are wrongly treated as a gap.
  - Forgetting to add the final merged range after the loop ends, dropping the last stretch.
