explanation_markdown: |
  By default `==` on custom objects checks identity, so two separately built mixes
  would never match. Defining `__eq__` to compare the three parts gives the class
  value-based equality: any two mixes with the same red, yellow, and blue are now
  equal. The `in` operator walks the `seen` list calling that `__eq__`, so a colour
  is added only the first time it appears. The length of `seen` is the count of
  distinct colours.
common_mistakes:
  - Relying on the default identity comparison, so every mix looks unique and the count equals the number of orders.
  - Comparing raw triples with a set of tuples but claiming the class did the work -- the exercise wants __eq__ to drive the sameness test.
  - Forgetting that mix not in seen already applies __eq__, and re-implementing a manual nested loop that mishandles the empty case.
