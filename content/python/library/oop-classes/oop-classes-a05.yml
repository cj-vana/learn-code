function_name: distinct_mixes
input_mode: function
solution_sketch: Give Mix an __eq__ comparing its three parts, then collect mixes not already present (by ==) and count them.
sample_solution: |
  def distinct_mixes(orders):
      class Mix:
          def __init__(self, red, yellow, blue):
              self.red = red
              self.yellow = yellow
              self.blue = blue

          def __eq__(self, other):
              return (self.red, self.yellow, self.blue) == (
                  other.red, other.yellow, other.blue)

      seen = []
      for red, yellow, blue in orders:
          mix = Mix(red, yellow, blue)
          if mix not in seen:
              seen.append(mix)
      return len(seen)
