prompt_markdown: |
  A paint counter mixes custom colours. Each mix is described by three integer
  parts: red, yellow, and blue. Two mixes are the *same colour* when all three
  parts match, even if a customer ordered them separately. The shop wants to know
  how many genuinely different colours were mixed in a day.

  Complete `distinct_mixes(orders)`, where `orders` is a list of `[red, yellow,
  blue]` triples. Inside the function, define a `Mix` class that stores the three
  parts and defines `__eq__` so two mixes with identical parts compare equal. Build
  a `Mix` for each order, then count how many distinct colours appear -- using your
  `__eq__` to decide sameness (for example, with the `in` operator against a list
  of the mixes you have already seen). Return that count as an integer.
