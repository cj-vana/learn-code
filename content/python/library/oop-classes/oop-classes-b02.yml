      input:
        text: logbook
        edits:
          - {"kind": "insert", "pos": 7, "text": "s"}
          - {"kind": "delete", "pos": 0, "count": 3}
          - {"kind": "undo"}
      expected: logbooks
    - name: no_edits
      input:
        text: hello
        edits: []
      expected: hello
    - name: stacked_inserts
      input:
        text: ""
        edits:
          - {"kind": "insert", "pos": 0, "text": "a"}
          - {"kind": "insert", "pos": 1, "text": "b"}
          - {"kind": "insert", "pos": 1, "text": "X"}
      expected: aXb
  validation:
    - name: undo_on_empty_history
      input:
        text: seed
        edits:
          - {"kind": "undo"}
      expected: seed
    - name: two_undos_step_back
      input:
        text: ab
        edits:
          - {"kind": "insert", "pos": 2, "text": "c"}
          - {"kind": "insert", "pos": 3, "text": "d"}
          - {"kind": "undo"}
          - {"kind": "undo"}
      expected: ab
    - name: delete_clamps_to_end
      input:
        text: tunnel
        edits:
          - {"kind": "delete", "pos": 2, "count": 100}
      expected: tu
    - name: delete_then_undo_then_insert
      input:
        text: grid
        edits:
          - {"kind": "delete", "pos": 0, "count": 2}
          - {"kind": "undo"}
          - {"kind": "insert", "pos": 4, "text": "s"}
      expected: grids
    - name: no_redo_after_undo
      input:
        text: x
        edits:
          - {"kind": "insert", "pos": 1, "text": "y"}
          - {"kind": "undo"}
          - {"kind": "undo"}
      expected: x
explanation_markdown: |
  The whole design turns on one discipline: every destructive edit saves a snapshot
  of the document before it changes anything. Storing those snapshots on a stack
  gives undo its natural shape -- the most recent state to restore is always the one
  on top, so a `pop` reverses exactly one edit. Because an undo never pushes a
  snapshot of its own, running two undos in a row peels back two edits, which is why
  there is no accidental "redo".

  String slicing keeps the edits themselves short and total. `text[:pos] + snippet
  + text[pos:]` opens a gap at `pos` and drops the new text in, while `text[:pos] +
  text[pos + count:]` closes a gap -- and since a slice that runs past the end just
  stops at the end, a delete with an oversized count safely trims to the tail. Each
  edit copies the string once, so the work is linear in the document size per edit.
common_mistakes:
  - Pushing the snapshot after mutating the text, so undo restores the already-edited version instead of the previous one.
  - Letting undo push its own snapshot, which creates a redo loop and stops repeated undos from stepping back through history.
  - Assuming a delete count always fits, and indexing out of range instead of relying on slicing to stop at the end of the string.
