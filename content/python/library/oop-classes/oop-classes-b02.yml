prompt_markdown: |
  A scriptorium runs a tiny text editor for transcribing manuscripts, and it can
  undo mistakes by remembering every previous state of the page. Write
  `apply_edits(job)` where `job` is a dictionary with keys:

  - `"text"`: the starting document string, and
  - `"edits"`: a list of edit dictionaries applied in order.

  Build a document object **inside** the function (define and use your own class)
  that keeps a **history stack** of prior states, apply each edit to it, and return
  the final text as a string.

  Each edit has a `"kind"`:

  - `{"kind": "insert", "pos": i, "text": s}` -- save the current text on the
    history stack, then insert string `s` so that it begins at index `i`
    (`i` is between `0` and the current length inclusive).
  - `{"kind": "delete", "pos": i, "count": n}` -- save the current text on the
    history stack, then remove up to `n` characters starting at index `i`. If
    fewer than `n` characters remain from `i`, delete everything through the end.
  - `{"kind": "undo"}` -- pop the most recently saved state off the history stack
    and restore it. An undo when the history stack is empty does nothing. An undo
    is **not** itself saved, so consecutive undos step further and further back
    through the edit history.

  For example, on `job = {"text": "logbook", "edits": [{"kind": "insert", "pos": 7, "text": "s"}, {"kind": "delete", "pos": 0, "count": 3}, {"kind": "undo"}]}`
  the insert makes `"logbooks"`, the delete makes `"books"`, and the undo restores
  `"logbooks"`, so the function returns `"logbooks"`.
