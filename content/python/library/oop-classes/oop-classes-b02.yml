solution_sketch: A Document class stores the current text plus a list used as a history stack; insert and delete push a snapshot before slicing the string, and undo pops the stack to restore the previous state. Dispatch each edit by its kind and return the final text.
sample_solution: |
  def apply_edits(job):
      class Document:
          def __init__(self, text):
              self.text = text
              self.history = []

          def insert(self, pos, snippet):
              self.history.append(self.text)
              self.text = self.text[:pos] + snippet + self.text[pos:]

          def delete(self, pos, count):
              self.history.append(self.text)
              self.text = self.text[:pos] + self.text[pos + count:]

          def undo(self):
              if self.history:
                  self.text = self.history.pop()

      doc = Document(job["text"])
      for edit in job["edits"]:
          kind = edit["kind"]
          if kind == "insert":
              doc.insert(edit["pos"], edit["text"])
          elif kind == "delete":
              doc.delete(edit["pos"], edit["count"])
          elif kind == "undo":
              doc.undo()
      return doc.text
hints:
  - level: 1
    text: Before any insert or delete changes the text, push a copy of the current text onto a list you treat as a stack. That saved snapshot is exactly what undo will restore.
  - level: 2
    text: String slicing does the editing cleanly. An insert is text[:pos] + snippet + text[pos:]; a delete is text[:pos] + text[pos + count:], which automatically stops at the end when count runs past the remaining characters.
  - level: 3
    text: Undo just pops the stack and assigns it back to the current text, doing nothing when the stack is empty. Because undo does not push anything, two undos in a row walk back through two earlier states.
