explanation_markdown: |
  The object model mirrors the data: each `Person` *holds* the `Person` objects for
  its direct reports, so the composed graph has the same shape as the nested dict.
  The `depth` method is a classic tree recursion -- a leaf is a chain of length 1,
  and any manager's longest chain is one (for themselves) plus the deepest chain
  among their reports. Building the objects with a small recursive helper keeps
  construction and measurement cleanly separated.
common_mistakes:
  - Summing the reports' depths instead of taking the maximum, which counts breadth rather than the single longest chain.
  - Forgetting the base case, so a person with no reports never returns and the recursion errors on an empty list via max.
  - Counting edges instead of people, returning one less than the requested chain length.
