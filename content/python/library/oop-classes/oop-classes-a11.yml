prompt_markdown: |
  A theatre company organises its staff as a reporting tree. One person sits at the
  top; each person has a (possibly empty) list of direct reports, and those reports
  may have reports of their own. The producer wants the length of the **longest
  chain of command** -- the number of people you pass through going from the top
  down to the most deeply nested staff member (the top person alone counts as a
  chain of length 1).

  Complete `longest_chain(org)`. The input `org` is a nested dict with two keys:
  `"name"` (a string) and `"reports"` (a list of dicts in the same shape). Inside
  the function, build a composed object model: a `Person` class where each instance
  *holds* a list of `Person` objects for its direct reports. Give `Person` a method
  that recursively measures the longest chain beneath and including itself, then
  return that number for the whole org as an integer.
