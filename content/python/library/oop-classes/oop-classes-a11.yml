function_name: longest_chain
input_mode: function
solution_sketch: Recursively construct Person objects, then let each Person report 1 plus the max chain among its reports.
sample_solution: |
  def longest_chain(org):
      class Person:
          def __init__(self, name, reports):
              self.name = name
              self.reports = reports

          def depth(self):
              if not self.reports:
                  return 1
              return 1 + max(report.depth() for report in self.reports)

      def build(node):
          return Person(node["name"], [build(child) for child in node["reports"]])

      return build(org).depth()
hints:
