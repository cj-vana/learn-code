function_name: open_lockers
input_mode: function
solution_sketch: Give Locker an __init__ taking code and size, plus a from_label classmethod that splits the string and calls cls.
sample_solution: |
  def open_lockers(labels):
      class Locker:
          def __init__(self, code, size):
              self.code = code
              self.size = size

          @classmethod
          def from_label(cls, label):
              code, size = label.split("-")
              return cls(code, size)

      lockers = [Locker.from_label(label) for label in labels]
      return [f"{locker.size} {locker.code}" for locker in lockers]
