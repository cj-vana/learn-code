prompt_markdown: |
  A gym stores its lockers as short label strings printed on the doors. Each label
  looks like `"code-size"`, for example `"L14-large"` or `"L02-small"`. You want a
  clean `Locker` object for each one.

  Complete `open_lockers(labels)`, where `labels` is a list of label strings.
  Inside the function, define a `Locker` class whose `__init__` takes a separate
  `code` and `size`, and add a **class method** `from_label` that parses one label
  string and returns a `Locker` built through the normal constructor. Use
  `Locker.from_label` on each label and return a list of `"size code"` strings, for
  example `"large L14"`, in the same order as the input.
