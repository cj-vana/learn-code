explanation_markdown: |
  The class method `from_label` is an alternative constructor: it accepts the messy
  label string, splits it into a `code` and a `size`, then delegates to the normal
  `__init__` through `cls(code, size)`. Because it is decorated with
  `@classmethod`, Python passes the class as `cls`, so the method builds and returns
  a fully formed `Locker`. Keeping the parsing in `from_label` leaves `__init__`
  simple and focused on storing already-clean values.
common_mistakes:
  - Parsing the string inside __init__ instead of the class method, which forces every caller to pass a raw label.
  - Forgetting the @classmethod decorator, so from_label receives an instance as self rather than the class as cls.
  - Formatting the result as "code size" instead of the requested "size code" order.
