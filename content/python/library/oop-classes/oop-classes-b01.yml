function_name: build_jar_ledger
input_mode: function
solution_sketch: A Ledger class holds a balances dict and a rejected counter; each create/add/transfer method validates its rules and either applies the change or bumps the counter. Replay the events by dispatching on op, treating any unknown op as a rejection.
sample_solution: |
  def build_jar_ledger(events):
      class Ledger:
          def __init__(self):
              self.balances = {}
              self.rejected = 0

          def create(self, jar, amount):
              if jar in self.balances or amount < 0:
                  self.rejected += 1
                  return
              self.balances[jar] = amount

          def add(self, jar, amount):
              if jar not in self.balances or self.balances[jar] + amount < 0:
                  self.rejected += 1
                  return
              self.balances[jar] += amount

          def transfer(self, src, dst, amount):
              if (src not in self.balances or dst not in self.balances
                      or src == dst or amount < 0
                      or self.balances[src] < amount):
                  self.rejected += 1
                  return
              self.balances[src] -= amount
              self.balances[dst] += amount

      ledger = Ledger()
      for event in events:
          op = event.get("op")
          if op == "create":
              ledger.create(event["jar"], event["amount"])
          elif op == "add":
              ledger.add(event["jar"], event["amount"])
          elif op == "transfer":
              ledger.transfer(event["from"], event["to"], event["amount"])
          else:
              ledger.rejected += 1
      return {"balances": ledger.balances, "rejected": ledger.rejected}
hints:
  - level: 1
    text: Keep all mutable state on one object -- a dict of balances and an integer count of refusals -- and give it one method per operation so each method owns its own validation.
  - level: 2
    text: Validate before you mutate. Check every rule for an operation first; only if all checks pass do you touch a balance, otherwise increment the rejected counter and return without changing anything.
  - level: 3
    text: A transfer must be all-or-nothing, so verify both jars exist, the two names differ, the amount is non-negative, and the source has enough before subtracting from one side and adding to the other. Dispatch on event["op"] and treat any unrecognised op as a rejection.
tests:
  public:
    - name: create_and_transfer
      input:
        - {"op": "create", "jar": "A", "amount": 100}
        - {"op": "create", "jar": "B", "amount": 0}
        - {"op": "transfer", "from": "A", "to": "B", "amount": 40}
        - {"op": "add", "jar": "B", "amount": 10}
      expected: {"balances": {"A": 60, "B": 50}, "rejected": 0}
    - name: empty_stream
      input: []
      expected: {"balances": {}, "rejected": 0}
    - name: insufficient_transfer_rejected
      input:
        - {"op": "create", "jar": "A", "amount": 30}
        - {"op": "create", "jar": "B", "amount": 0}
        - {"op": "transfer", "from": "A", "to": "B", "amount": 50}
      expected: {"balances": {"A": 30, "B": 0}, "rejected": 1}
  validation:
    - name: duplicate_create
      input:
        - {"op": "create", "jar": "A", "amount": 10}
        - {"op": "create", "jar": "A", "amount": 99}
      expected: {"balances": {"A": 10}, "rejected": 1}
    - name: add_missing_jar
      input:
        - {"op": "add", "jar": "X", "amount": 5}
      expected: {"balances": {}, "rejected": 1}
    - name: withdrawal_then_overdraw
      input:
        - {"op": "create", "jar": "A", "amount": 20}
        - {"op": "add", "jar": "A", "amount": -5}
        - {"op": "add", "jar": "A", "amount": -50}
      expected: {"balances": {"A": 15}, "rejected": 1}
    - name: same_jar_transfer_and_unknown_op
      input:
        - {"op": "create", "jar": "A", "amount": 10}
        - {"op": "transfer", "from": "A", "to": "A", "amount": 5}
        - {"op": "freeze", "jar": "A"}
      expected: {"balances": {"A": 10}, "rejected": 2}
    - name: negative_create_rejected
      input:
        - {"op": "create", "jar": "A", "amount": -10}
        - {"op": "create", "jar": "B", "amount": 5}
      expected: {"balances": {"B": 5}, "rejected": 1}
explanation_markdown: |
  Event sourcing means the balances are never stored directly; they are derived by
  replaying an ordered log of changes. Packaging the state in a small class keeps
  the replay loop clean: it simply dispatches on `op`, and each method decides for
  itself whether the event is legal. The golden rule is validate-then-mutate --
  every check happens before any balance moves, so a refused event leaves the books
  untouched.

  The transfer is the subtle one because it touches two jars, so it must be atomic:
  if any precondition fails you change nothing at all, rather than debiting the
  source and then discovering the destination was invalid. Treating an unknown `op`
  as a rejection makes the ledger robust to a corrupt or future event type. Each
  event does constant work, so replaying the whole log is O(n) in the number of
  events.
common_mistakes:
  - Debiting the source jar before checking the destination exists, leaving a half-applied transfer when the event should have been rejected whole.
  - Forgetting that a negative add is a legal withdrawal, and only rejecting it when it would push the balance below zero.
  - Counting a rejected event as both rejected and applied, or skipping the rejected tally for an unrecognised op.
