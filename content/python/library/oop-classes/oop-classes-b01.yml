  originality_notes: Original event-sourcing drill where a community pantry replays create/add/transfer events through a small ledger class that rejects invalid events atomically.
prompt_markdown: |
  A community pantry tracks its saved coins in labelled jars, and every change is
  recorded as an event so the books can be replayed at any time. Write
  `build_jar_ledger(events)` where `events` is a **list** of event dictionaries.
  Replay the events in order through a small ledger you build **inside** the
  function (define and use your own class), then return a dictionary
  `{"balances": {jar: total}, "rejected": count}` where `balances` maps every jar
  that was successfully created to its final integer balance and `rejected` is how
  many events were refused.

  Each event has an `"op"` key. The three valid operations are:

  - `{"op": "create", "jar": name, "amount": n}` -- open a new jar holding `n`
    coins. **Reject** it if a jar with that name already exists, or if `n` is
    negative.
  - `{"op": "add", "jar": name, "amount": n}` -- change a jar's balance by `n`
    (a negative `n` is a withdrawal). **Reject** it if the jar does not exist, or
    if the change would drive the balance below zero.
  - `{"op": "transfer", "from": src, "to": dst, "amount": n}` -- move `n` coins
    from `src` to `dst`. This is **atomic**: reject the whole event (moving
    nothing) unless both jars exist, `src` and `dst` are different, `n` is not
    negative, and `src` currently holds at least `n` coins.

  Any event whose `"op"` is none of these three counts as rejected and changes no
  balances. A rejected event never alters any jar. An empty event list returns
  `{"balances": {}, "rejected": 0}`.

  For example, replaying
  `[{"op": "create", "jar": "A", "amount": 100}, {"op": "create", "jar": "B", "amount": 0}, {"op": "transfer", "from": "A", "to": "B", "amount": 40}, {"op": "add", "jar": "B", "amount": 10}]`
  returns `{"balances": {"A": 60, "B": 50}, "rejected": 0}`.
