explanation_markdown: |
  This is composition: a `Playlist` *has* a list of `Track` objects and delegates
  the per-track arithmetic to them. Each `Track` knows how to report its own length
  in seconds, and `Playlist.total` simply asks every track it holds and sums the
  answers. The pieces stay small and independent -- you could test a `Track` on its
  own -- and the playlist never needs to reach inside a track's fields.
common_mistakes:
  - Doing all the minutes-times-sixty arithmetic in one flat loop instead of letting each Track compute its own length.
  - Storing raw pairs in the Playlist rather than Track objects, so there is nothing to delegate to.
  - Adding minutes and seconds directly without converting minutes to seconds first.
