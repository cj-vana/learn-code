function_name: playlist_seconds
input_mode: function
solution_sketch: Compose a Playlist that stores Track objects and totals each track's minutes*60 + seconds.
sample_solution: |
  def playlist_seconds(spec):
      class Track:
          def __init__(self, minutes, seconds):
              self.minutes = minutes
              self.seconds = seconds

          def length(self):
              return self.minutes * 60 + self.seconds

      class Playlist:
          def __init__(self):
              self.tracks = []

          def add(self, track):
              self.tracks.append(track)

          def total(self):
              return sum(track.length() for track in self.tracks)

      playlist = Playlist()
      for minutes, seconds in spec["tracks"]:
          playlist.add(Track(minutes, seconds))
      return playlist.total()
