prompt_markdown: |
  A community radio show builds each hour from a playlist of tracks. Every track
  has a length given in minutes and seconds, and the show needs the playlist's total
  runtime in whole seconds.

  Complete `playlist_seconds(spec)`. The input is a dict with one key, `"tracks"`,
  whose value is a list of `[minutes, seconds]` pairs. Inside the function, define a
  small object graph: a `Track` class whose method returns that track's length in
  seconds, and a `Playlist` class that *holds* a list of `Track` objects and asks
  each one for its length to compute the total. Build the playlist from the spec and
  return the total runtime in seconds as an integer.
