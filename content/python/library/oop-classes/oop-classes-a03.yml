      # Define a Bike class with a shared counter class attribute,
      # build one Bike per name, and collect their tag numbers.
      return []
function_name: register_bikes
input_mode: function
solution_sketch: Keep the next tag as a class attribute, read it into self.tag in __init__, then advance the class attribute.
sample_solution: |
  def register_bikes(names):
      class Bike:
          next_tag = 1

          def __init__(self, name):
              self.name = name
              self.tag = Bike.next_tag
              Bike.next_tag += 1

      return [Bike(name).tag for name in names]
hints:
  - level: 1
    text: Put the counter in the class body (outside __init__) so a single copy is shared by every Bike.
  - level: 2
    text: In __init__, set self.tag to the current class counter, then increase the class counter by one.
  - level: 3
    text: 'Write self.tag = Bike.next_tag then Bike.next_tag += 1; naming the class updates the shared value rather than making a new instance attribute.'
tests:
