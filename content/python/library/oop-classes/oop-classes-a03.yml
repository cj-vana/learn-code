explanation_markdown: |
  `next_tag` is defined in the class body, so it lives on the class itself and is
  shared by every `Bike`. Each `__init__` reads that shared value into the
  instance's own `self.tag`, then advances the class attribute with
  `Bike.next_tag += 1`. Writing through the class name (not `self`) is what keeps
  the counter shared, so the tags come out strictly sequential.
common_mistakes:
  - Writing self.next_tag += 1, which creates a per-instance attribute and leaves every tag stuck at 1.
  - Initialising the counter inside __init__, which resets it for each bike instead of sharing it.
  - Returning the names instead of the numeric tags stored on each instance.
