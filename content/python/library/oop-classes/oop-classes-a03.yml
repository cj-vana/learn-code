prompt_markdown: |
  A bike-share station hands out a numbered tag to every bike as it is registered.
  The tags are sequential and shared across the whole station: the first bike is
  tag 1, the next is tag 2, and so on, no matter what the bikes are called.

  Complete `register_bikes(names)`, where `names` is a list of bike names in the
  order they are registered. Inside the function, define a `Bike` class that keeps
  the next tag to hand out as a **class attribute** (shared by all bikes) and copies
  its own tag onto the instance in `__init__`. Build one `Bike` per name and return
  a list of the tag numbers in registration order.
starter_code: |
