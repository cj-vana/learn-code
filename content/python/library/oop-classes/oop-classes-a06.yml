prompt_markdown: |
  A climbing gym posts its routes on a board, ordered from easiest to hardest. Each
  route has a name and an integer grade. Routes are ranked by grade ascending, and
  when two routes share a grade they are listed alphabetically by name.

  Complete `route_order(routes)`, where `routes` is a list of `[name, grade]` pairs.
  Inside the function, define a `Route` class that stores the name and grade and
  defines `__lt__` so that `sorted()` orders routes by grade first and by name to
  break ties. Build a `Route` for each pair, sort them, and return the list of route
  names in ranked order.
starter_code: |
