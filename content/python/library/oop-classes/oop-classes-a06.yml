explanation_markdown: |
  `sorted()` never inspects your fields directly; it just asks, for pairs of items,
  which is "less than" the other. Defining `__lt__` to compare the tuple
  `(grade, name)` gives Python exactly the rule it needs: tuples compare
  element by element, so grade decides the order and name breaks ties. Once the
  objects know how to compare, `sorted()` ranks them and you read off the names.
common_mistakes:
  - Sorting the raw pairs and hoping the order matches, instead of letting the object's __lt__ define the ranking.
  - Comparing only grades in __lt__, which leaves same-grade routes in an unpredictable order.
  - Returning the sorted Route objects rather than their name strings.
