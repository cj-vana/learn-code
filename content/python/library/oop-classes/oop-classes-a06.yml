      return []
function_name: route_order
input_mode: function
solution_sketch: Define __lt__ to compare (grade, name) tuples so sorted() ranks by grade then alphabetically.
sample_solution: |
  def route_order(routes):
      class Route:
          def __init__(self, name, grade):
              self.name = name
              self.grade = grade

          def __lt__(self, other):
              return (self.grade, self.name) < (other.grade, other.name)

      objs = [Route(name, grade) for name, grade in routes]
      return [route.name for route in sorted(objs)]
hints:
  - level: 1
    text: sorted() compares items with the < operator, which __lt__ implements, so put the ranking rule there.
  - level: 2
    text: Comparing the tuple (self.grade, self.name) against the other route's tuple gives grade-first, name-second ordering for free.
  - level: 3
    text: Return (self.grade, self.name) < (other.grade, other.name) in __lt__, then return [r.name for r in sorted(objs)].
tests:
