explanation_markdown: |
  `__init__` sets up each tank's own `capacity` and `level`. The `add` method
  enforces the overflow rule in one place with `min(self.capacity, self.level +
  litres)`, so no caller can push the level past capacity. Because the state lives
  on the instance, the loop simply applies each pour and reads `tank.level` at the
  end.
common_mistakes:
  - Adding every pour to the level and only clamping once at the end, which mishandles pours that overflow mid-sequence.
  - Forgetting to initialise self.level to 0, so the first add raises an error.
  - Returning self.capacity instead of the actual final level.
