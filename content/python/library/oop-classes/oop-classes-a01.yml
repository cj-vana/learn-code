prompt_markdown: |
  A greenhouse keeps a rainwater tank with a fixed capacity. Rain is added in
  pours, but the tank never holds more than its capacity -- any overflow spills
  out and is lost.

  Complete `fill_tank(spec)`. The input is a dict with:

  - `"capacity"`: an integer, the most water the tank can hold.
  - `"pours"`: a list of integers, each the litres added in one pour, applied in
    order.

  Inside the function, define a small `WaterTank` class whose `__init__` stores the
  capacity and starts the level at 0, and whose method adds a pour while clamping
  the level to the capacity. Return the tank's final water level as an integer.
