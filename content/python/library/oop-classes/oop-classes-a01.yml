function_name: fill_tank
input_mode: function
solution_sketch: Build a WaterTank whose add method caps the level at capacity, then apply every pour.
sample_solution: |
  def fill_tank(spec):
      class WaterTank:
          def __init__(self, capacity):
              self.capacity = capacity
              self.level = 0

          def add(self, litres):
              self.level = min(self.capacity, self.level + litres)

      tank = WaterTank(spec["capacity"])
      for pour in spec["pours"]:
          tank.add(pour)
      return tank.level
hints:
  - level: 1
    text: Store capacity and a level starting at 0 in __init__, then update the level for each pour.
  - level: 2
    text: The add method should set self.level to min(self.capacity, self.level + litres) so overflow is discarded.
  - level: 3
    text: 'Loop over spec["pours"] calling tank.add(pour), then return tank.level after the loop.'
