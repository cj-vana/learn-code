explanation_markdown: |
  The `Shuttle` object owns two pieces of state: the current headcount and the
  highest headcount seen so far. Processing a stop in the right order -- alight,
  then board -- keeps `aboard` accurate, and comparing it to `peak` after each
  change captures the maximum without a second pass. Because both values live on the
  instance, the loop just replays the stops and reads `shuttle.peak` at the end.
common_mistakes:
  - Boarding before alighting, which can overstate the peak at a stop where a full load turns over.
  - Recording the peak only at the final stop instead of after every change in occupancy.
  - Returning the final aboard count rather than the maximum reached during the run.
