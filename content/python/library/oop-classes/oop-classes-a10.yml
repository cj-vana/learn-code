prompt_markdown: |
  An airport shuttle runs a fixed loop of stops. It starts empty. At each stop,
  passengers get off first, then new passengers get on. The operator wants the
  **peak occupancy** -- the largest number of people on board at any moment during
  the run.

  Complete `peak_load(stops)`, where `stops` is a list of `[boarding, alighting]`
  pairs, one per stop in order. You may assume no stop asks more people to alight
  than are currently aboard. Inside the function, build a small object model: a
  `Shuttle` class that tracks how many are aboard and remembers the highest count
  seen, and it should process each stop by alighting then boarding. Return the peak
  occupancy as an integer (0 if the shuttle never carries anyone).
