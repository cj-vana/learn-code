function_name: peak_load
input_mode: function
solution_sketch: Model a Shuttle that updates occupancy per stop (alight then board) and records the running maximum.
sample_solution: |
  def peak_load(stops):
      class Shuttle:
          def __init__(self):
              self.aboard = 0
              self.peak = 0

          def serve(self, boarding, alighting):
              self.aboard -= alighting
              self.aboard += boarding
              if self.aboard > self.peak:
                  self.peak = self.aboard

      shuttle = Shuttle()
      for boarding, alighting in stops:
          shuttle.serve(boarding, alighting)
      return shuttle.peak
hints:
