      # Define a Gate class that tracks occupancy, then replay every event.
      return 0
function_name: occupancy
input_mode: function
solution_sketch: Build a Gate whose leave method refuses to go below zero, then replay each event string.
sample_solution: |
  def occupancy(events):
      class Gate:
          def __init__(self):
              self.inside = 0

          def enter(self):
              self.inside += 1

          def leave(self):
              if self.inside > 0:
                  self.inside -= 1

      gate = Gate()
      for event in events:
          if event == "enter":
              gate.enter()
          else:
              gate.leave()
      return gate.inside
hints:
  - level: 1
    text: Start an inside count at 0 in __init__ and change it by one for each event.
  - level: 2
    text: The leave method should only decrement when self.inside is greater than 0, so the count never goes negative.
  - level: 3
    text: Loop over events, call gate.enter() for "enter" and gate.leave() otherwise, then return gate.inside.
