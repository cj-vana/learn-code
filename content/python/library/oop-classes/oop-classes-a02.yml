explanation_markdown: |
  The `Gate` bundles the occupancy count together with the only two operations
  allowed on it. Putting the floor rule inside `leave` means every caller obeys it
  automatically -- there is no way to drive the count negative from outside. The
  loop translates each string into a method call, and the final state is read
  straight off the instance.
common_mistakes:
  - Decrementing on every "leave" without the greater-than-zero guard, letting the count go negative.
  - Returning the length of events instead of the running inside count.
  - Treating an unknown string as an error rather than following the two documented cases.
