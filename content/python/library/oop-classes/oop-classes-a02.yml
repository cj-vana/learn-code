prompt_markdown: |
  A museum tracks how many visitors are currently inside using a single gate. Each
  event is either `"enter"` (one person walks in) or `"leave"` (one person walks
  out). The count can never drop below zero -- a `"leave"` recorded when the museum
  is already empty is a glitch and should be ignored.

  Complete `occupancy(events)`, where `events` is a list of the strings `"enter"`
  and `"leave"` in the order they happened. Inside the function, define a `Gate`
  class that keeps an inside count and exposes methods to record an entry and an
  exit. Return the number of people inside after all events are processed.
starter_code: |
