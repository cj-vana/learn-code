      return {}
function_name: summarise_readings
input_mode: function
solution_sketch: Define a dataclass Summary(low, high, count), construct it from min/max/len, and return asdict of it.
sample_solution: |
  from dataclasses import dataclass, asdict


  def summarise_readings(readings):
      @dataclass
      class Summary:
          low: int
          high: int
          count: int

      if not readings:
          return asdict(Summary(0, 0, 0))
      return asdict(Summary(min(readings), max(readings), len(readings)))
hints:
  - level: 1
    text: Import dataclass and asdict from the dataclasses module, and annotate the three fields with int.
  - level: 2
    text: The low is min(readings), the high is max(readings), and the count is len(readings) -- but handle the empty list separately.
  - level: 3
    text: Build Summary(min(readings), max(readings), len(readings)) and return asdict(that); for an empty list return asdict(Summary(0, 0, 0)).
