prompt_markdown: |
  A greenhouse logs temperature readings (whole degrees) from a sensor across a day.
  You want a tidy summary value object holding the lowest reading, the highest
  reading, and how many readings were taken.

  Complete `summarise_readings(readings)`, where `readings` is a list of integer
  temperatures. Inside the function, use the `dataclasses` module to define a
  `@dataclass` called `Summary` with three integer fields: `low`, `high`, and
  `count`. Build one `Summary` from the data, then return it as a plain dictionary
  using `dataclasses.asdict`. For an empty list, return `{"low": 0, "high": 0,
  "count": 0}`.
starter_code: |
