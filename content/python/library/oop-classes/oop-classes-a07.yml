explanation_markdown: |
  A dataclass is the cleanest way to bundle a few related values. Annotating the
  fields `low`, `high`, and `count` makes `@dataclass` write `__init__`, `__repr__`,
  and `__eq__` for you, so `Summary(min, max, len)` just works. Because the grading
  harness compares against a plain dictionary, `dataclasses.asdict` converts the
  value object into `{"low": ..., "high": ..., "count": ...}` on the way out. The
  empty case is handled first so `min`/`max` are never called on an empty list.
common_mistakes:
  - Calling min or max on an empty list, which raises ValueError instead of returning the zero summary.
  - Returning the Summary instance itself, which will not equal the expected dictionary.
  - Forgetting the int annotations, so the fields are treated as class attributes and no __init__ is generated.
