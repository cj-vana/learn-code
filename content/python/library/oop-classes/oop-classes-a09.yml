explanation_markdown: |
  Each subclass inherits the shared `grams` field from `Parcel` but overrides
  `cost` with its own pricing rule. The kind-to-class dictionary turns each input
  pair into the correct object, and the summing loop calls `cost()` without ever
  asking what kind it holds. That is polymorphism: Python dispatches to the object's
  own `cost`, so adding a new parcel type later means adding one subclass, not
  editing the loop.
common_mistakes:
  - Keeping a chain of if kind == ... inside the loop instead of letting each subclass's cost() method do the work.
  - Forgetting the flat 500-cent fee for express, or applying it per gram instead of once.
  - Charging fragile parcels 2 cents per gram like standard ones rather than the 3-cent premium.
