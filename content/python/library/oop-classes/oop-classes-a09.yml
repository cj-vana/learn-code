function_name: batch_postage
input_mode: function
solution_sketch: Make three Parcel subclasses each overriding cost(), map kinds to classes, and sum cost() polymorphically.
sample_solution: |
  def batch_postage(parcels):
      class Parcel:
          def __init__(self, grams):
              self.grams = grams

          def cost(self):
              return 0

      class Standard(Parcel):
          def cost(self):
              return self.grams * 2

      class Express(Parcel):
          def cost(self):
              return self.grams * 2 + 500

      class Fragile(Parcel):
          def cost(self):
              return self.grams * 3

      kinds = {"standard": Standard, "express": Express, "fragile": Fragile}
      objects = [kinds[kind](grams) for kind, grams in parcels]
      return sum(parcel.cost() for parcel in objects)
hints:
