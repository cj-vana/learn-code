prompt_markdown: |
  A parcel depot ships three classes of parcel, each priced differently by weight
  (in whole grams):

  - `"standard"`: 2 cents per gram.
  - `"express"`: 2 cents per gram, plus a flat 500-cent handling fee.
  - `"fragile"`: 3 cents per gram (careful packing), with no flat fee.

  Complete `batch_postage(parcels)`, where `parcels` is a list of `[kind, grams]`
  pairs. Inside the function, define a base `Parcel` class with a `cost` method and
  three subclasses that **override** `cost` with their own rule. Build the right
  subclass for each parcel, then sum `cost()` across the batch without checking the
  kind again -- let polymorphism pick each object's version. Return the total cost in
  cents as an integer.
