prompt_markdown: |
  A warehouse clerk keeps confusing two questions: "are these the *same* crate?" (`is`,
  object identity) and "do these crates carry matching labels?" (`==`, value equality).
  This exercise makes you predict both answers from CPython's caching rules, without ever
  relying on the actual `is` operator — you encode the rules yourself.

  Write `identity_vs_equality(payload)` where `payload` is a dict:

  - `"alias"`: a boolean. If `True`, the two names refer to the *same object* (like
    `b = a`), so identity and equality are both `True` immediately, whatever the operands.
  - `"a"` and `"b"`: each an operand descriptor, a dict of the form
    `{"kind": ..., "value": ..., "built": ...}`:
    - `"kind"` is `"int"`, `"str"`, or `"list"`.
    - `"value"` is the operand's value (a number for `"int"`, a string for `"str"`, a
      list for `"list"`).
    - `"built"` applies only to strings and is `"literal"` (a compile-time literal),
      `"intern"` (explicitly passed through `sys.intern`), or `"runtime"` (assembled at
      run time, e.g. by concatenation). Ignore `"built"` for ints and lists.

  Return a two-element list `[is_result, eq_result]` of booleans, computed by these
  stated rules (a deliberate teaching model of CPython 3.12 behaviour):

  1. Equality (`==`): `True` only when both operands have the same `"kind"` and equal
     `"value"`; different kinds are never equal (so an int and a str are never `==`).
  2. Identity (`is`):
     - If `"alias"` is `True`, identity is `True`.
     - Otherwise, if the operands are not equal, identity is `False` (two distinct
       objects).
     - Otherwise (equal, not aliased), it depends on `"kind"`:
       - `"int"`: `True` only if the shared value is in the cached range `-5..256`
         inclusive; larger-magnitude ints build separate objects, so `False`.
       - `"str"`: `True` only if *both* strings are interned. A string is interned when
         its `"built"` is `"intern"`, or when its `"built"` is `"literal"` and its value
         is non-empty and made up solely of letters, digits, and underscores (an
         identifier-like literal). A `"runtime"` string is never interned.
       - `"list"`: always `False` — two list displays are always separate objects, even
         with equal contents.

  Example: two identifier-like literal strings `"cargo"` give `[True, True]`; the ints
  `257` and `257` give `[False, True]` (equal in value, but outside the small-int cache).
starter_code: |
