explanation_markdown: |
  `==` asks whether two objects carry equal values; `is` asks whether they are literally
  the same object in memory. They coincide only when a value happens to be shared from a
  cache. CPython pre-builds the small integers from -5 to 256, so `257 is 257` is `False`
  while `256 is 256` is `True`. It also interns some strings — identifier-like literals
  and anything you pass to `sys.intern` — so those share one object, but a string built at
  run time by concatenation is a fresh object even when its characters match. Containers
  like lists are never shared: each display builds a new object, so equal lists are never
  identical. The practical rule the clerk should learn: compare values with `==`, and only
  reach for `is` when you truly mean identity (most idiomatically against `None`). Relying
  on `is` for value comparison works by accident inside the cached ranges and breaks the
  moment a value falls outside them.
common_mistakes:
  - Reporting identity `True` for equal large integers, forgetting the small-int cache only covers -5..256.
  - Treating any equal strings as the same object, missing that runtime-built or space-containing strings are not interned.
  - Letting cross-kind operands be equal (e.g. `5 == "5"`), when different kinds are never equal in this model.
