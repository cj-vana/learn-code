function_name: identity_vs_equality
input_mode: function
solution_sketch: Compute equality from matching kind and value first; then compute identity as alias-or (equal-and-kind-specific-cache-rule), where ints check the -5..256 range, strings check that both are interned, and lists are always distinct.
sample_solution: |
  def identity_vs_equality(payload):
      a = payload["a"]
      b = payload["b"]

      def interned(operand):
          built = operand.get("built")
          if built == "intern":
              return True
          if built == "literal":
              text = operand["value"]
              return bool(text) and all(ch.isalnum() or ch == "_" for ch in text)
          return False

      equal = a["kind"] == b["kind"] and a["value"] == b["value"]

      if payload["alias"]:
          return [True, True]
      if not equal:
          return [False, equal]

      kind = a["kind"]
      if kind == "int":
          same = -5 <= a["value"] <= 256
      elif kind == "str":
          same = interned(a) and interned(b)
      else:
          same = False
      return [same, True]
