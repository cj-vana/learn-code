explanation_markdown: |
  `functools.total_ordering` fills in the missing rich-comparison methods by expressing
  each one in terms of the single operator you supplied plus `__eq__`. For a class that
  defines `__lt__`, the decorator installs `__le__` as `a < b or a == b`, `__gt__` as
  `not (a < b) and a != b`, and `__ge__` as `not (a < b)` — precisely the formulas you
  implemented. Because every ordering reduces to one comparison call and one equality
  call, `total_ordering` never needs the other operators to exist. The tradeoff is real:
  each synthesised operator may perform two underlying calls instead of one, so it is a
  little slower than hand-writing all six, and it assumes your ordering is total and
  self-consistent. Reproducing the table by hand is the surest way to remember which
  formula the decorator actually uses for each case.
common_mistakes:
  - Deriving `gt` as simply `not le` while forgetting the equality term, so equal values wrongly report `a > b`.
  - Mixing up the branch — applying the `lt` formulas when the class actually defined `ge`, which flips several results.
  - Returning truthy non-bool values (like the result of `value or eq` when value is a truthy object) instead of real `True`/`False` booleans.
