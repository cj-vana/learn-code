solution_sketch: Read eq and the single defined operator's value, then branch on which operator was defined and apply total_ordering's synthesis formulas to fill lt/le/gt/ge; eq passes through and ne is its negation.
sample_solution: |
  def total_ordering_compare(payload):
      e = bool(payload["eq"])
      v = bool(payload["value"])
      defined = payload["defined"]
      if defined == "lt":
          lt, le, gt, ge = v, (v or e), ((not v) and (not e)), (not v)
      elif defined == "le":
          le, lt, ge, gt = v, (v and (not e)), ((not v) or e), (not v)
      elif defined == "gt":
          gt, ge, lt, le = v, (v or e), ((not v) and (not e)), (not v)
      elif defined == "ge":
          ge, gt, le, lt = v, (v and (not e)), ((not v) or e), (not v)
      else:
          raise ValueError(f"unknown operator: {defined}")
      return {"lt": lt, "le": le, "gt": gt, "ge": ge, "eq": e, "ne": not e}
hints:
