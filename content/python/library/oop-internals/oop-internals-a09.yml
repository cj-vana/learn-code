prompt_markdown: |
  A bakery ranks loaves by a `Loaf` class. To save typing, the class is decorated with
  `functools.total_ordering`: it defines `__eq__` and exactly *one* ordering operator,
  and the decorator synthesises the other three from those two. Your job is to reproduce
  that synthesis by hand, so you understand precisely which formulas `total_ordering`
  uses.

  Write `total_ordering_compare(payload)` where `payload` is a dict describing one
  comparison of two loaves `a` and `b`:

  - `"eq"`: the boolean result of `a == b` (what `__eq__` returned).
  - `"defined"`: which single ordering operator the class actually implemented — one of
    `"lt"`, `"le"`, `"gt"`, or `"ge"`.
  - `"value"`: the boolean result of calling that one defined operator on `(a, b)`.

  Using ONLY those two booleans — exactly the information `total_ordering` has access to
  — return a dict giving all six comparison results:
  `{"lt": ..., "le": ..., "gt": ..., "ge": ..., "eq": ..., "ne": ...}`.

  The `eq` result is just the input `"eq"`, and `ne` is its negation. The four ordering
  results follow `total_ordering`'s own formulas. Writing `E` for `"eq"` and `V` for
  `"value"`:

  - If `defined == "lt"` (so `V` means `a < b`):
    `lt = V`, `le = V or E`, `gt = (not V) and (not E)`, `ge = not V`.
  - If `defined == "le"` (so `V` means `a <= b`):
    `le = V`, `lt = V and (not E)`, `ge = (not V) or E`, `gt = not V`.
  - If `defined == "gt"` (so `V` means `a > b`):
    `gt = V`, `ge = V or E`, `lt = (not V) and (not E)`, `le = not V`.
  - If `defined == "ge"` (so `V` means `a >= b`):
    `ge = V`, `gt = V and (not E)`, `le = (not V) or E`, `lt = not V`.

  Every returned value must be a genuine Python bool (`True`/`False`). Example: with
  `eq = False`, `defined = "lt"`, `value = True` (modelling `a = 3`, `b = 5`), the result
  is `{"lt": True, "le": True, "gt": False, "ge": False, "eq": False, "ne": True}`.
