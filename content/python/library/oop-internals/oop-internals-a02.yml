prompt_markdown: |
  A harbor's tide model derives a "mean level" from a list of raw readings. The
  computation is treated as expensive, so it is exposed through a **non-data
  descriptor** that behaves like `functools.cached_property`: the first read
  computes and stores the answer directly in the instance's `__dict__`, and later
  reads return that stored value without recomputing.

  Write `cached_tide_levels(job)`. The single argument is a dict shaped like:

  ```python
  {"readings": [10, 20, 30], "events": ["read", "read", "invalidate", "read"]}
  ```

  Model an instance whose cached attribute computes `sum(readings)`. Process the
  `events` list in order:

  - `"read"` — return the mean level. If it is not currently cached, compute it
    (this counts as one computation) and cache it; if it is already cached, return
    the cached value with **no** new computation.
  - `"invalidate"` — drop the cached value if present, so the next `"read"` must
    recompute. Invalidating when nothing is cached does nothing.

  Return a dict `{"value": <last value read>, "computations": <count>}` where
  `value` is the result of the final `"read"` event (or `None` if no `"read"`
  happened) and `computations` is how many times the sum was actually computed.

  For the example above the result is `{"value": 60, "computations": 2}`: the first
  read computes, the second read is cached, the invalidate clears it, and the final
  read recomputes.

  Implement caching by having the descriptor's `__get__` write the computed value
  into `instance.__dict__` under its own name. Because the descriptor defines only
  `__get__` (no `__set__`), a matching entry in the instance dict shadows it, so
  cached reads skip `__get__` entirely.
