explanation_markdown: |
  Attribute lookup checks the type's MRO for a **data** descriptor first, then the
  instance's `__dict__`, then **non-data** descriptors and plain class attributes.
  `CachedLevel` defines only `__get__`, so it is non-data. The first read misses the
  instance dict, runs `__get__`, computes the sum, and stores it under `mean_level`
  in `instance.__dict__`. Every later read finds that key before Python ever consults
  the descriptor, so no recomputation happens.

  Invalidation is just popping that key back out, which re-exposes the descriptor for
  the next access. This is exactly how `functools.cached_property` works, and it is
  why a cached property cannot live on a class with `__slots__` and no `__dict__` —
  there would be nowhere to stash the memoized value.
common_mistakes:
  - Giving the descriptor a __set__ method, which turns it into a data descriptor that always runs and defeats the instance-dict cache.
  - Caching on the descriptor object itself instead of per-instance, so separate models would share one value.
  - Counting a computation on every read rather than only when the value is actually recomputed.
