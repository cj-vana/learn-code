solution_sketch: A non-data descriptor computes sum(readings) on first access, stores it in the instance __dict__ under its own name (so later reads shadow the descriptor), increments a compute counter each real computation, and invalidation pops that key so the next read recomputes.
sample_solution: |
  def cached_tide_levels(job):
      readings = job["readings"]
      events = job["events"]

      class CachedLevel:
          def __set_name__(self, owner, name):
              self.name = name

          def __get__(self, obj, owner=None):
              if obj is None:
                  return self
              obj.compute_count += 1
              value = sum(obj.samples)
              obj.__dict__[self.name] = value
              return value

      class TideModel:
          mean_level = CachedLevel()

          def __init__(self, samples):
              self.samples = samples
              self.compute_count = 0

      model = TideModel(readings)
      last = None
      for event in events:
          if event == "read":
              last = model.mean_level
          elif event == "invalidate":
              model.__dict__.pop("mean_level", None)
      return {"value": last, "computations": model.compute_count}
