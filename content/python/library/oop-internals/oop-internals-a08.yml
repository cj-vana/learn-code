prompt_markdown: |
  A harbor's manifest system asks a single question about each crate class: does
  `issubclass(candidate, Cargo)` hold? `Cargo` is an abstract base. A class counts as
  `Cargo` in two different ways, and this exercise makes you model both — real
  inheritance *and* virtual registration via `Cargo.register(...)`.

  Write `virtual_subclass_check(payload)` where `payload` is a dict with these keys:

  - `"abc"`: the name (str) of the abstract base class we are testing against.
  - `"inheritance"`: a dict mapping a class name to the list of its *direct* real base
    class names. A class missing from this dict (or mapped to `[]`) simply has no
    declared real bases.
  - `"registered"`: a list of class names that were passed to `abc.register(...)` — the
    virtual subclasses of `"abc"`.
  - `"candidate"`: the name (str) of the class to test.

  Return `True` if `issubclass(candidate, abc)` would be `True`, else `False`, using
  these rules:

  1. A class is a subclass of itself, so if `candidate == abc`, return `True`.
  2. Real inheritance is transitive: follow the `"inheritance"` edges upward from
     `candidate`. If `abc` is any (direct or indirect) real ancestor, return `True`.
  3. Virtual registration counts too, and it flows *downward through real inheritance*:
     if `candidate`, or any of its real ancestors, appears in `"registered"`, return
     `True`. (Registering a class virtually also makes every real subclass of it a
     virtual subclass of `abc`.)
  4. Otherwise return `False`.

  Assume the inheritance graph is acyclic. Compute the set of real ancestors of
  `candidate` — including `candidate` itself — then apply the rules against that set.

  Example: with `abc = "Cargo"`, `inheritance = {"Pallet": ["Container"], "Container": []}`,
  `registered = ["Container"]`, and `candidate = "Pallet"`, the ancestors of `Pallet`
  are `{"Pallet", "Container"}`. `Cargo` is not among them, but `Container` is
  registered, so the answer is `True`.
