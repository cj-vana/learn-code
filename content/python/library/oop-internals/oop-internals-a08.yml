explanation_markdown: |
  `abc.ABCMeta` answers `issubclass` with more than the normal method-resolution walk.
  Besides real base classes, an ABC keeps a registry of *virtually* registered classes
  added with `Cargo.register(Container)`. A virtual subclass has no inheritance link and
  no inherited methods — it only satisfies `issubclass`/`isinstance`. Crucially, the
  registration flows downward: any real subclass of a registered class is also treated
  as a subclass of the ABC, but it never flows upward to a registered class's own bases.
  Modelling this as "collect the candidate's real-ancestor set, then check whether the
  ABC or any registered name sits in it" captures the exact semantics with a plain graph
  walk. This is why ABCs let unrelated types (like the numeric tower) participate in an
  interface without a shared base class.
common_mistakes:
  - Letting virtual registration flow upward — treating a base of the candidate as registered when only a descendant was registered.
  - Forgetting the reflexive rule that a class is a subclass of itself, so `candidate == abc` must return True even with no edges.
  - Only checking the candidate against `registered` and `abc` directly, missing that transitive real ancestors must be considered too.
