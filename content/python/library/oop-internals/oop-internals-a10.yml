prompt_markdown: |
  A harbor tide gauge reports a whole-number reading (in millimetres, possibly negative).
  The gauge is an object whose `__format__(self, spec)` decides how `format(gauge, spec)`
  and f-string `f"{gauge:spec}"` render the number. You will implement that dispatch as a
  pure function over a small, invented format-spec mini-language.

  Write `custom_format(payload)` where `payload` is a dict with:

  - `"value"`: an integer reading (may be negative or zero).
  - `"spec"`: the format spec string requested. Interpret it exactly as follows and
    return the resulting string:

    - `""` (empty spec): the reading in base 10 with comma thousands separators, keeping
      a leading minus for negatives. `1234567` → `"1,234,567"`, `-1234` → `"-1,234"`,
      `0` → `"0"`.
    - `"sign"`: base 10 with an explicit leading sign and no separators. `42` → `"+42"`,
      `-42` → `"-42"`, `0` → `"+0"`.
    - `"hex"`: uppercase hexadecimal of the magnitude, with a leading minus for negatives
      and no `0x` prefix. `255` → `"FF"`, `-255` → `"-FF"`, `0` → `"0"`.
    - `"bin"`: binary of the magnitude, with a leading minus for negatives and no `0b`
      prefix. `5` → `"101"`, `-5` → `"-101"`, `0` → `"0"`.
    - `"pad" + digits`, e.g. `"pad6"`: base 10, zero-padded to that total width with the
      sign counted inside the width — exactly like Python's `format(value, "06d")`.
      `42` with `"pad6"` → `"000042"`, `-42` with `"pad6"` → `"-00042"`, `7` with
      `"pad3"` → `"007"`. If the number already meets or exceeds the width, return it
      unpadded (`123456` with `"pad4"` → `"123456"`).

  Every spec listed above is valid; you do not need to handle any other spec string. (In
  a real `__format__`, an unrecognised spec raises `ValueError` — here the closed set
  keeps the exercise deterministic.)
starter_code: |
  def custom_format(payload):
      return ""
function_name: custom_format
input_mode: function
solution_sketch: Read value and spec, then dispatch on spec — empty uses a comma format, "sign" uses a plus format, "hex"/"bin" format the magnitude with a manual minus, and "padN" parses the width and delegates to Python's zero-padded integer format.
sample_solution: |
  def custom_format(payload):
      value = payload["value"]
      spec = payload["spec"]
      if spec == "":
          return format(value, ",")
      if spec == "sign":
          return format(value, "+")
      if spec == "hex":
          sign = "-" if value < 0 else ""
          return sign + format(abs(value), "X")
      if spec == "bin":
          sign = "-" if value < 0 else ""
          return sign + format(abs(value), "b")
      if spec.startswith("pad"):
          width = int(spec[3:])
          return format(value, "0{}d".format(width))
      raise ValueError("unsupported spec: {}".format(spec))
