explanation_markdown: |
  When you write `format(obj, spec)` or `f"{obj:spec}"`, Python calls
  `type(obj).__format__(obj, spec)` and hands it the raw spec string after the colon —
  the object is entirely responsible for parsing that string and producing text. Numeric
  and string builtins interpret the standard format mini-language, but a custom class can
  invent its own, which is exactly what you did: branch on the spec, then lean on the
  builtin `format` for the actual digit work (`","` for grouping, `"+"` for a forced
  sign, `"0{width}d"` for sign-aware zero padding). Formatting the magnitude and adding
  your own minus for hex and bin mirrors how Python itself keeps the sign outside the
  base conversion. The key mental model: `__format__` receives a spec, not pre-formatted
  output, so all interpretation happens inside your method.
common_mistakes:
  - Formatting `value` directly for hex/bin instead of `abs(value)`, so negatives render as two's-complement noise or with a misplaced sign.
  - Building the pad width by hand and forgetting that the minus sign must be counted inside the total width, unlike a naive left-zfill of the digits only.
  - Assuming an empty spec should return `str(value)`; it must apply comma grouping here, which is a different string for values over 999.
