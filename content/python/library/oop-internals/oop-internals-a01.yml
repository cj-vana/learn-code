solution_sketch: A data descriptor validates each assignment in __set__, raising ValueError out of range; the loop catches it so rejected writes leave the stored value unchanged, and records the current reading each step.
sample_solution: |
  def calibrate_dials(job):
      low = job["low"]
      high = job["high"]
      writes = job["writes"]

      class BoundedReading:
          def __set_name__(self, owner, name):
              self._store = "_" + name

          def __get__(self, obj, owner=None):
              if obj is None:
                  return self
              return getattr(obj, self._store)

          def __set__(self, obj, value):
              if not (low <= value <= high):
                  raise ValueError("reading out of range")
              setattr(obj, self._store, value)

      class Instrument:
          dial = BoundedReading()

          def __init__(self, start):
              self.dial = start

      instrument = Instrument(low)
      history = []
      for value in writes:
          try:
              instrument.dial = value
          except ValueError:
              pass
          history.append(instrument.dial)
      return history
hints:
  - level: 1
    text: A descriptor lives on the class as a class attribute; its __set__ runs every time you assign to that attribute on an instance.
  - level: 2
    text: Store the real number under a different name (like "_dial") so __get__ and __set__ don't recurse into themselves. Use __set_name__ to learn that backing name.
  - level: 3
    text: In the loop, wrap the assignment in try/except ValueError. On rejection do nothing, then append the current dial value regardless of whether the write succeeded.
