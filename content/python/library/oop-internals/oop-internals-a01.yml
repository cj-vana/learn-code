explanation_markdown: |
  A descriptor is any object whose class defines `__get__`/`__set__` (and friends).
  Placed as a class attribute, it intercepts attribute access on every instance.
  Because `BoundedReading` defines `__set__`, it is a **data descriptor**, so it
  always runs on assignment even if the instance dict holds a same-named key.

  The trick that avoids infinite recursion is storing the actual number under a
  separate backing name (`_dial`). `__set_name__` hands the descriptor the attribute
  name it was assigned to at class-creation time, so the backing name is derived
  once rather than hard-coded. Validation lives in exactly one place — `__set__` —
  which is precisely how `property` setters and typed-attribute libraries enforce
  their invariants.
common_mistakes:
  - Storing the value under the same attribute name the descriptor guards, causing __get__/__set__ to call themselves forever.
  - Appending the attempted write instead of the dial's current value, so rejected writes wrongly appear in the history.
  - Making the descriptor an instance attribute; descriptors only trigger their protocol when they live on the class.
