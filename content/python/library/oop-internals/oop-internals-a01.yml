prompt_markdown: |
  A mountaintop observatory calibrates its telescope through a single dial whose
  reading must always stay between a low and high limit. The dial is guarded by a
  **descriptor** so that any write outside the range is rejected and the dial keeps
  the value it already had.

  Write `calibrate_dials(job)`. The single argument is a dict shaped like:

  ```python
  {"low": 0, "high": 100, "writes": [55, -3, 100, 101, 42]}
  ```

  - `low` and `high` are the inclusive bounds.
  - The dial starts at `low` (always a legal value).
  - Apply each number in `writes` to the dial, in order.
  - A write is accepted only when `low <= value <= high`. When accepted, the dial
    takes that new value.
  - A write outside the range is rejected: the dial keeps its current value.

  Return a list with the dial's value **after** processing each write, one entry
  per write. For the example above the result is `[55, 55, 100, 100, 42]` (the
  `-3` and `101` writes are rejected). An empty `writes` list returns `[]`.

  Implement the guard as a descriptor class with `__set_name__`, `__get__`, and a
  `__set__` that raises `ValueError` when a value is out of range; catch that error
  in your loop so a rejected write leaves the reading untouched.
