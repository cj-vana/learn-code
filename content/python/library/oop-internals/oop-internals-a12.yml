explanation_markdown: |
  `SomeClass[params]` is sugar for `SomeClass.__class_getitem__(params)`, and the standard
  implementation (via `types.GenericAlias`) stores the origin class plus a tuple of
  arguments you can read back as `__origin__` and `__args__`. The rule that trips people up
  is the single-vs-tuple distinction: `Matrix[int]` passes the bare `int`, so `__args__`
  is the one-tuple `(int,)`, while `Matrix[int, str]` passes the tuple `(int, str)`, so
  `__args__` has two entries. `Matrix[()]` passes an empty tuple and captures zero args.
  Nesting is recursive — `Vector[float]` inside the brackets is itself a `GenericAlias`,
  and a parenthesized tuple sitting among the arguments stays a tuple. Modelling this as a
  small recursive normalizer, with one helper deciding argument count and another
  normalizing each node, mirrors exactly how the machinery walks a subscript expression to
  build the alias.
common_mistakes:
  - Always spreading the subscript into multiple args, so `Matrix[int]` wrongly captures the characters or elements of `int` instead of a single argument.
  - Failing to recurse, so a nested subscription like `Vector[float]` is left as a raw node instead of its own `{"origin", "args"}` capture.
  - Collapsing a parenthesized tuple argument into separate arguments, losing the distinction between `Matrix[(int, str), bool]` (two args) and `Matrix[int, str, bool]` (three args).
