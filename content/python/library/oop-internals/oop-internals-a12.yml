prompt_markdown: |
  When you subscript a class in a type hint — like `Matrix[int]` or `Matrix[int, str]` —
  Python calls `Matrix.__class_getitem__(params)` and captures the result as a
  `GenericAlias` recording the origin class and its argument tuple. The subtle part is how
  the subscript becomes `params`: a single subscript arrives *as itself*, while a
  comma-separated subscript arrives as *one tuple*. You will reproduce that capture with a
  recursive normalizer over a described subscription expression.

  Write `subscriptable_capture(payload)`. The `payload` is a *subscription node* — a dict
  with keys `"cls"` (the origin class name, a str) and `"subscript"` (a *subscript node*
  describing what appears inside the brackets). A subscript node is one of:

  - a parameter leaf: `{"param": "int"}` — a single type parameter named by a string;
  - a group: `{"group": [<subscript node>, ...]}` — a comma-separated subscript, i.e. the
    things Python bundles into one tuple (the group may be empty, modelling `Matrix[()]`);
  - a nested subscription: `{"cls": ..., "subscript": ...}` — another subscription such as
    `Vector[float]` used inside the brackets.

  Return the captured alias as a dict `{"origin": <cls name>, "args": [<arg>, ...]}` where
  `"args"` is the tuple of captured arguments (as a list), built by these rules:

  - The arguments come from the top-level `"subscript"`. If that subscript is a `group`,
    the arguments are its elements *in order* (so `Matrix[int, str]` captures two args). If
    it is anything else (a param leaf or a nested subscription), it is a *single*
    argument, so `"args"` is a one-element list. `Matrix[()]` (an empty group) captures
    zero args, giving `"args": []`.
  - Each captured argument is normalized recursively:
    - a param leaf becomes just its name string, e.g. `"int"`;
    - a nested subscription becomes its own `{"origin": ..., "args": [...]}` dict;
    - a nested group (a parenthesized tuple sitting inside another subscript, e.g. the
      `(int, str)` in `Matrix[(int, str), bool]`) becomes a plain list of its normalized
      elements, e.g. `["int", "str"]`.

  Example: `Matrix[Vector[int], str]` is
  `{"cls": "Matrix", "subscript": {"group": [{"cls": "Vector", "subscript": {"param": "int"}}, {"param": "str"}]}}`
  and captures
  `{"origin": "Matrix", "args": [{"origin": "Vector", "args": ["int"]}, "str"]}`.
