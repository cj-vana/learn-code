solution_sketch: Write a recursive normalize(node) that turns a param into its name, a subscription into an origin/args dict (single arg unless the subscript is a group), and a bare group into a list; the top-level call unpacks a top-level group into multiple args or wraps a single subscript as one arg.
sample_solution: |
  def subscriptable_capture(payload):
      def build_args(subscript):
          if "group" in subscript:
              return [normalize(child) for child in subscript["group"]]
          return [normalize(subscript)]

      def normalize(node):
          if "param" in node:
              return node["param"]
          if "cls" in node:
              return {"origin": node["cls"], "args": build_args(node["subscript"])}
          # a bare group standing in for a parenthesized tuple argument
          return [normalize(child) for child in node["group"]]

      return {"origin": payload["cls"], "args": build_args(payload["subscript"])}
hints:
