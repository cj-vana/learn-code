explanation_markdown: |
  The MRO is the single flattened order Python walks when it looks up an attribute
  or method on an instance. For anything beyond single inheritance it is computed by
  the **C3 linearization** algorithm, which guarantees that a class always precedes
  all of its parents and that the left-to-right order of bases is respected.

  Rather than reimplement C3, this exercise leans on the interpreter: once you build
  the real classes with `type(...)`, `__mro__` already holds the answer. The only
  care needed is construction order — a subclass cannot be created before its bases
  exist — so you build roles whose parents are all ready, repeating until the graph
  is exhausted. The diamond result `[D, B, C, A, object]` is the classic case: `A`
  appears once, after both `B` and `C`, never duplicated.
common_mistakes:
  - Trying to build a subclass before its base classes exist, which raises a NameError-style lookup failure or KeyError.
  - Forgetting that every MRO ends with object, and omitting it from the returned list.
  - Returning the class objects instead of their __name__ strings, which will not match the expected plain-value output.
