prompt_markdown: |
  A printmaking workshop tracks its apprenticeship lineages: every workshop role
  inherits techniques from one or more parent roles. When a role uses a technique,
  Python's **method resolution order** (MRO) — its C3 linearization — decides which
  ancestor is consulted first. Your job is to report that order.

  Write `printmaker_lineage(job)`. The single argument is a dict shaped like:

  ```python
  {
      "bases": {"A": [], "B": ["A"], "C": ["A"], "D": ["B", "C"]},
      "start": "D",
  }
  ```

  - `bases` maps each role name to the ordered list of its direct parent roles. A
    role with an empty list inherits only from `object`.
  - `start` is the role whose MRO you must return.

  Build the actual Python classes described by `bases` (a role can only be built
  once all of its parents exist), then return the MRO of the `start` role as a list
  of names. Always include the trailing `"object"`.

  For the diamond above the answer is `["D", "B", "C", "A", "object"]`. A role with
  no parents, e.g. `{"bases": {"X": []}, "start": "X"}`, returns `["X", "object"]`.

  You do not need to implement C3 yourself — construct each class with
  `type(name, bases_tuple, {})` and read the real `__mro__` Python computes.
