solution_sketch: Build classes in an order where every role's parents already exist, using type(name, tuple_of_base_objects, {}); then return [cls.__name__ for cls in start_cls.__mro__], which is Python's own C3 linearization including object.
sample_solution: |
  def printmaker_lineage(job):
      spec = job["bases"]
      start = job["start"]

      built = {}
      remaining = dict(spec)
      while remaining:
          progressed = False
          for name in list(remaining):
              parent_names = remaining[name]
              if all(parent in built for parent in parent_names):
                  bases = tuple(built[parent] for parent in parent_names)
                  built[name] = type(name, bases, {})
                  del remaining[name]
                  progressed = True
          if not progressed:
              raise ValueError("unresolvable lineage")

      return [cls.__name__ for cls in built[start].__mro__]
