explanation_markdown: |
  Normally each instance stores its attributes in a per-instance `__dict__`, which
  is flexible but costs memory. Declaring `__slots__` replaces that dict with a
  fixed set of C-level slots: attribute access on a slotted class goes through
  **member descriptors** (data descriptors that Python creates for each slot name),
  and no `__dict__` is allocated at all.

  The audit is a one-line introspection: `hasattr(instance, "__dict__")`. It stays
  `True` for ordinary classes and flips to `False` the moment `__slots__` is present
  — even when the slot list is empty, because it is the declaration itself, not the
  count, that suppresses the dict. (A subclass of a slotted class that omits its own
  `__slots__` would regain a `__dict__`, which is why slots savings only hold if the
  whole inheritance chain cooperates.)
common_mistakes:
  - Treating an empty __slots__ list as if it were no slots at all; an empty list still removes the __dict__.
  - Checking hasattr on the class object rather than an instance — the class itself always has a mapping proxy, which is not the per-instance __dict__ being asked about.
  - Confusing the presence of __slots__ with the absence of attributes; slotted instances still have attributes, just no __dict__ to hold arbitrary ones.
