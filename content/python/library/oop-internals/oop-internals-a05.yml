prompt_markdown: |
  A greenhouse ships several models of sensor pod. Memory-lean models declare
  `__slots__` so their instances carry no per-instance `__dict__`; the flexible
  models omit `__slots__` and keep the usual `__dict__`. You are auditing which
  models still allocate a dict per instance.

  Write `pods_with_dict(spec)`. The single argument is a dict shaped like:

  ```python
  {"classes": [
      {"name": "Plain", "slots": None},
      {"name": "Slotted", "slots": ["temp", "humidity"]},
      {"name": "Empty", "slots": []},
  ]}
  ```

  Each entry describes one pod model that inherits only from `object`:

  - `slots` is `None` — the class declares no `__slots__`.
  - `slots` is a list (possibly empty) — the class declares
    `__slots__ = tuple(that list)`.

  For each model, build the class, create an instance, and determine whether that
  instance has a `__dict__`. Return a dict mapping each model name to `True` (has a
  per-instance dict) or `False` (does not).

  For the example the answer is `{"Plain": True, "Slotted": False, "Empty": False}`.
  Note that an **empty** `__slots__` still removes the dict — declaring the slots at
  all is what matters, not how many there are.
starter_code: |
  def pods_with_dict(spec):
      return {}
function_name: pods_with_dict
input_mode: function
solution_sketch: |
  For each entry build a class with type(name, (), {}) when slots is None, else type(name, (), {"__slots__": tuple(slots)}); instantiate it and record hasattr(instance, "__dict__").
sample_solution: |
  def pods_with_dict(spec):
      result = {}
      for entry in spec["classes"]:
          name = entry["name"]
          slots = entry["slots"]
          if slots is None:
              cls = type(name, (), {})
          else:
              cls = type(name, (), {"__slots__": tuple(slots)})
          result[name] = hasattr(cls(), "__dict__")
      return result
