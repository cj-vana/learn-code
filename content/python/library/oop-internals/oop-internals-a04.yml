explanation_markdown: |
  Looking up `instance.sound_horn()` sends Python down the class's MRO, and the
  lookup stops at the **first** class whose own namespace (`__dict__`) holds
  `sound_horn`. Checking `__dict__` rather than `getattr`/`hasattr` is the crux:
  `hasattr` would report `True` on a subclass that merely inherits the method, which
  would not tell you which class actually owns it.

  In the diamond, `D`'s MRO is `D, B, C, A, object`. With the duty on `A` and `C`,
  the walk reaches `C` before `A`, so `C` responds — this is exactly why cooperative
  `super()` calls flow `B -> C -> A` rather than `B -> A` directly. A duty defined
  only on a class outside `start`'s ancestry (as in the `start=B` case) is never
  reached, because that class is not in `B`'s MRO at all.
common_mistakes:
  - Using hasattr/getattr instead of checking each class's own __dict__, which reports inherited methods and returns the wrong owner.
  - Scanning the bases dict in declaration order instead of the start class's actual MRO, giving wrong results for diamonds.
  - Forgetting the None case when no class in the MRO defines the duty.
