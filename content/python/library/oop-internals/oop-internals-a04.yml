prompt_markdown: |
  A chain of lighthouse keepers inherits duties from senior keepers. When the bell
  rings for the duty `sound_horn`, Python finds the responder by walking the ringing
  role's **method resolution order** and taking the first ancestor that actually
  defines that duty in its own body. Your job is to name that responder.

  Write `which_keeper_responds(job)`. The single argument is a dict shaped like:

  ```python
  {
      "bases": {"A": [], "B": ["A"], "C": ["A"], "D": ["B", "C"]},
      "defines": ["A", "C"],
      "start": "D",
  }
  ```

  - `bases` maps each role to the ordered list of its direct parent roles (empty
    list means it inherits only from `object`).
  - `defines` is the set of roles that define the `sound_horn` duty in their own
    class body.
  - `start` is the role whose bell rings.

  Build the real classes, attaching the `sound_horn` method to exactly the roles in
  `defines`. Then walk `start`'s MRO and return the **name** of the first class that
  defines `sound_horn` in its own namespace. If no class in that MRO defines it,
  return `None`.

  For the example, `start` `D` has MRO `D, B, C, A, object`; the first of those that
  defines the duty is `C`, so return `"C"`. A duty defined only on a role that is
  not in the ringing role's ancestry does not count.
starter_code: |
