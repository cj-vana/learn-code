prompt_markdown: |
  A submarine's ballast console exposes a fixed panel of controls declared through
  `__slots__`. Because the class has no `__dict__`, assigning to any control that was
  not declared raises `AttributeError`. You are replaying an operator's session and
  reporting which writes the console accepted.

  Write `ballast_console(job)`. The single argument is a dict shaped like:

  ```python
  {
      "slots": ["depth", "temp"],
      "assignments": [["depth", 5], ["temp", 9], ["salinity", 3], ["depth", 7]],
  }
  ```

  - `slots` is the list of declared control names; build a class with
    `__slots__ = tuple(slots)`.
  - `assignments` is an ordered list of `[name, value]` writes applied to one
    console instance.

  For each assignment, attempt `setattr(instance, name, value)`. Record `"ok"` if it
  succeeds and `"rejected"` if it raises `AttributeError` (the name is not a declared
  slot). Later assignments to a declared slot simply overwrite the earlier value.

  Return a dict:

  ```python
  {"results": ["ok", "ok", "rejected", "ok"],
   "stored": {"depth": 7, "temp": 9}}
  ```

  `results` has one entry per assignment in order. `stored` maps each **declared**
  slot that currently holds a value to that value; declared slots that were never
  assigned are omitted. In the example, `salinity` is rejected (undeclared), and
  `depth` ends at `7` after being overwritten.
starter_code: |
  def ballast_console(job):
      return {"results": [], "stored": {}}
function_name: ballast_console
