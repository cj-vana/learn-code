explanation_markdown: |
  When a class declares `__slots__` and gains no `__dict__`, each slot name becomes a
  data descriptor on the class, and those descriptors are the *only* attributes an
  instance can hold. Assigning an undeclared name has nowhere to go — there is no
  fallback dict — so Python raises `AttributeError`. That is the enforcement people
  reach for `__slots__` to get, beyond the memory savings.

  Two subtleties show up in the audit. First, a declared slot that has never been
  assigned raises `AttributeError` on read, which is why `stored` is built with a
  `hasattr` guard rather than assuming every slot has a value. Second, reassigning a
  slot just overwrites it through the same descriptor, so `depth` ending at `7`
  reflects the last accepted write, not the first.
common_mistakes:
  - Letting the AttributeError from an undeclared write escape instead of catching it and recording "rejected".
  - Reading every declared slot for the stored map without a hasattr guard, which raises AttributeError for slots that were never assigned.
  - Assuming a rejected write still lands somewhere; with no __dict__ the value is simply discarded.
