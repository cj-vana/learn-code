solution_sketch: |
  Build a class with __slots__ = tuple(slots); for each [name, value] try setattr and append "ok", catching AttributeError to append "rejected"; then collect stored = {slot: getattr(inst, slot) for slot in slots if hasattr(inst, slot)}.
sample_solution: |
  def ballast_console(job):
      slots = job["slots"]
      assignments = job["assignments"]

      console_cls = type("Console", (), {"__slots__": tuple(slots)})
      console = console_cls()

      results = []
      for name, value in assignments:
          try:
              setattr(console, name, value)
              results.append("ok")
          except AttributeError:
              results.append("rejected")

      stored = {slot: getattr(console, slot) for slot in slots if hasattr(console, slot)}
      return {"results": results, "stored": stored}
hints:
  - level: 1
    text: A class with __slots__ and no __dict__ only permits attributes whose names appear in the slots; other assignments raise AttributeError.
  - level: 2
