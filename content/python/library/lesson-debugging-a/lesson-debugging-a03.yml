body_markdown: |
  A classic silent bug: removing items from a list *while* you loop over it. No
  error is raised, but some items get skipped, so the result looks almost right.

  ```python
  numbers = [1, 2, 2, 3, 4]
  for n in numbers:
      if n % 2 == 0:
          numbers.remove(n)
  print(numbers)  # [1, 2, 3]  <- one 2 survived!
  ```

  Why does a `2` survive? The loop walks the list by position. When you remove
  the item at index 1, everything shifts left, so the second `2` slides into a
  slot the loop has already passed. The loop never looks at it again.

  The safe fixes are to loop over a *copy*, or to build a *new* list instead of
  editing the one you are reading:

  ```python
  numbers = [1, 2, 2, 3, 4]
  odds = [n for n in numbers if n % 2 != 0]
  print(odds)  # [1, 3]
  ```

  Rule of thumb: never add to or remove from a list you are currently iterating.
checkpoints:
  - question: Why does one of the 2s survive when you remove even numbers during the loop?
    answer: Removing an item shifts later items left, so the loop skips the one that moves into the current position
    explanation: The loop tracks position, and a removal shifts indices, causing the next element to be jumped over.
  - question: Does mutating a list while iterating over it raise an error?
    answer: "No"
    explanation: Python does not raise here; it silently skips elements, which makes the bug easy to miss.
  - question: Name one safe way to filter a list without mutating it mid-loop.
    answer: Build a new list with a comprehension (or loop over a copy)
    explanation: Creating a fresh list, e.g. with a comprehension, avoids editing the list you are reading.
