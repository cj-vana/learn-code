prompt_markdown: |
  A warehouse gives a flat bulk discount to expensive line items. Write
  `apply_bulk_discount(prices)` that takes a list of integer prices and returns a
  new list where every price STRICTLY GREATER THAN 100 is reduced by 25, and
  every other price is left unchanged. The order of the list must stay the same.
  An empty list returns an empty list.
starter_code: |
  def apply_bulk_discount(prices):
      return []
function_name: apply_bulk_discount
input_mode: function
solution_sketch: Use a list comprehension with a conditional expression per price.
sample_solution: |
  def apply_bulk_discount(prices):
      return [price - 25 if price > 100 else price for price in prices]
hints:
  - level: 1
    text: Build a brand-new list rather than editing the input in place.
  - level: 2
    text: A conditional expression (a if cond else b) picks the value for each price.
  - level: 3
    text: Use [price - 25 if price > 100 else price for price in prices].
tests:
  public:
    - name: empty
      input: []
      expected: []
    - name: none_qualify
      input: [50, 100]
