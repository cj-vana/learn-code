explanation_markdown: |
  The conditional expression inside the comprehension decides, per element,
  whether to subtract 25 or keep the price as is. Using `>` (not `>=`) means a
  price of exactly 100 is untouched, which matches "strictly greater than 100."
  Building a new list keeps the original untouched and preserves order.
common_mistakes:
  - Using >= 100 and discounting a price that should stay the same.
  - Mutating the input list instead of returning a new one.
  - Placing the condition after the loop (a filter) so unqualified prices vanish.
