      expected: [mist, fern, dune]
explanation_markdown: |
  Python sorts tuples element by element, so returning `(-plays, title)` as the
  key ranks tracks by descending play count and then by ascending title within a
  tie. Negating the play count is a clean way to sort one field descending while
  keeping the other ascending. A final comprehension extracts just the titles.
common_mistakes:
  - Sorting by title and plays in two passes, which loses the primary ordering.
  - Forgetting to reverse the play count, so the least-played track comes first.
  - Returning the full track dicts instead of only their titles.
