prompt_markdown: |
  A community radio show ranks its playlist for the week. You are given a list of
  tracks, where each track is a dict with `title` (a string) and `plays` (an
  integer). Write `rank_playlist(tracks)` that returns a list of titles ordered
  by play count from highest to lowest. When two tracks have the same play count,
  break the tie by title in ascending alphabetical order. An empty list returns
  an empty list.
starter_code: |
  def rank_playlist(tracks):
      return []
function_name: rank_playlist
input_mode: function
solution_sketch: Sort by a (negative plays, title) tuple key, then pull out the titles.
sample_solution: |
  def rank_playlist(tracks):
      ordered = sorted(tracks, key=lambda track: (-track["plays"], track["title"]))
      return [track["title"] for track in ordered]
hints:
  - level: 1
    text: You need two sort criteria applied together, not two separate sorts.
  - level: 2
    text: A tuple key lets you rank by plays first and title second.
  - level: 3
    text: 'Use key=lambda t: (-t["plays"], t["title"]) so higher plays come first.'
tests:
