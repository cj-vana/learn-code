prompt_markdown: |
  A school fundraiser records every gift as a dict with `donor` (a name) and
  `amount` (a positive integer). A donor may give several times. Write
  `donation_leaderboard(donations)` that totals each donor's gifts and returns a
  leaderboard: a list of `[donor, total]` pairs sorted by total from highest to
  lowest. Break ties between equal totals by donor name in ascending
  alphabetical order. An empty list of donations returns an empty list.
starter_code: |
  def donation_leaderboard(donations):
      return []
function_name: donation_leaderboard
input_mode: function
solution_sketch: Accumulate totals in a dict, then sort the items by (negative total, donor).
sample_solution: |
  def donation_leaderboard(donations):
      totals = {}
      for gift in donations:
          donor = gift["donor"]
          totals[donor] = totals.get(donor, 0) + gift["amount"]
      ranked = sorted(totals.items(), key=lambda pair: (-pair[1], pair[0]))
      return [[donor, total] for donor, total in ranked]
hints:
  - level: 1
