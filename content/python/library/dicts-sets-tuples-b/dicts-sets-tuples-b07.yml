explanation_markdown: |
  A dict accumulates each donor's running total in one pass, which is the
  hash-map counting pattern applied to sums. Then `sorted` on the dict's items
  with the key `(-total, donor)` ranks donors by descending total while breaking
  ties alphabetically. Converting the sorted tuples into `[donor, total]` lists
  gives the leaderboard shape the caller expects.
common_mistakes:
  - Sorting the raw gifts before summing, so repeated donors are never combined.
  - Forgetting the alphabetical tie-break, leaving equal totals in arbitrary order.
  - Returning dict items or tuples instead of [donor, total] lists.
