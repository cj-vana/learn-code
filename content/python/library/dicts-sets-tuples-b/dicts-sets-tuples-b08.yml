prompt_markdown: |
  A swim meet records each swimmer's finishing time split into whole minutes and
  seconds. You are given a list where each entry is a dict with `swimmer` (a
  name), `minutes` (an integer), and `seconds` (an integer from 0 to 59). Write
  `photo_finish(times)` that returns the list of swimmer names ordered from
  fastest to slowest finishing time. Compare by minutes first, then by seconds.
  If two swimmers tie exactly, order them by name in ascending alphabetical
  order. An empty list returns an empty list.
starter_code: |
  def photo_finish(times):
      return []
function_name: photo_finish
input_mode: function
solution_sketch: Sort by the tuple (minutes, seconds, swimmer) and return the names.
sample_solution: |
  def photo_finish(times):
      ordered = sorted(times, key=lambda entry: (entry["minutes"], entry["seconds"], entry["swimmer"]))
      return [entry["swimmer"] for entry in ordered]
hints:
  - level: 1
    text: A faster time means fewer minutes, or the same minutes with fewer seconds.
  - level: 2
    text: A tuple sort key compares minutes first, then seconds, then the name.
  - level: 3
    text: 'Use key=lambda e: (e["minutes"], e["seconds"], e["swimmer"]).'
