explanation_markdown: |
  Because a swimmer with fewer minutes always beats one with more, and seconds
  only matter when the minutes match, the natural ordering is exactly how Python
  compares the tuple `(minutes, seconds, swimmer)` left to right. Adding the name
  as the third element resolves exact ties alphabetically. A final comprehension
  pulls out just the ordered names.
common_mistakes:
  - Sorting by seconds alone and ignoring the minutes.
  - Comparing minutes and seconds separately instead of as one tuple key.
  - Returning the full time dicts rather than the swimmer names.
