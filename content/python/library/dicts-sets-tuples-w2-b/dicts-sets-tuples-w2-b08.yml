prompt_markdown: |
  A theater booking log lists every reserved seat as a `[row, seat]` pair, and a
  glitch let some seats be booked more than once. Write
  `duplicate_seats(bookings)` that returns a sorted list of the `[row, seat]`
  pairs that appear two or more times. Each duplicated seat appears once in the
  result, and a clean log returns an empty list.
starter_code: |
  def duplicate_seats(bookings):
      return []
function_name: duplicate_seats
input_mode: function
solution_sketch: Count each seat via a tuple key, then sort the keys that repeated back into pairs.
sample_solution: |
  def duplicate_seats(bookings):
      counts = {}
      for booking in bookings:
          key = tuple(booking)
          counts[key] = counts.get(key, 0) + 1
      repeated = sorted(seat for seat, count in counts.items() if count > 1)
      return [list(seat) for seat in repeated]
hints:
  - level: 1
    text: First find out how many times each seat was booked.
  - level: 2
    text: Tuples are hashable, so use tuple(booking) as a dict counting key.
  - level: 3
    text: Keep keys whose count exceeds 1, sort them, then convert back to lists.
