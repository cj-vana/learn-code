explanation_markdown: |
  Converting each `[row, seat]` to a tuple gives a hashable key so a dict can
  tally how often the exact seat appears. Keeping the keys whose count is above
  one leaves only the double-booked seats, and sorting those tuples orders them
  by row then seat. A final comprehension turns each tuple back into a `[row, seat]`
  list so the output shape matches the input.
common_mistakes:
  - Using each booking list directly as a dict key, which raises a TypeError.
  - Including seats booked exactly once instead of only the repeats.
  - Returning tuples, which will not equal the expected list-of-lists output.
