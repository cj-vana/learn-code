  originality_notes: Original cafe register scenario inverting an item-to-code map into a code-to-item lookup.
prompt_markdown: |
  A cafe register stores a dict that maps each menu item to its short till code,
  and every code is unique. The staff want the reverse lookup so they can type a
  code and see the item. Write `invert_menu(menu)` that returns a new dict
  mapping each code back to its item. An empty menu returns an empty dict.
starter_code: |
  def invert_menu(menu):
      return {}
function_name: invert_menu
input_mode: function
solution_sketch: Build a new dict swapping each key/value pair with a comprehension.
sample_solution: |
  def invert_menu(menu):
      return {code: item for item, code in menu.items()}
hints:
  - level: 1
    text: You want the old values to become the new keys.
  - level: 2
    text: Iterate menu.items() so you have both the item and its code.
  - level: 3
    text: "A dict comprehension {code: item for item, code in menu.items()} flips it."
tests:
  public:
    - name: empty
      input: {}
      expected: {}
    - name: single
      input: {latte: L1}
      expected: {L1: latte}
    - name: multiple
      input: {latte: L1, mocha: M2, tea: T3}
      expected: {L1: latte, M2: mocha, T3: tea}
  validation:
    - name: two_items
      input: {espresso: E, drip: D}
      expected: {E: espresso, D: drip}
    - name: coded
      input: {cola: c1, water: w1, juice: j1}
      expected: {c1: cola, w1: water, j1: juice}
    - name: four_items
      input: {bagel: b, muffin: m, scone: s, roll: r}
      expected: {b: bagel, m: muffin, s: scone, r: roll}
explanation_markdown: |
  Iterating `menu.items()` gives each item together with its code, and the dict
  comprehension places the code in the key position and the item in the value
  position. Because the codes are guaranteed unique, no entries collide, and the
  whole inversion is a single O(n) pass that leaves the original dict untouched.
common_mistakes:
  - "Writing {item: code ...}, which just copies the dict instead of flipping it."
  - Mutating the original menu in place rather than returning a new dict.
  - Assuming codes might repeat and overwriting each other.
