prompt_markdown: |
  A pub trivia night collects each team's final score, and ties mean the same
  number can appear more than once. Write `second_highest(scores)` that returns
  the second-highest *distinct* score. If there are fewer than two distinct
  scores (including an empty list), return `None`.
starter_code: |
  def second_highest(scores):
      return None
function_name: second_highest
input_mode: function
solution_sketch: Drop duplicates with a set, sort descending, and read the second value.
sample_solution: |
  def second_highest(scores):
      distinct = sorted(set(scores), reverse=True)
      if len(distinct) < 2:
          return None
      return distinct[1]
hints:
  - level: 1
    text: Repeated values should not count twice, so remove duplicates first.
  - level: 2
    text: A set removes duplicates; sorting it lets you index positions.
  - level: 3
    text: Sort sorted(set(scores), reverse=True) and return index 1 when it exists.
