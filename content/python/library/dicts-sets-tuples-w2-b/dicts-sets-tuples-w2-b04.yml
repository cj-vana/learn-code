explanation_markdown: |
  Wrapping the scores in `set` collapses ties so the runner-up is a genuinely
  different value. Sorting that set in descending order puts the winner at index
  0 and the true second-highest at index 1. The length guard returns `None`
  whenever there is no distinct runner-up, covering empty and single-value input.
common_mistakes:
  - Sorting without deduplicating, so a repeated top score becomes the "second".
  - Indexing [1] without checking there are at least two distinct scores.
  - Forgetting the empty-list case, which should return None.
