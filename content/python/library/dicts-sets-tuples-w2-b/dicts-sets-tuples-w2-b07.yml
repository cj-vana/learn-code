prompt_markdown: |
  A podcast dashboard ranks episodes by download count. You are given a dict with
  `episodes` (a list of `[title, downloads]` pairs) and `n` (how many top titles
  to show). Write `top_episodes(data)` that returns the titles of the `n` most
  downloaded episodes, highest first. Break ties alphabetically by title. If `n`
  is larger than the number of episodes, return them all; if `n` is `0` or less,
  return an empty list.
starter_code: |
  def top_episodes(data):
      return []
function_name: top_episodes
input_mode: function
solution_sketch: Sort by descending downloads then ascending title, slice the top n, keep titles.
sample_solution: |
  def top_episodes(data):
      episodes = data["episodes"]
      n = data["n"]
      ordered = sorted(episodes, key=lambda e: (-e[1], e[0]))
      top = ordered[:max(n, 0)]
      return [title for title, downloads in top]
hints:
  - level: 1
    text: You need one sort that handles both the count and the tie-break.
  - level: 2
    text: A key of (-downloads, title) sorts by most downloads, then by name.
  - level: 3
    text: Slice the sorted list with [:max(n, 0)], then keep only the titles.
tests:
  public:
    - name: top_two
      input: {episodes: [[alpha, 100], [beta, 250], [gamma, 175]], n: 2}
      expected: [beta, gamma]
    - name: tie_break
      input: {episodes: [[zed, 50], [amy, 50], [bob, 90]], n: 2}
