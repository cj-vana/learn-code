      expected: [b, a]
    - name: all_ties
      input: {episodes: [[c, 10], [a, 10], [b, 10]], n: 2}
      expected: [a, b]
    - name: single
      input: {episodes: [[solo, 42]], n: 1}
      expected: [solo]
    - name: empty_list
      input: {episodes: [], n: 3}
      expected: []
explanation_markdown: |
  Negating the download count inside the sort key turns Python's ascending sort
  into a descending one for popularity, while the title stays ascending so ties
  read alphabetically. Slicing with `max(n, 0)` safely handles both a zero/negative
  `n` and an `n` larger than the list, since a slice past the end just stops. A
  final comprehension keeps only the titles in ranked order.
common_mistakes:
  - Sorting ascending and forgetting to reverse for "most downloaded first".
  - Ignoring the alphabetical tie-break, giving unstable ordering for equal counts.
  - Slicing with a raw negative n, which grabs items from the end of the list.
