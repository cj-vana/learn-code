explanation_markdown: |
  Business-day math cannot be done with a single addition because weekends do not
  count, so the reliable approach is to walk the calendar one day at a time. Each
  `timedelta(days=1)` step moves to the next real date — automatically rolling
  over month and year boundaries — and you only spend one of your `days` when the
  new date's `weekday()` is 0 through 4. Stepping *before* you test the weekday is
  what makes the start day itself never count, and it is why a Friday plus one
  business day skips Saturday and Sunday to land on Monday. When `days` is `0` the
  loop never runs, so the start date is returned untouched even if it falls on a
  weekend.
common_mistakes:
  - Checking the weekday before stepping the date, which incorrectly counts the start day itself.
  - Using weekday() <= 5, which wrongly treats Saturday as a business day.
  - Trying to add days in one shot with timedelta(days=job["days"]) and never skipping weekends.
