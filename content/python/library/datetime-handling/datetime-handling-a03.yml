function_name: add_business_days
input_mode: function
solution_sketch: Parse the start date, then step forward one day at a time with timedelta(days=1), decrementing the remaining count only on weekdays, and return the ISO string.
sample_solution: |
  from datetime import date, timedelta


  def add_business_days(job):
      current = date.fromisoformat(job["start"])
      remaining = job["days"]
      while remaining > 0:
          current += timedelta(days=1)
          if current.weekday() < 5:
              remaining -= 1
      return current.isoformat()
hints:
  - level: 1
    text: timedelta(days=1) lets you move a date forward exactly one calendar day at a time.
  - level: 2
    text: weekday() returns 0-4 for Monday through Friday and 5 or 6 for the weekend, so only decrement your counter when weekday() < 5.
  - level: 3
    text: Loop while remaining > 0, always step the date first, then subtract from remaining only on a weekday; finish with current.isoformat().
