prompt_markdown: |
  A picture-framing shop promises turnaround in a number of *business days*,
  counting only Monday through Friday. Write `add_business_days(job)` that takes a
  start date and a whole number of business days to advance, and returns the
  resulting date as an ISO `"YYYY-MM-DD"` string.

  The input is a single dictionary shaped like:

  ```python
  {"start": "2026-07-03", "days": 1}
  ```

  Advance the calendar one day at a time from the start date, counting a step
  only when it lands on a weekday (Saturday and Sunday do not count). Stop once
  you have counted `days` business days.

  Rules the tests rely on:

  - `days` is always zero or positive.
  - When `days` is `0`, return the start date unchanged, even if it is a weekend.
  - The start date itself is never counted; counting begins with the day after it.
  - A Friday start plus 1 business day lands on the following Monday, skipping the
    weekend.
starter_code: |
