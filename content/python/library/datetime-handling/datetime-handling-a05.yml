prompt_markdown: |
  A harbour keeps a tide table where each high-water time is recorded as a
  timestamp `"YYYY-MM-DD HH:MM"`. New survey data means every entry needs a
  correction of some number of minutes, which can be positive (later) or negative
  (earlier). Write `shift_minutes(job)` that applies the offset and returns the
  corrected timestamp in the same `"YYYY-MM-DD HH:MM"` format.

  The input is a single dictionary shaped like:

  ```python
  {"timestamp": "2026-07-02 23:50", "minutes": 20}
  ```

  Add `minutes` to the timestamp. The shift must roll the date correctly across
  midnight, month ends, and year ends — a 20-minute correction to `23:50` on
  2 July lands at `00:10` on 3 July. A `minutes` of `0` returns the timestamp
  unchanged, and negative values move the time earlier, possibly into the previous
  day. Offsets may exceed a full day.
starter_code: |
  from datetime import datetime, timedelta


  def shift_minutes(job):
      return ""
function_name: shift_minutes
input_mode: function
solution_sketch: Parse the timestamp with strptime using "%Y-%m-%d %H:%M", add timedelta(minutes=...), and format the result back with strftime.
sample_solution: |
  from datetime import datetime, timedelta


  def shift_minutes(job):
      moment = datetime.strptime(job["timestamp"], "%Y-%m-%d %H:%M")
      shifted = moment + timedelta(minutes=job["minutes"])
      return shifted.strftime("%Y-%m-%d %H:%M")
hints:
  - level: 1
    text: strptime with the format "%Y-%m-%d %H:%M" turns the timestamp string into a datetime you can do math on.
  - level: 2
    text: timedelta(minutes=job["minutes"]) works with negative values too, and adding it handles all the rollover for you.
  - level: 3
    text: After adding, reformat with strftime("%Y-%m-%d %H:%M") so the output matches the input layout exactly.
