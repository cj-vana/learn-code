explanation_markdown: |
  Clock arithmetic is easy to get wrong by hand because a minute offset can spill
  across hours, midnight, month ends, and even years. The reliable move is to lift
  the string into a real `datetime` with `strptime`, add a `timedelta`, and let
  the standard library carry all the borrowing and carrying for you. A `timedelta`
  accepts negative minute counts, so the same one line handles corrections that
  move the time earlier into the previous day. Offsets larger than a day are no
  different: `1470` minutes is 24 hours and 30 minutes, so `12:00` on 31 January
  becomes `12:30` on 1 February. Formatting the result back with the same
  `"%Y-%m-%d %H:%M"` pattern guarantees the output layout matches the input.
common_mistakes:
  - Splitting hours and minutes by hand and forgetting to roll the date when minutes overflow past 24:00.
  - Using timedelta(hours=...) or seconds instead of minutes, scaling the shift wrongly.
  - Formatting the output with a different pattern (like seconds or a T separator) so it no longer matches "YYYY-MM-DD HH:MM".
