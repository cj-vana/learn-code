function_name: meeting_overlap
input_mode: function
solution_sketch: Parse the four times with strptime and "%H:%M", take the later of the two starts and the earlier of the two ends, and return max(0, end - start) converted to whole minutes.
sample_solution: |
  from datetime import datetime


  def meeting_overlap(job):
      def parse(text):
          return datetime.strptime(text, "%H:%M")

      a_start, a_end = parse(job["a"][0]), parse(job["a"][1])
      b_start, b_end = parse(job["b"][0]), parse(job["b"][1])
      start = max(a_start, b_start)
      end = min(a_end, b_end)
      overlap = (end - start).total_seconds() / 60
      return max(0, int(overlap))
