explanation_markdown: |
  Two ranges overlap on the stretch that begins at the later of their two starts
  and ends at the earlier of their two ends. Parsing each `"HH:MM"` string into a
  `datetime` (they all default to the same date, so they are directly comparable)
  lets `max` and `min` pick those two boundaries for you. Subtracting gives a
  `timedelta`, and dividing `total_seconds()` by 60 converts it to minutes. The
  final `max(0, ...)` is what turns a negative span — which happens whenever the
  ranges are disjoint or only touch at an endpoint — into a clean `0`. When one
  range is nested inside the other, `max` of the starts and `min` of the ends both
  come from the inner range, so the answer is exactly the inner range's length.
common_mistakes:
  - Returning a negative number for disjoint ranges instead of clamping the result to 0 with max.
  - Swapping max and min (using the earlier start or later end), which overstates the overlap.
  - Comparing the "HH:MM" strings or hours alone and ignoring the minutes, giving wrong overlaps for times like 09:30.
