prompt_markdown: |
  A rehearsal studio accidentally booked two bands into the same room on the same
  day and needs to know how badly the slots collide. Write `meeting_overlap(job)`
  that returns the number of minutes the two time ranges overlap, as an integer.

  The input is a single dictionary shaped like:

  ```python
  {"a": ["09:00", "10:00"], "b": ["09:30", "11:00"]}
  ```

  Each value is a `[start, end]` pair of `"HH:MM"` times on the **same day**, with
  start before end. Return the length of the shared stretch in minutes. Rules the
  tests rely on:

  - If the ranges do not overlap at all, return `0`.
  - Ranges that only touch at an endpoint (one ends at `"10:00"` and the other
    starts at `"10:00"`) share no minutes, so return `0`.
  - When one range sits entirely inside the other, the overlap is the length of
    the inner range.
starter_code: |
  from datetime import datetime


