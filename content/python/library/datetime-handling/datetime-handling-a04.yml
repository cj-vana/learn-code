function_name: parse_mixed_dates
input_mode: function
solution_sketch: For each string, try strptime with each of the three format patterns inside a try/except, keep the first that succeeds, and reformat it with strftime as an ISO string.
sample_solution: |
  from datetime import datetime


  def parse_mixed_dates(dates):
      formats = ["%d/%m/%Y", "%Y-%m-%d", "%B %d, %Y"]
      result = []
      for raw in dates:
          for fmt in formats:
              try:
                  parsed = datetime.strptime(raw, fmt)
              except ValueError:
                  continue
              result.append(parsed.strftime("%Y-%m-%d"))
              break
      return result
hints:
  - level: 1
    text: datetime.strptime raises ValueError when the string does not match the format, which you can catch to try the next pattern.
  - level: 2
