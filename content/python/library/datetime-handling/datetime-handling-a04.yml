explanation_markdown: |
  There is no single format string that matches all three layouts, so the pattern
  here is fallback parsing: try each candidate format with `strptime` and let a
  `ValueError` tell you it did not fit. Catching that error and moving on lets you
  keep the first format that succeeds, then `strftime("%Y-%m-%d")` rewrites the
  parsed value in a single canonical shape. `strptime` is tolerant of missing
  leading zeros, so `"7/9/2018"` parses under `"%d/%m/%Y"` just as `"07/09/2018"`
  would. The order in which you try formats only matters when two could match the
  same string, but these three are structurally distinct (slashes, dashes, and a
  spelled-out month), so any successful parse is unambiguous. The day-first
  convention is baked into `%d/%m/%Y`, which is why `"01/02/2020"` becomes
  1 February, not 2 January.
common_mistakes:
  - Using "%m/%d/%Y" and reading slash dates as month-first, flipping the day and month.
  - Letting the first ValueError propagate instead of catching it and trying the next format.
  - Using %b (abbreviated month) instead of %B (full month name), so "March" fails to parse.
