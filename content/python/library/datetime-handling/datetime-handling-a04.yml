prompt_markdown: |
  An archivist is digitizing decades of handwritten logbooks where dates were
  written three different ways. Write `parse_mixed_dates(dates)` that takes a list
  of date strings and returns a list of the same dates normalized to ISO
  `"YYYY-MM-DD"` strings, in the same order.

  Each input string is in exactly one of these formats:

  - Day/Month/Year with slashes, e.g. `"09/03/2018"` means 9 March 2018.
  - ISO already, e.g. `"2019-12-25"`.
  - Full month name, e.g. `"March 3, 2021"`.

  Days and months may be written without a leading zero (`"7/9/2018"` means
  7 September 2018). Try each format in turn and keep the one that parses. An
  empty input list returns an empty list.

  Note the day-first convention: `"01/02/2020"` is 1 February 2020, which
  normalizes to `"2020-02-01"`.
