prompt_markdown: |
  A lending library records each borrowed book as a job dictionary with a
  `"start"` date (checked out) and an `"end"` date (returned), both ISO strings
  in `"YYYY-MM-DD"` form. Write `days_between(job)` that returns the number of
  days from start to end as an integer.

  The input is a single dictionary shaped like:

  ```python
  {"start": "2026-01-01", "end": "2026-01-08"}
  ```

  Return `end - start` in days. If the two dates are the same, return `0`. If the
  book is returned *before* the start date (a data-entry slip), the result is
  **negative** — do not take an absolute value. Your solution must count real
  calendar days, so leap-year gaps like February 2024 come out right.
starter_code: |
  from datetime import date


  def days_between(job):
      return 0
function_name: days_between
input_mode: function
solution_sketch: Parse both ISO strings into date objects and return the .days attribute of their difference.
sample_solution: |
  from datetime import date


  def days_between(job):
      start = date.fromisoformat(job["start"])
      end = date.fromisoformat(job["end"])
      return (end - start).days
hints:
  - level: 1
    text: Subtracting one date from another yields a timedelta object, not a number.
  - level: 2
    text: A timedelta exposes a .days attribute that already counts whole calendar days between the two dates.
  - level: 3
    text: Return (end - start).days so the sign is negative whenever end comes before start.
