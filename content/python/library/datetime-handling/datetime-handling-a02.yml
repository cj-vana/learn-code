explanation_markdown: |
  Date arithmetic in Python does not give you a plain integer; subtracting two
  `date` objects produces a `timedelta`, and it is the `timedelta.days` attribute
  that holds the whole-day count. Because the difference preserves direction,
  `(end - start).days` is naturally negative when the return date precedes the
  checkout date, so no special casing is needed. Working through the standard
  library also means leap years are handled for free: February 2024 has 29 days,
  so `2024-02-28` to `2024-03-01` is 2 days, while the same span in the non-leap
  year 2023 is only 1 day. Likewise, 2020 was a leap year, so a full year from
  `2020-01-01` spans 366 days.
common_mistakes:
  - Wrapping the result in abs(), which hides genuinely reversed date entries.
  - Forgetting the .days attribute and returning the timedelta object itself.
  - Estimating with a fixed 30- or 365-day month/year instead of subtracting real dates, which breaks across leap years.
