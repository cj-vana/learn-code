prompt_markdown: |
  A photographic darkroom records every print exposure as a whole number of
  seconds, and the wall clock display needs each one rendered as an
  hours-minutes-seconds string.

  Write `format_durations(seconds_list)` that takes a **list of non-negative
  integers**, each a duration in seconds, and returns a list of formatted strings
  in the same order. Each string uses the layout `"H:MM:SS"`:

  - the hours field has **no leading zero and no upper bound** (a 25-hour soak
    reads `"25:01:01"`),
  - the minutes and seconds fields are always **zero-padded to two digits**.

  An empty input list returns an empty list.

  Example:

  ```python
  format_durations([3661, 60, 0])
  # -> ["1:01:01", "0:01:00", "0:00:00"]
  ```

  Here 3661 seconds is 1 hour, 1 minute, and 1 second.
starter_code: |
  def format_durations(seconds_list):
      return []
function_name: format_durations
input_mode: function
solution_sketch: For each total, split into hours, minutes, and seconds with integer division and modulo against 3600 and 60, then format with two-digit padding on minutes and seconds only.
sample_solution: |
  def format_durations(seconds_list):
      result = []
      for total in seconds_list:
          hours = total // 3600
          minutes = (total % 3600) // 60
          secs = total % 60
          result.append(f"{hours}:{minutes:02d}:{secs:02d}")
      return result
hints:
  - level: 1
    text: Hours come from total // 3600, and the leftover seconds after removing whole hours is total % 3600.
  - level: 2
    text: From that leftover, minutes are (total % 3600) // 60 and seconds are total % 60.
  - level: 3
    text: 'Format with an f-string where only minutes and seconds are padded: f"{hours}:{minutes:02d}:{secs:02d}".'
