explanation_markdown: |
  Duration formatting is integer division layered twice. Dividing the total by
  3600 peels off whole hours; the remainder `total % 3600` is what is left inside
  the final hour, and dividing that by 60 peels off whole minutes, with the last
  `total % 60` being the seconds. Padding only the minutes and seconds to two
  digits matches how clocks display time, while the hours field stays bare so it
  can grow past 24 without a leading zero.

  It is tempting to reach for `str(datetime.timedelta(seconds=total))`, and that
  even works below one day, but once a duration reaches 24 hours the timedelta
  string switches to `"1 day, 1:01:01"`, which breaks the `"H:MM:SS"` contract.
  Doing the arithmetic yourself keeps the hours field unbounded and the format
  predictable. Each conversion is constant work, so the whole list is O(n).
common_mistakes:
  - Zero-padding the hours field, producing "01:01:01" instead of the required "1:01:01".
  - Using str(timedelta(...)) and getting a "1 day, ..." prefix once a duration reaches 24 hours.
  - Forgetting the two-digit padding on minutes or seconds, so 3661 renders as "1:1:1".
