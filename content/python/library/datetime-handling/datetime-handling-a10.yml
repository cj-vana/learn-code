prompt_markdown: |
  A greenhouse feeds its plants on a fixed cadence, and the head grower wants the
  full list of feeding dates laid out from a start date onward, one every so many
  days, up to and including a cut-off date.

  Write `expand_recurrence(job)` that takes a single dictionary with three keys:

  - `"start"`: an ISO date string for the first feeding, always included when it
    is valid.
  - `"every_days"`: the interval in days between feedings.
  - `"until"`: an ISO date string; feedings on or before this date are kept,
    later ones are dropped.

  Return a **list of ISO date strings** beginning at `"start"` and stepping
  forward by `"every_days"` each time, including any date that lands exactly on
  `"until"`. Rules for the edge cases the tests cover:

  - If `"every_days"` is less than 1, return an empty list (guard against a
    non-advancing or backward interval).
  - If `"until"` is earlier than `"start"`, return an empty list.
  - If `"start"` equals `"until"`, return just `["start"]` (when the interval is
    valid).

  Example:

  ```python
  expand_recurrence({"start": "2026-03-01", "every_days": 7, "until": "2026-03-20"})
  # -> ["2026-03-01", "2026-03-08", "2026-03-15"]
  ```

  The next step, `2026-03-22`, is past `"until"`, so it is left off.
starter_code: |
  from datetime import date, timedelta


  def expand_recurrence(job):
      return []
function_name: expand_recurrence
input_mode: function
solution_sketch: Guard every_days < 1 up front, then walk a cursor date from start, appending its ISO string and adding the interval each loop while the cursor is still on or before until.
sample_solution: |
  from datetime import date, timedelta


  def expand_recurrence(job):
      every = job["every_days"]
      if every < 1:
          return []
      current = date.fromisoformat(job["start"])
      until = date.fromisoformat(job["until"])
      result = []
      while current <= until:
          result.append(current.isoformat())
          current = current + timedelta(days=every)
      return result
hints:
  - level: 1
    text: Check every_days < 1 before doing any date work and return an empty list immediately if so, since a non-positive step could loop forever.
  - level: 2
    text: Parse start and until into date objects and keep a moving cursor that begins at start.
  - level: 3
    text: Loop while cursor <= until, appending cursor.isoformat() and then advancing the cursor by timedelta(days=every_days); the "until is earlier than start" case falls out because the loop body never runs.
