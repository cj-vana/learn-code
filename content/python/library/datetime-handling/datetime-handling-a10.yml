explanation_markdown: |
  Expanding a recurrence is a guarded walk. The guard comes first: if
  `every_days` is zero or negative the cursor would never move forward (or would
  move backward), so the only safe answer is an empty list, and checking it before
  the loop also prevents an infinite loop. After that, the pattern is a simple
  cursor that starts at `start` and advances by `timedelta(days=every_days)` each
  iteration.

  Using `while current <= until` makes the inclusive cut-off automatic: a feeding
  that lands exactly on `until` is appended before the next step pushes the cursor
  past it. The same condition quietly handles `until` earlier than `start`,
  because the loop body simply never runs and you get `[]`. Leaning on
  `timedelta` for the stepping means month lengths, the non-leap February of 2026,
  and the year rollover into 2027 are all handled for you rather than by manual
  day arithmetic. The work is proportional to the number of dates produced.
common_mistakes:
  - Skipping the every_days < 1 guard, which risks an infinite loop when the interval is 0 and never terminates the while.
  - Using a strict current < until comparison, which drops a feeding that falls exactly on the until date.
  - Advancing the cursor before recording it, so the start date itself is missing from the result.
