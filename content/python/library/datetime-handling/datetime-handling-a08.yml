explanation_markdown: |
  The clean trick for "next weekday after a date" is modular arithmetic on the
  weekday index. Python numbers weekdays with `date.weekday()` as Monday 0 through
  Sunday 6, so once you translate the requested name into the same scheme, the
  distance forward is `(target - current) % 7`. That expression naturally wraps
  around the end of the week, giving a value from 0 to 6.

  The one subtlety is the strict-after rule. A gap of 0 means the reference date
  is already the target weekday, and returning it unchanged would violate "after".
  Bumping that single case up to 7 rolls the answer to the same weekday next week.
  Because `timedelta` arithmetic understands month lengths, leap days, and year
  rollovers, adding the day count handles `2026-02-26 -> 2026-03-02` and
  `2026-12-31 -> 2027-01-01` without any special casing.
common_mistakes:
  - Returning the reference date itself when it already falls on the target weekday, instead of advancing a full week.
  - Mixing up the weekday numbering, for example assuming Sunday is 0 (isoweekday or a calendar convention) rather than Monday 0.
  - Building the next date by hand-incrementing month and day instead of adding a timedelta, which breaks at month and year boundaries.
