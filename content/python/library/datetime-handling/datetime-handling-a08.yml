prompt_markdown: |
  A recycling service collects on the same weekday every week, and a household
  wants to know the date of its next pickup **strictly after** a given day. If the
  reference day itself happens to be that weekday, the answer is one week later,
  not the same day.

  Write `next_occurrence(job)` that takes a single dictionary with two keys:

  - `"after"`: an ISO date string like `"2026-07-02"`.
  - `"weekday"`: the collection weekday as a lowercase English name, one of
    `"monday"`, `"tuesday"`, `"wednesday"`, `"thursday"`, `"friday"`,
    `"saturday"`, `"sunday"`.

  Return the ISO date string of the next date after `"after"` that falls on the
  named weekday. The result must be strictly later than `"after"`, so when
  `"after"` already lands on that weekday you jump a full 7 days ahead.

  Example:

  ```python
  next_occurrence({"after": "2026-07-02", "weekday": "tuesday"})
  # -> "2026-07-07"
  ```

  Here `2026-07-02` is a Thursday, so the next Tuesday is five days later.
