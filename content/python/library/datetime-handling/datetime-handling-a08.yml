solution_sketch: Map the weekday name to a 0-6 index, compute (target - current_weekday) mod 7, bump a zero result up to 7 so the same weekday rolls forward a week, then add that many days.
sample_solution: |
  from datetime import date, timedelta


  def next_occurrence(job):
      names = ["monday", "tuesday", "wednesday", "thursday",
               "friday", "saturday", "sunday"]
      start = date.fromisoformat(job["after"])
      target = names.index(job["weekday"].lower())
      ahead = (target - start.weekday()) % 7
      if ahead == 0:
          ahead = 7
      return (start + timedelta(days=ahead)).isoformat()
