prompt_markdown: |
  A museum charges admission by age tier and needs to sort a group of visitors
  into those tiers based on their age **on the day of the visit**. Age is measured
  in whole completed years.

  Write `age_buckets(job)` that takes a single dictionary with two keys:

  - `"on"`: an ISO date string for the visit day.
  - `"birthdays"`: a list of ISO date strings, one birth date per visitor.

  Return a dictionary with exactly the keys `"minor"`, `"adult"`, and `"senior"`
  counting how many visitors fall in each tier:

  - `"minor"`: age is under 18.
  - `"adult"`: age is 18 up to but not including 65.
  - `"senior"`: age is 65 or older.

  Age is the number of full years elapsed from the birth date to `"on"`. The
  birthday edge is handled exactly: a visitor **counts as their new age on the
  birthday itself**. So someone born on `"2008-07-02"` is treated as 18 (an adult)
  when `"on"` is `"2026-07-02"`, but is still 17 (a minor) when `"on"` is
  `"2026-07-01"`. If the birthday has not yet arrived in the visit year, that
  visitor is one year younger. An empty `"birthdays"` list returns all zero
  counts.

  Example:

  ```python
  age_buckets({"on": "2026-07-02", "birthdays": ["2008-07-02", "2008-07-03"]})
  # -> {"minor": 1, "adult": 1, "senior": 0}
  ```

  The first visitor has just turned 18; the second turns 18 tomorrow and is still
  a minor today.
starter_code: |
  from datetime import date


  def age_buckets(job):
      return {"minor": 0, "adult": 0, "senior": 0}
function_name: age_buckets
input_mode: function
solution_sketch: For each birth date compute whole-year age as on.year - born.year minus 1 when the (month, day) of the visit is before the birth (month, day), then increment the minor/adult/senior counter by the tier bounds.
sample_solution: |
  from datetime import date


  def age_buckets(job):
      on = date.fromisoformat(job["on"])
      counts = {"minor": 0, "adult": 0, "senior": 0}
      for text in job["birthdays"]:
          born = date.fromisoformat(text)
          age = on.year - born.year - ((on.month, on.day) < (born.month, born.day))
          if age < 18:
              counts["minor"] += 1
          elif age < 65:
              counts["adult"] += 1
          else:
              counts["senior"] += 1
      return counts
