explanation_markdown: |
  Computing age in whole years is the classic "have they had their birthday yet
  this year" problem. The raw year difference `on.year - born.year` overcounts by
  one whenever the birthday is still ahead in the visit year, so you subtract a
  correction. Comparing the `(month, day)` tuples captures that correction in a
  single expression: `(on.month, on.day) < (born.month, born.day)` is `True`
  exactly when the birthday has not yet arrived, and Python treats that `True` as
  `1` inside the subtraction.

  The exact-birthday edge falls out cleanly. On the birthday itself the two tuples
  are equal, so the comparison is `False`, nothing is subtracted, and the visitor
  is credited with the full year, which is why the 18th birthday flips someone
  into the adult tier and the 65th into the senior tier. The leap-day case follows
  the same rule: born `2008-02-29`, a visit on `2026-02-28` has `(2, 28) < (2, 29)`,
  so the birthday is counted as not yet reached and the visitor is still 17. Each
  visitor is O(1) work, so the whole group is a single linear pass.
common_mistakes:
  - Using the plain year difference without adjusting for whether the birthday has occurred yet, overstating ages for later-in-year birthdays.
  - Getting the boundary wrong so the 18th or 65th birthday lands in the younger tier instead of the new one.
  - Approximating age by dividing a day count by 365, which drifts over leap years and misclassifies people near a tier boundary.
