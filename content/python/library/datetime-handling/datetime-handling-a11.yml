      expected: "invalid"
explanation_markdown: |
  Subtracting two `datetime` values produces a `timedelta`, and that object already
  accounts for the calendar, so an overnight shift from `22:00` to `06:30` the
  next morning comes out as 510 minutes without any manual date bookkeeping.
  Converting to whole minutes is `total_seconds() // 60`, wrapped in `int` so the
  result is an integer rather than a float.

  The validation rule is a short-circuit. Because a single malformed pair
  invalidates the entire timesheet, the moment you find `end <= start` you return
  `"invalid"` immediately and never fold that day's numbers into the total. Note
  that equal times count as invalid too: a zero-length shift is not a real shift.
  The empty-list case returns `0` naturally, since the loop never runs and the
  accumulator stays at its starting value.
common_mistakes:
  - Using a strict-less check that misses the equal-times case, so a zero-length shift is wrongly counted instead of rejected.
  - Summing the valid pairs and only then noticing a bad one, instead of returning "invalid" as soon as any pair fails.
  - Computing minutes from hour and minute fields directly, which breaks for overnight shifts that cross midnight into the next date.
