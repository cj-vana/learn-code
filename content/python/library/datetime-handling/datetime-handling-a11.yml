prompt_markdown: |
  A boatyard tracks each worker's shift as a pair of punches: a clock-in datetime
  and a clock-out datetime. Payroll needs the total minutes worked across a day's
  punches, but a garbled log where someone clocked out before (or at the same
  moment as) they clocked in must be rejected outright.

  Write `timesheet_hours(job)` that takes a single dictionary with one key:

  - `"punches"`: a list of two-element lists `["in", "out"]`, where each element
    is an ISO datetime string like `"2026-05-01T08:00:00"`. A shift may run
    overnight, so the clock-out can fall on a later calendar date than the
    clock-in.

  Return the **total whole minutes** worked, summed over every punch pair, as an
  integer. However, if **any** pair has a clock-out that is less than or equal to
  its clock-in, return the string `"invalid"` instead (do not add up the valid
  pairs). An empty `"punches"` list returns `0`.

  Example:

  ```python
  timesheet_hours({"punches": [
      ["2026-05-01T08:00:00", "2026-05-01T12:30:00"],
      ["2026-05-01T13:00:00", "2026-05-01T17:15:00"],
  ]})
  # -> 525
  ```

  That is 270 minutes for the morning shift plus 255 for the afternoon.
starter_code: |
  from datetime import datetime


  def timesheet_hours(job):
      return 0
function_name: timesheet_hours
input_mode: function
solution_sketch: Parse each in/out pair with datetime.fromisoformat; if any out is not strictly after its in, short-circuit to "invalid", otherwise add the difference converted to whole minutes and return the running total.
sample_solution: |
  from datetime import datetime


  def timesheet_hours(job):
      total = 0
      for start_text, end_text in job["punches"]:
          start = datetime.fromisoformat(start_text)
          end = datetime.fromisoformat(end_text)
          if end <= start:
              return "invalid"
          total += int((end - start).total_seconds() // 60)
      return total
hints:
  - level: 1
    text: datetime.fromisoformat parses each "YYYY-MM-DDTHH:MM:SS" string into a datetime you can subtract.
  - level: 2
    text: Subtracting two datetimes yields a timedelta; its total_seconds() divided by 60 (integer division) gives whole minutes, and this works even when the clock-out is on the next day.
  - level: 3
    text: Before adding any pair, check end <= start and return "invalid" the moment one fails, so a single bad pair rejects the whole timesheet regardless of the others.
