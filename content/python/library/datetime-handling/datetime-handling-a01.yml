explanation_markdown: |
  `date.fromisoformat` reads the exact `"YYYY-MM-DD"` layout and hands back a
  `date` object, so no manual splitting or integer parsing is needed. Every
  `date` exposes `weekday()`, which numbers the days Monday=0 through Sunday=6.
  Because that numbering is fixed, a Monday-first list of names can be indexed
  directly by the result, which is why the order of the list matters. Relying on
  the standard library also means quirks like leap years are already accounted
  for: `2024-02-29` resolves to Thursday without any special handling on your
  part.
common_mistakes:
  - Building the names list starting at Sunday, so every answer is shifted by one day.
  - Confusing weekday() (Monday=0) with isoweekday() (Monday=1), which shifts the index off by one.
  - Trying to split the string and compute the day with hand-written calendar math instead of using the datetime module.
