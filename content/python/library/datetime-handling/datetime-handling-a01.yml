prompt_markdown: |
  A farmers-market planner keeps every stall booking as an ISO date string in
  `"YYYY-MM-DD"` form and needs to know which day of the week each one falls on.
  Write `day_of_week(date_str)` that returns the English weekday name for the
  given date: one of `"Monday"`, `"Tuesday"`, `"Wednesday"`, `"Thursday"`,
  `"Friday"`, `"Saturday"`, or `"Sunday"`.

  Parse the string with the `datetime` module rather than doing calendar
  arithmetic by hand. The input is always a valid date, so you do not need to
  guard against bad formats. Leap days such as `"2024-02-29"` must be handled
  correctly.
starter_code: |
  from datetime import date


  def day_of_week(date_str):
      return ""
function_name: day_of_week
input_mode: function
solution_sketch: Parse the string with date.fromisoformat, then index a fixed Monday-first list of names by the date's weekday() number.
sample_solution: |
  from datetime import date


  def day_of_week(date_str):
      names = [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday",
          "Sunday",
      ]
      d = date.fromisoformat(date_str)
      return names[d.weekday()]
hints:
  - level: 1
    text: date.fromisoformat("2024-02-29") turns the ISO string straight into a date object you can query.
  - level: 2
