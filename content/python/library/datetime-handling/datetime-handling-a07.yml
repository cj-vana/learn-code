explanation_markdown: |
  The ISO week calendar is the reliable way to group dates into weeks because it
  fixes two awkward edge cases automatically: weeks always start on Monday, and
  the days around New Year are assigned to whichever ISO year owns the majority of
  that week. `date.isocalendar()` returns the `(iso_year, iso_week, iso_weekday)`
  triple, and the first two fields are exactly what you need for a stable bucket
  key. Formatting the week with `:02d` guarantees `"2026-W02"` rather than
  `"2026-W2"`, so labels sort and compare cleanly.

  Watch the boundaries: `2025-12-29` is a Monday that already belongs to ISO week
  1 of 2026, and `2026-12-31` sits in ISO week 53 of 2026 alongside `2027-01-01`.
  If you had grouped by the plain calendar year instead of the ISO year, those
  dates would have landed in the wrong bucket. Counting into a dict as you go is a
  single pass, so the whole tally is O(n).
common_mistakes:
  - Grouping by the plain calendar year (date.year) instead of the ISO year from isocalendar(), which misplaces late-December and early-January dates.
  - Forgetting to zero-pad the week number, producing keys like "2026-W2" that no longer line up with "2026-W02".
  - Building the label from strftime("%W") or "%U", which use a different week-numbering convention than ISO weeks.
