prompt_markdown: |
  A neighbourhood bakery logs the calendar date of every order it takes and wants
  a weekly volume report. Weeks are counted using the **ISO week calendar**, where
  a week runs Monday through Sunday and belongs to the year that owns most of it,
  so the tail of December can land in ISO week 52 or 53 while the first days of
  January sometimes still belong to the previous ISO year.

  Write `bucket_by_week(job)` that takes a single dictionary with one key:

  - `"dates"`: a list of ISO date strings like `"2026-01-05"`, in any order.

  Return a dictionary that maps an ISO year-week label to the number of orders in
  that week. The label must be built from `date.isocalendar()` and formatted as
  `"YYYY-Www"`, where the week number is **zero-padded to two digits** (for
  example `"2026-W02"` or `"2026-W53"`). An empty `"dates"` list returns an empty
  dictionary.

  Example:

  ```python
  bucket_by_week({"dates": ["2026-01-05", "2026-01-06", "2026-01-12"]})
  # -> {"2026-W02": 2, "2026-W03": 1}
  ```

  Note that `2026-01-05` (a Monday) and `2026-01-06` (a Tuesday) share ISO week 2,
  while `2026-01-12` starts ISO week 3.
starter_code: |
  from datetime import date


  def bucket_by_week(job):
      return {}
function_name: bucket_by_week
input_mode: function
solution_sketch: Parse each date, read its isocalendar year and week, build a "YYYY-Www" key with a two-digit padded week, and count occurrences into a dict.
sample_solution: |
  from datetime import date


  def bucket_by_week(job):
      counts = {}
      for value in job["dates"]:
          iso = date.fromisoformat(value).isocalendar()
          key = f"{iso[0]}-W{iso[1]:02d}"
          counts[key] = counts.get(key, 0) + 1
      return counts
hints:
