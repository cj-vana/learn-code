explanation_markdown: |
  There is a clean one-to-one match between the subsets of an `n`-item list and the
  integers `0` to `2**n - 1`: read each integer as `n` bits, and bit `i` answers
  "is item `i` in this subset?" Counting the mask upward therefore visits every
  subset exactly once, in a fixed, reproducible order, with the empty set (all bits
  `0`) first. The inner scan walks the bit positions in increasing order, so each
  subset comes out in the menu's original order. The whole enumeration is
  `O(n * 2**n)` work, which is why the menu is capped at 10 drinks — that is still
  only 1024 flights, but the count doubles with every drink you add.
common_mistakes:
  - Looping the mask only to 2 ** n - 1 exclusive by using range(2 ** n - 1), which drops the full-set subset.
  - Building each subset by scanning bits from high to low, which reverses the item order within a subset.
  - Returning [] for an empty menu instead of [[]] (there is always the empty subset).
  - Reusing one shared subset list across masks instead of starting a fresh list each iteration.
