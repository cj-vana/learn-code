function_name: all_flights
input_mode: function
solution_sketch: Loop mask over range(2 ** n); for each mask, scan bit positions 0..n-1 and collect menu[i] where the bit is set, appending each built subset.
sample_solution: |
  def all_flights(menu):
      n = len(menu)
      flights = []
      for mask in range(1 << n):
          flight = []
          for i in range(n):
              if mask & (1 << i):
                  flight.append(menu[i])
          flights.append(flight)
      return flights
hints:
  - level: 1
    text: With n drinks there are 2**n possible flights; each integer from 0 to 2**n - 1 encodes one of them in binary.
  - level: 2
    text: Let bit i of the mask decide whether menu[i] is in that subset; loop the mask over range(2 ** n).
  - level: 3
    text: For each mask, walk i from 0 to n - 1 and append menu[i] when mask & (1 << i) is non-zero; collect the subset and move to the next mask.
