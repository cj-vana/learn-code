prompt_markdown: |
  A tap room lets guests build a "tasting flight" from the day's menu: a flight is
  any selection of the listed drinks, including the empty flight (order nothing)
  and the full flight (one of everything). The staff want a catalogue of every
  possible flight.

  Write `all_flights(menu)` that takes a list of distinct drink names (strings) and
  returns a list of every subset. Enumerate the subsets with a bitmask counter:
  for each integer `mask` from `0` to `2**n - 1` (where `n` is the number of
  drinks), include `menu[i]` in that subset whenever bit `i` of `mask` is set.

  Rules:

  - Each subset is itself a list of drink names, kept in the **same order** they
    appear in `menu`.
  - The subsets in your returned list must be ordered by their `mask` value, so the
    empty flight (mask `0`) comes first.
  - The menu has at most 10 drinks. An empty menu still has one subset: the empty
    flight, so return `[[]]`.

  Example: `all_flights(["sour", "hazy"])` returns
  `[[], ["sour"], ["hazy"], ["sour", "hazy"]]`.
starter_code: |
