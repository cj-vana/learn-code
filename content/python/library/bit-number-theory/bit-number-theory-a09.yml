prompt_markdown: |
  A brass cipher wheel has `mod` positions numbered `0` to `mod - 1`. Each turn of
  the crank multiplies the current reading by a fixed `base`, wrapping around the
  wheel (taking the remainder modulo `mod`). After `exp` turns starting from `1`,
  the wheel shows `base**exp % mod`. For big exponents you must not build the giant
  number `base**exp` directly.

  Write `wheel_position(settings)` where `settings` is a dictionary with three
  integer keys:

  - `"base"`: a non-negative integer.
  - `"exp"`: the number of turns, an integer with `exp >= 0`.
  - `"mod"`: the number of positions, an integer with `mod >= 2`.

  Return `base**exp % mod` computed by **square-and-multiply**: square the running
  base each step, reduce modulo `mod` after every multiply, and fold in a factor
  only when the current low bit of the exponent is set. You may **not** call the
  three-argument `pow(base, exp, mod)`; implement the loop yourself.

  Example: `wheel_position({"base": 2, "exp": 10, "mod": 1000})` returns `24`,
  because `2**10` is `1024` and `1024 % 1000` is `24`.
