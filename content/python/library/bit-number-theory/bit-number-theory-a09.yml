function_name: wheel_position
input_mode: function
solution_sketch: Reduce the base modulo mod, then loop over the exponent's bits, squaring the base each step and multiplying it into the result whenever the low bit is set.
sample_solution: |
  def wheel_position(settings):
      base = settings["base"] % settings["mod"]
      exp = settings["exp"]
      mod = settings["mod"]
      result = 1
      while exp:
          if exp & 1:
              result = result * base % mod
          base = base * base % mod
          exp >>= 1
      return result
hints:
