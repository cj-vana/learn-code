explanation_markdown: |
  Square-and-multiply assembles `base**exp` out of the powers `base**1`,
  `base**2`, `base**4`, ... that correspond to the set bits of `exp` in binary.
  Each loop iteration squares the running base to reach the next power of two, and
  whenever the exponent's current low bit is `1` you multiply that power into the
  answer. Reducing with `% mod` after every multiplication keeps every number
  below `mod**2`, so the values never explode no matter how large `exp` is. An
  exponent of `0` skips the loop entirely and returns the identity `1`.
common_mistakes:
  - Reducing only at the end instead of after every multiply, which rebuilds the huge number you were trying to avoid.
  - Squaring the base but forgetting to shift the exponent, so the loop never terminates.
  - Returning 0 for an exponent of 0 instead of 1.
