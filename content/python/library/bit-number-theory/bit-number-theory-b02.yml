solution_sketch: For each value, reduce it mod p; a zero residue means no inverse (None). Otherwise run the iterative extended Euclidean algorithm on (residue, p) to get a coefficient s with s * residue congruent to gcd; since p is prime the gcd is 1, so s % p is the inverse in range.
sample_solution: |
  def modular_inverse_batch(job):
      p = job["mod"]
      values = job["values"]
      result = []
      for value in values:
          residue = value % p
          if residue == 0:
              result.append(None)
              continue
          old_r, r = residue, p
          old_s, s = 1, 0
          while r != 0:
              q = old_r // r
              old_r, r = r, old_r - q * r
              old_s, s = s, old_s - q * s
          result.append(old_s % p)
      return result
hints:
  - level: 1
    text: Reduce each key with value % p first. In Python that already lands in 0 .. p - 1, so negatives and big numbers are handled, and a residue of 0 is the no-inverse case.
  - level: 2
    text: The extended Euclidean algorithm finds integers s, t with s*a + t*p = gcd(a, p). Taking that equation mod p gives s*a congruent to gcd, so when gcd is 1, s is the inverse of a.
  - level: 3
    text: Run the iterative version keeping (old_r, r) for the remainders and (old_s, s) for a's coefficients; update both with the quotient q = old_r // r each step. When r hits 0, old_r is the gcd (1 for a nonzero residue mod a prime) and old_s % p is the inverse.
