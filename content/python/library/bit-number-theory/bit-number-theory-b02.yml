explanation_markdown: |
  The extended Euclidean algorithm computes not just `gcd(a, b)` but a pair of
  coefficients `s, t` satisfying Bezout's identity, `s*a + t*b = gcd(a, b)`. Run it on
  `a = value % p` and `b = p`. Reading the identity modulo `p` kills the `t*p` term and
  leaves `s*a` congruent to `gcd(a, p)`. Because `p` is prime, any nonzero residue is
  coprime to it, so the gcd is `1` and `s*a` is congruent to `1`: `s` is the inverse.
  Reducing with `s % p` brings it into the required `0 .. p - 1` range.

  The iterative form carries two running pairs: the remainders `(old_r, r)` and `a`'s
  coefficients `(old_s, s)`. Each step computes the quotient `q = old_r // r` and slides
  both pairs forward with the same update, mirroring the ordinary Euclid recurrence.
  When `r` reaches `0`, `old_r` is the gcd and `old_s` is the coefficient we want.

  Reducing every key first is what makes negatives and out-of-range keys behave: in
  Python `-1 % 7` is `6`, so `-1` inverts like `6`. A residue of `0` means the key is a
  multiple of `p` and shares the factor `p` with the modulus, so no inverse exists and we
  record `None`. The problem forbids `pow(x, -1, p)` precisely so you build this
  machinery rather than delegating it; each inversion costs `O(log p)` steps.
common_mistakes:
  - Calling pow(x, -1, p) or sympy-style helpers, which the prompt forbids and which sidesteps the algorithm the exercise is about.
  - Skipping the value % p reduction, so negative or large keys give a wrong or out-of-range inverse.
  - Returning a negative coefficient from the algorithm instead of taking old_s % p to land in 0 .. p - 1.
  - Failing to emit None for a zero residue, or emitting 0, so multiples of p are treated as invertible.
