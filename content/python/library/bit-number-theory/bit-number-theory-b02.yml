prompt_markdown: |
  A cryptography club runs a teaching cipher whose alphabet has a **prime** number of
  symbols `p`. To decode a message they need the modular inverse of each multiplier
  key: for a key `x`, its inverse is the value `y` in the range `0 .. p - 1` such that
  `(x * y) % p == 1`.

  Write `modular_inverse_batch(job)` where `job` is a dict with two keys:

  - `mod`: a prime `p` (at least `2`)
  - `values`: a list of integers, the keys to invert (they may be `0`, negative, or
    larger than `p`)

  Return a list, the same length as `values`, where each entry is the modular inverse
  of the corresponding key, computed with the **extended Euclidean algorithm**. Reduce
  each key modulo `p` first, so keys outside `0 .. p - 1` are handled. A key whose
  reduced value is `0` (that is, any multiple of `p`, including `0` itself) has no
  inverse, so its entry is `None`.

  You must implement the extended Euclidean algorithm yourself. Do **not** call
  `pow(x, -1, p)` or otherwise let the standard library invert the number for you; the
  point of the exercise is the algorithm.

  Example: with `mod = 7` and `values = [1, 2, 3, 4, 5, 6]`, the inverses are
  `[1, 4, 5, 2, 3, 6]` (for instance `2 * 4 = 8`, and `8 % 7 == 1`). With
  `values = [0, 7, 8]`, the results are `[None, None, 1]`: both `0` and `7` reduce to
  `0` mod 7 (no inverse), while `8` reduces to `1`, whose inverse is `1`.
