explanation_markdown: |
  The powers of two are exactly the numbers you can reach by doubling `1`, so
  walking `1, 2, 4, 8, ...` and stopping the moment you meet or exceed `n` gives
  the smallest one that fits. Doubling is a single left shift, and the loop runs
  about `log2(n)` times, so even a huge request finishes in a handful of steps. The
  `n <= 1` guard covers the boundary cleanly: `0` and `1` both map to the smallest
  real capacity, `1`. When `n` is already a power of two, the loop condition
  `size < n` fails at exactly that value, so it is returned unchanged.
common_mistakes:
  - Returning a value strictly greater than n even when n is already a power of two, by using `size <= n` in the loop.
  - Forgetting the n <= 1 case, so a start value of 1 with the loop skipped still needs to be returned for n = 0.
  - Multiplying past n and overshooting because the loop keeps doubling after the condition should have stopped it.
