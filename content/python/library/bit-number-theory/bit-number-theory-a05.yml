prompt_markdown: |
  A streaming service allocates its input buffer in capacities that are always
  powers of two — `1`, `2`, `4`, `8`, `16`, and so on — because the hardware can
  only address blocks that double in size. Given the number of slots actually
  needed, you must pick the smallest power-of-two capacity that fits them all.

  Write `next_buffer_size(n)` that takes a single integer `n` and returns the
  smallest power of two greater than or equal to `n`. If `n` is `1` or less
  (including `0`), return `1`, since the smallest buffer the hardware offers holds
  one slot.

  For example, `next_buffer_size(5)` returns `8`, and `next_buffer_size(8)`
  returns `8` because `8` is already a power of two.
starter_code: |
  def next_buffer_size(n):
      return 1
function_name: next_buffer_size
input_mode: function
solution_sketch: Return 1 for n <= 1; otherwise start a size at 1 and double it (left-shift) until it reaches or passes n.
sample_solution: |
  def next_buffer_size(n):
      if n <= 1:
          return 1
      size = 1
      while size < n:
          size <<= 1
      return size
hints:
  - level: 1
    text: Every candidate answer is a power of two, so you can generate them in order by repeatedly doubling starting from 1.
  - level: 2
    text: Handle n <= 1 up front by returning 1, then keep doubling a running size while it is still smaller than n.
  - level: 3
    text: Doubling is a left shift, `size <<= 1`; stop the loop the first time `size >= n` and return that size.
