prompt_markdown: |
  A harbour runs several ferry routes. Each route leaves the dock, sails its loop,
  and returns after a fixed number of minutes, then immediately departs again. If
  every route departs together at minute 0, they will all depart together again at
  the least common multiple of their cycle lengths.

  Write `next_joint_departure(cycles)` that takes a list of positive integers (the
  loop times in minutes) and returns the least common multiple of all of them.
  Compute the LCM from the GCD using `lcm(a, b) == a // gcd(a, b) * b`, folding it
  across the list.

  Rules:

  - Every cycle length is a positive integer.
  - If the list is empty, return `1` (the LCM of no numbers is the identity).
  - Divide before multiplying, as shown, to keep the intermediate value small.

  Example: `next_joint_departure([6, 10, 15])` returns `30`, the first minute at
  which all three routes depart together again.
starter_code: |
  def next_joint_departure(cycles):
      return 0
function_name: next_joint_departure
input_mode: function
solution_sketch: Define a two-number gcd via Euclid, then fold lcm(result, cycle) = result // gcd * cycle across the list starting from 1.
sample_solution: |
  def next_joint_departure(cycles):
      def gcd(a, b):
          while b:
              a, b = b, a % b
          return a

      result = 1
      for cycle in cycles:
          result = result // gcd(result, cycle) * cycle
      return result
