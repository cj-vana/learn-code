explanation_markdown: |
  Two events on cycles `a` and `b` line up again after `lcm(a, b)` steps, and
  because `a * b == gcd(a, b) * lcm(a, b)`, you can get the LCM from the GCD you
  already know how to compute. Writing it as `a // gcd(a, b) * b` divides before
  multiplying, which avoids a needlessly large intermediate product. Extending to
  a whole list works because the LCM is associative: fold the pairwise version
  across the cycles. Seeding the running result at `1` makes the first cycle drop
  straight in (`lcm(1, n) == n`) and gives the right answer, `1`, for an empty
  list.
common_mistakes:
  - Multiplying every cycle together instead of taking the LCM, which overshoots the true realignment time.
  - Seeding the running result at 0, so lcm(0, n) collapses everything to 0.
  - Writing a * b // gcd(a, b) with the multiply first; correct but risks a large intermediate, whereas dividing first stays small.
