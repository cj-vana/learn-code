explanation_markdown: |
  The sieve of Eratosthenes marks composites instead of testing each number for
  primality. Once you know `p` is prime, every multiple of `p` is composite, so you
  cross them off in one sweep. Two optimisations keep it fast: you can begin
  crossing off at `p * p` (smaller multiples like `2 * p` were already handled by
  smaller primes), and you can stop looking for new primes once `p * p > n`,
  because any composite `<= n` has a factor no larger than its square root. The
  `n < 2` guard matters because 0 and 1 are not prime and the tray list should be
  empty there.
common_mistakes:
  - Forgetting to mark 0 and 1 as non-prime (or indexing a list that is too short).
  - Starting the inner cross-off loop at 2 * p, which is correct but slower; starting it above p * p by mistake skips real composites.
  - Returning the boolean table itself instead of collecting the indices that stayed True.
