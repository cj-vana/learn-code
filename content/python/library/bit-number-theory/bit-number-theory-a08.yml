prompt_markdown: |
  A greenhouse numbers its seed trays `2, 3, 4, ...` up to some limit `n`. The head
  grower wants to flag every tray whose number is **prime** so those trays get the
  rare heirloom seeds.

  Write `prime_trays(n)` that returns a list, in ascending order, of every prime
  number that is less than or equal to `n`. Build it with the sieve of
  Eratosthenes: assume all numbers are prime, then repeatedly cross off the
  multiples of each prime you find.

  Rules:

  - The input `n` is a single non-negative integer.
  - If `n` is less than 2 there are no primes, so return an empty list `[]`.
  - The returned primes must be in increasing order.

  Example: `prime_trays(10)` returns `[2, 3, 5, 7]`.
