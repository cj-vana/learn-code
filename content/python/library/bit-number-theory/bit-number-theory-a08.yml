function_name: prime_trays
input_mode: function
solution_sketch: Build a boolean is_prime table, cross off multiples of each prime starting at its square, then collect the surviving indices.
sample_solution: |
  def prime_trays(n):
      if n < 2:
          return []
      is_prime = [True] * (n + 1)
      is_prime[0] = False
      is_prime[1] = False
      p = 2
      while p * p <= n:
          if is_prime[p]:
              for multiple in range(p * p, n + 1, p):
                  is_prime[multiple] = False
          p += 1
      primes = []
      for i in range(2, n + 1):
          if is_prime[i]:
              primes.append(i)
      return primes
hints:
  - level: 1
    text: Start by assuming every number from 2 to n is prime, then eliminate the ones that have a smaller factor.
  - level: 2
    text: Keep a boolean list of length n + 1; for each number still marked prime, mark all of its multiples as not prime.
  - level: 3
    text: You only need to start crossing off at p * p and only need to test p while p * p <= n; afterwards collect every index still marked True.
