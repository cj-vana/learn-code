prompt_markdown: |
  A test rig logs a calibration reading twice for every routine check — once
  before and once after — so each value should appear an even number of times.
  A single stray reading got logged an odd number of times, and you need to
  recover it.

  Write `find_unpaired_reading(readings)` that takes a list of integers in which
  every value appears an even number of times except exactly one, and returns
  that one unpaired value.

  Use XOR folding: because `x ^ x` is `0` and `x ^ 0` is `x`, XOR-ing the whole
  list together cancels every paired value and leaves only the odd one out. The
  order of the readings is not guaranteed. The unpaired value may itself be `0`.
starter_code: |
  def find_unpaired_reading(readings):
      return 0
function_name: find_unpaired_reading
input_mode: function
solution_sketch: Fold XOR across the whole list starting from 0; paired values cancel to 0 and only the unpaired reading survives.
sample_solution: |
  def find_unpaired_reading(readings):
      result = 0
      for value in readings:
          result ^= value
      return result
hints:
  - level: 1
    text: XOR has two properties that matter here — a value XOR-ed with itself is 0, and any value XOR-ed with 0 is unchanged.
  - level: 2
    text: Because XOR is order-independent, every value that appears an even number of times collapses to 0 no matter where it sits in the list.
  - level: 3
    text: Start an accumulator at 0 and XOR every reading into it with `result ^= value`; the leftover is the unpaired value.
