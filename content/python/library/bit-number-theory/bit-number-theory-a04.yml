explanation_markdown: |
  XOR is associative and commutative, so you can reorder the readings freely and
  group each matched pair together. Every pair XOR-es to `0`, and folding those
  zeros into the running result leaves it unchanged, so after the whole pass only
  the value with an odd count remains. This runs in a single linear scan using one
  integer of extra space — no counting dictionary and no sorting required. Note it
  works even when the unpaired value is `0`, since `0` is just the neutral element
  of XOR.
common_mistakes:
  - Initialising the accumulator to the first element and re-XOR-ing it, or to something other than 0.
  - Reaching for a frequency dictionary, which works but misses the point and uses extra memory.
  - Assuming a value that appears four or six times counts as unpaired; only an odd count survives the fold.
