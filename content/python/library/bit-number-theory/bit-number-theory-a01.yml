explanation_markdown: |
  A status word stores independent switches in its binary digits, so testing one
  lamp means ignoring every bit except the one you want. Shifting right by `bit`
  slides that lamp down into position 0, and `& 1` erases everything above it,
  leaving just `0` or `1`. Comparing to `1` converts that into the boolean the
  prompt asks for. The whole test is constant time regardless of how large the
  status word is.
common_mistakes:
  - Returning the integer `1` or `0` instead of a boolean; the `== 1` comparison fixes this.
  - Shifting the mask by `1` instead of by `bit`, which always inspects the same position.
  - Confusing bit 0 with bit 1 by counting lamps from one; the least significant bit is index 0.
