prompt_markdown: |
  A control panel packs the on/off state of all its indicator lamps into one
  non-negative integer called a *status word*. Bit 0 (the least significant bit)
  is lamp 0, bit 1 is lamp 1, and so on upward.

  Write `is_lamp_lit(reading)` where `reading` is a dict with exactly two keys:

  - `"mask"`: the status word, a non-negative integer.
  - `"bit"`: the lamp index to inspect, where `0` means the least significant bit.

  Return `True` if that lamp is lit (its bit is set to `1`) and `False`
  otherwise. Return an actual boolean, not `0` or `1`.

  For example, `is_lamp_lit({"mask": 5, "bit": 0})` is `True` because `5` is
  binary `101`, whose bit 0 is set. `is_lamp_lit({"mask": 5, "bit": 1})` is
  `False` because bit 1 of `101` is `0`.
starter_code: |
  def is_lamp_lit(reading):
      return False
function_name: is_lamp_lit
input_mode: function
solution_sketch: Shift the mask right by the bit index so the target bit lands in position 0, then AND with 1 and compare to 1 to get a boolean.
sample_solution: |
  def is_lamp_lit(reading):
      mask = reading["mask"]
      bit = reading["bit"]
      return (mask >> bit) & 1 == 1
hints:
  - level: 1
    text: A single bit can be isolated by lining up a mask with just that one position set, using either a shift-down or a shift-up.
  - level: 2
    text: Shifting the status word right by `bit` moves the lamp you care about into the lowest position; then `& 1` keeps only that bit.
  - level: 3
    text: Return `(mask >> bit) & 1 == 1`. The `== 1` turns the 0-or-1 result into a real boolean.
