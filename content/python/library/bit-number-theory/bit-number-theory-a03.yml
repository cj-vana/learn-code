prompt_markdown: |
  A theatre lighting desk stores which channels are lit as the set bits of one
  integer mask, where bit 0 is channel 0. An operator runs a list of cues that
  each turn a channel on, off, or flip it.

  Write `apply_light_cues(cues)` where `cues` is a dict with exactly two keys:

  - `"mask"`: the starting mask, a non-negative integer.
  - `"ops"`: a list of two-element lists `[action, bit]`, applied left to right.
    `action` is one of the strings `"set"` (force that channel on), `"clear"`
    (force it off), or `"toggle"` (flip it). `bit` is the channel index.

  Return the final integer mask after every cue has been applied. If `"ops"` is
  empty, return the starting mask unchanged.

  For example, `apply_light_cues({"mask": 0, "ops": [["set", 0], ["set", 2]]})`
  returns `5` (binary `101`).
starter_code: |
  def apply_light_cues(cues):
      return 0
function_name: apply_light_cues
input_mode: function
solution_sketch: Start from the given mask, then for each [action, bit] pair OR in 1 << bit to set, AND with ~(1 << bit) to clear, or XOR with 1 << bit to toggle.
sample_solution: |
  def apply_light_cues(cues):
      mask = cues["mask"]
      for action, bit in cues["ops"]:
          if action == "set":
              mask |= 1 << bit
          elif action == "clear":
              mask &= ~(1 << bit)
          elif action == "toggle":
              mask ^= 1 << bit
      return mask
hints:
  - level: 1
    text: Build the single-bit mask `1 << bit` once per cue, then combine it with the running mask using the operator that matches the action.
  - level: 2
    text: OR (`|`) forces a bit on, AND with the inverted mask (`& ~(1 << bit)`) forces it off, and XOR (`^`) flips it.
  - level: 3
    text: Loop over `cues["ops"]`, unpack each pair as `action, bit`, dispatch on the action string, and return the accumulated mask at the end.
