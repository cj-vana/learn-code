explanation_markdown: |
  Each action maps to one bitwise operator against the single-bit mask `1 << bit`.
  OR only ever adds a bit, so setting an already-lit channel leaves it lit. AND
  with the inverted mask only ever removes a bit, so clearing a dark channel is a
  no-op. XOR flips, so toggling the same channel twice returns to the start —
  which is why the double-toggle and set-then-toggle cases land back where they
  began. Because each cue touches exactly one bit and leaves the rest alone, the
  cues compose cleanly in order.
common_mistakes:
  - Using `mask & (1 << bit)` to clear a bit instead of `mask & ~(1 << bit)`, which wipes every other channel.
  - Reassigning `mask` only inside one branch and forgetting to return the accumulated value after the loop.
  - Treating `set` as a toggle, so setting an already-on channel wrongly turns it off.
