prompt_markdown: |
  A vintage machine tracks distance on a binary odometer: each reading is a string
  of `'0'` and `'1'` characters, most significant bit first. A mechanic needs to
  add two such readings and record the total, still as a binary string.

  Write `add_readings(readings)` where `readings` is a dictionary with two keys:

  - `"a"`: a binary string (only the characters `'0'` and `'1'`).
  - `"b"`: a binary string in the same format.

  Return their sum as a binary string. You must do the addition **by hand** with a
  right-to-left ripple carry (line the strings up at their least significant bit,
  add column by column, carry the 1s). Do **not** convert the strings to integers
  with `int(s, 2)` or use `bin()`.

  Rules:

  - Each input has no leading zeros except the single string `"0"`, which means
    zero.
  - The result must also have no leading zeros (return `"0"` when the total is
    zero).

  Example: `add_readings({"a": "101", "b": "11"})` returns `"1000"`, because
  binary `101` (five) plus `11` (three) is `1000` (eight).
starter_code: |
