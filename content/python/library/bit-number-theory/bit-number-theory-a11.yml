function_name: add_readings
input_mode: function
solution_sketch: Walk both strings from the right, add matching bits plus a carry, append each result bit, then reverse and strip leading zeros.
sample_solution: |
  def add_readings(readings):
      a = readings["a"]
      b = readings["b"]
      i = len(a) - 1
      j = len(b) - 1
      carry = 0
      out = []
      while i >= 0 or j >= 0 or carry:
          bit_a = 1 if i >= 0 and a[i] == "1" else 0
          bit_b = 1 if j >= 0 and b[j] == "1" else 0
          total = bit_a + bit_b + carry
          out.append("1" if total % 2 else "0")
          carry = total // 2
          i -= 1
          j -= 1
      result = "".join(reversed(out)).lstrip("0")
      return result or "0"
hints:
  - level: 1
    text: Add the way you would on paper, starting from the rightmost bit and carrying a 1 into the next column when a column sums to 2 or more.
  - level: 2
    text: Use two indices that start at the last character of each string and move left; treat a missing character (index below 0) as a 0 bit.
  - level: 3
    text: Each column's output bit is total % 2 and the carry is total // 2; keep looping while either index is valid or a carry remains, then reverse the collected bits and strip leading zeros.
