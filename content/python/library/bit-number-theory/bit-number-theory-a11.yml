explanation_markdown: |
  Binary addition is the same column algorithm as decimal addition, only each
  column can hold at most `1 + 1 + 1 == 3`. Walking from the least significant bit,
  the sum of the two bits plus the incoming carry gives an output bit of
  `total % 2` and a new carry of `total // 2`. Treating any index that has fallen
  off the left end as a `0` lets you add strings of different lengths without
  padding them first. The loop must keep going while a carry is still pending, so a
  final carry becomes a new leading `1` (as in `1111 + 1111 == 11110`). Because you
  build the answer from the right, you reverse it at the end, and stripping leading
  zeros (with a fallback to `"0"`) keeps the result canonical.
common_mistakes:
  - Stopping the loop as soon as both strings are exhausted, dropping a final carry bit.
  - Forgetting to reverse the collected bits, so the answer comes out backwards.
  - Reading past the front of a string instead of substituting a 0 for a missing column.
  - Leaving leading zeros (or returning an empty string) when the total is zero.
