prompt_markdown: |
  A secure facility encodes access permissions as bitmasks: each bit stands for
  one door, and a badge whose bit is set may open that door. To enter a lab, a
  badge must grant *every* door in a required set — extra permissions are fine,
  but no required door may be missing.

  Write `count_cleared_badges(access)` where `access` is a dict with exactly two
  keys:

  - `"required"`: a non-negative integer whose set bits are the doors the lab
    demands.
  - `"granted"`: a list of non-negative integer badge masks.

  Return how many badges in `"granted"` clear the lab — that is, how many masks
  `g` satisfy `g & required == required`, meaning every required bit is also set
  in `g`. If `"granted"` is empty, return `0`.

  For example, with `required = 5` (binary `101`) and `granted = [5, 7, 1]`, the
  answer is `2`: `5` and `7` both include bits 0 and 2, but `1` is missing bit 2.
starter_code: |
  def count_cleared_badges(access):
      return 0
function_name: count_cleared_badges
input_mode: function
solution_sketch: For each granted mask, check that ANDing it with required reproduces required (all required bits present) and count those that pass.
sample_solution: |
  def count_cleared_badges(access):
      required = access["required"]
      count = 0
      for granted in access["granted"]:
          if granted & required == required:
              count += 1
      return count
hints:
  - level: 1
    text: A badge covers the required doors when it has a 1 in every position that required has a 1, regardless of its other bits.
  - level: 2
    text: AND-ing a badge with required keeps only the required bits the badge actually has; if that result equals required, none are missing.
  - level: 3
    text: Loop over `access["granted"]`, count each mask where `granted & required == required`, and return the count.
