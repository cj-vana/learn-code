explanation_markdown: |
  The test `g & required == required` is the standard way to ask "is `required` a
  subset of `g`'s bits?" AND-ing keeps only the bits present in both, so the result
  can equal `required` only when the badge already carries every required bit;
  extra bits in the badge are dropped by the AND and never affect the comparison.
  When `required` is `0` the demand is empty, so every badge passes — which is why
  the all-zeros required case counts every mask. The scan is linear in the number
  of badges, with each check a single constant-time bitwise operation.
common_mistakes:
  - Testing `granted & required != 0`, which passes when only one required door is covered instead of all of them.
  - Comparing against `granted` (`g & required == g`), which checks the opposite subset direction.
  - Forgetting that a required value of 0 means every badge qualifies, and special-casing it wrongly.
