solution_sketch: Do a bitmask DP where the state is the set of already-filled slots. The number of set bits in the mask tells you which host to place next, so process hosts in order and, for each reachable mask, try every available slot the host has not used yet.
sample_solution: |
  def schedule_mask_dp(job):
      n = job["n"]
      allowed = job["allowed"]
      full = (1 << n) - 1
      dp = [0] * (1 << n)
      dp[0] = 1
      for mask in range(1 << n):
          ways = dp[mask]
          if ways == 0:
              continue
          host = bin(mask).count("1")
          if host >= n:
              continue
          options = allowed[host] & ~mask
          while options:
              low = options & (-options)
              dp[mask | low] += ways
              options ^= low
      return dp[full]
hints:
  - level: 1
    text: Fill the slots one host at a time. The only thing that matters about the past is which slots are already taken, and that set of slots is a subset you can store as a bitmask.
  - level: 2
    text: Let dp[mask] be the number of ways to have assigned the first popcount(mask) hosts onto exactly the slots in mask. Then bin(mask).count("1") is the index of the next host to place.
  - level: 3
    text: For each mask with dp[mask] > 0, the next host's free-and-unused slots are allowed[host] & ~mask. Peel off each set bit with low = options & -options and add dp[mask] into dp[mask | low]. The answer is dp[(1 << n) - 1].
