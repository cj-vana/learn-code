explanation_markdown: |
  Counting one-to-one assignments is the permanent of the availability matrix, and the
  standard way to compute it fast is a bitmask DP over which slots are already filled.
  The state `dp[mask]` is the number of ways to place hosts onto *exactly* the slots in
  `mask`. Every time you place one host you add one slot, so a mask with `k` bits set
  corresponds to having placed hosts `0 .. k-1`. That is the key trick: the population
  count of the mask *is* the index of the next host to assign, so you never track the
  host separately, and every host is used once by construction.

  To extend a state, host `host = popcount(mask)` may go into any slot that is both in
  their availability and not yet taken, which is the intersection
  `allowed[host] & ~mask`. Iterating the set bits of that value with the
  `low = options & -options` idiom isolates each candidate slot's lowest bit in turn,
  and `dp[mask | low] += dp[mask]` accumulates the count into the larger state. The
  final answer is `dp[(1 << n) - 1]`, the fully filled roster.

  There are `2**n` masks and up to `n` slots peeled per mask, so the work is
  `O(n * 2**n)`, which is why `n` is capped at 12 (about 49 thousand mask-steps). A host
  with mask `0` contributes no options and strands the DP at `0`, giving the correct
  zero-roster answer.
common_mistakes:
  - Deriving the next host from something other than the mask's popcount, which lets a host be placed twice or skipped.
  - Forgetting to intersect with ~mask, so a slot already taken gets reused and rosters are overcounted.
  - Iterating masks in an order that reads dp[mask | low] before dp[mask] is final; pushing forward from ascending masks avoids this.
  - Returning dp indexed by the wrong full mask (for example (1 << n) instead of (1 << n) - 1) or summing the whole dp array.
