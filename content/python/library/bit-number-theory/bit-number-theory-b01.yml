prompt_markdown: |
  A community radio station has `n` volunteer hosts and `n` one-hour broadcast slots
  for the day. Every host must be given exactly one slot, and every slot must be
  covered by exactly one host: a complete roster is a one-to-one assignment of hosts
  to slots. Each host, though, is only available for some of the slots. The station
  wants to know how many different complete rosters are possible.

  Write `schedule_mask_dp(job)` where `job` is a dict with two keys:

  - `n`: the number of hosts, which equals the number of slots (`0 <= n <= 12`)
  - `allowed`: a list of `n` integers. `allowed[i]` is a **bitmask** of host `i`'s
    availability: bit `j` (that is, `1 << j`) is set exactly when host `i` can take
    slot `j`. Only bits `0` through `n - 1` are ever set.

  Return a single integer: the number of complete rosters, i.e. the number of ways to
  match every host to a distinct available slot.

  Edges: if some host has availability mask `0`, no roster can include them, so the
  answer is `0`. If `n` is `0` there is exactly one (empty) roster, so return `1`.

  Example: with `n = 2` and `allowed = [3, 3]` (mask `3` is binary `11`, meaning both
  hosts are free for slots `0` and `1`), there are `2` rosters: host 0 to slot 0 with
  host 1 to slot 1, or the swap. With `allowed = [3, 2]` (host 1's mask `2` is `10`,
  only slot 1), host 1 is forced onto slot 1 and host 0 onto slot 0, so there is just
  `1` roster.
