explanation_markdown: |
  Euclid's algorithm shrinks a pair `(a, b)` to `(b, a % b)` until the second
  entry is zero; whatever remains in the first slot is the GCD, because every
  common divisor of `a` and `b` also divides `a % b`. Extending it to a whole list
  works because `gcd(x, y, z)` equals `gcd(gcd(x, y), z)`, so you can fold the
  two-number version across the widths. Seeding the running result at `0` is a
  tidy trick: `gcd(0, n)` is `n`, so the first width simply becomes the starting
  value, and an empty list never enters the loop and returns the seed `0`.
common_mistakes:
  - Seeding the running result at 1 instead of 0, which forces every answer down to 1.
  - Returning 1 (or crashing) on an empty list instead of the required 0.
  - Writing the update as gcd(a % b, b) so the pair never shrinks and the loop spins forever.
