prompt_markdown: |
  A tiling crew is covering several rectangular wall panels with identical square
  tiles. To avoid cutting any tile, the side length of the square must divide the
  width of every panel exactly. The crew wants the *largest* such square, which is
  the greatest common divisor of all the panel widths.

  Write `largest_tile(widths)` that takes a list of positive integers (the panel
  widths, all measured in the same whole units) and returns the greatest common
  divisor of every width, computed with Euclid's algorithm (`gcd(a, b)` equals
  `gcd(b, a % b)`). Do **not** call `math.gcd`; implement the shrinking loop
  yourself.

  Rules:

  - Fold the GCD across the list one width at a time.
  - If the list is empty, return `0` (there is nothing to tile).
  - A single width returns that width itself.

  Example: `largest_tile([24, 36, 48])` returns `12`, because 12 is the largest
  side length that divides 24, 36, and 48 with no leftover.
starter_code: |
  def largest_tile(widths):
      return 1
function_name: largest_tile
input_mode: function
solution_sketch: Fold a two-number Euclidean gcd across the list, starting the running result at 0 so the first width becomes the seed.
sample_solution: |
  def largest_tile(widths):
      result = 0
      for width in widths:
          a, b = result, width
          while b:
              a, b = b, a % b
          result = a
      return result
