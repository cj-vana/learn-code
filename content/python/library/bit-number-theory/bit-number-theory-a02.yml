explanation_markdown: |
  Because subtracting one flips the lowest `1` bit to `0` and every trailing `0`
  to `1`, AND-ing the result back against the original wipes out precisely that
  lowest set bit and nothing else. Each loop therefore removes one enabled toggle,
  so the loop runs exactly as many times as there are set bits — never once per
  possible bit position. That makes the work proportional to the number of toggles
  that are on, which is why the trick is faster than scanning every bit for a
  sparsely populated integer.
common_mistakes:
  - Using `n & n - 1` while forgetting Python evaluates it correctly by precedence, then reassigning to the wrong variable so the loop never ends.
  - Looping a fixed 32 or 64 times regardless of n instead of stopping when n hits zero.
  - Shifting n right and testing `n & 1` but forgetting to actually update n, causing an infinite loop.
