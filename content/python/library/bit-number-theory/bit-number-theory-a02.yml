prompt_markdown: |
  A settings service records which feature toggles a user has switched on by
  setting the matching bits of one non-negative integer. Write
  `count_active_toggles(n)` that returns how many bits are set to `1` in `n`.

  `n` is a single non-negative integer (the input is the number itself, not a
  dict or list). `count_active_toggles(0)` returns `0` because no toggles are on.

  The clean way to do this is the `n & (n - 1)` trick: that expression clears the
  lowest set bit of `n`, so if you loop applying it until `n` reaches zero, the
  number of passes equals the number of set bits. You do not need to convert the
  number to a string.
starter_code: |
  def count_active_toggles(n):
      return 0
function_name: count_active_toggles
input_mode: function
solution_sketch: Loop while n is non-zero, clearing the lowest set bit with n &= n - 1 each pass and counting the passes.
sample_solution: |
  def count_active_toggles(n):
      count = 0
      while n:
          n &= n - 1
          count += 1
      return count
hints:
  - level: 1
    text: Subtracting 1 from a number flips its lowest set bit to 0 and turns the zeros below it into ones.
  - level: 2
    text: AND-ing n with n - 1 therefore erases exactly the lowest set bit, removing one enabled toggle per step.
  - level: 3
    text: Loop `while n:` doing `n &= n - 1` and increment a counter each pass; return the counter once n is zero.
