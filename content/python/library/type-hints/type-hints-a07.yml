explanation_markdown: |
  This is a discriminated union: every value carries a tag that names its variant
  so a later stage can dispatch on it without re-inspecting the raw value. The one
  subtlety is Python's type hierarchy. `bool` is a subclass of `int`, so
  `isinstance(True, int)` returns `True`. If you checked `int` first, every flag
  would be stamped `"int"` and the boolean variant would never appear. Ordering
  the checks None -> bool -> int -> float -> str resolves each value to its most
  specific tag.

  The pass is a single linear scan, O(n) in the number of values, and it never
  mutates the input. Type tags like these are what a runtime type-checker or a
  serialisation format builds on when a field can legitimately hold more than one
  shape of data.
common_mistakes:
  - Checking int before bool, which mislabels True and False as "int" because booleans are a subclass of int.
  - Forgetting the None case, so blank cards fall through to the string branch and are tagged "str".
  - Returning tuples like (tag, value) instead of two-element lists, so the output does not match the expected structure.
