prompt_markdown: |
  A natural-history archive records one loose reading per specimen card, and the
  values arrive as a mixed pile: some are whole counts, some are measured
  decimals, some are written notes, some are yes/no flags, and some cards are
  blank. Before the pile can be filed, each value must be stamped with a **type
  tag** so the discriminated-union importer knows how to store it.

  Write `tag_union(values)` that takes **one list** of scalar values and returns
  a **list of `[tag, value]` pairs** (each pair a two-element list), one per input
  value in the same order. The `tag` is a string chosen by the value's Python
  type:

  - `"null"` if the value is `None`
  - `"bool"` if the value is a boolean (`True` or `False`)
  - `"int"` if the value is an integer
  - `"float"` if the value is a floating-point number
  - `"str"` if the value is a string

  The order of the checks matters. In Python a boolean is a special kind of
  integer, so `isinstance(True, int)` is `True`. You must test for `bool`
  **before** `int`, otherwise every flag would be mislabelled `"int"`. Likewise,
  check for `None` before anything else.

  Example call:

  ```python
  tag_union([7, True, "moss", None, 2.5])
  # -> [["int", 7], ["bool", True], ["str", "moss"], ["null", None], ["float", 2.5]]
  ```

  Each input value is one of those five kinds. An empty input returns an empty
  list. Return a list, not tuples.
starter_code: |
  from typing import Any


  def tag_union(values: list[Any]) -> list[list[Any]]:
      return []
function_name: tag_union
input_mode: function
solution_sketch: Loop over the values; for each, decide the tag by checking None first, then bool, then int, then float, then str, and append a two-element list of the tag and the original value.
sample_solution: |
  from typing import Any


  def tag_union(values: list[Any]) -> list[list[Any]]:
      tagged: list[list[Any]] = []
      for value in values:
          if value is None:
              tag = "null"
          elif isinstance(value, bool):
              tag = "bool"
          elif isinstance(value, int):
              tag = "int"
          elif isinstance(value, float):
              tag = "float"
          else:
              tag = "str"
          tagged.append([tag, value])
      return tagged
hints:
  - level: 1
    text: Walk the list once and decide a single tag string for each value based on its type, then pair the tag with the value.
  - level: 2
    text: Order your isinstance checks carefully; None comes first, and bool must be tested before int because isinstance(True, int) is True.
  - level: 3
    text: Append [tag, value] for each element so the result is a list of two-element lists in the original order.
