solution_sketch: Loop once, testing isinstance(value, bool) first so booleans are counted as others, then isinstance(value, int) and isinstance(value, str) to fill the two lists; everything else increments the counter.
sample_solution: |
  from typing import Any


  def narrow_types(values: list[Any]) -> dict[str, Any]:
      ints: list[int] = []
      strs: list[str] = []
      others_count = 0
      for value in values:
          if isinstance(value, bool):
              others_count += 1
          elif isinstance(value, int):
              ints.append(value)
          elif isinstance(value, str):
              strs.append(value)
          else:
              others_count += 1
      return {"ints": ints, "strs": strs, "others_count": others_count}
