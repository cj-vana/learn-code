prompt_markdown: |
  You are emptying a kitchen junk drawer onto the table and sorting what falls out.
  Some items are whole numbers, some are labels (text), and the rest is
  miscellaneous. You will do the same in code using runtime type narrowing.

  Read the signature:

  ```python
  def narrow_types(values: list[Any]) -> dict[str, Any]:
  ```

  `values` is a mixed list. Walk it in order and sort each element:

  - Integers go into a list under `"ints"`.
  - Strings go into a list under `"strs"`.
  - Everything else (floats, `None`, lists, and so on) is only counted.

  Return a dictionary shaped exactly like:

  ```python
  {"ints": [...], "strs": [...], "others_count": <int>}
  ```

  Both lists preserve the original left-to-right order.

  The trap: in Python, `bool` is a **subclass** of `int`, so `isinstance(True, int)`
  is `True`. For this drawer, a boolean is **not** a number, it belongs in the
  miscellaneous count. Check for `bool` **before** you check for `int` so that
  `True` and `False` are counted in `"others_count"` and never land in `"ints"`.

  Example:

  ```python
  narrow_types([7, "lid", True, 3.5])
  # -> {"ints": [7], "strs": ["lid"], "others_count": 2}
  ```
