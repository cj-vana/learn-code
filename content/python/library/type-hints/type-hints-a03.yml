explanation_markdown: |
  Runtime type narrowing is how you turn a `list[Any]` into something you can act
  on with confidence. Each `isinstance` check narrows the possibilities until you
  know exactly how to file the value.

  The whole point of this drill is branch order. Python models `bool` as a subclass
  of `int` (historically, `True` really is `1`), so `isinstance(True, int)` returns
  `True`. If you test `int` first, both booleans slide silently into `"ints"`.
  Putting the `bool` check ahead of the `int` check intercepts them so they are
  counted as miscellaneous instead. Everything the three specific branches do not
  catch, floats, `None`, nested lists, falls through to the final `else` and only
  bumps the counter, keeping the two lists clean.
common_mistakes:
  - Checking isinstance(value, int) before isinstance(value, bool), so True and False are wrongly collected as integers.
  - Appending non-int, non-str values to a list instead of only counting them in others_count.
  - Reordering the input while filing values, breaking the required left-to-right order of the ints and strs lists.
