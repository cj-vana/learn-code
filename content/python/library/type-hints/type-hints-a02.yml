explanation_markdown: |
  A union return type like `int | str` is a contract with the caller: it says the
  result may be either type, so downstream code should be ready for both. This is
  the everyday shape of "value or fallback" logic, closely related to `Optional`,
  where a missing value is replaced by a stand-in.

  The subtle part is the emptiness check. Writing `job["items"][0] or job["default"]`
  looks tidy but is wrong: when the first ticket is `0`, that expression is falsy,
  so it would skip the real ticket and return the sign instead. Testing the list
  itself with `if items:` asks the right question, "is anyone waiting?", and lets a
  legitimate zero through.
common_mistakes:
  - Writing items[0] or default, which incorrectly returns the fallback when the first ticket is 0 or another falsy value.
  - Indexing job["items"][0] without first checking the list is non-empty, raising IndexError on an empty line.
  - Treating the int | str return hint as a runtime guarantee instead of documentation of the two possible outcomes.
