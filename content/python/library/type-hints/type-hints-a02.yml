prompt_markdown: |
  A bakery counter shows the number of the customer being served. When the waiting
  line is empty, the display instead shows a standing sign such as `"TAKE A NUMBER"`.
  You are writing the helper that decides what to show.

  Read the signature:

  ```python
  def first_or_default(job: dict[str, Any]) -> int | str:
  ```

  The return annotation `int | str` is the important teaching here: it documents
  that this function can hand back **either** a ticket number (`int`) **or** the
  fallback sign (`str`). The caller reads that union and knows to expect both.

  `job` is a dictionary with two keys:

  - `"items"`: a list of waiting ticket numbers, in call order.
  - `"default"`: the fallback value to show when nobody is waiting.

  Return the **first** element of `"items"` if the list has any tickets; otherwise
  return `"default"`. Decide by whether the list is empty, not by whether the first
  ticket is "truthy", because ticket `0` is a real number that must still be
  returned.

  Example:

  ```python
  first_or_default({"items": [42, 43], "default": "TAKE A NUMBER"})  # -> 42
  first_or_default({"items": [], "default": "TAKE A NUMBER"})        # -> "TAKE A NUMBER"
  ```
starter_code: |
  from typing import Any


  def first_or_default(job: dict[str, Any]) -> int | str:
      return job["default"]
function_name: first_or_default
input_mode: function
solution_sketch: Read job["items"]; if the list is non-empty return its first element, otherwise return job["default"]. Test list emptiness directly so a falsy first item like 0 is still returned.
sample_solution: |
  from typing import Any


  def first_or_default(job: dict[str, Any]) -> int | str:
      items = job["items"]
      if items:
          return items[0]
      return job["default"]
hints:
  - level: 1
    text: The return annotation int | str signals two outcomes, so your function has two return paths, one for a present ticket and one for the fallback.
  - level: 2
    text: Check whether job["items"] is non-empty with a plain truthiness test on the list itself, not on its first element.
  - level: 3
    text: "When the list is non-empty return job[\"items\"][0]; otherwise return job[\"default\"]. Avoid items[0] or default, which would skip a real ticket 0."
