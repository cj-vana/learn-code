explanation_markdown: |
  A dispatch table replaces a growing `if/elif` ladder with a dictionary lookup.
  Each operation is a value in the registry -- here small lambdas, but named
  functions would work identically -- and the `Callable[[dict[str, Any]], Any]`
  annotation documents the contract every entry must honour: take one args
  dictionary, return one result. That uniform signature is what lets the caller
  treat every operation the same way.

  Using `registry.get(job["op"])` rather than `registry[job["op"]]` is the key
  safety move: an unknown operation returns `None` from the lookup, which the
  function passes straight back, so a bad instruction never raises. The clamp
  operation folds two guards into one expression, `max(low, min(value, high))`,
  which first caps the value at `high` and then floors it at `low`. Adding a new
  operation later means adding one registry entry, not editing control flow.
common_mistakes:
  - Indexing the registry with square brackets, which raises a KeyError on an unknown op instead of returning None.
  - Writing clamp as min(high, value) without also applying max(low, ...), so values below the floor are not pulled up.
  - Calling the looked-up function with the whole job instead of job["args"], so the argument keys cannot be found.
