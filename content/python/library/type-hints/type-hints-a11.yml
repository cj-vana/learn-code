prompt_markdown: |
  A pocket calculator does not use a long chain of if-statements to decide what to
  do. Instead it keeps a **registry**: a dictionary that maps each operation name
  to a small function. To run an instruction it looks up the name and calls the
  function it finds. This exercise builds that registry, and the starter code
  shows the `Callable` type hint that describes "a function from an args
  dictionary to a result".

  Write `callable_table(job)` that takes **one dictionary** with two entries:

  - `"op"`: the operation name, one of `"add"`, `"mul"`, or `"clamp"`
  - `"args"`: a dictionary of arguments for that operation

  Dispatch through a registry of small functions and return the result:

  - `"add"` reads `"x"` and `"y"` from args and returns `x + y`.
  - `"mul"` reads `"x"` and `"y"` from args and returns `x * y`.
  - `"clamp"` reads `"value"`, `"low"`, and `"high"` from args and returns
    `value` pulled back into the range: the result is `low` if `value` is below
    `low`, `high` if `value` is above `high`, and `value` otherwise.
  - Any **other** `"op"` (a name not in the registry) returns `None`.

  Example call:

  ```python
  callable_table({"op": "clamp", "args": {"value": 42, "low": 0, "high": 10}})
  # -> 10
  ```

  Build a dictionary of functions and look the operation up in it rather than
  writing a separate if-branch for each case.
starter_code: |
  from typing import Any, Callable


  def callable_table(job: dict[str, Any]) -> Any:
      registry: dict[str, Callable[[dict[str, Any]], Any]] = {}
      return None
function_name: callable_table
input_mode: function
solution_sketch: Build a dict mapping each op name to a small function that takes the args dict and returns a result; look up job["op"], return None when it is absent, otherwise call the found function with job["args"].
sample_solution: |
  from typing import Any, Callable


  def callable_table(job: dict[str, Any]) -> Any:
      registry: dict[str, Callable[[dict[str, Any]], Any]] = {
          "add": lambda args: args["x"] + args["y"],
          "mul": lambda args: args["x"] * args["y"],
          "clamp": lambda args: max(args["low"], min(args["value"], args["high"])),
      }
      operation = registry.get(job["op"])
      if operation is None:
          return None
      return operation(job["args"])
hints:
  - level: 1
    text: Make a dictionary whose keys are the operation names and whose values are small functions that each take the args dictionary.
  - level: 2
    text: Use registry.get(job["op"]) so a missing operation name gives None instead of raising a KeyError.
  - level: 3
    text: Clamp is max(low, min(value, high)); if the lookup returned a function, call it with job["args"] and return the result.
