prompt_markdown: |
  In the pantry, every jar should get exactly one lid. Pairing them up is a
  generic operation -- it does not care whether the items are strings, numbers, or
  anything else, only that the two lists line up one-to-one. If there are more
  lids than jars (or the reverse), something is wrong and the pairing must be
  refused rather than silently dropping the leftovers.

  Write `generic_pairs(job)` that takes **one dictionary** with two entries:

  - `"keys"`: a list of items (the jars)
  - `"values"`: a list of items (the lids)

  If the two lists have the **same length**, return a **list of `[key, value]`
  pairs** (each pair a two-element list), taking the first key with the first
  value, the second with the second, and so on. If the two lists have
  **different lengths**, return the string `"length mismatch"` instead.

  Example call:

  ```python
  generic_pairs({"keys": ["jam", "salt"], "values": ["red", "blue"]})
  # -> [["jam", "red"], ["salt", "blue"]]
  ```

  Two empty lists are the same length, so they pair into an empty list. Return
  lists for the pairs, not tuples.
starter_code: |
  from typing import Any


  def generic_pairs(job: dict[str, list[Any]]) -> Any:
      return []
function_name: generic_pairs
input_mode: function
solution_sketch: Compare the lengths of the two lists; if they differ return "length mismatch", otherwise zip them and build a list of two-element [key, value] lists.
sample_solution: |
  from typing import Any


  def generic_pairs(job: dict[str, list[Any]]) -> Any:
      keys = job["keys"]
      values = job["values"]
      if len(keys) != len(values):
          return "length mismatch"
      return [[key, value] for key, value in zip(keys, values)]
hints:
  - level: 1
    text: The very first check is whether the two lists are the same length; if not, the pairing is refused.
  - level: 2
    text: When the lengths match, zip pairs the lists position by position without dropping any items.
  - level: 3
    text: Build each pair as a two-element list [key, value] so the result is a list of lists, and return "length mismatch" otherwise.
