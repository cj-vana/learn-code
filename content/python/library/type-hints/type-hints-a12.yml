explanation_markdown: |
  This models a strict, generic pairing: the same code works whatever the element
  types are, because it only touches the list lengths and positions, never the
  values themselves. That is exactly what a generic type parameter captures in a
  type system -- the shape of the operation is fixed while the contents stay
  arbitrary. The `dict[str, list[Any]]` hint on the input says the two lists may
  hold anything.

  The length guard is the point of the drill. Python's plain `zip` stops at the
  shorter list and silently discards the tail, which would quietly lose a jar or a
  lid. Checking `len(keys) != len(values)` first turns that silent truncation into
  an explicit `"length mismatch"` signal, mirroring the strict pairing you would
  want when the counts are supposed to agree. When they do agree, a single
  comprehension over `zip` produces the aligned `[key, value]` pairs in order, a
  linear pass over the input.
common_mistakes:
  - Zipping without checking lengths first, so a shorter list silently drops the extra items instead of reporting a mismatch.
  - Returning tuples from zip directly rather than converting each pair into a two-element list.
  - Returning an empty list for a length mismatch instead of the required "length mismatch" string.
