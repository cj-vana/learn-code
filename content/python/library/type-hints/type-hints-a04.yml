solution_sketch: Map each type-name string to a Python type, then for every declared field record a violation when the field is missing or fails isinstance against the mapped type; return the violations sorted.
sample_solution: |
  from typing import Any


  def validate_shape(job: dict[str, Any]) -> list[str]:
      record = job["record"]
      shape = job["shape"]
      type_map: dict[str, type] = {"int": int, "str": str, "list": list}
      violations: list[str] = []
      for field, type_name in shape.items():
          expected_type = type_map[type_name]
          if field not in record or not isinstance(record[field], expected_type):
              violations.append(f"{field}: expected {type_name}")
      return sorted(violations)
