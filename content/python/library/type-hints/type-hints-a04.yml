      expected: ["a: expected int", "b: expected str", "c: expected list"]
explanation_markdown: |
  A `TypedDict` describes the shape a dictionary should have, but the type checker
  only looks at your code, not at data arriving at runtime. When records come from
  a form, a file, or a network call, you validate the shape yourself, and that is
  exactly what this checker does.

  The clean trick is mapping the type-name strings to real type objects
  (`{"int": int, "str": str, "list": list}`) so a single `isinstance` call handles
  every declared field. Combining the missing-field test and the type test with
  `or` means one branch catches both failure modes. Sorting the messages at the end
  makes the output deterministic regardless of the order the shape happened to
  declare its fields, which is what lets the tests compare against a fixed list.
common_mistakes:
  - Comparing the type-name string to type(value).__name__ instead of mapping it to a real type and using isinstance, which is brittle for subclasses.
  - Forgetting that a missing field is also a violation and only checking the type of fields that happen to be present.
  - Returning the violations in discovery order instead of sorting them, so the output depends on the shape's field order.
