prompt_markdown: |
  A bicycle repair shop takes in each job as a record (a dictionary), and every
  record is supposed to match a declared shape, much like a `TypedDict` names each
  field and its type. You are writing the checker that flags anything that does not
  fit.

  Read the signature:

  ```python
  def validate_shape(job: dict[str, Any]) -> list[str]:
  ```

  `job` has two keys:

  - `"record"`: the dictionary being checked.
  - `"shape"`: a dictionary mapping each expected field name to a type name, which
    is one of the strings `"int"`, `"str"`, or `"list"`.

  For every field declared in `"shape"`, the record is in violation if:

  - the field is **missing** from the record, or
  - the field is present but its value is **not** of the declared type.

  For each violation, produce the string `"<field>: expected <type>"`, for example
  `"quantity: expected int"`. Return the violations as a list **sorted
  alphabetically**. A record that satisfies every declared field returns an empty
  list. Fields present in the record but not named in `"shape"` are ignored.

  Example:

  ```python
  validate_shape({
      "record": {"quantity": "five", "label": "seat"},
      "shape": {"quantity": "int", "label": "str"},
  })
  # -> ["quantity: expected int"]
  ```
starter_code: |
