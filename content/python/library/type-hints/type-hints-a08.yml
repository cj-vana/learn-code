prompt_markdown: |
  Two volunteers each typed up a draft of the same catalogue, and now the drafts
  must be reconciled into one. Rather than crash on a disagreement, the merge tool
  should quietly record which fields the drafts describe with **different kinds of
  value** so a human can settle them later.

  Write `merge_typed(job)` that takes **one dictionary** with two entries:

  - `"a"`: the first draft, a dictionary of field names to values
  - `"b"`: the second draft, a dictionary of field names to values

  Build the merged catalogue by these rules, starting from a copy of draft `a`:

  - A field only in `a` keeps `a`'s value; a field only in `b` takes `b`'s value.
  - A field in **both** drafts whose two values have the **same Python type**
    (compared with `type()`) takes `b`'s value -- the second draft overrides.
  - A field in **both** drafts whose two values have **different Python types** is
    a conflict: keep `a`'s value in the merged result and record the field name.

  Note that `type()` treats a boolean and an integer as different types, so a
  field that is `True` in one draft and `1` in the other is a conflict.

  Example call:

  ```python
  merge_typed({"a": {"title": "Ferns", "pages": 12},
               "b": {"pages": "twelve", "shelf": 3}})
  # -> {"merged": {"title": "Ferns", "pages": 12, "shelf": 3},
  #     "conflicts": ["pages"]}
  ```

  The function must **never raise**. Return a dictionary with `"merged"` (the
  merged catalogue) and `"conflicts"` (the conflicting field names as a list
  sorted in ascending order, or an empty list when there are none).
starter_code: |
  from typing import Any


  def merge_typed(job: dict[str, dict[str, Any]]) -> dict[str, Any]:
      return {"merged": {}, "conflicts": []}
function_name: merge_typed
input_mode: function
solution_sketch: Copy draft a, then walk draft b; new keys are added, keys present in both with the same type() override, and keys with differing type() are left as a's value and collected as conflicts, which are returned sorted alongside the merged dict.
sample_solution: |
  from typing import Any


  def merge_typed(job: dict[str, dict[str, Any]]) -> dict[str, Any]:
      a = job["a"]
      b = job["b"]
      merged: dict[str, Any] = dict(a)
      conflicts: list[str] = []
      for key, value in b.items():
          if key not in a:
              merged[key] = value
          elif type(a[key]) == type(value):
              merged[key] = value
          else:
              conflicts.append(key)
      return {"merged": merged, "conflicts": sorted(conflicts)}
hints:
