explanation_markdown: |
  The merge is total rather than partial: it always returns a value instead of
  raising, and it separates the clean overrides from the genuine disagreements.
  Starting from a copy of `a` keeps the first draft intact and lets `b` layer on
  top. For a shared field, comparing `type(a[key])` with `type(value)` is a
  lightweight structural check -- if both drafts agree on the shape of the data,
  the newer value wins; if they disagree, the tool refuses to guess and records
  the field for review while preserving `a`'s original value.

  The boolean case is the instructive one: `type(True)` is `bool` and `type(1)`
  is `int`, so despite `True == 1` being true, they are different types and the
  field is flagged. Sorting the conflict list makes the output deterministic,
  which matters for tests and for showing a human a stable list. The whole routine
  is one pass over draft `b`, O(n) in its size.
common_mistakes:
  - Using == to compare the values instead of type(), which treats True and 1 as equal and misses the conflict.
  - Overwriting a's value for a conflicting field instead of keeping it, losing the first draft's data.
  - Returning the conflicts in insertion order rather than sorted, producing a non-deterministic result.
