explanation_markdown: |
  Inferring a schema is a grouping problem layered on top of the same type-naming
  logic you use for a discriminated union. The `_type_name` helper resolves one
  value to its variant, with `bool` deliberately checked before `int` so flags are
  not swallowed into the integer column. For each column you gather the names of
  only the rows that actually contain it; a set of one name is a clean type, and a
  set of more than one collapses to `"mixed"`.

  Optionality is a separate axis. Comparing the number of rows that contain the
  column against the total row count tells you whether the column is ever absent;
  if it is, the `"optional "` prefix records that a typed importer must allow a
  missing value there. Because base type and optionality are computed
  independently, all four combinations fall out naturally: `"int"`,
  `"optional int"`, `"mixed"`, and `"optional mixed"`. The routine scans the rows
  a constant number of times per column, staying linear in the total number of
  cells.
common_mistakes:
  - Counting a column as required because it appears in the first row, without checking that it is present in every row.
  - Letting booleans fall into the "int" bucket by testing isinstance(value, int) before isinstance(value, bool).
  - Including missing rows as a "null" value instead of skipping absent columns, which turns an optional column into a mixed one.
