prompt_markdown: |
  A data clerk has exported a spreadsheet as a list of row dictionaries and wants
  to guess each **column's type** before importing it into a typed database. Some
  columns hold a consistent kind of value, some are ragged, and some are missing
  from a few rows entirely.

  Write `schema_from_values(records)` that takes **one list** of flat dictionaries
  (each a row mapping column names to scalar values) and returns a dictionary
  mapping every column name that appears in any row to a **type-name string**,
  built by these exact rules.

  First, name a single value's type like this:

  - `"null"` for `None`
  - `"bool"` for a boolean (checked before int)
  - `"int"` for an integer
  - `"float"` for a floating-point number
  - `"str"` for a string

  Then, for each column, look only at the rows where that column **is present**:

  - If every present value has the **same** type-name, the column's base name is
    that shared name (for example `"int"`).
  - If the present values have **more than one** type-name, the base name is
    `"mixed"`.
  - If the column is **absent from at least one row**, prefix the base name with
    `"optional "` (for example `"optional int"` or `"optional mixed"`). A column
    present in every row keeps its base name with no prefix.

  Example call:

  ```python
  schema_from_values([{"name": "Ada", "age": 36},
                      {"name": "Bo", "age": 41, "note": "temp"}])
  # -> {"name": "str", "age": "int", "note": "optional str"}
  ```

  An empty record list returns an empty dictionary.
starter_code: |
  from typing import Any


  def schema_from_values(records: list[dict[str, Any]]) -> dict[str, str]:
