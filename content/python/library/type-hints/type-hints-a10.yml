function_name: schema_from_values
input_mode: function
solution_sketch: Collect every column name, and for each gather the type-names of its present values; a single shared name becomes the base, multiple names become "mixed", and a column missing from any row gets an "optional " prefix.
sample_solution: |
  from typing import Any


  def _type_name(value: Any) -> str:
      if value is None:
          return "null"
      if isinstance(value, bool):
          return "bool"
      if isinstance(value, int):
          return "int"
      if isinstance(value, float):
          return "float"
      return "str"


  def schema_from_values(records: list[dict[str, Any]]) -> dict[str, str]:
      total = len(records)
      columns: list[str] = []
      for record in records:
          for key in record:
              if key not in columns:
                  columns.append(key)
      schema: dict[str, str] = {}
      for column in columns:
          present = [_type_name(r[column]) for r in records if column in r]
          names = set(present)
          base = next(iter(names)) if len(names) == 1 else "mixed"
          if len(present) < total:
              schema[column] = "optional " + base
          else:
              schema[column] = base
      return schema
