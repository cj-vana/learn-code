  originality_notes: Original safe-traversal drill framed around walking a nested settings tree for a small observatory's telescope rig, returning a default on any missing or non-dict step.
prompt_markdown: |
  A small observatory stores its telescope settings as a tree of nested
  dictionaries. Reading a deep value like "mount, tracking, rate" is risky: any
  level along the way might be missing, or might not even be a dictionary. You are
  writing the safe reader that never raises, it returns a default instead.

  Read the signature:

  ```python
  def safe_get(job: dict[str, Any]) -> Any:
  ```

  The return annotation is `Any` because the value at the end of the path could be
  anything, an int, a string, a nested dict, and the default could be a different
  type again.

  `job` has three keys:

  - `"data"`: the nested-dictionary tree.
  - `"path"`: a list of keys to follow in order, for example `["mount", "tracking", "rate"]`.
  - `"default"`: the value to return if the path cannot be fully followed.

  Walk the path one key at a time starting from `"data"`. At each step, if the
  current value is **not a dictionary**, or it **does not contain** the next key,
  stop immediately and return `"default"`. If you consume the whole path, return
  the value you landed on, even if that value is falsy like `0` or an empty string.
  An **empty path** returns `"data"` itself unchanged.

  Example:

  ```python
  safe_get({
      "data": {"mount": {"tracking": {"rate": 15}}},
      "path": ["mount", "tracking", "rate"],
      "default": None,
  })
  # -> 15
  ```
starter_code: |
  from typing import Any


  def safe_get(job: dict[str, Any]) -> Any:
      return job["default"]
function_name: safe_get
input_mode: function
solution_sketch: Start at job["data"] and iterate the path; before each descent, bail out to the default if the current value is not a dict or lacks the key, otherwise step into it. Return the final value after the loop.
sample_solution: |
  from typing import Any


  def safe_get(job: dict[str, Any]) -> Any:
      current: Any = job["data"]
      for key in job["path"]:
          if not isinstance(current, dict) or key not in current:
              return job["default"]
          current = current[key]
      return current
hints:
  - level: 1
    text: Keep a running "current" value that starts at job["data"] and moves one key deeper each iteration over job["path"].
  - level: 2
    text: Before stepping into a key, guard with isinstance(current, dict) and key in current; if either fails, return job["default"] right away.
  - level: 3
    text: After the loop finishes with no bail-out, return current itself, which is correct even when the landed value is 0 or an empty string; an empty path returns the original data.
