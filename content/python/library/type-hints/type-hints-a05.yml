explanation_markdown: |
  Safe traversal is a guard-as-you-go loop. You keep a single `current` reference
  and, before every descent, ask two questions: is `current` still a dictionary,
  and does it contain the next key? Answering "no" to either means the path is
  broken, so you return the default and stop. This is why a value part-way down that
  turns out to be an `int` or a `str` does not crash the walk, the `isinstance`
  check catches it before you try to index into a non-dict.

  Returning `current` after the loop, rather than something like
  `current or default`, is what preserves a legitimately falsy result such as `0`
  or `""`. And because the loop body never runs for an empty path, `current` is
  still the original tree, which is the natural "you asked for nothing, here is
  everything" answer.
common_mistakes:
  - Indexing current[key] without first checking isinstance(current, dict), which raises TypeError when a mid-path value is an int or string.
  - Returning current or default at the end, which wrongly swaps in the default when the real value is 0 or an empty string.
  - Catching a missing key only at the first level and assuming deeper levels are always present.
