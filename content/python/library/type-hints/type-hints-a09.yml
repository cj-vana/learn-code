function_name: duck_call
input_mode: function
solution_sketch: Iterate over job["shapes"]; branch on each piece's "kind" to compute a circle or rectangle area rounded to two decimals, appending None for any unrecognised kind, and return the list of results.
sample_solution: |
  import math
  from typing import Any


  def duck_call(job: dict[str, Any]) -> list[Any]:
      areas: list[Any] = []
      for shape in job["shapes"]:
          kind = shape["kind"]
          if kind == "circle":
              areas.append(round(math.pi * shape["r"] * shape["r"], 2))
          elif kind == "rect":
              areas.append(round(shape["w"] * shape["h"], 2))
          else:
              areas.append(None)
      return areas
hints:
  - level: 1
