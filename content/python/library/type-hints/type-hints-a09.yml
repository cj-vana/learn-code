prompt_markdown: |
  A stained-glass studio prices each piece of an order by its glass area. Every
  piece in the cutting list is a small dictionary that declares its `"kind"`, and
  the fields that follow depend on that kind -- a structural union the pricer has
  to dispatch on.

  Write `duck_call(job)` that takes **one dictionary** with (at least) this entry:

  - `"shapes"`: a list of piece dictionaries. A circle looks like
    `{"kind": "circle", "r": <radius>}`; a rectangle looks like
    `{"kind": "rect", "w": <width>, "h": <height>}`.

  Return a **list of areas**, one per piece in order, each **rounded to 2 decimal
  places**:

  - For a circle, the area is `pi * r * r` using `math.pi`.
  - For a rectangle, the area is `w * h`.
  - For any **other** `"kind"` (a shape the pricer does not recognise), put `None`
    in that position instead of a number. Do not read any size fields off an
    unrecognised piece.

  The `job` dictionary may carry other unrelated keys; ignore them and read only
  `"shapes"`.

  Example call:

  ```python
  duck_call({"shapes": [{"kind": "circle", "r": 2},
                        {"kind": "rect", "w": 4, "h": 5}]})
  # -> [12.57, 20]
  ```

  An empty shape list returns an empty list.
starter_code: |
