explanation_markdown: |
  Each piece is a tagged record, and the `"kind"` field is the discriminator that
  tells the pricer which other fields are present and which formula applies. This
  is structural dispatch: instead of one universal area formula, you branch on the
  tag and only then reach for the fields that tag guarantees. Guarding the unknown
  case with `None` -- and importantly, not reading `r`, `w`, or `h` off a shape
  you do not recognise -- keeps the function from crashing on a malformed or
  future piece.

  `round(value, 2)` gives the two-decimal price figure. When a rectangle's sides
  are whole numbers the product is an integer and rounding leaves it an integer,
  which compares equal to the same value written with decimals. The pass is linear
  in the number of pieces, and it reads only the `"shapes"` key so extra metadata
  on the job is harmless.
common_mistakes:
  - Reading r, w, or h before checking the kind, which raises a KeyError on an unrecognised piece instead of yielding None.
  - Forgetting to round, so measured circles return long floating-point tails that do not match the expected prices.
  - Using r squared as r + r or 2 * r rather than r * r, which computes the wrong circle area.
