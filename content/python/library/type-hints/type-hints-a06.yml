explanation_markdown: |
  This is the `Optional` idea made concrete. When a field's type is `T | None`, the
  `None` stands for "no value here", and merging with defaults is how you turn that
  optional field into a definite one. Starting the result from a copy of the
  defaults, then overlaying only the record's non-`None` entries, expresses the rule
  in two lines and never mutates the inputs.

  The discipline that makes it correct is testing `value is not None` rather than a
  truthiness check. A blank slot is specifically `None`; a `0`, an empty string, or
  a `False` is a deliberate answer the customer gave, so it must survive. Testing
  truthiness would wrongly wipe those real choices and refill them from the house
  defaults. And because a `None` field is never copied in, one that has no default
  simply never appears in the finished order.
common_mistakes:
  - Filtering with a truthiness test like "if value:" instead of "if value is not None:", which discards real 0, "", and False values.
  - Mutating job["defaults"] or job["record"] in place instead of building and returning a new dictionary.
  - Copying every record field over the defaults first and only then trying to patch None slots, which overwrites good defaults with None.
