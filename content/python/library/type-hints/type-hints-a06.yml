prompt_markdown: |
  A sandwich shop's order form has a slot for every choice, but customers leave
  some slots blank. In the data, a blank slot arrives as `None`, meaning "not
  provided". The shop fills every blank from its house defaults before sending the
  order to the kitchen.

  Read the signature:

  ```python
  def apply_defaults(job: dict[str, Any]) -> dict[str, Any]:
  ```

  `job` has two keys:

  - `"record"`: the customer's order, where a value of `None` means the field was
    left blank.
  - `"defaults"`: the house defaults to fall back on.

  Return a **new dictionary** built like this:

  - Start from all of the `"defaults"`.
  - For each field in `"record"` whose value is **not `None`**, use the customer's
    value (overriding any default). A field whose value is `None` is treated as
    absent, so the default stays if there is one.
  - A `None` field with **no** matching default is simply left out of the result.

  Crucially, only `None` counts as blank. A real value like `0` or an empty string
  is a genuine choice and must be kept, never replaced by a default.

  Example:

  ```python
  apply_defaults({
      "record": {"bread": "rye", "cheese": None},
      "defaults": {"bread": "white", "cheese": "cheddar"},
  })
  # -> {"bread": "rye", "cheese": "cheddar"}
  ```
starter_code: |
  from typing import Any


  def apply_defaults(job: dict[str, Any]) -> dict[str, Any]:
      return dict(job["defaults"])
function_name: apply_defaults
input_mode: function
solution_sketch: Copy the defaults into a new dict, then overlay only the record entries whose value is not None so that None (absent) leaves the default in place and a missing default drops the key entirely.
sample_solution: |
  from typing import Any


  def apply_defaults(job: dict[str, Any]) -> dict[str, Any]:
      record = job["record"]
      defaults = job["defaults"]
      result: dict[str, Any] = dict(defaults)
      for key, value in record.items():
          if value is not None:
              result[key] = value
      return result
hints:
  - level: 1
    text: Begin with a fresh copy of the defaults using dict(job["defaults"]) so the caller's dictionaries are never mutated.
  - level: 2
    text: Loop over the record's items and only copy a value into the result when value is not None, letting None fields keep whatever default exists.
  - level: 3
    text: Because you start from the defaults and never add None values, a None field without a default simply never appears, while a real 0 or "" is copied over normally.
