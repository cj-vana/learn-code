explanation_markdown: |
  Type hints describe what a function accepts and returns, but they do not convert
  anything at runtime, that is your job. The union `int | str | float` is a promise
  about the possible types, and `isinstance` lets you narrow to the exact branch
  you are in so you know which conversion applies.

  The one detail to get right is truncation direction. `int()` on a float drops the
  fractional part toward zero, so `20.9` becomes `20` and `-2.9` becomes `-2`. That
  differs from `math.floor`, which would push `-2.9` down to `-3`. Because `int()`
  also parses whole-number text, both the `str` and `float` branches funnel through
  the same call, and the `int` branch just keeps the value unchanged.
common_mistakes:
  - Returning the raw values unchanged, so the result still contains strings and floats instead of the promised list[int].
  - Using math.floor for the float case, which rounds -2.9 down to -3 instead of truncating toward zero to -2.
  - Assuming type hints coerce values automatically; the annotation list[int] does not convert anything, you must build the ints yourself.
