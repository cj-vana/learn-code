prompt_markdown: |
  A darts league collects handwritten scorecards, and by the time the numbers
  reach the spreadsheet they are a mess of runtime types: some scores are already
  whole numbers, some were typed as text like `"17"`, and some arrived as decimals
  such as `20.0` from a averaging tool. You need one clean list of integers.

  Read the signature carefully:

  ```python
  def coerce_to_int(values: list[int | str | float]) -> list[int]:
  ```

  The parameter annotation `list[int | str | float]` tells you each element is one
  of three types, and the return annotation `list[int]` promises the caller a list
  of plain integers. Convert each value in order:

  - An `int` is kept as-is.
  - A `str` holds a whole number written as text (for example `"42"`); parse it to
    an `int`.
  - A `float` is **truncated toward zero**, so `20.9` becomes `20` and `-2.9`
    becomes `-2` (not `-3`).

  Return a **new list** of ints in the same order. An empty input returns an empty
  list.

  Example:

  ```python
  coerce_to_int(["17", 20.9, 5])  # -> [17, 20, 5]
  ```
starter_code: |
  def coerce_to_int(values: list[int | str | float]) -> list[int]:
      return []
function_name: coerce_to_int
input_mode: function
solution_sketch: Loop over the values, branch on isinstance for str vs float, and build a new list where each element is converted to int (int() truncates floats toward zero).
sample_solution: |
  def coerce_to_int(values: list[int | str | float]) -> list[int]:
      result: list[int] = []
      for value in values:
          if isinstance(value, str):
              result.append(int(value))
          elif isinstance(value, float):
              result.append(int(value))
          else:
              result.append(value)
      return result
hints:
