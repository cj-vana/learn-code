explanation_markdown: |
  Counting is a two-part job. First walk the log once, using a dict to hold a
  running total for each name; `counts.get(name, 0) + 1` handles both the first
  sighting and every repeat in O(1). Once the totals are built, the number of
  repeat donors is simply how many totals are 2 or more, which a generator
  expression sums up cleanly. The whole thing is O(n) over the log.
common_mistakes:
  - Counting total donations instead of how many donors reached two or more.
  - Using >= 1 or > 2 for the threshold instead of >= 2.
  - Assuming a donor appears at most twice, so a triple gets miscounted.
