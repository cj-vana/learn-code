prompt_markdown: |
  A mobile blood drive records the first name of every donor each time they give
  blood across the whole season. Some people donate several times, so a name can
  appear more than once in the log.
  Write `count_repeat_donors(names)` that returns how many distinct donors gave
  blood at least twice. An empty log returns 0.
starter_code: |
  def count_repeat_donors(names):
      return 0
function_name: count_repeat_donors
input_mode: function
solution_sketch: Tally each name in a dict, then count how many names reached a total of two or more.
sample_solution: |
  def count_repeat_donors(names):
      counts = {}
      for name in names:
          counts[name] = counts.get(name, 0) + 1
      return sum(1 for total in counts.values() if total >= 2)
hints:
  - level: 1
    text: First figure out how many times each name shows up in the log.
  - level: 2
    text: A dict mapping name to running total lets you build every count in one pass.
  - level: 3
    text: After counting, count the entries whose total is at least 2.
