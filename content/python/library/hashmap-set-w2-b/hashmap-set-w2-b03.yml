explanation_markdown: |
  Counting the sessions per station is the O(n) first step. The tricky part is the
  tie-break: `max(counts.values())` gives the winning total, but several stations
  can share it. Collect all of those leaders and take `min(...)` to pick the
  alphabetically first name. Guarding the empty case up front keeps `max()` from
  raising on an empty sequence.
common_mistakes:
  - Returning the first station that reaches the top count instead of the alphabetically first.
  - Calling max() on the counts before handling the empty-log case.
  - Comparing counts by station name rather than by session total.
