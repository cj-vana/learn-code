prompt_markdown: |
  An electric-vehicle network logs the station name used for every charging
  session in a day. Write `busiest_station(sessions)` that returns the station
  that handled the most sessions. If two or more stations tie for the most, return
  the one whose name comes first alphabetically. An empty log returns an empty
  string.
starter_code: |
  def busiest_station(sessions):
      return ""
function_name: busiest_station
input_mode: function
solution_sketch: Tally sessions per station, find the highest total, then return the alphabetically first station reaching it.
sample_solution: |
  def busiest_station(sessions):
      counts = {}
      for station in sessions:
          counts[station] = counts.get(station, 0) + 1
      if not counts:
          return ""
      top = max(counts.values())
      leaders = [station for station, total in counts.items() if total == top]
      return min(leaders)
hints:
  - level: 1
    text: Start by counting how many sessions each station handled.
  - level: 2
    text: The largest value in your counts dict is the winning session total.
  - level: 3
    text: Gather every station tied at that top total, then return the smallest name with min().
