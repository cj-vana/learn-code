explanation_markdown: |
  A set is the natural tool when you care about "which distinct values appeared"
  rather than how often. Adding an element that is already present is a no-op, so
  after one pass the set holds exactly the unique guest names. Its length is the
  answer, and each add and membership check is O(1), making the scan O(n) overall.
common_mistakes:
  - Returning the length of the original list, which double-counts repeat guests.
  - Trying to track seen names in a list, which makes each check O(n).
  - Forgetting that an empty season should return 0.
