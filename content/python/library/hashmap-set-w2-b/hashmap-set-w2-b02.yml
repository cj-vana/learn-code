prompt_markdown: |
  A weekly podcast lists the guest featured on every episode of a season. Popular
  guests come back for several episodes, so the same name can appear many times.
  Write `count_distinct_guests(guests)` that returns how many different people
  appeared at least once. An empty season returns 0.
starter_code: |
  def count_distinct_guests(guests):
      return 0
function_name: count_distinct_guests
input_mode: function
solution_sketch: Collect the names in a set so duplicates collapse, then return its size.
sample_solution: |
  def count_distinct_guests(guests):
      seen = set()
      for guest in guests:
          seen.add(guest)
      return len(seen)
hints:
  - level: 1
    text: Repeated names should only be counted once.
  - level: 2
    text: A set automatically discards duplicates as you add each name.
  - level: 3
    text: Build a set from the list and return how many elements it holds.
