prompt_markdown: |
  A community repair workshop has a list of supplies each session requires and a
  separate list of what is currently on the stock shelf. Either list may contain
  duplicates. Write `missing_supplies(data)` where `data` is a dict with keys
  `required` and `in_stock`, each a list of supply names. Return a sorted list of
  the distinct required supplies that are not on the shelf. If nothing is missing,
  return an empty list.
starter_code: |
  def missing_supplies(data):
      return []
function_name: missing_supplies
input_mode: function
solution_sketch: Turn both lists into sets and return the sorted difference of required minus in_stock.
sample_solution: |
  def missing_supplies(data):
      required = set(data["required"])
      in_stock = set(data["in_stock"])
      return sorted(required - in_stock)
hints:
  - level: 1
    text: You need the required supplies that never appear on the stock shelf.
  - level: 2
    text: Sets make "is this item in stock?" an O(1) check and drop duplicates for free.
  - level: 3
    text: The set difference required - in_stock is exactly the missing items; sort it before returning.
tests:
  public:
    - name: empty
      input: {required: [], in_stock: []}
