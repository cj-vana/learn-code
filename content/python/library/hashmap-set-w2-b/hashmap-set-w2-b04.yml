explanation_markdown: |
  Membership questions like "which required items are not stocked?" are what set
  difference is built for. Converting both lists to sets collapses duplicates and
  makes every lookup O(1); `required - in_stock` keeps only the items present in
  the first set but absent from the second. Sorting the result gives a stable,
  predictable order to hand back to the workshop.
common_mistakes:
  - Returning in_stock - required, which lists surplus stock instead of gaps.
  - Forgetting to sort, leaving the result in unpredictable set order.
  - Looping with `in` over the raw lists, which is slower and keeps duplicates.
