prompt_markdown: |
  A ferry terminal keeps two separate boarding lists, each already sorted by
  departure minute: one for early sailings and one for late sailings. The
  dispatcher wants a single combined list of departure minutes in
  non-decreasing order.

  Write `merge_schedules(data)` where `data` is a dict with keys `early` and
  `late`, each a list of ints sorted in non-decreasing order. Return one merged
  list containing every minute from both lists, still sorted. Either list may be
  empty.
starter_code: |
  def merge_schedules(data):
      return []
function_name: merge_schedules
input_mode: function
solution_sketch: Advance one index per list, always copying the smaller front value, then append whatever remains.
sample_solution: |
  def merge_schedules(data):
      early = data["early"]
      late = data["late"]
      i = 0
      j = 0
      merged = []
      while i < len(early) and j < len(late):
          if early[i] <= late[j]:
              merged.append(early[i])
              i += 1
          else:
              merged.append(late[j])
              j += 1
      merged.extend(early[i:])
      merged.extend(late[j:])
      return merged
hints:
  - level: 1
    text: Keep a separate index for each list and compare the values sitting at the front of both.
  - level: 2
    text: Append the smaller of the two front values and advance only that list's index.
  - level: 3
    text: When one list is exhausted, append everything left in the other list in order.
