explanation_markdown: |
  Two pointers, one per sorted list, let you merge without re-sorting. At each
  step the smaller front value is the next value overall, so you copy it and
  advance only that list. Once either pointer runs off the end, the other list
  is already sorted, so you can append its remaining slice directly. Using `<=`
  when the fronts tie keeps the merge stable and touches each value exactly
  once, giving an O(m + n) pass.
common_mistakes:
  - Advancing both indices on every step instead of only the one you copied from.
  - Forgetting to append the leftover tail after one list empties.
  - Rebuilding and sorting a combined list, which ignores the two-pointer idea.
