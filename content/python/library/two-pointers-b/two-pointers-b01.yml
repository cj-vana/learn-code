      expected: true
explanation_markdown: |
  Sorted data lets two pointers sweep toward each other. Starting from the two
  ends, the sum of `prices[left] + prices[right]` tells you which way to move:
  if it is below `target`, only a larger cheap-side value can help, so `left`
  advances; if it is above `target`, only a smaller pricey-side value can help,
  so `right` retreats. Each step discards a value that cannot belong to any
  valid pair, so the whole scan runs in one O(n) pass without nested loops.
common_mistakes:
  - Comparing a pastry with itself instead of requiring two different positions.
  - Moving the wrong pointer, which skips over the matching pair.
  - Forgetting to stop the loop when the two pointers meet.
