prompt_markdown: |
  A neighborhood bakery lists its pastry prices in cents, already sorted from
  cheapest to most expensive. A customer holds a gift card worth exactly
  `target` cents and wants to spend it on precisely two different pastries.

  Write `has_gift_card_pair(data)` where `data` is a dict with keys `prices`
  (a list of ints in non-decreasing order) and `target` (an int). Return `True`
  if two pastries at different positions add up to exactly `target`, otherwise
  `False`. An empty price list returns `False`.
starter_code: |
  def has_gift_card_pair(data):
      return False
function_name: has_gift_card_pair
input_mode: function
solution_sketch: Walk one pointer from the cheap end and one from the pricey end, moving inward based on the running sum.
sample_solution: |
  def has_gift_card_pair(data):
      prices = data["prices"]
      target = data["target"]
      left = 0
      right = len(prices) - 1
      while left < right:
          total = prices[left] + prices[right]
          if total == target:
              return True
          if total < target:
              left += 1
          else:
              right -= 1
      return False
hints:
  - level: 1
    text: Because the prices are sorted, you can start one index at the cheapest pastry and one at the most expensive.
  - level: 2
    text: Compare the sum of the two ends to the target; if the sum is too small the cheap end must move up, and if it is too big the pricey end must move down.
  - level: 3
    text: Loop while left is less than right, returning True on an exact match and False once the pointers meet.
tests:
  public:
    - name: empty
      input: { prices: [], target: 500 }
      expected: false
    - name: pair_found
      input: { prices: [100, 200, 400, 700], target: 600 }
      expected: true
    - name: no_pair
      input: { prices: [100, 200, 300], target: 1000 }
      expected: false
