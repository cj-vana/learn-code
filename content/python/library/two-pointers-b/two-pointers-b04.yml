prompt_markdown: |
  A jewelry maker lays out a straight strip of colored beads and wants it to
  read the same from either end, like a mirror. Each bead is a short color code
  string. A strip is a perfect mirror when the first bead matches the last, the
  second matches the second-to-last, and so on.

  Write `count_mismatches(beads)` that returns how many mirrored positions fail
  to match. Compare position `i` from the start against position `i` from the
  end and count each pair whose colors differ. For an odd-length strip the
  center bead pairs with itself and never counts. An empty strip returns 0.
starter_code: |
  def count_mismatches(beads):
      return 0
function_name: count_mismatches
input_mode: function
solution_sketch: Walk one pointer inward from each end, counting each pair of beads that do not match.
sample_solution: |
  def count_mismatches(beads):
      left = 0
      right = len(beads) - 1
      breaks = 0
      while left < right:
          if beads[left] != beads[right]:
              breaks += 1
          left += 1
          right -= 1
      return breaks
hints:
  - level: 1
    text: Pair the bead at the start with the bead at the end, then step both pointers toward the middle.
  - level: 2
    text: Each time a mirrored pair of colors differs, add one to a running count of breaks.
  - level: 3
    text: Stop once left reaches or passes right so the middle bead of an odd strip is never double-counted.
