explanation_markdown: |
  Checking mirror symmetry is a natural fit for two pointers starting at the ends
  and closing inward. Each loop step compares one symmetric pair, `beads[left]`
  against `beads[right]`, and tallies a break when they differ. Because both
  pointers move one step per iteration, every pair is examined exactly once and
  the loop ends when they meet, so an odd-length center bead is skipped. The scan
  runs in O(n) with no reversed copy of the strip.
common_mistakes:
  - Looping past the middle so each pair is counted twice.
  - Counting the lone center bead of an odd-length strip as a mismatch.
  - Building a reversed copy and comparing whole strips instead of pairing positions.
