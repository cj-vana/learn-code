prompt_markdown: |
  A warehouse shelf is described by a list of stock counts, one per slot. A
  count of `0` means that slot is sold out. Staff want every sold-out slot
  pushed to the end of the shelf, while the slots that still hold stock keep
  their original left-to-right order.

  Write `settle_stock(counts)` that returns a new list with all non-zero counts
  first, in their original order, followed by every `0`. An empty list returns
  an empty list.
starter_code: |
  def settle_stock(counts):
      return []
function_name: settle_stock
input_mode: function
solution_sketch: Use a write pointer for the next in-stock slot and a read pointer that scans forward, swapping non-zero values into place.
sample_solution: |
  def settle_stock(counts):
      result = list(counts)
      write = 0
      for read in range(len(result)):
          if result[read] != 0:
              result[write], result[read] = result[read], result[write]
              write += 1
      return result
hints:
  - level: 1
    text: Keep one pointer marking where the next in-stock value belongs and another that reads across the whole shelf.
  - level: 2
    text: When the read pointer finds a non-zero count, place it at the write pointer and then move the write pointer forward.
  - level: 3
    text: Swapping the read and write positions keeps the non-zero counts in order while zeros drift toward the back.
