explanation_markdown: |
  Two pointers moving in the same direction give a stable partition in one pass.
  The `write` pointer marks the next spot reserved for an in-stock count, and the
  `read` pointer scans every slot. Whenever `read` finds a non-zero count, it is
  swapped into the `write` slot and `write` advances, so in-stock values land in
  their original order while sold-out zeros accumulate behind them. The scan is
  O(n) and needs no extra list beyond the copy that keeps the input untouched.
common_mistakes:
  - Only moving the read pointer when advancing write, which reorders the in-stock counts.
  - Copying the zeros forward first and losing the original order of the stocked slots.
  - Treating any falsy value the same as 0 without checking the count itself.
