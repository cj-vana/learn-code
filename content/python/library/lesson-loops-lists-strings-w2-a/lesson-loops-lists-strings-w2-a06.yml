body_markdown: |
  A string is a sequence of characters, so a `for` loop can walk it just like
  a list. Each pass, the loop variable holds a single character. That makes
  counting or scanning letters straightforward.

  ```python
  word = "banana"
  count = 0
  for letter in word:
      if letter == "a":
          count += 1
  # count is 3
  ```

  The loop runs once per character, so for `"banana"` it runs six times. You do
  not index into the string yourself; the loop delivers each character in
  order, from the first to the last.
