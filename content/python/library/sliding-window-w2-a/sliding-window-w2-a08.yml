prompt_markdown: |
  A museum records daily attendance. To flag a slump, staff compare each `k`-day
  window's total with the very next `k`-day window (shifted one day later) and
  look for the sharpest fall. Write `biggest_attendance_drop(data)` returning the
  largest drop, meaning the previous window's total minus the next window's total,
  taken over all neighboring window pairs. If totals never fall, return `0`.

  `data` is a dict: `{"counts": [...], "k": k}`. `k` is at least 1 and no larger
  than the number of days.
starter_code: |
  def biggest_attendance_drop(data):
      return 0
function_name: biggest_attendance_drop
input_mode: function
solution_sketch: Slide a running k-day sum and track the largest decrease between each window total and the previous one.
sample_solution: |
  def biggest_attendance_drop(data):
      counts = data["counts"]
      k = data["k"]
      window = sum(counts[:k])
      prev = window
      biggest = 0
      for i in range(k, len(counts)):
          window += counts[i] - counts[i - k]
          drop = prev - window
          if drop > biggest:
              biggest = drop
          prev = window
      return biggest
hints:
  - level: 1
    text: Each step to the right gives the next window's total; compare it with the one before.
  - level: 2
    text: A drop is previous total minus current total, so a rise makes the drop negative.
  - level: 3
    text: Keep the largest positive drop; if none occurs the answer stays 0.
