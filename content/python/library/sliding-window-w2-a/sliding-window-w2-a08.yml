explanation_markdown: |
  Sliding a fixed-size running sum yields each window total in order. Comparing a
  window with the one just before it (`prev - window`) measures the change; a
  positive value is a drop and a negative one is a rise. Tracking the largest drop
  finds the sharpest slump, and starting the answer at `0` means a season that
  only grows reports no drop at all.
common_mistakes:
  - Forgetting to update prev to the current total after each comparison.
  - Reporting the change as an absolute value, which turns rises into fake drops.
  - Returning a negative number instead of 0 when totals never fall.
