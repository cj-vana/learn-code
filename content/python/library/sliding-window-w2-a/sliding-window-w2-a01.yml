prompt_markdown: |
  A warehouse records the stock level on a shelf at the end of each hour. For a
  rolling report it needs the highest level seen in every `k` consecutive hours.
  Write `peak_shelf_stock(data)` returning a list where each entry is the maximum
  level across one window of `k` hours, scanning windows left to right.

  `data` is a dict: `{"levels": [...], "k": k}`. You may assume `k` is at least 1
  and no larger than the number of recorded hours.
starter_code: |
  def peak_shelf_stock(data):
      return []
function_name: peak_shelf_stock
input_mode: function
solution_sketch: For each window start take the max of that k-length slice and collect the results in order.
sample_solution: |
  def peak_shelf_stock(data):
      levels = data["levels"]
      k = data["k"]
      result = []
      for start in range(len(levels) - k + 1):
          result.append(max(levels[start:start + k]))
      return result
hints:
  - level: 1
    text: There is one output value for every window, so the result length is len(levels) - k + 1.
  - level: 2
    text: A window that starts at index start covers levels[start:start + k].
  - level: 3
    text: Append max(levels[start:start + k]) for each start from 0 up to len(levels) - k.
