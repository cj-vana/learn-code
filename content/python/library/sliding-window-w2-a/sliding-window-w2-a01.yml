explanation_markdown: |
  Each window of `k` hours produces exactly one peak, so the report has
  `len(levels) - k + 1` entries. Sliding the start index one hour at a time and
  taking `max` of the slice keeps the windows in order. Recomputing the max per
  window is simple and clear; a deque could make it O(n), but the direct scan is
  fine for report-sized data.
common_mistakes:
  - Looping the start index past len(levels) - k, which slices a short final window.
  - Returning only the single largest level instead of one peak per window.
  - Building the output in the wrong order by iterating from the right.
