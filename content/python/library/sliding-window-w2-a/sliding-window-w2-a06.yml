      return 0
function_name: best_booth_window
input_mode: function
solution_sketch: Slide a running k-day sum and remember the start index whenever a strictly larger total appears.
sample_solution: |
  def best_booth_window(data):
      sales = data["sales"]
      k = data["k"]
      window = sum(sales[:k])
      best = window
      best_start = 0
      for i in range(k, len(sales)):
          window += sales[i] - sales[i - k]
          if window > best:
              best = window
              best_start = i - k + 1
      return best_start
hints:
