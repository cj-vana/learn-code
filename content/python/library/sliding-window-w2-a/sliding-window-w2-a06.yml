explanation_markdown: |
  A fixed-size running sum lets every window be compared in constant time. The
  start index of a window ending at `i` is `i - k + 1`, so the code records that
  index whenever it finds a strictly larger total. Because the update uses `>`
  and not `>=`, the first of several equal-best stretches wins the tie.
common_mistakes:
  - Returning the ending index instead of the starting index i - k + 1.
  - Using >= so a later tie overwrites the earliest best start.
  - Rebuilding the window sum from scratch each step instead of adjusting it.
