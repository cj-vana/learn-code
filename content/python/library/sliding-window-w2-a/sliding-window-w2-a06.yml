prompt_markdown: |
  A festival ticket booth records daily sales for a whole season. Organizers want
  to reprint the banner for the best `k`-day stretch. Write
  `best_booth_window(data)` returning the starting day index (0-based) of the
  `k` consecutive days with the highest total sales. If several stretches tie,
  return the earliest starting index.

  `data` is a dict: `{"sales": [...], "k": k}`. `k` is at least 1 and no larger
  than the number of days.
starter_code: |
