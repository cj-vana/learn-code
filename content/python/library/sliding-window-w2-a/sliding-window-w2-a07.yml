      return 0
function_name: busiest_platform_window
input_mode: function
solution_sketch: For each fixed-size window count departures per platform and keep the largest single-platform count.
sample_solution: |
  def busiest_platform_window(data):
      departures = data["departures"]
      k = data["k"]
      best = 0
      for start in range(len(departures) - k + 1):
          counts = {}
          for label in departures[start:start + k]:
              counts[label] = counts.get(label, 0) + 1
          top = max(counts.values())
          if top > best:
              best = top
      return best
