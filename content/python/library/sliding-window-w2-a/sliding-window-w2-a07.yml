explanation_markdown: |
  Each fixed-size window is summarized by a small count dictionary mapping every
  platform to how often it appears; the busiest platform is the largest value in
  that dict. Sliding the window across the log and keeping the biggest single
  count answers the question. Rebuilding the dict per window is easy to read; a
  running dict that adds the entering label and drops the leaving one would make
  it O(n) if the logs grew large.
common_mistakes:
  - Counting distinct platforms in the window instead of the top single-platform count.
  - Taking max over the labels rather than over the count values.
  - Sliding the start index past len(departures) - k and reading a short window.
