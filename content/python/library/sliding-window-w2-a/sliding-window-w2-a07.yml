prompt_markdown: |
  A station logs which platform each train leaves from, in departure order. To
  spot crowding, dispatch wants the busiest single platform inside any `k`
  consecutive departures. Write `busiest_platform_window(data)` returning the
  largest number of departures that share one platform within a window of `k`
  departures.

  `data` is a dict: `{"departures": [...], "k": k}`. Each entry is a platform
  label, and `k` is at least 1 and no larger than the number of departures.
starter_code: |
