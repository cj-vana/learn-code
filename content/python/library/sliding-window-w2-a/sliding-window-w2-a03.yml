prompt_markdown: |
  Crates wait in a single line on a loading dock, each with a positive weight. A
  forklift can only lift a block of consecutive crates. Write
  `fewest_crates(data)` returning the smallest number of consecutive crates whose
  weights add up to at least `target`, or `0` if no run of crates reaches the
  target.

  `data` is a dict: `{"weights": [...], "target": target}`. All weights are
  positive integers.
starter_code: |
  def fewest_crates(data):
      return 0
function_name: fewest_crates
input_mode: function
solution_sketch: Extend a running-sum window to the right, and while it meets the target shrink from the left, recording the shortest qualifying length.
sample_solution: |
  def fewest_crates(data):
      weights = data["weights"]
      target = data["target"]
      left = 0
      total = 0
      best = 0
      for right in range(len(weights)):
          total += weights[right]
          while total >= target:
              length = right - left + 1
              if best == 0 or length < best:
                  best = length
              total -= weights[left]
              left += 1
      return best
hints:
  - level: 1
    text: Keep a running total of the crates currently in the window instead of re-adding them.
  - level: 2
    text: Once the total reaches the target, try removing crates from the left to find a shorter run.
  - level: 3
    text: Record right - left + 1 each time the window qualifies, then subtract weights[left] and advance left.
