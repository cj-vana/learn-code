explanation_markdown: |
  A variable-size window keeps a running sum of the crates it holds. The right
  edge adds crates until the target is met; then the left edge removes crates as
  long as the window still qualifies, which finds the shortest run ending at each
  position. Because weights are positive, shrinking always lowers the total, so
  the window logic is sound. Each crate is added and removed once, giving an O(n)
  scan; `0` signals that no run ever reaches the target.
common_mistakes:
  - Seeding best to a real length so an impossible case cannot return 0.
  - Using > instead of >= and missing a run that exactly meets the target.
  - Forgetting to subtract weights[left] before advancing the left edge.
