explanation_markdown: |
  Mapping greens to 1 and reds to 0 turns "count the greens" into "sum the
  window." Summing the first `k` flags seeds the count, and each slide adds the
  entering intersection while removing the one that left, so the whole commute is
  scanned in O(n). Keeping the largest window total gives the greenest stretch.
common_mistakes:
  - Recounting greens in each window instead of adjusting the running total.
  - Comparing the strings directly and forgetting to convert them to 0 and 1.
  - Starting best at 0 works here, but only because counts are never negative.
