function_name: greenest_stretch
input_mode: function
solution_sketch: Convert lights to 1 or 0, then slide a fixed-size running count and keep the largest window total.
sample_solution: |
  def greenest_stretch(data):
      lights = data["lights"]
      k = data["k"]
      flags = [1 if light == "green" else 0 for light in lights]
      window = sum(flags[:k])
      best = window
      for i in range(k, len(flags)):
          window += flags[i] - flags[i - k]
          if window > best:
              best = window
      return best
hints:
  - level: 1
    text: Treat each green light as 1 and each red light as 0 so counting becomes summing.
  - level: 2
    text: Sum the first k intersections, then slide one intersection at a time.
  - level: 3
    text: When the window moves, add flags[i] and subtract flags[i - k], tracking the max.
