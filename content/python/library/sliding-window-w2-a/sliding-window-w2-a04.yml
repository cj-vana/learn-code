prompt_markdown: |
  A cyclist maps the traffic lights along a commute in order; each intersection is
  either `"green"` or `"red"` at the moment they usually arrive. Write
  `greenest_stretch(data)` returning the greatest number of green lights found in
  any `k` consecutive intersections.

  `data` is a dict: `{"lights": [...], "k": k}`. Each entry is `"green"` or
  `"red"`, and `k` is at least 1 and no larger than the number of intersections.
starter_code: |
