explanation_markdown: |
  Stability is measured by how far apart the hottest and coolest readings sit, so
  each window's spread is `max(window) - min(window)`. Scanning every fixed-size
  window and keeping the smallest spread finds the calmest stretch. Seeding the
  best value with `None` lets the first real window set the baseline, which is
  cleaner than guessing a large starting number.
common_mistakes:
  - Comparing individual readings instead of each window's max-minus-min spread.
  - Seeding best with 0, which is wrong whenever no window is perfectly flat.
  - Letting the start index run past len(temps) - k and slicing a short window.
