prompt_markdown: |
  A greenhouse logs its temperature once an hour. Seedlings do best during the
  most stable stretch, meaning the `k` consecutive hours whose warmest and coolest
  readings are closest together. Write `steadiest_window(data)` returning the
  smallest spread (hottest minus coolest) across any window of `k` hours.

  `data` is a dict: `{"temps": [...], "k": k}`. `k` is at least 1 and no larger
  than the number of readings.
starter_code: |
  def steadiest_window(data):
      return 0
function_name: steadiest_window
input_mode: function
solution_sketch: For each fixed-size window compute max minus min and keep the smallest spread seen.
sample_solution: |
  def steadiest_window(data):
      temps = data["temps"]
      k = data["k"]
      best = None
      for start in range(len(temps) - k + 1):
          window = temps[start:start + k]
          spread = max(window) - min(window)
          if best is None or spread < best:
              best = spread
      return best
hints:
  - level: 1
    text: The spread of a window is its maximum reading minus its minimum reading.
  - level: 2
    text: Slide a window of k hours across the log and compute each spread.
  - level: 3
    text: Track the smallest spread; a window of size 1 always has a spread of 0.
