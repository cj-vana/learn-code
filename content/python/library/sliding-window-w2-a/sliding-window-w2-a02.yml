explanation_markdown: |
  A variable-size sliding window tracks the current all-distinct run. The right
  edge advances through every stall; whenever the incoming produce already sits in
  the window, the left edge advances (removing produce from the set) until the
  duplicate is cleared. Each stall enters and leaves the window at most once, so
  the scan is O(n), and the best span seen is the answer.
common_mistakes:
  - Restarting the run from scratch on a repeat instead of shrinking only from the left.
  - Forgetting to remove stalls[left] from the set as the left edge moves.
  - Measuring the run as right - left instead of right - left + 1.
