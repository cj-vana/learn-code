prompt_markdown: |
  Stalls along a farmers-market aisle are listed in order, each labeled by its
  headline produce. A "fresh run" is a stretch of consecutive stalls in which no
  produce repeats. Write `longest_fresh_run(stalls)` returning the length of the
  longest fresh run. An empty aisle returns `0`.

  `stalls` is a list of strings, one per stall in aisle order.
starter_code: |
  def longest_fresh_run(stalls):
      return 0
function_name: longest_fresh_run
input_mode: function
solution_sketch: Grow a window to the right, and when a produce repeats, shrink from the left until it is unique again, tracking the longest span.
sample_solution: |
  def longest_fresh_run(stalls):
      seen = set()
      left = 0
      best = 0
      for right in range(len(stalls)):
          while stalls[right] in seen:
              seen.remove(stalls[left])
              left += 1
          seen.add(stalls[right])
          span = right - left + 1
          if span > best:
              best = span
      return best
hints:
  - level: 1
