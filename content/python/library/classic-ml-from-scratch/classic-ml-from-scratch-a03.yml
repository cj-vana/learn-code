function_name: nearest_centroid
input_mode: function
solution_sketch: Loop over centroids tracking the smallest sum of squared differences and its index, using strict < so ties keep the earlier index.
sample_solution: |
  def nearest_centroid(job):
      point = job["point"]
      centroids = job["centroids"]
      best_index = 0
      best_dist = None
      for i, centroid in enumerate(centroids):
          dist = 0.0
          for x, y in zip(point, centroid):
              dist += (x - y) ** 2
          if best_dist is None or dist < best_dist:
              best_dist = dist
              best_index = i
      return best_index
