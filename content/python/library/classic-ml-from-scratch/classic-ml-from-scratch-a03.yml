prompt_markdown: |
  Nearest-centroid classification is one of the simplest ideas in machine
  learning: given a set of prototype vectors (centroids), a new example belongs to
  whichever prototype it sits closest to. It is also the "assign" half of the
  k-means clustering loop.

  An observatory summarises each star as a short spectrum vector, and keeps a
  catalogue of prototype spectra, one per star class. Write
  `nearest_centroid(job)` that takes a single dictionary with two keys:

  - `"point"`: the example vector, a list of numbers.
  - `"centroids"`: a non-empty list of centroid vectors, each the same length as
    `"point"`.

  Return the **index** of the centroid closest to `"point"` by Euclidean distance.
  If two centroids are exactly tied for closest, return the **lower** index.

  A useful shortcut: to find the *nearest* point you do not need the square root
  at all. The centroid with the smallest sum of squared differences is also the
  one with the smallest Euclidean distance, because square root is
  order-preserving. Comparing squared distances keeps the code exact and cheap.

  Example:

  ```python
  nearest_centroid({"point": [4.0, 4.0], "centroids": [[0.0, 0.0], [5.0, 5.0], [9.0, 1.0]]})
  # -> 1   (centroid [5.0, 5.0] is closest)
  ```
starter_code: |
