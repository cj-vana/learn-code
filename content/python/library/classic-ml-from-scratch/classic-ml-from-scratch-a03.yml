explanation_markdown: |
  The loop keeps a champion index and the squared distance that earned it. Each
  centroid challenges the champion, and it only wins when its squared distance is
  **strictly** smaller. That strict comparison is what breaks ties toward the
  lower index: when the new distance merely equals the current best, nothing
  changes, so the earliest qualifying centroid stays on top.

  Working with the sum of squared differences rather than the actual distance
  saves the square root entirely. Since `sqrt` is monotonic, whichever centroid
  minimises the squared distance also minimises the true distance, so the answer
  is identical while avoiding floating-point square roots and keeping the
  comparison exact.
common_mistakes:
  - Using <= instead of < when updating the best, which flips ties toward the higher index.
  - Seeding best_dist with 0 instead of None, so the first real centroid can never beat it.
  - Returning the centroid vector itself rather than its index.
