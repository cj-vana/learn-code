prompt_markdown: |
  A geology tutor labels beach pebbles by their mineral type. Each pebble is
  described by a small feature vector (for example `[width_mm, mass_g]`), and a
  handful of already-labelled pebbles form the training set. Given one new
  pebble, you classify it with **k-nearest-neighbours (kNN)**: find the `k`
  closest labelled pebbles and let them vote on the label.

  Write `knn_predict(job)` that takes a single dictionary:

  ```
  {
    "train": [[[3.0, 3.0], "quartz"], [[9.0, 9.0], "basalt"]],
    "query": [3.5, 3.2],
    "k": 1
  }
  ```

  - `train` is a list of `[point, label]` pairs. `point` is a list of numbers;
    `label` is a string.
  - `query` is the feature vector to classify (same length as each `point`).
  - `k` is how many nearest neighbours vote (`1 <= k <= len(train)`).

  Measure closeness with **Euclidean distance**: for two vectors `p` and `q`,
  `dist = sqrt(sum((p[i] - q[i]) ** 2 for i in range(len(p))))`.

  Selecting the `k` nearest and breaking ties deterministically:

  - Sort the training points by distance, ascending. If two points are exactly
    the same distance from the query, the one that appears **earlier in `train`**
    comes first (a stable, index-based tie-break).
  - Take the first `k` after that ordering. Count how many times each label
    appears among them.
  - Return the label with the most votes. If several labels tie for the most
    votes, return the one that is **alphabetically first**.

  Return the winning label as a string.
