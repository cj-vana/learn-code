explanation_markdown: |
  kNN is the simplest possible classifier: it stores the training data and, at
  prediction time, lets the closest examples vote. There is no "training" step
  beyond remembering the points, which is why it is called a *lazy* learner.

  The whole exercise is really about making the algorithm **deterministic**.
  Floating-point distances can tie, and vote counts can tie, so a robust
  implementation must define exactly what happens then. Here we pin down two
  rules: equal distances keep training order (so we carry the original index in
  each tuple and sort on `(distance, index)`), and equal vote counts fall back to
  alphabetical order. Sorting the tied labels and taking the first gives a single,
  reproducible answer every time.

  Cost is `O(n)` distance computations plus `O(n log n)` to sort, for `n`
  training points -- fine for the tiny datasets here, and the honest baseline
  every fancier classifier is measured against.
common_mistakes:
  - Breaking distance ties by label instead of by training-set order, which changes which neighbours are selected.
  - Returning the first label seen at the maximum count without sorting, so the alphabetical tie-break is skipped.
  - Forgetting to slice to the first k neighbours and letting every training point vote.
