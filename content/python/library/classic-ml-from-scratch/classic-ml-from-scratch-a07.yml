solution_sketch: Compute each training point's Euclidean distance to the query, sort by (distance, original index), take the first k labels, tally them in a dict, then return the label with the highest count breaking ties alphabetically.
sample_solution: |
  import math


  def knn_predict(job):
      train = job["train"]
      query = job["query"]
      k = job["k"]
      distances = []
      for index, (point, label) in enumerate(train):
          d = math.sqrt(sum((a - b) ** 2 for a, b in zip(point, query)))
          distances.append((d, index, label))
      distances.sort(key=lambda item: (item[0], item[1]))
      counts = {}
      for _, _, label in distances[:k]:
          counts[label] = counts.get(label, 0) + 1
      most = max(counts.values())
      winners = sorted(label for label, c in counts.items() if c == most)
      return winners[0]
