prompt_markdown: |
  A weather app publishes, for each day, the probability that it will rain. At the
  end of the month you grade those forecasts against what actually happened using
  **binary cross-entropy (BCE)** -- the standard loss for probability predictions.
  A confident-and-correct forecast costs almost nothing; a confident-and-wrong one
  costs a lot.

  Write `bce_loss(job)` that takes a single dictionary:

  ```
  {
    "predictions": [0.9, 0.1],
    "targets": [1, 0],
    "eps": 1e-7
  }
  ```

  - `predictions` is a list of predicted probabilities, each meant to lie in
    `[0, 1]`.
  - `targets` is the list of true labels, each `0` or `1` (same length as
    `predictions`).
  - `eps` is a small positive clipping constant.

  For each prediction `p` and target `y`:

  1. **Clip** the probability into `[eps, 1 - eps]`:
     `p_clipped = min(max(p, eps), 1 - eps)`. This keeps `p` strictly between 0
     and 1 so the logarithms below are always defined.
  2. The per-sample loss is
     `-(y * log(p_clipped) + (1 - y) * log(1 - p_clipped))`, where `log` is the
     natural logarithm.

  Return the **mean** per-sample loss over all samples, **rounded to 6 decimal
  places**.
