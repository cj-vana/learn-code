explanation_markdown: |
  Binary cross-entropy is the loss that trains logistic regression and every
  binary classifier that outputs a probability. The intuition lives in the two
  logarithms: if the truth is `y = 1`, you only pay `-log(p)`, which is near `0`
  when `p` is close to `1` and shoots up as `p` approaches `0`. The `(1 - y)`
  branch mirrors that for the `y = 0` case. Averaging over the batch gives one
  number that is small when the forecaster is both confident and right.

  The clipping is not a cosmetic detail. A perfectly-wrong prediction (`p = 0`
  when `y = 1`, or `p = 1` when `y = 0`) would call `log(0)`, which is negative
  infinity, and the whole mean becomes `inf` or `nan`. Squeezing `p` into
  `[eps, 1 - eps]` bounds the worst-case penalty at `-log(eps)` -- the
  `clip_saves_log_zero` case shows a raw `0.0` prediction turning into the finite
  cost `-log(1e-3) = 6.907755` instead of blowing up. Choosing `eps` trades a
  little accuracy for numerical safety, exactly the kind of guard real training
  loops rely on.
common_mistakes:
  - Skipping the clip, so a prediction of exactly 0 or 1 calls log(0) and produces inf or nan.
  - Summing the losses but forgetting to divide by the sample count, returning a total instead of a mean.
  - Swapping the two log terms so the y=1 and y=0 cases are penalised backwards.
