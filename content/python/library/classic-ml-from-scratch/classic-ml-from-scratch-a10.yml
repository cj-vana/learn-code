function_name: bce_loss
input_mode: function
solution_sketch: For each prediction clip it into [eps, 1-eps], add -(y*log(p)+(1-y)*log(1-p)) to a running total, then divide by the number of samples and round to 6 places.
sample_solution: |
  import math


  def bce_loss(job):
      predictions = job["predictions"]
      targets = job["targets"]
      eps = job["eps"]
      total = 0.0
      for p, y in zip(predictions, targets):
          p_clipped = min(max(p, eps), 1 - eps)
          total += -(y * math.log(p_clipped) + (1 - y) * math.log(1 - p_clipped))
      return round(total / len(predictions), 6)
hints:
  - level: 1
    text: Each sample contributes -log(p) when its target is 1 and -log(1-p) when its target is 0. The y and (1-y) factors select which term applies.
  - level: 2
    text: Before taking any logarithm, clip the probability with min(max(p, eps), 1-eps) so you never call log on 0.
  - level: 3
    text: Accumulate every sample's loss into a running total, divide by len(predictions) for the mean, and round the result to 6 decimals.
