    - name: already_at_minimum
      input: {start: [2.0, 2.0], grad_coeffs: {a: [3.0, 1.0], c: [2.0, 2.0]}, lr: 0.5, steps: 5}
      expected: [2.0, 2.0]
explanation_markdown: |
  Gradient descent is the workhorse of machine learning: measure which way is
  downhill, take a step, repeat. On this separable bowl each coordinate moves
  independently, and the update `p - lr * 2 * a * (p - c)` pulls `p` toward its
  centre `c`. Notice the two structural details that trip people up. The gradient
  must be read from the **current** parameters *before* you move, so compute the
  whole `grad` list first and only then build the new `p` -- otherwise a mutated
  `p[0]` would poison the gradient of `p[1]`. And the `already_at_minimum` case
  shows the fixed point: when `p == c` the gradient is zero, so the parameters sit
  still no matter how many steps you take.

  The learning rate is where it gets interesting. For a one-dimensional bowl the
  update multiplies the distance-to-centre by `(1 - 2 * lr * a)` each step.
  When that factor has magnitude below 1 the run converges (the `converging_run`
  case creeps toward `2`). When `lr` is too large the factor's magnitude exceeds
  1 and the steps **overshoot and grow** -- the `diverging_big_lr` case starts at
  `3` and blows up past `18`, oscillating further from the minimum every step.
  That is exactly why picking a stable learning rate matters in practice.
common_mistakes:
  - Updating p[i] in place while still computing later coordinates' gradients from the already-changed vector.
  - Recomputing the gradient only once instead of fresh at every step.
  - Adding lr*grad instead of subtracting it, which climbs the bowl rather than descending it.
