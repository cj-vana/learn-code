prompt_markdown: |
  Tuning a model often means minimising a smooth loss surface by taking small
  downhill steps -- **gradient descent**. Here the surface is a simple
  multi-dimensional bowl. For a parameter vector `p`, the loss is

  ```
  loss(p) = sum(a[i] * (p[i] - c[i]) ** 2 for i in range(len(p)))
  ```

  Each coordinate is its own upward parabola, with steepness `a[i]` and its lowest
  point at `c[i]`. The gradient (the vector of partial derivatives) is

  ```
  grad[i] = 2 * a[i] * (p[i] - c[i])
  ```

  Write `gradient_descent_run(job)` that runs plain gradient descent for a fixed
  number of steps. The input is a single dictionary:

  ```
  {
    "start": [10.0],
    "grad_coeffs": {"a": [1.0], "c": [3.0]},
    "lr": 0.1,
    "steps": 1
  }
  ```

  - `start` is the initial parameter vector.
  - `grad_coeffs` holds two equal-length lists: `a` (the steepness per
    coordinate) and `c` (the centre per coordinate).
  - `lr` is the learning rate (step size).
  - `steps` is how many update steps to take.

  Each step, compute the gradient at the **current** parameters and move every
  coordinate downhill:

  ```
  grad[i] = 2 * a[i] * (p[i] - c[i])
  p[i] = p[i] - lr * grad[i]
  ```

  Do this `steps` times (all coordinates update together each step, using the
  gradient measured before that step). Return the final parameter vector as a
  list, with each number **rounded to 6 decimal places**.
starter_code: |
  def gradient_descent_run(job):
      return []
function_name: gradient_descent_run
input_mode: function
solution_sketch: Copy start into a working list. For each of steps iterations, compute grad[i] = 2*a[i]*(p[i]-c[i]) for the current p, then set p[i] = p[i] - lr*grad[i] for every coordinate. After the loop, round each parameter to 6 places.
sample_solution: |
  def gradient_descent_run(job):
      p = list(job["start"])
      a = job["grad_coeffs"]["a"]
      c = job["grad_coeffs"]["c"]
      lr = job["lr"]
      steps = job["steps"]
      for _ in range(steps):
          grad = [2 * a[i] * (p[i] - c[i]) for i in range(len(p))]
          p = [p[i] - lr * grad[i] for i in range(len(p))]
      return [round(v, 6) for v in p]
hints:
  - level: 1
    text: The whole run is a loop that repeats steps times. Inside each pass you recompute the gradient from the current parameters, then step.
  - level: 2
    text: Compute the full gradient list first using the current p, then build the new p. Do not overwrite p[0] before you use it to compute grad[1].
  - level: 3
    text: The per-coordinate update is p[i] = p[i] - lr * (2 * a[i] * (p[i] - c[i])). After all steps, round each final value to 6 decimals.
