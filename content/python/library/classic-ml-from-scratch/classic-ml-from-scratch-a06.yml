solution_sketch: Loop up to max_iters, assign labels by nearest centroid, break when the labels match the previous round, otherwise recompute centroids as per-cluster means (empty keeps current) and count the update.
sample_solution: |
  def kmeans_converged(job):
      points = job["points"]
      centroids = [list(c) for c in job["centroids"]]
      max_iters = job["max_iters"]

      def assign(cents):
          labels = []
          for point in points:
              best_index = 0
              best_dist = None
              for i, centroid in enumerate(cents):
                  dist = 0.0
                  for x, y in zip(point, centroid):
                      dist += (x - y) ** 2
                  if best_dist is None or dist < best_dist:
                      best_dist = dist
                      best_index = i
              labels.append(best_index)
          return labels

      def update(labels, cents):
          new_cents = []
          for j in range(len(cents)):
              members = [points[i] for i in range(len(points)) if labels[i] == j]
              if not members:
                  new_cents.append(cents[j])
              else:
                  centroid = []
                  for d in range(len(members[0])):
                      total = 0.0
                      for member in members:
                          total += member[d]
                      centroid.append(round(total / len(members), 6))
                  new_cents.append(centroid)
          return new_cents

      previous = None
      iterations = 0
      for _ in range(max_iters):
          labels = assign(centroids)
          if labels == previous:
              break
          centroids = update(labels, centroids)
          previous = labels
          iterations += 1
      return {"centroids": centroids, "iterations": iterations}
