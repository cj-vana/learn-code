prompt_markdown: |
  Now assemble the whole thing. Lloyd's algorithm for k-means repeats two steps,
  **assign** then **update**, until the cluster labels stop changing. Because the
  starting centroids are handed to you, the run is fully deterministic, so there is
  no randomness anywhere.

  A soil lab clusters field samples described by vectors like
  `[nitrogen, phosphorus]`. Write `kmeans_converged(job)` that takes a single
  dictionary with three keys:

  - `"points"`: a list of point vectors (each a list of numbers).
  - `"centroids"`: the initial list of `k` centroid vectors.
  - `"max_iters"`: an integer cap on how many update steps to perform.

  Run this exact loop, keeping a running `centroids` list that starts as the given
  one and a running `iterations` count that starts at 0. Repeat up to `max_iters`
  times:

  1. **Assign**: label each point with the index of its nearest centroid
     (Euclidean distance, lower index wins ties), producing an assignment list.
  2. **Check**: if this assignment list is identical to the assignment list from
     the previous round, stop immediately without updating again; the clustering
     has converged.
  3. **Update**: otherwise move each centroid to the element-wise mean of its
     assigned points, rounding every coordinate to **6 decimal places**. An empty
     cluster keeps its current centroid unchanged. Then add 1 to `iterations`.

  Return a dictionary with two keys:

  - `"centroids"`: the running centroid list at the end (already rounded by the
    update step).
  - `"iterations"`: the number of update steps actually performed.

  Because the very first round has no previous assignment to compare against, it
  always performs at least one update (unless `max_iters` is 0). Reaching
  `max_iters` stops the loop even if the labels are still moving.

  Example:

  ```python
  kmeans_converged({
      "points": [[1.0], [2.0], [10.0], [11.0]],
      "centroids": [[1.0], [10.0]],
      "max_iters": 10,
  })
  # -> {"centroids": [[1.5], [10.5]], "iterations": 1}
  ```
