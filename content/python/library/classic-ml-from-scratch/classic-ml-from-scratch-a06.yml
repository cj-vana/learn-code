explanation_markdown: |
  Lloyd's algorithm is a fixed-point iteration: assign, update, repeat. The
  convergence test is the whole reason it terminates, once a full pass produces the
  same labels as the pass before it, another update would only recompute the same
  means, so the centroids have reached a fixed point and you can stop. Comparing
  the assignment lists (cheap integer lists) is the standard way to detect this,
  and it is exact even though the centroids are floats.

  Two details keep the count honest. First, `previous` starts as `None`, so the
  opening round can never match and always runs one update; that is why a
  seemingly already-settled input still reports one iteration. Second,
  `iterations` is bumped only when an update actually happens, so a run that hits
  `max_iters` reports exactly that many updates while a run that converges early
  reports fewer. Copying the incoming centroids with `list(c)` protects the
  caller's data, since the loop reassigns `centroids` each round rather than
  editing the originals in place.
common_mistakes:
  - Counting an iteration on the round where you detect convergence, overstating the number of updates by one.
  - Comparing centroid floats instead of the integer assignment lists to test for convergence, which is fragile against rounding.
  - Forgetting the empty-cluster rule and dropping a centroid, which changes k and corrupts later assignments.
  - Mutating the input centroids in place so the returned data and the caller's list become entangled.
