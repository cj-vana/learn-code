explanation_markdown: |
  The outer loop walks the dataset and the inner loop is exactly the
  nearest-centroid search: for each point it finds the centroid with the smallest
  squared distance and records that index. The two crucial resets, `best_index`
  and `best_dist` back to their starting values at the top of every point, keep
  one point's winner from leaking into the next.

  Because the result list is built by appending one label per point in order, it
  automatically matches the length and ordering of `"points"`, and an empty input
  yields an empty list without any special case. This labelling is what a full
  k-means iteration feeds into the update step, where each cluster's points are
  averaged to move its centre.
common_mistakes:
  - Declaring best_index or best_dist outside the point loop, so a stale winner carries over between points.
  - Returning a list of distances or centroid vectors instead of centroid indices.
  - Using <= for the update, which shifts tied points to a higher centroid index than required.
