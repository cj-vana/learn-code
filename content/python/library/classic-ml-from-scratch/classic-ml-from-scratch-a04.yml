function_name: assign_clusters
input_mode: function
solution_sketch: For each point scan the centroids for the smallest squared distance (strict < for ties) and append that index to the result list.
sample_solution: |
  def assign_clusters(job):
      points = job["points"]
      centroids = job["centroids"]
      assignments = []
      for point in points:
          best_index = 0
          best_dist = None
          for i, centroid in enumerate(centroids):
              dist = 0.0
              for x, y in zip(point, centroid):
                  dist += (x - y) ** 2
              if best_dist is None or dist < best_dist:
                  best_dist = dist
                  best_index = i
          assignments.append(best_index)
      return assignments
