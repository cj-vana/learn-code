prompt_markdown: |
  The k-means clustering algorithm alternates between two steps. This exercise is
  the **assignment** step run over a whole dataset at once: label every point with
  the cluster whose centre it is closest to.

  A network of drifting weather buoys reports readings such as
  `[surface_temp, salinity]`, and an analyst has `k` candidate cluster centres.
  Write `assign_clusters(job)` that takes a single dictionary with two keys:

  - `"points"`: a list of point vectors (each a list of numbers). May be empty.
  - `"centroids"`: a non-empty list of centroid vectors, each the same length as a
    point.

  Return a list of integers the **same length as** `"points"`, where position `i`
  holds the index of the centroid nearest to `points[i]` by Euclidean distance.
  Break ties toward the **lower** centroid index. An empty `"points"` list returns
  an empty list.

  As in nearest-centroid classification, you can compare the sum of squared
  differences instead of the true distance, since the square root does not change
  which centroid is closest.

  Example:

  ```python
  assign_clusters({
      "points": [[1.0, 1.0], [8.0, 8.0], [0.0, 1.0], [9.0, 7.0]],
      "centroids": [[0.0, 0.0], [10.0, 10.0]],
  })
  # -> [0, 1, 0, 1]
  ```
