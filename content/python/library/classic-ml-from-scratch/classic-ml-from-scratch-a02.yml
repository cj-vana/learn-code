explanation_markdown: |
  Manhattan distance treats each feature independently: it simply totals how far
  apart the two vectors are along every axis, like the number of blocks a taxi
  drives on a street grid. Because it never squares anything, a single large gap
  contributes proportionally rather than being amplified, which makes L1 distance
  more forgiving of outliers than Euclidean distance.

  The `abs` on each term is the whole trick. Without it, a coordinate where `a`
  overshoots `b` would cancel one where `b` overshoots `a`, and two very different
  blends could report a distance of zero. Starting the total at `0.0` keeps the
  return type a float even when every gap happens to be a whole number.
common_mistakes:
  - Dropping the abs, so positive and negative gaps cancel and unlike vectors look identical.
  - Squaring the differences, which computes Euclidean-style distance instead of L1.
  - Initialising the total as 0 (int) and never rounding, so the type or value can drift from the expected float.
