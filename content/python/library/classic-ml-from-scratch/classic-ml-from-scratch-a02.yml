prompt_markdown: |
  Euclidean distance is not the only way to measure how far apart two feature
  vectors are. The **Manhattan** (or L1, or city-block) distance adds up the
  absolute coordinate gaps instead of squaring them. It answers "how many total
  grams differ across the recipe" rather than "what is the straight-line gap".

  A tea shop describes each blend as a vector of grams per ingredient, for
  example `[black_tea, dried_orange, cardamom]`. Write `manhattan(job)` that takes
  a single dictionary with two keys:

  - `"a"`: the first vector, a list of numbers.
  - `"b"`: the second vector, the same length as `"a"`.

  Return the Manhattan distance, defined for vectors of length `n` as:

  ```
  distance = |a[0]-b[0]| + |a[1]-b[1]| + ... + |a[n-1]-b[n-1]|
  ```

  Take the absolute value of each coordinate difference and add them up. **Round
  the result to 6 decimal places** and return it as a float. Identical vectors are
  distance `0.0`.

  Example:

  ```python
  manhattan({"a": [4.0, 1.5, 2.0], "b": [3.0, 2.5, 2.0]})
  # -> 2.0   (|4-3| + |1.5-2.5| + |2-2| = 1 + 1 + 0)
  ```
starter_code: |
  def manhattan(job):
      return 0.0
function_name: manhattan
input_mode: function
solution_sketch: Sum abs(x - y) over the paired coordinates from zip, then round to 6 decimals.
sample_solution: |
  def manhattan(job):
      a = job["a"]
      b = job["b"]
      total = 0.0
      for x, y in zip(a, b):
          total += abs(x - y)
      return round(total, 6)
hints:
  - level: 1
    text: Walk the two vectors together with zip(a, b) so you can look at one coordinate pair at a time.
  - level: 2
    text: For each pair add abs(x - y) to a running total; the absolute value stops positive and negative gaps from cancelling.
  - level: 3
    text: Start the total as 0.0 so the result is a float, then return round(total, 6) after the loop.
