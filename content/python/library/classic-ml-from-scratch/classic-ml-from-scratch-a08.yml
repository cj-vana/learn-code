prompt_markdown: |
  A fruit-packing line grades each orange as **sweet** (`+1`) or **sour** (`-1`)
  from sensor readings such as sugar and firmness. A **perceptron** is the tiny
  linear model behind this decision: it keeps a weight per feature plus one bias,
  and learns by nudging those numbers whenever it guesses wrong.

  Write `perceptron_step(job)` that performs **one** learning step on **one**
  training example. The input is a single dictionary:

  ```
  {
    "weights": [0.0, 0.0],
    "bias": 0.0,
    "x": [2.0, 1.0],
    "y": 1,
    "lr": 0.5
  }
  ```

  - `weights` is the current weight vector, `bias` a single number.
  - `x` is the example's feature vector (same length as `weights`).
  - `y` is the true label, either `+1` or `-1`.
  - `lr` is the learning rate (a positive number).

  The step:

  1. Compute the activation `a = dot(weights, x) + bias`, where
     `dot(weights, x) = sum(w[i] * x[i] for i in range(len(x)))`.
  2. Predict a label from the **sign** of the activation. Use the convention
     `sign(a) = +1` when `a > 0` and `sign(a) = -1` when `a <= 0` -- so an
     activation of exactly `0` predicts `-1`.
  3. If the prediction already equals `y`, the example is correct: leave
     `weights` and `bias` unchanged. Otherwise the example is misclassified, so
     update each weight and the bias:
     - `weights[i] = weights[i] + lr * y * x[i]` for every `i`
     - `bias = bias + lr * y`

  Return a two-element list `[updated_weights, updated_bias]`, where
  `updated_weights` is the list of new weights. Round every returned number to
  **6 decimal places** (round each weight, and the bias).
