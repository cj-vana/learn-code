function_name: sigmoid
input_mode: function
solution_sketch: Branch on the sign of x. For non-negative x use 1/(1+exp(-x)); for negative x compute z=exp(x) and return z/(1+z). Both are the same value, but the negative branch only exponentiates a non-positive number so it cannot overflow. Round to 6 places.
sample_solution: |
  import math


  def sigmoid(x):
      if x >= 0:
          result = 1.0 / (1.0 + math.exp(-x))
      else:
          z = math.exp(x)
          result = z / (1.0 + z)
      return round(result, 6)
