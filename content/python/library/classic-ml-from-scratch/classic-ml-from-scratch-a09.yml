prompt_markdown: |
  A sky survey scores each smudge on a photographic plate with a raw number: large
  positive means "very likely a comet", large negative means "very likely not".
  To turn that raw score into a probability between 0 and 1, we pass it through the
  **logistic sigmoid**:

  ```
  sigmoid(x) = 1 / (1 + exp(-x))
  ```

  Write `sigmoid(x)` that takes a single number `x` and returns the sigmoid value
  **rounded to 6 decimal places**.

  There is a trap in the naive formula. When `x` is a large negative number,
  `-x` is large and positive, so `exp(-x)` explodes -- for `x` around `-750`,
  `exp(-x)` overflows the range of a float and Python raises `OverflowError`. To
  stay stable, branch on the sign of `x` and use the algebraically equal form that
  only ever exponentiates a **non-positive** number (whose `exp` is at most 1 and
  can never overflow):

  - if `x >= 0`: `sigmoid(x) = 1 / (1 + exp(-x))`
  - if `x < 0`: let `z = exp(x)`, then `sigmoid(x) = z / (1 + z)`

  Both branches compute the same mathematical value; only the second avoids the
  overflow. Return `round(result, 6)`.
starter_code: |
