explanation_markdown: |
  The sigmoid is the gate that turns an unbounded score into a probability, and it
  shows up everywhere from logistic regression to the output of a neural unit.
  Mathematically `1 / (1 + exp(-x))` and `exp(x) / (1 + exp(x))` are the same
  function -- multiply the top and bottom of the first by `exp(x)` to get the
  second. So why bother with two branches?

  Floating-point range. A double can hold numbers up to roughly `1.8e308`, and
  `exp` reaches that around an argument of `709`. Feed the naive formula a value
  like `x = -750` and it tries to compute `exp(750)`, which overflows and raises
  `OverflowError`. The rescue is to always exponentiate a number that is `<= 0`:
  when `x` is negative we use `exp(x)`, which underflows harmlessly to `0.0`
  instead of blowing up, giving `0 / (1 + 0) = 0.0`. Choosing the numerically
  stable branch is a habit worth building early, because the same overflow trap
  reappears in softmax, cross-entropy, and log-sum-exp.
common_mistakes:
  - Using the single naive formula for every input, which raises OverflowError on large negative x.
  - Branching the wrong way so that exp still receives a large positive argument.
  - Forgetting to round, so the returned float differs from the expected value in its trailing digits.
