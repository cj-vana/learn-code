explanation_markdown: |
  Euclidean distance is the Pythagorean theorem generalised to any number of
  dimensions. You walk the two vectors together, square each coordinate gap, and
  add those squares into one running total. Squaring makes every term
  non-negative and punishes large gaps more than small ones, which is exactly the
  behaviour clustering and nearest-neighbour methods rely on.

  The square root is taken **once**, over the finished sum, not per coordinate.
  Rounding to 6 decimals last keeps the answer stable to compare against an
  expected value, since irrational results like `sqrt(2)` would otherwise carry a
  long, machine-dependent tail.
common_mistakes:
  - Taking the square root inside the loop instead of once over the total sum.
  - Forgetting to square the differences, which computes a signed sum that can even be negative.
  - Returning the raw float without rounding, so an irrational result never matches the expected value.
