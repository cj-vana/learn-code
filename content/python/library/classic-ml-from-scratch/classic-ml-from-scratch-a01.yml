prompt_markdown: |
  Almost every classic machine-learning method that groups or classifies data
  needs one basic ingredient first: a way to measure how *similar* two examples
  are. The most common measure is the straight-line (Euclidean) distance between
  two feature vectors.

  A field team records each penguin as a vector of measurements, for example
  `[bill_length_mm, bill_depth_mm]`. Write `euclidean(job)` that takes a single
  dictionary with two keys:

  - `"a"`: the first vector, a list of numbers.
  - `"b"`: the second vector, the same length as `"a"`.

  Return the Euclidean distance between them, defined for vectors of length `n`
  as:

  ```
  distance = sqrt( (a[0]-b[0])**2 + (a[1]-b[1])**2 + ... + (a[n-1]-b[n-1])**2 )
  ```

  That is: square each coordinate difference, add the squares, then take the
  square root. **Round the result to 6 decimal places** and return it as a float.
  Identical vectors are distance `0.0`.

  Example:

  ```python
  euclidean({"a": [0.0, 0.0], "b": [3.0, 4.0]})
  # -> 5.0   (sqrt(9 + 16) = sqrt(25))
  ```
