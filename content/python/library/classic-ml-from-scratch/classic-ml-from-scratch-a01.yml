function_name: euclidean
input_mode: function
solution_sketch: Sum the squared differences of paired coordinates with zip, take math.sqrt, then round to 6 decimals.
sample_solution: |
  import math


  def euclidean(job):
      a = job["a"]
      b = job["b"]
      total = 0.0
      for x, y in zip(a, b):
          total += (x - y) ** 2
      return round(math.sqrt(total), 6)
hints:
  - level: 1
    text: Pair up the coordinates of the two vectors with zip(a, b) so you can compare them one position at a time.
  - level: 2
    text: Keep a running total, adding (x - y) ** 2 for each paired coordinate; this is the sum of squared differences.
  - level: 3
    text: After the loop, return round(math.sqrt(total), 6) so the square root is taken once over the whole sum.
