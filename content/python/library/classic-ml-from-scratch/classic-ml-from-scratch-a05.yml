explanation_markdown: |
  For each cluster you first collect its members with a filter over the parallel
  `points` and `assignments` lists, then average them one coordinate at a time.
  The element-wise mean is the point that minimises the total squared distance to
  the members, which is precisely why k-means moves each centre here: the
  assignment step and this averaging step together push the total within-cluster
  spread down every round.

  The empty-cluster branch matters because a mean of zero points is undefined
  (dividing by zero). Rather than inventing a value, you reuse the previous
  centroid so that cluster simply stays put and can pick up points in a later
  round. Rounding each averaged coordinate to 6 decimals keeps recurring
  fractions like 5/3 reproducible against the expected output.
common_mistakes:
  - Dividing by k or by len(points) instead of by the number of members in that specific cluster.
  - Dropping or crashing on an empty cluster rather than reusing previous[j].
  - Averaging whole vectors as a single value instead of taking the mean separately for each coordinate.
