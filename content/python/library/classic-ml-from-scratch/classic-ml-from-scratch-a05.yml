solution_sketch: For each cluster index collect its member points; average them coordinate-by-coordinate with 6dp rounding, or fall back to previous[j] when the cluster is empty.
sample_solution: |
  def update_centroids(job):
      points = job["points"]
      assignments = job["assignments"]
      k = job["k"]
      previous = job["previous"]
      new_centroids = []
      for j in range(k):
          members = [points[i] for i in range(len(points)) if assignments[i] == j]
          if not members:
              new_centroids.append(previous[j])
          else:
              dim = len(members[0])
              centroid = []
              for d in range(dim):
                  total = 0.0
                  for member in members:
                      total += member[d]
                  centroid.append(round(total / len(members), 6))
              new_centroids.append(centroid)
      return new_centroids
hints:
