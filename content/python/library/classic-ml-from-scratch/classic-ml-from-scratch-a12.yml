solution_sketch: Build each column by reading column j from every row. Compute its mean and pstdev once. Then rebuild the matrix row by row; for each value use 0.0 when that column's stdev is 0, otherwise round((value-mean)/stdev, 6).
sample_solution: |
  import statistics


  def zscore_standardize(matrix):
      if not matrix:
          return []
      ncols = len(matrix[0])
      columns = [[row[j] for row in matrix] for j in range(ncols)]
      means = [statistics.mean(col) for col in columns]
      stds = [statistics.pstdev(col) for col in columns]
      result = []
      for row in matrix:
          new_row = []
          for j, value in enumerate(row):
              if stds[j] == 0:
                  new_row.append(0.0)
              else:
                  new_row.append(round((value - means[j]) / stds[j], 6))
          result.append(new_row)
      return result
