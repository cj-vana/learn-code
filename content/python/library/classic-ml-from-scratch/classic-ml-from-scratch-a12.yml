prompt_markdown: |
  Before feeding features into most machine-learning models, you put them on a
  common scale so that a column measured in the hundreds does not drown out a
  column measured in tenths. The standard move is **z-score standardisation**:
  for each feature, subtract that feature's mean and divide by its standard
  deviation.

  You are given a data matrix of tea samples: each **row** is one sample, each
  **column** is one measured feature (caffeine, aroma, and so on). Write
  `zscore_standardize(matrix)` that takes the matrix (a list of equal-length rows
  of numbers) and returns a new matrix of the same shape where every column has
  been standardised.

  For a column with values `v`, using the **population** standard deviation:

  ```
  mean = sum(v) / len(v)
  std  = statistics.pstdev(v)
  standardized_value = (x - mean) / std
  ```

  Use `statistics.mean` and `statistics.pstdev` (the population standard
  deviation, dividing by `N`, not `N - 1`).

  Guard the constant-column case: if a column's standard deviation is `0` (every
  value in it is identical), you cannot divide by it. For such a column, output
  `0.0` for every entry instead.

  Round every value in the returned matrix to **6 decimal places**. The input
  matrix has at least one row and at least one column.
