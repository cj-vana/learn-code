explanation_markdown: |
  Standardisation rewrites every feature into units of "standard deviations away
  from its own mean". After the transform each column has mean `0` and spread `1`,
  so a distance-based method like kNN or a gradient-based optimiser treats all
  features even-handedly instead of being dominated by whichever one happens to
  have the biggest raw numbers. The work is naturally column-oriented, which is
  why the solution first transposes the matrix into columns, measures each one,
  and only then rebuilds the rows.

  The subtle part is the constant column. If every value in a feature is the same,
  its standard deviation is `0`, and `(x - mean) / 0` would raise
  `ZeroDivisionError`. There is no meaningful spread to normalise by, so the
  convention is to map the whole column to `0.0` -- the value it would "want" to
  take, since each entry already sits exactly at the mean. The `all_constant` and
  `single_row_all_constant` cases exercise this guard (a single row makes *every*
  column constant). Using `statistics.pstdev` rather than `stdev` matters too: the
  population version divides by `N`, which is the standard choice when you are
  standardising the data you actually hold rather than estimating a wider
  population.
common_mistakes:
  - Standardising across rows instead of down columns, mixing unrelated features together.
  - Letting a constant column divide by a zero standard deviation instead of emitting 0.0.
  - Using statistics.stdev (sample, divides by N-1) instead of pstdev, which shifts every standardized value.
