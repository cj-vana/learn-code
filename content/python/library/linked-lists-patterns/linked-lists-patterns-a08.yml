function_name: loop_start
input_mode: function
solution_sketch: Find a fast/slow collision inside the loop, then move one cursor back to the head and advance both one step at a time; they meet at the loop's entry node.
sample_solution: |
  def loop_start(route):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      checkpoints = route["checkpoints"]
      connect_to = route["connect_to"]
      if not checkpoints:
          return None

      nodes = [Node(name) for name in checkpoints]
      for i in range(len(nodes) - 1):
          nodes[i].next = nodes[i + 1]
      if connect_to >= 0:
          nodes[-1].next = nodes[connect_to]

      slow = nodes[0]
      fast = nodes[0]
      while fast is not None and fast.next is not None:
          slow = slow.next
          fast = fast.next.next
          if slow is fast:
              probe = nodes[0]
              while probe is not slow:
                  probe = probe.next
                  slow = slow.next
              return probe.value
      return None
hints:
  - level: 1
    text: First reuse the fast/slow walk to find a collision; a collision only happens when a loop exists.
  - level: 2
    text: After the collision, there is a tidy fact, the distance from the head to the loop entry equals the distance from the collision point to the loop entry.
  - level: 3
    text: Reset one cursor to the head, keep the other at the collision point, then advance both one step at a time; the box where they meet is the loop's entry.
