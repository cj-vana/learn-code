prompt_markdown: |
  A security guard patrols a route of checkpoints. When the route is wired into a
  loop, the guard wants to know the *junction* checkpoint where the loop rejoins
  the line, because that is where the endless circling begins. Write
  `loop_start(route)` where `route` is a dict with:

  - `"checkpoints"`: a list of distinct checkpoint names in order.
  - `"connect_to"`: an integer index. If `-1`, the route ends normally with no
    loop; otherwise the last checkpoint links back to the checkpoint at that index.

  Build a singly linked list of `Node` objects, apply the wiring, and return the
  **name of the checkpoint where the loop starts**. If there is no loop, return
  `None`. Do it with pointers, not by storing every node you visit.
