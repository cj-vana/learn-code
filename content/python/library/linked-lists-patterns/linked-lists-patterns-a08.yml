explanation_markdown: |
  This is the two-phase version of cycle detection. Phase one runs the ordinary
  fast/slow walk until the cursors collide, which can only occur somewhere inside
  the loop. Phase two rests on a small piece of arithmetic: let the head sit `a`
  steps before the loop entry, and let the collision point sit `a` steps before
  the entry as well when measured around the loop. Resetting one cursor to the
  head and advancing both one step at a time therefore makes them arrive at the
  entry together. If the fast cursor ever reaches `None`, there is no loop and the
  answer is `None`. Because the checkpoint names are distinct, returning the
  entry node's value names the junction unambiguously.
common_mistakes:
  - Moving both cursors two steps in phase two; the entry-finding phase must step one at a time.
  - Returning the collision node instead of continuing to the loop entry.
  - Forgetting the no-loop case, so the function walks off the end and raises instead of returning None.
