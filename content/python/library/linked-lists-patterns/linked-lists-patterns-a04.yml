prompt_markdown: |
  A train is stored as a chain of carriages. Write `middle_carriage(carriages)`
  that takes a list of carriage labels, builds a singly linked list of `Node`
  objects, and returns the label of the **middle** carriage found with a fast/slow
  pointer walk (no counting the length first).

  When the train has an even number of carriages, return the label of the *second*
  of the two middle carriages (for example `[a, b, c, d]` returns `c`). An empty
  train returns `None`.
starter_code: |
