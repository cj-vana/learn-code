      # Build the chain, then use slow (one hop) and fast (two hops) to find the middle.
      return None
function_name: middle_carriage
input_mode: function
solution_sketch: Advance slow by one and fast by two until fast falls off the end; slow is the middle.
sample_solution: |
  def middle_carriage(carriages):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      head = None
      for value in reversed(carriages):
          node = Node(value)
          node.next = head
          head = node

      if head is None:
          return None

      slow = head
      fast = head
      while fast is not None and fast.next is not None:
          slow = slow.next
          fast = fast.next.next
      return slow.value
hints:
  - level: 1
    text: Move one cursor one box at a time and another two boxes at a time from the same start.
  - level: 2
    text: The loop must check both `fast` and `fast.next` before hopping, or `fast.next.next` will crash.
  - level: 3
    text: When fast can no longer take a double step, slow sits on the middle; return slow.value.
