explanation_markdown: |
  The fast cursor covers two boxes for every one the slow cursor covers, so it
  reaches the end in half the steps and leaves the slow cursor exactly at the
  middle. The loop guard checks both `fast` and `fast.next` because the double hop
  reads two links ahead. Starting both cursors at `head` makes even-length chains
  land on the second of the two middles, which is the convention this problem
  asks for. No length count is needed, and the walk is a single pass.
common_mistakes:
  - Reading `fast.next.next` without first confirming `fast` and `fast.next` are not None.
  - Starting fast at `head.next`, which shifts the result on even-length chains.
  - Counting the length in a separate pass instead of using the two-speed walk.
