explanation_markdown: |
  Reversing in batches combines the in-place reversal you already know with careful
  bookkeeping between groups. A dummy node in front of the head gives you a stable
  handle on the box *before* each group, so reconnecting is uniform even for the
  first batch. For each group you first confirm that `k` nodes remain ahead; if not,
  the trailing short group is left untouched, exactly as the spec requires. Inside a
  group you flip `k` links with the standard `prev`/`current`/`nxt` dance. The
  subtle part is the reconnection: the node that started the group becomes its tail,
  so it must now point at the *next* group's first node, and the box before the
  group must point at the group's new head. Getting those two links right is what
  keeps the chain intact.
common_mistakes:
  - Reversing a trailing group that has fewer than k nodes instead of leaving it alone.
  - Forgetting to point the group's old head at the next group, which drops the rest of the chain.
  - Reversing the input list directly instead of rewiring the node links as the prompt requires.
