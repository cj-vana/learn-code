prompt_markdown: |
  A loading dock feeds crates down a chain and a robot arm flips them over in
  fixed batches. Write `flip_in_batches(order)` where `order` is a dict with:

  - `"crates"`: a list of crate codes in arrival order.
  - `"k"`: a positive integer batch size.

  Build a singly linked list of `Node` objects, then reverse each consecutive
  group of `k` nodes **by rewiring links** (not by slicing the input list). If the
  final group has fewer than `k` crates, leave that short group in its original
  order. Return a plain list of the crate codes after all full batches are
  flipped.

  For example, `crates = [1, 2, 3, 4, 5]` with `k = 2` becomes `[2, 1, 4, 3, 5]`:
  the last lone crate stays put.
starter_code: |
  def flip_in_batches(order):
      # Reverse each full group of k nodes in place, then serialize the chain.
      return []
function_name: flip_in_batches
input_mode: function
solution_sketch: Use a dummy head; for each group that has k nodes ahead, reverse those k links, reconnect the group's new head and old head to the surrounding chain, then advance to the next group.
sample_solution: |
  def flip_in_batches(order):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      crates = order["crates"]
      k = order["k"]
      if not crates:
          return []

      nodes = [Node(code) for code in crates]
      for i in range(len(nodes) - 1):
          nodes[i].next = nodes[i + 1]

      def has_k_ahead(node, k):
          count = 0
          while node is not None and count < k:
              node = node.next
              count += 1
          return count == k

      dummy = Node(None)
      dummy.next = nodes[0]
      group_prev = dummy
      while has_k_ahead(group_prev.next, k):
          prev = None
          current = group_prev.next
          group_tail = current
          for _ in range(k):
              nxt = current.next
              current.next = prev
              prev = current
              current = nxt
          group_prev.next = prev       # new head of the reversed group
          group_tail.next = current    # old head now points at the next group
          group_prev = group_tail

      result = []
      node = dummy.next
      while node is not None:
          result.append(node.value)
          node = node.next
      return result
hints:
  - level: 1
    text: Before reversing a group, check that k nodes actually remain ahead; if fewer remain, stop and leave them alone.
  - level: 2
    text: A dummy node in front of the head lets you reattach each reversed group without special-casing the very first group.
  - level: 3
    text: After reversing k links, the group's old first node becomes its tail, so set group_prev.next to the new head and the old first node's next to the following group's start.
