prompt_markdown: |
  A packaging line sends parcels along a conveyor modeled as a singly linked list.
  Write `reverse_belt(parcels)` that takes a list of parcel codes, builds a chain
  of `Node` objects, reverses that chain **in place** by flipping each `.next`
  pointer, and returns a plain list of the codes in their new order.

  Do the reversal by rewiring links, not by reversing the input list. An empty
  input returns an empty list.
starter_code: |
  def reverse_belt(parcels):
      # Build the chain, flip every .next pointer, then walk it back into a list.
      return []
function_name: reverse_belt
input_mode: function
solution_sketch: Walk with prev/current/nxt, flipping current.next to prev at each step, then serialize from prev.
sample_solution: |
  def reverse_belt(parcels):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      head = None
      for value in reversed(parcels):
          node = Node(value)
          node.next = head
          head = node

      prev = None
      current = head
      while current is not None:
          nxt = current.next
          current.next = prev
          prev = current
          current = nxt

      result = []
      current = prev
      while current is not None:
          result.append(current.value)
          current = current.next
      return result
hints:
  - level: 1
    text: Carry three references as you walk, the part already flipped, the box you are on, and the untouched rest.
  - level: 2
    text: Save `nxt = current.next` before you overwrite `current.next = prev`, or you lose the rest of the chain.
  - level: 3
    text: After the loop, prev points at the old tail, which is now the head, so serialize starting from prev.
