explanation_markdown: |
  In-place reversal flips every link so the tail becomes the head. The three
  cursors matter: `prev` is the already-reversed prefix, `current` is the node
  being flipped, and `nxt` preserves the rest of the chain before the flip
  destroys the forward link. Skip the save and you strand every box past
  `current`. When `current` walks off the end, `prev` holds the new head, and a
  final walk collects the values in reversed order using O(1) extra space beyond
  the output list.
common_mistakes:
  - Overwriting `current.next` before saving `nxt`, which loses the rest of the chain.
  - Returning `current` (now None) instead of `prev` after the loop.
  - Building a reversed copy instead of rewiring the existing links.
