function_name: merge_lanes
input_mode: function
solution_sketch: Build both chains, then splice the smaller head onto a dummy-led tail until one runs out, then attach the rest.
sample_solution: |
  def merge_lanes(lanes):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      def build(values):
          head = None
          for value in reversed(values):
              node = Node(value)
              node.next = head
              head = node
          return head

      left = build(lanes["left"])
      right = build(lanes["right"])

      dummy = Node(None)
      tail = dummy
      while left is not None and right is not None:
          if left.value <= right.value:
              tail.next = left
              left = left.next
          else:
              tail.next = right
              right = right.next
          tail = tail.next
      tail.next = left if left is not None else right

      result = []
      current = dummy.next
      while current is not None:
          result.append(current.value)
          current = current.next
      return result
