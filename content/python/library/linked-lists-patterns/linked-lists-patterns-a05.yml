explanation_markdown: |
  Merging two sorted chains is a repeated comparison of the two front nodes: splice
  on whichever is smaller and advance that lane. A dummy head removes the special
  case for the very first pick, so every node is attached by the same rule while a
  `tail` cursor tracks the end of the result. Once either lane empties, the other
  is already sorted and every remaining value is at least as large as what came
  before, so it attaches whole in a single move. The true head is `dummy.next`.
common_mistakes:
  - Comparing with `<` instead of `<=`, which is fine for order but be consistent so equal values stay stable.
  - Forgetting to attach the leftover lane after the loop, dropping its parcels.
  - Returning `dummy` itself rather than `dummy.next`, leaking the placeholder value None.
