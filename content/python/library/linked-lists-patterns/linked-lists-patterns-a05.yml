prompt_markdown: |
  Two delivery lanes each hold parcels sorted by weight, stored as singly linked
  lists. Write `merge_lanes(lanes)` where `lanes` is a dict with keys `"left"` and
  `"right"`, each a list of integers already sorted in ascending order. Build a
  chain for each lane, merge them into one ascending chain by rewiring links, and
  return a plain list of the merged weights.

  Use a dummy head and splice the smaller front node each step. Either lane may be
  empty.
