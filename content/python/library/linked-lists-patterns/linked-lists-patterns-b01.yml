solution_sketch: Build the chain, then walk it once detaching each node onto one of two tail pointers (light or heavy) based on the pivot; serialize both runs from their dummy heads.
sample_solution: |
  def split_carriages(job):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      weights = job["weights"]
      pivot = job["pivot"]

      head = None
      tail = None
      for weight in weights:
          node = Node(weight)
          if head is None:
              head = node
              tail = node
          else:
              tail.next = node
              tail = node

      light_head = Node(None)
      heavy_head = Node(None)
      light_tail = light_head
      heavy_tail = heavy_head

      current = head
      while current is not None:
          nxt = current.next
          current.next = None
          if current.value < pivot:
              light_tail.next = current
              light_tail = current
          else:
              heavy_tail.next = current
              heavy_tail = current
          current = nxt

      def serialize(dummy):
          out = []
          node = dummy.next
          while node is not None:
              out.append(node.value)
              node = node.next
          return out

      return {"light": serialize(light_head), "heavy": serialize(heavy_head)}
hints:
  - level: 1
    text: Keep two separate output chains, each with its own tail pointer, and append every node to whichever run its weight belongs to.
  - level: 2
    text: A dummy head node in front of each run means you never special-case the first carriage added to that run.
  - level: 3
    text: Walk the original chain once; for each node save its next link, detach it (set its next to None), then attach it to the light tail or heavy tail. Walking in order keeps both runs stable.
