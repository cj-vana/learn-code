prompt_markdown: |
  A rail yard splits an arriving train around a weight limit before sending the
  cars up two different ramps. Write `split_carriages(job)` where `job` is a dict
  with:

  - `"weights"`: a list of carriage weights (integers) in coupling order.
  - `"pivot"`: an integer weight limit.

  Build a singly linked list of `Node` objects from the weights (in order), then
  split the chain into two runs **by rewiring the `.next` links**, not by sorting:

  - the **light** run holds every carriage whose weight is *strictly less than*
    `pivot`;
  - the **heavy** run holds every carriage whose weight is *greater than or equal
    to* `pivot`.

  Both runs must keep the carriages in their original relative order (a stable
  split). Return a dict `{"light": [...], "heavy": [...]}` of the two runs'
  weights as plain lists.

  For example, `weights = [40, 10, 55, 30, 60]` with `pivot = 50` returns
  `{"light": [40, 10, 30], "heavy": [55, 60]}`. An empty train returns
  `{"light": [], "heavy": []}`.
