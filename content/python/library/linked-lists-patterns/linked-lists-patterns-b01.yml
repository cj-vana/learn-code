explanation_markdown: |
  A stable partition is the linked-list version of splitting a deck into two piles
  without shuffling either pile. The trick that makes it clean is a pair of dummy
  head nodes: one anchors the light run, one anchors the heavy run, and each keeps
  a tail pointer so appending is O(1). Walking the original chain exactly once and
  attaching each node to the correct tail preserves arrival order in both runs,
  which is what "stable" means. Saving `current.next` before detaching a node is
  the essential guard: once you set `current.next = None`, the only way back to the
  rest of the train is the reference you saved. The whole split is O(n) time with
  no comparisons between carriages, unlike a sort.
common_mistakes:
  - Sending carriages equal to the pivot to the light run; the spec puts weight equal to pivot in the heavy run.
  - Forgetting to save current.next before detaching a node, which loses the rest of the chain.
  - Building the runs by prepending, which reverses each run and breaks the required stable order.
