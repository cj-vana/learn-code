body_markdown: |
  A print shop tapes each job ticket to the back of the one before it, so every
  ticket knows only which ticket comes *next*. That is exactly a **singly linked
  list**: a chain of small boxes, where each box holds one value and a pointer to
  the following box. The last box points at nothing.

  In Python we model one box with a tiny class:

  ```python
  class Node:
      def __init__(self, value):
          self.value = value
          self.next = None   # points to the next Node, or None at the tail
  ```

  A list like `[10, 20, 30]` has no `.next` links, so before we can practise
  linked-list techniques we have to *build* the chain. The cleanest way is to walk
  the input backwards and push each value onto the front:

  ```python
  def build_chain(values):
      head = None
      for value in reversed(values):
          node = Node(value)
          node.next = head   # new node points at the old front
          head = node        # new node becomes the front
      return head            # the first box, or None if the list was empty
  ```

  We keep only `head`, the first box. Everything else is reachable by following
  `.next` links one hop at a time. That single reference is the whole handle on
  the data, which is why losing track of `head` loses the entire list.

  To read the chain back out, we *walk* it. Start a cursor at `head`, record each
  value, and advance the cursor until it falls off the end:

  ```python
  def to_list(head):
      values = []
      current = head
      while current is not None:
          values.append(current.value)
          current = current.next
      return values
  ```

  This build-then-walk round trip is the backbone of every exercise in this
  module. Because our autograder compares plain data, each function will accept an
  ordinary Python list, build a chain internally, do its real work on the nodes,
  and finally walk the result back into a list to return. The linked list lives
  only inside the function; the value that crosses the boundary is always ordinary
  Python data.

  Two habits will save you from the classic bugs. First, always check for the
  empty chain: if `head is None`, most walks should simply return an empty result
  rather than touching `head.value`. Second, compare nodes with `is`, not `==`.
  Two different boxes can hold equal values, but they are still distinct positions
  in the chain, and linked-list algorithms care about position, not equality.
checkpoints:
  - question: In build_chain, why do we iterate over the values in reversed order?
    answer: Each new node is pushed onto the front of the chain, so processing values back-to-front leaves them in their original order from head to tail.
    explanation: Prepending reverses insertion order, and reversing the input first cancels that out, giving a chain whose values read the same as the source list.
  - question: When walking a chain with a cursor, what condition ends the loop?
    answer: The loop ends when the cursor becomes None, which happens after we step past the tail node whose .next is None.
    explanation: The tail's next pointer is None, so advancing one more time sets the cursor to None and signals that every box has been visited.
  - question: Why should you compare two nodes with `is` rather than `==`?
    answer: The `is` operator checks whether they are the same box (the same position in the chain), while `==` would only compare stored values, which can be equal for different boxes.
    explanation: Linked-list algorithms track positions, so identity is the meaningful comparison; two separate nodes holding the value 5 are not the same node.
