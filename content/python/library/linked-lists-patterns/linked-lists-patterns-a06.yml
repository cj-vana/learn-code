prompt_markdown: |
  A freight train needs one wagon removed, counted from the rear. Write
  `drop_nth_from_end(order)` where `order` is a dict with keys `"wagons"` (a list
  of wagon labels) and `"n"` (a positive integer, `1 <= n <= len(wagons)`). Build
  a singly linked list of `Node` objects, remove the node that sits `n` positions
  from the end, and return a plain list of the remaining labels in order.

  `n = 1` removes the last wagon; `n = len(wagons)` removes the first. Solve it in
  a single pass using a lead/trail pointer gap.
