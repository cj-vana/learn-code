explanation_markdown: |
  Advancing the lead cursor `n` steps first, then moving lead and trail together
  keeps a constant gap of `n` between them. When lead reaches the last node, trail
  sits exactly on the node *before* the one to remove, so `trail.next =
  trail.next.next` splices the target out. The dummy head is what makes removing
  the first wagon painless: trail can point at the dummy, so unlinking the real
  head needs no special case. Reading from `dummy.next` returns the surviving
  chain, all in one pass.
common_mistakes:
  - Skipping the dummy head, then crashing when the node to remove is the head itself.
  - Advancing lead by n+1 or n-1 steps, which removes the wrong wagon.
  - Stopping the walk at `lead is None` instead of `lead.next is None`, overshooting by one.
