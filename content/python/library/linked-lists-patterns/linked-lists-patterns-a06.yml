function_name: drop_nth_from_end
input_mode: function
solution_sketch: Use a dummy head; advance lead n steps, then move lead and trail together until lead hits the end, and unlink trail.next.
sample_solution: |
  def drop_nth_from_end(order):
      wagons = order["wagons"]
      n = order["n"]

      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      head = None
      for value in reversed(wagons):
          node = Node(value)
          node.next = head
          head = node

      dummy = Node(None)
      dummy.next = head

      lead = dummy
      for _ in range(n):
          lead = lead.next

      trail = dummy
      while lead.next is not None:
          lead = lead.next
          trail = trail.next
      trail.next = trail.next.next

      result = []
      current = dummy.next
      while current is not None:
          result.append(current.value)
          current = current.next
      return result
hints:
  - level: 1
    text: Keep two cursors a fixed gap apart so that when the lead reaches the end, the trail sits just before the target.
  - level: 2
    text: A dummy node before the head lets you unlink the first wagon without a special case.
  - level: 3
    text: Advance lead n steps from dummy, then move lead and trail together until lead.next is None; unlink trail.next.
