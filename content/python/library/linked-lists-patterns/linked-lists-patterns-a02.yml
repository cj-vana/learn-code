    - name: numbers
      input: [1, 2, 3, 4, 5]
      expected: 5
explanation_markdown: |
  Reaching the tail means following `.next` links until you hit the box whose link
  is `None`. The guard `while current.next is not None` stops the cursor *on* that
  final box rather than stepping past it into `None`. Checking for the empty chain
  first avoids reading `head.value` when there is no head at all. This walk-to-tail
  pattern is the foundation for appending to a chain and for any algorithm that
  needs to touch the end of the line.
common_mistakes:
  - Looping while `current is not None`, which steps past the tail and then crashes on `current.value`.
  - Indexing the input list instead of walking the chain, defeating the exercise.
  - Forgetting to return None for an empty line.
