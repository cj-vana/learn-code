prompt_markdown: |
  A tram line is stored as a chain of stops, where each stop links only to the one
  after it. Write `last_stop(stops)` that takes a list of stop names, builds a
  singly linked list of `Node` objects from them, then walks the chain to the tail
  and returns the value stored in the final node.

  You must reach the tail by following links, not by indexing the input list. If
  the line has no stops, return `None`.
starter_code: |
  def last_stop(stops):
      # Build a Node chain, then walk to the final node and return its value.
      return None
function_name: last_stop
input_mode: function
solution_sketch: Build the chain, then advance a cursor while current.next is not None and return current.value.
sample_solution: |
  def last_stop(stops):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      head = None
      for value in reversed(stops):
          node = Node(value)
          node.next = head
          head = node

      if head is None:
          return None

      current = head
      while current.next is not None:
          current = current.next
      return current.value
hints:
  - level: 1
    text: The tail is the one node whose `.next` link is None.
  - level: 2
    text: Walk a cursor forward while current.next is not None; when the loop stops, current is the tail.
  - level: 3
    text: Handle the empty chain first by returning None, then loop until current.next is None and return current.value.
tests:
  public:
    - name: empty
      input: []
      expected: null
    - name: single
      input: [Central]
      expected: Central
    - name: several
      input: [Central, Harbor, Ridge, Summit]
      expected: Summit
  validation:
