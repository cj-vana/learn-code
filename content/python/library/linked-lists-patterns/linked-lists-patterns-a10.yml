function_name: is_symmetric_relay
input_mode: function
solution_sketch: Use fast/slow to land slow on the second half, reverse from slow, then walk the front half and reversed back half in lockstep comparing values.
sample_solution: |
  def is_symmetric_relay(codes):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      if not codes:
          return True

      nodes = [Node(code) for code in codes]
      for i in range(len(nodes) - 1):
          nodes[i].next = nodes[i + 1]
      head = nodes[0]

      slow = head
      fast = head
      while fast is not None and fast.next is not None:
          slow = slow.next
          fast = fast.next.next

      prev = None
      current = slow
      while current is not None:
          nxt = current.next
          current.next = prev
          prev = current
          current = nxt

      left = head
      right = prev
      while right is not None:
          if left.value != right.value:
              return False
          left = left.next
          right = right.next
      return True
