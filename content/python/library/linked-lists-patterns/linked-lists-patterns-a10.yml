prompt_markdown: |
  A relay of signal towers passes a code down a chain, and the network is healthy
  only if the sequence of codes reads the same from either end. Write
  `is_symmetric_relay(codes)` that takes a list of tower codes, builds a singly
  linked list of `Node` objects, and returns `True` if the chain is a palindrome
  and `False` otherwise.

  Aim for the linked-list technique rather than an obvious shortcut: find the
  midpoint with a fast/slow walk, reverse the second half in place, then compare
  it against the first half node by node. An empty relay and a single-tower relay
  both count as symmetric.
