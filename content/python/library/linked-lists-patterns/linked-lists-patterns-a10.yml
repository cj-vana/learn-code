explanation_markdown: |
  This problem stitches together two techniques from the module. First a fast/slow
  walk lands `slow` at the start of the second half without ever counting the
  length. Then an in-place reversal turns that second half around so its values run
  outward-to-center. Finally two cursors, one from the original head and one from
  the reversed half, march together and compare values; the walk stops when the
  back half is exhausted, which handles both odd and even lengths cleanly. The
  whole check runs in one linear pass with only a handful of pointers, and it works
  because comparing the front half against the reversed back half is exactly what
  it means to read the same from either end.
common_mistakes:
  - Comparing until the front cursor ends instead of stopping when the reversed back half runs out.
  - Forgetting the empty and single-node cases, which are trivially symmetric.
  - Reversing the whole chain instead of just the second half, which misaligns the comparison.
