prompt_markdown: |
  A tram network is a chain of stops, but a maintenance crew sometimes wires the
  final stop's track back onto an earlier stop, turning the line into an endless
  loop. Write `detect_loop(network)` where `network` is a dict with two keys:

  - `"stops"`: a list of stop names in track order.
  - `"connect_to"`: an integer index. If it is `-1` the last stop ends the line
    normally; otherwise the last stop's `.next` link is wired back to the stop at
    that index, creating a cycle.

  Build a singly linked list of `Node` objects, apply the wiring, and return
  `True` if walking the track would loop forever and `False` otherwise. Use a
  fast/slow pointer walk rather than remembering every stop you have visited. An
  empty `"stops"` list returns `False`.
