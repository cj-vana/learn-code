function_name: detect_loop
input_mode: function
solution_sketch: Build the chain, wire the tail to connect_to if set, then run slow-by-one and fast-by-two until they collide or fast falls off the end.
sample_solution: |
  def detect_loop(network):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      stops = network["stops"]
      connect_to = network["connect_to"]
      if not stops:
          return False

      nodes = [Node(name) for name in stops]
      for i in range(len(nodes) - 1):
          nodes[i].next = nodes[i + 1]
      if connect_to >= 0:
          nodes[-1].next = nodes[connect_to]

      slow = nodes[0]
      fast = nodes[0]
      while fast is not None and fast.next is not None:
          slow = slow.next
          fast = fast.next.next
          if slow is fast:
              return True
      return False
hints:
  - level: 1
    text: If the track loops, a walker never reaches a None link, so counting steps or checking for None alone is not enough.
  - level: 2
    text: Move a slow cursor one stop at a time and a fast cursor two stops at a time; on a loop the fast one eventually laps the slow one.
  - level: 3
    text: Guard the loop with `fast is not None and fast.next is not None`, and after each double hop check `slow is fast` to detect a collision.
