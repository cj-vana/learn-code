explanation_markdown: |
  Two cursors moving at different speeds settle the loop question in one pass with
  O(1) extra memory. On a dead-ended line the fast cursor reaches `None` and the
  loop stops, returning `False`. On a looped track the fast cursor keeps circling
  and closes the gap on the slow cursor by one stop each step, so it must land on
  the exact same box eventually. The collision test uses `is`, because we are
  asking whether both cursors stand on the same stop, not whether two stops share
  a name. The guard `fast.next is not None` protects the double hop from crashing
  at the end of a non-looping line.
common_mistakes:
  - Checking only `fast is not None` and then crashing on `fast.next.next` at the last stop.
  - Comparing `slow.value == fast.value` instead of `slow is fast`, which misreports duplicate names as loops.
  - Trying to detect the loop by counting steps, which never terminates on a real cycle.
