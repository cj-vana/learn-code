prompt_markdown: |
  Two mechanical odometers each store a non-negative reading as a reel of decimal
  digits wound **least-significant digit first** — so the reading 342 is spooled as
  `[2, 4, 3]`. Write `add_digit_chains(data)` where `data` is a dict with keys
  `"first"` and `"second"`, each a list of single decimal digits (0..9) in that
  same least-significant-first order.

  Thread each list onto a chain of `Node` objects, then walk both chains together
  adding digit by digit and carrying any overflow into the next position, exactly
  like a hand-cranked adder. Return the total as a fresh list of digits, again
  **least-significant first**.

  The result should carry as far as it naturally needs to (an extra digit may
  appear when the final carry overflows) and should not be padded with extra
  leading zeros beyond that. If both reels read zero, return `[0]`.

  Example: `{"first": [2, 4, 3], "second": [5, 6, 4]}` represents 342 + 465 = 807,
  so the answer is `[7, 0, 8]`.
