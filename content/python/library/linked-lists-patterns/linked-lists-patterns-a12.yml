explanation_markdown: |
  Storing digits least-significant first is the whole trick: it lines the reels up
  in exactly the order pencil-and-paper addition proceeds, so the heads of both
  chains are the ones places you add first.

  Each step sums the current digit from each chain plus the incoming carry. That
  total is at most 9 + 9 + 1 = 19, so it always splits cleanly into one output
  digit `total % 10` and a next-step carry `total // 10` that is 0 or 1. Appending
  the ones digit as you go builds the answer already in least-significant-first
  order — no final reversal needed.

  The loop condition keeps going while *either* chain has nodes left or a carry is
  still pending. That last clause is what lets 99 + 1 = 100 sprout a brand-new
  leading digit instead of silently dropping the overflow. The only reading that
  produces no digits at all is empty-plus-empty, so a final guard returns `[0]` to
  honor the zero case.
common_mistakes:
  - Stopping the loop as soon as both chains are exhausted, which drops a final carry and turns 99 + 1 into 00 instead of 001.
  - Reversing the result at the end out of habit, even though appending ones-first already yields least-significant-first order.
  - Forgetting that one reel may be shorter (or empty) and indexing a None node instead of treating the missing digit as 0.
  - Emitting the full total at a position instead of just total % 10, so a two-digit step like 5 + 5 = 10 fails to carry.
