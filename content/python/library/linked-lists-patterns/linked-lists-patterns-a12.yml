function_name: add_digit_chains
input_mode: function
solution_sketch: Build a Node chain per reel, walk both while summing digit+carry, appending each ones-place digit and carrying the tens.
sample_solution: |
  def add_digit_chains(data):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      def build(digits):
          head = None
          for digit in reversed(digits):
              node = Node(digit)
              node.next = head
              head = node
          return head

      a = build(data["first"])
      b = build(data["second"])

      result = []
      carry = 0
      while a is not None or b is not None or carry:
          total = carry
          if a is not None:
              total += a.value
              a = a.next
          if b is not None:
              total += b.value
              b = b.next
          result.append(total % 10)
          carry = total // 10
      return result if result else [0]
hints:
  - level: 1
    text: The lists are already least-significant first, which is the order addition works in, so build each chain and walk both from their heads.
  - level: 2
    text: At each step add this node's digit from each chain plus any carry; the ones place (total % 10) is the output digit and the tens place (total // 10) becomes the next carry.
  - level: 3
    text: Keep looping while either chain still has a node OR a carry remains, so a final overflow like 99 + 1 grows a new leading digit; if nothing was ever appended, return [0].
