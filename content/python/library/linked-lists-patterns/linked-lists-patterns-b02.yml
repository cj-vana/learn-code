prompt_markdown: |
  A ski resort runs a chain of gondola cabins along a cable. Overnight the
  operators slide the whole line to the right by `k` positions so a different set
  of cabins ends up at the boarding platform. Write `rotate_by_k(job)` where `job`
  is a dict with:

  - `"cabins"`: a list of cabin labels in order along the cable.
  - `"k"`: a non-negative integer number of positions to rotate to the right.
    `k` may be `0` or larger than the number of cabins.

  Build a singly linked list of `Node` objects, rotate the chain to the **right**
  by `k` positions **by rewiring links** (join the tail to the head to form a
  ring, then cut it at the right spot), and return the cabin labels in their new
  order as a plain list.

  Rotating right by one moves the last cabin to the front. Because rotating by the
  full length returns to the start, only `k` modulo the length matters, so a `k`
  larger than the number of cabins wraps around. An empty line returns an empty
  list.

  For example, `cabins = [1, 2, 3, 4, 5]` with `k = 2` returns `[4, 5, 1, 2, 3]`.
