explanation_markdown: |
  Rotation looks fiddly with pointers until you notice the shape it wants: a ring.
  Once the tail points back at the head, the list has no ends, and "rotating"
  becomes the single decision of where to cut. Reducing `k` with `k % n` first is
  what tames a `k` larger than the length, since spinning a ring all the way around
  lands you exactly where you started. A right rotation by `r` means the last `r`
  cabins move to the front, so the new head is `r` steps back from the original
  tail, which is index `n - r` from the head, and the new tail is the node just
  before it at index `n - r - 1`. Cutting there, by setting that node's `next` to
  `None`, reopens the ring into a correctly rotated line. The whole thing is O(n):
  one pass to build, one short walk to the cut point.
common_mistakes:
  - Forgetting to reduce k with k % n, so a k larger than the length walks off the end of the ring or loops forever.
  - Rotating left instead of right; rotating right moves the tail cabins to the front.
  - Leaving the ring closed and never setting the new tail's next to None, producing a cyclic list that never finishes serializing.
