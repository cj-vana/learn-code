solution_sketch: Build the chain and its length n, reduce k to k % n, close the tail onto the head to form a ring, walk to the new tail at index n - r - 1, then break the ring after it and serialize from the new head.
sample_solution: |
  def rotate_by_k(job):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      cabins = job["cabins"]
      k = job["k"]
      if not cabins:
          return []

      nodes = [Node(label) for label in cabins]
      n = len(nodes)
      for i in range(n - 1):
          nodes[i].next = nodes[i + 1]

      r = k % n
      if r == 0:
          new_head = nodes[0]
      else:
          nodes[n - 1].next = nodes[0]        # close the ring
          new_tail = nodes[n - r - 1]
          new_head = new_tail.next
          new_tail.next = None                # cut the ring

      result = []
      node = new_head
      while node is not None:
          result.append(node.value)
          node = node.next
      return result
hints:
  - level: 1
    text: Rotating right by the full length changes nothing, so start by reducing k with k % n where n is the number of cabins.
  - level: 2
    text: Connect the last node back to the first to make a ring; now every node has a next and you only need to decide where to cut.
  - level: 3
    text: After forming the ring, the new tail sits at index n - r - 1 from the original head; the node after it becomes the new head, and you break the ring by setting the new tail's next to None.
