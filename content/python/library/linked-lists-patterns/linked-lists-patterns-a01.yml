prompt_markdown: |
  A print shop stores its job tickets as a chain of boxes, where each box holds
  one ticket number and a link to the next box. Write `queue_round_trip(tickets)`
  that takes a list of ticket numbers, builds a singly linked list of `Node`
  objects from them (in the same order), then walks that chain and returns a plain
  list of the ticket numbers it finds.

  For a correct build-and-walk, the returned list must match the input exactly. An
  empty input should return an empty list.
starter_code: |
