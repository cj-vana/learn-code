      # Build a Node chain from `tickets`, then walk it back into a list.
      return []
function_name: queue_round_trip
input_mode: function
solution_sketch: Prepend nodes while iterating the input in reverse, then walk from head collecting values.
sample_solution: |
  def queue_round_trip(tickets):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      head = None
      for value in reversed(tickets):
          node = Node(value)
          node.next = head
          head = node

      result = []
      current = head
      while current is not None:
          result.append(current.value)
          current = current.next
      return result
hints:
  - level: 1
    text: You need two phases, build the chain of Node objects first, then walk it to collect the values.
  - level: 2
    text: If you prepend each new node onto the front, iterate the input with reversed() so the final order matches.
  - level: 3
    text: Start a cursor at head and, while it is not None, append current.value and set current = current.next.
