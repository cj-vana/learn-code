explanation_markdown: |
  Building a chain from a list and reading it back is the round trip every
  linked-list technique relies on. Prepending each value onto the front reverses
  the order once, so iterating the input in reverse cancels that out and preserves
  the original sequence. Walking the chain then follows `.next` links from the
  head until a cursor reaches `None`, appending each stored value. Because the
  graders compare plain data, the linked list only ever lives inside the function.
common_mistakes:
  - Prepending nodes while iterating forward, which silently reverses the output.
  - Forgetting the empty-input case and trying to read `head.value` when head is None.
  - Losing the head reference so the walk starts from the wrong box.
