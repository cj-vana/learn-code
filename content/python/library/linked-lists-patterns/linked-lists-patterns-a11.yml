prompt_markdown: |
  A trail ranger threads elevation tags onto a single wire in the order they were
  logged, and because the hike only ever climbs, the readings arrive already in
  **non-decreasing order**. Whenever two neighbouring tags show the same number,
  the ranger wants the wire to keep just the first of that run and unhook the rest.

  Write `dedupe_chain(readings)` where `readings` is a list of integers in
  non-decreasing order. Inside the function, build a singly linked list of `Node`
  objects (one node per reading, in the same order), then remove every node whose
  value duplicates the value of the previous **kept** node by rewiring the `.next`
  links. Do not build a set or filter the list directly -- walk the chain and
  splice out the duplicates. Finally, serialize the surviving chain back into a
  plain list and return it.

  For example, `[1, 1, 2, 3, 3, 3]` returns `[1, 2, 3]`. An empty input `[]`
  returns `[]`.
