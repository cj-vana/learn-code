explanation_markdown: |
  Because the readings are already non-decreasing, every group of equal values sits
  together as a contiguous run on the wire. That means you never have to search --
  a duplicate can only ever be the node directly after the one you are keeping. So
  the pattern is a single left-to-right pass with one pointer parked on the last
  kept node. If the next node matches, you splice it out with
  `current.next = current.next.next` and stay put, because the new next node might
  also be a duplicate of the same run. If the next node differs, you advance the
  pointer, since that node becomes the new value to compare against. Serializing at
  the end simply walks the surviving chain and collects each value. The empty input
  is handled up front so there is no head to build. Working on the links directly is
  what makes this a linked-list exercise rather than a set filter -- the chain is
  repaired in place as you go.
common_mistakes:
  - Advancing the pointer after unlinking a duplicate, which skips over and keeps a second copy inside a long run.
  - Building a set or list-comprehension of the values instead of rewiring the node .next links as the prompt requires.
  - Forgetting the empty-input case and trying to read readings[0] on an empty list, which raises an IndexError.
