function_name: dedupe_chain
input_mode: function
solution_sketch: Link the readings into Node objects, then walk with one pointer; when the next node equals the current node's value, bypass it, otherwise advance, and finally read the values back out.
sample_solution: |
  def dedupe_chain(readings):
      class Node:
          def __init__(self, value):
              self.value = value
              self.next = None

      if not readings:
          return []

      head = Node(readings[0])
      tail = head
      for value in readings[1:]:
          tail.next = Node(value)
          tail = tail.next

      current = head
      while current is not None and current.next is not None:
          if current.next.value == current.value:
              current.next = current.next.next
          else:
              current = current.next

      result = []
      node = head
      while node is not None:
          result.append(node.value)
          node = node.next
      return result
