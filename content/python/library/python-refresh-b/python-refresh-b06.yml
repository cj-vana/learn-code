    - name: nope
      input: nope
      expected: false
    - name: okay_accepted
      input: Okay
      expected: true
explanation_markdown: |
  Normalizing the input first means one comparison handles many spellings:
  `strip()` drops stray spaces and `lower()` erases case, so `"  YES "` and
  `"yes"` collapse to the same value. A set of accepting words makes the
  final `in` check both short and fast.
common_mistakes:
  - Comparing the raw reply, so extra spaces or capitals slip through.
  - Listing only "yes" and missing the other accepting words.
  - Returning the reply string instead of a boolean.
