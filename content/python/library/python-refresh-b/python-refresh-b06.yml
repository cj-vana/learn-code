  originality_notes: Original event-RSVP interpreter that normalizes a reply string against a fixed set of accepting words.
prompt_markdown: |
  An event organizer collects one-word RSVP replies and needs to know who is
  attending. A reply counts as "attending" when, after trimming surrounding
  spaces and ignoring capitalization, it is one of these words:

  `yes`, `y`, `yeah`, `yep`, `yup`, `sure`, `ok`, `okay`

  Any other reply (including an empty one) means the guest is not attending.

  Write `is_attending(reply)` that takes the reply string and returns `True`
  if it means yes, otherwise `False`.
starter_code: |
  def is_attending(reply):
      return False
function_name: is_attending
input_mode: function
solution_sketch: Normalize the reply and test membership in the set of accepting words.
sample_solution: |
  def is_attending(reply):
      yes_words = {"yes", "y", "yeah", "yep", "yup", "sure", "ok", "okay"}
      return reply.strip().lower() in yes_words
hints:
  - level: 1
    text: Clean up the reply before comparing it to anything.
  - level: 2
    text: strip() removes surrounding spaces and lower() removes case differences.
  - level: 3
    text: Keep the accepting words in a set and check membership with in.
tests:
  public:
    - name: plain_yes
      input: "yes"
      expected: true
    - name: shouted_yes
      input: "YES"
      expected: true
    - name: plain_no
      input: "no"
      expected: false
  validation:
