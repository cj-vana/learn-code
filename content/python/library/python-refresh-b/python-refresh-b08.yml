prompt_markdown: |
  An elevator needs to know which way to move. Given its current floor and a
  requested target floor, it should report its direction.

  Write `elevator_direction(request)` where `request` is a dict with keys:

  - `"current"`: the floor the elevator is on, an integer (basements are negative)
  - `"target"`: the floor that was requested, an integer

  Return `"up"` if the target is higher than the current floor, `"down"` if
  it is lower, and `"hold"` if they are the same.
starter_code: |
  def elevator_direction(request):
      return "hold"
function_name: elevator_direction
input_mode: function
solution_sketch: Compare target against current and return one of three direction strings.
sample_solution: |
  def elevator_direction(request):
      current = request["current"]
      target = request["target"]
      if target > current:
          return "up"
      if target < current:
          return "down"
      return "hold"
hints:
  - level: 1
    text: There are exactly three possible answers based on comparing two numbers.
  - level: 2
    text: Pull current and target out of the dict, then compare them.
  - level: 3
    text: If neither target > current nor target < current is true, they must be equal.
