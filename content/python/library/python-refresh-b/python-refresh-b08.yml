explanation_markdown: |
  Direction is a straight comparison of two integers. Because negative floors
  are ordinary numbers, the same `>` and `<` checks handle basements without
  any special cases. When neither comparison is true, the floors are equal and
  the elevator holds.
common_mistakes:
  - Forgetting the equal case, so a matching target returns nothing.
  - Reversing the comparison and swapping up with down.
  - Assuming floors are always positive and mishandling basements.
