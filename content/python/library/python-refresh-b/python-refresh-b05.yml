prompt_markdown: |
  A bakery decides each morning whether to fire up its large oven. It is
  worth running when either of these is true:

  - there are at least 20 orders, on any day, or
  - it is the weekend **and** there are at least 12 orders

  Write `run_big_oven(day)` where `day` is a dict with keys:

  - `"orders"`: the number of orders for the day, an integer
  - `"is_weekend"`: a boolean, `True` on weekends

  Return `True` if the big oven should run, otherwise `False`.
starter_code: |
  def run_big_oven(day):
      return False
function_name: run_big_oven
input_mode: function
solution_sketch: Combine the volume threshold and the weekend rule with or and and.
sample_solution: |
  def run_big_oven(day):
      orders = day["orders"]
      is_weekend = day["is_weekend"]
      return orders >= 20 or (is_weekend and orders >= 12)
hints:
  - level: 1
    text: There are two separate reasons to run the oven; either one is enough.
  - level: 2
    text: The weekend reason needs two things at once, so it uses and.
  - level: 3
    text: Join the two reasons with or, and remember 20 and 12 are inclusive thresholds.
