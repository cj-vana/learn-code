explanation_markdown: |
  The decision is a single boolean expression. `orders >= 20` covers busy
  days regardless of the calendar, while `is_weekend and orders >= 12` adds a
  lower bar that only applies on weekends. Joining them with `or` means the
  oven runs whenever at least one rule is satisfied.
common_mistakes:
  - Using and where or is needed, so both rules must hold at once.
  - Treating the thresholds as strict (greater-than) instead of inclusive.
  - Applying the weekend discount on weekdays too.
