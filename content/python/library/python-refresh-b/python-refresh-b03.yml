  originality_notes: Original egg-packing scenario using integer division and remainder on cartons of twelve.
prompt_markdown: |
  A farm packs eggs into cartons that each hold exactly 12 eggs. Any eggs
  that cannot fill a whole carton are left loose.

  Write `pack_eggs(total)` that takes the total number of eggs as a
  non-negative integer and returns a dict with two keys:

  - `"full_cartons"`: how many complete cartons of 12 you can fill
  - `"loose_eggs"`: how many eggs are left over
starter_code: |
  def pack_eggs(total):
      return {"full_cartons": 0, "loose_eggs": 0}
function_name: pack_eggs
input_mode: function
solution_sketch: Integer-divide by 12 for full cartons and take the remainder for loose eggs.
sample_solution: |
  def pack_eggs(total):
      return {
          "full_cartons": total // 12,
          "loose_eggs": total % 12,
      }
hints:
  - level: 1
    text: One operator gives whole cartons and another gives the leftovers.
  - level: 2
    text: Floor division // counts how many complete groups of 12 fit.
  - level: 3
    text: The remainder operator % gives the eggs that do not fill a carton.
tests:
  public:
    - name: exact_one_carton
      input: 12
      expected: {full_cartons: 1, loose_eggs: 0}
    - name: some_loose
      input: 30
      expected: {full_cartons: 2, loose_eggs: 6}
    - name: none
      input: 0
      expected: {full_cartons: 0, loose_eggs: 0}
  validation:
