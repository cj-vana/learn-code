      expected: {full_cartons: 3, loose_eggs: 0}
    - name: eleven_loose
      input: 11
      expected: {full_cartons: 0, loose_eggs: 11}
    - name: one_over
      input: 13
      expected: {full_cartons: 1, loose_eggs: 1}
explanation_markdown: |
  Splitting a count into equal groups is exactly what floor division and the
  remainder do together. `total // 12` counts complete cartons, and
  `total % 12` reports whatever is left, which is always between 0 and 11.
common_mistakes:
  - Using regular division / and getting a float instead of a whole count.
  - Swapping the roles of // and % in the two keys.
  - Forgetting that the remainder can never reach 12.
