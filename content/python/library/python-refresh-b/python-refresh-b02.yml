prompt_markdown: |
  A small spreadsheet tool needs to label what kind of value sits in each
  cell. Write `classify_cell(value)` that returns one of these strings:

  - `"blank"` if the value is `None`, or a string that is empty or only spaces
  - `"integer"` if the value is a whole number
  - `"decimal"` if the value is a floating-point number
  - `"text"` for any other string

  You can assume the value is always `None`, an `int`, a `float`, or a `str`.
starter_code: |
  def classify_cell(value):
      return "blank"
function_name: classify_cell
input_mode: function
solution_sketch: Check for None and blank strings first, then distinguish int, float, and text.
sample_solution: |
  def classify_cell(value):
      if value is None:
          return "blank"
      if isinstance(value, str):
          return "blank" if value.strip() == "" else "text"
      if isinstance(value, float):
          return "decimal"
      if isinstance(value, int):
          return "integer"
      return "text"
hints:
  - level: 1
    text: The type of the value decides the label, so ask what type it is.
  - level: 2
    text: Handle None and strings before you test for numbers.
  - level: 3
    text: Use isinstance(value, float) and isinstance(value, int), and str.strip() to spot blank text.
