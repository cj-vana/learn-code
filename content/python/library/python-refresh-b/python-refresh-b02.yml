explanation_markdown: |
  Python already tracks each value's type at runtime, so `isinstance` can
  report it. Checking `None` and strings first keeps the numeric branches
  simple, and `str.strip()` treats whitespace-only cells the same as empty
  ones. A quoted `"42"` is still text, which is why the check order matters.
common_mistakes:
  - Testing for int before float, or forgetting that strings need their own branch.
  - Treating a whitespace-only string as text instead of blank.
  - Confusing the string "42" with the number 42.
