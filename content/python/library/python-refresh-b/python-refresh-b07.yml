prompt_markdown: |
  A parking garage charges in whole cents like this:

  - 0 hours parked costs 0
  - the first hour costs 400
  - each additional hour costs 250
  - but the total is never more than a daily cap of 2000

  Write `parking_fee(hours)` that takes the number of whole hours parked as a
  non-negative integer and returns the fee in cents.
starter_code: |
  def parking_fee(hours):
      return 0
function_name: parking_fee
input_mode: function
solution_sketch: Handle zero, add the flat first hour to the per-hour steps, then clamp with the cap.
sample_solution: |
  def parking_fee(hours):
      if hours <= 0:
          return 0
      fee = 400 + (hours - 1) * 250
      return min(fee, 2000)
hints:
  - level: 1
    text: Parking for no time at all is a special case worth handling first.
  - level: 2
    text: After the flat first hour, there are hours - 1 additional hours to charge.
  - level: 3
    text: Use min(fee, 2000) so the total never passes the daily cap.
