explanation_markdown: |
  The fee has three layers. Zero hours is its own case. Otherwise the flat
  400 covers the first hour and `(hours - 1) * 250` adds the rest. The daily
  cap is enforced last with `min`, so any total above 2000 is pulled back
  down to 2000; that first happens at 8 hours, where 2150 becomes 2000.
common_mistakes:
  - Charging 250 for every hour and forgetting the higher flat first hour.
  - Multiplying by hours instead of hours - 1 for the additional hours.
  - Leaving out the cap so long stays overcharge.
