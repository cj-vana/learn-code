  originality_notes: Original diner-check tip calculator working entirely in integer cents to avoid rounding drift.
prompt_markdown: |
  A diner adds a tip to each check. To avoid rounding errors, all money is
  tracked in whole cents.

  Write `check_total(order)` where `order` is a dict with two keys:

  - `"bill_cents"`: the pre-tip bill, an integer number of cents
  - `"tip_percent"`: a whole-number tip percentage (for example, 15)

  Return the total in cents: the bill plus the tip. The tip is
  `bill_cents * tip_percent`, divided by 100 and rounded **down** to a whole
  number of cents.
starter_code: |
  def check_total(order):
      return 0
function_name: check_total
input_mode: function
solution_sketch: Unpack the dict, compute the floored tip in cents, and add it to the bill.
sample_solution: |
  def check_total(order):
      bill_cents = order["bill_cents"]
      tip_percent = order["tip_percent"]
      tip_cents = bill_cents * tip_percent // 100
      return bill_cents + tip_cents
hints:
  - level: 1
    text: Read the two values out of the dict into their own variables first.
  - level: 2
    text: The tip in cents is bill_cents times tip_percent, then divided by 100.
  - level: 3
    text: Use // 100 so the tip is floored to a whole number of cents before adding.
tests:
