    - name: full_double
      input: {bill_cents: 800, tip_percent: 100}
      expected: 1600
explanation_markdown: |
  Working in integer cents keeps the arithmetic exact. Multiplying before the
  `// 100` division means the percentage is applied to the full bill, and the
  floor division drops any fractional cent. Pulling the two fields into named
  variables keeps the final expression easy to read.
common_mistakes:
  - Dividing before multiplying, which loses precision on small bills.
  - Returning only the tip instead of the bill plus the tip.
  - Using / and returning a float number of cents.
