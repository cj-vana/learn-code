prompt_markdown: |
  The Riverside Museum charges admission by age, in whole dollars:

  - under 5 years old: free (0)
  - 5 through 17: 8
  - 18 through 64: 15
  - 65 and older: 10

  Write `museum_admission_price(age)` that takes a visitor's age as a
  non-negative integer and returns the price they pay.
starter_code: |
  def museum_admission_price(age):
      return 0
function_name: museum_admission_price
input_mode: function
solution_sketch: Compare the age against each band boundary from youngest to oldest.
sample_solution: |
  def museum_admission_price(age):
      if age < 5:
          return 0
      if age <= 17:
          return 8
      if age <= 64:
          return 15
      return 10
hints:
  - level: 1
    text: There are four price bands, so you need to decide which one the age falls into.
  - level: 2
    text: Check the boundaries in order, starting with the youngest visitors.
  - level: 3
    text: Once age < 5 is ruled out, an age <= 17 must be a youth, and so on.
tests:
  public:
    - name: toddler_free
      input: 3
