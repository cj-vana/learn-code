explanation_markdown: |
  Ordering the checks from youngest to oldest lets each `if` assume the
  earlier bands were already ruled out. After confirming the visitor is at
  least 5, an age of 17 or less must be a youth; after that, 64 or less must
  be an adult, and everyone remaining is a senior.
common_mistakes:
  - Using overlapping ranges that let two bands both match.
  - Getting a boundary wrong, such as charging a 17-year-old the adult price.
  - Forgetting the free band for children under 5.
