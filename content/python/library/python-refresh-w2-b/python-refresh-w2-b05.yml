prompt_markdown: |
  A weekend soccer league awards 3 points for each win and 1 point for each
  draw; losses are worth nothing.
  Write `standings_points(record)` where `record` is a dict with keys `wins`,
  `draws`, and `losses` (all non-negative integers). Return the team's total
  points as an integer.
starter_code: |
  def standings_points(record):
      return 0
function_name: standings_points
input_mode: function
solution_sketch: Multiply wins by three, add the draws, and ignore the losses.
sample_solution: |
  def standings_points(record):
      return record["wins"] * 3 + record["draws"]
hints:
  - level: 1
    text: Only wins and draws add to the total; losses contribute nothing.
  - level: 2
    text: Each win is worth three points, so scale the win count before adding.
  - level: 3
    text: Return record["wins"] * 3 + record["draws"].
