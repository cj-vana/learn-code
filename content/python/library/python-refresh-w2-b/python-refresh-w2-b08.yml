explanation_markdown: |
  The formula produces a float, so 37 degrees Celsius gives 98.6 before
  rounding. Passing that to `round()` snaps it to the nearest whole number and
  returns an int, which is what the signboard needs. At -40 both scales meet,
  so the answer is -40 either way.
common_mistakes:
  - Using integer division, which drops the fractional part before rounding.
  - Returning the raw float instead of a rounded whole number.
