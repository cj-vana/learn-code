prompt_markdown: |
  A digital signboard shows the outdoor temperature in whole degrees
  Fahrenheit, but the sensor reports whole degrees Celsius.
  Write `celsius_to_fahrenheit(celsius)` that converts a Celsius reading to
  Fahrenheit using `F = C * 9 / 5 + 32` and returns the result rounded to the
  nearest whole number (an integer).
starter_code: |
  def celsius_to_fahrenheit(celsius):
      return 0
function_name: celsius_to_fahrenheit
input_mode: function
solution_sketch: Apply the conversion formula and round the result to a whole number.
sample_solution: |
  def celsius_to_fahrenheit(celsius):
      return round(celsius * 9 / 5 + 32)
hints:
  - level: 1
    text: Translate the formula directly, then deal with the fractional part.
  - level: 2
    text: The board only shows whole degrees, so the result must be rounded.
  - level: 3
    text: round() with no second argument returns the nearest whole number as an int.
