      input: {points: 7, players: 1}
      expected: {per_player: 7, leftover: 0}
    - name: more_players_than_points
      input: {points: 5, players: 10}
      expected: {per_player: 0, leftover: 5}
    - name: two_players
      input: {points: 9, players: 2}
      expected: {per_player: 4, leftover: 1}
explanation_markdown: |
  Floor division and modulo are a matched pair: `points // players` is how many
  whole points each player gets, and `points % players` is exactly what remains.
  Together they always account for every point.
common_mistakes:
  - Using regular division `/`, which returns a float instead of a whole share.
  - Swapping the two results so the leftover and the per-player share are reversed.
