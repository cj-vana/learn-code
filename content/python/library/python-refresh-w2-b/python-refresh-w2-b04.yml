prompt_markdown: |
  A shipping label writes a measurement as a whole number followed directly by
  a unit, with no space, such as `"12kg"` or `"250ml"`.
  Write `parse_measurement(label)` that splits the label into its number and
  its unit. Return a dict with `value` (the number as an integer) and `unit`
  (the trailing letters as a string). Every label starts with at least one
  digit and ends with at least one letter.
starter_code: |
  def parse_measurement(label):
      return {"value": 0, "unit": ""}
function_name: parse_measurement
input_mode: function
solution_sketch: Walk past the leading digits, then split the string into the number part and the unit part.
sample_solution: |
  def parse_measurement(label):
      i = 0
      while i < len(label) and label[i].isdigit():
          i += 1
      return {"value": int(label[:i]), "unit": label[i:]}
hints:
  - level: 1
    text: The number and the unit are joined, so you must find where the digits stop.
  - level: 2
    text: Scan from the start while each character is a digit to locate the split point.
  - level: 3
    text: Slice the string at that point, then convert the digit part with int().
tests:
  public:
