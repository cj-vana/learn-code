explanation_markdown: |
  Strings are just sequences of characters, so you can inspect them one at a
  time. Advancing an index while `isdigit()` holds finds the boundary, and
  slicing gives the two pieces. `int()` then turns the digit substring into a
  real number you can compute with.
common_mistakes:
  - Leaving the value as a string instead of converting it with int().
  - Assuming the unit is always two letters, so a label like "5m" breaks.
