      expected: ''
    - name: single
      input: [[Vega, 0.03, 25]]
      expected: Vega
    - name: three_stars
      input: [[Vega, 0.03, 25], [Rigel, 0.13, 860], [Sirius, -1.46, 9]]
      expected: Sirius
  validation:
