    - name: both_negative
      input: [[Canopus, -0.74, 310], [Arcturus, -0.05, 37]]
      expected: Canopus
    - name: brightest_is_last
      input: [[Alpha, 2.0, 1], [Beta, 1.0, 1], [Gamma, 0.5, 1]]
      expected: Gamma
explanation_markdown: |
  Turning each `[name, magnitude, distance]` row into `Star(*row)` gives you
  attribute access, so `s.magnitude` reads like English and never depends on
  remembering that magnitude lives at index 1. `min(..., key=lambda s:
  s.magnitude)` then scans once and returns the whole record with the smallest
  magnitude, from which you pull `.name`. Because a namedtuple is still a tuple,
  building and unpacking it is cheap.
common_mistakes:
  - Returning the magnitude or the whole record instead of just the star's name.
  - Using max instead of min and reporting the faintest star, since brighter means a smaller magnitude.
  - Forgetting the empty-catalogue case, which makes min raise a ValueError.
