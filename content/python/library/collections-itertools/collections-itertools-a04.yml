prompt_markdown: |
  An observatory stores each star as a raw row `[name, magnitude, distance]`,
  where a *smaller* magnitude means a *brighter* star. Reading `row[1]`
  everywhere is error-prone, so wrap each row in a `namedtuple` with named
  fields first. Write `brightest_star(rows)` where `rows` is a list of such
  rows. Return the `name` of the brightest star (the one with the smallest
  magnitude). An empty catalogue returns the empty string `""`. Assume no two
  stars share the exact same magnitude.
starter_code: |
  def brightest_star(rows):
      return ""
function_name: brightest_star
input_mode: function
solution_sketch: Build a Star namedtuple for each row, then pick the record with the smallest magnitude field.
sample_solution: |
  from collections import namedtuple


  def brightest_star(rows):
      Star = namedtuple("Star", ["name", "magnitude", "distance"])
      stars = [Star(*row) for row in rows]
      if not stars:
          return ""
      return min(stars, key=lambda s: s.magnitude).name
hints:
  - level: 1
    text: Give each row named fields so you can compare stars by magnitude instead of by a bare index.
  - level: 2
    text: Define Star = namedtuple("Star", ["name", "magnitude", "distance"]) and build one with Star(*row) per row.
  - level: 3
    text: 'Use min(stars, key=lambda s: s.magnitude) to find the brightest, then return its .name; handle the empty list up front.'
tests:
  public:
