  - id: q2
    prompt: |
      After `d = defaultdict(int); d["x"] += 1`, what does `dict(d)` equal?
    choices:
      - "{'x': 1}"
      - '{}'
      - "{'x': 0}"
      - 'it raises a KeyError'
    correct_choice: "{'x': 1}"
    explanation: |
      defaultdict(int) supplies 0 for the missing key "x", then += 1 stores 1.
      No KeyError occurs because the factory creates the value before the read.
    concepts:
      - python.collections_module
  - id: q3
    prompt: |
      How many pairs does `list(itertools.combinations([1, 2, 3, 4], 2))`
      contain?
    choices:
      - '6'
      - '12'
      - '8'
      - '16'
    correct_choice: '6'
    explanation: |
      combinations picks unordered pairs, so the count is 4 choose 2 = 6:
      (1,2), (1,3), (1,4), (2,3), (2,4), (3,4).
    concepts:
      - python.itertools_module
  - id: q4
    prompt: |
      What is `list(itertools.islice(itertools.chain([1, 2], [3, 4, 5]), 1, 4))`?
    choices:
      - '[2, 3, 4]'
      - '[1, 2, 3]'
      - '[3, 4, 5]'
      - '[2, 3, 4, 5]'
    correct_choice: '[2, 3, 4]'
    explanation: |
      chain merges the two lists into the stream 1, 2, 3, 4, 5; islice takes
      indices 1 up to but not including 4, giving 2, 3, 4.
    concepts:
      - python.itertools_module
