  - id: q1
    prompt: |
      What does `deque([1, 2, 3, 4])` contain after calling `.rotate(1)` on it?
    choices:
      - 'deque([4, 1, 2, 3])'
      - 'deque([2, 3, 4, 1])'
      - 'deque([1, 2, 3, 4])'
      - 'deque([3, 4, 1, 2])'
    correct_choice: 'deque([4, 1, 2, 3])'
    explanation: |
      A positive rotate argument shifts elements toward the right, popping the
      last item and pushing it onto the front, so 4 moves to the head.
    concepts:
