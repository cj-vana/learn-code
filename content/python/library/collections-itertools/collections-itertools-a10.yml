prompt_markdown: |
  A print shop logs each job as `[customer, pages]`. A customer can appear in
  many jobs across the day, and billing needs the *total* pages each customer
  printed. Write `pages_per_customer(jobs)` where `jobs` is a list of
  `[customer, pages]` records (`pages` is a non-negative integer). Return a
  dictionary mapping each customer to their summed page count. An empty log
  returns an empty dictionary.
starter_code: |
  def pages_per_customer(jobs):
      return {}
function_name: pages_per_customer
input_mode: function
solution_sketch: Accumulate each job's pages into a defaultdict(int) keyed by customer, then convert to a plain dict.
sample_solution: |
  from collections import defaultdict


  def pages_per_customer(jobs):
      totals = defaultdict(int)
      for customer, pages in jobs:
          totals[customer] += pages
      return dict(totals)
hints:
  - level: 1
    text: This is a running sum per customer, not a count of jobs -- add the pages, do not just add one.
  - level: 2
    text: A defaultdict(int) starts each new customer at 0, so totals[customer] += pages works on the first job too.
  - level: 3
    text: Unpack each record as `for customer, pages in jobs`, accumulate into totals, then return dict(totals).
tests:
  public:
    - name: empty
      input: []
      expected: {}
    - name: single_job
      input: [[ana, 5]]
      expected: {ana: 5}
    - name: repeat_customer
      input: [[ana, 3], [bo, 4], [ana, 2]]
      expected: {ana: 5, bo: 4}
  validation:
