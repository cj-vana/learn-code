      input: [[cy, 1], [cy, 1], [cy, 1]]
      expected: {cy: 3}
    - name: includes_zero_page_job
      input: [[dai, 0], [dai, 5]]
      expected: {dai: 5}
    - name: several_customers
      input: [[e, 10], [f, 2], [e, 3], [g, 7]]
      expected: {e: 13, f: 2, g: 7}
explanation_markdown: |
  The key difference from a plain tally is that you add the job's `pages` field
  rather than adding one per job. `defaultdict(int)` supplies a starting `0` the
  first time a customer appears, so `totals[customer] += pages` needs no
  check-then-initialise guard. Converting with `dict(totals)` at the end returns
  an ordinary dictionary for a clean equality comparison.
common_mistakes:
  - Counting jobs with `+= 1` instead of summing the pages field.
  - Overwriting with `totals[customer] = pages`, which keeps only each customer's last job.
  - Using a plain dict and hitting a KeyError on a customer's first job.
