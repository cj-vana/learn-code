prompt_markdown: |
  A weather station streams temperature readings one at a time and keeps only
  the most recent `k` of them in a small buffer. Every time the buffer is full,
  it records the sum of those `k` readings. Write `window_totals(payload)` where
  `payload` is a dict with keys `readings` (a list of integers arriving in
  order) and `k` (a positive integer window size). Return the list of window
  sums, in the order they were recorded. If fewer than `k` readings ever arrive,
  the buffer never fills, so return an empty list.
starter_code: |
  def window_totals(payload):
      return []
function_name: window_totals
input_mode: function
solution_sketch: Feed readings into a deque(maxlen=k); once it holds k items, record its sum after each new reading.
sample_solution: |
  from collections import deque


  def window_totals(payload):
      readings = payload["readings"]
      k = payload["k"]
      buffer = deque(maxlen=k)
      totals = []
      for reading in readings:
          buffer.append(reading)
          if len(buffer) == k:
              totals.append(sum(buffer))
      return totals
hints:
  - level: 1
    text: Keep a buffer that never grows beyond the last k readings as new ones arrive.
  - level: 2
    text: deque(maxlen=k) automatically drops the oldest reading whenever a new append would exceed k.
  - level: 3
    text: After each append, if len(buffer) == k record sum(buffer); collect those sums in order.
