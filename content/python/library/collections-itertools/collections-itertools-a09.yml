explanation_markdown: |
  A `deque(maxlen=k)` is a fixed-size sliding buffer: appending a `k+1`-th item
  silently discards the item on the far end, so the buffer always holds the most
  recent `k` readings. Once its length reaches `k`, every new reading yields a
  fresh full window whose sum you record. If the stream is shorter than `k`, the
  buffer never reaches full length and the result stays empty -- no manual index
  arithmetic or boundary checks required.
common_mistakes:
  - Recording a sum before the buffer is full, producing extra short-window totals.
  - Using a plain list and forgetting to drop the oldest reading, so windows keep growing.
  - Checking len(buffer) >= k after it can never exceed k, which is harmless but hides the maxlen guarantee.
