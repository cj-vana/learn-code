function_name: inventory_delta
input_mode: function
solution_sketch: Load opening into a Counter, add each movement's signed qty, collect names that ended below zero for oversold, then use unary plus to drop non-positive counts for closing.
sample_solution: |
  from collections import Counter


  def inventory_delta(job):
      counts = Counter(job["opening"])
      for move in job["movements"]:
          counts[move["item"]] += move["qty"]

      oversold = sorted(item for item, qty in counts.items() if qty < 0)
      closing = dict(+counts)
      return {"closing": closing, "oversold": oversold}
hints:
  - level: 1
    text: A Counter behaves like a dict of tallies, and indexing a missing key gives 0, so you can add a signed qty to any item without checking whether it exists yet.
  - level: 2
    text: After applying every movement, an item is oversold exactly when its accumulated count is strictly less than zero.
  - level: 3
    text: Unary plus on a Counter (+counts) returns a new Counter that keeps only the entries with a strictly positive count, which is precisely the floored closing stock.
