prompt_markdown: |
  A ship chandlery reconciles its stock at the end of each day. Write
  `inventory_delta(job)` where `job` is a dict with:

  - `"opening"`: a dict mapping each item name to its opening quantity (a
    non-negative integer).
  - `"movements"`: a list of change records, each a dict `{"item": name, "qty":
    delta}` where `delta` is an integer that may be positive (stock received) or
    negative (stock sold). An item may appear in several movements, and a movement
    may name an item not present at opening.

  Apply every movement to the opening counts using `Counter` arithmetic, then
  return a dict with two keys:

  - `"closing"`: a dict of the remaining stock. Any item whose running total ends
    at zero or below is **floored to 0 and left out** of `closing`, so `closing`
    lists only items with stock still on hand.
  - `"oversold"`: a **sorted** list of the names of items whose running total
    finished **below zero** (more was sold than was available).

  For example, opening `{"bolts": 10, "nuts": 5}` with movements
  `[{"item": "bolts", "qty": -3}, {"item": "nuts", "qty": -8}, {"item": "washers",
  "qty": 4}]` returns
  `{"closing": {"bolts": 7, "washers": 4}, "oversold": ["nuts"]}`.
