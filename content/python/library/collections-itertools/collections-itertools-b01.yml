explanation_markdown: |
  `Counter` turns stock reconciliation into arithmetic. Loading `opening` straight
  into a `Counter` gives every known item its starting tally, and because indexing
  a missing key returns `0`, you can add a signed `qty` to any item — even one that
  never appeared at opening — without a guard clause. Accumulating in place lets an
  item collect several movements naturally. The two outputs then read off the same
  tallies from different angles: an item is *oversold* when its final count is
  strictly negative, and the *closing* stock is what remains after flooring
  negatives away. The tidy way to floor is unary plus: `+counts` returns a new
  `Counter` containing only strictly positive entries, which drops both the
  oversold items and anything that landed exactly at zero. Sorting the oversold
  names makes the report deterministic.
common_mistakes:
  - Using Counter subtraction that clamps at zero before you can see which items went negative, so oversold items are missed.
  - Leaving items that ended at zero in the closing dict; the spec floors them out entirely.
  - Forgetting to sort the oversold list, which makes the output order depend on insertion order.
