prompt_markdown: |
  A greenhouse calibrates its humidity sensors in balanced pairs: two sensors
  balance when their readings add up to exactly a target value. Write
  `count_balanced_pairs(payload)` where `payload` is a dict with keys `readings`
  (a list of integers) and `target` (an integer). Return the number of
  *unordered* pairs of positions whose two readings sum to the target. A pair is
  chosen by position, so equal readings at different positions still count as
  separate sensors, but each pair `{i, j}` is counted only once.
starter_code: |
  def count_balanced_pairs(payload):
      return 0
function_name: count_balanced_pairs
input_mode: function
solution_sketch: Use itertools.combinations to walk each unordered pair once and count those that sum to the target.
sample_solution: |
  from itertools import combinations


  def count_balanced_pairs(payload):
      readings = payload["readings"]
      target = payload["target"]
      return sum(1 for a, b in combinations(readings, 2) if a + b == target)
hints:
  - level: 1
    text: You want every pair of two different positions, without counting a pair twice.
  - level: 2
    text: itertools.combinations(readings, 2) yields each unordered pair (a, b) exactly once.
  - level: 3
    text: Count the pairs where a + b == target; a generator with sum(1 for ...) totals them cleanly.
