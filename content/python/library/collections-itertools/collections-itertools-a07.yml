explanation_markdown: |
  `combinations(readings, 2)` yields every unordered pair of positions exactly
  once -- `(a, b)` appears but `(b, a)` never does -- which is precisely what
  "count each pair once" demands. Summing `1` for every pair whose values add to
  the target counts the matches in a single readable pass. Because combinations
  works on positions rather than values, four identical readings still produce
  `C(4, 2) = 6` distinct pairs.
common_mistakes:
  - Using permutations or a double loop over all i and j, which counts every pair twice.
  - Deduplicating by value and undercounting when equal readings sit at different positions.
  - Comparing with `<=` or `>=` instead of an exact `==` to the target.
