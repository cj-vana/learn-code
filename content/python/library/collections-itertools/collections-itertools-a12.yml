explanation_markdown: |
  Every subset of the crates is one entry in the powerset. You build it by
  asking `combinations(weights, size)` for each size from `0` to the number of
  crates and gluing those streams together with `chain.from_iterable` -- a tidy
  way to enumerate all subsets without recursion. Each subset's sum is checked
  against the capacity, and the best fitting total wins. Seeding `best` at `0`
  covers the empty load, which is why a zero capacity or all-too-heavy crates
  correctly returns 0.
common_mistakes:
  - Only considering subsets of one fixed size instead of chaining across every size.
  - Forgetting the empty subset (size 0), so a zero-capacity load has no valid answer.
  - Returning the first subset that fits rather than the maximum fitting total.
