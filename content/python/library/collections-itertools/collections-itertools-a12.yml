prompt_markdown: |
  A courier drone can carry any subset of the waiting crates as long as the
  total weight does not exceed its capacity. Write `best_load(payload)` where
  `payload` is a dict with keys `weights` (a list of positive integer crate
  weights) and `capacity` (a non-negative integer). Return the largest total
  weight of any subset of crates that fits within the capacity. Carrying nothing
  is always allowed, so the answer is at least 0. The crate list is short (at
  most a handful of crates), so it is fine to examine every possible subset.
starter_code: |
  def best_load(payload):
      return 0
function_name: best_load
input_mode: function
solution_sketch: Generate every subset by chaining combinations of each size, then take the largest subset sum that fits.
sample_solution: |
  from itertools import chain, combinations


  def best_load(payload):
      weights = payload["weights"]
      capacity = payload["capacity"]
      subsets = chain.from_iterable(
          combinations(weights, size) for size in range(len(weights) + 1)
      )
      best = 0
      for subset in subsets:
          total = sum(subset)
          if total <= capacity:
              best = max(best, total)
      return best
hints:
  - level: 1
    text: With only a few crates you can afford to look at every possible subset and keep the best that fits.
  - level: 2
    text: combinations(weights, size) gives every subset of a fixed size; chaining over sizes 0..len builds the full powerset.
  - level: 3
    text: For each subset compute sum(subset); track the max total that is still <= capacity, starting from 0 for the empty load.
