explanation_markdown: |
  This is a matching-count problem, and the two-stage structure keeps the brute
  force honest. Stage one reduces the crew to the raw material: every pair of
  members whose certification sets are disjoint, which `set.isdisjoint` checks
  directly. Representing each shift as a `frozenset` of the two names makes the
  second stage's overlap test a plain set intersection. Stage two asks a
  combinatorial question — how many ways to pick `pairs` of those shifts so nobody
  is double-booked — and `itertools.combinations` enumerates the candidate rosters
  without repeating or reordering. For each candidate you sweep its shifts, keeping
  a running set of used names and rejecting the moment a name repeats. Because the
  crew is small, the number of shifts and combinations stays tiny, so exhaustive
  enumeration is both correct and fast. Two edge cases fall straight out of
  `combinations`: `pairs = 0` yields the single empty selection (one roster), and
  asking for more pairs than the crew can support yields no valid combination.
common_mistakes:
  - Checking only that each shift is skill-disjoint but forgetting the member-disjoint rule, so one person is booked onto two shifts at once.
  - Counting ordered selections of shifts, which multiplies the true roster count by the number of shift orderings.
  - Treating shift order within a pair as significant, so a-b and b-a are counted as two different shifts.
