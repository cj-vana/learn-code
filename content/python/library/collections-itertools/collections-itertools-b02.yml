solution_sketch: List every valid two-person shift as a frozenset of names (skill sets disjoint). Then for each combination of `pairs` shifts, accept it only if the chosen shifts use no member twice; count the accepted combinations.
sample_solution: |
  from itertools import combinations


  def shift_pairings(job):
      crew = job["crew"]
      pairs = job["pairs"]
      names = sorted(crew)

      valid_shifts = []
      for a, b in combinations(names, 2):
          if set(crew[a]).isdisjoint(crew[b]):
              valid_shifts.append(frozenset((a, b)))

      count = 0
      for chosen in combinations(valid_shifts, pairs):
          used = set()
          ok = True
          for shift in chosen:
              if used & shift:
                  ok = False
                  break
              used |= shift
          if ok:
              count += 1
      return count
