prompt_markdown: |
  A coastal rescue station rosters its crew into two-person lifeboat shifts. To
  avoid duplicated coverage, the two people on a shift must have **no certification
  in common**. Write `shift_pairings(job)` where `job` is a dict with:

  - `"crew"`: a dict mapping each crew member's name to a list of their
    certification names.
  - `"pairs"`: a non-negative integer, the number of shifts (pairs) to fill.

  A **valid shift** is any two distinct crew members whose certification lists
  share no common entry. A **valid roster** chooses exactly `"pairs"` valid shifts
  such that **no crew member is used on more than one shift**. Two rosters are the
  same if they use the same set of shifts (order of the shifts, and order within a
  shift, do not matter).

  Return the integer count of distinct valid rosters. The crew is small, so it is
  fine to try every combination. Filling `0` pairs is always possible in exactly
  one way (the empty roster), so `pairs = 0` returns `1`. If there are not enough
  compatible people to fill that many shifts, return `0`.

  For example, with crew `{"a": ["radio"], "b": ["medic"], "c": ["radio"],
  "d": ["medic"]}` and `pairs = 2`, the only rosters are `{a-b, c-d}` and
  `{a-d, b-c}`, so the answer is `2`.
