explanation_markdown: |
  `defaultdict(int)` returns `0` for any code you have not seen yet, so the very
  first `counts[code] += 1` reads that zero, adds one, and stores the result.
  There is no separate "have I seen this before?" branch. Wrapping the result in
  `dict(...)` produces a plain dictionary that compares equal to the expected
  counts.
common_mistakes:
  - Writing `counts[code] = counts[code] + 1` against a plain dict, which raises KeyError on the first sighting.
  - Counting distinct codes rather than total scans by using a set.
  - Returning the defaultdict without converting when an exact plain-dict result is expected (harmless here, but a good habit).
