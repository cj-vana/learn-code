prompt_markdown: |
  A museum records the exhibit code scanned at each turnstile as visitors enter.
  Write `tally_scans(scans)` where `scans` is a list of exhibit codes (strings).
  Return a dictionary mapping each code to the number of times it was scanned.
  An empty list returns an empty dictionary.
starter_code: |
  def tally_scans(scans):
      return {}
function_name: tally_scans
input_mode: function
solution_sketch: Increment a defaultdict(int) once per scanned code.
sample_solution: |
  from collections import defaultdict


  def tally_scans(scans):
      counts = defaultdict(int)
      for code in scans:
          counts[code] += 1
      return dict(counts)
hints:
  - level: 1
    text: You need a running count per code, so each value should be a number that grows.
  - level: 2
    text: A defaultdict(int) starts every unseen code at 0, so `counts[code] += 1` just works.
  - level: 3
    text: Loop over scans, do `counts[code] += 1`, then return dict(counts).
