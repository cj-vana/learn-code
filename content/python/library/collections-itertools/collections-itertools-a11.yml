prompt_markdown: |
  A transit map is a list of legs, each written `[origin, destination]`. A
  station's *traffic* is how many times it shows up as an endpoint anywhere on
  the map -- counting both the origins and the destinations. Write
  `busiest_hub(legs)` that returns the name of the station with the highest
  traffic. If several stations tie for the highest traffic, return the one whose
  name comes first alphabetically. An empty map returns the empty string `""`.

  For example, in `[["a", "b"], ["b", "c"], ["b", "a"]]` the endpoints are
  `a, b, b, c, b, a`, so `b` has traffic 3 and wins.
starter_code: |
  def busiest_hub(legs):
      return ""
function_name: busiest_hub
input_mode: function
solution_sketch: Flatten every endpoint with chain.from_iterable into a Counter, then pick the max count breaking ties by name.
sample_solution: |
  from collections import Counter
  from itertools import chain


  def busiest_hub(legs):
      counts = Counter(chain.from_iterable(legs))
      if not counts:
          return ""
      return min(counts, key=lambda station: (-counts[station], station))
hints:
  - level: 1
    text: Every leg contributes two endpoints; treat all origins and destinations as one big pile of station names.
  - level: 2
    text: chain.from_iterable(legs) yields each endpoint in turn, and Counter tallies how often each station appears.
  - level: 3
    text: 'Pick the winner with min(counts, key=lambda s: (-counts[s], s)) so the highest count wins and ties go to the alphabetically smallest name.'
