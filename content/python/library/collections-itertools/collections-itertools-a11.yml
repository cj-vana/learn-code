explanation_markdown: |
  `chain.from_iterable(legs)` lazily walks every endpoint across all legs
  without first building a flattened list, and `Counter` tallies each station in
  one pass -- a clean pairing of an itertools combinator with a collections
  helper. The tie-break is the subtle part: sorting by the tuple `(-count,
  name)` and taking the `min` puts the largest count first (because negating
  flips the order) and, among equal counts, the alphabetically smallest name.
  In `[["z", "z"], ["a", "b"]]`, station `z` is counted twice from the single
  self-referencing leg, which is exactly what "counts both endpoints" means.
common_mistakes:
  - Counting only origins or only destinations instead of both endpoints of every leg.
  - Using max with an unstable or missing tie-break, so equal-traffic stations return inconsistently.
  - Sorting by count ascending, or forgetting to negate the count, and returning the least-busy station.
