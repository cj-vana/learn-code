prompt_markdown: |
  A food truck builds a meal by choosing exactly one base, one side, and one
  drink. Each choice has a whole-number price. Write
  `combos_under_budget(payload)` where `payload` is a dict with keys `bases`,
  `sides`, `drinks` (each a list of integer prices) and `budget` (an integer).
  Return the number of `(base, side, drink)` combinations whose three prices sum
  to *at most* the budget. If any menu is empty, no meal can be built, so return
  0.
starter_code: |
