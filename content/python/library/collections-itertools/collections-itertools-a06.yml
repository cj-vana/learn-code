explanation_markdown: |
  `product(bases, sides, drinks)` produces the cartesian product -- exactly the
  triples you would get from three nested `for` loops, but flattened into one
  clean iteration. Each triple is tested against the budget with a `<=` so the
  boundary case (a meal costing precisely the budget) is included. When any menu
  is empty the product is empty, so the loop never runs and the count stays 0,
  which matches "no meal can be built".
common_mistakes:
  - Using a strict `<` and missing meals that cost exactly the budget.
  - Nesting three manual loops incorrectly (for example reusing the same loop variable) instead of leaning on product.
  - Counting items rather than combinations by summing menu lengths.
