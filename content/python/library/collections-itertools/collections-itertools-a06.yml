      return 0
function_name: combos_under_budget
input_mode: function
solution_sketch: Enumerate every base/side/drink triple with itertools.product and count those within budget.
sample_solution: |
  from itertools import product


  def combos_under_budget(payload):
      bases = payload["bases"]
      sides = payload["sides"]
      drinks = payload["drinks"]
      budget = payload["budget"]
      count = 0
      for base, side, drink in product(bases, sides, drinks):
          if base + side + drink <= budget:
              count += 1
      return count
