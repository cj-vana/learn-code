function_name: read_page
input_mode: function
solution_sketch: Flatten the chunks with chain.from_iterable, then take the page's window with islice.
sample_solution: |
  from itertools import chain, islice


  def read_page(payload):
      chunks = payload["chunks"]
      page = payload["page"]
      size = payload["size"]
      stream = chain.from_iterable(chunks)
      start = page * size
      return list(islice(stream, start, start + size))
