prompt_markdown: |
  A telemetry system stores readings in daily chunks -- a list of lists, oldest
  chunk first. A dashboard shows one page at a time from the single continuous
  stream you get by laying the chunks end to end. Write `read_page(payload)`
  where `payload` is a dict with keys `chunks` (a list of lists), `page` (a
  0-based page number), and `size` (how many readings per page). Return the list
  of readings on that page. Page `p` covers stream positions `p*size` up to but
  not including `(p+1)*size`. A page past the end of the stream returns an empty
  list, and the final page may be short.
starter_code: |
