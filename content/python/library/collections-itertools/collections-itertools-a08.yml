explanation_markdown: |
  `chain.from_iterable(chunks)` glues the daily lists into one lazy stream
  without copying them into a large combined list, so a page that straddles a
  chunk boundary is handled for free. `islice(stream, start, start + size)` is
  the iterator version of `stream[start:start + size]` -- it discards the first
  `start` items and yields the next `size`. Positions past the end simply run
  out, so an out-of-range page yields nothing and the last page comes back
  short, both without special-casing.
common_mistakes:
  - Computing the wrong start, such as using page instead of page * size.
  - Passing a length instead of a stop index to islice; islice takes start and stop, not start and count.
  - Forgetting to wrap the islice result in list(...), returning an iterator instead of a list.
