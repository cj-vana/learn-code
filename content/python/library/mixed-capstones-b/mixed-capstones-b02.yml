prompt_markdown: |
  A rooftop solar array logs its daily energy output in a `readings` list. An
  analyst wants the single stretch of `k` consecutive days with the greatest
  total output.

  Write `brightest_stretch(data)` where `data` is a dict with keys `readings`
  and `k`. Return the maximum sum of any `k` back-to-back readings. If `k` is
  zero, negative, or larger than the number of readings, return `0`.
starter_code: |
  def brightest_stretch(data):
      return 0
function_name: brightest_stretch
input_mode: function
solution_sketch: Sum the first window, then slide by adding the entering day and removing the leaving day.
sample_solution: |
  def brightest_stretch(data):
      readings = data["readings"]
      k = data["k"]
      n = len(readings)
      if k <= 0 or k > n:
          return 0
      window = sum(readings[:k])
      best = window
      for i in range(k, n):
          window += readings[i] - readings[i - k]
          if window > best:
              best = window
      return best
hints:
  - level: 1
    text: Every candidate answer covers exactly k consecutive days, so think about a window that slides one day at a time.
  - level: 2
    text: Compute the first window's sum once, then update it in O(1) as the window moves instead of re-summing.
  - level: 3
    text: When the window advances, add readings[i] and subtract readings[i - k], and track the best sum seen.
