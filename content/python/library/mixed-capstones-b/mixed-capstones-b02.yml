explanation_markdown: |
  A fixed-size sliding window turns "best block of k days" into one linear pass.
  After paying O(k) once to sum the opening window, each shift costs O(1): add
  the day entering on the right and subtract the day leaving on the left. That
  keeps the whole scan O(n) instead of the O(n*k) you would spend re-summing
  every window from scratch.
common_mistakes:
  - Re-summing each window with sum(readings[i:i+k]), which is O(n*k).
  - Forgetting to subtract the reading that leaves the window on the left.
  - Not handling k that is zero or larger than the list length.
