prompt_markdown: |
  A museum records how many visitors entered during each hour it is open in a
  `counts` list. The operations desk fires off several range questions, each a
  pair `[start, end]` of hour indices (inclusive), and wants the total visitors
  in that span.

  Write `visitor_totals(data)` where `data` is a dict with keys `counts` and
  `queries` (a list of `[start, end]` pairs, with `0 <= start <= end < len(counts)`).
  Return a list holding the total for each query, in order. With no queries,
  return an empty list.
starter_code: |
  def visitor_totals(data):
      return []
function_name: visitor_totals
input_mode: function
solution_sketch: Build a prefix-sum array once, then answer each range in O(1) via prefix[end+1] - prefix[start].
sample_solution: |
  def visitor_totals(data):
      counts = data["counts"]
      queries = data["queries"]
      prefix = [0]
      for value in counts:
          prefix.append(prefix[-1] + value)
      results = []
      for start, end in queries:
          results.append(prefix[end + 1] - prefix[start])
      return results
hints:
  - level: 1
    text: Answering many overlapping ranges by re-adding the slice each time repeats a lot of work.
  - level: 2
    text: Precompute a running total so any range sum becomes a subtraction of two precomputed values.
  - level: 3
    text: With prefix[0] = 0 and prefix[i+1] = prefix[i] + counts[i], the inclusive range [start, end] equals prefix[end + 1] - prefix[start].
tests:
  public:
