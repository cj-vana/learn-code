explanation_markdown: |
  When many range-sum questions hit the same array, prefix sums pay off. Building
  `prefix`, where `prefix[i]` is the total of the first `i` counts, costs one
  O(n) pass. After that, the sum of any inclusive range `[start, end]` is just
  `prefix[end + 1] - prefix[start]`, an O(1) lookup. So q queries cost O(n + q)
  instead of O(n * q) from re-adding each slice.
common_mistakes:
  - Using prefix[end] - prefix[start] and dropping the final hour of the range.
  - Forgetting the leading 0 in the prefix array, which shifts every index.
  - Re-summing counts[start:end+1] per query, which defeats the purpose of prefix sums.
