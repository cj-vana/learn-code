explanation_markdown: |
  Because the shelf is sorted, binary search finds the insertion slot in
  O(log n). The loop narrows a `[lo, hi)` window to the leftmost index whose
  value is at least `new_id`: values strictly smaller push `lo` up, everything
  else pulls `hi` down. When the window closes, `lo` is the first slot where the
  new number belongs, which also keeps ties ahead of existing equal numbers.
common_mistakes:
  - Using catalog[mid] <= target, which lands after equal numbers instead of before them.
  - Setting hi to len(catalog) - 1, which can miss an insertion at the very end.
  - Falling back to a linear scan, giving O(n) instead of the intended O(log n).
