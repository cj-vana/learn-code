prompt_markdown: |
  A library shelf holds books ordered by catalog number in a sorted `catalog`
  list. A returned book with catalog number `new_id` must be re-shelved so the
  list stays sorted. If its number ties existing books, it should slide in
  ahead of the first equal number (the leftmost valid slot).

  Write `shelf_position(data)` where `data` is a dict with keys `catalog` (a
  list sorted ascending) and `new_id`. Return the index where `new_id` should be
  inserted. Do this in O(log n) with binary search rather than scanning.
starter_code: |
  def shelf_position(data):
      return 0
function_name: shelf_position
input_mode: function
solution_sketch: Binary search for the leftmost index whose value is not less than new_id.
sample_solution: |
  def shelf_position(data):
      catalog = data["catalog"]
      target = data["new_id"]
      lo = 0
      hi = len(catalog)
      while lo < hi:
          mid = (lo + hi) // 2
          if catalog[mid] < target:
              lo = mid + 1
          else:
              hi = mid
      return lo
hints:
  - level: 1
    text: The list is already sorted, so you can halve the search space each step instead of walking it.
  - level: 2
    text: Track a lo/hi range and look for the first position whose value is not less than new_id.
  - level: 3
    text: When catalog[mid] < new_id move lo past mid, otherwise pull hi down to mid; lo is the answer when they meet.
