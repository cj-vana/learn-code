explanation_markdown: |
  A "bound method" is a function that has already captured the object it will run
  against. When you write `desk.announce`, Python's descriptor machinery hands back
  a bound method that remembers `desk` as `self`; `inspect.ismethod` reports `True`.
  A classmethod behaves the same way but binds the class instead of an instance, so
  `GuideDesk.from_config` is also bound.

  The instructive contrast is the *unbound* cases. `GuideDesk.announce` reached
  through the class is just the underlying function with nothing attached, and a
  `@staticmethod` is deliberately a plain function even when reached through an
  instance — that is the whole point of `staticmethod`. Module functions and lambdas
  were never methods at all. `inspect.ismethod` draws exactly this line, which is
  why it answers `False` for every one of them.
common_mistakes:
  - Assuming a staticmethod counts as a method; inspect.ismethod treats it as a plain function because it has no bound self or cls.
  - Thinking GuideDesk.announce and desk.announce are the same object — only the instance access produces a bound method.
  - Reaching for callable() instead of inspect.ismethod; callable() is True for every entry in the registry and cannot tell bound methods apart.
