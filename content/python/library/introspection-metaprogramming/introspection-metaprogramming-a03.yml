prompt_markdown: |
  A museum's audio-guide desk wires up handlers from several sources: methods bound
  to a live desk, the same methods pulled off the class, a static helper, a
  classmethod factory, a plain module function, and a lambda. Some of these carry a
  `self`/`cls` already attached (they are **bound methods**); the rest are just
  functions. The desk needs to know which is which.

  Write `is_bound_method(handler)`. The single argument is the handler's name (a
  string). Look the handler up in the desk's registry and return `True` if it is a
  bound method and `False` otherwise, using `inspect.ismethod`.

  The registry (already defined for you) maps these names:

  - `"bound_announce"` -> `desk.announce` (an instance method reached through a live
    instance) -> bound method
  - `"class_factory"` -> `GuideDesk.from_config` (a classmethod) -> bound method
    (bound to the class)
  - `"unbound_announce"` -> `GuideDesk.announce` (the same method reached through
    the class) -> a plain function, **not** bound
  - `"static_format"` -> `desk.format_time` (a staticmethod) -> a plain function
  - `"module_handler"` -> a top-level `def` function -> not bound
  - `"lambda_handler"` -> a lambda -> not bound

  So `is_bound_method("bound_announce")` returns `True` and
  `is_bound_method("static_format")` returns `False`. An unknown handler name
  returns `False`.
starter_code: |
  import inspect


  class GuideDesk:
      def announce(self):
          return "welcome"

      @staticmethod
      def format_time(minutes):
          return minutes

      @classmethod
      def from_config(cls, data):
          return cls()


  desk = GuideDesk()


  def module_handler(payload):
      return payload


  lambda_handler = lambda value: value

  REGISTRY = {
      "bound_announce": desk.announce,
      "class_factory": GuideDesk.from_config,
      "unbound_announce": GuideDesk.announce,
      "static_format": desk.format_time,
      "module_handler": module_handler,
      "lambda_handler": lambda_handler,
  }


  def is_bound_method(handler):
      return False
function_name: is_bound_method
input_mode: function
solution_sketch: Look the handler up in the registry and pass whatever you find to inspect.ismethod, which is True only for methods that already have an instance or class bound to them. An unknown name resolves to None, and inspect.ismethod(None) is False.
sample_solution: |
  import inspect


  class GuideDesk:
      def announce(self):
          return "welcome"

      @staticmethod
      def format_time(minutes):
          return minutes

      @classmethod
      def from_config(cls, data):
          return cls()


  desk = GuideDesk()


  def module_handler(payload):
      return payload


  lambda_handler = lambda value: value

  REGISTRY = {
      "bound_announce": desk.announce,
      "class_factory": GuideDesk.from_config,
      "unbound_announce": GuideDesk.announce,
      "static_format": desk.format_time,
      "module_handler": module_handler,
      "lambda_handler": lambda_handler,
  }


  def is_bound_method(handler):
      target = REGISTRY.get(handler)
      return inspect.ismethod(target)
