solution_sketch: Resolve the routine from the catalog (return an unknown-routine error if missing). Wrap signature.bind(*args, **kwargs) in a try/except TypeError, returning a cannot-bind error on failure. On success call apply_defaults() and return dict(bound.arguments).
sample_solution: |
  import inspect


  def brew_order(size, roast="medium", oat_milk=False):
      return (size, roast, oat_milk)


  def schedule_pickup(day, hour, note="none"):
      return (day, hour, note)


  CATALOG = {"brew_order": brew_order, "schedule_pickup": schedule_pickup}


  def call_with_bound_args(request):
      fn = CATALOG.get(request["routine"])
      if fn is None:
          return {"error": "unknown routine"}
      args = request.get("args", [])
      kwargs = request.get("kwargs", {})
      try:
          bound = inspect.signature(fn).bind(*args, **kwargs)
      except TypeError:
          return {"error": "cannot bind"}
      bound.apply_defaults()
      return dict(bound.arguments)
