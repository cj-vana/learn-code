      expected:
        error: unknown routine
explanation_markdown: |
  `Signature.bind` is the same matching Python performs when it calls a function: it
  pairs your positional and keyword arguments with the declared parameters and
  raises `TypeError` if they cannot be reconciled. What it does **not** do on its own
  is invent defaults — a bound object only remembers what you actually passed. That
  is why `apply_defaults()` is a separate step; it walks the signature and inserts
  each missing parameter's default so the kitchen ticket is complete.

  Catching `TypeError` around `bind` gives you a clean, testable validation layer
  without ever calling the real function, and separating the catalog lookup keeps the
  two failure modes — an unknown routine versus a malformed call — distinct. The
  result is a normalised `{name: value}` record no matter how the order was phrased.
common_mistakes:
  - Skipping apply_defaults(), so parameters left at their defaults are missing from the returned dict.
  - Letting bind's TypeError propagate instead of catching it and returning the cannot-bind error.
  - Conflating the two error paths, so an unknown routine and an unbindable call return the same message.
