prompt_markdown: |
  A bakery's counter takes orders in a jumble of positional and keyword form, but
  the kitchen ticket needs every field spelled out with defaults filled in. You will
  normalise a raw call against a routine's signature.

  Write `call_with_bound_args(request)`. The single argument is a dict shaped like:

  ```python
  {"routine": "brew_order", "args": ["large"], "kwargs": {"oat_milk": True}}
  ```

  - `routine` names a function in the counter's catalog.
  - `args` is the list of positional arguments and `kwargs` the dict of keyword
    arguments to apply.

  Use `inspect.signature(fn).bind(*args, **kwargs)` to match the call to the
  signature, then `apply_defaults()` to fill in any missing defaults, and return the
  resulting `{parameter_name: value}` dict.

  The catalog (already defined for you) contains:

  - `brew_order(size, roast="medium", oat_milk=False)`
  - `schedule_pickup(day, hour, note="none")`

  So `{"routine": "brew_order", "args": ["large"], "kwargs": {}}` returns
  `{"size": "large", "roast": "medium", "oat_milk": False}` — the two defaults are
  filled in. Handle the error cases explicitly:

  - If `routine` is not in the catalog, return `{"error": "unknown routine"}`.
  - If the provided arguments do not fit the signature (a required argument is
    missing, or there are too many), `bind` raises `TypeError`; catch it and return
    `{"error": "cannot bind"}`.
