  public:
    - name: defaults_filled_in
      input:
        routine: brew_order
        args: [large]
        kwargs: {}
      expected:
        size: large
        roast: medium
        oat_milk: false
    - name: positional_and_keyword_mix
      input:
        routine: brew_order
        args: [small, dark]
        kwargs:
          oat_milk: true
      expected:
        size: small
        roast: dark
        oat_milk: true
    - name: all_keyword
      input:
        routine: brew_order
        args: []
        kwargs:
          size: medium
          roast: light
      expected:
