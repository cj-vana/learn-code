explanation_markdown: |
  In the sandbox a function has no source file behind it, so `inspect.getsource`
  would raise `OSError`. The docstring, however, lives on the object itself as
  `__doc__`, and `inspect.getdoc` reads it directly — no file needed. `getdoc`
  also does two clean-ups a raw `__doc__` does not: it removes the common leading
  whitespace that indentation adds, and it strips blank lines above the first and
  below the last line of text.

  That trimming is why `paper_feed`, whose docstring is padded with empty lines
  top and bottom, measures 2 rather than 4 — only the two lines of real content
  survive. Meanwhile `ink_mix` measures 3 because the blank line *between* its two
  sentences sits inside the text and is kept. Reading metadata off the live object
  is the sandbox-safe way to answer "how long is this routine's manual?".
common_mistakes:
  - Calling inspect.getsource, which raises OSError for functions defined without a real source file.
  - Reading __doc__ directly and counting its raw indented lines instead of letting getdoc normalise them.
  - Forgetting the no-docstring case, so getdoc returns None and .splitlines() raises an AttributeError.
