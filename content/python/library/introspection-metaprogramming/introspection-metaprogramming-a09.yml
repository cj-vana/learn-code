prompt_markdown: |
  A letterpress print shop keeps a short operating manual in each routine's
  docstring. You need to measure how long each manual is — but you cannot read
  the source files, only the live routine objects.

  Five routines are defined and collected in a `_ROUTINES` dictionary mapping each
  name to its function object. Write `manual_line_count(name)`, which looks up the
  named routine and returns the number of lines in its **cleaned** docstring.

  Use `inspect.getdoc(func)`, which returns the docstring with the shared leading
  indentation removed and with surrounding blank lines stripped, or `None` when
  the routine has no docstring. Behaviour to implement exactly:

  - If `inspect.getdoc(func)` is `None` (the routine has no docstring), return `0`.
  - Otherwise return the number of lines in the cleaned docstring, counting each
    line including blank lines that sit *between* text lines. Use
    `len(cleaned.splitlines())`.

  Because `getdoc` trims blank lines at the very top and bottom, a manual that is
  padded with empty lines above and below its text counts only the lines from its
  first word to its last. The given `name` is always a key in `_ROUTINES`.
