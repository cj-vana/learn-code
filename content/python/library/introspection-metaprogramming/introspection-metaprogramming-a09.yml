sample_solution: |
  import inspect


  def press_setup():
      """Warm the press to temperature."""
      return 1


  def ink_mix():
      """Blend the ink.

      Stir until even.
      """
      return 2


  def roller_clean():
      """Wipe the roller.
      Dry it fully.
      """
      return 3


  def plate_align():
      return 4


  def paper_feed():
      """

      Load the paper tray.
      Check the alignment.

      """
      return 5


  _ROUTINES = {
      "press_setup": press_setup,
      "ink_mix": ink_mix,
      "roller_clean": roller_clean,
      "plate_align": plate_align,
      "paper_feed": paper_feed,
  }


  def manual_line_count(name):
      func = _ROUTINES[name]
      cleaned = inspect.getdoc(func)
      if cleaned is None:
          return 0
      return len(cleaned.splitlines())
