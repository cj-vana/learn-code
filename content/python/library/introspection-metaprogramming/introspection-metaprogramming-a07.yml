sample_solution: |
  import dis


  def ring_plain(n):
      return n + 1


  def ring_peal(n):
      if n <= 0:
          return 0
      return 1 + ring_peal(n - 1)


  def ring_cascade(n):
      if n <= 0:
          return 0
      return ring_cascade(n - 1)


  def ring_relay(n):
      if n <= 0:
          return 0
      return ring_answer(n - 1)


  def ring_answer(n):
      if n <= 0:
          return 0
      return ring_relay(n - 1)


  def ring_mirror():
      return ring_mirror


  _ROUTINES = {
      "ring_plain": ring_plain,
      "ring_peal": ring_peal,
      "ring_cascade": ring_cascade,
      "ring_relay": ring_relay,
      "ring_answer": ring_answer,
      "ring_mirror": ring_mirror,
  }


  def _rings_itself(func, own_name):
      instructions = list(dis.get_instructions(func))
      loads_own_name = any(instr.argval == own_name for instr in instructions)
      makes_a_call = any("CALL" in instr.opname for instr in instructions)
      return loads_own_name and makes_a_call


  def find_echoing_routines(names):
      echoing = []
      for name in names:
          func = _ROUTINES[name]
          if _rings_itself(func, name):
              echoing.append(name)
      return sorted(echoing)
