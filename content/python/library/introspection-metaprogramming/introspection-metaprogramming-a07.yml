prompt_markdown: |
  A campanile keeps a set of ringing routines. Some are **self-ringing**: they
  call themselves to repeat a peal. You want to find those *without running
  them*, because running a self-calling routine could loop forever. You can tell
  by reading each routine's compiled bytecode instead.

  Six routines are already defined and collected in a `_ROUTINES` dictionary that
  maps each name to its function object. Write `find_echoing_routines(names)`,
  which receives a **list of routine-name strings** and returns the sorted list
  of those names that ring themselves.

  Use `dis.get_instructions(func)` to read a routine's bytecode. Apply this exact
  rule: a routine **rings itself** when both of these are true of its
  instructions:

  1. Its own name appears as the `argval` of some instruction (the routine loads
     its own name), and
  2. at least one instruction's `opname` contains the substring `"CALL"` (the
     routine makes a call).

  Both conditions must hold. A routine that only *mentions* its own name but
  never makes a call (for example `return ring_mirror`) does **not** ring itself.
  A routine that calls a *different* routine (mutual ringing, like a relay that
  calls its partner) does **not** ring itself, because its own name is never
  loaded. Preserve nothing from the input order: always return the matches sorted
  alphabetically. An empty input list returns an empty list. Every name in
  `names` is guaranteed to be a key in `_ROUTINES`.
