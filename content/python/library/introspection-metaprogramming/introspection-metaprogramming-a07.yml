explanation_markdown: |
  Direct self-recursion leaves two fingerprints in a function's bytecode: the
  compiler emits a load of the function's own global name and, because the
  routine actually invokes it, a call instruction. Checking both is what
  separates a genuine self-call from a routine that merely *names* itself
  (`return ring_mirror` loads the name but never calls) and from mutual
  recursion (a relay loads its partner's name, never its own).

  Reading this statically means you never execute the routine, so you learn that
  `ring_peal` and `ring_cascade` repeat themselves without risking an unbounded
  peal. This is the deterministic, sandbox-safe way to reason about recursion:
  Python has no tail-call optimization, so a self-caller with no base case would
  eventually raise `RecursionError` — but you can spot the self-call by
  introspection before it ever rings.
common_mistakes:
  - Checking only that the name appears and forgetting the call condition, so a routine that just returns its own name is wrongly flagged.
  - Treating mutual recursion as self-recursion, even though each partner loads the other's name rather than its own.
  - Returning the matches in input order instead of sorting them.
