explanation_markdown: |
  Annotations are stored on the function object, and `inspect.signature` surfaces
  them in two places: each `Parameter.annotation` for the parameters, and
  `Signature.return_annotation` for the arrow type. Both use their own "nothing
  here" sentinels — `inspect.Parameter.empty` and `inspect.Signature.empty` — so an
  unannotated parameter like `extra` is filtered out by comparing against the
  sentinel, never by checking for `None`.

  Turning a type into text uses the fact that classes expose a `__name__`. Falling
  back to `str(annotation)` keeps the function robust if a routine ever uses an
  annotation object without a `__name__`. Because none of this parses source code,
  the panel's read-out always matches whatever the running code actually declares.

  (Note: this works because the module does not enable
  `from __future__ import annotations`, which would turn every annotation into a
  string and change what `inspect.signature` hands back.)
common_mistakes:
  - Checking `param.annotation is None` instead of comparing with inspect.Parameter.empty, which either crashes or misclassifies unannotated parameters.
  - Forgetting the return annotation lives on the Signature, not on any Parameter, and omitting the "return" key.
  - Returning the raw type object (int) instead of its "__name__" string, so the value never matches the expected plain text.
