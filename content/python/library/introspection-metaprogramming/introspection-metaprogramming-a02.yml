prompt_markdown: |
  A greenhouse irrigation controller documents each routine with type hints. The
  maintenance panel wants those declared types pulled straight from the code so the
  docs can never drift out of sync.

  Write `signature_annotations(routine)`. The single argument is the routine's name
  (a string). Use `inspect.signature` to read the **real function object** from the
  controller's catalog and return a dict mapping each **annotated** parameter to the
  name of its annotated type, plus a `"return"` key for the return annotation:

  - Report a type by its `__name__`, e.g. the annotation `int` becomes `"int"`,
    `float` becomes `"float"`, `list` becomes `"list"`.
  - Include a parameter **only if it has an annotation**. A parameter with no hint
    is skipped entirely.
  - Include the key `"return"` **only if** the function declares a return
    annotation.

  The catalog (already defined for you) contains:

  - `open_valve(zone: int, seconds: float = 5.0) -> bool`
  - `read_moisture(sensor: str) -> float`
  - `set_schedule(zone: int, hours: list, enabled: bool = True) -> int`
  - `status() -> str`
  - `mix_nutrients(base: int, extra, ratio: float = 0.5) -> float`

  So `signature_annotations("read_moisture")` returns
  `{"sensor": "str", "return": "float"}`, and for `mix_nutrients` the unannotated
  `extra` parameter is omitted:
  `{"base": "int", "ratio": "float", "return": "float"}`. An unknown routine name
  returns `{}`.

  Read every type from the function object with `inspect.signature`; do not
  hard-code the strings.
