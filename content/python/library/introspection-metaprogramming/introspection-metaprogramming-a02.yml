solution_sketch: Look the routine up in the catalog. Walk inspect.signature(fn).parameters, and whenever a parameter's annotation is not Parameter.empty record its __name__. Then add a "return" key when the signature's return_annotation is not Signature.empty.
sample_solution: |
  import inspect


  def open_valve(zone: int, seconds: float = 5.0) -> bool:
      ...


  def read_moisture(sensor: str) -> float:
      ...


  def set_schedule(zone: int, hours: list, enabled: bool = True) -> int:
      ...


  def status() -> str:
      ...


  def mix_nutrients(base: int, extra, ratio: float = 0.5) -> float:
      ...


  CATALOG = {
      "open_valve": open_valve,
      "read_moisture": read_moisture,
      "set_schedule": set_schedule,
      "status": status,
      "mix_nutrients": mix_nutrients,
  }


  def _type_name(annotation):
      return getattr(annotation, "__name__", str(annotation))


  def signature_annotations(routine):
      fn = CATALOG.get(routine)
      if fn is None:
          return {}
      signature = inspect.signature(fn)
      result = {}
      for name, param in signature.parameters.items():
          if param.annotation is not inspect.Parameter.empty:
              result[name] = _type_name(param.annotation)
      if signature.return_annotation is not inspect.Signature.empty:
          result["return"] = _type_name(signature.return_annotation)
      return result
hints:
  - level: 1
    text: Each Parameter object carries a .annotation attribute; when the parameter has no type hint that attribute is the sentinel inspect.Parameter.empty, not None.
  - level: 2
    text: A type object like int knows its own name through the __name__ attribute, so getattr(annotation, "__name__", str(annotation)) turns the annotation into a plain string.
  - level: 3
    text: The return annotation lives on the Signature itself as .return_annotation, with its own sentinel inspect.Signature.empty. Only add the "return" key when that sentinel is absent.
