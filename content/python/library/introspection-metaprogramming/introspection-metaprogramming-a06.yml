function_name: recursion_with_fallback
input_mode: function
solution_sketch: Define an inner recursive helper that carries the remaining segments and the current depth; raise RecursionError once depth would pass limit, return 0 at the base case, and otherwise add the current segment to the recursive result. Call it inside a try/except RecursionError that returns the fallback.
sample_solution: |
  def recursion_with_fallback(descent):
      target = descent["target"]
      limit = descent["limit"]
      fallback = descent["fallback"]

      def descend(remaining, depth):
          if remaining <= 0:
              return 0
          if depth > limit:
              raise RecursionError("descent exceeds rated depth")
          return remaining + descend(remaining - 1, depth + 1)

      try:
          return descend(target, 1)
      except RecursionError:
          return fallback
