explanation_markdown: |
  Each recursive call is one stack frame, and this exercise makes that cost explicit
  by threading a `depth` counter alongside the work. When `depth` would pass the
  rated `limit`, the helper raises `RecursionError` — the same exception type CPython
  raises when a real recursion runs past its limit, because Python does not optimise
  tail calls and cannot silently flatten deep recursion.

  Wrapping the initial call in `try`/`except RecursionError` turns that raised
  exception into a graceful fallback rather than a crash. Modelling the limit
  explicitly, instead of lowering the interpreter's global recursion limit, keeps the
  outcome deterministic and side-effect free: a descent of `target <= limit`
  completes and returns the triangular total, while anything deeper trips the guard
  at `depth = limit + 1` and returns the fallback — without ever recursing the full
  `target` levels.
common_mistakes:
  - Returning a closed-form triangular number instead of real recursion, so the RecursionError fallback path is never actually exercised.
  - Placing the depth check after the recursive call instead of before it, so the guard never fires in time to prevent going deeper.
  - Catching a broad Exception (or forgetting the try/except entirely), which either hides unrelated bugs or lets the RecursionError escape instead of becoming the fallback.
