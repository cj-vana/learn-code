prompt_markdown: |
  A cave-survey team descends a vertical passage one segment at a time, and they
  model the descent **recursively**: descending `target` segments means paying out
  rope for segment `target`, then recursing on the remaining `target - 1`. The total
  rope paid out for a clean descent of `n` segments is `n + (n - 1) + ... + 1`.

  Their rig, though, is only rated for `limit` segments of depth. If a planned
  descent needs to go **deeper than `limit` segments**, the recursion trips a guard
  that raises `RecursionError`, and the team abandons the recursive plan and records
  a `fallback` reading instead. This mirrors how CPython itself guards recursion:
  because Python has no tail-call optimisation, every level consumes a real stack
  frame, so the interpreter raises `RecursionError` once a call goes past its own
  limit.

  Write `recursion_with_fallback(descent)`. The single argument is a dict shaped
  like:

  ```python
  {"target": 5, "limit": 8, "fallback": -1}
  ```

  Descend recursively, tracking how many segments deep you are. Raise
  `RecursionError` from inside the recursion the moment the depth would exceed
  `limit`, and wrap the whole descent in a `try`/`except RecursionError` that returns
  `fallback`. Behaviour to implement exactly:

  - When `target <= limit`, the descent completes: return the total rope paid out,
    `target + (target - 1) + ... + 1`. For example `target = 5` returns `15`.
  - When `target > limit`, the descent trips the guard: return `fallback` unchanged.
  - `target = 0` completes trivially and returns `0` (as long as `limit >= 0`).

  Use real recursion with a `try`/`except RecursionError`, not a closed-form
  formula, so the fallback path is genuinely driven by the raised exception.
starter_code: |
