      A function's default arguments are stored on the object as a tuple in
      func.__defaults__; the mutable default list is __defaults__[0].
  - level: 2
    text: >-
      Calling add(item) uses and mutates the one shared default; calling
      add(item, []) passes a separate list, so those items never reach the
      default.
  - level: 3
    text: >-
      After the two loops, return list(add.__defaults__[0]) so you hand back a
      copy of the accumulated shared sheet in insertion order.
