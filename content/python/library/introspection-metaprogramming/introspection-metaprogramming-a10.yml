explanation_markdown: |
  A default argument is evaluated once, when the `def` runs, and then stored on
  the function object in `__defaults__`. Because `build_tally` re-executes its
  inner `def add(...)` on every call, each tally you build gets its own fresh
  `[]`. But within a single tally, every call that omits `sheet` reuses and
  mutates that same list — the classic mutable-default trap.

  Here the routine hides its state by returning only a count, so you cannot
  reconstruct the sheet from return values. Introspection is the way in:
  `add.__defaults__[0]` *is* the shared list, holding exactly the `entries` you
  routed through the default. The `detour` items passed their own list, so they
  never appear. Returning a copy avoids handing back a reference someone could
  keep mutating.
common_mistakes:
  - Passing an explicit sheet on the entry calls too, so nothing ever lands on the shared default and the result is always empty.
  - Trying to rebuild the sheet from add's return values, which are only counts, instead of reading __defaults__.
  - Returning add.__defaults__ (a tuple) rather than the list at index 0, or returning the live list without copying it.
