prompt_markdown: |
  A dockside clerk uses a tally routine that has a notorious flaw: its "blank"
  sheet is a mutable default argument, so it is created **once** and quietly
  shared across every call that does not pass its own sheet.

  A factory `build_tally()` is defined for you. It returns a fresh `add(item,
  sheet=[])` routine whose default `sheet` starts empty. Crucially, `add` returns
  only the running *count* of items on the sheet, never the sheet itself — so the
  only way to see what has accumulated on the shared sheet is to introspect the
  routine's `__defaults__`.

  Write `shared_default_snapshot(request)`. The `request` is a single dictionary
  with two keys, for example:

  ```python
  {"entries": ["crate", "barrel"], "detour": ["rope"]}
  ```

  Do exactly this:

  1. Build one fresh tally routine with `build_tally()`.
  2. For each value in `request["entries"]`, call the routine passing only the
     item, so it lands on the shared default sheet.
  3. For each value in `request["detour"]`, call the routine passing the item
     **and a brand-new empty list** as the `sheet`, so it goes onto a separate
     sheet and never touches the shared default.
  4. Return the shared default sheet itself — read it via the routine's
     `__defaults__` (the first entry) and return it as a plain list, preserving
     insertion order.

  Because the detour calls supply their own sheet, only the `entries` values end
  up on the shared default. Empty `entries` and `detour` lists are valid and yield
  an empty result. Both keys are always present in `request`.
starter_code: |
  def build_tally():
      def add(item, sheet=[]):
          sheet.append(item)
          return len(sheet)
      return add


  def shared_default_snapshot(request):
      return []
function_name: shared_default_snapshot
input_mode: function
solution_sketch: >-
  Build one tally routine, call it with only the item for each entry (using the
  shared default) and with an explicit fresh list for each detour item, then read
  the shared default out of add.__defaults__[0] and return a copy as a list.
sample_solution: |
  def build_tally():
      def add(item, sheet=[]):
          sheet.append(item)
          return len(sheet)
      return add


  def shared_default_snapshot(request):
      add = build_tally()
      for item in request["entries"]:
          add(item)
      for item in request["detour"]:
          add(item, [])
      return list(add.__defaults__[0])
hints:
  - level: 1
