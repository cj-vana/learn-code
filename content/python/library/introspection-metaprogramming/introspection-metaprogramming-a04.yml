prompt_markdown: |
  A pottery studio wants a tidy audit of each work station: which **public methods**
  it offers and which **public data attributes** it exposes. "Public" means the name
  does not start with an underscore, which drops private helpers like `_log` and all
  the dunder machinery.

  Write `get_members_summary(station)`. The single argument is the station's name (a
  string). Look up the corresponding object and use `inspect.getmembers` to walk
  every member, then return:

  ```python
  {"methods": [sorted public method names], "data": [sorted public data names]}
  ```

  - Skip any member whose name starts with `"_"`.
  - Classify a member as a **method** when `inspect.isroutine` reports it as a
    routine (a function or bound method); otherwise it is **data**.
  - Both lists must be sorted alphabetically.

  The registry (already defined for you) maps these station names to live objects:

  - `"kiln"` — methods `cool`, `ignite`; data `fuel`, `max_temp`, `target`
  - `"wheel"` — methods `center`, `spin`, `stop`; data `clay`, `rpm`
  - `"glaze_bench"` — methods `dip`; data `batches`, `house_recipe`

  So `get_members_summary("kiln")` returns
  `{"methods": ["cool", "ignite"], "data": ["fuel", "max_temp", "target"]}`. Note
  that `max_temp` and `house_recipe` are class-level attributes while `target` and
  `batches` are set on the instance — `getmembers` sees both. An unknown station
  returns `{"methods": [], "data": []}`.
