solution_sketch: Look the station up in the registry. Iterate inspect.getmembers(obj), skipping names that start with an underscore. Route each remaining member into methods when inspect.isroutine(value) is true, otherwise into data. Return both lists sorted.
sample_solution: |
  import inspect


  class Kiln:
      max_temp = 1300

      def __init__(self):
          self.target = 1040
          self.fuel = "oak"
          self._log = []

      def ignite(self):
          return "lit"

      def cool(self):
          return "cooling"


  class Wheel:
      def __init__(self):
          self.rpm = 120
          self.clay = "stoneware"

      def spin(self):
          return "spinning"

      def stop(self):
          return "stopped"

      def center(self):
          return "centered"


  class GlazeBench:
      house_recipe = "celadon"

      def __init__(self):
          self.batches = 3

      def dip(self):
          return "dipped"


  REGISTRY = {"kiln": Kiln(), "wheel": Wheel(), "glaze_bench": GlazeBench()}


  def get_members_summary(station):
      obj = REGISTRY.get(station)
      if obj is None:
          return {"methods": [], "data": []}
      methods = []
      data = []
      for name, value in inspect.getmembers(obj):
          if name.startswith("_"):
              continue
          if inspect.isroutine(value):
              methods.append(name)
          else:
              data.append(name)
      return {"methods": sorted(methods), "data": sorted(data)}
