explanation_markdown: |
  `inspect.getmembers` is the reflective equivalent of opening every drawer: it
  returns `(name, value)` pairs for everything the object can reach, which is why it
  surfaces both the instance attributes set in `__init__` and the class-level
  attributes defined on the body — but also every dunder method inherited from
  `object`. The underscore filter is what turns that firehose into a useful public
  audit.

  Splitting methods from data leans on `inspect.isroutine`, which is `True` for
  functions and bound methods and `False` for plain values like ints and strings.
  That distinction is more precise than a bare `callable()` check would be, and
  sorting both lists makes the result deterministic regardless of the order
  `getmembers` happens to yield.
common_mistakes:
  - Forgetting that getmembers includes inherited dunder members, so skipping only names that start with a single underscore is not enough — filter every name that starts with "_".
  - Using callable() in a way that would misclassify a class-valued attribute as a method; inspect.isroutine targets functions and methods specifically.
  - Returning the lists in getmembers order instead of sorting them, making the output order-dependent.
