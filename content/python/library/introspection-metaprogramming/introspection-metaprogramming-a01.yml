function_name: signature_params
input_mode: function
solution_sketch: Look the routine up in the catalog; if missing return empty names/defaults. Otherwise iterate inspect.signature(fn).parameters, collecting every name in order and recording param.default only when it is not Parameter.empty.
sample_solution: |
  import inspect


  def park():
      ...


  def slew_to(target, speed=2):
      ...


  def track(target, rate=1.0, duration=60):
      ...


  def calibrate(sensor, offset=0, gain=1, verbose=False):
      ...


  def expose(frames, seconds=1.5, dark=True):
      ...


  CATALOG = {
      "park": park,
      "slew_to": slew_to,
      "track": track,
      "calibrate": calibrate,
      "expose": expose,
  }


  def signature_params(routine):
      fn = CATALOG.get(routine)
      if fn is None:
          return {"names": [], "defaults": {}}
      signature = inspect.signature(fn)
      names = []
      defaults = {}
      for name, param in signature.parameters.items():
          names.append(name)
          if param.default is not inspect.Parameter.empty:
              defaults[name] = param.default
      return {"names": names, "defaults": defaults}
hints:
