explanation_markdown: |
  `inspect.signature` turns a live function object into a `Signature`, whose
  `.parameters` is an ordered mapping keyed by parameter name. Iterating it in
  order is the reliable way to recover declaration order without parsing source
  text yourself.

  The subtlety is how "no default" is represented. Python cannot use `None` as the
  marker because `None` is a perfectly valid default, so `inspect` uses a dedicated
  sentinel, `inspect.Parameter.empty`. Testing `param.default is not
  inspect.Parameter.empty` is what separates `speed=2` from a bare positional
  `target`. Because you read everything from the real object, the same handful of
  lines works for any routine the console might add later.
common_mistakes:
  - Treating a default of None or 0 as "no default"; the only true marker of a missing default is inspect.Parameter.empty.
  - Building the names list from the defaults dict, which silently drops every parameter that has no default.
  - Letting an unknown routine name raise a KeyError instead of returning the empty names/defaults structure.
