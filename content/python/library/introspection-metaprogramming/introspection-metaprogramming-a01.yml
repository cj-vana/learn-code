prompt_markdown: |
  An observatory's dome console ships with a small catalog of pointing routines.
  Before the night shift the operator wants a read-out of each routine's
  parameters: their names in declaration order, plus any default values baked in.

  Write `signature_params(routine)`. The single argument is the routine's name (a
  string). Use `inspect.signature` to read the **real function object** from the
  console's catalog and return a dict shaped like:

  ```python
  {"names": [...parameter names in order...], "defaults": {name: default_value}}
  ```

  - `names` lists every parameter in declaration order.
  - `defaults` maps **only** the parameters that have a default to that default
    value. A parameter with no default is omitted from `defaults` but still
    appears in `names`.

  The catalog (already defined for you) contains:

  - `park()` — no parameters
  - `slew_to(target, speed=2)`
  - `track(target, rate=1.0, duration=60)`
  - `calibrate(sensor, offset=0, gain=1, verbose=False)`
  - `expose(frames, seconds=1.5, dark=True)`

  So `signature_params("slew_to")` returns
  `{"names": ["target", "speed"], "defaults": {"speed": 2}}`, and
  `signature_params("park")` returns `{"names": [], "defaults": {}}`. An unknown
  routine name also returns `{"names": [], "defaults": {}}`.

  Do not hard-code the answers — read them from the function objects with
  `inspect.signature` so your code works for every routine in the catalog.
