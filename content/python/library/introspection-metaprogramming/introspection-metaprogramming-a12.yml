explanation_markdown: |
  Whether a routine is a generator function is fixed the moment it is compiled:
  if its body contains `yield`, CPython sets a flag on the code object, and
  `inspect.isgeneratorfunction` reads that flag. No call happens, so classifying
  `infinite_kettle` is perfectly safe even though iterating it would never end.

  The subtle case is `lazy_tray`. It *returns* a generator expression, so calling
  it hands back a generator object — but the routine itself contains no `yield`,
  its flag is unset, and it is therefore an ordinary function. The lazy behaviour
  lives in the generator expression it constructs, not in the routine's own code.
  This is exactly why you inspect the routine rather than its return value: the
  question "is this a generator function?" is about how the routine was written,
  not about what a call produces.
common_mistakes:
  - Calling the routine and checking whether the result is a generator, which mislabels lazy_tray as lazy and can hang on infinite_kettle.
  - Assuming any routine that produces a generator is a generator function, ignoring that only yield in the body counts.
  - Using isfunction instead of isgeneratorfunction, which is True for every plain routine and never distinguishes the two styles.
