  Look up the routine and return inspect.isgeneratorfunction of it, which is True
  only for routines whose body contains yield.
sample_solution: |
  import inspect


  def steep_one_by_one():
      yield "green"
      yield "oolong"


  def infinite_kettle():
      while True:
          yield "refill"


  def pour_tray():
      return ["green", "oolong", "white"]


  def lazy_tray(cups):
      return (cup for cup in cups)


  def single_cup():
      return "genmaicha"


  _ROUTINES = {
      "steep_one_by_one": steep_one_by_one,
      "infinite_kettle": infinite_kettle,
      "pour_tray": pour_tray,
      "lazy_tray": lazy_tray,
      "single_cup": single_cup,
  }


  def brews_lazily(name):
      func = _ROUTINES[name]
      return inspect.isgeneratorfunction(func)
