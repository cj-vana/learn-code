prompt_markdown: |
  A tea house has two styles of service routine. A **lazy** routine brews one cup
  at a time — it is a generator function, written with `yield`. An **eager**
  routine hands over everything at once, or returns a plain value. You want to
  label a routine without running it, because some lazy routines never stop
  brewing.

  Five routines are defined and collected in a `_ROUTINES` dictionary mapping each
  name to its function object. Write `brews_lazily(name)`, which returns `True` if
  the named routine is a generator function and `False` otherwise.

  Use `inspect.isgeneratorfunction(func)`, which inspects the routine's code flags
  — it never executes the routine, so even a routine that would yield forever is
  safe to classify. Watch the trap: a routine whose body is `return (c for c in
  cups)` **returns** a generator object but contains no `yield`, so it is *not* a
  generator function and must be labelled `False`. Only routines that actually
  contain `yield` are lazy. The given `name` is always a key in `_ROUTINES`.
starter_code: |
  import inspect


  def steep_one_by_one():
      yield "green"
      yield "oolong"


  def infinite_kettle():
      while True:
          yield "refill"


  def pour_tray():
      return ["green", "oolong", "white"]


  def lazy_tray(cups):
      return (cup for cup in cups)


  def single_cup():
      return "genmaicha"


  _ROUTINES = {
      "steep_one_by_one": steep_one_by_one,
      "infinite_kettle": infinite_kettle,
      "pour_tray": pour_tray,
      "lazy_tray": lazy_tray,
      "single_cup": single_cup,
  }


  def brews_lazily(name):
      return False
