prompt_markdown: |
  A planetarium stores projector presets as closures: an inner routine that has
  captured a few fixed settings from the factory that made it. You want to read
  back the settings a preset captured, straight off the function object.

  Several presets are built and collected in a `_PRESETS` dictionary mapping each
  preset name to its function object. Write `read_preset(name)`, which returns a
  dictionary mapping every captured (free) variable name to its value.

  How closures expose their captures:

  - `func.__code__.co_freevars` is a tuple of the names the inner routine
    captured from its enclosing scope.
  - `func.__closure__` is a parallel tuple of cell objects; the value of the
    `i`-th free variable is `func.__closure__[i].cell_contents`.
  - A plain routine that captured nothing has `func.__closure__` equal to `None`;
    in that case return an empty dictionary.

  Pair the names with their cell contents to build the result, for example
  `{"label": "orion", "tilt": 12}`. Only variables the inner routine actually
  *uses* are captured, so a setting computed and used inside the factory can
  appear even if it was never a parameter. The given `name` is always a key in
  `_PRESETS`.
