sample_solution: |
  def make_dome(label, tilt, zoom):
      span = tilt + zoom

      def project(star):
          return label, tilt, zoom, span, star
      return project


  def make_dimmer(level):
      def dim():
          return level
      return dim


  def fixed_beam(star):
      return star


  _PRESETS = {
      "orion": make_dome("orion", 12, 3),
      "draco": make_dome("draco", 20, 5),
      "lyra": make_dome("lyra", 0, 0),
      "soft": make_dimmer(7),
      "fixed_beam": fixed_beam,
  }


  def read_preset(name):
      func = _PRESETS[name]
      cells = func.__closure__
      if cells is None:
          return {}
      names = func.__code__.co_freevars
      return {var: cell.cell_contents for var, cell in zip(names, cells)}
