explanation_markdown: |
  A closure keeps its captured variables in cells so the inner routine can still
  reach them after the factory has returned. Introspection splits that state
  across two attributes: `__code__.co_freevars` names the captured variables, and
  `__closure__` holds the live cells in the same order. Zipping them and reading
  each `cell.cell_contents` reconstructs exactly what the preset remembers.

  Two details matter. First, only variables the inner routine *uses* are
  captured, which is why `span` — computed inside `make_dome` and used by
  `project` — appears alongside the parameters. Second, a routine that captured
  nothing has `__closure__` set to `None`, not an empty tuple, so `fixed_beam`
  must be handled as the empty-dictionary case before you try to iterate.
common_mistakes:
  - Assuming __closure__ is an empty tuple for a non-closure and iterating it, when it is actually None.
  - Reading the cells directly instead of their .cell_contents, returning cell objects rather than values.
  - Expecting only parameters to be captured and being surprised that a computed local like span is included.
