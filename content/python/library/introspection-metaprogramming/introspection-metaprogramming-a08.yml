solution_sketch: >-
  Collect the set of opnames from dis.get_instructions for the named routine,
  then test each vocabulary trait against that set (exact match for BINARY_OP,
  COMPARE_OP, BUILD_LIST; substring match for FOR_ITER and CALL) and return the
  matching trait names sorted.
sample_solution: |
  import dis


  def escapement(a, b):
      return a > b


  def balance_wheel(x):
      return x


  def gear_train(ticks):
      total = 0
      for t in ticks:
          total = total + t
      return total


  def complication(parts):
      return [p for p in parts]


  def chime(x):
      return abs(x)


  def regulator(a, b):
      if a > b:
          return a - b
      return b - a


  _ROUTINES = {
      "escapement": escapement,
      "balance_wheel": balance_wheel,
      "gear_train": gear_train,
      "complication": complication,
      "chime": chime,
      "regulator": regulator,
  }


  def inspect_movement(name):
      func = _ROUTINES[name]
      opnames = {instr.opname for instr in dis.get_instructions(func)}
      traits = []
      if "BINARY_OP" in opnames:
          traits.append("arithmetic")
      if "COMPARE_OP" in opnames:
          traits.append("compares")
      if any("FOR_ITER" in op for op in opnames):
          traits.append("iterates")
      if "BUILD_LIST" in opnames:
          traits.append("builds_list")
      if any("CALL" in op for op in opnames):
          traits.append("calls")
      return sorted(traits)
