prompt_markdown: |
  A watchmaker inspects the *movement* inside each routine — not what it computes,
  but which mechanisms it uses. You will audit a routine's compiled bytecode and
  report the coarse traits it shows.

  Six routines are defined and collected in a `_ROUTINES` dictionary mapping each
  name to its function object. Write `inspect_movement(name)`, which looks up the
  named routine and returns the **sorted list of trait strings** it exhibits,
  drawn from exactly this vocabulary:

  - `"arithmetic"` — some instruction's `opname` is `"BINARY_OP"` (it does math)
  - `"compares"` — some instruction's `opname` is `"COMPARE_OP"` (it compares)
  - `"iterates"` — some instruction's `opname` contains `"FOR_ITER"` (it loops
    over something, including inside a list comprehension)
  - `"builds_list"` — some instruction's `opname` is `"BUILD_LIST"` (it assembles
    a list literal or comprehension)
  - `"calls"` — some instruction's `opname` contains the substring `"CALL"` (it
    invokes another callable, such as a built-in)

  Read the instructions with `dis.get_instructions(func)` and check the presence
  of each trait using the rules above. This is deliberately a **loose presence**
  check on opcode families, not an exact opcode listing, so it stays stable across
  Python versions. Return the traits sorted alphabetically. A routine that shows
  none of them returns an empty list. The given `name` is always a key in
  `_ROUTINES`.
