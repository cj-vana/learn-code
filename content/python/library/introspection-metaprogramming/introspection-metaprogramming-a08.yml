explanation_markdown: |
  Disassembly exposes the *shape* of a routine's work. A single arithmetic
  expression compiles to a `BINARY_OP`, a comparison to `COMPARE_OP`, any `for`
  loop (including the hidden loop inside a list comprehension) to a `FOR_ITER`,
  a list literal or comprehension to `BUILD_LIST`, and invoking a callable to a
  member of the `CALL` family.

  The key discipline is staying loose. Exact opcode names and their counts drift
  between CPython releases — 3.14, for instance, adds superinstructions like
  `LOAD_FAST_BORROW` — so a grader that demanded exact bytecode would be fragile.
  By asking only whether a *family* is present, the audit reports the same traits
  on 3.12 and later. That is why `gear_train` reads as arithmetic-and-iterating
  while `balance_wheel`, which only hands its argument straight back, shows no
  traits at all.
common_mistakes:
  - Comparing full opcode names for the CALL and FOR_ITER families instead of using a substring test, so version-specific spellings are missed.
  - Counting how many times an opcode appears rather than testing mere presence, which makes results vary by Python version.
  - Forgetting that a list comprehension both builds a list and iterates, so it should report two traits.
