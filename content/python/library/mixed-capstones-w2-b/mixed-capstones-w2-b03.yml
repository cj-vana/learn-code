explanation_markdown: |
  A prefix-sum table turns each range question into a single subtraction. Here
  `prefix[k]` stores the sum of the first `k` weights, so the pallets from
  `start` through `end` inclusive total `prefix[end + 1] - prefix[start]`.
  Building the table is O(n) once, after which every one of the q queries is
  answered in O(1), giving O(n + q) overall instead of the O(n * q) you get from
  re-summing each range by hand.
common_mistakes:
  - Being off by one, e.g. using prefix[end] instead of prefix[end + 1] for an inclusive range.
  - Rebuilding the prefix table inside the query loop.
  - Forgetting the leading prefix[0] = 0, which breaks ranges that start at index 0.
