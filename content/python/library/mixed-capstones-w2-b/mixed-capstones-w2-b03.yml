prompt_markdown: |
  A warehouse row holds pallets, each with a known weight, listed left to right
  in a `weights` list. A picking system fires off several range questions, each
  asking for the total weight of the pallets between two shelf indices,
  inclusive of both ends.

  Write `range_totals(data)` where `data` is a dict with keys `weights` (a list
  of integers) and `queries` (a list of `[start, end]` pairs, each a valid range
  with `0 <= start <= end < len(weights)`). Return a list holding the total
  weight for each query, in the same order the queries were asked. No queries
  returns an empty list.
starter_code: |
  def range_totals(data):
      return []
function_name: range_totals
input_mode: function
solution_sketch: Build a prefix-sum table once, then answer each range with prefix[end + 1] - prefix[start].
sample_solution: |
  def range_totals(data):
      weights = data["weights"]
      queries = data["queries"]
      prefix = [0]
      for weight in weights:
          prefix.append(prefix[-1] + weight)
      totals = []
      for start, end in queries:
          totals.append(prefix[end + 1] - prefix[start])
      return totals
hints:
  - level: 1
    text: Recomputing each range from scratch repeats work; precompute running totals instead.
  - level: 2
    text: Build prefix where prefix[k] is the sum of the first k weights, with prefix[0] = 0.
  - level: 3
    text: An inclusive range [start, end] sums to prefix[end + 1] - prefix[start].
