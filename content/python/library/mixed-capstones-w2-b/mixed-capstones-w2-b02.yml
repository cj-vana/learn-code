prompt_markdown: |
  A community garden has plots, each needing a whole number of daylight hours.
  A gardener wants to co-plant exactly two different plots under one lamp whose
  combined need equals a `target` number of hours.

  Write `can_pair(data)` where `data` is a dict with keys `needs` (a list of
  hour requirements, in any order) and `target` (an integer). Return `True` if
  two plots at different positions add up to `target`, otherwise `False`. Two
  plots with the same requirement count as a valid pair as long as they are
  different plots.
starter_code: |
  def can_pair(data):
      return False
function_name: can_pair
input_mode: function
solution_sketch: Sort the needs, then move two pointers inward, shrinking or growing the sum toward the target.
sample_solution: |
  def can_pair(data):
      needs = sorted(data["needs"])
      target = data["target"]
      i, j = 0, len(needs) - 1
      while i < j:
          total = needs[i] + needs[j]
          if total == target:
              return True
          if total < target:
              i += 1
          else:
              j -= 1
      return False
hints:
  - level: 1
    text: Sorting the requirements lets you reason about the smallest and largest remaining plot.
  - level: 2
    text: Start one pointer at each end; the pair's sum tells you which pointer to move.
  - level: 3
    text: If the sum is too small move the left pointer right; if too big move the right pointer left; stop when they cross.
tests:
  public:
