explanation_markdown: |
  On a sorted list the smallest and largest values bracket every possible sum.
  If their total is too small, the only way to grow it is to advance the left
  pointer; if it is too big, retreat the right pointer. Each step discards one
  value that can no longer help, so the whole scan is O(n) after the O(n log n)
  sort. The `i < j` guard keeps the two plots distinct, so a lone plot can never
  pair with itself.
common_mistakes:
  - Forgetting to sort, so the two-pointer sum logic no longer holds.
  - Allowing a single element to pair with itself by using i <= j.
  - Moving the wrong pointer when the current sum overshoots the target.
