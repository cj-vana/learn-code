prompt_markdown: |
  A festival DJ booth logs the title of every song a guest requests into a
  `requests` list, in the order they arrive. At the end of the set the DJ wants
  the titles that were requested an odd number of times (1, 3, 5, ...), since
  those never got fully "cancelled out" by an even matching pair.

  Write `odd_requests(requests)` returning the list of titles that appear an odd
  number of times, sorted alphabetically. An empty log returns an empty list.
starter_code: |
  def odd_requests(requests):
      return []
function_name: odd_requests
input_mode: function
solution_sketch: Count each title in a dict, then return the sorted titles whose count is odd.
sample_solution: |
  def odd_requests(requests):
      counts = {}
      for title in requests:
          counts[title] = counts.get(title, 0) + 1
      return sorted(title for title, count in counts.items() if count % 2 == 1)
hints:
  - level: 1
    text: First figure out how many times each distinct title was requested.
  - level: 2
    text: A dict mapping title to count lets you tally in one pass over the list.
  - level: 3
    text: Keep the titles whose count % 2 == 1, then return them via sorted(...).
