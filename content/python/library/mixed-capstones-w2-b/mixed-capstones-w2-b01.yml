explanation_markdown: |
  Counting how often each title appears is a classic hash-map job: one pass over
  the list builds the counts in O(n). A number is odd exactly when `count % 2`
  is 1, so filtering the dict items on that condition gives the titles we want.
  Sorting the survivors makes the output order deterministic regardless of the
  order requests arrived in.
common_mistakes:
  - Returning the counts instead of just the titles.
  - Forgetting to sort, so the order depends on insertion order.
  - Treating a count of zero or an even count as odd.
