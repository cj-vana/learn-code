explanation_markdown: |
  This is a lower-bound search: find the leftmost index whose value is not below
  `wanted`. The half-open window `[lo, hi)` shrinks each step. When the middle
  book is too small the answer lies strictly to its right (`lo = mid + 1`);
  otherwise the middle is still a candidate, so we keep it by moving `hi` down to
  `mid`. The loop runs in O(log n) and naturally returns `len(calls)` when no
  book qualifies, which is exactly the insertion slot at the end.
common_mistakes:
  - Discarding the middle on a match with hi = mid - 1, which can skip the true first position.
  - Starting hi at len(calls) - 1, making the "past the end" answer unreachable.
  - Assuming a match exists and not handling the all-smaller or empty cases.
