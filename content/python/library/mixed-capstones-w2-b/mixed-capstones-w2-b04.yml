prompt_markdown: |
  A library shelf holds books ordered left to right by call number, given as a
  `calls` list sorted in non-decreasing order. A page reshelving a returned book
  needs the slot index where it belongs: the position of the first book whose
  call number is at least `wanted`.

  Write `first_at_least(data)` where `data` is a dict with keys `calls` (the
  sorted list) and `wanted` (an integer). Return the index of the first call
  number greater than or equal to `wanted`. If every book on the shelf has a
  smaller call number, return `len(calls)` (the slot just past the end).
starter_code: |
  def first_at_least(data):
      return 0
function_name: first_at_least
input_mode: function
solution_sketch: Binary search for the leftmost position whose value is not below wanted.
sample_solution: |
  def first_at_least(data):
      calls = data["calls"]
      wanted = data["wanted"]
      lo, hi = 0, len(calls)
      while lo < hi:
          mid = (lo + hi) // 2
          if calls[mid] < wanted:
              lo = mid + 1
          else:
              hi = mid
      return lo
hints:
  - level: 1
    text: Because the shelf is sorted you can halve the search range each step instead of scanning.
  - level: 2
    text: Keep a lo/hi window; when the middle value is too small, the answer must be to its right.
  - level: 3
    text: When calls[mid] >= wanted, keep mid as a candidate by setting hi = mid; the loop ends with lo pointing at the answer.
