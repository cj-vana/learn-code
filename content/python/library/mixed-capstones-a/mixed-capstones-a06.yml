explanation_markdown: |
  Scanning left to right while counting each badge lets you stop the instant a
  count reaches two, which is exactly the earliest second scan. This runs in O(n)
  with O(k) extra space for the distinct badges. The subtle case is when several
  badges repeat: the winner is decided by whichever second scan comes first, not
  by which badge first appeared, and returning immediately captures that.
common_mistakes:
  - Returning the first badge that appears more than once by first appearance rather than by earliest second scan.
  - Building full counts first and then scanning again, which can pick the wrong badge when several repeat.
  - Forgetting to return "" when no badge repeats.
