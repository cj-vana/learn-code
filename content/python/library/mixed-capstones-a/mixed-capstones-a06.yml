prompt_markdown: |
  A conference scanner reads a badge id every time someone enters the hall. Write
  `first_repeated_badge(scans)` where `scans` is a list of badge id strings in the
  order they were scanned. Return the badge id whose **second** scan happens
  earliest, that is, the first id you encounter that you have already seen. If no
  badge is ever scanned twice, return the empty string `""`.
starter_code: |
  def first_repeated_badge(scans):
      return ""
function_name: first_repeated_badge
input_mode: function
solution_sketch: Count scans as you go and return the first badge whose count reaches two.
sample_solution: |
  def first_repeated_badge(scans):
      counts = {}
      for badge in scans:
          counts[badge] = counts.get(badge, 0) + 1
          if counts[badge] == 2:
              return badge
      return ""
hints:
  - level: 1
    text: The answer is decided by which badge is the first to be scanned for a second time.
  - level: 2
    text: Track how many times each badge has been scanned as you move left to right.
  - level: 3
    text: The moment any badge's running count hits 2, that badge is the earliest repeat, so return it immediately.
