explanation_markdown: |
  A prefix-sum array stores the running total up to each gate, built in one O(n)
  pass. With `prefix[0] = 0`, the sum of any inclusive range `[left, right]` is
  `prefix[right + 1] - prefix[left]`, so every query is answered in O(1) no matter
  how wide the range is. That turns q range queries from O(n*q) into O(n + q).
common_mistakes:
  - Off-by-one errors from forgetting the leading 0 or using prefix[right] instead of prefix[right + 1].
  - Recomputing each range with an inner loop, which is slow when queries overlap.
  - Mutating the tolls list in place instead of building a separate prefix array.
