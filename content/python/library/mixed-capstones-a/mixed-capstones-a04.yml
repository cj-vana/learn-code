prompt_markdown: |
  A highway charges a toll at each numbered gate. Write `zone_total(data)` where
  `data` is a dict with key `tolls` (a list of integer charges, one per gate) and
  key `queries` (a list of `[left, right]` index pairs). For each query return the
  total toll from gate `left` through gate `right` inclusive. Return a list of the
  totals in the same order as the queries. You may assume every query has
  `0 <= left <= right < len(tolls)`.
starter_code: |
  def zone_total(data):
      return []
function_name: zone_total
input_mode: function
solution_sketch: Build a prefix-sum array once, then answer each inclusive range in O(1) as prefix[right + 1] - prefix[left].
sample_solution: |
  def zone_total(data):
      tolls = data["tolls"]
      queries = data["queries"]
      prefix = [0]
      for value in tolls:
          prefix.append(prefix[-1] + value)
      result = []
      for pair in queries:
          left = pair[0]
          right = pair[1]
          result.append(prefix[right + 1] - prefix[left])
      return result
hints:
  - level: 1
    text: Re-adding a range for every query is wasteful when many queries hit overlapping gates.
  - level: 2
    text: Precompute cumulative totals so any range sum becomes a single subtraction.
  - level: 3
    text: With prefix[0] = 0 and prefix[i+1] = prefix[i] + tolls[i], the answer for [left, right] is prefix[right + 1] - prefix[left].
