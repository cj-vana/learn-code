prompt_markdown: |
  An egg incubator logs an integer temperature each minute, and you want the most
  stable stretch of a given length. Write `steadiest_window(data)` where `data` is
  a dict with key `temps` (a list of integers) and key `window` (an integer `k`).
  For every block of `k` consecutive readings, its spread is the largest reading
  minus the smallest. Return the smallest spread across all such blocks. If `k` is
  less than 1 or larger than the number of readings, return `0`.
starter_code: |
