      return 0
function_name: steadiest_window
input_mode: function
solution_sketch: Slide a fixed window of length k across the readings, compute each window's max minus min, and keep the smallest spread.
sample_solution: |
  def steadiest_window(data):
      temps = data["temps"]
      k = data["window"]
      n = len(temps)
      if k < 1 or k > n:
          return 0
      best = None
      for start in range(n - k + 1):
          window = temps[start:start + k]
          spread = max(window) - min(window)
          if best is None or spread < best:
              best = spread
      return best
hints:
  - level: 1
    text: Consider every block of exactly k neighbouring readings.
  - level: 2
    text: For each block the spread is max(block) - min(block); you want the block with the smallest spread.
  - level: 3
    text: Slide the start index from 0 to n - k, track the running minimum spread, and remember to guard invalid k.
