explanation_markdown: |
  Each fixed-size block is a sliding window, and its stability is captured by the
  gap between its largest and smallest reading. Scanning every start position and
  tracking the minimum spread yields the steadiest stretch. Guarding an invalid
  `k` keeps the empty and oversized cases well defined, returning 0 when no valid
  window exists.
common_mistakes:
  - Comparing spreads to 0 or a huge constant instead of seeding best from the first window.
  - Letting the start index run past n - k, which reads a short final block.
  - Confusing spread (max minus min) with the window's total or average.
