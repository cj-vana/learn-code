      return 0
function_name: brightest_window
input_mode: function
solution_sketch: Sum the first k readings, then slide by adding the entering reading and subtracting the leaving one, tracking the best total.
sample_solution: |
  def brightest_window(data):
      readings = data["readings"]
      k = data["window"]
      n = len(readings)
      if k < 1 or k > n:
          return 0
      current = sum(readings[:k])
      best = current
      for i in range(k, n):
          current += readings[i] - readings[i - k]
          if current > best:
              best = current
      return best
hints:
  - level: 1
    text: Every candidate answer is the sum of exactly k neighbouring readings.
  - level: 2
    text: Instead of re-summing each window, update the running total as the window slides.
  - level: 3
    text: Add readings[i] and subtract readings[i - k] to move the window one step, keeping the maximum total.
