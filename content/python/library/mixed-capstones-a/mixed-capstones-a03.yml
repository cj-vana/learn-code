prompt_markdown: |
  A greenhouse light sensor logs an integer brightness reading every hour. Write
  `brightest_window(data)` where `data` is a dict with key `readings` (a list of
  integers) and key `window` (an integer `k`). Return the largest total
  brightness across any `k` consecutive readings. If `k` is less than 1 or larger
  than the number of readings, return `0`.
starter_code: |
