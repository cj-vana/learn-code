explanation_markdown: |
  A fixed-size sliding window computes every window total in O(n) rather than
  O(n*k). After summing the first window, each shift adds the newly included
  reading and removes the one that fell off the left edge, so the running total
  stays correct while you track the maximum. Guarding against an invalid `k`
  keeps the empty and oversized cases well defined.
common_mistakes:
  - Re-summing each window from scratch, turning an O(n) scan into O(n*k).
  - Initialising best to 0, which is wrong when every window total is negative.
  - Forgetting the k > n and k < 1 guards, leading to an incorrect or empty-slice answer.
