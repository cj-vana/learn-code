explanation_markdown: |
  Counting with a dictionary gives O(1) updates, so one pass builds the tally in
  O(n). To settle ties deterministically, iterate the distinct names in sorted
  order and only overwrite the current best on a strictly larger count. Because
  equal counts never replace an earlier name, the alphabetically smallest of the
  top stops wins.
common_mistakes:
  - Returning the last name seen with the max count instead of applying a stable tie-break.
  - Using >= when comparing counts, which lets a later alphabetical name overwrite the winner on a tie.
  - Forgetting that an empty list must return "" rather than raising on max() of nothing.
