prompt_markdown: |
  A city bus records the name of the stop where each passenger boards. Write
  `busiest_stop(stops)` where `stops` is a list of stop names. Return the name
  of the stop with the most boardings. If several stops tie for the most, return
  the one that comes first alphabetically. An empty list returns the empty
  string `""`.
starter_code: |
  def busiest_stop(stops):
      return ""
function_name: busiest_stop
input_mode: function
solution_sketch: Count boardings per stop in a dict, then scan stops in alphabetical order keeping the first that reaches the highest count.
sample_solution: |
  def busiest_stop(stops):
      counts = {}
      for stop in stops:
          counts[stop] = counts.get(stop, 0) + 1
      best = ""
      best_count = 0
      for stop in sorted(counts):
          if counts[stop] > best_count:
              best = stop
              best_count = counts[stop]
      return best
hints:
  - level: 1
    text: Build a dictionary mapping each stop name to how many times it appears.
  - level: 2
    text: The winner has the largest count; ties should resolve to the alphabetically smallest name.
  - level: 3
    text: Walk the names in sorted() order and only replace the best when a count is strictly greater, so equal counts keep the earlier (smaller) name.
