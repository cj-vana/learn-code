prompt_markdown: |
  The chemistry teaching lab attaches a *cleanup callback* to each piece of
  glassware, the way `weakref.finalize` attaches a finalizer to an object. A
  callback fires exactly once: either when its item is cleared away during the
  session, or -- for anything still in use -- when the lab shuts down for the day.
  At shutdown the surviving callbacks run in reverse order of registration (the
  most recently registered runs first), matching how `weakref.finalize` flushes
  live finalizers at interpreter exit.

  Write `build_finalize_log(events)` that takes a list of event dicts and returns
  the list of callback tags in the order they fired. Each event is one of:

  - `{"op": "register", "item": "flask", "tag": "rinse-flask"}` -- attach a callback
    to `item` that logs `tag`. Each item is registered at most once.
  - `{"op": "clear", "item": "flask"}` -- the item is put away now; if its callback
    is still live, fire it (append its tag) and mark it done. Clearing an item whose
    callback already fired, or one that was never registered, does nothing.
  - `{"op": "shutdown"}` -- fire every still-live callback in reverse registration
    order, then mark them all done. A second shutdown fires nothing.

  Registering an item does not fire anything on its own. An empty event list
  returns an empty list.
