explanation_markdown: |
  Retained size answers a practical question: how much memory would actually come
  back if you dropped these roots? It is not the size of one object but of the
  whole subgraph only it keeps alive, so the computation is a graph traversal, not
  a lookup. The visited set is what makes the sum correct: a crate reachable by
  two paths, like a shared child, must be counted once, and a cycle must not spin
  forever. Treating a missing size as zero keeps the function total when the size
  table is sparser than the reference graph. This same reachable-set idea is what
  a tracing collector uses to decide what survives, and reasoning about its growth
  is the heart of space-complexity analysis.
common_mistakes:
  - Summing along paths so a crate reachable by several routes is counted more than once.
  - Omitting the visited guard, so a reference cycle loops forever or double-counts.
  - Adding the weight of every crate in sizes rather than only those reachable from the roots.
