function_name: object_graph_memory_estimate
input_mode: function
solution_sketch: Depth-first search from the roots over the graph, collecting each distinct reachable id into a visited set, then sum the sizes of those ids treating missing sizes as zero.
sample_solution: |
  def object_graph_memory_estimate(scenario):
      sizes = scenario["sizes"]
      graph = scenario["graph"]
      visited = set()
      stack = list(scenario["roots"])
      while stack:
          node = stack.pop()
          if node in visited:
              continue
          visited.add(node)
          for child in graph.get(node, ()):
              if child not in visited:
                  stack.append(child)
      return sum(sizes.get(node, 0) for node in visited)
hints:
  - level: 1
    text: This is one reachability walk from the roots; first collect the distinct set of crates that can be reached, then add up their weights.
  - level: 2
    text: Use a visited set so shared crates are counted once and cycles terminate; push a root's held crates only when you first visit it.
  - level: 3
    text: After the walk, sum sizes.get(node, 0) over the visited set so a reachable crate with no listed weight contributes zero.
