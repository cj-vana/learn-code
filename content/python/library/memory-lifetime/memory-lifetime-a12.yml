prompt_markdown: |
  A shipping hold is loaded from a manifest. Each crate has a weight, and a crate
  may hold other crates nested inside it. The dock master wants the total weight
  that would leave on the ship if only the crates named on the manifest (the
  roots) are loaded: every crate reachable from a root travels too, and its
  weight counts exactly once no matter how many crates hold it. Crates not
  reachable from any root stay on the dock and add nothing.

  This models estimating an object's *retained memory*: the total size of
  everything that would be freed if the roots were released, following references
  and counting each reachable object once even when several paths lead to it.

  Write `object_graph_memory_estimate(scenario)` taking one dict:

  - `sizes`: a dict mapping a crate id (a string) to its integer weight
  - `graph`: a dict mapping a crate id to a list of the crate ids it holds
  - `roots`: a list of crate ids that are loaded first

  Return the integer sum of the weights of every crate reachable from the roots,
  including the roots themselves, counting each distinct crate once. Follow the
  edges in `graph`. Handle reference cycles without looping forever. If a
  reachable crate id has no entry in `sizes`, treat its weight as 0. If `roots`
  is empty, return 0.
