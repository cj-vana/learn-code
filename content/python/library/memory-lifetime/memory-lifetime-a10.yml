explanation_markdown: |
  Direct referents are the one-hop outgoing edges of an object: the things it
  holds a reference to right now. The garbage collector walks exactly these
  edges when it traces reachability, so understanding them is the foundation for
  reasoning about what keeps memory alive. Two details matter here. Duplicates in
  the raw edge list are noise, so a set collapses them; and a self-reference is a
  perfectly real edge, which is why a node can appear among its own referents.
  Defaulting a missing node to an empty list keeps the function total instead of
  raising a KeyError on ids that were never catalogued.
common_mistakes:
  - Returning the raw list with its duplicates instead of the distinct set of targets.
  - Forgetting to sort, so the order depends on set iteration and the tests fail unpredictably.
  - Raising a KeyError on an unknown node rather than treating it as having no outgoing references.
