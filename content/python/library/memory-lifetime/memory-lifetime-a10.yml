prompt_markdown: |
  A museum catalog stores one card per artwork. Each card lists the id codes of
  the other cards it points to: the works that inspired it, its former owners,
  the room it hangs in. A single card may list the same target twice out of
  sloppiness, and a card may even point to itself. Given one card, the archivist
  wants the clean set of cards it directly points to.

  This models `gc.get_referents(obj)`, which returns the objects an object
  directly refers to (its outgoing references), one hop away.

  Write `gc_referents_of(query)` taking one dict:

  - `graph`: a dict mapping each card id (a string) to a list of the card ids it
    points to
  - `node`: the card id whose direct targets you want

  Return a sorted list of the **distinct** card ids that `node` directly points
  to. Remove duplicates and sort the result in ascending (alphabetical) order.
  A card may point to itself, in which case its own id belongs in the result.
  If `node` is not present in `graph`, or it points to nothing, return an empty
  list.
starter_code: |
  def gc_referents_of(query):
      return []
function_name: gc_referents_of
input_mode: function
solution_sketch: Look up the node's outgoing list (defaulting to empty when absent), drop duplicates with a set, and return it sorted.
sample_solution: |
  def gc_referents_of(query):
      graph = query["graph"]
      node = query["node"]
      return sorted(set(graph.get(node, [])))
hints:
  - level: 1
    text: The direct targets are exactly the list stored under node in the graph; a missing node behaves like an empty list.
  - level: 2
    text: Wrap that list in a set to collapse duplicate targets into one entry each.
  - level: 3
    text: sorted(set(graph.get(node, []))) both removes duplicates and returns the ids in ascending order.
