explanation_markdown: |
  Whether an object can be freed depends on the set of live objects that can
  reach it, so this reverse-reachability walk is exactly the reasoning a leak
  hunt performs. Inverting the graph turns "who does A point to" into "who points
  to A", and a depth-first walk over those reversed edges gathers every direct
  and indirect holder. The visited set does double duty: it terminates cycles and
  it naturally lets the target appear in its own result when a cycle routes back
  to it, which is the honest answer, because an object on a cycle really does
  help hold itself alive. That self-holding is the precise situation plain
  reference counting cannot resolve, which is why Python ships a separate cyclic
  garbage collector.
common_mistakes:
  - Returning only the direct holders instead of following the reversed edges all the way out.
  - Omitting a visited set, so a reference cycle sends the search into an infinite loop.
  - Force-excluding the target in every case, which gives the wrong answer when the target lies on a cycle and genuinely reaches itself.
