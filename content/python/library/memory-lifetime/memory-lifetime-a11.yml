function_name: gc_referrers_of
input_mode: function
solution_sketch: Build a reverse adjacency mapping each target to the set of ids that point at it, then depth-first search backwards from the query node, collecting every id reached in one or more steps and returning them sorted.
sample_solution: |
  def gc_referrers_of(query):
      graph = query["graph"]
      target = query["node"]
      reverse = {}
      for src, outgoing in graph.items():
          for dst in outgoing:
              reverse.setdefault(dst, set()).add(src)
      reached = set()
      stack = list(reverse.get(target, set()))
      while stack:
          holder = stack.pop()
          if holder in reached:
              continue
          reached.add(holder)
          for parent in reverse.get(holder, ()):
              if parent not in reached:
                  stack.append(parent)
      return sorted(reached)
hints:
  - level: 1
    text: The holders are found by walking edges backwards, so first invert the graph into a map from each id to the ids that point at it.
  - level: 2
    text: Seed a search with the direct holders of the target (its entries in the reversed map) and keep expanding to their holders in turn.
  - level: 3
    text: Use a visited set so cycles terminate; a target on a cycle reaches itself and so ends up in its own reached set, which is correct.
