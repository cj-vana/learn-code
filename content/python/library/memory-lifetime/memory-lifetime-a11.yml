prompt_markdown: |
  An archive keeps ledgers that cite one another. When a memory leak makes a
  single vault record impossible to discard, the archivist needs the complete
  list of ledgers that can reach that record by following citation links, one or
  more hops away. Those are precisely the ledgers keeping it referenced: remove
  every one of them and the record would finally be free.

  This models tracing *transitive referrers*. `gc.get_referrers(obj)` gives the
  direct holders; here you want the full set of objects that can reach the target
  along one or more reference edges, which is what determines whether an object
  stays alive.

  Write `gc_referrers_of(query)` taking one dict:

  - `graph`: a dict mapping each ledger id (a string) to a list of the ledger ids
    it directly points to (its outgoing citations)
  - `node`: the target ledger id

  Return a sorted list of the **distinct** ledger ids that can reach `node`
  through a path of one or more edges. Follow the edges backwards from the
  target. If the target sits on a reference cycle, then it can reach itself and
  therefore belongs in its own result; otherwise it does not. A node that cannot
  reach the target is excluded. If nothing reaches `node` (including when `node`
  is absent from `graph`), return an empty list. Duplicate edges in the input
  make no difference to the result.
