explanation_markdown: |
  Interning lets the interpreter store one copy of a repeated string and hand
  back the same object, which makes identity checks and dictionary lookups
  faster. CPython does this automatically only for compile-time constants that
  look like identifiers, which is why the runtime flag is decisive: strings you
  build with `+` or `join` on the floor are fresh objects unless you call
  `sys.intern` yourself. The character test captures the identifier shape: only
  ASCII letters, digits, and underscores qualify, and the empty literal is a
  special interned case. Real CPython's rule is version-specific around the
  edges, so this exercise fixes one clean, predictable version of it.
common_mistakes:
  - Applying the name-shaped character test but forgetting that a runtime-built string is never auto-interned regardless of its characters.
  - Treating spaces or hyphens as acceptable because the word still reads like a label.
  - Letting non-ASCII letters through by using isalnum() alone without also checking isascii().
