prompt_markdown: |
  A hand-carved sign shop shares its engraved word-blocks to save wood, but only
  under two conditions. First, the word must be carved at *layout time* from the
  master plan, not glued together later on the floor from separate letters.
  Second, the word must be *name-shaped*: made only of letters, digits, and
  underscores (the empty label also counts). When both hold, every request for
  that word reuses the one shared block. Otherwise the shop cuts a fresh block.

  This models CPython's automatic interning of string constants. A string
  *literal* that looks like an identifier (only letters, digits, underscores) is
  interned at compile time, so two identical such literals are the same object
  and satisfy `a is b`. A string assembled at runtime by joining pieces is not
  auto-interned, and a literal containing spaces or punctuation is not either.

  Write `string_literal_intern_predict(scenario)` taking one dict:

  - `text`: the string in question
  - `compile_time_literal`: `True` if it is a compile-time literal, `False` if
    it was built at runtime by joining pieces

  Return `True` if two occurrences of this string would be the **same object**
  (auto-interned), else `False`. Apply this rule exactly: return `False`
  whenever `compile_time_literal` is `False`. Otherwise return `True` when
  `text` is the empty string or when every character of `text` is an ASCII
  letter, digit, or underscore; return `False` if any character is a space,
  punctuation mark, or other symbol.
starter_code: |
  def string_literal_intern_predict(scenario):
      return False
function_name: string_literal_intern_predict
input_mode: function
solution_sketch: Reject runtime-built strings outright, treat the empty literal as interned, and otherwise require every character to be an ASCII alphanumeric or an underscore.
sample_solution: |
  def string_literal_intern_predict(scenario):
      text = scenario["text"]
      if not scenario["compile_time_literal"]:
          return False
      if text == "":
          return True
      return all((ch.isalnum() and ch.isascii()) or ch == "_" for ch in text)
hints:
  - level: 1
    text: A string glued together at runtime is never auto-interned, so that flag short-circuits the whole decision to False.
  - level: 2
    text: For a compile-time literal, the empty string counts as name-shaped, and every other character must be an ASCII letter, digit, or underscore.
  - level: 3
    text: Use all(...) over the characters, allowing ch.isalnum() and ch.isascii() together, or ch == '_', so spaces and punctuation fail the test.
