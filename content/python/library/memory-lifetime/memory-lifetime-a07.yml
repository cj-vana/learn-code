explanation_markdown: |
  CPython pre-allocates one shared object for each small integer in -5..256 and
  hands the same object back every time that value is needed, so identity (`is`)
  holds for those values. The chained comparison `-5 <= v <= 256` is the whole
  test; it reads as a single range check and short-circuits naturally. The key
  lesson is that identity and equality are different questions: two ints outside
  the cache are always equal (`==`) but not the same object (`is`), which is why
  you should compare numbers with `==` and never rely on `is` for value checks.
common_mistakes:
  - Using exclusive bounds such as v < 256 and dropping the endpoint 256, which is actually inside the cached range.
  - Confusing equality with identity and assuming two equal large integers must be the same object.
  - Returning the values or filtering the list instead of mapping exactly one boolean flag per input value.
