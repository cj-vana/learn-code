prompt_markdown: |
  A letterpress print shop keeps a drawer of pre-cast metal slugs for every whole
  number from -5 through 256 inclusive, the ones it reaches for constantly. When
  two different jobs both ask for a number in that drawer, the shop hands each of
  them the exact same physical slug, so the two jobs literally share one piece.
  For any number outside the drawer the shop casts a brand-new slug on the spot,
  so two jobs asking for 1000 walk away with two separate pieces.

  This mirrors CPython's small-integer cache. Values from -5 to 256 are
  pre-created singleton objects, so if you write `a = n` and `b = n` for such a
  value, `a is b` is `True` (same object). Outside that range each `n` builds a
  fresh object, so `a is b` is `False` even though `a == b` stays `True`.

  Write `small_int_cache_hit(values)` that takes a list of integers. For each
  value, imagine two variables were both set to that literal; return a list of
  booleans where `True` means the two variables would be the **same object**
  (the value is in the inclusive range -5 through 256) and `False` means they
  would be distinct objects (outside that range). The endpoints -5 and 256 are
  both inside the drawer. An empty list returns an empty list. The output list
  has one boolean per input value, in the same order.
