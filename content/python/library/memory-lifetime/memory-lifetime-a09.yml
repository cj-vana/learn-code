prompt_markdown: |
  A harbor tracks how many mooring lines are currently tied to one particular
  buoy. Each named boat can hold at most one line to the buoy, so tying a boat
  that is already tied changes nothing, and untying a boat that was never tied
  changes nothing. The count of tied lines is exactly the number of distinct
  boats currently moored to the buoy.

  This mirrors CPython reference counting: the buoy is an object, each boat name
  is a reference to it, and the reference count is how many distinct references
  currently point at the object. Crucially, the moment the count drops to zero
  the buoy is cut loose and floats away for good: once the count hits 0 the
  object is deallocated and can never come back, so every later tie or untie
  leaves the count at 0.

  Write `refcount_delta_predict(scenario)` taking one dict:

  - `initial_refs`: a list of boat names already tied to the buoy at the start
    (duplicates count once)
  - `operations`: a list of steps, each a dict `{"op": "bind", "name": <boat>}`
    to tie a line or `{"op": "unbind", "name": <boat>}` to untie one

  Return a list of integers giving the reference count **after each operation**,
  in order (one number per operation). Start from the count implied by
  `initial_refs`. A `bind` for an already-tied boat and an `unbind` for a boat
  that is not tied both leave the count unchanged. Once the count reaches 0 the
  object is gone: record 0 for that step and for every step after it, and ignore
  all further ties and unties. If `operations` is empty, return an empty list.
starter_code: |
  def refcount_delta_predict(scenario):
