explanation_markdown: |
  Reference counting is CPython's first-line memory manager: every object carries
  a count of how many references point at it, and when a rebinding or deletion
  drops that count to zero the object is freed immediately. Modelling references
  as a set captures two subtleties for free: binding a name that already refers
  to the object is a no-op (a name holds at most one reference to it), and
  unbinding an absent name changes nothing. The latch at zero encodes the
  irreversible nature of deallocation, which is why reviving a collected object
  is impossible. Note this covers only acyclic references; objects trapped in a
  reference cycle never reach zero on their own and need the cyclic collector.
common_mistakes:
  - Incrementing on every bind even when the boat is already tied, which overcounts references.
  - Letting the count climb back up after it reached zero instead of latching the object as collected.
  - Crashing or decrementing below zero on an unbind for a boat that was never tied.
