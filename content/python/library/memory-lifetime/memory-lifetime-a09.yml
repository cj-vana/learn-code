function_name: refcount_delta_predict
input_mode: function
solution_sketch: Track the live references as a set seeded from initial_refs; each bind adds a name and each unbind discards one, and once the set empties latch a collected flag that pins the count at 0.
sample_solution: |
  def refcount_delta_predict(scenario):
      refs = set(scenario["initial_refs"])
      collected = len(refs) == 0
      counts = []
      for step in scenario["operations"]:
          if not collected:
              if step["op"] == "bind":
                  refs.add(step["name"])
              else:
                  refs.discard(step["name"])
              if not refs:
                  collected = True
          counts.append(0 if collected else len(refs))
      return counts
hints:
  - level: 1
    text: Because each boat can hold only one line, model the live references as a set of names; the count is just the size of that set.
  - level: 2
    text: A bind adds a name (set.add is a no-op if present) and an unbind removes it (set.discard is a no-op if absent); record the size after each step.
  - level: 3
    text: Keep a collected flag; the instant the set becomes empty, latch it so every remaining step records 0 and no further ties or unties take effect.
