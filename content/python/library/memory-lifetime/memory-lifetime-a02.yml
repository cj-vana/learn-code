prompt_markdown: |
  Harbourside runs a live vessel tracker. Each ferry object lives in a *weak
  registry* -- it stays retrievable only while at least one open dashboard still
  references it. Closing a dashboard drops one reference; when a ferry's last
  dashboard closes, its reference count reaches zero and the weak registry evicts
  it, freeing the object.

  Write `is_evicted_after_del(scenario)` that takes a single dict:

  ```
  {
      "refs": {"ferry-a": 2, "ferry-b": 1, "ferry-c": 3},  # open dashboards per ferry
      "closures": ["ferry-b", "ferry-a"],                   # dashboards closed, in order
      "key": "ferry-b"                                       # ferry we ask about
  }
  ```

  Apply each closure in order: it lowers that ferry's reference count by one, but a
  count never drops below zero. After all closures, return `True` if `key` has been
  evicted (its remaining count is zero) and `False` if it is still retrievable. A
  `key` that never appears in `refs` counts as evicted, so return `True`.
starter_code: |
  def is_evicted_after_del(scenario):
      return False
function_name: is_evicted_after_del
input_mode: function
solution_sketch: Copy the counts, subtract one per closure without going below zero, then report whether the key's remaining count is zero.
sample_solution: |
  def is_evicted_after_del(scenario):
      refs = dict(scenario["refs"])
      for name in scenario["closures"]:
          if refs.get(name, 0) > 0:
              refs[name] -= 1
      return refs.get(scenario["key"], 0) == 0
hints:
  - level: 1
    text: An object leaves a weak registry exactly when its last strong reference disappears -- that is, when its reference count hits zero.
  - level: 2
    text: Work on a copy of the counts and subtract one for each closure, but never let a count fall below zero.
  - level: 3
    text: Return whether the count stored for `key` ends at zero; a `key` missing from the counts is treated as zero, so it is evicted.
