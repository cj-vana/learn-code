explanation_markdown: |
  Reference counting is the everyday half of Python's memory management: every name,
  container slot, or argument that points at an object bumps its count, and each one
  that goes away drops it. When the count reaches zero the object is reclaimed
  immediately -- there is nothing left that could ever reach it. Modelling a weak
  registry makes that boundary crisp: the ferry is retrievable at count one and gone
  at count zero, and no amount of extra closing can push it "more negative" because
  a real refcount is never below zero. Guarding each decrement with a `> 0` check
  keeps the simulation faithful and avoids reporting a phantom live reference.
common_mistakes:
  - Letting a reference count go negative, so an extra closure masks the fact that the ferry was already evicted.
  - Mutating scenario["refs"] directly and reporting a count that ignores the closures applied.
  - Treating a never-registered key as still present instead of evicted.
