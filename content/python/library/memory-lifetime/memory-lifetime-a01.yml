explanation_markdown: |
  A `WeakValueDictionary` only keeps an entry while some other strong reference to
  its value is alive; when the last such reference disappears, the entry vanishes
  on its own. Modelling that as a sweep keeps the lifetime rule explicit: filter to
  the labels in `held`, which stands in for "still referenced somewhere". Only then
  does get-or-set make sense -- asking for a label that was just evicted must reload
  a fresh value, not resurrect the stale one. Building a new dict rather than
  deleting from the caller's cache keeps the function free of surprising side
  effects, exactly what you want from a lookup helper.
common_mistakes:
  - Doing the get-or-set before the sweep, so a stale scan id for an evicted label is returned instead of being reloaded.
  - Overwriting a surviving entry's scan id with new_value even though its label is still held.
  - Mutating request["cache"] in place instead of building the swept result, which corrupts the caller's dictionary.
