prompt_markdown: |
  The Meridian Museum keeps a *weak cache* of freshly digitised plate scans. It
  behaves like a `WeakValueDictionary`: an entry survives only while its scan is
  still open on some workstation. The moment no workstation is holding a scan, the
  cache quietly drops that entry -- the memory is reclaimed even though the label
  is still a perfectly valid catalogue number.

  Write `weak_cache_get_or_set(request)` that takes a single dict shaped like:

  ```
  {
      "cache": {"m12": 100, "m31": 200, "m45": 300},  # label -> scan id
      "held": ["m12", "m45"],                          # labels still open somewhere
      "key": "m31",                                    # label being requested
      "new_value": 999                                 # scan id to load if missing
  }
  ```

  Do two things, in this order:

  1. **Sweep** the cache: remove every entry whose label is not in `held` (its scan
     has no strong reference left, so a weak cache would evict it).
  2. **Get-or-set** `key`: if the label is still present after the sweep, leave its
     scan id untouched; otherwise load it by storing `new_value` under `key`.

  Return the resulting cache as a dict. An empty `cache` is allowed. `held` may name
  labels that are not in the cache -- ignore those. For the example above the answer
  is `{"m12": 100, "m45": 300, "m31": 999}`, because `m31` was swept out and then
  reloaded with the fresh scan id.
starter_code: |
  def weak_cache_get_or_set(request):
      return {}
function_name: weak_cache_get_or_set
input_mode: function
solution_sketch: Keep only the entries whose label is in the held set, then insert key with new_value if it did not survive the sweep.
sample_solution: |
  def weak_cache_get_or_set(request):
      cache = request["cache"]
      held = set(request["held"])
      key = request["key"]

      survivors = {label: scan for label, scan in cache.items() if label in held}
      if key not in survivors:
          survivors[key] = request["new_value"]
      return survivors
hints:
  - level: 1
    text: A weak cache keeps a value alive only while something else still references it, so drop every label that is not in `held` before you do anything else.
  - level: 2
    text: Build a new dict from just the entries whose label is in `held`, then check whether `key` is still in that filtered dict.
  - level: 3
    text: If `key` did not survive the sweep, add `request["new_value"]` under it; return the filtered dict either way and never mutate the original cache.
