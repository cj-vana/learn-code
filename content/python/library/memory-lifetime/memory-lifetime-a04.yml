function_name: find_reference_cycle
input_mode: function
solution_sketch: Depth-first search with three colours; a cycle exists when the search reaches a node that is still on the current path (grey).
sample_solution: |
  def find_reference_cycle(graph):
      WHITE, GREY, BLACK = 0, 1, 2
      colour = {node: WHITE for node in graph}

      def visit(node):
          colour[node] = GREY
          for target in graph[node]:
              if colour[target] == GREY:
                  return True
              if colour[target] == WHITE and visit(target):
                  return True
          colour[node] = BLACK
          return False

      return any(visit(node) for node in graph if colour[node] == WHITE)
hints:
  - level: 1
    text: A cycle exists when, while exploring a path, you reach a node that is already on that same path.
  - level: 2
    text: Colour nodes white, grey, and black. Grey means "currently on the DFS path"; reaching a grey node means you closed a loop.
  - level: 3
    text: Start the DFS from every still-white node so cycles in separate components are not missed, and treat a self-reference as an immediate cycle.
