explanation_markdown: |
  This three-colour depth-first search is the same idea Python's cyclic collector
  uses to decide that a clump of objects is unreachable garbage even though their
  reference counts are non-zero. White means unvisited, grey means "on the path I
  am currently exploring", and black means "fully explored". A cycle is precisely a
  *back edge* -- an edge into a grey node -- because that node is an ancestor still
  waiting for this branch to finish. Restarting from every white node matters: a
  diamond shares a child through two different paths but has no back edge, so it is
  acyclic, whereas a loop tucked in a disconnected component would be missed if you
  only launched the search from one root.
common_mistakes:
  - Marking a node visited permanently and treating any revisit as a cycle, which wrongly flags the shared child in a diamond.
  - Forgetting self-loops, where a node lists its own id in its adjacency list.
  - Launching the search from only one starting node and missing a cycle in a separate component.
