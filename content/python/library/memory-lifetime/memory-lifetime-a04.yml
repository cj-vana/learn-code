prompt_markdown: |
  Plain reference counting can free an object the instant nothing points at it --
  except when objects point at *each other* in a loop. A pair (or ring) of objects
  that only reference one another keeps its own counts above zero forever, so
  Python ships a separate cyclic garbage collector whose whole job is to find those
  loops. In this drill you play the collector.

  You are given an object graph as an adjacency dict: each key is an object id, and
  its value is the list of object ids it holds references to. Every referenced id
  also appears as a key. Write `find_reference_cycle(graph)` that returns `True` if
  the graph contains any reference cycle and `False` otherwise.

  A cycle can be a self-reference (`{"a": ["a"]}` is `True`), a two-object loop, or
  a longer ring reached partway through the graph. An empty graph, and any graph of
  pure chains or trees, is `False`.
starter_code: |
