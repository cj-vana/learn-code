function_name: topo_or_cycle
input_mode: function
solution_sketch: Compute in-degrees, repeatedly place the smallest-id node with in-degree zero and relax its targets, and return None if some step finds no ready node.
sample_solution: |
  def topo_or_cycle(graph):
      indegree = {node: 0 for node in graph}
      for node in graph:
          for target in graph[node]:
              indegree[target] += 1

      order = []
      placed = set()
      while len(order) < len(graph):
          ready = sorted(
              node for node in graph
              if node not in placed and indegree[node] == 0
          )
          if not ready:
              return None
          pick = ready[0]
          order.append(pick)
          placed.add(pick)
          for target in graph[pick]:
              indegree[target] -= 1
      return order
hints:
  - level: 1
    text: Count how many plugins must come before each one (its in-degree); the plugins with in-degree zero are the ones ready to place.
  - level: 2
    text: Place the smallest-id ready plugin, mark it placed, then lower the in-degree of every plugin it points to.
  - level: 3
    text: If a step finds no plugin with in-degree zero while some remain unplaced, the dependencies loop -- return None.
