explanation_markdown: |
  A topological sort answers "in what order can I release these so nothing is torn
  down before its dependants?" -- and it is exactly the ordering a runtime needs when
  it must finalize objects that reference one another. Kahn's algorithm tracks each
  node's in-degree (how many must precede it), repeatedly removes a source with
  in-degree zero, and relaxes its edges. The moment the graph is left with unplaced
  nodes but no in-degree-zero source, a cycle is proven and there is no valid order,
  so returning `None` is correct rather than an arbitrary guess. Sorting the ready
  set before each pick is what makes the output deterministic; without a stated
  tie-break, many equally valid orders would all be "right" and no test could pin
  the answer down.
common_mistakes:
  - Returning any valid topological order without the ascending tie-break, so the output is non-deterministic.
  - Reporting an empty or partial list on a cycle instead of returning None.
  - Adjusting in-degrees for the wrong edge direction, producing an order that violates the "comes after" constraints.
