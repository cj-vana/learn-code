prompt_markdown: |
  A plugin host tears its plugins down in a fixed order. The plan is an adjacency
  dict: each key is a plugin id, and its value lists the plugins that must come
  *after* it in the teardown order. Write `topo_or_cycle(graph)` that returns a
  valid teardown order as a list, or `None` if the dependencies form a cycle -- no
  order can satisfy a loop, the same reason a reference cycle stumps plain
  refcounting.

  Many valid orders can exist, so use this exact tie-break to stay deterministic:
  whenever more than one plugin is ready to be placed next (nothing still unplaced
  is required to come before it), choose the one whose id sorts first in ascending
  order.

  Every id that appears in a value list is also a key. An empty graph returns an
  empty list. A self-reference (`{"a": ["a"]}`) is a cycle, so it returns `None`.
  For `{"a": ["b", "c"], "b": ["d"], "c": ["d"], "d": []}` the answer is
  `["a", "b", "c", "d"]`.
starter_code: |
