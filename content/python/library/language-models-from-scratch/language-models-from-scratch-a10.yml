prompt_markdown: |
  The **temperature** knob on a language model controls how adventurous its
  sampling is. Turning it down (temperature below 1) makes the model sharper and
  more confident in its favourite token; turning it up (above 1) flattens the
  distribution toward uniform, giving rarer tokens a real chance. At exactly
  `1.0` nothing changes.

  A tea-blend recommender holds a probability distribution over its next
  suggested ingredient. Write `temperature_scale(job)` that takes **one
  dictionary**:

  - `"distribution"`: a dictionary mapping each token (string) to a probability
    (a positive number); the values sum to 1.
  - `"temperature"`: a positive number `t`.

  Rescale every probability by raising it to the power `1 / t`, then renormalize
  so the new values sum to 1. For each token with original probability `p`:

  ```
  scaled[token] = p ** (1 / t)
  new[token]    = scaled[token] / sum(all scaled values)
  ```

  Return a **new dictionary** with the same tokens mapping to their new
  probabilities, each **rounded to 6 decimal places**.

  Example call:

  ```python
  temperature_scale({"distribution": {"green": 0.9, "black": 0.1},
                     "temperature": 2.0})
  # -> {"green": 0.75, "black": 0.25}   (higher temperature -> flatter)
  ```
starter_code: |
