function_name: temperature_scale
input_mode: function
solution_sketch: Raise each probability to the 1/t power into a temporary dict, sum those powered values, then build the result by dividing each powered value by the total and rounding to 6 decimals.
sample_solution: |
  def temperature_scale(job):
      dist = job["distribution"]
      t = job["temperature"]
      powered = {token: p ** (1.0 / t) for token, p in dist.items()}
      total = sum(powered.values())
      return {token: round(v / total, 6) for token, v in powered.items()}
