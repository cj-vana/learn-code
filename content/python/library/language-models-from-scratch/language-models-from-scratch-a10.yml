explanation_markdown: |
  Temperature scaling is usually described on raw model scores (logits), where
  you divide each logit by `t` before the softmax. Working directly on
  probabilities is the algebraically equivalent shortcut: dividing a logit by
  `t` is the same as raising the corresponding probability to the power `1 / t`,
  because `exp(logit / t) = (exp(logit)) ** (1 / t)`. That is why this exercise
  reshapes with `p ** (1 / t)` and then renormalizes.

  Reading the exponent explains the behaviour. When `t < 1`, `1 / t > 1`, so
  large probabilities are amplified relative to small ones and the distribution
  sharpens toward its peak. When `t > 1`, `1 / t < 1`, which compresses the gaps
  and pushes everything toward uniform. At `t = 1` the exponent is `1` and the
  distribution is unchanged. The renormalization step is essential: raising to a
  power breaks the "sums to 1" property, and dividing by the new total restores a
  valid probability distribution.
common_mistakes:
  - Raising probabilities to the power t instead of 1 / t, which inverts the effect of the temperature dial.
  - Skipping renormalization, so the returned values no longer sum to 1.
  - Using integer division or an int temperature in a way that makes 1 / t collapse to 0 or 1; keep the exponent a float.
  - Rounding each value to something other than 6 decimals, breaking the exact test comparison.
