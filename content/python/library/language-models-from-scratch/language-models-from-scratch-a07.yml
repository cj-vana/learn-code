prompt_markdown: |
  A field researcher records short birdsong phrases as sequences of syllable
  tokens. A tiny **bigram language model** scores a phrase by multiplying the
  probability of each syllable given the one just before it. Multiplying many
  small probabilities quickly underflows toward zero on a real computer, so we
  work in **log-space** and *add* `math.log(p)` instead of multiplying.

  Write `sequence_log_prob(job)` that takes **one dictionary**:

  - `"tokens"`: a list of syllable tokens (strings) in order.
  - `"probs"`: a dictionary mapping a pair key to its probability. The key
    `"a|b"` is the probability that token `a` is immediately followed by token
    `b`. The pipe is only a separator between the earlier token and the later
    one.

  Example call:

  ```python
  sequence_log_prob({
      "tokens": ["chip", "whistle"],
      "probs": {"chip|whistle": 0.5, "chip|trill": 0.5},
  })
  # -> -0.693147   (math.log(0.5), rounded to 6 decimals)
  ```

  For every **adjacent pair** `(tokens[i], tokens[i + 1])`, look up its
  probability under the key `f"{tokens[i]}|{tokens[i + 1]}"` and add
  `math.log(p)`. Return the running total **rounded to 6 decimal places**.

  Rules:

  - If any needed pair is **missing** from `probs`, or its probability is
    exactly `0`, the phrase is impossible under this model — return `None`. (The
    log of zero is negative infinity, which would poison the whole sum, so a
    single unseen transition is fatal.)
  - A phrase with fewer than two tokens has no pairs, so its log-probability is
    `0.0`.
