solution_sketch: Loop i over the adjacent pairs, build the "left|right" key, look it up with dict.get; bail out returning None on a missing key or a zero probability, otherwise accumulate math.log(p) and round the total to 6 decimals.
sample_solution: |
  import math


  def sequence_log_prob(job):
      tokens = job["tokens"]
      probs = job["probs"]
      total = 0.0
      for i in range(len(tokens) - 1):
          key = f"{tokens[i]}|{tokens[i + 1]}"
          p = probs.get(key)
          if p is None or p == 0:
              return None
          total += math.log(p)
      return round(total, 6)
