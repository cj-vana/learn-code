explanation_markdown: |
  A language model assigns a probability to a whole sequence by chaining
  conditional probabilities: `P(phrase) = P(w2 | w1) * P(w3 | w2) * ...`. Each
  factor is at most 1, so the product shrinks fast, and with dozens of tokens it
  underflows to `0.0` in floating point long before the math says it should.
  Taking a logarithm turns that product into a sum — `log(x * y) = log(x) +
  log(y)` — which stays in a comfortable numeric range and is exactly why real
  models report **log-probabilities**.

  The zero rule is not a corner case to tolerate; it is the whole point. If the
  model never saw a transition, it assigns it probability `0`, and `log(0)` is
  negative infinity. One such gap makes the entire sequence infinitely
  unlikely, so returning `None` faithfully reports "this phrase is impossible
  under this model" instead of silently producing a misleading finite number.
common_mistakes:
  - Multiplying the probabilities directly instead of summing their logs, which underflows for long sequences and defeats the purpose of the exercise.
  - Indexing probs[key] directly so a missing pair raises KeyError instead of returning None.
  - Forgetting that probability 0 must short-circuit to None; letting it reach math.log raises a ValueError.
  - Looping i to len(tokens) instead of len(tokens) - 1, which runs off the end when reading tokens[i + 1].
