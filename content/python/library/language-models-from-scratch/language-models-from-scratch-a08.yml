prompt_markdown: |
  **Perplexity** is the standard yardstick for a language model: it answers "on
  average, how many equally-likely tokens was the model hesitating between at
  each step?" Lower is better. A perplexity of 1 means the model was perfectly
  certain every time; a perplexity of 8 means it was as unsure as if it were
  guessing uniformly among 8 tokens.

  You are handed the model's per-token natural-log probabilities for a scored
  weather report — one `math.log(p)` value per token (each is `<= 0` because
  probabilities are at most 1). Write `perplexity(log_probs)` that takes **that
  list directly** and returns the perplexity, defined as:

  ```
  perplexity = exp( -(1/N) * sum(log_probs) )
  ```

  where `N` is the number of tokens. In words: average the log-probabilities,
  negate that average, and exponentiate with `math.exp`.

  Rules:

  - Return the result **rounded to 4 decimal places**.
  - If the list is **empty** there are no tokens to score, so return `None`.

  Example: `perplexity([-1.0, -1.0])` has mean `-1.0`, so the result is
  `math.exp(1.0)` -> `2.7183`.
starter_code: |
