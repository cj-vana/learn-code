explanation_markdown: |
  Perplexity is the exponential of the average per-token cross-entropy, and it
  has a clean intuition: `exp(-mean_log_prob)` is the effective branching factor
  the model faced. If every token was predicted with probability `1/8`, each log
  is `math.log(1/8)`, the mean is that same value, and exponentiating its
  negative returns `8` — the model was effectively choosing among 8 options each
  step.

  Because it averages the logs *before* exponentiating, perplexity is a
  per-token measure that does not punish longer texts just for being long, which
  is what makes it comparable across sequences of different lengths. A perfectly
  confident model (`log_prob` of `0.0`, i.e. probability `1`) yields perplexity
  `1`, the best possible score, and every real gap in the model pushes the
  number up.
common_mistakes:
  - Forgetting the negative sign, which exponentiates the mean directly and yields values below 1 for realistic (negative) log-probabilities.
  - Summing the logs without dividing by the token count, so the score balloons with sequence length instead of staying per-token.
  - Returning 0 or raising on an empty list instead of the required None, or dividing by len before checking for emptiness.
  - Rounding to the wrong number of decimals; the exact comparison needs round(x, 4).
