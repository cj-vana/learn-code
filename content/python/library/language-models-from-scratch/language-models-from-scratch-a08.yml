function_name: perplexity
input_mode: function
solution_sketch: Guard the empty list by returning None, otherwise take the mean of the log probabilities, negate it, exponentiate with math.exp, and round to 4 decimals.
sample_solution: |
  import math


  def perplexity(log_probs):
      if not log_probs:
          return None
      mean = sum(log_probs) / len(log_probs)
      return round(math.exp(-mean), 4)
hints:
  - level: 1
    text: Perplexity is just exp of the negative average log-probability, so start by averaging the list with sum(log_probs) / len(log_probs).
  - level: 2
    text: Negate that mean before exponentiating; a more negative mean (less likely text) should give a larger perplexity.
  - level: 3
    text: Return round(math.exp(-mean), 4), but first handle the empty list by returning None so you never divide by zero.
