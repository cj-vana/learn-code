prompt_markdown: |
  A common trick for building a better language model is to **interpolate** two
  weaker ones: a specialist model trained on a narrow menu and a general model
  trained on broad text. Mixing them lets the specialist supply sharp
  predictions where it is confident while the general model covers tokens the
  specialist never saw. This is the core idea behind interpolation and backoff
  smoothing.

  Write `interpolate_models(job)` that takes **one dictionary**:

  - `"p1"`: a dictionary mapping tokens (strings) to probabilities (numbers) —
    the first model's distribution.
  - `"p2"`: the second model's distribution, in the same shape.
  - `"lam"`: the mixing weight `lambda`, a number between 0 and 1.

  Form the blended distribution over the **union** of the two models' tokens.
  For every token that appears in either model:

  ```
  blended[token] = lam * p1[token] + (1 - lam) * p2[token]
  ```

  If a token is present in one model but **missing** from the other, treat its
  probability in the missing model as `0` (that model simply never predicts it).

  Return a **new dictionary** mapping every token in the union to its blended
  probability, each **rounded to 6 decimal places**.

  Example call:

  ```python
  interpolate_models({
      "p1": {"stew": 0.6, "soup": 0.4},
      "p2": {"stew": 0.2, "soup": 0.8},
      "lam": 0.5,
  })
  # -> {"stew": 0.4, "soup": 0.6}
  ```
starter_code: |
  def interpolate_models(job):
