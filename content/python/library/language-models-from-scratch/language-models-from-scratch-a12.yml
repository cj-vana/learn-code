explanation_markdown: |
  Linear interpolation is a weighted average of two distributions, token by
  token: `lam` controls how much you trust the first model and `1 - lam` the
  second. Because both inputs are valid probability distributions and the weights
  add to 1, the blend is automatically a valid distribution too — the mixed
  values still sum to 1 across the union of tokens, with no extra normalization
  needed.

  The `.get(token, 0.0)` default is what makes the mixture a genuine backoff.
  When the specialist model has never seen a token, contributing `0` from that
  side means the blended probability falls back entirely to the other model's
  estimate (scaled by its weight), so the combined model can still assign that
  token a non-zero probability. Iterating over the **union** of keys is essential
  for the same reason: restricting to the intersection would silently discard
  every token that only one model knows, which are exactly the cases backoff is
  meant to rescue.
common_mistakes:
  - Iterating over only one model's keys (or the intersection), which drops tokens that appear in just one of the two models.
  - Indexing p1[token] and p2[token] directly, so a token missing from one model raises KeyError instead of backing off to 0.
  - Weighting the second model by lam instead of 1 - lam, swapping the two models' influence.
  - Rounding to a precision other than 6 decimals and breaking the exact test comparison.
