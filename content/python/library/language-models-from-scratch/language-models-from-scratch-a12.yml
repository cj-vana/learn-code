function_name: interpolate_models
input_mode: function
solution_sketch: Take the set union of both models' keys, and for each key combine lam * p1.get(key, 0) with (1 - lam) * p2.get(key, 0), rounding each blended value to 6 decimals.
sample_solution: |
  def interpolate_models(job):
      p1 = job["p1"]
      p2 = job["p2"]
      lam = job["lam"]
      keys = set(p1) | set(p2)
      result = {}
      for k in keys:
          v = lam * p1.get(k, 0.0) + (1 - lam) * p2.get(k, 0.0)
          result[k] = round(v, 6)
      return result
