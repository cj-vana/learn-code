prompt_markdown: |
  Now chain single greedy steps into a whole generated sequence. A lighthouse
  keeper's log is modelled by a **bigram transition table**: given the current
  token (the "context"), the table lists the probabilities of each possible next
  token. Repeatedly picking the most likely next token produces a short
  auto-written phrase.

  Write `greedy_generate(job)` that takes **one dictionary**:

  - `"table"`: a dictionary whose keys have the form `"context|next"` (context
    token, a pipe, then a candidate next token) mapping to the probability that
    `next` follows `context`.
  - `"start"`: the starting context token (a string). It is **not** part of the
    output.
  - `"steps"`: the maximum number of tokens to generate (a non-negative
    integer).

  Generate up to `steps` tokens as follows. Let the current context begin as
  `start`. At each step, look at every table entry whose context equals the
  current context, and choose the candidate `next` token with the **highest**
  probability (breaking ties by the token that is **first alphabetically**).
  Append that token to the output and make it the new context. Then repeat.

  Stop early — before reaching `steps` — if the current context appears as the
  context of **no** table entry (there is nothing to generate from it).

  Return the list of generated tokens, in the order produced.

  Example call:

  ```python
  greedy_generate({
      "table": {"fog|rolls": 0.8, "fog|lifts": 0.2, "rolls|in": 1.0},
      "start": "fog",
      "steps": 3,
  })
  # -> ["rolls", "in"]   (picks "rolls", then "in", then "in" has no context -> stop)
  ```
