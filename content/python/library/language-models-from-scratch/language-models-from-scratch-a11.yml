explanation_markdown: |
  Autoregressive generation means the model's own output becomes its next input:
  choose a token, append it, and feed it back in as the new context. Here each
  step is the greedy argmax from the previous exercise, applied to just the table
  rows whose context matches where we currently are. Splitting the key with
  `partition("|")` recovers the `(context, candidate)` pair, and scanning
  `sorted(table)` with a strict `>` keeps ties deterministic by handing them to
  the alphabetically earliest candidate.

  The stopping rule matters as much as the picking rule. A bigram table is only
  a partial map of the token space, so generation can walk into a context that
  was never observed as a left-hand side. When that happens there is no valid
  next token, and continuing would either loop forever or invent data, so we
  break and return what we have. Two things therefore bound the loop: reaching
  `steps`, or reaching a dead-end context. Because greedy decoding is
  deterministic, the same table and start always produce the same phrase.
common_mistakes:
  - Splitting the key with split("|") and unpacking into two variables, which crashes if a token ever contains a pipe; partition is safer and keeps the candidate intact.
  - Forgetting to update the context to the chosen token, so the generator keeps emitting the same first token.
  - Continuing to loop when the current context has no matching rows instead of breaking, producing wrong-length output.
  - Resolving ties by insertion order rather than alphabetically, making the output depend on how the table happened to be built.
