solution_sketch: Loop up to steps times; each iteration scan the table keys in sorted order, split each on the pipe, keep only entries matching the current context, take the strict-max probability (sorted order makes ties alphabetical), append the winner and advance the context, and break as soon as no candidate is found.
sample_solution: |
  def greedy_generate(job):
      table = job["table"]
      context = job["start"]
      steps = job["steps"]
      generated = []
      for _ in range(steps):
          best_token = None
          best_prob = None
          for key in sorted(table):
              ctx, _, cand = key.partition("|")
              if ctx != context:
                  continue
              p = table[key]
              if best_prob is None or p > best_prob:
                  best_prob = p
                  best_token = cand
          if best_token is None:
              break
          generated.append(best_token)
          context = best_token
      return generated
