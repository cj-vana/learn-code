prompt_markdown: |
  The simplest way to turn a language model's next-token probabilities into an
  actual choice is **greedy decoding**: always pick the single most probable
  token. It is fast and fully deterministic, which is exactly what you want when
  a forecast must be reproducible.

  Write `greedy_next(job)` that takes **one dictionary** with a single entry:

  - `"distribution"`: a dictionary mapping each candidate token (string) to its
    probability (a number). It always has at least one entry.

  Example call:

  ```python
  greedy_next({"distribution": {"rising": 0.7, "falling": 0.2, "slack": 0.1}})
  # -> "rising"
  ```

  Return the token with the **highest** probability. If two or more tokens are
  tied for the highest probability, break the tie by returning the one that
  comes **first alphabetically** (so the answer never depends on dictionary
  insertion order).
starter_code: |
  def greedy_next(job):
