explanation_markdown: |
  Greedy decoding is an argmax: among all candidate tokens, return the one with
  the largest probability. The only subtlety is what to do when several tokens
  share the top probability. Real dictionaries iterate in insertion order, so a
  naive scan would return whichever tied token happened to be added first —
  making the model's output depend on an implementation detail rather than the
  probabilities. That is a reproducibility bug.

  Visiting the tokens in `sorted()` order fixes this cheaply: alphabetical order
  is a total, stable rule, so with a strict `>` update the earliest tied token
  is seen first and is never overwritten by a later equal value. The result is a
  decoder that is a pure function of its input distribution. Greedy decoding is
  also short-sighted — it never revisits a choice — which is why more elaborate
  schemes like beam search exist, but the single-step argmax here is their
  common building block.
common_mistakes:
  - Using Python's max on the dictionary without a tie-break rule, so ties resolve by insertion order and become non-deterministic.
  - Breaking ties with the wrong direction (returning the alphabetically last token) by using >= while scanning sorted tokens.
  - Comparing on the token strings instead of their probabilities, returning the alphabetically first token regardless of probability.
