function_name: greedy_next
input_mode: function
solution_sketch: Scan the tokens in sorted (alphabetical) order and keep the running best; using a strict greater-than comparison means the alphabetically earliest token wins any tie automatically.
sample_solution: |
  def greedy_next(job):
      dist = job["distribution"]
      best_token = None
      best_prob = None
      for token in sorted(dist):
          p = dist[token]
          if best_prob is None or p > best_prob:
              best_prob = p
              best_token = token
      return best_token
hints:
  - level: 1
    text: Greedy decoding just means argmax over the distribution, so track the best token and its probability as you scan the dictionary.
  - level: 2
    text: To make ties deterministic, iterate the tokens in sorted() order so alphabetically earlier tokens are considered first.
  - level: 3
    text: Use a strict comparison p > best_prob when updating; because you visit tokens alphabetically, a later equal probability will not displace the earlier winner.
