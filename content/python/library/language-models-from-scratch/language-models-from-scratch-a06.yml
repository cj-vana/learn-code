  - level: 3
    text: Divide each kept count by the running total and round to 6 places; if nothing matched (total is 0), return {}.
tests:
  public:
    - name: basic
      input: {table: {"a|b": 3, "a|c": 1, "b|a": 2}, context: "a"}
      expected: {"b": 0.75, "c": 0.25}
    - name: even
      input: {table: {"the|cat": 2, "the|dog": 2}, context: "the"}
      expected: {"cat": 0.5, "dog": 0.5}
