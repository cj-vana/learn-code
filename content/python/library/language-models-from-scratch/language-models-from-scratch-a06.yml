function_name: next_distribution
input_mode: function
solution_sketch: Split each key into context and next, keep the rows matching the given context while summing their counts, then divide each kept count by the total and round.
sample_solution: |
  def next_distribution(job):
      table = job["table"]
      context = job["context"]
      matches = {}
      total = 0
      for key, count in table.items():
          ctx, nxt = key.split("|")
          if ctx == context:
              matches[nxt] = count
              total += count
      if total == 0:
          return {}
      return {nxt: round(count / total, 6) for nxt, count in matches.items()}
