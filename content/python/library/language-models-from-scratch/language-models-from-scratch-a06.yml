prompt_markdown: |
  To actually *generate* text, a language model needs the probability distribution
  over the next token given the current context. You are handed a count table and a
  context, and must produce that distribution.

  Write `next_distribution(job)` where `job` is a dict with keys:
  - `table`: a dict mapping each `"context|next"` string to an integer count,
  - `context`: the context token you want to continue from.

  Collect every table entry whose context part equals `context`, then return a dict
  mapping each observed `next` token to its probability `count / total`, where
  `total` is the sum of counts for that context, **rounded to 6 decimal places**.
  If the context never appears in the table, return an empty dict `{}`.

  Example: with `table = {"a|b": 3, "a|c": 1, "b|a": 2}` and `context = "a"`, the
  `a` rows total `4`, so the result is `{"b": 0.75, "c": 0.25}`.
starter_code: |
