    - name: single_next
      input: {table: {"x|y": 5, "p|q": 2}, context: "x"}
      expected: {"y": 1.0}
    - name: weighted
      input: {table: {"fog|horn": 4, "fog|bank": 1, "clear|sky": 2}, context: "fog"}
      expected: {"horn": 0.8, "bank": 0.2}
explanation_markdown: |
  Filtering the table down to a single context and normalizing those counts gives
  the categorical distribution you would sample from to pick the next token — the
  heart of text generation. Only the matching context's rows contribute to the
  denominator, so unrelated rows (a different context) are ignored entirely. An
  unseen context returns `{}`, a deliberate "no information here" signal — that is
  exactly the situation where a real system would fall back to smoothing or to a
  shorter-context model. Rounding to 6 places keeps the floats matching under `==`.
common_mistakes:
  - Normalizing over the whole table instead of only the rows matching the requested context.
  - Returning a default value or zeros for an unseen context instead of an empty dict.
  - Splitting the key wrong and comparing the next token, rather than the context, to `context`.
