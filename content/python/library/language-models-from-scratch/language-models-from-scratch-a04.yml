function_name: laplace_smooth
input_mode: function
solution_sketch: For each pair, read its context from the key, look up total(a) in context_total, and compute (count+1)/(total+V) rounded to 6 places.
sample_solution: |
  def laplace_smooth(job):
      counts = job["counts"]
      vocab_size = job["vocab_size"]
      context_total = job["context_total"]
      probs = {}
      for key, n in counts.items():
          context = key.split("|")[0]
          denom = context_total[context] + vocab_size
          probs[key] = round((n + 1) / denom, 6)
      return probs
hints:
  - level: 1
    text: Every probability has the same shape (count+1)/(total+V); only the numbers change per pair.
  - level: 2
    text: Read the context from the key (the part before the "|") to look up its total in context_total.
  - level: 3
    text: Compute (n + 1) / (context_total[context] + vocab_size) and round the result to 6 decimal places.
