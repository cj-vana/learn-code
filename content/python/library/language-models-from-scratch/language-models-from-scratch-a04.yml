prompt_markdown: |
  A bigram probability of exactly 0 is dangerous: a single unseen pair makes an
  entire sentence impossible. **Add-one (Laplace) smoothing** fixes this by
  pretending every possible next token was seen one extra time. For a context `a`
  and next token `b`,

      P_smooth(b | a) = (count(a, b) + 1) / (total(a) + V)

  where `total(a)` is how many times `a` appeared as a context and `V` is the
  vocabulary size (the number of distinct token types).

  Write `laplace_smooth(job)` where `job` is a dict with keys:
  - `counts`: a dict mapping `"first|second"` to its integer count,
  - `vocab_size`: the integer `V`,
  - `context_total`: a dict mapping each context token to its `total(a)`.

  Return a dict mapping every `"first|second"` key to its smoothed probability,
  **rounded to 6 decimal places**.

  Example: `{"counts": {"a|b": 3, "a|c": 1}, "vocab_size": 2, "context_total":
  {"a": 4}}` gives `P(b|a) = (3+1)/(4+2) = 0.666667` and
  `P(c|a) = (1+1)/(4+2) = 0.333333`.
