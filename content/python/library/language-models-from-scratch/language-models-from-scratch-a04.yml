explanation_markdown: |
  Add-one smoothing shifts a little probability mass off the tokens you did see and
  onto the ones you did not, so no next token is ever assigned probability 0. The
  `+1` in the numerator credits every pair one phantom sighting, and the `+ V` in
  the denominator keeps the distribution normalized (it accounts for one phantom
  sighting of each of the `V` vocabulary tokens). A larger `V` spreads more of the
  mass onto unseen events. As always, rounding to 6 places is what makes the
  floating-point results match the expected values under `==`.
common_mistakes:
  - Adding V to the numerator or only 1 to the denominator, breaking normalization.
  - Using the raw context total without adding V, so unseen tokens still get no mass.
  - Forgetting to round the smoothed probability to 6 decimal places.
