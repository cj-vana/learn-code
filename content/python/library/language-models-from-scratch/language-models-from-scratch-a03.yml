prompt_markdown: |
  Raw bigram counts become a language model once you turn them into **conditional
  probabilities**. For a context token `a`, the probability that the next token is
  `b` is

      P(b | a) = count(a, b) / (sum over every token x of count(a, x))

  The denominator is simply the total of all bigrams that start with `a`.

  Write `bigram_probs(job)` where `job` is a dict with a single key `counts`: a
  dict mapping each bigram string `"first|second"` to its integer count (the same
  shape produced by counting bigrams). Return a dict mapping every
  `"first|second"` key to `P(second | first)`, **rounded to 6 decimal places**.

  Example: `{"counts": {"a|b": 3, "a|c": 1}}` — the context `a` was seen 4 times,
  so `P(b|a) = 3/4 = 0.75` and `P(c|a) = 1/4 = 0.25`, giving
  `{"a|b": 0.75, "a|c": 0.25}`.
starter_code: |
