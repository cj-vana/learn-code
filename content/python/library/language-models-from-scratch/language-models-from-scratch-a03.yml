tests:
  public:
    - name: simple
      input: {counts: {"a|b": 3, "a|c": 1}}
      expected: {"a|b": 0.75, "a|c": 0.25}
    - name: even_split
      input: {counts: {"the|cat": 2, "the|dog": 2}}
      expected: {"the|cat": 0.5, "the|dog": 0.5}
    - name: single_pair
      input: {counts: {"x|y": 5}}
      expected: {"x|y": 1.0}
  validation:
    - name: thirds
      input: {counts: {"a|b": 1, "a|c": 1, "a|d": 1}}
      expected: {"a|b": 0.333333, "a|c": 0.333333, "a|d": 0.333333}
    - name: two_contexts
      input: {counts: {"a|b": 2, "a|c": 1, "b|a": 3}}
      expected: {"a|b": 0.666667, "a|c": 0.333333, "b|a": 1.0}
    - name: weighted
      input: {counts: {"sun|rise": 3, "sun|set": 1, "moon|rise": 1}}
      expected: {"sun|rise": 0.75, "sun|set": 0.25, "moon|rise": 1.0}
explanation_markdown: |
  Normalizing the counts *within each context* turns frequencies into a proper
  probability distribution: for any fixed context, the returned probabilities sum
  to 1. The two-pass approach costs O(number of bigrams) — the first pass builds
  each context's denominator, the second divides. Because tests compare floats
  with `==`, every probability is rounded to 6 places so results like `1/3` land
  on the exact expected value `0.333333`.
common_mistakes:
  - Dividing by the grand total of all bigrams instead of the per-context total.
  - Reading the second token as the context; the context is the part before the "|".
  - Forgetting to round, so the `==` comparison against the expected float fails.
