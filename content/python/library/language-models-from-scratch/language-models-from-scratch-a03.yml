function_name: bigram_probs
input_mode: function
solution_sketch: First pass sums counts per context (the token before the "|"); second pass divides each count by its context total and rounds to 6 places.
sample_solution: |
  def bigram_probs(job):
      counts = job["counts"]
      totals = {}
      for key, n in counts.items():
          context = key.split("|")[0]
          totals[context] = totals.get(context, 0) + n
      probs = {}
      for key, n in counts.items():
          context = key.split("|")[0]
          probs[key] = round(n / totals[context], 6)
      return probs
