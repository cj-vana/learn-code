prompt_markdown: |
  A bigram model only looks back one token; an **n-gram** model looks back `n-1`.
  Counting n-grams means sliding a window of `n` consecutive tokens across the
  sequence and tallying each window.

  Write `ngram_counts(job)` where `job` is a dict with keys `tokens` (a list of
  token strings) and `n` (a positive integer window size). For every position
  where a full window of `n` tokens fits, form the key by joining those tokens
  with `|` (for example the tokens `["a", "b", "c"]` become `"a|b|c"`). Return a
  dict mapping each n-gram key to how many times it occurs.

  If `n` is larger than the number of tokens, no window fits, so return an empty
  dict `{}`. With `n = 1` you simply count individual tokens.

  Example: `{"tokens": ["a", "b", "a", "b"], "n": 2}` gives windows `a|b`, `b|a`,
  `a|b`, so the result is `{"a|b": 2, "b|a": 1}`.
starter_code: |
  def ngram_counts(job):
      return {}
function_name: ngram_counts
input_mode: function
solution_sketch: Slide a start index over range(len(tokens) - n + 1), join tokens[i:i+n] with "|", and tally each window.
sample_solution: |
  def ngram_counts(job):
      tokens = job["tokens"]
      n = job["n"]
      counts = {}
      for i in range(len(tokens) - n + 1):
          gram = "|".join(tokens[i:i + n])
          counts[gram] = counts.get(gram, 0) + 1
      return counts
hints:
  - level: 1
    text: A sequence of length L has L - n + 1 windows of size n (which can be zero or negative).
  - level: 2
    text: For each start index i, slice tokens[i:i+n] and "|".join it to build the key.
  - level: 3
    text: When len(tokens) - n + 1 is not positive, range(...) is empty and you correctly return {} with no special-casing.
tests:
  public:
    - name: bigram
      input: {tokens: ["a", "b", "c"], n: 2}
      expected: {"a|b": 1, "b|c": 1}
    - name: bigram_repeat
      input: {tokens: ["a", "b", "a", "b"], n: 2}
      expected: {"a|b": 2, "b|a": 1}
    - name: unigram
      input: {tokens: ["a", "b", "a"], n: 1}
      expected: {"a": 2, "b": 1}
  validation:
