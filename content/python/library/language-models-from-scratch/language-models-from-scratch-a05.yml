      input: {tokens: ["x", "y", "z", "x", "y", "z"], n: 3}
      expected: {"x|y|z": 2, "y|z|x": 1, "z|x|y": 1}
    - name: window_too_big
      input: {tokens: ["a", "b"], n: 3}
      expected: {}
    - name: window_equals_length
      input: {tokens: ["p", "q", "r"], n: 3}
      expected: {"p|q|r": 1}
explanation_markdown: |
  The window starts run from index 0 up to `len(tokens) - n`, giving
  `len(tokens) - n + 1` windows; when that count is zero or negative, `range`
  produces nothing and the empty dict falls out for free. Joining the window with
  `|` gives a single hashable string key, just like the bigram case generalized to
  `n` tokens. Higher `n` captures more context but the data gets sparse fast — most
  long grams appear only once — which is exactly why smoothing (the previous
  exercise) becomes important.
common_mistakes:
  - Iterating over range(len(tokens) - n) instead of range(len(tokens) - n + 1), dropping the final window.
  - Joining the window without a separator, so ["a", "bc"] and ["ab", "c"] collide into the same key.
  - Special-casing n greater than the token count instead of letting the empty range handle it.
