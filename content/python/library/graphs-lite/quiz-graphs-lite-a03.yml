questions:
  - id: q1
    prompt: |
      In depth-first cycle detection on an *undirected* graph, why do you track the
      node you arrived from (the parent) and ignore an edge back to it?
    choices:
      - Because every undirected edge appears in both endpoints' lists, so the parent always looks visited but is not a real cycle
      - Because the parent node is always the start of the graph
      - Because parents have a higher indegree than their children
      - Because ignoring the parent makes the traversal run faster
    correct_choice: Because every undirected edge appears in both endpoints' lists, so the parent always looks visited but is not a real cycle
    explanation: |
      An undirected edge is stored in both directions, so the node you came from is
      always a visited neighbour. A genuine cycle is a visited neighbour that is
      *not* the parent.
    concepts:
      - patterns.dfs
      - patterns.graph_traversal
  - id: q2
    prompt: |
      In three-colour depth-first cycle detection on a *directed* graph, which
      situation signals a cycle?
    choices:
      - Reaching a node that is currently grey (still on the active recursion path)
      - Reaching a node that is already black (fully finished)
      - Reaching any node that has been coloured at all
      - Reaching a node with no outgoing edges
    correct_choice: Reaching a node that is currently grey (still on the active recursion path)
    explanation: |
      A grey node is still open on the current path, so an edge to it is a
      back-edge that closes a directed cycle. A black node is safely finished and
      is not a cycle.
    concepts:
      - patterns.dfs
      - patterns.graph_traversal
  - id: q3
    prompt: |
      A clash graph is a triangle: three actors who all clash with one another.
      Can they be split into exactly two rehearsal rooms with no clash inside a
      room?
    choices:
      - "No -- a triangle is an odd cycle, so the graph is not two-colourable"
      - "Yes -- put two in one room and one in the other"
      - "Yes -- any graph can be split into two rooms"
      - "No -- only graphs with no edges can be split"
    correct_choice: "No -- a triangle is an odd cycle, so the graph is not two-colourable"
    explanation: |
      Two-colouring fails exactly when an odd-length cycle exists. In a triangle
      the third actor clashes with both of the first two, so no valid two-way
      split is possible.
    concepts:
      - patterns.graph_traversal
      - patterns.queue_bfs
  - id: q4
    prompt: |
      Mould spreads each hour to orthogonally adjacent healthy seedlings (1). A
      cell is 2 if mouldy and 0 if empty. How many hours until no healthy seedling
      remains?

          [[2, 1],
           [0, 1]]
    choices:
      - "2"
      - "1"
      - "3"
      - "-1"
    correct_choice: "2"
    explanation: |
      At hour 1 the mould at (0,0) reaches the seedling at (0,1). At hour 2 that
      newly mouldy cell reaches (1,1). The empty cell at (1,0) is never a seedling,
      so two hours clears the bench.
    concepts:
      - patterns.queue_bfs
      - patterns.grid_traversal
  - id: q5
    prompt: |
      A robot moves up/down/left/right across open tiles (0); shelves (1) block it.
      What is the fewest moves from the top-left (0,0) to the top-right (0,2)?

          [[0, 1, 0],
           [0, 0, 0]]
    choices:
      - "4"
      - "2"
      - "3"
      - "-1"
    correct_choice: "4"
    explanation: |
      The shelf at (0,1) blocks the direct route, so the robot goes down and along
      the bottom row: (0,0), (1,0), (1,1), (1,2), (0,2) -- four moves.
    concepts:
      - patterns.queue_bfs
      - patterns.grid_traversal
