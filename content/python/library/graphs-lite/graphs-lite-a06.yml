explanation_markdown: |
  Undirected cycle detection hinges on one subtlety: because every pipe appears in
  both junctions' neighbour lists, you will always see the junction you *just came
  from*. That is not a cycle. A real cycle shows up when you reach a junction that
  was already visited through some *other* route -- a neighbour that is visited but
  is not your parent. Tracking the parent for each node lets you ignore the
  harmless back-reference and catch the genuine loop. Looping the traversal over
  every unseen node handles graphs that are split into several disconnected
  sub-networks, so a loop hiding in any component is still found.
common_mistakes:
  - Reporting a cycle the first time any visited neighbour appears, forgetting that the parent always looks visited.
  - Only starting the search from one node, missing cycles in other components.
  - Adding both directions of each edge but then treating the graph as if it were directed.
