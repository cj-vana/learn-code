function_name: has_cycle_undirected
input_mode: function
solution_sketch: Traverse each component tracking the node you arrived from; seeing an already-visited neighbour that is not that parent means a cycle.
sample_solution: |
  def has_cycle_undirected(data):
      nodes = data["nodes"]
      edges = data["edges"]
      adjacency = {node: [] for node in nodes}
      for node_a, node_b in edges:
          adjacency[node_a].append(node_b)
          adjacency[node_b].append(node_a)

      seen = set()
      for start in nodes:
          if start in seen:
              continue
          stack = [(start, None)]
          seen.add(start)
          while stack:
              junction, parent = stack.pop()
              for neighbour in adjacency[junction]:
                  if neighbour not in seen:
                      seen.add(neighbour)
                      stack.append((neighbour, junction))
                  elif neighbour != parent:
                      return True
      return False
hints:
  - level: 1
    text: In an undirected graph, bumping into an already-visited junction usually signals a loop -- except for the pipe you just came through.
  - level: 2
    text: Carry the parent junction alongside each node so you can tell the difference between the edge you arrived on and a genuine back-edge.
  - level: 3
    text: A visited neighbour that is not the parent closes a cycle; run this parent-aware traversal starting from every not-yet-seen node to cover all components.
