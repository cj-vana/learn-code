prompt_markdown: |
  A greenhouse irrigation network joins junctions with two-way pipes. If the
  pipes ever form a loop, water can circulate wastefully, so the maintenance crew
  wants to know whether any loop exists.

  You are given `data` with `nodes` (all junctions) and `edges` (a list of
  `[a, b]` two-way pipes, with no pipe repeated and no pipe from a junction to
  itself). Write `has_cycle_undirected(data)` that returns `True` if the network
  contains at least one cycle and `False` otherwise.
starter_code: |
