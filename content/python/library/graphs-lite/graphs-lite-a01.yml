prompt_markdown: |
  A small city publishes its tram map as a list of two-way connections between
  stops, for example `["central", "harbour"]`. Before you can plan any trips you
  need the map in a friendlier shape: an *adjacency list*.

  Write `build_adjacency_list(edges)` where `edges` is a list of `[stop_a, stop_b]`
  pairs. Return a dictionary mapping every stop that appears to a list of its
  directly connected neighbours. Because tracks run both ways, each edge adds
  two entries. Sort every neighbour list alphabetically, and never list the same
  neighbour twice even if a connection is repeated in the input.
starter_code: |
