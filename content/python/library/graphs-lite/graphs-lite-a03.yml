function_name: count_connected_components
input_mode: function
solution_sketch: Build an adjacency map, then start a fresh traversal from each unseen node and count how many traversals it takes to cover every node.
sample_solution: |
  def count_connected_components(data):
      nodes = data["nodes"]
      edges = data["edges"]
      adjacency = {node: [] for node in nodes}
      for node_a, node_b in edges:
          adjacency[node_a].append(node_b)
          adjacency[node_b].append(node_a)

      seen = set()
      clusters = 0
      for node in nodes:
          if node in seen:
              continue
          clusters += 1
          stack = [node]
          seen.add(node)
          while stack:
              current = stack.pop()
              for neighbour in adjacency[current]:
                  if neighbour not in seen:
                      seen.add(neighbour)
                      stack.append(neighbour)
      return clusters
hints:
  - level: 1
    text: Each time you begin exploring from a node that has not been seen yet, you have found a brand-new cluster.
  - level: 2
    text: Build an adjacency map first, then loop over every node and flood-fill from the ones still missing from your seen set.
  - level: 3
    text: Increment the counter once per outer-loop node that is unseen, then run a stack-based traversal to mark that node's whole cluster before moving on.
tests:
  public:
    - name: one_link_two_singletons
      input: {"nodes": [a, b, c, d], "edges": [[a, b]]}
      expected: 3
    - name: single_chain
      input: {"nodes": [a, b, c], "edges": [[a, b], [b, c]]}
