prompt_markdown: |
  A field of wireless soil sensors forms clusters: two sensors are in the same
  cluster when there is some chain of direct radio links connecting them. A
  sensor with no links at all is a cluster of one.

  You are given `data` with `nodes` (a list of every sensor id) and `edges` (a
  list of `[a, b]` two-way links). Write `count_connected_components(data)` that
  returns how many separate clusters exist. Remember that a sensor listed in
  `nodes` might never appear in `edges` -- it still counts.
