    - name: triangle_plus_extra
      input: {"nodes": [a, b, c, d], "edges": [[a, b], [b, c], [c, a]]}
      expected: 2
explanation_markdown: |
  Counting connected components is a direct application of traversal: every time
  the outer loop lands on a node the traversal has not yet reached, that node
  must belong to a component you have never touched, so you bump the counter and
  then mark the entire component as seen. Because each node and each edge is
  visited a constant number of times, the whole routine runs in O(nodes + edges).
  Initialising the adjacency map from `nodes` (not just from the edges) is what
  guarantees isolated sensors are still counted -- a subtle case the empty-edges
  test checks directly.
common_mistakes:
  - Building adjacency only from edges, so isolated nodes never get counted.
  - Marking a node seen when you pop it instead of when you push it, allowing it onto the stack twice.
  - Resetting the seen set inside the loop, which recounts nodes across components.
