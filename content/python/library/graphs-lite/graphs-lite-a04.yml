prompt_markdown: |
  A courier company moves parcels between depots along fixed routes. Every route
  takes the same effort, so the cheapest plan is simply the one with the fewest
  hops between depots.

  You are given `data` with `adj` (an adjacency dictionary), `start`, and `goal`.
  Write `shortest_hops(data)` returning the minimum number of routes needed to
  get from `start` to `goal`. A depot reaches itself in `0` hops. If no chain of
  routes connects them, return `-1`.
starter_code: |
