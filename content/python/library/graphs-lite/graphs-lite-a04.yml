      return -1
function_name: shortest_hops
input_mode: function
solution_sketch: Run breadth-first search from the start, tracking distance layers, and return the distance when the goal is dequeued or found.
sample_solution: |
  from collections import deque


  def shortest_hops(data):
      adjacency = data["adj"]
      start = data["start"]
      goal = data["goal"]
      if start == goal:
          return 0
      seen = {start}
      queue = deque([(start, 0)])
      while queue:
          depot, distance = queue.popleft()
          for neighbour in sorted(adjacency.get(depot, [])):
              if neighbour == goal:
                  return distance + 1
              if neighbour not in seen:
                  seen.add(neighbour)
                  queue.append((neighbour, distance + 1))
      return -1
hints:
  - level: 1
    text: Breadth-first search explores everything one hop away, then two hops away, and so on, so the first time you reach the goal is via a shortest route.
  - level: 2
    text: Store each depot in the queue together with its distance from the start, and mark depots seen as you enqueue them.
  - level: 3
    text: Handle start == goal up front returning 0, and when a neighbour equals the goal return distance + 1 immediately.
