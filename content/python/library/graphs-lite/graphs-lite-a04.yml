explanation_markdown: |
  On an unweighted graph, breadth-first search finds shortest paths because it
  fans out in concentric rings: all depots one hop away are visited before any
  two hops away. The distance stored alongside each depot in the queue is exactly
  the length of the shortest route discovered so far, so the moment the goal
  first appears you can return. Marking a depot `seen` at *enqueue* time (not
  dequeue) prevents it from being added by two different neighbours and keeps the
  work linear in the number of routes.
common_mistakes:
  - Using a stack instead of a queue, which turns BFS into DFS and can report a longer path.
  - Marking a node seen only when it is dequeued, letting duplicates pile up in the queue.
  - Forgetting the start == goal case and returning 1 or -1 instead of 0.
