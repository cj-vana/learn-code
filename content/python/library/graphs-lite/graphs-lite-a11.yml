prompt_markdown: |
  A theatre wants to run two rehearsal rooms at once. Some pairs of actors clash
  and must never share a room. You are handed the list of clashing pairs and asked
  whether everyone can be split into exactly two rooms so that no clashing pair
  ends up together.

  You are given `data` with `nodes` (every actor id) and `edges` (a list of
  `[a, b]` two-way clashes). Write `can_use_two_rooms(data)` that returns `True`
  if such a split is possible and `False` if it is not. Actors with no clashes can
  go in either room.
