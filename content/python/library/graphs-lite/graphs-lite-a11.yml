function_name: can_use_two_rooms
input_mode: function
solution_sketch: Breadth-first search each component, assigning alternating room labels; a clash between two actors already given the same label proves no split exists.
sample_solution: |
  from collections import deque


  def can_use_two_rooms(data):
      nodes = data["nodes"]
      edges = data["edges"]
      adjacency = {node: [] for node in nodes}
      for a, b in edges:
          adjacency[a].append(b)
          adjacency[b].append(a)

      room = {}
      for start in nodes:
          if start in room:
              continue
          room[start] = 0
          queue = deque([start])
          while queue:
              actor = queue.popleft()
              for other in adjacency[actor]:
                  if other not in room:
                      room[other] = 1 - room[actor]
                      queue.append(other)
                  elif room[other] == room[actor]:
                      return False
      return True
hints:
  - level: 1
    text: Think of the two rooms as two colours; every clash edge must join actors of different colours.
  - level: 2
    text: Walk each connected group, giving the start actor one room and forcing every neighbour into the opposite room.
  - level: 3
    text: If breadth-first search ever reaches a neighbour already assigned the same room as the current actor, an odd-length clash loop exists and the split is impossible.
