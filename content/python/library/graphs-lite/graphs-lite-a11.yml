explanation_markdown: |
  Splitting into two rooms with no internal clash is exactly asking whether the
  clash graph is *bipartite* -- two-colourable. Breadth-first search assigns the
  first actor of each component to room 0 and every direct neighbour to the
  opposite room, propagating outward. The whole thing works if and only if no edge
  ever connects two actors that end up in the same room. That failure happens
  precisely when the graph contains an odd-length cycle, which is why the triangle
  fails but the four-cycle succeeds. Handling each unvisited node as a fresh start
  covers graphs made of several disconnected casts, so a bad triangle hiding in one
  component still sinks the whole plan.
common_mistakes:
  - Assuming any graph can be split; odd-length clash cycles make it impossible.
  - Only colouring one component and forgetting the rest of the cast in a disconnected graph.
  - Checking equality of rooms before assigning, so an unlabelled neighbour is mistaken for a conflict.
