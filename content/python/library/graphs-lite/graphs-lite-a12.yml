explanation_markdown: |
  A grid with obstacles is still just an unweighted graph, so breadth-first search
  gives the fewest moves for free: it expands the frontier one ring at a time, and
  every tile is first reached by a shortest route. The shelves need no special
  machinery -- they are simply tiles you refuse to enqueue, exactly like a missing
  edge in an adjacency list. Marking a tile `seen` at enqueue time keeps the
  frontier from revisiting tiles and holds the running time to one pass over the
  grid. The three guard clauses matter: a blocked start or goal is unreachable by
  definition, and `start == goal` is zero moves before the search even begins. In
  `detour_around_shelves`, the direct rightward route is blocked, so the robot must
  dip down and back up, spending six moves instead of two.
common_mistakes:
  - Using depth-first search, which finds a path but not necessarily the shortest one.
  - Forgetting to reject a start or goal tile that sits on a shelf.
  - Marking tiles seen only when dequeued, letting the same tile enter the queue from several neighbours.
