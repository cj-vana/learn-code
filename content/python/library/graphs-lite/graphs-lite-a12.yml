prompt_markdown: |
  A warehouse robot rolls across a grid of floor tiles. A tile is `0` if it is
  open floor and `1` if a shelf blocks it. The robot moves one tile at a time, up,
  down, left, or right, and can never enter a shelf tile.

  You are given `data` with `grid`, `start` as `[row, col]`, and `goal` as
  `[row, col]`. Write `fewest_moves(data)` returning the smallest number of moves
  to roll from `start` to `goal`. The start and goal are the same tile means `0`
  moves. If either endpoint sits on a shelf, or no open path connects them, return
  `-1`.
