      return -1
function_name: fewest_moves
input_mode: function
solution_sketch: Run breadth-first search over open tiles, treating each tile as a node linked to its four open neighbours, and return the distance layer at which the goal is first reached.
sample_solution: |
  from collections import deque


  def fewest_moves(data):
      grid = data["grid"]
      start = tuple(data["start"])
      goal = tuple(data["goal"])
      rows = len(grid)
      cols = len(grid[0])
      sr, sc = start
      gr, gc = goal
      if grid[sr][sc] == 1 or grid[gr][gc] == 1:
          return -1
      if start == goal:
          return 0

      seen = {start}
      queue = deque([(sr, sc, 0)])
      while queue:
          r, c, dist = queue.popleft()
          for dr, dc in ((-1, 0), (1, 0), (0, -1), (0, 1)):
              nr, nc = r + dr, c + dc
              if (0 <= nr < rows and 0 <= nc < cols
                      and grid[nr][nc] == 0
                      and (nr, nc) not in seen):
                  if (nr, nc) == goal:
                      return dist + 1
                  seen.add((nr, nc))
                  queue.append((nr, nc, dist + 1))
      return -1
hints:
  - level: 1
    text: Each open tile is a node; its neighbours are the open tiles directly up, down, left, and right. Shelves are simply missing nodes.
  - level: 2
    text: Breadth-first search explores tiles in rings of increasing distance, so the first time you touch the goal you have used the fewest moves.
  - level: 3
    text: Store each tile with its distance from the start, skip shelves and the grid edges, and return distance + 1 the moment a neighbour equals the goal; check blocked endpoints and start == goal first.
