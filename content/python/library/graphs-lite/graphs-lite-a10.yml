explanation_markdown: |
  When several sources spread at once, a single breadth-first search still works
  -- you just prime the queue with *all* of them at distance zero. Because BFS
  visits cells in nondecreasing time order, the first time the mould reaches any
  seedling is the earliest possible hour, and the last flip recorded is when the
  final seedling succumbs. That final time stamp is the answer. Two independent
  checks keep the edge cases honest: starting `healthy == 0` short-circuits to `0`,
  and comparing the remaining `healthy` count against zero after the queue drains
  catches seedlings the mould can never reach (walled off by empty cells or the
  bench edge), which must return `-1`. In `two_sources_meet`, both mould cells act
  in the same hour, so the lone seedling between them flips at hour one.
common_mistakes:
  - Starting BFS from only one contaminated cell, which overcounts the hours or misses simultaneous spread.
  - Forgetting to return -1 when a healthy seedling is unreachable, reporting the partial time instead.
  - Overwriting the original grid while still iterating it, so cells are recounted; copy the grid or track counts separately.
