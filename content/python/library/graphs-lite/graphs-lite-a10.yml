function_name: hours_until_all_mouldy
input_mode: function
solution_sketch: Seed a breadth-first search with every already-mouldy cell at time zero, spread outward hour by hour, and track the last hour any seedling flips plus how many healthy seedlings remain.
sample_solution: |
  from collections import deque


  def hours_until_all_mouldy(grid):
      if not grid or not grid[0]:
          return 0
      rows = len(grid)
      cols = len(grid[0])
      queue = deque()
      healthy = 0
      for r in range(rows):
          for c in range(cols):
              if grid[r][c] == 2:
                  queue.append((r, c, 0))
              elif grid[r][c] == 1:
                  healthy += 1
      if healthy == 0:
          return 0

      state = [row[:] for row in grid]
      hours = 0
      while queue:
          r, c, t = queue.popleft()
          for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
              nr, nc = r + dr, c + dc
              if 0 <= nr < rows and 0 <= nc < cols and state[nr][nc] == 1:
                  state[nr][nc] = 2
                  healthy -= 1
                  hours = t + 1
                  queue.append((nr, nc, t + 1))
      return hours if healthy == 0 else -1
hints:
  - level: 1
    text: Every contaminated cell spreads at the same time, so the search must start from all of them at once rather than from a single source.
  - level: 2
    text: Put every mouldy cell into the queue with an initial time of 0, then spread outward; a newly infected cell inherits its infector's time plus one.
  - level: 3
    text: Count the healthy seedlings up front and decrement as each turns; the answer is the largest time stamp reached, or -1 if any healthy seedlings remain after the queue empties.
