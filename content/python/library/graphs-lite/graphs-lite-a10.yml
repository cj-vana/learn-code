prompt_markdown: |
  A greenhouse bench holds a grid of seed cells. Each cell is `0` (empty), `1` (a
  healthy seedling), or `2` (a seedling already covered in mould). Every hour,
  mould spreads from each contaminated cell to any healthy seedling directly above,
  below, left, or right of it. Empty cells never carry mould and never block the
  grid layout.

  Write `hours_until_all_mouldy(grid)` returning the number of hours until no
  healthy seedling remains. If the whole bench starts with no healthy seedlings,
  return `0`. If at least one healthy seedling can never be reached by the mould,
  return `-1`.
