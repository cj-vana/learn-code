prompt_markdown: |
  Assembling a satellite means performing steps in an order that respects
  dependencies: a link `[a, b]` means step `a` must be completed before step `b`.
  You want a full work order -- a list of every step in an order that never
  violates a dependency. This is a *topological sort*.

  You are given `data` with `nodes` (every step id) and `edges` (a list of
  `[a, b]` directed dependencies, none repeated). Write `assembly_order(data)`
  returning a valid ordering as a list. When several orderings are valid, return
  the one that is alphabetically smallest: whenever more than one step is ready to
  run, always choose the alphabetically first. If the dependencies contain a cycle
  and no full ordering exists, return an empty list.
