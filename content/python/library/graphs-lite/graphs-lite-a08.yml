solution_sketch: Count incoming dependencies per step, keep every zero-indegree step in a min-heap, and repeatedly pop the smallest, releasing its dependents.
sample_solution: |
  import heapq


  def assembly_order(data):
      nodes = data["nodes"]
      edges = data["edges"]
      adjacency = {node: [] for node in nodes}
      indegree = {node: 0 for node in nodes}
      for source, target in edges:
          adjacency[source].append(target)
          indegree[target] += 1

      ready = [node for node in nodes if indegree[node] == 0]
      heapq.heapify(ready)
      order = []
      while ready:
          step = heapq.heappop(ready)
          order.append(step)
          for nxt in adjacency[step]:
              indegree[nxt] -= 1
              if indegree[nxt] == 0:
                  heapq.heappush(ready, nxt)

      if len(order) != len(nodes):
          return []
      return order
hints:
  - level: 1
    text: A step can run only once every step it depends on has already been placed; track how many unmet dependencies each step still has.
  - level: 2
    text: Keep the count of incoming edges per node; a node with count zero is ready. Placing a node lowers its dependents' counts by one.
  - level: 3
    text: Use a min-heap of ready nodes so you always emit the alphabetically smallest; if the finished list is shorter than the node list, a cycle blocked some steps, so return [].
