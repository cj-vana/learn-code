explanation_markdown: |
  Kahn's algorithm turns ordering into repeated bookkeeping. The *indegree* of a
  step is how many dependencies still block it; a step with indegree zero is ready
  to place. Each time you place a step, you have satisfied one dependency for each
  of its dependents, so you decrement their indegrees, and any that hit zero join
  the ready set. Using a **min-heap** for the ready set is what delivers the
  alphabetically smallest valid order: among all currently-ready steps, the
  smallest always comes out first. The cycle check is elegant -- if some steps
  never reach indegree zero, they were trapped in a loop and never got placed, so
  the finished list ends up shorter than the full node list and you return `[]`.
  Notice in `tie_break_respects_dependency` that `y` comes before `z` even though
  `z` is smaller, because `z` was ready from the start too and `y` is smaller
  still; `x` waits until `z` releases it.
common_mistakes:
  - Using a plain list or queue instead of a heap, which produces a valid order but not the alphabetically smallest one.
  - Forgetting to detect the cycle case, returning a partial ordering instead of an empty list.
  - Decrementing indegree but forgetting to push a node the moment its count reaches zero.
