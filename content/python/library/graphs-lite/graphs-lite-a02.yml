function_name: dfs_order
input_mode: function
solution_sketch: Recurse from the start, marking rooms visited and iterating neighbours in sorted order, appending each room when first entered.
sample_solution: |
  def dfs_order(data):
      adjacency = data["adj"]
      start = data["start"]
      visited = set()
      order = []

      def visit(room):
          visited.add(room)
          order.append(room)
          for neighbour in sorted(adjacency.get(room, [])):
              if neighbour not in visited:
                  visit(neighbour)

      visit(start)
      return order
hints:
  - level: 1
    text: Record a room the moment you first enter it, before looking at its neighbours.
  - level: 2
    text: Keep a visited set so you never re-enter a room, and iterate neighbours with sorted() to fix the tie-break order.
  - level: 3
    text: A recursive helper visit(room) that appends room, then recurses into each sorted unvisited neighbour, produces the preorder listing directly.
