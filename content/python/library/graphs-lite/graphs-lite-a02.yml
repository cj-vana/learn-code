prompt_markdown: |
  A museum guide always tours connected gallery rooms the same way: from the
  current room she steps into the first unvisited doorway in alphabetical order,
  goes as deep as she can, and only backtracks when a room has no new doorways
  left. That is a depth-first search.

  You are given `data` with two keys: `adj`, an adjacency dictionary mapping each
  room to a list of adjacent rooms, and `start`, the room she begins in. Write
  `dfs_order(data)` that returns the list of rooms in the order she first enters
  them. When a room has several unvisited neighbours, always descend into the
  alphabetically smallest one first.
