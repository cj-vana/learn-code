explanation_markdown: |
  Depth-first search commits to one branch fully before considering alternatives.
  The `visited` set is what stops the walk from looping forever on cycles, and
  appending a room the instant you enter it produces the *preorder* sequence. The
  `sorted(...)` call is the only reason the answer is deterministic: without it,
  the order would depend on however the neighbour list happened to be arranged.
  Notice in `deep_before_wide` that `h` is visited before `g` even though `g` is a
  direct neighbour of the start -- DFS dives through `f` to `h` first and only
  returns to `g` after that branch is exhausted.
common_mistakes:
  - Appending a room when you finish it rather than when you first enter it, which yields a different order.
  - Forgetting the visited set, so a cycle sends the recursion into infinite loops.
  - Iterating the raw neighbour list instead of a sorted copy, breaking the required tie-break.
