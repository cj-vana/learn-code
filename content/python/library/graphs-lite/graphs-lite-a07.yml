explanation_markdown: |
  Directed cycle detection cannot use the "ignore the parent" rule from the
  undirected case, because direction matters: reaching an already-finished node is
  perfectly fine, but reaching a node that is still open on the current path is a
  back-edge that closes a loop. The three colours capture exactly that
  distinction. **Grey** means "on the stack right now"; **black** means "explored
  and safely exited." A grey neighbour is the deadlock signal. Marking a node
  black only after its whole subtree is done is what lets a diamond like
  `a -> b -> d` and `a -> c -> d` pass -- `d` is reached twice but is never grey on
  a path back to itself. Running the search from every white node covers pipelines
  split into independent groups.
common_mistakes:
  - Using a single visited set, which cannot tell a finished node from one still on the active path and reports false cycles on diamonds.
  - Marking a node black as soon as it is first seen instead of when its recursion returns.
  - Only searching from one start node, missing a cycle that lives in a separate component.
