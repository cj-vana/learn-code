      # Return True if a directed cycle exists.
      return False
function_name: has_deadlock
input_mode: function
solution_sketch: Depth-first search colouring each node white, grey while on the active path, black when finished; reaching a grey node closes a directed cycle.
sample_solution: |
  def has_deadlock(data):
      nodes = data["nodes"]
      edges = data["edges"]
      adjacency = {node: [] for node in nodes}
      for source, target in edges:
          adjacency[source].append(target)

      WHITE, GREY, BLACK = 0, 1, 2
      colour = {node: WHITE for node in nodes}

      def visit(stage):
          colour[stage] = GREY
          for nxt in adjacency[stage]:
              if colour[nxt] == GREY:
                  return True
              if colour[nxt] == WHITE and visit(nxt):
                  return True
          colour[stage] = BLACK
          return False

      for node in nodes:
          if colour[node] == WHITE and visit(node):
              return True
      return False
hints:
  - level: 1
    text: In a directed graph the undirected parent trick fails; you must know whether a node is still on the path you are currently exploring.
  - level: 2
