prompt_markdown: |
  A studio's render pipeline is a set of stages where some stages feed their
  output into others. A directed link `[a, b]` means stage `a` must finish before
  stage `b` can start. If those dependencies ever form a directed loop, no stage
  can go first and the pipeline deadlocks.

  You are given `data` with `nodes` (every stage id) and `edges` (a list of
  `[a, b]` directed links). Write `has_deadlock(data)` that returns `True` if the
  dependencies contain a directed cycle, and `False` otherwise. A stage that
  depends on itself is a cycle of one.
starter_code: |
