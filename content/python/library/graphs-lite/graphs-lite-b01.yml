function_name: course_order
input_mode: function
solution_sketch: >-
  Turn the prerequisite map into indegrees (each craft's count of prerequisites)
  and a forward adjacency map (prerequisite -> crafts that need it), then run
  Kahn's algorithm with a min-heap of eligible crafts so ties resolve
  alphabetically; if fewer crafts come out than went in, a cycle exists.
sample_solution: |
  import heapq


  def course_order(catalog):
      indegree = {craft: len(prereqs) for craft, prereqs in catalog.items()}
      unlocks = {craft: [] for craft in catalog}
      for craft, prereqs in catalog.items():
          for needed in prereqs:
              unlocks[needed].append(craft)

      ready = [craft for craft in catalog if indegree[craft] == 0]
      heapq.heapify(ready)
      order = []
      while ready:
          craft = heapq.heappop(ready)
          order.append(craft)
          for nxt in unlocks[craft]:
              indegree[nxt] -= 1
              if indegree[nxt] == 0:
                  heapq.heappush(ready, nxt)

      if len(order) != len(catalog):
          return []
      return order
hints:
  - level: 1
    text: The map points from a craft to what it needs. To decide what is teachable, you want the reverse -- for each craft, how many prerequisites it still has (its indegree) and which crafts each prerequisite unlocks.
  - level: 2
    text: A craft is eligible when its indegree hits zero. Teaching a craft lowers the indegree of every craft it unlocks by one. Keep the eligible crafts in a min-heap so you always pull the alphabetically smallest.
  - level: 3
    text: After the loop, compare the length of your output to the number of crafts. If some crafts never became eligible, they were trapped in a cycle, so return []. Otherwise return the order you built.
