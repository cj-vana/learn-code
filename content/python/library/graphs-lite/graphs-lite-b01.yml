prompt_markdown: |
  A blacksmith guild trains apprentices through a ladder of crafts. Before an
  apprentice may attempt a craft, they must already have mastered every craft it
  builds on. The guild hands you its curriculum as a dictionary that maps each
  craft to the list of crafts that must be finished **first**:

  ```
  {"temper": ["forge"], "forge": [], "hilt": ["temper"]}
  ```

  Here `forge` has no prerequisites, `temper` requires `forge`, and `hilt`
  requires `temper`. Every craft named anywhere is guaranteed to appear as a key
  (a craft with no prerequisites maps to an empty list).

  Write `course_order(catalog)` that returns a single list containing every craft
  in an order where each craft appears only after all of its prerequisites. When
  more than one craft is eligible at the same moment, the guild always teaches the
  **alphabetically smallest** one next, so the ordering is fully determined. If the
  prerequisites contradict each other so that no complete order exists (a cycle),
  return an empty list.

  Notes on the cases the tests cover:

  - A curriculum with no prerequisites at all returns every craft in alphabetical
    order.
  - A two-craft cycle, and a cycle that also has an unrelated standalone craft,
    both return `[]`.
  - The alphabetical rule can force a craft that is alphabetically early to wait,
    because one of its prerequisites has not been taught yet.
