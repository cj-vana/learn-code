      input: {"prep": [], "loop_a": ["loop_b"], "loop_b": ["loop_a"], "finish": ["prep"]}
      expected: []
explanation_markdown: |
  The curriculum is a directed graph, but it arrives pointing the "wrong" way:
  each craft lists what it depends on. The first move is to convert that into two
  structures. The **indegree** of a craft is simply the length of its
  prerequisite list -- how many crafts still block it. The **unlocks** map is the
  reversed adjacency: for every `craft -> [prereqs]` entry you append `craft` to
  each prerequisite's unlock list, so you know who becomes closer to eligible once
  a prerequisite is taught.

  With those in hand this is Kahn's algorithm. Every craft with indegree zero is
  eligible immediately; keeping the eligible set in a **min-heap** guarantees you
  always emit the alphabetically smallest, which is what makes the answer unique.
  Teaching a craft satisfies one prerequisite for each craft it unlocks, so you
  decrement those indegrees and push any that reach zero.

  The cycle check falls out for free. If a group of crafts all depend on each
  other, none of them ever reaches indegree zero, so none is ever emitted. When
  the loop ends, the output is shorter than the catalog, and that length mismatch
  is your signal to return `[]`. In `early_name_must_wait`, notice `alpha` is
  alphabetically first yet comes last, because it cannot be taught until `gamma`
  releases it.
common_mistakes:
  - Treating the prerequisite list as outgoing edges and never reversing it, which computes the ordering backwards.
  - Using a plain queue or list instead of a heap, producing a valid order that ignores the alphabetical tie-break rule.
  - Forgetting the cycle case and returning a partial ordering instead of an empty list when some crafts never become eligible.
