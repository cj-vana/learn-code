      expected: [a, b, c, d]
    - name: longer_diamond
      input: {"adj": {"a": [b, c], "b": [a, d], "c": [a, d], "d": [b, c, e], "e": [d]}, "start": a, "goal": e}
      expected: [a, b, d, e]
explanation_markdown: |
  The trick is to carry the path, not just the frontier node, through the queue.
  BFS still visits nodes in increasing distance order, so the first time a path
  reaches the goal it is guaranteed to be shortest. Sorting the neighbours before
  enqueueing makes the tie-break deterministic: among equally short routes, the
  alphabetically smaller next station is always explored first, so it is the one
  recorded in `seen` and returned. Marking `seen` at enqueue time is essential --
  it locks in the first (best) path to each station and stops longer detours like
  the `a -> z` branch from ever mattering. Carrying full paths costs more memory
  than storing parent pointers, but it is the clearest way to see the idea.
common_mistakes:
  - Returning the hop count instead of the list of stations.
  - Expanding neighbours in unsorted order, so the tie-break becomes unpredictable.
  - Marking a station seen only at dequeue, which lets a longer path overwrite the shortest one.
