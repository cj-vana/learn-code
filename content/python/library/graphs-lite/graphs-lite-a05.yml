prompt_markdown: |
  Counting hops is not enough for a passenger -- they need the actual list of
  stations to ride through. Extend breadth-first search so it returns the route
  itself.

  You are given `data` with `adj` (an adjacency dictionary), `start`, and `goal`.
  Write `shortest_route(data)` returning a list of stations, beginning with
  `start` and ending with `goal`, that forms a shortest path. When two shortest
  routes tie, choose the one that is alphabetically smaller by always expanding
  neighbours in sorted order. Return `[start]` when start equals goal, and `[]`
  when the goal is unreachable.
