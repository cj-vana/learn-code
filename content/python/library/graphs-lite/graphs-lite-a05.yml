function_name: shortest_route
input_mode: function
solution_sketch: Run BFS where each queue entry is the whole path so far, expanding neighbours in sorted order and returning the first path that reaches the goal.
sample_solution: |
  from collections import deque


  def shortest_route(data):
      adjacency = data["adj"]
      start = data["start"]
      goal = data["goal"]
      if start == goal:
          return [start]
      seen = {start}
      queue = deque([[start]])
      while queue:
          path = queue.popleft()
          station = path[-1]
          for neighbour in sorted(adjacency.get(station, [])):
              if neighbour in seen:
                  continue
              extended = path + [neighbour]
              if neighbour == goal:
                  return extended
              seen.add(neighbour)
              queue.append(extended)
      return []
hints:
  - level: 1
    text: Instead of storing just a station in the queue, store the whole path taken to reach it.
  - level: 2
    text: Because BFS dequeues shorter paths before longer ones, the first path that reaches the goal is a shortest one.
  - level: 3
    text: Expand neighbours with sorted() so ties break alphabetically, and mark a station seen when you enqueue its path so you keep the earliest (shortest, smallest) route to it.
