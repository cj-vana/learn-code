prompt_markdown: |
  A facilities team maps a warehouse roof as a grid. A cell holds `1` if a solar
  panel sits there and `0` if the spot is bare. Panels that touch edge-to-edge
  (up, down, left, or right) are wired together into a single *array*. Panels that
  only touch at a diagonal corner are **not** in the same array.

  Write `count_arrays(grid)` where `grid` is a list of rows, each a list of `0`s
  and `1`s. Return the number of separate arrays. An empty grid has zero arrays.
