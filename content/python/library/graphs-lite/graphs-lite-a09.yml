explanation_markdown: |
  A grid is a graph in disguise: each cell is a node, and the edges are the
  up/down/left/right adjacencies. Counting arrays is therefore identical to
  counting connected components -- you scan for a panel the traversal has not yet
  reached, count it as a new array, and flood-fill to swallow the rest of that
  component so you never count it twice. The `seen` set doubles as both the
  visited marker and the guard that keeps the flood-fill from walking off already
  claimed cells. The only grid-specific care is the neighbour rule: offering just
  the four orthogonal moves (and not the diagonals) is what makes `four_corners`
  count as four separate arrays rather than one.
common_mistakes:
  - Including diagonal neighbours, which merges arrays that should stay separate.
  - Forgetting the bounds check, so a neighbour index runs off the edge of the grid.
  - Marking a cell seen only when it is popped, allowing it to be pushed by several neighbours and counted twice.
