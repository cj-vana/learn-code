      return 0
function_name: count_arrays
input_mode: function
solution_sketch: Treat each panel cell as a graph node linked to its four orthogonal neighbours; flood-fill from every unvisited panel and count how many flood-fills you start.
sample_solution: |
  def count_arrays(grid):
      if not grid or not grid[0]:
          return 0
      rows = len(grid)
      cols = len(grid[0])
      seen = set()
      arrays = 0
      for r in range(rows):
          for c in range(cols):
              if grid[r][c] == 1 and (r, c) not in seen:
                  arrays += 1
                  stack = [(r, c)]
                  seen.add((r, c))
                  while stack:
                      cr, cc = stack.pop()
                      for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
                          nr, nc = cr + dr, cc + dc
                          if (0 <= nr < rows and 0 <= nc < cols
                                  and grid[nr][nc] == 1
                                  and (nr, nc) not in seen):
                              seen.add((nr, nc))
                              stack.append((nr, nc))
      return arrays
hints:
  - level: 1
    text: Each panel is a node; its neighbours are the panels directly above, below, left, and right of it -- never the diagonals.
  - level: 2
    text: Scan every cell; the first time you land on a panel you have not marked, you have discovered a new array, so flood-fill outward to mark the rest of it.
  - level: 3
    text: Count one new array per unvisited panel found in the scan, then run a stack-based flood-fill that marks every four-connected panel before continuing the scan.
