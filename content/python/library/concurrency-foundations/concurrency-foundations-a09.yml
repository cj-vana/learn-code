prompt_markdown: |
  A dock-master keeps losing contact with a weather buoy. Rather than hammering it,
  the retry logic waits longer between each attempt — capped exponential backoff.
  You compute the whole delay schedule up front as pure numbers; nothing actually
  sleeps.

  Write `retry_with_backoff_schedule(payload)`. The single argument is a dict:

  - `payload["attempts"]`: a non-negative integer, how many delays to produce.
  - `payload["base_delay"]`: a non-negative integer, the first delay in milliseconds.
  - `payload["factor"]`: a positive integer the delay is multiplied by each step.
  - `payload["max_delay"]`: an integer ceiling; no delay may exceed it.

  Return a list of `attempts` integers. The delay before attempt `i` (starting at
  `i = 0`) is `base_delay * factor ** i`, then clamped so it never exceeds
  `max_delay`. If `attempts` is 0, return `[]`.

  Example: `{"attempts": 5, "base_delay": 100, "factor": 2, "max_delay": 1000}`
  returns `[100, 200, 400, 800, 1000]` — the raw fifth value would be 1600, so it
  is capped to 1000.
