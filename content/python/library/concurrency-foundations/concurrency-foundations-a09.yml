explanation_markdown: |
  Exponential backoff spreads retries apart so a struggling peer gets room to
  recover instead of a flood of immediate retries. Each step multiplies by `factor`,
  and the `min(raw, max_delay)` clamp keeps the wait from growing without bound —
  once the raw value passes the ceiling, every later delay sits at the ceiling.
  Computing the schedule as a pure list separates the policy (how long to wait) from
  the mechanism (actually sleeping), which is exactly what makes retry logic
  testable: real code would feed these numbers to a timer, but the numbers
  themselves are deterministic. Real systems usually add random jitter on top; that
  is omitted here precisely because it would break reproducibility.
common_mistakes:
  - Clamping with max() instead of min(), which raises delays up to the ceiling rather than capping them.
  - Multiplying the previous delay by factor after it was already clamped, so the growth restarts from the capped value instead of the true exponential.
  - Using range(1, attempts) or otherwise starting the exponent at 1, shifting every delay one step too high.
