prompt_markdown: |
  A print shop has one big run of posters and several presses. Before starting, a
  supervisor splits the run into balanced batches — one contiguous batch per press —
  so no press sits far ahead of the others. This is the partition step you would run
  before handing chunks to worker processes.

  Write `chunk_work_for_processes(payload)`. The single argument is a dict:

  - `payload["items"]`: the list of work items, in order.
  - `payload["num_workers"]`: a positive integer, the number of presses.

  Return a list of exactly `num_workers` sublists that, concatenated left to right,
  reproduce `items` in the original order. Balance the sizes so any two batches
  differ by at most one item, and give the larger batches to the earlier workers.

  Concretely, with `n = len(items)`, let `base = n // num_workers` and `rem = n %
  num_workers`. The first `rem` workers each get `base + 1` items; the rest get
  `base`. When there are more workers than items, the trailing workers get empty
  lists. An empty `items` yields `num_workers` empty lists.

  Example: `{"items": [1, 2, 3, 4, 5, 6, 7], "num_workers": 3}` returns
  `[[1, 2, 3], [4, 5], [6, 7]]`.
starter_code: |
