explanation_markdown: |
  Balanced partitioning is the setup half of a map/reduce: split once, hand each
  chunk to a worker, then combine. Giving the `rem` leftover items to the earliest
  workers is what keeps every batch within one of the others — the alternative,
  dumping the remainder on the last worker, leaves it lopsided. Looping over
  `range(num_workers)` rather than over the items guarantees the output shape is
  always `num_workers` lists, which matters downstream: a pool expects one chunk per
  worker even if some chunks are empty. Slicing keeps the items contiguous and in
  order, so results can later be stitched back together without resorting.
common_mistakes:
  - Giving the remainder items all to the last worker, producing one oversized chunk instead of a balanced split.
  - Iterating over the items instead of over the workers, so you emit the wrong number of sublists when workers outnumber items.
  - Forgetting to advance the running start index by the chunk size, so slices overlap or repeat items.
