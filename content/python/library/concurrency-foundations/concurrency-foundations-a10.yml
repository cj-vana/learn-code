function_name: chunk_work_for_processes
input_mode: function
solution_sketch: Use divmod(len(items), num_workers) to get base size and remainder; for each worker slice off base+1 items while remainder remains, else base, advancing a running start index.
sample_solution: |
  def chunk_work_for_processes(payload):
      items = list(payload["items"])
      num_workers = payload["num_workers"]
      base, rem = divmod(len(items), num_workers)
      chunks = []
      start = 0
      for worker in range(num_workers):
          size = base + (1 if worker < rem else 0)
          chunks.append(items[start:start + size])
          start += size
      return chunks
hints:
  - level: 1
    text: divmod(len(items), num_workers) gives you the base chunk size and how many chunks need one extra item.
  - level: 2
    text: The first rem workers get base + 1 items and the rest get base; keep a running start index and slice items[start:start + size] for each worker.
  - level: 3
    text: Loop worker in range(num_workers) so you always produce exactly num_workers sublists, even when some end up empty because there are more workers than items.
