  public:
    - name: single_thread
      input:
        threads:
          - [a, b, c]
        quantum: 2
      expected: ["T0:a", "T0:b", "T0:c"]
    - name: two_even_quantum1
      input:
        threads:
          - [a, b]
          - [x, y]
        quantum: 1
      expected: ["T0:a", "T1:x", "T0:b", "T1:y"]
    - name: empty
