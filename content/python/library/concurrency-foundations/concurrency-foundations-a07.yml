solution_sketch: Track a cursor per program. Repeatedly run up to quantum ops from the current program, then scan forward (wrapping) for the next program that still has ops; stop when none remain.
sample_solution: |
  def simulate_interleaving(payload):
      threads = [list(program) for program in payload["threads"]]
      quantum = payload["quantum"]
      n = len(threads)
      if n == 0:
          return []
      cursor = [0] * n

      def next_ready(start):
          for step in range(n):
              j = (start + step) % n
              if cursor[j] < len(threads[j]):
                  return j
          return -1

      result = []
      current = next_ready(0)
      while current != -1:
          taken = 0
          while taken < quantum and cursor[current] < len(threads[current]):
              op = threads[current][cursor[current]]
              result.append(f"T{current}:{op}")
              cursor[current] += 1
              taken += 1
          current = next_ready((current + 1) % n)
      return result
hints:
  - level: 1
    text: Keep a per-program cursor (index of the next operation to run) rather than mutating the program lists, so you always know where each program left off.
  - level: 2
    text: One outer step runs up to quantum operations from the current program; then you must find the next program to schedule by scanning indices forward from current+1 and wrapping with modulo.
  - level: 3
    text: A helper next_ready(start) that checks (start+step) % n for step in range(n) returns the next program whose cursor is still inside its list, or -1 when all are exhausted. Loop the whole thing while it is not -1.
