    - name: uneven_quantum2
      input:
        threads:
          - [a, b, c]
          - [x, y]
        quantum: 2
      expected: ["T0:a", "T0:b", "T1:x", "T1:y", "T0:c"]
    - name: three_threads
      input:
        threads:
          - [a]
          - [b, c]
          - [d]
        quantum: 1
      expected: ["T0:a", "T1:b", "T2:d", "T1:c"]
    - name: empty_thread_skipped
      input:
        threads:
          - []
          - [p, q]
          - []
        quantum: 5
      expected: ["T1:p", "T1:q"]
    - name: large_quantum
      input:
        threads:
          - [a, b]
          - [x]
        quantum: 10
      expected: ["T0:a", "T0:b", "T1:x"]
explanation_markdown: |
  This is cooperative round-robin scheduling, the same shape as a preemptive
  runtime that lets each task run for a fixed slice before switching. The quantum
  is the slice: run at most that many operations, then yield. The wrap-around scan
  is the fairness rule — control always moves forward and cycles, so no ready
  program is starved. Storing a cursor per program (instead of popping from the
  lists) is what lets a program resume exactly where it paused. Because the rule is
  fully specified and there is no real timing, the interleave is identical on every
  run, which is exactly the property that makes concurrent logic testable.
common_mistakes:
  - Restarting a program from its first operation each turn instead of resuming from a saved cursor.
  - Forgetting to wrap the search with modulo, so the last program never hands control back to earlier ones with work left.
  - Advancing past the quantum even when the current program still has operations, or running the whole program in one turn and ignoring the quantum entirely.
