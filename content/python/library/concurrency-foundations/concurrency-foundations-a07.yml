prompt_markdown: |
  A mountaintop observatory lets several observation programs share one telescope.
  A scheduler runs them in a fixed round-robin so the night is deterministic: no
  real threads, no timers, just a repeatable interleave you can reason about.

  Write `simulate_interleaving(payload)`. The single argument is a dict:

  - `payload["threads"]`: a list of programs. Each program is a list of operation
    labels (strings) that must run in the given order.
  - `payload["quantum"]`: a positive integer, the number of operations a program
    is allowed to run before the scheduler moves on to give the next program a turn.

  Run the scheduler like this and return the flat list of executed operations:

  - Start with program index 0. Run up to `quantum` of its remaining operations
    (fewer if it has fewer left). Each executed operation is recorded as the string
    `"T{i}:{op}"`, where `i` is the program's index and `op` is the label — for
    example program 0 running label `a` records `"T0:a"`.
  - After the current program takes its turn, hand control to the next program
    (searching forward by index and wrapping around past the last program back to 0)
    that still has operations left. That may be the same program again if it is the
    only one with work remaining.
  - Continue until every program is exhausted, then return the recorded list.

  Programs that are empty from the start are simply skipped. If `threads` is empty,
  return `[]`. A program keeps its remaining operations between turns — a turn never
  restarts a program from its first operation.

  Example: `{"threads": [["a", "b", "c"], ["x", "y"]], "quantum": 2}` returns
  `["T0:a", "T0:b", "T1:x", "T1:y", "T0:c"]`.
