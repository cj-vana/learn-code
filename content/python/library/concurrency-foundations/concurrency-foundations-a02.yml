explanation_markdown: |
  Deadlock detection reduces to cycle detection in a directed graph, and that is
  precisely how real tooling reasons about lock ordering. The graph you build is
  the *acquired-before* (or wait-for) graph: an edge `a -> b` records that some
  crew commits to grabbing `b` while already holding `a`. If those commitments
  ever form a loop, there is an ordering under which every crew is stuck holding
  one key and waiting on the next — a deadlock.

  Consecutive pairs are enough to capture the constraint because acquisition
  order is transitive along a crew's list: a crew that grabs 1, then 2, then 3
  contributes `1 -> 2` and `2 -> 3`, and the path `1 -> 3` follows for free. So
  an inversion between non-adjacent keys still surfaces as a cycle through the
  chain.

  The three-colour DFS distinguishes a *back edge* (reaching a grey ancestor
  still on the current path, which proves a cycle) from a *cross edge* (reaching
  an already-finished black node, which is harmless). The iterative stack keeps
  the search safe even on long chains where deep recursion could otherwise be a
  concern. The real-world fix this models is imposing one global lock order so
  the graph stays acyclic by construction.
common_mistakes:
  - Adding an edge between every pair of keys in a crew rather than only
    consecutive ones is still correct, but adding edges in the wrong direction
    (later -> earlier) inverts the whole graph and flips the answer.
  - Treating any repeated key across crews as a cycle; a shared key is only a
    problem when the acquisition orders actually conflict.
  - Using a simple visited set instead of grey/black colours, which cannot tell
    a back edge from a harmless cross edge and reports false cycles.
