function_name: has_deadlock_risk
input_mode: function
solution_sketch: >-
  Build an adjacency dict, adding edge a->b for every consecutive pair (a, b) in
  each crew's list and ensuring every key is a node. Then run a three-colour DFS
  (white/grey/black): a grey node reached again means a back edge, hence a cycle.
  Return True on the first cycle found, else False.
sample_solution: |
  def has_deadlock_risk(crews):
      graph = {}
      for sequence in crews:
          for earlier, later in zip(sequence, sequence[1:]):
              graph.setdefault(earlier, set()).add(later)
              graph.setdefault(later, set())

      WHITE, GREY, BLACK = 0, 1, 2
      color = {node: WHITE for node in graph}

      def has_cycle_from(start):
          stack = [(start, iter(graph[start]))]
          color[start] = GREY
          while stack:
              node, neighbors = stack[-1]
              advanced = False
              for neighbor in neighbors:
                  if color[neighbor] == GREY:
                      return True
                  if color[neighbor] == WHITE:
                      color[neighbor] = GREY
                      stack.append((neighbor, iter(graph[neighbor])))
                      advanced = True
                      break
              if not advanced:
                  color[node] = BLACK
                  stack.pop()
          return False

      for node in graph:
          if color[node] == WHITE and has_cycle_from(node):
              return True
      return False
