prompt_markdown: |
  A canal has several drawbridges, each opened with its own numbered key. A
  bridge crew must hold every key it has picked up until its boat has passed,
  and it always picks keys up one at a time in a fixed personal order. Deadlock
  becomes possible the moment two crews disagree about the order: if crew A
  grabs key 1 then key 2, while crew B grabs key 2 then key 1, each can end up
  holding one key and waiting forever for the other. The classic defence is a
  single global key order that everyone obeys.

  You are given the crews' acquisition orders and must report whether a deadlock
  is *possible*. Build the "acquired-before" graph: whenever any crew picks up
  key `a` and then immediately picks up key `b` next, that is a directed edge
  `a -> b`. A deadlock is possible exactly when this graph contains a cycle
  (some set of keys where the orders chase each other in a loop).

  Write `has_deadlock_risk(crews)`. The single argument `crews` is a list of
  lists; each inner list is one crew's key-acquisition order, front to back. Keys
  may be integers or strings, and a given key appears at most once within a
  single crew's list. Return `True` if the acquired-before graph has a cycle and
  `False` otherwise.

  Edge cases you must handle: an empty `crews` list has no edges and returns
  `False`; a single crew's list can never form a cycle on its own and returns
  `False`; keys that appear in one crew but never conflict with another must not
  produce a false positive.
