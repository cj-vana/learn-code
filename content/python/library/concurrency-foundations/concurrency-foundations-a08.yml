prompt_markdown: |
  A harbor control room profiles each background job before dispatching it, then
  picks the right concurrency tool. The decision comes from how the job spends its
  busy time: waiting on I/O, or burning CPU.

  Write `is_io_bound_or_cpu_bound(payload)`. The single argument is a dict with two
  non-negative integers:

  - `payload["cpu_ms"]`: milliseconds spent computing.
  - `payload["io_wait_ms"]`: milliseconds spent waiting on I/O.

  Let `total = cpu_ms + io_wait_ms`. Classify and return a dict `{"profile": ...,
  "recommended": ...}` using these exact rules, checked in order:

  - If `total == 0`, the job is idle: profile `"idle"`, recommended `"none"`.
  - If I/O wait is at least 70% of total — that is, `io_wait_ms * 10 >= 7 * total`
    — profile `"io_bound"`, recommended `"asyncio"`.
  - Else if I/O wait is at most 30% of total — that is, `io_wait_ms * 10 <= 3 *
    total` — profile `"cpu_bound"`, recommended `"multiprocessing"`.
  - Otherwise profile `"mixed"`, recommended `"threading"`.

  Compare with the integer form shown (multiply through by 10) rather than dividing
  into a float, so boundary cases like exactly 70% or 30% land on the intended side.

  Example: `{"cpu_ms": 20, "io_wait_ms": 180}` returns
  `{"profile": "io_bound", "recommended": "asyncio"}`.
