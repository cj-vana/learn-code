explanation_markdown: |
  This encodes the classic concurrency decision framework: I/O-bound work spends
  most of its time waiting, so an event loop (`asyncio`) can overlap many waits on
  one thread; CPU-bound work is limited by the GIL, so `multiprocessing` spreads it
  across cores; genuinely mixed work often does fine with a thread pool. The reason
  the rule is written with integer multiplication is precision: `io_wait_ms / total`
  produces a float, and comparing a float to `0.7` can flip a boundary case the
  wrong way. Rewriting `x/total >= 0.7` as `x*10 >= 7*total` keeps every comparison
  exact, which is why 70% and 30% land deterministically.
common_mistakes:
  - Dividing into a float and comparing to 0.7 or 0.3, so an exact-boundary input classifies the wrong way.
  - Computing the ratio before checking total, which raises ZeroDivisionError on an idle job.
  - Using strict inequalities that leave the exact 70% or 30% cases falling through into mixed.
