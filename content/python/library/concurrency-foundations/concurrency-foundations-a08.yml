solution_sketch: Compute total; branch idle first, then compare io_wait_ms*10 against 7*total and 3*total to pick io_bound/cpu_bound/mixed, mapping each profile to its recommended tool.
sample_solution: |
  def is_io_bound_or_cpu_bound(payload):
      cpu_ms = payload["cpu_ms"]
      io_wait_ms = payload["io_wait_ms"]
      total = cpu_ms + io_wait_ms
      if total == 0:
          return {"profile": "idle", "recommended": "none"}
      if io_wait_ms * 10 >= 7 * total:
          return {"profile": "io_bound", "recommended": "asyncio"}
      if io_wait_ms * 10 <= 3 * total:
          return {"profile": "cpu_bound", "recommended": "multiprocessing"}
      return {"profile": "mixed", "recommended": "threading"}
