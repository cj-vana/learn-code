explanation_markdown: |
  This is a cooperative scheduler in miniature, the same shape as an event loop
  draining its ready queue. Two independent questions drive it: *which jobs are
  eligible* (they have arrived) and *which eligible job is most urgent* (lowest
  priority number). Conflating the two is the classic bug — an unarrived job must
  never be scheduled, even if it would be the most urgent choice once it shows
  up.

  A min-heap is the right tool for "most urgent ready job" because each push and
  pop is O(log n), so the whole schedule costs O(n log n) rather than the O(n^2)
  of rescanning every job at every tick. The composite key
  `(priority, arrival, index)` makes the ordering total and deterministic:
  priority first, then earlier arrival, then original input position, so there is
  never a coin-flip between equally urgent jobs.

  The idle jump in step 3 is what keeps the clock honest. If nothing is ready,
  advancing one tick at a time would still be correct but pointless; snapping the
  clock straight to the next arrival models a telescope that simply waits until
  its next job is warm. The observable result — the run order — is identical
  either way, which is why a deterministic simulation like this faithfully
  captures real scheduling logic without any real concurrency.
common_mistakes:
  - Picking the globally most urgent job regardless of arrival, letting a job run
    before its arrival tick.
  - Sorting all jobs once by priority up front, which ignores that later
    arrivals can change what is ready at each step.
  - Omitting the input index from the heap key, so jobs with equal priority and
    arrival come out in heap-implementation order instead of input order.
