solution_sketch: >-
  Order jobs by (arrival, index) for release. Keep a min-heap of ready jobs keyed
  (priority, arrival, index). Each step, release everything arrived by the clock;
  if the heap is empty jump the clock to the next arrival; otherwise pop the best
  ready job, append its name, and advance the clock one tick.
sample_solution: |
  import heapq


  def schedule_tasks(tasks):
      pending = sorted(
          range(len(tasks)),
          key=lambda i: (tasks[i]["arrival"], i),
      )
      ready = []
      order = []
      clock = 0
      cursor = 0
      total = len(tasks)
      while len(order) < total:
          while cursor < len(pending) and tasks[pending[cursor]]["arrival"] <= clock:
              idx = pending[cursor]
              job = tasks[idx]
              heapq.heappush(ready, (job["priority"], job["arrival"], idx, job["name"]))
              cursor += 1
          if not ready:
              clock = tasks[pending[cursor]]["arrival"]
              continue
          _, _, _, name = heapq.heappop(ready)
          order.append(name)
          clock += 1
      return order
hints:
  - level: 1
    text: >-
      Two things change over time: which jobs have arrived, and which is most
      urgent among them. A min-heap keyed by priority handles the second; a clock
      handles the first.
  - level: 2
    text: >-
      Before each pick, push every job whose arrival is at or before the clock
      into the ready heap. Only jobs already in the heap are eligible to run.
  - level: 3
    text: >-
      Key the heap as `(priority, arrival, index, name)` so ties fall back to
      arrival then input order. When the heap is empty but jobs remain, set the
      clock to the next unreleased job's arrival instead of advancing by one.
