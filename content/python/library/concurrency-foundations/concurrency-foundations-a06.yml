prompt_markdown: |
  A robotic telescope runs one exposure job at a time from a *ready queue*, just
  like a cooperative event loop draining its ready tasks. A job cannot run before
  its instrument has warmed up, so each job becomes ready only at its arrival
  tick. Whenever the telescope is free, it picks the most urgent job that is
  ready right now — never a job that has not arrived yet, no matter how urgent.

  Write `schedule_tasks(tasks)`. The single argument `tasks` is a list of dicts,
  each with:

  - `"name"`: a unique string naming the job.
  - `"priority"`: an integer where a *smaller* number means more urgent.
  - `"arrival"`: an integer tick at or after which the job may run.

  Simulate the schedule with a clock starting at tick `0`. Running a job takes
  exactly one tick. At each step:

  1. A job is *ready* if its arrival tick is at or before the current clock and
     it has not run yet.
  2. If at least one job is ready, run the ready job with the smallest
     `"priority"`. Break ties by earlier `"arrival"`, then by earlier position
     in the input list. Advance the clock by one tick.
  3. If no job is ready but jobs remain, jump the clock forward to the earliest
     arrival tick among the remaining jobs (the telescope idles), then continue.

  Return the list of job `"name"`s in the order they run.

  Edge cases you must handle: an empty `tasks` list returns `[]`; a more urgent
  job that arrives later must still wait if a less urgent job is the only one
  ready; jobs sharing priority and arrival run in input order.
