explanation_markdown: |
  `contextvars` exists so that concurrent tasks can each read and write their own
  copy of some ambient state — a request id, a locale, a database transaction —
  without stepping on one another. The mechanism is `copy_context()`: it takes a
  snapshot of the current context, and any `ContextVar.set()` performed while
  running inside that snapshot is visible only there. When the task finishes, the
  original context is exactly as it was.

  This drill models that guarantee with plain dicts. The single decisive move is
  copying before mutating: `dict(defaults)` gives each task an independent
  snapshot, so `snapshot.update(...)` cannot reach back into the shared baseline
  or bleed into a sibling task. Returning `defaults_after` makes the invariant
  checkable — if you had mutated the defaults in place, it would come back
  changed and the test would catch it.

  The subtle bug the copy prevents is aliasing: `snapshot = defaults` (no
  `dict(...)`) binds the same object, so every task would share and overwrite one
  dict, and the "isolation" would be a fiction. That is the pure-Python echo of
  forgetting to run each task in its own copied context.
common_mistakes:
  - Writing `snapshot = defaults` instead of `snapshot = dict(defaults)`, which
    aliases the shared dict so every task mutates the same object.
  - Applying overrides directly onto `setup["defaults"]`, corrupting the baseline
    and every later task's view.
  - Returning the live `defaults` object as `"defaults_after"` after it was
    mutated, instead of keeping it untouched throughout.
