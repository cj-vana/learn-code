prompt_markdown: |
  A print shop has a set of default settings — paper size, colour mode, copies —
  that every job starts from. When a job runs, it may tweak some settings just
  for itself, but those tweaks must never leak into another job or change the
  shop's defaults. This is exactly what `contextvars` gives you: each task runs
  against a `copy_context()` snapshot, so a value set inside one task's context
  is invisible to every other task and to the original.

  Write `resolve_task_contexts(setup)`. The single argument `setup` is a dict
  with:

  - `"defaults"`: a dict of setting name to value — the shop's shared baseline.
  - `"tasks"`: a list of dicts, one per job, each with an `"overrides"` dict of
    the settings that job changes for itself.

  For each task, build its resolved view: start from a fresh copy of
  `"defaults"`, then apply that task's `"overrides"` on top (an override
  replaces an existing setting or adds a new one). Tasks are fully isolated —
  one task's overrides must not affect any other task's view.

  Return a dict with:

  - `"views"`: the list of resolved setting dicts, one per task, in task order.
  - `"defaults_after"`: the shop defaults after all tasks have run, which must be
    unchanged from the input `"defaults"`.

  Edge cases you must handle: an empty `"tasks"` list gives an empty `"views"`
  list; an empty `"overrides"` dict yields a view equal to the defaults; an
  empty `"defaults"` dict is valid.
starter_code: |
  def resolve_task_contexts(setup):
      return {}
function_name: resolve_task_contexts
input_mode: function
solution_sketch: >-
  For each task, copy the defaults with dict(defaults), update the copy with the
  task's overrides, and collect the copies. Return the views plus a fresh copy of
  the untouched defaults so callers can confirm no leak occurred.
sample_solution: |
  def resolve_task_contexts(setup):
      defaults = setup["defaults"]
      views = []
      for task in setup["tasks"]:
          snapshot = dict(defaults)
          snapshot.update(task["overrides"])
          views.append(snapshot)
      return {"views": views, "defaults_after": dict(defaults)}
