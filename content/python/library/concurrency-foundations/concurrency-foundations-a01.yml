function_name: run_loading_belt
input_mode: function
solution_sketch: >-
  Keep a FIFO list as the belt. For "get", pop index 0 into delivered when
  non-empty else bump the starved counter; for "put:LABEL", append when
  len(belt) < capacity else record the label in rejected. Return the four
  tallies with the belt itself as "remaining".
sample_solution: |
  def run_loading_belt(job):
      capacity = job["capacity"]
      belt = []
      delivered = []
      rejected = []
      starved = 0
      for op in job["operations"]:
          if op == "get":
              if belt:
                  delivered.append(belt.pop(0))
              else:
                  starved += 1
          else:
              label = op.split(":", 1)[1]
              if len(belt) < capacity:
                  belt.append(label)
              else:
                  rejected.append(label)
      return {
          "delivered": delivered,
          "rejected": rejected,
          "remaining": belt,
          "starved": starved,
      }
hints:
  - level: 1
    text: >-
      A bounded belt is just a list you never let grow past `capacity`. Decide
      per operation whether it is a get or a put by checking the string.
  - level: 2
    text: >-
      For a put, compare `len(belt) < capacity` before appending; otherwise the
      crate belongs in `rejected`. For a get, only pop when the belt is
      non-empty, else increment `starved`.
  - level: 3
    text: >-
      FIFO means the labeller takes `belt.pop(0)` (the front), while the filler
      does `belt.append(label)` (the back). Parse the label with
      `op.split(":", 1)[1]` so labels containing colons stay intact.
