prompt_markdown: |
  A sardine cannery runs a single conveyor belt between the filling machine
  (the producer) and the labelling station (the consumer). The belt holds at
  most `capacity` crates at once and is strictly first-in-first-out. Because the
  two machines never block and wait for each other, a crate that arrives at a
  full belt is simply turned away, and a labelling grab at an empty belt comes
  up with nothing. This is exactly how a bounded `queue.Queue(maxsize)` behaves
  when you use `put_nowait` / `get_nowait` instead of the blocking calls.

  Write `run_loading_belt(job)`. The single argument `job` is a dict with:

  - `"capacity"`: a non-negative integer, the maximum number of crates the belt
    can hold at one time.
  - `"operations"`: a list of strings processed left to right. Each string is
    either the exact text `"get"` (the labeller tries to take the front crate)
    or `"put:LABEL"` (the filler tries to place a crate named `LABEL` onto the
    back of the belt). Split only on the first colon, so `LABEL` is everything
    after `"put:"`.

  Process every operation in order and return a dict with four keys:

  - `"delivered"`: the crate labels successfully taken off the belt, in the
    order they were taken.
  - `"rejected"`: the crate labels turned away because the belt was full when
    their `put` was attempted, in order.
  - `"remaining"`: the labels still on the belt at the end, front to back.
  - `"starved"`: an integer count of `get` operations that found the belt
    empty.

  Edge cases you must handle: a `capacity` of `0` means every `put` is rejected;
  a `get` on an empty belt adds one to `"starved"` and delivers nothing; an
  empty `"operations"` list returns empty lists and a `"starved"` count of `0`.
starter_code: |
