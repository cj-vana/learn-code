explanation_markdown: |
  A bounded queue is the backbone of every producer/consumer pipeline, and its
  defining feature is *backpressure*: the belt cannot grow without limit, so
  something has to give when it fills. The non-blocking model here mirrors
  `queue.Queue(maxsize).put_nowait()`, which raises `queue.Full` rather than
  waiting, and `get_nowait()`, which raises `queue.Empty`. Here we record those
  conditions as `rejected` crates and `starved` grabs instead of raising.

  The FIFO discipline matters: `belt.pop(0)` removes the oldest crate while
  `belt.append(label)` adds to the back, so crates leave in the same order they
  entered. Each operation is O(1) except `pop(0)`, which is O(n) on a list; a
  real system would use `collections.deque` for O(1) removal from both ends, but
  the observable behaviour is identical.

  The `capacity == 0` case is the clean edge: the guard `len(belt) < capacity`
  is `0 < 0`, which is always false, so every crate is turned away and the belt
  stays empty for the whole run.
common_mistakes:
  - Using `belt.pop()` (the back) instead of `belt.pop(0)` (the front), which
    turns the FIFO belt into a LIFO stack and reverses delivery order.
  - Appending on a put without first checking `len(belt) < capacity`, so the
    belt overflows past capacity instead of rejecting crates.
  - Splitting the label with `op.split(":")` and taking index 1, which drops
    part of any label that itself contains a colon; use `split(":", 1)`.
