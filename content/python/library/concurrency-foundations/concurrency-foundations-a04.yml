explanation_markdown: |
  This is the generator-as-coroutine pattern that underpins Python's whole async
  story. The line `reading = yield total` does two jobs at once: it *hands out*
  the current tally to whoever resumed the generator, and it *receives* the next
  value sent in. That two-way channel is what `.send()` drives, and it is the
  direct ancestor of `await`, which also suspends a coroutine and later resumes
  it with a value.

  Priming is the step everyone forgets. A freshly created generator is paused
  *before* its first line, so you cannot send it a value yet — there is no
  suspended `yield` waiting to receive one. Calling `next(machine)` runs it up to
  the first `yield total` (handing out the initial `0`, which we discard), and
  only then is it ready to receive sent readings. Sending into an unprimed
  generator raises `TypeError: can't send non-None value to a just-started
  generator`.

  The `"reset"` sentinel shows why a coroutine is more than a function: it holds
  state between sends. The same machine remembers the running total across every
  reading, so the interesting logic lives in how it reacts to each value rather
  than in any single call.
common_mistakes:
  - Forgetting to prime the generator with `next(...)` before the first
    `.send()`, which raises a TypeError.
  - Recording the value that priming yields (the initial 0) as an extra leading
    entry, making the output one longer than `readings`.
  - Writing the coroutine without a `while True` loop, so it yields once and then
    raises StopIteration on the second send.
