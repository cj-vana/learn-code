function_name: run_tally_coroutine
input_mode: function
solution_sketch: >-
  Define an inner generator that loops forever: `value = yield total`, then adds
  the value or resets to 0 on "reset". Prime it with next(), then send each
  reading and append the yielded tally to the output list.
sample_solution: |
  def run_tally_coroutine(readings):
      def weighbridge():
          total = 0
          while True:
              reading = yield total
              if reading == "reset":
                  total = 0
              else:
                  total += reading

      machine = weighbridge()
      next(machine)  # prime: run up to the first yield
      output = []
      for reading in readings:
          output.append(machine.send(reading))
      return output
hints:
  - level: 1
    text: >-
      A generator coroutine has the shape `value = yield current_state` inside a
      `while True` loop. The value you get back is whatever the caller `.send()`s
      in.
  - level: 2
    text: >-
      You must `next(machine)` once before your first `.send()`. Priming runs the
      generator up to its first `yield`; skipping it raises a TypeError on the
      first send.
  - level: 3
    text: >-
      Each `machine.send(reading)` resumes the generator, applies the reading
      (add it, or set the tally to 0 when it equals "reset"), and returns the
      newly yielded tally. Append that return value for every reading.
