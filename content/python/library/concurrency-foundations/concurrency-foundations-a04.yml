prompt_markdown: |
  Before generators became `async def` coroutines, Python people built
  coroutines out of generators and the `.send()` method: you prime the generator
  with `next(...)`, then push values into it, and each push resumes the
  generator at its `yield` and hands you the next yielded value. A harbour
  weighbridge works the same way — it keeps a running tally of the day's catch,
  and every time you send it a reading it tells you the tally so far.

  Write `run_tally_coroutine(readings)` and implement the weighbridge as a
  generator-based coroutine that you drive with `.send()`. The single argument
  `readings` is a list processed left to right; each element is either:

  - an integer weight to add to the running tally, or
  - the exact string `"reset"`, which zeroes the tally.

  The running tally starts at `0`. For each reading, in order, update the tally
  and record the tally *after* applying that reading. Return the list of these
  after-each-reading tallies (so the returned list has the same length as
  `readings`).

  Concretely: sending `10` when the tally is `0` yields `10`; sending `5` next
  yields `15`; sending `"reset"` yields `0`. Edge cases you must handle: an empty
  `readings` list returns `[]`; a leading `"reset"` yields `0`; negative weights
  are valid and simply subtract from the tally.
starter_code: |
  def run_tally_coroutine(readings):
