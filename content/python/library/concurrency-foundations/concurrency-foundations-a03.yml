        results: [1, 2, 3]
        completion_order: ["z", "x", "y"]
    - name: string_values
      input:
        - {label: "p", finishes_at: 3, value: "pear"}
        - {label: "q", finishes_at: 1, value: "quince"}
      expected:
        results: ["pear", "quince"]
        completion_order: ["q", "p"]
    - name: mixed_value_shapes
      input:
        - {label: "a", finishes_at: 4, value: [1, 2]}
        - {label: "b", finishes_at: 2, value: 0}
        - {label: "c", finishes_at: 6, value: [3]}
      expected:
        results: [[1, 2], 0, [3]]
        completion_order: ["b", "a", "c"]
explanation_markdown: |
  `asyncio.gather(*aws)` returns a list whose order matches the order of the
  awaitables you passed in, no matter when each coroutine actually finished. That
  positional guarantee is what lets you write `first, second = await gather(a, b)`
  and trust which is which. The coroutines still run concurrently and complete in
  timer order, but `gather` reassembles their results back into submission
  order for you.

  Separating `"results"` from `"completion_order"` in this drill makes the two
  orderings visible side by side. The `results` half needs no sorting at all —
  it is a straight positional read. The `completion_order` half is the only
  place a sort belongs, and sorting index positions rather than the dicts
  themselves keeps the tie-break stable: when two exposures finish on the same
  tick, the `(finishes_at, i)` key falls back to the submission index `i`, which
  is exactly the deterministic behaviour you want.
common_mistakes:
  - Sorting the `"results"` list by `finishes_at`; `gather` preserves submission
    order, so the results must not be reordered.
  - Sorting the dicts directly on `finishes_at` without a secondary key, which
    leaves same-tick exposures in an unspecified order instead of submission
    order.
  - Confusing the two outputs — returning completion order where results are
    expected, or vice versa.
