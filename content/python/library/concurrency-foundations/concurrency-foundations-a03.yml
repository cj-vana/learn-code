prompt_markdown: |
  An observatory kicks off several sky-survey exposures at once and waits for
  all of them with a single `asyncio.gather(...)` call. New astronomers are
  often surprised by two facts. First, `gather` hands back the results in the
  order you *submitted* the awaitables, never the order they happened to finish.
  Second, the exposures really do finish in whatever order their timers allow.
  This drill has you report both so the distinction is concrete.

  Write `gather_results(awaitables)`. The single argument `awaitables` is a list
  of dicts, one per exposure, each with:

  - `"label"`: a short string naming the exposure.
  - `"finishes_at"`: an integer tick at which the exposure completes.
  - `"value"`: the result the exposure produces (any JSON-style value).

  Return a dict with two keys:

  - `"results"`: the `"value"` of each exposure in the original submission order
    of the list — this is what `gather` itself returns.
  - `"completion_order"`: the exposure `"label"`s sorted by `"finishes_at"`
    ascending, breaking ties by submission order (earlier in the list first).

  Edge cases you must handle: an empty `awaitables` list returns empty lists for
  both keys; when two exposures share a `"finishes_at"`, the one submitted first
  comes first in `"completion_order"`.
starter_code: |
  def gather_results(awaitables):
      return {}
function_name: gather_results
input_mode: function
solution_sketch: >-
  Collect the values in list order for "results". For "completion_order", sort
  the indices by (finishes_at, submission index) and map back to labels. Return
  both in a dict.
sample_solution: |
  def gather_results(awaitables):
      results = [item["value"] for item in awaitables]
      order = sorted(
          range(len(awaitables)),
          key=lambda i: (awaitables[i]["finishes_at"], i),
      )
      completion_order = [awaitables[i]["label"] for i in order]
      return {"results": results, "completion_order": completion_order}
hints:
  - level: 1
    text: >-
      The `"results"` list is the easy half: just pull each `"value"` out in the
      order the exposures appear in the input.
  - level: 2
    text: >-
      For completion order you need a sort, but sorting the dicts directly loses
      the submission tie-break. Sort the indices `0..n-1` instead.
  - level: 3
    text: >-
      Use `sorted(range(len(awaitables)), key=lambda i: (awaitables[i]["finishes_at"], i))`
      so equal finish ticks fall back to the submission index, then map the
      sorted indices to their labels.
