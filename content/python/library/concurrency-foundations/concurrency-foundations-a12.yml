solution_sketch: Walk the results once, appending task names to succeeded or failed, counting error types in a dict, and recording the first failing task; then assemble the summary dict.
sample_solution: |
  def exception_group_summary(results):
      succeeded = []
      failed = []
      errors_by_type = {}
      first_error = None
      for item in results:
          if item["status"] == "ok":
              succeeded.append(item["task"])
          else:
              failed.append(item["task"])
              error_type = item["error_type"]
              errors_by_type[error_type] = errors_by_type.get(error_type, 0) + 1
              if first_error is None:
                  first_error = item["task"]
      return {
          "total": len(results),
          "ok_count": len(succeeded),
          "error_count": len(failed),
          "succeeded": succeeded,
          "failed": failed,
          "errors_by_type": errors_by_type,
          "first_error": first_error,
      }
hints:
  - level: 1
    text: A single left-to-right pass can collect everything — you never need to scan the list more than once.
  - level: 2
    text: Keep separate accumulators as you go — a succeeded list, a failed list, an errors_by_type dict, and a first_error that you set only the first time you meet a failure.
  - level: 3
    text: Set first_error only when it is still None, so it keeps the earliest failing task. Then ok_count and error_count are just the lengths of your two lists, and total is len(results).
