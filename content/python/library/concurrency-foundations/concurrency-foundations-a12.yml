explanation_markdown: |
  When a group of concurrent sub-tasks runs together, a single exception is the
  wrong mental model — several can fail at once, for different reasons. Python 3.11's
  `ExceptionGroup` and `TaskGroup` capture exactly that: a bundle of failures you
  triage as a set. This summary is the reporting layer over such a bundle. The key
  design move is a single pass with independent accumulators, so succeeded and
  failed stay in input order and the error tally builds incrementally. Guarding
  `first_error` with an `is None` check preserves the earliest failure rather than
  the latest, and deriving the counts from list lengths keeps them consistent with
  the lists they describe — no separate counter to drift out of sync.
common_mistakes:
  - Overwriting first_error on every failure instead of only when it is still None, so it ends up holding the last error rather than the first.
  - Reading error_type on ok results, which have no such key, causing a KeyError.
  - Recomputing ok_count and error_count independently from the lists, letting them disagree with succeeded and failed if the logic drifts.
