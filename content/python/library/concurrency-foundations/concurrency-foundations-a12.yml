  originality_notes: Original ExceptionGroup-style summary of a batch of concurrent sub-tasks, framed as an observatory's overnight frame captures where some succeed and some fail with different error types.
prompt_markdown: |
  An observatory runs an overnight batch: many automated frame captures fire off
  together, and by morning some have succeeded and some have failed with different
  error types. Instead of a single traceback, you want the kind of grouped summary a
  task group produces — how many ran, which succeeded, which failed, and a tally of
  failures by type.

  Write `exception_group_summary(results)`. The single argument is a list of result
  dicts, each describing one capture, in the order they were collected. Every result
  has:

  - `"task"`: the capture's name (a string).
  - `"status"`: either `"ok"` or `"error"`.
  - `"error_type"`: present only when status is `"error"`, the name of the failure
    (a string such as `"TimeoutError"`).

  Return a summary dict with exactly these keys:

  - `"total"`: the number of results.
  - `"ok_count"`: how many succeeded.
  - `"error_count"`: how many failed.
  - `"succeeded"`: the list of task names with status `"ok"`, in input order.
  - `"failed"`: the list of task names with status `"error"`, in input order.
  - `"errors_by_type"`: a dict mapping each `error_type` to how many times it occurred.
  - `"first_error"`: the task name of the first failure in input order, or `None`
    if nothing failed.

  An empty input returns totals of 0, empty lists, an empty `errors_by_type`, and
  `first_error` of `None`.

  Example: for captures `frame-01` (ok), `frame-02` (error, TimeoutError),
  `frame-03` (ok), `frame-04` (error, TimeoutError), `frame-05` (error, ValueError),
  the summary reports `total` 5, `ok_count` 2, `error_count` 3, `succeeded`
  `["frame-01", "frame-03"]`, `failed` `["frame-02", "frame-04", "frame-05"]`,
  `errors_by_type` `{"TimeoutError": 2, "ValueError": 1}`, and `first_error`
  `"frame-02"`.
