prompt_markdown: |
  A greenhouse sensor logs the air temperature in Celsius every hour through the
  night, and some readings dip below zero. Write `coldest_reading(readings)`
  returning the single lowest temperature in the list.

  A classic beginner bug is to seed the running minimum with `0` and then keep the
  smallest value seen. That works only when some reading happens to be negative;
  on a night that never drops below freezing it wrongly reports `0`, a temperature
  that was never recorded. Seed the minimum with the first actual reading instead.
  The list always has at least one reading. For `[-3, -7, -2]` the answer is `-7`.
starter_code: |
  def coldest_reading(readings):
      return 0
function_name: coldest_reading
input_mode: function
solution_sketch: Seed the minimum with the first reading, then compare it against each remaining reading.
sample_solution: |
  def coldest_reading(readings):
      coldest = readings[0]
      for reading in readings[1:]:
          if reading < coldest:
              coldest = reading
      return coldest
hints:
  - level: 1
    text: Starting the minimum at 0 assumes some reading is at or below 0, which need not be true.
  - level: 2
    text: Seed the running minimum with the first element of the list, not a fixed constant.
  - level: 3
    text: Loop over the remaining readings and replace the minimum whenever a colder value appears.
tests:
  public:
    - name: all_below_freezing
      input: [-3, -7, -2]
