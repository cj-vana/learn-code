    - name: pair
      input: [-1, -2]
      expected: -2
explanation_markdown: |
  Tracking a minimum means keeping the smallest value seen so far, but the starting
  value has to be a value that actually appears in the data. Seeding with `0` bakes
  in the false assumption that the coldest reading is at most `0`; a warm night like
  `[4, 6, 5]` would then return `0` even though every reading was above it. Seeding
  with `readings[0]` and comparing against the rest fixes this in a single O(n) pass,
  and it works for all-negative, all-positive, and mixed logs alike.
common_mistakes:
  - Seeding the running minimum with 0 instead of the first reading.
  - Returning the first colder value found instead of scanning the whole list.
  - Assuming at least one reading is negative or zero.
