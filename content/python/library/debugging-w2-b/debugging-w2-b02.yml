      input: {start: 10, end: 14}
      expected: [10, 11, 12, 13, 14]
    - name: crosses_zero
      input: {start: -2, end: 1}
      expected: [-2, -1, 0, 1]
    - name: adjacent
      input: {start: 7, end: 8}
      expected: [7, 8]
    - name: from_zero
      input: {start: 0, end: 2}
      expected: [0, 1, 2]
explanation_markdown: |
  Python's `range(start, stop)` yields values up to but not including `stop`, so an
  inclusive upper bound needs `stop = end + 1`. Forgetting the `+ 1` is the most
  common off-by-one error beginners hit, and it silently drops the last row rather
  than raising an error. Passing `end + 1` also handles the empty case for free:
  when `start` is greater than `end`, `range(start, end + 1)` produces nothing, so
  the function returns `[]` in a single O(n) pass over the row numbers.
common_mistakes:
  - Using range(start, end), which omits the inclusive end row.
  - Adding 1 to start instead of end, shifting the whole block.
  - Failing to return an empty list when start is greater than end.
