prompt_markdown: |
  A theater's ticketing screen needs the list of row numbers a block of seats
  spans, from a `start` row up to and including an `end` row. The input is a dict
  with keys `start` and `end`. Write `label_rows(data)` returning the list of row
  numbers from `start` through `end`, inclusive.

  A classic beginner bug is `range(start, end)`, which stops one short and drops
  the final row: for a block from row 1 to row 3 it yields `[1, 2]` instead of
  `[1, 2, 3]`. Remember that `range` excludes its stop value. If `start` is greater
  than `end` the block is empty, so return an empty list.
starter_code: |
  def label_rows(data):
      return []
function_name: label_rows
input_mode: function
solution_sketch: Build a list from start up to end + 1 so the inclusive end row is included.
sample_solution: |
  def label_rows(data):
      start = data["start"]
      end = data["end"]
      return list(range(start, end + 1))
hints:
  - level: 1
    text: range(start, end) never produces the stop value, so the end row is missing.
  - level: 2
    text: To make the end inclusive, the stop passed to range must be one past end.
  - level: 3
    text: Use range(start, end + 1); when start exceeds end this yields an empty list automatically.
tests:
  public:
    - name: simple
      input: {start: 1, end: 3}
      expected: [1, 2, 3]
    - name: single
      input: {start: 5, end: 5}
      expected: [5]
    - name: empty_range
      input: {start: 4, end: 2}
      expected: []
  validation:
