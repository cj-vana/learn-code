prompt_markdown: |
  A stationery shop runs a mail-merge to print event invitations. Each template is a
  string sprinkled with placeholders of the form `{{key}}`, and the shop supplies a
  dictionary of values to drop in. A placeholder may also carry an optional
  formatting filter, written `{{key|filter}}`, where `filter` is one of exactly
  `upper`, `lower`, or `title`.

  Write `template_fill(job)` where `job` is a dict with two keys:

  - `template`: the template string
  - `values`: a dict mapping placeholder keys (strings) to their replacement
    strings

  Replace each placeholder as follows:

  - A placeholder key is a run of one or more of the characters `A`-`Z`, `a`-`z`,
    `0`-`9`, and underscore, written immediately after `{{`, with no spaces inside
    the braces.
  - If the key is present in `values`, substitute its value. If a filter is present,
    transform that value first: `upper` uppercases it, `lower` lowercases it, and
    `title` title-cases it (Python's `str.title`).
  - If the key is **not** present in `values`, leave the placeholder exactly as it
    was written in the template, braces, filter, and all.
  - Any text that is not a well-formed placeholder is copied through unchanged. In
    particular, a `{{...}}` whose filter is not one of the three recognized names is
    not a valid placeholder and is left verbatim.

  Return the filled string.

  Example: with `template = "Hello {{name|upper}}, welcome to {{city}}."` and
  `values = {"name": "ada", "city": "Paris"}`, the result is
  `"Hello ADA, welcome to Paris."`. With `values = {"name": "ada"}` the same
  template yields `"Hello ADA, welcome to {{city}}."`, because `city` is unknown.
starter_code: |
