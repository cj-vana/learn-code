solution_sketch: Match each line with named groups, tally count and total weight per route in a dict, then format each route with an f-string and join with newlines.
sample_solution: |
  import re


  def summarize_routes(lines):
      pattern = re.compile(r"(?P<route>ROUTE-\d+) weight=(?P<grams>\d+)")
      counts = {}
      totals = {}
      for line in lines:
          m = pattern.match(line)
          route = m.group("route")
          grams = int(m.group("grams"))
          if route not in counts:
              counts[route] = 0
              totals[route] = 0
          counts[route] += 1
          totals[route] += grams
      return "\n".join(
          f"{route}: {counts[route]} parcels, {totals[route]}g total"
          for route in counts
      )
