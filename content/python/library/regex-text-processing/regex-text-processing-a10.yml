explanation_markdown: |
  Each line is parsed once with a named-group pattern, which keeps the code
  readable: `m.group("route")` and `m.group("grams")` say what they return. The
  weight is converted to `int` so the totals add up numerically. Tallying into two
  dictionaries keyed by route gives both a per-route count and a running sum, and
  because an ordinary dict preserves insertion order, iterating it later yields the
  routes in first-seen order with no extra bookkeeping. Finally an f-string drops
  each route's numbers into the required sentence, and `"\n".join(...)` stitches
  the lines together without a trailing newline.
common_mistakes:
  - Leaving the weight as a string, so totals concatenate ("1200800") instead of adding.
  - Sorting the routes or using a set, which loses the required first-seen ordering.
  - Adding a trailing newline (for example with a final "\n"), so the report no longer matches exactly.
