prompt_markdown: |
  A courier depot scans each parcel onto a route, writing one line per parcel:

      ROUTE-7 weight=1200

  That is a route label (`ROUTE-` plus digits) and the parcel's weight in grams.
  Write `summarize_routes(lines)` where `lines` is a list of such strings. Parse
  each line with a single regex that uses **named groups**, then return a report
  string with one line per route, in the order each route is **first seen**,
  formatted exactly as:

      ROUTE-7: 2 parcels, 2000g total

  Join the report lines with `"\n"` (no trailing newline). If `lines` is empty,
  return the empty string `""`. You may assume every input line is well-formed.
