function_name: parse_transit_log
input_mode: function
solution_sketch: Match the line with four capture groups and build a dict, converting the final group to int.
sample_solution: |
  import re


  def parse_transit_log(line):
      m = re.match(r"(\d{2}:\d{2}) (LINE-\d+) (\w+) (\d+)", line)
      return {
          "time": m.group(1),
          "line": m.group(2),
          "action": m.group(3),
          "count": int(m.group(4)),
      }
hints:
  - level: 1
    text: Wrap each of the four fields in parentheses so it becomes its own capture group.
  - level: 2
    text: The groups are numbered 1 to 4 in order; read them with m.group(1) through m.group(4).
  - level: 3
    text: Use r"(\d{2}:\d{2}) (LINE-\d+) (\w+) (\d+)" and wrap the fourth group in int() for the count.
