prompt_markdown: |
  A transit control desk records boarding events as single lines like:

      07:45 LINE-2 BOARD 34

  That is a time (`HH:MM`), a line label (`LINE-` plus digits), an action word,
  and a passenger count. Write `parse_transit_log(line)` that uses capture groups
  to split one such line into a dictionary:

      {"time": "07:45", "line": "LINE-2", "action": "BOARD", "count": 34}

  The `count` value must be an integer; the others are strings. You may assume
  every input follows this exact shape.
starter_code: |
