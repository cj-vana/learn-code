explanation_markdown: |
  Each field is wrapped in parentheses, so a single `re.match` produces four
  numbered capture groups. `m.group(1)` through `m.group(4)` return the matched
  fragments as strings in left-to-right order. The passenger count is the one
  field that should be numeric, so it is wrapped in `int(...)` before going into
  the dictionary. Because the whole line is well-formed, `re.match` succeeds and
  every group is present.
common_mistakes:
  - Leaving count as a string, so the dictionary compares unequal to the integer-valued expected result.
  - Miscounting the parentheses and reading the wrong group number for a field.
  - Forgetting the spaces between groups in the pattern, so the match fails.
