prompt_markdown: |
  A support tool writes free-text notes that sometimes leak contact details.
  Write `redact(text)` that hides two kinds of substring:

  - **Email addresses**: one or more of letters, digits, dots, or underscores,
    then `@`, then one or more of letters, digits, or dots, then a dot and a
    2-to-3 letter ending (like `.com`, `.org`, or `.io`). Replace each with
    `[email]`.
  - **Phone numbers** in the exact form `###-###-####` (three digits, hyphen,
    three digits, hyphen, four digits). Replace each with `[phone]`.

  Everything else stays exactly as it is. Return the redacted text.
starter_code: |
  import re


  def redact(text):
      return text
function_name: redact
input_mode: function
solution_sketch: Run two re.sub passes, one for the email pattern and one for the phone pattern, replacing each with its token.
sample_solution: |
  import re


  def redact(text):
      text = re.sub(r"[A-Za-z0-9._]+@[A-Za-z0-9.]+\.[A-Za-z]{2,3}", "[email]", text)
      text = re.sub(r"\b\d{3}-\d{3}-\d{4}\b", "[phone]", text)
      return text
hints:
  - level: 1
    text: The two kinds of data are unrelated, so handle them with two separate re.sub passes over the same text.
  - level: 2
    text: An email pattern needs a local part, an @, a domain, and a short letter ending; a phone pattern is three fixed digit runs joined by hyphens.
  - level: 3
    text: Replace the email pattern first with "[email]", then the pattern r"\b\d{3}-\d{3}-\d{4}\b" with "[phone]".
tests:
  public:
    - name: email_and_phone
      input: 'Reach ana at ana.k@mail.com or 555-123-4567 today'
      expected: 'Reach ana at [email] or [phone] today'
    - name: nothing_to_redact
      input: 'customer was satisfied with the fix'
      expected: 'customer was satisfied with the fix'
    - name: two_emails
      input: 'Write a@b.co or c_d@shop.org now'
      expected: 'Write [email] or [email] now'
  validation:
