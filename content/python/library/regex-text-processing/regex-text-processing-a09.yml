explanation_markdown: |
  The two data types share no structure, so the cleanest solution is two passes.
  The email pattern spells out four parts: a local part of letters, digits, dots,
  or underscores; the `@`; a domain of letters, digits, or dots; and a final dot
  plus a short 2-3 letter ending. The phone pattern pins three fixed digit runs
  joined by hyphens, wrapped in `\b` word boundaries so it does not fire inside a
  longer number. Running the substitutions in sequence lets each replace all of
  its matches independently, and because the replacement tokens contain no digits
  or `@`, neither pass disturbs the other's work.
common_mistakes:
  - Trying to cram both formats into one giant alternation, which is far harder to read and get right than two passes.
  - Writing the domain ending as [A-Za-z]+ so it swallows 4-letter or longer tails and misaligns the match.
  - Forgetting the word boundaries on the phone pattern, so it matches part of a longer digit sequence.
