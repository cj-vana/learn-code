      return ""
function_name: slugify
input_mode: function
solution_sketch: Lowercase the text, use re.sub to collapse each run of non-alphanumeric characters into one hyphen, then strip leading and trailing hyphens.
sample_solution: |
  import re


  def slugify(text):
      lowered = text.lower()
      hyphenated = re.sub(r"[^a-z0-9]+", "-", lowered)
      return hyphenated.strip("-")
hints:
  - level: 1
    text: Lowercase the string first, then everything you match against only needs to worry about the letters a-z and digits 0-9.
  - level: 2
    text: A single re.sub call can replace many characters at once. Make the pattern match a whole run of non-alphanumeric characters, not just one, so repeated symbols collapse to one hyphen.
  - level: 3
    text: Use re.sub(r"[^a-z0-9]+", "-", text.lower()) and then call .strip("-") on the result to remove hyphens that ended up at the very start or end.
