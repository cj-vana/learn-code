prompt_markdown: |
  A small blog engine needs to turn each article headline into a tidy piece of a
  web address called a **slug**: lowercase, no spaces, and no punctuation, so that
  a title like `Hello, World!!` becomes the address fragment `hello-world`.

  Write `slugify(text)` where `text` is a single string. Return its URL slug built
  with these rules, in order:

  1. Lowercase the whole string.
  2. Replace every **run** of one or more non-alphanumeric characters (anything
     that is not a letter `a`-`z` or a digit `0`-`9`) with a single hyphen `-`.
     Use `re.sub` for this step.
  3. Strip any leading or trailing hyphens from the result.

  For example, `'  Hello, World!! '` returns `'hello-world'`, and `'a__b'` returns
  `'a-b'` because the two underscores are one run of non-alphanumeric characters.
  If `text` is the empty string `''`, or contains no letters or digits at all,
  return the empty string `''`.
starter_code: |
