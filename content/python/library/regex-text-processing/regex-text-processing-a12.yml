explanation_markdown: |
  The three rules map directly onto three small steps. Lowercasing first means the
  rest of the code only has to think about `a`-`z` and `0`-`9`, so the character
  class `[^a-z0-9]` cleanly describes "everything that should be squeezed out."

  The key move is the `+` in `[^a-z0-9]+`: it matches a whole **run** of unwanted
  characters, so `', '` in `Hello, World` and the two underscores in `a__b` each
  become a single hyphen instead of several. That is why a single `re.sub` call is
  enough. After substitution, leading or trailing punctuation has turned into
  hyphens at the ends of the string, and `.strip("-")` removes exactly those. The
  empty string and all-symbol inputs collapse to `''` naturally: they contain
  nothing to keep, so after stripping there is nothing left.
common_mistakes:
  - Replacing single characters instead of runs (omitting the + quantifier), which leaves double hyphens like "a--b".
  - Forgetting to strip the leading and trailing hyphens, so a title with edge punctuation returns "-hello-world-".
  - Using \w in the pattern, which counts the underscore as a word character and fails to replace it.
