explanation_markdown: |
  `re.fullmatch` succeeds only when the pattern accounts for the *entire* string,
  so a code with an extra letter (`ABC-1234`), too many digits (`AB-12345`), or a
  trailing space all fail. Using it as the condition of a list comprehension keeps
  exactly the entries that fit `[A-Z]{2}-\d{4}` and preserves their order. This is
  the standard way to validate a batch: filter with `fullmatch` rather than
  `search`, which would wrongly accept a valid code buried inside junk.
common_mistakes:
  - Using re.search or re.match, which accept a valid code even when surrounded by extra characters.
  - Forgetting that a trailing space makes the string invalid under fullmatch.
  - Returning booleans or match objects instead of the original code strings.
