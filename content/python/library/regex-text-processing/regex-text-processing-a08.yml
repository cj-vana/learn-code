prompt_markdown: |
  A warehouse scanner produces inventory codes, but some scans are garbled. A
  **valid** code is exactly two uppercase letters, a hyphen, then four digits, for
  example `QT-0042`. Nothing may come before or after it. Write
  `keep_valid_codes(codes)` where `codes` is a list of strings; return a new list
  containing only the entries that are valid codes, in their original order.
starter_code: |
  import re


  def keep_valid_codes(codes):
      return []
function_name: keep_valid_codes
input_mode: function
solution_sketch: Filter the list, keeping only strings where re.fullmatch of the code pattern succeeds.
sample_solution: |
  import re


  def keep_valid_codes(codes):
      return [c for c in codes if re.fullmatch(r"[A-Z]{2}-\d{4}", c)]
hints:
  - level: 1
