prompt_markdown: |
  A corner store keeps its daily promotions as one long line of plain text, and
  the accounting tool needs the raw dollar figures pulled out of that sentence.

  Write `extract_prices(text)` that takes a single string and, using the `re`
  module, finds every dollar amount written as `$` followed by one or more digits,
  optionally followed by a decimal point and one or more digits. So `$12` and
  `$3.50` both count, but a lone `$` with no digits after it does not.

  Return the amounts as a list of **floats**, in the order they appear in the
  string. If the text contains no dollar amounts, return an empty list `[]`.

  Example: `extract_prices('buy $12 and $3.50, save $0.99')` returns
  `[12.0, 3.5, 0.99]`.
starter_code: |
