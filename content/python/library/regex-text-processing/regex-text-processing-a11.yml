explanation_markdown: |
  The pattern `\$(\d+(?:\.\d+)?)` describes exactly the amounts you want. The
  `\$` matches a literal dollar sign (the backslash strips the special
  end-of-string meaning `$` has in regex). Inside the capturing group, `\d+`
  requires at least one digit, and `(?:\.\d+)?` optionally allows a decimal point
  followed by one or more digits. Because the fractional part is optional, both
  `$12` and `$3.50` match.

  `re.findall` returns every non-overlapping match in left-to-right order, and
  since the pattern has a single capturing group, it yields just the digit text
  (without the `$`). Converting each string with `float()` produces the numbers,
  so `'3.50'` becomes `3.5`. A lone `$` never matches because `\d+` demands a
  digit right after the dollar sign, and an empty string simply produces an empty
  list.
common_mistakes:
  - Writing $ instead of \$ in the pattern, which treats it as an end-of-string anchor and matches nothing.
  - Returning the matched strings instead of converting them with float, so you get ['12', '3.50'] rather than numbers.
  - Making the digit part optional (\d*), which lets a bare $ match and adds empty or wrong entries.
  - Forgetting that re.findall already returns [] on no matches, and adding special-case code that breaks the empty input.
