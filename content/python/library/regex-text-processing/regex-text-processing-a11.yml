  def extract_prices(text):
      return []
function_name: extract_prices
input_mode: function
solution_sketch: Use re.findall with a pattern capturing digits and an optional decimal part, then map each match to float.
sample_solution: |
  import re


  def extract_prices(text):
      matches = re.findall(r"\$(\d+(?:\.\d+)?)", text)
      return [float(m) for m in matches]
hints:
