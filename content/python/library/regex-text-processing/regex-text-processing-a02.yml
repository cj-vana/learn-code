prompt_markdown: |
  A facilities notice mentions rooms using codes like `R12` or `R204`: a capital
  `R` followed by one or more digits. Write `first_room_code(text)` that returns
  the first room code found anywhere in `text`. If the text contains no room
  code, return an empty string `""`.
starter_code: |
  import re


  def first_room_code(text):
      return ""
function_name: first_room_code
input_mode: function
solution_sketch: Use re.search for R followed by digits, then return the match text or an empty string when there is no match.
sample_solution: |
  import re


  def first_room_code(text):
      m = re.search(r"R\d+", text)
      return m.group() if m else ""
hints:
  - level: 1
    text: A room code is the letter R followed by one or more digits, and you only want the first one.
  - level: 2
    text: re.search returns a match object for the first hit anywhere in the string, or None when nothing matches.
  - level: 3
    text: Store re.search(r"R\d+", text) in a variable, then return m.group() if m else "".
tests:
  public:
    - name: two_codes_returns_first
      input: Go to R204 then swing by R12
      expected: R204
    - name: none_present
