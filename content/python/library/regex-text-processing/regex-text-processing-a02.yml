      expected: R7
    - name: skips_bad_r_then_finds
      input: Room service before R9 opens
      expected: R9
explanation_markdown: |
  `re.search` roams the entire string and returns a match object for the first
  place `R\d+` fits, or `None` if it never does. Because a failed search returns
  `None`, you must guard before calling `.group()`; the expression
  `m.group() if m else ""` does exactly that, returning the matched code or a
  clean empty string. Note that `R` with no digit after it (as in "Section R")
  never matches, since `\d+` demands at least one digit.
common_mistakes:
  - Calling m.group() without first checking whether the search returned None.
  - Using re.findall and returning the whole list instead of just the first code.
  - Writing the pattern as R\d* so a bare R (zero digits) matches unintentionally.
