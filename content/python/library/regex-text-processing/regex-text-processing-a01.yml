    - name: digits_and_underscore
      input: 'tags #bay_7 and #zone42 up'
      expected: 2
explanation_markdown: |
  `re.findall(r"#\w+", text)` scans the whole string and collects every place a
  `#` is followed by at least one word character. Because `findall` always
  returns a list, wrapping it in `len(...)` gives the count directly, with no
  loop and no `None` check. The `\w+` requirement is what makes a lone `#` (or a
  run of them) count as zero hashtags.
common_mistakes:
  - Using the pattern "#" alone, which counts every hash symbol even when no word follows.
  - Reaching for re.search, which finds only the first hashtag instead of all of them.
  - Forgetting that \w already covers digits and underscores, then over-complicating the pattern.
