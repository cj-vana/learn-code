prompt_markdown: |
  A neighbourhood message board lets people tag posts with hashtags such as
  `#cleanup` or `#bay7`. A hashtag is a `#` followed by one or more word
  characters (letters, digits, or underscores). Write `count_hashtags(text)` that
  returns how many hashtags appear in `text`. A `#` with no word character after
  it does not count.
starter_code: |
  import re


  def count_hashtags(text):
      return 0
function_name: count_hashtags
input_mode: function
solution_sketch: Use re.findall with the pattern for a hashtag and return the length of the resulting list.
sample_solution: |
  import re


  def count_hashtags(text):
      return len(re.findall(r"#\w+", text))
hints:
  - level: 1
    text: A hashtag is the character # immediately followed by one or more word characters.
  - level: 2
    text: re.findall returns a list of every non-overlapping match, and len() of that list is the count.
  - level: 3
    text: Return len(re.findall(r"#\w+", text)); the \w+ ensures a bare # with nothing after it is skipped.
tests:
  public:
    - name: two_tags
      input: 'Meet at #dawn near #gate7 today'
      expected: 2
    - name: no_tags
      input: no tags here at all
      expected: 0
    - name: hyphen_stops_word
      input: '#a #b #c-d'
      expected: 3
