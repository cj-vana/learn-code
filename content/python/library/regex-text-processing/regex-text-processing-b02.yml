solution_sketch: Build one master regex with a named alternative per token type in priority order, plus a whitespace alternative. Iterate with finditer, read Match.lastgroup to learn which alternative fired, skip whitespace matches, and collect [type, value] for the rest.
sample_solution: |
  import re


  def tokenize_recipe(text):
      pattern = re.compile(
          r"(?P<number>\d+(?:\.\d+)?)"
          r"|(?P<unit>\b(?:cups|cup|tbsp|tsp|kg|g|ml|l|oz)\b)"
          r"|(?P<word>[A-Za-z]+)"
          r"|(?P<punct>[^\sA-Za-z0-9])"
          r"|(?P<ws>\s+)"
      )
      tokens = []
      for match in pattern.finditer(text):
          kind = match.lastgroup
          if kind == "ws":
              continue
          tokens.append([kind, match.group()])
      return tokens
