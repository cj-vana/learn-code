  public:
    - name: main_example
      input: "2 cups flour, 1.5 tsp salt"
      expected:
        - ["number", "2"]
        - ["unit", "cups"]
        - ["word", "flour"]
        - ["punct", ","]
        - ["number", "1.5"]
        - ["unit", "tsp"]
        - ["word", "salt"]
    - name: unit_lookalike_word
      input: "cupcake batter"
      expected:
        - ["word", "cupcake"]
        - ["word", "batter"]
    - name: empty
      input: ""
      expected: []
  validation:
    - name: punct_run
      input: "mix (gently); rest"
      expected:
        - ["word", "mix"]
        - ["punct", "("]
        - ["word", "gently"]
        - ["punct", ")"]
        - ["punct", ";"]
        - ["word", "rest"]
    - name: grams_number
      input: "300 g sugar"
      expected:
        - ["number", "300"]
        - ["unit", "g"]
        - ["word", "sugar"]
    - name: decimal_and_hyphen
      input: "0.25 cup cocoa-powder"
      expected:
        - ["number", "0.25"]
        - ["unit", "cup"]
        - ["word", "cocoa"]
        - ["punct", "-"]
        - ["word", "powder"]
    - name: capital_unit_is_word
      input: "Cups of Tea"
      expected:
        - ["word", "Cups"]
        - ["word", "of"]
        - ["word", "Tea"]
    - name: liter_single_letter
      input: "1 l water"
      expected:
        - ["number", "1"]
        - ["unit", "l"]
        - ["word", "water"]
explanation_markdown: |
  A tokenizer is a set of competing patterns and a rule for who wins. The compact way
  to express that in Python is one compiled regex whose alternatives are the token
  types, each wrapped in a *named* group. `re.finditer` walks the string and returns
  every non-overlapping match in order; for each one `Match.lastgroup` reports which
  named alternative matched, which is the token's type. The value is just
  `match.group()`, the matched text.

  Priority is encoded by alternative order. `number` comes first so digit runs are
  never split, then `unit`, then the more general `word`, then `punct` as the
  catch-all for a single non-word, non-space character. A trailing `ws` alternative
  consumes whitespace so the scanner advances past it, but we drop those matches
  instead of emitting them.

  The subtle part is the unit list. Wrapping it in word boundaries `\b(?:...)\b`
  stops `cup` from matching inside `cupcake`: after the `cup` in `cupcake` there is no
  boundary, so the whole unit alternative fails there and the engine falls through to
  `word`, which grabs `cupcake` entire. Listing `cups` before `cup` keeps a full
  `cups` from being clipped to `cup`. Because matching is case-sensitive, `Cups`
  never matches the lowercase unit list and is classified as a `word`.
common_mistakes:
  - Omitting the word boundaries around the unit list, so cup matches inside words like cupcake and the token stream is wrong.
  - Testing token types with separate re.match calls at hand-advanced offsets instead of one finditer pass, which is easy to get off by one.
  - Emitting whitespace tokens, or forgetting the whitespace alternative so finditer silently skips characters and misaligns.
  - Returning tuples instead of two-element lists, or reordering the alternatives so word shadows unit (or punct shadows number).
