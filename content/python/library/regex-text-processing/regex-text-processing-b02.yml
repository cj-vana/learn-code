prompt_markdown: |
  A cooking app needs to lex a recipe line into typed tokens before parsing it.
  Write `tokenize_recipe(text)` that scans the string left to right and returns a
  list of `[type, value]` pairs (each a two-element list, not a tuple), in the order
  the tokens appear.

  Classify each token by these exact rules, tried in this priority order at every
  position:

  1. `number`: a run of digits, optionally with a single decimal point and more
     digits, e.g. `"2"` or `"1.5"`. The token value is the matched text as a string.
  2. `unit`: one of these exact lowercase measurement words, standing alone as a
     whole word: `cups`, `cup`, `tbsp`, `tsp`, `kg`, `g`, `ml`, `l`, `oz`. Matching
     is case-sensitive, so `Cups` is not a unit.
  3. `word`: a run of one or more letters (`A`-`Z` or `a`-`z`) that was not matched
     as a unit.
  4. `punct`: any single character that is not a letter, a digit, or whitespace
     (for example `,` `.` `;` `(` `)` `-`). Each punctuation character is its own
     token.

  Whitespace separates tokens and is never emitted. You may assume numbers and units
  are always separated from their neighbors by whitespace or punctuation (there is no
  glued form like `2cups`). An empty string returns `[]`.

  Example: `tokenize_recipe("2 cups flour, 1.5 tsp salt")` returns
  `[["number", "2"], ["unit", "cups"], ["word", "flour"], ["punct", ","],
  ["number", "1.5"], ["unit", "tsp"], ["word", "salt"]]`. Note that `cupcake` is a
  single `word` token, not a `cup` unit followed by `cake`.
