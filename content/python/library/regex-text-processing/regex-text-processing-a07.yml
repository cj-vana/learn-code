prompt_markdown: |
  A print shop's door log records employee badge numbers, which are always
  exactly six digits, e.g. `482913`. For privacy, each badge number should be
  masked so only its **last two digits** survive, preceded by four asterisks:
  `482913` becomes `****13`. Numbers that are not exactly six digits long (a page
  count, a year, and so on) must be left alone. Write `mask_badges(text)` that
  returns the log line with every six-digit badge number masked.
starter_code: |
  import re


  def mask_badges(text):
      return text
function_name: mask_badges
input_mode: function
solution_sketch: Match exactly-six-digit runs with word boundaries and use a re.sub replacement function that keeps the last two digits.
sample_solution: |
  import re


  def mask_badges(text):
      return re.sub(r"\b\d{6}\b", lambda m: "****" + m.group()[-2:], text)
hints:
  - level: 1
    text: You need to match a run of exactly six digits and nothing more, which \b...\b word boundaries help pin down.
  - level: 2
    text: re.sub can take a function as its replacement; it receives the match object and returns the text to substitute.
  - level: 3
    text: 'Use re.sub(r"\b\d{6}\b", lambda m: "****" + m.group()[-2:], text) so only genuine six-digit badges are masked.'
