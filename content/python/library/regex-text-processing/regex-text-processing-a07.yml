explanation_markdown: |
  `\b\d{6}\b` matches a run of exactly six digits bounded by word boundaries, so a
  five-digit page count or a seven-digit sheet count never matches. Passing a
  function to `re.sub` gives you control over each replacement: the function
  receives the match object, and `m.group()[-2:]` slices out the final two digits,
  which are joined to the four asterisks. Every badge is rewritten while all other
  numbers pass through untouched.
common_mistakes:
  - Dropping the word boundaries and using \d{6}, which would match the first six digits inside a longer number.
  - Hard-coding a replacement string, which cannot vary the kept digits per match.
  - Using \d{6,} (six or more), which would wrongly mask longer numbers too.
