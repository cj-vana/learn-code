prompt_markdown: |
  An archive stores dates in day-first form like `03/11/2026` (that is
  `DD/MM/YYYY`). To load them into a new system they must become ISO form
  `2026-11-03` (`YYYY-MM-DD`). Write `to_iso_dates(text)` that rewrites **every**
  such date found in `text` using a single `re.sub` call with backreferences, and
  leaves all other characters untouched. You may assume every date already has two
  digits for the day, two for the month, and four for the year.
starter_code: |
  import re


  def to_iso_dates(text):
      return text
function_name: to_iso_dates
input_mode: function
solution_sketch: Capture day, month, and year in three groups and reorder them in the replacement string with backreferences.
sample_solution: |
  import re


  def to_iso_dates(text):
      return re.sub(r"(\d{2})/(\d{2})/(\d{4})", r"\3-\2-\1", text)
hints:
  - level: 1
    text: Wrap the day, month, and year in separate capture groups so you can refer to each one.
  - level: 2
    text: In the replacement string, \1, \2, and \3 stand for the first, second, and third captured groups.
  - level: 3
    text: Use re.sub(r"(\d{2})/(\d{2})/(\d{4})", r"\3-\2-\1", text) to place the year first, then month, then day.
