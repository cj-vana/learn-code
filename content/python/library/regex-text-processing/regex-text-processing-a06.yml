explanation_markdown: |
  The pattern `(\d{2})/(\d{2})/(\d{4})` captures the day, month, and year into
  groups 1, 2, and 3. In the replacement string `\3-\2-\1`, each backreference
  replays the text that its group captured, so the year moves to the front,
  followed by the month and then the day, and the separators become hyphens. Because `re.sub` replaces every non-overlapping
  match, one call rewrites all the dates in the string at once, and any text that
  does not fit the pattern is copied through unchanged.
common_mistakes:
  - Forgetting the parentheses, so there are no groups for \1, \2, and \3 to reference.
  - Writing the replacement as a normal string "\3-\1-\2" without the r prefix, so the backslashes get misread.
  - Reordering the groups incorrectly and producing MM-DD or DD-MM instead of ISO YYYY-MM-DD.
