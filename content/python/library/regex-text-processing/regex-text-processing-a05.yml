explanation_markdown: |
  `re.findall(r"[A-Za-z]+", text)` walks the whole string and returns every
  maximal run of letters as a separate list item. Because the character class
  excludes digits, spaces, and punctuation, each of those characters ends the
  current word and starts the search for the next one, so you never have to strip
  or split by hand. An apostrophe is not a letter, which is why `potter's` becomes
  the two tokens `potter` and `s`.
common_mistakes:
  - Using \w+, which also captures digits and underscores, so "room2gallery" would stay a single token.
  - Splitting on a single space with str.split, which leaves punctuation stuck to the words.
  - Forgetting that findall returns an empty list (not None) when there are no words.
