prompt_markdown: |
  A museum stores the text of its exhibit placards and wants to break each one
  into words for a search index. Define a *word* as a run of one or more letters
  (`a`-`z` or `A`-`Z`). Digits, punctuation, and whitespace are all separators
  and must not appear in the result. Write `tokenize(text)` that returns the list
  of words in the order they appear, preserving their original letter casing.
starter_code: |
  import re


  def tokenize(text):
      return []
function_name: tokenize
input_mode: function
solution_sketch: Use re.findall with a pattern that matches runs of letters only.
sample_solution: |
  import re


  def tokenize(text):
      return re.findall(r"[A-Za-z]+", text)
hints:
  - level: 1
    text: A word here is a run of letters, so a single character class repeated with + describes it.
  - level: 2
    text: re.findall gathers every non-overlapping match at once, which is exactly one match per word.
  - level: 3
    text: Return re.findall(r"[A-Za-z]+", text); anything that is not a letter automatically acts as a boundary.
