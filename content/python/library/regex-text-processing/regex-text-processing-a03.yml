explanation_markdown: |
  `re.match` only succeeds when the pattern is found at position 0, so it is the
  right tool for "does this begin with...". The pattern `TKT-\d+` requires the
  literal prefix followed by at least one digit, which rejects both `TKT-abc`
  (no digit) and lines where the tag appears later. Comparing the result to
  `None` with `is not None` turns the match object (or its absence) into the
  boolean the caller expects.
common_mistakes:
  - Using re.search instead of re.match, which would return True even when the tag appears in the middle.
  - Writing TKT-\d* so a bare "TKT-" with no digits matches.
  - Returning the raw match object instead of a boolean.
