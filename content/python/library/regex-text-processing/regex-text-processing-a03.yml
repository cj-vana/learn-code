prompt_markdown: |
  A help desk stores log lines, and only some of them begin with a ticket tag of
  the form `TKT-` followed by one or more digits, like `TKT-5567`. Write
  `starts_with_ticket(line)` that returns `True` when `line` begins with such a
  tag and `False` otherwise. The tag must be at the very start of the line, and
  `TKT-` with no digits after it does not count.
starter_code: |
  import re


  def starts_with_ticket(line):
      return False
function_name: starts_with_ticket
input_mode: function
solution_sketch: Use re.match to anchor the tag pattern at the start and return whether a match was found.
sample_solution: |
  import re


  def starts_with_ticket(line):
      return re.match(r"TKT-\d+", line) is not None
hints:
  - level: 1
    text: The tag must appear at the very beginning, which is exactly what re.match checks.
  - level: 2
    text: re.match returns a match object when the pattern is found at the start, or None otherwise.
  - level: 3
    text: Return re.match(r"TKT-\d+", line) is not None so the result is a clean boolean.
