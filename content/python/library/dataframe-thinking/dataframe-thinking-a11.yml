prompt_markdown: |
  An orchard's soil probes occasionally drop a reading, leaving a `None` in the
  moisture column. Before the data is charted, the gaps must be patched — the
  pure-Python version of a dataframe `fillna`, offered here with two strategies.

  Write `fillna_column(payload)` that takes **one dictionary** with four entries:

  - `"rows"`: a list of dictionaries. Every row contains the target column, whose
    value is either a number or `None`.
  - `"column"`: the string name of the column to patch.
  - `"strategy"`: either `"value"` or `"mean"`.
  - `"fill"`: the constant used when the strategy is `"value"` (ignored for
    `"mean"`, but always present).

  Example call:

  ```python
  fillna_column({
      "rows": [{"tree": "t1", "moisture": 40}, {"tree": "t2", "moisture": None}],
      "column": "moisture",
      "strategy": "value",
      "fill": 0,
  })
  # -> [{"tree": "t1", "moisture": 40}, {"tree": "t2", "moisture": 0}]
  ```

  Return a **new list of row dictionaries** in the original order:

  - A value is "missing" only when it is exactly `None`; a `0` is a real reading and
    is left alone.
  - With strategy `"value"`, replace each missing entry with `"fill"`.
  - With strategy `"mean"`, replace each missing entry with the **mean of the
    present (non-`None`) values in that column, rounded to 4 decimal places**. The
    replacement is the same for every gap. If the column has no present values at
    all, use `0.0`.
  - Non-missing values, and every other column, are left unchanged.
  - Do not mutate the caller's rows; return fresh dictionaries.
  - If `"rows"` is empty, return an empty list.
