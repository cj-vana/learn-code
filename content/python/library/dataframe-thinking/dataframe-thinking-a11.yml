function_name: fillna_column
input_mode: function
solution_sketch: Decide the replacement once (the fill constant, or the rounded mean of present values with a 0.0 fallback), then copy each row and swap only the None entries in the target column.
sample_solution: |
  def fillna_column(payload):
      rows = payload["rows"]
      column = payload["column"]
      strategy = payload["strategy"]
      fill = payload["fill"]
      if strategy == "mean":
          present = [row[column] for row in rows if row[column] is not None]
          if present:
              replacement = round(sum(present) / len(present), 4)
          else:
              replacement = 0.0
      else:
          replacement = fill
      result = []
      for row in rows:
          new_row = dict(row)
          if new_row[column] is None:
              new_row[column] = replacement
          result.append(new_row)
      return result
hints:
