explanation_markdown: |
  Filling gaps forces a question dataframes make you answer too: what counts as
  missing, and what should stand in for it? Here missing means exactly `None`, which
  is why a genuine `0` reading must survive — conflating the two is the classic
  imputation bug. The constant strategy is a straight substitution; the mean
  strategy computes one replacement from the values that *are* present and reuses it
  for every gap, matching `df[col].fillna(df[col].mean())`.

  Computing the mean once (rather than per gap) is both faster and correct: the
  imputed value should reflect the observed data, not itself. The `0.0` fallback for
  an all-missing column keeps the function total — it never divides by zero — which
  is the kind of edge a production pipeline has to handle explicitly.
common_mistakes:
  - Treating 0 (or an empty string) as missing, so real zero readings get overwritten.
  - Recomputing the mean while filling, letting already-imputed values pull the average around.
  - Dividing by zero when every value is missing instead of falling back to a default.
