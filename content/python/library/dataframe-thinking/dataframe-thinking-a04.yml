explanation_markdown: |
  Group-by is the split-apply-combine pattern. The split is one linear pass that
  drops each row's `agg_col` value into a bucket keyed by its `group_col` value;
  `setdefault(key, []).append(...)` folds "first time I have seen this group" into
  the same line as the append. The apply-and-combine step then reduces each
  bucket with the requested aggregate.

  Counting is special: it ignores the actual values and just measures how many
  rows landed in each bucket, so `len(values)` is the answer even when values
  repeat. The mean is rounded to two decimals so that floating-point division
  produces a stable, comparable result instead of a long binary-fraction tail.
common_mistakes:
  - Counting distinct values (len(set(values))) instead of rows (len(values)) for the "count" aggregate.
  - Forgetting to round the mean, so a value like 4.5 arrives as 4.500000000001 and fails an exact comparison.
  - Overwriting a group's bucket with the latest value instead of accumulating all of its values before aggregating.
