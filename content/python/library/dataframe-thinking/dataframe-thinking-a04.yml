solution_sketch: Collect each group's agg_col values into a bucket dictionary in one pass, then reduce each bucket with the chosen aggregate, rounding the mean to 2 decimals.
sample_solution: |
  def aggregate_by_group(payload):
      rows = payload["rows"]
      group_col = payload["group_col"]
      agg_col = payload["agg_col"]
      agg_func = payload["agg_func"]
      buckets = {}
      for row in rows:
          buckets.setdefault(row[group_col], []).append(row[agg_col])
      result = {}
      for group, values in buckets.items():
          if agg_func == "sum":
              result[group] = sum(values)
          elif agg_func == "count":
              result[group] = len(values)
          elif agg_func == "min":
              result[group] = min(values)
          elif agg_func == "max":
              result[group] = max(values)
          elif agg_func == "mean":
              result[group] = round(sum(values) / len(values), 2)
      return result
