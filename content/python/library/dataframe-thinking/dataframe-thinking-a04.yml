prompt_markdown: |
  A farmers' market weigh station records every basket as a row: which stall it
  came from and how many kilos it held. The market office wants a per-stall
  summary, the split-apply-combine move a data-frame library writes as
  `frame.groupby("stall")["kilos"].sum()`.

  Write `aggregate_by_group(payload)` that takes a single dictionary with four
  keys:

  - `"rows"`: a list of basket dictionaries.
  - `"group_col"`: the column whose distinct values define the groups.
  - `"agg_col"`: the numeric column to aggregate within each group.
  - `"agg_func"`: one of these aggregate names (given as a string):
    - `"sum"`: total of the group's values.
    - `"count"`: number of rows in the group (the `agg_col` value is ignored,
      but the column is still named).
    - `"min"`: smallest value in the group.
    - `"max"`: largest value in the group.
    - `"mean"`: average of the group's values, **rounded to 2 decimal places**.

  Return a dictionary mapping each distinct `group_col` value to its aggregated
  result. You may assume both named columns are present in every row.

  Edge cases the tests cover:

  - An empty `"rows"` list returns an empty dictionary `{}`.
  - `"count"` counts rows, so repeated values still each add one.
  - `"mean"` is rounded to 2 decimals (for example `4.5`, not `4.500001`).

  Example:

  ```python
  aggregate_by_group({
      "rows": [{"stall": "A", "kilos": 4}, {"stall": "B", "kilos": 7}, {"stall": "A", "kilos": 6}],
      "group_col": "stall",
      "agg_col": "kilos",
      "agg_func": "sum",
  })
  # -> {"A": 10, "B": 7}
  ```
