explanation_markdown: |
  A relational inner join keeps every *pair* of rows that agree on the key, not
  just the first match. The efficient way to build it is to bucket one side once:
  here the right rows become a `key -> [rows]` dictionary, so each left row can
  reach all of its matches in a single lookup instead of rescanning the whole right
  table.

  Walking the left rows in order, and each bucket in insertion order, gives exactly
  the requested ordering for free. For every matching pair we build a fresh
  `dict(left_row)` and `update` it with the right row; because `update` overwrites
  existing keys, any shared field takes the right value. The cartesian behaviour on
  duplicate keys is what surprises people coming from a naive "look up one match"
  join: two left rows that each match three right rows really do yield six output
  rows, which is precisely what a dataframe `merge` would return.
common_mistakes:
  - Stopping at the first matching right row, which silently turns a real inner join into a lookup and drops the extra pairs.
  - Merging left onto right so left values overwrite right, reversing the collision rule.
  - Mutating the left row in place with .update instead of copying it first, corrupting the caller's table and merging later matches on top of earlier ones.
