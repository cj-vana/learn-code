solution_sketch: Bucket the right rows into a dict mapping key value to the list of right rows with that value (preserving order), then walk the left rows in order and, for each, emit one merged copy per right row in its bucket.
sample_solution: |
  def inner_join(payload):
      left = payload["left"]
      right = payload["right"]
      key = payload["key"]
      buckets = {}
      for row in right:
          buckets.setdefault(row[key], []).append(row)
      result = []
      for row in left:
          for match in buckets.get(row[key], []):
              merged = dict(row)
              merged.update(match)
              result.append(merged)
      return result
