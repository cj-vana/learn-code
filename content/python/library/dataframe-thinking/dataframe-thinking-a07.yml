prompt_markdown: |
  A hilltop observatory keeps two in-memory tables. One holds a row per catalogued
  **star**; the other logs every **observation** taken across many nights. Both
  tables carry the same key field, and the astronomer wants the combined table you
  would get from a relational *inner join* (the same thing a dataframe `merge`
  produces).

  Write `inner_join(payload)` that takes **one dictionary** with three entries:

  - `"left"`: a list of dictionaries (the star rows).
  - `"right"`: a list of dictionaries (the observation rows).
  - `"key"`: the string name of the field to join on. Every row in both tables
    contains this field.

  Example call:

  ```python
  inner_join({
      "left": [{"star": "S1", "name": "Vega"}],
      "right": [{"star": "S1", "mag": 0.03}],
      "key": "star",
  })
  # -> [{"star": "S1", "name": "Vega", "mag": 0.03}]
  ```

  Return a **list of merged dictionaries**. The join is a true inner join, so when
  a key value appears on both sides you emit **one merged row per matching pair**:

  - For each left row in order, scan the right rows in order and, for every right
    row whose key value equals the left row's key value, emit a merged dictionary.
  - Because both sides may hold duplicate key values, a left row that matches three
    right rows produces three output rows, and if two left rows each match those
    three right rows you get six output rows (a cartesian expansion of the match).
  - Merge by laying the matched right row on top of a copy of the left row, so on
    any field the two rows share, the **right value wins**.
  - Output order is: left rows in their original order, and within each left row,
    its matches in right-row order.
  - A left row whose key value appears in no right row contributes nothing.
  - If either list is empty, return an empty list.
