explanation_markdown: |
  Boolean masking splits into two steps that a data-frame library fuses into one
  expression: first decide, per row, whether it passes (the mask), then keep the
  rows where the mask is `True`. Looking the operator up in a dictionary of tiny
  comparison functions keeps the loop to a single line and avoids a six-way
  `if`/`elif` ladder.

  Building a fresh list with a comprehension leaves the caller's rows untouched,
  which matches how a real filter returns a new view rather than mutating the
  source. Order is preserved because you visit the rows front to back and append
  the survivors as you meet them, so the result reads in the same sequence as the
  log.
common_mistakes:
  - Returning the rows that fail the test by flipping the comparison, so the mask is inverted.
  - Writing a long if/elif chain for the six operators and mishandling one of them (for example treating ">=" as ">").
  - Comparing against the whole row instead of row[column], which never matches the threshold.
