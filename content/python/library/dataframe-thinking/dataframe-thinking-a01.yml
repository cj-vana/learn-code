prompt_markdown: |
  A rooftop weather station keeps every hourly reading as one dictionary in a
  flat list. An analyst wants to keep only the rows that pass a single
  comparison, the same idea a data-frame library expresses as
  `frame[frame["temp_c"] > 15]`: build a boolean mask, then keep the rows where
  the mask is `True`.

  Write `filter_rows(payload)` that takes a single dictionary with four keys:

  - `"rows"`: a list of reading dictionaries.
  - `"column"`: the field name to test.
  - `"op"`: one of the comparison operators `">"`, `">="`, `"<"`, `"<="`,
    `"=="`, `"!="` (given as a string).
  - `"value"`: the value to compare each row's `column` against.

  Return a **new list** holding the row dictionaries for which
  `row[column] <op> value` is `True`, in their original order. Do not modify the
  rows themselves. You may assume `"column"` is present in every row.

  Edge cases the tests cover:

  - An empty `"rows"` list returns an empty list `[]`.
  - When no row passes, return `[]`.
  - Comparisons may be against numbers or strings (for `"=="`/`"!="`).

  Example:

  ```python
  filter_rows({
      "rows": [{"hour": 6, "temp_c": 11}, {"hour": 12, "temp_c": 21}],
      "column": "temp_c",
      "op": ">",
      "value": 15,
  })
  # -> [{"hour": 12, "temp_c": 21}]
  ```
starter_code: |
  def filter_rows(payload):
