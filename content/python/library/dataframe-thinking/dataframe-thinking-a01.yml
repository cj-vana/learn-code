function_name: filter_rows
input_mode: function
solution_sketch: Map each operator string to a two-argument comparison, then keep the rows whose column value satisfies the comparison against value, preserving order.
sample_solution: |
  def filter_rows(payload):
      rows = payload["rows"]
      column = payload["column"]
      value = payload["value"]
      comparisons = {
          ">": lambda a, b: a > b,
          ">=": lambda a, b: a >= b,
          "<": lambda a, b: a < b,
          "<=": lambda a, b: a <= b,
          "==": lambda a, b: a == b,
          "!=": lambda a, b: a != b,
      }
      keep = comparisons[payload["op"]]
      return [row for row in rows if keep(row[column], value)]
hints:
  - level: 1
