solution_sketch: For each row build the shared id-column base, then for each value column append a fresh copy of the base extended with variable and value keys.
sample_solution: |
  def melt_rows(payload):
      rows = payload["rows"]
      id_cols = payload["id_cols"]
      value_cols = payload["value_cols"]
      long_rows = []
      for row in rows:
          base = {col: row[col] for col in id_cols}
          for col in value_cols:
              record = dict(base)
              record["variable"] = col
              record["value"] = row[col]
              long_rows.append(record)
      return long_rows
hints:
  - level: 1
    text: Melting turns one wide row into several tall rows - one per value column - each carrying the same id fields plus which column it came from and that column's value.
  - level: 2
    text: Use two nested loops - outer over rows, inner over value_cols - so each input row fans out into len(value_cols) output rows.
  - level: 3
    text: Build the id-only base once per row, then for each value column copy it with dict(base) and add record["variable"] = col and record["value"] = row[col]; copying keeps the records independent.
