      expected: [{"town": "Ada", "variable": "spring", "value": 30}, {"town": "Ada", "variable": "summer", "value": 12}, {"town": "Bly", "variable": "spring", "value": 25}, {"town": "Bly", "variable": "summer", "value": 18}]
