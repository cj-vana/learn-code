      expected: [{"town": "Ada", "zone": "N", "variable": "q1", "value": 5}, {"town": "Ada", "zone": "N", "variable": "q2", "value": 8}]
    - name: three_value_columns
      input: {"rows": [{"crop": "rye", "mon": 2, "tue": 4, "wed": 6}], "id_cols": ["crop"], "value_cols": ["mon", "tue", "wed"]}
      expected: [{"crop": "rye", "variable": "mon", "value": 2}, {"crop": "rye", "variable": "tue", "value": 4}, {"crop": "rye", "variable": "wed", "value": 6}]
    - name: single_row_two_values
      input: {"rows": [{"id": "X", "a": 1, "b": 2}], "id_cols": ["id"], "value_cols": ["a", "b"]}
      expected: [{"id": "X", "variable": "a", "value": 1}, {"id": "X", "variable": "b", "value": 2}]
    - name: string_values
      input: {"rows": [{"town": "Ada", "am": "clear", "pm": "rain"}], "id_cols": ["town"], "value_cols": ["am", "pm"]}
      expected: [{"town": "Ada", "variable": "am", "value": "clear"}, {"town": "Ada", "variable": "pm", "value": "rain"}]
explanation_markdown: |
  Melting reshapes wide to long by fanning each row out into one record per value
  column. The two nested loops carry the structure: the outer loop walks the towns
  and the inner loop walks the value columns, so a row with three value columns
  becomes three tall rows. Each tall row repeats the identifier fields and adds a
  `variable`/`value` pair naming where the number came from.

  Copying the id-only `base` for every emitted record is what keeps them
  independent; if you reused one dictionary and mutated it, every record would end
  up pointing at the same object and show only the last season. Long form is the
  shape most plotting and grouping code prefers, which is why this reshape is such
  a common first step.
common_mistakes:
  - Reusing a single record dictionary and overwriting its variable/value each pass, so every emitted row shows the last column.
  - Producing one output row per input row instead of one per value column, collapsing the fan-out.
  - Dropping the id columns from the long rows, so the values lose the town they belong to.
