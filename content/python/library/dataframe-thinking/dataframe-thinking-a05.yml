prompt_markdown: |
  A regional almanac stores rainfall in a wide table: one row per town, with a
  separate column for each season's total. To feed a chart, an analyst needs the
  same data in long form, one row per town-per-season, the reshape a data-frame
  library calls `melt` or `pivot_longer`.

  Write `melt_rows(payload)` that takes a single dictionary with three keys:

  - `"rows"`: a list of wide town dictionaries.
  - `"id_cols"`: the list of identifier columns to repeat on every output row.
  - `"value_cols"`: the list of columns to unroll into rows.

  For each input row, and for each column name in `"value_cols"` **in order**,
  emit one output dictionary that contains:

  - every `id_col` copied from the source row, then
  - `"variable"`: the value-column's name, then
  - `"value"`: that column's value in the source row.

  Return the full list of these long-form dictionaries, grouped row by row and,
  within each row, ordered by `value_cols`. You may assume all listed columns are
  present in every row.

  Edge cases the tests cover:

  - An empty `"rows"` list returns an empty list `[]`.
  - A single value column still produces one output row per input row.
  - There may be more than one id column.

  Example:

  ```python
  melt_rows({
      "rows": [{"town": "Ada", "spring": 30, "summer": 12}],
      "id_cols": ["town"],
      "value_cols": ["spring", "summer"],
  })
  # -> [{"town": "Ada", "variable": "spring", "value": 30},
  #     {"town": "Ada", "variable": "summer", "value": 12}]
  ```
