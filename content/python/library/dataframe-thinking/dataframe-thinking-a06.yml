explanation_markdown: |
  Spreading is the inverse of melting: it collapses many tall rows back into a
  grid with one row per index value and one column per distinct label. The single
  scan does three jobs at once - it learns the row order (first-appearance index
  values), the full column set (first-appearance column values), and the value of
  every cell keyed by an `(index, column)` tuple.

  The rectangle must be complete: every output row carries a key for every column
  value seen anywhere, even the ones that boat never bought. Reading each cell
  through `cells.get((idx, col))` supplies `None` for those absent combinations,
  which is exactly how a pivot marks a missing cell. Collecting the full column
  set first is what guarantees the grid stays rectangular.
common_mistakes:
  - Only adding keys for the columns a given index actually has, so output rows have inconsistent keys instead of a filled None.
  - Indexing cells[(idx, col)] directly when building rows, which raises KeyError on the missing combinations instead of yielding None.
  - Emitting a separate output row for every input row rather than one merged row per distinct index value.
