prompt_markdown: |
  A harbor logs every fuel purchase as a long-form row: which boat bought it,
  which fuel type, and how many liters. The harbourmaster wants a grid instead -
  one row per boat, one column per fuel type - the reshape a data-frame library
  calls `pivot` or `pivot_wider`.

  Write `spread_rows(payload)` that takes a single dictionary with four keys:

  - `"rows"`: a list of long-form purchase dictionaries.
  - `"index_col"`: the column whose distinct values become the output rows.
  - `"columns_col"`: the column whose distinct values become the new column
    names.
  - `"values_col"`: the column supplying each cell's value.

  Return a list of dictionaries, one per distinct `index_col` value, in the order
  those values **first appear** in `"rows"`. Each output dictionary holds:

  - `index_col` mapped to that index value, and
  - one key for every distinct `columns_col` value seen anywhere in `"rows"`,
    mapped to the matching `values_col` cell.

  If a particular index/column combination never appears in the input, fill that
  cell with `None`. You may assume each index/column pair appears at most once and
  that all three named columns are present in every row.

  Edge cases the tests cover:

  - An empty `"rows"` list returns an empty list `[]`.
  - When a boat lacks a fuel type another boat has, that cell is `None`.
  - Every distinct column value becomes a key on every output row, even when it is
    absent for some rows.

  Example:

  ```python
  spread_rows({
      "rows": [{"boat": "Otter", "fuel": "diesel", "liters": 40},
               {"boat": "Otter", "fuel": "petrol", "liters": 10},
               {"boat": "Wren", "fuel": "diesel", "liters": 25}],
      "index_col": "boat",
      "columns_col": "fuel",
      "values_col": "liters",
  })
  # -> [{"boat": "Otter", "diesel": 40, "petrol": 10},
  #     {"boat": "Wren", "diesel": 25, "petrol": None}]
  ```
