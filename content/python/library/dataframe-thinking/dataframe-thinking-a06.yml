solution_sketch: In one pass record the first-appearance order of index values and column values and store each cell keyed by (index, column); then build one dictionary per index, reading every column with a default of None for absent pairs.
sample_solution: |
  def spread_rows(payload):
      rows = payload["rows"]
      index_col = payload["index_col"]
      columns_col = payload["columns_col"]
      values_col = payload["values_col"]
      index_order = []
      column_order = []
      cells = {}
      for row in rows:
          idx = row[index_col]
          col = row[columns_col]
          if idx not in index_order:
              index_order.append(idx)
          if col not in column_order:
              column_order.append(col)
          cells[(idx, col)] = row[values_col]
      result = []
      for idx in index_order:
          record = {index_col: idx}
          for col in column_order:
              record[col] = cells.get((idx, col))
          result.append(record)
      return result
