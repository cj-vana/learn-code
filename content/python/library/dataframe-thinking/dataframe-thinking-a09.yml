solution_sketch: Copy each row, compute value op scalar for the target column with a small op dispatch, round to 4 places, and collect the copies in order.
sample_solution: |
  def broadcast_scalar_op(payload):
      rows = payload["rows"]
      column = payload["column"]
      op = payload["op"]
      scalar = payload["scalar"]
      result = []
      for row in rows:
          new_row = dict(row)
          value = row[column]
          if op == "add":
              computed = value + scalar
          elif op == "sub":
              computed = value - scalar
          else:
              computed = value * scalar
          new_row[column] = round(computed, 4)
          result.append(new_row)
      return result
hints:
  - level: 1
    text: The same scalar hits every value in the column, so loop the rows once and transform only the target field.
  - level: 2
    text: Copy the row with dict(row) before changing the column so the caller's data is left alone and the other fields ride along untouched.
  - level: 3
    text: Pick the arithmetic by branching on op, then wrap the result in round(computed, 4) so float products like 3 * 1.1 collapse to 3.3 instead of 3.3000000000000003.
