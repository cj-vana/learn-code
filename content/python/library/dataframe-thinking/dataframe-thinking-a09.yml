prompt_markdown: |
  A greenhouse controller stores each sensor reading as a row. To recalibrate a
  whole column at once, the technician applies the same scalar to every value in
  that column — the pure-Python version of a dataframe's *broadcast* (`column op
  scalar` applied down the entire column without an explicit index).

  Write `broadcast_scalar_op(payload)` that takes **one dictionary** with four
  entries:

  - `"rows"`: a list of dictionaries (the readings). Every row contains the target
    column, whose value is a number.
  - `"column"`: the string name of the column to transform.
  - `"op"`: one of `"add"`, `"sub"`, or `"mul"`.
  - `"scalar"`: the number to combine with each value.

  Example call:

  ```python
  broadcast_scalar_op({
      "rows": [{"plot": "p1", "celsius": 18}, {"plot": "p2", "celsius": 21}],
      "column": "celsius",
      "op": "add",
      "scalar": 2,
  })
  # -> [{"plot": "p1", "celsius": 20}, {"plot": "p2", "celsius": 23}]
  ```

  Return a **new list of row dictionaries** in the original order:

  - Each output row is a copy of its input row with the target column replaced by
    the result of `value op scalar` (`"add"` -> `value + scalar`, `"sub"` ->
    `value - scalar`, `"mul"` -> `value * scalar`).
  - **Round each computed value to 4 decimal places.** Rounding an integer result
    leaves it an integer (for example `round(20, 4)` is `20`), so add/sub/mul on
    whole numbers stays whole.
  - All other columns are left exactly as they were.
  - Do not mutate the caller's rows; return fresh dictionaries.
  - If `"rows"` is empty, return an empty list.
