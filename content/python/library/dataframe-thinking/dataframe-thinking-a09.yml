explanation_markdown: |
  Broadcasting is the idea that a single scalar can act on an entire column at once.
  In a real dataframe the loop is hidden inside a vectorized C routine; here you
  write the loop yourself, but the mental model is the same — one operation, applied
  uniformly down the column, with the rest of each row carried along unchanged.

  Two details matter. Copying each row keeps the transform non-destructive, which is
  what lets you treat the result as a new column rather than an edit-in-place. And
  rounding to 4 places tames binary floating point: `3 * 1.1` is stored as
  `3.3000000000000003`, and `round(..., 4)` brings it back to the `3.3` a human
  expects while leaving genuine integers as integers.
common_mistakes:
  - Mutating each input row directly, so the caller's original readings change under them.
  - Forgetting to round, so float operations leak values like 3.3000000000000003 into the output.
  - Accidentally transforming every column instead of only the named one.
