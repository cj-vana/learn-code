function_name: rolling_window_stat
input_mode: function
solution_sketch: Walk each index, emit None while fewer than window values are available, otherwise slice the trailing window and reduce it with the requested statistic, rounding the mean to 4 places.
sample_solution: |
  def rolling_window_stat(payload):
      values = payload["values"]
      window = payload["window"]
      stat = payload["stat"]
      result = []
      for i in range(len(values)):
          if i < window - 1:
              result.append(None)
              continue
          chunk = values[i - window + 1 : i + 1]
          if stat == "sum":
              result.append(sum(chunk))
          elif stat == "mean":
              result.append(round(sum(chunk) / len(chunk), 4))
          elif stat == "min":
              result.append(min(chunk))
          else:
              result.append(max(chunk))
      return result
hints:
  - level: 1
    text: The output is the same length as the input; the only special positions are the early ones where the window has not filled yet.
  - level: 2
