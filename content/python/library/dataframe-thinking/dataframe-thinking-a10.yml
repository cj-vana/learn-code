explanation_markdown: |
  A rolling aggregate answers "over the last `window` observations, what is the
  summary right now?" at every position. The leading `None`s are not an afterthought
  — they encode that the window genuinely has not filled, which is why a dataframe
  puts `NaN` there rather than shrinking the window at the edges.

  The core is a trailing slice: at index `i`, `values[i - window + 1 : i + 1]` is
  exactly the `window` most recent values. Guarding on `i < window - 1` produces the
  leading gaps, and everything after is a plain reduction (`sum`/`min`/`max`) or a
  rounded average. Recomputing the slice each step is O(window) per position; for
  large data a real library keeps a running total instead, but the windowing logic
  you are practicing is identical.
common_mistakes:
  - Shrinking the window at the start (summarizing the first one or two values) instead of emitting None until it fills.
  - Off-by-one slicing that drops the current element or the +1 on the end, so each window is shifted or one element short.
  - Returning a list shorter than the input because the leading None positions were skipped instead of filled.
