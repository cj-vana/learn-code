prompt_markdown: |
  A harbor logs the number of ferry passengers each hour and wants a *rolling*
  summary — the same shape a dataframe produces with `.rolling(window)`: a new
  column, the same length as the original, where each position summarizes the most
  recent `window` values ending at that position.

  Write `rolling_window_stat(payload)` that takes **one dictionary** with three
  entries:

  - `"values"`: a list of numbers (the hourly counts).
  - `"window"`: a positive integer window size.
  - `"stat"`: one of `"sum"`, `"mean"`, `"min"`, or `"max"`.

  Example call:

  ```python
  rolling_window_stat({"values": [4, 7, 2, 9], "window": 2, "stat": "sum"})
  # -> [None, 11, 9, 11]
  ```

  Return a **list the same length as `"values"`**:

  - For a position `i`, the window is the slice of the `window` values ending at
    `i` (that is, `values[i - window + 1 : i + 1]`).
  - Until the window is full — every position `i` where fewer than `window` values
    precede-and-include it (`i < window - 1`) — the output is `None`.
  - Once full, output the chosen statistic over that window: `"sum"`, `"min"`, and
    `"max"` return the plain value; `"mean"` returns the average **rounded to 4
    decimal places**.
  - If `window` is larger than the number of values, every position is `None`.
  - With `window` equal to `1`, each position summarizes only itself.
  - If `"values"` is empty, return an empty list.
starter_code: |
