prompt_markdown: |
  A weather station wants a quick statistical profile of a single column of
  readings — the pure-Python analogue of a dataframe's `describe()` on one numeric
  column.

  Write `describe_column(values)` that takes **one argument**: a list of numbers.

  Example call:

  ```python
  describe_column([2, 4, 6])
  # -> {"count": 3, "mean": 4.0, "std": 1.633, "min": 2, "max": 6}
  ```

  Return a **dictionary** with exactly these keys:

  - `"count"`: how many values there are.
  - `"mean"`: the arithmetic mean, **rounded to 4 decimal places**.
  - `"std"`: the **population** standard deviation (divide the summed squared
    deviations by `count`, not `count - 1`), **rounded to 4 decimal places**.
  - `"min"`: the smallest value (returned as-is, not rounded).
  - `"max"`: the largest value (returned as-is, not rounded).

  Rules for the edges:

  - A single value has a population standard deviation of `0.0`.
  - If the list is **empty**, return
    `{"count": 0, "mean": None, "std": None, "min": None, "max": None}`.
