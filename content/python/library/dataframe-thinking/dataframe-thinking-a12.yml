solution_sketch: Handle the empty list as a special contract, otherwise compute the mean, the population variance from squared deviations, its square root, and the raw min/max, rounding mean and std to 4 places.
sample_solution: |
  import math


  def describe_column(values):
      n = len(values)
      if n == 0:
          return {"count": 0, "mean": None, "std": None, "min": None, "max": None}
      mean = sum(values) / n
      variance = sum((x - mean) ** 2 for x in values) / n
      std = math.sqrt(variance)
      return {
          "count": n,
          "mean": round(mean, 4),
          "std": round(std, 4),
          "min": min(values),
          "max": max(values),
      }
hints:
  - level: 1
    text: Return the fixed empty-list dictionary first, so the rest of the function can assume at least one value.
  - level: 2
    text: The mean is sum(values) / count; the population variance is the average of (x - mean) ** 2 over every value.
  - level: 3
    text: Take math.sqrt of the variance for the standard deviation, round both mean and std to 4 places, and read min and max straight off the list.
