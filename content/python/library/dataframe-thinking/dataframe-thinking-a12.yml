explanation_markdown: |
  A five-number-style summary is the first thing you reach for when meeting a new
  column, and building it by hand pins down decisions a library hides. The mean and
  the raw min/max are straightforward; the subtle choice is the standard deviation.
  This exercise asks for the *population* deviation — squared deviations divided by
  `count`. That is what NumPy's `.std()` returns by default, and it is why a single
  value has deviation `0.0` (there is no spread) rather than being undefined.

  Note the contrast worth remembering: pandas' `DataFrame.describe()` reports the
  *sample* standard deviation (dividing by `count - 1`), so the two ecosystems give
  different numbers on the same data. Handling the empty list as an explicit
  contract — all-`None` with a count of `0` — keeps the function from dividing by
  zero and mirrors how real tooling degrades gracefully on no data.
common_mistakes:
  - Using the sample standard deviation (dividing by count - 1) when the task asked for the population version.
  - Rounding min and max, or forgetting to round mean and std, so the output does not match.
  - Crashing on the empty list instead of returning the specified all-None summary.
