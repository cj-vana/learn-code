prompt_markdown: |
  A bird observatory keeps its field notebook as a list of sighting rows. Before
  sharing the notebook, an editor standardizes one column at a time by applying
  the same transform to every row, the way a data-frame library writes
  `frame["count"] = frame["count"].map(...)`.

  Because the transform must travel as data, it arrives as the name of one of a
  fixed set of operations. Write `apply_column(payload)` that takes a single
  dictionary with four keys:

  - `"rows"`: a list of sighting dictionaries.
  - `"source"`: the column to read from.
  - `"target"`: the column to write the transformed value into (it may equal
    `"source"` to overwrite in place, or be a new column name to add).
  - `"op"`: one of these operation names (given as a string):
    - `"double"`: numeric value times two.
    - `"negate"`: numeric value with its sign flipped.
    - `"abs"`: numeric absolute value.
    - `"upper"`: string value uppercased.
    - `"length"`: the length of the value (for example a string's character
      count).

  Return a **new list** with one dictionary per row. Each output row is a copy of
  the input row with `target` set to `op(row[source])`; every other field is
  carried over unchanged. Do not modify the caller's rows. You may assume
  `"source"` is present in every row and that the value matches the operation's
  expected type.

  Edge cases the tests cover:

  - An empty `"rows"` list returns an empty list `[]`.
  - When `target` differs from `source`, the source column stays and the new
    column is added.

  Example:

  ```python
  apply_column({
      "rows": [{"species": "wren", "count": 3}],
      "source": "count",
      "target": "count",
      "op": "double",
  })
  # -> [{"species": "wren", "count": 6}]
  ```
