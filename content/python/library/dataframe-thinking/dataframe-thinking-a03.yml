tests:
  public:
    - name: empty_notebook
      input: {"rows": [], "source": "count", "target": "count", "op": "double"}
      expected: []
    - name: double_count_in_place
      input: {"rows": [{"species": "wren", "count": 3}, {"species": "gull", "count": 5}, {"species": "tern", "count": 2}], "source": "count", "target": "count", "op": "double"}
      expected: [{"species": "wren", "count": 6}, {"species": "gull", "count": 10}, {"species": "tern", "count": 4}]
    - name: upper_species_in_place
      input: {"rows": [{"species": "wren", "count": 3}, {"species": "gull", "count": 5}], "source": "species", "target": "species", "op": "upper"}
      expected: [{"species": "WREN", "count": 3}, {"species": "GULL", "count": 5}]
  validation:
    - name: length_into_new_column
      input: {"rows": [{"species": "wren", "count": 3}, {"species": "heron", "count": 1}], "source": "species", "target": "letters", "op": "length"}
      expected: [{"species": "wren", "count": 3, "letters": 4}, {"species": "heron", "count": 1, "letters": 5}]
    - name: negate_into_new_column
      input: {"rows": [{"species": "owl", "count": 4}, {"species": "hawk", "count": 6}], "source": "count", "target": "delta", "op": "negate"}
      expected: [{"species": "owl", "count": 4, "delta": -4}, {"species": "hawk", "count": 6, "delta": -6}]
    - name: abs_overwrite_negatives
      input: {"rows": [{"species": "owl", "trend": -2}, {"species": "hawk", "trend": 3}], "source": "trend", "target": "trend", "op": "abs"}
      expected: [{"species": "owl", "trend": 2}, {"species": "hawk", "trend": 3}]
    - name: single_row_double
      input: {"rows": [{"species": "tern", "count": 7}], "source": "count", "target": "count", "op": "double"}
      expected: [{"species": "tern", "count": 14}]
explanation_markdown: |
  A column map applies the same operation to every row's value in one pass, which
  is the pure-Python shape of a vectorized `.map()` or `.apply()` over a single
  column. Because the operation must be passed as data, you decode its name into a
  concrete function once, then reuse it row by row rather than embedding a switch
  in the loop body.

  Copying each row with `dict(row)` before writing `target` is the load-bearing
  step: it preserves the other columns and guarantees the caller's original rows
  are untouched, so a transform that writes into a new column simply grows the
  table while overwriting `source` leaves the width unchanged.
common_mistakes:
  - Mutating each row in place (assigning row[target] = ...) so the caller's original rows change too.
  - Building each output row from only the source and target keys, dropping the other columns.
  - Applying the operation to the wrong field by reading target instead of source when computing the value.
