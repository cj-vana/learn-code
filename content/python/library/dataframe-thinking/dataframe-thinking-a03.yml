function_name: apply_column
input_mode: function
solution_sketch: Map each op name to a one-argument transform, then for every row make a shallow copy, overwrite the target key with the transform of the source value, and collect the copies.
sample_solution: |
  def apply_column(payload):
      rows = payload["rows"]
      source = payload["source"]
      target = payload["target"]
      transforms = {
          "double": lambda x: x * 2,
          "negate": lambda x: -x,
          "abs": lambda x: abs(x),
          "upper": lambda x: x.upper(),
          "length": lambda x: len(x),
      }
      transform = transforms[payload["op"]]
      result = []
      for row in rows:
          new_row = dict(row)
          new_row[target] = transform(row[source])
          result.append(new_row)
      return result
