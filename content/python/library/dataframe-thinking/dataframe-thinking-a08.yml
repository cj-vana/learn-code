explanation_markdown: |
  A left join keeps the left table intact and decorates it with columns pulled from
  a lookup. The clean implementation separates two concerns: which directory row
  matches a key (a `key -> row` index, first occurrence wins), and which columns to
  add (the directory's non-key fields, captured once in a stable order so every
  output row — matched or not — has the same shape).

  Copying the left row before writing keeps the caller's data untouched, and
  writing the directory columns after the copy is what makes the right side win on
  shared fields. Unmatched rows are not dropped; they simply receive the fill value
  in every directory column, which is exactly how a dataframe left-merge marks the
  gaps (there it would be `NaN`; here you choose the sentinel).
common_mistakes:
  - Dropping unmatched left rows, which turns the left join back into an inner join.
  - Letting a later duplicate directory row overwrite the first, instead of keeping the first occurrence.
  - Giving matched and unmatched rows different column sets, so the output table has ragged, inconsistent keys.
