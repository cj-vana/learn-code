solution_sketch: Scan the directory once to record the first row per key and the ordered list of non-key columns, then copy each left row and, for every directory column, write the matched value or the fill when there is no match.
sample_solution: |
  def left_join(payload):
      left = payload["left"]
      right = payload["right"]
      key = payload["key"]
      fill = payload["fill"]
      index = {}
      columns = []
      for row in right:
          k = row[key]
          if k not in index:
              index[k] = row
          for col in row:
              if col != key and col not in columns:
                  columns.append(col)
      result = []
      for row in left:
          merged = dict(row)
          match = index.get(row[key])
          for col in columns:
              if match is not None and col in match:
                  merged[col] = match[col]
              else:
                  merged[col] = fill
          result.append(merged)
      return result
