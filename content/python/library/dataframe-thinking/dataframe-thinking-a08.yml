prompt_markdown: |
  A farmers market records a **sales** table (one row per sale) and keeps a small
  **stall directory** used as a lookup. The clerk wants every sales row kept, with
  the matching stall details attached — the shape of a *left join* against a lookup
  table.

  Write `left_join(payload)` that takes **one dictionary** with four entries:

  - `"left"`: a list of dictionaries (the sales rows). Every row has the key field.
  - `"right"`: a list of dictionaries (the stall directory). Every directory row
    has the key field, and **all directory rows share the same set of columns**.
  - `"key"`: the string name of the field to join on.
  - `"fill"`: the value to use for a directory column when a sales row has no match.

  Example call:

  ```python
  left_join({
      "left": [{"stall": "A", "qty": 3}, {"stall": "Z", "qty": 9}],
      "right": [{"stall": "A", "vendor": "Rosa"}],
      "key": "stall",
      "fill": "unknown",
  })
  # -> [{"stall": "A", "qty": 3, "vendor": "Rosa"},
  #     {"stall": "Z", "qty": 9, "vendor": "unknown"}]
  ```

  Return a **list of merged dictionaries**, one per left row, in left-row order:

  - The directory columns are every field on the directory rows **except** the key,
    in the order they first appear while scanning the directory top to bottom.
  - Build the lookup so that if a key value appears in several directory rows, the
    **first** occurrence is the one used.
  - For a left row whose key value is in the directory, attach each directory
    column from the matched row; on any field the two rows share, the **right
    (directory) value wins**.
  - For a left row with no match, attach every directory column set to `"fill"`.
  - Every left row is kept, even unmatched ones.
  - If the directory is empty there are no directory columns, so each output row is
    just a copy of its left row.
  - If the left list is empty, return an empty list.
