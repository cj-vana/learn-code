explanation_markdown: |
  A context prefix is only useful if it is stable and unambiguous, and both
  properties come from small, deliberate choices. Sorting the keys means the same
  context always renders the same way, so operators can eyeball two lines and compare
  them without the fields shuffling around.

  The rendering order matters more than it looks. Because `bool` is a subclass of
  `int` in Python, `str(True)` gives `"True"` -- so you must check for booleans
  *before* falling back to `str`, and spell them `true`/`false` yourself. `None`
  gets the same explicit treatment as `null`. The quoting rule is what keeps the
  prefix parseable: a value with a space would otherwise look like two separate
  fields, and an empty value would vanish entirely, so both get wrapped in double
  quotes to mark their boundaries. Everything else stays bare to keep the line short.
common_mistakes:
  - Iterating the dict in insertion order instead of sorting the keys, so the prefix is unstable across runs.
  - Letting str render booleans, producing True/False with capital letters instead of the lowercase true/false.
  - Forgetting to quote an empty or space-containing value, which makes the prefix ambiguous or silently drops the field.
