  - level: 2
    text: Render bools as lowercase true/false and None as null before anything else, because a bool is also an int in Python and str would give True/False.
  - level: 3
    text: After rendering, wrap the text in double quotes when it is empty or has a space, then join the key=value pieces with single spaces inside square brackets.
