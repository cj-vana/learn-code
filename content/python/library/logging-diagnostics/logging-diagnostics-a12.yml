prompt_markdown: |
  Every log line the container-tracking gateway emits is stamped with a compact
  context prefix so operators can tell which request produced it -- something like
  `[req=abc user=1]`. Build that prefix from a dict of context fields.

  Write `build_context_prefix(context)`. The single argument is a dict mapping field
  names to values. Return the prefix string.

  Rules:

  - List the fields in **alphabetical order of their keys**, so the prefix is stable
    no matter what order the dict was built in.
  - Render each value into text:
    - `True` becomes `true` and `False` becomes `false` (lowercase).
    - `None` becomes `null`.
    - Any other value uses its plain string form, e.g. `1` becomes `1` and `1.5`
      becomes `1.5`.
  - After rendering, if a value's text is **empty** or **contains a space**, wrap it
    in double quotes. Otherwise leave it bare.
  - Join the `key=value` pairs with single spaces and enclose the whole thing in
    square brackets: `[key1=value1 key2=value2]`.
  - An empty context dict returns `"[]"`.

  Edge cases the tests cover: booleans and `None`; a value containing a space; an
  empty-string value; a numeric value; and keys given out of order.
starter_code: |
  def build_context_prefix(context):
      # Return a stable "[key=value ...]" prefix built from the context dict.
      return "[]"
function_name: build_context_prefix
input_mode: function
solution_sketch: >-
  Sort the keys, render each value (bools and None as words, else str), quote the
  rendered text when it is empty or contains a space, then join key=value pairs with
  spaces inside square brackets.
sample_solution: |
  def _render(value):
      if isinstance(value, bool):
          text = "true" if value else "false"
      elif value is None:
          text = "null"
      else:
          text = str(value)
      if text == "" or " " in text:
          text = '"' + text + '"'
      return text


  def build_context_prefix(context):
      pairs = [f"{key}={_render(context[key])}" for key in sorted(context)]
      return "[" + " ".join(pairs) + "]"
hints:
  - level: 1
