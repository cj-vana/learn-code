prompt_markdown: |
  When a telescope at the observatory faults, the control software hands the
  diagnostics desk a small record describing what went wrong. Your job is to
  render that record into the plain-text block that gets written to the fault
  journal.

  Write `format_exception_log(report)`. The single argument is a dict with two
  keys:

  - `"error"` -- a dict describing the fault (details below).
  - `"include_frames"` -- a bool. When `True`, include each error's captured
    call-stack frames; when `False`, omit all frame lines.

  An **error dict** has:

  - `"type"` -- the exception type name, e.g. `"ValueError"` (a string).
  - `"message"` -- the message string (may be empty).
  - `"frames"` -- optional list of frames, outermost call first. Each frame is a
    dict `{"func": <name>, "file": <name>, "line": <int>}`. The key may be
    absent, meaning no frames were captured.
  - `"cause"` -- optional error dict (same shape) describing the earlier error
    that triggered this one. It may itself carry a `"cause"`, nesting to any
    depth.

  Build the block line by line and return the lines joined with `"\n"` (no
  trailing newline):

  1. A header line `"{type}: {message}"`.
  2. If `include_frames` is `True`, one line per frame in the order given, each
     formatted exactly as `"  at {func} ({file}:{line})"` (two leading spaces).
     If `include_frames` is `False`, or the error has no frames, add none.
  3. If the error has a `"cause"`, add a line that is exactly `"Caused by:"`,
     then append the full rendering of the cause using the same rules and the
     same `include_frames` flag.

  Edge cases the tests cover: an error with no `"frames"` key; frames present but
  `include_frames` is `False`; an empty message string (the header still ends
  `": "`); and a cause chain two levels deep.
