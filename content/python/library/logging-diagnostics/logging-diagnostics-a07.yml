function_name: format_exception_log
input_mode: function
solution_sketch: >-
  Render one error into a list of lines (header, optional frame lines, then a
  "Caused by:" marker followed by the recursively rendered cause), reading the
  include_frames flag from the outer report, and join the accumulated lines with
  newlines.
sample_solution: |
  def format_exception_log(report):
      include_frames = report.get("include_frames", False)

      def render(error):
          lines = ["{}: {}".format(error["type"], error["message"])]
          if include_frames:
              for frame in error.get("frames", []):
                  lines.append(
                      "  at {} ({}:{})".format(frame["func"], frame["file"], frame["line"])
                  )
          if "cause" in error:
              lines.append("Caused by:")
              lines.extend(render(error["cause"]))
          return lines

      return "\n".join(render(report["error"]))
