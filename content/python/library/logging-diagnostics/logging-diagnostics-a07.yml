tests:
  public:
    - name: header_only
      input:
        error: {type: ValueError, message: reading out of range}
        include_frames: true
      expected: "ValueError: reading out of range"
    - name: with_frames
      input:
        error:
          type: IOError
          message: dome shutter stuck
          frames:
            - {func: open_dome, file: dome.py, line: 12}
            - {func: step_motor, file: dome.py, line: 30}
        include_frames: true
      expected: "IOError: dome shutter stuck\n  at open_dome (dome.py:12)\n  at step_motor (dome.py:30)"
    - name: frames_suppressed
      input:
        error:
          type: IOError
          message: dome shutter stuck
          frames:
            - {func: open_dome, file: dome.py, line: 12}
        include_frames: false
      expected: "IOError: dome shutter stuck"
  validation:
    - name: cause_no_frames
      input:
        error:
          type: RuntimeError
          message: exposure aborted
          cause: {type: ValueError, message: bad row}
        include_frames: false
      expected: "RuntimeError: exposure aborted\nCaused by:\nValueError: bad row"
    - name: cause_with_frames
      input:
        error:
          type: RuntimeError
          message: outer
          frames:
            - {func: run_job, file: job.py, line: 5}
          cause:
            type: KeyError
            message: missing sensor id
            frames:
              - {func: lookup, file: db.py, line: 88}
        include_frames: true
      expected: "RuntimeError: outer\n  at run_job (job.py:5)\nCaused by:\nKeyError: missing sensor id\n  at lookup (db.py:88)"
    - name: nested_cause_depth_two
      input:
        error:
          type: ChartError
          message: one
          cause:
            type: SolveError
            message: two
            cause: {type: MathError, message: three}
        include_frames: false
      expected: "ChartError: one\nCaused by:\nSolveError: two\nCaused by:\nMathError: three"
    - name: empty_message
      input:
        error: {type: ValueError, message: ''}
        include_frames: true
      expected: "ValueError: "
explanation_markdown: |
  The clean way to build a multi-line block is to collect a list of lines and
  join them once at the end. That avoids the fiddly bookkeeping of tracking where
  newlines go while you concatenate.

  Because a fault can be "caused by" an earlier fault, and that one by another,
  the structure is recursive: rendering an error means rendering its header,
  maybe its frames, and -- if a cause is present -- the marker line plus the
  rendering of that cause under the very same rules. A helper that returns the
  list of lines for one error, and calls itself on `error["cause"]`, expresses
  that directly. The `include_frames` flag is read once from the outer report and
  captured by the closure, so every level of the chain honours the same choice
  without threading it through each call by hand.

  The frame lines are the only part gated by the flag. The header always appears,
  and the `"Caused by:"` marker with its nested error always appears when a cause
  exists -- a suppressed stack trace should never hide the fact that one failure
  triggered another.
common_mistakes:
  - Gluing the block together with "+=" and stray "\n" characters, which makes a leading or trailing blank line easy to introduce.
  - Handling only one level of "cause" with an if-check instead of recursing, so a two-deep chain loses its innermost error.
  - Letting include_frames also hide the "Caused by:" line or the cause itself, instead of gating only the frame lines.
