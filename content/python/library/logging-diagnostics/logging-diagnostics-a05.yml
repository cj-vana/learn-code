explanation_markdown: |
  Redaction is a trust-boundary operation: the record is fine inside the terminal
  but must be sanitized before it crosses into logs that other systems (or people)
  can read. Doing it recursively matters because structured records nest — a token
  hidden two levels deep is exactly the one a naive top-level scrub would leak.
  Checking the sensitive set *before* recursing is deliberate: when a whole subtree
  is sensitive (a `creds` block, say), you mask the entire branch rather than
  descending into it, so you never have to enumerate every secret field inside.
  Building a fresh dict on the way down keeps the original record unmodified, which
  is what lets the caller keep working with the real values after logging the safe
  copy.
common_mistakes:
  - Mutating the incoming record in place, so the caller's real values are destroyed after logging.
  - Recursing into a sensitive subtree instead of masking it whole, which can re-expose fields the caller wanted hidden.
  - Only checking top-level keys, leaving secrets nested inside child dicts unmasked.
