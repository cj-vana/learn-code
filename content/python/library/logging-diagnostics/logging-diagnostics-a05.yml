prompt_markdown: |
  A passenger ferry writes structured boarding records, but before those records
  leave the terminal they must have sensitive fields masked. Write
  `redact_sensitive_fields(request)` where `request` is a dict with keys `entry`
  (a structured log record, a possibly-nested dict) and `sensitive` (a list of
  key names to mask).

  Return a **new** record (do not mutate `entry`) built by these rules, applied to
  the top-level dict and to every nested dict:

  - If a key is in `sensitive`, replace its value with the string `"***"`,
    whatever the value was — including if the value is itself a dict. A sensitive
    key hides its entire subtree.
  - Otherwise, if the value is a dict, redact it recursively by the same rules.
  - Otherwise, copy the value unchanged.

  Key matching is exact and case-sensitive. Values that are lists or scalars are
  treated as ordinary values (copied unchanged unless their key is sensitive).
  `sensitive` may be empty, in which case the record is copied verbatim.
starter_code: |
  def redact_sensitive_fields(request):
      # Return a new record with sensitive keys masked as "***", recursing into nested dicts.
      return {}
function_name: redact_sensitive_fields
input_mode: function
solution_sketch: Recurse over the record building a fresh dict; a sensitive key becomes "***", a nested dict is scrubbed recursively, and everything else is copied.
sample_solution: |
  def redact_sensitive_fields(request):
      sensitive = set(request["sensitive"])

      def scrub(record):
          out = {}
          for key, value in record.items():
              if key in sensitive:
                  out[key] = "***"
              elif isinstance(value, dict):
                  out[key] = scrub(value)
              else:
                  out[key] = value
          return out

      return scrub(request["entry"])
hints:
  - level: 1
