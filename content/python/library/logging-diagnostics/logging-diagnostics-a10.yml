explanation_markdown: |
  Filtering by severity is the everyday version of what a handler's level does:
  entries below the bar are dropped, the rest pass through untouched. Resolving the
  threshold once, before the loop, is the key efficiency and clarity move -- you turn
  a name into a number a single time and then compare numbers, rather than re-parsing
  the threshold on every entry.

  A tiny normalization helper (strip, upper-case, look up) keeps the casing and alias
  rules in one place, so `"error"` and `"  Error "` behave identically and `WARN`
  lines up with `WARNING`. Defaulting an unrecognized name to `0` is a deliberate
  choice: a mystery severity should not silently jump above your threshold, so it
  sinks to the bottom and only survives a `NOTSET` bar. Appending the original entry
  object -- not a rebuilt copy -- is what guarantees extra keys like a `code` ride
  along unchanged.
common_mistakes:
  - Comparing the raw level strings instead of their numeric values, so ordering becomes alphabetical and WARNING sorts below INFO.
  - Re-resolving the threshold name inside the loop, or worse, comparing each entry against a string threshold.
  - Rebuilding kept entries as fresh dicts and dropping their extra keys instead of passing the original entry through.
