prompt_markdown: |
  The morning crew in a mountain cable-car control room does not want to read every
  routine tick from the overnight log -- only entries at or above a chosen severity.

  Write `filter_logs_by_level(request)`. The single argument is a dict with:

  - `"entries"` -- a list of log entries in the order they were recorded. Each entry
    is a dict that always has a `"level"` name and a `"message"`, and may carry extra
    keys you must leave untouched.
  - `"min_level"` -- the threshold severity name.

  Return a new list containing the entries whose level is **at or above** the
  threshold, in their original order. Keep each kept entry exactly as it was.

  Resolve severity names to numbers with the canonical map:

  ```
  NOTSET=0  DEBUG=10  INFO=20  WARNING=30  ERROR=40  CRITICAL=50
  ```

  Naming rules:

  - Level names are case-insensitive and may carry stray whitespace: `"error"`,
    `"ERROR"`, and `"  Error "` all mean `40`.
  - Honor the aliases `"WARN"` (= `30`) and `"FATAL"` (= `50`) wherever a level name
    appears, including in `"min_level"`.
  - An entry whose level name is **not** recognized counts as level `0`, so it is
    kept only when the threshold itself resolves to `0`.

  Edge cases the tests cover: an empty entry list; mixed-case and aliased names;
  an unrecognized level treated as the lowest rung; and extra keys preserved on kept
  entries.
starter_code: |
  def filter_logs_by_level(request):
      # Return the entries whose level is at or above request["min_level"].
      return []
function_name: filter_logs_by_level
input_mode: function
solution_sketch: >-
  Build a normalized name-to-number map, resolve the threshold once, then keep each
  entry whose resolved level is greater than or equal to that threshold, defaulting
  unknown names to 0.
sample_solution: |
  LEVELS = {
      "NOTSET": 0,
      "DEBUG": 10,
      "INFO": 20,
      "WARNING": 30,
      "WARN": 30,
      "ERROR": 40,
      "CRITICAL": 50,
      "FATAL": 50,
  }


  def _level_value(name):
      return LEVELS.get(name.strip().upper(), 0)


  def filter_logs_by_level(request):
      threshold = _level_value(request["min_level"])
      return [
          entry
          for entry in request["entries"]
          if _level_value(entry["level"]) >= threshold
      ]
hints:
  - level: 1
    text: Resolve the threshold name to a number once, before you loop, so you are comparing numbers to numbers.
  - level: 2
    text: Write a small helper that normalizes a level name (strip, upper-case) and looks it up, defaulting unknown names to 0.
  - level: 3
    text: Keep an entry when its resolved level is greater than or equal to the threshold, and append the entry unchanged so its extra keys survive.
