prompt_markdown: |
  A fish cannery configures a chain of named loggers, from a specific machine up
  through its department to the plant-wide root. Each logger has a **threshold
  name**, and `NOTSET` means "no threshold of my own — inherit from further up".

  Write `effective_level(chain)` where `chain` is a list of threshold-name
  strings ordered from the logger itself first, then each ancestor, ending with
  the root. Return the resolved **numeric** effective level using this fixed
  mapping:

  ```
  NOTSET=0  DEBUG=10  INFO=20  WARNING=30  ERROR=40  CRITICAL=50
  ```

  Resolution rule (this mirrors how the standard `logging` module's
  `getEffectiveLevel` works): walk the chain from the front, and return the
  numeric value of the **first name that is not `NOTSET`**. If every entry in the
  chain is `NOTSET`, return `30` — the root logger defaults to `WARNING` even when
  nothing overrides it.

  You may assume every name in `chain` is one of the six names above and that
  `chain` has at least one entry.
starter_code: |
  LEVELS = {"NOTSET": 0, "DEBUG": 10, "INFO": 20, "WARNING": 30, "ERROR": 40, "CRITICAL": 50}


  def effective_level(chain):
      # Return the numeric level of the first non-NOTSET name, else 30 (root default WARNING).
      return 0
function_name: effective_level
input_mode: function
solution_sketch: Walk the chain front-to-back returning the numeric value of the first name that is not NOTSET; if none, return 30.
sample_solution: |
  LEVELS = {"NOTSET": 0, "DEBUG": 10, "INFO": 20, "WARNING": 30, "ERROR": 40, "CRITICAL": 50}


  def effective_level(chain):
      for name in chain:
          if name != "NOTSET":
              return LEVELS[name]
      return 30
hints:
  - level: 1
    text: The logger itself comes first in the chain, so scan from the front and stop at the first real threshold.
  - level: 2
    text: A name of "NOTSET" means "keep looking upward"; any other name is the answer and you return its numeric value immediately.
  - level: 3
    text: If the loop finishes without finding a non-NOTSET name, the whole chain inherited nothing, so fall back to 30 for the root's default WARNING.
