explanation_markdown: |
  A logger's *effective* level is rarely its own configured level — most loggers
  are left at `NOTSET` on purpose so they inherit a threshold set once, higher up.
  Resolving it is a walk toward the root that stops at the first logger that
  actually pinned a level. Because the front of the chain is the most specific
  logger, scanning front-to-back returns the nearest override, which is exactly
  the precedence real code relies on. The `WARNING` fallback is not magic: the
  root logger is constructed at `WARNING`, so a chain that never overrides
  anything still resolves to `30`. Returning as soon as you find a real level also
  means you never look at ancestors that can't affect the result.
common_mistakes:
  - Walking the chain from the root end first, which returns the least specific level instead of the nearest override.
  - Treating NOTSET (0) as a valid threshold and returning 0 instead of continuing up the chain.
  - Forgetting the all-NOTSET case and returning 0, when the root's default WARNING makes the answer 30.
