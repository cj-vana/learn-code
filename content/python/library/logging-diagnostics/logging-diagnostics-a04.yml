function_name: build_structured_log_entry
input_mode: function
solution_sketch: Compute level/levelno/message into the result, then loop extra adding only keys that are not one of the three reserved names.
sample_solution: |
  LEVELS = {"NOTSET": 0, "DEBUG": 10, "INFO": 20, "WARNING": 30, "ERROR": 40, "CRITICAL": 50}


  def build_structured_log_entry(entry):
      level = entry["level"].upper()
      result = {"level": level, "levelno": LEVELS[level], "message": entry["message"]}
      reserved = {"level", "levelno", "message"}
      for key, value in entry["extra"].items():
          if key not in reserved:
              result[key] = value
      return result
