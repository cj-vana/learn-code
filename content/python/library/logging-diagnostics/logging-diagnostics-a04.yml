explanation_markdown: |
  Structured logging keeps records queryable by giving every field a stable name
  and type, which is why the reserved fields are computed rather than trusted from
  the caller. The `extra` dict is genuinely useful — it is how you attach a request
  id or a device number to a record — but if it could overwrite `message` or
  `levelno`, a single careless caller (or a crafted input) could disguise the true
  severity of an event. The standard library takes the same stance: `logging`
  raises if `extra` collides with a reserved `LogRecord` attribute. Here you defend
  the record by checking each incoming key against a reserved set and letting the
  computed values win.
common_mistakes:
  - Merging extra first and the reserved fields second (or vice versa) without guarding, so one silently overwrites the other.
  - Looking up the level number before uppercasing, so a lowercase name misses the mapping.
  - Building levelno from the raw name instead of the normalized one, giving inconsistent level and levelno pairs.
