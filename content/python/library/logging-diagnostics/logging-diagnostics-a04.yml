prompt_markdown: |
  An observatory ships structured (JSON-style) log records so downstream tools can
  query them by field. Write `build_structured_log_entry(entry)` where `entry` is
  a dict with keys `level` (a severity name, in any letter case), `message` (a
  string), and `extra` (a dict of caller-supplied fields to attach).

  Return a single flat dict built like this:

  - `level`: the severity name normalized to **uppercase** (`"info"` becomes
    `"INFO"`).
  - `levelno`: the numeric level for that name, using
    `NOTSET=0 DEBUG=10 INFO=20 WARNING=30 ERROR=40 CRITICAL=50`.
  - `message`: the message string unchanged.
  - Every key/value pair from `extra`, merged in at the top level — **except** that
    `extra` must never overwrite the three reserved keys above. If `extra`
    contains `level`, `levelno`, or `message`, ignore that pair and keep the
    computed value.

  You may assume `level` (once uppercased) is one of the six names. `extra` may be
  empty.
starter_code: |
  LEVELS = {"NOTSET": 0, "DEBUG": 10, "INFO": 20, "WARNING": 30, "ERROR": 40, "CRITICAL": 50}


