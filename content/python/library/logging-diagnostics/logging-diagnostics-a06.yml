prompt_markdown: |
  A rail-yard control system names its loggers hierarchically with dots, like
  `yard.switch.north`, whose parent is `yard.switch`, whose parent is `yard`,
  whose parent is the **root** logger (the empty-string name `""`). Write
  `merge_logger_hierarchy_levels(levels)` where `levels` is a dict mapping each
  configured logger name to its threshold name.

  Return a new dict with the **same keys**, mapping each logger name to its
  resolved **numeric** effective level, using
  `NOTSET=0 DEBUG=10 INFO=20 WARNING=30 ERROR=40 CRITICAL=50`.

  To resolve one logger, walk from that logger up through its dotted ancestors and
  finally the root `""`. Return the numeric value of the **first ancestor that is
  present in `levels` with a threshold other than `NOTSET`**. Rules for the walk:

  - The ancestors of `a.b.c` are, in order: `a.b.c`, `a.b`, `a`, `""`.
  - An ancestor name that is **not a key** in `levels` is skipped (it configures
    nothing), and so is any ancestor whose threshold is `NOTSET`.
  - If the walk reaches the root with nothing found — including when the root is
    absent or itself `NOTSET` — the effective level is `30`, because the root
    logger defaults to `WARNING`.

  Every threshold name in `levels` is one of the six names above.
