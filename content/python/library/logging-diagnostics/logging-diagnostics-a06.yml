explanation_markdown: |
  This is how a real logging hierarchy resolves thresholds: the dot in a logger
  name *is* the parent link, so `yard.switch.north` inherits from `yard.switch`
  from `yard` from the root unless one of them pins a level. Generating the
  ancestor chain by trimming after the last dot mirrors that parent walk exactly,
  and stopping at the first present, non-`NOTSET` ancestor gives you the nearest
  override — the same precedence `getEffectiveLevel` uses. Two details keep it
  faithful: ancestors that were never configured are simply absent from the dict
  and must be skipped rather than treated as errors, and the walk always ends at
  the root's default `WARNING`, so a subtree that inherits everything still lands
  at `30`. Because each logger is resolved independently, sibling branches never
  interfere with one another.
common_mistakes:
  - Splitting on the first dot instead of the last, which climbs the tree in the wrong direction and skips real ancestors.
  - Crashing on an ancestor name that is not a key in levels, instead of skipping unconfigured intermediate loggers.
  - Forgetting the implicit root, so a logger whose ancestors are all NOTSET or absent resolves to 0 rather than 30.
