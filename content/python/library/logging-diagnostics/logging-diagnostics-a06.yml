      return {}
function_name: merge_logger_hierarchy_levels
input_mode: function
solution_sketch: For each name, generate the ancestor chain by trimming the last dotted segment down to the root "", and return the first present non-NOTSET threshold as a number, defaulting to 30.
sample_solution: |
  LEVELS = {"NOTSET": 0, "DEBUG": 10, "INFO": 20, "WARNING": 30, "ERROR": 40, "CRITICAL": 50}


  def merge_logger_hierarchy_levels(levels):
      def ancestors(name):
          chain = [name]
          while "." in chain[-1]:
              chain.append(chain[-1].rsplit(".", 1)[0])
          if chain[-1] != "":
              chain.append("")
          return chain

      def resolve(name):
          for ancestor in ancestors(name):
              threshold = levels.get(ancestor)
              if threshold is not None and threshold != "NOTSET":
                  return LEVELS[threshold]
          return 30

      return {name: resolve(name) for name in levels}
