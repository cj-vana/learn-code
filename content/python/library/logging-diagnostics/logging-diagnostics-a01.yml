prompt_markdown: |
  A lighthouse keeper records watch events to a single-line log. Write
  `format_log_message(entry)` where `entry` is a dict with keys `level` (a string
  such as `WARNING`), `message` (a string), and `context` (a dict of extra
  key/value pairs describing the event).

  Build and return one string in this exact shape:

  - Start with the level in square brackets, a space, then the message:
    `"[WARNING] fog rolling in"`.
  - If `context` is non-empty, append one space, an opening parenthesis, the
    context pairs, and a closing parenthesis. Each pair is written `key=value`,
    the pairs are joined by single spaces, and the keys appear in **sorted
    (alphabetical) order** so the output is deterministic:
    `"[WARNING] fog rolling in (bearing=SW visibility=200)"`.
  - If `context` is empty, append nothing after the message.

  Values in `context` may be strings or numbers; convert each value with `str`.
  You may assume `level` and `message` are always non-empty strings.
starter_code: |
  def format_log_message(entry):
      # Build "[LEVEL] message" and append " (k=v k=v)" with sorted keys when context is present.
      return ""
function_name: format_log_message
input_mode: function
solution_sketch: Format the "[level] message" head, then if context is non-empty join sorted "key=value" pairs inside parentheses and append them.
sample_solution: |
  def format_log_message(entry):
      head = "[" + entry["level"] + "] " + entry["message"]
      context = entry["context"]
      if not context:
          return head
      pairs = " ".join(f"{key}={context[key]}" for key in sorted(context))
      return f"{head} ({pairs})"
hints:
  - level: 1
    text: The head of the line is always "[" + level + "] " + message; only the context tail is conditional.
  - level: 2
    text: Iterate the context keys with sorted(context) so the pairs come out in alphabetical order every run.
  - level: 3
    text: Build each pair as f"{key}={context[key]}", join them with single spaces, and wrap the joined string in parentheses.
tests:
  public:
    - name: with_context
      input:
        level: WARNING
        message: fog rolling in
        context: {bearing: SW, visibility: 200}
      expected: '[WARNING] fog rolling in (bearing=SW visibility=200)'
    - name: empty_context
