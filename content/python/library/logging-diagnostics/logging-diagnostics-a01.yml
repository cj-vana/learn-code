      expected: '[INFO] tide is coming in fast'
explanation_markdown: |
  A log formatter turns structured fields into one predictable line. The head is
  unconditional, so it is built first. The context tail is where determinism
  matters: dictionaries preserve insertion order, but a log line should not change
  just because two callers happened to build the same dict in a different order.
  Sorting the keys with `sorted(context)` pins the output so the same event always
  renders identically, which is what makes logs greppable and diffable. Converting
  each value inside the f-string (`{context[key]}`) coerces numbers to text for
  free, so a mixed dict of strings and ints still formats cleanly.
common_mistakes:
  - Iterating the context in insertion order instead of sorted order, so equal events can render differently.
  - Emitting the parentheses even when context is empty, leaving a stray " ()" at the end of the line.
  - Forgetting to convert numeric values to text, which fails when concatenating rather than using an f-string.
