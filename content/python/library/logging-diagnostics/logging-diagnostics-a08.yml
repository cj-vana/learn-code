function_name: rate_limit_log_decision
input_mode: function
solution_sketch: >-
  Keep a list of the seconds you actually broadcast. For each attempt at t, count
  how many recorded seconds satisfy s > t - window; if that count is below
  max_count, append True and record t, else append False.
sample_solution: |
  def rate_limit_log_decision(request):
      timestamps = request["timestamps"]
      window = request["window"]
      max_count = request["max_count"]

      broadcast_at = []
      decisions = []
      for t in timestamps:
          recent = sum(1 for s in broadcast_at if s > t - window)
          if recent < max_count:
              decisions.append(True)
              broadcast_at.append(t)
          else:
              decisions.append(False)
      return decisions
hints:
