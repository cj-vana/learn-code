explanation_markdown: |
  This is a sliding-window rate limiter, the same shape real logging throttles use
  to keep one noisy event from drowning a channel. The trick that makes it
  deterministic here is that the window is measured only against attempts that were
  actually broadcast: suppressed attempts add nothing, so the state you carry is
  just the list of seconds you spoke.

  For each attempt you re-count how many recorded seconds still fall inside the
  trailing window, using the strict test `s > t - window`. Because the attempts
  arrive in non-decreasing order, every recorded second is at or before `t`, so the
  count is exactly the window's current occupancy. Broadcasting only when that
  occupancy is below `max_count` guarantees no window ever holds more than the
  limit, and recording the second you broadcast is what lets later attempts see it.

  A `max_count` of `0` can never be strictly greater than the occupancy, so the
  bridge stays silent -- a clean way to mute a source entirely. A wide gap lets the
  old broadcasts age out of the window, which reopens the channel without any real
  clock ever ticking.
common_mistakes:
  - Counting every attempt toward the window instead of only the ones actually broadcast, which over-throttles after a run of suppressions.
  - Using s greater-than-or-equal to t minus window instead of the strict greater-than, which shifts the window boundary by one second.
  - Forgetting to record the second when you broadcast, so the limiter never sees its own recent broadcasts and lets everything through.
