  - level: 2
    text: For each attempt at second t, count how many recorded broadcast seconds s satisfy s greater than t minus window. That count is how full the window already is.
  - level: 3
    text: Broadcast when that count is strictly less than max_count, and only then append t to your record. A max_count of 0 makes the count never less than it, so nothing is sent.
