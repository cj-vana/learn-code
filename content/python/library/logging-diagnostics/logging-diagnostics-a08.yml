prompt_markdown: |
  The harbor's automated radio bridge wants to warn passing vessels about a hazard,
  but it must not flood channel 16. It throttles itself: within any trailing window
  of `window` seconds it will send at most `max_count` broadcasts.

  Write `rate_limit_log_decision(request)`. The single argument is a dict with:

  - `"timestamps"` -- a list of integer seconds, one per broadcast **attempt**, in
    non-decreasing order (an attempt is the moment the bridge would like to speak).
  - `"window"` -- the window length in seconds (a non-negative int).
  - `"max_count"` -- the most broadcasts allowed inside any one window (a
    non-negative int).

  Process the attempts left to right and return a list of booleans the same length
  as `"timestamps"`: `True` where that attempt is **broadcast**, `False` where it is
  **suppressed**.

  The rule for an attempt at second `t`:

  - Only attempts that were actually **broadcast** count toward the limit;
    suppressed ones leave no trace.
  - A previously broadcast attempt at second `s` is **inside the window** of `t`
    exactly when `s > t - window`.
  - Broadcast the current attempt only if the number of already-broadcast attempts
    inside its window is **strictly less than** `max_count`. Otherwise suppress it.
  - When you broadcast, record `t` so it counts toward later attempts.

  Edge cases the tests cover: an empty attempt list (returns `[]`); `max_count` of
  `0` (everything is suppressed); several attempts sharing the same second; and a
  burst that fills the window followed by a quiet gap that reopens it.
