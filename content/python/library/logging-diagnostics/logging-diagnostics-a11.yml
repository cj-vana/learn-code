function_name: aggregate_log_counts_by_level
input_mode: function
solution_sketch: >-
  Normalize each entry's level name (strip, upper-case, apply the alias map) to a
  canonical bucket or UNKNOWN, then increment that bucket's running count in a dict.
sample_solution: |
  CANONICAL = {
      "NOTSET": "NOTSET",
      "DEBUG": "DEBUG",
      "INFO": "INFO",
      "WARNING": "WARNING",
      "WARN": "WARNING",
      "ERROR": "ERROR",
      "CRITICAL": "CRITICAL",
      "FATAL": "CRITICAL",
  }


  def aggregate_log_counts_by_level(entries):
      counts = {}
      for entry in entries:
          raw = entry.get("level")
          if isinstance(raw, str):
              bucket = CANONICAL.get(raw.strip().upper(), "UNKNOWN")
          else:
              bucket = "UNKNOWN"
          counts[bucket] = counts.get(bucket, 0) + 1
      return counts
