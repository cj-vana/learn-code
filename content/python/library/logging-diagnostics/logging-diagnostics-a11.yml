prompt_markdown: |
  At the end of a shift, the wind-farm operations desk wants a single tally: how many
  log entries came in at each severity. Turbines were commissioned by different
  vendors, so the level names are inconsistent, and you must reconcile them.

  Write `aggregate_log_counts_by_level(entries)`. The single argument is a list of
  log entries, each a dict that usually has a `"level"` name. Return a dict mapping
  **canonical** level names to how many entries fell under each. Only include levels
  that actually occurred -- do not list a level with a count of zero.

  Canonical names and folding rules:

  - The canonical names are `NOTSET`, `DEBUG`, `INFO`, `WARNING`, `ERROR`,
    `CRITICAL`.
  - Level names are case-insensitive and may carry stray whitespace, so `"info"`,
    `"INFO"`, and `"  Info "` all tally under `"INFO"`.
  - Fold the aliases together: `"WARN"` counts as `"WARNING"` and `"FATAL"` counts as
    `"CRITICAL"`.
  - Any entry whose level name is unrecognized, or that has no `"level"` key at all,
    tallies under the bucket `"UNKNOWN"`.

  An empty entry list returns an empty dict.
