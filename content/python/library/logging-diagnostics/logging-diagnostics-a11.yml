explanation_markdown: |
  This is grouping-and-counting, the pattern behind every "errors by severity" panel.
  The dictionary is both the group index and the running total: you look up the
  bucket, add one, and store it back, so a level's very first appearance seeds it at
  one without any pre-seeding.

  The reconciliation work happens before the count. Real logs mix casing and vendor
  aliases, so folding `"warn"` into `"WARNING"` and `"FATAL"` into `"CRITICAL"` up
  front means each true severity lands in exactly one bucket. Sending unrecognized or
  missing levels to an `"UNKNOWN"` bucket -- rather than dropping them -- keeps the
  tally honest: the totals still add up to the number of entries, and a surprise level
  becomes visible instead of silently vanishing.
common_mistakes:
  - Counting the raw level strings, so "warn", "WARNING", and "Warn" split into three separate buckets.
  - Dropping entries with an unknown or missing level, which makes the counts stop summing to the number of entries.
  - Pre-listing all six levels with zero counts, so the result reports levels that never actually occurred.
