explanation_markdown: |
  Severity levels are just ordered numbers wearing names, which is why the whole
  emit decision collapses to one comparison. Mapping the names first means the
  logic never depends on the spelling of a level, only its rank. The `>=` (not
  `>`) is the detail that matters: a record whose severity exactly equals the
  threshold is emitted, matching how `logging.Logger.isEnabledFor` gates records.
  A `NOTSET` threshold of `0` lets everything through because every real level is
  at least `0`, which is why leaving a threshold unset behaves like "log
  everything".
common_mistakes:
  - Using a strict > so a record exactly at the threshold is dropped instead of emitted.
  - Comparing the level name strings directly, which orders them alphabetically rather than by severity.
  - Swapping the operands and testing threshold >= record, which inverts the whole gate.
