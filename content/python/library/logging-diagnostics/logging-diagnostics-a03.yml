prompt_markdown: |
  A greenhouse climate monitor decides whether a reading is worth logging. Each
  message carries a severity, and the monitor only records messages at or above a
  configured threshold. Write `should_emit(gate)` where `gate` is a dict with keys
  `record` and `threshold`, each a severity name.

  Convert both names to numbers with this fixed mapping and return `True` when the
  record's number is **greater than or equal to** the threshold's number,
  otherwise `False`:

  ```
  NOTSET=0  DEBUG=10  INFO=20  WARNING=30  ERROR=40  CRITICAL=50
  ```

  For example, a `WARNING` record against an `INFO` threshold is emitted
  (`30 >= 20` is `True`), but a `DEBUG` record against a `WARNING` threshold is
  suppressed (`10 >= 30` is `False`). A record exactly equal to the threshold is
  emitted. You may assume both names are among the six above.
starter_code: |
  LEVELS = {"NOTSET": 0, "DEBUG": 10, "INFO": 20, "WARNING": 30, "ERROR": 40, "CRITICAL": 50}


  def should_emit(gate):
      # Return True when the record level is at or above the threshold level.
      return False
function_name: should_emit
input_mode: function
solution_sketch: Map both names to their numeric levels and return whether the record number is greater than or equal to the threshold number.
sample_solution: |
  LEVELS = {"NOTSET": 0, "DEBUG": 10, "INFO": 20, "WARNING": 30, "ERROR": 40, "CRITICAL": 50}


  def should_emit(gate):
      return LEVELS[gate["record"]] >= LEVELS[gate["threshold"]]
hints:
  - level: 1
    text: Severity names are ordered, so translate each name into its number before comparing.
  - level: 2
    text: A message is emitted when it is at least as severe as the threshold, which is a >= comparison.
  - level: 3
    text: Look both names up in the LEVELS dict and return the boolean LEVELS[record] >= LEVELS[threshold] directly.
