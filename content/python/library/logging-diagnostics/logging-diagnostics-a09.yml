explanation_markdown: |
  Level names are just labels for numbers, and the numbers are what a logger
  actually compares. The two moves that make the parser robust are normalization and
  a single lookup table. Stripping and upper-casing collapses `"  info  "`, `"INFO"`,
  and `"Info"` into one key before you ever touch the map, so you never write a
  branch per spelling.

  Putting `WARN` and `FATAL` into the same dict -- pointing at `30` and `50` -- is
  how the standard library treats those older spellings, and it keeps the alias logic
  from leaking into your code as extra `if` statements. Finally, `dict.get(key, -1)`
  turns "not a real level" into a plain sentinel, so unknown words and the empty
  string are handled by the same line that handles everything else.
common_mistakes:
  - Comparing against raw input without stripping or upper-casing, so a stray space or lowercase word misses every branch.
  - Leaving out the WARN and FATAL aliases, which are common in real configs and legitimately map to 30 and 50.
  - Raising or returning None for an unknown word instead of the -1 the caller expects as a sentinel.
