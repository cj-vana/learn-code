prompt_markdown: |
  A remote weather mast reads its alert threshold from a hand-edited config line, so
  the severity word arrives with sloppy casing and stray spaces. Turn that word into
  the numeric level the firmware compares against.

  Write `log_level_from_string(name)`. The single argument is a string. Return the
  matching integer level:

  ```
  NOTSET=0  DEBUG=10  INFO=20  WARNING=30  ERROR=40  CRITICAL=50
  ```

  Rules:

  - Ignore surrounding whitespace and letter case: `"  info  "`, `"INFO"`, and
    `"Info"` all mean `20`.
  - Honor the two historical aliases, exactly as the standard library does:
    `"WARN"` means the same as `"WARNING"` (`30`) and `"FATAL"` means the same as
    `"CRITICAL"` (`50`).
  - Any word that is not one of the six names or the two aliases -- including the
    empty string -- returns the sentinel `-1`.
starter_code: |
  def log_level_from_string(name):
      # Map a severity word to its numeric level, or -1 if unknown.
      return -1
function_name: log_level_from_string
input_mode: function
solution_sketch: >-
  Strip and upper-case the input, then look it up in a dict that includes the six
  canonical names plus WARN and FATAL as aliases, defaulting to -1 when absent.
sample_solution: |
  LEVELS = {
      "NOTSET": 0,
      "DEBUG": 10,
      "INFO": 20,
      "WARNING": 30,
      "WARN": 30,
      "ERROR": 40,
      "CRITICAL": 50,
      "FATAL": 50,
  }


  def log_level_from_string(name):
      return LEVELS.get(name.strip().upper(), -1)
