prompt_markdown: |
  A radio club keeps its assigned channel frequencies as a list of integers,
  already sorted from lowest to highest. Two handsets cause interference when
  their frequencies differ by exactly `gap` kilohertz, so the club wants to know
  whether any such pair exists.

  Write `has_frequency_gap(data)` where `data` is a dict with keys `freqs` (a
  list of ints in non-decreasing order) and `gap` (a non-negative int). Return
  `True` if two different entries differ by exactly `gap`, otherwise `False`.
starter_code: |
  def has_frequency_gap(data):
      return False
function_name: has_frequency_gap
input_mode: function
solution_sketch: Slide a low and a high pointer forward; widen when the difference is too small and advance the low pointer when it is too large.
sample_solution: |
  def has_frequency_gap(data):
      freqs = data["freqs"]
      gap = data["gap"]
      n = len(freqs)
      lo = 0
      hi = 1
      while hi < n:
          diff = freqs[hi] - freqs[lo]
          if diff == gap and lo != hi:
              return True
          if diff < gap:
              hi += 1
          else:
              lo += 1
              if lo == hi:
                  hi += 1
      return False
hints:
  - level: 1
    text: Because the list is sorted, use two pointers that both move forward instead of nested loops.
  - level: 2
    text: If the current difference is smaller than the gap, move the high pointer up; if it is larger, move the low pointer up.
  - level: 3
    text: Keep the two pointers on different positions so a value is never compared with itself, and never let the low pointer pass the high one.
