explanation_markdown: |
  On a sorted list, a target difference is found with two forward-moving pointers.
  The low and high pointers bound a window; the difference of their values grows as
  the high pointer advances and shrinks as the low pointer advances. When the
  difference is too small you widen the window, and when it is too large you slide
  the low end up. Requiring the pointers to sit on different positions rules out
  pairing a value with itself, and the whole scan runs in one O(n) pass.
common_mistakes:
  - Comparing an entry with itself when the pointers land on the same index.
  - Moving the wrong pointer so the window can never reach the target difference.
  - Assuming the list is unsorted and reaching for a slower nested-loop search.
