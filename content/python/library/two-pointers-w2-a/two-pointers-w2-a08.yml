explanation_markdown: |
  Collapsing consecutive duplicates is a same-direction two-pointer compaction. The
  read pointer visits every frame, while the write pointer counts how many frames
  have been kept. A frame is kept only when it differs from the last written value,
  so runs of equal frames shrink to one. Because the write pointer never passes the
  read pointer, the compaction happens in place and the pass is O(n). Slicing at the
  write pointer trims the leftover tail.
common_mistakes:
  - Removing all later occurrences of a value instead of only consecutive repeats.
  - Comparing against the raw previous index rather than the last kept value.
  - Returning the whole list instead of trimming it to the write pointer.
