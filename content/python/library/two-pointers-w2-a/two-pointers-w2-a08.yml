prompt_markdown: |
  An animator exports a sequence of frame colors as a list. To shrink the file, any
  run of identical consecutive frames should be squashed down to a single frame,
  while frames that differ from their neighbor are kept. Only consecutive repeats
  are collapsed, so a color that reappears later after a different color stays.

  Write `collapse_frames(frames)` that returns a new list where each run of equal
  consecutive values is replaced by one copy of that value. An empty list returns
  an empty list.
starter_code: |
  def collapse_frames(frames):
      return []
function_name: collapse_frames
input_mode: function
solution_sketch: Use a read pointer scanning every frame and a write pointer that only records a frame when it differs from the last one kept.
sample_solution: |
  def collapse_frames(frames):
      result = list(frames)
      write = 0
      for read in range(len(result)):
          if write == 0 or result[read] != result[write - 1]:
              result[write] = result[read]
              write += 1
      return result[:write]
hints:
  - level: 1
    text: Keep a write pointer marking how many distinct-in-a-row frames you have kept so far.
  - level: 2
    text: Scan every frame with a read pointer and only keep it when it differs from the last frame you wrote.
  - level: 3
    text: The value just before the write pointer is the last kept frame to compare against.
