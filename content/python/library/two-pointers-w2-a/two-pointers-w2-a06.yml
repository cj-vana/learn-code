      return []
function_name: alternate_setlists
input_mode: function
solution_sketch: Advance a pointer in each list together, appending one from each; then drain whichever list still has tracks.
sample_solution: |
  def alternate_setlists(data):
      a = data["deck_a"]
      b = data["deck_b"]
      i = 0
      j = 0
      result = []
      while i < len(a) and j < len(b):
          result.append(a[i])
          result.append(b[j])
          i += 1
          j += 1
      while i < len(a):
          result.append(a[i])
          i += 1
      while j < len(b):
          result.append(b[j])
          j += 1
      return result
hints:
  - level: 1
    text: Use one pointer per deck and take a track from each on every round.
  - level: 2
    text: While both decks still have tracks, append deck_a's current track then deck_b's, and step both pointers.
  - level: 3
    text: Once the shorter deck is empty, append whatever remains in the other deck in order.
