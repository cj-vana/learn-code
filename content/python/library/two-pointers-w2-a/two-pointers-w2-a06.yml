explanation_markdown: |
  Interleaving is a two-pointer walk where both pointers advance together. While
  each deck still has a track, you emit one from each and step both indices. The
  moment the shorter deck empties, the paired loop ends and a follow-up loop drains
  the remaining tracks of the longer deck in order. Every track is appended exactly
  once, so the routine is O(len(a) + len(b)).
common_mistakes:
  - Stopping at the shorter deck's length and dropping the longer deck's leftover tracks.
  - Appending the two decks' tracks in the wrong order within a round.
  - Advancing only one pointer inside the paired loop, which desynchronizes the alternation.
