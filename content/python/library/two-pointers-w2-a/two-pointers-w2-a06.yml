prompt_markdown: |
  Two DJs each bring an ordered list of track titles for a back-to-back set. The
  host wants the combined set to alternate, starting with a track from the first
  DJ, then one from the second, and so on. When one list runs out, the remaining
  tracks from the other list play in order at the end.

  Write `alternate_setlists(data)` where `data` is a dict with keys `deck_a` and
  `deck_b` (both lists). Return the interleaved list described above.
starter_code: |
