prompt_markdown: |
  A cooking instructor has a short list of key `steps` a student must perform in
  order, and a longer `prep` log of everything the student actually did. The key
  steps may be spread out with other actions in between, but they must appear in
  the same relative order to count.

  Write `steps_in_order(data)` where `data` is a dict with keys `steps` and
  `prep` (both lists). Return `True` if every step appears in `prep` in order (as
  a subsequence), otherwise `False`. An empty `steps` list is always satisfied.
starter_code: |
  def steps_in_order(data):
      return False
function_name: steps_in_order
input_mode: function
solution_sketch: Walk a pointer through prep and advance a steps pointer only when the current prep action matches the next required step.
sample_solution: |
  def steps_in_order(data):
      steps = data["steps"]
      prep = data["prep"]
      i = 0
      for action in prep:
          if i < len(steps) and action == steps[i]:
              i += 1
      return i == len(steps)
hints:
  - level: 1
    text: Keep one pointer on the next required step and scan the prep log from left to right.
  - level: 2
    text: Advance the step pointer only when the current prep action equals the step it points to.
  - level: 3
    text: The steps are all matched when the step pointer reaches the end of the steps list.
