explanation_markdown: |
  Checking for a subsequence is a two-pointer walk over two lists. One pointer
  scans every action in the prep log; a second pointer tracks the next required
  step. Whenever the scanned action matches the awaited step, the step pointer
  advances. If it reaches the end, every step was found in order. Because each
  prep action is examined once, the scan is O(len(prep)).
common_mistakes:
  - Requiring the steps to be contiguous instead of allowing other actions in between.
  - Advancing the step pointer on every prep action instead of only on a match.
  - Forgetting that an empty steps list is trivially in order.
