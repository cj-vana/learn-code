explanation_markdown: |
  Counting pairs with a fixed sum on a sorted list is a two-pointer sweep with a
  twist for duplicates. When the two ends sum too low the left pointer rises, and
  when too high the right pointer falls. On an exact match with different values,
  every equal value clustered on the left can pair with every equal value clustered
  on the right, so you count each run and multiply. If the remaining window is a
  single repeated value, all pairs inside it match, giving n*(n-1)/2. The scan stays
  O(n) even with heavy duplication.
common_mistakes:
  - Counting a matched pair as one instead of multiplying the equal-value runs on each side.
  - Mishandling a block of identical values, either double counting or missing pairs.
  - Forgetting to move both pointers inward after counting a matched pair.
