      return 0
function_name: count_pip_pairs
input_mode: function
solution_sketch: Converge two pointers from the ends; on a match, count how many equal values sit on each side and multiply, handling an all-equal block separately.
sample_solution: |
  def count_pip_pairs(data):
      pips = data["pips"]
      target = data["target"]
      left = 0
      right = len(pips) - 1
      count = 0
      while left < right:
          total = pips[left] + pips[right]
          if total == target:
              if pips[left] == pips[right]:
                  span = right - left + 1
                  count += span * (span - 1) // 2
                  break
              lc = 1
              while left + 1 < right and pips[left + 1] == pips[left]:
                  left += 1
                  lc += 1
              rc = 1
              while right - 1 > left and pips[right - 1] == pips[right]:
                  right -= 1
                  rc += 1
              count += lc * rc
              left += 1
              right -= 1
          elif total < target:
              left += 1
          else:
              right -= 1
      return count
hints:
  - level: 1
    text: Because the pips are sorted, start one pointer at the smallest half and one at the largest.
  - level: 2
    text: If the two ends sum below the target, raise the left pointer; if above, lower the right pointer.
  - level: 3
    text: On a match with different values, count the equal values on each side and multiply; if the whole remaining window is one repeated value, use n*(n-1)/2.
