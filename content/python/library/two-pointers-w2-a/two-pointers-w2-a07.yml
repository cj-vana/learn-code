prompt_markdown: |
  At a game night the pip counts of a pile of domino halves are recorded in a list,
  sorted from fewest pips to most. Players want to know how many ways two different
  halves can be paired so their pips add up to a `target`. Two halves with equal
  pip counts still count as separate halves.

  Write `count_pip_pairs(data)` where `data` is a dict with keys `pips` (a list of
  ints in non-decreasing order) and `target` (an int). Return the number of
  unordered pairs of positions whose pip counts sum to exactly `target`.
starter_code: |
