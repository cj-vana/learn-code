prompt_markdown: |
  Two co-hosts each keep a sorted list of member id numbers they invited to a
  party. Some members were invited by both hosts. The planner wants one master
  list of every distinct id, still in sorted order, with no id repeated even if it
  appeared twice within a single host's list.

  Write `combined_guest_list(data)` where `data` is a dict with keys `list_a` and
  `list_b` (both lists of ints in non-decreasing order). Return a sorted list of
  every distinct id that appears in either list.
