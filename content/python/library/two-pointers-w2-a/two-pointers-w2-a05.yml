function_name: combined_guest_list
input_mode: function
solution_sketch: Merge with two pointers, always taking the smaller front value and skipping any id equal to the one just appended.
sample_solution: |
  def combined_guest_list(data):
      a = data["list_a"]
      b = data["list_b"]
      i = 0
      j = 0
      result = []
      while i < len(a) and j < len(b):
          if a[i] < b[j]:
              value = a[i]
              i += 1
          elif b[j] < a[i]:
              value = b[j]
              j += 1
          else:
              value = a[i]
              i += 1
              j += 1
          if not result or result[-1] != value:
              result.append(value)
      while i < len(a):
          if not result or result[-1] != a[i]:
              result.append(a[i])
          i += 1
      while j < len(b):
          if not result or result[-1] != b[j]:
              result.append(b[j])
          j += 1
      return result
hints:
  - level: 1
    text: Keep one pointer in each sorted list and always look at their two front values.
  - level: 2
    text: Append the smaller front value and advance that pointer; when both fronts are equal, take the value once and advance both.
  - level: 3
    text: Before appending, skip a value that equals the last id already in the result so duplicates never sneak in.
