explanation_markdown: |
  Merging two sorted lists is the classic two-pointer march: compare the two front
  values, emit the smaller, and advance that pointer, taking a shared value only
  once. Distinctness is handled by comparing each candidate with the last value
  already appended, which also collapses duplicates inside a single input list.
  After one list is exhausted, the leftovers of the other are drained with the same
  guard, giving an O(len(a) + len(b)) merge.
common_mistakes:
  - Emitting a shared id twice by advancing only one pointer when the fronts are equal.
  - Forgetting that duplicates can occur within a single input list, not just across both.
  - Re-sorting the merged list instead of relying on the already-sorted inputs.
