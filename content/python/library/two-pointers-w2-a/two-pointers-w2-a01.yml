prompt_markdown: |
  A relay coach records the running order of a team as a list of runner names.
  For the next heat the coach wants the exact reverse order, and the drill is to
  build it by swapping the two ends inward rather than calling a reverse helper.

  Write `reverse_baton_order(runners)` that returns a new list holding the same
  names in reversed order. An empty list returns an empty list.
starter_code: |
  def reverse_baton_order(runners):
      return []
function_name: reverse_baton_order
input_mode: function
solution_sketch: Copy the list, then swap the values at a left and a right pointer while walking them toward the middle.
sample_solution: |
  def reverse_baton_order(runners):
      result = list(runners)
      left = 0
      right = len(result) - 1
      while left < right:
          result[left], result[right] = result[right], result[left]
          left += 1
          right -= 1
      return result
hints:
  - level: 1
    text: Start one pointer at the first runner and one at the last runner.
  - level: 2
    text: Swap the values under the two pointers, then step the left pointer forward and the right pointer backward.
  - level: 3
    text: Stop once the pointers meet or cross so you do not swap the list back to its original order.
