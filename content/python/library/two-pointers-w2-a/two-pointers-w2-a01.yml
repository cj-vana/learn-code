explanation_markdown: |
  Reversing a sequence is a textbook two-pointer sweep. One pointer starts at the
  front and one at the back; swapping the pair and stepping both inward moves every
  value to its mirrored spot. The loop stops when the pointers meet, so each pair is
  swapped exactly once and the whole pass is O(n) with no extra list beyond the copy
  that keeps the input untouched.
common_mistakes:
  - Letting the loop run past the middle, which swaps every pair twice and restores the original order.
  - Mutating the caller's list instead of returning a reversed copy.
  - Moving only one pointer, so most positions never get swapped.
