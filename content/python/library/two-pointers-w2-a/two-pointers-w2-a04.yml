function_name: closest_pair_weight
input_mode: function
solution_sketch: Start pointers at the two ends and move inward, tracking the sum whose distance to the target is smallest.
sample_solution: |
  def closest_pair_weight(data):
      weights = data["weights"]
      target = data["target"]
      left = 0
      right = len(weights) - 1
      best = weights[left] + weights[right]
      while left < right:
          total = weights[left] + weights[right]
          gap = abs(total - target)
          best_gap = abs(best - target)
          if gap < best_gap or (gap == best_gap and total < best):
              best = total
          if total == target:
              return total
          if total < target:
              left += 1
          else:
              right -= 1
      return best
hints:
  - level: 1
    text: With the weights sorted, begin one pointer at the lightest bag and one at the heaviest.
  - level: 2
    text: If the current pair sum is below the target, only a heavier light-end value can help, so move the left pointer up; otherwise move the right pointer down.
  - level: 3
    text: Track the best sum seen so far by comparing each pair's distance to the target, breaking ties toward the smaller sum.
