explanation_markdown: |
  Because the weights are sorted, two pointers converging from the ends explore the
  pair sums in a disciplined way. When a pair sums below the target, the only way to
  climb is to move the left pointer to a heavier value; when it sums above, the right
  pointer must drop to a lighter value. Along the way you remember the sum whose gap
  to the target is smallest, using the smaller sum to settle ties. Each step retires
  one pointer, so the search is O(n) instead of checking every pair.
common_mistakes:
  - Returning the difference from the target instead of the pair's actual combined weight.
  - Only recording sums that are below the target and ignoring closer sums above it.
  - Forgetting a deterministic tie rule when two pairs are equally close.
