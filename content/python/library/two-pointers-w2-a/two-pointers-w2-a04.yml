prompt_markdown: |
  A carpool app has each rider's luggage weight in a list, sorted from lightest to
  heaviest, and wants to seat exactly two riders in a shared cab. The dispatcher
  aims for a combined luggage weight as close as possible to a `target` the cab is
  balanced for.

  Write `closest_pair_weight(data)` where `data` is a dict with keys `weights` (a
  list of at least two ints in non-decreasing order) and `target` (an int).
  Return the combined weight of the pair whose sum is closest to `target`. If two
  different pairs are equally close, return the smaller of the two sums.
