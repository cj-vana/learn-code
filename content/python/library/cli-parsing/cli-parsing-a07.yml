    - name: multiple_globals
      input: ["--config", "--verbose", "undock", "pier-3"]
      expected:
        global_flags: ["--config", "--verbose"]
        subcommand: "undock"
        args: ["pier-3"]
    - name: bare_words_after_verb
      input: ["list", "ships", "docked"]
      expected:
        global_flags: []
        subcommand: "list"
        args: ["ships", "docked"]
explanation_markdown: |
  Because every global toggle here is valueless, a single scan settles the whole
  layout: collect leading dash tokens, then the next token (if any) is the verb and
  the rest is its payload. This is exactly the shape real CLIs use before handing a
  subcommand off to its own parser -- global options first, verb, then verb-local
  arguments. The `None` subcommand result models the "bare invocation" case a real
  tool would answer with a help message.

  The scan is O(n) over the tokens, and slicing `argv[i + 1:]` copies the tail once,
  so there is no need to build `args` element by element.
common_mistakes:
  - Treating tokens after the subcommand as more global flags, instead of stopping the flag scan the moment the verb is found.
  - Forgetting the all-flags case, which must leave subcommand as None rather than crashing on a missing index.
  - Returning a tuple for args, or slicing from the wrong index so the subcommand itself leaks into args.
