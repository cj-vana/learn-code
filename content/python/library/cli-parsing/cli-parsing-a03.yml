explanation_markdown: |
  Configuration precedence is a layering story: a lower layer supplies fallbacks
  and a higher layer overrides them. Copying `defaults` into a new dict and then
  writing `parsed` on top expresses exactly that ordering, and equivalently you
  could write `{**defaults, **parsed}`. The subtle rule is what "override" means.
  Testing truthiness (`if value:`) would wrongly discard a deliberately empty
  value, so a `--label ""` on the command line would silently fall back to the
  default. The correct test is presence: a key that exists in `parsed` wins
  regardless of whether its value is empty, zero, or blank. Copying first also
  keeps the function pure, so callers that reuse their defaults dict across many
  parses are never surprised by a mutation.
common_mistakes:
  - Only overriding when the parsed value is truthy, which drops legitimately empty overrides like an empty string.
  - Mutating the defaults dict in place, so a caller who reuses it sees it corrupted after the first call.
  - Merging in the wrong order so defaults overwrite the observer's supplied values instead of the other way around.
