prompt_markdown: |
  Before the observatory points its telescope, it starts from a set of built-in
  default settings and then lets the night's command-line choices override them.
  A choice the observer actually typed should win, even if what they typed is an
  empty string on purpose.

  Write `apply_defaults(job)` where `job` is a dict with two keys:

  - `job["defaults"]`: a dict of default setting names and values.
  - `job["parsed"]`: a dict of settings the observer supplied on the command line.

  Return a new dict with these rules:

  - Every key from `defaults` appears in the result.
  - For any key present in `parsed`, the parsed value replaces the default. A key
    counts as "present" whenever it exists in `parsed`, so `''` (an empty string)
    still overrides its default.
  - Keys that appear only in `parsed` are kept as well.
  - Do not modify the `defaults` or `parsed` dicts you were given; build and
    return a fresh dictionary.

  Example: `defaults = {'exposure': '30', 'filter': 'clear'}` with
  `parsed = {'exposure': '60'}` returns
  `{'exposure': '60', 'filter': 'clear'}`.
starter_code: |
  def apply_defaults(job):
      defaults = job["defaults"]
      parsed = job["parsed"]
      # Start from a copy of the defaults, then let parsed settings win.
      return {}
function_name: apply_defaults
input_mode: function
solution_sketch: Copy defaults into a new dict, then write every key/value from parsed over it so supplied keys win even when their value is falsy.
sample_solution: |
  def apply_defaults(job):
      defaults = job["defaults"]
      parsed = job["parsed"]
      result = dict(defaults)
      for key, value in parsed.items():
          result[key] = value
      return result
hints:
  - level: 1
    text: Precedence here means "later layer wins". Begin from the defaults and let the parsed layer overwrite on top.
  - level: 2
    text: dict(defaults) makes an independent copy, so writing into it never disturbs the caller's original dict.
  - level: 3
    text: Loop over parsed.items() and assign each pair; because you assign by key presence, an empty-string value still replaces the default.
