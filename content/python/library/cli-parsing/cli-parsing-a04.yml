explanation_markdown: |
  Validating required arguments is really two questions folded together: was the
  name supplied at all, and if so, does it carry a usable value? Checking only key
  presence would wave through `--minutes ""`, where the caller named the setting
  but gave it nothing, so the check also rejects `None` and the empty string. The
  order of the two conditions matters: you must confirm the key exists before
  reading `parsed[name]`, otherwise a missing key would raise a KeyError instead
  of being reported. Driving the loop from `required` rather than from `parsed`
  guarantees the report comes out in the caller's stated order, which is what a
  user scanning an error message expects to see.
common_mistakes:
  - Treating only absent keys as missing, so a key present with an empty string or None slips through as if provided.
  - Reading parsed[name] before confirming the key exists, which raises KeyError on genuinely absent names.
  - Iterating over parsed instead of required, which scrambles the report order and can miss names that were never supplied.
