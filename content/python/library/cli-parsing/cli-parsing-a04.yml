prompt_markdown: |
  The greenhouse irrigation controller refuses to run until a few settings are
  actually provided. A setting that was left out is missing; so is one that was
  named but handed a blank value, because a blank value tells the controller
  nothing.

  Write `validate_required_args(job)` where `job` is a dict with two keys:

  - `job["parsed"]`: a dict of the settings that were supplied.
  - `job["required"]`: a list of setting names that must be present, in the order
    they should be reported.

  Return a list of the required names that are missing, using these rules:

  - A required name is missing if it is not a key in `parsed`.
  - It is also missing if it is a key but its value is `None` or an empty string
    `''` (a blank counts as not provided).
  - Report the missing names in the same order they appear in `required`.
  - If nothing is missing, return an empty list. Assume `required` never repeats a
    name.

  Example: `parsed = {'zone': 'north', 'minutes': ''}` with
  `required = ['zone', 'minutes', 'schedule']` returns `['minutes', 'schedule']`.
starter_code: |
  def validate_required_args(job):
      parsed = job["parsed"]
      required = job["required"]
      missing = []
      # Collect each required name that is absent or was given a blank value.
      return missing
function_name: validate_required_args
input_mode: function
solution_sketch: Walk required in order, appending each name whose key is absent from parsed or whose value is None or an empty string.
sample_solution: |
  def validate_required_args(job):
      parsed = job["parsed"]
      required = job["required"]
      missing = []
      for name in required:
          if name not in parsed:
              missing.append(name)
          elif parsed[name] is None or parsed[name] == "":
              missing.append(name)
      return missing
hints:
  - level: 1
    text: Iterate over required (not over parsed) so your output order matches the required list exactly.
  - level: 2
    text: "There are two ways to be missing: the key is absent, or the key exists but its value is None or an empty string."
  - level: 3
    text: Check `name not in parsed` first; only when the key exists is it safe to inspect parsed[name] for None or ''.
