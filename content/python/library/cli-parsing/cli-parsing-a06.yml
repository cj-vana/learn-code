prompt_markdown: |
  A birdsong field recorder lets an observer attach several tags to one take by
  repeating the same flag: `--tag heron --tag egret --tag heron`. The runner needs
  every value that each `--tag` introduced, in the order they were given.

  Write `parse_repeated_flag(job)` where `job` is a dict with two keys:

  - `job["argv"]`: the list of command-line tokens.
  - `job["flag_name"]`: the flag that may repeat, such as `'--tag'`.

  Return a list of values collected by these rules:

  - Each time `flag_name` appears in `argv`, the token immediately after it is one
    of its values. Take that next token exactly as it is, even if it happens to
    look like another flag.
  - Values are returned in the order the flags appeared. Duplicate values are all
    kept.
  - Tokens that belong to other flags are ignored.
  - A `flag_name` at the very end of `argv` with no token after it contributes no
    value and is skipped.
  - If `flag_name` never appears, return an empty list.

  Example: `argv = ['--tag', 'heron', '--rate', '5', '--tag', 'egret']` with
  `flag_name = '--tag'` returns `['heron', 'egret']`.
starter_code: |
  def parse_repeated_flag(job):
      argv = job["argv"]
      flag_name = job["flag_name"]
      values = []
      # Each time flag_name appears, grab the token right after it.
      return values
function_name: parse_repeated_flag
input_mode: function
solution_sketch: Scan argv with an index; when the current token equals flag_name and a next token exists, append that next token and advance by two, otherwise advance by one.
sample_solution: |
  def parse_repeated_flag(job):
      argv = job["argv"]
      flag_name = job["flag_name"]
      values = []
      i = 0
      while i < len(argv):
          if argv[i] == flag_name and i + 1 < len(argv):
              values.append(argv[i + 1])
              i += 2
          else:
              i += 1
      return values
hints:
  - level: 1
    text: You need the token after each match, so track your own index rather than using a plain for-loop.
  - level: 2
    text: When argv[i] equals the flag and a token follows it, append argv[i + 1] and jump the index forward by two.
  - level: 3
    text: The `i + 1 < len(argv)` guard is what makes a trailing flag with no value safe; on any non-match just advance by one.
