explanation_markdown: |
  A repeatable flag turns one option name into a list, which is how tools let you
  pass several tags, includes, or headers without inventing new syntax. Like the
  single `--flag value` parser, a match and its value sit two positions apart, so
  managing your own index and advancing by two after a hit is the natural loop
  shape; the difference is that you append to a list instead of overwriting a dict
  key, which is exactly what preserves order and keeps duplicates. The
  specification deliberately says to take the very next token as the value even if
  it looks like another flag, because a hand-rolled parser at this level has no
  notion of "this looks like a flag, so it cannot be a value" -- it simply reads
  the adjacent token. The `i + 1 < len(argv)` guard covers the trailing-flag case
  so you never read past the end of the list.
common_mistakes:
  - Using a dict or overwriting a single variable, so only the last value survives instead of all of them.
  - Forgetting the bounds check, so a trailing flag with no following token raises IndexError.
  - Advancing the index by one after a match, which lets the value token be re-examined and can corrupt later matches.
