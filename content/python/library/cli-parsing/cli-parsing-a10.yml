prompt_markdown: |
  A rooftop weather station boots with a set of default settings, then lets an
  operator override any of them from the command line. Your job is the merge step
  that decides which value wins for each setting.

  The grader calls your function with one argument: a request dict shaped like

  ```python
  {
      "defaults": {"port": 8080, "verbose": True, "workers": 4},
      "cli":      {"port": 9090, "verbose": False, "workers": None, "region": "west"}
  }
  ```

  Here `cli` holds what the argument parser produced. A key's value is `None`
  **only** when the operator did not supply that option -- the parser's way of
  saying "left unset." Any other value, even a falsy one like `False`, `0`, or `""`,
  means the operator explicitly chose it.

  Write `merge_config_and_args(request)` that returns a single merged dict:

  - Start from a copy of `defaults`.
  - For each key in `cli` whose value is **not** `None`, that value overrides (or
    adds) the key in the result.
  - A `cli` value of `None` changes nothing -- the default stays, or the key simply
    stays absent if it was never a default.

  For the example above the result is
  `{"port": 9090, "verbose": False, "workers": 4, "region": "west"}`: `port` is
  overridden, `verbose` becomes `False` because the operator actually chose it,
  `workers` keeps its default because the CLI value was unset, and `region` is a
  brand-new key the CLI introduced.

  Do not mutate the input `defaults` dict; build and return a fresh dict.
starter_code: |
  def merge_config_and_args(request):
      return {}
function_name: merge_config_and_args
input_mode: function
solution_sketch: Copy defaults into a new dict, then walk the cli items and overwrite for every value that is not None, which lets falsy-but-provided values win while genuinely unset (None) options fall through to the default.
sample_solution: |
  def merge_config_and_args(request):
      merged = dict(request["defaults"])
      for key, value in request["cli"].items():
          if value is not None:
              merged[key] = value
      return merged
hints:
  - level: 1
    text: The only value that means "not provided" is None. Everything else, including False and 0, is a real choice that must override.
  - level: 2
    text: Copy defaults first with dict(...), then loop the cli items so overrides and brand-new keys both land in the same result.
  - level: 3
    text: Guard the override with `if value is not None`, never with `if value`, because `if value` would wrongly discard False, 0, and empty strings.
