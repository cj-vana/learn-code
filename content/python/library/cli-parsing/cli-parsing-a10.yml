        cli: {label: ""}
      expected: {label: ""}
explanation_markdown: |
  This is the precedence rule at the heart of every real config system: command-line
  input outranks defaults, but only where the user actually provided something. The
  trap is writing `if value:` to detect "provided," which silently throws away the
  legitimate falsy choices -- turning off `verbose`, setting `count` to `0`, or
  clearing a label to `""`. Testing `value is not None` keeps the sentinel (unset)
  distinct from a real falsy value.

  Copying `defaults` before merging keeps the caller's dictionary intact, which
  matters when the same defaults object feeds several merges.
common_mistakes:
  - Using `if value:` to decide whether to override, which drops legitimate False, 0, and "" choices.
  - Mutating the passed-in defaults dict directly instead of copying it first.
  - Treating None as a real value and copying it into the result, erasing the default it was meant to leave untouched.
