explanation_markdown: |
  Positional arguments carry no labels of their own; their meaning is a contract
  between the caller's word order and the program's expectations. Zipping the
  `spec` names against the `argv` tokens by index encodes that contract directly.
  The two mismatch cases are what make this more than a one-liner. When fewer
  tokens arrive than names exist, guarding on `i < len(argv)` lets the extra names
  fall away instead of raising an IndexError or storing a wrong value. When more
  tokens arrive than the spec accounts for, slicing `argv[len(spec):]` captures
  exactly the overflow, and only attaching `"extra"` when that slice is non-empty
  keeps the common exact-fit result clean. A slice past the end of a list returns
  an empty list rather than erroring, which is why the same expression works even
  when argv is shorter than spec.
common_mistakes:
  - Zipping spec and argv but then dropping leftover tokens entirely instead of collecting them under "extra".
  - Always adding an "extra" key even when there is no overflow, producing a stray empty list on exact-fit inputs.
  - Indexing argv[i] without a bounds check, which raises IndexError when spec is longer than argv.
