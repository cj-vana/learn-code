prompt_markdown: |
  The bakery's oven controller reads a command like `bake sourdough 220` where the
  meaning of each word comes purely from its position: the first word is the
  action, the second is the loaf, the third is the temperature. It wants those
  positions named.

  Write `parse_positional_args(job)` where `job` is a dict with two keys:

  - `job["argv"]`: a list of positional string tokens.
  - `job["spec"]`: a list of names, in order, for those positions.

  Return a dictionary built by these rules:

  - Pair each name in `spec` with the token at the same index: `spec[0]` names
    `argv[0]`, `spec[1]` names `argv[1]`, and so on.
  - If `argv` has fewer tokens than `spec` has names, only include the names that
    actually received a token; leave the rest out entirely.
  - If `argv` has more tokens than `spec` has names, collect every leftover token
    (those beyond the last named position) into a list under the key `"extra"`.
    Only add the `"extra"` key when at least one leftover token exists.
  - An empty `argv` returns an empty dictionary. An empty `spec` puts every token
    into `"extra"`.

  Example: `argv = ['copy', 'east', 'west', 'north']` with
  `spec = ['command', 'source']` returns
  `{'command': 'copy', 'source': 'east', 'extra': ['west', 'north']}`.
starter_code: |
  def parse_positional_args(job):
      argv = job["argv"]
      spec = job["spec"]
      result = {}
      # Name the positions you can, then bucket any leftover tokens into "extra".
      return result
function_name: parse_positional_args
input_mode: function
solution_sketch: Enumerate the spec names, assigning argv[i] when that index exists; slice argv[len(spec):] for leftovers and store them under "extra" only when the slice is non-empty.
sample_solution: |
  def parse_positional_args(job):
      argv = job["argv"]
      spec = job["spec"]
      result = {}
      for i, name in enumerate(spec):
          if i < len(argv):
              result[name] = argv[i]
      leftover = argv[len(spec):]
      if leftover:
          result["extra"] = leftover
      return result
hints:
  - level: 1
    text: enumerate(spec) gives you both the index and the name, and the index is exactly the argv position that name should claim.
  - level: 2
    text: Guard each assignment with `if i < len(argv)` so names past the end of argv are simply skipped.
  - level: 3
    text: The leftover tokens are argv[len(spec):]; add them under "extra" only when that slice is truthy so you never attach an empty list.
