explanation_markdown: |
  This one packs three independent parsing concerns into a single scan, which is why
  it earns its difficulty. The manual index (rather than a `for` loop) is what lets
  a `--set` reach forward and swallow its pair token so the pair is never re-read as
  an option. `str.partition("=")` is the right tool for "split on the first
  separator only" -- it hands back the value untouched even when the value itself
  contains more equals signs. And walking the dotted key while replacing any
  non-dict with a fresh dict gives clean last-write-wins semantics whether the clash
  is leaf-over-branch or branch-over-leaf.

  Inferring types with small predicate helpers keeps `_infer` readable and avoids
  the `bool("false")` trap -- bools are matched by explicit spelling, not by
  truthiness.
common_mistakes:
  - Splitting the pair with str.split("=") and unpacking two values, which raises when the value contains extra equals signs like a=b=c.
  - Iterating with a plain for loop, so a --set option and its pair token get processed as two separate options.
  - Assuming the parent dict already exists when assigning a dotted key, causing a KeyError or failing to replace a scalar that sits where a branch is needed.
