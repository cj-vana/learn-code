solution_sketch: Walk argv with a manual index, and each time you meet --set consume the following pair token, split it on the first equals, infer the value's type, then descend the dotted key path creating or replacing dicts until you can set the leaf.
sample_solution: |
  def parse_key_value_pairs(argv):
      result = {}
      i = 0
      n = len(argv)
      while i < n:
          if argv[i] != "--set":
              i += 1
              continue
          if i + 1 >= n:
              i += 1
              continue
          raw = argv[i + 1]
          i += 2
          if "=" not in raw:
              continue
          key, _, value = raw.partition("=")
          if key == "":
              continue
          _assign(result, key.split("."), _infer(value))
      return result


  def _infer(value):
      if _is_int(value):
          return int(value)
      if _is_float(value):
          return round(float(value), 4)
      low = value.lower()
      if low == "true":
          return True
      if low == "false":
          return False
      return value


  def _is_int(text):
      body = text[1:] if text[:1] in "+-" else text
      return body.isdigit()


  def _is_float(text):
      body = text[1:] if text[:1] in "+-" else text
      if body.count(".") != 1:
          return False
      left, right = body.split(".")
      return left.isdigit() and right.isdigit()


  def _assign(root, parts, value):
      node = root
      for part in parts[:-1]:
          if not isinstance(node.get(part), dict):
              node[part] = {}
          node = node[part]
      node[parts[-1]] = value
