prompt_markdown: |
  A distillery tags each batch from the command line with repeated `--set` options.
  Each one carries a `key=value` token, and the keys use dots to describe nested
  structure, so the console can build a small settings tree in one pass.

  The grader calls your function with one argument: `argv`, the list of tokens.
  Write `parse_key_value_pairs(argv)` that scans for `--set` options and returns the
  assembled nested dict.

  Scanning rules:

  - Whenever you see the token `--set`, the **next** token is its `key=value` pair.
    Consume both and continue scanning after them.
  - A `--set` that is the very last token (no pair follows) is ignored.
  - Split the pair on its **first** `=` only: the key is everything before it, the
    value is everything after. So `url=a=b=c` has key `url` and value `a=b=c`.
  - A pair token with no `=` at all, or with an empty key (starts with `=`), is
    malformed -- skip it and keep scanning.
  - Any token that is not part of a `--set` pair is ignored entirely.

  Value typing (applied to the raw value string):

  - A run of digits, optionally led by a single `+` or `-`, becomes an `int`
    (`"5432"` -> `5432`, `"-3"` -> `-3`).
  - Digits, a single dot, then digits (both sides non-empty), optionally signed,
    becomes a `float` rounded to 4 places (`"0.75"` -> `0.75`).
  - `"true"` or `"false"` (case-insensitive) becomes the matching bool.
  - Anything else stays a string, including the empty string from `key=`.

  Nesting rules (keys split on `.`):

  - `db.host=local` places `"local"` at `result["db"]["host"]`, creating the `db`
    dict as needed.
  - Repeats overwrite the leaf: a later `--set db.host=remote` replaces the earlier
    value.
  - If a later key needs a branch where a plain value currently sits (or a plain
    value where a branch sits), the later `--set` wins and replaces whatever was
    there. So `--set a=1` then `--set a.b=2` yields `{"a": {"b": 2}}`.

  Worked example:

  ```python
  ["--set", "db.host=local", "--set", "db.port=5432", "ignored", "--set", "db.host=remote"]
  # -> {"db": {"host": "remote", "port": 5432}}
  ```
