prompt_markdown: |
  A remote ridge station syncs its readings with a small home-grown argument parser,
  and you are writing the piece that predicts the final namespace -- the dict of
  settings the parser hands to the program -- from a spec and a token list.

  The grader calls your function with one argument: a request dict shaped like

  ```python
  {
      "spec": {
          "options": [
              {"name": "--output", "type": "str", "default": "out.txt"},
              {"name": "--jobs", "type": "int", "default": 1},
              {"name": "--dry-run", "flag": True, "default": False}
          ],
          "positionals": [
              {"name": "source", "type": "str"},
              {"name": "dest", "type": "str"}
          ]
      },
      "argv": ["--jobs", "4", "--dry-run", "input.csv", "backup.csv"]
  }
  ```

  Write `predict_namespace(request)` that returns the resulting namespace dict.

  Naming: every option or positional maps to a **dest** key equal to its name with
  leading dashes stripped and any remaining dash turned into an underscore, so
  `--dry-run` stores under `dry_run` and `source` stores under `source`.

  Start every option at its declared `default`, then walk `argv`:

  - A token beginning with `--` is an option; you may assume it matches one declared
    in the spec. If that option has `"flag": True` it is a switch: set its dest to
    `True` and move on, consuming no value. Otherwise it is a value option: take the
    **next** token as its value, coerce it by the option's `type`, and store it. A
    repeated option keeps the last value seen.
  - Any other token is a positional value; collect these in order.

  After the walk, bind positionals: the first collected value fills the first
  declared positional, the second fills the second, and so on, each coerced by that
  positional's `type`. A declared positional with no value left gets `None`. Extra
  collected values beyond the declared positionals are dropped.

  Coercion by `type`: `"int"` uses `int(...)`; `"float"` uses `float(...)` rounded
  to 4 places; `"str"` keeps the string as-is. Flag options never go through
  coercion.

  For the example above the namespace is
  `{"output": "out.txt", "jobs": 4, "dry_run": True, "source": "input.csv", "dest": "backup.csv"}`.
