explanation_markdown: |
  This capstone composes every idea from the area into one prediction: dest
  normalization, defaults, flag versus value options, per-type coercion, and
  positional binding by position. The two-phase shape is what keeps it honest --
  seed defaults first so any option the user omits already holds the right value,
  then let the scan overwrite only what was actually supplied. Advancing the index
  by 1 for flags and 2 for value options is the same bookkeeping a real recursive
  descent parser does to avoid reading a value as if it were another option.

  Binding positionals by index (with `None` padding when the tokens run short)
  mirrors how a real parser reports missing required arguments, while dropping the
  extras keeps the namespace shaped exactly like the spec.
common_mistakes:
  - Advancing the index by 2 for a flag option, which skips the following positional or option that the flag never consumed.
  - Forgetting to seed defaults, so options the user omitted are missing from the namespace instead of holding their default value.
  - Normalizing dest for options but not positionals (or vice versa), leaving keys like "dry-run" that should read "dry_run".
