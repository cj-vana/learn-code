solution_sketch: Seed the namespace from every option default keyed by its normalized dest, scan argv binding flag options to True and value options to their coerced next token while collecting bare tokens, then assign collected positionals in order (coerced) with None for any that run out.
sample_solution: |
  def predict_namespace(request):
      spec = request["spec"]
      argv = request["argv"]
      options = spec["options"]
      positionals = spec["positionals"]

      by_name = {opt["name"]: opt for opt in options}
      namespace = {}
      for opt in options:
          namespace[_dest(opt["name"])] = opt["default"]

      collected = []
      i = 0
      n = len(argv)
      while i < n:
          token = argv[i]
          if token.startswith("--"):
              opt = by_name[token]
              dest = _dest(opt["name"])
              if opt.get("flag"):
                  namespace[dest] = True
                  i += 1
              else:
                  namespace[dest] = _coerce(argv[i + 1], opt["type"])
                  i += 2
          else:
              collected.append(token)
              i += 1

      for idx, pos in enumerate(positionals):
          dest = _dest(pos["name"])
          if idx < len(collected):
              namespace[dest] = _coerce(collected[idx], pos["type"])
          else:
              namespace[dest] = None
      return namespace


  def _dest(name):
      return name.lstrip("-").replace("-", "_")


  def _coerce(value, typ):
      if typ == "int":
          return int(value)
      if typ == "float":
          return round(float(value), 4)
      return value
