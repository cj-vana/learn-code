      expected: "usage: plant [--water] [--rows ROWS] bed seed depth"
explanation_markdown: |
  A usage line is pure string assembly once you separate the three regions:
  the program name, the bracketed optionals, and the bare required positionals.
  Collecting fragments into a list and joining once is what keeps the spacing exact
  -- concatenating with `+=` and manual spaces is where trailing-space bugs creep
  in. The metavar convention (dashes to underscores, uppercased) mirrors what real
  parsers auto-generate, so the card reads like tool output rather than a raw dump
  of the spec.
common_mistakes:
  - Emitting a leading or trailing space by concatenating fragments manually instead of joining a list.
  - Bracketing positionals or forgetting to bracket options, reversing the required-vs-optional convention.
  - Deriving the metavar from the raw name (keeping dashes or lowercase) instead of stripping dashes, swapping to underscores, and uppercasing.
