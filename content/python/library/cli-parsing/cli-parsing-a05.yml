explanation_markdown: |
  A boolean or "store true" flag is the simplest command-line construct: it has no
  argument, and its presence is its value. Because `argv` is a list, the whole job
  is a membership test, and `in` returns a bool directly, so no `if`/`else` is
  needed. The one thing to be careful about is that `in` on a list compares entire
  elements, not substrings, so `'--trim'` will not accidentally match
  `'--trim-edges'`. That whole-element behavior is exactly what you want here,
  and it is why this differs from a substring search. Real parsers layer more on
  top (rejecting an unexpected value after the switch, supporting a `--no-trim`
  form), but the core idea stays this presence check.
common_mistakes:
  - Reaching for a substring test so a longer look-alike token is wrongly treated as the flag.
  - Writing an if/else to return True or False when `flag_name in argv` already is the boolean answer.
  - Trying to read a value after the flag, when a boolean switch has no value to consume.
