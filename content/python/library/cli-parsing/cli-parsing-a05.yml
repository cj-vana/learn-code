prompt_markdown: |
  The bindery's job runner has switches like `--trim` and `--gild` that are either
  on or off. There is no value to read: the switch counts as on simply because it
  appears in the command, and off because it does not.

  Write `parse_boolean_flag(job)` where `job` is a dict with two keys:

  - `job["argv"]`: the list of command-line tokens.
  - `job["flag_name"]`: the exact flag token to look for, such as `'--trim'`.

  Return `True` if `flag_name` appears anywhere in `argv`, and `False` otherwise.
  The match must be exact: `'--trim'` is not considered present just because
  `'--trim-edges'` appears. An empty `argv` returns `False`.
starter_code: |
  def parse_boolean_flag(job):
      argv = job["argv"]
      flag_name = job["flag_name"]
      # A boolean switch is on when its exact token is present in argv.
      return False
function_name: parse_boolean_flag
input_mode: function
solution_sketch: Return whether flag_name is an element of the argv list using the in operator.
sample_solution: |
  def parse_boolean_flag(job):
      argv = job["argv"]
      flag_name = job["flag_name"]
      return flag_name in argv
