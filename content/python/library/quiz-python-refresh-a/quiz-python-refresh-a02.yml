  - id: q2
    prompt: What does `7 // 2` evaluate to?
    choices: ["3", "3.5", "4", "1"]
    correct_choice: "3"
    explanation: |
      // is floor division: it divides and discards the fractional part, so 7 // 2 is 3.
    concepts:
