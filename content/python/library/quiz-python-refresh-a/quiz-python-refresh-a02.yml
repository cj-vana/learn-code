  - id: q3
    prompt: Which one of these comparisons is True?
    choices:
      - 3 <= 3
      - 3 < 3
      - 3 != 3
      - 3 > 5
    correct_choice: 3 <= 3
    explanation: |
      <= is true when the left side is less than OR equal to the right side, and 3 equals 3.
      The other three are all false for these values.
    concepts:
      - python.operators
  - id: q4
    prompt: What does `(5 > 2) and (2 > 8)` evaluate to?
    choices: ["False", "True", "None", "it raises an error"]
    correct_choice: "False"
    explanation: |
      and is true only when both sides are true. 5 > 2 is true but 2 > 8 is false,
      so the whole expression is False.
    concepts:
      - python.operators
