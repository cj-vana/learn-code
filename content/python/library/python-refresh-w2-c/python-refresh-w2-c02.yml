explanation_markdown: |
  The mode string selects which comparison matters, so the function branches on it
  first. Heat and cool are mirror images: heating turns on only when the room is
  colder than the target, cooling only when it is warmer. Auto mode adds a one
  degree deadband so the system does not flip on for tiny swings; comparing against
  `target - 1` and `target + 1` leaves a quiet zone where the answer is `"idle"`.
  Returning as soon as a branch matches keeps the auto logic readable and means the
  final `return "idle"` handles everything that stayed inside the band.
common_mistakes:
  - Using >= or <= for the auto band and losing the one-degree deadband.
  - Swapping the heat and cool comparisons so the system runs the wrong way.
  - Forgetting the idle case, so an in-band auto reading returns None.
