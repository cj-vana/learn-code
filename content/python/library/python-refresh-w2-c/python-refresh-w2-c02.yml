prompt_markdown: |
  A greenhouse thermostat decides what to do from the current temperature, the
  target temperature, and its operating mode. The function receives a single
  dictionary `reading` with three keys:

  - `"current"`: the measured temperature (a number),
  - `"target"`: the desired temperature (a number),
  - `"mode"`: one of the strings `"heat"`, `"cool"`, or `"auto"`.

  Write `thermostat_command(reading)` returning the command string:

  - In `"heat"` mode, return `"on"` when the current temperature is below the
    target, otherwise `"off"`.
  - In `"cool"` mode, return `"on"` when the current temperature is above the
    target, otherwise `"off"`.
  - In `"auto"` mode, return `"heat"` when the current temperature is more than one
    degree below the target, `"cool"` when it is more than one degree above the
    target, and `"idle"` when it is within one degree either way.
starter_code: |
  def thermostat_command(reading):
      return ""
function_name: thermostat_command
solution_sketch: Branch on the mode string, then compare current against target with the right operator per mode.
sample_solution: |
  def thermostat_command(reading):
      current = reading["current"]
      target = reading["target"]
      mode = reading["mode"]
      if mode == "heat":
          return "on" if current < target else "off"
      if mode == "cool":
          return "on" if current > target else "off"
      if current < target - 1:
          return "heat"
      if current > target + 1:
          return "cool"
      return "idle"
hints:
  - level: 1
    text: First pull the three values out of the dictionary, then decide based on the mode.
  - level: 2
    text: Heat and cool modes each need a single comparison between current and target.
  - level: 3
    text: For auto mode, the idle band is everything within one degree, so compare against target - 1 and target + 1.
