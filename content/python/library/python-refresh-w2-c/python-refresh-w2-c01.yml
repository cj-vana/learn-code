prompt_markdown: |
  A city bike-share charges riders by how long they keep a bike out. Write
  `ride_fee(minutes)` that takes the ride length in whole minutes and returns the
  fee in whole cents as an int, using these rules:

  - The first 30 minutes are free, so a ride of 30 minutes or less costs `0`.
  - Every minute beyond the first 30 costs 15 cents.
  - No matter how long the ride is, the fee is capped at 900 cents for the day.

  A 30-minute ride returns `0`, and a very long ride never returns more than `900`.
starter_code: |
  def ride_fee(minutes):
      return 0
function_name: ride_fee
solution_sketch: Return 0 within the free window, otherwise charge per extra minute but never exceed the cap.
sample_solution: |
  def ride_fee(minutes):
      if minutes <= 30:
          return 0
      fee = (minutes - 30) * 15
      if fee > 900:
          return 900
      return fee
hints:
  - level: 1
    text: Handle the free window first, then worry about the charged minutes.
  - level: 2
    text: Only the minutes past 30 are billed, so subtract 30 before multiplying by 15.
  - level: 3
    text: After computing the fee, compare it to 900 and return 900 whenever it would be larger.
