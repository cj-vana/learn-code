explanation_markdown: |
  The problem is a small decision with two guards. The first `if` returns early for
  the free window so the rest of the code only runs for charged rides. Because just
  the minutes beyond 30 are billed, subtracting 30 before multiplying by 15 keeps
  the free time out of the total. The final check enforces the daily cap: any fee
  above 900 is clamped down to 900, so unusually long rides still return a sensible
  number. Returning early keeps each branch simple and avoids nested conditions.
common_mistakes:
  - Multiplying the full minutes by 15 instead of only the minutes past 30.
  - Forgetting the cap, so long rides return more than 900.
  - Using minutes < 30 instead of <= 30 and charging for a ride of exactly 30 minutes.
