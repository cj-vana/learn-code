prompt_markdown: |
  A cycling club records how many kilometres each member rides per day. Write
  `cumulative_distances(daily)` returning a list whose entry at each position is
  the total distance ridden up to and including that day.

  A common beginner bug is to reset the running total back to 0 inside the loop,
  or to append the day's distance instead of the accumulated total. Make sure the
  total carries over from one day to the next. For `[1, 2, 3]` the result is
  `[1, 3, 6]`. An empty log returns an empty list.
starter_code: |
  def cumulative_distances(daily):
      return []
function_name: cumulative_distances
input_mode: function
solution_sketch: Keep one total outside the loop, add each day's distance, and append the total after each step.
sample_solution: |
  def cumulative_distances(daily):
      totals = []
      total = 0
      for distance in daily:
          total += distance
          totals.append(total)
      return totals
hints:
  - level: 1
    text: The total must remember every earlier day, so it cannot start over each iteration.
  - level: 2
    text: Initialise the running total once, before the loop begins.
  - level: 3
    text: Inside the loop, add the day's distance to the total, then append that total.
tests:
  public:
    - name: empty
      input: []
