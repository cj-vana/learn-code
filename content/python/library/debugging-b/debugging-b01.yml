    - name: four_days
      input: [1, 1, 1, 1]
      expected: [1, 2, 3, 4]
explanation_markdown: |
  A running total must be declared once, before the loop, so each iteration adds
  to the value already accumulated. Resetting `total = 0` inside the loop throws
  away that history and leaves every entry equal to a single day's distance. After
  updating the total you append it, so the list grows by one cumulative value per
  day in a single O(n) pass.
common_mistakes:
  - Resetting the running total to 0 inside the loop.
  - Appending the day's distance instead of the accumulated total.
  - Returning None or a single number instead of a list when the log is empty.
