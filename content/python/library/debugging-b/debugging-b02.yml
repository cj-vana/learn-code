prompt_markdown: |
  A vending machine stores the remaining stock count for each slot in order. When
  the operator refreshes the display, every sold-out slot (a count of `0`) should
  disappear while the other counts keep their original order. Write
  `clear_sold_out(counts)` returning a new list with all the zero counts removed.

  A classic beginner bug is to remove entries from the list while looping over that
  same list: deleting an item shifts everything after it, so the loop skips the next
  value and some zeros survive. Build the answer in a fresh list instead. For
  `[2, 0, 3]` the result is `[2, 3]`. An empty machine returns an empty list.
starter_code: |
  def clear_sold_out(counts):
      return []
function_name: clear_sold_out
input_mode: function
solution_sketch: Iterate once and append only the non-zero counts to a new list, leaving the input untouched.
sample_solution: |
  def clear_sold_out(counts):
      remaining = []
      for count in counts:
          if count != 0:
              remaining.append(count)
      return remaining
hints:
  - level: 1
    text: Deleting from a list while you loop over it makes the loop skip the item right after each deletion.
  - level: 2
    text: Leave the input list alone and collect the answer somewhere else.
  - level: 3
    text: Append a count to a new list only when it is not zero.
