explanation_markdown: |
  Mutating a list while iterating over it is unsafe because the loop tracks
  positions by index: when you remove an item, every later item slides one place
  to the left, so the loop's next step jumps past the value that moved into the
  gap. With back-to-back zeros like `[0, 0]`, the second zero is exactly the one
  that gets skipped. Building a separate `remaining` list sidesteps the problem and
  keeps the surviving counts in their original order in a single O(n) pass.
common_mistakes:
  - Calling counts.remove(0) or del inside a loop over the same list, skipping adjacent zeros.
  - Filtering with a truthiness check that also drops legitimate values if the data later included them.
  - Returning None or mutating the caller's list instead of returning a new list.
