explanation_markdown: |
  `math.perm(n, k)` counts ordered arrangements: it multiplies the `k` descending
  factors `n * (n - 1) * ... * (n - k + 1)`. Because the slots are distinguishable,
  it is always at least as large as `math.comb(n, k)` for the same inputs; the
  difference is the `k!` orderings of a chosen group that permutations keep and
  combinations divide away.

  Returning the built-in keeps the result an exact integer, so
  `math.perm(20, 10)` lands on `670442572800` with every digit intact. The edge
  conventions match `math.comb`: too many berths (`k > n`) gives `0`, zero berths
  gives `1`, and filling every berth (`k == n`) gives the full factorial `n!`
  because there is nothing left over.
common_mistakes:
  - Using math.comb instead of math.perm, which undercounts because it ignores the order the berths are filled in.
  - Dividing factorials with true division / and getting a float that loses precision on large n.
  - Assuming k == n is a special case to handle separately; math.perm already returns n! there.
