prompt_markdown: |
  A harbor has `n` ships waiting and `k` numbered berths along the quay. Each
  berth is distinct, so assigning ship A to berth 1 and ship B to berth 2 is a
  different arrangement from the reverse. The number of ways to fill the berths is
  therefore an **ordered** count: the number of `k`-length arrangements drawn from
  `n` ships.

  This is the permutation count `n! / (n - k)!`, but computing it that way risks
  float drift and overflow in other languages. Python's `math.perm` gives the
  exact arbitrary-precision integer directly. Like its combinations sibling, it
  returns `0` when `k` is larger than `n`, and `1` when `k` is `0`. When `k`
  equals `n` it collapses to the full factorial `n!`, since every ship gets a
  berth.

  Write `berth_plans(job)` where `job` is a dictionary with two keys:

  - `"n"`: a non-negative integer, the number of ships.
  - `"k"`: a non-negative integer, the number of berths to fill.

  Return `math.perm(n, k)`, the exact count of distinct berth assignments.

  Example: `berth_plans({"n": 5, "k": 2})` returns `20`, because there are 5
  choices for the first berth and 4 for the second.
