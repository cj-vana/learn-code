body_markdown: |
  Type it into any Python prompt:

  ```python
  0.1 + 0.2 == 0.3        # False
  0.1 + 0.2               # 0.30000000000000004
  ```

  This is not a Python bug — it is the arithmetic of every mainstream
  language, and understanding *why* separates programmers who fear floats
  from those who use them correctly.

  ### Binary fractions can't say "one tenth"

  Floats are binary fractions: sums of 1/2, 1/4, 1/8... in 64 bits (an
  IEEE 754 double). Just as 1/3 has no finite decimal expansion
  (0.333...), **1/10 has no finite binary expansion** — in base two it
  repeats forever (0.0001100110011...). So the literal `0.1` stores the
  nearest representable double, a hair above one tenth; `0.2` a hair
  above two tenths; their sum lands on a double a hair above 0.3 — and
  crucially, a *different* double than the one nearest to the literal
  `0.3`. Two tiny roundings, one visible falsehood.

  What *is* exact: integers (up to 2^53, every whole number is a valid
  double) and binary-friendly fractions (0.5, 0.25, 0.375). This is why
  test suites in this course freely compare halves and quarters but
  never bare thirds or tenths without rounding.

  ### The comparison rule

  Never `==` on computed floats. The tool is tolerance:

  ```python
  import math
  math.isclose(a, b, rel_tol=1e-9)          # relative: scales with magnitude
  math.isclose(a, b, abs_tol=1e-12)         # absolute: for values near zero
  ```

  Relative tolerance asks "equal to ~9 significant digits?" and is the
  right default. The subtle case is **near zero**: rel_tol compares
  against the values' magnitudes, and anything is a huge relative
  distance from 0.0 — so comparisons against zero need `abs_tol`.
  (pytest's `approx` wraps the same idea.)

  ### Error compounds — and order matters

  One rounding is 1e-16 of noise. A *million* additions accumulate noise,
  and worse, float addition is not associative — `(a+b)+c` can differ
  from `a+(b+c)`, so summing the same numbers in a different order gives
  a (slightly) different answer. When the sum must be right:

  ```python
  sum([0.1] * 10)          # 0.9999999999999999
  math.fsum([0.1] * 10)    # 1.0  — error-compensated summation
  ```

  `math.fsum` tracks the lost low-order bits and repays them. Its
  siblings earn their keep too: `math.prod` for products, `math.isqrt`
  for *exact* integer square roots (`int(math.sqrt(n))` fails on large
  perfect squares — a float rounding masquerading as a math error), and
  `math.comb`/`math.perm` for exact combinatorics at any size.

  The escape hatches — when "close" isn't good enough at all — are the
  next lesson: exact decimal and rational arithmetic.
checkpoints:
  - question: Explain, via representability, why 0.1 + 0.2 != 0.3 while 0.25 + 0.5 == 0.75 exactly.
    answer: 'One tenth has no finite binary expansion, so 0.1, 0.2, and 0.3 are all nearest-double approximations, and the sum of the first two rounds to a different double than the third; 0.25 and 0.5 are exact binary fractions (1/4, 1/2), so their arithmetic is exact.'
    explanation: '"Which fractions are exact in base two" is the entire mystery — decimal-friendly values approximate, binary-friendly values don''t.'
  - question: When does math.isclose need abs_tol, and why does the default relative tolerance fail there?
    answer: 'Comparing against values at or near zero — relative tolerance scales with the magnitudes, and every nonzero value is infinitely far from 0.0 in relative terms, so isclose(x, 0.0) is False for any x without an absolute floor.'
    explanation: 'The near-zero case is the standard isclose gotcha: relative for general comparison, absolute for zero-crossing quantities.'
  - question: Why can math.fsum([0.1]*10) return exactly 1.0 when the builtin sum cannot?
    answer: 'fsum performs compensated summation — it tracks the low-order bits each addition would discard and folds them back in, so the final result is correctly rounded; plain sum discards that error at every step and lets it accumulate.'
    explanation: 'Same inputs, same float type — the difference is an algorithm that refuses to lose information, which is why fsum is the tool when sums must be trustworthy.'
