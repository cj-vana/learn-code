prompt_markdown: |
  A clockmaker describes each gear pairing by its tooth ratio — a driving count
  over a driven count — and always records it in lowest terms with a positive
  denominator. `fractions.Fraction` does exactly this normalisation for you, using
  the greatest common divisor.

  Write `fraction_reduce(pair)` where `pair` is a dict with two integer keys:

  - `numerator`: the driving tooth count (may be negative or zero)
  - `denominator`: the driven tooth count (always a non-zero integer, possibly
    negative)

  Build a `Fraction` from the two counts and return the reduced ratio as a
  two-element list `[numerator, denominator]`, where the denominator is positive
  and any sign lives on the numerator.

  Examples:

  - `{"numerator": 6, "denominator": 8}` returns `[3, 4]`
  - `{"numerator": 6, "denominator": -8}` returns `[-3, 4]` (sign moves to the top)
  - `{"numerator": -6, "denominator": -8}` returns `[3, 4]` (two negatives cancel)
  - `{"numerator": 0, "denominator": 5}` returns `[0, 1]` (zero normalises to 0/1)
  - `{"numerator": 100, "denominator": 25}` returns `[4, 1]` (whole-number ratio)
starter_code: |
  from fractions import Fraction


  def fraction_reduce(pair):
      return [0, 1]
function_name: fraction_reduce
input_mode: function
solution_sketch: Construct Fraction(numerator, denominator), which auto-reduces and moves the sign to the numerator, then return its numerator and denominator as a list.
sample_solution: |
  from fractions import Fraction


  def fraction_reduce(pair):
      ratio = Fraction(pair["numerator"], pair["denominator"])
      return [ratio.numerator, ratio.denominator]
