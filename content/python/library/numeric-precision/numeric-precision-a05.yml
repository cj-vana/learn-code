explanation_markdown: |
  A ratio like 6/8 and 3/4 describe the same gearing; "lowest terms" is the unique
  representation you get by dividing both counts by their greatest common divisor
  (here `gcd(6, 8) == 2`). `fractions.Fraction` runs that reduction the moment you
  construct it, so `Fraction(6, 8)` *is* `Fraction(3, 4)`.

  Fraction also fixes the sign convention: the denominator is always kept
  positive, and any negative sign is carried on the numerator. That is why
  `6/-8` becomes `[-3, 4]` and two negatives cancel to `[3, 4]`. A zero numerator
  normalises to `0/1`, and a ratio that divides evenly, like `100/25`, reduces to a
  denominator of `1`. Reading `.numerator` and `.denominator` back out gives you
  the canonical pair.
common_mistakes:
  - Returning the raw input counts without reducing, so 6/8 is reported instead of 3/4.
  - Leaving the negative sign on the denominator instead of letting Fraction move it to the numerator.
  - Returning a tuple (ratio.numerator, ratio.denominator) rather than a list, which the grader treats as a different value.
