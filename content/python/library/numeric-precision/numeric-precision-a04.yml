prompt_markdown: |
  A farmers-market till adds up a basket of prices and must return an exact money
  total — no float drift, no phantom fractions of a cent. Each price arrives as a
  decimal string, so you sum them with `decimal.Decimal` and present the result
  with exactly two decimal places.

  Write `decimal_money_add(amounts)` where `amounts` is a list of price strings
  such as `["0.10", "0.20", "0.30"]`. Add them as `Decimal` values and return the
  total as a string rounded to two decimal places using **half-up** rounding (ties
  go away from zero, the everyday cash-register rule).

  Behaviour to handle:

  - `["0.10", "0.20"]` returns `"0.30"` exactly — the sum a float would report as
    `0.30000000000000004`.
  - An empty list returns `"0.00"`.
  - Prices may carry more than two decimals; round the final total, e.g.
    `["0.125"]` returns `"0.13"`.
  - Prices may be negative (refunds), e.g. `["10.00", "-3.50", "0.55"]` returns
    `"7.05"`.
  - Totals can be arbitrarily large without overflow, e.g.
    `["999999999999.99", "0.01"]` returns `"1000000000000.00"`.
