explanation_markdown: |
  Money is decimal by nature, but binary floats cannot represent most cents
  exactly, so `0.10 + 0.20` drifts to `0.30000000000000004`. `decimal.Decimal`
  built from strings stores the exact digits and adds them the way a cashier
  would, with no drift and no silent overflow even at a trillion dollars.

  Two habits make this correct. First, always construct each amount from its
  string, never from a float — `Decimal(0.10)` would already be the corrupted
  binary value. Second, `quantize` to `Decimal("0.01")` at the end so the total
  always shows two places, and pick `ROUND_HALF_UP` for the familiar cash-register
  tie rule. Starting the running total at `Decimal("0")` also gives the empty
  basket a clean `"0.00"`.
common_mistakes:
  - Summing the prices as floats (or with the built-in float sum) and reintroducing sub-cent drift.
  - Building Decimals from floats, e.g. Decimal(0.10), which carries the binary approximation into the total.
  - Forgetting to quantize, so a value like 0.125 or an empty basket returns without the required two decimal places.
