function_name: decimal_money_add
input_mode: function
solution_sketch: Start from Decimal("0"), add each Decimal(price), then quantize the total to two places with ROUND_HALF_UP and return str.
sample_solution: |
  from decimal import Decimal, ROUND_HALF_UP


  def decimal_money_add(amounts):
      total = Decimal("0")
      for price in amounts:
          total += Decimal(price)
      cents = total.quantize(Decimal("0.01"), rounding=ROUND_HALF_UP)
      return str(cents)
