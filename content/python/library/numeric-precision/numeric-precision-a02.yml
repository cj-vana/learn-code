explanation_markdown: |
  Every float is the nearest binary approximation of its decimal, so `0.1` is
  really a hair more than one tenth. A hand-rolled loop adds those approximations
  one after another and the tiny errors accumulate: `0.1 + 0.2 + 0.3` overshoots to
  `0.6000000000000001`, and ten tenths fall short at `0.9999999999999999`. The
  `catastrophic_cancellation` case is the extreme version — adding `1e16`, then
  `1.0`, then `-1e16` loses the `1.0` entirely because it is too small to survive
  next to `1e16`, so the naive total is `0.0` while the true answer is `1.0`.

  `math.fsum` uses compensated summation: it keeps the discarded low-order bits in
  a set of partial sums and returns the single float closest to the true total.
  Note the deliberate twist in the prompt — since Python 3.12 the built-in `sum`
  *also* compensates for floats, so it would mask the drift. Accumulating by hand
  is what exposes it, and `fsum` is what you reach for when a long list of floats
  must total correctly.
common_mistakes:
  - Using the built-in sum for the naive total; on Python 3.12+ it compensates internally, so identical wrongly comes out True.
  - Rounding the totals before returning, which hides the very drift the exercise is meant to reveal.
  - Comparing the totals with math.isclose instead of ==, so identical reports True even when the bits differ.
