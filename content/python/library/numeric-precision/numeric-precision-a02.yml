prompt_markdown: |
  An apothecary's dispensing arm releases many liquid doses (in millilitres) and
  needs the true combined volume. When you add floats one at a time in a plain
  accumulation loop, each step rounds to the nearest representable value and the
  errors pile up. `math.fsum` instead tracks the lost low-order bits and returns
  the correctly rounded total.

  Write `float_sum_error_demo(volumes)` where `volumes` is a non-empty list of
  floats. Return a dict with exactly these three keys:

  - `naive_total`: the total from a **hand-rolled** left-to-right loop — start at
    `0.0` and add each value with `+=`. (Do *not* use the built-in `sum`: since
    Python 3.12 it quietly applies compensated summation to floats, so it would
    hide the very drift this exercise is about.)
  - `compensated_total`: the result of `math.fsum(volumes)`
  - `identical`: a boolean, `True` when the two totals are bit-for-bit equal,
    `False` when the hand-rolled total has drifted

  Example: `[0.1, 0.2, 0.3]` returns
  `{"naive_total": 0.6000000000000001, "compensated_total": 0.6, "identical": False}`
  because the step-by-step addition overshoots while `fsum` lands exactly on `0.6`.

  Do not round either total — the point of the exercise is to expose the drift.
  When the values add without loss (whole-number floats, or exact halves and
  quarters), the two totals match and `identical` is `True`.
