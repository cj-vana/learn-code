solution_sketch: Accumulate a running total by hand with a += loop starting at 0.0, compute math.fsum on the same list, then report both totals and whether they are exactly equal.
sample_solution: |
  import math


  def float_sum_error_demo(volumes):
      naive_total = 0.0
      for volume in volumes:
          naive_total += volume
      compensated_total = math.fsum(volumes)
      return {
          "naive_total": naive_total,
          "compensated_total": compensated_total,
          "identical": naive_total == compensated_total,
      }
