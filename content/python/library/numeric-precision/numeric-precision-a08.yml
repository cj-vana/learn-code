function_name: courtyard_side
input_mode: function
solution_sketch: Guard the negative case by returning -1, otherwise return math.isqrt(n) for the exact integer floor of the square root.
sample_solution: |
  import math


  def courtyard_side(n):
      if n < 0:
          return -1
      return math.isqrt(n)
