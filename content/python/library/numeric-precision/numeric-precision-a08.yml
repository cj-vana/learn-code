explanation_markdown: |
  `math.isqrt` computes the integer square root purely with integers, so it stays
  exact even when `n` has dozens of digits. That is why the tests include
  `1000000000000000000` (ten to the eighteenth), whose true square root is exactly
  `1000000000`, and its neighbour one below, whose floor drops to `999999999`. A
  float-based `int(math.sqrt(n))` cannot be trusted to split those two apart
  because a 64-bit float only carries about 15-16 significant decimal digits.

  The negative guard matters because `math.isqrt` treats a negative argument as a
  domain error and raises `ValueError` rather than returning a value. Returning a
  sentinel like `-1` lets the caller detect the impossible request without the
  whole program crashing on a single bad tile count.
common_mistakes:
  - Using int(math.sqrt(n)) instead of math.isqrt, which loses precision on large n and can return a value that is off by one.
  - Forgetting the negative guard, so math.isqrt raises ValueError on a bad reading instead of returning the sentinel.
  - Returning math.isqrt(n) + 1 or rounding, which overshoots; the largest square that fits is the floor, not the nearest, square root.
