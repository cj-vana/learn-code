prompt_markdown: |
  A stonemason has a pile of square paving tiles and wants to lay the largest
  perfectly square courtyard possible, edge to edge. If there are `n` tiles, the
  side of that square is the largest whole number `s` with `s * s <= n`, which is
  the floor of the square root of `n`.

  Reaching for `int(math.sqrt(n))` is a trap: `math.sqrt` returns a float, and for
  very large `n` the float cannot hold enough precision, so the answer can come
  out one too high or one too low. The stdlib gives you `math.isqrt`, which works
  in exact integer arithmetic and is correct no matter how astronomically large
  `n` gets. The catch is that `math.isqrt` raises `ValueError` on a negative
  argument, so you must guard against a bad reading first.

  Write `courtyard_side(n)` that takes a single integer `n`:

  - If `n` is negative, there is no real square root, so return `-1` as a sentinel.
  - Otherwise return `math.isqrt(n)`, the exact floor of the square root of `n`.

  Example: `courtyard_side(145)` returns `12`, because `12 * 12` is `144` (which
  fits) but `13 * 13` is `169` (too many tiles). `courtyard_side(-25)` returns
  `-1`.
