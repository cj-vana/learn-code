explanation_markdown: |
  The `fractions.Fraction` constructor normalises every value the moment it is
  built: it divides the numerator and denominator by their greatest common
  divisor and keeps the denominator positive. So for `Fraction(48, 36)` the stored
  form is `4/3`, where `4` is `48 // 12` and `12` is the divisor you are hunting
  for. Dividing the original `a` by that reduced numerator inverts the scaling and
  leaves exactly the greatest common divisor.

  This works entirely in exact integer arithmetic, so it never touches floating
  point and never rounds. It is a handy reminder that reaching for the right
  standard-library type can replace a loop you might otherwise write by hand, and
  that `Fraction` is doing a gcd reduction for you on every construction.
common_mistakes:
  - Dividing by reduced.denominator when a and b are swapped in your head; the divisor comes from a // numerator (or equivalently b // denominator), so keep the pairing straight.
  - Using true division / instead of integer division //, which produces a float like 4.0 rather than the integer 4.
  - Assuming Fraction leaves the value unreduced; it always stores lowest terms, so reduced.numerator is never the original a.
