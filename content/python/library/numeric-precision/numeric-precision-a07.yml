      return 0
function_name: loom_block
input_mode: function
solution_sketch: Build Fraction(a, b) so it auto-reduces, then return a integer-divided by the reduced numerator, which equals the greatest common divisor.
sample_solution: |
  from fractions import Fraction


  def loom_block(job):
      a = job["a"]
      b = job["b"]
      reduced = Fraction(a, b)
      return a // reduced.numerator
