prompt_markdown: |
  A weaving loom threads two colours across the warp: `a` strands of one colour
  and `b` strands of the other. The pattern repeats in equal blocks, and the
  largest block that divides **both** strand counts evenly has a length equal to
  the greatest common divisor of `a` and `b`.

  Instead of writing Euclid's algorithm by hand, lean on Python's exact rational
  type. When you build `Fraction(a, b)`, the `fractions` module immediately
  reduces it to lowest terms by dividing the top and bottom by their greatest
  common divisor. That means the reduced numerator is exactly `a // g`, so you can
  recover the divisor as `g = a // reduced.numerator`.

  Write `loom_block(job)` where `job` is a dictionary with two keys:

  - `"a"`: a positive integer (at least 1).
  - `"b"`: a positive integer (at least 1).

  Build `Fraction(a, b)`, read its `.numerator`, and return `a` divided (using
  integer division `//`) by that numerator. The result is the greatest common
  divisor of `a` and `b`.

  Example: `loom_block({"a": 12, "b": 8})` returns `4`, because `Fraction(12, 8)`
  reduces to `3/2`, and `12 // 3` is `4`.
starter_code: |
  from fractions import Fraction


