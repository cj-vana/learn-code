  originality_notes: Original float-tolerance drill framed as a lens-alignment bench comparing a measured reading against a reference.
prompt_markdown: |
  At an optics workshop, a laser rig reports the position of a lens as a floating
  point number. Because floats carry tiny rounding error, you must never test two
  readings with `==`. Instead you compare them with a tolerance.

  Write `is_close_enough(reading)` where `reading` is a dict with four keys:

  - `measured`: the reading the rig produced (float)
  - `reference`: the target position (float)
  - `rel_tol`: the relative tolerance (float, a fraction of the larger magnitude)
  - `abs_tol`: the absolute tolerance (float, a fixed floor near zero)

  Return `True` when the two values are within tolerance and `False` otherwise,
  using exactly the rule that `math.isclose` implements:

  `abs(measured - reference) <= max(rel_tol * max(abs(measured), abs(reference)), abs_tol)`

  Example: `{"measured": 5.0, "reference": 5.0, "rel_tol": 1.0e-9, "abs_tol": 0.0}`
  returns `True`.

  Edge cases you must handle:

  - Values that differ only by float rounding drift (e.g. `0.30000000000000004`
    vs `0.3`) are close under a small `rel_tol`.
  - Comparing against `0.0` with only a relative tolerance is effectively never
    close, because `rel_tol` scales by the magnitude (which is near zero). Such a
    case is only close when `abs_tol` is large enough to cover the gap.
starter_code: |
  import math


  def is_close_enough(reading):
      return False
function_name: is_close_enough
input_mode: function
solution_sketch: Pull the four keys out of the dict and hand them to math.isclose with rel_tol and abs_tol as keyword arguments; return its boolean result.
sample_solution: |
  import math


  def is_close_enough(reading):
      return math.isclose(
          reading["measured"],
          reading["reference"],
          rel_tol=reading["rel_tol"],
          abs_tol=reading["abs_tol"],
      )
