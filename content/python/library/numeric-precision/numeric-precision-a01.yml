explanation_markdown: |
  Floating point stores most decimals as the nearest binary approximation, so two
  computations that are "the same" mathematically can differ in their last bits.
  Testing with `==` turns that harmless drift into a false mismatch. `math.isclose`
  gives you a tolerance band instead: the values pass when their difference is no
  bigger than the larger of a *relative* allowance (`rel_tol` times the bigger
  magnitude) and an *absolute* allowance (`abs_tol`).

  The relative term is what you usually want, but it collapses to almost nothing
  when both values are near zero, since it scales by magnitude. That is why the
  near-zero cases need an explicit `abs_tol` floor to ever count as close. Choosing
  both tolerances deliberately is the whole skill here.
common_mistakes:
  - Comparing the two readings with == and reporting spurious mismatches from harmless rounding drift.
  - Passing rel_tol positionally, which lands it in the wrong parameter slot; it must be a keyword argument.
  - Expecting a value to be close to 0.0 using only rel_tol, forgetting that the relative band vanishes near zero and abs_tol is required.
