explanation_markdown: |
  Fractions are the right tool whenever the exact value matters and the numbers are
  rational. `1/3 + 1/6` is exactly `1/2`, but in floats it lands on
  `0.4999999999999999`, because neither third nor sixth is representable in binary.
  `fractions.Fraction` keeps a numerator and denominator as arbitrary-precision
  integers, so every `+`, `-`, `*`, and `/` is computed exactly and the answer is
  automatically reduced to lowest terms with a positive denominator.

  Because Fraction overloads the arithmetic operators, the only real work is
  dispatching on the operation name and reading `.numerator`/`.denominator` back
  out. Subtracting equal fractions gives the canonical zero `0/1`, dividing
  `3/4` by `1/4` gives the whole number `3/1`, and a product like `2/3 * 3/4`
  reduces from `6/12` down to `1/2` on its own.
common_mistakes:
  - Converting the fractions to floats to do the math, which reintroduces rounding error the exercise is designed to avoid.
  - Returning the result without reading .numerator/.denominator, so a Fraction object leaks out instead of a [num, den] list.
  - Reversing operands for sub or div (computing b - a or b / a) instead of the specified a op b order.
