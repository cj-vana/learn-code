prompt_markdown: |
  A cabinetmaker works in fractional inches — halves, quarters, thirds — and needs
  exact answers when combining them. Floats would turn `1/3 + 1/6` into a fuzzy
  `0.4999999999999999`, so you use `fractions.Fraction`, which stays exact and
  always reports the result in lowest terms.

  Write `fraction_arithmetic(request)` where `request` is a dict with three keys:

  - `a`: the first measurement as a two-element list `[numerator, denominator]`
  - `b`: the second measurement as a two-element list `[numerator, denominator]`
  - `op`: one of the operation names (strings) `"add"`, `"sub"`, `"mul"`, `"div"`

  Build a `Fraction` from each pair, apply the operation (`a op b`, so `"sub"` is
  `a - b` and `"div"` is `a / b`), and return the exact result as a reduced
  two-element list `[numerator, denominator]` with a positive denominator.

  Examples:

  - `{"a": [1, 2], "b": [1, 3], "op": "add"}` returns `[5, 6]`
  - `{"a": [1, 3], "b": [1, 6], "op": "add"}` returns `[1, 2]` (exact, where floats
    would drift)
  - `{"a": [2, 3], "b": [3, 4], "op": "mul"}` returns `[1, 2]` (6/12 reduces)
  - `{"a": [1, 2], "b": [3, 4], "op": "div"}` returns `[2, 3]`
  - `{"a": [-1, 2], "b": [1, 2], "op": "add"}` returns `[0, 1]`

  You may assume `b` is non-zero whenever `op` is `"div"`.
starter_code: |
  from fractions import Fraction


  def fraction_arithmetic(request):
      return [0, 1]
function_name: fraction_arithmetic
input_mode: function
solution_sketch: Build Fraction(*a) and Fraction(*b), branch on the op name to add/subtract/multiply/divide them, then return the reduced result's numerator and denominator as a list.
sample_solution: |
  from fractions import Fraction


  def fraction_arithmetic(request):
      a = Fraction(request["a"][0], request["a"][1])
      b = Fraction(request["b"][0], request["b"][1])
      op = request["op"]
      if op == "add":
          result = a + b
      elif op == "sub":
          result = a - b
      elif op == "mul":
          result = a * b
      else:
          result = a / b
      return [result.numerator, result.denominator]
