function_name: register_demo
input_mode: function
solution_sketch: Compute exact = base ** exponent, take exact modulo 2**64 to get the low 64 bits, subtract 2**64 when that is at least 2**63 to interpret it as signed, and flag overflow when exact lies outside the signed 64-bit range.
sample_solution: |
  def register_demo(job):
      exact = job["base"] ** job["exponent"]
      modulus = 1 << 64
      half = 1 << 63
      low_bits = exact % modulus
      wrapped = low_bits - modulus if low_bits >= half else low_bits
      overflowed = not (-half <= exact <= half - 1)
      return {
          "exact": exact,
          "wrapped64": wrapped,
          "overflowed": overflowed,
      }
hints:
  - level: 1
    text: Python's ** never overflows, so exact = base ** exponent is always the true value; the work is simulating what a fixed-width register would keep.
  - level: 2
    text: The low 64 bits are exact % (2**64), which Python makes non-negative even for negative exact; that is the unsigned view of the register.
  - level: 3
    text: To read those bits as signed two's complement, subtract 2**64 when they are 2**63 or larger; overflow is true whenever exact is outside -2**63 .. 2**63 - 1.
