explanation_markdown: |
  Python integers are arbitrary precision: `10 ** 30` is stored exactly as a
  thirty-one-digit number, no overflow, no rounding. That is the headline of the
  exhibit and the reason the `"exact"` field can hold values far beyond any
  hardware register.

  Simulating the vintage register is a two's-complement exercise. Taking `exact %
  (2**64)` keeps only the low 64 bits, and because Python's `%` returns a
  non-negative result even for negative operands, that is precisely the register's
  unsigned bit pattern. Reinterpreting it as signed means splitting the range in
  half: patterns below `2**63` are their own value, while patterns from `2**63`
  upward represent negatives and get `2**64` subtracted. The boundary cases are
  the teachable ones: `2**63` overflows and flips to the most negative value, yet
  `-2**63` fits exactly because the signed range is deliberately lopsided, running
  from `-2**63` up to only `2**63 - 1`.
common_mistakes:
  - Masking to 64 bits before checking overflow, so you compare the wrapped value against the range instead of the true exact value and always report no overflow.
  - Treating the range as symmetric (-2**63 .. 2**63), which wrongly flags -2**63 as an overflow; the maximum is 2**63 - 1 but the minimum is exactly -2**63.
  - Assuming exact % (2**64) is negative for a negative base result; in Python the remainder takes the sign of the divisor, so it is already the non-negative unsigned pattern you want.
