prompt_markdown: |
  A computing museum runs an exhibit that computes `base` raised to `exponent` two
  ways at once: on a modern Python interpreter, whose integers grow without bound,
  and on a vintage machine with a single **signed 64-bit register**, whose values
  silently wrap around. The exhibit shows visitors exactly when the old hardware
  would have produced a wrong (wrapped) answer.

  A signed 64-bit register holds values in the range `-2**63` up to `2**63 - 1`.
  When a true value falls outside that range, the hardware keeps only the value
  modulo `2**64` and reinterprets it as a two's-complement signed number: if the
  low 64 bits are `2**63` or larger, subtract `2**64` to land back in range.

  Write `register_demo(job)` where `job` is a dictionary with two keys:

  - `"base"`: an integer (which may be negative).
  - `"exponent"`: a non-negative integer.

  First compute the exact value `exact = base ** exponent` — a Python integer that
  never overflows. Then compute what the vintage register would hold. Return a
  dictionary with exactly these three keys:

  - `"exact"`: the true Python integer `base ** exponent`.
  - `"wrapped64"`: `exact` reduced into the signed 64-bit range as described above.
  - `"overflowed"`: a boolean, `True` if `exact` did not fit in `-2**63 .. 2**63 - 1`,
    otherwise `False`.

  Example: `register_demo({"base": 2, "exponent": 63})` returns
  `{"exact": 9223372036854775808, "wrapped64": -9223372036854775808, "overflowed": True}`,
  because `2**63` is one larger than the biggest signed 64-bit value, so the
  register wraps to the most negative value.
starter_code: |
  def register_demo(job):
