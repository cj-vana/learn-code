prompt_markdown: |
  An observatory has `n` telescopes and wants to point exactly `k` of them at a
  passing comet. Only which telescopes are chosen matters, not the order they are
  picked, so the number of distinct crews is the binomial coefficient "n choose
  k".

  Computing that by multiplying and dividing factorials by hand overflows in most
  languages and drifts if you use floats. Python's `math.comb` computes it exactly
  as an arbitrary-precision integer, and it already handles the awkward edges: it
  returns `0` when `k` is larger than `n` (you cannot choose more telescopes than
  exist) and `1` when `k` is `0` (there is exactly one way to choose nothing).

  Write `comet_crews(job)` where `job` is a dictionary with two keys:

  - `"n"`: a non-negative integer, the number of telescopes.
  - `"k"`: a non-negative integer, the number to point at the comet.

  Return `math.comb(n, k)`, the exact count of distinct crews.

  Example: `comet_crews({"n": 5, "k": 2})` returns `10`, the number of ways to
  pick 2 telescopes out of 5.
