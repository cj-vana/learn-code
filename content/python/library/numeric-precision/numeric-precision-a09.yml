explanation_markdown: |
  `math.comb(n, k)` returns the exact number of ways to choose `k` items from `n`
  without regard to order. Because Python integers grow without bound, the answer
  for something like `math.comb(50, 25)` comes out as the precise
  `126410606437752` rather than a rounded float. Any approach that built the value
  from `math.factorial(n) / (math.factorial(k) * math.factorial(n - k))` with true
  division `/` would produce a float and lose the last digits for large inputs.

  The two edge cases fall out for free: choosing more than you have
  (`k > n`) yields `0`, and choosing zero items yields `1` because the empty
  selection is the single valid "crew" of nothing. Relying on the built-in keeps
  those conventions consistent so you never special-case them yourself.
common_mistakes:
  - Building the answer from factorials with true division /, which returns a float and loses precision for large n.
  - Computing an ordered count (permutations) instead of an unordered one; comb divides out the k! orderings that perm keeps.
  - Special-casing k > n or k == 0 by hand and getting the boundary wrong; math.comb already returns 0 and 1 respectively.
