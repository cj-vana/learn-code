explanation_markdown: |
  `math.prod` is the multiplicative twin of `sum`: it folds an iterable into a
  single product. The trick here is what it folds *over*. By converting each pair
  to a `fractions.Fraction`, every multiplication is exact rational arithmetic, so
  `(3/2) * (4/3)` is computed as `12/6` and stored in lowest terms as `2/1` with no
  floating-point noise. Chaining the same factors as floats would accumulate tiny
  representation errors that a long season could magnify.

  Two details make it robust. Passing `start=Fraction(1)` means an empty list
  returns the identity `Fraction(1)` rather than a plain `int`, and it keeps the
  running product a `Fraction` throughout. And because `Fraction` normalises sign
  and reduces on every step, a factor of `[0, 1]` collapses the whole product to
  `0/1`, and a negative numerator like `[-1, 2]` keeps its sign in the numerator
  while the denominator stays positive.
common_mistakes:
  - Multiplying the raw numerators and denominators separately without reducing, so the result is a correct value in un-reduced terms like [12, 6] instead of [2, 1].
  - Folding over floats (dividing num by den first), which reintroduces the rounding drift the exercise exists to avoid.
  - Forgetting start=Fraction(1), so the empty list returns a plain int 1 with no .numerator/.denominator to unpack, or the running product falls back to int math.
