prompt_markdown: |
  A greenhouse tracks how a seedbed grows week by week. Each week's growth is an
  exact ratio, like "grew by three-halves" written as the pair `[3, 2]` meaning
  the numerator `3` over the denominator `2`. Over a season the overall growth is
  the product of every week's factor, and it must stay **exact** — chaining these
  as floats would let rounding error creep in and drift away from the true value.

  Fold the factors with `math.prod`, but over `fractions.Fraction` values instead
  of floats so the arithmetic is exact and reduces to lowest terms automatically.
  Start the product from `Fraction(1)` so an empty season correctly yields the
  identity `1` (that is, `1/1`).

  Write `season_factor(factors)` where `factors` is a list of two-element lists.
  Each inner list is `[numerator, denominator]`, where the numerator is an integer
  (which may be zero or negative) and the denominator is a positive integer.

  Return the total growth as a two-element list `[numerator, denominator]` in
  lowest terms, taking the sign and the reduction from `Fraction`. An empty list
  returns `[1, 1]`.

  Example: `season_factor([[3, 2], [4, 3]])` returns `[2, 1]`, because
  `(3/2) * (4/3)` is `12/6`, which reduces to `2/1`.
starter_code: |
  import math
  from fractions import Fraction


  def season_factor(factors):
      return [1, 1]
function_name: season_factor
input_mode: function
solution_sketch: Turn each [num, den] pair into a Fraction, fold them with math.prod starting from Fraction(1), then return the result's numerator and denominator as a two-element list already in lowest terms.
sample_solution: |
  import math
  from fractions import Fraction


  def season_factor(factors):
      pieces = [Fraction(num, den) for num, den in factors]
      total = math.prod(pieces, start=Fraction(1))
      return [total.numerator, total.denominator]
