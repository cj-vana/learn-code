prompt_markdown: |
  A coffee roastery weighs each bag of beans and must round the reading to a fixed
  number of decimal places — but different customers demand different rounding
  policies. Because the weight arrives as an exact decimal string, you round with
  `decimal.Decimal`, which honours the true digits (unlike `round()` on a float,
  where `round(2.675, 2)` famously gives `2.67`).

  Write `decimal_round(request)` where `request` is a dict with three keys:

  - `value`: the weight as a decimal string, e.g. `"2.675"`
  - `places`: a non-negative integer number of decimal places to keep
  - `mode`: one of these rounding-policy names (strings):
    - `"HALF_UP"` — ties round away from zero
    - `"HALF_EVEN"` — ties round to the nearest even digit (banker's rounding)
    - `"UP"` — always away from zero
    - `"DOWN"` — always toward zero (truncate)
    - `"CEILING"` — always toward positive infinity
    - `"FLOOR"` — always toward negative infinity

  Return the rounded number as a string, quantised to exactly `places` decimals.
  For example `{"value": "2.675", "places": 2, "mode": "HALF_UP"}` returns
  `"2.68"`, while the same value with `"HALF_EVEN"` at 2 places also gives
  `"2.68"`. When `places` is `0`, return a whole-number string with no decimal
  point, e.g. `"3"`. Negative values are rounded by the same policy, so
  `CEILING` on `"-2.671"` at 2 places gives `"-2.67"`.
starter_code: |
  from decimal import Decimal


  def decimal_round(request):
