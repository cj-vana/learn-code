explanation_markdown: |
  The float `2.675` is stored as slightly less than 2.675, so `round(2.675, 2)`
  quietly rounds *down* to `2.67`. Building a `Decimal` from the *string* `"2.675"`
  keeps the exact digits, so the tie is a real tie and the rounding policy decides
  the outcome.

  `quantize` rounds a Decimal to the exponent of a "quantum" you supply:
  `Decimal("0.01")` for two places, `Decimal("1")` for zero. The `rounding`
  argument selects the policy. `HALF_UP` and `HALF_EVEN` only differ on exact
  ties — `2.665` goes to `2.67` under HALF_UP but to the even `2.66` under
  banker's rounding, which is why financial systems favour HALF_EVEN to avoid a
  systematic upward bias. `CEILING`/`FLOOR` are direction-based (toward positive
  or negative infinity), so their behaviour on negatives is the mirror of what you
  might expect from `UP`/`DOWN`.
common_mistakes:
  - Constructing the Decimal from a float (Decimal(2.675)) instead of the string, which reintroduces the very drift you were avoiding.
  - Returning the Decimal object or a float rather than str, so the value no longer carries a fixed number of places.
  - Confusing CEILING/FLOOR (direction toward infinities) with UP/DOWN (magnitude away from/toward zero) on negative inputs.
