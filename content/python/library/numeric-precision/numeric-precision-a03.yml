function_name: decimal_round
input_mode: function
solution_sketch: Map each policy name to its decimal.ROUND_* constant, build a quantum of the right number of places, then quantize the Decimal(value) with that rounding mode and return str of the result.
sample_solution: |
  from decimal import (
      Decimal,
      ROUND_HALF_UP,
      ROUND_HALF_EVEN,
      ROUND_UP,
      ROUND_DOWN,
      ROUND_CEILING,
      ROUND_FLOOR,
  )


  def decimal_round(request):
      modes = {
          "HALF_UP": ROUND_HALF_UP,
          "HALF_EVEN": ROUND_HALF_EVEN,
          "UP": ROUND_UP,
          "DOWN": ROUND_DOWN,
          "CEILING": ROUND_CEILING,
          "FLOOR": ROUND_FLOOR,
      }
      value = Decimal(request["value"])
      quantum = Decimal(1).scaleb(-request["places"])
      rounded = value.quantize(quantum, rounding=modes[request["mode"]])
      return str(rounded)
hints:
  - level: 1
    text: Build the Decimal straight from the string so the exact digits survive; a float would already have corrupted the tie.
  - level: 2
    text: quantize needs a quantum that carries the target number of decimals; Decimal(1).scaleb(-places) gives 0.01 for two places and 1 for zero.
  - level: 3
    text: Look up the ROUND_* constant for the mode name in a dict, pass it as rounding= to quantize, and return str of the result.
