prompt_markdown: |
  A dinner club seats its guests in a single row of chairs, one guest per chair.
  Two guests are feuding and must never end up in adjacent chairs. Write
  `count_seatings(data)` where `data` is a dict with keys `guests` (a list of
  distinct names) and `feud` (a two-element list naming the feuding pair).
  Return how many distinct left-to-right seatings keep the feuding pair out of
  neighboring chairs. Guest names are distinct, and an empty row has one
  seating.
