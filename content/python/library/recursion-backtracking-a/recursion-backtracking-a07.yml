explanation_markdown: |
  We construct the row one seat at a time. At each seat we try every guest who
  has not been placed yet, marking and unmarking them as we go, the classic
  backtracking shape. The only extra rule prunes a branch early: if the guest
  about to sit is the feuding partner of whoever is already in the previous
  seat, we skip that choice. Because the feud only cares about neighbors,
  checking the previous seat is enough. Counting only fully filled rows gives the
  answer. For `n` guests the total number of arrangements without the pair
  adjacent works out to `n! - 2 * (n - 1)!`, which the search reproduces:
  three guests give 2, four give 12, five give 72.
common_mistakes:
  - Comparing the new guest only to the first seat instead of the immediately previous one.
  - Forgetting to unmark a guest after exploring, so later branches think they are still seated.
  - Counting partial rows rather than only rows where every seat is filled.
