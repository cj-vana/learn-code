function_name: count_seatings
input_mode: function
solution_sketch: Build the row one seat at a time, skipping any guest that would sit next to the other feuding guest, and count every completed row.
sample_solution: |
  def count_seatings(data):
      guests = data["guests"]
      feud = set(data["feud"])
      used = [False] * len(guests)
      row = []
      count = 0

      def place(position):
          nonlocal count
          if position == len(guests):
              count += 1
              return
          for i in range(len(guests)):
              if used[i]:
                  continue
              name = guests[i]
              if row and {row[-1], name} == feud:
                  continue
              used[i] = True
              row.append(name)
              place(position + 1)
              row.pop()
              used[i] = False

      place(0)
      return count
hints:
  - level: 1
    text: Fill the row seat by seat, trying every guest who has not been placed yet.
  - level: 2
    text: Before placing a guest, check whether it and the guest already in the previous seat are the feuding pair.
  - level: 3
    text: Skip a candidate when {previous_seat, candidate} equals the feud set, and count a row only when all seats are filled.
