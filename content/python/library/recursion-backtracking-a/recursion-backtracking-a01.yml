explanation_markdown: |
  Each element is one of two shapes: a number to add, or a list to explore.
  Recursion mirrors that split. For a list element we call `total_items` again,
  which handles its own contents the same way, no matter how deep the nesting
  goes. The base case is implicit: a loop over an empty list adds nothing and
  returns the running total. Every integer is visited exactly once, so the work
  is proportional to the number of nodes in the structure.
common_mistakes:
  - Trying to add a nested list directly instead of recursing into it.
  - Forgetting that the input can nest more than one level deep.
  - Resetting the running total inside the recursive call.
