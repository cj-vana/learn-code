prompt_markdown: |
  A warehouse packs items into totes, and a tote may hold either a plain
  item count (an integer) or smaller sub-totes nested inside it (a list).
  Write `total_items(bins)` where `bins` is a list that can contain integers
  and other lists nested to any depth. Return the sum of every integer found
  anywhere in the structure. An empty list contributes nothing.
starter_code: |
  def total_items(bins):
      return 0
function_name: total_items
input_mode: function
solution_sketch: Walk the list; add integers directly and recurse into any nested list, summing the results.
sample_solution: |
  def total_items(bins):
      total = 0
      for item in bins:
          if isinstance(item, list):
              total += total_items(item)
          else:
              total += item
      return total
hints:
  - level: 1
    text: A tote is either a number you add or a list you must look inside.
  - level: 2
    text: When an element is itself a list, call the same function on it and add whatever it returns.
  - level: 3
    text: Keep a running total; for each element use isinstance(item, list) to decide between recursing and adding.
