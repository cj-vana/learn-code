explanation_markdown: |
  Every scoop presents a yes-or-no decision, and the full set of choices forms a
  binary tree. Each path down the tree corresponds to one candidate subset. We
  carry a `remaining` target and subtract a scoop's calories when we take it. A
  leaf where `remaining` is exactly 0 marks a valid subset and contributes 1;
  running past the last scoop or overshooting contributes 0. Summing both
  branches at every node totals all subsets that land on the target. For
  `[2, 3, 5]` reaching 5, the winners are `{5}` and `{2, 3}`.
common_mistakes:
  - Stopping at the first subset found instead of counting every one.
  - Reusing the same scoop by not advancing the index on the take branch.
  - Checking the index bound before the success check, which misses subsets that complete on the last scoop.
