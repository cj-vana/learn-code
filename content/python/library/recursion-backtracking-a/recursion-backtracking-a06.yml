function_name: count_exact_cups
input_mode: function
solution_sketch: For each scoop branch into taking or skipping it, counting a subset whenever the remaining target reaches exactly 0.
sample_solution: |
  def count_exact_cups(data):
      scoops = data["scoops"]
      target = data["target"]

      def build(index, remaining):
          if remaining == 0:
              return 1
          if index == len(scoops) or remaining < 0:
              return 0
          take = build(index + 1, remaining - scoops[index])
          skip = build(index + 1, remaining)
          return take + skip

      return build(0, target)
hints:
  - level: 1
    text: At each scoop you make one of two choices, use it or leave it out.
  - level: 2
    text: Track how much target is left; a subset succeeds the moment the remainder hits exactly 0.
  - level: 3
    text: Recurse once with remaining - scoops[index] and once with remaining unchanged, and add the two counts.
