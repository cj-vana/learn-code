prompt_markdown: |
  A frozen-yogurt bar offers a row of scoops, each with a positive calorie
  value, and a customer wants a cup that totals an exact calorie `target`. Each
  scoop can be used at most once. Write `count_exact_cups(data)` where `data` is
  a dict with keys `scoops` (a list of positive integers) and `target` (an
  integer). Return how many distinct subsets of the scoops add up to exactly the
  target. The empty selection counts only when the target is 0.
starter_code: |
