explanation_markdown: |
  Each bag is a selection of `size` treats with the input order preserved and no
  treat repeated. The `start` index is what enforces both rules: every recursive
  step only looks at treats to the right of the last one picked, so choices never
  double back. When the partial bag reaches `size` we snapshot a copy into the
  results, then the pop undoes the last choice so the loop can try the next
  treat, the backtracking step. Size 0 records the empty bag immediately, and a
  size larger than the shelf never fills a bag, so no bags are recorded.
common_mistakes:
  - Looping from 0 instead of start, which produces reordered duplicate bags.
  - Appending current directly instead of a copy, so later pops mutate saved bags.
  - Forgetting to pop after recursing, leaving stale treats in the partial bag.
