function_name: gift_bags
input_mode: function
solution_sketch: Walk the treats with a start index, appending choices to a partial bag and recording it once it reaches the requested size.
sample_solution: |
  def gift_bags(data):
      treats = data["treats"]
      size = data["size"]
      result = []
      current = []

      def build(start):
          if len(current) == size:
              result.append(list(current))
              return
          for i in range(start, len(treats)):
              current.append(treats[i])
              build(i + 1)
              current.pop()

      build(0)
      return result
hints:
  - level: 1
    text: Grow a partial bag one treat at a time and record it once it reaches the requested size.
  - level: 2
    text: Pass a start index so each step only considers treats that come after the last one chosen, avoiding repeats and reorderings.
  - level: 3
    text: Loop i from start, append treats[i], recurse with i + 1, then pop to undo the choice before trying the next i.
