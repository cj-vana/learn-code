prompt_markdown: |
  A gift shop assembles bags that each hold exactly `size` different treats,
  chosen from a list of distinct `treats`. Write `gift_bags(data)` where `data`
  is a dict with keys `treats` (a list of distinct names) and `size` (an
  integer). Return a list of every possible bag, where each bag is a list of
  treat names. Keep the treats inside each bag in the same order they appear in
  the input, and list the bags in that same left-to-right order. Asking for a
  bag of size 0 yields one empty bag; asking for more treats than exist yields no
  bags.
