prompt_markdown: |
  A music app stores each song as a short `code` string, and a "rewind" feature
  plays the characters back to front. Write `reverse_code(code)` that returns
  the characters of `code` in reverse order, but build it recursively: peel off
  one character per call instead of reversing the whole string at once. An empty
  string returns an empty string.
starter_code: |
  def reverse_code(code):
      return ""
function_name: reverse_code
input_mode: function
solution_sketch: Return the last character joined to the recursive reversal of everything before it, stopping at length 0 or 1.
sample_solution: |
  def reverse_code(code):
      if len(code) <= 1:
          return code
      return code[-1] + reverse_code(code[:-1])
hints:
  - level: 1
    text: A one-character (or empty) string is already its own reverse.
  - level: 2
    text: The reverse of a string is its last character followed by the reverse of the rest.
  - level: 3
    text: Return code[-1] + reverse_code(code[:-1]) and let the base case handle length 0 or 1.
