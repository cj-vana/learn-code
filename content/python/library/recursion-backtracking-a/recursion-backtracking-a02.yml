explanation_markdown: |
  The recursive definition of a reversal is short: the last character comes
  first, and behind it sits the reversal of everything else. Each call handles
  one character and hands the smaller remainder to the next call, so a string of
  length `n` unwinds through `n` calls before the base case (length 0 or 1)
  returns. The characters then reattach in reverse as the calls resolve.
common_mistakes:
  - Forgetting the base case, so the recursion never stops.
  - Slicing the wrong end and shrinking the string on the side you already kept.
  - Returning the recursive call without attaching the peeled-off character.
