explanation_markdown: |
  Depth is defined in terms of itself: a folder is one deeper than its deepest
  child. The base case is a folder with no subfolders, which has depth 1. For a
  non-empty folder we ask each subfolder for its own depth, take the largest,
  and add 1 for the current level. Because every subfolder is strictly smaller
  than its parent, the recursion always bottoms out at empty lists.
common_mistakes:
  - Returning 0 for an empty folder, which shifts every depth down by one.
  - Adding the child depths together instead of taking their maximum.
  - Calling max on an empty sequence by not handling the leaf case first.
