  originality_notes: Original backup-folder scenario where nested lists model subfolders and recursion reports the deepest nesting level.
prompt_markdown: |
  A backup tool describes a folder as a list of its subfolders, and each
  subfolder is described the same way. A folder with no subfolders is an empty
  list. Write `folder_depth(tree)` that returns how many folders deep the
  deepest branch goes. A folder with no subfolders has depth 1, a folder holding
  only empty subfolders has depth 2, and so on.
starter_code: |
  def folder_depth(tree):
      return 0
function_name: folder_depth
input_mode: function
solution_sketch: A leaf folder has depth 1; otherwise return 1 plus the largest depth among its subfolders.
sample_solution: |
  def folder_depth(tree):
      if not tree:
          return 1
      return 1 + max(folder_depth(sub) for sub in tree)
hints:
  - level: 1
    text: An empty list is a folder with nothing inside, so its depth is just 1.
  - level: 2
    text: A non-empty folder is one level deeper than its deepest subfolder.
  - level: 3
    text: Return 1 + max(folder_depth(sub) for sub in tree), and return 1 when tree is empty.
tests:
