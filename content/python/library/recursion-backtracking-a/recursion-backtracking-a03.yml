explanation_markdown: |
  Each pass replaces the number with the sum of its digits, which is always much
  smaller, so the value shrinks quickly toward a single digit. The base case
  (`number < 10`) stops the recursion and returns the result. Because summing
  digits never increases the value, the recursion is guaranteed to terminate.
  38 becomes 11 becomes 2; 12345 becomes 15 becomes 6.
common_mistakes:
  - Summing the digits only once and returning that instead of recursing until one digit remains.
  - Using a stopping condition of number == 0, which skips non-zero single digits.
  - Forgetting that 0 is already a single digit and should be returned as-is.
