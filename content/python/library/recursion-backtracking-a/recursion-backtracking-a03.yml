prompt_markdown: |
  A cafe turns each loyalty card number into a single "check digit" by adding
  up its digits, then adding the digits of that result, and repeating until only
  one digit is left. Write `digit_root(number)` that returns this final single
  digit for a non-negative integer `number`. If `number` is already a single
  digit, return it unchanged.
starter_code: |
  def digit_root(number):
      return 0
function_name: digit_root
input_mode: function
solution_sketch: If the number is below 10 return it; otherwise sum its digits and recurse on that smaller sum.
sample_solution: |
  def digit_root(number):
      if number < 10:
          return number
      digit_sum = 0
      n = number
      while n > 0:
          digit_sum += n % 10
          n //= 10
      return digit_root(digit_sum)
hints:
  - level: 1
    text: A number under 10 is already the answer, so that is your stopping point.
  - level: 2
    text: Add up the digits once, then feed that smaller total back through the same process.
  - level: 3
    text: Compute the digit sum with % 10 and // 10, then return digit_root(digit_sum).
