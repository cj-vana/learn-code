explanation_markdown: |
  Every crossing starts with either a one-stone hop or a two-stone hop, and
  those two choices lead to completely separate sets of sequences. So the count
  for `stones` is the count for `stones - 1` plus the count for `stones - 2`.
  The base cases anchor it: reaching the end exactly is one way, and overshooting
  (a negative remainder) is zero ways. The counts grow as 1, 1, 2, 3, 5, 8, 13,
  so six stones give 13 and ten give 89.
common_mistakes:
  - Returning 0 instead of 1 for zero stones, which makes every count collapse to zero.
  - Only recursing on one of the two hop sizes.
  - Ignoring the negative case, so an over-long hop is counted as a valid crossing.
