prompt_markdown: |
  A delivery robot crosses a garden path of `stones` stepping stones laid in a
  line. On each hop it moves forward exactly one stone or exactly two stones.
  Write `count_hop_patterns(stones)` returning how many distinct sequences of
  hops land it exactly on the far end. Crossing zero stones counts as one way
  (the robot simply does not hop).
starter_code: |
  def count_hop_patterns(stones):
      return 0
function_name: count_hop_patterns
input_mode: function
solution_sketch: The ways to finish equal the ways after a one-stone hop plus the ways after a two-stone hop, with small base cases.
sample_solution: |
  def count_hop_patterns(stones):
      if stones < 0:
          return 0
      if stones == 0:
          return 1
      return count_hop_patterns(stones - 1) + count_hop_patterns(stones - 2)
hints:
  - level: 1
    text: Think about the very first hop, either one stone or two, and what remains after it.
  - level: 2
    text: The total ways are the ways to cross what is left after a one-hop plus the ways after a two-hop.
  - level: 3
    text: Return count_hop_patterns(stones - 1) + count_hop_patterns(stones - 2), with 0 stones as one way and negatives as zero.
