explanation_markdown: |
  The key idea is that "visits" means distinct days, so each member maps to a
  **set** of days rather than a raw scan count. `setdefault(member, set())` builds
  that mapping in one pass, and adding a day to a set silently drops same-day
  re-entries. After the pass, a member qualifies when their day-set holds two or
  more days, and sorting the survivors gives a stable, predictable result. The
  whole thing is O(n) work plus the final sort.
common_mistakes:
  - Counting raw scans, so two same-day entries wrongly look like two visits.
  - Using a list of days instead of a set and never deduplicating same-day entries.
  - Returning the members in dict order instead of sorting them.
