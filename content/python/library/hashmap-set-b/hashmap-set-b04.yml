prompt_markdown: |
  A museum scans a membership card each time a member walks through the door and
  stores an entry as a two-item list `[member, day]`. A member may re-enter on the
  same day (for example, after stepping out for lunch), and those repeat scans
  should not count as separate visits. Write `repeat_visitors(entries)` that
  returns a sorted list of the members who entered on **at least two different
  days**. `entries` is a list of `[member, day]` lists.
starter_code: |
  def repeat_visitors(entries):
      return []
function_name: repeat_visitors
input_mode: function
solution_sketch: Map each member to a set of the distinct days they entered, then keep members with two or more days.
sample_solution: |
  def repeat_visitors(entries):
      days_by_member = {}
      for member, day in entries:
          days_by_member.setdefault(member, set()).add(day)
      result = [member for member, days in days_by_member.items() if len(days) >= 2]
      return sorted(result)
hints:
  - level: 1
    text: Same-day re-entries must collapse, so count distinct days, not raw scans.
  - level: 2
    text: A set of days per member automatically ignores duplicate same-day entries.
  - level: 3
    text: Keep members whose day-set has 2 or more elements, then sort the names.
