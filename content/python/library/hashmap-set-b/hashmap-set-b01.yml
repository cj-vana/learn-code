explanation_markdown: |
  Walking the log once and remembering every code in a set turns each
  "have I seen this before?" question into an O(1) lookup, so the whole scan is
  O(n). The first time a code is already in the set, it is by definition the
  earliest locker to be reused, so you can return immediately. If the loop ends
  without a hit, nothing was reused and the empty string reports that.
common_mistakes:
  - Adding a code to the set before checking membership, so every code looks reused.
  - Returning the last repeat instead of the first by scanning to the end.
  - Forgetting the empty-string result when no locker is ever reused.
