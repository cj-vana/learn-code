prompt_markdown: |
  A public swimming pool hands out lockers in the order swimmers arrive and
  records each locker code as it is assigned. Because the same locker can be
  reused later in the day, a code may appear more than once in the log.
  Write `first_reused_locker(codes)` that returns the first locker code that is
  assigned for a second time, scanning the log from left to right. If no locker
  is ever reused, return an empty string.
starter_code: |
  def first_reused_locker(codes):
      return ""
function_name: first_reused_locker
input_mode: function
solution_sketch: Track seen codes in a set and return the first code already present when you reach it.
sample_solution: |
  def first_reused_locker(codes):
      seen = set()
      for code in codes:
          if code in seen:
              return code
          seen.add(code)
      return ""
hints:
  - level: 1
    text: You only need to know whether a code has appeared earlier in the log.
  - level: 2
    text: A set gives O(1) membership checks as you walk the list once.
  - level: 3
    text: Before adding each code to the set, check if it is already there and return it if so.
