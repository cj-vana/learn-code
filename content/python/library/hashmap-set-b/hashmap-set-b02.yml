prompt_markdown: |
  A campus radio show collects song titles as listeners phone in requests during
  the broadcast. Write `top_request(requests)` that returns the title requested
  the most times. If two or more titles tie for the most requests, return the one
  whose first request arrived earliest in the list. An empty list of requests
  returns an empty string.
starter_code: |
  def top_request(requests):
      return ""
function_name: top_request
input_mode: function
solution_sketch: Count each title in a dict, then take the max count breaking ties by first appearance.
sample_solution: |
  def top_request(requests):
      if not requests:
          return ""
      counts = {}
      for title in requests:
          counts[title] = counts.get(title, 0) + 1
      return max(counts, key=counts.get)
hints:
  - level: 1
    text: Build a running count of how often each title is requested.
  - level: 2
    text: A dict preserves insertion order, so the first-seen title stays first.
  - level: 3
    text: max(counts, key=counts.get) returns the earliest-inserted key on a tie.
