explanation_markdown: |
  Counting each title in a dictionary is a single O(n) pass, and dictionaries
  remember the order keys were first inserted. Because `max` returns the first
  item that reaches the highest value during iteration, and iteration follows
  insertion order, ties naturally resolve to the title whose first request came
  earliest. The empty-list guard keeps `max` from being called on an empty dict.
common_mistakes:
  - Calling max on an empty dict instead of guarding the empty input.
  - Sorting titles alphabetically instead of breaking ties by first request.
  - Recomputing counts inside the loop instead of accumulating once.
