explanation_markdown: |
  This is the classic activity-selection problem: to fit the most non-overlapping
  jobs, always keep the one that finishes earliest, because it leaves the widest
  runway for everything after it. Sorting by `end_minute` and sweeping once gives
  the maximum count in `O(n log n)`, dominated by the sort.

  The twist here is reporting the pay of that exact selection. Because the greedy
  optimises **count**, not money, it can walk right past a lucrative but greedy
  job. In `greedy_skips_richer_job` the rider takes the short `[2, 3, 10]` and then
  `[3, 6, 40]` for two jobs worth 50, leaving the single fat `[1, 5, 50]` job on the
  table — taking that one would have blocked both others and still only counted as
  one job. The comparison `start >= last_end` is what allows a clean hand-off: a job
  ending exactly when the next begins does not overlap, so the touching chain in the
  last test fits all three.
common_mistakes:
  - Sorting by start time or by pay instead of by finish time, which no longer maximises the count.
  - Returning the maximum achievable pay rather than the pay of the earliest-finish selection the prompt specifies.
  - Using a strict `>` in the overlap check, which needlessly rejects a job that starts exactly when the previous one ends.
