prompt_markdown: |
  One rider can only be in one place at a time, so their shift is a set of jobs
  that never overlap. Write `assign_shift(job)` where `job` is a dictionary with a
  single key `"jobs"`, a list of `[start_minute, end_minute, pay]` triples. A job
  occupies the rider from `start_minute` up to `end_minute`.

  Return a two-element **list** `[count, total_pay]`, where `count` is the largest
  number of non-overlapping jobs the rider can take and `total_pay` is the summed
  pay of that particular selection.

  Follow the earliest-finish greedy rule exactly, because the pay depends on which
  jobs you pick:

  - Sort the jobs by `end_minute` ascending; if two end at the same minute, put the
    one that **starts earlier** first.
  - Walk that sorted order and take a job whenever its `start_minute` is greater
    than or equal to the `end_minute` of the last job you took (a job ending at
    minute 5 hands off cleanly to a job starting at minute 5).
  - `count` is how many you took; `total_pay` is the sum of the `pay` field of
    exactly those taken jobs — which is **not** always the highest total pay
    available, and that is intentional.

  An empty job list returns `[0, 0]`.

  For example, `{"jobs": [[1, 5, 50], [2, 3, 10], [3, 6, 40]]}` returns `[2, 50]`:
  the greedy takes `[2, 3, 10]` then `[3, 6, 40]`, skipping the better-paid but
  overlapping `[1, 5, 50]`.
starter_code: |
  def assign_shift(job):
      return [0, 0]
function_name: assign_shift
input_mode: function
solution_sketch: Sort by (end, start), then sweep once taking any job that starts at or after the last taken job's end, summing count and pay.
sample_solution: |
  def assign_shift(job):
      jobs = sorted(job["jobs"], key=lambda j: (j[1], j[0]))
      count = 0
      total = 0
      last_end = None
      for start, end, pay in jobs:
          if last_end is None or start >= last_end:
              count += 1
              total += pay
              last_end = end
      return [count, total]
hints:
  - level: 1
    text: Taking the job that frees the rider up earliest leaves the most room for later jobs, so sort by finish time.
  - level: 2
    text: After sorting by (end, start), keep a running last_end and take a job only when its start is at least last_end.
  - level: 3
    text: Each time you take a job, bump count, add its pay, and update last_end to that job's end. Sum the pay of exactly the jobs you took, not the maximum possible pay.
