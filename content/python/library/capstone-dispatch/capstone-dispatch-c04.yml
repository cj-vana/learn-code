prompt_markdown: |
  A cargo trailer bolts onto one bicycle and can carry only so much weight. Write
  `pack_cargo(job)` where `job` is a dictionary with two keys:

  - `"capacity"`: a non-negative integer, the most total weight the trailer holds.
  - `"parcels"`: a list of parcels, each a dictionary with an integer `"weight"`
    and an integer `"fee"` the collective earns for carrying it.

  Return the largest total `fee` reachable by loading a subset of parcels whose
  combined `weight` does not exceed `capacity`. Each parcel is a single physical
  item: you either load it or you do not — you can never take a fraction of one and
  never take the same parcel twice.

  Edge cases the tests cover:

  - An empty parcel list, or a `capacity` of `0`, returns `0`.
  - A parcel heavier than the whole trailer simply cannot be loaded.
  - Two lighter parcels can beat one heavy parcel even when the heavy one pays more
    on its own.

  For example, `{"capacity": 5, "parcels": [{"weight": 4, "fee": 5}, {"weight": 5, "fee": 6}]}`
  returns `6`: both together weigh 9 and will not fit, so the trailer takes the
  single best-fitting parcel.
