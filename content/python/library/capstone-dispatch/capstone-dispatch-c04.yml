      expected: 12
explanation_markdown: |
  This is the 0/1 knapsack problem: each parcel is taken whole or not at all, and
  you want the most fee without busting the weight limit. The one-dimensional table
  `dp[c]` holds the best fee achievable using a weight budget of exactly `c` or
  less, considering the parcels folded in so far.

  The direction of the inner loop is the whole trick. Iterating capacity from
  `capacity` **down** to the parcel's weight means that when you read
  `dp[c - weight]`, that value has not yet been updated for the current parcel, so
  the parcel contributes to `dp[c]` at most once. Sweeping upward instead would let
  a parcel be reused, turning it into the unbounded-knapsack answer. The final
  `two_light_beat_one_heavy` case shows why a greedy "take the biggest fee" rule
  fails: two three-weight parcels fill the six-weight trailer for a fee of 12,
  beating the single six-weight parcel that pays only 10. The DP runs in
  `O(parcels * capacity)` time and `O(capacity)` space.
common_mistakes:
  - Iterating the inner capacity loop upward, which lets a single parcel be loaded multiple times.
  - Reaching for a greedy fee-per-weight rule, which is optimal for fractional loads but not for whole parcels.
  - Sizing the table as `capacity` instead of `capacity + 1`, so the full-capacity entry is off the end.
