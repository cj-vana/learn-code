function_name: pack_cargo
input_mode: function
solution_sketch: Run a 0/1 knapsack DP over capacities, iterating each parcel's weight from capacity down to the weight so no parcel is counted twice.
sample_solution: |
  def pack_cargo(job):
      capacity = job["capacity"]
      dp = [0] * (capacity + 1)
      for parcel in job["parcels"]:
          weight = parcel["weight"]
          fee = parcel["fee"]
          for cap in range(capacity, weight - 1, -1):
              dp[cap] = max(dp[cap], dp[cap - weight] + fee)
      return dp[capacity]
hints:
  - level: 1
    text: For each parcel you make one yes/no choice, and the best fee for a given capacity depends on the best fee for smaller capacities — that overlap is the signal for dynamic programming.
  - level: 2
    text: Keep a table dp where dp[c] is the best fee achievable within weight c. Start it all at zero and fold in one parcel at a time.
  - level: 3
    text: When adding a parcel, iterate the capacity from high down to the parcel's weight so each parcel is used at most once, updating dp[c] = max(dp[c], dp[c - weight] + fee).
