explanation_markdown: |
  Keeping the workload even is a greedy problem: at each step, the job that just
  arrived should go to whoever is least busy right now. A min-heap of
  `(load, rider_index)` tuples makes "who is least busy" an `O(log n)` pop, so the
  whole day costs `O(jobs * log riders)`.

  Packing the rider index as the second element of the tuple does double duty. It
  breaks ties exactly the way the prompt wants — when two riders share the smallest
  load, the tuple comparison falls through to the index and the lower one pops
  first — and it tells you which rider's running total to update. You maintain a
  separate `loads` list indexed by rider so the final answer is in rider-number
  order rather than heap order. In `three_riders_then_tie` the first three tens go
  to riders 0, 1, 2, and the trailing 5 lands on rider 0 because all three are tied
  and 0 is lowest, giving `[15, 10, 10]`.
common_mistakes:
  - Scanning the whole load list for the minimum on every job, which works but is O(jobs * riders) and misses the point of the heap.
  - Putting the rider index first in the tuple, so the heap orders by index instead of by load.
  - Returning the loads in heap or pop order instead of rebuilding them in rider-number order.
