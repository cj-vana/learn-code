prompt_markdown: |
  The dispatcher hands out the day's jobs one at a time and wants nobody buried
  while others idle. Write `balance_riders(job)` where `job` is a dictionary with:

  - `"riders"`: a positive integer `n`, the number of riders, numbered `0` to
    `n - 1`. Every rider starts the day with a load of `0` minutes.
  - `"jobs"`: a list of job durations in minutes, handed out **in the given order**.

  Assign each job, in order, to the rider who currently has the **smallest total
  load**. If two or more riders are tied for smallest, give it to the one with the
  **lowest rider number**. Add the job's minutes to that rider's load, then move on
  to the next job.

  Return a **list** of the final total loads, one entry per rider, in rider-number
  order (index `0` is rider `0`).

  Edge cases the tests cover:

  - With one rider, every job piles onto rider `0`.
  - An empty job list leaves every rider at `0`.
  - When loads tie, the lowest-numbered rider always wins the next job.

  For example, `{"riders": 2, "jobs": [4, 4, 4, 4]}` returns `[8, 8]`: the jobs land
  on riders 0, 1, 0, 1 in turn.
