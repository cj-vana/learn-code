solution_sketch: Keep a min-heap of (load, rider_index); for each job pop the least-loaded rider, add the job, and push it back, then report loads by index.
sample_solution: |
  import heapq


  def balance_riders(job):
      n = job["riders"]
      heap = [(0, i) for i in range(n)]
      heapq.heapify(heap)
      loads = [0] * n
      for duration in job["jobs"]:
          load, index = heapq.heappop(heap)
          loads[index] += duration
          heapq.heappush(heap, (load + duration, index))
      return loads
hints:
  - level: 1
    text: You repeatedly need the currently least-loaded rider, which is exactly what a min-heap gives you in O(log n) per job.
  - level: 2
    text: Store (load, rider_index) tuples in the heap. Popping compares load first and rider_index second, so ties naturally go to the lowest index.
  - level: 3
    text: For each job, pop the smallest tuple, add the duration to that rider's load in a separate list indexed by rider, then push (new_load, index) back. Return the list at the end.
