solution_sketch: Loop; each round run Dijkstra from the current junction, gather feasible pending deliveries, pick the earliest-closing (then smallest node), advance the clock with a wait if early, and stop when nothing is feasible.
sample_solution: |
  import heapq


  def dispatch_day(job):
      adjacency = {}
      for a, b, w in job["map_edges"]:
          adjacency.setdefault(a, []).append((b, w))
          adjacency.setdefault(b, []).append((a, w))

      def distances_from(source):
          dist = {source: 0}
          heap = [(0, source)]
          while heap:
              d, node = heapq.heappop(heap)
              if d > dist.get(node, float("inf")):
                  continue
              for neighbour, w in adjacency.get(node, []):
                  nd = d + w
                  if nd < dist.get(neighbour, float("inf")):
                      dist[neighbour] = nd
                      heapq.heappush(heap, (nd, neighbour))
          return dist

      pending = list(job["deliveries"])
      done = [False] * len(pending)
      location = job["depot"]
      time = 0
      earned = 0
      completed = []

      while True:
          dist = distances_from(location)
          best = None
          for i, delivery in enumerate(pending):
              if done[i]:
                  continue
              node = delivery["node"]
              if node not in dist:
                  continue
              arrival = time + dist[node]
              close = delivery["window"][1]
              if arrival <= close:
                  key = (close, node)
                  if best is None or key < best[0]:
                      best = (key, i, arrival)
          if best is None:
              break
          (close, node), index, arrival = best
          delivery = pending[index]
          done[index] = True
          time = max(arrival, delivery["window"][0])
          location = delivery["node"]
          earned += delivery["pay"]
          completed.append(delivery["node"])

      return {"completed": completed, "earned": earned, "final_time": time}
hints:
  - level: 1
    text: Each round has two parts — figure out how far every pending delivery is from where the rider stands now, then pick one by the greedy rule and advance the clock.
  - level: 2
    text: Run Dijkstra from the current junction to get shortest travel times to everywhere, then a delivery is feasible when current_time + distance is at most its window close.
  - level: 3
    text: Among feasible deliveries pick the smallest (close, node) pair. Set the clock to max(arrival, open) so an early rider waits, move there, bank the pay, mark it done, and loop until nothing is feasible.
