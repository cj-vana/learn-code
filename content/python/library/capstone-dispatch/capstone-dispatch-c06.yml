prompt_markdown: |
  This is the finale: one rider clears as much of the day as the greedy rule allows.
  Write `dispatch_day(job)` where `job` is a dictionary with:

  - `"map_edges"`: the two-way lane list `[junction_a, junction_b, minutes]`, as in
    every earlier stage.
  - `"depot"`: the junction the rider starts at, at time `t = 0`.
  - `"deliveries"`: a list of deliveries, each a dictionary with a `"node"`
    (the junction to reach), a `"window"` `[open, close]` (the delivery may only be
    completed at a time `>= open` and `<= close`), and a `"pay"`.

  Travel time between two junctions is the fewest total lane minutes between them
  (a shortest path by time, using the same idea as Stage 2 — here you only need the
  distance, so no path tie-break is required). Simulate the day with these exact
  rules, repeated in a loop:

  1. Start at `depot`, time `0`, earnings `0`, nothing completed.
  2. Among the deliveries **not yet completed**, a delivery at `node` is *feasible*
     if there is a route from the rider's current junction to `node` and the arrival
     time — current time plus that shortest travel time — is `<= close`.
  3. If no delivery is feasible, stop.
  4. Otherwise pick the feasible delivery whose window `close` is **earliest**. If
     several tie on `close`, pick the one with the alphabetically smallest `node`.
  5. Ride there. If arrival is before `open`, the rider waits and the delivery
     completes at `open`; otherwise it completes at arrival. So the new time is
     `max(arrival, open)`. Move the rider to `node`, add `pay` to earnings, and append
     `node` to the completed list.
  6. Repeat from step 2.

  Return a dictionary `{"completed": [...], "earned": ..., "final_time": ...}` where
  `completed` lists the delivered nodes in the order they were completed, `earned`
  is the summed pay, and `final_time` is the clock when the rider stops. A delivery
  whose window has already closed by the time the rider could reach it is skipped
  forever. Because the rule is greedy, chasing the earliest-closing window can mean
  missing a richer job — that is the intended behaviour.
