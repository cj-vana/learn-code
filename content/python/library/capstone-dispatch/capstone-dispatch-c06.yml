explanation_markdown: |
  The finale stitches the earlier stages together. Travel cost is a shortest-path
  query, so each round begins by running Dijkstra from wherever the rider currently
  stands — the distances change as the rider moves, which is why you recompute them
  rather than caching once. Feasibility is an interval check: a delivery can still be
  made only if the earliest possible arrival lands at or before its window closes.
  The choice among feasible deliveries is the greedy heart of the problem — take the
  one that closes soonest, breaking ties by node name so the simulation is fully
  deterministic.

  Two behaviours are worth internalising. First, waiting: arriving before a window
  opens is fine, the clock simply jumps to `open`, modelled as `max(arrival, open)`.
  Second, greedy myopia: in `greedy_misses_richer_job` the rider grabs `x` because it
  closes at minute 5, which then pushes arrival at `y` to minute 10 — one minute past
  its window — so the 100-pay job is lost and the day earns only 8. A globally optimal
  planner would have skipped `x`, but the dispatch board runs the simple rule on
  purpose. The loop ends the moment no pending delivery is reachable in time, and the
  clock at that instant is the reported `final_time`.
common_mistakes:
  - Computing distances once from the depot instead of recomputing from the rider's current junction each round.
  - Setting the completion time to the raw arrival and forgetting the wait, so early arrivals do not advance the clock to the window open.
  - Breaking window-close ties inconsistently (or not at all), which makes the completed order nondeterministic.
