function_name: fastest_route
input_mode: function
solution_sketch: Build the adjacency map, then run Dijkstra with heap entries keyed on (distance, full_path) so equal-cost paths settle in lexicographic order.
sample_solution: |
  import heapq


  def fastest_route(job):
      edges = job["map_edges"]
      start = job["from"]
      goal = job["to"]
      adjacency = {}
      for a, b, w in edges:
          adjacency.setdefault(a, []).append((b, w))
          adjacency.setdefault(b, []).append((a, w))
      if start == goal:
          return [0, [start]]
      heap = [(0, [start])]
      settled = set()
      while heap:
          dist, path = heapq.heappop(heap)
          node = path[-1]
          if node in settled:
              continue
          settled.add(node)
          if node == goal:
              return [dist, path]
          for neighbour, w in adjacency.get(node, []):
              if neighbour not in settled:
                  heapq.heappush(heap, (dist + w, path + [neighbour]))
      return [-1, []]
hints:
  - level: 1
    text: This is a shortest-path-by-time problem on a weighted graph, which is exactly what Dijkstra's algorithm solves with a min-heap.
  - level: 2
    text: Push (distance, path) tuples onto the heap and settle each junction the first time it is popped; the popped path to the goal is the answer.
  - level: 3
    text: Carry the whole path in the heap entry, so the heap orders equal-distance entries by their path lists — that automatically yields the lexicographically smallest shortest route. Since every lane costs at least one minute, a junction is always settled with its best path before it relaxes its neighbours.
tests:
  public:
    - name: direct_lane
      input: {"map_edges": [["a", "b", 5]], "from": "a", "to": "b"}
      expected: [5, ["a", "b"]]
    - name: already_there
      input: {"map_edges": [["a", "b", 5]], "from": "a", "to": "a"}
      expected: [0, ["a"]]
    - name: unreachable
      input: {"map_edges": [["a", "b", 5], ["c", "d", 2]], "from": "a", "to": "d"}
      expected: [-1, []]
  validation:
    - name: prefer_cheaper_detour
      input: {"map_edges": [["a", "b", 1], ["b", "c", 1], ["a", "c", 5]], "from": "a", "to": "c"}
      expected: [2, ["a", "b", "c"]]
    - name: lexicographic_tie_break
      input: {"map_edges": [["s", "a", 1], ["a", "t", 1], ["s", "b", 1], ["b", "t", 1]], "from": "s", "to": "t"}
      expected: [2, ["s", "a", "t"]]
    - name: five_junction_network
      input: {"map_edges": [["home", "mill", 2], ["home", "dock", 5], ["mill", "dock", 2], ["dock", "far", 1], ["mill", "far", 6]], "from": "home", "to": "far"}
      expected: [5, ["home", "mill", "dock", "far"]]
    - name: tie_prefers_smaller_name
      input: {"map_edges": [["p", "q", 2], ["p", "r", 1], ["r", "q", 1]], "from": "p", "to": "q"}
      expected: [2, ["p", "q"]]
explanation_markdown: |
  Dijkstra's algorithm grows a frontier of settled junctions outward from the
  start, always expanding the cheapest-so-far unsettled junction next. A min-heap
  keyed on distance makes "cheapest next" an `O(log n)` pop, and marking a junction
  `settled` the first time it leaves the heap keeps you from reprocessing it.

  The tie-break is the subtle part. By storing the **entire path** in each heap
  entry — `(distance, path)` — the heap breaks distance ties by comparing the path
  lists, which Python does element by element on the junction names. That is
  exactly the alphabetical rule the prompt asks for. It is provably correct here
  because every lane costs at least one minute: a junction's true shortest distance
  is strictly greater than its predecessor's, so the predecessor is always settled
  first and pushes the lexicographically smallest path before the junction is
  popped. In `tie_prefers_smaller_name`, the direct `p → q` and the detour
  `p → r → q` both cost 2, and `["p", "q"]` wins because `"q" < "r"` at the second
  position. When start and goal coincide the answer is `[0, [from]]`, and a goal
  that never leaves the heap is unreachable, giving `[-1, []]`.
common_mistakes:
  - Keying the heap only on distance and reconstructing an arbitrary path, which ignores the lexicographic tie-break.
  - Settling a junction on push instead of on pop, so a later, cheaper path to it is discarded.
  - Forgetting the `from == to` and unreachable cases, returning a wrong cost or crashing on a missing key.
