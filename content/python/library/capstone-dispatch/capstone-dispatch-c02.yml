prompt_markdown: |
  A rider needs the quickest way from one junction to another across the courier
  street map. Write `fastest_route(job)` where `job` is a dictionary with three
  keys:

  - `"map_edges"`: the two-way lane list, each entry `[junction_a, junction_b, minutes]`
    exactly as in Stage 1.
  - `"from"`: the junction the rider starts at.
  - `"to"`: the junction the rider must reach.

  Return a two-element **list** `[total_minutes, path]`, where `path` is the list
  of junction names travelled through, starting with `"from"` and ending with
  `"to"`, and `total_minutes` is the summed lane time along that path.

  Details the tests pin down:

  - Find a route of the **fewest total minutes** (a shortest path by time).
  - When several routes tie on total minutes, return the one whose sequence of
    junction names is **alphabetically smallest**. Compare the paths element by
    element: at the first position where two tied routes differ, the one with the
    smaller junction name wins. This can even prefer a route with more stops if an
    earlier name is smaller.
  - If `"from"` equals `"to"`, the rider is already there: return `[0, [from]]`.
  - If no route exists at all, return `[-1, []]`.

  For example, with `map_edges` `[["a","b",1],["b","c",1],["a","c",5]]`, going
  `"a"` to `"c"` returns `[2, ["a", "b", "c"]]` because `a → b → c` costs 2, beating
  the direct lane's 5.
