explanation_markdown: |
  An adjacency map is the representation every routing algorithm in this capstone
  will lean on: for each junction it lists exactly the junctions one lane away,
  together with the cost of that lane. Because bicycle lanes run both ways, a
  single input entry `[a, b, m]` contributes to two neighbour lists — `b` becomes
  a neighbour of `a` and `a` becomes a neighbour of `b`, both at cost `m`.

  Using `setdefault` guarantees a junction shows up as a key even when it only
  ever appears on one side of a lane, so no destination silently vanishes. Sorting
  each list at the end makes the output deterministic: `sorted` compares the
  `[name, minutes]` lists element by element, so the neighbour name decides the
  order and the travel time only matters if two names somehow tie. That stable
  shape is what lets Stage 2's shortest-path search rely on a predictable
  neighbour order.
common_mistakes:
  - Recording a lane in only one direction, which drops half of every connection.
  - Returning tuples instead of two-element lists, so the values no longer match the expected shape.
  - Forgetting to sort, leaving neighbour order dependent on the arbitrary input order of the lanes.
