      adjacency = {}
      return adjacency
function_name: build_map
input_mode: function
solution_sketch: For each lane add both endpoints as keys and append the mirrored pair to each side, then sort every neighbour list.
sample_solution: |
  def build_map(edges):
      adjacency = {}
      for a, b, minutes in edges:
          adjacency.setdefault(a, [])
          adjacency.setdefault(b, [])
          adjacency[a].append([b, minutes])
          adjacency[b].append([a, minutes])
      return {node: sorted(neighbours) for node, neighbours in adjacency.items()}
hints:
  - level: 1
