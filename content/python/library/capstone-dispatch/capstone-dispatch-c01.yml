  - level: 2
    text: Use setdefault so both junctions exist as keys, then append [b, minutes] to a's list and [a, minutes] to b's list.
  - level: 3
    text: After all lanes are recorded, return a dict comprehension mapping each junction to sorted(neighbours); sorting the [name, minutes] lists orders them by name first.
