prompt_markdown: |
  The Kettle Lane Couriers run every delivery in the old town by bicycle, and
  their whole dispatch system is about to be built one stage at a time. It starts
  with the street map.

  The map arrives as a list of two-way lanes. Each lane is `[junction_a, junction_b, minutes]`,
  meaning a rider can pedal between those two junctions in that many minutes, in
  either direction. Write `build_map(edges)` that returns an **adjacency map**: a
  dictionary whose keys are junction names and whose values are lists of
  `[neighbour, minutes]` pairs.

  Rules the later stages rely on:

  - Every lane is two-way, so a lane `[a, b, m]` puts `[b, m]` in `a`'s list *and*
    `[a, m]` in `b`'s list.
  - Sort each neighbour list by neighbour name; if two share a name they cannot
    (no pair of junctions is ever listed twice), so the name alone orders them,
    with the travel time as the second sort key.
  - Return a `[neighbour, minutes]` pair as a two-element **list**, not a tuple.
  - An empty lane list returns an empty dictionary.

  For example, `[["depot", "market", 5]]` returns
  `{"depot": [["market", 5]], "market": [["depot", 5]]}`.
starter_code: |
