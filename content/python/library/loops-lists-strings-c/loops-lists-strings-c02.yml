prompt_markdown: |
  A neighborhood grocery warehouse records how many crates of oat milk it has on
  the shelf at the end of each day. The manager wants to know the longest run of
  consecutive days during which stock stayed at or above a target level, so she
  can judge how reliable supply has been.

  Write `longest_stocked_streak(data)` where `data` is a dict with two keys:

  - `counts`: a list of integers, one crate count per day, in day order.
  - `threshold`: an integer target level.

  Return the length of the longest streak of consecutive days whose count is
  greater than or equal to `threshold`. If no day reaches the threshold, return
  `0`. An empty `counts` list returns `0`.
starter_code: |
