function_name: longest_stocked_streak
input_mode: function
solution_sketch: Sweep the days once, growing a current-streak counter when the threshold is met and tracking the best streak seen.
sample_solution: |
  def longest_stocked_streak(data):
      counts = data["counts"]
      threshold = data["threshold"]
      best = 0
      current = 0
      for count in counts:
          if count >= threshold:
              current += 1
              if current > best:
                  best = current
          else:
              current = 0
      return best
hints:
  - level: 1
    text: Walk through the days one at a time while remembering how long the current streak is.
  - level: 2
    text: When a day meets the threshold, extend the current streak; when it fails, the current streak resets to zero.
  - level: 3
    text: Keep a separate best value and update it whenever the current streak grows past it.
