explanation_markdown: |
  This is a running-total pattern applied to a streak. Scan the daily counts once
  while keeping two numbers: `current`, the length of the streak ending on the
  day you are looking at, and `best`, the longest streak seen so far. Each day
  that meets the threshold adds one to `current`; each day that fails clears
  `current` back to zero because the run is broken. Whenever `current` climbs
  above `best`, record the new maximum. A single pass makes this O(n) in the
  number of days, and an empty list simply leaves both counters at zero.
common_mistakes:
  - Using a strict greater-than instead of greater-than-or-equal, so days exactly at the threshold are missed.
  - Forgetting to reset the current streak to zero on a day that falls below the threshold.
  - Returning the final current streak instead of the best streak seen anywhere in the list.
