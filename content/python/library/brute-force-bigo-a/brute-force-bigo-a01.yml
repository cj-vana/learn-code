prompt_markdown: |
  A loading dock stacks crates on a pallet that has one exact target weight.
  Given a list of crate `weights` and a `limit`, write
  `hits_pallet_limit(data)` where `data` is a dict with keys `weights` and
  `limit`. Return `True` if any two crates in *different* positions have weights
  that add up to exactly `limit`, otherwise `False`. A crate cannot be paired
  with itself, but two crates that happen to weigh the same still count.
starter_code: |
  def hits_pallet_limit(data):
      return False
function_name: hits_pallet_limit
input_mode: function
solution_sketch: Check every unordered pair of positions with a nested loop and stop when one sums to the limit.
sample_solution: |
  def hits_pallet_limit(data):
      weights = data["weights"]
      limit = data["limit"]
      n = len(weights)
      for i in range(n):
          for j in range(i + 1, n):
              if weights[i] + weights[j] == limit:
                  return True
      return False
hints:
  - level: 1
    text: Try every possible pair of two different crates and see if one pair matches.
  - level: 2
    text: An outer loop picks the first crate; an inner loop picks a later crate so no pair repeats.
  - level: 3
    text: Start the inner index at i + 1 so a crate is never added to itself, and return True the moment a pair sums to limit.
