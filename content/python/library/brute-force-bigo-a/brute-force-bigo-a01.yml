explanation_markdown: |
  The brute-force idea is to try every unordered pair of positions. The outer
  loop fixes the first crate; the inner loop starts one step later so each pair
  is examined once and a crate is never paired with itself. With `n` crates
  there are `n * (n - 1) / 2` pairs, so this runs in O(n^2) time. Returning
  early on the first match keeps the best case fast without changing the worst
  case.
common_mistakes:
  - Starting the inner loop at 0, which pairs a crate with itself.
  - Returning False inside the loop before all pairs have been checked.
  - Assuming two crates must have different weights to form a pair.
