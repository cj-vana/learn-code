explanation_markdown: |
  A brute-force pairing scan checks each unordered pair of teams once. For `n`
  teams there are `n * (n - 1) / 2` such pairs, which is why nested-loop
  algorithms over all pairs are O(n^2). Because the count follows a closed
  formula, you can return it in constant O(1) time without any loop at all.
  Integer division by 2 removes the double-counting of "A vs B" and "B vs A".
common_mistakes:
  - Returning n * n, which counts a team playing itself and both orderings.
  - Using / instead of //, producing a float like 6.0 instead of 6.
  - Forgetting that 0 and 1 teams yield 0 games.
