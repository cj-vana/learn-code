prompt_markdown: |
  A neighborhood curling league plays a round-robin: every team plays every
  other team exactly once. Write `count_matchups(team_count)` that returns how
  many games are scheduled when there are `team_count` teams. This is the same
  number of pairs a brute-force "compare every team with every other team" scan
  would examine, so you can compute it directly instead of looping. With zero or
  one team there are no games.
starter_code: |
