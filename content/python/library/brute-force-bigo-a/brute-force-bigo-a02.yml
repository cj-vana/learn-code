      return 0
function_name: count_matchups
input_mode: function
solution_sketch: Each unordered pair plays once, so the answer is team_count * (team_count - 1) // 2.
sample_solution: |
  def count_matchups(team_count):
      return team_count * (team_count - 1) // 2
hints:
  - level: 1
    text: Picture a grid of teams versus teams and count only the cells above the diagonal.
  - level: 2
    text: A double loop would run the inner check n * (n - 1) / 2 times for n teams.
  - level: 3
    text: Use integer division // by 2 so each unordered pair is counted once, not twice.
