prompt_markdown: |
  A rooftop solar array reports each panel's afternoon output as a number in a
  list. An engineer wants pairs of panels whose outputs differ by an exact
  amount. Write `count_diff_pairs(data)` where `data` is a dict with keys
  `readings` and `gap`. Return how many unordered pairs of different positions
  have an absolute difference equal to `gap`. Every distinct pair of positions
  is considered, even if two panels report the same output.
starter_code: |
