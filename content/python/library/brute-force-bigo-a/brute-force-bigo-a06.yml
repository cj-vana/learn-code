explanation_markdown: |
  The brute-force plan checks every unordered pair of positions and tests the
  absolute difference of the two readings against the target gap. Using `abs`
  means `a - b` and `b - a` are treated the same. With `n` readings there are
  `n * (n - 1) / 2` pairs, so counting them all is O(n^2). A gap of 0 counts
  pairs of equal readings, which is why three identical panels contribute three
  pairs.
common_mistakes:
  - Dropping abs() and only matching when the earlier reading is larger.
  - Counting ordered pairs, which doubles every match.
  - Forgetting that a gap of 0 counts pairs of equal readings.
