      return 0
function_name: count_diff_pairs
input_mode: function
solution_sketch: For every unordered pair, add one when the absolute difference of the two readings equals gap.
sample_solution: |
  def count_diff_pairs(data):
      readings = data["readings"]
      gap = data["gap"]
      n = len(readings)
      total = 0
      for i in range(n):
          for j in range(i + 1, n):
              if abs(readings[i] - readings[j]) == gap:
                  total += 1
      return total
hints:
  - level: 1
    text: Look at every pair of two different panels and measure how far apart their readings are.
  - level: 2
    text: Use abs() so the order of subtraction does not matter.
  - level: 3
