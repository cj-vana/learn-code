prompt_markdown: |
  A hiker plans a day trip by stitching together exactly three trail segments so
  their distances add up to a target `goal`. Write `can_reach_goal(data)` where
  `data` is a dict with keys `distances` and `goal`. Return `True` if some three
  segments at *different* positions have distances summing to exactly `goal`,
  otherwise `False`. Fewer than three segments always returns `False`; two
  segments that happen to share a distance still count as different positions.
starter_code: |
  def can_reach_goal(data):
      return False
function_name: can_reach_goal
input_mode: function
solution_sketch: Try every unordered triple of positions with three nested loops and stop when one sums to the goal.
sample_solution: |
  def can_reach_goal(data):
      distances = data["distances"]
      goal = data["goal"]
      n = len(distances)
      for i in range(n):
          for j in range(i + 1, n):
              for k in range(j + 1, n):
                  if distances[i] + distances[j] + distances[k] == goal:
                      return True
      return False
hints:
  - level: 1
    text: You need three different segments, so build every group of three positions.
  - level: 2
    text: Three nested loops with indices i < j < k generate each unordered triple exactly once.
  - level: 3
    text: Start each inner loop one past the loop outside it, and return True as soon as a triple hits the goal.
