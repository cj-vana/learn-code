explanation_markdown: |
  The brute-force approach enumerates every unordered triple of positions using
  three nested loops with `i < j < k`, which keeps each triple unique and never
  reuses a position. With `n` segments there are about `n * (n - 1) * (n - 2) / 6`
  triples, so this runs in O(n^3) time. That cubic growth is why brute force over
  triples becomes slow quickly, but it is straightforward and correct for the
  small inputs here.
common_mistakes:
  - Reusing the same position by starting an inner loop at the same index as the outer one.
  - Only checking consecutive triples instead of all combinations.
  - Returning False before every triple has been tried.
