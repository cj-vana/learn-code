prompt_markdown: |
  A conference desk scans attendee badge numbers into a list as people arrive.
  Write `has_repeat_badge(badges)` that returns `True` if any badge number
  appears more than once in the list, otherwise `False`. Solve it the
  brute-force way: compare each badge against every later badge. An empty list
  and a list with a single badge both return `False`.
starter_code: |
  def has_repeat_badge(badges):
      return False
function_name: has_repeat_badge
input_mode: function
solution_sketch: Compare every pair of positions with a nested loop and return True on the first equal pair.
sample_solution: |
  def has_repeat_badge(badges):
      n = len(badges)
      for i in range(n):
          for j in range(i + 1, n):
              if badges[i] == badges[j]:
                  return True
      return False
hints:
  - level: 1
    text: Compare each badge with the ones that come after it in the list.
  - level: 2
    text: An outer loop fixes one badge; an inner loop starting at i + 1 checks every later badge.
  - level: 3
    text: Return True as soon as two positions hold the same number; return False only after all pairs pass.
