explanation_markdown: |
  Comparing every badge against every later badge examines all `n * (n - 1) / 2`
  unordered pairs, so this brute-force duplicate check is O(n^2) in the worst
  case. Starting the inner loop at `i + 1` avoids comparing a badge with itself
  and avoids checking the same pair twice. Returning early on the first match
  makes the best case fast, but the worst case (all unique) still touches every
  pair.
common_mistakes:
  - Starting the inner loop at i, which compares a badge with itself and always reports a repeat.
  - Returning False from inside the loop before all pairs are checked.
  - Assuming the list is sorted so only neighbors need comparing.
