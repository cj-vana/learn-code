explanation_markdown: |
  The brute-force plan tries every unordered pair of positions, computes the pair
  total, and remembers the best total that still fits the budget. With `n`
  souvenirs there are `n * (n - 1) / 2` pairs, so this is O(n^2). Because all
  prices are positive, any affordable pair raises `best` above its starting value
  of 0, so a returned 0 unambiguously means no pair fit. Comparing against
  `budget` with `<=` lets a pair that hits the budget exactly count as affordable.
common_mistakes:
  - Returning the first affordable pair instead of the most expensive affordable pair.
  - Using < instead of <= and rejecting a pair that exactly equals the budget.
  - Updating best before confirming the pair fits the budget.
