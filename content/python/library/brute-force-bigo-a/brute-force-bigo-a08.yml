prompt_markdown: |
  A museum gift shop lets a visitor buy exactly two different souvenirs. Given a
  list of `prices` (all positive) and a `budget`, write `best_pair_spend(data)`
  where `data` is a dict with keys `prices` and `budget`. Return the largest
  combined price of any two souvenirs at different positions that does not exceed
  `budget`. If no pair of two souvenirs fits the budget, return 0.
starter_code: |
  def best_pair_spend(data):
      return 0
function_name: best_pair_spend
input_mode: function
solution_sketch: Scan every pair; among pairs whose total fits the budget, keep the largest total seen.
sample_solution: |
  def best_pair_spend(data):
      prices = data["prices"]
      budget = data["budget"]
      n = len(prices)
      best = 0
      for i in range(n):
          for j in range(i + 1, n):
              total = prices[i] + prices[j]
              if total <= budget and total > best:
                  best = total
      return best
hints:
  - level: 1
    text: Consider every pair of two different souvenirs and add their prices.
  - level: 2
    text: Keep a running best that only updates when a pair both fits the budget and beats the current best.
  - level: 3
    text: Start best at 0; since prices are positive, any pair that fits will push best above 0, and 0 remains when nothing fits.
