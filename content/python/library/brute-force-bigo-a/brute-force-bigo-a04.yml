explanation_markdown: |
  This is the heart of Big-O thinking: constant factors decide the winner for
  small inputs, but growth rate decides it for large ones. The nested plan is
  O(n^2) and the linear plan is O(n) with a constant of 50. For `n < 50` the
  squared cost is still smaller, at `n = 50` they tie, and for `n > 50` the
  quadratic cost overtakes the linear one and keeps pulling away. Comparing the
  exact counts tells you which side of the crossover you are on.
common_mistakes:
  - Assuming the O(n^2) plan is always slower, even for tiny catalogs.
  - Ignoring the constant factor of 50 on the linear plan.
  - Forgetting the exact-tie case at the crossover size.
