prompt_markdown: |
  A librarian is choosing between two reshelving plans for a cart of `catalog_size`
  books. The `nested` plan compares every book against every other and costs
  `catalog_size * catalog_size` comparisons. The `linear` plan uses a lookup card
  and costs `50 * catalog_size` comparisons. Write `cheaper_method(catalog_size)`
  returning the string `'nested'` if the nested plan does fewer comparisons,
  `'linear'` if the linear plan does fewer, or `'tie'` if they are equal.
starter_code: |
  def cheaper_method(catalog_size):
      return 'tie'
function_name: cheaper_method
input_mode: function
solution_sketch: Compute both comparison counts and return the name of the smaller one, or 'tie' if equal.
sample_solution: |
  def cheaper_method(catalog_size):
      nested_cost = catalog_size * catalog_size
      linear_cost = 50 * catalog_size
      if nested_cost < linear_cost:
          return 'nested'
      if linear_cost < nested_cost:
          return 'linear'
      return 'tie'
hints:
  - level: 1
    text: Work out the actual comparison count for each plan at this catalog size, then compare them.
  - level: 2
    text: The nested cost grows like the square of the size while the linear cost grows in a straight line.
  - level: 3
    text: Below the crossover the nested plan wins; above it the linear plan wins; exactly at it they tie.
