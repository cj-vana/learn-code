  originality_notes: Original zipline-course eligibility check combining a height range, minimum age, and a signed waiver.
prompt_markdown: |
  An adventure park lets a guest ride the zipline only when every safety rule
  is met. The rider arrives as a dict with keys `"height_cm"`, `"age"`, and
  `"has_waiver"` (a boolean).

  Write `can_ride(rider)` that returns `True` only when all of these hold:

  - height is between 120 and 200 cm, inclusive
  - age is at least 8
  - the waiver has been signed

  Otherwise return `False`.
starter_code: |
  def can_ride(rider):
      return False
function_name: can_ride
input_mode: function
solution_sketch: Combine the height range, age minimum, and waiver flag with and, returning the boolean result.
sample_solution: |
  def can_ride(rider):
      return (
          120 <= rider["height_cm"] <= 200
          and rider["age"] >= 8
          and rider["has_waiver"]
      )
hints:
  - level: 1
    text: Every rule must pass at once, which points to combining them with and.
  - level: 2
    text: Python lets you write a range check as 120 <= height <= 200 in one expression.
  - level: 3
    text: Return the combined boolean directly instead of using if/else to return True or False.
tests:
