    - name: lower_bounds_ok
      input: {height_cm: 120, age: 8, has_waiver: true}
      expected: true
    - name: upper_height_ok
      input: {height_cm: 200, age: 8, has_waiver: true}
      expected: true
    - name: too_tall
      input: {height_cm: 201, age: 40, has_waiver: true}
      expected: false
explanation_markdown: |
  Because every condition must be satisfied, `and` is the right connector: the
  whole expression is `True` only when each part is `True`. The chained
  comparison `120 <= height <= 200` reads like the original rule and already
  covers both ends of the range, so the function can return the combined
  boolean without any explicit `if`.
common_mistakes:
  - Using or somewhere, which lets a single passing rule wrongly approve the ride.
  - Writing height > 120 and height < 200, which rejects the valid boundary values.
  - Comparing has_waiver to True with extra code instead of using it directly.
