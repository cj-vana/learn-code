    - name: all_good
      input: {height_cm: 150, age: 30, has_waiver: true}
      expected: true
    - name: too_short
      input: {height_cm: 110, age: 30, has_waiver: true}
      expected: false
    - name: too_young
      input: {height_cm: 150, age: 6, has_waiver: true}
      expected: false
  validation:
