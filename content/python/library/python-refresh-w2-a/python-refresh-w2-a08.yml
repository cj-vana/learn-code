prompt_markdown: |
  A city tram computes each fare in whole dollars. The trip arrives as a dict
  with keys `"distance_km"` (a non-negative integer), `"peak"` (a boolean), and
  `"rider"` (one of `"adult"`, `"child"`, or `"senior"`).

  Write `transit_fare(trip)` that builds the fare in this order:

  1. start from a base fare of 3
  2. add 1 for every full 10 km of distance
  3. add 2 more if the trip is during peak hours
  4. then apply the rider adjustment: a child pays half the fare so far using
     integer (floor) division, a senior pays 1 less, and an adult pays the fare
     unchanged

  Return the final whole-dollar fare.
starter_code: |
  def transit_fare(trip):
      return 0
function_name: transit_fare
input_mode: function
solution_sketch: Accumulate base, distance, and peak surcharges, then adjust once for the rider category.
sample_solution: |
  def transit_fare(trip):
      fare = 3
      fare += trip["distance_km"] // 10
      if trip["peak"]:
          fare += 2
      rider = trip["rider"]
      if rider == "child":
          fare = fare // 2
      elif rider == "senior":
          fare = fare - 1
      return fare
hints:
  - level: 1
    text: Build the fare step by step, following the four rules in the order given.
  - level: 2
    text: Floor division distance_km // 10 counts how many full 10 km blocks the trip covers.
  - level: 3
    text: Apply the rider adjustment last, after the distance and peak surcharges are already added.
