explanation_markdown: |
  The fare is assembled by accumulation: start at 3, then `distance_km // 10`
  adds one dollar per full 10 km block, and peak hours add a fixed 2. The rider
  adjustment must come last because a child's half-price and a senior's discount
  apply to the fully surcharged fare. Using floor division for the child keeps
  every fare a whole number.
common_mistakes:
  - Applying the rider discount before the peak or distance surcharges.
  - Using regular division for the child fare and returning a float.
  - Charging 1 per kilometer instead of 1 per full 10 km block.
