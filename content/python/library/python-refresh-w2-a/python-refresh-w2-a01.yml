prompt_markdown: |
  A field research kit stores each sensor reading as a plain Python value.
  Write `reading_type(value)` that returns a lowercase label describing the
  value's data type, using exactly one of:

  - `"boolean"` for `True` or `False`
  - `"integer"` for a whole number
  - `"decimal"` for a floating-point number
  - `"text"` for a string
  - `"list"` for a list

  Note that in Python `True` and `False` are also whole numbers, so check for a
  boolean before you check for an integer.
starter_code: |
  def reading_type(value):
      return ""
function_name: reading_type
input_mode: function
solution_sketch: Test isinstance against bool first, then int, float, str, otherwise list.
sample_solution: |
  def reading_type(value):
      if isinstance(value, bool):
          return "boolean"
      if isinstance(value, int):
          return "integer"
      if isinstance(value, float):
          return "decimal"
      if isinstance(value, str):
          return "text"
      return "list"
hints:
  - level: 1
    text: Python has a built-in that reports whether a value is of a given type.
  - level: 2
    text: isinstance(value, int) is True even for booleans, so the order of your checks matters.
  - level: 3
    text: Check isinstance(value, bool) before isinstance(value, int), then fall through the remaining types.
