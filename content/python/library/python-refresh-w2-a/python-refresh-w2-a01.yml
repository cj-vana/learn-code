explanation_markdown: |
  `isinstance` checks an object's type, but because `bool` is a subclass of
  `int`, every boolean also passes an `int` check. Ordering the boolean test
  first keeps `True` and `False` from being mislabeled as integers, and the
  remaining checks run from most to least specific.
common_mistakes:
  - Checking isinstance(value, int) before the boolean case, so True is labeled "integer".
  - Using type(value) == int, which also treats booleans as integers.
  - Forgetting a return for the final list case.
