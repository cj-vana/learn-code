prompt_markdown: |
  A file-sync tool draws a simple text progress bar. The input is a dict with
  keys `"done"` and `"total"`, where `0 <= done <= total` and `total >= 1`.

  Write `progress_bar(data)` that returns a string of length `total`: one `#`
  for each completed unit followed by one `-` for each remaining unit.

  For example, `done` 3 out of `total` 5 becomes `"###--"`.
starter_code: |
  def progress_bar(data):
      return ""
function_name: progress_bar
input_mode: function
solution_sketch: Repeat "#" by the done count and "-" by the remaining count, then concatenate.
sample_solution: |
  def progress_bar(data):
      done = data["done"]
      total = data["total"]
      return "#" * done + "-" * (total - done)
hints:
  - level: 1
    text: Multiplying a string by an integer repeats it that many times.
  - level: 2
    text: The number of remaining units is total minus done.
  - level: 3
    text: Concatenate "#" * done with "-" * (total - done) to build the full bar.
tests:
  public:
    - name: none_done
      input: {done: 0, total: 5}
      expected: "-----"
    - name: partway
      input: {done: 3, total: 5}
      expected: "###--"
    - name: complete
      input: {done: 5, total: 5}
      expected: "#####"
  validation:
