      expected: "##"
    - name: long_bar
      input: {done: 4, total: 10}
      expected: "####------"
    - name: single_slot
      input: {done: 0, total: 1}
      expected: "-"
explanation_markdown: |
  String repetition with `*` and concatenation with `+` make the bar without any
  loop: `"#" * done` renders the finished portion and `"-" * (total - done)`
  fills the rest. Because the two counts always add up to `total`, the result is
  guaranteed to be exactly `total` characters long.
common_mistakes:
  - Repeating "-" by total instead of by the remaining count, making the bar too long.
  - Subtracting in the wrong order and passing a negative repeat count.
  - Building the bar with a loop and an off-by-one error instead of using repetition.
