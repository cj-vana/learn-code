explanation_markdown: |
  Clamping means squeezing a value into a range. Copying the three dict fields
  into named variables keeps the comparisons readable. Checking `requested < low`
  and then `requested > high` covers both ways a value can fall outside the
  range; if neither fires, the value is already valid and is returned as is.
common_mistakes:
  - Returning the requested value even when it is out of range.
  - Using strict comparisons that wrongly clamp a value sitting exactly on a boundary.
  - Swapping low and high so requests are clamped to the wrong end.
