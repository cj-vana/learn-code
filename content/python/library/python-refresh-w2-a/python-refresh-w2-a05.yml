  originality_notes: Original thermostat scenario that clamps a requested temperature into an allowed range.
prompt_markdown: |
  A smart thermostat refuses to leave its safe range. The request arrives as a
  dict with keys `"requested"`, `"low"`, and `"high"`, where `low <= high`.

  Write `apply_setting(request)` that returns the temperature the thermostat
  actually uses:

  - if the requested value is below `low`, return `low`
  - if it is above `high`, return `high`
  - otherwise return the requested value unchanged
starter_code: |
  def apply_setting(request):
      return 0
function_name: apply_setting
input_mode: function
solution_sketch: Return low or high when the request falls outside the range, otherwise return the request itself.
sample_solution: |
  def apply_setting(request):
      requested = request["requested"]
      low = request["low"]
      high = request["high"]
      if requested < low:
          return low
      if requested > high:
          return high
      return requested
hints:
  - level: 1
    text: There are three outcomes, namely pinned to the low end, pinned to the high end, or left alone.
  - level: 2
    text: Handle the two out-of-range cases first, each with its own if.
  - level: 3
    text: If neither the below-low nor the above-high check fires, the request is already inside the range.
