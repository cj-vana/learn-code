      expected: B
    - name: bulk_a_wins
      input: {price_a: 3, size_a: 3, price_b: 2, size_b: 1}
      expected: A
    - name: another_tie
      input: {price_a: 8, size_a: 4, price_b: 6, size_b: 3}
      expected: tie
explanation_markdown: |
  A bigger package can still be the better buy, so the packages must be compared
  on price per unit. Dividing each price by its size normalizes them onto the
  same scale. Two comparisons cover every case: A cheaper, B cheaper, and the
  remaining possibility, an exact tie.
common_mistakes:
  - Comparing the raw prices and ignoring the package sizes.
  - Forgetting the tie case and always returning "A" or "B".
  - Dividing size by price, which inverts which package looks cheaper.
