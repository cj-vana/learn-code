prompt_markdown: |
  A shopper compares two packages of the same item. The input is a dict with
  keys `"price_a"`, `"size_a"`, `"price_b"`, and `"size_b"`, where each size is
  a positive number of units.

  Write `better_deal(data)` that compares the price per unit of each package and
  returns:

  - `"A"` if package A is cheaper per unit
  - `"B"` if package B is cheaper per unit
  - `"tie"` if they cost the same per unit
starter_code: |
  def better_deal(data):
      return ""
function_name: better_deal
input_mode: function
solution_sketch: Divide each price by its size and compare the two per-unit prices.
sample_solution: |
  def better_deal(data):
      unit_a = data["price_a"] / data["size_a"]
      unit_b = data["price_b"] / data["size_b"]
      if unit_a < unit_b:
          return "A"
      if unit_b < unit_a:
          return "B"
      return "tie"
hints:
  - level: 1
    text: The fair comparison is price divided by size, not price alone.
  - level: 2
    text: Compute the per-unit price for each package before comparing them.
  - level: 3
    text: Compare unit_a and unit_b; if neither is strictly smaller, it is a tie.
