    - name: just_over_one
      input: {weight_kg: 1.01, is_member: false}
      expected: 12
explanation_markdown: |
  Choosing the base cost is a classic ordered band check: once `weight <= 1`
  fails, the `elif weight <= 5` branch already knows the weight is above 1. The
  member discount is independent of the band, so it is cleanest to compute the
  base first and then adjust it once.
common_mistakes:
  - Writing overlapping ranges that let two bands both apply.
  - Applying the discount inside every band instead of once at the end.
  - Treating the 5 kg boundary as "more than 5" and overcharging exactly-5 kg parcels.
