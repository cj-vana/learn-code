prompt_markdown: |
  A warehouse charges shipping from a parcel's weight in kilograms and whether
  the customer is a member. The order arrives as a dict with keys
  `"weight_kg"` (a number) and `"is_member"` (a boolean).

  Write `shipping_cost(order)` that returns the cost in dollars:

  - weight of 1 kg or less: base cost 5
  - more than 1 kg up to and including 5 kg: base cost 12
  - more than 5 kg: base cost 20

  If the customer is a member, subtract a flat 3 from the base cost.
starter_code: |
  def shipping_cost(order):
      return 0
function_name: shipping_cost
input_mode: function
solution_sketch: Pick the base cost from the weight band, then subtract 3 when the order is from a member.
sample_solution: |
  def shipping_cost(order):
      weight = order["weight_kg"]
      if weight <= 1:
          base = 5
      elif weight <= 5:
          base = 12
      else:
          base = 20
      if order["is_member"]:
          base -= 3
      return base
hints:
  - level: 1
    text: First decide which weight band the parcel falls into.
  - level: 2
    text: Check the boundaries from lightest to heaviest so each branch assumes the earlier ones failed.
  - level: 3
    text: After you set the base cost, apply the member discount with a single if on order["is_member"].
tests:
