prompt_markdown: |
  Once each clip has been sorted into the four confusion-matrix buckets, the
  simplest score for the warbler detector is its **accuracy**: the fraction of
  clips it got right, whether that meant correctly flagging a warbler or correctly
  staying silent.

  With the counts `tp` (true positive), `fp` (false positive), `tn` (true
  negative), and `fn` (false negative), accuracy is:

  ```
  accuracy = (tp + tn) / (tp + fp + tn + fn)
  ```

  Write `accuracy(counts)` that takes a single dictionary with keys `"tp"`,
  `"fp"`, `"tn"`, and `"fn"` (all non-negative ints). Return the accuracy as a
  float **rounded to 4 decimal places**.

  If all four counts are zero there were no clips to grade, so accuracy is
  undefined: return `None` in that case.

  Example:

  ```python
  accuracy({"tp": 1, "fp": 1, "tn": 1, "fn": 1})
  # -> 0.5   (2 correct out of 4 clips)
  ```
starter_code: |
