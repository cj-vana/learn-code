explanation_markdown: |
  Accuracy answers "what share of all clips did the detector call correctly?" by
  putting the two correct buckets (`tp` and `tn`) over the grand total. It is the
  most intuitive score, but it can be misleading when one class dominates: a
  detector that never reports a warbler still scores high accuracy if warblers are
  rare, which is exactly why the later metrics in this series exist.

  The zero-total guard matters because dividing by zero raises an error rather than
  returning a number. Returning `None` communicates "undefined" honestly instead of
  inventing a score for a grade sheet with no clips on it.
common_mistakes:
  - Dividing by only tp + fp (the predicted-positive count) instead of all four buckets.
  - Forgetting the all-zero guard, so an empty grade sheet raises ZeroDivisionError.
  - Returning the raw quotient without round(..., 4), leaving a long float that fails the exact comparison.
