function_name: accuracy
input_mode: function
solution_sketch: Add the four counts for the total; if it is zero return None, otherwise return round((tp + tn) / total, 4).
sample_solution: |
  def accuracy(counts):
      tp = counts["tp"]
      fp = counts["fp"]
      tn = counts["tn"]
      fn = counts["fn"]
      total = tp + fp + tn + fn
      if total == 0:
          return None
      return round((tp + tn) / total, 4)
hints:
  - level: 1
    text: The correct predictions are the true positives plus the true negatives; the denominator is every clip.
  - level: 2
    text: Compute total = tp + fp + tn + fn first so you can guard against dividing by zero.
  - level: 3
    text: If total is 0 return None; otherwise return round((tp + tn) / total, 4).
