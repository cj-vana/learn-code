prompt_markdown: |
  An ROC curve is built one dot at a time: at each decision threshold you plot how
  well a classifier separates positives from negatives. This exercise computes a
  single dot from a confusion count.

  A reef-health model labels each survey site as "bleached" (positive) or
  "healthy" (negative). You are given a single dictionary `job` with four integer
  counts taken at one threshold:

  - `"tp"`: true positives (bleached sites correctly flagged).
  - `"fp"`: false positives (healthy sites wrongly flagged).
  - `"total_pos"`: the number of actually-bleached sites.
  - `"total_neg"`: the number of actually-healthy sites.

  Write `roc_point(job)` returning the two-element list `[tpr, fpr]`, where

  ```
  tpr = tp / total_pos      (true positive rate, the y-axis)
  fpr = fp / total_neg      (false positive rate, the x-axis)
  ```

  Round each value to **4 decimal places**. If a denominator is `0` (no actual
  positives, or no actual negatives), define that rate as `0.0` instead of dividing.

  ```python
  roc_point({"tp": 3, "fp": 1, "total_pos": 4, "total_neg": 4})
  # -> [0.75, 0.25]
  ```
starter_code: |
  def roc_point(job):
      return [0.0, 0.0]
function_name: roc_point
input_mode: function
solution_sketch: Compute tpr = tp/total_pos and fpr = fp/total_neg, each guarded so a zero denominator yields 0.0, round both to 4dp, and return them as a two-element list [tpr, fpr].
sample_solution: |
  def roc_point(job):
      tp = job["tp"]
      fp = job["fp"]
      total_pos = job["total_pos"]
      total_neg = job["total_neg"]
      tpr = round(tp / total_pos, 4) if total_pos else 0.0
      fpr = round(fp / total_neg, 4) if total_neg else 0.0
      return [tpr, fpr]
hints:
  - level: 1
    text: The true positive rate uses the positive total as its denominator, and the false positive rate uses the negative total; they never share a denominator.
  - level: 2
    text: Guard each division separately, because either total could be zero, and a zero total means that rate is defined as 0.0.
  - level: 3
    text: Use a conditional like round(tp / total_pos, 4) if total_pos else 0.0 for each rate, then return [tpr, fpr] in that order.
