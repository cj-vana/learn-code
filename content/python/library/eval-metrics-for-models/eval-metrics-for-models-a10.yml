explanation_markdown: |
  A single ROC point is just two ratios read off a confusion matrix. The true
  positive rate (also called recall or sensitivity) asks "of the sites that really
  were bleached, what fraction did we catch?", so its denominator is `total_pos`.
  The false positive rate asks "of the sites that were actually healthy, what
  fraction did we wrongly alarm on?", so its denominator is `total_neg`. Plotting
  fpr on x and tpr on y, the top-left corner is a perfect classifier and the
  diagonal is random guessing.

  The zero-denominator guard matters because evaluation slices are sometimes
  degenerate: a batch might contain no positive examples at all. Rather than crash,
  the convention here pins the undefined rate to `0.0` so the point still plots.
  Keeping the two guards independent is important, since `total_pos` and
  `total_neg` can be zero on their own, and confusing which count divides which
  numerator is the classic ROC mistake.
common_mistakes:
  - Swapping the denominators, dividing tp by total_neg or fp by total_pos.
  - Guarding both rates behind a single check so one zero total wrongly zeroes the other rate.
  - Returning the rates in the wrong order; the list must be [tpr, fpr], matching the (y, x) roles.
  - Leaving the values unrounded, which breaks the exact-equality comparison.
