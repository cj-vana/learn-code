prompt_markdown: |
  A model that writes tasting captions keeps repeating the same flattering word to
  game a naive overlap score. The fix used by BLEU-style metrics is **clipping**:
  a word can only earn credit as many times as it actually appears in the human
  reference.

  You are given a single dictionary `job` with two keys, each a list of word
  tokens (plain strings):

  - `"candidate"`: the tokens the model produced.
  - `"reference"`: the tokens a human wrote.

  Write `unigram_overlap(job)` returning the **clipped unigram precision**. For
  every distinct word `w` in the candidate, its clipped count is

  ```
  clip(w) = min(count of w in candidate, count of w in reference)
  ```

  The score is the total clipped count divided by the number of tokens in the
  candidate:

  ```
  precision = (sum of clip(w) over distinct candidate words) / len(candidate)
  ```

  Return the result **rounded to 4 decimal places**. If the candidate is empty,
  return `0.0` (there is nothing to score, and you must not divide by zero).

  Example: with `candidate = ["ripe", "ripe", "berry"]` and
  `reference = ["ripe", "berry", "tart"]`, the word `ripe` is clipped from 2 down
  to 1 and `berry` stays at 1, giving `(1 + 1) / 3 = 0.6667`.

  ```python
  unigram_overlap({"candidate": ["ripe", "ripe", "berry"],
                   "reference": ["ripe", "berry", "tart"]})
  # -> 0.6667
  ```
