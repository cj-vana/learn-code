solution_sketch: Count both lists with Counter, sum min(candidate_count, reference_count) over distinct candidate words, divide by candidate length, round to 4dp, and short-circuit an empty candidate to 0.0.
sample_solution: |
  from collections import Counter


  def unigram_overlap(job):
      candidate = job["candidate"]
      reference = job["reference"]
      if len(candidate) == 0:
          return 0.0
      cand_counts = Counter(candidate)
      ref_counts = Counter(reference)
      clipped = sum(min(count, ref_counts[word])
                    for word, count in cand_counts.items())
      return round(clipped / len(candidate), 4)
