explanation_markdown: |
  Plain overlap (fraction of candidate words that appear anywhere in the reference)
  is easy to cheat: repeat one good word ten times and the score stays high.
  Clipping removes that loophole by capping each word's credit at its reference
  frequency, so `["oak", "oak", "oak"]` against a reference containing one `oak`
  earns credit for exactly one match, giving `1 / 3`.

  Counters make this a two-line computation. `Counter(candidate)` gives every
  distinct word with its multiplicity, and reading `ref_counts[word]` returns 0
  for words the reference never used, so `min(count, ref_counts[word])` is the
  clipped count without any special cases. Dividing by `len(candidate)` (not the
  reference length) is what makes this a precision: it asks what fraction of the
  words the model emitted were justified. The empty-candidate guard both avoids a
  ZeroDivisionError and matches the convention that a model which says nothing
  scores zero.
common_mistakes:
  - Dividing by the reference length instead of the candidate length, which computes a recall-flavored score rather than precision.
  - Skipping the clip and just counting how many candidate words appear in the reference, so a repeated word inflates the score.
  - Forgetting the empty-candidate case and dividing by zero.
  - Rounding to the wrong number of places or returning the unrounded float, which fails the exact equality check.
