      - '0.6667'
      - '1.0'
    correct_choice: '0.3333'
    explanation: |
      The first correct result sits at position 3 (1-indexed), so RR = 1/3 ≈
      0.3333; had it been absent entirely, the score would be 0.0.
    concepts:
