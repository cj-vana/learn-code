explanation_markdown: |
  ECE turns the abstract idea "confidence should equal accuracy" into one number.
  Inside each confidence bin you compare two quantities: how sure the model was on
  average (`conf`) versus how often it was actually right (`acc`). A bin where the
  model claims 90% but is right only 67% of the time contributes a gap of `0.233`,
  and that gap is weighted by how many predictions live in the bin, so crowded bins
  dominate the score and near-empty ones barely register.

  Two edge details make or break the implementation. First, the binning boundary:
  `int(c * buckets)` maps `[0, 1)` onto `0 .. buckets - 1`, but `c == 1.0` maps to
  `buckets`, one past the end, so it must be clamped into the final bin. Second, the
  intervals are left-closed, which is why a confidence sitting exactly on a boundary
  (like `0.5` with two bins) belongs to the upper bin, not the lower one. The
  midpoint example scores `0.0` not because the model is good but because within its
  single bin the mean confidence `0.5` happens to equal the accuracy `0.5`. That is
  the subtle lesson of calibration: it is a property of aggregates, and a model can
  be perfectly calibrated on average while being wrong on any individual case.
common_mistakes:
  - Forgetting to clamp c == 1.0 down from bin index buckets to buckets - 1, causing an index error or a lost prediction.
  - Weighting every bin equally instead of by its share of predictions, which is a different (macro) metric.
  - Using the right-open rule for the last bin too, so perfectly confident correct predictions get dropped.
  - Comparing accuracy to a single confidence rather than the bin's mean confidence.
