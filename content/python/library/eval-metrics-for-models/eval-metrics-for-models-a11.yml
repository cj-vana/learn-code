prompt_markdown: |
  A well-calibrated classifier's confidence should match how often it is right:
  among the predictions it makes at 80% confidence, about 80% should be correct.
  **Expected Calibration Error (ECE)** measures the gap between confidence and
  accuracy, bin by bin.

  A mushroom-edibility model outputs a confidence in `[0, 1]` for each specimen and
  is later marked right or wrong. You are given a single dictionary `job` with:

  - `"confidences"`: a list of confidence floats, each in `[0, 1]`.
  - `"correct"`: a list of booleans, aligned by position with `"confidences"`
    (`True` means that prediction turned out correct).
  - `"buckets"`: an integer `n`, the number of equal-width confidence bins.

  **Binning rule.** Split `[0, 1]` into `n` bins of width `1 / n`. Bin index `b`
  (from `0` to `n - 1`) covers the half-open interval `[b/n, (b+1)/n)` -- left edge
  included, right edge excluded -- **except the last bin**, which is closed on both
  ends, `[(n-1)/n, 1.0]`, so a confidence of exactly `1.0` lands there. Equivalently,
  place a confidence `c` in bin `int(c * n)`, and if that equals `n` (which only
  happens when `c == 1.0`) use `n - 1`. Because the left edge is included, a value
  exactly on a boundary such as `0.5` with `n = 2` falls into the **higher** bin.

  **Per-bin numbers.** For each bin that contains at least one prediction, compute

  - `acc` = fraction of that bin's predictions that are correct,
  - `conf` = mean of that bin's confidences,
  - and the gap `|acc - conf|`.

  **ECE** weights each bin's gap by how many predictions it holds:

  ```
  ECE = sum over non-empty bins of (bin_size / total_predictions) * |acc - conf|
  ```

  Empty bins contribute nothing. Return the ECE **rounded to 4 decimal places**. If
  `"confidences"` is empty, return `0.0`.

  Worked example with `buckets = 2`:

  ```python
  calibration_error({
      "confidences": [0.2, 0.8, 0.6, 0.9],
      "correct": [False, True, True, True],
      "buckets": 2,
  })
  # bin 0 = [0.0, 0.5): {0.2}  -> acc 0.0, conf 0.2, gap 0.2, weight 1/4
  # bin 1 = [0.5, 1.0]: {0.8, 0.6, 0.9} -> acc 1.0, conf 0.7667, gap 0.2333, weight 3/4
  # ECE = 0.25*0.2 + 0.75*0.2333... = 0.225
  # -> 0.225
  ```
