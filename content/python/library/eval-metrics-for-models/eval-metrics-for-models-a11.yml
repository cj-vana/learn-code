solution_sketch: For each prediction find its bin with int(c*n) capped at n-1, accumulate per-bin count, confidence sum, and correct count; then for each non-empty bin add (count/total)*|acc-conf| and round the total to 4dp, returning 0.0 for empty input.
sample_solution: |
  def calibration_error(job):
      confidences = job["confidences"]
      correct = job["correct"]
      buckets = job["buckets"]
      total = len(confidences)
      if total == 0:
          return 0.0

      counts = [0] * buckets
      conf_sums = [0.0] * buckets
      correct_sums = [0] * buckets
      for c, ok in zip(confidences, correct):
          b = int(c * buckets)
          if b >= buckets:
              b = buckets - 1
          counts[b] += 1
          conf_sums[b] += c
          correct_sums[b] += 1 if ok else 0

      ece = 0.0
      for b in range(buckets):
          if counts[b] == 0:
              continue
          acc = correct_sums[b] / counts[b]
          conf = conf_sums[b] / counts[b]
          ece += (counts[b] / total) * abs(acc - conf)
      return round(ece, 4)
