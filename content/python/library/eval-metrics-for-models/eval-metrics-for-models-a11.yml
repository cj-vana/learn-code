  - level: 2
    text: The bin for confidence c is int(c * buckets), but a confidence of exactly 1.0 gives buckets, so clamp it down to buckets - 1.
  - level: 3
    text: Keep three parallel arrays (count, confidence sum, correct count) indexed by bin, skip empty bins, and weight each |acc - conf| by count/total before summing and rounding to 4 places.
