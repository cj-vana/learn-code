prompt_markdown: |
  The lab has grown from a single warbler detector into a multi-species classifier
  that also recognises finches, thrushes, and owls. Each species is scored on its
  own, giving one F1 value per class. To summarise the whole system in one number
  the lab uses **macro-F1**: the plain, unweighted average of the per-class F1
  scores, so every species counts equally no matter how many clips it had.

  For per-class F1 values `f[0], f[1], ..., f[k-1]`:

  ```
  macro_F1 = (f[0] + f[1] + ... + f[k-1]) / k
  ```

  Write `macro_f1(per_class)` that takes a single list of floats, where each
  element is one class's already-computed F1 score. Return the macro-F1 as a float
  **rounded to 4 decimal places**. The list always has at least one class.

  Example:

  ```python
  macro_f1([0.5, 0.7])
  # -> 0.6
  ```
starter_code: |
  def macro_f1(per_class):
      return 0.0
function_name: macro_f1
input_mode: function
solution_sketch: Sum the per-class F1 scores, divide by how many there are, and round to 4 decimals.
sample_solution: |
  def macro_f1(per_class):
      total = sum(per_class)
      return round(total / len(per_class), 4)
hints:
  - level: 1
    text: Macro-averaging weights every class the same, so it is just the mean of the per-class F1 list.
  - level: 2
    text: sum(per_class) gives the numerator and len(per_class) gives the number of classes.
  - level: 3
    text: Return round(sum(per_class) / len(per_class), 4).
