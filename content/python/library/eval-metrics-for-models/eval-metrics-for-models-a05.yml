explanation_markdown: |
  Macro-F1 treats a rare owl class exactly like a common finch class: each species
  contributes one F1 value and they are averaged with equal weight. That makes it a
  fair headline when you care about performance on every class, including the small
  ones, rather than letting the biggest class dominate the score.

  The implementation is deliberately plain, `sum(...) / len(...)`, which keeps the
  intent obvious. Because the tests compare exact floats, rounding the final mean to
  four places is what pins the answer down even when the inputs are themselves
  rounded metrics whose sum lands a hair away from a clean value.
common_mistakes:
  - Weighting classes by their support (a micro-style average) instead of averaging the F1 scores equally.
  - Dividing by a hard-coded class count instead of len(per_class), which breaks when the number of classes changes.
  - Returning the mean without rounding, leaving a trailing decimal that fails the exact comparison.
