explanation_markdown: |
  A single confidence model is really a whole family of classifiers, one for every
  threshold you might pick. Sweeping the cutoff shows the trade-off directly: a low
  threshold labels almost everything a warbler (catching real calls but also many
  false alarms), while a high threshold stays quiet (few false alarms but many
  misses). Plotting accuracy against threshold is how labs choose an operating
  point.

  Two details are easy to get wrong. The comparison must be `>=`, so a score sitting
  exactly on the threshold counts as a positive prediction, which is why the tied
  case predicts `1` for every clip. And the accuracy for each threshold is computed
  fresh against the *same* labels, so the inner loop recomputes predictions rather
  than reusing an earlier threshold's results.
common_mistakes:
  - Using a strict score > t instead of score >= t, which flips predictions on clips that sit exactly at the threshold.
  - Reusing predictions from a previous threshold instead of recomputing them for each cutoff.
  - Returning accuracy without rounding, or dividing by the wrong count, so the reported fraction drifts from the expected value.
