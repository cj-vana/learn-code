prompt_markdown: |
  The warbler detector does not really emit a hard `0`/`1`; it emits a **confidence
  score** between `0` and `1` for each clip. You turn that into a decision by
  picking a **threshold**: predict `1` (warbler) when the score is at least the
  threshold, and `0` otherwise. Where you set the threshold changes every metric, so
  the lab sweeps several thresholds to see how accuracy responds.

  Write `threshold_sweep(job)` that takes a single dictionary with three keys:

  - `"scores"`: a list of confidence floats, one per clip.
  - `"labels"`: a list of `0`/`1` ints of the same length, the ground truth.
  - `"thresholds"`: a list of cutoff floats to try.

  For each threshold `t`, form the predictions with the rule "predict `1` when
  `score >= t`, else `0`", then compute the **accuracy** (fraction of clips whose
  prediction matches its label) **rounded to 4 decimal places**. Return a list with
  one `[threshold, accuracy]` pair per threshold, in the same order the thresholds
  were given. You may assume `scores` and `labels` are non-empty.

  Example:

  ```python
  threshold_sweep({
      "scores": [0.3, 0.7, 0.55, 0.4],
      "labels": [0, 1, 1, 0],
      "thresholds": [0.5, 0.6],
  })
  # -> [[0.5, 1.0], [0.6, 0.75]]
  ```
starter_code: |
  def threshold_sweep(job):
