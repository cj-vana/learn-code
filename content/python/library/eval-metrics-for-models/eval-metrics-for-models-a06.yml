function_name: threshold_sweep
input_mode: function
solution_sketch: For each threshold, predict 1 where score >= threshold, count how many predictions match the labels, divide by the clip count, and collect [threshold, rounded accuracy].
sample_solution: |
  def threshold_sweep(job):
      scores = job["scores"]
      labels = job["labels"]
      thresholds = job["thresholds"]
      n = len(labels)
      results = []
      for t in thresholds:
          correct = 0
          for score, actual in zip(scores, labels):
              pred = 1 if score >= t else 0
              if pred == actual:
                  correct += 1
          results.append([t, round(correct / n, 4)])
      return results
