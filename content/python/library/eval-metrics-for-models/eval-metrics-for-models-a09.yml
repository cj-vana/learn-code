prompt_markdown: |
  A search system over a star catalog returns candidate identifiers ordered from
  most to least relevant. To score one query we ask: how far down the list is the
  single correct answer? **Reciprocal rank** rewards putting it near the top.

  You are given a single dictionary `job` with two keys:

  - `"ranked"`: a list of returned items, best first (index 0 is rank 1).
  - `"correct"`: the one item that is the right answer.

  Write `reciprocal_rank(job)`. Let `rank` be the **1-based position** of the
  **first** occurrence of `correct` in `ranked`. The reciprocal rank is `1 / rank`,
  returned **rounded to 4 decimal places**. If `correct` does not appear in
  `ranked` at all, return `0.0`.

  Because index 0 is rank 1, an answer in the first slot scores `1.0`, the second
  slot scores `0.5`, the third `0.3333`, and so on. Only the first match matters if
  the item somehow repeats.

  ```python
  reciprocal_rank({"ranked": ["nova", "comet", "quasar"], "correct": "quasar"})
  # -> 0.3333
  ```
starter_code: |
