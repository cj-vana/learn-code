function_name: reciprocal_rank
input_mode: function
solution_sketch: Enumerate the ranked list, and on the first item equal to correct return round(1/(index+1), 4); if the loop finishes with no match, return 0.0.
sample_solution: |
  def reciprocal_rank(job):
      ranked = job["ranked"]
      correct = job["correct"]
      for index, item in enumerate(ranked):
          if item == correct:
              return round(1.0 / (index + 1), 4)
      return 0.0
hints:
  - level: 1
    text: Rank is 1-based but list indexes are 0-based, so the item at index i sits at rank i + 1.
  - level: 2
    text: Walk the list with enumerate and stop at the first item equal to correct, returning its reciprocal rank right away.
  - level: 3
    text: Return round(1.0 / (index + 1), 4) on the first match; if the loop ends without ever matching, return 0.0.
