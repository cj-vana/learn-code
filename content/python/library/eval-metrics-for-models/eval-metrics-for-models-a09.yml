explanation_markdown: |
  Reciprocal rank is the per-query piece that, averaged over many queries, becomes
  Mean Reciprocal Rank. Its shape encodes a strong opinion: moving the right answer
  from rank 2 to rank 1 lifts the score from `0.5` to `1.0`, but moving it from
  rank 9 to rank 8 barely changes anything (`0.1111` to `0.125`). Users mostly look
  near the top, so the metric front-loads the reward.

  The implementation leans on the fact that `enumerate` yields items in order, so
  the first equality you hit is the best (smallest) rank by construction; returning
  immediately means duplicates further down never matter. Converting a 0-based
  index to a 1-based rank with `index + 1` is the one detail that trips people up,
  and the `0.0` fall-through cleanly handles "the answer was never retrieved",
  which is different from "retrieved in last place".
common_mistakes:
  - Using the raw 0-based index as the rank, so the top result scores an undefined 1/0 or an off-by-one value.
  - Continuing past the first match and reporting a later duplicate's worse rank.
  - Returning None or raising when the correct item is absent instead of the defined 0.0.
