explanation_markdown: |
  Precision and recall watch different mistakes. Precision is damaged by false
  positives (crying warbler when there is none), so it matters when acting on a
  detection is expensive. Recall is damaged by false negatives (missing a real
  call), so it matters when a miss is the costly outcome. The same detector can
  score high on one and low on the other, which is why reporting both is standard
  practice.

  The zero-denominator guards encode sensible conventions rather than crashing.
  With no positive predictions there is nothing to be precise about, and with no
  real positives there is nothing to recall; defining each as `0.0` keeps the
  metrics usable in aggregation without silently dividing by zero.
common_mistakes:
  - Swapping the denominators, dividing precision by tp + fn or recall by tp + fp.
  - Letting tp + fp or tp + fn hit zero and raising ZeroDivisionError instead of returning 0.0.
  - Rounding only one of the two values, so the other keeps a long trailing decimal.
