prompt_markdown: |
  Accuracy hides an important trade-off: a detector can look good overall while
  being wrong in one specific, costly direction. **Precision** and **recall** pull
  those two failure modes apart.

  - **Precision** asks "when the detector shouts *warbler*, how often is it right?"

    ```
    precision = tp / (tp + fp)
    ```

  - **Recall** asks "of all the real warbler calls, how many did the detector
    catch?"

    ```
    recall = tp / (tp + fn)
    ```

  Write `precision_recall(counts)` that takes a single dictionary with keys
  `"tp"`, `"fp"`, `"tn"`, and `"fn"` (all non-negative ints). Return a dictionary
  `{"precision": ..., "recall": ...}` with each value a float **rounded to 4
  decimal places**.

  A denominator can be zero. If `tp + fp == 0` the detector never predicted a
  warbler, so define its precision as `0.0`. If `tp + fn == 0` there were no real
  warblers to find, so define recall as `0.0`.

  Example:

  ```python
  precision_recall({"tp": 2, "fp": 2, "tn": 1, "fn": 2})
  # -> {"precision": 0.5, "recall": 0.5}
  ```
starter_code: |
  def precision_recall(counts):
      return {"precision": 0.0, "recall": 0.0}
function_name: precision_recall
input_mode: function
solution_sketch: Guard each denominator against zero, compute tp/(tp+fp) and tp/(tp+fn), and round both to 4 decimals in the returned dict.
sample_solution: |
  def precision_recall(counts):
      tp = counts["tp"]
      fp = counts["fp"]
      fn = counts["fn"]
      precision = tp / (tp + fp) if (tp + fp) > 0 else 0.0
      recall = tp / (tp + fn) if (tp + fn) > 0 else 0.0
      return {"precision": round(precision, 4), "recall": round(recall, 4)}
hints:
  - level: 1
    text: Precision divides by the predicted positives (tp + fp); recall divides by the actual positives (tp + fn).
  - level: 2
