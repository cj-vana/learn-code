explanation_markdown: |
  Every evaluation metric for a binary classifier is built on these four counts, so
  getting them right is the foundation for accuracy, precision, recall, and F1. The
  trick is that the bucket is decided by the *pair* of values, not by the prediction
  or the label alone: a `1` prediction is a true positive only when the label is
  also `1`, and a false positive otherwise.

  Zipping the two lists guarantees each prediction is matched to its own clip's
  label. The four-way branch is exhaustive and mutually exclusive, so exactly one
  counter increments per clip and the four totals always add up to the number of
  clips.
common_mistakes:
  - Deciding the bucket from the prediction alone and ignoring the label, which collapses true and false positives together.
  - Iterating with a range index but reading predictions and labels from mismatched positions, so pairs get crossed.
  - Forgetting the false-negative case (predicted 0, label 1) and letting it fall through to true negatives.
