explanation_markdown: |
  Raw agreement flatters lazy judges. If both judges label almost everything
  "good", they will agree most of the time even if neither is paying attention.
  Kappa fixes this by asking how much agreement is left once you subtract what two
  judges with the same label frequencies would reach by independent chance. That
  chance term `p_e` is exactly the probability the two independent draws land on the
  same category, summed over categories, which is why it multiplies A's frequency by
  B's frequency for each label.

  The `(p_o - p_e) / (1 - p_e)` form rescales the leftover agreement so that `1.0`
  means "as far above chance as possible", `0.0` means "no better than chance", and
  negative values mean the judges disagree even more than random labeling would
  predict, as in the perfectly-opposite `pass`/`fail` example that scores `-1.0`.
  The degenerate guard handles the one case the formula cannot: when both judges are
  stuck on a single shared category, chance agreement is already `1.0`, the
  denominator vanishes, and there is simply no variation for kappa to measure -- so
  we report a perfect `1.0` when the lists match and `0.0` otherwise rather than
  dividing by zero. Note that two judges who are each constant but on different
  categories (`x` vs `y`) are not degenerate: their `p_e` is `0`, and kappa is a
  well-defined `0.0`.
common_mistakes:
  - Reporting raw observed agreement p_o and forgetting the chance correction entirely.
  - Computing p_e from only the categories in one list, dropping labels the other judge used.
  - Dividing by 1 - p_e without guarding the case where it is zero, causing a ZeroDivisionError.
  - Clamping kappa to be non-negative; legitimate negative values signal systematic disagreement.
