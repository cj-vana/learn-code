prompt_markdown: |
  Two automated judges each label the same batch of model answers, and you want to
  know how much they truly agree -- not counting the agreements they would hit just
  by guessing the same way. **Cohen's kappa** subtracts that chance agreement out.

  You are given a single dictionary `job` with two keys:

  - `"ratings_a"`: judge A's labels, a list of category strings.
  - `"ratings_b"`: judge B's labels, the same length as `"ratings_a"`, aligned by
    position.

  Write `judge_agreement(job)` returning Cohen's kappa. Let `N` be the number of
  items. Define:

  - **Observed agreement** `p_o` = (number of positions where the two labels match)
    divided by `N`.
  - **Expected (chance) agreement** `p_e`: for each category `k` appearing in either
    list, let `pa_k` be the fraction of A's labels equal to `k` and `pb_k` the
    fraction of B's labels equal to `k`; then
    `p_e = sum over categories k of pa_k * pb_k`.

  Kappa is:

  ```
  kappa = (p_o - p_e) / (1 - p_e)
  ```

  Return it **rounded to 4 decimal places**.

  **Degenerate case.** If `1 - p_e == 0` (this happens when both judges placed every
  item in one single identical category, so chance agreement is already total and
  the formula would divide by zero), do not divide. Instead return `1.0` if the two
  rating lists are identical and `0.0` otherwise.

  Kappa can be negative: perfectly opposite judges score below zero.

  ```python
  judge_agreement({"ratings_a": ["good", "bad", "good", "bad"],
                   "ratings_b": ["good", "bad", "bad", "bad"]})
  # p_o = 3/4 = 0.75, p_e = 0.5, kappa = (0.75 - 0.5) / (1 - 0.5) = 0.5
  # -> 0.5
  ```
