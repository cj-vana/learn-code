solution_sketch: Compute p_o as the fraction of aligned positions that match, p_e as the sum over categories of the product of each side's category frequency, then return (p_o - p_e)/(1 - p_e) rounded to 4dp, handling the zero-denominator case as 1.0 if the lists are identical else 0.0.
sample_solution: |
  from collections import Counter


  def judge_agreement(job):
      ratings_a = job["ratings_a"]
      ratings_b = job["ratings_b"]
      n = len(ratings_a)

      agree = sum(1 for x, y in zip(ratings_a, ratings_b) if x == y)
      p_o = agree / n

      counts_a = Counter(ratings_a)
      counts_b = Counter(ratings_b)
      categories = set(counts_a) | set(counts_b)
      p_e = sum((counts_a[k] / n) * (counts_b[k] / n) for k in categories)

      if 1 - p_e == 0:
          return 1.0 if ratings_a == ratings_b else 0.0
      return round((p_o - p_e) / (1 - p_e), 4)
