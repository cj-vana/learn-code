prompt_markdown: |
  Precision and recall pull in opposite directions, so it helps to fold them into a
  single score. The **F1 score** is their *harmonic* mean, which stays low unless
  *both* numbers are healthy (unlike a plain average, which a single strong value
  can prop up).

  For precision `p` and recall `r`:

  ```
  F1 = 2 * p * r / (p + r)
  ```

  Write `f1(job)` that takes a single dictionary with two keys:

  - `"precision"`: a float, the precision `p`.
  - `"recall"`: a float, the recall `r`.

  Return the F1 score as a float **rounded to 4 decimal places**.

  If `p + r == 0` (both are zero) the formula divides by zero; define F1 as `0.0`
  in that case.

  Example:

  ```python
  f1({"precision": 0.5, "recall": 0.5})
  # -> 0.5
  ```
starter_code: |
