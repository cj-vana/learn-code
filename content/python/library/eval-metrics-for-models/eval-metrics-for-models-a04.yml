function_name: f1
input_mode: function
solution_sketch: Read p and r; if their sum is zero return 0.0, otherwise return round(2 * p * r / (p + r), 4).
sample_solution: |
  def f1(job):
      p = job["precision"]
      r = job["recall"]
      if p + r == 0:
          return 0.0
      return round(2 * p * r / (p + r), 4)
hints:
  - level: 1
    text: The harmonic mean multiplies the two values in the numerator and adds them in the denominator.
  - level: 2
    text: Guard against p + r being zero before dividing; the only way the sum is zero is when both are zero.
  - level: 3
    text: Return round(2 * p * r / (p + r), 4), or 0.0 when p + r == 0.
