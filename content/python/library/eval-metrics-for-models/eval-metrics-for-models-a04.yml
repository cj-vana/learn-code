explanation_markdown: |
  The harmonic mean punishes imbalance. If precision is `0.8` but recall is only
  `0.2`, the arithmetic mean would be a comfortable `0.5`, yet F1 comes out at
  `0.32` because the harmonic mean is dragged toward the smaller value. That is
  exactly the behaviour you want from a single headline score: a model has to do
  well on both axes to earn a high F1.

  The `p + r == 0` guard covers the degenerate case where the detector found no true
  positives at all, leaving both precision and recall at zero. Defining F1 as `0.0`
  there matches the intuition that such a model has no useful skill, and it avoids a
  division-by-zero crash.
common_mistakes:
  - Averaging precision and recall with (p + r) / 2 instead of using the harmonic mean.
  - Dropping the factor of 2 in the numerator, which halves every score.
  - Skipping the p + r == 0 guard, so a fully unskilled model raises an error instead of scoring 0.0.
