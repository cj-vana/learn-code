prompt_markdown: |
  When you grade a question-answering model, `"Blue Whale"` and `"blue whale"`
  should count as the same answer. **Exact match** on raw strings is too strict, so
  graders first put both strings through the same normalization and then compare.

  You are given a single dictionary `job` with two keys:

  - `"prediction"`: the model's answer string.
  - `"reference"`: the accepted answer string.

  Write `exact_match(job)` returning a **bool**: `True` if the two strings are equal
  after normalization, else `False`. Normalize a string with these three steps, in
  order:

  1. **Case-fold** it (lowercase in a Unicode-aware way).
  2. **Strip** leading and trailing whitespace.
  3. **Collapse** every run of internal whitespace to a single space.

  Both sides get the exact same treatment. For example `"  North  Star "` and
  `"north star"` both normalize to `"north star"`, so they match.

  ```python
  exact_match({"prediction": "Blue Whale", "reference": "blue whale"})
  # -> True
  ```
starter_code: |
