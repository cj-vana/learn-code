solution_sketch: Write a normalize helper that casefolds then uses " ".join(s.split()) to strip and collapse whitespace in one move, apply it to both strings, and compare.
sample_solution: |
  def exact_match(job):
      def normalize(text):
          return " ".join(text.casefold().split())

      return normalize(job["prediction"]) == normalize(job["reference"])
