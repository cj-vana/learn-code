explanation_markdown: |
  The whole trick is to normalize both sides with one shared function so that any
  difference the metric is supposed to ignore disappears before the comparison.
  `text.casefold()` lowercases (more aggressively than `lower()` for non-English
  text), and the idiom `" ".join(text.split())` does two jobs at once: calling
  `split()` with no arguments breaks on any whitespace and discards empty pieces
  from the ends, and rejoining with a single space collapses internal runs. So
  `"  north   star "` becomes `"north star"` cleanly.

  Applying the identical transform to prediction and reference means the only thing
  a mismatch can reflect is a real difference in wording, which is exactly what
  exact match should measure. This is deliberately strict: `"a blue whale"` still
  will not match `"blue whale"`, because normalization only removes formatting
  noise, not content.
common_mistakes:
  - Normalizing only the prediction (or only the reference) so equal answers are judged unequal.
  - Using str.strip alone, which trims the ends but leaves doubled internal spaces intact.
  - Reaching for str.lower instead of casefold, which is fine for plain ASCII but misses some Unicode case differences.
