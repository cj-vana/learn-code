prompt_markdown: |
  A maker space labels each workshop with an acronym built from its title. Write
  `make_acronym(phrase)` returning the uppercase first letter of every
  space-separated word, joined together. An empty string returns an empty string.
starter_code: |
  def make_acronym(phrase):
      return ""
function_name: make_acronym
input_mode: function
solution_sketch: Take the first character of each word, uppercase it, and join the letters.
sample_solution: |
  def make_acronym(phrase):
      letters = []
      for word in phrase.split():
          letters.append(word[0].upper())
      return "".join(letters)
hints:
  - level: 1
    text: Split the title into words so you can look at each one.
  - level: 2
    text: The first character of a word is word[0].
  - level: 3
    text: Uppercase each first letter and join them with no separator.
tests:
