explanation_markdown: |
  Splitting on whitespace yields the words. Taking index 0 of each word gives its
  first character, and `.upper()` normalizes the case. Joining with an empty
  separator concatenates the initials into the acronym.
common_mistakes:
  - Forgetting to uppercase letters that are already lowercase.
  - Indexing a word before checking the string was split into words.
  - Joining with a space instead of an empty string.
