explanation_markdown: |
  Looping over the length of the longer list lets you visit every position. At
  each index you append from the first list and then the second, but only when
  that index actually exists, so the leftover tail of the longer list is added in
  order once the shorter list is exhausted.
common_mistakes:
  - Stopping at the shorter list's length and dropping leftover tracks.
  - Appending from the second list before the first at each position.
  - Indexing out of range instead of checking the length first.
