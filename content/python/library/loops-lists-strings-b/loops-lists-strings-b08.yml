      return []
function_name: interleave
input_mode: function
solution_sketch: Loop over the length of the longer list, adding an element from each list when the index is still in range.
sample_solution: |
  def interleave(data):
      first = data["first"]
      second = data["second"]
      result = []
      length = max(len(first), len(second))
      for i in range(length):
          if i < len(first):
              result.append(first[i])
          if i < len(second):
              result.append(second[i])
      return result
