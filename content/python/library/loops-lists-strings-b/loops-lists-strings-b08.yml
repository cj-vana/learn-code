prompt_markdown: |
  A DJ blends two playlists by alternating tracks: one from the first list, then
  one from the second, and so on. Write `interleave(data)` where `data` is a dict
  with keys `first` and `second`, each a list of track names. Return a single list
  that alternates elements starting with `first`. When one list runs out, append
  the remaining tracks from the longer list in order.
starter_code: |
