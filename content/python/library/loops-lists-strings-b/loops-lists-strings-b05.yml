prompt_markdown: |
  A warehouse organizes shelf codes into aisles by their first character. Write
  `group_by_prefix(codes)` returning a dict that maps each first character to the
  list of codes beginning with it, keeping the codes in their original order. Each
  code is a non-empty string. An empty list returns an empty dict.
starter_code: |
  def group_by_prefix(codes):
      return {}
function_name: group_by_prefix
input_mode: function
solution_sketch: Use each code's first character as a dict key and append the code to that key's list.
sample_solution: |
  def group_by_prefix(codes):
      groups = {}
      for code in codes:
          key = code[0]
          if key not in groups:
              groups[key] = []
          groups[key].append(code)
      return groups
hints:
  - level: 1
    text: The aisle for a code is decided by code[0].
  - level: 2
    text: A dict can map each first character to a list of matching codes.
  - level: 3
    text: Create an empty list the first time you see a key, then append.
tests:
