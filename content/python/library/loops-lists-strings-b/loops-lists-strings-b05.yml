explanation_markdown: |
  The first character of each code names its group. When a character appears for
  the first time, start a new empty list under that key; otherwise append to the
  existing list. Appending in scan order preserves the original ordering within
  each group.
common_mistakes:
  - Overwriting a group instead of appending to it.
  - Forgetting to create the list before the first append.
  - Assuming codes are already sorted by their first character.
