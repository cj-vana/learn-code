prompt_markdown: |
  An LED strip is described by a string where each character is a color code, read
  left to right. Write `compress_strip(colors)` returning a compact string that
  replaces every run of identical characters with that character followed by the
  run length. For example `"aaabb"` becomes `"a3b2"`, and a single character still
  gets a count of 1. An empty string returns an empty string.
starter_code: |
  def compress_strip(colors):
      return ""
function_name: compress_strip
input_mode: function
solution_sketch: Walk the string tracking the current character and its run length, emitting char plus count when the run ends.
sample_solution: |
  def compress_strip(colors):
      if not colors:
          return ""
      result = []
      current = colors[0]
      count = 1
      for ch in colors[1:]:
          if ch == current:
              count += 1
          else:
              result.append(current + str(count))
              current = ch
              count = 1
      result.append(current + str(count))
      return "".join(result)
hints:
  - level: 1
    text: Compare each character to the one before it to detect run boundaries.
  - level: 2
    text: Keep the current character and how many times it has repeated so far.
  - level: 3
    text: When the character changes, append char plus count and start a new run; do not forget the final run.
tests:
