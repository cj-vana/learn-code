explanation_markdown: |
  Track the character currently being counted and how long its run is. Each time
  the next character differs, flush the finished run as the character joined with
  its count, then restart the counter. A final flush after the loop emits the last
  run, which is easy to forget.
common_mistakes:
  - Dropping the final run because it is never flushed after the loop.
  - Comparing to the wrong neighbor and miscounting run lengths.
  - Omitting the count for runs of length one.
