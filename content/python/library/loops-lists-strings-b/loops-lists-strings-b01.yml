prompt_markdown: |
  A theatre marquee shows a short message with words separated by single spaces.
  The manager wants the same words displayed in reverse order. Write
  `reverse_marquee(sign)` returning a new string with the word order reversed.
  An empty string returns an empty string.
starter_code: |
  def reverse_marquee(sign):
      return ""
function_name: reverse_marquee
input_mode: function
solution_sketch: Split into words, reverse the list, and join back with spaces.
sample_solution: |
  def reverse_marquee(sign):
      words = sign.split()
      words.reverse()
      return " ".join(words)
hints:
  - level: 1
    text: Break the sentence into a list of individual words first.
  - level: 2
    text: A list can be reversed before you rebuild the string.
  - level: 3
    text: Use " ".join(words) after reversing the word list.
tests:
  public:
    - name: empty
      input: ""
      expected: ""
    - name: single
      input: "sale"
      expected: "sale"
    - name: two_words
      input: "grand opening"
      expected: "opening grand"
  validation:
    - name: three_words
      input: "buy one today"
      expected: "today one buy"
    - name: four_words
      input: "fresh bread sold here"
