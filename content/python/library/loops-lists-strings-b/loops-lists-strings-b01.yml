explanation_markdown: |
  Splitting on whitespace turns the sentence into a list of words. Reversing that
  list flips their order, and joining with a single space rebuilds the marquee
  text. An empty string splits into an empty list, which joins back to "".
common_mistakes:
  - Reversing the characters of the whole string instead of the word order.
  - Forgetting to rejoin the list into a string before returning.
  - Adding an extra leading or trailing space when joining.
