prompt_markdown: |
  A roadside farm stand records whether it was `open` or `closed` on each day of
  a season. Write `longest_open_streak(days)` returning the length of the longest
  run of consecutive `open` days. An empty list returns 0.
starter_code: |
  def longest_open_streak(days):
      return 0
function_name: longest_open_streak
input_mode: function
solution_sketch: Track the current run length and the best run seen while scanning once.
sample_solution: |
  def longest_open_streak(days):
      best = 0
      current = 0
      for day in days:
          if day == "open":
              current += 1
              if current > best:
                  best = current
          else:
              current = 0
      return best
hints:
  - level: 1
    text: Keep a counter for the current run of open days.
  - level: 2
    text: Reset the counter to 0 whenever you hit a closed day.
  - level: 3
    text: After each open day, compare the current run against the best so far.
tests:
  public:
    - name: empty
      input: []
      expected: 0
    - name: all_closed
      input: [closed, closed]
      expected: 0
    - name: simple
      input: [open, open, closed, open]
      expected: 2
  validation:
    - name: ends_open
      input: [closed, open, open, open]
      expected: 3
    - name: single_open
      input: [open]
      expected: 1
    - name: alternating
