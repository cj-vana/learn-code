    - name: peak_in_middle
      input: [open, open, closed, open, open, open, closed]
      expected: 3
explanation_markdown: |
  One pass is enough. A running counter grows on each open day and resets to zero
  on a closed day. Recording the maximum the counter reaches gives the longest
  streak without scanning the list more than once.
common_mistakes:
  - Forgetting to reset the current counter on a closed day.
  - Returning the final run length instead of the largest run seen.
  - Missing a streak that ends at the last element.
