explanation_markdown: |
  This is a finite state machine driven by a lookup table. Rather than a wall of
  `if`/`elif` branches, the transitions live in data, so the same loop handles any
  kiosk wiring you hand it. The key trick is the double `.get`: the inner
  `.get(event, state)` returns the current screen unchanged whenever the event is
  not one the screen recognises, which is exactly the "stay put" rule. The outer
  `.get(state, {})` is a small safety net so a screen with no outgoing entries at
  all is handled gracefully.

  Processing one event is a constant-time dictionary lookup, so the routine runs
  in O(number of events) time. Table-driven state machines like this show up
  everywhere: menu systems, parsers, protocol handlers, and game logic.
common_mistakes:
  - Iterating over the transition table instead of over the events list, so the order of presses is lost.
  - Resetting to the start screen on an unknown event instead of leaving the current screen unchanged.
  - Assuming every screen lists every event, then hitting a KeyError when a press does not apply to the current screen.
