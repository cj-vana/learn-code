prompt_markdown: |
  A cinema's self-service ticket kiosk moves between labelled screens as visitors
  tap buttons. You are given its wiring as a transition table: a dictionary that
  maps each screen name to another dictionary mapping a button-press event to the
  next screen. For example:

  ```python
  {
    "welcome": {"tap": "menu"},
    "menu":    {"buy": "pay", "back": "welcome"},
    "pay":     {"card": "print", "back": "menu"},
    "print":   {"done": "welcome"},
  }
  ```

  Starting on a given screen, the kiosk receives a list of events in order. For
  each event, look up the current screen's row in the table:

  - If that screen has an entry for the event, move to the screen it names.
  - If the event is **not listed** for the current screen (an unknown or
    inapplicable press), the kiosk stays on the current screen.

  Write `run_kiosk(config)` where `config` is a single dictionary with keys
  `"transitions"` (the table above), `"start"` (the starting screen name), and
  `"events"` (the list of event strings). Feed the events in order and **return
  the final screen name** as a string. An empty event list means the kiosk never
  leaves its starting screen.
starter_code: |
  def run_kiosk(config):
      return ""
function_name: run_kiosk
input_mode: function
solution_sketch: Hold the current screen in a variable. For each event, look it up in the current screen's transition row, defaulting to the current screen when the event is absent.
sample_solution: |
  def run_kiosk(config):
      state = config["start"]
      transitions = config["transitions"]
      for event in config["events"]:
          state = transitions.get(state, {}).get(event, state)
      return state
hints:
  - level: 1
    text: Keep a single variable for the current screen and reassign it as you process each event in turn.
  - level: 2
    text: For the current screen, its allowed events live in `transitions[state]`. Use `.get(event, state)` so an unlisted event falls back to the screen you are already on.
  - level: 3
    text: "The whole loop body is one line: `state = transitions.get(state, {}).get(event, state)`. Return `state` after the loop."
