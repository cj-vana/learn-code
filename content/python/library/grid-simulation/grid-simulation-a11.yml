solution_sketch: Breadth-first search from the start over open cells, expanding the four neighbours and tracking distance. The first time you reach the goal, that distance is the answer; if the queue drains first, return -1.
sample_solution: |
  from collections import deque


  def shortest_route(job):
      grid = job["grid"]
      start = tuple(job["start"])
      goal = tuple(job["goal"])
      rows = len(grid)
      cols = len(grid[0]) if rows else 0
      sr, sc = start
      gr, gc = goal
      if grid[sr][sc] == 1 or grid[gr][gc] == 1:
          return -1
      if start == goal:
          return 0
      seen = {start}
      queue = deque([(sr, sc, 0)])
      while queue:
          r, c, dist = queue.popleft()
          for dr, dc in ((-1, 0), (1, 0), (0, -1), (0, 1)):
              nr, nc = r + dr, c + dc
              if 0 <= nr < rows and 0 <= nc < cols and grid[nr][nc] == 0 and (nr, nc) not in seen:
                  if (nr, nc) == goal:
                      return dist + 1
                  seen.add((nr, nc))
                  queue.append((nr, nc, dist + 1))
      return -1
hints:
  - level: 1
    text: Because every step costs the same, breadth-first search reaches each cell by its shortest number of steps. Use a queue of cells to visit paired with their distance from the start.
  - level: 2
    text: Guard the edge cases first, when the start or goal is shelving, or when start equals goal. Keep a `seen` set so you never re-enqueue a cell and never loop.
  - level: 3
    text: Pop a cell, and for each of the four in-bounds open unseen neighbours, return `dist + 1` if it is the goal, otherwise mark it seen and enqueue it with `dist + 1`. If the queue empties, return -1.
