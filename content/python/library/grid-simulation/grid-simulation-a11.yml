prompt_markdown: |
  A warehouse floor is mapped as a grid where each cell is either open aisle
  (`0`) or a run of shelving the cart cannot pass through (`1`). A picking cart
  starts at one open cell and needs to reach a goal cell, moving one step at a
  time in the four orthogonal directions (up, down, left, right). It may never
  enter a shelving cell or leave the grid.

  Write `shortest_route(job)` where `job` is a single dictionary with keys:

  - `"grid"`: a list of rows of `0`/`1` values (at least one row and one column),
  - `"start"`: the `[r, c]` cell where the cart begins,
  - `"goal"`: the `[r, c]` cell the cart must reach.

  **Return the fewest number of steps** to get from start to goal. Return `0`
  when the start and goal are the same cell. Return `-1` when no route exists,
  including the case where the start or goal cell is itself shelving (`1`).

  For example, on
  ```
  0 1 0
  0 1 0
  0 0 0
  ```
  travelling from `[0, 0]` to `[0, 2]` must detour down and around the shelving
  wall, taking `6` steps.
