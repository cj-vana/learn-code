explanation_markdown: |
  When every move has the same cost, breadth-first search is the right tool: it
  visits cells in rings of increasing distance, so the first time it touches the
  goal it has found a shortest route. Storing `(row, col, distance)` in the queue
  keeps each cell's step count travelling alongside it. The `seen` set is what
  makes it both correct and fast, because it stops the search revisiting cells and
  guarantees each cell is enqueued at most once.

  Handle the degenerate inputs up front: a blocked start or goal has no valid
  route, and a start that already equals the goal costs zero steps. Every cell
  enters the queue at most once and does constant work, so the search runs in
  O(rows * cols) time and space. Using a plain list with `pop(0)` instead of a
  `deque` would still be correct but slower, since popping from the front of a
  list is O(n).
common_mistakes:
  - Using depth-first search (a stack) instead of breadth-first, which finds *a* route but not the shortest one.
  - Marking a cell seen only when you pop it rather than when you enqueue it, allowing the same cell onto the queue many times.
  - Forgetting the -1 and 0 special cases when the start or goal is blocked or when start already equals goal.
