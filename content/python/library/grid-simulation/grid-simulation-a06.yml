explanation_markdown: |
  The spiral is four directed passes wrapped in a loop. The `top`, `bottom`,
  `left`, and `right` boundaries fence off the ring you still have to read; after
  each edge you tighten the matching boundary so the next pass moves one step
  inward. The two guards, `if top <= bottom` before the bottom row and `if left <=
  right` before the left column, are what make odd shapes and single strips
  behave: without them a lone middle row or column would be read a second time on
  the way back. Every cell is appended exactly once, so the traversal is O(rows *
  cols).
common_mistakes:
  - Dropping the top <= bottom and left <= right guards, which double-reads the centre row or column on non-square grids.
  - Forgetting to shrink a boundary after a pass, so the same edge is read forever.
  - Using fixed range limits instead of the current boundaries, which reads cells from already-consumed rings.
