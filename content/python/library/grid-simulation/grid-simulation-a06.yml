prompt_markdown: |
  A survey drone flies over an orchard laid out as a rectangular grid, where
  `grid[r][c]` is the yield of the tree at row `r`, column `c`. Rather than read
  it row by row, the drone spirals inward: it reads the whole top edge left to
  right, then the right edge top to bottom, then the bottom edge right to left,
  then the left edge bottom to top, and keeps circling into the centre.

  Write `spiral_read(grid)` that takes the grid (a list of lists) and returns a
  single list of all its values in clockwise spiral order, starting from the
  top-left cell. Every cell appears exactly once. An empty grid `[]` returns `[]`;
  a single row or single column is returned in its natural order.

  Example: for `[[1, 2, 3], [4, 5, 6], [7, 8, 9]]` the spiral order is
  `[1, 2, 3, 6, 9, 8, 7, 4, 5]`.
starter_code: |
