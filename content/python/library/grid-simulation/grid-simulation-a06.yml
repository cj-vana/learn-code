function_name: spiral_read
input_mode: function
solution_sketch: Track four shrinking boundaries (top, bottom, left, right); walk the top row, right column, bottom row, and left column in turn, tightening the boundary after each pass.
sample_solution: |
  def spiral_read(grid):
      if not grid:
          return []
      result = []
      top, bottom = 0, len(grid) - 1
      left, right = 0, len(grid[0]) - 1
      while top <= bottom and left <= right:
          for c in range(left, right + 1):
              result.append(grid[top][c])
          top += 1
          for r in range(top, bottom + 1):
              result.append(grid[r][right])
          right -= 1
          if top <= bottom:
              for c in range(right, left - 1, -1):
                  result.append(grid[bottom][c])
              bottom -= 1
          if left <= right:
              for r in range(bottom, top - 1, -1):
                  result.append(grid[r][left])
              left += 1
      return result
hints:
  - level: 1
    text: Keep four boundaries, top/bottom/left/right, that mark the ring you have not read yet, and shrink them as you peel off each edge.
  - level: 2
    text: Each loop iteration reads the top row (left to right), the right column (top to bottom), the bottom row (right to left), then the left column (bottom to top).
  - level: 3
    text: After reading the top row do top += 1 (and likewise for the others); guard the bottom row and left column with top <= bottom and left <= right so a thin strip is not read twice.
