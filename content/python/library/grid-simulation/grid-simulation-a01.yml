function_name: neighbor_sum
input_mode: function
solution_sketch: Read grid, row, and col from the dict, then add each of the four orthogonal neighbours whose indices stay inside the grid bounds.
sample_solution: |
  def neighbor_sum(readings):
      grid = readings["grid"]
      r = readings["row"]
      c = readings["col"]
      rows, cols = len(grid), len(grid[0])
      total = 0
      for dr, dc in ((-1, 0), (1, 0), (0, -1), (0, 1)):
          nr, nc = r + dr, c + dc
          if 0 <= nr < rows and 0 <= nc < cols:
              total += grid[nr][nc]
      return total
hints:
  - level: 1
    text: The four orthogonal neighbours of (r, c) sit at (r-1, c), (r+1, c), (r, c-1), and (r, c+1).
  - level: 2
    text: Loop over the four (dr, dc) offsets and compute nr = r + dr, nc = c + dc for each.
  - level: 3
    text: Before adding grid[nr][nc], guard with 0 <= nr < rows and 0 <= nc < cols so edges and corners skip the missing neighbours.
