prompt_markdown: |
  A greenhouse floor is a rectangular tray of planting beds stored as a grid of
  moisture readings, where `grid[r][c]` is the reading for row `r`, column `c`.
  To check whether one bed is drying out, you compare it against the beds that
  touch it edge-to-edge: the beds directly up, down, left, and right. Diagonal
  beds do not count.

  Write `neighbor_sum(readings)` where `readings` is a single dictionary with
  three keys:

  - `"grid"`: a non-empty rectangular list of lists of integers
  - `"row"`: the integer row index of the target bed
  - `"col"`: the integer column index of the target bed

  Return the sum of the up/down/left/right neighbours that actually exist inside
  the grid. Beds on an edge have three neighbours and beds in a corner have only
  two, so simply skip any neighbour whose row or column falls outside the grid. A
  single-cell grid has no neighbours and returns `0`.

  Example: for `{"grid": [[1, 2, 3], [4, 5, 6], [7, 8, 9]], "row": 1, "col": 1}`
  the neighbours are `2` (up), `8` (down), `4` (left), and `6` (right), so the
  result is `20`.
