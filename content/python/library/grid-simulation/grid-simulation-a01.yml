explanation_markdown: |
  Every grid task leans on the same bounds check, `0 <= nr < rows and 0 <= nc <
  cols`. By looping over the four offset pairs and testing each candidate before
  reading it, you get correct behaviour on interior cells, edges, and corners
  without writing separate cases for each. Interior beds contribute all four
  neighbours, edge beds drop one because a candidate index lands outside the
  grid, and corner beds drop two the same way. The work is a constant four checks
  per call, so this runs in O(1) time regardless of grid size.
common_mistakes:
  - Forgetting the bounds check and reading a negative index, which silently wraps around to the far side of the row instead of skipping.
  - Including diagonal beds, which are not edge-to-edge neighbours and should not be counted.
  - Assuming every cell has four neighbours and hard-coding four additions, which crashes or over-counts at the borders.
