prompt_markdown: |
  A theatre stores its seating chart as a rectangular grid of integers, where
  `grid[r][c]` is the number of ticket-holders in row `r`, seat column `c`. The
  house manager wants two running totals: how many people are in each row, and
  how many are in each seat column across all rows.

  Write `tally_chart(grid)` that takes the grid (a list of lists) and returns a
  list of exactly two lists, `[row_sums, col_sums]`:

  - `row_sums[r]` is the sum of the values in row `r`
  - `col_sums[c]` is the sum of the values in column `c` across every row

  Return real lists, not tuples. For an empty grid `[]`, return `[[], []]`.

  Example: for `[[1, 2, 3], [4, 5, 6]]` the row sums are `[6, 15]` and the column
  sums are `[5, 7, 9]`, so the result is `[[6, 15], [5, 7, 9]]`.
starter_code: |
  def tally_chart(grid):
      return [[], []]
function_name: tally_chart
input_mode: function
solution_sketch: Walk every cell once, adding its value into both the running total for its row and the running total for its column, then return the two lists together.
sample_solution: |
  def tally_chart(grid):
      if not grid:
          return [[], []]
      rows, cols = len(grid), len(grid[0])
      row_sums = [0] * rows
      col_sums = [0] * cols
      for r in range(rows):
          for c in range(cols):
              value = grid[r][c]
              row_sums[r] += value
              col_sums[c] += value
      return [row_sums, col_sums]
hints:
  - level: 1
    text: You need one accumulator per row and one per column, so start with two zero-filled lists sized to the grid.
  - level: 2
    text: A single nested loop over (r, c) can feed both totals at once, adding grid[r][c] to row_sums[r] and to col_sums[c].
  - level: 3
    text: Handle the empty grid up front by returning [[], []], since len(grid[0]) would fail on an empty list.
