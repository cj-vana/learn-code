explanation_markdown: |
  The tidy trick is that a single pass over the grid can maintain both sets of
  totals at the same time: each value belongs to exactly one row and one column,
  so you add it to `row_sums[r]` and `col_sums[c]` in the same step. Sizing the
  accumulator lists from `len(grid)` and `len(grid[0])` guarantees an entry for
  every row and column, even when a total works out to zero. The empty-grid guard
  matters because `grid[0]` does not exist when there are no rows. The routine
  visits each cell once, so it runs in O(rows * cols) time.
common_mistakes:
  - Calling len(grid[0]) without first handling the empty grid, which raises an IndexError.
  - Returning the row and column totals as a tuple, which will not compare equal to the expected list.
  - Building column sums with a separate second pass and mis-indexing, instead of feeding both totals from one loop.
