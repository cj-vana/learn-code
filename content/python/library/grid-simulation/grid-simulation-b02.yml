      # means it loops. Tally both outcomes.
      return {"stopped": 0, "looping": 0}
function_name: conveyor_jam
input_mode: function
solution_sketch: For every cell, walk the deterministic arrow path keeping a set of visited tiles. Stop counting when the path lands on a "#" or steps off the grid (stopped) or revisits a tile already in the set (looping). Tally the two outcomes across all starting cells.
sample_solution: |
  def conveyor_jam(job):
      grid = job["grid"]
      rows = len(grid)
      cols = len(grid[0]) if rows else 0
      moves = {">": (0, 1), "<": (0, -1), "v": (1, 0), "^": (-1, 0)}
      stopped = 0
      looping = 0
      for sr in range(rows):
          for sc in range(cols):
              r, c = sr, sc
              seen = set()
              while True:
                  cell = grid[r][c]
                  if cell == "#":
                      stopped += 1
                      break
                  if (r, c) in seen:
                      looping += 1
                      break
                  seen.add((r, c))
                  dr, dc = moves[cell]
                  nr, nc = r + dr, c + dc
                  if not (0 <= nr < rows and 0 <= nc < cols):
                      stopped += 1
                      break
                  r, c = nr, nc
      return {"stopped": stopped, "looping": looping}
hints:
  - level: 1
    text: Each tile has exactly one out-direction, so a parcel's path is fully determined. Simulate one parcel at a time from each starting cell.
  - level: 2
    text: Keep a set of the tiles this parcel has already stood on. If you ever step onto a tile already in the set, the path has entered a cycle, so it loops.
  - level: 3
    text: End a parcel's walk in one of three ways -- landing on "#" (stopped), stepping off the grid edge (stopped), or revisiting a seen tile (looping). Add up the two outcomes over every starting cell.
