prompt_markdown: |
  A sorting depot lays parcels out on a grid of powered conveyor tiles. Every tile
  holds one parcel, and each tick a tile pushes its parcel one cell in the tile's
  direction. The tile characters are:

  - `">"` push right, `"<"` push left, `"v"` push down, `"^"` push up,
  - `"#"` a stop -- a parcel resting here never moves.

  A parcel's fate is decided by following the arrows from where it starts. It
  **stops** if it lands on a `"#"` tile or is pushed off the edge of the grid (it
  drops into the run-off bin). It **loops** if the arrows lead it into a cycle so it
  never stops.

  Write `conveyor_jam(job)` where `job` is a dictionary with one key `"grid"`, a
  list of rows of these characters. Treat every cell as the starting tile of one
  parcel, trace each parcel's path, and return
  `{"stopped": s, "looping": l}` where `s` is how many parcels eventually stop and
  `l` is how many loop forever. A parcel that begins on a `"#"` tile is already
  stopped.

  For example, on
  ```
  > > v
  ^ # v
  ^ < <
  ```
  the eight tiles around the border chase each other in a ring and loop forever,
  while the centre `"#"` parcel is already stopped, so the result is
  `{"stopped": 1, "looping": 8}`.
