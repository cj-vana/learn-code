explanation_markdown: |
  Every tile points exactly one way, so a parcel's journey is a deterministic walk
  with no choices to make. That means each starting cell has a single fate, and you
  find it by stepping along the arrows. Three things can end the walk: reaching a
  `"#"` stop, being pushed past the edge into the run-off bin, or -- the interesting
  case -- returning to a tile the parcel has already visited, which proves the path
  has closed into a cycle it can never escape.

  A `seen` set is what turns "loops forever" into something you can actually detect
  in finite time: the moment a step revisits a tile in the set, you stop and count a
  loop. Because a walk either terminates or repeats a tile within `rows * cols`
  steps, each parcel's trace is bounded, and running it from every cell gives the two
  tallies. Tracing each start independently is simple and correct; the cost is the
  path length per start, which is fine for depot-sized grids.
common_mistakes:
  - Forgetting that running off the edge is a stop, and mistakenly treating an out-of-bounds step as a loop or an error.
  - Simulating without a visited set, so a looping parcel spins forever instead of being detected and counted.
  - Sharing one visited set across all starting cells, which corrupts the trace for later parcels; each parcel needs its own fresh set.
