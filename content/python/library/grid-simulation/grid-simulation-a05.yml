prompt_markdown: |
  A print shop stores each stencil as a rectangular grid of ink codes, where
  `grid[r][c]` is the code at row `r`, column `c`. To line the stencil up with
  the press, the operator turns it a quarter-turn clockwise before laying it on
  the print bed.

  Write `rotate_stencil(grid)` that takes the grid (a list of lists) and returns
  a brand-new grid rotated 90 degrees clockwise. Do not modify the input. A grid
  with `r` rows and `c` columns becomes a grid with `c` rows and `r` columns: the
  original top row becomes the new rightmost column, and the original left column
  becomes the new top row. An empty grid `[]` returns `[]`.

  Example: for `[[1, 2], [3, 4]]` the clockwise turn gives `[[3, 1], [4, 2]]`,
  because the bottom-left `3` moves to the top-left and the top-left `1` moves to
  the top-right.
starter_code: |
  def rotate_stencil(grid):
      return []
function_name: rotate_stencil
input_mode: function
solution_sketch: Reverse the row order so the bottom row is on top, then transpose so that top row becomes the leftmost column, producing a clockwise turn.
sample_solution: |
  def rotate_stencil(grid):
      return [list(row) for row in zip(*grid[::-1])]
hints:
  - level: 1
    text: A clockwise quarter-turn is a reverse of the row order followed by a transpose (swapping rows and columns).
  - level: 2
    text: zip(*grid) transposes a grid; feeding it grid[::-1] first handles the reversal in one step.
  - level: 3
    text: zip yields tuples, so wrap each with list(...) in a comprehension to return lists, and note the empty grid falls out naturally as [].
tests:
  public:
