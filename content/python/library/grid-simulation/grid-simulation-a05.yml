explanation_markdown: |
  Rotating clockwise combines two familiar moves. Reversing the row order with
  `grid[::-1]` lifts the original bottom row to the top; transposing with
  `zip(*...)` then turns that top row into the leftmost column, which is exactly
  where a clockwise turn sends it. Because `zip` produces tuples, wrapping each in
  `list(...)` returns the mutable lists the tests expect. Building the result from
  scratch leaves the caller's grid untouched, and an empty input produces no rows
  to zip, so `[]` comes back on its own. The routine visits each cell once, so it
  runs in O(rows * cols) time.
common_mistakes:
  - Rotating counter-clockwise by mistake (transpose then reverse) instead of reversing the rows first.
  - Returning tuples from zip without converting to lists, so the result will not compare equal to the expected lists.
  - Mutating the input grid in place instead of returning a fresh rotated grid.
