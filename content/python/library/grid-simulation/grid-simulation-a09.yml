explanation_markdown: |
  The one rule that makes this correct is separating *reading* from *writing*.
  Because a cell's fate depends on its neighbours' current values, updating the
  patio in place would corrupt the counts for stones you have not visited yet.
  Writing every result into a fresh grid keeps the original snapshot intact for
  the whole pass.

  Counting neighbours with the nested `(-1, 0, 1)` offsets and a `(0, 0)` skip is
  a clean way to sweep all eight surrounding cells, and the bounds check quietly
  handles edges and corners, which simply have fewer neighbours. Each cell does a
  constant amount of work (at most eight look-ups), so the routine runs in
  O(rows * cols) time and uses O(rows * cols) space for the output.
common_mistakes:
  - Mutating the grid while scanning it, so later cells count neighbours that were already updated this generation.
  - Forgetting the diagonal neighbours and counting only the four orthogonal cells.
  - Counting the cell itself as one of its neighbours by not skipping the (0, 0) offset.
