function_name: next_generation
input_mode: function
solution_sketch: Build a fresh output grid. For each cell, count mossy neighbours across the eight offsets using the original grid, then apply the survive/sprout rules to decide the new value.
sample_solution: |
  def next_generation(grid):
      rows, cols = len(grid), len(grid[0])
      result = [[0] * cols for _ in range(rows)]
      for r in range(rows):
          for c in range(cols):
              live = 0
              for dr in (-1, 0, 1):
                  for dc in (-1, 0, 1):
                      if dr == 0 and dc == 0:
                          continue
                      nr, nc = r + dr, c + dc
                      if 0 <= nr < rows and 0 <= nc < cols:
                          live += grid[nr][nc]
              if grid[r][c] == 1:
                  result[r][c] = 1 if live in (2, 3) else 0
              else:
                  result[r][c] = 1 if live == 3 else 0
      return result
hints:
  - level: 1
    text: Write the answer into a brand new grid so that every neighbour count still reads the original, unchanged layout.
  - level: 2
    text: To count a cell's neighbours, loop over the offsets (-1, 0, 1) for both row and column, skip (0, 0), and only count positions that fall inside the grid bounds.
  - level: 3
    text: A mossy cell survives when its live count is 2 or 3; a bare cell sprouts only on a live count of exactly 3. Store each decision in the new grid at the same coordinates.
