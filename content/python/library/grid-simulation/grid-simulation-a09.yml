prompt_markdown: |
  A stone patio is laid out as a rectangular grid of flagstones. Each stone is
  either bare (`0`) or carries a patch of moss (`1`). Overnight the moss follows
  two simple growth rules based on a stone's eight surrounding neighbours (the
  orthogonal and diagonal cells that exist inside the grid):

  - A mossy stone (`1`) **survives** to the next morning only if it has exactly
    `2` or `3` mossy neighbours. With fewer it dries out; with more it is
    smothered. Either way it becomes bare (`0`).
  - A bare stone (`0`) **sprouts** new moss (becomes `1`) only if it has exactly
    `3` mossy neighbours. Otherwise it stays bare.

  Every stone is evaluated at the same instant using the *current* layout, so you
  must not let changes you make ripple into the neighbour counts for other stones.

  Write `next_generation(grid)`, taking the patio as a list of rows (each a list
  of `0`/`1` values), and **return the next morning's grid as a new list of
  lists**. Do not mutate the input grid. The grid is rectangular and has at least
  one row and one column.

  For example, a horizontal strip of three mossy stones
  `[[0, 0, 0], [1, 1, 1], [0, 0, 0]]` becomes the vertical strip
  `[[0, 1, 0], [0, 1, 0], [0, 1, 0]]`.
starter_code: |
