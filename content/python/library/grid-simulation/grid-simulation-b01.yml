explanation_markdown: |
  Because the fire crosses one cell per tick and every step costs the same, breadth-
  first search hands you the arrival times directly: cells come off the queue in
  order of increasing distance from the nearest fire. The trick with many ignition
  points is to seed them all at time 0 before expanding, so the search behaves as if
  a single wavefront started from the whole set at once and each cell records the
  earliest fire to reach it.

  The `times` grid does double duty: it stores each answer and, through its initial
  `-1`, marks which cells are still unburned, so a neighbour is only enqueued when its
  time is still `-1`. Firebreaks are never enqueued because the neighbour check
  rejects any cell that is not brush, and a brush cell the wavefront can never reach
  keeps its `-1` for "never". Each cell enters the queue at most once, so the search
  runs in O(rows * cols) time and space.
common_mistakes:
  - Running a separate search from each ignition instead of seeding them all at time 0, which double-counts work and can record a later tick than the nearest fire.
  - Marking a cell burned only when it is popped rather than when it is enqueued, letting the same cell join the queue several times with different ticks.
  - Spreading onto or through firebreak cells, or forgetting that unreachable brush cells must stay -1.
