function_name: firebreak
input_mode: function
solution_sketch: Start a breadth-first search from all ignition cells at once, each at time 0. Record arrival times in a grid initialised to -1, and when expanding a cell push its unburned brush neighbours with time + 1. Firebreak and unreachable cells keep their -1.
sample_solution: |
  from collections import deque


  def firebreak(job):
      grid = job["grid"]
      rows = len(grid)
      cols = len(grid[0]) if rows else 0
      times = [[-1] * cols for _ in range(rows)]
      queue = deque()
      for r, c in job["ignitions"]:
          if grid[r][c] == 0 and times[r][c] == -1:
              times[r][c] = 0
              queue.append((r, c))
      while queue:
          r, c = queue.popleft()
          t = times[r][c]
          for dr, dc in ((-1, 0), (1, 0), (0, -1), (0, 1)):
              nr, nc = r + dr, c + dc
              if 0 <= nr < rows and 0 <= nc < cols and grid[nr][nc] == 0 and times[nr][nc] == -1:
                  times[nr][nc] = t + 1
                  queue.append((nr, nc))
      return times
hints:
  - level: 1
    text: With many fires starting at once, seed the breadth-first queue with every ignition cell at time 0 before you expand anything. That way each cell is reached first by the nearest fire.
  - level: 2
    text: Keep a times grid initialised to -1. A cell's -1 doubles as its "not yet burned" marker, so you only enqueue a brush neighbour whose time is still -1.
  - level: 3
    text: Pop a cell, read its arrival tick t, and for each in-bounds neighbour that is brush (0) and still -1, set its time to t + 1 and enqueue it. Firebreak cells and cells the fire never reaches simply keep their -1.
