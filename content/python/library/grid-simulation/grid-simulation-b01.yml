prompt_markdown: |
  A ranger models a wildfire on a rectangular map of dry brush. Each tick, fire
  spreads from every burning cell to its four orthogonal neighbours (up, down,
  left, right). Some cells are cleared firebreaks that never catch. The ranger
  wants a map of exactly **when** each cell first ignites.

  Write `firebreak(job)` where `job` is a dictionary with keys:

  - `"grid"`: a list of rows whose cells are `0` (dry brush) or `1` (firebreak),
  - `"ignitions"`: a list of `[r, c]` cells that are already burning at tick `0`
    (every ignition sits on a dry-brush cell).

  Return a new grid of the same shape where each cell holds the tick at which fire
  first reaches it: `0` for the ignition cells, the number of ticks for other brush
  cells the fire reaches, and `-1` for any cell that never burns -- that is, every
  firebreak cell and any brush cell the fire can never arrive at. Fire spreads only
  through brush, never through or onto a firebreak, and never off the edge of the
  map.

  For example, with a firebreak in the centre:
  ```
  0 0 0
  0 1 0
  0 0 0
  ```
  and a single ignition at `[0, 0]`, the fire must flow around the block, giving
  arrival times
  ```
  0 1 2
  1 -1 3
  2 3 4
  ```
