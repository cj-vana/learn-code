prompt_markdown: |
  A small floor-cleaning robot trundles across the polished tiles of an art
  gallery. The floor is a rectangular grid with `height` rows and `width`
  columns. Row `0` is the north wall and column `0` is the west wall, so a valid
  position `[r, c]` satisfies `0 <= r < height` and `0 <= c < width`.

  The robot is handed a route as a string of single-letter moves:

  - `U` moves one tile up (row `- 1`)
  - `D` moves one tile down (row `+ 1`)
  - `L` moves one tile left (column `- 1`)
  - `R` moves one tile right (column `+ 1`)

  The robot is cautious: any move that would carry it off the floor is ignored,
  and it simply stays put for that step before reading the next letter. The move
  string contains only the characters `U`, `D`, `L`, and `R`.

  Write `clean_floor(job)` where `job` is a single dictionary with keys
  `"width"`, `"height"`, `"start"` (a `[r, c]` list), and `"moves"` (the route
  string). Apply every move in order and **return the final position as a list**
  `[r, c]`.

  For example, `clean_floor({"width": 3, "height": 3, "start": [0, 0],
  "moves": "RRDD"})` returns `[2, 2]`: the robot walks to the east wall, then
  down to the south-east corner. An empty move string leaves the robot on its
  starting tile.
starter_code: |
  def clean_floor(job):
      return [0, 0]
function_name: clean_floor
input_mode: function
solution_sketch: Track the current (r, c). For each move letter, compute the candidate cell and adopt it only when it lands inside the grid; otherwise keep the current cell.
sample_solution: |
  def clean_floor(job):
      height, width = job["height"], job["width"]
      r, c = job["start"]
      deltas = {"U": (-1, 0), "D": (1, 0), "L": (0, -1), "R": (0, 1)}
      for move in job["moves"]:
          dr, dc = deltas.get(move, (0, 0))
          nr, nc = r + dr, c + dc
          if 0 <= nr < height and 0 <= nc < width:
              r, c = nr, nc
      return [r, c]
hints:
  - level: 1
    text: Keep two running numbers, the current row and column, and update them one move at a time rather than all at once.
  - level: 2
    text: Map each letter to a (dr, dc) offset. Before committing to the new cell, check that both the new row and new column are still inside the grid.
  - level: 3
    text: If `0 <= nr < height and 0 <= nc < width`, assign r, c = nr, nc; otherwise do nothing and move on to the next letter. Return [r, c] at the end.
