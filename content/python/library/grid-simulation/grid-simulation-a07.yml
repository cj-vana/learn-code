explanation_markdown: |
  This is a state machine whose state is the robot's `(r, c)` position and whose
  events are the move letters. The whole problem hinges on validating each step
  *before* you take it. By computing the candidate cell `(nr, nc)` and adopting
  it only when the bounds check passes, an off-grid move becomes a harmless no-op
  and the robot keeps its place.

  Because you look at every character once and do constant work per character,
  the routine runs in O(number of moves) time and O(1) extra space. Note that the
  grid itself is never built; you only need its dimensions to know where the
  walls are.
common_mistakes:
  - Confusing rows with columns, so that `U`/`D` change the column and `L`/`R` change the row.
  - Checking bounds against `width` for the row and `height` for the column instead of the other way around.
  - Moving first and clamping afterward, which lets the robot slide along a wall instead of standing still on a blocked step.
