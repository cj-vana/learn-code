function_name: count_clusters
input_mode: function
solution_sketch: Scan every cell; each time you meet an unvisited pad, add one to the tally and depth-first flood its whole cluster so it is never counted again.
sample_solution: |
  def count_clusters(grid):
      if not grid:
          return 0
      rows, cols = len(grid), len(grid[0])
      seen = set()

      def dfs(r, c):
          if not (0 <= r < rows and 0 <= c < cols):
              return
          if (r, c) in seen or grid[r][c] != 1:
              return
          seen.add((r, c))
          dfs(r + 1, c)
          dfs(r - 1, c)
          dfs(r, c + 1)
          dfs(r, c - 1)

      clusters = 0
      for r in range(rows):
          for c in range(cols):
              if grid[r][c] == 1 and (r, c) not in seen:
                  clusters += 1
                  dfs(r, c)
      return clusters
hints:
  - level: 1
    text: Every cluster contains exactly one cell that the outer scan reaches first, so count a cluster the first time you hit an unvisited pad.
  - level: 2
    text: After finding a fresh pad, flood its entire cluster with a depth-first search so the rest of that cluster is already marked when the scan reaches it.
  - level: 3
    text: Keep a shared seen set; the flood adds every reachable pad to it, and the outer loop only starts a new count at pads not yet in seen.
