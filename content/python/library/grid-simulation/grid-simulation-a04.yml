explanation_markdown: |
  Counting connected components is flood fill wearing a different hat. The outer
  double loop guarantees you visit every cell, but the shared `seen` set means
  each cluster is only counted once: the first unvisited pad you meet triggers a
  flood that marks the entire cluster, so the scan glides past the rest without
  re-counting. Because the flood only follows orthogonal steps, diagonal-only
  touches leave clusters separate, which is why the checkerboard has five. Each
  cell is pushed and inspected a bounded number of times, so the whole survey is
  O(rows * cols).
common_mistakes:
  - Incrementing the count for every pad cell instead of only for the first cell of each cluster.
  - Sharing no seen set (or resetting it inside the flood), so already-counted pads start new clusters.
  - Treating diagonal neighbours as connected, which merges clusters the survey should keep apart.
