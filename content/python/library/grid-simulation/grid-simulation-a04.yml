prompt_markdown: |
  A drone photographs a pond as a rectangular grid, marking each cell `1` where a
  lily pad floats and `0` for open water. Pads that touch edge-to-edge (up, down,
  left, or right) belong to the same cluster; pads that only touch at a diagonal
  corner are separate clusters.

  Write `count_clusters(grid)` that takes the grid (a list of lists of `0`s and
  `1`s) and returns the number of distinct lily pad clusters. Open water
  contributes nothing. An empty grid `[]` and a grid of all `0`s both return `0`.

  Example: for `[[1, 1, 0], [0, 0, 1], [1, 0, 1]]` there are three clusters, the
  two joined pads in the top-left, the pair down the right edge, and the lone pad
  in the bottom-left, so the result is `3`.
