prompt_markdown: |
  A workshop floor is tiled in two finishes, stored as a grid of `0`s and `1`s
  where `grid[r][c]` is the finish of the tile at row `r`, column `c`. A can of
  paint tips over on one tile and seeps to every touching tile of the same
  finish, spreading only up, down, left, and right (never diagonally).

  Write `spill_size(spill)` where `spill` is a single dictionary with two keys:

  - `"grid"`: a non-empty rectangular list of lists of `0`s and `1`s
  - `"start"`: a two-element list `[r, c]` giving the tile the paint lands on

  Return the number of tiles in the connected region that shares the starting
  tile's finish and includes the start. The count always includes the starting
  tile itself, so the smallest possible answer is `1`. Note the region is defined
  by whatever value sits at the start, so a spill onto a `0` tile spreads across
  connected `0` tiles.

  Example: for `{"grid": [[1, 1, 0], [1, 0, 0], [0, 0, 1]], "start": [0, 0]}` the
  connected `1`s are `(0, 0)`, `(0, 1)`, and `(1, 0)`, so the result is `3`.
starter_code: |
