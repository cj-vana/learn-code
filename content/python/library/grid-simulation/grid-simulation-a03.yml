function_name: spill_size
input_mode: function
solution_sketch: Depth-first search from the start, counting each unvisited cell whose value matches the start's value and recursing into its four orthogonal neighbours.
sample_solution: |
  def spill_size(spill):
      grid = spill["grid"]
      sr, sc = spill["start"]
      rows, cols = len(grid), len(grid[0])
      target = grid[sr][sc]
      seen = set()

      def dfs(r, c):
          if not (0 <= r < rows and 0 <= c < cols):
              return 0
          if (r, c) in seen or grid[r][c] != target:
              return 0
          seen.add((r, c))
          return 1 + dfs(r + 1, c) + dfs(r - 1, c) + dfs(r, c + 1) + dfs(r, c - 1)

      return dfs(sr, sc)
hints:
  - level: 1
    text: The region is every tile you can reach from the start by stepping to same-valued orthogonal neighbours, so first record the start's value.
  - level: 2
    text: A recursive helper that returns a count works well; it should return 0 for out-of-bounds, already-seen, or wrong-value cells.
  - level: 3
    text: Mark a cell in a seen set before recursing, and return 1 plus the counts from its four neighbours so each tile is added exactly once.
