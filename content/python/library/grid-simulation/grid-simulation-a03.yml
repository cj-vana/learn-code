explanation_markdown: |
  Flood fill is a depth-first search that only steps between cells sharing a
  value. Capturing `target = grid[sr][sc]` up front lets the same routine measure
  a patch of `1`s or a patch of `0`s. The `seen` set is what keeps the search
  finite: once a cell is recorded, revisiting it returns `0`, so the recursion
  cannot bounce back and forth between two neighbours forever. Because diagonal
  moves are excluded, tiles that only touch at a corner belong to different
  regions. Each cell is examined a constant number of times, so the routine runs
  in O(rows * cols) time and uses stack space proportional to the region size.
common_mistakes:
  - Hard-coding the region value to 1, which breaks when the spill starts on a 0 tile.
  - Forgetting to mark cells as seen, so the recursion revisits neighbours endlessly and overflows the stack.
  - Counting diagonal neighbours, which merges regions that should stay separate.
