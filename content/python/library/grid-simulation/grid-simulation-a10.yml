prompt_markdown: |
  A sorting depot drops parcels down a chute onto a row of `width` collection
  columns, numbered `0` to `width - 1`. Every column starts empty, and you track
  how many parcels are stacked in each as a list of heights.

  Parcels arrive one at a time. Each drop names a column. Normally the parcel
  lands in that column and its height grows by one. But the chute has a quirk on
  peaks:

  - If the named column is an **interior** column (it has a neighbour on both the
    left and the right) **and** its current height is strictly greater than
    *both* neighbours' current heights, the parcel is unstable and **rolls one
    step** to the **lower** of the two neighbours before landing there.
  - If the two neighbours are the same height (a tie), it rolls to the **left**
    neighbour.
  - The roll happens at most **once**: after rolling one column over, the parcel
    lands and stacks even if the new column now looks like a peak.

  The first and last columns are edges (they lack a neighbour on one side), so a
  parcel dropped on an edge column **never rolls** and always lands where it fell.

  Write `stack_parcels(job)` where `job` is a single dictionary with keys
  `"width"` (the number of columns) and `"drops"` (a list of column indices, in
  arrival order). Process every drop and **return the final list of column
  heights**. An empty drop list returns a list of `width` zeros.

  For example, `stack_parcels({"width": 3, "drops": [1, 1]})`: the first parcel
  lands in column `1` (heights `[0, 1, 0]`); the second finds column `1` taller
  than both neighbours, ties `0 == 0`, so it rolls left into column `0`, giving
  `[1, 1, 0]`.
starter_code: |
  def stack_parcels(job):
