function_name: stack_parcels
input_mode: function
solution_sketch: Keep a heights list. For each dropped column, if it is interior and strictly taller than both neighbours, redirect the landing column to the lower neighbour (left on a tie); then increment whichever column the parcel finally lands in.
sample_solution: |
  def stack_parcels(job):
      width = job["width"]
      heights = [0] * width
      for col in job["drops"]:
          target = col
          if 0 < col < width - 1:
              left, right = heights[col - 1], heights[col + 1]
              if heights[col] > left and heights[col] > right:
                  target = col - 1 if left <= right else col + 1
          heights[target] += 1
      return heights
hints:
  - level: 1
    text: Track the heights in a list and decide, for each drop, which column the parcel finally lands in before you increment anything.
  - level: 2
    text: A roll only applies when the column is interior (`0 < col < width - 1`) and its height is strictly greater than both `heights[col - 1]` and `heights[col + 1]`.
  - level: 3
    text: "On a roll, pick the lower neighbour: `col - 1 if heights[col - 1] <= heights[col + 1] else col + 1`. The `<=` sends ties to the left. Then do a single `heights[target] += 1`."
