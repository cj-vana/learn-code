explanation_markdown: |
  The subtle part is deciding the landing column *before* mutating anything, so
  the roll test reads consistent "before this parcel" heights. The condition has
  three gates that must all hold for a roll: the column is interior, and it is
  strictly taller than the left neighbour, and strictly taller than the right
  neighbour. `strictly` matters: a column merely tied with a neighbour is not a
  peak, so it does not roll.

  Choosing the destination reduces to one comparison. `heights[col - 1] <=
  heights[col + 1]` picks the left neighbour whenever it is lower *or equal*,
  which folds the tie-goes-left rule into the same expression. Because the roll
  fires at most once, you never loop or cascade; each drop is O(1) work, so the
  whole run is O(number of drops) time and O(width) space.
common_mistakes:
  - Letting edge columns roll, or reading a non-existent neighbour at index -1 or width, instead of guarding with `0 < col < width - 1`.
  - Using `>=` so a column merely tied with a neighbour is wrongly treated as a peak and rolls.
  - Sending ties to the right, or letting the parcel keep rolling until it settles instead of stopping after a single step.
