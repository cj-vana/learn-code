prompt_markdown: |
  An embroidery machine works over a square `size` x `size` cloth, tracked as a
  grid where each cell is `0` (bare) or `1` (stitched). The head starts on the
  centre cell, `[size // 2, size // 2]`, facing **up**. It then performs `steps`
  moves. On each move it looks at the cell it is currently on and follows one of
  two rules:

  - If the current cell is **bare** (`0`): stitch it (set it to `1`), turn
    **right** 90 degrees, then step forward one cell.
  - If the current cell is **stitched** (`1`): unpick it (set it to `0`), turn
    **left** 90 degrees, then step forward one cell.

  The cloth is mounted on a loop: the grid **wraps around** at every edge. Moving
  up from row `0` lands on the last row, moving left from column `0` lands on the
  last column, and likewise off the bottom and right edges.

  Write `stitch_count(job)` where `job` is a single dictionary with keys
  `"size"` (the grid side length, at least `1`) and `"steps"` (the number of
  moves to perform). Run the machine for exactly `steps` moves and **return the
  number of stitched (`1`) cells** remaining on the cloth. With `steps` equal to
  `0` the head never moves and the answer is `0`.
starter_code: |
