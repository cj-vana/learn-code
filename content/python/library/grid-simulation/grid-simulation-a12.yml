function_name: stitch_count
input_mode: function
solution_sketch: Keep the head's (r, c) and a facing index into a clockwise list of the four direction vectors. Each move flips the current cell, rotates the facing left or right by one, then advances with modular arithmetic so movement wraps around the edges.
sample_solution: |
  def stitch_count(job):
      size = job["size"]
      steps = job["steps"]
      grid = [[0] * size for _ in range(size)]
      r = c = size // 2
      dirs = [(-1, 0), (0, 1), (1, 0), (0, -1)]  # up, right, down, left
      facing = 0
      for _ in range(steps):
          if grid[r][c] == 0:
              grid[r][c] = 1
              facing = (facing + 1) % 4
          else:
              grid[r][c] = 0
              facing = (facing - 1) % 4
          dr, dc = dirs[facing]
          r = (r + dr) % size
          c = (c + dc) % size
      return sum(sum(row) for row in grid)
hints:
  - level: 1
    text: Store the four directions in clockwise order (up, right, down, left) and track the facing as an index. Turning right adds one to that index; turning left subtracts one.
  - level: 2
    text: Use `% 4` so the facing index stays in range as it rotates. Flip the current cell and update the facing before you step, matching the stated order stitch/turn/move.
  - level: 3
    text: Advance with `r = (r + dr) % size` and `c = (c + dc) % size` so stepping off any edge wraps to the opposite side. After the loop, count the ones with `sum(sum(row) for row in grid)`.
