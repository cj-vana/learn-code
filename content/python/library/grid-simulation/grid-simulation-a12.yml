explanation_markdown: |
  The head is a tiny state machine: its state is `(row, column, facing)` and each
  move both reacts to the cloth and rewrites it. Encoding the four headings as a
  clockwise list `[up, right, down, left]` turns "turn right" into `+1` and "turn
  left" into `-1` on an index, and `% 4` keeps that index valid as it cycles.
  Following the stated order, flip the cell, then rotate, then advance, matters,
  because the turn direction depends on the cell's value *before* it is flipped.

  Wraparound falls straight out of modular arithmetic: `(r + dr) % size` sends row
  `-1` to `size - 1` and row `size` back to `0`, and the same for columns. The
  work is one constant-cost move repeated `steps` times, so the routine is
  O(steps) plus O(size * size) to allocate the grid and tally the result. This is
  a classic wandering-agent automaton whose simple local rule produces
  surprisingly intricate patterns.
common_mistakes:
  - Turning before reading the cell, or flipping the cell after turning, so the turn uses the wrong value and the path diverges.
  - Clamping positions at the edges instead of wrapping them, which stalls the head against a wall rather than reappearing on the far side.
  - Ordering the direction list so that +1 turns left instead of right, silently mirroring every path.
