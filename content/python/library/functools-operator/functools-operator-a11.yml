function_name: running_ledger
input_mode: function
solution_sketch: Look the op name up in a dict mapping to operator.add / operator.mul / max / min, then call itertools.accumulate with initial= only when start is not None.
sample_solution: |
  import itertools
  import operator


  def running_ledger(data):
      ops = {"add": operator.add, "mul": operator.mul, "max": max, "min": min}
      func = ops[data["op"]]
      start = data["start"]
      if start is None:
          return list(itertools.accumulate(data["amounts"], func))
      return list(itertools.accumulate(data["amounts"], func, initial=start))
