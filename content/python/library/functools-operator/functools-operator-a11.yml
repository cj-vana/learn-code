prompt_markdown: |
  A bakery keeps a running ledger over a day's transactions, and different reports
  want different running combinations: a running total, a running product, a
  running high-water mark, or a running low. `itertools.accumulate` produces all
  of these from one iterable plus a two-argument combining function — and the
  `operator` module supplies those functions by name.

  Write `running_ledger(data)` where `data` is a dict with three keys:

  - `"amounts"`: a list of numbers, in order.
  - `"op"`: one of the strings `"add"`, `"mul"`, `"max"`, or `"min"`, choosing the
    combining function.
  - `"start"`: either a number or `null`. When it is a number, pass it to
    `accumulate` as the `initial=` value; when it is `null`, do not supply an
    initial at all.

  Map `"add"` to `operator.add`, `"mul"` to `operator.mul`, `"max"` to the
  built-in `max`, and `"min"` to the built-in `min`. Return the accumulated list.

  The `initial=` keyword changes the output shape, and that is the crux of this
  exercise:

  - With **no** initial (`"start"` is `null`), the result has the same length as
    `"amounts"`, and the first element is just the first amount. An empty
    `"amounts"` returns `[]`.
  - With an initial, the result is **one longer**: it begins with `start`, then
    folds each amount in. An empty `"amounts"` with an initial returns
    `[start]`.

  Example: `running_ledger({"amounts": [1, 2, 3], "op": "add", "start": null})`
  returns `[1, 3, 6]`, while `running_ledger({"amounts": [1, 2, 3], "op": "add",
  "start": 10})` returns `[10, 11, 13, 16]`.
