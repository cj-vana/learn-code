explanation_markdown: |
  `itertools.accumulate` folds a running result across an iterable. Its second
  positional argument is the binary combiner, defaulting to `operator.add`; passing
  `operator.mul`, `max`, or `min` instead turns the same machinery into a running
  product, running maximum, or running minimum. Storing those in a dict keyed by
  name replaces a stack of `if/elif` branches with a single lookup.

  The subtle part is `initial=`. Without it, `accumulate` seeds the fold with the
  first element, so the output length equals the input length and an empty input
  yields nothing. With `initial=start`, the fold is seeded by `start`, which is
  emitted first, so the output is exactly one element longer — and an empty input
  still emits `[start]`. That length shift is a common source of off-by-one bugs,
  which is why passing `initial=` must be conditional on `start` actually being
  provided rather than folded in as a plain first list element.
common_mistakes:
  - Always passing initial=start, so a null start is folded in as a value and shifts or corrupts the result.
  - Prepending start manually to the amounts list, which double-counts it once accumulate also seeds from it.
  - Forgetting that no-initial accumulate on an empty list returns [] while with an initial it returns [start].
  - Reaching for functools.reduce, which collapses to a single value instead of the running list accumulate produces.
