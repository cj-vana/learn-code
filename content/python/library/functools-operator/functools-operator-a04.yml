prompt_markdown: |
  A ferry crew folds a manifest of cargo weights down to a single running figure,
  always starting from a seed value the dispatcher provides. Write
  `fold_manifest(job)` where `job` is a dict with:

  - `"items"`: a list of integers to fold
  - `"op"`: one of `"add"`, `"mul"`, `"max"`, `"min"`
  - `"initial"`: the integer seed the fold starts from

  Fold `items` left to right with `functools.reduce`, combining the running
  result with each item using the chosen operation, seeded by `initial`. Return
  the final integer.

  The seed matters at the edges: if `items` is empty, `reduce` never calls the
  combiner, so the result is exactly `initial`. With a non-empty list the first
  combination is between `initial` and `items[0]`, so `initial` participates in
  `max`/`min` too (a large seed can dominate a `min`, a small seed a `max`).

  Use `operator.add` and `operator.mul` for the arithmetic operations and the
  built-in `max`/`min` for the others — do not hand-roll the combiner with a
  `lambda`.

  Example: `{"items": [1, 2, 3], "op": "add", "initial": 10}` returns `16`
  (`10 + 1 + 2 + 3`). `{"items": [], "op": "mul", "initial": 1}` returns `1`.
