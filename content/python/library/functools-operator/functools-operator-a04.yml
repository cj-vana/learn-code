function_name: fold_manifest
input_mode: function
solution_sketch: |
  Map the op name to operator.add / operator.mul / max / min, then call
  reduce(combiner, job["items"], job["initial"]) and return it.
sample_solution: |
  from functools import reduce
  import operator


  def fold_manifest(job):
      combiners = {
          "add": operator.add,
          "mul": operator.mul,
          "max": max,
          "min": min,
      }
      combiner = combiners[job["op"]]
      return reduce(combiner, job["items"], job["initial"])
