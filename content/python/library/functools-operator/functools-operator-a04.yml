explanation_markdown: |
  `functools.reduce` collapses a sequence into a single value by repeatedly
  applying a two-argument combiner: it starts with the accumulator set to the
  `initial` seed, then folds in `items[0]`, `items[1]`, and so on. Supplying the
  `initial` argument is the safe, idiomatic form — without it, an empty sequence
  raises `TypeError`, and even a non-empty one silently uses `items[0]` as the
  seed, which changes the meaning for `max`/`min`.

  Because the seed is the very first operand, it takes part in every kind of fold:
  `min` with a seed of `1` can never exceed `1`, and `max` with a seed of `100`
  can never drop below `100`. Pulling the arithmetic combiners from the `operator`
  module keeps the fold expressed as named, reusable functions instead of inline
  lambdas.
common_mistakes:
  - Calling reduce without the initial seed, so an empty items list raises TypeError instead of returning initial.
  - Forgetting that initial is the first operand, so max/min results ignore how a dominant seed clamps the outcome.
  - Reaching for a lambda combiner instead of operator.add / operator.mul, defeating the point of the operator module.
