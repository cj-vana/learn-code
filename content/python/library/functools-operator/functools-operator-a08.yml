function_name: nightly_temperature_changes
input_mode: function
solution_sketch: Walk itertools.pairwise over the readings and, for each (earlier, later) pair, emit later - earlier.
sample_solution: |
  import itertools


  def nightly_temperature_changes(readings):
      return [later - earlier for earlier, later in itertools.pairwise(readings)]
hints:
  - level: 1
    text: itertools.pairwise turns [a, b, c] into the pairs (a, b) and (b, c) — exactly the neighbours you need to subtract.
  - level: 2
