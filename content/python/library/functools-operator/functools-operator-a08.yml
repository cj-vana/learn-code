prompt_markdown: |
  A hilltop observatory records the air temperature (a whole number of degrees)
  once per night while a telescope cools. Analysts care about the *change* from
  one night to the next, not the raw values. That is a job for
  `itertools.pairwise`, which walks a sequence as overlapping adjacent pairs:
  `pairwise([a, b, c])` yields `(a, b)` then `(b, c)`.

  Write `nightly_temperature_changes(readings)` where `readings` is a list of
  integer temperatures in chronological order. Return a list holding, for each
  adjacent pair, the *later* reading minus the *earlier* one — a positive number
  for a warming night, negative for cooling, zero for no change.

  Edge cases you must handle:

  - An empty list returns `[]`.
  - A single reading has no pair, so it also returns `[]`.
  - Two equal readings produce a single `0`.

  Example: `nightly_temperature_changes([10, 12, 15])` returns `[2, 3]`, and
  `nightly_temperature_changes([20, 14, 9])` returns `[-6, -5]`.
starter_code: |
