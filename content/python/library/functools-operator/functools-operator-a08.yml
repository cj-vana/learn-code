explanation_markdown: |
  `itertools.pairwise` (added in Python 3.10) is the clean way to compare each
  element with its successor. It produces `n - 1` pairs from an `n`-element
  input, so a list of 0 or 1 items yields no pairs at all — the empty-result edge
  cases fall out automatically without a special guard.

  Because each pair arrives as `(earlier, later)`, subtracting `later - earlier`
  gives a signed delta: positive for warming, negative for cooling, zero when the
  temperature holds. Doing this by hand with indices (`readings[i+1] -
  readings[i]`) works too, but pairwise removes the off-by-one risk and reads as
  the intent: "compare each night to the next."
common_mistakes:
  - Computing earlier - later, which flips the sign of every change.
  - Guarding the empty and single-element cases with extra code that pairwise already handles.
  - Indexing readings[i+1] with a range that runs one step too far and raises IndexError.
