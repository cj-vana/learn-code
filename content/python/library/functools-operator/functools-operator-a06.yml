explanation_markdown: |
  `operator.methodcaller(name, *args)` captures a method name and its arguments up
  front and hands back a callable that runs `obj.name(*args)` on whatever object
  you give it. As a `sorted` key it lets the *ordering rule itself* be data: swap
  `"lower"` for `"upper"` or `"count"` and the same code sorts differently, without
  touching the sort call. It is the mirror image of `itemgetter`/`attrgetter` —
  those read data off an object, while `methodcaller` invokes behavior on it.

  Unpacking `*args` is what lets parameterized methods like `str.count` work: the
  substring rides along inside the caller. And because `sorted` is stable, words
  that map to the same key (for example every word containing zero `"q"`s) come
  back in their original order.
common_mistakes:
  - Forgetting to unpack args, so methods like count never receive their substring and raise a TypeError.
  - Reaching for getattr or a lambda when methodcaller expresses the same intent as a reusable, named callable.
  - Returning the transformed keys (the lowercased or stripped strings) instead of reordering the original word strings.
