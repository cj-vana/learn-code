function_name: sort_words
input_mode: function
solution_sketch: |
  Build operator.methodcaller(job["method"], *job["args"]) as the key and return
  sorted(job["words"], key=that_caller); the sort is stable for equal keys.
sample_solution: |
  import operator


  def sort_words(job):
      key_func = operator.methodcaller(job["method"], *job["args"])
      return sorted(job["words"], key=key_func)
