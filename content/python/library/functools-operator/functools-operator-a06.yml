prompt_markdown: |
  A print shop reorders a list of words, but the *rule* for ordering is chosen at
  run time by naming a string method to call on each word. Write
  `sort_words(job)` where `job` is a dict with:

  - `"words"`: a list of strings to sort
  - `"method"`: the name of a string method to call on each word to produce its
    sort key (for example `"lower"`, `"upper"`, `"strip"`, or `"count"`)
  - `"args"`: a list of extra arguments to pass to that method (often empty; for
    `"count"` it holds the substring to count)

  Sort the words **ascending** by the value each word produces when that method is
  called with those arguments, and return the reordered list of the original word
  strings. Words whose keys are equal keep their original input order (a stable
  sort). An empty `words` list returns an empty list.

  Build the sort key with `operator.methodcaller(method, *args)`, which produces a
  callable that invokes `word.method(*args)` for you — no `lambda` and no manual
  `getattr`.

  Example: with `method` `"lower"` and empty `args`, the words are ordered
  case-insensitively; with `method` `"count"` and `args` `["a"]`, they are ordered
  by how many `"a"`s each word contains.
