prompt_markdown: |
  A workshop is testing combination padlocks. Each lock has a fixed number of
  dials, and every dial can show any symbol from the same set. To audit a lock you
  need *every possible code* — the full Cartesian product of the symbol set with
  itself, once per dial. `itertools.product` with the `repeat=` keyword produces
  exactly that.

  Write `enumerate_lock_codes(data)` where `data` is a dict with two keys:

  - `"dials"`: a list of the symbols a single dial can show (numbers or strings).
  - `"length"`: a non-negative integer (`>= 0`), the number of dials.

  Return a list of codes, where **each code is a list** of `length` symbols, in
  the standard `itertools.product` order (odometer order: the rightmost position
  varies fastest). `product` yields tuples, so convert each to a list.

  Edge cases you must handle:

  - A `"length"` of `0` yields exactly one code: the empty code `[]`, so the
    result is `[[]]`. (The empty product has one arrangement — choosing nothing.)
  - If `"dials"` is empty but `"length"` is `1` or more, no code can be formed, so
    return `[]`.
  - A `"length"` of `1` returns one single-symbol code per dial symbol.

  Example: `enumerate_lock_codes({"dials": ["A", "B"], "length": 2})` returns
  `[["A", "A"], ["A", "B"], ["B", "A"], ["B", "B"]]`.
starter_code: |
  import itertools


  def enumerate_lock_codes(data):
      return []
function_name: enumerate_lock_codes
input_mode: function
solution_sketch: Call itertools.product(dials, repeat=length) and convert each yielded tuple into a list.
sample_solution: |
  import itertools


  def enumerate_lock_codes(data):
      return [list(code) for code in itertools.product(data["dials"], repeat=data["length"])]
