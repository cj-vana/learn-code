explanation_markdown: |
  `itertools.product(pool, repeat=k)` is the tidy way to enumerate every length-`k`
  sequence over a symbol set — the same result as `k` nested loops, but flat and
  data-driven. It emits tuples in odometer order: the last position cycles fastest,
  the first slowest, which is why `["A", "B"]` at length 2 runs `AA, AB, BA, BB`.

  The two edge cases are worth internalising. `repeat=0` means "the product of no
  factors," which by convention has a single arrangement — the empty tuple — so you
  get `[[]]`, not `[]`. An empty pool with `repeat >= 1` has nothing to draw from,
  so the product is genuinely empty and you get `[]`. Both follow directly from the
  definition of a Cartesian product, so `itertools.product` handles them without any
  guard clauses on your side; you only add the `list()` conversion.

  Because the output grows as `len(dials) ** length`, this is a brute-force
  enumeration — fine for auditing a small lock, but a reminder that Cartesian
  products explode quickly as either the symbol set or the code length grows.
common_mistakes:
  - Returning [] for length 0 instead of the single empty code [[]].
  - Leaving the results as tuples from product rather than converting each code to a list.
  - Passing dials positionally k times (product(dials, dials, ...)) instead of using repeat=, which cannot adapt to a runtime length.
  - Confusing product with permutations or combinations, which forbid repeats and would drop codes like ["A", "A"].
