questions:
  - id: q1
    prompt: 'Given g = partial(f, 1, 2, x=3), what does g(4, y=5) actually call?'
    choices:
      - f(1, 2, 4, x=3, y=5) — frozen positionals first, then new ones; keyword sets merge with the call's winning on conflict
      - f(4, 1, 2, x=3, y=5) — new positionals first
      - f(1, 2, x=3) then f(4, y=5)
      - TypeError — partials accept no further positionals
    correct_choice: f(1, 2, 4, x=3, y=5) — frozen positionals first, then new ones; keyword sets merge with the call's winning on conflict
    explanation: |
      partial prepends stored positional args and merges keywords (call-time
      keywords override stored ones) — the composition rule that makes
      stacked partials predictable.
    concepts:
      - python.functools_operator
  - id: q2
    prompt: 'A memoized function decorated with @lru_cache is called as f([1, 2, 3]). What happens?'
    choices:
      - TypeError — cache keys must be hashable, and lists are not; pass a tuple instead
      - The list is cached by identity
      - The cache silently skips unhashable calls
      - The list is converted to a tuple automatically
    correct_choice: TypeError — cache keys must be hashable, and lists are not; pass a tuple instead
    explanation: |
      The cache is a dict keyed by the arguments; unhashable arguments fail
      at lookup time. The hashability contract shapes APIs that intend to be
      cacheable.
    concepts:
      - python.functools_operator
  - id: q3
    prompt: 'What does functools.reduce(operator.add, [], 0) return, and what happens without the third argument?'
    choices:
      - 0 with the initializer; TypeError on the empty sequence without it
      - 0 in both cases — empty sums are zero
      - None with the initializer; 0 without
      - The empty list unchanged
    correct_choice: 0 with the initializer; TypeError on the empty sequence without it
    explanation: |
      reduce with no initializer needs at least one element to start from;
      the initializer is what makes folds total over empty inputs — same
      base-case discipline as recursion.
    concepts:
      - python.functools_operator
  - id: q4
    prompt: |
      a, b = tee(stream, 2); you then read 10,000 items from a while b stays
      untouched. What is the hidden cost?
    choices:
      - tee buffers the entire 10,000-item gap in memory until b catches up
      - Nothing — tee shares a single cursor
      - b silently loses the 10,000 items
      - The original stream restarts for b
    correct_choice: tee buffers the entire 10,000-item gap in memory until b catches up
    explanation: |
      tee must remember everything one reader has seen and the other hasn't;
      widely diverging readers turn a lazy pipeline into a hidden list. Keep
      tees roughly in step (as pairwise does).
    concepts:
      - python.functools_operator
      - python.iterators_generators
