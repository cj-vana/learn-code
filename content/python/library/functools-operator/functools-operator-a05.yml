prompt_markdown: |
  A farmers market keeps each stall as a record and needs them ranked by one or
  more fields at once. Write `rank_stalls(job)` where `job` is a dict with:

  - `"records"`: a list of stall dicts, each with the keys `"name"` (string),
    `"zone"` (integer), and `"sales"` (integer)
  - `"keys"`: a non-empty list of field names to sort by, in priority order

  Return a new list of the same record dicts sorted **ascending** by those fields:
  first by `keys[0]`, ties broken by `keys[1]`, and so on. Ties that remain after
  every key must keep the records in their original input order (a stable sort).
  An empty `records` list returns an empty list.

  Build the sort key with `operator.itemgetter(*keys)` so a single call extracts
  all the ranking fields as one tuple, instead of writing a `lambda` that hand-picks
  each field.

  Example: with keys `["zone", "sales"]`, a stall in zone 1 always ranks before a
  stall in zone 2, and within a zone the lower `sales` comes first.
starter_code: |
  import operator


  def rank_stalls(job):
      return []
function_name: rank_stalls
input_mode: function
solution_sketch: |
  Call sorted(job["records"], key=operator.itemgetter(*job["keys"])); Python's
  sort is stable, so equal keys keep input order.
sample_solution: |
  import operator


  def rank_stalls(job):
      key_func = operator.itemgetter(*job["keys"])
      return sorted(job["records"], key=key_func)
hints:
  - level: 1
