explanation_markdown: |
  `operator.itemgetter(*keys)` builds a single callable that pulls one or more
  fields out of each record. With several keys it returns a tuple, and because
  Python compares tuples element by element, sorting on that tuple gives you a
  full multi-key ordering for free: primary field first, then each later field as
  a tie-breaker. It is faster and clearer than an equivalent
  `lambda r: (r["zone"], r["sales"])`, and it is the standard idiom for
  data-record sorting.

  Python's `sorted` is stable, so any records still tied after every ranking key
  stay in their original relative order. That is why the fully tied stalls come
  back in input order rather than being shuffled.
common_mistakes:
  - Passing the keys list itself to itemgetter instead of unpacking it with *keys, which looks up a single field named after the whole list.
  - Sorting each key in a separate pass in the wrong order, instead of letting one itemgetter tuple do the whole comparison.
  - Assuming ties are reordered; the sort is stable, so equal-key records keep their input order.
