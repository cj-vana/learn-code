prompt_markdown: |
  A bakery scales a batch quantity through a fixed sequence of adjustment steps.
  Each step is written as a two-item list `[op, operand]`, where `op` is either
  `"add"` or `"mul"` and `operand` is an integer. The steps are applied left to
  right, starting from a whole-number `start`.

  Write `scale_batch(job)` where `job` is a dict with two keys:

  - `"start"`: the integer quantity to begin from
  - `"steps"`: a list of `[op, operand]` steps

  Return the final integer after every step has been applied. If `"steps"` is
  empty, return `start` unchanged.

  Build each step as a one-argument function using `functools.partial` over the
  matching function from the `operator` module (`operator.add` for `"add"`,
  `operator.mul` for `"mul"`), then feed the running value through the chain.

  Example: with `{"start": 5, "steps": [["add", 3], ["mul", 2]]}` you compute
  `(5 + 3) = 8`, then `8 * 2 = 16`, so the result is `16`.
starter_code: |
  from functools import partial
  import operator


  def scale_batch(job):
      return 0
function_name: scale_batch
input_mode: function
solution_sketch: |
  Map "add"/"mul" to operator.add/operator.mul, build partial(op_func, operand)
  for each step, then apply each partial to the running value in order.
sample_solution: |
  from functools import partial
  import operator


  def scale_batch(job):
      op_funcs = {"add": operator.add, "mul": operator.mul}
      value = job["start"]
      for op_name, operand in job["steps"]:
          step = partial(op_funcs[op_name], operand)
          value = step(value)
      return value
hints:
  - level: 1
    text: functools.partial(func, x) makes a new function that calls func with x already supplied as the first argument, so partial(operator.add, 3) adds 3.
  - level: 2
    text: operator.add and operator.mul are commutative, so partial(operator.add, operand)(value) equals value + operand no matter the argument order.
  - level: 3
    text: Look up the operator function by name, build partial(op_func, operand) per step, and reassign value = step(value) each loop; return value at the end.
