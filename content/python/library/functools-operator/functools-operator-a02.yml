explanation_markdown: |
  `functools.partial` freezes some of a function's arguments and returns a smaller
  callable that only needs the rest. Here each step becomes
  `partial(operator.add, operand)` or `partial(operator.mul, operand)`, a
  one-argument function you can apply to the running quantity. Because addition
  and multiplication are commutative, it does not matter that `partial` binds the
  operand as the *first* argument — `partial(operator.add, 3)(value)` is
  `operator.add(3, value)`, which equals `value + 3`.

  Pulling the actual operators from the `operator` module (instead of writing
  `lambda a, b: a + b`) is the idiomatic functional style: named, importable,
  picklable functions that compose cleanly with `partial`.
common_mistakes:
  - Returning start even when steps exist, because the running value is never reassigned inside the loop.
  - Using non-commutative operators like operator.sub with partial and getting operand - value instead of value - operand.
  - Rebuilding the operator lookup with lambdas that shadow the point of the exercise instead of using operator.add and operator.mul.
