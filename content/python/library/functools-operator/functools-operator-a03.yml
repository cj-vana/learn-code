explanation_markdown: |
  `functools.lru_cache` wraps a function in a memoization layer and tracks four
  counters you can read through `cache_info()`: `hits` (calls served from the
  cache), `misses` (calls that had to compute), `maxsize` (the configured
  capacity, or `None` when unbounded), and `currsize` (how many entries are
  currently stored). Applying it as `lru_cache(maxsize=...)(func)` — rather than
  with `@` — lets you choose the capacity from data at runtime.

  With a bounded cache, once `currsize` reaches `maxsize`, each miss evicts the
  least-recently-used key before inserting the new one, so `currsize` never
  exceeds `maxsize`. Repeated keys refresh their recency, which is why in the
  worked example the second `1` kept `1` alive while `2` (older) was evicted.
common_mistakes:
  - Returning the raw cache_info() named tuple; the runner compares against a plain list, so unpack the four fields into a list.
  - Passing maxsize through in the wrong place or hardcoding it, instead of reading job["maxsize"] (which may be null for unbounded).
  - Assuming currsize keeps climbing past maxsize; a bounded LRU cache evicts on every miss once it is full.
