prompt_markdown: |
  A harbor toll booth memoizes its fare calculation so repeat vehicles are not
  recomputed. The cache is a bounded LRU (least-recently-used) cache: once it is
  full, computing a fare for a brand-new vehicle evicts whichever cached vehicle
  was used least recently.

  Write `booth_ledger(job)` where `job` is a dict with:

  - `"maxsize"`: the LRU cache capacity — an integer, or `null` for an unbounded
    cache
  - `"calls"`: a list of vehicle ids (integers), each representing one fare
    lookup, processed left to right

  Wrap a fare function with `functools.lru_cache(maxsize=...)`, call the wrapped
  function once per id in `calls` (in order), then return the cache statistics as
  the list `[hits, misses, maxsize, currsize]` — exactly the four fields of
  `cache_info()`, in that order, as a plain list. When `maxsize` is `null`, the
  `maxsize` field stays `null`.

  The fare function's actual math does not matter for the statistics; what matters
  is that the same id repeated is a cache **hit** and a fresh id is a **miss**,
  with LRU eviction once the cache is full.

  Example: `{"maxsize": 2, "calls": [1, 2, 1, 3, 1]}` yields `[2, 3, 2, 2]` — two
  hits (the repeated `1`s), three misses (`1`, `2`, `3`), capacity `2`, and two
  entries still cached (`3` evicted `2`).
starter_code: |
  from functools import lru_cache


  def booth_ledger(job):
      return [0, 0, 0, 0]
function_name: booth_ledger
input_mode: function
solution_sketch: |
  Build a fare function wrapped by lru_cache(maxsize=job["maxsize"]), call it for
  each id in job["calls"], then return list(fare.cache_info()).
sample_solution: |
  from functools import lru_cache


  def booth_ledger(job):
      fare = lru_cache(maxsize=job["maxsize"])(lambda vehicle_id: vehicle_id * vehicle_id)
      for vehicle_id in job["calls"]:
          fare(vehicle_id)
      info = fare.cache_info()
      return [info.hits, info.misses, info.maxsize, info.currsize]
hints:
  - level: 1
    text: lru_cache can be applied as a function, not just a decorator - lru_cache(maxsize=n)(some_func) returns the wrapped, memoized version.
  - level: 2
    text: Every time you call the wrapped function with an id it has seen recently it counts as a hit; a new id is a miss and may evict the least-recently-used entry once the cache is full.
  - level: 3
    text: After replaying all calls, read fare.cache_info(), which is a named tuple (hits, misses, maxsize, currsize); return those four values as a plain list.
