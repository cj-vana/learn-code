prompt_markdown: |
  A mountaintop observatory records each night's readings in a single mixed list.
  A reading can be one of three shapes, and each shape is written to the log
  differently:

  - an **integer** star count `n` becomes the string `"stars:n"`
  - a **string** label `s` becomes the string `"label:s"`
  - a **list** of coordinates becomes `"coords:k"`, where `k` is how many
    coordinates it holds

  Anything else (for example a float or `None`) becomes the literal string
  `"unknown"`.

  Write `describe_readings(readings)` that takes the list of readings and returns
  a new list with each reading turned into its log string, in the original order.
  An empty input returns an empty list.

  Build this with `functools.singledispatch`: register one handler per type and
  let the dispatcher route each value by its runtime type, rather than writing a
  chain of `isinstance` checks by hand.

  Example: `describe_readings([7, "north", [[1, 2], [3, 4]], 3.5])` returns
  `["stars:7", "label:north", "coords:2", "unknown"]`.
starter_code: |
  from functools import singledispatch


  def describe_readings(readings):
      return []
function_name: describe_readings
input_mode: function
solution_sketch: |
  Define a singledispatch base function returning "unknown", then register
  handlers for int, str, and list. Map each reading through the dispatcher.
sample_solution: |
  from functools import singledispatch


  @singledispatch
  def _describe(reading):
      return "unknown"


  @_describe.register
  def _(reading: int):
      return f"stars:{reading}"


  @_describe.register
  def _(reading: str):
      return f"label:{reading}"


  @_describe.register
  def _(reading: list):
      return f"coords:{len(reading)}"


  def describe_readings(readings):
      return [_describe(reading) for reading in readings]
hints:
  - level: 1
    text: singledispatch picks a handler based on the type of the FIRST argument, so you register one function per type you care about.
  - level: 2
    text: Decorate a base function with @singledispatch (it handles the "unknown" fallback), then use @base.register with a typed parameter for int, str, and list.
  - level: 3
    text: Register int -> f"stars:{n}", str -> f"label:{s}", list -> f"coords:{len(reading)}"; the undecorated base returns "unknown". Then map every reading through the dispatcher.
tests:
  public:
    - name: mixed_shapes
      input: [7, "north", [[1, 2], [3, 4]], 3.5]
      expected: ["stars:7", "label:north", "coords:2", "unknown"]
    - name: empty
