    - name: float_only
      input: [1.5, 2.5]
      expected: ["unknown", "unknown"]
explanation_markdown: |
  `functools.singledispatch` turns a plain function into a generic function whose
  behavior is chosen by the type of its first argument. The function you decorate
  becomes the default (here, the `"unknown"` branch), and each `@_describe.register`
  attaches a specialized implementation for one type. At call time the dispatcher
  inspects `type(reading)` and calls the most specific registered handler, so you
  never write the `if isinstance(...)` ladder yourself.

  Because dispatch is by exact/most-specific type, a `float` and `None` both fall
  through to the default. Note that `bool` would dispatch to the `int` handler if
  it appeared, since `bool` is a subclass of `int` — a detail worth remembering.
common_mistakes:
  - Registering handlers on the wrong function; you must decorate with @base.register, where base is the singledispatch-wrapped function.
  - Forgetting the default branch, so unexpected types raise instead of returning "unknown".
  - Returning tuples or mutating the input list instead of building a fresh list of strings in order.
