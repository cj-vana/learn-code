prompt_markdown: |
  A print shop finishes a run of posters and packs them, in order, into shipping
  tubes that each hold a fixed number of posters. The last tube may be only
  partially full. This is precisely what `itertools.batched` (new in Python 3.12)
  does: it slices an iterable into consecutive chunks of a given size, with a
  short final chunk if the count does not divide evenly.

  Write `pack_into_tubes(data)` where `data` is a dict with two keys:

  - `"posters"`: a list of poster identifiers (numbers or strings), in print
    order.
  - `"capacity"`: a positive integer (`>= 1`), the maximum posters per tube.

  Return a list of tubes, where **each tube is a list** of the posters it holds.
  `itertools.batched` hands back tuples, so convert each one to a list before
  returning.

  Edge cases you must handle:

  - An empty `"posters"` list returns `[]` (no tubes needed).
  - When the count does not divide evenly, the final tube holds the remainder —
    e.g. 5 posters at capacity 2 gives `[[..2..], [..2..], [..1..]]`.
  - A `"capacity"` larger than the number of posters yields a single tube
    containing them all.

  Example: `pack_into_tubes({"posters": [1, 2, 3, 4, 5], "capacity": 2})` returns
  `[[1, 2], [3, 4], [5]]`.
starter_code: |
