function_name: pack_into_tubes
input_mode: function
solution_sketch: Feed the posters and capacity to itertools.batched, then convert each returned tuple chunk into a list.
sample_solution: |
  import itertools


  def pack_into_tubes(data):
      return [list(chunk) for chunk in itertools.batched(data["posters"], data["capacity"])]
