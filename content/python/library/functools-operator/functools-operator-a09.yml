explanation_markdown: |
  `itertools.batched` is the batching primitive people used to hand-roll with
  slicing or `zip(*[iter(x)]*n)`. It walks the iterable once and emits tuples of
  up to `n` elements, so the only chunk that can be shorter than `capacity` is the
  last one — the natural "partial final tube" behaviour. An empty input produces
  no tuples, so the empty-list result needs no special case.

  Because `batched` returns tuples (immutable, cheap to build), the one conversion
  step is wrapping each with `list()` to match the required return shape. If you
  ever need the trailing partial batch suppressed instead, Python 3.13 added
  `strict=True` to raise on an uneven final chunk — but here the short tube is
  exactly what we want.
common_mistakes:
  - Returning the tuples from batched directly instead of converting each chunk to a list.
  - Reimplementing the slicing by hand and dropping or mis-sizing the final partial tube.
  - Assuming batched raises on a leftover remainder; by default it simply yields a shorter last chunk.
