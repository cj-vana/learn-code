explanation_markdown: |
  `itertools.tee(source, k)` returns `k` iterators that share one buffered copy of
  the source, each remembering its own position. Advancing one does not consume the
  others — that independence is what lets you build a sliding window. By skipping
  `i` items in the `i`-th iterator, the group becomes staggered starting points:
  `0, 1, 2, ..., width - 1`. Zipping them then reads one aligned window per step.

  The window count works out cleanly because `zip` stops at its shortest argument.
  The most-advanced iterator (skipping `width - 1`) has `len(stream) - (width - 1)`
  items left, so you get exactly `len - width + 1` windows — and when `width`
  exceeds the length, that count is zero or negative, so `zip` yields nothing and
  you return `[]` with no special-casing.

  This is the tee-based recipe that predates `itertools.pairwise`; `pairwise` is
  really just this pattern hard-wired to `width = 2`. Because `tee` buffers items
  until every branch has consumed them, it works on a genuine one-shot iterator,
  which plain list slicing could not do without materialising the whole stream.
common_mistakes:
  - Slicing the list with stream[i:i+width] instead of teeing, which sidesteps the independent-consumption lesson entirely.
  - Advancing every tee'd iterator by the same amount, so all windows start at the same place or misalign.
  - Forgetting to convert each zipped tuple window into a list, leaving tuples in the result.
  - Assuming tee'd iterators are truly independent copies you can walk in any order without cost; heavily skewed consumption forces tee to buffer everything in between.
