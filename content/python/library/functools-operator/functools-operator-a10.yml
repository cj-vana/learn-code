prompt_markdown: |
  An observatory reads a star's brightness as a *one-shot stream* of magnitudes —
  the kind of iterator you can walk only once. To smooth the signal, analysts want
  every consecutive window of a fixed width. The canonical stdlib recipe for this
  uses `itertools.tee`: fork the single stream into several independent iterators,
  advance each one a little further than the last, and zip them back together.

  Write `brightness_windows(data)` where `data` is a dict with two keys:

  - `"stream"`: a list of brightness magnitudes (numbers), in time order.
  - `"width"`: a positive integer (`>= 1`), the window size.

  Return a list of windows, where **each window is a list** of `width`
  consecutive magnitudes. Successive windows overlap, sliding forward by one.

  You must build this with `itertools.tee`, not by slicing the list directly —
  the point is to practise the independent-consumption property that tee gives
  you. Concretely: `tee(stream, width)` makes `width` iterators; skip 0 items in
  the first, 1 in the second, ..., `width - 1` in the last, then `zip` them.

  Edge cases you must handle:

  - If `"width"` is larger than the stream length, there are no full windows:
    return `[]`.
  - An empty `"stream"` returns `[]`.
  - `"width"` of 1 returns one single-element window per magnitude.

  Example: `brightness_windows({"stream": [4, 5, 6, 7], "width": 2})` returns
  `[[4, 5], [5, 6], [6, 7]]`.
