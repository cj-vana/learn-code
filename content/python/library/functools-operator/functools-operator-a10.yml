solution_sketch: Tee the stream into `width` independent iterators, advance the i-th one i steps with next(), then zip them together and convert each resulting tuple window to a list.
sample_solution: |
  import itertools


  def brightness_windows(data):
      stream = data["stream"]
      width = data["width"]
      iterators = itertools.tee(iter(stream), width)
      for offset, it in enumerate(iterators):
          for _ in range(offset):
              next(it, None)
      return [list(window) for window in zip(*iterators)]
