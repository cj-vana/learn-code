prompt_markdown: |
  A bakery's cooling conveyor carries labelled pastry trays past a counter, and
  you want a compact tally of each unbroken *run* of identical trays as they roll
  by. `itertools.groupby` is the right tool, but it only groups items that are
  already **adjacent** — it never reorders anything. That precondition is the
  whole lesson here.

  Write `summarize_tray_runs(data)` where `data` is a dict with two keys:

  - `"trays"`: a list of tray labels (strings), in conveyor order.
  - `"presort"`: a boolean. When `True`, sort the labels ascending *before*
    grouping; when `False`, group the labels exactly as they arrive.

  Group consecutive equal labels with `itertools.groupby` and return a list of
  `[label, run_length]` pairs (each a two-element list), in the order the groups
  are produced.

  Edge cases you must handle:

  - An empty `"trays"` list returns `[]`.
  - With `"presort"` `False`, a label that reappears after a different label
    starts a brand-new run — so `["rye", "rye", "oat", "rye"]` yields
    `[["rye", 2], ["oat", 1], ["rye", 1]]`, with `"rye"` counted twice. This is
    the classic groupby trap.
  - With `"presort"` `True`, the same input sorts to `["oat", "rye", "rye",
    "rye"]` and collapses to `[["oat", 1], ["rye", 3]]`.

  Example: `summarize_tray_runs({"trays": ["a", "b", "a"], "presort": False})`
  returns `[["a", 1], ["b", 1], ["a", 1]]`.
starter_code: |
