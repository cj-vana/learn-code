function_name: summarize_tray_runs
input_mode: function
solution_sketch: Optionally sort the labels, then walk itertools.groupby and record [label, count] for each consecutive run, counting group members with sum(1 for _ in group).
sample_solution: |
  import itertools


  def summarize_tray_runs(data):
      trays = data["trays"]
      if data["presort"]:
          trays = sorted(trays)
      result = []
      for label, group in itertools.groupby(trays):
          result.append([label, sum(1 for _ in group)])
      return result
hints:
