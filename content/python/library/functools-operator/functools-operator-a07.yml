explanation_markdown: |
  `itertools.groupby` scans left to right and starts a fresh group every time the
  key changes from the previous item. It never sorts, so grouping unsorted data
  gives you *runs*, not totals — the same key can appear in several groups. That
  is exactly why the unsorted `["rye", "rye", "oat", "rye"]` reports `"rye"`
  twice: the trailing `"rye"` is a new run after `"oat"` interrupts it.

  Sorting first (`presort=True`) guarantees every equal label is adjacent, so
  each key produces exactly one group and you get true per-label totals. The
  group object handed back is a one-shot sub-iterator sharing state with the
  outer loop, so you consume it immediately with `sum(1 for _ in group)`.
common_mistakes:
  - Assuming groupby sorts for you and expecting one group per label even on unsorted input.
  - Calling len(group) on the group object, which is an iterator with no length.
  - Skipping the presort branch, so sorted and unsorted inputs return identical results.
