explanation_markdown: |
  The grace period is a clean early return: any stay of 30 minutes or fewer costs
  nothing. Past that, `(minutes + 59) // 60` rounds up to the number of started
  hours using only integer arithmetic, and `min(..., 12)` enforces the daily cap
  so a very long stay never exceeds 12 dollars.
common_mistakes:
  - Using plain division, which under-counts a partial hour instead of rounding up.
  - Forgetting the daily cap so long stays overcharge.
  - Charging for the first 30 minutes that should be free.
