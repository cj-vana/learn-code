prompt_markdown: |
  A parking garage bills by the length of a stay in whole minutes. Write
  `parking_fee(minutes)` that returns the charge in dollars:

  - The first 30 minutes are free (charge 0).
  - Beyond that, every started hour of the total stay costs 2 dollars, so a
    61-minute stay counts as two started hours.
  - The daily charge is capped at 12 dollars no matter how long the stay.
starter_code: |
  def parking_fee(minutes):
      return 0
function_name: parking_fee
input_mode: function
solution_sketch: Return 0 within the grace period, else charge 2 per started hour capped at 12.
sample_solution: |
  def parking_fee(minutes):
      if minutes <= 30:
          return 0
      started_hours = (minutes + 59) // 60
      return min(started_hours * 2, 12)
hints:
  - level: 1
    text: Handle the free grace period first with its own check.
  - level: 2
    text: To round minutes up to whole hours, use integer math like (minutes + 59) // 60.
  - level: 3
    text: Multiply the started hours by 2, then cap the result with min(..., 12).
