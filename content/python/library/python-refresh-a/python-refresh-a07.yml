explanation_markdown: |
  The `is_number` helper captures the tricky rule: a value counts as a number only
  when it is an int or float and is not a bool, since `isinstance(True, int)` is
  `True`. With that in place the two matching branches are simple, and every
  mismatched pairing falls through to `return None`.
common_mistakes:
  - Letting a boolean pass the number check because bool is a subclass of int.
  - Adding a number to a string, which raises a TypeError instead of returning None.
  - Forgetting the final None for incompatible field types.
