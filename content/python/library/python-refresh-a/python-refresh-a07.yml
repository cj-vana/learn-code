prompt_markdown: |
  A warehouse form lets a worker combine two fields, but only when they are the
  same kind of data. Write `combine_fields(pair)` where `pair` is a dict with keys
  `"a"` and `"b"`. Follow these rules:

  - If both values are numbers (an int or a float, but not a boolean), return
    their sum.
  - If both values are strings, return them joined together with `b` after `a`.
  - Otherwise the fields are incompatible, so return `None`.

  Remember that in Python a boolean counts as an integer, so treat booleans as
  incompatible with numbers here.
starter_code: |
  def combine_fields(pair):
      return None
function_name: combine_fields
input_mode: function
solution_sketch: Write a number test that excludes bool, then branch on two numbers, two strings, else None.
sample_solution: |
  def combine_fields(pair):
      a = pair["a"]
      b = pair["b"]

      def is_number(value):
          return isinstance(value, (int, float)) and not isinstance(value, bool)

      if is_number(a) and is_number(b):
          return a + b
      if isinstance(a, str) and isinstance(b, str):
          return a + b
      return None
hints:
