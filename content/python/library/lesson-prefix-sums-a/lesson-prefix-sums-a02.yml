body_markdown: |
  Prefix sums shine when you must answer many "sum between two positions"
  questions on the same list. The trick is a *padded* prefix array that starts
  with an extra leading `0`. If `pre[k]` holds the sum of the first `k` values,
  then the sum of a slice from index `left` up to (but not including) `right`
  is simply `pre[right] - pre[left]`.

  ```python
  def build(values):
      pre = [0]
      for v in values:
          pre.append(pre[-1] + v)
      return pre

  def range_sum(pre, left, right):
      return pre[right] - pre[left]

  temps = [7, 3, 9, 2]
  pre = build(temps)        # -> [0, 7, 10, 19, 21]
  range_sum(pre, 1, 3)      # values 3 and 9 -> 12
  ```

  The leading `0` means `pre` has length `n + 1`, and it removes the awkward
  special case for ranges that start at index `0`. Building `pre` is one O(n)
  pass, but after that each range query costs O(1) no matter how wide the range
  is. That is the whole payoff: pay once up front, then answer any number of
  range-sum questions instantly.
checkpoints:
  - question: For temps [7, 3, 9, 2], what is the padded prefix array pre?
    answer: "[0, 7, 10, 19, 21]"
    explanation: "Starting from 0, each entry adds the next value: 0, 0+7, 7+3, 10+9, 19+2."
  - question: Using pre = [0, 7, 10, 19, 21], what does pre[4] - pre[1] compute?
    answer: "14"
    explanation: It is the sum of the values from index 1 up to but not including index 4, which is 3 + 9 + 2 = 14.
  - question: After the prefix array is built, what is the time cost of a single range-sum query?
    answer: O(1)
    explanation: A range sum is one subtraction, pre[right] - pre[left], regardless of how many elements the range covers.
