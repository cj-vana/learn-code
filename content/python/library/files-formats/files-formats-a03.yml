prompt_markdown: |
  Before delimited files existed, ledgers stored data in **fixed-width columns**:
  each field occupies a fixed number of characters, padded with spaces. An
  archivist is digitising a vintage bank statement and needs it split into fields.

  Write `parse_fixed_width(job)` where `job` is a dict with two keys:

  - `text`: the statement as one string, lines separated by `\n`.
  - `widths`: a list of integers giving the character width of each column, in
    order.

  For every line, cut it into consecutive slices using the widths (the first
  `widths[0]` characters are field one, the next `widths[1]` characters are field
  two, and so on), strip each field of surrounding spaces, and collect the fields
  into a list. Return a list of these row-lists.

  Details the tests rely on:

  - Skip any line that is empty once stripped (blank separator lines carry no
    row).
  - Characters beyond the sum of the widths are ignored.
  - If a line is shorter than the columns imply, the missing characters simply
    produce empty-string fields (a slice past the end of a string is allowed).
