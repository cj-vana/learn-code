  - level: 2
    text: Slicing a string past its end is safe in Python and yields '' for the missing tail, so short lines need no special case.
  - level: 3
    text: Strip each sliced field before storing it, and skip lines whose stripped form is empty so blank separators do not become rows.
tests:
  public:
    - name: two_rows
