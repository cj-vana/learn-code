      expected: [["01 MAR", "Deposit", "120.50"], ["03 MAR", "Cheque 118", "-45.00"], ["11 MAR", "Interest", "2.05"]]
explanation_markdown: |
  Fixed-width parsing is positional: a field is defined by *where* it sits, not by
  a delimiter, so the core of the solution is a running cursor. Start at position
  0, and for each width take `line[pos:pos + width]` and then advance `pos` by that
  width so the next slice picks up exactly where the last left off. Python's
  forgiving slicing does the edge-case work for you: a slice that runs past the
  end of the string simply returns whatever is left (possibly nothing), so a short
  line yields empty trailing fields instead of an error. Stripping each field
  removes the space padding that gives the format its shape, and skipping blank
  lines keeps separator rows out of the result.
common_mistakes:
  - Forgetting to advance the running position, so every field is sliced from the start of the line.
  - Stripping the whole line up front, which shifts the columns and misaligns every field.
  - Assuming every line is exactly the full width and indexing instead of slicing, which raises IndexError on short lines.
