      input: {text: "01 MAR  Deposit         120.50\n   \n03 MAR  Cheque 118      -45.00", widths: [8, 12, 10]}
      expected: [["01 MAR", "Deposit", "120.50"], ["03 MAR", "Cheque 118", "-45.00"]]
    - name: extra_trailing_characters_ignored
      input: {text: "07 MAR  Wire            300.00  EXTRA-IGNORED", widths: [8, 12, 10]}
      expected: [["07 MAR", "Wire", "300.00"]]
