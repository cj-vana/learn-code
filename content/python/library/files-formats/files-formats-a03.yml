solution_sketch: For each non-blank line, walk the widths keeping a running start position, slice line[pos:pos+width], strip it, and gather the fields into a row list.
sample_solution: |
  def parse_fixed_width(job):
      text = job["text"]
      widths = job["widths"]
      rows = []
      for line in text.splitlines():
          if not line.strip():
              continue
          fields = []
          pos = 0
          for width in widths:
              fields.append(line[pos:pos + width].strip())
              pos += width
          rows.append(fields)
      return rows
hints:
