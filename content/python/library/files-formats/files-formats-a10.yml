explanation_markdown: |
  This is a small state machine driven line by line. The single piece of state you
  carry is `current`, a reference to the block dictionary being filled. A header
  line switches state: you build a new dict, seed it with the parsed id, and
  append it to the results list. Because you append the same object you keep
  filling, every following `key: value` line lands in the right block without any
  extra bookkeeping.

  Two details make the parsing robust. Stripping the `"="` and spaces off the
  header isolates the id regardless of the exact spacing, and `split(":", 1)`
  limits the split to the first colon so a value that itself contains a colon,
  like a timestamp, stays intact. Skipping blank lines and only recording key
  lines when a block is open means stray whitespace or a leading gap cannot
  corrupt the output.
common_mistakes:
  - Using line.split(":") without the maxsplit of 1, which shreds any value that contains its own colon.
  - Collecting keys into a fresh dict that is never linked to the results list, so completed blocks are lost.
  - Treating a header with no key lines as an error and skipping it instead of emitting a dict with only its id.
