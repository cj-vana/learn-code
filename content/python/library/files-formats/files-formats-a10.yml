prompt_markdown: |
  An observatory dumps the state of each instrument as a block of text. A block
  starts with a header line of the form `=== <id> ===` and is followed by zero or
  more `key: value` lines, up to the next header. Write `parse_log_blocks(text)`
  that returns a **list of dictionaries**, one per block, in the order the blocks
  appear.

  Example input:

  ```
  === dome-a ===
  status: online
  temp: 4.2
  === dome-b ===
  status: offline
  ```

  Returns:

  ```python
  [
      {"id": "dome-a", "status": "online", "temp": "4.2"},
      {"id": "dome-b", "status": "offline"},
  ]
  ```

  Rules:

  - A header line is any line that, after stripping surrounding whitespace, both
    starts and ends with `"==="`. The instrument id is what remains once you strip
    the `"="` characters and surrounding spaces (e.g. `=== dome-a ===` gives
    `"dome-a"`). Store it under the key `"id"`.
  - A `key: value` line is split on the **first** colon only: the part before is
    the key and the part after is the value. Strip surrounding whitespace from
    both. A value may itself contain a colon (e.g. a `12:30` timestamp), which
    must stay inside the value.
  - Every value stays a **string**; do not convert numbers.
  - A header with no following `key: value` lines still produces a dictionary
    holding just its `"id"`.
  - Ignore blank or whitespace-only lines.
  - Empty input text returns an empty list.
