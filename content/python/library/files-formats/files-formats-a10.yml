solution_sketch: Walk the lines keeping a reference to the current block dict; when a line is a header, start a new dict seeded with its id and append it; otherwise split the line once on ":" and add the trimmed key/value to the current block.
sample_solution: |
  def parse_log_blocks(text):
      blocks = []
      current = None
      for raw in text.splitlines():
          line = raw.strip()
          if not line:
              continue
          if line.startswith("===") and line.endswith("==="):
              block_id = line.strip("=").strip()
              current = {"id": block_id}
              blocks.append(current)
          elif current is not None and ":" in line:
              key, value = line.split(":", 1)
              current[key.strip()] = value.strip()
      return blocks
hints:
