explanation_markdown: |
  NDJSON is parsed one line at a time, and the discipline that keeps a noisy feed
  from crashing your aggregator is to validate before you trust. Each line is
  first stripped so blank lines can be ignored without inflating the skipped
  count. Parsing is wrapped in `try/except json.JSONDecodeError`, which turns a
  corrupt line into a counted skip rather than an exception that kills the run.

  Passing `json.loads` is not enough on its own: a line might parse to a list or a
  bare number, or be an object missing a field, so you check that you have a
  `dict` carrying both `"station"` and a genuinely numeric `"reading"`. Only then
  do you fold the reading into the per-station running total with
  `totals.get(station, 0) + reading`, the standard grouped-sum idiom that seeds a
  missing station at zero. Every rejected line increments `skipped`, so the
  summary reports both the aggregates and how much data was unusable.
common_mistakes:
  - Letting a bad line raise instead of catching json.JSONDecodeError, which aborts the whole feed on the first corrupt record.
  - Assuming any parsed JSON is a record, so a JSON array or number is summed or crashes instead of being skipped.
  - Counting blank lines as skipped, inflating the skipped total beyond the genuinely malformed lines.
