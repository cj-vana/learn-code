prompt_markdown: |
  A network of marine buoys streams telemetry as **newline-delimited JSON**
  (NDJSON): one JSON object per line. The feed is noisy, so some lines are
  corrupt. Write `ndjson_aggregate(text)` that reads the feed and returns a
  summary dictionary:

  ```python
  {"totals": {<station>: <sum of readings>, ...}, "skipped": <count>}
  ```

  A **well-formed** record is a JSON **object** with a `"station"` field and a
  numeric `"reading"` field. For every well-formed record, add its `reading` to
  the running total for its `station`.

  A line is **malformed** and must be **skipped and counted** in `"skipped"` if:

  - it is not valid JSON, or
  - it parses to something that is not an object (for example a JSON array or a
    bare number), or
  - it is an object missing `"station"` or `"reading"`, or
  - its `"reading"` is not a number (a JSON string like `"high"` does not count).

  Blank or whitespace-only lines are **ignored entirely** and do **not** add to
  the skipped count.

  Example input:

  ```
  {"station": "north", "reading": 5}
  {"station": "south", "reading": 3}
  {"station": "north", "reading": 2}
  broken line
  {"station": "south"}
  ```

  Returns `{"totals": {"north": 7, "south": 3}, "skipped": 2}`.
