solution_sketch: Iterate lines, skip blank ones, try json.loads and on failure count it skipped; otherwise require a dict with station and a numeric reading, else count skipped; on a valid record add reading into totals for its station.
sample_solution: |
  import json


  def ndjson_aggregate(text):
      totals = {}
      skipped = 0
      for line in text.splitlines():
          stripped = line.strip()
          if not stripped:
              continue
          try:
              record = json.loads(stripped)
          except json.JSONDecodeError:
              skipped += 1
              continue
          if not isinstance(record, dict) or "station" not in record or "reading" not in record:
              skipped += 1
              continue
          reading = record["reading"]
          if not isinstance(reading, (int, float)) or isinstance(reading, bool):
              skipped += 1
              continue
          station = record["station"]
          totals[station] = totals.get(station, 0) + reading
      return {"totals": totals, "skipped": skipped}
hints:
