explanation_markdown: |
  This is a shallow merge with one twist: `null` is overloaded to mean "remove",
  which is a common convention in configuration and patch formats. Because each
  patch is a JSON string, `json.loads` is what turns it into a dict you can loop
  over, and a JSON `null` becomes Python `None`, which is how you detect a
  deletion. Working on a copy (`dict(job["base"])`) protects the caller's preset
  from being changed underneath them. Applying patches left to right is what makes
  order meaningful: a value overwritten by a later patch, or a key deleted and
  then re-added, both fall out naturally from processing the list in sequence.
  Using `result.pop(key, None)` keeps a deletion of an absent key harmless.
common_mistakes:
  - Mutating job["base"] directly, so the caller's preset is altered as a side effect.
  - Treating a null value as the literal value None to store instead of a signal to delete the key.
  - Applying patches without json.loads, trying to merge the raw strings as if they were dicts.
