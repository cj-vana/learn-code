function_name: merge_json_patches
input_mode: function
solution_sketch: Copy base into a result dict, then for each patch string json.loads it and apply each key, deleting keys whose value is None and otherwise assigning the value.
sample_solution: |
  import json


  def merge_json_patches(job):
      result = dict(job["base"])
      for patch_str in job["patches"]:
          patch = json.loads(patch_str)
          for key, value in patch.items():
              if value is None:
                  result.pop(key, None)
              else:
                  result[key] = value
      return result
