prompt_markdown: |
  A theatre lighting desk starts from a base preset and layers overrides on top of
  it during a show. Each override arrives as a small JSON document. Write
  `merge_json_patches(job)` that applies the overrides in order and returns the
  final preset.

  `job` is a dict with two keys:

  - `base`: the starting preset, an already-parsed dict.
  - `patches`: a list of JSON **strings**, each an object of overrides, applied
    left to right.

  Merge rules (a shallow, top-level merge):

  - For each key in a patch, if its value is **not** `null`, set that key in the
    result to the value (adding the key if it was absent, overwriting it if it
    was present).
  - If a patch value **is** `null` (which becomes Python `None` after parsing),
    **delete** that key from the result. Deleting a key that is not present is
    simply ignored.
  - Later patches see the effect of earlier ones, so order matters.

  Do not mutate the caller's `base` dict; build and return a new dict. With an
  empty `patches` list, return a copy of `base` unchanged.
