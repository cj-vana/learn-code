explanation_markdown: |
  Diffing two collections by a key is cleanest when you stop thinking in lists and
  start thinking in sets. Indexing each snapshot as `key -> record` gives you two
  key sets whose differences answer "added" and "removed" directly: a set
  difference is exactly "in one side, not the other". The intersection is the set
  of keys that survived, and those are the only candidates that could have
  changed.

  For each surviving key you compare the two full record dictionaries with `!=`.
  Because Python compares dicts by contents, this catches any difference at all: a
  changed value, an added field, or a removed one. Sorting each of the three
  result lists at the end gives a stable, predictable report. The whole diff is
  linear in the number of records plus the sort, far cheaper than comparing every
  old record against every new one.
common_mistakes:
  - Comparing only one field (like qty) instead of the whole record, so a differing extra field is missed.
  - Returning the differences unsorted, which fails the ascending-order requirement even when the sets are right.
  - Scanning the new list for each old record (a nested loop), which is quadratic and easy to get wrong versus set differences.
