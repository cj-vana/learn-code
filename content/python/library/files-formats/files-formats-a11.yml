prompt_markdown: |
  A plant nursery exports its inventory twice and wants to know what moved between
  the two snapshots. Write `diff_records(job)` that takes **one dictionary** with
  three entries:

  - `"old"`: a list of record dictionaries (the earlier snapshot).
  - `"new"`: a list of record dictionaries (the later snapshot).
  - `"key"`: the field name whose value uniquely identifies a record in each
    snapshot.

  Example call:

  ```python
  diff_records({
      "old": [{"id": "P1", "qty": 10}, {"id": "P2", "qty": 5}],
      "new": [{"id": "P2", "qty": 5}, {"id": "P3", "qty": 4}],
      "key": "id",
  })
  # -> {"added": ["P3"], "removed": ["P1"], "changed": []}
  ```

  Return a dictionary with three lists of **key values**:

  - `"added"`: keys present in `new` but not in `old`.
  - `"removed"`: keys present in `old` but not in `new`.
  - `"changed"`: keys present in **both** whose record differs in **any** field
    between the two snapshots (records that are identical are not listed).

  Each of the three lists must be **sorted** in ascending order. Within a snapshot
  every key value is unique. If a snapshot is empty, treat it as having no keys.
starter_code: |
  def diff_records(job):
      return {"added": [], "removed": [], "changed": []}
function_name: diff_records
input_mode: function
solution_sketch: Index each snapshot as key -> record, take set differences of the key sets for added and removed, and for keys in both compare the two records for equality to find changed; sort all three lists.
sample_solution: |
  def diff_records(job):
      key = job["key"]
      old_index = {row[key]: row for row in job["old"]}
      new_index = {row[key]: row for row in job["new"]}
      old_keys = set(old_index)
      new_keys = set(new_index)
      added = sorted(new_keys - old_keys)
      removed = sorted(old_keys - new_keys)
      changed = sorted(
          k for k in old_keys & new_keys if old_index[k] != new_index[k]
      )
      return {"added": added, "removed": removed, "changed": changed}
hints:
  - level: 1
    text: Turn each snapshot into a dictionary mapping its key value to the whole record so you can look records up by key.
  - level: 2
    text: With the two key sets, new_keys - old_keys is added and old_keys - new_keys is removed; the intersection is where a record might have changed.
  - level: 3
    text: For each key in the intersection, compare the two full record dicts with != to decide if it changed, then sort all three result lists.
