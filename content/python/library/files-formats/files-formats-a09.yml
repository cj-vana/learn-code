prompt_markdown: |
  A food co-op accepts each purchase as one pipe-separated line of text in the
  form `date|vendor|amount`. The intake desk needs to validate a line before it is
  filed. Write `validate_ledger_line(line)` that splits the line on `"|"` and
  returns a result dictionary.

  On success return:

  ```python
  {"ok": True, "record": {"date": <date>, "vendor": <vendor>, "amount": <float>}}
  ```

  where `amount` is the amount parsed with `float(...)`.

  On failure return `{"ok": False, "error": <reason>}` using **exactly** one of
  these reason strings, checked **in this order**:

  1. `"bad field count"` — splitting on `"|"` does not yield exactly three fields.
  2. `"empty vendor"` — the vendor field (the middle field) is the empty string.
  3. `"bad amount"` — the amount field cannot be parsed by `float(...)`.

  Fields are used exactly as they appear; do not trim surrounding spaces. The
  first failing check wins, so a line with the wrong number of fields is reported
  as `"bad field count"` even if other things also look wrong. Negative amounts
  such as `-4.25` are valid.

  Example calls:

  ```python
  validate_ledger_line("2026-01-05|Beans Co|12.50")
  # -> {"ok": True, "record": {"date": "2026-01-05", "vendor": "Beans Co", "amount": 12.5}}
  validate_ledger_line("2026-01-05||12.50")
  # -> {"ok": False, "error": "empty vendor"}
  ```
starter_code: |
  def validate_ledger_line(line):
