function_name: validate_ledger_line
input_mode: function
solution_sketch: Split on "|"; if the piece count is not 3 return the field-count error, then if the middle piece is "" return the empty-vendor error, then try float(amount) and on ValueError return the bad-amount error, else build the record.
sample_solution: |
  def validate_ledger_line(line):
      parts = line.split("|")
      if len(parts) != 3:
          return {"ok": False, "error": "bad field count"}
      date, vendor, amount = parts
      if vendor == "":
          return {"ok": False, "error": "empty vendor"}
      try:
          value = float(amount)
      except ValueError:
          return {"ok": False, "error": "bad amount"}
      return {"ok": True, "record": {"date": date, "vendor": vendor, "amount": value}}
