explanation_markdown: |
  Validating a delimited line is a small pipeline of guards that must run in a
  fixed order. Splitting first with `line.split("|")` gives you the field count,
  which is the coarsest check: if it is not exactly three, nothing else can be
  trusted, so you return `"bad field count"` immediately. Only once the shape is
  known do the per-field checks make sense.

  The amount check leans on `float(...)` raising `ValueError` for anything it
  cannot parse, including the empty string, so a `try/except` cleanly separates a
  good number from a bad one. Because `float` also accepts a leading minus sign,
  refunds like `-4.25` validate for free, and an integer-looking `"8"` becomes the
  float `8.0`. Returning early at each failing guard is what guarantees the "first
  failing check wins" ordering the intake desk relies on.
common_mistakes:
  - Checking the vendor or amount before confirming there are exactly three fields, which can crash on unpacking or report the wrong reason.
  - Using int(amount) instead of float(amount), which rejects perfectly valid decimal amounts like 12.50.
  - Testing the amount with str.isdigit(), which wrongly rejects negatives and decimals that float() would accept.
