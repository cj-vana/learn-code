explanation_markdown: |
  Flattening a tree is a natural fit for recursion: the same "descend into an
  object, joining keys as you go" step applies at every depth. The helper carries
  a `prefix` that is the dotted path built so far. When the current value is a
  dictionary, you extend the prefix with each child key and recurse; when it is a
  scalar, you have reached a leaf and record it under its full path.

  The one subtlety is the very first level, where the prefix is still empty. The
  guard `f"{prefix}.{key}" if prefix else key` avoids emitting a leading dot on
  top-level keys. Because `json.loads` already returns real Python scalars,
  booleans and `null` pass through untouched as `True`/`False`/`None`, so you do
  not convert or stringify anything on the way out.
common_mistakes:
  - Forgetting to parse the string first and trying to index the raw JSON text as if it were a dictionary.
  - Always prefixing with a dot, so top-level keys come out as ".device" instead of "device".
  - Recursing only one level deep instead of at every object, leaving inner dictionaries unflattened.
