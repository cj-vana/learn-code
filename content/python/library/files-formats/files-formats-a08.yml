prompt_markdown: |
  A weather station reports each reading as a nested JSON **envelope**, but the
  archive that stores them only accepts a flat dictionary. Write
  `flatten_json(payload)` that takes a **JSON string** describing nested objects
  and returns a flat dictionary whose keys are the full path to each value, joined
  with dots.

  Example call:

  ```python
  flatten_json('{"device": {"id": "b1", "battery": {"pct": 88}}}')
  # -> {"device.id": "b1", "device.battery.pct": 88}
  ```

  Rules:

  - Parse the string with `json.loads` first.
  - Every leaf value is a **scalar** (string, number, boolean, or `null`); there
    are **no lists** anywhere in the envelope.
  - For a nested object, join the parent key and child key with a `"."` and keep
    descending. A value three levels deep like `a.b.c` uses two dots.
  - Keep each scalar exactly as JSON decoded it (a JSON `null` becomes Python
    `None`, `true` becomes `True`).
  - Assume every object you meet has at least one entry, so there are no empty
    sub-objects to worry about.
  - An empty top-level object (`"{}"`) returns an empty dictionary.
