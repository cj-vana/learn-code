function_name: flatten_json
input_mode: function
solution_sketch: json.loads the string, then walk the structure recursively carrying a prefix; on a dict, recurse into each child with prefix + "." + key (or just key at the top), and on a scalar store flat[prefix] = value.
sample_solution: |
  import json


  def flatten_json(payload):
      data = json.loads(payload)
      flat = {}

      def walk(prefix, value):
          if isinstance(value, dict):
              for key, sub in value.items():
                  child = f"{prefix}.{key}" if prefix else key
                  walk(child, sub)
          else:
              flat[prefix] = value

      walk("", data)
      return flat
