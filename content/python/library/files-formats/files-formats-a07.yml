explanation_markdown: |
  The `csv` module exists so you never hand-roll comma joining and quoting. A
  `csv.writer` bound to an `io.StringIO` buffer lets you build the whole document
  in memory and read it back with `getvalue()`. Passing `lineterminator="\n"`
  overrides the default `"\r\n"`, which keeps the output stable across platforms
  and makes each row end in exactly one newline.

  Pulling cells with `record.get(column, "")` is what makes a ragged set of
  records line up under a fixed header: any absent field becomes a blank cell
  instead of throwing a `KeyError`. And because the writer quotes fields on your
  behalf, a value like `"Reyes, M."` is wrapped in double quotes so the embedded
  comma is not read as a column break when the sheet is parsed back.
common_mistakes:
  - Joining fields with ",".join yourself, which breaks the moment a value contains a comma that csv would have quoted.
  - Leaving the default lineterminator so rows end with "\r\n" and the expected "\n" output no longer matches.
  - Indexing record[column] directly, which raises KeyError on a missing field instead of writing an empty cell.
