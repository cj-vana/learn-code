prompt_markdown: |
  A sailing club stores each finished race as a dictionary and wants to publish a
  results sheet as CSV text. Write `records_to_csv(job)` that takes **one
  dictionary** with two entries:

  - `"records"`: a list of dictionaries, one per boat.
  - `"columns"`: a list of column names, in the exact order they should appear.

  Example call:

  ```python
  records_to_csv({
      "records": [{"boat": "Wren", "skipper": "Ada", "points": 12}],
      "columns": ["boat", "skipper", "points"],
  })
  # -> "boat,skipper,points\nWren,Ada,12\n"
  ```

  Return a **single CSV string** built with the `csv` module writing into an
  `io.StringIO` buffer. Rules:

  - The first line is the header: the column names in the given order.
  - Then one line per record, pulling each column's value from the record.
  - If a record is **missing a column key**, write an **empty string** for that
    cell (do not skip the column or raise).
  - Use `csv` so that a value containing a comma is quoted automatically.
  - Set the writer's `lineterminator` to `"\n"` so every row, **including the
    last one**, ends with a single `"\n"` (no `"\r\n"`).
  - If `"records"` is empty, still emit the header line on its own.

  Values may be strings or integers; the `csv` writer converts them to text for
  you.
