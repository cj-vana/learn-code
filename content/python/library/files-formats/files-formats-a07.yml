function_name: records_to_csv
input_mode: function
solution_sketch: Write into an io.StringIO with a csv.writer whose lineterminator is "\n"; emit the header row, then one row per record built from [record.get(col, "") for col in columns], and return buffer.getvalue().
sample_solution: |
  import csv
  import io


  def records_to_csv(job):
      records = job["records"]
      columns = job["columns"]
      buffer = io.StringIO()
      writer = csv.writer(buffer, lineterminator="\n")
      writer.writerow(columns)
      for record in records:
          writer.writerow([record.get(column, "") for column in columns])
      return buffer.getvalue()
