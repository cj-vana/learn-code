function_name: pipeline_total
input_mode: function
solution_sketch: Define one generator per operation that consumes an upstream iterable and yields transformed or filtered values, fold the list of stage descriptions over the source iterator by rewrapping it stage by stage, then return sum() of the final generator.
sample_solution: |
  def pipeline_total(spec):
      def keep_even(stream):
          for value in stream:
              if value % 2 == 0:
                  yield value

      def drop_negative(stream):
          for value in stream:
              if value >= 0:
                  yield value

      def add(stream, by):
          for value in stream:
              yield value + by

      def scale(stream, by):
          for value in stream:
              yield value * by

      stream = iter(spec["source"])
      for stage in spec["stages"]:
          op = stage["op"]
          if op == "keep_even":
              stream = keep_even(stream)
          elif op == "drop_negative":
              stream = drop_negative(stream)
          elif op == "add":
              stream = add(stream, stage["by"])
          elif op == "scale":
              stream = scale(stream, stage["by"])
          else:
              raise ValueError("unknown op: " + str(op))
      return sum(stream)
