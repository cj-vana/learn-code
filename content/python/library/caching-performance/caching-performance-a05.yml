prompt_markdown: |
  A cannery runs its numbers through a processing line built from small stages.
  Each stage is a lazy generator that reads values one at a time from the stage
  before it, so nothing is materialised until the very end, when the final values
  are added up.

  Write `pipeline_total(spec)` where `spec` is a dict with:

  - `"source"`: a list of integers fed into the first stage.
  - `"stages"`: a list of stage descriptions applied in order. Each stage is one
    of:
    - `{"op": "keep_even"}` — pass through only even numbers.
    - `{"op": "drop_negative"}` — pass through only numbers `>= 0`.
    - `{"op": "add", "by": k}` — add the integer `k` to each number.
    - `{"op": "scale", "by": k}` — multiply each number by the integer `k`.

  Build the stages as chained generators, run the source through them in the
  given order, and return the integer sum of whatever values come out the end.

  - With no stages, the source is summed unchanged.
  - An empty source sums to 0.
  - A pipeline whose filters remove every value also sums to 0.

  Example: `{"source": [1, 2, 3, 4, 5], "stages": [{"op": "keep_even"}, {"op": "scale", "by": 3}]}`
  keeps `[2, 4]`, scales them to `[6, 12]`, and returns `18`.
starter_code: |
