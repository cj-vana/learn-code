explanation_markdown: |
  Each stage is a generator that pulls from the stage before it, so the whole
  pipeline is a chain of lazy iterators. Building the chain does no work at all —
  rebinding `stream` to `keep_even(stream)` just wraps one generator around
  another. The values only move when `sum()` starts pulling from the end, and
  each value flows through every stage before the next value is requested. That
  is the memory win of generator pipelines: at no point is an intermediate list
  of all the numbers held in memory, only one value in flight at a time. Ordering
  matters because filters change how many values reach the later stages, which is
  why `keep_even` before `scale` gives a different total than the reverse.
common_mistakes:
  - Materialising each stage into a full list instead of yielding, which defeats the point of a lazy pipeline even though the total comes out the same.
  - Applying the stages in the wrong order, so a filter runs after a transform that was supposed to feed it.
  - Reusing a generator after it has already been drained, which yields nothing the second time because generators are single-use.
