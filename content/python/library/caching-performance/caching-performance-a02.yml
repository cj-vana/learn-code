prompt_markdown: |
  A print shop renders large posters on demand. Rendering a design is slow, so
  the shop keeps a cache: the first time a design is requested it is rendered
  from scratch, and every later request for the same design is served instantly
  from the cache.

  Write `render_log(designs)` that takes a list of design names (strings) in the
  order they are requested and reports how the cache behaved. Return a dict with
  exactly these keys:

  - `"labels"`: a list with one entry per request, in order — `"render"` if this
    is the first time that design is seen, or `"cache"` if the design was
    requested earlier and can be served from the cache.
  - `"renders"`: how many requests were rendered from scratch (the number of
    `"render"` labels).
  - `"cached"`: how many requests were served from the cache (the number of
    `"cache"` labels).

  Design names are compared by exact, case-sensitive equality, so `"Sky"` and
  `"sky"` are different designs. An empty request list returns
  `{"labels": [], "renders": 0, "cached": 0}`.

  For example, `render_log(["dawn", "dusk", "dawn"])` returns
  `{"labels": ["render", "render", "cache"], "renders": 2, "cached": 1}`.
starter_code: |
