explanation_markdown: |
  This is memoization done by hand. The cache is just a dictionary that maps an
  input to the result of the expensive call. Before doing any work you check
  whether the key is already present; if it is, you return the stored result (a
  cache hit), and if it is not, you compute the result once and store it (a cache
  miss). That check-then-store pattern is exactly what `functools.lru_cache`
  automates for you, and the `renders` and `cached` counts here line up with the
  misses and hits that `cache_info()` would report on a real cached function.
  Because a stored design is never recomputed, the total work is proportional to
  the number of distinct designs, not the number of requests.
common_mistakes:
  - Labelling every request as a render, so repeated designs are never recognised as cache hits.
  - Storing results but forgetting to check the cache first, so the cache is populated yet never actually saves any work.
  - Deriving renders and cached from separate ad-hoc counters that drift out of sync with the labels list instead of counting the labels directly.
