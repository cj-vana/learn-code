function_name: render_log
input_mode: function
solution_sketch: Wrap a stand-in render function in a hand-written memoize decorator whose cache dict records which designs have been computed; label each request render or cache by whether the underlying work actually ran, then tally the two label counts.
sample_solution: |
  def render_log(designs):
      computed = []

      def memoize(func):
          cache = {}

          def wrapper(key):
              if key not in cache:
                  cache[key] = func(key)
                  computed.append(key)
              return cache[key]

          return wrapper

      @memoize
      def render(design):
          return design.upper()  # stand-in for slow rendering work

      labels = []
      done = 0
      for design in designs:
          render(design)
          if len(computed) > done:
              labels.append("render")
              done = len(computed)
          else:
              labels.append("cache")
      return {
          "labels": labels,
          "renders": labels.count("render"),
          "cached": labels.count("cache"),
      }
hints:
  - level: 1
    text: Track which design names you have already seen. The first sighting of a name is a "render"; any repeat is a "cache".
  - level: 2
    text: A dictionary or set used as the cache lets you check `if design not in cache` before doing the work — that check-then-store step is the whole idea of a memoization decorator.
  - level: 3
    text: Build the labels list as you go, then compute renders and cached with labels.count("render") and labels.count("cache").
