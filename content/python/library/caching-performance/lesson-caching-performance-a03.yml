body_markdown: |
  You learned Big-O as theory. This lesson is Big-O as a *reading skill*
  — spotting, in ordinary-looking Python, the accidental quadratic that
  runs fine on your test data and dies in production. Nearly every real
  performance bug is one of a handful of patterns.

  ### The hidden costs of innocent operations

  The single most important table in practical Python performance:

  ```text
  x in list          O(n)   — scans every element
  x in set / dict    O(1)   — hashes straight to the answer
  list.insert(0, x)  O(n)   — shifts everything right
  deque.appendleft   O(1)   — the right tool for a front queue
  "".join(parts)     O(n)   — one pass
  s += piece (loop)  O(n²)  — rebuilds the whole string each time
  ```

  Each pairs an innocent-looking operation with its true cost. The
  operations *look* the same; their scaling does not.

  ### The accidental quadratic

  The classic, and your central exercise to spot:

  ```python
  seen = []
  for row in rows:
      if row.id not in seen:        # O(n) membership, inside an O(n) loop
          seen.append(row.id)       # => O(n²) total
  ```

  On 100 rows, instant. On 100,000, it runs for minutes — because the
  `in` scans a list that grows with the loop. The fix is one word: make
  `seen` a **set**, and O(n²) becomes O(n). The tell is structural — a
  linear scan (`in list`, `.index`, a nested loop) *inside* another loop
  over the same-scale data. Learn to see that nesting and you catch most
  performance bugs before they ship.

  The string cousin: `result += line` in a loop is O(n²) (strings are
  immutable — each `+=` copies the whole accumulated string); collect
  into a list and `"".join(parts)` once for O(n). Same shape, same fix:
  the repeated operation secretly rebuilds a growing structure.

  ### Choose the container for the access pattern

  Most "make it faster" reduces to picking the right container:

  - membership tests, dedup → **set** (O(1)) not list (O(n))
  - lookup by key → **dict** (O(1)) not a list of pairs scanned
  - front-and-back queue → **deque** not list (`pop(0)` is O(n))
  - "top k" or "next smallest" repeatedly → **heap** not repeated sorting

  Every one of these is a data-structure choice you already know from
  the algorithms areas; performance work is applying that knowledge to
  the *access pattern the code actually has*.

  ### The discipline

  Two rules close the area. **Measure before optimizing** — profile to
  find the actual hot spot; intuition about what is slow is wrong often
  enough that guessing wastes effort on code that runs once. And
  **optimize complexity before constants** — an O(n) algorithm in
  "slow" Python beats an O(n²) one hand-tuned in C for any n that
  matters; getting the Big-O right is worth more than every micro-trick
  combined. Read code for its scaling, fix the algorithm and the
  container, measure to confirm — that, not cleverness, is how Python
  gets fast.
