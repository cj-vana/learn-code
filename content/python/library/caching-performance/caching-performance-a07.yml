prompt_markdown: |
  A mountaintop observatory caches expensive atmospheric readings so it does not
  recompute the same sensor twice in quick succession. Each cached reading stays
  valid for a fixed **time-to-live** (`ttl`) measured in seconds from the moment
  it was last computed. To keep the exercise deterministic there is no real
  clock: you are handed the exact sequence of requests, each stamped with the
  time it arrives.

  Write `simulate_ttl_cache(request)` where `request` is a dict with this shape:

  ```python
  {
      "ttl": 5,
      "requests": [
          {"key": "wind", "time": 0},
          {"key": "wind", "time": 3},
      ],
  }
  ```

  The requests arrive in non-decreasing `time` order. Walk them left to right and
  return a list of `"hit"` / `"miss"` strings, one per request, applying these
  rules:

  - A key is a **hit** only if it is already cached AND `time - last_computed <= ttl`,
    where `last_computed` is the time of the most recent miss for that key.
  - Otherwise it is a **miss**: record the value as freshly computed at this
    `time` (so `last_computed` for that key becomes the current `time`).
  - A **hit does not extend** the lifetime — the TTL is always measured from the
    last miss, never refreshed by reads.
  - The first request for any key is always a miss.
  - `ttl` can be `0`, meaning a key is only valid for other requests arriving at
    the exact same `time` as its last miss.

  An empty request list returns an empty list.
starter_code: |
