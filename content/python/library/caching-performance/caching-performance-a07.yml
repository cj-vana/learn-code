explanation_markdown: |
  A time-to-live cache trades correctness-of-freshness for speed: a value is
  reused only while it is young enough. Because freshness is measured from the
  last recompute, the only state you need per key is a single timestamp. The
  whole simulation is O(n) over the request list with O(k) memory for k distinct
  keys.

  The subtle design choice is that reads never refresh the timer. A read-refreshing
  policy (sometimes called sliding expiration) is a different cache — here a busy
  key still expires on schedule, which is what most HTTP and DNS caches actually
  do. Modelling it as a pure function over an explicit event list keeps it fully
  deterministic, with no dependency on a real clock.
common_mistakes:
  - Refreshing the stored time on a hit, which turns a fixed TTL into sliding expiration and lets hot keys live forever.
  - Using a strict < comparison so the exact boundary second is wrongly treated as expired.
  - Forgetting that the first sighting of a key is always a miss because there is nothing cached yet.
