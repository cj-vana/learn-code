function_name: simulate_ttl_cache
input_mode: function
solution_sketch: Keep a dict mapping each key to the time of its last miss. For each event, a hit requires the key present and now - last_computed <= ttl; otherwise record a miss and store the current time as the new last_computed.
sample_solution: |
  def simulate_ttl_cache(request):
      ttl = request["ttl"]
      events = request["requests"]
      last_computed = {}
      outcomes = []
      for event in events:
          key = event["key"]
          now = event["time"]
          if key in last_computed and now - last_computed[key] <= ttl:
              outcomes.append("hit")
          else:
              outcomes.append("miss")
              last_computed[key] = now
      return outcomes
hints:
  - level: 1
    text: Track one number per key — the time of its most recent miss. That is the only state a write-based TTL needs.
  - level: 2
    text: A hit requires two conditions at once — the key is in your dict AND now minus its stored time is within the ttl. Use <= so the boundary second still counts as valid.
  - level: 3
    text: On a miss, overwrite the stored time with the current time so the countdown restarts. Never update the stored time on a hit, or lifetimes would drift.
