function_name: compare_recursive_vs_memoized_calls
input_mode: function
solution_sketch: Simulate both strategies. Run a plain recursion that increments a counter on every entry to get naive_calls. Run a memoized recursion that increments a miss counter only when an index is computed for the first time to get memoized_calls. Return both plus their difference.
sample_solution: |
  def compare_recursive_vs_memoized_calls(spec):
      n = spec["n"]
      order = spec["order"]

      naive_total = [0]

      def naive(i):
          naive_total[0] += 1
          if i < order:
              return 1
          return sum(naive(i - j) for j in range(1, order + 1))

      naive(n)

      memo = {}
      misses = [0]

      def memoized(i):
          if i in memo:
              return memo[i]
          misses[0] += 1
          if i < order:
              value = 1
          else:
              value = sum(memoized(i - j) for j in range(1, order + 1))
          memo[i] = value
          return value

      memoized(n)

      return {
          "naive_calls": naive_total[0],
          "memoized_calls": misses[0],
          "calls_avoided": naive_total[0] - misses[0],
      }
hints:
  - level: 1
    text: You do not need the sequence values themselves — you need call counts. Instrument two recursions with counters and run each once.
  - level: 2
    text: For naive_calls, bump a counter at the very top of the function so every entry counts, base cases included. For memoized_calls, only bump when you are about to compute a brand-new index.
  - level: 3
    text: In the memoized version, check the cache first and return early on a hit without counting it. Count the miss, compute the value by summing the previous `order` results, then store it before returning.
