prompt_markdown: |
  A staircase-builder counts the ways to reach the top step using a recurrence
  where each value is the sum of the previous `order` values. This generalises
  Fibonacci: with `order` equal to 2 it *is* Fibonacci. Formally, for a sequence
  `g`:

  - `g(i) = 1` for every base index `i` with `0 <= i < order`.
  - `g(i) = g(i-1) + g(i-2) + ... + g(i-order)` for `i >= order`.

  Two ways to compute `g(n)` behave very differently:

  - **Naive recursion** recomputes overlapping subproblems from scratch.
  - **Memoized recursion** stores each subproblem's answer the first time it is
    computed and reuses it afterward.

  Write `compare_recursive_vs_memoized_calls(spec)` where `spec` is a dict like
  `{"n": 5, "order": 2}`. Return a dict with exactly these keys:

  - `"naive_calls"`: the total number of times the recursive function is invoked
    when computing `g(n)` with **no** cache (every entry into the function counts,
    including the base cases).
  - `"memoized_calls"`: the number of subproblems actually **computed** in the
    memoized version — that is, the number of cache misses. A value already in the
    cache costs no further computation and is not counted again.
  - `"calls_avoided"`: `naive_calls - memoized_calls`.

  You may assume `n >= 0` and `order >= 1`. When `n < order`, computing `g(n)` is
  a single base case: `naive_calls` is `1` and `memoized_calls` is `1`.
starter_code: |
