explanation_markdown: |
  This is the memoization story told in raw numbers. Naive recursion on an
  overlapping recurrence branches into a tree whose size grows like the sequence
  itself — for Fibonacci the call count roughly doubles with every step, which is
  why `naive_calls` explodes from 15 at `n=5` to 177 at `n=10`. Memoization flattens
  that tree into a line: each distinct index is computed once, so `memoized_calls`
  is just the number of unique subproblems, growing linearly with `n`.

  The `order_one_no_overlap` case is the instructive counterexample. With `order`
  equal to 1 the recurrence never revisits a subproblem, so there is nothing to
  reuse and `calls_avoided` is 0. Memoization only pays off when subproblems
  overlap — caching is a tool for redundancy, not a universal speed-up. Counting
  the calls, rather than timing them, makes that distinction exact and fully
  deterministic.
common_mistakes:
  - Counting cache hits as computations, which inflates memoized_calls and hides the real linear cost of the memoized version.
  - Placing the naive counter increment inside a branch instead of at the function's entry, so base-case invocations are missed.
  - Assuming memoization always helps and expecting calls_avoided to be positive even for order 1, where no subproblem is ever shared.
