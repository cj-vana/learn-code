prompt_markdown: |
  A print shop schedules a nightly batch job and wants to predict how its running
  time grows as the number of orders `n` climbs. Instead of profiling, an analyst
  sketches the job's structure as a small nested description, and you turn that
  description into a Big-O label.

  Write `classify_complexity(node)`. A `node` is a dict describing one piece of
  the algorithm, using exactly these four shapes:

  - `{"op": "work"}` — one unit of constant work, `O(1)`.
  - `{"op": "loop", "body": <node>}` — a loop that runs about `n` times, repeating
    the work inside `body`. This multiplies the growth of `body` by a factor of `n`.
  - `{"op": "halve", "body": <node>}` — a loop that halves the remaining range each
    step, so it runs about `log n` times, repeating `body`. This multiplies the
    growth of `body` by a factor of `log n`.
  - `{"op": "sequence", "steps": [<node>, ...]}` — several pieces run one after
    another; the whole sequence grows as fast as its single most expensive step
    (the dominant term). An empty `steps` list is `O(1)`.

  Track the cost as a power of `n` and a power of `log n`. Then format the answer:

  - Constant work is `"O(1)"`.
  - A power of `n`: `n` when the exponent is 1, otherwise `n^k` (for example `n^2`).
  - A power of `log n`: `log n` when the exponent is 1, otherwise `log^k n`
    (for example `log^2 n`).
  - When both an `n` term and a `log` term are present, join them with a single
    space in that order, for example `"O(n log n)"` or `"O(n^3 log n)"`.

  For `sequence`, the dominant step is the one with the largest power of `n`;
  ties are broken by the larger power of `log n`.
starter_code: |
