explanation_markdown: |
  Big-O is compositional, which is exactly what makes this tractable as a
  recursion. Wrapping a body in a `loop` multiplies its cost by `n`; wrapping it
  in a `halve` multiplies by `log n`. Because multiplication of powers just adds
  exponents, the entire cost of any nested structure collapses to a single pair
  `(n_exponent, log_exponent)`.

  The `sequence` rule is where dominance lives: `O(n^2) + O(n log n)` is just
  `O(n^2)`, because for large `n` the biggest term swallows the rest. Representing
  each cost as a tuple lets Python's built-in tuple comparison pick the dominant
  term for free — it compares the `n` exponent first and only consults the `log`
  exponent to break a tie, which is precisely the ordering of complexity classes.
common_mistakes:
  - Adding the costs of sequence steps instead of taking the maximum, which invents complexity classes like O(n^2 + n) that Big-O never keeps.
  - Formatting the n^1 case as "n^1" instead of the bare "n", or emitting "O()" for constant work instead of "O(1)".
  - Comparing sequence steps only by the n exponent and dropping the log tie-break, so O(n log n) and O(n) look equally dominant.
