function_name: classify_complexity
input_mode: function
solution_sketch: Recursively reduce each node to a pair (n_exponent, log_exponent). work is (0, 0); loop adds one to the n exponent of its body; halve adds one to the log exponent of its body; sequence takes the max pair over its steps using tuple ordering. Then format the pair into the O(...) string.
sample_solution: |
  def _cost(node):
      op = node["op"]
      if op == "work":
          return (0, 0)
      if op == "loop":
          n_exp, log_exp = _cost(node["body"])
          return (n_exp + 1, log_exp)
      if op == "halve":
          n_exp, log_exp = _cost(node["body"])
          return (n_exp, log_exp + 1)
      if op == "sequence":
          best = (0, 0)
          for step in node["steps"]:
              cost = _cost(step)
              if cost > best:
                  best = cost
          return best
      raise ValueError("unknown op: " + str(op))


  def classify_complexity(node):
      n_exp, log_exp = _cost(node)
      if n_exp == 0 and log_exp == 0:
          return "O(1)"
      parts = []
      if n_exp == 1:
          parts.append("n")
      elif n_exp > 1:
          parts.append("n^" + str(n_exp))
      if log_exp == 1:
          parts.append("log n")
      elif log_exp > 1:
          parts.append("log^" + str(log_exp) + " n")
      return "O(" + " ".join(parts) + ")"
hints:
  - level: 1
    text: Reduce every node to two numbers — how many powers of n and how many powers of log n it costs. work is (0, 0).
  - level: 2
    text: loop bumps the n exponent of whatever its body costs; halve bumps the log exponent. Recurse into the body first, then adjust the returned pair.
  - level: 3
    text: For a sequence, compare the (n_exp, log_exp) pairs of the steps with plain tuple comparison and keep the maximum — Python already breaks ties by the second element, which is exactly the log tie-break you want.
