explanation_markdown: |
  Streaming dedupe is the canonical trade of a little memory for a lot of speed.
  Checking membership against a `set` is O(1) on average, so the whole pass is
  O(n) time and O(k) memory for `k` distinct values — versus the O(n^2) trap of
  asking `if item in result_list` on every element, or the O(n log n) cost of
  sorting (which also destroys first-seen order).

  Building the result through an inner generator makes the streaming shape
  explicit: values are emitted the moment they are first seen, without ever
  holding a second copy of the input. Calling `list()` on it here just collects
  the first sightings for grading; in a real pipeline you would keep it lazy and
  feed the generator straight into the next stage.
common_mistakes:
  - Testing membership against the growing output list instead of a set, which quietly turns a one-pass scan into quadratic time.
  - Reaching for sorted() or set() directly, which removes duplicates but scrambles the required first-seen order.
  - Adding a value to the seen set but forgetting to also record it in the output, dropping legitimate first sightings.
