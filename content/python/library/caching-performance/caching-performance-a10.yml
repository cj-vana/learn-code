function_name: dedupe_streaming
input_mode: function
solution_sketch: Keep a set of already-seen values. Iterate once; the first time a value appears, add it to the set and yield it, skipping any later repeat. Materialise the generator into a list for the return value.
sample_solution: |
  def dedupe_streaming(stream):
      def first_sightings():
          seen = set()
          for item in stream:
              if item not in seen:
                  seen.add(item)
                  yield item
      return list(first_sightings())
hints:
  - level: 1
    text: A set answers "have I seen this before?" in constant time, which is exactly the question streaming dedupe asks on every item.
  - level: 2
    text: Walk the stream once. Only act on a value the first time you meet it — add it to the seen set and record it, then let later repeats fall through untouched.
  - level: 3
    text: Do not sort and do not compare against the whole output list each time. A generator that yields on first sight, wrapped in list(), keeps first-seen order and one pass.
