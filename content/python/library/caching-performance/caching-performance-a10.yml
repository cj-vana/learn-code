prompt_markdown: |
  A harbor master listens to a live radio feed and logs each vessel the **first**
  time it is heard, ignoring every later repeat. The feed can be long, so the log
  should be built by passing over the stream once, remembering only which vessels
  have already been seen — never sorting or re-scanning.

  Write `dedupe_streaming(stream)`. `stream` is a list of vessel identifiers
  (integers or strings). Return a list containing each distinct value **once**,
  in the order of its first appearance.

  Examples:

  - `[1, 1, 2, 3, 3, 3, 2]` returns `[1, 2, 3]`.
  - `["a", "b", "a"]` returns `["a", "b"]`.

  An empty stream returns an empty list. Do not sort the output — first-seen
  order is the whole point.
starter_code: |
