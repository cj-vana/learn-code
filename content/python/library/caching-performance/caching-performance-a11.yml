explanation_markdown: |
  A sliding window turns a sequence of `n` readings into `n - size + 1`
  overlapping groups, and doing it with slicing keeps the code both correct and
  cheap to read: `items[start:start + size]` hands you exactly one window with no
  off-by-one bookkeeping. The guard `size > len(items)` is what protects the
  boundary — without it, `range(len(items) - size + 1)` would use a negative stop
  and silently produce nothing, which happens to be right here but only by luck,
  so stating the intent explicitly is clearer.

  Producing windows from a generator matters at scale: a real gauge feed might be
  millions of readings, and yielding one window at a time lets a downstream
  average consume them without ever holding every window in memory at once.
common_mistakes:
  - Emitting a final short window when size does not divide evenly, instead of stopping once a full window no longer fits.
  - Forgetting the size <= 0 guard, so a zero or negative width slips through and produces empty or nonsensical windows.
  - Advancing the start by size instead of by 1, which yields non-overlapping chunks rather than a sliding window.
