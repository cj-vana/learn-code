function_name: windowed_generator
input_mode: function
solution_sketch: Read items and size. If size is not a positive value that fits within the items, return an empty list. Otherwise loop start from 0 to len(items) - size inclusive, yielding items[start:start+size] from an inner generator, and materialise it into a list.
sample_solution: |
  def windowed_generator(spec):
      items = spec["items"]
      size = spec["size"]
      if size <= 0 or size > len(items):
          return []

      def windows():
          for start in range(len(items) - size + 1):
              yield items[start:start + size]

      return list(windows())
hints:
  - level: 1
    text: The number of full windows is len(items) - size + 1. Iterate the start index over exactly that range.
  - level: 2
    text: Each window is a slice items[start:start+size]. Slicing already copies the right span, so you never build a window element by element.
  - level: 3
    text: Guard the invalid cases first — size <= 0 or size > len(items) both mean zero full windows, so return an empty list before the loop ever runs.
