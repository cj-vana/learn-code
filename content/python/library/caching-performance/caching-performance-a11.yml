prompt_markdown: |
  A coastal tide gauge streams a run of readings, and the analysis needs every
  contiguous **rolling window** of a fixed width so it can later average each
  group. Write `windowed_generator(spec)` where `spec` is a dict:

  ```python
  {"items": [1, 2, 3, 4], "size": 2}
  ```

  Return a list of windows. Each window is a list of `size` consecutive items,
  and the windows slide one position at a time from the start. For the example
  above the result is `[[1, 2], [2, 3], [3, 4]]`.

  Rules and edge cases:

  - A window of `size` starting at index `i` is `items[i : i + size]`.
  - There are `len(items) - size + 1` windows when `size` fits.
  - If `size` is larger than the number of items, there are no full windows, so
    return an empty list.
  - If `size` is `0` or negative, return an empty list — a window must have at
    least one element.
  - Never emit a partial window shorter than `size`.
starter_code: |
