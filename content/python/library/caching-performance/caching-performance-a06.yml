solution_sketch: Define an infinite generator for each named sequence using a while True loop, look the requested name up in a dict of generator factories, and slice the first count values off it with itertools.islice before returning them as a list.
sample_solution: |
  from itertools import islice


  def take_from_beacon(request):
      def naturals():
          value = 1
          while True:
              yield value
              value += 1

      def odds():
          value = 1
          while True:
              yield value
              value += 2

      def squares():
          value = 1
          while True:
              yield value * value
              value += 1

      def powers_of_two():
          value = 1
          while True:
              yield value
              value *= 2

      def triangulars():
          total = 0
          value = 1
          while True:
              total += value
              yield total
              value += 1

      factories = {
          "naturals": naturals,
          "odds": odds,
          "squares": squares,
          "powers_of_two": powers_of_two,
          "triangulars": triangulars,
      }
      generator = factories[request["sequence"]]()
      return list(islice(generator, request["count"]))
hints:
  - level: 1
    text: An infinite generator is just a function with a while True loop that yields the next term and updates its running state each pass.
  - level: 2
