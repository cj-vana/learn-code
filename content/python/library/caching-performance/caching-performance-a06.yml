explanation_markdown: |
  A generator with a `while True` loop describes an infinite sequence without
  ever computing all of it, because each `yield` suspends the function until the
  next value is pulled. The bounded part of the work lives entirely in the
  consumer: `itertools.islice(generator, count)` requests exactly `count` values
  and then stops, so the endless loop only advances as far as it is asked to. A
  `count` of 0 pulls nothing at all, which is why the loop's non-termination is
  harmless. Storing the generator factories in a dict keyed by name is a small
  dispatch table that keeps the selection flat and easy to extend, instead of a
  growing if/elif chain.
common_mistakes:
  - Trying to build the whole sequence into a list first, which never finishes because the generator is infinite.
  - Calling next() in a hand-written loop but forgetting to stop after count values, or mishandling a count of 0.
  - Computing triangular numbers as value*value or squares as a running sum, mixing up which sequence each generator produces.
