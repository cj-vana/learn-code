prompt_markdown: |
  A coastal beacon can emit an endless numeric signal, but a listening station
  only ever wants the first few readings. That is the classic pairing of an
  infinite generator with a "take the first n" step.

  Write `take_from_beacon(request)` where `request` is a dict with:

  - `"sequence"`: the name of an infinite sequence (a string).
  - `"count"`: how many leading values to take, an integer `>= 0`.

  Return a list with the first `"count"` values of the named sequence. The
  supported sequences, all starting from their first term, are:

  - `"naturals"`: 1, 2, 3, 4, ...
  - `"odds"`: 1, 3, 5, 7, ...
  - `"squares"`: 1, 4, 9, 16, ...
  - `"powers_of_two"`: 1, 2, 4, 8, 16, ...
  - `"triangulars"`: 1, 3, 6, 10, 15, ... (the running totals 1, 1+2, 1+2+3, ...)

  Build each sequence as an infinite generator and take only the first `"count"`
  values (for example with `itertools.islice`) so the generator is never run past
  what is needed. A `"count"` of 0 returns an empty list.

  Example: `{"sequence": "squares", "count": 4}` returns `[1, 4, 9, 16]`.
