prompt_markdown: |
  A mosaic studio keeps a small rack of pre-cut tile templates so it does not
  re-cut a shape it recently used. The rack holds a fixed number of templates
  (`capacity`). When a job needs a template:

  - If it is already on the rack, that is a **hit**, and the template becomes the
    most-recently-used one.
  - If it is not on the rack, that is a **miss**. The studio cuts it and places it
    on the rack as the most-recently-used template. If the rack is already full,
    the **least-recently-used** template is discarded first to make room.

  This is a classic least-recently-used (LRU) cache. Write
  `cache_hit_rate(session)` where `session` is a dict:

  ```python
  {"capacity": 2, "keys": ["a", "b", "a", "c", "a"]}
  ```

  Process `keys` left to right and return the **hit rate**: the number of hits
  divided by the total number of requests, rounded to 3 decimal places.

  Edge cases:

  - An empty `keys` list returns `0.0`.
  - A `capacity` of `0` means nothing is ever cached, so every request is a miss
    and the hit rate is `0.0`.
  - Only a genuine reuse while the template is still on the rack counts as a hit —
    if it was evicted before being requested again, that is a miss.
starter_code: |
