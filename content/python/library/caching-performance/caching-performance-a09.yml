explanation_markdown: |
  Hit rate is the headline number for any cache: it tells you what fraction of
  requests avoided the expensive work. Simulating the LRU policy honestly is the
  whole exercise, and the trick is that an insertion-ordered dict doubles as a
  recency queue — the oldest entry is `next(iter(rack))` and the newest is
  whatever you inserted last. Re-inserting on every hit keeps that ordering
  truthful.

  The `capacity_one_thrash` case shows why hit rate matters more than raw cache
  presence: with room for only one template and an alternating access pattern,
  the rack evicts exactly the entry you are about to need, yielding a 0% hit rate.
  A cache that is too small for the working set can do almost no good at all.
common_mistakes:
  - Not refreshing recency on a hit, so a frequently reused key is still treated as old and gets evicted too early.
  - Evicting on every miss even when the rack is not yet full, or evicting the most-recently-used entry instead of the least.
  - Dividing hits by total without handling the empty-keys case, raising ZeroDivisionError.
