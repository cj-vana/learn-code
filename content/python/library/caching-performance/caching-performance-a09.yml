function_name: cache_hit_rate
input_mode: function
solution_sketch: Model the LRU rack with an insertion-ordered dict. On a hit, pop and re-insert the key so it becomes most-recently-used. On a miss with a full rack, evict the first key (least-recently-used) before inserting. Count hits, then round hits/total to 3 places, guarding the empty case.
sample_solution: |
  def cache_hit_rate(session):
      capacity = session["capacity"]
      keys = session["keys"]
      rack = {}
      hits = 0
      for key in keys:
          if key in rack:
              hits += 1
              rack.pop(key)
              rack[key] = None
          else:
              if capacity <= 0:
                  continue
              if len(rack) >= capacity:
                  oldest = next(iter(rack))
                  rack.pop(oldest)
              rack[key] = None
      total = len(keys)
      if total == 0:
          return 0.0
      return round(hits / total, 3)
hints:
  - level: 1
    text: An insertion-ordered dict already remembers the order keys were added. Treat the first key as least-recently-used and the last as most-recently-used.
  - level: 2
    text: On a hit you must refresh recency — pop the key and re-insert it so it moves to the end. On a miss into a full rack, drop next(iter(rack)) first.
  - level: 3
    text: Guard the divide-by-zero — an empty keys list returns 0.0 before you ever compute a rate. A capacity of 0 means you skip caching entirely, so hits stays at 0.
