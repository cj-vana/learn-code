prompt_markdown: |
  A furniture workshop hangs its hand tools on a wall that has only `slots`
  hooks. Every time a tool is used it is moved to the front hook, the
  most-recently-used position. When a tool that is not on the wall is used, it is
  fetched from storage and hung on the front hook; if that pushes the number of
  tools past `slots`, the least-recently-used tool (the one at the back) is put
  back into storage to make room. This is exactly the eviction rule of an LRU
  cache with a fixed capacity.

  Write `tool_wall(request)` where `request` is a dict with:

  - `"slots"`: the number of hooks, an integer `>= 1`.
  - `"uses"`: a list of tool names (strings) in the order they are used.

  Return the tools currently on the wall as a list ordered from
  most-recently-used (front, index 0) to least-recently-used (back).

  Rules:

  - Using a tool already on the wall moves it to the front; nothing is evicted.
  - Using a tool that is not on the wall adds it at the front, and if the wall
    now holds more than `slots` tools, the back (least-recently-used) tool is
    evicted.
  - An empty `"uses"` list returns an empty list.

  Example: with `{"slots": 2, "uses": ["saw", "drill", "saw", "plane"]}` the wall
  ends as `["plane", "saw"]` — `"drill"` was the least-recently-used tool and was
  evicted when `"plane"` was hung up.
starter_code: |
