function_name: tool_wall
input_mode: function
solution_sketch: Keep a list with the most-recently-used tool at index 0; for each use, remove the tool if already present, insert it at the front, and pop the last element whenever the list grows past slots.
sample_solution: |
  def tool_wall(request):
      slots = request["slots"]
      wall = []  # index 0 is most recently used, last index is least
      for tool in request["uses"]:
          if tool in wall:
              wall.remove(tool)
          wall.insert(0, tool)
          if len(wall) > slots:
              wall.pop()
      return wall
