explanation_markdown: |
  An LRU cache is defined by two moves: promote on use, evict from the back when
  full. Modelling it as an ordered list makes both moves visible — removing then
  re-inserting at the front is the "promote", and popping the tail once the list
  overflows is the "evict least-recently-used". Because the wall never holds more
  than `slots` tools, the memory used is bounded no matter how long the sequence
  of uses is; that fixed ceiling is the whole point of a bounded cache and is why
  its space complexity is O(slots) rather than O(number of uses). The real
  `functools.lru_cache` and `collections.OrderedDict.move_to_end` implement this
  same recency bookkeeping with a doubly linked list so each step is O(1).
common_mistakes:
  - Evicting the front (most-recently-used) tool instead of the back when the wall overflows.
  - Forgetting to move an already-present tool to the front, so its recency never updates and it can be evicted too early.
  - Using `>=` instead of `>` when comparing against slots, which evicts a tool one use too soon and leaves the wall under-filled.
