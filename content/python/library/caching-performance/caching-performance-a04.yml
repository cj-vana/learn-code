explanation_markdown: |
  A list comprehension materialises every value at once and hands you a finished
  list. A generator does the same arithmetic but suspends after each `yield`,
  producing values only as they are pulled. Calling `list()` on the generator
  pulls all of them, which is why the two results are identical here. The
  difference is not the values but the memory profile along the way: the eager
  list holds all `n` numbers the whole time, while the generator holds only the
  one value it is currently producing. For a short conveyor that is invisible,
  but for a very long or unbounded stream the lazy form is what lets you process
  it without ever holding the whole sequence in memory.
common_mistakes:
  - Starting the positions at 0 instead of 1, which produces a leading 0 and shifts every square.
  - Returning the generator object itself under "lazy" instead of draining it with list(), so the two values are not comparable.
  - Using range(1, n) instead of range(1, n + 1) and dropping the final square.
