prompt_markdown: |
  A cannery's conveyor is fed `n` crates, and an inspector wants the sequence of
  perfect-square tags 1, 4, 9, 16, ... — the square of each crate's position,
  counting positions from 1 up to `n`.

  There are two honest ways to build this sequence: collect every value eagerly
  into a list, or produce the values lazily one at a time from a generator and
  then drain that generator into a list. Both must yield exactly the same
  values.

  Write `compare_stream_forms(n)` that builds the first `n` squares both ways and
  returns a dict with exactly these keys:

  - `"eager"`: the list `[1, 4, 9, ...]` built with a list comprehension (or an
    explicit list-building loop).
  - `"lazy"`: the same list, built by draining a generator that yields the values
    one at a time.

  `n` is an integer with `n >= 0`. When `n` is 0 both lists are empty, so the
  result is `{"eager": [], "lazy": []}`.

  Example: `compare_stream_forms(3)` returns
  `{"eager": [1, 4, 9], "lazy": [1, 4, 9]}`.
starter_code: |
  def compare_stream_forms(n):
      return {"eager": [], "lazy": []}
function_name: compare_stream_forms
input_mode: function
solution_sketch: Build the eager list with a comprehension over positions 1..n squared, define a generator that yields the same squares one at a time, drain it with list(), and return both under the eager and lazy keys.
sample_solution: |
  def compare_stream_forms(n):
      eager = [i * i for i in range(1, n + 1)]

      def squares():
          for i in range(1, n + 1):
              yield i * i

      lazy = list(squares())
      return {"eager": eager, "lazy": lazy}
hints:
  - level: 1
    text: The eager form is a single list comprehension — square each position from 1 through n.
  - level: 2
    text: For the lazy form, write a generator function that uses `yield i * i` inside the same loop, so it hands back one value at a time.
  - level: 3
    text: Turn the generator into a list with list(squares()); both forms should contain the identical values.
