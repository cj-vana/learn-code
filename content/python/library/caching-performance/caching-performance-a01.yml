prompt_markdown: |
  The loft above a violin-repair workshop is reached by a staircase of `n`
  steps. A luthier climbs it in strides that cover either 1 step or 2 steps at a
  time. Write `climb_routes(n)` that returns how many distinct sequences of
  strides reach the top of an `n`-step staircase.

  - `n` is an integer with `n >= 0`.
  - There is exactly one way to climb a staircase of 0 steps (take no strides)
    and one way to climb a staircase of 1 step, so `climb_routes(0)` and
    `climb_routes(1)` both return 1.
  - For larger `n`, a route either starts with a 1-step stride (leaving `n - 1`
    steps to climb) or a 2-step stride (leaving `n - 2`), so the count is
    `climb_routes(n - 1) + climb_routes(n - 2)`.

  Written as plain recursion this recomputes the same sub-staircases over and
  over, which grows exponentially. Cache the results with `functools.lru_cache`
  (or `functools.cache`) so each `n` is solved only once. For example,
  `climb_routes(4)` returns 5.
starter_code: |
  from functools import lru_cache


  @lru_cache(maxsize=None)
  def climb_routes(n):
      return 1
function_name: climb_routes
input_mode: function
solution_sketch: Define the recurrence climb_routes(n) = climb_routes(n-1) + climb_routes(n-2) with base cases returning 1 for n below 2, and cache it with lru_cache so each staircase size is computed once.
sample_solution: |
  from functools import lru_cache


  @lru_cache(maxsize=None)
  def climb_routes(n):
      if n < 2:
          return 1
      return climb_routes(n - 1) + climb_routes(n - 2)
hints:
  - level: 1
    text: Look at the last stride only. It is either 1 step or 2 steps, which splits every route into two smaller, independent staircases.
  - level: 2
    text: Base cases first — a staircase of 0 or 1 steps has exactly one route. Otherwise return climb_routes(n - 1) + climb_routes(n - 2).
  - level: 3
    text: Put @lru_cache(maxsize=None) directly above the function so each repeated sub-staircase is answered from the cache instead of recomputed.
