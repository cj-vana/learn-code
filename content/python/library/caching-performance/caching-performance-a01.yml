explanation_markdown: |
  Each call to `climb_routes(n)` only depends on `climb_routes(n - 1)` and
  `climb_routes(n - 2)`, but naive recursion re-solves those same sub-staircases
  an exponential number of times. Wrapping the function in `lru_cache` turns it
  into a lookup table: the first time a value of `n` is needed it is computed and
  stored, and every later request for that `n` is a cache hit. That drops the
  work from exponential to linear in `n`, and you can confirm the savings with
  `climb_routes.cache_info()`, which reports the hits and misses. The counts
  themselves are the Fibonacci numbers offset by one, which is why the recurrence
  and the base cases both matter.
common_mistakes:
  - Leaving the cache off, so the recursion recomputes the same sub-staircases and blows up exponentially for larger n.
  - Handling only n == 0 or only n == 1 as a base case, so the recursion slips past zero into negative arguments.
  - Returning 0 for the empty staircase instead of 1, since there is exactly one route that takes no strides at all.
