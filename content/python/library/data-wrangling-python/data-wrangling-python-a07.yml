function_name: inner_join
input_mode: function
solution_sketch: Index the right rows by key (first occurrence wins), then walk the left rows in order and, for each whose key is in the index, emit a copy updated with the matched right row.
sample_solution: |
  def inner_join(payload):
      left = payload["left"]
      right = payload["right"]
      key = payload["key"]
      index = {}
      for row in right:
          k = row[key]
          if k not in index:
              index[k] = row
      result = []
      for row in left:
          k = row[key]
          if k in index:
              merged = dict(row)
              merged.update(index[k])
              result.append(merged)
      return result
