explanation_markdown: |
  The efficient shape for a join is to index one side once and then stream the
  other. Here the right rows become a `key -> row` dictionary, and because we only
  store a key the first time we meet it, later duplicates are ignored and the
  first right occurrence is the one that matches.

  Walking the left rows in order preserves the requested output order for free.
  For each left row we copy it with `dict(row)` and then `update` it with the
  matched right row; since `update` overwrites existing keys, shared fields take
  the right value. Building the index is one pass over the right rows and the main
  loop is one pass over the left rows, so the whole join is linear rather than the
  quadratic cost of comparing every pair.
common_mistakes:
  - Merging left onto right (right first) so left values overwrite right and the collision rule is reversed.
  - Overwriting the index on every right row, which keeps the last duplicate instead of the required first occurrence.
  - Mutating the left row in place with .update, which corrupts the caller's input instead of returning a fresh merged dict.
