prompt_markdown: |
  A branch library keeps two in-memory tables: one row per library **card** and a
  separate log of **checkout** records. Both tables share a key field, and the
  librarian wants a single combined row wherever the same key value appears on
  both sides.

  Write `inner_join(payload)` that takes **one dictionary** with three entries:

  - `"left"`: a list of dictionaries (the card rows).
  - `"right"`: a list of dictionaries (the checkout rows).
  - `"key"`: the string name of the field to join on.

  Example call:

  ```python
  inner_join({
      "left": [{"card": "C1", "holder": "Ada"}],
      "right": [{"card": "C1", "title": "Dune"}],
      "key": "card",
  })
  # -> [{"card": "C1", "holder": "Ada", "title": "Dune"}]
  ```

  Return a **list of merged dictionaries**, one for every left row whose key value
  also appears among the right rows (an *inner* join). Rules:

  - Merge by laying the matched right row on top of the left row, so on any field
    both rows share, the **right value wins**.
  - Keep the output in **left row order**.
  - If the same key value appears in several right rows, match the **first**
    right occurrence only.
  - Left rows with no matching right key are dropped entirely.
  - If either list is empty, return an empty list.
starter_code: |
  def inner_join(payload):
