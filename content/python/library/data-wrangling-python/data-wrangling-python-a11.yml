prompt_markdown: |
  A go-kart club logs the top speed reached on every lap, tagged with the kart's
  **class**. At the end of the day they want a leaderboard: the fastest few laps
  **per class**, highest speed first.

  Write `top_n_per_group(payload)` that takes **one dictionary** with four entries:

  - `"rows"`: a list of dictionaries (the lap records).
  - `"key"`: the field name to group by (the class).
  - `"value"`: the field name to rank by (the speed).
  - `"n"`: how many top rows to keep per group.

  Example call:

  ```python
  top_n_per_group({
      "rows": [
          {"kart_class": "junior", "driver": "Ada", "speed": 40},
          {"kart_class": "junior", "driver": "Ben", "speed": 45},
      ],
      "key": "kart_class",
      "value": "speed",
      "n": 1,
  })
  # -> {"junior": [{"kart_class": "junior", "driver": "Ben", "speed": 45}]}
  ```

  Return a **dictionary** mapping each group to a **list of its top `n` rows**,
  sorted by the value field **descending** (highest first). When two rows in a
  group tie on value, keep them in their **original input order**. Each output row
  is the full original record. If a group has fewer than `n` rows, return all of
  them (still sorted); if `n` is `0`, its list is empty. If `rows` is empty,
  return an empty dictionary.
starter_code: |
  def top_n_per_group(payload):
      return {}
function_name: top_n_per_group
input_mode: function
solution_sketch: Group rows into lists by key preserving input order, then for each group take a stable sort by value in reverse and slice off the first n rows.
sample_solution: |
  def top_n_per_group(payload):
      rows = payload["rows"]
      key = payload["key"]
      value = payload["value"]
      n = payload["n"]
      groups = {}
      for row in rows:
          groups.setdefault(row[key], []).append(row)
      result = {}
      for group, items in groups.items():
          ranked = sorted(items, key=lambda r: r[value], reverse=True)
          result[group] = ranked[:n]
      return result
hints:
  - level: 1
    text: First bucket the rows into a dictionary of lists keyed by the group field, appending in input order.
  - level: 2
    text: Python's sorted is stable, so sorting by the value field with reverse=True keeps tied rows in their original order.
  - level: 3
    text: After sorting each group's list descending, slice with [:n] -- slicing is safe even when a group has fewer than n rows or n is 0.
