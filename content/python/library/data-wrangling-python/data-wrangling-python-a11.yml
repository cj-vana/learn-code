explanation_markdown: |
  This is grouping followed by a per-bucket ranking. The first pass buckets rows
  into lists with `setdefault`, and because you append in input order, tied rows
  arrive in the order you will later need to preserve. The second pass sorts each
  bucket.

  The tie rule is handled for free by Python's stable sort: when two rows compare
  equal on the value key, `sorted` leaves them in their existing order, and
  `reverse=True` still preserves that stability rather than flipping equal
  elements. Sorting descending and slicing `[:n]` gives the top n, and slicing is
  forgiving -- it returns the whole list when a group is smaller than n and an
  empty list when n is 0, so no special-casing is needed.
common_mistakes:
  - Sorting all rows once globally instead of within each group, which mixes classes together.
  - Sorting ascending or negating the key inconsistently, so the slowest laps come back instead of the fastest.
  - Building ties by reversing the whole sorted list, which flips tied rows out of their required input order.
