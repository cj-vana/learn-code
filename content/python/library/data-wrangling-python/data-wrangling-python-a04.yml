prompt_markdown: |
  A courier depot scans every parcel into a flat log, one dictionary per parcel.
  Dispatch wants a headcount: how many parcels are headed to each delivery zone?

  Write `count_by_zone(payload)` that takes a single dictionary with two keys:

  - `"rows"`: a list of parcel dictionaries.
  - `"key"`: the field name to group by.

  Return a dictionary that maps each distinct value of `"key"` to the **number of
  rows** that carry it. You may assume `"key"` is present in every row.

  Edge cases the tests cover:

  - An empty `"rows"` list returns an empty dictionary `{}`.

  Example:

  ```python
  count_by_zone({
      "rows": [{"id": "P1", "zone": "A"}, {"id": "P2", "zone": "B"}, {"id": "P3", "zone": "A"}],
      "key": "zone",
  })
  # -> {"A": 2, "B": 1}
  ```
starter_code: |
  def count_by_zone(payload):
      return {}
function_name: count_by_zone
input_mode: function
solution_sketch: Walk the rows once, and for each row's key value add 1 to a running tally in a counts dictionary using dict.get with default 0.
sample_solution: |
  def count_by_zone(payload):
      rows = payload["rows"]
      key = payload["key"]
      counts = {}
      for row in rows:
          value = row[key]
          counts[value] = counts.get(value, 0) + 1
      return counts
hints:
  - level: 1
    text: You want one bucket per distinct key value, and each row bumps its bucket by one.
  - level: 2
    text: counts.get(value, 0) gives you the running tally, or 0 the first time a value appears, so you never need a separate seen check.
  - level: 3
    text: Loop over the rows and write counts[value] = counts.get(value, 0) + 1, then return counts.
tests:
  public:
    - name: empty_log
      input: {"rows": [], "key": "zone"}
      expected: {}
    - name: one_each
      input: {"rows": [{"id": "P1", "zone": "A"}, {"id": "P2", "zone": "B"}], "key": "zone"}
      expected: {"A": 1, "B": 1}
    - name: repeated_zone
      input: {"rows": [{"id": "P1", "zone": "A"}, {"id": "P2", "zone": "A"}, {"id": "P3", "zone": "B"}], "key": "zone"}
      expected: {"A": 2, "B": 1}
  validation:
