      expected: {"north": 4}
    - name: three_zones
      input: {"rows": [{"zone": "A"}, {"zone": "B"}, {"zone": "C"}, {"zone": "B"}, {"zone": "C"}, {"zone": "C"}], "key": "zone"}
      expected: {"A": 1, "B": 2, "C": 3}
    - name: group_by_carrier
      input: {"rows": [{"zone": "A", "carrier": "van-1"}, {"zone": "B", "carrier": "van-2"}, {"zone": "C", "carrier": "van-1"}], "key": "carrier"}
      expected: {"van-1": 2, "van-2": 1}
    - name: numeric_key_values
      input: {"rows": [{"route": 7}, {"route": 7}, {"route": 3}], "key": "route"}
      expected: {7: 2, 3: 1}
explanation_markdown: |
  Counting is the simplest aggregate: every row contributes exactly one tally
  regardless of its other fields. The `counts.get(value, 0) + 1` idiom folds the
  "first time I've seen this key" case into the same line as the update, so there
  is no separate initialisation branch.

  The grouped-by value can be any hashable - a string zone, a carrier name, or a
  numeric route number - because you use `row[key]` directly as the dictionary
  key. One pass over the rows makes this linear in the number of parcels.
common_mistakes:
  - Storing the whole row instead of a running integer count under each key.
  - Forgetting the default in dict.get, which raises KeyError the first time a new zone appears.
  - Overwriting counts[value] with 1 every time instead of incrementing the existing tally.
