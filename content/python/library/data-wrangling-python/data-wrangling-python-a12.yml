explanation_markdown: |
  A running total is a grouped accumulator you read out on every step instead of
  only at the end. One dictionary maps each account to its total so far;
  `totals.get(account, 0)` supplies the fresh 0 the first time an account appears,
  so the very first entry's balance equals its own amount. Because the rows are
  already in posting order, one left-to-right pass produces correct running sums,
  and accounts never interfere because each has its own slot in the totals dict.

  The output must be new dictionaries: copying with `dict(row)` before setting
  `balance` leaves the caller's data untouched, which matters when the same list
  is reused elsewhere. The routine is a single linear pass with O(1) work per row.
common_mistakes:
  - Assigning row["balance"] directly, which mutates the caller's input dictionaries.
  - Using one shared running total for all accounts instead of a per-account dictionary.
  - Recomputing each balance by re-summing all earlier rows, turning a linear pass into quadratic work.
