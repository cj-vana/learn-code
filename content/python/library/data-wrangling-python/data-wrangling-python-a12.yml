prompt_markdown: |
  A savings co-op posts transactions to member passbooks in the order they were
  recorded. Each entry credits (positive) or debits (negative) an account, and the
  clerk wants every entry stamped with the **running balance** for that account
  right after the entry was applied.

  Write `running_balances(payload)` that takes **one dictionary** with one entry:

  - `"rows"`: a list of dictionaries, each with an `"account"` field and a numeric `"amount"` field, in posting order.

  Example call:

  ```python
  running_balances({
      "rows": [
          {"account": "A", "amount": 10},
          {"account": "A", "amount": 5},
      ]
  })
  # -> [{"account": "A", "amount": 10, "balance": 10},
  #     {"account": "A", "amount": 5, "balance": 15}]
  ```

  Return a **list of new dictionaries**, one per input row in the same order. Each
  output dictionary must copy that row's fields and add a `"balance"` field equal
  to the running sum of `amount` for that account, counting this row and all
  earlier rows of the same account. Accounts are independent: each keeps its own
  running total. **Do not mutate the input rows** -- build and return fresh
  dictionaries. If `rows` is empty, return an empty list.
starter_code: |
  def running_balances(payload):
      return []
function_name: running_balances
input_mode: function
solution_sketch: Keep a dict of per-account running totals; for each row add its amount to that account's total, then emit a copy of the row with a balance field set to the updated total.
sample_solution: |
  def running_balances(payload):
      rows = payload["rows"]
      totals = {}
      result = []
      for row in rows:
          account = row["account"]
          totals[account] = totals.get(account, 0) + row["amount"]
          new_row = dict(row)
          new_row["balance"] = totals[account]
          result.append(new_row)
      return result
hints:
  - level: 1
    text: Keep one dictionary mapping each account to its running total so far, updating it as you pass over the rows.
  - level: 2
    text: totals.get(account, 0) hands back 0 the first time an account appears, so the first entry's balance is just its own amount.
  - level: 3
    text: Copy each row with dict(row) before adding the balance key so the caller's original rows are never changed.
