prompt_markdown: |
  A regional bakery chain reviews each day's sales through a small console that
  runs a **pipeline**: an ordered list of steps that each transform a table of
  rows into a new table. Your job is to interpret that pipeline.

  Write `pipeline_interpreter(job)` that takes **one dictionary**:

  - `"rows"`: a list of dictionaries (the starting table). Every row has the same
    set of string keys.
  - `"steps"`: a list of step dictionaries, applied strictly in order. The output
    of one step becomes the input to the next.

  Return the final table as a **list of row dictionaries**. With no steps, return
  the rows unchanged.

  There are exactly four step kinds, each keyed by `"op"`:

  - `{"op": "filter", "column": c, "min": v}` -- keep only rows whose `row[c]` is
    **greater than or equal to** `v` (the values in `c` are numbers). Keep the
    surviving rows in their current order.
  - `{"op": "select", "columns": [...]}` -- replace every row with a new dict
    containing **only** those columns, in the listed order. Row order is unchanged.
  - `{"op": "group_sum", "group_by": g, "sum": s}` -- group rows by the value of
    `row[g]`, and for each group total up the `row[s]` values. Produce one row per
    group, `{g: <group value>, s: <total>}`, with groups in the order each group's
    value **first appears** in the incoming table.
  - `{"op": "sort", "column": c, "descending": bool}` -- return the rows sorted by
    `row[c]`. Sort ascending when `"descending"` is `false` and descending when it
    is `true`. The sort is **stable**: rows that tie on `row[c]` keep their
    current relative order.

  Example:

  ```python
  pipeline_interpreter({
      "rows": [
          {"shop": "east", "day": "mon", "loaves": 30},
          {"shop": "west", "day": "mon", "loaves": 20},
          {"shop": "east", "day": "tue", "loaves": 25},
      ],
      "steps": [
          {"op": "filter", "column": "loaves", "min": 25},
          {"op": "group_sum", "group_by": "shop", "sum": "loaves"},
          {"op": "sort", "column": "loaves", "descending": True},
      ],
  })
  # filter keeps the two east rows (30 and 25); group_sum totals east -> 55;
  # -> [{"shop": "east", "loaves": 55}]
  ```

  If a step leaves no rows, later steps simply run on an empty table. You may
  assume every referenced column exists on the rows a step receives, and that
  `columns` for a select is non-empty.
