function_name: pipeline_interpreter
input_mode: function
solution_sketch: Hold a current table and rebuild it per step -- comprehension for filter/select, a first-appearance ordered accumulator for group_sum, and a stable sorted() with reverse for sort.
sample_solution: |
  def pipeline_interpreter(job):
      table = [dict(r) for r in job["rows"]]
      for step in job["steps"]:
          op = step["op"]
          if op == "filter":
              col = step["column"]
              lo = step["min"]
              table = [r for r in table if r[col] >= lo]
          elif op == "select":
              cols = step["columns"]
              table = [{c: r[c] for c in cols} for r in table]
          elif op == "group_sum":
              gb = step["group_by"]
              sm = step["sum"]
              totals = {}
              order = []
              for r in table:
                  key = r[gb]
                  if key not in totals:
                      totals[key] = 0
                      order.append(key)
                  totals[key] += r[sm]
              table = [{gb: key, sm: totals[key]} for key in order]
          elif op == "sort":
              col = step["column"]
              desc = step.get("descending", False)
              table = sorted(table, key=lambda r: r[col], reverse=desc)
      return table
hints:
  - level: 1
    text: Keep one "current table" variable and reassign it once per step, so the steps naturally chain in order.
  - level: 2
    text: filter and select are one comprehension each; for group_sum, accumulate totals in a dict but also track first-appearance order in a separate list so the output rows come out in the right order.
  - level: 3
    text: "Use sorted(table, key=lambda r: r[col], reverse=desc) for sort -- sorted is stable so ties keep their order, and reverse handles descending without changing the tie behavior."
