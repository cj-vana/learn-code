explanation_markdown: |
  A pipeline interpreter is a fold: you carry one "current table" and let each step
  rebuild it, so the plumbing is just reassigning that variable in a loop. Because
  each step reads the previous step's output, order is everything -- filtering
  before grouping sums a different set of rows than grouping before filtering.

  Two steps hide the interesting details. `group_sum` needs both a running total
  per key and the order the keys first appeared; a dict gives you the totals, but
  dict insertion order alone is fragile to reason about, so tracking first
  appearance in a separate list makes the output order explicit and correct. `sort`
  leans on the fact that Python's `sorted` is stable: passing `reverse=desc`
  flips ascending to descending without disturbing tied rows, which is why
  `sort_ascending_is_stable` keeps east ahead of west when both have 10 loaves.
  Rebuilding a fresh list at every step (rather than mutating rows in place) keeps
  each stage independent and easy to trust.
common_mistakes:
  - Mutating rows in place instead of building a new table per step, so a select or group_sum corrupts data a later step needs.
  - Emitting group_sum rows in dictionary-hash or sorted order instead of first-appearance order.
  - Reversing the whole list to sort descending, which flips tied rows out of their required stable order.
  - Hard-coding the column or key names instead of reading them from each step, so the interpreter only works on one specific table.
