explanation_markdown: |
  Cleaning against a schema is a validate-then-build loop with an all-or-nothing
  rule per row. Iterating over `schema.items()` guarantees you touch exactly the
  declared fields and lets you assemble a fresh, correctly typed dictionary rather
  than mutating the messy original. The moment a field is missing, blank, or fails
  its conversion you set a flag and `break`, so a single bad cell disqualifies the
  whole row.

  Stripping before the empty check matters because a cell of pure spaces should
  count as missing, not as the string `"   "`. Wrapping `int` and `float` in
  `try/except` turns a garbage cell into a clean drop instead of a crash, and
  catching both `ValueError` (like `int("ten")`) and `TypeError` keeps the loop
  robust. Every kept row is a brand-new dict, so the caller's raw data is left
  untouched.
common_mistakes:
  - Checking for emptiness before stripping, so a value of spaces slips through as a non-empty string.
  - Appending the row anyway after a failed conversion, keeping half-cleaned or invalid records.
  - Letting int() or float() raise instead of catching it, which crashes the whole run on one bad cell.
  - Copying the original row and overwriting fields, which drags along stray keys not named in the schema.
