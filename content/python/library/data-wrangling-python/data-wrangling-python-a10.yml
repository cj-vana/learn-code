solution_sketch: For each row, try to build a cleaned dict field by field using the schema; strip strings, coerce ints and floats in a try/except, and abandon the row on the first missing, empty, or uncoercible field.
sample_solution: |
  def clean_records(payload):
      rows = payload["rows"]
      schema = payload["schema"]
      kept = []
      for row in rows:
          cleaned = {}
          ok = True
          for field, kind in schema.items():
              if field not in row or row[field] is None:
                  ok = False
                  break
              raw = row[field]
              text = raw.strip() if isinstance(raw, str) else raw
              if isinstance(text, str) and text == "":
                  ok = False
                  break
              if kind == "str":
                  cleaned[field] = text
              elif kind == "int":
                  try:
                      cleaned[field] = int(text)
                  except (ValueError, TypeError):
                      ok = False
                      break
              elif kind == "float":
                  try:
                      cleaned[field] = float(text)
                  except (ValueError, TypeError):
                      ok = False
                      break
              else:
                  ok = False
                  break
          if ok:
              kept.append(cleaned)
      return kept
