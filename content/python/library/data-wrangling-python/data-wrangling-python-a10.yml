prompt_markdown: |
  A market stall's day-end ledger was typed by hand, so **every value is a
  string** even when it represents a number, and some cells are blank or
  scribbled wrong. You are given a **schema** that declares the expected type of
  each field, and you must produce a clean, typed table.

  Write `clean_records(payload)` that takes **one dictionary** with two entries:

  - `"rows"`: a list of dictionaries (the raw ledger rows).
  - `"schema"`: a dictionary mapping each field name to one of `"int"`, `"float"`, or `"str"`.

  Example call:

  ```python
  clean_records({
      "rows": [{"item": " apples ", "qty": "12", "price": "3.50"}],
      "schema": {"item": "str", "qty": "int", "price": "float"},
  })
  # -> [{"item": "apples", "qty": 12, "price": 3.5}]
  ```

  For each row, process every field named in the schema:

  - If the field is **missing** from the row (or its value is `null`), drop the whole row.
  - Strip leading and trailing whitespace from the string value. If it is **empty** after stripping, drop the whole row.
  - For a `"str"` field, keep the stripped string.
  - For an `"int"` field, convert the stripped text with `int(...)`; if that raises, drop the whole row.
  - For a `"float"` field, convert the stripped text with `float(...)`; if that raises, drop the whole row.

  Return a **list of the surviving rows**, in their original order, where each kept
  row is a **new dictionary containing exactly the schema's fields** with cleaned,
  correctly typed values. A row is kept only if every schema field is present and
  coercible. If `rows` is empty, return an empty list.
