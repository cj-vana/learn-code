prompt_markdown: |
  A ferry terminal keeps a **crew roster** (one row per member) and a separate,
  optional list of **locker assignments**. Every crew member must appear in the
  final table whether or not they have a locker; members without one get filler
  values so every row has the same shape.

  Write `left_join_fill(payload)` that takes **one dictionary** with four entries:

  - `"left"`: a list of dictionaries (the roster rows) — every one appears in the output.
  - `"right"`: a list of dictionaries (the locker rows).
  - `"key"`: the string name of the field to join on.
  - `"defaults"`: a dictionary of locker fields with fallback values.

  Example call:

  ```python
  left_join_fill({
      "left": [{"member": "m1", "name": "Ada"}, {"member": "m2", "name": "Ben"}],
      "right": [{"member": "m1", "locker": "L7", "floor": 2}],
      "key": "member",
      "defaults": {"locker": "none", "floor": 0},
  })
  # -> [{"member": "m1", "name": "Ada", "locker": "L7", "floor": 2},
  #     {"member": "m2", "name": "Ben", "locker": "none", "floor": 0}]
  ```

  Return a **list of dictionaries**, one per left row, in left row order. Build
  each output row in three layers, lowest priority first:

  1. Start from a copy of `defaults`.
  2. Lay the left row on top.
  3. If the key value has a matching right row, lay that right row on top too.

  So a real right value beats a default, the left row beats a default, and on any
  shared field the **right value wins**. A right field that is absent from the
  matched row stays at its default. If the same key appears in several right rows,
  match the **first** occurrence. If `left` is empty, return an empty list.
starter_code: |
