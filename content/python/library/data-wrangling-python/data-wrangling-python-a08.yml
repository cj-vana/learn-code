explanation_markdown: |
  A left join keeps every row from the left table; the right table only enriches
  it. The three-layer build makes the fill rule automatic: because each output row
  starts as a copy of `defaults`, any locker field the right side never supplies
  is already sitting at its fallback value. Laying the left row on top adds the
  roster fields, and overlaying a matched right row (when one exists) replaces the
  defaults with real data.

  Ordering the layers as defaults, then left, then right encodes the priority
  right > left > default in a single reading of the merged dict. Indexing the
  right rows first, keeping only the first occurrence of each key, gives O(1)
  match lookups and the required first-match tie-break, so the whole routine stays
  linear in the number of rows.
common_mistakes:
  - Skipping unmatched left rows as if it were an inner join, so members without a locker vanish.
  - Mutating the shared defaults dictionary directly instead of copying it per row, so fills leak between rows.
  - Applying defaults after the right row, which clobbers real locker values with fallbacks.
