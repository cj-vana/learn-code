function_name: left_join_fill
input_mode: function
solution_sketch: Index the right rows by key (first occurrence wins), then for each left row build a dict from defaults, update it with the left row, and if a match exists update it with the matched right row.
sample_solution: |
  def left_join_fill(payload):
      left = payload["left"]
      right = payload["right"]
      key = payload["key"]
      defaults = payload["defaults"]
      index = {}
      for row in right:
          k = row[key]
          if k not in index:
              index[k] = row
      result = []
      for row in left:
          merged = dict(defaults)
          merged.update(row)
          k = row[key]
          if k in index:
              merged.update(index[k])
          result.append(merged)
      return result
hints:
  - level: 1
    text: Every left row must survive, so unlike an inner join you never skip a left row -- you only decide whether a real right match is available.
  - level: 2
    text: Start each output row as dict(defaults) so absent locker fields already hold their fallback before you overlay anything.
  - level: 3
    text: Apply the layers in order -- defaults, then .update(left_row), then .update(matched_right) if the key is in your index -- so right beats left beats defaults.
