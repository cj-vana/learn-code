      expected: [{"zone": "east", "tier": 1, "code": 4}, {"zone": "east", "tier": 1, "code": 2}, {"zone": "east", "tier": 2, "code": 9}, {"zone": "west", "tier": 1, "code": 7}]
explanation_markdown: |
  A multi-key sort can be done in one shot with a tuple key, but building that
  tuple gets awkward the moment a descending key is a string, since you cannot
  negate `"Ben"`. The stable-sort trick sidesteps that: sort the whole list once
  per key, going from the *least* significant key up to the *most* significant.
  Each pass leaves rows that tie on the current key in whatever order the previous
  passes established, so the earlier (less significant) orderings survive as
  tie-breakers and the final pass on the most significant key wins overall.

  Copying the input with `list(rows)` first keeps the caller's list untouched, and
  an empty spec means no passes run, so the copy comes back unchanged. With k sort
  keys the cost is O(k * n log n).
common_mistakes:
  - Iterating the by-list in forward order, which makes the first key the weakest instead of the strongest.
  - Trying to negate values for descending order, which breaks on string fields; use reverse=True per pass instead.
  - Calling sorted or sort once with a hand-built tuple that ignores per-field direction.
