prompt_markdown: |
  A theatre needs its seating chart sorted by several columns at once - section
  first, then maybe row descending, then name. Each column can be ascending or
  descending, and rows that tie on every sort column must stay in their original
  input order.

  Write `sort_rows(payload)` that takes a single dictionary with two keys:

  - `"rows"`: a list of seat dictionaries.
  - `"by"`: a list of `[field, direction]` pairs, where `direction` is the string
    `"asc"` or `"desc"`. Earlier pairs are the more significant sort keys.

  Return a **new list** of the same rows arranged by the spec. The sort must be
  **stable**: when two rows compare equal on every listed field, the one that came
  first in `"rows"` comes first in the output. You may assume every field named in
  `"by"` is present in every row.

  Edge cases the tests cover:

  - An empty `"by"` list returns the rows in their original order.
  - A single ascending or descending key sorts on that field alone.

  Hint: Python's `list.sort` is stable, so you can sort by each key one at a time,
  applying the **least** significant key first and the **most** significant key
  last. This avoids building comparison tuples and works for string fields too.

  Example:

  ```python
  sort_rows({
      "rows": [{"section": "B", "row": 1}, {"section": "A", "row": 5}, {"section": "A", "row": 2}],
      "by": [["section", "asc"], ["row", "desc"]],
  })
  # -> [{"section": "A", "row": 5}, {"section": "A", "row": 2}, {"section": "B", "row": 1}]
  ```
starter_code: |
  def sort_rows(payload):
      return []
function_name: sort_rows
input_mode: function
solution_sketch: Copy the rows, then sort repeatedly from the least significant key to the most significant, using reverse=True for desc, relying on sort stability.
sample_solution: |
  def sort_rows(payload):
      rows = payload["rows"]
      by = payload["by"]
      result = list(rows)
      for field, direction in reversed(by):
          result.sort(key=lambda row: row[field], reverse=(direction == "desc"))
      return result
