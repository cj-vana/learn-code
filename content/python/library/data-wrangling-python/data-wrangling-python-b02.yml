solution_sketch: Collect the set of distinct values per group, sort each set in the requested direction to build a value-to-rank map, then walk the rows in order copying each and looking up its rank.
sample_solution: |
  def window_rank(job):
      rows = job["rows"]
      gb = job["group_by"]
      val = job["value"]
      desc = job.get("descending", False)

      distinct = {}
      for r in rows:
          distinct.setdefault(r[gb], set()).add(r[val])

      rank_of = {}
      for group, values in distinct.items():
          ordered = sorted(values, reverse=desc)
          rank_of[group] = {v: i + 1 for i, v in enumerate(ordered)}

      out = []
      for r in rows:
          new = dict(r)
          new["rank"] = rank_of[r[gb]][r[val]]
          out.append(new)
      return out
hints:
  - level: 1
    text: Dense rank counts distinct values, so first gather the set of unique values in each group rather than working from the raw rows.
  - level: 2
    text: Sort each group's distinct values (reverse=True when descending) and turn that ordering into a dict mapping value to rank, where the first value is rank 1.
  - level: 3
    text: Because ties must share a rank and you build ranks from a set of distinct values, equal scores automatically map to the same number. Finally copy each row in input order and attach its looked-up rank.
