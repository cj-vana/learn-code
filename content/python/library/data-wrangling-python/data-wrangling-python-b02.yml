explanation_markdown: |
  Dense ranking is a window function: each row's rank depends on the other rows in
  its group, not on the table as a whole. The clean way to compute it is in two
  passes. First, reduce each group to the **set** of its distinct values -- using a
  set is what bakes in the "ties share a rank" rule, because duplicates collapse
  before you ever assign a number. Second, sort each group's distinct values in
  the requested direction and enumerate them, so position zero becomes rank 1,
  position one becomes rank 2, and so on with no gaps.

  With those per-group lookup tables built, the final pass is a straight walk over
  the original rows: copy each row, attach `rank_of[group][value]`, and append. Two
  properties fall out for free. Because you never reorder `rows`, the output
  preserves input order exactly as required. And because you copy each row with
  `dict(r)` before adding `"rank"`, the caller's original dictionaries are left
  untouched. The `descending` flag only flips the sort direction; everything else
  is identical, which is why the same code handles "highest is best" and "lowest
  is best" scoreboards.
common_mistakes:
  - Ranking from the raw values instead of the distinct set, producing gap-style ranks like 1, 1, 3 rather than dense 1, 1, 2.
  - Sorting or emitting the rows in ranked order, which loses the required original input order.
  - Mutating the input rows by adding "rank" in place instead of copying each row first.
  - Ranking across the whole table instead of within each group, so a project is compared against other categories.
