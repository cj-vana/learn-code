prompt_markdown: |
  A regional science fair scores every project and judges each **category**
  separately. The organizers want a leaderboard column: within a project's own
  category, what rank did its score earn? They use **dense ranking**, where ties
  share a rank and the next distinct score takes the very next number, with no
  gaps. So scores of 90, 90, 85 rank as 1, 1, 2 -- not 1, 1, 3.

  Write `window_rank(job)` that takes **one dictionary**:

  - `"rows"`: a list of dictionaries (the project records). Every row has the same
    string keys.
  - `"group_by"`: the field name that defines a category.
  - `"value"`: the field name holding the numeric score to rank by.
  - `"descending"`: a boolean (may be omitted, in which case treat it as `false`).

  For each row, compute the dense rank of its `value` **among the distinct values
  in its own group**. When `"descending"` is `true`, the **highest** score gets
  rank 1; when it is `false` (or absent), the **lowest** score gets rank 1.

  Return a **new list of rows in the original input order**. Each returned row is a
  copy of the input row plus one extra key, `"rank"`, holding its integer dense
  rank. Do not reorder the rows and do not mutate the input rows. An empty `rows`
  list returns `[]`.

  Example:

  ```python
  window_rank({
      "rows": [
          {"team": "red", "score": 10},
          {"team": "red", "score": 20},
          {"team": "blue", "score": 5},
          {"team": "red", "score": 20},
          {"team": "blue", "score": 15},
      ],
      "group_by": "team",
      "value": "score",
      "descending": True,
  })
  # red's distinct scores 20, 10 rank as 1, 2; blue's 15, 5 rank as 1, 2
  # -> [
  #   {"team": "red",  "score": 10, "rank": 2},
  #   {"team": "red",  "score": 20, "rank": 1},
  #   {"team": "blue", "score": 5,  "rank": 2},
  #   {"team": "red",  "score": 20, "rank": 1},
  #   {"team": "blue", "score": 15, "rank": 1},
  # ]
  ```
