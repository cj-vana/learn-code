      expected: {"A": {"min": 1, "max": 5, "total": 6}, "B": {"min": 2, "max": 6, "total": 8}, "C": {"min": 8, "max": 8, "total": 8}}
    - name: float_values
      input: {"rows": [{"orchard": "Fig", "kilos": 2.5}, {"orchard": "Fig", "kilos": 1.5}], "key": "orchard", "value": "kilos"}
      expected: {"Fig": {"min": 1.5, "max": 2.5, "total": 4.0}}
explanation_markdown: |
  A single running number cannot carry a min, a max, and a total at once, so each
  bucket holds a small summary dictionary instead. The tricky part is min and max:
  unlike a sum, they have no neutral starting value, since seeding at `0` would be
  wrong whenever every value is above or below zero. Seeding each summary from the
  *first* row in its group sidesteps that entirely - the first value is trivially
  its own min, max, and total, and every later row just folds in with `min`,
  `max`, and addition.

  This is one pass over the rows with O(1) work per row, so it stays linear even
  though it tracks three aggregates at once.
common_mistakes:
  - Initialising min to 0 (or max to 0), which is wrong whenever all values are positive or all negative.
  - Recomputing min or max by rescanning the group each time instead of folding the current value in.
  - Returning min and max but forgetting to keep the running total updated on every row.
