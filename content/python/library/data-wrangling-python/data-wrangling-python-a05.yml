function_name: harvest_stats
input_mode: function
solution_sketch: Seed each orchard's summary from its first row, then fold later rows in with min, max, and running addition.
sample_solution: |
  def harvest_stats(payload):
      rows = payload["rows"]
      key = payload["key"]
      value = payload["value"]
      stats = {}
      for row in rows:
          group = row[key]
          v = row[value]
          if group not in stats:
              stats[group] = {"min": v, "max": v, "total": v}
          else:
              summary = stats[group]
              summary["min"] = min(summary["min"], v)
              summary["max"] = max(summary["max"], v)
              summary["total"] = summary["total"] + v
      return stats
hints:
  - level: 1
    text: There is no safe starting value for a minimum, so seed each orchard's summary from the first row that lands in it.
  - level: 2
    text: On the first sighting set min, max, and total all to that row's value; on later sightings fold the new value in.
  - level: 3
    text: For an existing orchard, update summary["min"] with min(...), summary["max"] with max(...), and add the value to summary["total"].
