prompt_markdown: |
  An orchard co-op logs every crate picked as a flat list of records. Each record
  names the orchard it came from and how many crates it holds. The co-op wants a
  per-orchard summary: the smallest haul, the largest haul, and the running total.

  Write `harvest_stats(payload)` that takes a single dictionary with three keys:

  - `"rows"`: a list of pick dictionaries.
  - `"key"`: the field naming the orchard to group by.
  - `"value"`: the field holding the numeric crate count.

  Return a dictionary that maps each distinct orchard to a summary dictionary with
  exactly these keys:

  - `"min"`: the smallest value seen for that orchard.
  - `"max"`: the largest value seen for that orchard.
  - `"total"`: the sum of all values for that orchard.

  You may assume both `"key"` and `"value"` are present in every row and that the
  value is a number.

  Edge cases the tests cover:

  - An empty `"rows"` list returns an empty dictionary `{}`.
  - An orchard seen once has that single value as its `"min"`, `"max"`, and `"total"`.

  Example:

  ```python
  harvest_stats({
      "rows": [{"orchard": "Elm", "crates": 7}, {"orchard": "Oak", "crates": 3}, {"orchard": "Elm", "crates": 5}],
      "key": "orchard",
      "value": "crates",
  })
  # -> {"Elm": {"min": 5, "max": 7, "total": 12}, "Oak": {"min": 3, "max": 3, "total": 3}}
  ```
starter_code: |
  def harvest_stats(payload):
