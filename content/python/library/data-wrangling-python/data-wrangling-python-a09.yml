explanation_markdown: |
  Pivoting from long to wide is a grouping problem with two levels of key. The
  outer key is the index value and the inner key is the column value, so a nested
  dictionary is the natural container. `setdefault(index_value, {})` gives you the
  inner dictionary whether the station is new or already seen, which is the same
  get-or-create move you use for any grouped accumulator.

  Because the cell is a plain assignment rather than an accumulation, a later row
  targeting the same (index, column) pair simply overwrites the earlier value,
  matching the last-write-wins rule. The whole reshape is one linear pass over the
  log, and lookups in the resulting table are O(1) at both levels.
common_mistakes:
  - Reinitialising the inner dictionary on every row (index_value = {}), which discards all earlier cells for that station.
  - Appending values into a list instead of assigning, so duplicates accumulate rather than overwrite.
  - Swapping the index and column fields, which transposes the table into the wrong orientation.
