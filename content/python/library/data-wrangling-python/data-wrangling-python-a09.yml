prompt_markdown: |
  A weather network records readings as a long log: one row per station per hour.
  Analysts want that reshaped into a **station-by-hour table** so they can look up
  a single station's row and scan across the hours.

  Write `pivot(payload)` that takes **one dictionary** with four entries:

  - `"rows"`: a list of dictionaries (the long log).
  - `"index"`: the field name whose values become the outer keys (one row per station).
  - `"column"`: the field name whose values become the inner keys (the hours).
  - `"value"`: the field name holding the cell value.

  Example call:

  ```python
  pivot({
      "rows": [{"station": "north", "hour": 9, "reading": 12}],
      "index": "station",
      "column": "hour",
      "value": "reading",
  })
  # -> {"north": {9: 12}}
  ```

  Return a **nested dictionary** of the form `{index_value: {column_value: value}}`.
  Each log row contributes one cell: under its index value, set the column value
  to its cell value. If two rows land in the same (index, column) cell, the
  **later** row in the list overwrites the earlier one. If `rows` is empty, return
  an empty dictionary.
starter_code: |
  def pivot(payload):
      return {}
function_name: pivot
input_mode: function
solution_sketch: Walk the rows once; for each, use setdefault on the index value to get or create its inner dict, then assign the cell value under the column value so later rows overwrite earlier ones.
sample_solution: |
  def pivot(payload):
      rows = payload["rows"]
      index = payload["index"]
      column = payload["column"]
      value = payload["value"]
      table = {}
      for row in rows:
          inner = table.setdefault(row[index], {})
          inner[row[column]] = row[value]
      return table
hints:
  - level: 1
    text: The outer dictionary maps each index value to an inner dictionary that maps column values to cell values.
  - level: 2
    text: Use table.setdefault(index_value, {}) so the first row for a station creates its inner dict and later rows reuse it.
  - level: 3
    text: Plain assignment inner[column_value] = value naturally lets a later duplicate overwrite the earlier cell, which is exactly the rule.
