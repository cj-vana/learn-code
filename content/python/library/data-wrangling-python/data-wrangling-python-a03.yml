function_name: latest_rsvp
input_mode: function
solution_sketch: Track first-seen key order in a list and the latest row per key in a dict, then rebuild the result from the order list.
sample_solution: |
  def latest_rsvp(payload):
      rows = payload["rows"]
      key = payload["key"]
      order = []
      latest = {}
      for row in rows:
          k = row[key]
          if k not in latest:
              order.append(k)
          latest[k] = row
      return [latest[k] for k in order]
hints:
  - level: 1
    text: You need two things per key - when it first appeared, and the most recent row for it. Keep them in separate structures.
  - level: 2
    text: Append a key to an order list only the first time you see it, but overwrite its stored row every time so the last row wins.
  - level: 3
    text: After the loop, build the result by reading latest[k] for each k in the order list to preserve first-appearance order.
tests:
  public:
    - name: empty_log
      input: {"rows": [], "key": "guest"}
      expected: []
    - name: no_duplicates
      input: {"rows": [{"guest": "Ada", "status": "yes"}, {"guest": "Ben", "status": "no"}], "key": "guest"}
      expected: [{"guest": "Ada", "status": "yes"}, {"guest": "Ben", "status": "no"}]
    - name: last_wins
      input: {"rows": [{"guest": "Ada", "status": "yes"}, {"guest": "Ben", "status": "no"}, {"guest": "Ada", "status": "maybe"}], "key": "guest"}
      expected: [{"guest": "Ada", "status": "maybe"}, {"guest": "Ben", "status": "no"}]
  validation:
