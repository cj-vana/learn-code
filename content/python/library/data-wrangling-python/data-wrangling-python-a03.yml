prompt_markdown: |
  Guests keep re-replying to a community hall invitation, so the RSVP log has
  several rows for some people. The rule is simple: the **last** reply a guest
  sends is the one that counts, and the final list should appear in the order
  guests **first** turned up in the log.

  Write `latest_rsvp(payload)` that takes a single dictionary with two keys:

  - `"rows"`: a list of RSVP dictionaries, in the order they arrived.
  - `"key"`: the field name that identifies a guest.

  Return a list with **one row per distinct key value**, keeping the **last**
  row seen for that key, ordered by when each key **first** appeared in the input.

  Edge cases the tests cover:

  - An empty `"rows"` list returns an empty list.
  - When there are no duplicates, the rows come back in their original order.

  Example:

  ```python
  latest_rsvp({
      "rows": [
          {"guest": "Ada", "status": "yes"},
          {"guest": "Ben", "status": "no"},
          {"guest": "Ada", "status": "maybe"},
      ],
      "key": "guest",
  })
  # -> [{"guest": "Ada", "status": "maybe"}, {"guest": "Ben", "status": "no"}]
  ```
starter_code: |
