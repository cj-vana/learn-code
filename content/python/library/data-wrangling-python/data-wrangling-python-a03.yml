      expected: [{"guest": "Ada", "seat": 5}, {"guest": "Ben", "seat": 9}, {"guest": "Cy", "seat": 3}]
    - name: first_appearance_order
      input: {"rows": [{"guest": "Zoe", "status": "yes"}, {"guest": "Amy", "status": "maybe"}, {"guest": "Zoe", "status": "no"}], "key": "guest"}
