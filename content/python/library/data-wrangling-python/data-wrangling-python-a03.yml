      expected: [{"table": "T1", "note": "c"}, {"table": "T2", "note": "b"}]
explanation_markdown: |
  Deduplication is an indexing problem: derive each row's key and decide what to
  do on a collision. Keeping the *last* occurrence is the easy part - just
  overwrite the stored row every time you meet the key. The subtlety is the output
  order. Iterating the dictionary would order by insertion, which happens to be
  first-appearance here, but relying on that couples correctness to an incidental
  detail. Recording first-seen order in an explicit `order` list states the intent
  outright and stays robust.

  One pass builds both structures, and a final pass rebuilds the list, so the work
  is linear in the number of rows.
common_mistakes:
  - Keeping the first occurrence instead of overwriting, so later replies are ignored.
  - Appending to the order list every time the key is seen, which produces duplicate entries in the result.
  - Returning latest.values() and assuming its order, instead of following the recorded first-appearance order.
