  - id: q3
    prompt: |
      What does this print?

          items = [1, 2, 3]
          print(items[1:99])
    choices:
      - '[2, 3]'
      - IndexError
      - '[2, 3, None]'
      - '[1, 2, 3]'
    correct_choice: '[2, 3]'
    explanation: |
      Slicing clamps to the available range instead of raising, so a stop far past
      the end simply returns everything from index 1 onward.
    concepts:
      - python.slicing
      - python.lists
