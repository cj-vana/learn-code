    choices:
      - bd
      - bce
      - bcd
      - ace
    correct_choice: bd
    explanation: |
      Start at index 1 (`b`), stop before index 5, stepping by 2: positions 1 and
      3 give `b` and `d`.
    concepts:
      - python.slicing
