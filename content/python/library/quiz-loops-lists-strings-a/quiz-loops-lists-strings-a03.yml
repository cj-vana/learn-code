  - id: q2
    prompt: |
      What does this print?

          word = "banana"
          print(word.count("a"))
    choices:
      - '3'
      - '2'
      - '6'
      - '1'
    correct_choice: '3'
    explanation: |
      `str.count` returns how many non-overlapping times the substring appears.
      `banana` contains the letter `a` at three positions.
    concepts:
      - python.strings
  - id: q3
    prompt: |
      What does this print?

          letters = ['a', 'b', 'c', 'd']
          print(letters[-2])
    choices:
      - c
      - d
      - b
      - a
    correct_choice: c
    explanation: |
      Negative indexing counts from the end: -1 is `d` and -2 is the second from
      last, `c`.
    concepts:
      - python.lists
      - python.slicing
