explanation_markdown: |
  Real test frameworks report three distinct outcomes, not two, and the difference
  matters. A **failure** is an assertion that came out false — the code ran and
  gave the wrong answer. An **error** is the code exploding before any assertion
  could be judged, which usually points at a different kind of bug (a crash, a bad
  import, a missing key). Collapsing errors into failures hides that signal. The
  ordering of the checks encodes the priority: test `raised` first, because once a
  check has thrown, its `expected`/`actual` values are meaningless. Appending names
  as you walk the log preserves run order, so the report reads in the same
  sequence the rig produced.
common_mistakes:
  - Comparing expected and actual before checking raised, so a crashed check with coincidentally equal values lands in passed.
  - Letting a name fall into two buckets by using separate if statements instead of if/elif/else.
  - Returning only passed and failed, dropping the errored bucket that distinguishes a crash from a wrong answer.
