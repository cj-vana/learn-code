prompt_markdown: |
  An overnight test rig runs a battery of checks and dumps a raw log. Your job is
  to turn that log into a tidy report with three buckets.

  Write `classify_outcomes(results)` where `results` is a **list** of record
  dicts. Each record has four keys:

  - `name` — the check's name (a string)
  - `expected` — the value the check should have produced
  - `actual` — the value it actually produced
  - `raised` — a boolean that is `True` when the check blew up with an exception
    before it could even compare the values

  Sort every record's `name` into one of three buckets, using this priority:

  - **errored** — any record whose `raised` is `True`, no matter what `expected`
    and `actual` are (an exploded check has no meaningful comparison).
  - **passed** — did not raise **and** `expected` equals `actual`.
  - **failed** — did not raise **and** `expected` differs from `actual`.

  Return a dict with exactly these keys: `{"passed": [...], "failed": [...],
  "errored": [...]}`, where each value is the list of names in that bucket, kept in
  the order they appear in the log. An empty log returns all three buckets empty.
starter_code: |
  def classify_outcomes(results):
      # Bucket each record's name into passed, failed, or errored.
      return {"passed": [], "failed": [], "errored": []}
function_name: classify_outcomes
input_mode: function
solution_sketch: Initialize the three-bucket report, loop over records, check raised first, then compare expected to actual, and append the name to the matching bucket.
sample_solution: |
  def classify_outcomes(results):
      report = {"passed": [], "failed": [], "errored": []}
      for record in results:
          if record["raised"]:
              report["errored"].append(record["name"])
          elif record["expected"] == record["actual"]:
              report["passed"].append(record["name"])
          else:
              report["failed"].append(record["name"])
      return report
hints:
  - level: 1
