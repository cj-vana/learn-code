prompt_markdown: |
  An old telephone switchboard has a fixed set of labelled paths a call can travel.
  A soak test ran overnight and recorded which paths were actually exercised. You
  need a coverage report: which paths were never touched.

  Write `coverage_gaps(job)` where `job` is a dict with two keys:

  - `branches` — the list of every branch label that exists (strings)
  - `hit` — the list of branch labels the soak test actually exercised

  Return a **sorted list** of the branch labels that appear in `branches` but were
  never in `hit` — the coverage gaps. Details that the tests check:

  - A branch counts as covered if its label appears anywhere in `hit`.
  - Duplicate labels in `branches` collapse to a single entry.
  - Labels in `hit` that are not real branches are logging noise and are ignored.
  - If every branch was hit, return an empty list.

  For `branches=["a", "b", "c"]` and `hit=["a", "c"]` the answer is `["b"]`.
starter_code: |
  def coverage_gaps(job):
      # Return the branch labels never present in hit, sorted ascending.
      return []
function_name: coverage_gaps
input_mode: function
solution_sketch: Turn both lists into sets, subtract the hit set from the branches set, and return the difference sorted.
sample_solution: |
  def coverage_gaps(job):
      branches = set(job["branches"])
      hit = set(job["hit"])
      return sorted(branches - hit)
hints:
  - level: 1
    text: A gap is a branch that exists but was never exercised — think about set difference.
  - level: 2
    text: Converting both lists to sets handles duplicate labels and lets you subtract the hit labels in one step.
  - level: 3
    text: Return sorted(set(job["branches"]) - set(job["hit"])); the subtraction naturally ignores hit labels that are not real branches.
tests:
  public:
    - name: one_gap
      input: {branches: [a, b, c], hit: [a, c]}
      expected: [b]
    - name: all_covered
      input: {branches: [a, b], hit: [a, b]}
      expected: []
    - name: none_covered
      input: {branches: [x, y, z], hit: []}
      expected: [x, y, z]
  validation:
    - name: sorted_output
      input: {branches: [north, east, south, west], hit: [east, west]}
      expected: [north, south]
    - name: noise_in_hit
      input: {branches: [a, b], hit: [a, q, z]}
      expected: [b]
    - name: duplicate_branches
      input: {branches: [a, a, b], hit: [b]}
      expected: [a]
    - name: empty_branches
      input: {branches: [], hit: [a]}
