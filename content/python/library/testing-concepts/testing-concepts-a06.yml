    - name: label_string_sort
      input: {branches: ["line-3", "line-1", "line-2"], hit: ["line-2"]}
      expected: ["line-1", "line-3"]
explanation_markdown: |
  Coverage is the flip side of a passing suite: a run can be all green and still
  leave whole paths unexercised, and those untouched paths are where bugs hide
  unseen. The report you want is a set difference — everything in the universe of
  `branches` minus everything the tests actually `hit`. Using sets makes the intent
  obvious and gives you dedup and "ignore unknown labels" for free: subtracting a
  set only removes elements that are present, so stray labels in `hit` simply do
  not affect the result. Sorting the leftover gives a stable, readable report a
  reviewer can scan top to bottom.
common_mistakes:
  - Iterating branches and checking membership in a list instead of a set, which still works but misses the clean set-difference framing and rescans hit every time.
  - Forgetting to sort, returning gaps in an arbitrary set-iteration order that is hard to review.
  - Counting a label in hit that is not a real branch as reducing coverage, or letting duplicate branch labels appear twice in the output.
