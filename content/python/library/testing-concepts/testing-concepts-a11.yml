      return []
function_name: diff_report
input_mode: function
solution_sketch: Walk the expected keys to emit "missing" or value-mismatch strings, walk the actual keys to emit "unexpected" strings, then return the list sorted.
sample_solution: |
  def diff_report(job):
      expected = job["expected"]
      actual = job["actual"]
      diffs = []
      for key in expected:
          if key not in actual:
              diffs.append(f"{key}: missing")
          elif expected[key] != actual[key]:
              diffs.append(f"{key}: expected {expected[key]}, got {actual[key]}")
      for key in actual:
          if key not in expected:
              diffs.append(f"{key}: unexpected")
      return sorted(diffs)
