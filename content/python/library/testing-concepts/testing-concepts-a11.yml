explanation_markdown: |
  A useful equality assertion does not just fail -- it explains *why*. Building the
  diff means partitioning the keys into three buckets. Looping over `expected` finds
  channels that are `missing` from `actual` (a key that should be there is not) and
  channels whose values disagree; a second loop over `actual` finds `unexpected`
  channels (a key that should not be there is). Channels that appear in both with
  equal values contribute nothing, which is why the identical-preset case yields an
  empty list. Formatting the values with `str()` via an f-string keeps the message
  readable, and sorting the finished list makes the report deterministic -- crucial
  for a test, since dictionaries give no ordering guarantee you would want to depend
  on and an unstable report would make failures flap. Splitting the work into an
  expected-side pass and an actual-side pass keeps each of the three cases in exactly
  one place, so none is double-counted.
common_mistakes:
  - Reporting a "missing" key as a value mismatch (or crashing with a KeyError) by reading actual[key] before checking that the key is present.
  - Returning the strings in dictionary-iteration order instead of sorting them, making the report non-deterministic across runs.
  - Deviating from the exact wording or punctuation (for example "got" vs "actual", or dropping the comma), so the strings no longer match.
