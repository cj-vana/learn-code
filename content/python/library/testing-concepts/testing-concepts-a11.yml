prompt_markdown: |
  When a test asserts that two dictionaries are equal and they are not, a bare
  "not equal" is useless -- what you want is a **diff** that names each disagreeing
  key. You are building that report for a lighting desk, comparing the preset the
  operator **expected** against the preset the board **actually** produced.

  Write `diff_report(job)` where `job` is a dict with:

  - `expected`: the intended preset, a dict mapping channel names to values.
  - `actual`: the preset the board actually holds, a dict mapping channel names to
    values.

  Produce a list of difference strings, one per problem channel, using these **exact**
  formats:

  - A channel present in both but with different values:
    `"<key>: expected <e>, got <a>"`, where `<e>` and `<a>` are the expected and
    actual values written with Python's `str()` (so the integer `50` prints as `50`).
  - A channel in `expected` but missing from `actual`:
    `"<key>: missing"`.
  - A channel in `actual` that was not expected:
    `"<key>: unexpected"`.

  Channels whose values match produce no string. Return the list **sorted in
  ascending (lexicographic) order**. If the two presets are identical, return an
  empty list.

  For example, `{"expected": {"brightness": 50, "warmth": 30}, "actual":
  {"brightness": 50, "hue": 10}}` returns `["hue: unexpected", "warmth: missing"]`.
starter_code: |
  def diff_report(job):
