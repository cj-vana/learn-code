prompt_markdown: |
  When a whole shipment fails inspection, the inspector wants the **shortest run of
  crates, taken from the front of the line, that still contains the one bad crate**.
  Shrinking the failing case down to a minimal reproducer like this is a core
  testing habit: a smaller failing example is far easier to reason about than the
  full batch.

  Write `shrink_case(job)` where `job` is a dict with:

  - `items`: the crates in inspection order (a list).
  - `bad_item`: the value of the crate known to fail inspection.

  Return the smallest **prefix** of `items` (a leading slice `items[:n]`) that still
  contains `bad_item`. Concretely, that is everything up to and including the
  **first** occurrence of `bad_item`. Rules for the edges:

  - If `bad_item` is at the front, the prefix is just that one crate.
  - If `bad_item` appears more than once, stop at the first occurrence -- a shorter
    prefix already reproduces the failure.
  - If `bad_item` does **not** appear in `items` at all, no prefix contains it, so
    return an empty list.

  For example, `{"items": [10, 20, 30, 40], "bad_item": 30}` returns `[10, 20, 30]`.
  Return a list.
starter_code: |
  def shrink_case(job):
      # Return items up to and including the first occurrence of bad_item.
      return []
function_name: shrink_case
input_mode: function
solution_sketch: Scan for the first index whose value equals bad_item and return the slice through that index; if none matches, return an empty list.
sample_solution: |
  def shrink_case(job):
      items = job["items"]
      bad = job["bad_item"]
      for i, item in enumerate(items):
          if item == bad:
              return items[:i + 1]
      return []
