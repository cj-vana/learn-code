explanation_markdown: |
  This is a stripped-down version of *test-case minimization*: given a failing
  input, find a smaller input that still fails. Here "smaller" means "a shorter
  leading run of crates", and "still fails" means "still contains the bad crate".
  Because a prefix must start at the front, the shortest one that includes the bad
  crate has to end at that crate's **first** occurrence -- stopping at any later
  duplicate would only make the reproducer longer, and stopping earlier would drop
  the failure entirely. Scanning left to right and returning `items[:i + 1]` at the
  first hit captures exactly that boundary. When the bad crate is absent, there is
  no prefix that reproduces the failure, so the honest result is the empty list
  rather than the whole batch. Real shrinkers repeat this narrowing many times; the
  single-pass version here isolates the key idea of finding the minimal failing
  slice.
common_mistakes:
  - Returning the slice through the last occurrence instead of the first, producing a longer prefix than necessary.
  - Using items[:i] instead of items[:i + 1], which drops the bad crate itself from the reproducer.
  - Returning the full list (or the crates after the bad one) when bad_item is missing, instead of an empty list.
