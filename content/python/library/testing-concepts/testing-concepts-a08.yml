  validation:
    - name: empty_pair
      input: {records: [], decoded: []}
      expected: []
    - name: all_mismatch
      input: {records: [1, 2], decoded: [3, 4]}
      expected: [0, 1]
    - name: first_only
      input: {records: [7, 8, 9], decoded: [0, 8, 9]}
      expected: [0]
    - name: last_only
      input: {records: ['p', 'q'], decoded: ['p', 'z']}
      expected: [1]
explanation_markdown: |
  A roundtrip test asserts an invariant -- `decode(encode(x)) == x` -- rather than
  checking a single expected answer, which makes it a strong, reusable property:
  it holds for *any* record, so you can throw many inputs at it. Here the encode
  and decode have already run, so the check reduces to a position-by-position
  comparison of two parallel lists. Iterating the index range and keeping only the
  mismatches gives you a precise failure report: not just "something broke" but
  exactly which slots to investigate. Iterating with `range(len(records))` keeps the
  result ascending for free, and an empty input naturally yields an empty report
  because there is nothing to compare. Returning the offending indices, instead of
  a bare `True`/`False`, is what turns a pass/fail check into an actionable one.
common_mistakes:
  - Returning a boolean or the mismatched values instead of the list of indices the prompt asks for.
  - Comparing the lists with `==` as a whole, which tells you *that* they differ but not *where*.
  - Building the indices out of order (for example by scanning from the end) so the returned list is not ascending.
