prompt_markdown: |
  A records office is rehearsing its disaster plan: every document is **archived**
  (encoded to a compact form) and then **restored** (decoded back). The property
  that must hold is a *roundtrip*: whatever you archive should come back byte-for-byte
  when you restore it. If a restored record does not match the original, that slot
  was corrupted somewhere in the pipeline and needs investigating.

  Write `roundtrip_ok(job)` where `job` is a dict with two parallel, equal-length
  lists:

  - `records`: the original documents, in order.
  - `decoded`: what came back after archiving then restoring each one, in the same
    order.

  Return a list of the **indices** where the roundtrip failed -- that is, every
  position `i` where `decoded[i]` is not equal to `records[i]` -- in ascending
  order. A perfect roundtrip returns an empty list. The two lists always have the
  same length, so an empty pair of lists returns an empty list too.

  For example, `{"records": [1, 2, 3], "decoded": [1, 9, 3]}` returns `[1]`, because
  only position 1 differs.
starter_code: |
  def roundtrip_ok(job):
      # Return the ascending indices where decoded[i] != records[i].
      return []
function_name: roundtrip_ok
input_mode: function
solution_sketch: Walk the shared index range and collect each i where decoded[i] differs from records[i]; iterating in range order already yields ascending indices.
sample_solution: |
  def roundtrip_ok(job):
      records = job["records"]
      decoded = job["decoded"]
      return [i for i in range(len(records)) if decoded[i] != records[i]]
hints:
  - level: 1
    text: The roundtrip property is per position, so compare records[i] with decoded[i] one index at a time.
  - level: 2
    text: Collect the index i whenever the two values disagree; skip the ones that match.
  - level: 3
    text: Iterate i over range(len(records)) so the indices you append are already in ascending order, and return the collected list.
tests:
  public:
    - name: all_match_empty
      input: {records: ['a', 'b', 'c'], decoded: ['a', 'b', 'c']}
      expected: []
    - name: single_mismatch
      input: {records: [1, 2, 3], decoded: [1, 9, 3]}
      expected: [1]
    - name: two_mismatches
      input: {records: ['x', 'y', 'z', 'w'], decoded: ['x', 'Y', 'z', 'W']}
