      expected: false
explanation_markdown: |
  Idempotence is a *property*, not a single input-output pair: it says that for
  every record, applying the step twice equals applying it once. When you already
  have both the one-pass output (`once`) and the two-pass output (`twice`), the
  whole property collapses to a single comparison, `once == twice`. Python's list
  equality does the per-element work for you -- it returns `False` the moment any
  element differs or the lengths disagree, and `True` for two empty lists because
  there is nothing that could differ. This is exactly the shape of a good
  property-based test: pick the invariant ("a second pass is a no-op"), express it
  as a comparison, and let one check cover the entire sample instead of hand-writing
  an assertion per record.
common_mistakes:
  - Comparing against `values` instead of comparing `once` with `twice`; the raw input is only context and a clean step is not required to leave it unchanged.
  - Looping element by element and returning early on the first match instead of requiring every element to agree, which flips the logic.
  - Assuming an empty job is somehow invalid; two empty lists are equal, so the honest answer is True.
