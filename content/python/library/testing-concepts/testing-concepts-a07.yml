prompt_markdown: |
  A data-cleaning pipeline runs a normalizing step over each raw record before the
  records are stored. A cleaning step is **idempotent** when running it a second
  time changes nothing: cleaning an already-clean value leaves it identical. This
  is a property worth testing, because a pipeline that keeps mutating "clean" data
  on every pass is a bug waiting to happen.

  A trustworthy whitespace normalizer, for instance, collapses each run of spaces
  to one and trims the ends, so `"  a  b  "` becomes `"a b"`, and cleaning `"a b"`
  again still gives `"a b"` -- idempotent. A buggy step that strips only one
  leading space per pass turns `"   go"` into `"  go"` and then `" go"` -- not
  idempotent.

  Write `idempotency_check(job)` where `job` is a dict with three parallel lists:

  - `values`: the raw records before cleaning (kept in the job for context).
  - `once`: each record after the cleaning step ran **once**.
  - `twice`: each record after the cleaning step ran a **second** time on `once`.

  Return `True` if the step is idempotent over this sample -- that is, if `once`
  and `twice` are exactly equal -- and `False` otherwise. Two empty lists count as
  equal, so an empty job returns `True`. You only need `once` and `twice` to decide;
  `values` is there so a reviewer can see what went in.
starter_code: |
  def idempotency_check(job):
      # Idempotent means a second cleaning pass changes nothing.
      return False
function_name: idempotency_check
input_mode: function
solution_sketch: Idempotence over the sample means the second pass equalled the first, so compare job["once"] and job["twice"] directly and return the boolean.
sample_solution: |
  def idempotency_check(job):
      return job["once"] == job["twice"]
hints:
