explanation_markdown: |
  Boundary-value analysis is one of the highest-yield testing habits: bugs cluster
  at the edges of ranges, where an off-by-one flips an accept into a reject. The
  six probes cover one step below, exactly on, and one step above each boundary,
  so a gate that uses `<` where it meant `<=` gets caught. The dedup-and-sort step
  matters because when boundaries are close (or equal) the raw probes overlap, and
  a test set should list each distinct value once. Using a set to dedupe and
  `sorted` to order it is the idiomatic one-liner once the six values exist.
common_mistakes:
  - Returning the six raw probes without deduping, so close boundaries produce repeated values.
  - Forgetting to sort, leaving high's probes tangled around low's.
  - Only probing the boundary itself and skipping the just-below and just-above values that actually catch off-by-one bugs.
