prompt_markdown: |
  A helpdesk has a gate that accepts a ticket only when its age in days falls in
  the inclusive range `[low, high]`. The most valuable tests for a range like this
  probe the edges: just below each boundary, the boundary itself, and just above
  it. That gives the classic six-point set.

  Write `boundary_values(job)` where `job` is a dict with two integer keys, `low`
  and `high`. Build the six probes:

  ```
  low - 1, low, low + 1, high - 1, high, high + 1
  ```

  Some probes can coincide — for example when `high` equals `low`, or when the
  boundaries sit close together — so **remove duplicates** and return the probes
  as a list **sorted in ascending order**.

  For `low=10, high=20` the answer is `[9, 10, 11, 19, 20, 21]`. For `low=5,
  high=6` the six raw probes are `4, 5, 6, 5, 6, 7`, which dedupe and sort to
  `[4, 5, 6, 7]`. Boundaries may be zero or negative.
