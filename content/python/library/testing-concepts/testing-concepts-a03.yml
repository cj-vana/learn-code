function_name: boundary_values
input_mode: function
solution_sketch: Collect the six probe values in a list, drop duplicates with a set, and return sorted(set(...)).
sample_solution: |
  def boundary_values(job):
      low = job["low"]
      high = job["high"]
      probes = [low - 1, low, low + 1, high - 1, high, high + 1]
      return sorted(set(probes))
hints:
