explanation_markdown: |
  This is a test runner in miniature. The "system under test" is a fixed rule you
  already know (`2 * input`), and each case pairs an input with the answer someone
  asserted for it. Running the suite means applying the rule to every input and
  comparing against the recorded expectation, collecting one verdict per case in
  order. Real runners do exactly this loop — call the function, compare to the
  expected value, record pass or fail — just with more machinery around reporting.
  Keeping the results in input order is what lets a reader line each verdict up
  with the case that produced it.
common_mistakes:
  - Comparing input directly to expected instead of applying the 2 * input rule first.
  - Returning a single "pass"/"fail" for the whole suite rather than one entry per case.
  - Reordering or filtering the results so they no longer line up with the input cases.
