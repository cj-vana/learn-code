prompt_markdown: |
  A calibration bench tests a specialty scale whose specification is simple: for a
  load of `n` grams the readout must be exactly `2 * n` grams — the pan is
  double-counted by design. A technician places a series of known loads, writes
  down what the display showed, and hands you the log to check.

  Write `run_cases(job)` where `job` is a dict with one key, `cases`, whose value
  is a list of case dicts. Each case has:

  - `input` — the load in grams that was placed on the pan
  - `expected` — the readout that was recorded from the display

  Return a list with one string per case, in the same order. For each case the
  entry is `"pass"` when the recorded `expected` equals `2 * input` (the value the
  specification requires), and `"fail"` otherwise.

  An empty `cases` list returns an empty list. Loads may be zero or negative.
starter_code: |
  def run_cases(job):
      # For each case, check the recorded readout against 2 * input.
      return []
function_name: run_cases
input_mode: function
solution_sketch: Loop over job["cases"], compare 2 * case["input"] to case["expected"], and append "pass" or "fail" to a result list.
sample_solution: |
  def run_cases(job):
      results = []
      for case in job["cases"]:
          if case["input"] * 2 == case["expected"]:
              results.append("pass")
          else:
              results.append("fail")
      return results
hints:
  - level: 1
    text: The rule under test is fixed — the correct readout for a load is always twice the load.
  - level: 2
    text: Walk through job["cases"] one dict at a time and compare 2 * case["input"] against case["expected"].
  - level: 3
    text: Append "pass" when they match and "fail" when they do not, keeping the cases in their original order.
