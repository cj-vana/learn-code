prompt_markdown: |
  A workshop bought a second-hand sorting machine and refuses to trust it. Rather
  than reimplement the sort to compare against, you audit its output with the two
  properties that **every** correct ascending sort must satisfy at once:

  1. **Ordered** — the `result` is in non-decreasing order (each item is `<=` the
     next).
  2. **Permutation** — the `result` contains exactly the same values as the
     `original`, with the same counts. Nothing added, dropped, or changed.

  Write `is_sorted_permutation(job)` where `job` is a dict with two keys:

  - `original` — the list of integers fed into the machine
  - `result` — the list the machine handed back

  Return `True` only when **both** properties hold, and `False` otherwise.

  Note that each property alone is not enough: `[1, 3, 2]` is a permutation of
  `[3, 1, 2]` but is not ordered, and `[1, 2]` is ordered but is not a permutation
  of `[3, 1, 2]` because a value was dropped. Duplicates must be counted, so a
  `result` of `[1, 1, 2]` is not a valid sort of `[2, 2, 1]`. Two empty lists
  return `True`.
starter_code: |
  def is_sorted_permutation(job):
      # Return True only if result is non-decreasing AND a permutation of original.
      return False
function_name: is_sorted_permutation
input_mode: function
solution_sketch: Check non-decreasing order with a pairwise comparison, check the permutation property by comparing sorted(original) to sorted(result), and require both.
sample_solution: |
  def is_sorted_permutation(job):
      original = job["original"]
      result = job["result"]
      is_ordered = all(result[i] <= result[i + 1] for i in range(len(result) - 1))
      same_items = sorted(original) == sorted(result)
      return is_ordered and same_items
hints:
  - level: 1
    text: Neither property is sufficient by itself — a list can be ordered but missing values, or hold the right values in the wrong order.
  - level: 2
    text: For ordering, compare each element to the one after it; for the permutation check, two lists are permutations exactly when their sorted forms are equal.
  - level: 3
    text: Combine all(result[i] <= result[i + 1] for i in range(len(result) - 1)) with sorted(original) == sorted(result) using and.
tests:
  public:
    - name: correct_sort
      input: {original: [3, 1, 2], result: [1, 2, 3]}
