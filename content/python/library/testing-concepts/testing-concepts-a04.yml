      expected: true
explanation_markdown: |
  This is a property-based oracle: instead of knowing the one right answer, you
  assert invariants that any correct implementation must preserve. For sorting,
  "ordered" and "same multiset" together are exactly the definition, which is why
  the pair catches every kind of bug — a sort that loses elements fails the
  permutation check, and a sort that leaves things jumbled fails the order check.
  Comparing `sorted(original)` to `sorted(result)` is a compact way to test the
  permutation property because equal sorted forms mean identical values and
  counts. Testing a black box by its guaranteed properties, rather than a single
  expected output, is a powerful technique when reference answers are hard to
  produce.
common_mistakes:
  - Checking only that the result is ordered and forgetting it might have dropped or invented values.
  - Using set(original) == set(result), which ignores duplicate counts and wrongly accepts [1, 1, 2] for [2, 2, 1].
  - Indexing result[i + 1] past the end instead of stopping the order check at the second-to-last element.
