explanation_markdown: |
  The whole job of an assertion is to make a pass silent-ish and a failure loud
  and precise. Equality with `==` decides the verdict; the interesting part is the
  message. Using `repr` (via `!r`) instead of `str` is deliberate: it quotes
  strings so an empty string or a stray space is visible, and it shows `None`,
  `True`, and list structure unambiguously. Real frameworks like `pytest` lean on
  the same idea — the diff you read is a repr of both sides, which is why a
  mismatched `'5'` (string) and `5` (int) look different on screen even though
  they print the same with `str`.
common_mistakes:
  - Formatting with str() or a bare f-string so string values lose their surrounding quotes and become ambiguous.
  - Swapping the order and printing the actual value where the expected one belongs.
  - Returning True/False or printing instead of returning the required "pass" string and message.
