prompt_markdown: |
  Every test framework is built on one tiny brick: a helper that compares what a
  check produced against what it should have produced. You are writing that brick
  for a repair bench's home-grown test rig.

  Write `check_expectation(job)` where `job` is a dict with two keys:

  - `actual` — the value the code under test actually produced
  - `expected` — the value it was supposed to produce

  If the two values are equal, return the string `"pass"`.

  If they differ, return a failure message in exactly this shape:

  ```
  expected <e>, got <a>
  ```

  where `<e>` and `<a>` are the **repr** forms of `expected` and `actual` (what
  Python's `repr()` prints). That means a string like `yes` shows up quoted as
  `'yes'`, the integer `5` shows up as `5`, `True` as `True`, `None` as `None`,
  and a list `[1, 3]` as `[1, 3]`. So a mismatch of `expected=5, actual=4`
  returns `"expected 5, got 4"`, and `expected='yes', actual='no'` returns
  `"expected 'yes', got 'no'"`.

  The values can be ints, strings, booleans, lists, or `None`, and the two keys
  always compare with `==`.
starter_code: |
  def check_expectation(job):
      # Return "pass" when the values match, otherwise a repr-style message.
      return "pass"
function_name: check_expectation
input_mode: function
solution_sketch: Compare actual and expected; on a match return "pass", otherwise build the message with an f-string using the !r conversion on both values.
sample_solution: |
  def check_expectation(job):
      actual = job["actual"]
      expected = job["expected"]
      if actual == expected:
          return "pass"
      return f"expected {expected!r}, got {actual!r}"
hints:
  - level: 1
    text: Start with the equality check; only when the values differ do you need to build a message.
  - level: 2
    text: An f-string can format any value with its repr by adding the !r conversion, like f"{value!r}".
  - level: 3
    text: Return f"expected {expected!r}, got {actual!r}" in the mismatch branch so strings come out quoted and None prints as None.
