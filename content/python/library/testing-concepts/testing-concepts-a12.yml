explanation_markdown: |
  Flakiness is not visible in any single run -- you have to look at a test's history
  *across* runs. That means scanning column-by-column: fix a test index `t`, then
  gather every result `run[t]` produced over all the runs. A set is the natural tool,
  because you only care whether the test *ever* passed and *ever* failed, not how
  many times; if the set holds both `"pass"` and `"fail"`, the test is a gremlin. A
  test with a single-element set (`{"pass"}` or `{"fail"}`) is deterministic and
  therefore not flaky, which is why a lone run can never surface one -- there is no
  second data point to disagree with the first. Iterating `t` in ascending order
  makes the output sorted without an extra step, and guarding the empty-`runs` case
  keeps `runs[0]` from blowing up when there is nothing to scan. This column-wise,
  set-based view is exactly how a CI dashboard separates real failures from noise.
common_mistakes:
  - Scanning each run (row) independently instead of each test (column) across runs, which cannot detect a mix that only shows up over time.
  - Reading runs[0] to count tests without first handling an empty runs list, causing an IndexError.
  - Flagging tests that only ever failed as flaky; a consistent failure is a real bug, not an intermittent one.
