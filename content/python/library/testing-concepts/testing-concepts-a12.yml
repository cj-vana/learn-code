prompt_markdown: |
  A test bench runs the same suite over and over, hunting for **flaky** tests --
  the intermittent gremlins that pass on some runs and fail on others for no honest
  reason. A test that always passes is fine; one that always fails is a real,
  reproducible bug. The troublemakers are the ones that do **both** across the runs.

  Write `flaky_detector(runs)` where `runs` is a list of runs. Each run is a list of
  results for the suite, one entry per test, where each entry is the string `"pass"`
  or `"fail"`. Every run reports the same tests in the same positions, so `runs[r][t]`
  is the result of test `t` on run `r`.

  Return a **sorted** list of the test indices that are flaky -- the indices `t` for
  which, across all the runs, that test recorded **at least one `"pass"` and at least
  one `"fail"`**. Tests that were always `"pass"` or always `"fail"` are not flaky and
  are excluded.

  Edge cases: with fewer than two runs no test can be both, so the result is empty;
  if `runs` is empty, or the runs contain no tests, return an empty list.

  For example, `[["pass", "pass"], ["fail", "pass"]]` returns `[0]`, because test 0
  passed once and failed once while test 1 always passed.
starter_code: |
  def flaky_detector(runs):
      # Return the sorted indices of tests that both passed and failed across runs.
      return []
function_name: flaky_detector
input_mode: function
solution_sketch: For each test column, gather the set of results seen across all runs and keep the index when that set contains both "pass" and "fail".
sample_solution: |
  def flaky_detector(runs):
      if not runs:
          return []
      num_tests = len(runs[0])
      flaky = []
      for t in range(num_tests):
          seen = {run[t] for run in runs}
          if "pass" in seen and "fail" in seen:
              flaky.append(t)
      return flaky
