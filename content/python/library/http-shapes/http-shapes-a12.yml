explanation_markdown: |
  Translating a raw response into a structured error is the seam between the
  network layer and your application's own error handling. Instead of scattering
  status-code checks everywhere, one function classifies the failure once: it
  names the error, decides whether the caller should treat it as retryable, and
  produces a human-readable message. That summary is exactly what you would hand
  to an exception constructor before raising.

  Two edge cases make this deceptively tricky. First, a server can return the
  `"message"` field but leave it empty, so the code accepts it only when it is a
  non-empty string and otherwise synthesizes a stable default. Second, the body
  itself may be missing, so `response.get("body") or {}` guards against both an
  absent key and a `None` value before calling `.get` on it. Deriving
  `retryable` from the status keeps it consistent with the retry policy a client
  would apply next.
common_mistakes:
  - Returning the full error dict for `3xx` redirects instead of the bare no-error result with raise set to False.
  - Using the body's `"message"` even when it is an empty string, producing a blank, useless message.
  - Calling `.get` on a body that is missing or `None`, or marking `4xx` codes other than `429` as retryable.
