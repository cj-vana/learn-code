solution_sketch: Short-circuit on statuses below 400, otherwise map the status to a type name, pick the body message or a default, set retryable for 429 and 5xx, and assemble the summary dict.
sample_solution: |
  def response_to_error(response):
      status = response["status"]
      if status < 400:
          return {"raise": False}
      named = {
          400: "BadRequest",
          401: "Unauthorized",
          403: "Forbidden",
          404: "NotFound",
          409: "Conflict",
          429: "RateLimited",
      }
      if status in named:
          error_type = named[status]
      elif 400 <= status <= 499:
          error_type = "ClientError"
      else:
          error_type = "ServerError"
      body = response.get("body") or {}
      raw_message = body.get("message")
      if isinstance(raw_message, str) and raw_message:
          message = raw_message
      else:
          message = f"{error_type} ({status})"
      retryable = status == 429 or 500 <= status <= 599
      return {
          "raise": True,
          "type": error_type,
          "status": status,
          "message": message,
          "retryable": retryable,
      }
