  originality_notes: Original response-to-error mapper that classifies HTTP status codes into named error summaries with a retryable flag, framed around a bike-share dock API client.
prompt_markdown: |
  A city bike-share API returns JSON, and your client turns any failure response
  into a structured error summary that the rest of the program can act on (or
  raise). Write `response_to_error(response)` where `response` is a single dict:

  - `"status"`: the HTTP status code.
  - `"body"`: the decoded response body, a dict. This key may be absent; treat a
    missing body as an empty dict.

  Decide the result with these rules:

  - If `status` is below `400` (any success or redirect), there is no error:
    return `{"raise": False}` and nothing else.
  - Otherwise return a dict
    `{"raise": True, "type": <name>, "status": <status>,
    "message": <text>, "retryable": <bool>}`.
  - The error **type** name is chosen from the status code:
    - `400` -> `"BadRequest"`
    - `401` -> `"Unauthorized"`
    - `403` -> `"Forbidden"`
    - `404` -> `"NotFound"`
    - `409` -> `"Conflict"`
    - `429` -> `"RateLimited"`
    - any other code in `400`-`499` -> `"ClientError"`
    - any code in `500`-`599` -> `"ServerError"`
  - The **message** is the body's `"message"` field when it is present and is a
    non-empty string; otherwise use the default `"<type> (<status>)"`, for
    example `"ServerError (503)"`.
  - **retryable** is `True` only for status `429` or any `500`-`599` code, and
    `False` for every other error.

  Example: `{"status": 404, "body": {"message": "No dock with that id"}}`
  returns `{"raise": True, "type": "NotFound", "status": 404,
  "message": "No dock with that id", "retryable": False}`.
