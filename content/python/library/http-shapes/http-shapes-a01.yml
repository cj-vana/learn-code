explanation_markdown: |
  A query string is the part of a URL after the `?`. It is a flat list of
  `key=value` pairs separated by `&`, but the keys and values may contain
  characters that have special meaning inside a URL, so they must be
  percent-encoded first. `quote_plus` handles that: it turns spaces into `+`
  and escapes reserved bytes such as `&`, `=`, and `/` into `%NN` form so the
  receiver can split the string back apart unambiguously.

  Building the pieces into a list and calling `"&".join(pairs)` handles the
  separators for free, including the empty case where an empty dict yields an
  empty list and `"".join` returns `""`. The standard library's
  `urllib.parse.urlencode` does exactly this for you, but writing it by hand
  shows why encoding has to happen before you glue the pairs together.
common_mistakes:
  - Concatenating raw values without encoding, so a value containing `&` or `=` corrupts the query string.
  - Adding a leading `?` to the result; that separator belongs to the URL, not to the query string itself.
  - Joining with `,` or `;` instead of `&`, which no HTTP query parser will accept.
