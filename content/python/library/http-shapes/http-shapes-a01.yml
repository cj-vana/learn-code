prompt_markdown: |
  The harbor's booking service turns a dictionary of search filters into the
  `?key=value&key=value` query string that rides on the end of a URL. Write
  `build_query_string(params)` that takes a dict whose keys and values are all
  strings and returns that query string.

  Rules, matching how real HTTP clients encode a query:

  - Join each key and its value with `=`, and join the resulting pairs with `&`.
  - Emit the pairs in the dict's own insertion order.
  - Percent-encode both keys and values the way `urllib.parse.quote_plus` does:
    a space becomes `+`, and reserved characters are percent-escaped, so `&`
    becomes `%26`, `=` becomes `%3D`, and `/` becomes `%2F`.
  - An empty dict returns the empty string `""`.

  Examples:

  - `{"berth": "A12"}` returns `"berth=A12"`.
  - `{"q": "open slip"}` returns `"q=open+slip"`.
  - `{"free": "1", "max": "3"}` returns `"free=1&max=3"`.
starter_code: |
  from urllib.parse import quote_plus


  def build_query_string(params):
      return ""
function_name: build_query_string
input_mode: function
solution_sketch: Encode each key and value with quote_plus, join them with '=', then join all pairs with '&'.
sample_solution: |
  from urllib.parse import quote_plus


  def build_query_string(params):
      pairs = []
      for key, value in params.items():
          pairs.append(f"{quote_plus(key)}={quote_plus(value)}")
      return "&".join(pairs)
