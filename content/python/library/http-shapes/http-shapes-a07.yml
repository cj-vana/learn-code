explanation_markdown: |
  Response-shape validation is the boundary check that keeps bad data from
  flowing deeper into your program. The subtle part is that JSON `null` (Python
  `None`) is a value, so a naive `key in response` test would wrongly accept a
  field the server explicitly left empty. Treating `None` as missing captures
  the real intent: the caller needs usable data, not just a key.

  Using a set for the missing keys means a duplicated requirement collapses to a
  single entry, and sorting at the end gives a stable, order-independent report
  that is easy to assert against. The `ok` flag is derived from the missing list
  rather than tracked separately, so the two can never disagree.
common_mistakes:
  - Using only `key in response` and accepting fields whose value is `None`.
  - Treating falsy values like `0` or `""` as missing when only `None` should fail.
  - Returning the missing keys in the order encountered instead of sorted, or letting duplicates through.
