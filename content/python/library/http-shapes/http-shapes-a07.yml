prompt_markdown: |
  The Meridian Observatory hands out viewing slots through a small JSON API.
  Before your client code trusts a booking response, it checks that the response
  body carries every field the caller needs. Write
  `validate_response_shape(request)` where `request` is a single dict with two
  keys:

  - `"response"`: the decoded response body, a dict of field name to value.
  - `"required_keys"`: a list of field names the caller depends on.

  Return a dict `{"ok": <bool>, "missing": <list>}` using these rules:

  - A required key is **satisfied** only when it is present in `"response"` **and**
    its value is not `None`. A real API sometimes includes a key but sets it to
    JSON `null`; treat that as missing data.
  - A value that is falsy but not `None` (for example `0`, `""`, `[]`, or
    `False`) still counts as present and satisfied.
  - `"missing"` is the sorted (ascending) list of the required keys that are
    absent or `None`. Report each missing key at most once, even if
    `"required_keys"` lists it twice.
  - `"ok"` is `True` exactly when `"missing"` is empty.
  - Extra keys in `"response"` that are not required are ignored.
  - An empty `"required_keys"` list means every response passes: return
    `{"ok": True, "missing": []}`.

  Example: for a response `{"booking_id": 88, "slot": "north-ridge",
  "observer": None}` with required keys `["booking_id", "slot", "observer"]`,
  the answer is `{"ok": False, "missing": ["observer"]}`.
starter_code: |
  def validate_response_shape(request):
      return {"ok": True, "missing": []}
function_name: validate_response_shape
input_mode: function
solution_sketch: Read the response dict and required keys, collect any required key that is absent or maps to None into a set, then return the sorted missing list plus an ok flag.
sample_solution: |
  def validate_response_shape(request):
      response = request["response"]
      required = request["required_keys"]
      missing = set()
      for key in required:
          if key not in response or response[key] is None:
              missing.add(key)
      ordered = sorted(missing)
      return {"ok": not ordered, "missing": ordered}
hints:
  - level: 1
    text: A field only counts as present when the key exists AND its value is not None, so check both conditions for every required key.
  - level: 2
    text: Collect missing keys in a set to fold away duplicate entries in required_keys, then sort the set into a list.
  - level: 3
    text: For each key, if key not in response or response[key] is None, add it to the missing set; ok is True when the sorted missing list is empty.
