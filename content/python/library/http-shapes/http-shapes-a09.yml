explanation_markdown: |
  The `Authorization` header carries the client's credential, and different
  schemes shape that value differently. A Bearer token is passed through almost
  verbatim behind the `Bearer ` label, so the only real work is trimming
  accidental whitespace and refusing an empty token that would produce a
  meaningless header. Basic auth is more mechanical: the username and password
  are joined with a colon and base64-encoded, which is an encoding for transport,
  not encryption, so it protects nothing on its own and is only safe over HTTPS.

  Normalizing the scheme to lower-case up front keeps the branching honest, and
  returning `""` for both blank tokens and unknown schemes gives the caller a
  single, checkable "no header" signal instead of a malformed string.
common_mistakes:
  - Stripping the username or password before encoding, which corrupts credentials that legitimately contain spaces.
  - Forgetting to `.decode()` the base64 bytes, leaving a `b'...'` bytes object in the header value.
  - Comparing the scheme case-sensitively so `"BASIC"` or `"Bearer"` falls through to the unknown branch.
