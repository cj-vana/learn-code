function_name: build_auth_header
input_mode: function
solution_sketch: Lower-case the scheme, and for bearer strip the token and return a prefixed string (or empty if blank); for basic, base64-encode the "user:password" bytes and prefix with "Basic "; return empty for anything else.
sample_solution: |
  import base64


  def build_auth_header(request):
      scheme = request.get("scheme", "").lower()
      if scheme == "bearer":
          token = request.get("token", "").strip()
          if not token:
              return ""
          return "Bearer " + token
      if scheme == "basic":
          username = request.get("username", "")
          password = request.get("password", "")
          raw = f"{username}:{password}".encode()
          encoded = base64.b64encode(raw).decode()
          return "Basic " + encoded
      return ""
hints:
  - level: 1
    text: Normalize the scheme with .lower() first so "Bearer", "bearer", and "BASIC" all route to the same branch.
  - level: 2
    text: For bearer, strip the token and short-circuit to "" when it is blank; otherwise prefix it with "Bearer ".
  - level: 3
    text: For basic, build the string "username:password", call base64.b64encode on its .encode() bytes, decode back to str, and prefix with "Basic ". Return "" for any unrecognized scheme.
