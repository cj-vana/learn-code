prompt_markdown: |
  The Cartwright Archive exposes a catalog API, and your client must attach the
  right `Authorization` header value to each request. Write
  `build_auth_header(request)` where `request` is a single dict describing the
  credential. Return the header **value** string. The `"scheme"` key names the
  auth scheme and is matched **case-insensitively**.

  - Bearer tokens: `request = {"scheme": "bearer", "token": "<token>"}`. Strip
    surrounding whitespace from the token. If the token is empty after
    stripping, the credential is unusable, so return `""`. Otherwise return
    `"Bearer " + token`.
  - Basic auth: `request = {"scheme": "basic", "username": "<u>",
    "password": "<p>"}`. Join them as `"<u>:<p>"`, encode those bytes with
    standard base64, and return `"Basic " + <encoded>`. Do not strip the
    username or password; credentials are used exactly as given. Missing
    `"username"` or `"password"` is treated as an empty string. You may assume
    usernames never contain a colon.
  - Any other scheme (unknown or unsupported) returns `""`.

  Example: `{"scheme": "bearer", "token": "sky-9f2a"}` returns
  `"Bearer sky-9f2a"`. `{"scheme": "basic", "username": "curator",
  "password": "moonrise"}` returns `"Basic Y3VyYXRvcjptb29ucmlzZQ=="`.
starter_code: |
