explanation_markdown: |
  Layering configuration is a pattern that shows up far beyond query strings:
  defaults sit at the bottom, and each higher layer either overrides a value or
  removes it. Modeling "remove" as a `None` override is a common convention,
  because a caller needs a way to say "drop the sort parameter entirely" that is
  distinct from "set sort to some value."

  Copying the base dict before applying overrides is the quiet but important
  move here. Mutating the passed-in `"base"` would leak changes back to the
  caller and make the same defaults behave differently on a second call.
  `dict.pop(name, None)` deletes a key whether or not it exists, which keeps the
  removal branch a single line without a membership check.
common_mistakes:
  - Storing `None` as a parameter value instead of deleting the key when an override is `None`.
  - Mutating the `"base"` dict in place, which corrupts the shared defaults for later requests.
  - Assuming every override adds or replaces, and crashing on a removal of a key that was never present.
