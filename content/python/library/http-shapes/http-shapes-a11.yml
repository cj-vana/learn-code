  originality_notes: Original query-parameter merge with a None-means-delete override rule, framed around a neighborhood bakery ordering API.
prompt_markdown: |
  The Rosewell Bakery order page builds its API requests from a set of default
  query parameters and then layers a caller's overrides on top. Write
  `merge_query_params(request)` where `request` is a single dict with two keys:

  - `"base"`: the starting parameters, a dict of name to value.
  - `"overrides"`: changes to apply on top, a dict of name to value.

  Return the merged parameter dict, following these rules:

  - Start from the `"base"` parameters. Do not mutate the original `"base"`
    dict; build and return a new dict.
  - For each name in `"overrides"`:
    - If its value is `None`, that is a request to **remove** the parameter:
      drop it from the result if present, and do nothing if it was already
      absent.
    - Otherwise the override value replaces the base value, or adds the name if
      it was not in `"base"`.
  - Names that appear only in `"base"` (and are not overridden) carry through
    unchanged.

  Example: with `"base"` `{"page": "1", "sort": "fresh", "limit": "20"}` and
  `"overrides"` `{"page": "2", "sort": None, "gluten_free": "yes"}`, the result
  is `{"page": "2", "limit": "20", "gluten_free": "yes"}`.
starter_code: |
  def merge_query_params(request):
      return {}
function_name: merge_query_params
input_mode: function
solution_sketch: Copy the base dict, then walk the overrides applying each one, deleting the key when the override value is None and otherwise assigning it.
sample_solution: |
  def merge_query_params(request):
      base = request["base"]
      overrides = request["overrides"]
      merged = dict(base)
      for name, value in overrides.items():
          if value is None:
              merged.pop(name, None)
          else:
              merged[name] = value
      return merged
hints:
  - level: 1
    text: Make a copy of the base dict first with dict(base) so the caller's parameters are never mutated.
  - level: 2
    text: Walk the overrides one entry at a time; a value of None means remove that key rather than store None.
  - level: 3
    text: Use merged.pop(name, None) to delete a key that may or may not exist, and merged[name] = value for every non-None override.
