explanation_markdown: |
  Joining URLs looks like string concatenation but is not. `urljoin` implements
  the reference-resolution rules from the URL spec, the same ones a browser uses
  when a page links to a relative path. The single most surprising rule is the
  trailing slash: `.../v1/` is a directory, so a relative path lands inside it,
  but `.../v1` is treated as a file, so the relative path replaces `v1`. That is
  why the two "berths" examples produce different results.

  The other rules fall out of the same model: a leading `/` means "from the host
  root", a `..` climbs a directory, and a reference that already has its own
  scheme is absolute and ignores the base entirely. Because all of this is
  fiddly and easy to get subtly wrong, the right move is to lean on the library
  rather than reinvent the resolver with `+` and `str.rstrip`.
common_mistakes:
  - Concatenating base and path with a `+` (and maybe a manual `/`), which ignores the trailing-slash and absolute-path rules.
  - Assuming a relative path always appends, so a `/`-prefixed path wrongly stays nested under the base directory.
  - Forgetting the base without a trailing slash drops its last segment before the relative path is applied.
