prompt_markdown: |
  The harbor's client keeps a base endpoint and tacks on relative paths to reach
  individual resources. Write `join_url(spec)` that takes a single dict with two
  string keys, `"base"` and `"path"`, and returns the combined URL using the
  same rules as `urllib.parse.urljoin`.

  The input shape is one dict, for example
  `{"base": "https://api.example.com/v1/", "path": "berths"}`.

  Those rules, which trip people up until they are stated plainly:

  - A **relative** path is resolved against the base's directory. Whether the
    base's last segment counts as a directory depends on its trailing slash:
    with a trailing slash (`.../v1/`) the segment is kept; without one
    (`.../v1`) the last segment is treated as a file and replaced.
  - A path that **starts with `/`** is host-absolute: it replaces the base's
    entire path.
  - A path that is itself a **full URL** (has its own scheme) replaces the base
    completely.
  - A `..` segment climbs one directory up from the base.

  Examples:

  - base `"https://api.example.com/v1/"`, path `"berths"` gives
    `"https://api.example.com/v1/berths"`.
  - base `"https://api.example.com/v1/"`, path `"/berths"` gives
    `"https://api.example.com/berths"`.
  - base `"https://api.example.com/v1"`, path `"berths"` gives
    `"https://api.example.com/berths"`.
starter_code: |
