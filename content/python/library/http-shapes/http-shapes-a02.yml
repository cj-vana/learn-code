prompt_markdown: |
  The harbor's booking service receives the raw query string from an incoming
  request and needs to turn it back into structured data. Write
  `parse_query_string(qs)` that takes the query string (the text that would
  follow the `?`, without the `?` itself) and returns a dict mapping each key to
  a **list** of its values, in the order they appear.

  A key can legitimately appear more than once (for example a repeated `tag`
  filter), so every value is collected into a list even when there is only one.

  Rules:

  - Split the string on `&` into segments; skip any empty segment (as produced
    by a stray `&&` or a leading/trailing `&`).
  - Split each segment on the **first** `=` only. Text after later `=` signs
    stays part of the value.
  - A segment with no `=` at all is a bare key; its value is the empty string
    `""`. A segment like `berth=` also gives the value `""`.
  - Decode both the key and the value the way `urllib.parse.unquote_plus` does:
    `+` becomes a space and `%NN` escapes turn back into their characters, so
    `%26` becomes `&`.
  - The empty string `""` returns an empty dict `{}`.

  Examples:

  - `"berth=A12"` returns `{"berth": ["A12"]}`.
  - `"tag=sun&tag=sea"` returns `{"tag": ["sun", "sea"]}`.
  - `"q=open+slip"` returns `{"q": ["open slip"]}`.
starter_code: |
