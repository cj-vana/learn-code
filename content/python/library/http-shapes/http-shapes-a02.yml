solution_sketch: Split on '&', split each non-empty segment on the first '=', unquote_plus both parts, and setdefault the key to a list you append to.
sample_solution: |
  from urllib.parse import unquote_plus


  def parse_query_string(qs):
      result = {}
      if not qs:
          return result
      for segment in qs.split("&"):
          if not segment:
              continue
          if "=" in segment:
              raw_key, raw_value = segment.split("=", 1)
          else:
              raw_key, raw_value = segment, ""
          key = unquote_plus(raw_key)
          value = unquote_plus(raw_value)
          result.setdefault(key, []).append(value)
      return result
