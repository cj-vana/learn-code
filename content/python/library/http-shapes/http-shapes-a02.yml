explanation_markdown: |
  Parsing a query string is the inverse of building one, and the tricky part is
  that keys are not unique: a filter like `tag` can appear several times, so the
  standard shape (what `urllib.parse.parse_qs` returns) maps each key to a list.
  Using `setdefault(key, [])` before appending means the first sighting of a key
  creates its list and every later sighting adds to it, which preserves order
  and collapses the single-value and multi-value cases into one code path.

  Two details keep the parser honest. Splitting on the first `=` only
  (`split("=", 1)`) protects values that legitimately contain `=`. And
  `unquote_plus` must run after you split, not before, because decoding earlier
  could reintroduce a literal `&` or `=` that would then be mistaken for a
  separator.
common_mistakes:
  - Using split("=") without the maxsplit of 1, which corrupts any value that itself contains an `=`.
  - Storing a plain string instead of a list, so a repeated key silently overwrites its earlier value.
  - Decoding with unquote_plus before splitting, letting a decoded `&` or `=` break the segmentation.
