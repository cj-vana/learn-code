prompt_markdown: |
  Before the dockmaster's client can talk to an API, it splits the endpoint URL
  into its parts. Write `parse_url_components(url)` that takes a full URL string
  and returns a dict with exactly these five keys:

  - `"scheme"` — the scheme, lowercased (`"https"`, `"http"`).
  - `"host"` — the host name, lowercased, with no port attached.
  - `"port"` — the port as an integer, or `None` when the URL has no explicit port.
  - `"path"` — the path portion, or `""` when there is none.
  - `"query"` — the raw query string after the `?`, or `""` when there is none.

  Use `urllib.parse.urlparse`, which already normalizes the scheme and host to
  lowercase for you while leaving the path's capitalization untouched. Note that
  a URL like `http://localhost:3000` (no path) has an empty path `""`, while
  `http://example.com/` (a bare slash) has path `"/"`.

  Examples:

  - `"https://harbor.example.com:8080/berths/list?free=1&max=3"` returns
    `{"scheme": "https", "host": "harbor.example.com", "port": 8080,
    "path": "/berths/list", "query": "free=1&max=3"}`.
  - `"http://example.com/"` returns `{"scheme": "http", "host": "example.com",
    "port": None, "path": "/", "query": ""}`.
starter_code: |
  from urllib.parse import urlparse


  def parse_url_components(url):
