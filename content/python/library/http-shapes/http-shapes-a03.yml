function_name: parse_url_components
input_mode: function
solution_sketch: Call urlparse(url) and read .scheme, .hostname, .port, .path, and .query into a dict, defaulting host to "" if hostname is None.
sample_solution: |
  from urllib.parse import urlparse


  def parse_url_components(url):
      parsed = urlparse(url)
      return {
          "scheme": parsed.scheme,
          "host": parsed.hostname or "",
          "port": parsed.port,
          "path": parsed.path,
          "query": parsed.query,
      }
