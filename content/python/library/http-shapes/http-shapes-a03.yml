tests:
  public:
    - name: full_url_with_port
      input: 'https://harbor.example.com:8080/berths/list?free=1&max=3'
      expected: {scheme: 'https', host: 'harbor.example.com', port: 8080, path: '/berths/list', query: 'free=1&max=3'}
    - name: trailing_slash_no_port
      input: 'http://example.com/'
      expected: {scheme: 'http', host: 'example.com', port: null, path: '/', query: ''}
    - name: no_query
      input: 'https://api.harbor.io/status'
      expected: {scheme: 'https', host: 'api.harbor.io', port: null, path: '/status', query: ''}
  validation:
    - name: scheme_and_host_lowercased
      input: 'HTTPS://Harbor.EXAMPLE.com/Berths?A=1'
      expected: {scheme: 'https', host: 'harbor.example.com', port: null, path: '/Berths', query: 'A=1'}
    - name: port_but_no_path
      input: 'http://localhost:3000'
      expected: {scheme: 'http', host: 'localhost', port: 3000, path: '', query: ''}
    - name: deep_path_with_port
      input: 'https://dock.example.org:443/v2/berths/north/slip-7?sort=depth'
      expected: {scheme: 'https', host: 'dock.example.org', port: 443, path: '/v2/berths/north/slip-7', query: 'sort=depth'}
    - name: query_with_multiple_pairs
      input: 'https://harbor.example.com/search?q=open+slip&sort=depth&page=2'
      expected: {scheme: 'https', host: 'harbor.example.com', port: null, path: '/search', query: 'q=open+slip&sort=depth&page=2'}
explanation_markdown: |
  A URL packs several independent pieces into one string, and `urlparse` knows
  the grammar so you do not have to hunt for delimiters by hand. It normalizes
  the scheme and host to lowercase because those are case-insensitive in the
  HTTP spec, while deliberately leaving the path alone, since `/Berths` and
  `/berths` may point at different resources on the server.

  Reading `.hostname` rather than `.netloc` gives you the host without the port,
  and `.port` returns a real integer (or `None`), which is far safer than
  slicing after a `:` yourself. Watch the difference between an absent path
  (`""`) and a root path (`"/"`): both are common, and treating them as the
  same value is a frequent source of routing bugs.
common_mistakes:
  - Reading .netloc for the host, which leaves the `:port` attached instead of splitting it out.
  - Lowercasing the path along with the host, even though paths are case-sensitive on the server.
  - Confusing an empty path "" with a root path "/", or returning the port as a string instead of an int.
