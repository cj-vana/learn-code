prompt_markdown: |
  The harbor's API gateway tags every response with a single category word so
  the logs read cleanly. Write `classify_status_code(code)` that takes an
  integer HTTP status code and returns exactly one of these category strings:

  - `"informational"` for 1xx codes (`100` to `199`).
  - `"success"` for 2xx codes (`200` to `299`).
  - `"redirect"` for 3xx codes (`300` to `399`).
  - `"client_error"` for 4xx codes (`400` to `499`).
  - `"server_error"` for 5xx codes (`500` to `599`).
  - `"unknown"` for any integer outside the range `100` to `599`, including
    small numbers, negatives, and codes of `600` or more.

  The boundaries are inclusive on both ends: `100`, `199`, `200`, ..., `599` all
  land in the category named for their block, while `99` and `600` are
  `"unknown"`.

  Examples:

  - `200` returns `"success"`.
  - `302` returns `"redirect"`.
  - `404` returns `"client_error"`.
starter_code: |
