function_name: classify_status_code
input_mode: function
solution_sketch: Check each inclusive hundred-block range in turn and return its label; fall through to "unknown" for anything outside 100..599.
sample_solution: |
  def classify_status_code(code):
      if 100 <= code <= 199:
          return "informational"
      if 200 <= code <= 299:
          return "success"
      if 300 <= code <= 399:
          return "redirect"
      if 400 <= code <= 499:
          return "client_error"
      if 500 <= code <= 599:
          return "server_error"
      return "unknown"
