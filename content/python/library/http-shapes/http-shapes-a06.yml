explanation_markdown: |
  This is the label version of the earlier flag check: instead of three
  booleans, the gateway wants one category word per response. A chain of
  range guards handles it cleanly because the blocks are mutually exclusive, so
  the first guard that matches can return immediately and the rest never run.

  The interesting design choice is the `"unknown"` fallthrough. Real traffic and
  buggy clients do send codes outside the standard 100–599 window, and a
  classifier that quietly forces them into a real category hides problems. By
  reserving `"unknown"` for anything below 100 or at 600 and above (negatives
  included), the logs stay honest about codes that should never appear. Because
  every branch has an inclusive upper bound, the exact boundary values like 199
  and 599 land in the right block.
common_mistakes:
  - Using `code // 100` to pick the block, which maps stray values like 700 or negative codes to a real category instead of "unknown".
  - Writing overlapping or open-ended ranges (like `code >= 400` before the 5xx check), so a 500 is mislabeled as a client error.
  - Forgetting the "unknown" fallthrough, leaving out-of-range codes with no returned value (None).
