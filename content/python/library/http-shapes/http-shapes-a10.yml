    text: First decide whether the status code alone is worth retrying; only 429, 408, and the 500-599 range qualify.
  - level: 2
    text: Even a retryable status must not retry once you have used the last attempt, so require attempt < max_attempts as well.
  - level: 3
    text: When retrying, compute 2 ** (attempt - 1) and cap it with min(30, ...); otherwise the backoff is 0.
