prompt_markdown: |
  A ridgeline weather station publishes readings through an HTTP feed, and your
  client sometimes gets a bad response and must decide whether to try again.
  Write `retry_decision(attempt_info)` where `attempt_info` is a single dict:

  - `"status_code"`: the HTTP status of the response just received.
  - `"attempt"`: which attempt this was, counting from `1`.
  - `"max_attempts"`: the total number of attempts allowed.

  Return a dict `{"retry": <bool>, "backoff_seconds": <int>}` using these rules:

  - A status code is **retryable** when it is `429` (too many requests), `408`
    (request timeout), or any server error in the range `500` through `599`
    inclusive. Every other code (including all `2xx`, `3xx`, and other `4xx`
    codes) is not retryable.
  - `"retry"` is `True` only when the status is retryable **and** there is still
    another attempt left, meaning `attempt` is strictly less than
    `max_attempts`.
  - When retrying, `"backoff_seconds"` is exponential with a base of one second,
    computed as `2 ** (attempt - 1)`, but capped at `30`. So attempt `1` waits
    `1`, attempt `2` waits `2`, attempt `3` waits `4`, and large attempts settle
    at `30`.
  - When not retrying, `"backoff_seconds"` is `0`.

  Example: `{"status_code": 503, "attempt": 1, "max_attempts": 3}` returns
  `{"retry": True, "backoff_seconds": 1}`.
starter_code: |
  def retry_decision(attempt_info):
      return {"retry": False, "backoff_seconds": 0}
function_name: retry_decision
input_mode: function
solution_sketch: Decide retryability from the status code, combine it with the attempt-budget check, and when retrying compute the capped exponential backoff; otherwise return a zero backoff.
sample_solution: |
  def retry_decision(attempt_info):
      status = attempt_info["status_code"]
      attempt = attempt_info["attempt"]
      max_attempts = attempt_info["max_attempts"]
      retryable = status in (429, 408) or 500 <= status <= 599
      if retryable and attempt < max_attempts:
          backoff = min(30, 2 ** (attempt - 1))
          return {"retry": True, "backoff_seconds": backoff}
      return {"retry": False, "backoff_seconds": 0}
hints:
