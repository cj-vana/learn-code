explanation_markdown: |
  A retry policy separates two questions that are easy to tangle: *is this
  failure the kind that might succeed if repeated?* and *am I still allowed to
  try?* Transient failures like a `503` from an overloaded server, a `429` rate
  limit, or a `408` timeout can clear on their own, while a `404` or a `400` is a
  permanent answer that retrying will never fix. Redirects and successes are not
  failures at all.

  The exponential backoff (`1, 2, 4, 8, ...`) spaces out repeated hits so a
  struggling server gets room to recover instead of being hammered, and the cap
  at `30` keeps the wait from growing without bound. Because the function is pure
  logic over the status and attempt counters, it stays fully testable without any
  real clock or sleep.
common_mistakes:
  - Retrying on any `4xx` code instead of only `429` and `408` among the client errors.
  - Forgetting the `attempt < max_attempts` guard, so the client retries after its final allowed attempt.
  - Computing `2 ** attempt` instead of `2 ** (attempt - 1)`, which makes the first backoff `2` instead of `1`, or omitting the cap.
