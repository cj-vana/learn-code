explanation_markdown: |
  HTTP status codes are organized into hundred-blocks whose leading digit
  carries the meaning: 2xx succeeded, 4xx blamed the caller, 5xx blamed the
  server. Turning that into three independent boolean flags is exactly what a
  dashboard needs, and because the ranges do not overlap, at most one flag is
  ever `True`.

  The tidy way to write each test is a chained comparison: `200 <= code <= 299`
  reads like the math it represents and evaluates straight to a boolean, so the
  whole function is three dict values with no `if` in sight. Codes that fall in
  the 1xx and 3xx blocks are neither errors nor final successes here, so they
  correctly leave every lamp dark.
common_mistakes:
  - Testing only the first digit (like `code // 100 == 2`) but forgetting that leaves out-of-range codes such as 700 mislabeled.
  - Using `code >= 200` without an upper bound, so 404 is wrongly counted as a success.
  - Returning bare booleans or a list instead of the dict of named flags the prompt asks for.
