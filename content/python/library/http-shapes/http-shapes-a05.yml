prompt_markdown: |
  The harbor's monitoring wall shows three lamps for every API response: one for
  a successful call, one for a caller mistake, and one for a server fault. Write
  `status_flags(code)` that takes an integer HTTP status code and returns a dict
  with exactly these three boolean keys:

  - `"is_success"` — `True` when the code is in the 2xx range (`200` to `299`).
  - `"is_client_error"` — `True` when the code is in the 4xx range (`400` to `499`).
  - `"is_server_error"` — `True` when the code is in the 5xx range (`500` to `599`).

  Any code outside all three ranges — including 1xx informational and 3xx
  redirect codes, and anything above 599 — makes all three flags `False`. At
  most one flag is ever `True`.

  Examples:

  - `200` returns `{"is_success": True, "is_client_error": False, "is_server_error": False}`.
  - `404` returns `{"is_success": False, "is_client_error": True, "is_server_error": False}`.
  - `301` returns all three flags `False`.
starter_code: |
  def status_flags(code):
      return {}
function_name: status_flags
input_mode: function
solution_sketch: Return a dict whose three boolean values are each a range comparison like 200 <= code <= 299.
sample_solution: |
  def status_flags(code):
      return {
          "is_success": 200 <= code <= 299,
          "is_client_error": 400 <= code <= 499,
          "is_server_error": 500 <= code <= 599,
      }
hints:
  - level: 1
    text: Each flag is just a yes/no test on which hundred-block the code falls into.
  - level: 2
    text: Python lets you chain comparisons, so 200 <= code <= 299 is a single boolean expression.
  - level: 3
    text: Return the three chained comparisons directly as the dict values; a comparison already evaluates to True or False, so no if-statement is needed.
