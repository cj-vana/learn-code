explanation_markdown: |
  The `Link` header is a compact way for a paginated API to describe its own
  navigation without forcing the client to construct page URLs by hand. Parsing
  it is a real-world string problem: you split on commas to separate entries,
  then within each entry pull out two pieces that live in different delimiters,
  the URL inside angle brackets and the relation inside a quoted `rel`
  parameter.

  Two details make this robust. First, HTTP header names are case-insensitive,
  so the lookup compares a lower-cased name rather than assuming the exact
  spelling the server chose. Second, real headers carry stray whitespace and
  optional parameters like `title`, so the parser strips each piece and only
  acts on the `rel` parameter, ignoring everything else. Letting a later
  relation overwrite an earlier one matches how a dict naturally behaves on
  reassignment.
common_mistakes:
  - Looking up `headers["Link"]` directly and missing a server that sent `link` or `LINK`.
  - Forgetting to strip the surrounding double quotes from the `rel="next"` value.
  - Splitting the entry incorrectly so that an extra parameter like `title` leaks into the URL or relation.
