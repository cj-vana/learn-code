solution_sketch: Scan the headers for a key equal to "link" ignoring case, split its value on commas, and for each part slice out the URL between angle brackets and the rel value from a semicolon-separated parameter, letting later relations overwrite earlier ones.
sample_solution: |
  def extract_pagination_links(headers):
      link_value = None
      for name, value in headers.items():
          if name.lower() == "link":
              link_value = value
              break
      links = {}
      if not link_value or not link_value.strip():
          return links
      for entry in link_value.split(","):
          entry = entry.strip()
          if not entry:
              continue
          open_at = entry.find("<")
          close_at = entry.find(">", open_at + 1)
          if open_at == -1 or close_at == -1:
              continue
          url = entry[open_at + 1:close_at]
          relation = None
          for param in entry[close_at + 1:].split(";"):
              param = param.strip()
              if param.startswith("rel="):
                  relation = param[len("rel="):].strip().strip('"').strip("'")
          if relation:
              links[relation] = url
      return links
