prompt_markdown: |
  The Harbor Log API pages its berth records and advertises where the neighboring
  pages live through a `Link` response header, in the same style GitHub uses.
  Write `extract_pagination_links(headers)` that turns that header into a lookup
  of relation to URL. `headers` is a dict mapping header name to header value.

  A `Link` header value is a comma-separated list of entries. Each entry looks
  like:

  ```
  <URL>; rel="RELATION"
  ```

  Parse it with these rules:

  - Find the `Link` header **case-insensitively** (a server might send `Link`,
    `link`, or `LINK`). If no such header exists, or its value is empty or only
    whitespace, return `{}`.
  - For each comma-separated entry: the URL is the text between `<` and `>`, and
    the relation is the value of the `rel="..."` parameter. Surrounding
    whitespace around entries and parameters may be present and must be ignored.
  - An entry may carry extra parameters after `rel`, such as
    `; title="Older"`. Ignore every parameter except `rel`.
  - Skip any entry that is empty or that lacks either a `<...>` URL or a `rel`
    parameter.
  - If the same relation appears more than once, the **last** occurrence wins.
  - Return a dict mapping each relation (for example `"next"`, `"prev"`,
    `"first"`, `"last"`) to its URL. You may assume the URLs themselves contain
    no commas.

  Example: `{"Link": '<https://api.harborlog.test/berths?page=2>; rel="next"'}`
  returns `{"next": "https://api.harborlog.test/berths?page=2"}`.
