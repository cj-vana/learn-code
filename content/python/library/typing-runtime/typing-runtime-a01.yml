prompt_markdown: |
  An observatory wires instruments to a shared control bus. Before an instrument
  is accepted it must expose every method the bus protocol demands. This mirrors
  how a `@runtime_checkable Protocol` works at runtime: `isinstance(obj, Proto)`
  only checks that the **member names are present** — it never inspects argument
  lists or return types.

  Write `select_conforming_devices(spec)`. The single argument `spec` is a dict:

  - `spec["protocol"]` is a list of required member names (strings).
  - `spec["devices"]` is a dict mapping each device name to the list of member
    names it exposes.

  Return a list of the device names whose exposed members include **all** of the
  required names, sorted alphabetically.

  Rules and edge cases:

  - Order of members does not matter; only presence counts.
  - Duplicate names (in either the protocol list or a device's member list)
    collapse — a device that lists `read` once satisfies a protocol asking for
    `read` twice.
  - An **empty** protocol is satisfied by every device (there is nothing to
    require), so return every device name, sorted.
  - If `spec["devices"]` is empty, return an empty list.

  Example: `spec = {"protocol": ["read", "seek"], "devices": {"camera":
  ["read", "seek", "focus"], "clock": ["read"]}}` returns `["camera"]`, because
  only `camera` exposes both `read` and `seek`.
starter_code: |
  def select_conforming_devices(spec):
