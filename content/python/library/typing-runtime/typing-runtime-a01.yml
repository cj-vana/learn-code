function_name: select_conforming_devices
input_mode: function
solution_sketch: Turn the required names into a set, then keep each device whose member set is a superset of that required set, and return the matching device names sorted.
sample_solution: |
  def select_conforming_devices(spec):
      required = set(spec["protocol"])
      devices = spec["devices"]
      matches = [
          name
          for name, members in devices.items()
          if required <= set(members)
      ]
      return sorted(matches)
hints:
  - level: 1
    text: A runtime-checkable Protocol only asks "does this object have these names?" — so you are checking whether each device's member names cover the required names.
  - level: 2
    text: Convert the required names to a set once. A device conforms when required_set is a subset of set(that device's members).
  - level: 3
    text: Use required_set <= set(members) as the filter, collect the passing device names, and return sorted(names) so the order is deterministic.
