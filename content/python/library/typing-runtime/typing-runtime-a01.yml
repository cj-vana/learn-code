explanation_markdown: |
  A `@runtime_checkable Protocol` reduces `isinstance` to a name-presence check:
  Python asks only whether the object carries every attribute the protocol
  declares, not whether the signatures line up. Modelling that with sets makes
  the logic exact — `required <= set(members)` is the subset test, so a device
  passes precisely when it owns all the required names. Duplicates vanish because
  a set stores each name once, and an empty required set is a subset of every
  set, which is why an empty protocol accepts everyone. Sorting the survivors
  keeps the result stable regardless of dict insertion order.
common_mistakes:
  - Checking that the member list equals the protocol list instead of containing it, which wrongly rejects devices that expose extra methods.
  - Forgetting that an empty protocol is a subset of everything, so returning an empty list instead of every device.
  - Returning the devices in dict order rather than sorting, giving nondeterministic output.
