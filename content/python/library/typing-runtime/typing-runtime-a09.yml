explanation_markdown: |
  The guard turns a type *name* into a runtime decision. Mapping each name to its
  type object keeps the branching flat, and `type(value) is known[expected]` performs
  an exact-type check: the value's runtime type must be that one class, not a
  subclass of it.

  Exactness is what makes the `bool_not_int` and `bool_matches_bool` cases behave
  differently. `True` has type `bool`, and `bool` is a subclass of `int`, so
  `isinstance(True, int)` would be `True` and quietly admit a boolean where an integer
  was expected. Comparing the exact type with `is` sidesteps that: `type(True) is int`
  is `False`, while `type(True) is bool` is `True`. Likewise `7` is an `int`, not a
  `float`, so it fails an exact `"float"` check even though the two are numerically
  compatible. Unknown expected names fall through to `False`, so a typo never
  accidentally passes.
common_mistakes:
  - Using isinstance(value, expected_type), which lets a bool satisfy an int check because bool subclasses int.
  - Treating 7 as a valid float; an exact-type check keeps int and float distinct.
  - Forgetting to return False for an expected name that is not one of the five known types.
