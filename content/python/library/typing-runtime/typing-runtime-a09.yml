prompt_markdown: |
  An observatory's data gate receives raw instrument readings tagged with the type
  they are *supposed* to be. Since annotations are never enforced at runtime, the
  gate needs a hand-written guard that decides whether a value truly matches its
  declared type before it enters the pipeline.

  Write `check_reading_type(reading)`, where `reading` is a dict shaped like
  `{"value": <any>, "expected": <type name>}`. The `expected` name is one of the
  strings `"int"`, `"bool"`, `"float"`, `"str"`, or `"list"`. Return `True` if
  `value`'s **exact** runtime type matches the expected name, otherwise `False`.

  Match on the exact type, not the class hierarchy, so:

  - `"int"` matches only values whose type is exactly `int`. A `bool` does **not**
    match `"int"`, even though `bool` is a subclass of `int`.
  - `"bool"` matches only `True`/`False`.
  - `"float"` matches only floats; an integer like `7` does **not** match `"float"`.
  - `"str"` matches only strings, `"list"` only lists.

  If `expected` is not one of the five known names, return `False`.

  For example, `check_reading_type({"value": 7, "expected": "int"})` returns `True`,
  `check_reading_type({"value": True, "expected": "int"})` returns `False`, and
  `check_reading_type({"value": 7, "expected": "float"})` returns `False`.
starter_code: |
  def check_reading_type(reading):
      # Map each expected name to a type and compare against the value's exact type.
      return False
function_name: check_reading_type
input_mode: function
solution_sketch: Look the expected name up in a name-to-type table and compare with type(value) is <type>, returning False for unknown names.
sample_solution: |
  def check_reading_type(reading):
      value = reading["value"]
      expected = reading["expected"]
      known = {
          "int": int,
          "bool": bool,
          "float": float,
          "str": str,
          "list": list,
      }
      if expected not in known:
          return False
      return type(value) is known[expected]
hints:
