explanation_markdown: |
  `Literal[...]` narrows a value to a fixed menu of options for a static type
  checker, but the annotation evaporates at runtime — nothing rejects an
  out-of-menu string on its own. Enforcing the literal is a one-line membership
  test: if the value is in the allowed list, it is a legal literal and you keep
  it; otherwise you substitute a safe default. Because Python compares strings by
  exact value, the check is naturally case-sensitive, which is exactly the
  strictness a `Literal` implies.
common_mistakes:
  - Assuming the Literal annotation blocks invalid values by itself and skipping the runtime check.
  - Lowercasing or trimming the value before comparing, which quietly accepts inputs a strict Literal would reject.
  - Returning the default only when the value is empty instead of whenever it is not in the allowed list.
