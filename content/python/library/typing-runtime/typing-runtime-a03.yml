prompt_markdown: |
  A bakery's order ticket has a `size` field that a type hint declares as
  `Literal["small", "medium", "large"]`. That annotation documents intent, but at
  runtime Python happily accepts a typo like `"jumbo"` — a `Literal` is never
  enforced unless you check it yourself.

  Write `enforce_size_choice(ticket)`. The single argument `ticket` is a dict:

  - `ticket["value"]` is the size the customer typed.
  - `ticket["allowed"]` is the list of allowed literal values.
  - `ticket["default"]` is the value to fall back to.

  Return `ticket["value"]` when it appears **exactly** in `ticket["allowed"]`;
  otherwise return `ticket["default"]`.

  Rules and edge cases:

  - Matching is exact and case-sensitive: `"Large"` is not `"large"`.
  - The empty string is only valid if it literally appears in `allowed`.
  - The default is returned as-is even if it is not itself one of the allowed
    values.

  Example: `ticket = {"value": "jumbo", "allowed": ["small", "medium", "large"],
  "default": "medium"}` returns `"medium"`.
starter_code: |
  def enforce_size_choice(ticket):
      return ticket["default"]
function_name: enforce_size_choice
input_mode: function
solution_sketch: Return the value when it is a member of the allowed list, otherwise return the default.
sample_solution: |
  def enforce_size_choice(ticket):
      value = ticket["value"]
      allowed = ticket["allowed"]
      if value in allowed:
          return value
      return ticket["default"]
hints:
