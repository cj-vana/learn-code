function_name: hint_boundary_check
input_mode: function
solution_sketch: Define an annotated helper whose body uses str(), then branch on enforce, applying a type(value) is int guard only when enforce is True.
sample_solution: |
  def hint_boundary_check(request):
      value = request["value"]
      enforce = request["enforce"]

      def render(count: int) -> str:
          return str(count)

      if enforce and type(value) is not int:
          return {
              "result": None,
              "raised": True,
              "reason": "manual guard rejected " + type(value).__name__,
          }
      return {
          "result": render(value),
          "raised": False,
          "reason": "passed manual guard" if enforce else "hint ignored at runtime",
      }
hints:
  - level: 1
    text: The int annotation on render is documentation only; calling render(value) runs its body no matter what type value is, and str() never complains.
  - level: 2
    text: When enforce is False, always call render and report the hint was ignored; the branching only matters when enforce is True.
  - level: 3
    text: For the guard use type(value) is int so True (a bool) is rejected, and build the reason string with type(value).__name__ for the rejected type.
