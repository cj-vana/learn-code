      expected: {result: '[1, 2]', raised: false, reason: 'hint ignored at runtime'}
explanation_markdown: |
  Type annotations are stored on the function object and read by external tools, but
  the interpreter never consults them while calling the function. That is why every
  `enforce: False` case simply runs `render` and returns a string: the `int`
  annotation on `count` has no say at runtime, and `str()` happily formats a string,
  a float, or a list.

  Enforcement is something you opt into by hand. The `type(value) is int` check is the
  guard the annotation only hinted at, and choosing `type(...) is int` over
  `isinstance(value, int)` is deliberate: `bool` is a subclass of `int`, so
  `isinstance(True, int)` is `True` and would let a boolean slip through as a count.
  Comparing the exact type keeps `True` out, which is why the `bool_is_not_int` case
  is rejected. The takeaway is the whole point of this area: hints describe intent,
  runtime checks enforce it, and the two are entirely separate.
common_mistakes:
  - Believing the int annotation makes Python raise on a bad argument; nothing is checked until you write a guard.
  - Using isinstance(value, int) for the guard, which wrongly accepts booleans because bool subclasses int.
  - Returning the raw value instead of str(value), or forgetting that str() is what lets any type flow through unguarded.
