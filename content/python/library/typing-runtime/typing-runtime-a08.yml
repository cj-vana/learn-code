prompt_markdown: |
  A warehouse label printer has one small helper, annotated as
  `def render(count: int) -> str`, that turns a count into text for a shipping
  label. A new hire assumes the `int` annotation means Python will refuse anything
  that is not an integer. It does not: annotations are never checked when the
  function runs. The only thing that rejects a bad value is a guard **you** write.

  Write `hint_boundary_check(request)`, where `request` is a dict shaped like
  `{"value": <any>, "enforce": <bool>}`. Inside the function, define the annotated
  helper `render` whose body is simply `return str(count)` -- `str(...)` accepts any
  value, so the annotation never blocks the call. Then behave as follows:

  - When `enforce` is `False`, ignore the annotation exactly as the interpreter does:
    call `render(value)` for whatever `value` is and return
    `{"result": <rendered string>, "raised": False, "reason": "hint ignored at runtime"}`.
  - When `enforce` is `True`, add the runtime guard the annotation only *suggested*.
    Accept the value only if its type is exactly `int`. Use `type(value) is int`, not
    `isinstance`, so that a `bool` (whose type is `bool`, a subclass of `int`) is
    **rejected**.
    - If it passes, return
      `{"result": <rendered string>, "raised": False, "reason": "passed manual guard"}`.
    - If it fails, do not call `render`; return
      `{"result": None, "raised": True, "reason": "manual guard rejected <typename>"}`,
      where `<typename>` is the value's runtime type name, e.g. `"str"` or `"bool"`.

  For example, `hint_boundary_check({"value": "lots", "enforce": False})` returns
  `{"result": "lots", "raised": False, "reason": "hint ignored at runtime"}`, while
  `hint_boundary_check({"value": "lots", "enforce": True})` returns
  `{"result": None, "raised": True, "reason": "manual guard rejected str"}`.
starter_code: |
