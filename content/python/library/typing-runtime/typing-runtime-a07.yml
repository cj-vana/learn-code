function_name: unwrap_berth_ids
input_mode: function
solution_sketch: Create a NewType alias, map it over the ids, and report the unchanged values, their runtime type names, the declared supertype, and object identity.
sample_solution: |
  from typing import NewType


  def unwrap_berth_ids(raw_ids):
      BerthId = NewType("BerthId", int)
      tagged = [BerthId(raw) for raw in raw_ids]
      return {
          "unwrapped": tagged,
          "runtime_types": [type(value).__name__ for value in tagged],
          "declared_supertype": BerthId.__supertype__.__name__,
          "identity_preserved": all(
              tag is raw for tag, raw in zip(tagged, raw_ids)
          ),
      }
hints:
  - level: 1
    text: Calling a NewType alias like BerthId(raw) does not build a wrapper object; it returns the raw value untouched, so the runtime type stays int.
  - level: 2
    text: Use type(value).__name__ to read each runtime type name, and BerthId.__supertype__ to recover the base type the alias was declared from.
  - level: 3
    text: For identity_preserved, compare each tagged value against its source with is and combine the checks using all(); it is always True because the alias returns the same object.
