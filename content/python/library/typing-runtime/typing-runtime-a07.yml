      expected: {unwrapped: [-3, -8, -8], runtime_types: ['int', 'int', 'int'], declared_supertype: 'int', identity_preserved: true}
explanation_markdown: |
  `NewType("BerthId", int)` looks like it manufactures a new class, but at runtime it
  is just a thin callable that returns its argument. That is why `BerthId(raw) is raw`
  is always true: no new object is created, so there is nothing for the value's
  identity to differ from. The `large_values_beyond_int_cache` case makes the point
  sharper -- even integers far outside CPython's small-int cache come back identical,
  because identity here has nothing to do with caching and everything to do with the
  alias returning the same object.

  The only lasting trace of the declaration is the `__supertype__` attribute, which
  records the base type (`int`). Static type checkers use the `BerthId` name to catch
  a plain `int` being passed where a berth id is required, but the interpreter neither
  stores nor enforces that distinction. The lesson: `NewType` buys you documentation
  and static safety, not a runtime wrapper you can inspect later.
common_mistakes:
  - Expecting BerthId(raw) to return a wrapper object with its own class rather than the untouched int.
  - Reading identity_preserved as a fact about int caching instead of the alias returning the same object every time.
  - Reaching for type(value) directly in the output; the expected values are the type names from type(value).__name__.
