prompt_markdown: |
  Harbor Control wants its code to stop confusing a **berth id** with an ordinary
  integer, so a colleague reaches for `typing.NewType` to give berth ids their own
  name. Before the team relies on it, you need to show exactly what `NewType` does
  when the program actually runs -- which is almost nothing.

  Write `unwrap_berth_ids(raw_ids)`, where `raw_ids` is a list of integers. Inside
  the function, create a distinct type alias with
  `BerthId = NewType("BerthId", int)`, then tag every raw id by calling
  `BerthId(raw)`. Return a dict with these four keys:

  - `"unwrapped"`: the list of tagged values, in the same order as the input.
    Because `NewType` hands back the very object you passed in, this list equals
    `raw_ids`.
  - `"runtime_types"`: a list with the runtime type **name** of each tagged value,
    e.g. `"int"`. Every entry is `"int"` because the tag does not create a new
    class.
  - `"declared_supertype"`: the name of the base type the alias was built from,
    read from `BerthId.__supertype__`. Here that is `"int"`.
  - `"identity_preserved"`: `True` if every tagged value **is** the exact same
    object as the raw id it came from (checked with `is`, not `==`). This is always
    `True` regardless of the integers involved, because `NewType` returns its
    argument unchanged.

  For example, `unwrap_berth_ids([7, 12])` returns
  `{"unwrapped": [7, 12], "runtime_types": ["int", "int"], "declared_supertype": "int", "identity_preserved": True}`.
  An empty list returns `{"unwrapped": [], "runtime_types": [], "declared_supertype": "int", "identity_preserved": True}`.
