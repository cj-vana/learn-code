prompt_markdown: |
  A recording studio's effects rack accepts any pedal that structurally matches its
  driver **Protocol** -- it does not care about inheritance, only that the pedal
  exposes the right methods with the right parameter lists. This is how
  `typing.Protocol` works conceptually: conformance is structural. You will certify a
  candidate pedal against the rack's protocol by comparing method signatures with
  `inspect`.

  Write `matches_protocol(spec)`, where `spec` is a dict shaped like:

  ```
  {
    "protocol":  {"<method>": ["<param>", ...], ...},
    "candidate": {"<method>": ["<param>", ...], ...}
  }
  ```

  Each method maps to the ordered list of parameter names it declares (including
  `"self"` when present). To compare a required method against the candidate's,
  build an `inspect.Signature` from each parameter list -- one
  `inspect.Parameter(name, inspect.Parameter.POSITIONAL_OR_KEYWORD)` per name -- and
  compare the two `Signature` objects for equality. Parameter **order and names** must
  match; a different order counts as a mismatch.

  Return a dict:

  - `"conforms"`: `True` only if there are no missing methods and no signature
    mismatches.
  - `"missing_methods"`: the sorted list of protocol methods absent from the
    candidate.
  - `"signature_mismatches"`: the sorted list of protocol methods that the candidate
    *has* but whose signature differs.

  The candidate may declare **extra** methods beyond the protocol; those are ignored
  (structural typing only requires the protocol's methods to be present and matching).
  An empty protocol always conforms.
