prompt_markdown: |
  A harbor clears a ship only when its cargo manifest matches the required shape.
  A `TypedDict` describes that shape in your editor, but at runtime a TypedDict is
  just a plain `dict` with **no enforcement** — so you check the shape by hand.

  Write `validate_manifest(payload)`. The single argument `payload` is a dict:

  - `payload["record"]` is the manifest dict being checked.
  - `payload["schema"]` maps each required field name to a type name, one of
    `"int"`, `"str"`, `"bool"`, `"list"`, or `"dict"`.

  Return a report dict `{"ok": <bool>, "errors": [<problem strings>]}`:

  - For each field in the schema, if the record is missing that key, add
    `"<field>:missing"`.
  - If the key is present but its value is not the required type, add
    `"<field>:wrong_type"`.
  - Sort the `errors` list alphabetically. `ok` is `True` exactly when `errors`
    is empty.

  Type rules (this is where runtime bites):

  - `"int"` accepts a real integer but **rejects booleans**. In Python
    `isinstance(True, int)` is `True`, yet a flag is not a count, so `True` fails
    an `"int"` field.
  - `"bool"` accepts only `True`/`False`.
  - `"str"`, `"list"`, and `"dict"` accept exactly those types.
  - Extra keys in the record that the schema does not mention are ignored (a
    manifest may carry extra notes).

  Example: `payload = {"record": {"port": "Kobe", "tonnage": "heavy"}, "schema":
  {"port": "str", "tonnage": "int"}}` returns
  `{"ok": False, "errors": ["tonnage:wrong_type"]}`.
starter_code: |
