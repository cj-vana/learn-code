solution_sketch: Map each schema type name to an isinstance-based predicate (guarding int against bool), walk the schema keys collecting missing/wrong_type problems, sort them, and report ok as the absence of problems.
sample_solution: |
  def validate_manifest(payload):
      record = payload["record"]
      schema = payload["schema"]
      checks = {
          "int": lambda v: isinstance(v, int) and not isinstance(v, bool),
          "str": lambda v: isinstance(v, str),
          "bool": lambda v: isinstance(v, bool),
          "list": lambda v: isinstance(v, list),
          "dict": lambda v: isinstance(v, dict),
      }
      errors = []
      for field, type_name in schema.items():
          if field not in record:
              errors.append(field + ":missing")
          elif not checks[type_name](record[field]):
              errors.append(field + ":wrong_type")
      errors.sort()
      return {"ok": not errors, "errors": errors}
hints:
