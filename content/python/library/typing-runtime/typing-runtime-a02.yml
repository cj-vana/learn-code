explanation_markdown: |
  Type hints, including `TypedDict`, are erased to ordinary containers at runtime,
  so nothing stops a caller from handing you a manifest of the wrong shape. A
  hand-written validator closes that gap: iterate the declared fields, confirm
  each is present, and confirm each value's type. The subtle case is `"int"`.
  Because `bool` is a subclass of `int`, `isinstance(True, int)` returns `True`,
  which would silently accept a flag where a count belongs — the extra
  `not isinstance(v, bool)` guard rejects it. Sorting the error list makes the
  report deterministic no matter what order the schema was written in.
common_mistakes:
  - Writing the int check as isinstance(v, int) alone, so True and False slip through as valid integers.
  - Treating extra record keys as errors when the schema only defines the required shape.
  - Returning errors in schema order instead of sorting, so equivalent inputs produce different reports.
