  def best_entry(spec: dict[str, Any]) -> dict[str, Any] | None:
      # Return the entry maximizing spec["key"], breaking ties by the smallest
      # spec["on_tie"] value, then by earliest position. Return None if empty.
      return None
function_name: best_entry
input_mode: function
solution_sketch: Walk the entries tracking a champion index; replace it only when an entry has a strictly larger key, or an equal key with a strictly smaller on_tie value.
sample_solution: |
  from typing import Any


  def best_entry(spec: dict[str, Any]) -> dict[str, Any] | None:
      items = spec["items"]
      key = spec["key"]
      on_tie = spec.get("on_tie")
      if not items:
          return None
      best_index = 0
      for idx in range(1, len(items)):
          current = items[idx]
          champ = items[best_index]
          if current[key] > champ[key]:
              best_index = idx
          elif current[key] == champ[key] and on_tie is not None:
              if current[on_tie] < champ[on_tie]:
                  best_index = idx
      return items[best_index]
hints:
  - level: 1
    text: Track the index of the best entry seen so far and compare each new entry against it, rather than sorting the whole list.
  - level: 2
    text: Replace the champion when the new entry has a strictly larger key. On an exact tie, only consider on_tie when it is not null.
  - level: 3
    text: For the tie-break, swap to the new entry only when current[on_tie] < champ[on_tie]; equal on_tie values (or a null on_tie) keep the earlier entry because its index came first.
