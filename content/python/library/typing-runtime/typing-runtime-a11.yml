prompt_markdown: |
  A bakery's sourdough contest needs one impartial judge function that picks the
  winning entry. The utility is meant to be **generic**: it ranks entries by whatever
  field the organizers choose, and the field's values might be numbers or strings, so
  the code carries type hints like `dict[str, Any]` but is graded only on the winner
  it returns -- the hints never run.

  Write `best_entry(spec)`, where `spec` is a dict shaped like
  `{"items": <list of dicts>, "key": <field name>, "on_tie": <field name or null>}`.
  Return the single entry (the whole dict) that ranks first under these rules:

  1. **Primary:** the entry with the largest value at `items[key]` wins. Values are
     compared with Python's normal `<`/`>`, so this works for ints, floats, or
     strings (lexicographic order).
  2. **Tie on the primary key:** if `on_tie` is not `null`, break the tie by the
     **smallest** value at that field (e.g. fewest faults wins). Every tied entry is
     guaranteed to contain the `on_tie` field.
  3. **Still tied, or `on_tie` is `null`:** keep the entry that appears **earliest**
     in `items` (a stable choice).

  If `items` is empty, return `None`.

  For example, with entries scored 88, 95, and 91 and `key="score"`, `on_tie=null`,
  the winner is the entry scoring 95. If two entries both score 90 and
  `on_tie="faults"`, the one with fewer faults wins.
