      expected: {name: 'first', score: 70}
    - name: generic_over_strings
      input: {items: [{name: 'zebra', tag: 'apple'}, {name: 'ant', tag: 'pear'}], key: 'tag', on_tie: null}
      expected: {name: 'ant', tag: 'pear'}
    - name: equal_tiebreak_keeps_earliest
      input: {items: [{name: 'x', score: 60, faults: 2}, {name: 'y', score: 60, faults: 2}], key: 'score', on_tie: 'faults'}
      expected: {name: 'x', score: 60, faults: 2}
    - name: negative_scores
      input: {items: [{name: 'p', score: -5}, {name: 'q', score: -2}, {name: 'r', score: -9}], key: 'score', on_tie: null}
      expected: {name: 'q', score: -2}
explanation_markdown: |
  This is `argmax` with a documented tie-break, and it stays generic because it never
  assumes what type the key holds. Comparing with `>` and `<` works for integers,
  floats, and strings alike -- the `generic_over_strings` case ranks `"pear"` above
  `"apple"` purely by lexicographic order, using the same code path as the numeric
  cases. The `dict[str, Any]` hints in the signature document that intent but do
  nothing at runtime; only the returned winner is graded.

  Tracking a champion index in a single pass costs O(n) and makes the tie-break exact.
  A new entry takes the crown only on a strictly larger key. On an equal key, the
  challenger wins only when its `on_tie` value is strictly smaller; an equal `on_tie`
  value falls through and the earlier entry stays, because its index was reached
  first. That is why `tie_keeps_earliest_without_tiebreak` and
  `equal_tiebreak_keeps_earliest` both return the first of the tied pair. Handling the
  empty list up front avoids indexing into nothing.
common_mistakes:
  - Using >= for the primary comparison, which lets a later equal entry overwrite the earlier one and breaks stability.
  - Applying the on_tie tie-break even when on_tie is null, or swapping on an equal on_tie value instead of only a strictly smaller one.
  - Forgetting the empty-list case and indexing items[0] before checking whether any entries exist.
