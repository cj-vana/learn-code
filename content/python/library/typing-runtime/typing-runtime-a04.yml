explanation_markdown: |
  A `class Stack[T]` (PEP 695 syntax) declares that a stack holds one element type,
  but that `T` exists only for static analysis — at runtime the object is an
  ordinary list-backed LIFO that never inspects what it stores. That is why you can
  push a number and a string into the same instance and both round-trip fine. The
  honest way to grade such a container is behavioral: feed it a recorded operation
  log and compare the sequence of reads. Guarding `pop` and `peek` against an
  empty stack keeps the run deterministic instead of raising, so the whole log
  always produces a well-defined output list.
common_mistakes:
  - Recording an output for push operations, which pollutes the result list.
  - Letting pop or peek raise on an empty stack instead of yielding None as specified.
  - Using stack[0] or stack.pop(0) and building a FIFO queue rather than a LIFO stack.
