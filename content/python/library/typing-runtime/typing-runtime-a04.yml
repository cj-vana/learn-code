prompt_markdown: |
  A workshop keeps parts on a last-in-first-out stack. In code the container is a
  generic `Stack[T]`, but the type parameter `T` is **erased at runtime** — the
  stack behaves identically whether it holds integers, strings, or a mix. You test
  a generic container by driving it with a sequence of operations and watching
  what comes out.

  Write `run_stack(ops)`. The single argument `ops` is a list of operations, each
  itself a list:

  - `["push", x]` puts `x` on top of the stack and produces no output.
  - `["pop"]` removes and yields the top item. On an **empty** stack it yields
    `None`.
  - `["peek"]` yields the top item without removing it. On an empty stack it
    yields `None`.

  Return a list holding the yielded value of every `pop` and `peek`, in the order
  the operations run. `push` operations contribute nothing to the output, so a
  run with only pushes returns an empty list.

  Because `T` is not enforced, a single run may push both numbers and strings; the
  stack treats them all the same.

  Example: `ops = [["push", 1], ["push", 2], ["pop"], ["pop"]]` returns `[2, 1]`.
starter_code: |
  def run_stack(ops):
      return []
function_name: run_stack
input_mode: function
solution_sketch: Back the stack with a list; for each op, push appends, pop pops or records None when empty, and peek reads the last item or None; collect pop/peek results in order.
sample_solution: |
  def run_stack(ops):
      stack = []
      output = []
      for op in ops:
          action = op[0]
          if action == "push":
              stack.append(op[1])
          elif action == "pop":
              output.append(stack.pop() if stack else None)
          elif action == "peek":
              output.append(stack[-1] if stack else None)
      return output
