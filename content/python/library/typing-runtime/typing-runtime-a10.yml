prompt_markdown: |
  A plant nursery ships crates down a dock. Typed code would like to treat a crate of
  tulips as a crate of flowers -- that substitution (a container of a subtype standing
  in for a container of a supertype) is called **covariance**, and it is only safe
  when the container is **read-only**. If a crate could be written to, someone holding
  it as a "crate of flowers" could drop a rose into what is really a tulip crate. Make
  a crate that only permits reading and prove writes are refused.

  Write `read_only_crate(spec)`, where `spec` is a dict shaped like
  `{"items": <list>, "index": <int or null>, "attempt_write": <bool>}`. Inside the
  function, define a `Crate` class that stores a private copy of the items and exposes
  reads only: a `get(i)` method and an `all()` method that returns a fresh list copy.
  It must have **no** method for adding or replacing items. Then return a dict:

  - `"items"`: the crate's full contents as a list (via `all()`), preserving order.
  - `"picked"`: `crate.get(index)` when `index` is not `null` and is a valid position
    with `0 <= index < len(items)`; otherwise `None`. A negative index counts as out
    of range here and yields `None`.
  - `"write_refused"`: only meaningful when `attempt_write` is `True`. In that case,
    try to call a mutating method (`crate.append(...)`) inside a `try`/`except
    AttributeError`; set this to `True` because the read-only crate has no such
    method. When `attempt_write` is `False`, do not attempt a write and set it to
    `False`.

  For example, `read_only_crate({"items": ["tulip", "tulip"], "index": 0, "attempt_write": True})`
  returns `{"items": ["tulip", "tulip"], "picked": "tulip", "write_refused": True}`.
