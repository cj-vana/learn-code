function_name: read_only_crate
input_mode: function
solution_sketch: Define a Crate exposing only get and all, read the requested index defensively, and catch AttributeError when a write is attempted.
sample_solution: |
  def read_only_crate(spec):
      items = spec["items"]
      index = spec.get("index")
      attempt_write = spec.get("attempt_write", False)

      class Crate:
          def __init__(self, contents):
              self._contents = list(contents)

          def get(self, i):
              return self._contents[i]

          def all(self):
              return list(self._contents)

      crate = Crate(items)

      picked = None
      if index is not None and 0 <= index < len(items):
          picked = crate.get(index)

      write_refused = False
      if attempt_write:
          try:
              crate.append("intruder")
          except AttributeError:
              write_refused = True

      return {
          "items": crate.all(),
          "picked": picked,
          "write_refused": write_refused,
      }
