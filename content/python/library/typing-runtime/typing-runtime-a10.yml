tests:
  public:
    - name: read_and_block_write
      input: {items: ['tulip', 'tulip'], index: 0, attempt_write: true}
      expected: {items: ['tulip', 'tulip'], picked: 'tulip', write_refused: true}
    - name: empty_crate
      input: {items: [], index: null, attempt_write: false}
      expected: {items: [], picked: null, write_refused: false}
    - name: peek_last
      input: {items: ['rose', 'lily', 'fern'], index: 2, attempt_write: false}
      expected: {items: ['rose', 'lily', 'fern'], picked: 'fern', write_refused: false}
  validation:
    - name: index_out_of_range
      input: {items: ['oak'], index: 5, attempt_write: true}
      expected: {items: ['oak'], picked: null, write_refused: true}
    - name: numeric_items
      input: {items: [1, 2, 3], index: 1, attempt_write: true}
      expected: {items: [1, 2, 3], picked: 2, write_refused: true}
    - name: no_write_attempt
      input: {items: ['a', 'b'], index: 0, attempt_write: false}
      expected: {items: ['a', 'b'], picked: 'a', write_refused: false}
    - name: negative_index_ignored
      input: {items: ['x', 'y'], index: -1, attempt_write: false}
      expected: {items: ['x', 'y'], picked: null, write_refused: false}
explanation_markdown: |
  Covariance -- letting a `Crate[Tulip]` be used as a `Crate[Flower]` -- is only sound
  when the container never lets you put anything in. If a "crate of flowers" view
  could append, it could store a rose in a crate that other code still trusts to hold
  only tulips. By giving `Crate` only `get` and `all`, and no writer at all, the type
  is safe to treat covariantly, and the `write_refused` flag proves it: calling the
  absent `append` raises `AttributeError`, which the handler turns into a clean
  signal.

  The defensive index read models the other half of a good read-only API: `get`
  itself would raise `IndexError` on a bad position, so the wrapper checks
  `0 <= index < len(items)` first and returns `None` for anything out of range,
  including negatives. `all()` returns a fresh `list(...)` copy rather than the
  internal list, so a caller cannot reach through the return value to mutate the
  crate's storage -- the read-only guarantee holds all the way out.
common_mistakes:
  - Giving Crate an append or __setitem__ method, which breaks the read-only guarantee that makes covariance safe.
  - Returning the internal list directly from all() so callers can mutate the crate's storage.
  - Letting get raise IndexError on an out-of-range or negative index instead of returning None.
