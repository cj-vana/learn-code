    - name: nested_lists
      input: [[1, 2], [3, 4]]
      expected: [[3, 4], [1, 2]]
    - name: bool_and_int
      input: [true, 0]
      expected: [0, true]
    - name: none_and_value
      input: [null, 5]
      expected: [5, null]
explanation_markdown: |
  A `class Pair[A, B]` documents that the first and second slots may hold different
  types, but those parameters exist only for the type checker; at runtime the
  object is just two positions you can reorder freely. That is why one `swap_pair`
  handles ints, strings, nested lists, booleans, and `None` without any per-type
  code. Unpacking with `a, b = pair` reads the two positions once, and returning a
  brand-new `[b, a]` leaves the caller's list untouched. The result is a list
  rather than a tuple because the grader compares list values.
common_mistakes:
  - Reversing in place with pair.reverse(), which mutates the caller's list and returns None.
  - Returning a tuple (b, a) instead of a list, so the compared value has the wrong type.
  - Hardcoding index math that assumes both elements are numbers, which breaks on strings, None, or nested lists.
