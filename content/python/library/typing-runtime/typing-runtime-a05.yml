prompt_markdown: |
  An observatory records readings as a two-slot pairing. In code the container is a
  generic `Pair[A, B]` and swapping it produces a `Pair[B, A]`. At runtime the
  parameters `A` and `B` are erased, so a swap is nothing more than reordering two
  values — it works no matter what types sit in the two slots.

  Write `swap_pair(pair)`. The single argument `pair` is a list of exactly two
  elements `[a, b]`. Return a new list `[b, a]` with the two elements exchanged.

  Rules and edge cases:

  - The two elements may be different types (a string and a number), the same
    value, nested lists, booleans, or `None` — swapping only reorders them.
  - Return a **list**, not a tuple.

  Example: `pair = ["az", 90]` returns `[90, "az"]`.
starter_code: |
  def swap_pair(pair):
      return pair
function_name: swap_pair
input_mode: function
solution_sketch: Unpack the two elements and return them in reversed order as a new list.
sample_solution: |
  def swap_pair(pair):
      a, b = pair
      return [b, a]
hints:
  - level: 1
    text: A generic Pair loses its type parameters at runtime, so swapping is purely about reordering the two stored values.
  - level: 2
    text: The pair always has exactly two elements, so you can unpack it as a, b = pair.
  - level: 3
    text: Return a fresh list [b, a] so the two positions are exchanged.
tests:
  public:
    - name: ints
      input: [1, 2]
      expected: [2, 1]
    - name: mixed_types
