explanation_markdown: |
  `@overload` lets a type checker see one signature per input shape, but Python
  keeps only the final implementation at runtime; the decorated stubs carry no
  behavior. So the real work is a single body that dispatches on the concrete
  runtime type. The ordering matters because `bool` inherits from `int`:
  `isinstance(True, int)` is `True`, so an int-first check would label every flag
  as a count. Testing `bool` before `int` resolves the ambiguity, and the
  remaining branches for `float`, `str`, and `list` each format their own label.
  Rounding the float to two places keeps the measure output stable.
common_mistakes:
  - Checking isinstance(value, int) before bool, so True and False become "count:1" and "count:0".
  - Forgetting to round the float, so measure labels carry a long unstable decimal tail.
  - Using str(value) for lists instead of len(value), producing the wrong batch label.
