explanation_markdown: |
  Counting the components is O(n), then filtering the dict keeps only names meeting
  the `k` threshold. Because dict iteration order is not meaningful for this task,
  passing the survivors through `sorted()` guarantees a stable alphabetical result
  no matter what order the components were recorded in.
common_mistakes:
  - Using `> k` instead of `>= k`, dropping components that hit the threshold exactly.
  - Returning the names in dict order and forgetting to sort them.
  - Filtering the raw list instead of the counts, so frequent names appear many times.
