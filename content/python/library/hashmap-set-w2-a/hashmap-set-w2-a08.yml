prompt_markdown: |
  A maker space records one component name per line for every kit it assembles, so
  a component can appear many times. Write `frequent_components(data)` that returns
  the component names used in at least `k` kits, sorted alphabetically.

  `data` is a dict with keys `components` (a list of name strings) and `k` (an int).
starter_code: |
  def frequent_components(data):
      return []
function_name: frequent_components
input_mode: function
solution_sketch: Count each component, then return the sorted names whose count is at least k.
sample_solution: |
  def frequent_components(data):
      counts = {}
      for name in data["components"]:
          counts[name] = counts.get(name, 0) + 1
      k = data["k"]
      return sorted(name for name, total in counts.items() if total >= k)
hints:
  - level: 1
    text: First count how many kits used each component.
  - level: 2
    text: Keep only the components whose count is greater than or equal to k.
  - level: 3
    text: Pass the qualifying names through sorted() to get alphabetical order.
tests:
