explanation_markdown: |
  Because you increment a flavor's count and immediately test it against `k`, the
  first flavor to cross the threshold is the one you return, which correctly
  breaks ties by order of arrival. The single pass is O(n) with O(1) dict updates,
  and an early `return` stops the scan as soon as a winner appears.
common_mistakes:
  - Checking the count before incrementing it, so the threshold is reached one order late.
  - Using `>= k` and continuing the loop, which can return a later flavor than the true first.
  - Forgetting to return "" when no flavor ever reaches k orders.
