prompt_markdown: |
  A juice bar records each drink flavor in the exact order it is ordered. Once a
  flavor has been ordered `k` times it is declared sold out. Write
  `first_sold_out(data)` that returns the flavor that reaches `k` orders first.
  If no flavor is ordered `k` times, return the empty string `""`.

  `data` is a dict with keys `orders` (a list of flavor strings) and `k` (an int).
starter_code: |
  def first_sold_out(data):
      return ""
function_name: first_sold_out
input_mode: function
solution_sketch: Count orders as you scan and return the first flavor whose running count hits k.
sample_solution: |
  def first_sold_out(data):
      orders = data["orders"]
      k = data["k"]
      counts = {}
      for flavor in orders:
          counts[flavor] = counts.get(flavor, 0) + 1
          if counts[flavor] == k:
              return flavor
      return ""
hints:
  - level: 1
    text: Track how many times each flavor has been ordered so far.
  - level: 2
    text: Update the running count before you check whether it has reached k.
  - level: 3
    text: Return the moment a flavor's count first equals k, so order of arrival decides ties.
tests:
