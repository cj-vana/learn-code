      expected: true
explanation_markdown: |
  Counting each shipment into a dict is O(n), and comparing the two dicts is a
  single equality check that succeeds only when every part code maps to the same
  quantity in both. This treats the shipments as multisets, so order never matters
  but repeated parts still count.
common_mistakes:
  - Comparing `set(left) == set(right)`, which ignores how many of each part there are.
  - Only checking that the lists are the same length, missing swapped part codes.
  - Comparing the lists directly, which wrongly fails when the parts are merely reordered.
