prompt_markdown: |
  A depot receives two shipments of parts, each a list of part codes. Write
  `shipments_match(data)` that returns `True` if both shipments contain exactly the
  same parts in the same quantities, ignoring order, and `False` otherwise.

  `data` is a dict with keys `left` and `right`, each a list of part-code strings.
starter_code: |
  def shipments_match(data):
      return False
function_name: shipments_match
input_mode: function
solution_sketch: Tally each shipment into a count dict and compare the two dicts for equality.
sample_solution: |
  def shipments_match(data):
      def tally(items):
          counts = {}
          for item in items:
              counts[item] = counts.get(item, 0) + 1
          return counts
      return tally(data["left"]) == tally(data["right"])
hints:
  - level: 1
    text: Two shipments match only if every part appears the same number of times in each.
  - level: 2
    text: Build a count dict for each shipment mapping part code to quantity.
  - level: 3
    text: Two dicts compare equal only when they hold the same keys and values, so compare them directly.
tests:
