prompt_markdown: |
  A library logs the catalog title of every book borrowed during the week, in the
  order the loans happened. Write `borrowed_once(titles)` that returns the titles
  borrowed exactly once, listed in the order they first appear. An empty list
  returns an empty list.
starter_code: |
  def borrowed_once(titles):
      return []
function_name: borrowed_once
input_mode: function
solution_sketch: Count every title, then collect the titles whose count is one while walking the list in order.
sample_solution: |
  def borrowed_once(titles):
      counts = {}
      for title in titles:
          counts[title] = counts.get(title, 0) + 1
      return [title for title in titles if counts[title] == 1]
hints:
  - level: 1
    text: First find out how many times each title was borrowed.
  - level: 2
    text: A dict of counts lets you tell one-time loans from repeated ones.
  - level: 3
    text: Walk the original list again and keep only titles whose count is exactly one.
