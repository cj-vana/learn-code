explanation_markdown: |
  Counting first is O(n), and because a title borrowed exactly once appears in the
  list exactly once, a second pass over the original order naturally lists those
  titles in the order they were first borrowed. Filtering the original list rather
  than the dict keeps that order intact.
common_mistakes:
  - Iterating the dict instead of the original list, which can scramble the order.
  - Treating titles with a count of two or more as if they belonged in the result.
  - Building the result before the counts are complete.
