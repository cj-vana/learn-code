prompt_markdown: |
  Two hikers each list the trail badges they have earned. Write
  `shared_badges(data)` that returns the badges both hikers earned, listed once
  each, in the order they appear in the first hiker's list.

  `data` is a dict with keys `first` and `second`, each a list of badge strings.
starter_code: |
  def shared_badges(data):
      return []
function_name: shared_badges
input_mode: function
solution_sketch: Put the second hiker's badges in a set, then keep first-hiker badges found there, skipping repeats.
sample_solution: |
  def shared_badges(data):
      second = set(data["second"])
      seen = set()
      result = []
      for badge in data["first"]:
          if badge in second and badge not in seen:
              result.append(badge)
              seen.add(badge)
      return result
hints:
  - level: 1
    text: Membership tests against the second hiker's badges decide what is shared.
  - level: 2
    text: Convert the second list to a set so each lookup is O(1).
  - level: 3
    text: Track badges you have already added so a repeat in the first list is not listed twice.
