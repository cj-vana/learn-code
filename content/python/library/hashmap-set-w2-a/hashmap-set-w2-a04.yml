explanation_markdown: |
  Storing the second hiker's badges in a set turns each shared-or-not check into an
  O(1) lookup, so one pass over the first list is O(n). A second set of badges you
  have already recorded keeps the result free of duplicates while preserving the
  first hiker's ordering, since you append a badge the first time you meet it.
common_mistakes:
  - Scanning the second list with `in` on every badge, making the work O(n*m).
  - Returning a set, which loses the first hiker's ordering.
  - Listing a shared badge twice when it repeats in the first hiker's list.
