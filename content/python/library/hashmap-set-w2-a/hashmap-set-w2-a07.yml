prompt_markdown: |
  A museum scans a membership id each time someone enters; the same member may
  enter several times in a day. Write `distinct_members(ids)` that returns the
  number of distinct members who visited. An empty list returns 0.
starter_code: |
  def distinct_members(ids):
      return 0
function_name: distinct_members
input_mode: function
solution_sketch: Drop the ids into a set and return how many unique values remain.
sample_solution: |
  def distinct_members(ids):
      return len(set(ids))
hints:
  - level: 1
    text: Repeated entries by the same member should be counted only once.
  - level: 2
    text: A set automatically discards duplicate ids as you add them.
  - level: 3
    text: The number of distinct members is the size of the set of ids.
