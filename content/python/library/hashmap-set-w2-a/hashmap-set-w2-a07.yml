explanation_markdown: |
  Building a set from the ids removes duplicates in O(n) because each insertion is
  an O(1) hash operation, and the length of that set is exactly the count of
  distinct members. No manual bookkeeping of which ids were seen is needed.
common_mistakes:
  - Returning len(ids), which counts every entry rather than distinct members.
  - Building the set but forgetting to return its length.
  - Trying to sort and scan for duplicates when a set does the work directly.
