explanation_markdown: |
  A set of already-seen codes lets each lookup run in O(1), so the whole scan is
  O(n). Because you check membership before adding the current code, the first
  code that appears twice is returned the instant its second copy is reached, which
  is exactly the earliest reuse.
common_mistakes:
  - Adding the code to the set before checking membership, so nothing ever looks reused.
  - Returning the second-earliest duplicate by scanning for repeats after the loop.
  - Forgetting the "" result when all codes are distinct.
