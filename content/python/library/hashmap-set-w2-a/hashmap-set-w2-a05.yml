prompt_markdown: |
  A gym hands out locker codes to visitors through the day, in order. Write
  `first_reused(codes)` that returns the first code handed to a second visitor,
  that is, the first code you encounter that was already given out earlier. If
  every code is unique, return the empty string `""`.
starter_code: |
  def first_reused(codes):
      return ""
function_name: first_reused
input_mode: function
solution_sketch: Track codes already seen in a set and return the first one that reappears.
sample_solution: |
  def first_reused(codes):
      seen = set()
      for code in codes:
          if code in seen:
              return code
          seen.add(code)
      return ""
hints:
  - level: 1
    text: Remember every code you have already handed out.
  - level: 2
    text: A set gives O(1) checks for whether a code has appeared before.
  - level: 3
    text: Return as soon as a code is already in the set; add it otherwise.
