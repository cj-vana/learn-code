explanation_markdown: |
  These four checksums form a ladder of strength. `sum8` is the weakest: adding
  bytes is commutative, so swapping two bytes (a common transmission fault)
  leaves the sum unchanged and undetected. `xor8` is similarly order-blind and
  also misses any pair of identical bit-flips. `fletcher16` fixes the ordering
  gap by keeping a second accumulator that folds in the running total after each
  byte, so a byte's contribution depends on its position -- reordering now
  changes the result. `crc8` is the strongest here: treating the message as the
  coefficients of a polynomial and taking the remainder after division by the
  generator `0x07` catches all single-bit and most burst errors. The bitwise
  form processes one bit at a time -- shift left, and whenever the bit shifted
  out of the top was a 1, XOR in the polynomial -- masking with `0xFF` to stay
  in eight bits. The standard check string "123456789" (bytes 49..57) yielding
  `244` (`0xF4`) is the well-known CRC-8/SMBUS test vector, a handy way to
  confirm the implementation.
common_mistakes:
  - Forgetting the & 0xFF mask in the CRC inner loop, letting crc grow past eight bits and drift from the reference value.
  - Using modulo 256 instead of 255 in Fletcher-16, which is a different (and incorrect) checksum.
  - Updating high before low in Fletcher-16, or seeding the XOR accumulator with the first byte instead of 0.
