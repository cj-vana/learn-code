prompt_markdown: |
  A lighthouse sends short telemetry packets to the harbor master over a noisy
  radio link, appending an integrity code so the receiver can detect corruption.
  Different links use different checksum families, trading simplicity for how
  much damage they can catch. Implement four of them from their definitions.

  Write `checksum_bytes(payload)` that takes a single dictionary:

  ```
  {
    "data":      [1, 2, 3, 4],   # byte values, each 0..255
    "algorithm": "crc8"           # one of: sum8, xor8, fletcher16, crc8
  }
  ```

  Return a single integer: the checksum of `data` under the named algorithm.

  - `"sum8"`: add all the bytes and take the result modulo 256. An empty input
    gives `0`.
  - `"xor8"`: exclusive-or all the bytes together, starting from `0` (so an
    empty input gives `0`).
  - `"fletcher16"`: run two rolling sums modulo 255. Start `low = 0` and
    `high = 0`. For each byte `b`, set `low = (low + b) % 255` and then
    `high = (high + low) % 255`. Return `high * 256 + low`. An empty input
    gives `0`.
  - `"crc8"`: a bitwise CRC-8 with polynomial `0x07`, initial value `0`, no
    input or output reflection, and no final XOR. Start `crc = 0`. For each
    byte `b`: set `crc = crc XOR b`, then repeat 8 times: if the top bit
    (`crc & 0x80`) is set, `crc = ((crc << 1) XOR 0x07) & 0xFF`, otherwise
    `crc = (crc << 1) & 0xFF`. Return the final `crc`. An empty input gives `0`.

  Every algorithm must fit its stated width: `sum8`, `xor8`, and `crc8` return a
  value in `0..255`, while `fletcher16` returns a value in `0..65535`.
