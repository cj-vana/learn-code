solution_sketch: Branch on the algorithm name and implement each from its definition -- modular sum, running XOR, the two Fletcher rolling sums mod 255, and the bitwise CRC-8 inner loop over 8 shifts per byte.
sample_solution: |
  def checksum_bytes(payload):
      data = payload["data"]
      algorithm = payload["algorithm"]

      if algorithm == "sum8":
          return sum(data) % 256

      if algorithm == "xor8":
          acc = 0
          for b in data:
              acc ^= b
          return acc

      if algorithm == "fletcher16":
          low = 0
          high = 0
          for b in data:
              low = (low + b) % 255
              high = (high + low) % 255
          return high * 256 + low

      if algorithm == "crc8":
          crc = 0
          for b in data:
              crc ^= b
              for _ in range(8):
                  if crc & 0x80:
                      crc = ((crc << 1) ^ 0x07) & 0xFF
                  else:
                      crc = (crc << 1) & 0xFF
          return crc

      raise ValueError(f"unknown algorithm: {algorithm}")
hints:
  - level: 1
    text: sum8 and xor8 are one-liners over the bytes -- sum(...) % 256 and a running XOR that starts at 0.
  - level: 2
    text: Fletcher-16 keeps two accumulators mod 255; update low first, then add the new low into high, and pack them as high * 256 + low.
  - level: 3
    text: For crc8, XOR each byte into crc then loop 8 times shifting left one bit, XORing 0x07 whenever the pre-shift top bit was set, and mask with 0xFF every step.
