function_name: endian_convert
input_mode: function
solution_sketch: Unpack the incoming bytes with fmt_from to recover the field values, then pack those same values with fmt_to and return the new bytes as a list of integers.
sample_solution: |
  import struct


  def endian_convert(job):
      values = struct.unpack(job["fmt_from"], bytes(job["data"]))
      repacked = struct.pack(job["fmt_to"], *values)
      return list(repacked)
