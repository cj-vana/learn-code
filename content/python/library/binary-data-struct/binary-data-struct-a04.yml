explanation_markdown: |
  Endianness is a property of the wire, not of the number. Once you decode bytes
  into Python integers they carry no byte order at all, so the clean way to flip
  endianness is to unpack with the source format and immediately repack with the
  target format. You never touch individual bytes yourself; `struct` does the
  reordering because you changed only the `>`/`<` marker.

  Notice that a single-byte field would be unaffected either way, which is why the
  interesting cases involve multi-byte `H` and `I` fields. Doing the round trip
  through `struct` rather than reversing byte groups by hand keeps every field's
  width correct even when a record mixes 2-byte and 4-byte fields.
common_mistakes:
  - Reversing the whole byte list instead of each field, which corrupts records that mix field widths such as ">HI".
  - Forgetting to spread the unpacked tuple with * when calling struct.pack.
  - Returning the bytes object rather than a list of integers.
