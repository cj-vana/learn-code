  originality_notes: Original endianness-conversion drill framed as a hardware bridge translating packed records between a big-endian and a little-endian instrument bus.
prompt_markdown: |
  An old seismograph writes its records big-endian; a new logging board expects
  them little-endian. A small bridge board sits between them and re-serialises
  each record so the numbers survive the crossing. Write `endian_convert(job)`
  that receives a single dictionary with three keys:

  - `data`: a list of integers (each 0-255), the packed bytes as they arrived.
  - `fmt_from`: the `struct` format that produced those bytes, including its
    byte-order marker (for example `">HI"`).
  - `fmt_to`: the target `struct` format, differing only in the byte-order marker
    (for example `"<HI"`). The field letters are always identical to `fmt_from`;
    only the leading `>`/`<` changes.

  Decode `data` with `fmt_from`, then re-encode the very same field values with
  `fmt_to`, and return the resulting bytes as a **list of integers**. The numeric
  values are unchanged; only their byte order on the wire flips.

  For example, `{"data": [1, 2], "fmt_from": ">H", "fmt_to": "<H"}` returns
  `[2, 1]`: the big-endian bytes decode to 258, which re-encodes little-endian as
  `0x02 0x01`.

  If `fmt_from` and `fmt_to` are identical, the bytes come back unchanged, so
  `{"data": [1, 2], "fmt_from": ">H", "fmt_to": ">H"}` returns `[1, 2]`.
starter_code: |
