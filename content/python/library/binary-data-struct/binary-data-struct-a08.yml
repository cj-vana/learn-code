explanation_markdown: |
  Unlike a Python list, which stores boxed object pointers, `array.array`
  stores raw C-typed numbers back to back, so the typecode fully determines how
  many bytes each element takes. That fixed width is why `itemsize` is a
  property of the array type, not of the data -- an empty `array('i')` still
  reports `itemsize` 4. The aggregate operations `min`, `max`, and `sum` work
  on an array exactly as they do on a list, but you must handle the empty case
  yourself: `min([])` and `max([])` raise `ValueError`, so guarding on the
  array's truthiness and returning `None` keeps the function total. `sum` of an
  empty array is already `0`, matching the fallback.
common_mistakes:
  - Hard-coding itemsize from the typecode string instead of reading it off the constructed array.
  - Calling min or max on an empty array, which raises ValueError instead of returning None.
  - Assuming the typecode changes the numeric result -- it only changes storage width, so sum, min, and max match the plain integer values.
