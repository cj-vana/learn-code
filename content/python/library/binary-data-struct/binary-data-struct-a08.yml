solution_sketch: Construct array.array(typecode, values), read itemsize from it, and return min/max/sum with None/None/0 fallbacks for the empty case.
sample_solution: |
  import array


  def typed_array_stats(payload):
      values = payload["values"]
      typecode = payload["typecode"]
      buffer = array.array(typecode, values)
      return {
          "min": min(buffer) if buffer else None,
          "max": max(buffer) if buffer else None,
          "sum": sum(buffer),
          "itemsize": buffer.itemsize,
      }
hints:
