prompt_markdown: |
  The harbor weather post records readings into a compact typed buffer rather
  than a plain Python list, because each slot has a fixed width and the whole
  day fits in a tiny footprint. Python's `array.array` gives you exactly this:
  a homogeneous numeric array whose element size is decided by a one-letter
  **typecode**.

  Write `typed_array_stats(payload)` that takes a single dictionary:

  ```
  {
    "values":   [10, 255, 0, 128],   # integers, all valid for the typecode
    "typecode": "B"                   # one of: b, B, h, H, i
  }
  ```

  Build an `array.array` of that typecode from `values`, then return a
  dictionary with these keys:

  - `"min"`: the smallest value, or `None` if `values` is empty.
  - `"max"`: the largest value, or `None` if `values` is empty.
  - `"sum"`: the total of all values, or `0` if `values` is empty.
  - `"itemsize"`: the number of bytes one element occupies, read from the
    array's `itemsize` attribute. For the allowed typecodes this is `1` for
    `b`/`B`, `2` for `h`/`H`, and `4` for `i`.

  The typecodes mean: `b` signed byte (-128..127), `B` unsigned byte (0..255),
  `h` signed short (-32768..32767), `H` unsigned short (0..65535), `i` signed
  int. Every value is guaranteed to fit its typecode, so no range error can
  occur. `itemsize` must come from the constructed array, not a hard-coded
  lookup, and it is defined even when `values` is empty.
starter_code: |
