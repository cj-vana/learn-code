  originality_notes: Original struct.unpack drill framed as a shore receiving station decoding the tide gauge's fixed-width records.
prompt_markdown: |
  The shore station receives the raw bytes that the tide gauge radioed out and
  must decode them back into numbers. Write `unpack_record(record)` that receives
  a single dictionary with two keys:

  - `fmt`: a `struct` format string beginning with a byte-order marker (`>` or
    `<`), for example `">HB"`.
  - `data`: a list of integers (each 0-255), one per received byte.

  Rebuild a `bytes` object from `data`, decode it with `struct.unpack` using
  `fmt`, and return the decoded fields as a **list** (not the tuple that
  `struct.unpack` returns). The number of bytes in `data` always matches exactly
  what `fmt` describes.

  For example, `{"fmt": ">H", "data": [1, 2]}` returns `[258]`, because the two
  big-endian bytes `0x01`, `0x02` decode to the unsigned short 258.

  Signed fields matter: lowercase format letters are signed. So
  `{"fmt": ">hh", "data": [255, 255, 0, 10]}` returns `[-1, 10]`, because `h` is
  a signed 2-byte short and the bytes `0xFF 0xFF` decode to -1, while `0x00 0x0A`
  decode to 10.
starter_code: |
  import struct


  def unpack_record(record):
      return []
function_name: unpack_record
input_mode: function
solution_sketch: Turn the data list into a bytes object with bytes(...), decode it with struct.unpack(fmt, raw), then wrap the resulting tuple in list() before returning.
sample_solution: |
  import struct


  def unpack_record(record):
      raw = bytes(record["data"])
      fields = struct.unpack(record["fmt"], raw)
      return list(fields)
