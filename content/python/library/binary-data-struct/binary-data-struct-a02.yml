      expected: [-1, 10]
explanation_markdown: |
  `struct.unpack` is the inverse of `struct.pack`: hand it the same format string
  and a `bytes` object of exactly the right length, and it returns a tuple of
  Python values. It always returns a tuple, even for a single field, which is why
  the one-field cases still come back as `[258]` rather than a bare `258`.

  The signed case is the instructive one. An unsigned short `H` treats `0xFFFF`
  as 65535, but a signed short `h` interprets the same two bytes as -1 using
  two's-complement. Choosing the right format letter is how you honour the
  protocol the sender used; the bytes alone do not tell you whether a field is
  signed.
common_mistakes:
  - Passing the raw list straight to struct.unpack; it requires a bytes (or bytes-like) object, so wrap it with bytes(...) first.
  - Returning the tuple from struct.unpack instead of converting it to a list.
  - Reaching for an index like result[0] and returning a single value, which breaks whenever the format decodes more than one field.
