explanation_markdown: |
  Real binary protocols pack several fields of different widths into a compact
  header, and the reader has to know the exact layout to make sense of them. The
  key insight is that one `struct.unpack(">HBBI", ...)` call decodes the entire
  header at once: the format string is a map of the byte layout, and because it
  starts with `>` there is no alignment padding, so `H`, `B`, `B`, `I` occupy
  bytes 0-1, 2, 3, and 4-7 respectively.

  Slicing `data[:8]` before unpacking is what lets the same function tolerate a
  full packet with a payload trailing the header. `struct.unpack` insists that
  the buffer length match the format exactly, so handing it a longer buffer would
  raise `struct.error`; trimming to the header width sidesteps that. Naming the
  fields in a dictionary turns an anonymous tuple into a self-documenting result.
common_mistakes:
  - Passing the whole packet to struct.unpack; it requires the buffer length to match the format exactly, so you must slice the header off first.
  - Using a native format like "HBBI" with no byte-order prefix, which reintroduces alignment padding and shifts the payload_length field.
  - Mixing up the field order or the H/I widths, so magic and payload_length get swapped or truncated.
