prompt_markdown: |
  A radio observatory streams telemetry packets that each begin with a fixed
  8-byte header, big-endian, laid out like this:

  | Offset | Bytes | Field            | Format |
  |--------|-------|------------------|--------|
  | 0      | 2     | `magic`          | `H` (unsigned short) |
  | 2      | 1     | `version`        | `B` (unsigned byte)  |
  | 3      | 1     | `flags`          | `B` (unsigned byte)  |
  | 4      | 4     | `payload_length` | `I` (unsigned int)   |

  Write `parse_binary_header(data)` that receives a single list of integers (each
  0-255) representing the received bytes. Decode the **first 8 bytes** as the
  header and return a dictionary with exactly these keys and their decoded
  integer values:

  ```
  {"magic": ..., "version": ..., "flags": ..., "payload_length": ...}
  ```

  The list may contain more than 8 bytes; anything after offset 8 is payload and
  must be ignored. The list will always contain at least 8 bytes.

  For example, `[192, 222, 1, 5, 0, 0, 0, 16]` decodes to
  `{"magic": 49374, "version": 1, "flags": 5, "payload_length": 16}` (the bytes
  `0xC0 0xDE` form the big-endian short 49374, and `0x00 0x00 0x00 0x10` form the
  int 16).
starter_code: |
  import struct


  def parse_binary_header(data):
      return {}
function_name: parse_binary_header
input_mode: function
solution_sketch: Slice the first 8 bytes, turn them into a bytes object, unpack them with the big-endian format ">HBBI", then assemble the four returned values into the named dictionary.
sample_solution: |
  import struct


  def parse_binary_header(data):
      header = bytes(data[:8])
      magic, version, flags, payload_length = struct.unpack(">HBBI", header)
      return {
          "magic": magic,
          "version": version,
          "flags": flags,
          "payload_length": payload_length,
      }
hints:
  - level: 1
    text: The whole header is a single struct format, ">HBBI", which totals 2 + 1 + 1 + 4 = 8 bytes. Byte-order prefixes disable padding, so the fields sit flush against each other.
  - level: 2
    text: Take only the first 8 bytes with data[:8], convert them to a bytes object, and unpack that with struct.unpack(">HBBI", ...).
  - level: 3
    text: struct.unpack returns the four values in header order; assign them to magic, version, flags, payload_length and build the dictionary with those keys.
