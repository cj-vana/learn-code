prompt_markdown: |
  A grain silo streams one byte per sensor into a long buffer, and an auditor
  wants the total weight over a contiguous window without copying the whole buffer
  first. A `memoryview` gives a zero-copy window onto the bytes. Write
  `memoryview_slice_sum(query)` that receives a single dictionary with three keys:

  - `data`: a list of integers (each 0-255), the raw buffer.
  - `start`: the start index of the window (inclusive).
  - `end`: the end index of the window (exclusive).

  Build a `bytes` (or `bytearray`) object from `data`, wrap it in a `memoryview`,
  slice the view to `start:end`, and return the **sum of the bytes in that window
  as an integer**. Slice the memoryview itself rather than the underlying bytes,
  so no copy of the window is made.

  For example, `{"data": [10, 20, 30, 40, 50], "start": 1, "end": 4}` returns
  `90` (20 + 30 + 40).

  Edge cases:
  - An empty window (`start == end`) sums to `0`.
  - `end` past the end of the buffer is clamped by normal slicing, so
    `{"data": [1, 2, 3], "start": 0, "end": 10}` returns `6`.
  - An empty buffer returns `0`.
starter_code: |
