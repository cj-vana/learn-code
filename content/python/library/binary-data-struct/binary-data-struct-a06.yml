explanation_markdown: |
  A `memoryview` exposes the buffer protocol at the Python level: it is a window
  onto another object's memory that supports slicing and indexing without copying.
  Slicing `view[start:end]` produces a new view that still points into the same
  underlying bytes, so summing a window of a megabyte buffer never duplicates the
  window the way `data[start:end]` on a list or bytes would. For a single sum the
  saving is invisible, but the habit matters when the buffer is large or when many
  overlapping windows are read.

  Iterating or summing a `memoryview` of a `bytes` object yields the integer value
  of each byte, so `sum(...)` needs no conversion. Normal slice semantics apply,
  which is why an out-of-range `end` is clamped and an empty window sums to the
  additive identity, `0`.
common_mistakes:
  - Slicing the bytes first (bytes(data)[start:end]) and only then wrapping it, which copies the window and defeats the purpose of a memoryview.
  - Expecting sum over a memoryview to fail or need conversion; a memoryview of bytes yields plain integers.
  - Returning something other than 0 for an empty window; sum of an empty sequence is 0.
