function_name: memoryview_slice_sum
input_mode: function
solution_sketch: Wrap bytes(data) in a memoryview, slice the view with [start:end], and sum the window; iterating or summing a memoryview of bytes yields the byte integers directly.
sample_solution: |
  def memoryview_slice_sum(query):
      view = memoryview(bytes(query["data"]))
      window = view[query["start"]:query["end"]]
      return sum(window)
