explanation_markdown: |
  `bytes` and `bytearray` hold the same kind of data, but one is frozen and one
  is not, and that single difference drives everything here. Any operation that
  tries to change a `bytes` object in place fails: item assignment raises
  `TypeError` ("'bytes' object does not support item assignment"), and the
  in-place methods `append` and `reverse` do not exist on `bytes` at all, so
  Python raises `AttributeError`. The operations that succeed on both --
  `concat` and `slice_copy` -- share a telling property: neither mutates its
  operand. `container + bytes(arg)` builds a brand-new sequence, and
  `container[start:end]` returns a fresh copy, so immutability is never
  violated. Catching exactly `TypeError` and `AttributeError` lets a genuinely
  unsupported operation report cleanly while a real bug (a bad index or an
  out-of-range value) would still surface loudly.
common_mistakes:
  - Mutating a single shared container for both checks, so an in-place edit on the bytearray leaks into the bytes comparison.
  - Catching every exception, which would hide real errors like an out-of-range byte value behind a false "unsupported" result.
  - Assuming concat or slice fails on bytes -- both produce new objects and are fully supported on immutable bytes.
