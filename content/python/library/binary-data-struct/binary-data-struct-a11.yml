input_mode: function
solution_sketch: Run the requested operation on a fresh bytes and a fresh bytearray inside a try/except catching TypeError and AttributeError, returning the resulting list or None for each.
sample_solution: |
  def bytes_vs_bytearray_check(payload):
      data = payload["data"]
      operation = payload["operation"]
      arg = payload.get("arg")

      def attempt(container):
          try:
              if operation == "set_item":
                  index, value = arg
                  container[index] = value
                  return list(container)
              if operation == "append":
                  container.append(arg)
                  return list(container)
              if operation == "reverse_inplace":
                  container.reverse()
                  return list(container)
              if operation == "concat":
                  return list(container + bytes(arg))
              if operation == "slice_copy":
                  start, end = arg
                  return list(container[start:end])
              raise ValueError(f"unknown operation: {operation}")
          except (TypeError, AttributeError):
              return None

      bytes_result = attempt(bytes(data))
      bytearray_result = attempt(bytearray(data))
      return {
          "bytes_ok": bytes_result is not None,
          "bytes_result": bytes_result,
          "bytearray_ok": bytearray_result is not None,
          "bytearray_result": bytearray_result,
      }
hints:
