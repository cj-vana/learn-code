prompt_markdown: |
  A print-shop firmware team keeps two kinds of byte blocks: read-only **ROM
  images**, which must never change once burned, and writable **scratch
  pages** they patch freely. In Python those map cleanly onto `bytes`
  (immutable) and `bytearray` (mutable). Your job is to probe a single
  operation against both and report which container tolerates it.

  Write `bytes_vs_bytearray_check(payload)` that takes a single dictionary:

  ```
  {
    "data":      [1, 2, 3],   # starting byte values, each 0..255
    "operation": "set_item",  # one of the five operations below
    "arg":       [1, 99]       # operation-specific argument (may be null)
  }
  ```

  Build a fresh `bytes(data)` and a fresh `bytearray(data)`, then attempt the
  operation on each independently. The operations are:

  - `"set_item"`: `arg` is `[index, value]`; assign `container[index] = value`.
  - `"append"`: `arg` is a single int `value`; call `container.append(value)`.
  - `"reverse_inplace"`: `arg` is `null`; call `container.reverse()`.
  - `"concat"`: `arg` is a list of ints; compute `container + bytes(arg)`.
  - `"slice_copy"`: `arg` is `[start, end]`; compute `container[start:end]`.

  For each container, if the operation raises `TypeError` or `AttributeError`,
  treat it as unsupported. Return a dictionary with:

  - `"bytes_ok"`: `True` if the operation succeeded on the `bytes` object.
  - `"bytes_result"`: the resulting byte sequence as a **list of ints**, or
    `None` if it was unsupported. For `set_item`, `append`, `reverse_inplace`,
    and `concat` the result is the whole sequence after the operation; for
    `slice_copy` it is just the extracted slice.
  - `"bytearray_ok"` and `"bytearray_result"`: the same two values for the
    `bytearray` object.

  All indices and slice bounds are valid, and all values are in `0..255`, so
  the only failures you will ever observe come from immutability, not from bad
  arguments.
