prompt_markdown: |
  A label printer holds its next print job in a mutable byte buffer, and an editor
  splices new content in by replacing a stretch of the tape. Because a `bytes`
  object is immutable, the buffer is a `bytearray`, whose slices can be assigned
  to. Write `mutate_bytearray_slice(edit)` that receives a single dictionary with
  four keys:

  - `data`: a list of integers (each 0-255), the current tape contents.
  - `start`: the start index of the stretch to replace (inclusive).
  - `end`: the end index of the stretch to replace (exclusive).
  - `new_bytes`: a list of integers to splice in where the stretch was.

  Build a `bytearray` from `data`, replace the slice `start:end` with
  `new_bytes` using slice assignment, and return the final buffer as a **list of
  integers**.

  The crucial property is that the replacement need not be the same length as the
  removed stretch, so the tape can grow or shrink:

  - Same length: `{"data": [1,2,3,4,5], "start": 1, "end": 3, "new_bytes": [9,9]}`
    returns `[1, 9, 9, 4, 5]`.
  - Grow: `new_bytes` longer than the removed slice inserts extra bytes, so
    `start=1, end=3, new_bytes=[7,8,9]` on `[1,2,3,4,5]` returns
    `[1, 7, 8, 9, 4, 5]`.
  - Shrink: a shorter `new_bytes` removes bytes.
  - Delete: an empty `new_bytes` deletes the stretch entirely.
  - Insert: when `start == end`, nothing is removed and `new_bytes` is inserted at
    that position.
starter_code: |
  def mutate_bytearray_slice(edit):
      return []
function_name: mutate_bytearray_slice
input_mode: function
solution_sketch: Build a bytearray from the data list, assign bytes(new_bytes) to the ba[start:end] slice (which resizes the buffer as needed), then return the buffer as a list of integers.
sample_solution: |
  def mutate_bytearray_slice(edit):
      buffer = bytearray(edit["data"])
      buffer[edit["start"]:edit["end"]] = bytes(edit["new_bytes"])
      return list(buffer)
hints:
