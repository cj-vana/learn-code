explanation_markdown: |
  This is the headline difference between `bytes` and `bytearray`: a `bytearray`
  supports in-place mutation, including slice assignment. Assigning to
  `buffer[start:end]` is not limited to same-length swaps the way indexing a
  fixed-width array would be. Python removes whatever occupied `start:end` and
  splices in the new bytes, growing or shrinking the buffer to fit. That single
  operation covers replacement, insertion (`start == end`), and deletion
  (`new_bytes` empty).

  The right-hand side must be a bytes-like object, which is why the solution wraps
  the incoming list with `bytes(...)`; assigning a plain list of ints also works
  in CPython, but converting first keeps the intent explicit and matches how you
  would splice one buffer into another in real code.
common_mistakes:
  - Reaching for bytes instead of bytearray; bytes is immutable, so slice assignment raises TypeError.
  - Assuming the replacement must be the same length as the removed slice, which is true for item assignment but not for slice assignment.
  - Building the result by hand with concatenation and getting the insert (start == end) or delete (empty new_bytes) edge cases wrong.
