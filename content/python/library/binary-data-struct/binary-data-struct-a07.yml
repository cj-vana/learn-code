prompt_markdown: |
  A mountaintop observatory streams each sensor frame into one long rolling
  buffer of raw byte readings. When the calibration crew spots drift, they do
  not want to copy the whole frame just to fix a few bytes -- they open a
  `memoryview` **window** onto the affected sub-range and overwrite bytes
  through that window. Because a `memoryview` shares the underlying storage,
  every edit lands directly in the original buffer with no copy made.

  Write `zero_copy_mutate(payload)` that takes a single dictionary:

  ```
  {
    "buffer":  [10, 20, 30, 40],   # byte values, each 0..255
    "window":  [1, 3],             # [start, end): the sub-range the view covers
    "patches": [[0, 255], [1, 9]]  # [offset, value] pairs, offset RELATIVE to window start
  }
  ```

  Do the following:

  - Build a `bytearray` from `buffer`, then create a `memoryview` over it and
    slice that view down to `window` using `view[start:end]` (end is exclusive).
  - For each `[offset, value]` in `patches`, assign `value` into the sliced
    window at position `offset`, where `offset` is measured from the window's
    start (so `offset` 0 is the byte at index `start` of the buffer). Every
    write must go **through the memoryview window**, not straight into the
    bytearray by absolute index.
  - Apply patches left to right. If two patches target the same offset, the
    later one wins.
  - Return the full buffer after all edits as a **list of ints**.

  Edge cases: an empty `patches` list leaves the buffer unchanged. The window
  may cover the whole buffer (`[0, len(buffer)]`) or a single byte
  (`[2, 3]`). Every `offset` is guaranteed to fall inside the window and every
  `value` is in `0..255`.
