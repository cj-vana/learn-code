function_name: zero_copy_mutate
input_mode: function
solution_sketch: Build a bytearray, wrap it in a memoryview, slice the view to the window, assign each patch value at its relative offset through the sliced view, then return list(bytearray).
sample_solution: |
  def zero_copy_mutate(payload):
      buffer = payload["buffer"]
      start, end = payload["window"]
      patches = payload["patches"]
      backing = bytearray(buffer)
      view = memoryview(backing)
      window = view[start:end]
      for offset, value in patches:
          window[offset] = value
      window.release()
      view.release()
      return list(backing)
hints:
  - level: 1
    text: A memoryview does not own its bytes -- slicing it and writing through the slice edits the same bytearray the view was built from.
  - level: 2
