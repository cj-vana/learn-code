explanation_markdown: |
  The whole point of `memoryview` is avoiding copies. `bytearray(buffer)`
  allocates the storage once; `memoryview(backing)` is a lightweight window
  onto that same storage, and slicing the view with `view[start:end]` produces
  another window that still points at the original bytes -- no data is
  duplicated, so the extra memory is O(1) regardless of buffer size. Writing
  `window[offset] = value` therefore mutates `backing` in place. Because
  `offset` is relative to the window's start, offset 0 maps to absolute index
  `start`, which is exactly what a sliced view gives you for free. Applying the
  patches in order means a repeated offset simply overwrites itself, so the
  final write is the one that sticks.
common_mistakes:
  - Copying the sliced bytes (for example list(view[start:end])) and editing the copy, so the original buffer never changes.
  - Treating offset as an absolute buffer index instead of a position relative to the window start.
  - Building the memoryview over a bytes object instead of a bytearray -- bytes is immutable, so item assignment raises TypeError.
