prompt_markdown: |
  At the museum scanning desk, every artifact scan is copied into a paper
  ledger as a string of hexadecimal digits so it can be re-keyed later without
  a computer. Each byte becomes exactly two hex digits, and the archivists
  sometimes write in uppercase for legibility. You will encode a scan to hex
  and confirm it survives the round trip back.

  Write `hex_roundtrip(payload)` that takes a single dictionary:

  ```
  {
    "data":      [5, 255, 0, 16],   # raw byte values, each 0..255
    "uppercase": false               # write A-F uppercase when true
  }
  ```

  Do the following:

  - Turn `data` into `bytes` and hex-encode it with `binascii.hexlify`, then
    decode the result to an ASCII `str`. This yields lowercase digits with
    **exactly two characters per byte**, so a byte of `5` becomes `"05"` (the
    leading zero is kept) and `255` becomes `"ff"`.
  - If `uppercase` is `true`, convert the hex string to uppercase.
  - Decode the hex string back to bytes with `binascii.unhexlify` (it accepts
    either letter case) and turn the recovered bytes into a **list of ints**.
  - Return a dictionary with:
    - `"hex"`: the hex string.
    - `"restored"`: the decoded bytes as a list of ints.
    - `"roundtrip_ok"`: `True` if `restored` equals the original `data`,
      else `False`.

  Edge cases: empty `data` produces the empty string `""` and restores to `[]`.
  Because every byte maps to two digits, the hex string length is always
  exactly twice the number of bytes.
