function_name: hex_roundtrip
input_mode: function
solution_sketch: Hexlify the bytes into an ASCII string, optionally uppercase it, unhexlify back to a list of ints, and compare against the original bytes.
sample_solution: |
  import binascii


  def hex_roundtrip(payload):
      data = payload["data"]
      uppercase = payload["uppercase"]
      hex_str = binascii.hexlify(bytes(data)).decode("ascii")
      if uppercase:
          hex_str = hex_str.upper()
      restored = list(binascii.unhexlify(hex_str))
      return {
          "hex": hex_str,
          "restored": restored,
          "roundtrip_ok": restored == list(data),
      }
hints:
  - level: 1
    text: binascii.hexlify takes bytes and returns bytes of hex digits; call .decode("ascii") to get a plain string.
  - level: 2
    text: Apply .upper() only when the uppercase flag is set -- hexlify always produces lowercase to begin with.
  - level: 3
    text: binascii.unhexlify reverses hexlify and tolerates upper or lower case, so decode, wrap in list(...), and compare to the original data.
