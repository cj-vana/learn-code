explanation_markdown: |
  Hexadecimal encoding is the plainest way to make bytes human-readable: base 16
  needs exactly two digits to cover the 0..255 range of one byte, so the mapping
  is a clean two-characters-per-byte with no padding rules to remember. The
  leading zero matters -- dropping it (writing `"5"` for byte `5`) would break
  the fixed-width alignment and make the string impossible to re-parse
  unambiguously, which is why `hexlify` always zero-pads. `unhexlify` is the
  exact inverse and is case-insensitive, so uppercasing for the ledger is purely
  cosmetic and never affects the recovered bytes. The relationship
  `len(hex) == 2 * len(data)` is a useful invariant for spotting a truncated
  transcription.
common_mistakes:
  - Using hex() or format strings that drop the leading zero, so byte 5 becomes "5" instead of "05" and breaks the two-digit alignment.
  - Leaving hexlify's output as bytes instead of decoding it to the required str.
  - Returning the unhexlify bytes object rather than converting it to a list of ints.
