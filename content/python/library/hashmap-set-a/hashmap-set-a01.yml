explanation_markdown: |
  Counting with a dict is O(n), and a strict greater-than comparison keeps the
  first genre seen at each new maximum. By walking the genres in `sorted()`
  order, the earliest alphabetical name wins any tie automatically.
common_mistakes:
  - Using `>=` instead of `>`, which lets a later tie overwrite the earlier winner.
  - Forgetting to handle the empty list and returning something other than "".
  - Comparing counts in insertion order instead of alphabetical order for ties.
