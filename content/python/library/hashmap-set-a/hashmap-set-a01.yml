prompt_markdown: |
  A radio host logs the genre of every track played during a show. Write
  `top_genre(genres)` returning the genre that was played the most times.

  If two or more genres tie for the most plays, return the one that comes first
  alphabetically. For an empty list, return the empty string `""`.
starter_code: |
  def top_genre(genres):
      return ""
function_name: top_genre
input_mode: function
solution_sketch: Count plays per genre, then pick the highest count, breaking ties alphabetically.
sample_solution: |
  def top_genre(genres):
      counts = {}
      for genre in genres:
          counts[genre] = counts.get(genre, 0) + 1
      best = ""
      best_count = 0
      for genre in sorted(counts):
          if counts[genre] > best_count:
              best = genre
              best_count = counts[genre]
      return best
