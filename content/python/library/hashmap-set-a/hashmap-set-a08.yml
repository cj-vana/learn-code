      expected: [moon]
explanation_markdown: |
  Intersection across sets keeps only titles present everywhere, and seeding the
  running result with the first playlist means each later `&=` can only shrink
  it. Converting playlists to sets discards within-playlist duplicates, and
  `sorted()` gives a stable, alphabetized answer.
common_mistakes:
  - Using union instead of intersection and returning too many songs.
  - Starting the running set empty, so every intersection stays empty.
  - Forgetting the no-playlists case and indexing `playlists[0]` on an empty list.
