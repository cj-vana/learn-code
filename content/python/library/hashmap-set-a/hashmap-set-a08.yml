prompt_markdown: |
  A music app wants the songs that appear on all of a user's playlists. Write
  `common_songs(playlists)` where `playlists` is a list of playlists, and each
  playlist is itself a list of song titles.

  Return a sorted list of the titles that appear in every playlist. Ignore
  duplicate titles within a single playlist. If there are no playlists, or the
  playlists share nothing, return an empty list.
starter_code: |
  def common_songs(playlists):
      return []
function_name: common_songs
input_mode: function
solution_sketch: Start from the first playlist's set and intersect it with each remaining one.
sample_solution: |
  def common_songs(playlists):
      if not playlists:
          return []
      common = set(playlists[0])
      for playlist in playlists[1:]:
          common &= set(playlist)
      return sorted(common)
hints:
  - level: 1
    text: A song must be present in every playlist to count.
  - level: 2
    text: Intersecting sets keeps only elements common to all of them.
  - level: 3
    text: Seed the result with the first playlist's set, then `&=` each remaining playlist.
tests:
