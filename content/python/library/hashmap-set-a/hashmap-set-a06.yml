    - name: threshold_too_high
      input: { orders: [roll, roll, roll], min_count: 4 }
      expected: []
explanation_markdown: |
  One pass builds the per-pastry counts in O(n). Filtering the dict items by the
  threshold and sorting the survivors gives a clean, alphabetized list of the
  popular pastries.
common_mistakes:
  - Using `>` instead of `>=`, which drops items ordered exactly `min_count` times.
  - Sorting by count instead of by name when the prompt asks for a sorted list of names.
  - Forgetting the empty-result case when nothing meets the threshold.
