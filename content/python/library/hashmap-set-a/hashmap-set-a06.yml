prompt_markdown: |
  A bakery records every pastry customers order during the morning. Write
  `popular_items(data)` where `data` is a dict with keys:

  - `orders`: a list of pastry names
  - `min_count`: an integer threshold

  Return a sorted list of the pastry names ordered at least `min_count` times.
  If none qualify, return an empty list.
starter_code: |
  def popular_items(data):
      return []
function_name: popular_items
input_mode: function
solution_sketch: Count orders per pastry, then keep and sort names meeting the threshold.
sample_solution: |
  def popular_items(data):
      orders = data["orders"]
      min_count = data["min_count"]
      counts = {}
      for item in orders:
          counts[item] = counts.get(item, 0) + 1
      return sorted(item for item, count in counts.items() if count >= min_count)
hints:
  - level: 1
    text: First tally how many times each pastry was ordered.
  - level: 2
    text: A dict maps each pastry name to its order count.
  - level: 3
    text: Keep the names whose count is `>= min_count`, then sort them.
tests:
