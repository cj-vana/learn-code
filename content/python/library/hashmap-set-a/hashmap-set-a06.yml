    - name: none_qualify
      input: { orders: [scone], min_count: 2 }
      expected: []
    - name: all_qualify
      input: { orders: [tart, tart, bun, bun], min_count: 2 }
      expected: [bun, tart]
    - name: threshold_one
      input: { orders: [pie, cake], min_count: 1 }
      expected: [cake, pie]
  validation:
