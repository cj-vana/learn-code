body_markdown: |
  A `for` loop hands you the list's items one at a time, in order. You do not
  reach for indexes yourself; the loop variable simply *becomes* each value.

  Here we find the highest score by keeping a "best so far" and updating it
  whenever we meet something bigger:

  ```python
  scores = [40, 90, 65, 90, 12]
  best = scores[0]
  for score in scores:
      if score > best:
          best = score
  # best is now 90
  ```

  Starting `best` at the first element (not at `0`) keeps the code correct even
  when every score is negative. The loop looks at each item exactly once, so the
  work grows in step with the list length, which is O(n).
checkpoints:
  - question: In `for score in scores:`, what does `score` hold on each pass of the loop?
    answer: The value of the current list element.
    explanation: A for loop assigns each item to the loop variable in turn, so score is the element itself, not its index.
  - question: Why start `best` at `scores[0]` instead of at 0?
    answer: Because 0 might be larger than every real score (for example if all scores are negative), which would give a wrong answer.
    explanation: Seeding from a real element guarantees the starting value is one of the actual data points.
  - question: For a list of n items, how many times does the loop body run?
    answer: "n"
    explanation: One pass per element makes the scan linear, O(n).
