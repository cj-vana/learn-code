body_markdown: |
  `split` and `join` are opposites. `split` turns one string into a list of
  pieces; `join` glues a list of strings back into one string using a separator.

  ```python
  line = "red green blue"
  words = line.split()      # ['red', 'green', 'blue']
  joined = "-".join(words)  # 'red-green-blue'
  ```

  Called with no argument, `split()` breaks on runs of whitespace, which is handy
  for pulling words out of a sentence. Notice that `join` is a method *on the
  separator*: `"-".join(words)` places a hyphen between each pair of words. Once
  you have the list, a loop can process each piece:

  ```python
  for word in words:
      print(word.upper())
  ```
checkpoints:
  - question: What does `"a,b,c".split(",")` return?
    answer: "['a', 'b', 'c']"
    explanation: split cuts the string at each comma and returns the three pieces as a list of strings.
  - question: In `"-".join(words)`, which string is used as the separator between items?
    answer: The hyphen "-", because join is called on the separator string.
    explanation: join inserts the string it is called on between consecutive list elements.
  - question: With no argument, what does `split()` break the string on?
    answer: Whitespace (spaces, tabs, or newlines).
    explanation: Argument-free split treats any run of whitespace as the delimiter and drops empty pieces.
