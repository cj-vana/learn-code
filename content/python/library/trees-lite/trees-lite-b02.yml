prompt_markdown: |
  A river delta is mapped as a binary tree of channel junctions. The source is the
  root at tier `0`, its two branches are tier `1`, and so on. A survey crew wants
  the **busiest tier**: the level that contains the most junctions.

  Write `widest_level(tree)` where `tree` is a binary tree of nested dictionaries.
  Each node is `{"value": ..., "left": ..., "right": ...}`, where `left` and
  `right` are child nodes or `None`, and an empty delta is `None`.

  Walk the tree **breadth-first**, tier by tier, and return a list
  `[tier_index, width]` naming the tier with the most junctions and how many
  junctions it holds. If two tiers tie for the most junctions, return the
  **smaller** tier index. An empty delta has no tiers, so return `[-1, 0]`.

  For example, a delta whose tiers hold 1, then 2, then 4 junctions returns
  `[2, 4]`.
starter_code: |
  def widest_level(tree):
      # Breadth-first sweep; return [tier_index, width] of the busiest tier.
      return [-1, 0]
function_name: widest_level
input_mode: function
solution_sketch: Do a level-order sweep, one tier at a time; the current frontier's length is that tier's width. Track the best width and its tier, updating only on a strictly larger width so the smallest index wins ties.
sample_solution: |
  def widest_level(tree):
      if tree is None:
          return [-1, 0]

      best_index = 0
      best_width = 0
      tier = 0
      frontier = [tree]
      while frontier:
          width = len(frontier)
          if width > best_width:
              best_width = width
              best_index = tier
          nxt = []
          for node in frontier:
              if node["left"] is not None:
                  nxt.append(node["left"])
              if node["right"] is not None:
                  nxt.append(node["right"])
          frontier = nxt
          tier += 1
      return [best_index, best_width]
hints:
