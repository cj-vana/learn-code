explanation_markdown: |
  Breadth-first traversal is the natural fit whenever a question is phrased "per
  level," because it hands you each tier as a complete batch. The clean version
  keeps a `frontier` list of the current tier's nodes: its length *is* that tier's
  width, and the next frontier is every non-`None` child of the current one. You
  never need explicit depth bookkeeping on individual nodes; the loop advances one
  tier per iteration, so a counter tracks the tier index for free. The tie rule
  falls out of a single choice: update the best only when a width is *strictly*
  greater than the current best. Since tiers are visited in increasing order, an
  equal-width later tier can never displace an earlier one, so the smaller index
  wins automatically. Each junction is enqueued and dequeued once, making the sweep
  O(n).
common_mistakes:
  - Using a >= comparison when tracking the best width, which lets a later tier overwrite an earlier tie and returns the wrong index.
  - Adding None children to the next frontier, which inflates the width counts with phantom junctions.
  - Returning the width alone or the tier alone instead of the [tier_index, width] pair the spec asks for.
