explanation_markdown: |
  A binary search tree turns lookup into a series of yes/no decisions. Each
  comparison discards an entire subtree: if the target is smaller than the
  current value, everything on the right is irrelevant, and vice versa. So you
  follow a single root-to-leaf path and stop the moment you match or step onto
  `None`. The `miss_between` case is the instructive one - 6 is larger than 5 so
  you go right to 8, then smaller than 8 so you go left into an empty branch and
  correctly report `False` without ever touching the left half of the tree. The
  walk costs O(height), far better than scanning all n nodes.
common_mistakes:
  - Recursing into both children like a plain traversal, which throws away the search-tree advantage.
  - Forgetting the empty-tree and fell-off-the-tree case, so a missing target never returns False.
  - Reversing the comparison and stepping the wrong direction.
