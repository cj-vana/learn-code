function_name: bin_contains
input_mode: function
solution_sketch: Compare the target to the current value and step left when smaller or right when larger until you match or fall off the tree.
sample_solution: |
  def bin_contains(data):
      node = data["tree"]
      target = data["target"]
      while node is not None:
          if target == node["value"]:
              return True
          if target < node["value"]:
              node = node["left"]
          else:
              node = node["right"]
      return False
hints:
  - level: 1
    text: You never need to look at both children - the ordering tells you which way to go.
  - level: 2
    text: If the target is smaller than the current value, only the left subtree can hold it; if larger, only the right.
  - level: 3
    text: Loop while the node is not None, return True on a match, else move to node["left"] or node["right"] by comparison; return False when you run off the tree.
