prompt_markdown: |
  A warehouse stores part numbers in a binary *search* tree: at every node, all
  smaller numbers live in the left subtree and all larger ones in the right. The
  tree uses nested dictionaries (`{"value", "left", "right"}`, empty branch is
  `None`).

  Write `bin_contains(data)` where `data` is a dict with two keys:

  - `data["tree"]` - the search tree (or `None`)
  - `data["target"]` - the part number to find

  Return `True` if the target appears in the tree and `False` otherwise. Use the
  ordering to walk *one* path down the tree rather than scanning every node.
