      expected: 6
explanation_markdown: |
  Counting nodes is the simplest recursive tree pattern. The base case is the
  empty tree, which has zero nodes. Any non-empty node contributes one for
  itself plus the counts returned by recursing into its two children. Because
  each child is itself a valid tree, the same function handles it, and the `None`
  guard stops the descent at every empty branch. The work is O(n): each node is
  visited exactly once.
common_mistakes:
  - Forgetting the None base case and indexing None["value"], which raises a TypeError.
  - Counting only leaves or only one side instead of adding both subtree counts.
  - Returning 1 for an empty tree instead of 0.
