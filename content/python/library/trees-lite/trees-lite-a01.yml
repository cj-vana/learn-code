prompt_markdown: |
  A greenhouse irrigation manifold is modelled as a binary tree of nested
  dictionaries. Each node is `{"value": ..., "left": ..., "right": ...}`, where
  `left` and `right` are child nodes or `None`, and an empty manifold is `None`.

  Write `count_nodes(tree)` that returns the total number of nodes (junctions) in
  the tree. An empty tree has 0 nodes.
starter_code: |
  def count_nodes(tree):
      # Return the number of nodes in the tree.
      return 0
function_name: count_nodes
input_mode: function
solution_sketch: Recurse - an empty tree is 0, otherwise 1 plus the counts of both subtrees.
sample_solution: |
  def count_nodes(tree):
      if tree is None:
          return 0
      return 1 + count_nodes(tree["left"]) + count_nodes(tree["right"])
hints:
  - level: 1
    text: An empty branch (None) contributes nothing to the count.
  - level: 2
    text: A node's total is itself plus whatever its left and right subtrees contain.
  - level: 3
    text: Return 0 when tree is None, otherwise 1 + count_nodes(tree["left"]) + count_nodes(tree["right"]).
