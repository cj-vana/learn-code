prompt_markdown: |
  An orchard is trained as a binary tree of grafts, each holding a vigor reading.
  Every autumn the crew saws off any limb where *every* graft in that limb is too
  weak to keep. Write `prune_dead_branches(job)` where `job` is a dict with:

  - `"tree"`: a binary tree of nested dictionaries. Each node is
    `{"value": ..., "left": ..., "right": ...}`, where `left` and `right` are child
    nodes or `None`. An empty orchard is `None`.
  - `"threshold"`: an integer vigor cutoff.

  A graft **passes** if its value is greater than or equal to `threshold`. Remove
  (prune) an entire subtree only when it contains **no** passing graft — that is,
  when every node in it is below the threshold. A weak graft that still leads to at
  least one passing descendant must be kept, because sawing it off would drop the
  survivor too.

  After pruning, return a dict `{"remaining": count, "root_survives": flag}` where
  `count` is the number of nodes left in the pruned tree and `flag` is `True` if
  the root itself survived (the pruned tree is non-empty) or `False` otherwise. An
  empty orchard returns `{"remaining": 0, "root_survives": False}`.
starter_code: |
  def prune_dead_branches(job):
      # Prune subtrees with no passing node, then report survivors.
      return {"remaining": 0, "root_survives": False}
function_name: prune_dead_branches
input_mode: function
solution_sketch: Post-order recursion returns a pruned subtree or None; a node is dropped only when it is below threshold and both pruned children are None. Then count the surviving nodes and check whether the pruned root is non-None.
sample_solution: |
  def prune_dead_branches(job):
      threshold = job["threshold"]

      def prune(node):
          if node is None:
              return None
          left = prune(node["left"])
          right = prune(node["right"])
          if node["value"] < threshold and left is None and right is None:
              return None
          return {"value": node["value"], "left": left, "right": right}

      def count(node):
          if node is None:
              return 0
          return 1 + count(node["left"]) + count(node["right"])

      pruned = prune(job["tree"])
      return {"remaining": count(pruned), "root_survives": pruned is not None}
hints:
  - level: 1
    text: Decide each node's fate only after you know what happened to its children, so recurse into both subtrees first.
  - level: 2
    text: A node disappears exactly when it is below the threshold and both of its children came back pruned to None; otherwise it stays, wired to whatever its children became.
  - level: 3
    text: Have the recursion return the rebuilt subtree or None, then run a simple node count on the pruned result and check whether that result is None for root survival.
