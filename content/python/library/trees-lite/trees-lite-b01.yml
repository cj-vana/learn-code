explanation_markdown: |
  The subtle word in the spec is *every*: a limb is dead only if it holds no
  passing graft at all, so you cannot judge a node on its own value. A weak node
  sitting above a strong descendant has to stay, because it is the path that keeps
  the survivor attached. Post-order recursion resolves this cleanly. By pruning
  both children before looking at the current node, the two child results already
  encode "did anything survive down there." A node is dropped only when it fails
  the threshold and both children came back as `None`; any surviving child forces
  the node to stay. Rebuilding each kept node into a fresh dictionary keeps the
  logic pure and easy to count afterwards. The traversal visits every node once, so
  pruning is O(n), and the final count and root check read straight off the pruned
  result.
common_mistakes:
  - Pruning any node whose own value is below the threshold, which wrongly cuts weak nodes that lead to a survivor.
  - Deciding a node's fate before recursing into its children, so the child results are not yet available.
  - Reporting root_survives from the original tree instead of the pruned tree, which stays True even when the whole orchard was removed.
