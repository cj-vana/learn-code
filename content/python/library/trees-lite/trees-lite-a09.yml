explanation_markdown: |
  The efficient balance check folds height and balance into one bottom-up pass. A
  helper returns a real height while every visited node is balanced, but returns
  a sentinel `-1` the instant it finds a node whose two subtree heights differ by
  more than one. Because `-1` propagates straight back up, one bad joint fails the
  entire sculpture. The `hidden_deep_imbalance` case is the payoff: the root's
  two sides differ by only one, so a naive root-only check would pass it, yet node
  2 hangs a height-2 chain (`4 -> 8`) against an empty right side and fails. This
  short-circuiting keeps the work at O(n) instead of recomputing heights
  repeatedly.
common_mistakes:
  - Checking balance only at the root instead of at every node.
  - Calling a separate height function inside the balance check at every node, which degrades to O(n^2).
  - Comparing heights with a strict difference of zero, rejecting legitimately balanced trees whose sides differ by one.
