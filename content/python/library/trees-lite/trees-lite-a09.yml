prompt_markdown: |
  A hanging mobile sculpture only balances if it is even *at every joint*, not
  just at the top bar. A joint is level when the heights of its two hanging
  subtrees differ by at most one. The sculpture is a binary tree of nested
  dictionaries (`{"value", "left", "right"}`, empty branch is `None`), where a
  subtree's height is the number of nodes on its longest downward path (empty
  tree height `0`).

  Write `hangs_level(tree)` returning `True` only if *every* node is balanced by
  that rule, and `False` otherwise. An empty tree is balanced.

  A tree can look even at the top yet hide a long unbalanced chain deep inside,
  so a single check at the root is not enough.
