function_name: hangs_level
input_mode: function
solution_sketch: Compute height bottom-up and report imbalance the moment any node's two subtree heights differ by more than one.
sample_solution: |
  def hangs_level(tree):
      def check(node):
          # Returns height if the subtree is balanced, else -1.
          if node is None:
              return 0
          left = check(node["left"])
          if left == -1:
              return -1
          right = check(node["right"])
          if right == -1:
              return -1
          if abs(left - right) > 1:
              return -1
          return 1 + max(left, right)

      return check(tree) != -1
hints:
  - level: 1
    text: Balance is a property of every node, so a root that looks even can still sit above a lopsided joint.
  - level: 2
    text: Compute each subtree's height from the bottom up, and let a node report failure as soon as its two sides differ by more than one.
  - level: 3
    text: Have a helper return the height when balanced and a sentinel like -1 when not; propagate -1 upward so one bad joint fails the whole tree.
