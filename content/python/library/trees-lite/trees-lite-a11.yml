prompt_markdown: |
  A registrar has a roster already sorted in ascending order and wants to rebuild
  it as a *balanced* card index (a binary search tree as short as possible). The
  trick: pick the middle entry as the root so equal counts fall on each side,
  then rebuild the left half and right half the same way.

  Write `rebuild_index(roster)` where `roster` is a list of distinct integers in
  ascending order. Build the balanced tree using this rule and return its
  **pre-order** traversal (root, left subtree, right subtree) as a list. For the
  middle, use index `len // 2`. An empty roster returns `[]`.

  You do not have to return the tree itself - just the pre-order list of the tree
  you build.
starter_code: |
  def rebuild_index(roster):
      # Build a balanced BST (middle element = index len // 2 as root),
      # then return its pre-order traversal as a list.
      return []
function_name: rebuild_index
input_mode: function
solution_sketch: Recursively take the middle element as the root and prepend it to the pre-order of the left half then the right half.
sample_solution: |
  def rebuild_index(roster):
      if not roster:
          return []
      mid = len(roster) // 2
      left = rebuild_index(roster[:mid])
      right = rebuild_index(roster[mid + 1:])
      return [roster[mid]] + left + right
hints:
  - level: 1
    text: The root of a balanced tree built from sorted data is the middle element, splitting the rest into two halves.
  - level: 2
    text: Pre-order records the root first, so you can emit the middle value before recursing into the left and right slices.
  - level: 3
    text: With mid = len(roster)//2, return [roster[mid]] + rebuild_index(roster[:mid]) + rebuild_index(roster[mid+1:]).
