explanation_markdown: |
  Building a balanced tree from sorted input is a slicing recursion. The middle
  element becomes the root because half the remaining values are smaller (they go
  left) and half are larger (they go right), which keeps the two sides the same
  height. Because you want the *pre-order* of that tree, you never have to
  materialize the dictionaries at all: pre-order emits the root first, so you can
  output `roster[mid]` and then recurse into the two slices in the same order.
  With seven values the middle is 4, its left half `[1, 2, 3]` rebuilds to
  `2, 1, 3`, and its right half `[5, 6, 7]` rebuilds to `6, 5, 7`, giving
  `[4, 2, 1, 3, 6, 5, 7]`. Each value is chosen as a root exactly once, so the
  build is O(n).
common_mistakes:
  - Using a different middle index than len // 2, which produces a valid but differently-shaped tree and mismatched output.
  - Including the middle element in one of the recursive halves, duplicating or skipping values.
  - Emitting in-order (which just re-sorts the roster) instead of pre-order.
