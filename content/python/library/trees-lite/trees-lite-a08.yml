prompt_markdown: |
  An archivist claims every drawer in a filing system obeys the search-tree rule:
  at every node, *all* values in the left subtree are strictly smaller and *all*
  values in the right subtree are strictly larger. You must audit that claim.

  The system is a binary tree of nested dictionaries (`{"value", "left",
  "right"}`, empty branch is `None`). Write `is_valid_filing(tree)` returning
  `True` if the whole tree is a valid binary search tree (no duplicates allowed)
  and `False` otherwise. An empty tree is valid.

  Beware the classic trap: it is *not* enough to check each node against its
  parent. A node must respect every ancestor above it.
starter_code: |
  def is_valid_filing(tree):
      # Return True if tree is a strictly-ordered binary search tree.
      return True
function_name: is_valid_filing
input_mode: function
solution_sketch: Recurse with a (low, high) open interval, tightening the high bound on left moves and the low bound on right moves.
sample_solution: |
  def is_valid_filing(tree, low=None, high=None):
      if tree is None:
          return True
      value = tree["value"]
      if low is not None and value <= low:
          return False
      if high is not None and value >= high:
          return False
      return (
          is_valid_filing(tree["left"], low, value)
          and is_valid_filing(tree["right"], value, high)
      )
hints:
  - level: 1
    text: Comparing a node only to its immediate parent misses violations that span several levels.
  - level: 2
    text: Carry an allowed (low, high) range into each recursive call; going left lowers the ceiling, going right raises the floor.
  - level: 3
    text: A node must satisfy low < value < high; recurse left with high = value and right with low = value, using <= and >= to reject duplicates.
tests:
  public:
    - name: empty
      input: null
      expected: true
    - name: single
      input: {value: 7, left: null, right: null}
