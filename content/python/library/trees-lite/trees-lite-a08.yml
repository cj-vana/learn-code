      input: {value: 5, left: {value: 3, left: null, right: {value: 6, left: null, right: null}}, right: {value: 8, left: null, right: null}}
      expected: false
    - name: left_bigger_than_root
      input: {value: 5, left: {value: 9, left: null, right: null}, right: null}
      expected: false
    - name: duplicate_value
      input: {value: 5, left: {value: 5, left: null, right: null}, right: null}
      expected: false
explanation_markdown: |
  The reliable way to validate a BST is to hand each recursive call the open
  interval `(low, high)` the node is allowed to occupy. Every left move tightens
  the ceiling to the current value; every right move raises the floor. The
  `ancestor_violation` case is exactly the trap: node 6 beats its parent 3
  (`6 > 3`), yet it lives in the left subtree of 5, so it arrives with
  `high = 5` and `6 >= 5` fails. A per-parent check would wave it through. Using
  `<=` and `>=` also rejects duplicates, as the `duplicate_value` case shows.
  Each node is checked once, so the audit runs in O(n).
common_mistakes:
  - Comparing each node only to its parent, which passes trees like the ancestor_violation case.
  - Using strict-less on one side but allowing equality on the other, letting duplicates slip through.
  - Resetting the bounds at each node instead of threading them down the recursion.
