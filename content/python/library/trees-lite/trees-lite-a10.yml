prompt_markdown: |
  Two delivery vans start at the central depot and drive outward down a branching
  road network, each ending at its own value. The *last depot they share* - the
  deepest fork that both destinations hang beneath - is their lowest common
  ancestor. A node counts as an ancestor of itself.

  The network is a binary tree of nested dictionaries (`{"value", "left",
  "right"}`, empty branch is `None`). Write `shared_depot(data)` where `data` is a
  dict with:

  - `data["tree"]` - the tree (never empty for this task)
  - `data["a"]` and `data["b"]` - two distinct values, both guaranteed present

  Return the *value* of their lowest common ancestor. Do not assume the tree is a
  search tree - values are not ordered.
starter_code: |
