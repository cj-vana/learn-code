explanation_markdown: |
  The general-tree LCA is one elegant recursion. `find` returns a node whenever it
  contains either target below it (or is a target itself). At each node you look
  left and right: if *both* sides come back non-empty, the two targets diverge
  right here, so this node is their lowest common ancestor. If only one side
  reports a hit, the answer lies entirely on that side, so you pass it upward.
  The `ancestor_is_target` case shows why "a node is its own ancestor" matters -
  searching for 8 and 9 stops at 8 the moment it is reached, since 9 already
  hangs beneath it. Because the recursion touches each node at most once, it runs
  in O(n) without needing the values to be sorted.
common_mistakes:
  - Assuming a search tree and comparing values to pick a direction, which breaks on unordered trees.
  - Returning the node object instead of its value, so the exact-match grader fails.
  - Forgetting that a target found at the current node already covers its whole subtree.
