      # data = {"tree": <node>, "a": <value>, "b": <value>}
      # Return the value of the lowest common ancestor of a and b.
      return None
function_name: shared_depot
input_mode: function
solution_sketch: Recurse both sides; a node whose left and right searches each find one target is the meeting point, otherwise bubble up the side that found something.
sample_solution: |
  def shared_depot(data):
      a = data["a"]
      b = data["b"]

      def find(node):
          if node is None or node["value"] in (a, b):
              return node
          left = find(node["left"])
          right = find(node["right"])
          if left is not None and right is not None:
              return node
          return left if left is not None else right

      return find(data["tree"])["value"]
hints:
  - level: 1
    text: Search both subtrees for the two targets and watch where they first split apart.
  - level: 2
    text: If one target is found in a node's left subtree and the other in its right, that node is the answer.
  - level: 3
    text: Return the node itself when it equals a or b; if both child searches come back non-None the current node is the LCA, otherwise return whichever side found a hit.
