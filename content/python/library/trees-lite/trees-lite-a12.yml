explanation_markdown: |
  This problem composes two ideas from the module. First, the defining property
  of a binary search tree: an in-order traversal (left, node, right) emits values
  in ascending order for free, because everything left of a node is smaller and
  everything right is larger. Second, once you have that sorted sequence, the
  `k`th smallest is simply the element at index `k - 1`. On the sample tree the
  in-order walk produces `[2, 3, 4, 5, 8, 9]`, so rank 4 lands on the root value
  5 and rank 6 lands on 9. The walk visits each node once for O(n) time; an
  interview-grade refinement would stop early after emitting `k` values, but
  collecting the full order is correct and clear.
common_mistakes:
  - Using a pre-order or post-order walk, which does not produce sorted values.
  - Off-by-one errors - k is 1-based, so the answer is at index k - 1, not k.
  - Sorting the values with an extra pass instead of trusting the in-order order the BST already provides.
