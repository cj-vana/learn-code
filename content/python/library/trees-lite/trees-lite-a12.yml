function_name: kth_coolest
input_mode: function
solution_sketch: An in-order walk of a search tree yields sorted values, so collect them in order and take the element at position k-1.
sample_solution: |
  def kth_coolest(data):
      k = data["k"]
      ordered = []

      def walk(node):
          if node is None:
              return
          walk(node["left"])
          ordered.append(node["value"])
          walk(node["right"])

      walk(data["tree"])
      return ordered[k - 1]
