prompt_markdown: |
  A cold-storage facility keeps its temperature readings in a binary *search*
  tree (left subtree smaller, right subtree larger), stored as nested
  dictionaries (`{"value", "left", "right"}`, empty branch is `None`). A
  technician wants the `k`th coolest reading - the `k`th smallest value,
  counting from 1.

  Write `kth_coolest(data)` where `data` is a dict with:

  - `data["tree"]` - the search tree
  - `data["k"]` - a 1-based rank, guaranteed between 1 and the number of nodes

  Return the value with that rank. Lean on the search-tree ordering so you do not
  have to sort anything yourself.
