prompt_markdown: |
  A survey team measures how deep a branching mine shaft runs by counting the
  chambers on its longest top-to-bottom path. The shaft is a binary tree of
  nested dictionaries (`{"value", "left", "right"}`, empty branch is `None`).

  Write `shaft_height(tree)` returning the height: the number of nodes on the
  longest path from the root down to a leaf. Define an empty tree as height `0`
  and a single node as height `1`.
starter_code: |
  def shaft_height(tree):
      # Return the number of nodes on the longest root-to-leaf path.
      return 0
function_name: shaft_height
input_mode: function
solution_sketch: Height is 0 for an empty tree, else 1 plus the taller of the two subtree heights.
sample_solution: |
  def shaft_height(tree):
      if tree is None:
          return 0
      return 1 + max(shaft_height(tree["left"]), shaft_height(tree["right"]))
hints:
  - level: 1
    text: An empty branch has height 0, so it can never be the longer side.
  - level: 2
    text: A node's height is one more than the height of its taller subtree.
  - level: 3
    text: Return 0 for None, else 1 + max(shaft_height(tree["left"]), shaft_height(tree["right"])).
tests:
  public:
    - name: empty
      input: null
      expected: 0
    - name: single
      input: {value: 7, left: null, right: null}
      expected: 1
    - name: full_tree
      input: {value: 5, left: {value: 3, left: {value: 2, left: null, right: null}, right: {value: 4, left: null, right: null}}, right: {value: 8, left: null, right: {value: 9, left: null, right: null}}}
      expected: 3
  validation:
