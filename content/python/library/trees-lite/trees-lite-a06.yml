      input: {value: 1, left: {value: 2, left: {value: 3, left: null, right: null}, right: null}, right: null}
      expected: 3
    - name: two_children
      input: {value: 10, left: {value: 4, left: null, right: null}, right: {value: 15, left: null, right: null}}
      expected: 2
    - name: lopsided_deep_right
      input: {value: 1, left: {value: 2, left: null, right: null}, right: {value: 3, left: null, right: {value: 4, left: null, right: {value: 5, left: null, right: null}}}}
      expected: 4
explanation_markdown: |
  Height is the classic bottom-up recursion: each node reports one more than the
  taller of its two children. The `None` guard returns 0, which is what lets a
  missing branch lose the `max` comparison automatically - a node with one child
  simply takes that child's height plus one. The `lopsided_deep_right` case makes
  the point: a short left side is ignored and the answer follows the long right
  chain (1 -> 3 -> 4 -> 5), giving height 4. Every node is visited once, so the
  work is O(n).
common_mistakes:
  - Returning 1 for an empty tree, which over-counts by one at every leaf.
  - Adding the two subtree heights instead of taking their max.
  - Counting edges instead of nodes, giving an answer one lower than expected.
