      input: {value: 1, left: {value: 2, left: {value: 3, left: null, right: null}, right: null}, right: null}
      expected: [3, 2, 1]
    - name: right_chain
      input: {value: 1, left: null, right: {value: 2, left: null, right: {value: 3, left: null, right: null}}}
      expected: [3, 2, 1]
    - name: two_children
      input: {value: 10, left: {value: 4, left: null, right: null}, right: {value: 15, left: null, right: null}}
      expected: [4, 15, 10]
explanation_markdown: |
  Post-order defers the current value until *after* both recursive calls, so the
  root always appears last and every parent trails its descendants. That is why
  the full tree yields `[2, 4, 3, 9, 8, 5]` with 5 at the end. This ordering is
  the one to reach for whenever a node's result depends on its children being
  processed first, such as summing a subtree or safely tearing a structure down.
  The empty-tree base case contributes `[]`, and each node is visited once for
  O(n) time.
common_mistakes:
  - Placing the value first or in the middle, producing pre-order or in-order.
  - Swapping the two subtree calls, which reverses left and right within a level.
  - Forgetting the None base case and indexing an empty branch.
