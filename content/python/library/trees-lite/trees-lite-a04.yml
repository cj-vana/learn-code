prompt_markdown: |
  A crew dismantling a branching scaffold must remove every supported section
  before the beam that holds it up. That is a *post-order* walk: clear the whole
  left subtree, then the whole right subtree, and only then record the current
  joint.

  The scaffold is a binary tree of nested dictionaries (`{"value", "left",
  "right"}`, empty branch is `None`). Write `postorder_values(tree)` returning a
  list of node values in post-order: left subtree, right subtree, then the
  current node. An empty tree returns `[]`.
starter_code: |
  def postorder_values(tree):
      # Return node values in post-order: left subtree, right subtree, node.
      return []
function_name: postorder_values
input_mode: function
solution_sketch: Concatenate the post-order of the left subtree, the post-order of the right subtree, then the node's value.
sample_solution: |
  def postorder_values(tree):
      if tree is None:
          return []
      return (
          postorder_values(tree["left"])
          + postorder_values(tree["right"])
          + [tree["value"]]
      )
hints:
  - level: 1
    text: A node is recorded only after both of its subtrees are fully handled.
  - level: 2
    text: Concatenate the left subtree's list, then the right subtree's list, then the current value.
  - level: 3
    text: Return [] for None, else postorder_values(tree["left"]) + postorder_values(tree["right"]) + [tree["value"]].
tests:
  public:
    - name: empty
      input: null
      expected: []
    - name: single
      input: {value: 7, left: null, right: null}
      expected: [7]
    - name: full_tree
      input: {value: 5, left: {value: 3, left: {value: 2, left: null, right: null}, right: {value: 4, left: null, right: null}}, right: {value: 8, left: null, right: {value: 9, left: null, right: null}}}
      expected: [2, 4, 3, 9, 8, 5]
  validation:
