body_markdown: |
  A *set* holds unique values with no duplicates and no fixed order.
  Wrapping a list in `set()` is the quickest way to drop repeats:

  ```python
  emails = ["a@x.com", "b@x.com", "a@x.com"]
  print(len(set(emails)))  # 2
  ```

  Sets shine when you compare two collections. The operators `&`, `|`,
  and `-` answer common questions directly:

  ```python
  morning = {"ana", "ben", "cara"}
  evening = {"ben", "dan"}
  print(morning & evening)  # {'ben'}          shared by both
  print(morning | evening)  # {'ana', 'ben', 'cara', 'dan'}  either group
  print(morning - evening)  # {'ana', 'cara'}  only in morning
  ```

  Membership tests are the other big win. Checking `"ben" in morning`
  uses hashing, so it stays fast (average O(1)) even as the set grows,
  while scanning a list is O(n).
checkpoints:
  - question: What is the value of `len(set(["a", "a", "b"]))`?
    answer: "2"
    explanation: A set discards duplicates, so only the distinct values a and b remain.
  - question: What does `{1, 2, 3} & {2, 3, 4}` evaluate to?
    answer: "{2, 3}"
    explanation: The & operator keeps only the elements present in both sets, the intersection.
  - question: Why is `x in big_set` typically faster than `x in big_list` for large data?
    answer: Sets use hashing for average O(1) lookups, while a list must scan its elements one by one in O(n).
    explanation: Hash-based membership avoids checking every element, which matters as the collection grows.
