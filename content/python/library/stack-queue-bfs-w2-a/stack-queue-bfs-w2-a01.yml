prompt_markdown: |
  A photo viewer keeps a history of the pictures you have opened. You are given a
  list of `actions`. Each action is either a photo id string (open that photo and
  put it on top of the history), or the token `"back"` which returns you to the
  previously opened photo.

  Pressing `"back"` when you are already on the earliest opened photo does
  nothing, and pressing `"back"` before any photo has been opened also does
  nothing.

  Write `current_photo(actions)` returning the id of the photo currently on
  screen, or the empty string `""` if no photo has been opened.
starter_code: |
  def current_photo(actions):
      return ""
function_name: current_photo
input_mode: function
solution_sketch: Treat the view history as a stack; open pushes, back pops when more than one photo remains.
sample_solution: |
  def current_photo(actions):
      history = []
      for action in actions:
          if action == "back":
              if len(history) > 1:
                  history.pop()
          else:
              history.append(action)
      return history[-1] if history else ""
hints:
  - level: 1
    text: The photo on screen is always the most recently opened one still in the history.
  - level: 2
    text: Opening a photo pushes it onto a stack; pressing back removes the top item.
  - level: 3
    text: Only pop on back when the history has more than one photo, so you never leave the earliest one.
tests:
