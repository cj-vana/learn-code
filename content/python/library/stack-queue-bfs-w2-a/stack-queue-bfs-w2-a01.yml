    - name: reopen_after_back
      input: ["x", "y", "back", "z"]
      expected: "z"
explanation_markdown: |
  Navigation history is a natural stack: the last photo you opened is the first
  one you return from. Opening pushes an id, and `"back"` pops the top. Guarding
  the pop with `len(history) > 1` keeps the earliest photo pinned so extra back
  presses have no effect, and an empty history returns `""`. Each action is
  handled once, so the walk is O(n).
common_mistakes:
  - Popping the last photo on back and losing the earliest one.
  - Crashing on back when the history is empty instead of ignoring it.
  - Returning the whole history instead of just the top photo.
