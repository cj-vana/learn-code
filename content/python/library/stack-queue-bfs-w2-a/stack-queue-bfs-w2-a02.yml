explanation_markdown: |
  This is a monotonic stack. Because only the top pancakes can be crushed, a
  single stack that stays non-increasing from bottom to top captures the rule:
  each new width pops everything strictly smaller before it lands. Equal widths
  survive because the comparison is strict. Although the inner loop can pop many
  items, every pancake is pushed and popped at most once, so the total work is
  O(n).
common_mistakes:
  - Using <= and wrongly crushing pancakes of equal width.
  - Forgetting to push the new width after crushing.
  - Comparing against the bottom of the stack instead of the top.
