prompt_markdown: |
  A cook builds a stack of pancakes one at a time from a list of `widths`. Before
  placing the next pancake, any pancakes currently on top of the stack that are
  **strictly narrower** than the new one are crushed and removed (a wider pancake
  flattens the thin ones beneath it). The new pancake is then placed on top.

  Write `crush_pancakes(widths)` returning the final stack as a list from bottom
  to top. An empty input returns an empty list.
starter_code: |
  def crush_pancakes(widths):
      return []
function_name: crush_pancakes
input_mode: function
solution_sketch: Keep a stack and pop every strictly narrower pancake before pushing the new width.
sample_solution: |
  def crush_pancakes(widths):
      stack = []
      for width in widths:
          while stack and stack[-1] < width:
              stack.pop()
          stack.append(width)
      return stack
hints:
  - level: 1
    text: Only the pancakes near the top can be crushed by a new one.
  - level: 2
    text: Before pushing a width, repeatedly pop while the top of the stack is smaller than it.
  - level: 3
    text: Use strict less-than so equal widths are kept, then append the new width.
tests:
  public:
    - name: empty
