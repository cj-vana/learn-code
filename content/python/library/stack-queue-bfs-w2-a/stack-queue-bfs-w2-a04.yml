prompt_markdown: |
  A rail yard has one dead-end siding used to reorder train cars. Cars roll in on
  the arrival track in a fixed order. Each car may be pushed onto the siding, and
  the car at the mouth of the siding (the most recently pushed) may be pulled off
  onto the departure track at any time. A pushed car can never jump ahead of a
  later-pushed one still on the siding.

  You are given a dict `data` with keys `"arrival"` (the order cars enter) and
  `"departure"` (the wanted order onto the departure track). Both list the same
  cars.

  Write `can_shunt(data)` returning `True` if the departure order can be produced
  using the single siding, and `False` otherwise.
starter_code: |
