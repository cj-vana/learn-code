explanation_markdown: |
  The siding is a stack, so producing the departure order is the classic
  stack-sortability check. Feed arrivals in one by one; whenever the top of the
  siding is the very next car you want out, pop it. Greedy popping is safe
  because if the needed car is on top you must take it now, since anything pushed
  later would block it. If every car has arrived and the siding ends empty, the
  order was achievable; a leftover car means it was impossible. Each car is
  pushed and popped at most once, so the check is O(n).
common_mistakes:
  - Treating the siding as a queue (first in first out) instead of a stack.
  - Stopping at the first mismatch instead of continuing to push more arrivals.
  - Forgetting to confirm the siding is empty at the end.
