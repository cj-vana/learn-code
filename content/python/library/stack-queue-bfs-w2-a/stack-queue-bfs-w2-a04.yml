function_name: can_shunt
input_mode: function
solution_sketch: Push arrivals onto a stack and greedily pop whenever the top matches the next wanted departure.
sample_solution: |
  def can_shunt(data):
      arrival = data["arrival"]
      departure = data["departure"]
      siding = []
      i = 0
      for car in arrival:
          siding.append(car)
          while siding and i < len(departure) and siding[-1] == departure[i]:
              siding.pop()
              i += 1
      return not siding
hints:
  - level: 1
    text: The siding behaves exactly like a stack, last car in is the first car out.
  - level: 2
    text: Push each arriving car, then pop while the top equals the next departure you still need.
  - level: 3
    text: The order works only if the siding is empty once every car has arrived and been placed.
