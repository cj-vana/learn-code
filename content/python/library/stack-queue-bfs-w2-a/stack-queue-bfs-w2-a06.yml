      return 0
function_name: patch_size
input_mode: function
solution_sketch: Flood-fill from the start with a queue, visiting same-crop neighbors once each.
sample_solution: |
  def patch_size(data):
      grid = data["grid"]
      r0, c0 = data["start"]
      if not grid or not grid[0]:
          return 0
      rows, cols = len(grid), len(grid[0])
      crop = grid[r0][c0]
      seen = {(r0, c0)}
      queue = [(r0, c0)]
      count = 0
      while queue:
          r, c = queue.pop(0)
          count += 1
          for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
              nr, nc = r + dr, c + dc
              if 0 <= nr < rows and 0 <= nc < cols and (nr, nc) not in seen and grid[nr][nc] == crop:
                  seen.add((nr, nc))
                  queue.append((nr, nc))
      return count
