prompt_markdown: |
  A community garden is a grid of plots, where each cell holds a one-letter crop
  code. Two plots belong to the same patch if they share the same crop and touch
  edge-to-edge (up, down, left, or right; not diagonally).

  You are given a dict `data` with keys `"grid"` (a list of equal-length rows of
  crop codes) and `"start"` (a `[row, col]` pair). Write `patch_size(data)`
  returning the number of plots in the connected patch that contains the starting
  plot, counting the starting plot itself.
starter_code: |
