explanation_markdown: |
  Measuring one connected patch is a flood fill. Beginning at the start plot, a
  queue explores outward, and each newly discovered same-crop neighbor is marked
  seen the moment it is enqueued so it is never counted twice. Diagonal plots are
  excluded because only the four orthogonal offsets are followed. When the queue
  drains, every plot reachable through matching neighbors has been counted. Each
  cell enters the queue at most once, so the search is O(rows * cols).
common_mistakes:
  - Counting diagonal neighbors, which are not part of the same patch.
  - Marking cells seen only when dequeued, letting duplicates pile up in the queue.
  - Comparing against a neighbor's own crop instead of the starting crop.
