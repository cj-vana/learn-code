explanation_markdown: |
  Tracking "how deep are we right now" is exactly the height of a stack of open
  boxes. Each `(` pushes and each valid `)` pops, so the running height is the
  current nesting depth. Recording the maximum height after every push gives the
  deepest nesting, even when boxes are left unclosed. Ignored characters never
  touch the stack. One pass over the string makes this O(n).
common_mistakes:
  - Returning the count of boxes instead of the maximum simultaneous depth.
  - Popping on a close when no box is open and hitting an error.
  - Checking the height only at the end instead of after each open.
