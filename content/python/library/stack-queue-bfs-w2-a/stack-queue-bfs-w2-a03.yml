prompt_markdown: |
  A prank gift is a box inside a box inside a box. A packing record is a string
  where `(` marks opening a new inner box and `)` marks closing the current box.
  Any other character is decorative wrapping and is ignored.

  Write `deepest_nesting(record)` returning the greatest number of boxes that are
  open at the same time (the deepest nesting reached). A `)` with no open box is
  ignored. An empty string returns `0`.
starter_code: |
  def deepest_nesting(record):
      return 0
function_name: deepest_nesting
input_mode: function
solution_sketch: Push on each open box, pop on each close, and track the largest stack height seen.
sample_solution: |
  def deepest_nesting(record):
      stack = []
      best = 0
      for ch in record:
          if ch == "(":
              stack.append(ch)
              if len(stack) > best:
                  best = len(stack)
          elif ch == ")":
              if stack:
                  stack.pop()
      return best
hints:
  - level: 1
    text: The answer is the most boxes open at once, not the total number of boxes.
  - level: 2
    text: Push onto a stack for every open box and pop for every valid close.
  - level: 3
    text: After each push, compare the current stack height to the best seen so far.
tests:
