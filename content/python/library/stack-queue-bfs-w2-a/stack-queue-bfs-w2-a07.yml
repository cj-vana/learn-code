function_name: fewest_presses
input_mode: function
solution_sketch: BFS over floor numbers, treating each in-range button press as an edge to a neighboring floor.
sample_solution: |
  def fewest_presses(data):
      top = data["top"]
      up = data["up"]
      down = data["down"]
      target = data["target"]
      if target == 0:
          return 0
      seen = {0}
      queue = [(0, 0)]
      while queue:
          floor, presses = queue.pop(0)
          for nxt in (floor + up, floor - down):
              if 0 <= nxt <= top and nxt not in seen:
                  if nxt == target:
                      return presses + 1
                  seen.add(nxt)
                  queue.append((nxt, presses + 1))
      return -1
hints:
  - level: 1
    text: Each floor is a node; a legal button press is an edge to another floor.
  - level: 2
    text: BFS from floor 0 finds the fewest presses because it explores floors in press-count order.
  - level: 3
    text: Only enqueue a next floor that stays within 0..top and has not been visited yet.
