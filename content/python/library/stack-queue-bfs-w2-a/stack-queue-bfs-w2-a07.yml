explanation_markdown: |
  Because every press costs the same, the fewest presses is a shortest-path
  problem, and breadth-first search solves it. Each floor is a node with up to two
  outgoing edges: `floor + up` and `floor - down`, kept only when they land in
  `0..top`. BFS explores floors in order of press count, so the first time it
  reaches `target` it has used the minimum number of presses. Marking floors seen
  prevents revisiting. Since there are at most `top + 1` floors, the search runs
  in O(top) time.
common_mistakes:
  - Using a depth-first search, which can report a longer path than the minimum.
  - Allowing moves outside 0..top instead of refusing them.
  - Forgetting the target == 0 case, which needs zero presses.
