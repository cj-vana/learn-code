prompt_markdown: |
  A freight elevator serves floors `0` through `top`. It has just two buttons:
  one moves it up by exactly `up` floors, the other moves it down by exactly
  `down` floors. A press that would leave the range `0..top` is refused and does
  nothing, so it never counts. The elevator starts on floor `0`.

  You are given a dict `data` with keys `"top"`, `"up"`, `"down"`, and
  `"target"`. Write `fewest_presses(data)` returning the fewest button presses
  needed to reach `target`, or `-1` if it cannot be reached.
