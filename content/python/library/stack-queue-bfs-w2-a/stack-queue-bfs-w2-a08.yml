prompt_markdown: |
  A classroom seating chart is a grid where each seat is one of three letters:
  `"T"` for someone who already knows the gossip, `"L"` for a listener who does
  not yet know it, and `"X"` for an empty seat that blocks the chatter.

  Each round, everyone who knows the gossip tells their edge-adjacent neighbors
  (up, down, left, right), turning any adjacent `"L"` into a `"T"`. Write
  `gossip_rounds(grid)` returning the number of rounds until no listener is left.
  Return `0` if there are no listeners to begin with, and `-1` if some listener
  can never hear the gossip.
