function_name: gossip_rounds
input_mode: function
solution_sketch: Multi-source BFS from every knower at once, counting layers until all listeners are reached.
sample_solution: |
  def gossip_rounds(grid):
      grid = [row[:] for row in grid]
      if not grid or not grid[0]:
          return 0
      rows, cols = len(grid), len(grid[0])
      queue = []
      listeners = 0
      for r in range(rows):
          for c in range(cols):
              if grid[r][c] == "T":
                  queue.append((r, c))
              elif grid[r][c] == "L":
                  listeners += 1
      if listeners == 0:
          return 0
      rounds = 0
      while queue and listeners > 0:
          nxt = []
          for r, c in queue:
              for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
                  nr, nc = r + dr, c + dc
                  if 0 <= nr < rows and 0 <= nc < cols and grid[nr][nc] == "L":
                      grid[nr][nc] = "T"
                      listeners -= 1
                      nxt.append((nr, nc))
          if nxt:
              rounds += 1
          queue = nxt
      return rounds if listeners == 0 else -1
