explanation_markdown: |
  Because every knower spreads at once, this is a multi-source breadth-first
  search: all `"T"` seats begin in the queue and each BFS layer is one round of
  gossip. Processing the queue layer by layer, every adjacent `"L"` is flipped to
  `"T"`, decremented from the listener count, and queued for the next round. When
  the listener count reaches zero we return the number of rounds; if the queue
  empties while listeners remain (blocked or unreachable seats), the answer is
  `-1`. A grid with no listeners needs zero rounds. Each seat is enqueued at most
  once, so the work is O(rows * cols).
common_mistakes:
  - Spreading from one source fully before the others, instead of all sources per round.
  - Counting an extra round when the final layer converts no new listeners.
  - Forgetting to return -1 when some listener is walled off by empty seats.
