explanation_markdown: |
  Passing the baton around a circle is a queue rotation: moving the front player
  to the back models one pass without changing anyone's relative order. After `k`
  such moves, the player now at the front is the holder, so we dequeue and record
  them. Repeating until the queue empties yields the full elimination order. With
  `k` zero, no one moves and players simply leave in their starting order. Each
  round does a constant number of pops per pass, so the simulation is
  straightforward to reason about.
common_mistakes:
  - Eliminating the front player before performing the k passes.
  - Passing k-1 or k+1 times because of an off-by-one in the loop.
  - Stopping when one player remains instead of eliminating everyone.
