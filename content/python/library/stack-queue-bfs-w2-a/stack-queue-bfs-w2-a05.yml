prompt_markdown: |
  Players stand in a circle for a warm-up game. The baton starts with the first
  player in the list. Each round the baton is passed `k` times around the circle
  (each pass hands it to the next player still standing), and whoever holds it
  after those `k` passes steps out of the circle. Play continues until everyone
  has stepped out.

  You are given a dict `data` with keys `"players"` (their names in starting
  order) and `"k"` (a non-negative number of passes per round).

  Write `elimination_order(data)` returning the list of players in the order they
  step out.
starter_code: |
  def elimination_order(data):
      return []
function_name: elimination_order
input_mode: function
solution_sketch: Use a queue; rotate k players from front to back, then dequeue the holder as eliminated.
sample_solution: |
  def elimination_order(data):
      queue = list(data["players"])
      k = data["k"]
      out = []
      while queue:
          for _ in range(k):
              queue.append(queue.pop(0))
          out.append(queue.pop(0))
      return out
