prompt_markdown: |
  A library shelf stores book catalog numbers in strictly ascending order.
  Write `find_book(data)` where `data` is a dict with keys `catalog` (the
  sorted list of numbers) and `wanted` (the number to locate).

  Return the index of `wanted` in `catalog`, or `-1` if it is not on the shelf.
  Use binary search so a huge shelf stays fast.
starter_code: |
  def find_book(data):
      return -1
function_name: find_book
solution_sketch: Halve the search window each step, comparing the middle number to the target.
sample_solution: |
  def find_book(data):
      catalog = data["catalog"]
      wanted = data["wanted"]
      lo, hi = 0, len(catalog) - 1
      while lo <= hi:
          mid = (lo + hi) // 2
          if catalog[mid] == wanted:
              return mid
          if catalog[mid] < wanted:
              lo = mid + 1
          else:
              hi = mid - 1
      return -1
hints:
  - level: 1
    text: Because the list is sorted, you can throw away half of it after each comparison.
  - level: 2
    text: Track a low and high index and look at the middle element between them.
  - level: 3
    text: If the middle value is too small move low past mid; if too large move high below mid.
tests:
  public:
    - name: empty
      input: {catalog: [], wanted: 5}
      expected: -1
    - name: found_middle
      input: {catalog: [3, 7, 11, 18, 25], wanted: 11}
      expected: 2
    - name: not_found
      input: {catalog: [3, 7, 11, 18, 25], wanted: 8}
