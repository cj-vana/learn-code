    - name: single_miss
      input: {catalog: [42], wanted: 7}
      expected: -1
explanation_markdown: |
  Binary search keeps a window `[lo, hi]` that must contain the target if it
  exists. Each step checks the middle element and discards the half that cannot
  hold `wanted`, so the work is O(log n) instead of scanning all n numbers.
common_mistakes:
  - Using `while lo < hi` and missing a match when the window shrinks to one element.
  - Forgetting to return -1 when the loop ends without a hit.
  - Updating lo or hi to mid instead of mid + 1 / mid - 1, causing an infinite loop.
