prompt_markdown: |
  A deli hands out ticket numbers kept in a list sorted in ascending order.
  Write `insert_position(data)` where `data` has keys `tickets` (the sorted
  list) and `new` (an incoming ticket number).

  Return the index at which `new` should be inserted so the list stays sorted.
  If `new` equals numbers already present, it goes just before the first equal
  one (the leftmost valid spot).
starter_code: |
  def insert_position(data):
      return 0
function_name: insert_position
solution_sketch: Binary search for the leftmost index whose value is not less than the new number.
sample_solution: |
  def insert_position(data):
      tickets = data["tickets"]
      new = data["new"]
      lo, hi = 0, len(tickets)
      while lo < hi:
          mid = (lo + hi) // 2
          if tickets[mid] < new:
              lo = mid + 1
          else:
              hi = mid
      return lo
hints:
  - level: 1
    text: You are looking for the boundary between numbers smaller than new and the rest.
  - level: 2
    text: Let hi start at len(tickets) so the answer can be the very end of the list.
  - level: 3
    text: When the middle value is less than new, everything up to mid is too small, so move lo to mid + 1.
tests:
  public:
    - name: empty
      input: {tickets: [], new: 5}
      expected: 0
    - name: middle
      input: {tickets: [10, 20, 30, 40], new: 25}
