    - name: single
      input: {tickets: [7], new: 7}
      expected: 0
explanation_markdown: |
  This is the classic "lower bound" search. The window collapses onto the first
  index whose value is at least `new`; inserting there keeps everything sorted
  and places `new` ahead of any equal numbers. It runs in O(log n).
common_mistakes:
  - Starting hi at len(tickets) - 1, which makes appending to the end impossible.
  - Using <= in the comparison, which lands after equal values instead of before them.
  - Returning hi or mid instead of lo when the window closes.
