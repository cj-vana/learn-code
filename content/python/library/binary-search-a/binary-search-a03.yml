prompt_markdown: |
  A courier depot lists parcel weights in kilograms, sorted in ascending order.
  Write `count_within_limit(data)` where `data` has keys `weights` (the sorted
  list) and `limit` (a maximum weight).

  Return how many parcels weigh **at most** `limit`. Find the boundary with
  binary search instead of counting one by one.
starter_code: |
  def count_within_limit(data):
      return 0
function_name: count_within_limit
solution_sketch: Binary search for the first index whose weight exceeds the limit; that index is the count.
sample_solution: |
  def count_within_limit(data):
      weights = data["weights"]
      limit = data["limit"]
      lo, hi = 0, len(weights)
      while lo < hi:
          mid = (lo + hi) // 2
          if weights[mid] <= limit:
              lo = mid + 1
          else:
              hi = mid
      return lo
hints:
  - level: 1
    text: Every weight before the first over-limit parcel counts, so you only need that boundary index.
  - level: 2
    text: Search for the first position where the weight is strictly greater than limit.
  - level: 3
    text: When weights[mid] <= limit, that parcel and all before it qualify, so move lo to mid + 1.
tests:
