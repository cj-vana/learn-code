explanation_markdown: |
  Because the weights are sorted, the parcels at or below the limit form a prefix
  of the list. Binary search finds where that prefix ends (an "upper bound"), and
  the boundary index equals the count. The limit itself counts because the check
  uses `<=`.
common_mistakes:
  - Using < instead of <=, which drops parcels that weigh exactly the limit.
  - Returning the boundary value rather than the boundary index.
  - Starting hi at len(weights) - 1 and missing the case where every parcel qualifies.
