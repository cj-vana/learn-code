prompt_markdown: |
  A landscaper has `area` square paving tiles and wants to lay them into the
  largest possible solid square bed. Write `largest_square_side(area)` that
  returns the largest integer side length `s` such that `s * s` is at most
  `area`.

  `area` is a non-negative integer. Solve it with binary search on the side
  length rather than calling a square-root function.
starter_code: |
  def largest_square_side(area):
      return 0
function_name: largest_square_side
solution_sketch: Binary search the side length, keeping the largest one whose square fits within area.
sample_solution: |
  def largest_square_side(area):
      if area < 1:
          return 0
      lo, hi = 1, area
      best = 0
      while lo <= hi:
          mid = (lo + hi) // 2
          if mid * mid <= area:
              best = mid
              lo = mid + 1
          else:
              hi = mid - 1
      return best
hints:
  - level: 1
    text: A larger side always needs more tiles, so the "does it fit" test is monotonic.
  - level: 2
    text: Search for the biggest side whose square does not exceed area.
  - level: 3
    text: When mid * mid fits, remember mid and try a larger side; otherwise shrink the upper bound.
