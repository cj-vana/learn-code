explanation_markdown: |
  The predicate "a side of length s fits" is false for all s past some point and
  true before it, so the answer is monotonic and binary search applies. Each step
  tests the middle side; if its square fits, we record it and reach higher,
  otherwise we drop down. This runs in O(log area) multiplications.
common_mistakes:
  - Returning mid at the end instead of the last side that actually fit.
  - Forgetting the area == 0 case, where the largest side is 0.
  - Using mid * mid < area (strict) and rejecting perfect squares like 49.
