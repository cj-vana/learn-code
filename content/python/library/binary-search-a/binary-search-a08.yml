explanation_markdown: |
  On the way up each reading is smaller than the next; on the way down it is
  larger. Comparing the midpoint with its right neighbor tells you which slope
  you are on, letting you discard half the list each step. The window closes onto
  the single peak in O(log n).
common_mistakes:
  - Comparing with altitudes[mid - 1] and running off the left edge of the list.
  - Moving hi to mid - 1 when mid could itself be the peak, skipping the answer.
  - Falling back to a linear scan for the maximum instead of using the rise-then-fall shape.
