prompt_markdown: |
  A survey drone climbs steadily and then descends steadily, so its list of
  altitude readings strictly increases up to a single highest point and then
  strictly decreases. Write `peak_index(altitudes)` that returns the index of
  the highest reading.

  The list has at least 3 readings and exactly one peak. Use binary search, not
  a full scan.
starter_code: |
  def peak_index(altitudes):
      return 0
function_name: peak_index
solution_sketch: Binary search by comparing each midpoint with its neighbor and moving toward the rising side.
sample_solution: |
  def peak_index(altitudes):
      lo, hi = 0, len(altitudes) - 1
      while lo < hi:
          mid = (lo + hi) // 2
          if altitudes[mid] < altitudes[mid + 1]:
              lo = mid + 1
          else:
              hi = mid
      return lo
hints:
  - level: 1
    text: If a reading is lower than the next one, the peak must be further to the right.
  - level: 2
    text: Compare altitudes[mid] with altitudes[mid + 1] to learn which side the peak is on.
  - level: 3
    text: When mid is on the rising slope move lo past mid; otherwise the peak is at mid or to its left.
