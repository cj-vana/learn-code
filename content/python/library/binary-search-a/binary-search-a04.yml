prompt_markdown: |
  A reservoir's water level is recorded once a day and never drops, so the list
  of daily levels is non-decreasing. Write `first_day_reaching(data)` where
  `data` has keys `levels` (the non-decreasing list) and `target`.

  Return the index of the first day whose level is **at least** `target`, or
  `-1` if the reservoir never reaches it. Use binary search.
starter_code: |
  def first_day_reaching(data):
      return -1
function_name: first_day_reaching
solution_sketch: Binary search for the leftmost index whose level is at least the target, then check it exists.
sample_solution: |
  def first_day_reaching(data):
      levels = data["levels"]
      target = data["target"]
      lo, hi = 0, len(levels)
      while lo < hi:
          mid = (lo + hi) // 2
          if levels[mid] < target:
              lo = mid + 1
          else:
              hi = mid
      if lo < len(levels):
          return lo
      return -1
hints:
  - level: 1
    text: Once the level reaches the target it stays there, so the qualifying days form a suffix of the list.
  - level: 2
    text: Search for the leftmost index whose level is not below the target.
  - level: 3
    text: If the window closes past the last index, the target was never reached, so return -1.
