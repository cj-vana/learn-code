explanation_markdown: |
  The levels never decrease, so "level at least target" is false for a prefix and
  true for the rest. Binary search finds that switch point in O(log n). A final
  bounds check turns an index past the end into `-1`, meaning the target was
  never reached.
common_mistakes:
  - Returning lo without checking it is within the list, which reports a nonexistent day.
  - Using <= target in the comparison and landing one day too late.
  - Assuming the first qualifying day equals the first exact match, missing days that jump past the target.
