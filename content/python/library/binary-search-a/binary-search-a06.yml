prompt_markdown: |
  A theater lists its seat prices in a list sorted in ascending order. Write
  `best_affordable_seat(data)` where `data` has keys `prices` (the sorted list)
  and `budget`.

  Return the index of the **most expensive** seat whose price is at or below
  `budget`, or `-1` if even the cheapest seat costs more than the budget. Use
  binary search.
starter_code: |
  def best_affordable_seat(data):
      return -1
function_name: best_affordable_seat
solution_sketch: Binary search for how many prices fit the budget; the last such index is the answer.
sample_solution: |
  def best_affordable_seat(data):
      prices = data["prices"]
      budget = data["budget"]
      lo, hi = 0, len(prices)
      while lo < hi:
          mid = (lo + hi) // 2
          if prices[mid] <= budget:
              lo = mid + 1
          else:
              hi = mid
      return lo - 1
hints:
  - level: 1
    text: The affordable seats form a prefix of the sorted prices; you want the last one.
  - level: 2
    text: Binary search for the first price that exceeds the budget.
  - level: 3
    text: The index just before that boundary is the priciest affordable seat, or -1 if the boundary is 0.
