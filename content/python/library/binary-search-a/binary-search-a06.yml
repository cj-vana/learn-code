explanation_markdown: |
  Sorted prices mean every seat you can afford comes before every one you cannot.
  Binary search finds the first over-budget price (an "upper bound"); the index
  right before it is the dearest seat within budget. When nothing is affordable
  the boundary sits at 0 and the answer is `-1`.
common_mistakes:
  - Returning the boundary index itself, which points at the first seat you cannot afford.
  - Using < instead of <= and rejecting a seat priced exactly at the budget.
  - Forgetting that a boundary of 0 means no seat fits, so -1 must be returned.
