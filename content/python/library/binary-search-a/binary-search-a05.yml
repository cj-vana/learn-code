explanation_markdown: |
  This is a "ceiling" search: the answer is the smallest slot value greater than
  or equal to `requested`. Binary search locates the boundary index in O(log n),
  and reading the slot there gives the time. A boundary past the end means no
  slot qualifies.
common_mistakes:
  - Returning the index instead of the slot value.
  - Using <= requested in the comparison and skipping an exact match.
  - Forgetting the bounds check and indexing past the end of the list.
