prompt_markdown: |
  A clinic keeps its open appointment start-times (minutes past midnight) in a
  list sorted in ascending order. Write `earliest_slot(data)` where `data` has
  keys `slots` (the sorted list) and `requested` (the earliest acceptable time).

  Return the earliest open time that is **at or after** `requested`, or `-1` if
  no such slot exists. Use binary search.
starter_code: |
  def earliest_slot(data):
      return -1
function_name: earliest_slot
solution_sketch: Binary search for the leftmost slot not before the requested time and return its value.
sample_solution: |
  def earliest_slot(data):
      slots = data["slots"]
      requested = data["requested"]
      lo, hi = 0, len(slots)
      while lo < hi:
          mid = (lo + hi) // 2
          if slots[mid] < requested:
              lo = mid + 1
          else:
              hi = mid
      if lo < len(slots):
          return slots[lo]
      return -1
hints:
  - level: 1
    text: You want the first slot that is not earlier than the requested time.
  - level: 2
    text: Find that boundary index with binary search, then read the value there.
  - level: 3
    text: If the boundary lands past the last slot, every time is too early, so return -1.
