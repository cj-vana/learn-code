prompt_markdown: |
  A row of crates sits along a long plank, one crate per position. You want to
  place a single support post directly under one crate so that the crates to its
  left weigh the same as the crates to its right.

  Write `balance_point(weights)` that returns the smallest index `i` where the sum
  of the weights before `i` equals the sum of the weights after `i` (the crate at
  `i` rests on the post and counts for neither side). If no such position exists,
  return `-1`.
starter_code: |
  def balance_point(weights):
      return -1
function_name: balance_point
input_mode: function
solution_sketch: Track the left-side sum and derive the right side from the total, returning the first balanced index.
sample_solution: |
  def balance_point(weights):
      total = sum(weights)
      left = 0
      for i, weight in enumerate(weights):
          right = total - left - weight
          if left == right:
              return i
          left += weight
      return -1
hints:
  - level: 1
    text: The right-side sum is the grand total minus the left side minus the crate on the post.
  - level: 2
    text: Compute the total once, then sweep left to right updating a running left sum.
  - level: 3
    text: Check for balance before adding the current crate to the left sum, and return the first index that matches.
