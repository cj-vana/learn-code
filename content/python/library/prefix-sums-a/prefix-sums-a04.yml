explanation_markdown: |
  Computing the grand total first lets each step read off the right-side sum in
  O(1) as `total - left - weight`, so the whole scan is O(n). Updating `left`
  only after the comparison keeps the current crate out of both sides, matching
  the "rests on the post" rule.
common_mistakes:
  - Adding the current crate to the left sum before comparing, which shifts the pivot.
  - Recomputing the right-side sum with a slice each step, making it O(n^2).
  - Returning a later balanced index instead of the smallest one.
