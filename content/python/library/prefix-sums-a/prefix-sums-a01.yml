      input: [0, 0, 5]
      expected: [0, 0, 5]
    - name: empty_middle_stop
      input: [2, 0, 0, 3]
      expected: [2, 2, 2, 5]
    - name: longer_route
      input: [1, 2, 3, 4, 5]
      expected: [1, 3, 6, 10, 15]
explanation_markdown: |
  A prefix-sum array turns "how many so far" questions into a single left-to-right
  pass. By carrying one `running` total and appending it after each stop, the
  work is O(n) instead of re-summing the earlier stops at every position.
common_mistakes:
  - Resetting the running total inside the loop, which loses earlier stops.
  - Re-summing `counts[:i+1]` at each stop, which is O(n^2) instead of O(n).
  - Appending the current count instead of the accumulated total.
