prompt_markdown: |
  A harbour ferry records how many passengers board at each stop along its
  route. Write `boarding_totals(counts)` that returns a new list where position
  `i` holds the total number of passengers who have boarded up to and including
  stop `i`.

  For example, boarding `[3, 1, 4]` gives `[3, 4, 8]`. An empty route returns an
  empty list.
starter_code: |
  def boarding_totals(counts):
      return []
function_name: boarding_totals
input_mode: function
solution_sketch: Keep one running total and append it after adding each stop's count.
sample_solution: |
  def boarding_totals(counts):
      totals = []
      running = 0
      for count in counts:
          running += count
          totals.append(running)
      return totals
hints:
  - level: 1
    text: Each answer is the previous total plus the current stop's boarding count.
  - level: 2
    text: Carry a single running sum as you walk the list from left to right.
  - level: 3
    text: After adding each count to the running total, append that total to the result list.
tests:
  public:
    - name: empty
      input: []
      expected: []
    - name: single
      input: [3]
      expected: [3]
    - name: three_stops
      input: [3, 1, 4]
