explanation_markdown: |
  Scanning the prefix sums left to right lets you stop at the first crossing point
  instead of computing every day's total up front. Returning `index + 1` reports
  a human-friendly day number, and the trailing `-1` handles campaigns that fall
  short.
common_mistakes:
  - Returning the 0-based index instead of the 1-based day number.
  - Using `>` instead of `>=`, which skips a day that hits the goal exactly.
  - Forgetting to return -1 when the goal is never reached.
