prompt_markdown: |
  A school fundraiser tracks how much money is donated each day. The organisers
  want to know the first day on which the running total reaches or passes their
  goal.

  Write `day_goal_reached(data)` where `data` is a dict with keys `daily` (a list
  of daily donation amounts) and `goal` (a number). Return the 1-based day number
  on which the cumulative total first becomes greater than or equal to `goal`. If
  the goal is never reached, return `-1`.
starter_code: |
  def day_goal_reached(data):
      return -1
function_name: day_goal_reached
input_mode: function
solution_sketch: Accumulate donations day by day and return the first day whose running total meets the goal.
sample_solution: |
  def day_goal_reached(data):
      daily = data["daily"]
      goal = data["goal"]
      running = 0
      for index, amount in enumerate(daily):
          running += amount
          if running >= goal:
              return index + 1
      return -1
hints:
  - level: 1
    text: Keep a cumulative total and check it after each day's donation is added.
  - level: 2
    text: Return as soon as the running total first meets or exceeds the goal.
  - level: 3
    text: Convert the 0-based loop index to a 1-based day by adding 1, and return -1 if the loop finishes.
