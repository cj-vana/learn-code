explanation_markdown: |
  A context manager is Python's structured `try/finally`: `__enter__` runs the
  setup and `__exit__` runs the cleanup no matter how the block ends. When a step
  raises `RuntimeError`, control leaves the `with` block immediately, but `__exit__`
  still appends `"closed"` before returning. Returning `True` from `__exit__` tells
  Python the exception has been handled, so it does not propagate out of
  `run_gate` and the already-collected log is returned intact. Returning `False`
  (or nothing) would instead let the error escape.
common_mistakes:
  - Returning `False` or nothing from `__exit__`, so the RuntimeError escapes and the function never returns its log.
  - Appending "opened" or "closed" outside the enter/exit methods, breaking the ordering on the abort path.
  - Continuing the loop after "stop"; raising an exception ends the block, it does not skip one iteration.
