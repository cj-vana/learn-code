prompt_markdown: |
  An irrigation channel is guarded by a gate that must always be closed again, even
  if a step in the middle goes wrong. Model the gate as a context manager class so
  the closing happens automatically.

  Write a class `Gate` with:

  - `__init__(self, log)` that stores the given list.
  - `__enter__(self)` that appends `"opened"` to the log and returns `self`.
  - `__exit__(self, exc_type, exc, tb)` that appends `"closed"` and returns `True`
    (so any error raised inside the `with` block is suppressed).

  Then write `run_gate(steps)`. Create a fresh `log = []`, open a `Gate(log)` in a
  `with` block, and loop over `steps`. For each step: if it equals `"stop"`, raise
  `RuntimeError("halted")`; otherwise append `"pass:<step>"` to the log. Return the
  log.
starter_code: |
  class Gate:
      def __init__(self, log):
          self.log = log

      def __enter__(self):
          # Record the open and return the gate.
          return self

      def __exit__(self, exc_type, exc, tb):
          # Record the close and suppress any error from the block.
          return True


  def run_gate(steps):
      log = []
      # Use `with Gate(log)` and process the steps.
      return log
function_name: run_gate
input_mode: function
solution_sketch: Implement __enter__/__exit__ so closing always logs, then drive steps in a with block that raises on "stop".
sample_solution: |
  class Gate:
      def __init__(self, log):
          self.log = log

      def __enter__(self):
          self.log.append("opened")
          return self

      def __exit__(self, exc_type, exc, tb):
          self.log.append("closed")
          return True


  def run_gate(steps):
      log = []
      with Gate(log) as gate:
          for step in steps:
              if step == "stop":
                  raise RuntimeError("halted")
              log.append(f"pass:{step}")
      return log
