prompt_markdown: |
  A neighbourhood library wants renewal failures to be a distinct, named kind of
  error rather than a generic one. Define a custom exception class
  `RenewalError` (subclass of `Exception`), then write `process_renewal(loan)`.

  `loan` is a dict with `renewals_used`, `max_renewals`, and `days`.

  - If `renewals_used` is already at or above `max_renewals`, raise
    `RenewalError("renewal limit reached")`.
  - If `days` is outside 1 to 21 inclusive, raise `RenewalError("invalid loan length")`.
  - Otherwise the renewal succeeds and the new count is `renewals_used + 1`.

  Catch `RenewalError` inside the function. Return `"renewed:N"` on success (where
  `N` is the new count) or `"denied:<message>"` when a `RenewalError` was raised.
starter_code: |
  class RenewalError(Exception):
      pass


  def process_renewal(loan):
      # Raise RenewalError for a broken rule; catch it and return "denied:<message>".
      # On success return "renewed:<new count>".
      return ""
function_name: process_renewal
input_mode: function
solution_sketch: Define RenewalError, raise it per rule, and translate success or that specific error into a tagged string.
sample_solution: |
  class RenewalError(Exception):
      pass


  def process_renewal(loan):
      try:
          if loan["renewals_used"] >= loan["max_renewals"]:
              raise RenewalError("renewal limit reached")
          if loan["days"] < 1 or loan["days"] > 21:
              raise RenewalError("invalid loan length")
          new_count = loan["renewals_used"] + 1
      except RenewalError as exc:
          return f"denied:{exc}"
      return f"renewed:{new_count}"
hints:
  - level: 1
    text: A custom exception is just a class that inherits from Exception; `pass` in the body is enough.
  - level: 2
    text: Raise `RenewalError("...")` for each broken rule and catch that same class.
  - level: 3
    text: "Format results as f\"renewed:{new_count}\" and f\"denied:{exc}\" (str of the exception is its message)."
