explanation_markdown: |
  Defining `RenewalError` gives the domain its own error vocabulary: callers can
  catch a renewal problem specifically, without accidentally trapping unrelated
  `ValueError`s or `KeyError`s. Because the limit check comes first, a loan that is
  both maxed out and too long reports the limit, matching the order the rules are
  written. Converting the caught exception with an f-string reuses the message you
  passed to `raise`, so the human-readable reason travels with the error object
  instead of being duplicated.
common_mistakes:
  - Subclassing the wrong base (or forgetting to subclass Exception), so the class cannot be raised or caught normally.
  - Checking `days` before the renewal limit, which changes which reason a doubly-invalid loan reports.
  - Building the "denied" string by hand instead of reusing the message stored on the exception.
