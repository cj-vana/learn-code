function_name: transaction_batch
input_mode: function
solution_sketch: Copy the balances, then per block take a snapshot copy and apply each op inside a try; a raised failure is caught to restore the snapshot and append the block index.
sample_solution: |
  def transaction_batch(job):
      balances = dict(job["accounts"])
      blocks = job["blocks"]

      class OpError(Exception):
          pass

      def apply(op, book):
          kind = op["type"]
          if kind == "deposit":
              acct = op["account"]
              if acct not in book:
                  raise OpError("no such account")
              book[acct] += op["amount"]
          elif kind == "withdraw":
              acct = op["account"]
              if acct not in book:
                  raise OpError("no such account")
              if book[acct] < op["amount"]:
                  raise OpError("insufficient funds")
              book[acct] -= op["amount"]
          elif kind == "transfer":
              src = op["from"]
              dst = op["to"]
              if src not in book or dst not in book:
                  raise OpError("no such account")
              if book[src] < op["amount"]:
                  raise OpError("insufficient funds")
              book[src] -= op["amount"]
              book[dst] += op["amount"]
          else:
              raise OpError("unknown op")

      rolled_back = []
      for index, block in enumerate(blocks):
          snapshot = dict(balances)
          try:
              for op in block:
                  apply(op, balances)
          except OpError:
              balances = snapshot
              rolled_back.append(index)
      return {"balances": balances, "rolled_back": rolled_back}
hints:
  - level: 1
    text: The unit of atomicity is the block, so take a copy of the balances before each block and only keep the changes if the whole block gets through.
  - level: 2
    text: Wrap the loop over a block's operations in a try. Have each operation raise when it cannot proceed (unknown account, or a withdraw/transfer that would overdraw).
  - level: 3
    text: In the except, discard the partly-changed balances by reassigning them back to the snapshot copy, and append the block index to rolled_back. Because you snapshot before applying anything, earlier operations in the same block are undone too.
