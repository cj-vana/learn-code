  originality_notes: Original transactional block processor where any failing operation rolls back its whole block via snapshot-and-restore, themed around member tabs at a boardgame cafe.
prompt_markdown: |
  A boardgame cafe settles its member tabs in **blocks**. Each block is a small
  batch of account operations that must go through **all-or-nothing**: if any
  operation in a block fails, the entire block is undone and every account is left
  exactly as it was before that block started. Blocks are independent, so a failed
  block does not stop the later ones from running.

  Write `transaction_batch(job)` that takes **one dictionary**:

  - `"accounts"`: a dict mapping each member name to a starting balance (an int).
  - `"blocks"`: a list of blocks; each block is a list of operation dicts, applied
    in order.

  An operation is one of:

  - `{"type": "deposit", "account": a, "amount": x}` -- add `x` to account `a`.
  - `{"type": "withdraw", "account": a, "amount": x}` -- subtract `x` from account
    `a`. This **fails** if `a`'s balance is less than `x` (no overdraft allowed).
  - `{"type": "transfer", "from": a, "to": b, "amount": x}` -- withdraw `x` from
    `a` and deposit it into `b`, failing if `a`'s balance is less than `x`.

  Amounts are non-negative. Any operation that names an account not present in
  `accounts` **fails**. Model a failure by raising an exception inside the block
  and catching it around the whole block, so that a failure part-way through undoes
  the operations that already ran in that block too.

  Process the blocks in order. If a block fails, restore the balances to the
  snapshot taken before the block began and record that block's index. Return a
  dictionary `{"balances": {...}, "rolled_back": [...]}` where `balances` is the
  final balance of every account and `rolled_back` is the list of block indices
  that were undone, in increasing order.

  Example:

  ```python
  transaction_batch({
      "accounts": {"alice": 100, "bob": 50},
      "blocks": [
          [{"type": "transfer", "from": "alice", "to": "bob", "amount": 30}],
          [{"type": "withdraw", "account": "bob", "amount": 200}],
          [{"type": "deposit", "account": "alice", "amount": 10},
           {"type": "withdraw", "account": "alice", "amount": 5}],
      ],
  })
  # block 0 commits (alice 70, bob 80); block 1 overdraws bob and rolls back;
  # block 2 commits (alice 75)
  # -> {"balances": {"alice": 75, "bob": 80}, "rolled_back": [1]}
  ```

  An empty `blocks` list returns the starting balances unchanged with an empty
  `rolled_back` list.
