          - - {type: "deposit", account: "a", amount: 5}
      expected:
        balances: {a: 15}
        rolled_back: [0]
    - name: transfer_to_missing_account
      input:
        accounts: {a: 40, b: 0}
        blocks:
          - - {type: "transfer", from: "a", to: "ghost", amount: 10}
          - - {type: "transfer", from: "a", to: "b", amount: 10}
      expected:
        balances: {a: 30, b: 10}
        rolled_back: [0]
    - name: every_block_commits
      input:
        accounts: {x: 20, y: 5}
        blocks:
          - - {type: "deposit", account: "y", amount: 15}
          - - {type: "transfer", from: "x", to: "y", amount: 20}
      expected:
        balances: {x: 0, y: 40}
        rolled_back: []
    - name: two_blocks_roll_back
      input:
        accounts: {a: 50, b: 50}
        blocks:
          - - {type: "withdraw", account: "a", amount: 60}
          - - {type: "transfer", from: "b", to: "a", amount: 20}
          - - {type: "withdraw", account: "b", amount: 100}
      expected:
        balances: {a: 70, b: 30}
        rolled_back: [0, 2]
explanation_markdown: |
  This is a transaction in miniature, and the whole trick is choosing where the
  `try` goes. Wrapping a single operation would let a block commit half its work;
  wrapping the block is what makes it all-or-nothing. The snapshot -- a shallow
  copy of the balances taken *before* the block runs -- is your rollback target.
  Apply operations directly to the live balances, and if any of them raises, throw
  the mutated version away by reassigning `balances` back to the snapshot. Every
  earlier operation in that block vanishes with it, which is why depositing 50 and
  then failing to withdraw 999 leaves the account at its original 100.

  Each operation is responsible for detecting its own failure and raising: a
  missing account or an overdraft is a hard stop. Validating a transfer's source
  balance *before* moving any money means a transfer never leaves one side changed
  when the other cannot complete. Because each block re-snapshots from the current
  balances, committed blocks build on each other while rolled-back ones leave no
  trace, and recording the index inside the `except` gives you the audit list in
  the order the failures happened.
common_mistakes:
  - Wrapping each operation in its own try instead of the whole block, so a block can commit part of its work.
  - Taking the snapshot after starting to apply operations, so a rollback restores an already-modified state.
  - Mutating the snapshot copy by aliasing it, so restoring it does not actually undo anything.
  - Moving money in a transfer before checking the source balance, leaving the destination credited when the withdraw should have failed.
