prompt_markdown: |
  A bookkeeping tool processes a ledger of ratios. Each row records a numerator and
  a denominator, and the tool must report the quotient of each row. Some rows,
  though, were entered with a denominator of zero, and dividing by them would blow
  up the whole batch. Your job is to keep the batch running.

  Write `safe_divide_batch(rows)` where `rows` is a list of dicts, each shaped like
  `{"num": <int>, "den": <int>}`. Return a list with one entry per row, in the same
  order as the input:

  - If the division is valid, the entry is `num / den` as a float.
  - If `den` is `0`, the entry is the string `"undefined"`.

  There is one firm rule: you must let the division run and **catch the
  `ZeroDivisionError`** rather than checking `den == 0` with an `if` beforehand.

  For example, `safe_divide_batch([{"num": 6, "den": 2}, {"num": 1, "den": 0}])`
  returns `[3.0, "undefined"]`. An empty ledger returns an empty list `[]`.
starter_code: |
  def safe_divide_batch(rows):
      # Divide each row's num by its den; catch ZeroDivisionError -> "undefined".
      return []
function_name: safe_divide_batch
input_mode: function
solution_sketch: Iterate rows, attempt num/den inside try, and append "undefined" from the except ZeroDivisionError branch.
sample_solution: |
  def safe_divide_batch(rows):
      results = []
      for row in rows:
          try:
              results.append(row["num"] / row["den"])
          except ZeroDivisionError:
              results.append("undefined")
      return results
