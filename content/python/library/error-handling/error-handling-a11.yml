explanation_markdown: |
  The batch must survive a bad row without aborting, so each division is isolated in
  its own `try`. When `den` is `0`, Python raises `ZeroDivisionError`, and the
  `except` branch turns that failure into the sentinel string `"undefined"` instead
  of letting it propagate and stop the loop. Every other row divides normally, and
  because Python's `/` operator always yields a float, valid quotients come back as
  floats like `3.0` and `2.5`.

  Appending one entry per row inside the loop guarantees the output length and order
  match the input exactly. Catching the exception rather than pre-checking `den == 0`
  is the point of the exercise: it models the "ask forgiveness, not permission"
  style that keeps the happy path clean and pushes the rare failure into a handler.
common_mistakes:
  - Guarding with `if den == 0` instead of catching the raised ZeroDivisionError, which the exercise forbids.
  - Catching a broad `except Exception` (or bare `except`) that would also swallow unrelated bugs like a missing key.
  - Returning integer quotients or skipping bad rows, which breaks the float contract or misaligns the output order.
