explanation_markdown: |
  The subtle part of backoff is that delay lives *between* attempts, not after
  them. Adding `base * 2 ** i` only when `i < limit - 1` means a run that succeeds
  or gives up on its last permitted attempt never charges a trailing wait. Two
  independent limits bound the work: you stop as soon as an attempt succeeds, and
  you never exceed `min(max_attempts, len(outcomes))` tries. The exponent `2 ** i`
  keyed to the failed attempt's index is what makes the waits grow 1, 2, 4, 8...
  the hallmark of exponential backoff. Modelling failures as raised-and-caught
  exceptions keeps the loop honest about what a real retry wrapper would do.
common_mistakes:
  - Adding a delay after the final attempt, which overcounts total_delay by one term.
  - Letting the loop run for `max_attempts` even when `outcomes` is shorter, causing an IndexError.
  - Basing the delay on the attempt count instead of the zero-based index, shifting every wait by a factor of two.
