prompt_markdown: |
  A weather station polls a flaky sensor that sometimes throws before returning a
  reading. You will model retry-with-exponential-backoff as a *pure* function: no
  real sleeping or randomness, just an accounting of what would happen.

  Write `poll_with_backoff(plan)` where `plan` is a dict with:

  - `outcomes`: a list of strings, one per available attempt; `"ok"` means that
    attempt would succeed, anything else means it would raise.
  - `base_delay`: the base wait unit (an int).
  - `max_attempts`: a cap on how many attempts you may make (an int).

  Rules:

  - You may make at most `min(max_attempts, len(outcomes))` attempts, in order.
  - Each attempt that fails schedules a wait *before the next* attempt of
    `base_delay * (2 ** i)`, where `i` is the zero-based index of the attempt that
    just failed. There is no wait after the final attempt you make (whether it
    succeeds or you have run out).
  - Model a failing attempt by raising (and catching) an exception inside the loop.

  Return a dict `{"status": ..., "attempts": ..., "total_delay": ...}` where
  `status` is `"ok"` if some attempt succeeded within the cap, otherwise
  `"exhausted"`; `attempts` is how many attempts you actually made; and
  `total_delay` is the sum of the waits you scheduled.
