function_name: poll_with_backoff
input_mode: function
solution_sketch: Loop up to the cap, raise/catch on non-ok, and accumulate base_delay * 2**i only when another attempt will follow.
sample_solution: |
  def poll_with_backoff(plan):
      outcomes = plan["outcomes"]
      base = plan["base_delay"]
      cap = plan["max_attempts"]
      total_delay = 0
      attempts = 0
      limit = min(cap, len(outcomes))
      for i in range(limit):
          attempts += 1
          try:
              if outcomes[i] != "ok":
                  raise RuntimeError("transient failure")
              return {"status": "ok", "attempts": attempts, "total_delay": total_delay}
          except RuntimeError:
              if i < limit - 1:
                  total_delay += base * (2 ** i)
      return {"status": "exhausted", "attempts": attempts, "total_delay": total_delay}
hints:
  - level: 1
    text: The number of attempts is bounded by both the outcomes list and max_attempts, so cap the loop by the smaller of the two.
  - level: 2
    text: A backoff wait belongs between two attempts, so only add it when another attempt will follow the one that just failed.
  - level: 3
    text: "Loop i in range(min(cap, len(outcomes))); on failure add base * 2**i only when i < limit - 1; return on the first \"ok\"."
