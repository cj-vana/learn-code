function_name: parse_config
input_mode: function
solution_sketch: Loop the raw lines, raise a local ConfigError for a missing '=' or empty key, catch it to record the raw line, else split once and store the stripped key/value.
sample_solution: |
  def parse_config(lines):
      class ConfigError(Exception):
          pass

      parsed = {}
      errors = []
      for raw in lines:
          try:
              if "=" not in raw:
                  raise ConfigError("missing '=' separator")
              key, value = raw.split("=", 1)
              key = key.strip()
              value = value.strip()
              if key == "":
                  raise ConfigError("empty key")
              parsed[key] = value
          except ConfigError:
              errors.append(raw)
      return {"parsed": parsed, "errors": errors}
