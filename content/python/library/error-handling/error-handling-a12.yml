explanation_markdown: |
  The core idea is to make each line independently recoverable. By wrapping the
  per-line work in a `try` and raising a locally-defined `ConfigError` for the two
  malformed cases, you get a single, clear place to reject a line and move on
  instead of letting an exception unwind the whole loop. Defining `ConfigError`
  inside the function keeps this signalling private to the parser: nothing outside
  can accidentally trip the same catch.

  Two details make the parser robust. Splitting with `raw.split("=", 1)` divides on
  only the first `=`, so a value like `http://a=b` survives intact rather than
  being chopped apart. And because you write straight into a dict, a repeated key
  naturally overwrites its earlier entry, so the last line wins for free. Stripping
  the key before the empty check is what lets `   = x` be caught as an empty-key
  error while `name = Ada` still parses cleanly.
common_mistakes:
  - Splitting on every '=' instead of just the first, which corrupts values that legitimately contain '='.
  - Storing a stripped or reconstructed version of a bad line in errors instead of the original raw string.
  - Treating an empty value like `flag=` as malformed, when only a missing '=' or an empty key should be rejected.
  - Letting an uncaught exception escape the loop, which drops every remaining line after the first bad one.
