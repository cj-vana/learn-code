prompt_markdown: |
  A tiny desktop app stores its settings in a text file, one setting per line in
  `key=value` form. Real files get messy: someone leaves a stray note on its own
  line, or fat-fingers a line with nothing before the `=`. Your job is to salvage
  everything usable and keep a record of what you had to skip, without letting one
  bad line abort the whole load.

  Write `parse_config(lines)` where `lines` is a list of strings, each *meant* to
  be a `key=value` setting. Process the lines in order and return a dict with
  exactly two keys:

  - `"parsed"`: a dict mapping each valid setting's key to its value.
  - `"errors"`: a list of the raw lines you had to reject, in the order you saw them.

  A line is **malformed** when either it contains no `=` at all, or its key is
  empty once you strip surrounding whitespace (for example `=5` or `   = x`). When
  you hit a malformed line, raise a `ConfigError` that you define *inside*
  `parse_config`, catch it right there, and append the original raw line (exactly
  as given, untouched) to `"errors"`.

  For a valid line, split on the **first** `=` only, strip whitespace from both
  the key and the value, and store them in `"parsed"`. An empty value is fine
  (`flag=` maps `"flag"` to `""`). A value may itself contain `=` characters. If
  the same key appears more than once, the later line overwrites the earlier one.

  An empty input list must return `{"parsed": {}, "errors": []}`.

  Example: `['a=1', 'oops', 'b = 2', 'a=9']` returns
  `{"parsed": {"a": "9", "b": "2"}, "errors": ["oops"]}`.
