prompt_markdown: |
  A market stall's card terminal should decline for different reasons but let one
  handler catch them all. Build a small exception hierarchy:

  - `TransactionError` subclasses `Exception`.
  - `CardExpiredError` subclasses `TransactionError`.
  - `InsufficientFundsError` subclasses `TransactionError`.

  Then write `authorize(txn)` where `txn` is a dict with `balance`, `amount`, and
  `expired` (a bool). Check in this order:

  1. If `expired` is true, raise `CardExpiredError("card expired")`.
  2. If `amount` is greater than `balance`, raise `InsufficientFundsError("insufficient funds")`.
  3. Otherwise the charge clears and the remaining balance is `balance - amount`.

  Catch the shared base `TransactionError`. Return `"approved:R"` on success (where
  `R` is the remaining balance) or `"declined:<ClassName>"` using the exception's
  class name when a transaction error was raised.
