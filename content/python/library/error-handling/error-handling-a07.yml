function_name: authorize
input_mode: function
solution_sketch: Raise the right subclass, catch the base class, and report type(exc).__name__ on failure.
sample_solution: |
  class TransactionError(Exception):
      pass


  class CardExpiredError(TransactionError):
      pass


  class InsufficientFundsError(TransactionError):
      pass


  def authorize(txn):
      try:
          if txn["expired"]:
              raise CardExpiredError("card expired")
          if txn["amount"] > txn["balance"]:
              raise InsufficientFundsError("insufficient funds")
          remaining = txn["balance"] - txn["amount"]
      except TransactionError as exc:
          return f"declined:{type(exc).__name__}"
      return f"approved:{remaining}"
