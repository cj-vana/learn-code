explanation_markdown: |
  Because both specific errors inherit from `TransactionError`, a single
  `except TransactionError` catches either one; the exception object still knows
  its real class, which `type(exc).__name__` reads back. This is the payoff of an
  exception hierarchy: callers that care about the category catch the base, while
  callers that need the detail can inspect the subclass. The expiry check runs
  first, so an expired card with too little money is still reported as
  `CardExpiredError`, matching the written order of the rules.
common_mistakes:
  - Making the subclasses inherit from Exception directly, so catching TransactionError no longer covers them.
  - Catching each subclass separately when the task is to handle them through their common base.
  - Hard-coding the class name string instead of deriving it from the raised exception.
