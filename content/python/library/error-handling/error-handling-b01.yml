function_name: retry_policy
input_mode: function
solution_sketch: Loop making attempts; raise/catch on a non-ok outcome, and on failure add backoff[min(retries_used, len(backoff)-1)] (or 0 when empty) while retries_used < max_retries, incrementing the retry count, else break.
sample_solution: |
  def retry_policy(job):
      outcomes = job["outcomes"]
      max_retries = job["max_retries"]
      backoff = job["backoff"]

      class AttemptFailed(Exception):
          pass

      attempts = 0
      retries_used = 0
      succeeded = False
      waited = 0
      while True:
          idx = attempts
          attempts += 1
          try:
              outcome = outcomes[idx] if idx < len(outcomes) else "fail"
              if outcome != "ok":
                  raise AttemptFailed()
              succeeded = True
              break
          except AttemptFailed:
              if retries_used < max_retries:
                  step = backoff[min(retries_used, len(backoff) - 1)] if backoff else 0
                  waited += step
                  retries_used += 1
              else:
                  break
      return {"attempts": attempts, "succeeded": succeeded, "waited": waited}
hints:
