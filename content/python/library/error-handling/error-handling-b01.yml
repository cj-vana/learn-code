explanation_markdown: |
  The trap in any retry loop is miscounting either the attempts or the waits. Two
  separate counters keep them honest: `attempts` grows once per pass, while
  `retries_used` only grows when a failure actually leads to another try. The loop
  stops on the first success, and it also stops when a failure happens with no
  retries left -- that second exit is what caps the work at `max_retries + 1`
  attempts.

  Modeling a failure as a raised-and-caught exception mirrors what a real retry
  wrapper does: the `try` runs the attempt, and the `except` is the single place
  that decides whether to schedule a cooldown and go again. Waits live strictly
  *between* attempts, so a run that succeeds or gives up never charges a trailing
  cooldown. The cooldown lookup `backoff[min(retries_used, len(backoff) - 1)]`
  clamps the index to the last entry, which is why a short `backoff` list simply
  repeats its final value, and an empty one contributes nothing. Treating a
  missing `outcomes` entry as a failure lets the cap, not the script length, decide
  when to give up.
common_mistakes:
  - Conflating attempts with retries, so the loop runs one too many or one too few times.
  - Charging a cooldown after the final attempt, which overcounts waited whenever the run ends on a failure or a success.
  - Indexing backoff out of range instead of clamping to the last entry when retries outnumber the cooldown table.
  - Letting an index past the end of outcomes raise instead of treating the missing attempt as a failure.
