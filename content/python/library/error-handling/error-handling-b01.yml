  originality_notes: Original pure-function retry simulator driven by an explicit outcomes list and a per-retry cooldown table, themed around a container-port crane, distinct from exponential-backoff drills.
prompt_markdown: |
  An automated crane at a container port tries to lift a tote off a conveyor. The
  grab is flaky: it may miss and have to try again after a cooldown. You will model
  the retry loop as a **pure function** -- no real waiting -- from a script of what
  each attempt would do.

  Write `retry_policy(job)` that takes **one dictionary**:

  - `"outcomes"`: a list of strings, one per attempt the crane would make, in
    order. `"ok"` means that attempt succeeds; anything else means it fails.
  - `"max_retries"`: the maximum number of **retries** allowed after the first try
    (an int `>= 0`). So the crane makes at most `max_retries + 1` attempts total.
  - `"backoff"`: a list of cooldown durations. The wait scheduled *before* the
    k-th retry (k counted 1, 2, 3, ...) is `backoff[k - 1]`.

  Simulate the loop, modeling a failed attempt by raising and catching an exception:

  - Make the first attempt. If it succeeds, stop.
  - If an attempt fails and you still have retries left, schedule the appropriate
    cooldown, then retry. If an attempt fails and no retries remain, stop.
  - If a retry index runs **past the end of** `backoff`, reuse the **last** value
    in `backoff`. If `backoff` is empty, every wait is `0`.
  - If `outcomes` runs out before you stop (more attempts than listed), treat each
    missing attempt as a failure.

  Return a dictionary `{"attempts": ..., "succeeded": ..., "waited": ...}` where
  `attempts` is how many attempts you actually made, `succeeded` is `True` if some
  attempt succeeded, and `waited` is the sum of the cooldowns you scheduled. Note a
  cooldown is only charged **between** attempts, never after the final one.

  Example:

  ```python
  retry_policy({"outcomes": ["fail", "fail", "ok"], "max_retries": 3, "backoff": [1, 2, 4]})
  # attempt 1 fails -> wait backoff[0]=1; attempt 2 fails -> wait backoff[1]=2;
  # attempt 3 succeeds -> stop
  # -> {"attempts": 3, "succeeded": True, "waited": 3}
  ```
