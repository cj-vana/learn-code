  - level: 2
    text: Read the current outcome by attempt index, treating an index past the end of outcomes as a failure. Raise a small local exception on failure and catch it to decide whether to retry.
  - level: 3
    text: "On a caught failure with retries left, add backoff[min(retries_used, len(backoff) - 1)] (or 0 if backoff is empty) to waited, bump retries_used, and loop; otherwise break. A success adds no wait."
