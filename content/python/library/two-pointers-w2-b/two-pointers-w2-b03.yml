prompt_markdown: |
  A street festival lines its stalls along one avenue. Each stall sits at a
  position given in metres, and the list of positions is sorted in non-decreasing
  order. Organizers want to know how many pairs of stalls are close enough that a
  visitor could stroll between them, meaning the distance between the two stalls
  is at most `limit` metres.

  Write `count_close_pairs(data)` where `data` is a dict with keys `positions`
  (a list of ints sorted in non-decreasing order) and `limit` (a non-negative
  int). Return the number of unordered pairs of stalls whose positions differ by
  at most `limit`. An empty or single-stall list has zero pairs.
starter_code: |
  def count_close_pairs(data):
      return 0
function_name: count_close_pairs
input_mode: function
solution_sketch: Slide a left pointer to keep the window within limit of each right pointer, adding the window size to the count.
sample_solution: |
  def count_close_pairs(data):
      positions = data["positions"]
      limit = data["limit"]
      left = 0
      count = 0
      for right in range(len(positions)):
          while positions[right] - positions[left] > limit:
              left += 1
          count += right - left
      return count
hints:
  - level: 1
    text: Since the positions are sorted, every stall between left and right is within limit of the right stall.
  - level: 2
    text: For each right pointer, slide left forward until the gap positions[right] - positions[left] fits inside the limit.
  - level: 3
    text: Once the window is valid, every index from left up to right-1 pairs with right, so add right - left to the count.
