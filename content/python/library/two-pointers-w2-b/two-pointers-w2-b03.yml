explanation_markdown: |
  With positions sorted, a two-pointer window turns an O(n^2) pair check into a
  single O(n) sweep. The right pointer visits each stall once; the left pointer
  only ever moves forward, trimming stalls that are now too far behind. When the
  window `[left, right]` is valid, every earlier stall inside it forms a close
  pair with `right`, so the count grows by `right - left`. Because neither
  pointer moves backward, the total work is linear even though it counts pairs.
common_mistakes:
  - Using a nested loop over every pair instead of sliding a single window.
  - Adding one per valid right instead of the whole window size right - left.
  - Resetting the left pointer for each right, which reintroduces quadratic work.
