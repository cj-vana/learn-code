  originality_notes: Original courier scan-log scenario checking whether required checkpoints appear as an in-order subsequence.
prompt_markdown: |
  A courier must pass a fixed sequence of required checkpoints in order, but the
  route's scanner logs every station it passes, including many extra ones. The
  required checkpoints do not need to be adjacent in the log; they only need to
  appear in the correct relative order.

  Write `follows_route(data)` where `data` is a dict with keys `required` (a list
  of checkpoint codes that must be hit in order) and `scanned` (the full list of
  station codes actually recorded). Return `True` if every required checkpoint
  appears in `scanned` in the same order, otherwise `False`. An empty `required`
  list is always satisfied.
starter_code: |
  def follows_route(data):
      return False
function_name: follows_route
input_mode: function
solution_sketch: Walk a pointer through the scan log and advance a second pointer over the required list each time the current required code is matched.
sample_solution: |
  def follows_route(data):
      required = data["required"]
      scanned = data["scanned"]
      i = 0
      j = 0
      while i < len(required) and j < len(scanned):
          if required[i] == scanned[j]:
              i += 1
          j += 1
      return i == len(required)
hints:
  - level: 1
    text: Keep one pointer on the next required checkpoint and one that scans forward through the log.
  - level: 2
    text: Advance the log pointer every step, but only advance the required pointer when the codes match.
  - level: 3
    text: The route is followed exactly when the required pointer reaches the end of the required list.
