explanation_markdown: |
  This is a subsequence check driven by two pointers moving the same direction.
  The log pointer always steps forward; the required pointer only steps when it
  finds a match, locking in that checkpoint. Because both pointers advance and
  never reset, the scan is a single O(n) pass. The route is valid exactly when
  the required pointer has consumed every required checkpoint before the log ends.
common_mistakes:
  - Requiring the checkpoints to be adjacent instead of merely in order.
  - Advancing the required pointer even when the codes do not match.
  - Returning True whenever any checkpoint is seen rather than all of them in order.
