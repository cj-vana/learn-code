explanation_markdown: |
  Sorted input guarantees every duplicate sits next to its twin, so a single pass
  with two same-direction pointers is enough. The write pointer marks the last
  badge already kept, and the read pointer scans ahead; only when read finds a
  value different from the badge at write do we advance write and record it. Every
  badge is compared once, giving O(n) time, and slicing to `write + 1` returns the
  unique prefix.
common_mistakes:
  - Comparing against the previous read value instead of the last kept value.
  - Forgetting the empty-log case before touching the first element.
  - Returning the whole scratch list rather than slicing to the unique prefix.
