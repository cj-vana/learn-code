prompt_markdown: |
  A conference turnstile records the badge number of each attendee as they scan
  in. Because people sometimes swipe several times in a row, the log holds
  repeated adjacent entries. The badges arrive already sorted in non-decreasing
  order, so identical scans are always next to each other.

  Write `compress_badges(badges)` that returns a new list containing each badge
  number exactly once, keeping the sorted order. An empty log returns an empty
  list.
starter_code: |
  def compress_badges(badges):
      return []
function_name: compress_badges
input_mode: function
solution_sketch: Keep a slow write pointer at the last unique badge and a fast read pointer that copies forward only when it finds a new value.
sample_solution: |
  def compress_badges(badges):
      result = list(badges)
      if not result:
          return []
      write = 0
      for read in range(1, len(result)):
          if result[read] != result[write]:
              write += 1
              result[write] = result[read]
      return result[:write + 1]
hints:
  - level: 1
    text: Because duplicates are adjacent, you only need to compare each badge with the last unique one you kept.
  - level: 2
    text: Use a slow write pointer marking the last unique badge and a fast read pointer scanning ahead.
  - level: 3
    text: When the read value differs from the badge at the write pointer, advance write and store the new value there.
