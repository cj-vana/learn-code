      expected: [3, 3, 3, 4, 5]
    - name: south_runs_out
      input: { north: [10, 20, 30], south: [15] }
      expected: [10, 15, 20, 30]
    - name: single_each
      input: { north: [7], south: [2] }
      expected: [2, 7]
explanation_markdown: |
  Because each board is already sorted, the smallest departure not yet placed is
  always at the front of one board or the other. Two pointers track those fronts:
  compare them, copy the smaller, and advance only that pointer. When one board
  empties, the remainder of the other is already in order and can be appended
  wholesale. The whole merge visits each value once, so it runs in O(n + m) time.
common_mistakes:
  - Advancing both pointers after a single comparison, which drops values.
  - Forgetting to append the leftover tail once one board is exhausted.
  - Using a strict less-than that silently loses equal departures.
