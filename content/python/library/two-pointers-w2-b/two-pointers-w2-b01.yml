prompt_markdown: |
  A ferry terminal keeps two separate departure boards, one for the north dock
  and one for the south dock. Each board already lists its departure minutes in
  non-decreasing order. The terminal wants a single combined board that is still
  sorted, keeping every departure (duplicates included).

  Write `merge_boards(data)` where `data` is a dict with keys `north` and
  `south`, each a list of ints sorted in non-decreasing order. Return one merged
  list holding every value from both boards in non-decreasing order. If both
  boards are empty, return an empty list.
starter_code: |
  def merge_boards(data):
      return []
function_name: merge_boards
input_mode: function
solution_sketch: Advance one pointer through each sorted board, always copying the smaller front value into the result.
sample_solution: |
  def merge_boards(data):
      north = data["north"]
      south = data["south"]
      i = 0
      j = 0
      merged = []
      while i < len(north) and j < len(south):
          if north[i] <= south[j]:
              merged.append(north[i])
              i += 1
          else:
              merged.append(south[j])
              j += 1
      merged.extend(north[i:])
      merged.extend(south[j:])
      return merged
hints:
  - level: 1
    text: Keep one index for the north board and one for the south board, each pointing at the earliest departure not yet copied.
  - level: 2
    text: Compare the two front values and copy the smaller one, advancing only that board's pointer.
  - level: 3
    text: Once one board is exhausted, append whatever remains on the other board, since it is already sorted.
tests:
  public:
    - name: both_empty
      input: { north: [], south: [] }
      expected: []
    - name: one_empty
      input: { north: [5, 9], south: [] }
