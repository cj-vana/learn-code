explanation_markdown: |
  Lowercasing the phrase means one membership check handles both cases. Looping
  character by character and testing `char in "aeiou"` counts every vowel while
  skipping consonants, spaces, and punctuation.
common_mistakes:
  - Only checking lowercase vowels and missing uppercase ones.
  - Counting the letter y as a vowel.
  - Returning after the first vowel instead of counting them all.
