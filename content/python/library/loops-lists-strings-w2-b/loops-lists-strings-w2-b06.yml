prompt_markdown: |
  Two relay teams take turns sending runners onto the track. Write
  `interleave_relay(data)` where `data` is a dict with lists `team_a` and
  `team_b`. Return one list that alternates runners, starting with `team_a`'s
  first runner, then `team_b`'s first, then `team_a`'s second, and so on. When
  one team has more runners, append its leftover runners, in order, at the end.
starter_code: |
  def interleave_relay(data):
      return []
function_name: interleave_relay
input_mode: function
solution_sketch: Walk a shared index, appending each team's runner when that index exists.
sample_solution: |
  def interleave_relay(data):
      a = data["team_a"]
      b = data["team_b"]
      result = []
      index = 0
      while index < len(a) or index < len(b):
          if index < len(a):
              result.append(a[index])
          if index < len(b):
              result.append(b[index])
          index += 1
      return result
hints:
  - level: 1
    text: Step through both lists using the same position counter.
  - level: 2
    text: Keep going while either list still has an item at that position.
  - level: 3
    text: Guard each append with a length check so extra runners fall through at the end.
