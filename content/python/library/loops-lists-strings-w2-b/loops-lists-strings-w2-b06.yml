explanation_markdown: |
  A single index walks both lists at once. At each position the code adds
  `team_a`'s runner then `team_b`'s runner when they exist, and the loop keeps
  running while either list still has entries. The length guards let a longer
  team's remaining runners append naturally once the shorter team runs out.
common_mistakes:
  - Stopping at the length of the shorter list and dropping leftover runners.
  - Appending team_b before team_a and reversing the intended order.
  - Using one length check for both appends so a size mismatch crashes.
