explanation_markdown: |
  A running total carries the passenger count forward across stops. Each stop
  updates the total, and appending it captures a snapshot of occupancy at that
  moment. The result has one entry per stop, in order.
common_mistakes:
  - Appending the change instead of the cumulative total.
  - Resetting the total to zero inside the loop.
  - Recording the total before applying the current change.
