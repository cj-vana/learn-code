prompt_markdown: |
  A campus shuttle starts each route empty. At every stop it records the net
  passenger change: a positive number when more board than leave, negative when
  more leave than board. Write `occupancy_log(changes)` returning a list where
  entry `i` is the number of passengers aboard right after stop `i`. An empty
  list returns an empty list.
starter_code: |
  def occupancy_log(changes):
      return []
function_name: occupancy_log
input_mode: function
solution_sketch: Keep a running total and append it after applying each change.
sample_solution: |
  def occupancy_log(changes):
      total = 0
      result = []
      for change in changes:
          total += change
          result.append(total)
      return result
hints:
  - level: 1
    text: Track how many passengers are aboard as you move stop to stop.
  - level: 2
    text: Add each change to a running total before recording it.
  - level: 3
    text: Append the updated total to the result inside the loop.
tests:
