prompt_markdown: |
  A music app shows a small preview window into a playlist. Write
  `preview_window(data)` where `data` is a dict with keys `tracks` (a list of
  song titles), `start` (a starting index), and `count` (how many titles to
  show). Return the list of up to `count` titles beginning at `start`. If
  `start` is past the end of the playlist, return an empty list.
starter_code: |
  def preview_window(data):
      return []
function_name: preview_window
input_mode: function
solution_sketch: Slice the tracks from start for count items; slicing clamps out-of-range bounds.
sample_solution: |
  def preview_window(data):
      tracks = data["tracks"]
      start = data["start"]
      count = data["count"]
      return tracks[start:start + count]
hints:
  - level: 1
    text: Unpack the three values from the dict before slicing.
  - level: 2
    text: A slice needs a start index and a stop index.
  - level: 3
    text: The stop index is start + count, and Python clamps it for you.
tests:
  public:
    - name: middle_window
      input: { tracks: ["intro", "verse", "chorus", "bridge"], start: 1, count: 2 }
      expected: ["verse", "chorus"]
    - name: from_beginning
      input: { tracks: ["intro", "verse", "chorus"], start: 0, count: 2 }
      expected: ["intro", "verse"]
    - name: start_past_end
      input: { tracks: ["intro", "verse"], start: 5, count: 3 }
