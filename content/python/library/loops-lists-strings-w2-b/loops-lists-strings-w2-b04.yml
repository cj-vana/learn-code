      input: { tracks: ["a", "b", "c"], start: 2, count: 10 }
      expected: ["c"]
    - name: whole_playlist
      input: { tracks: ["x", "y", "z"], start: 0, count: 3 }
      expected: ["x", "y", "z"]
    - name: zero_count
      input: { tracks: ["a", "b"], start: 0, count: 0 }
      expected: []
explanation_markdown: |
  Slicing with `tracks[start:start + count]` grabs at most `count` items starting
  at `start`. Python quietly clamps a stop index that runs past the end and
  returns an empty list when `start` is beyond the list, so no bounds checks are
  needed.
common_mistakes:
  - Using start + count as the length instead of the stop index.
  - Adding manual bounds checks that slicing already handles.
  - Forgetting to read the three fields out of the dict.
