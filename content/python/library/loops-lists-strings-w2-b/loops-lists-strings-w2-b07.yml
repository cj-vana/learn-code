explanation_markdown: |
  Splitting yields the words, and a running `best` holds the longest seen so far.
  Using a strict greater-than means a later word must beat the current length to
  win, so among equal-length words the earliest one is kept.
common_mistakes:
  - Using >= and returning the last longest word instead of the first.
  - Comparing the words themselves instead of their lengths.
  - Forgetting the empty-string case where there are no words.
