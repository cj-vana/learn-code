prompt_markdown: |
  A park ranger wants the longest word on a trail sign printed in bold. Write
  `longest_word(text)` returning the longest word in `text`, where words are
  separated by single spaces. If several words tie for the longest length,
  return the first one that reaches that length. An empty string returns an
  empty string.
starter_code: |
  def longest_word(text):
      return ""
function_name: longest_word
input_mode: function
solution_sketch: Scan the words, keeping the first one whose length beats the best so far.
sample_solution: |
  def longest_word(text):
      words = text.split()
      best = ""
      for word in words:
          if len(word) > len(best):
              best = word
      return best
hints:
  - level: 1
    text: Split the sign into a list of words first.
  - level: 2
    text: Track the longest word you have seen while looping.
  - level: 3
    text: Only replace it when a word is strictly longer, so ties keep the first.
