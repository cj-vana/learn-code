explanation_markdown: |
  The brute-force count checks every unordered pair once: the outer loop fixes the
  first pastry and the inner loop, starting at i + 1, tries each later pastry. Every
  time the two calorie counts sum to `target`, you bump a counter. Because you touch
  each of the `n * (n - 1) / 2` pairs, the running time grows like O(n^2). Unlike a
  membership check, you keep scanning after a match so all valid pairs are counted.
common_mistakes:
  - Returning early on the first matching pair instead of counting all of them.
  - Starting the inner loop at 0, which double-counts pairs and pairs a pastry with itself.
  - Assuming the two pastries must have different calorie values.
