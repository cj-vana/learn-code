prompt_markdown: |
  A bakery lists the calorie count of every pastry in the case. A dietician wants
  to know how many ways two pastries can be paired so their calories add up to an
  exact `target`.

  Write `count_calorie_pairs(data)` where `data` is a dict with keys `calories` (a
  list of integers) and `target` (an integer). Return the number of unordered
  pairs of two different positions whose calories sum to exactly `target`. Two
  pastries with the same calorie count still form a valid pair. An empty list
  returns 0.
starter_code: |
  def count_calorie_pairs(data):
      return 0
function_name: count_calorie_pairs
input_mode: function
solution_sketch: Count every unordered pair whose two calorie values sum to target with a nested loop.
sample_solution: |
  def count_calorie_pairs(data):
      calories = data["calories"]
      target = data["target"]
      n = len(calories)
      count = 0
      for i in range(n):
          for j in range(i + 1, n):
              if calories[i] + calories[j] == target:
                  count += 1
      return count
hints:
  - level: 1
    text: Look at every possible pairing of two different pastries.
  - level: 2
    text: A nested loop with the inner index starting at i + 1 visits each unordered pair once.
  - level: 3
    text: Add 1 to a running counter each time calories[i] + calories[j] equals target.
