explanation_markdown: |
  The brute-force method compares every unordered pair of frames: the outer loop
  fixes one frame and the inner loop, starting at i + 1, measures the gap to each
  later frame. You keep the smallest gap found. Because there are about `n^2 / 2`
  pairs, the running time grows like O(n^2). The `-1` sentinel distinguishes "no
  pair exists" from a real gap of 0, which happens when two frames are equal.
common_mistakes:
  - Starting best at 0, so the function can never report the true minimum.
  - Comparing only neighboring frames instead of all pairs.
  - Forgetting the absolute value, which lets a negative difference look smallest.
