prompt_markdown: |
  An art gallery measures the width of every picture frame in millimeters. A
  curator wants the two frames whose widths are closest, measured as the smallest
  absolute difference between any two *different* frames.

  Write `closest_width_gap(widths)` that takes a list of integer widths and returns
  the smallest absolute difference between any two frames at different positions.
  Two frames of equal width give a gap of 0. If there are fewer than two frames,
  return -1.
starter_code: |
  def closest_width_gap(widths):
      return -1
function_name: closest_width_gap
input_mode: function
solution_sketch: Scan every unordered pair with a nested loop and keep the smallest absolute difference.
sample_solution: |
  def closest_width_gap(widths):
      n = len(widths)
      best = -1
      for i in range(n):
          for j in range(i + 1, n):
              gap = abs(widths[i] - widths[j])
              if best == -1 or gap < best:
                  best = gap
      return best
hints:
  - level: 1
    text: The answer is the difference of some pair of frames, so look at every pair.
  - level: 2
    text: A nested loop with the inner index starting at i + 1 covers each unordered pair once.
  - level: 3
    text: Track the smallest abs(widths[i] - widths[j]) seen, starting from a sentinel like -1 for "nothing yet".
