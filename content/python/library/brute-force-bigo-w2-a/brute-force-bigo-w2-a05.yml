explanation_markdown: |
  A rectangular nested loop over two independent groups runs its inner body once
  for every combination, so the total is the product of the two sizes. If there are
  `a` volunteers and `b` shifts, the work grows like O(a * b); when the two groups
  are the same size `n`, that is O(n^2). This is different from scanning the two
  lists separately, which would only be O(a + b).
common_mistakes:
  - Adding the two counts instead of multiplying them.
  - Forgetting that a product with any zero factor is 0.
  - Confusing this rectangular loop with an unordered-pair scan, which would halve the count.
