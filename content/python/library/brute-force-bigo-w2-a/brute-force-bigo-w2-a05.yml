prompt_markdown: |
  A festival coordinator wants to consider every possible way to assign one
  volunteer to one shift. To do that with a brute-force approach she loops over
  every volunteer and, for each one, loops over every shift.

  Write `count_pairings(data)` where `data` is a dict with keys `volunteers` and
  `shifts`, both non-negative integers. Return how many (volunteer, shift)
  combinations that pair of nested loops would examine. If either count is 0,
  there are no combinations.
starter_code: |
