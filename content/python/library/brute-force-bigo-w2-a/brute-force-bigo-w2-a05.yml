      return 0
function_name: count_pairings
input_mode: function
solution_sketch: A rectangular nested loop runs its inner body volunteers times shifts, so return the product.
sample_solution: |
  def count_pairings(data):
      volunteers = data["volunteers"]
      shifts = data["shifts"]
      return volunteers * shifts
hints:
  - level: 1
    text: For each volunteer the inner loop runs once per shift.
  - level: 2
    text: Two independent lists of length a and b give a times b combinations, not a plus b.
  - level: 3
    text: Return volunteers * shifts, which is 0 whenever either side is 0.
