prompt_markdown: |
  A gym's front desk logs the badge id of every member as they scan in, in order.
  Staff want the badge id of the first member whose badge had already been scanned
  earlier that day.

  Write `first_repeated_badge(badges)` that takes a list of integer badge ids and
  returns the value at the earliest position that matches some earlier position. If
  no badge repeats, return -1.
starter_code: |
  def first_repeated_badge(badges):
      return -1
function_name: first_repeated_badge
input_mode: function
solution_sketch: For each position, brute-force scan all earlier positions and return the first value that matches one.
sample_solution: |
  def first_repeated_badge(badges):
      n = len(badges)
      for j in range(n):
          for i in range(j):
              if badges[i] == badges[j]:
                  return badges[j]
      return -1
hints:
  - level: 1
    text: Walk through the list and, at each badge, ask whether it appeared before.
  - level: 2
    text: For position j, an inner loop over positions before j checks every earlier badge.
  - level: 3
    text: The first j whose value equals an earlier value is the answer; return -1 if you finish with no match.
