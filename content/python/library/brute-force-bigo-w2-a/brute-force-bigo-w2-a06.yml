explanation_markdown: |
  The brute-force approach scans outward: for each position `j` the inner loop
  checks every earlier position `i` for a matching badge. The first `j` that finds
  a match is, by construction, the earliest repeated scan. In the worst case (all
  distinct) you compare every pair, so the running time grows like O(n^2). Note the
  answer is decided by whichever badge's *second* appearance comes first, which is
  why `[5, 9, 9, 5]` returns 9 rather than 5.
common_mistakes:
  - Returning the earlier index's value or its position instead of the repeated badge value.
  - Letting the inner loop reach j itself, which makes every badge falsely match.
  - Returning the badge with the smallest value rather than the earliest repeat.
