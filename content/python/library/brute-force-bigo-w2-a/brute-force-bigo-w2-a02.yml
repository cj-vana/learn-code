function_name: count_taste_tests
input_mode: function
solution_sketch: Each unordered pair is tasted once, so the answer is jar_count * (jar_count - 1) // 2.
sample_solution: |
  def count_taste_tests(jar_count):
      if jar_count < 2:
          return 0
      return jar_count * (jar_count - 1) // 2
