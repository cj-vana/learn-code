explanation_markdown: |
  A brute-force pairwise scan uses an outer loop over each jar and an inner loop
  over every later jar, so the innermost step runs once for each of the
  `n * (n - 1) / 2` unordered pairs. That count grows like O(n^2). Because the
  total is a simple triangular number, you can return the closed form directly in
  O(1) time instead of actually running the loops.
common_mistakes:
  - Using jar_count * jar_count, which counts ordered pairs and self-comparisons.
  - Forgetting integer division, which can leave a trailing .0 in the result.
  - Not handling zero or one jar, where no comparison is possible.
