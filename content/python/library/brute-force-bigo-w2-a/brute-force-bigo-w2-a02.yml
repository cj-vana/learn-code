prompt_markdown: |
  A spice shop runs a tasting where every jar is compared against every other jar
  exactly once. Write `count_taste_tests(jar_count)` that returns how many
  comparisons happen when there are `jar_count` jars.

  This is exactly the number of unordered pairs a brute-force "compare every jar
  with every other jar" scan would examine, so you can compute it directly
  instead of looping. With zero or one jar there are no comparisons.
