explanation_markdown: |
  The brute-force search tries every unordered triple of positions using three
  nested loops whose indices satisfy i < j < k, so no item is reused and no triple
  is repeated. It returns `True` the moment a triple sums to `budget`. There are
  about `n^3 / 6` triples, so the worst-case running time grows like O(n^3), a step
  up from the O(n^2) pair scans. Returning early keeps lucky inputs fast without
  changing that worst case.
common_mistakes:
  - Reusing an item by starting an inner loop at the same index as the outer one.
  - Returning False inside the loops before all triples have been tried.
  - Assuming the three prices must be distinct values rather than distinct positions.
