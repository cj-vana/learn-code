prompt_markdown: |
  A food truck lets you build a combo from three *different* menu items. A customer
  has an exact `budget` in whole dollars and wants to know if any three items add
  up to it precisely.

  Write `combo_hits_budget(data)` where `data` is a dict with keys `prices` (a list
  of integer prices) and `budget` (an integer). Return `True` if some three items
  at three different positions have prices summing to exactly `budget`, otherwise
  `False`. Fewer than three items always returns `False`.
starter_code: |
  def combo_hits_budget(data):
      return False
function_name: combo_hits_budget
input_mode: function
solution_sketch: Try every unordered triple of positions with three nested loops and stop when one sums to budget.
sample_solution: |
  def combo_hits_budget(data):
      prices = data["prices"]
      budget = data["budget"]
      n = len(prices)
      for i in range(n):
          for j in range(i + 1, n):
              for k in range(j + 1, n):
                  if prices[i] + prices[j] + prices[k] == budget:
                      return True
      return False
hints:
  - level: 1
    text: A combo is any choice of three items at three different positions.
  - level: 2
    text: Three nested loops with indices i < j < k visit each unordered triple exactly once.
  - level: 3
    text: Sum prices[i] + prices[j] + prices[k] and return True as soon as it equals budget.
