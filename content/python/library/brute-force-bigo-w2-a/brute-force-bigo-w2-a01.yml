prompt_markdown: |
  A greenhouse arranges potted plants in a row and measures each pot's height in
  centimeters. A gardener wants to know whether any two pots in *different*
  positions differ in height by exactly `gap` centimeters.

  Write `has_height_gap(data)` where `data` is a dict with keys `heights` (a list
  of integer heights) and `gap` (a non-negative integer). Return `True` if some
  pair of two different pots has an absolute height difference equal to `gap`,
  otherwise `False`. When `gap` is 0 this means two pots of equal height. An
  empty list returns `False`.
starter_code: |
  def has_height_gap(data):
      return False
function_name: has_height_gap
input_mode: function
solution_sketch: Check every unordered pair of positions with a nested loop and compare the absolute difference to gap.
sample_solution: |
  def has_height_gap(data):
      heights = data["heights"]
      gap = data["gap"]
      n = len(heights)
      for i in range(n):
          for j in range(i + 1, n):
              if abs(heights[i] - heights[j]) == gap:
                  return True
      return False
hints:
  - level: 1
    text: Compare each pot with every other pot and look at how far apart their heights are.
  - level: 2
    text: An outer loop picks the first pot; an inner loop starting at i + 1 picks a later pot so no pair repeats.
  - level: 3
    text: Use abs(heights[i] - heights[j]) == gap, and remember gap can be 0 when two pots match.
tests:
