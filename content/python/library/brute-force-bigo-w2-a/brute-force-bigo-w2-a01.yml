explanation_markdown: |
  The brute-force idea is to try every unordered pair of positions. The outer
  loop fixes the first pot; the inner loop starts one step later so each pair is
  examined once and a pot is never compared with itself. With `n` pots there are
  `n * (n - 1) / 2` pairs, so this runs in O(n^2) time. Returning early on the
  first match keeps the best case fast without changing the worst case.
common_mistakes:
  - Starting the inner loop at 0, which compares a pot with itself and always matches when gap is 0.
  - Forgetting the absolute value, so a valid pair in the other order is missed.
  - Returning False inside the loop before every pair has been checked.
