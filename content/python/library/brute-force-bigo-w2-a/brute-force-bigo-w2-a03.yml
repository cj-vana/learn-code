prompt_markdown: |
  A bus line records how many riders board at each stop along a route. A planner
  wants the largest combined ridership of any two *different* stops.

  Write `max_pair_riders(riders)` that takes a list of non-negative integer rider
  counts and returns the greatest sum you can make by adding the counts of two
  stops at different positions. If there are fewer than two stops, return 0.
starter_code: |
