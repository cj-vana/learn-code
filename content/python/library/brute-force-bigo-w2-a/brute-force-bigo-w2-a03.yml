explanation_markdown: |
  A brute-force scan considers every unordered pair of stops: the outer loop fixes
  the first stop and the inner loop, starting at i + 1, adds each later stop. Among
  all those sums you keep the largest. With `n` stops there are about `n^2 / 2`
  pairs, so the work grows like O(n^2). The `found` flag makes the "fewer than two
  stops" case return 0 cleanly instead of a made-up number.
common_mistakes:
  - Adding a stop to itself by starting the inner loop at i instead of i + 1.
  - Initializing best to 0 and returning it even when counts could all be 0 but a pair exists.
  - Assuming the two busiest stops are adjacent, so only neighbors get compared.
