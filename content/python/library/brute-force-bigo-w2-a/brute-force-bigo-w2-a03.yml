      return 0
function_name: max_pair_riders
input_mode: function
solution_sketch: Try every unordered pair with a nested loop and track the largest sum seen.
sample_solution: |
  def max_pair_riders(riders):
      n = len(riders)
      best = 0
      found = False
      for i in range(n):
          for j in range(i + 1, n):
              total = riders[i] + riders[j]
              if not found or total > best:
                  best = total
                  found = True
      return best if found else 0
hints:
  - level: 1
    text: Every candidate answer is the sum of two stops at different positions.
  - level: 2
    text: Use a nested loop so the inner index starts at i + 1 and each pair is summed once.
  - level: 3
    text: Keep a running best sum, updating it whenever a pair beats it; return 0 if no pair exists.
