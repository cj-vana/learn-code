solution_sketch: Compute angle = pos / 10000 ** (2*i/dim), then return sin(angle) when i is even and cos(angle) when i is odd, rounded to 6 places.
sample_solution: |
  import math


  def positional_encoding(job):
      p = job["pos"]
      d = job["dim"]
      i = job["i"]
      angle = p / 10000 ** (2 * i / d)
      value = math.sin(angle) if i % 2 == 0 else math.cos(angle)
      return round(value, 6)
