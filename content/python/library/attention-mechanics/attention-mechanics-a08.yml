explanation_markdown: |
  These sinusoidal stamps have a neat property: because sine and cosine are
  smooth and periodic, nearby positions get nearby encodings, and the model can
  learn to attend "three tokens back" as a fixed rotation that works the same at
  any absolute position. The `10000 ** (2 * i / d)` term spreads the wavelengths
  from very short (small `i`, values change quickly with position) to very long
  (large `i`, values barely move), so the full vector captures both fine and
  coarse notions of order.

  The one subtlety in Python is that `2 * i / d` uses true division and stays a
  float, so the exponent is genuinely fractional rather than truncated to an
  integer. Rounding to 6 places keeps floating-point drift out of the answer.
common_mistakes:
  - Swapping the cases so even slots use cosine and odd slots use sine.
  - Writing the exponent as 2 * i // d (integer division), which collapses most slots to the same wavelength.
  - Returning the raw sine or cosine without rounding to 6 decimal places.
