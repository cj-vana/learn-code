prompt_markdown: |
  Attention treats its inputs as an unordered bag, so a transformer has no idea
  which token came first unless you tell it. The classic fix is a **positional
  encoding**: each position `p` gets a fixed vector of `d` numbers built from
  sines and cosines of different wavelengths, and that vector is added to the
  token's embedding.

  Here you compute a single slot of that vector. Given a position `p`, the model
  width `d`, and a slot index `i` (with `0 <= i < d`), form the angle

      angle = p / 10000 ** (2 * i / d)

  and then read one of two functions off that angle depending on whether the
  slot index is even or odd:

      slot value = sin(angle)   if i is even
      slot value = cos(angle)   if i is odd

  Even slots wave as sines, odd slots as cosines, and larger `i` stretches the
  wavelength so different slots vary at very different rates. That mix is what
  gives every position a unique, smoothly-changing stamp.

  Write `positional_encoding(job)` that takes one dictionary such as
  `{"pos": 1, "dim": 4, "i": 1}` and returns the single slot value rounded to 6
  decimal places.
