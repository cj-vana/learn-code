prompt_markdown: |
  The last step of an attention head combines the **value vectors** using the
  attention weights. Think of a paint studio: each source jar has a colour
  recipe (a value vector), and the attention weights say how much of each jar to
  pour. The output is the weighted mixture.

  Given weights `w` (one per value vector, already summing to about 1) and value
  vectors `values` (all the same length), the output vector has, for each
  component `j`,

      out[j] = w[0]*values[0][j] + w[1]*values[1][j] + ... + w[n-1]*values[n-1][j]

  Write `weighted_values(job)` where `job` is a single dict:

      {"weights": [0.25, 0.75], "values": [[4.0, 0.0], [0.0, 8.0]]}

  Here `weights[i]` scales `values[i]`. Return the output vector (same length as
  each value vector) with every component rounded to 6 decimal places. You may
  assume there is at least one value vector.
starter_code: |
