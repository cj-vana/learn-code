function_name: weighted_values
input_mode: function
solution_sketch: For each output component index, sum weight[i] times values[i][j] across all vectors, then round each component to 6 decimals.
sample_solution: |
  def weighted_values(job):
      weights = job["weights"]
      values = job["values"]
      dim = len(values[0])
      out = []
      for j in range(dim):
          total = sum(weights[i] * values[i][j] for i in range(len(weights)))
          out.append(round(total, 6))
      return out
hints:
  - level: 1
    text: The output has one component per position in a value vector, so its length equals len(values[0]).
  - level: 2
    text: For each component j, walk over every value vector i and accumulate weights[i] * values[i][j].
  - level: 3
    text: Round each summed component to 6 decimals; a one-hot weight vector should return the single selected value vector unchanged.
