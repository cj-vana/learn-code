explanation_markdown: |
  This weighted sum is why attention is often called a soft look-up: instead of
  picking one value vector, it returns a blend where each vector contributes in
  proportion to its attention weight. Because the weights sum to 1, the output is
  a convex combination that stays inside the range of the inputs. A one-hot
  weight vector recovers hard selection of a single value, while equal weights
  produce the plain average. Summing per component keeps the output the same
  width as each value vector.
common_mistakes:
  - Summing along the wrong axis, mixing components of one vector together instead of matching component j across vectors.
  - Assuming the number of weights equals the vector width; weights index the vectors, not the components.
  - Returning a plain sum without applying the weights, so all value vectors count equally.
