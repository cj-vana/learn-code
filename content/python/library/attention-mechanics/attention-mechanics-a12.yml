prompt_markdown: |
  Multi-head attention runs several attention heads in parallel. Each head looks
  at the sequence in its own way and produces its own output matrix, where a row
  is a token position and a column is a feature. A real transformer concatenates
  the heads and mixes them with a learned matrix, but a simpler and common way to
  combine them for analysis is to **average the heads element by element**.

  You are given a list of heads. Every head is a matrix (a list of rows, each row
  a list of numbers), and all heads share the same shape. Produce one output
  matrix of that shape where each entry is the mean of that same entry across all
  the heads:

      out[r][c] = (head0[r][c] + head1[r][c] + ... + head(h-1)[r][c]) / h

  where `h` is the number of heads.

  Write `mean_pool_heads(job)` that takes one dictionary such as
  `{"heads": [[[1.0, 2.0], [3.0, 4.0]], [[3.0, 2.0], [1.0, 0.0]]]}` (two heads,
  each a 2x2 matrix) and returns the averaged matrix with every entry rounded to
  6 decimal places. There is always at least one head.
starter_code: |
