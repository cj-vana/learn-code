function_name: mean_pool_heads
input_mode: function
solution_sketch: For each row and column position, sum that entry across all heads, divide by the head count, and round; assemble the results back into a matrix of the same shape.
sample_solution: |
  def mean_pool_heads(job):
      heads = job["heads"]
      h = len(heads)
      rows = len(heads[0])
      cols = len(heads[0][0])
      out = []
      for r in range(rows):
          row = []
          for c in range(cols):
              total = sum(head[r][c] for head in heads)
              row.append(round(total / h, 6))
          out.append(row)
      return out
