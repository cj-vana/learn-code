explanation_markdown: |
  Averaging is the simplest way to fold many heads into one representation, and
  it makes the shared structure obvious: because each head keeps the same layout
  of rows (positions) and columns (features), you can walk a single `(r, c)`
  coordinate and pull the same cell out of every head. The mean at that cell is
  just the total across heads divided by the head count.

  The order of the loops does not change the answer, but reading the shape off
  `heads[0]` once (rather than assuming a fixed size) is what lets the same code
  handle a lone 1x1 head or several wider matrices. Rounding each averaged entry
  to 6 places keeps a division like `7 / 3` from leaking a long tail of digits
  into the output.
common_mistakes:
  - Averaging within one head (across its own rows or columns) instead of across the separate heads at each fixed position.
  - Hard-coding the matrix shape instead of reading rows and columns from heads[0], so non-square or single-cell inputs break.
  - Dividing by the wrong count (such as the number of rows) rather than by the number of heads.
