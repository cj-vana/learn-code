      expected: [0.0, 0.4, 0.6]
explanation_markdown: |
  The dot product is the similarity measure at the heart of attention. When two
  vectors point in the same direction their products are large and positive, so
  the score is high; when they are orthogonal the products cancel to near zero;
  when they point opposite ways the score goes negative. Computing one score per
  key gives a vector of raw affinities that later stages will scale and turn into
  attention weights. Rounding to 6 decimals keeps the output comparable across
  machines without changing the ranking.
common_mistakes:
  - Zipping the query with itself instead of with each key, which just returns the query's squared norm every time.
  - Returning the scores in a different order than the keys, breaking the one-to-one correspondence downstream stages rely on.
  - Forgetting to round, so floating-point noise like 0.6000000000000001 slips into the result.
