prompt_markdown: |
  In a tea-blending workshop, a target cup is described by a short numeric
  "aroma vector" (its query). Each candidate leaf on the shelf has its own
  aroma vector (a key). Attention begins by scoring how well each key matches
  the query using a **dot product**: the more the two vectors point the same
  way, the higher the score.

  For a query `q` and a key `k` of the same length, the raw attention score is

      score = q[0]*k[0] + q[1]*k[1] + ... + q[d-1]*k[d-1]

  Write `attention_scores(job)` where `job` is a single dict:

      {"query": [0.4, 0.6], "keys": [[1.0, 0.0], [0.5, 0.5]]}

  `query` is one vector and `keys` is a list of key vectors, all the same
  length as the query. Return a list holding the dot product of the query with
  each key, in the same order as `keys`. Round every score to 6 decimal places.
  These raw scores are the un-normalised starting point of an attention head.
starter_code: |
