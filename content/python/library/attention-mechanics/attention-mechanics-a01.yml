      return []
function_name: attention_scores
input_mode: function
solution_sketch: For each key vector, sum the elementwise products with the query, round to 6 decimals, and collect the results in order.
sample_solution: |
  def attention_scores(job):
      query = job["query"]
      keys = job["keys"]
      scores = []
      for key in keys:
          dot = sum(q * k for q, k in zip(query, key))
          scores.append(round(dot, 6))
      return scores
hints:
  - level: 1
    text: A dot product multiplies matching positions of two vectors and adds the products into a single number.
  - level: 2
    text: Loop over the key vectors; for each one, pair it with the query using zip and sum q*k across the pairs.
  - level: 3
    text: Append round(dot, 6) for each key so the returned list lines up one-to-one with job["keys"].
