prompt_markdown: |
  Softmax turns a list of scaled scores into **attention weights**: non-negative
  numbers that add up to 1, like a curator deciding what fraction of their
  attention each archive photo deserves. For a list of scores `s`, the softmax
  weight of position `i` is

      weight[i] = exp(s[i]) / sum_j exp(s[j])

  Computing `exp` on large scores can overflow, so use the **numerically stable**
  form: subtract the maximum score from every score first. Because the same
  constant cancels in the numerator and denominator, the weights are unchanged:

      m = max(s)
      weight[i] = exp(s[i] - m) / sum_j exp(s[j] - m)

  Write `softmax_weights(scores)` where `scores` is the list of scores itself
  (for example `[2.0, 1.0, 0.0]`). Return a new list of the softmax weights in
  the same order, each rounded to 6 decimal places. You may assume `scores` has
  at least one element.
