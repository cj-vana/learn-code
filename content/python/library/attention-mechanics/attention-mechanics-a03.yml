function_name: softmax_weights
input_mode: function
solution_sketch: Subtract the max score from each score, exponentiate, divide each by the total of the exponentials, and round to 6 decimals.
sample_solution: |
  import math


  def softmax_weights(scores):
      m = max(scores)
      exps = [math.exp(s - m) for s in scores]
      total = sum(exps)
      return [round(e / total, 6) for e in exps]
hints:
  - level: 1
    text: First find max(scores); subtracting it from every score keeps the weights identical but prevents exp from overflowing.
  - level: 2
    text: Build a list of exp(s - m) values, then sum them to get the normaliser.
  - level: 3
    text: Divide each exponential by the total and round to 6 decimals; the results should sum to about 1.
