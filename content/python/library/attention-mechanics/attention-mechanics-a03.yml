explanation_markdown: |
  Softmax is what makes attention a weighted average: after this step the weights
  are all positive and sum to 1, so multiplying value vectors by them produces a
  genuine blend. Two details matter. First, softmax depends only on the
  **differences** between scores, which is why the all-equal input yields a flat
  distribution and why shifting every score by the same constant leaves the
  weights unchanged. That constant-shift invariance is exactly what lets us
  subtract `max(s)` for stability: with scores like 100 and 99 the naive `exp`
  would blow up, but `exp(0)` and `exp(-1)` are perfectly tame.
common_mistakes:
  - Skipping the max subtraction, so exp overflows on large scores and returns inf.
  - Normalising by the count of scores instead of by the sum of the exponentials.
  - Subtracting the max from the numerator but forgetting it in the denominator, which breaks the cancellation.
