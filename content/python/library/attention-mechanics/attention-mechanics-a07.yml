explanation_markdown: |
  Causal masking is what lets one transformer generate text without cheating.
  During training the model sees the whole sentence at once, so the mask is the
  only thing stopping position `i` from attending to future words and trivially
  copying the answer. Setting the hidden weights to exactly `0.0` (rather than a
  tiny number) means those positions contribute nothing to the weighted sum that
  follows.

  Softmax turns arbitrary real scores into a probability distribution: every
  weight is positive and they add up to 1. Subtracting the maximum visible score
  before calling `exp` is a standard trick; because it divides top and bottom by
  the same constant, the weights are unchanged, but the exponentials stay in a
  safe numeric range instead of overflowing on large scores.
common_mistakes:
  - Running softmax over the whole scores list first and only zeroing the tail afterward, which leaves the visible weights too small because the hidden scores still fed the denominator.
  - Forgetting to pad the result so the returned list is shorter than the input.
  - Skipping the round call and returning raw floats that differ from the expected values in their final digits.
