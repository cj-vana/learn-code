function_name: masked_attention_row
input_mode: function
solution_sketch: Slice off the first mask_from scores, exponentiate them (subtracting the max for stability), divide by their sum to get softmax weights, then pad the tail with 0.0 and round.
sample_solution: |
  import math


  def masked_attention_row(job):
      scores = job["scores"]
      m = job["mask_from"]
      visible = scores[:m]
      shift = max(visible)
      exps = [math.exp(s - shift) for s in visible]
      total = sum(exps)
      result = [round(e / total, 6) for e in exps]
      result += [0.0] * (len(scores) - m)
      return result
hints:
  - level: 1
    text: Split the work in two. First compute softmax over scores[:mask_from], then append one 0.0 for every remaining position.
  - level: 2
    text: Softmax is exp(each score) divided by the sum of all the exponentials. Subtracting max(visible) from each score before exp keeps the numbers small without changing the result.
  - level: 3
    text: Build exps = [math.exp(s - shift) for s in visible], divide each by sum(exps), round to 6 places, then extend the list with [0.0] * (len(scores) - mask_from).
