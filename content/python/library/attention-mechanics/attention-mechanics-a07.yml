prompt_markdown: |
  A decoder that writes text one token at a time is not allowed to peek at
  tokens it has not produced yet. It enforces this with a **causal mask**: when
  it scores how much to attend to each earlier position, everything from the
  current position onward is blocked out.

  Imagine a scribe reading a line of carved runes strictly left to right. At the
  moment it is looking at rune number `i`, it may weigh only the runes in
  positions `0, 1, ..., i-1`; the rest are hidden.

  You are given a list of raw attention `scores` (one number per rune) and an
  integer `mask_from`. Attend to the first `mask_from` scores and hide the rest.
  Turn the visible scores into attention weights with the **softmax** function.
  For visible scores `s[0], s[1], ..., s[m-1]` (where `m = mask_from`):

      weight[k] = exp(s[k]) / (exp(s[0]) + exp(s[1]) + ... + exp(s[m-1]))

  The visible weights are non-negative and sum to 1. Every hidden position
  (index `mask_from` and beyond) gets weight `0.0`.

  Write `masked_attention_row(job)` that takes one dictionary such as
  `{"scores": [1.0, 1.0, 5.0], "mask_from": 2}` and returns a list the same
  length as `scores`: the softmax weights for the first `mask_from` entries
  followed by `0.0` for each hidden entry. Round every number to 6 decimal
  places. You may assume `1 <= mask_from <= len(scores)`.
