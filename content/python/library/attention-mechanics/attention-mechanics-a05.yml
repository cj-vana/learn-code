prompt_markdown: |
  Now assemble a full single-head attention computation for one query. Picture a
  tide-pool survey: the query describes what you are looking for, each surveyed
  pool contributes a key (how well it matches) and a value (what you record if
  you attend to it). The output is the attention-weighted summary of the values.

  Run the four steps in order:

  1. **Score** each key against the query with a dot product:
     `score_i = sum_d query[d] * keys[i][d]`.
  2. **Scale** every score by `1 / sqrt(dim_k)`: `scaled_i = score_i / sqrt(dim_k)`.
  3. **Softmax** the scaled scores into weights using the stable form
     `weight_i = exp(scaled_i - m) / sum_j exp(scaled_j - m)` where `m = max(scaled)`.
  4. **Blend** the value vectors: `out[j] = sum_i weight_i * values[i][j]`.

  Write `single_head(job)` where `job` is a single dict:

      {"query": [1.0, 0.0], "keys": [[1.0, 0.0], [0.0, 1.0]],
       "values": [[2.0, 0.0], [0.0, 4.0]], "dim_k": 2}

  `keys` and `values` have the same number of vectors (one key and one value per
  pool). Do the rounding **only at the very end**: return the output vector with
  each component rounded to 6 decimal places, and keep full precision through the
  intermediate steps.
