solution_sketch: Dot-product each key with the query, divide by sqrt(dim_k), apply a stable softmax, then take the weighted sum of the value vectors, rounding only the final components.
sample_solution: |
  import math


  def single_head(job):
      query = job["query"]
      keys = job["keys"]
      values = job["values"]
      root = math.sqrt(job["dim_k"])

      scaled = [sum(q * k for q, k in zip(query, key)) / root for key in keys]
      m = max(scaled)
      exps = [math.exp(s - m) for s in scaled]
      total = sum(exps)
      weights = [e / total for e in exps]

      dim = len(values[0])
      out = []
      for j in range(dim):
          blended = sum(weights[i] * values[i][j] for i in range(len(weights)))
          out.append(round(blended, 6))
      return out
