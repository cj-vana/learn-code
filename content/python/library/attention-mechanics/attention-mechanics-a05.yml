explanation_markdown: |
  This is the computation a single attention head performs for one position:
  scores measure query-key similarity, scaling keeps softmax responsive, softmax
  turns the scores into a probability distribution over the keys, and the
  weighted sum reads out a blend of the values. When one key matches far better
  than the rest (the peaked case) almost all the weight lands on its value; when
  the scores tie (the equal-scores and negative-query cases) the output is the
  plain average of the values. Rounding only at the end avoids accumulating the
  small errors that early rounding would inject into the softmax.
common_mistakes:
  - Rounding intermediate scores or weights, which perturbs the softmax and shifts the final components.
  - Scaling by dim_k instead of sqrt(dim_k), so wide heads collapse toward a uniform blend.
  - Misaligning weights and values so weights[i] no longer multiplies the matching values[i].
