explanation_markdown: |
  Layer normalization acts on one vector at a time and along its own features,
  which is why it works even with a single example and does not care about batch
  size. Centering at the mean and dividing by the spread turns any incoming
  vector into one with mean 0 and (ignoring the tiny `eps`) unit variance, so the
  next sublayer always sees inputs on a familiar scale.

  Two details matter for exact answers. First, this uses population variance
  (divide by `n`), which is the convention transformers follow. Second, `eps`
  lives inside the square root; on a flat vector the true variance is 0, and
  without `eps` you would divide by zero, but with it every normalized entry
  comes out as 0 instead.
common_mistakes:
  - Using sample variance (dividing by n - 1) instead of population variance (dividing by n).
  - Adding eps outside the square root, or forgetting it entirely so flat vectors blow up.
  - Recomputing the mean or denominator inside the loop for each entry instead of once up front.
