function_name: layer_norm
input_mode: function
solution_sketch: Compute the mean, then the population variance, then the denominator sqrt(var + eps), and map each entry to (x - mean) / denom rounded to 6 places.
sample_solution: |
  import math


  def layer_norm(job):
      x = job["vector"]
      eps = job["eps"]
      n = len(x)
      mean = sum(x) / n
      var = sum((v - mean) ** 2 for v in x) / n
      denom = math.sqrt(var + eps)
      return [round((v - mean) / denom, 6) for v in x]
hints:
  - level: 1
    text: Do it in stages. Compute the mean, then the variance from that mean, then reuse both to normalize each entry.
  - level: 2
    text: Population variance is the average of the squared distances from the mean, so divide the sum of (v - mean) ** 2 by n, not n - 1.
  - level: 3
    text: The shared denominator is math.sqrt(var + eps); build the output with a comprehension [round((v - mean) / denom, 6) for v in x].
