prompt_markdown: |
  Deep transformers stack many sublayers, and without help the numbers flowing
  between them can drift to wildly different scales, which makes training
  unstable. **Layer normalization** rescales each vector on its own so that its
  entries are centered at 0 and have a consistent spread, no matter how large or
  small they arrived.

  Given a vector `x = [x0, x1, ..., x(n-1)]`, first compute its mean and its
  population variance:

      mean = (x0 + x1 + ... + x(n-1)) / n
      var  = ((x0 - mean)^2 + (x1 - mean)^2 + ... + (x(n-1) - mean)^2) / n

  Then normalize every entry by subtracting the mean and dividing by the square
  root of the variance plus a tiny constant `eps` (which keeps you from dividing
  by zero when the vector is flat):

      out[k] = (x[k] - mean) / sqrt(var + eps)

  Note the variance divides by `n` (population variance), not `n - 1`.

  Write `layer_norm(job)` that takes one dictionary such as
  `{"vector": [1.0, 2.0, 3.0], "eps": 0.00001}` and returns the normalized list
  with every entry rounded to 6 decimal places.
