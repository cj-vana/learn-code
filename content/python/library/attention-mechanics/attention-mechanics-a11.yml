function_name: attention_entropy
input_mode: function
solution_sketch: Sum p * log2(p) over the strictly positive weights, negate the total, and round to 4 places.
sample_solution: |
  import math


  def attention_entropy(weights):
      total = 0.0
      for p in weights:
          if p > 0:
              total += p * math.log2(p)
      return round(-total, 4)
hints:
  - level: 1
    text: Accumulate p * log2(p) across the weights, then negate the running sum at the end.
  - level: 2
    text: Guard the logarithm. Only include a weight in the sum when p > 0, because log2(0) is undefined.
  - level: 3
    text: After the loop, return round(-total, 4); the leading minus sign is what makes entropy come out non-negative.
