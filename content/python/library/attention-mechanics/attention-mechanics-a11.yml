explanation_markdown: |
  Entropy is a compact diagnostic for what a head is doing. Low entropy means the
  head has committed to a small number of positions, which often shows up on
  heads that track syntax like "the verb attends to its subject." High entropy
  means the head is averaging broadly, closer to a smoothing or context-pooling
  role. Because the maximum is `log2(n)`, comparing a head's entropy to that
  ceiling tells you how close to uniform it is.

  The one trap is the `0 * log2(0)` term. Mathematically its limit is 0, but
  `math.log2(0)` raises an error, so you must filter out zero weights before
  taking the log. Using base-2 logs reports the answer in bits; base-e would give
  nats, a different scale for the same idea.
common_mistakes:
  - Calling math.log2 on a zero weight instead of skipping it, which raises a math domain error.
  - Forgetting the leading minus sign, so the result comes out negative.
  - Using math.log (natural log) instead of math.log2, which reports nats rather than bits and fails the expected values.
