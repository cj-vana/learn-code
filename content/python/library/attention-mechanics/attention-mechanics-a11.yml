prompt_markdown: |
  Once a head has produced its attention weights, it helps to ask: is this head
  laser-focused on one position, or does it spread its attention thinly across
  many? **Shannon entropy** answers that with a single number. For a set of
  weights that form a probability distribution (each `p` is between 0 and 1 and
  together they sum to 1):

      entropy = -(p0 * log2(p0) + p1 * log2(p1) + ... + p(n-1) * log2(p(n-1)))

  Entropy is measured in bits. A head that puts all its weight on one position
  has entropy `0` (it is perfectly certain); a head that spreads weight evenly
  across `n` positions reaches the maximum, `log2(n)` bits.

  A weight of exactly `0` contributes nothing (its `log2` is undefined, but
  `0 * log2(0)` is taken to be 0), so **skip any weight that is 0** rather than
  calling `log2` on it.

  Write `attention_entropy(weights)` that takes a list of attention weights
  directly, for example `[0.25, 0.25, 0.25, 0.25]`, and returns the entropy in
  bits rounded to 4 decimal places.
starter_code: |
