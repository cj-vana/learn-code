prompt_markdown: |
  A decoder language model writes one token at a time, left to right, and at each
  position it predicts the **next** token. If, while summarising position `i`, it
  were allowed to attend to positions that come after `i`, it would be peeking at
  the very answers it is supposed to predict, which is cheating during training.
  A **causal mask** forbids this: position `i` may attend only to positions `0`
  through `i` (itself and everything earlier), never to future positions.

  You are given the square matrix of attention scores, where `scores[i][j]` is
  how much position `i` would attend to position `j`. Wherever `j > i` (strictly
  above the main diagonal) the score points into the future and must be blocked.
  Blocking means replacing it with `None`; later this becomes negative infinity
  so softmax drives that weight to 0. Every entry on or below the diagonal
  (`j <= i`) is kept unchanged.

  Write `causal_mask(job)` where `job` is a single dict:

      {"scores": [[1.0, 2.0], [3.0, 4.0]]}

  `scores` is an n-by-n matrix. Return a new n-by-n matrix (do not mutate the
  input) where every strictly-upper-triangle entry is `None` and all other
  entries are copied through unchanged.
starter_code: |
