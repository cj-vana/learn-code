explanation_markdown: |
  Causal masking is what makes a decoder autoregressive: it enforces that the
  representation at each position depends only on the past and present, never the
  future. The kept region is a lower triangle (including the diagonal, so a
  position may always attend to itself), and the blocked region is the strict
  upper triangle. Using `None` as the placeholder marks the spots that the
  scaling-plus-softmax stage will treat as negative infinity, sending their
  attention weights to exactly 0. Row 0 can see only itself, while the final row
  can see the whole sequence.
common_mistakes:
  - Masking on j >= i, which wrongly blocks the diagonal so a position cannot even attend to itself.
  - Editing scores[i][j] in place instead of building a new matrix, corrupting the caller's data.
  - Masking the lower triangle instead of the upper one, letting the model see the future and hiding the past.
