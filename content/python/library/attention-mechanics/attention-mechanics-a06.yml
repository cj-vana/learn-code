function_name: causal_mask
input_mode: function
solution_sketch: Build a new matrix; for each row i and column j, keep scores[i][j] when j <= i and use None when j > i.
sample_solution: |
  def causal_mask(job):
      scores = job["scores"]
      n = len(scores)
      masked = []
      for i in range(n):
          row = []
          for j in range(n):
              if j > i:
                  row.append(None)
              else:
                  row.append(scores[i][j])
          masked.append(row)
      return masked
hints:
  - level: 1
