explanation_markdown: |
  The `1 / sqrt(dim_k)` factor is a variance fix. A dot product of two random
  unit-scale vectors of length `dim_k` has a spread that grows like
  `sqrt(dim_k)`, so without scaling, wider heads would push softmax harder into
  saturation than narrow ones. Dividing by `sqrt(dim_k)` normalises that spread
  back toward 1 regardless of the head width, so softmax stays in its sensitive
  range and gradients keep flowing. Notice `dim_k = 1` leaves the scores
  unchanged, since `sqrt(1)` is 1.
common_mistakes:
  - Dividing by dim_k instead of sqrt(dim_k), which over-cools the scores as the dimension grows.
  - Recomputing math.sqrt inside the loop, which is wasteful and easy to get wrong.
  - Rounding before dividing rather than after, which changes the final digits.
