function_name: scale_scores
input_mode: function
solution_sketch: Compute sqrt(dim_k) once, then divide each score by it and round to 6 decimals.
sample_solution: |
  import math


  def scale_scores(job):
      scores = job["scores"]
      root = math.sqrt(job["dim_k"])
      return [round(score / root, 6) for score in scores]
