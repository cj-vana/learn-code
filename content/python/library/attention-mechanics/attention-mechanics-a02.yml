prompt_markdown: |
  Raw attention scores are dot products, and their typical size grows with the
  length of the vectors being compared. If the key vectors have `dim_k`
  components, each with roughly unit-scale entries, the dot products tend to
  spread out with a size proportional to `sqrt(dim_k)`. Feed those large numbers
  straight into softmax and one score dominates so completely that its weight is
  almost 1 and the rest are almost 0. In that **saturated** region the softmax is
  nearly flat, its gradients vanish, and the model can barely learn. Dividing
  every score by `sqrt(dim_k)` cools them back to a size around 1, keeping softmax
  responsive.

  Write `scale_scores(job)` where `job` is a single dict:

      {"scores": [8.0, 4.0, 2.0], "dim_k": 4}

  `scores` is a list of raw attention scores and `dim_k` is the key dimension
  (a positive integer). Return a new list where each score has been divided by
  `sqrt(dim_k)`. Round every scaled score to 6 decimal places.
starter_code: |
