    - name: numbered
      input: {r1: g1, r2: g2, r3: g3}
      expected: {g1: r1, g2: r2, g3: r3}
explanation_markdown: |
  Inverting a dict swaps the roles of keys and values, so you iterate over
  `pairs.items()` and assign `result[value] = key`. Writing `result[key] = value`
  only copies the directory. Because every desk code is unique, no two employees
  collide on the same new key, so the inverse is a clean one-to-one mapping.
common_mistakes:
  - Assigning result[key] = value and rebuilding the original dict.
  - Looping over keys only and losing easy access to the values.
  - Assuming desk codes could repeat and overwrite each other.
