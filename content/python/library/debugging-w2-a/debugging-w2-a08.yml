prompt_markdown: |
  An office keeps a directory mapping each employee id to their desk code, and
  every desk code is unique. Write `invert_directory(pairs)` returning a new dict
  that maps each desk code back to its employee id.

  A common beginner bug is to loop over the dict and write `result[key] = value`,
  which just rebuilds the original. To invert it you must place the value as the
  new key and the key as the new value. An empty directory returns an empty dict.
starter_code: |
  def invert_directory(pairs):
      return {}
function_name: invert_directory
input_mode: function
solution_sketch: Loop over items() and assign result[value] = key to swap keys and values.
sample_solution: |
  def invert_directory(pairs):
      result = {}
      for employee, desk in pairs.items():
          result[desk] = employee
      return result
hints:
  - level: 1
    text: Inverting means the old value becomes the new key.
  - level: 2
    text: Iterate with pairs.items() so you have both the key and the value.
  - level: 3
    text: Assign result[value] = key, not result[key] = value.
tests:
  public:
    - name: empty
      input: {}
      expected: {}
    - name: single
      input: {e1: d1}
