prompt_markdown: |
  A farmers market stall packs produce into several baskets, and each basket
  holds a list of item weights in grams. Write `grand_total(baskets)` returning
  the combined weight of every item across all baskets.

  A common beginner bug is to reset the running total back to 0 at the top of the
  outer loop, which throws away everything counted so far and leaves you with only
  the last basket. Declare the total once, before both loops. With no baskets the
  total is 0.
starter_code: |
  def grand_total(baskets):
      return 0
function_name: grand_total
input_mode: function
solution_sketch: Initialise one total before the loops and add every item weight from every basket.
sample_solution: |
  def grand_total(baskets):
      total = 0
      for basket in baskets:
          for weight in basket:
              total += weight
      return total
hints:
  - level: 1
    text: The total must survive across all baskets, so it cannot restart each time.
  - level: 2
    text: Initialise total = 0 once, above the outer loop, not inside it.
  - level: 3
    text: Use a nested loop and add every item weight to the single running total.
