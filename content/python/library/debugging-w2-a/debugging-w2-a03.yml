explanation_markdown: |
  With a nested loop, the accumulator belongs outside both loops. If you reset
  `total = 0` at the start of the outer loop, each basket wipes the previous
  count, so the answer collapses to the sum of the final basket alone. Declaring
  the total once and adding every inner item keeps the full sum in one O(n) pass
  over all items.
common_mistakes:
  - Resetting total to 0 at the top of the outer loop.
  - Summing only the baskets list instead of the items inside each basket.
  - Forgetting that an empty basket contributes nothing but should not crash.
