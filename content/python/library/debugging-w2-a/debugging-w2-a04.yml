prompt_markdown: |
  A small theatre box office stores each ticket price as text, such as `"12"`,
  because the values came straight from a form. Write
  `total_ticket_cost(prices)` returning the sum of the prices as an integer.

  A common beginner bug is to add the strings directly. `"12" + "5"` produces the
  joined text `"125"`, not `17`, because `+` concatenates strings. Convert each
  price to an integer before adding it. An empty list totals 0.
starter_code: |
  def total_ticket_cost(prices):
      return 0
function_name: total_ticket_cost
input_mode: function
solution_sketch: Convert each string price with int() and add it to a running total.
sample_solution: |
  def total_ticket_cost(prices):
      total = 0
      for price in prices:
          total += int(price)
      return total
hints:
  - level: 1
    text: The prices arrive as text, not numbers.
  - level: 2
    text: Adding strings with + joins them instead of summing them.
  - level: 3
    text: Call int(price) on each entry before adding it to the total.
tests:
