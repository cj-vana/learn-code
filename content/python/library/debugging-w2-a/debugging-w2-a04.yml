explanation_markdown: |
  The `+` operator means different things for different types: numeric addition
  for integers, concatenation for strings. Because the prices are strings, adding
  them joins the digits into longer text. Converting each value with `int()` first
  restores real arithmetic, so the running total ends up as the correct number.
common_mistakes:
  - Adding the strings directly, which concatenates them.
  - Converting the whole list to int() instead of each element.
  - Returning the total as a string instead of an integer.
