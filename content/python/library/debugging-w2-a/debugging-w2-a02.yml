prompt_markdown: |
  Timekeepers at a charity fun run collect each runner's finish time in seconds.
  Write `sorted_finish_times(times)` returning a new list of the times in
  ascending order.

  A common beginner bug is to write `return times.sort()`. The `list.sort()`
  method sorts the list in place and returns `None`, so the caller receives
  nothing useful. Return an actual sorted list instead. An empty list returns an
  empty list.
starter_code: |
  def sorted_finish_times(times):
      return []
function_name: sorted_finish_times
input_mode: function
solution_sketch: Use sorted(times) to get a new ascending list without relying on the return value of .sort().
sample_solution: |
  def sorted_finish_times(times):
      return sorted(times)
hints:
  - level: 1
    text: list.sort() rearranges the list but hands back None.
  - level: 2
    text: You need a value to return, not just a side effect.
  - level: 3
    text: sorted(times) returns a brand-new list already in ascending order.
