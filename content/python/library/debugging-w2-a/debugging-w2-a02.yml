explanation_markdown: |
  `list.sort()` mutates the list in place and returns `None`; only `sorted(...)`
  returns a new sorted list. Reaching for the return value of `.sort()` is one of
  the most common beginner mistakes. Using `sorted(times)` keeps the original
  untouched and yields the ascending order the caller expects.
common_mistakes:
  - Writing return times.sort(), which returns None.
  - Confusing the in-place .sort() method with the sorted() function.
  - Assuming the input already arrives in order.
