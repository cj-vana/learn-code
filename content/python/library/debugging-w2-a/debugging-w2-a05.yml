  originality_notes: Original community-noticeboard scenario built around the classic negative-index slicing bug where a count of zero accidentally returns everything.
prompt_markdown: |
  A community noticeboard keeps a log of posted announcements in order, oldest
  first. Write `recent_announcements(data)` where `data` is a dict with a `log`
  list and an integer `count`. Return a list of the last `count` announcements,
  keeping their original order.

  A common beginner bug is to write `log[-count:]` and forget that when `count`
  is 0, `-0` equals `0`, so `log[0:]` returns the entire log instead of nothing.
  Guard the zero case. If `count` is larger than the log, return the whole log.
starter_code: |
  def recent_announcements(data):
      return []
function_name: recent_announcements
input_mode: function
solution_sketch: Return an empty list when count is not positive, otherwise slice the last count items.
sample_solution: |
  def recent_announcements(data):
      log = data["log"]
      count = data["count"]
      if count <= 0:
          return []
      return log[-count:]
hints:
  - level: 1
    text: Think about what log[-count:] does when count is 0.
  - level: 2
    text: Because -0 is 0, log[0:] returns everything, which is not what count 0 means.
  - level: 3
    text: Handle count <= 0 by returning an empty list before slicing.
