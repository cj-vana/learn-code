    - name: empty_log
      input: {log: [], count: 3}
      expected: []
explanation_markdown: |
  Negative indices count from the end, but `-0` is just `0`, so `log[-count:]`
  silently returns the whole list when `count` is 0. Adding an explicit
  `count <= 0` guard makes the empty-request case correct. When `count` exceeds
  the log length, `log[-count:]` already returns the entire list, so no extra
  clamping is needed.
common_mistakes:
  - Writing log[-count:] without handling count == 0.
  - Assuming a slice will raise an error when count is larger than the log.
  - Reversing the order instead of keeping oldest-to-newest.
