explanation_markdown: |
  Mutating a list while iterating over it changes the indices the loop relies on,
  so items get skipped. The safe fix is to leave the input untouched and build a
  separate result list, appending only the labels that are not `"wilted"`. This
  runs in a single O(n) pass and preserves the original order.
common_mistakes:
  - Calling plants.remove(...) or del inside the loop and skipping neighbours.
  - Mutating the input list instead of returning a new one.
  - Returning None instead of an empty list for an empty row.
