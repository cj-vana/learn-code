  originality_notes: Original greenhouse-row scenario built around the classic bug of removing items from a list while looping over it.
prompt_markdown: |
  A greenhouse worker walks a row of potted plants and wants to keep only the
  ones that are still alive. Write `keep_healthy(plants)` returning a new list
  containing every plant label except those equal to `"wilted"`, in their
  original order.

  A common beginner bug is to delete items from the same list you are looping
  over. When two `"wilted"` plants sit next to each other, removing the first
  shifts the second into the slot the loop just left, so it never gets checked.
  Build a fresh list instead. An empty row returns an empty list.
starter_code: |
  def keep_healthy(plants):
      return []
function_name: keep_healthy
input_mode: function
solution_sketch: Iterate over the plants and append each non-wilted label to a new list.
sample_solution: |
  def keep_healthy(plants):
      healthy = []
      for plant in plants:
          if plant != "wilted":
              healthy.append(plant)
      return healthy
hints:
  - level: 1
    text: Do not remove items from the list you are iterating over.
  - level: 2
    text: Two wilted plants in a row are the case that exposes the skipping bug.
  - level: 3
    text: Start with an empty list and append only the plants that are not wilted.
