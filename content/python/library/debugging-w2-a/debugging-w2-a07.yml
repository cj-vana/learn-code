prompt_markdown: |
  A conference entrance logs every badge id that beeps at the scanner, in order.
  Write `first_seen(scans)` returning a list of the badge ids with duplicates
  removed, keeping each id at the position where it first appeared.

  A common beginner bug is to write `list(set(scans))`. A set removes duplicates
  but has no defined order, so the first-appearance order is lost. Track which ids
  you have already seen with a set, but build the result list in order. An empty
  log returns an empty list.
starter_code: |
  def first_seen(scans):
      return []
function_name: first_seen
input_mode: function
solution_sketch: Use a set to remember seen ids while appending each new id to an ordered result list.
sample_solution: |
  def first_seen(scans):
      seen = set()
      result = []
      for scan in scans:
          if scan not in seen:
              seen.add(scan)
              result.append(scan)
      return result
hints:
  - level: 1
    text: A set is great for membership checks but does not preserve order.
  - level: 2
    text: Keep a separate ordered list for the output.
  - level: 3
    text: For each scan, append it only if it is not already in the seen set.
