explanation_markdown: |
  Sets answer "have I seen this before?" in O(1), which is exactly what
  deduplication needs, but they do not remember insertion order. Using the set
  only for the membership test while appending first occurrences to a separate
  list keeps the output in first-appearance order. The scan runs in a single O(n)
  pass.
common_mistakes:
  - Returning list(set(scans)) and losing the original order.
  - Using a list for the seen check, which is slower and unnecessary.
  - Appending an id that was already recorded.
