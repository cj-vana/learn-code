prompt_markdown: |
  A warehouse prints shelf labels from long barcode strings. To make them easy
  to read, the printer breaks each barcode into fixed-size groups of
  characters, left to right. The final group may be shorter if the characters
  do not divide evenly.

  Write `split_barcode(data)` where `data` is a dict with keys `code` (the
  barcode string) and `size` (a positive integer group length). Return a list
  of the groups in order. An empty code returns an empty list.
starter_code: |
  def split_barcode(data):
      return []
function_name: split_barcode
input_mode: function
solution_sketch: Step through the string in jumps of size, slicing out each group until the end.
sample_solution: |
  def split_barcode(data):
      code = data["code"]
      size = data["size"]
      groups = []
      for start in range(0, len(code), size):
          groups.append(code[start:start + size])
      return groups
hints:
  - level: 1
    text: Move through the string in steps equal to the group size instead of one character at a time.
  - level: 2
    text: range(0, len(code), size) gives the starting index of each group.
  - level: 3
    text: Slicing with code[start:start + size] safely returns a shorter piece when fewer characters remain.
