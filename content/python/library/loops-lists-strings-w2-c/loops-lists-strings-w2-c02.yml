explanation_markdown: |
  Rather than copying characters one at a time, jump through the string in
  strides of `size`. `range(0, len(code), size)` yields the index where each
  group begins. Slicing `code[start:start + size]` grabs up to `size`
  characters and automatically returns a shorter slice when the string ends,
  so the final partial group needs no special case. The scan is O(n) in the
  length of the barcode.
common_mistakes:
  - Looping one character at a time and losing track of group boundaries.
  - Assuming the length always divides evenly and dropping the final short group.
  - Using an index beyond the string length instead of relying on slicing to clamp it.
