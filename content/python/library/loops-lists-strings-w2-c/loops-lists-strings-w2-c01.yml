explanation_markdown: |
  A single left-to-right pass is enough. Track the length of the run you are
  currently inside and the previous mood. Each time the mood repeats, the run
  grows by one; when it changes, the run restarts at 1. Compare the run to the
  best value after every step so the answer reflects the longest stretch. This
  runs in O(n) time and uses O(1) extra space.
common_mistakes:
  - Forgetting to reset the running count to 1 when the mood changes.
  - Returning the final run length instead of the maximum run seen.
  - Not handling the empty playlist, which should return 0.
