prompt_markdown: |
  A music app tags every track in a playlist with a single mood label, and the
  tracks are stored in the order they play. The app wants to highlight the
  longest uninterrupted stretch where the mood never changes.

  Write `longest_streak(moods)` that takes a list of mood strings and returns
  the length of the longest run of consecutive identical moods. An empty
  playlist returns 0.
starter_code: |
  def longest_streak(moods):
      return 0
function_name: longest_streak
input_mode: function
solution_sketch: Walk the list tracking the current run length, resetting when the mood changes, and remember the best run seen.
sample_solution: |
  def longest_streak(moods):
      best = 0
      run = 0
      prev = None
      for mood in moods:
          if mood == prev:
              run += 1
          else:
              run = 1
              prev = mood
          if run > best:
              best = run
      return best
hints:
  - level: 1
    text: Keep a running count of how many identical moods you have seen in a row.
  - level: 2
    text: When the current mood differs from the previous one, restart the run at 1.
  - level: 3
    text: After updating the current run, compare it against the best run found so far and keep the larger.
