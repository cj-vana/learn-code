  - level: 2
    text: Use str.partition('=') so you split on the first equals sign only and the value can still contain more equals signs.
  - level: 3
    text: When a key line arrives before any section header, store it under the section name "DEFAULT"; use setdefault so the section dict exists before you assign into it.
