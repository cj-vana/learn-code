prompt_markdown: |
  A lighthouse keeper stores station settings in a plain-text `.ini` log and wants
  to load it into nested dictionaries. Write `parse_ini_string(text)` that turns
  the raw INI text into a dictionary mapping each **section name** to a dictionary
  of its **key/value pairs**.

  Process the text line by line (split on newlines) using these rules:

  - Strip leading and trailing whitespace from every line before inspecting it.
  - Skip blank lines.
  - Skip full-line **comments**: any line whose first character is `#` or `;`.
    Comments only ever occupy their own line, so `port = 5 # note` keeps
    `5 # note` as the value.
  - A line shaped like `[name]` (starts with `[`, ends with `]`) opens a section.
    The section name is whatever sits between the brackets, stripped. Create an
    entry for it even if no keys follow, and if the same section header appears
    twice, keep merging into the one dictionary.
  - A line containing `=` is a key/value pair. Split on the **first** `=` only, so
    a value may itself contain `=`. Strip the key and the value. Every value stays
    a **string** — no type conversion here. If the same key appears twice in a
    section, the later value wins.
  - Key/value pairs that appear **before** any section header belong to a section
    named `"DEFAULT"`. That `"DEFAULT"` entry should exist only when such early
    keys are present.
  - Any other line (non-blank, not a comment, not a section, no `=`) is ignored.

  Example call:

  ```python
  parse_ini_string("[beam]\ninterval = 4\ncolor = white")
  # -> {"beam": {"interval": "4", "color": "white"}}
  ```

  An empty string returns an empty dictionary.
