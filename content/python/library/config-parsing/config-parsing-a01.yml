          interval: "3"
explanation_markdown: |
  A hand-rolled INI reader is a small state machine: as you scan the lines you
  remember which section you are inside, and each key you meet lands in that
  section's dictionary. Stripping every line first collapses the formatting noise
  (indentation, stray spaces) so the structural checks — is this a comment, a
  header, or a pair? — stay simple.

  The two details that trip people up are both about *where the boundary is*.
  Splitting with `str.partition('=')` cuts on the first equals sign, so a value
  like a URL query string survives intact, whereas `str.split('=')` would shred
  it. And routing pre-section keys into `"DEFAULT"` mirrors what the real
  `configparser` does, giving global settings a home instead of dropping them.
  Because assigning the same key twice just overwrites the dict entry, "last one
  wins" falls out for free.
common_mistakes:
  - Splitting on every '=' with str.split('=') instead of partitioning on the first one, which corrupts values that contain an equals sign.
  - Forgetting to strip the line before checking its first character, so indented comments or headers are misclassified.
  - Dropping keys that appear before the first section header instead of collecting them under "DEFAULT".
  - Coercing values to int or float here; INI values stay strings until a separate coercion step.
