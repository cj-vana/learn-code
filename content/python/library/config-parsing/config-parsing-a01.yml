solution_sketch: Walk the lines, tracking the current section name; on a bracket line open/merge a section, on an equals line split once and store the stripped value, and route pre-section keys into a "DEFAULT" section.
sample_solution: |
  def parse_ini_string(text):
      result = {}
      current = None
      for raw_line in text.splitlines():
          line = raw_line.strip()
          if not line:
              continue
          if line[0] in "#;":
              continue
          if line.startswith("[") and line.endswith("]"):
              name = line[1:-1].strip()
              current = name
              result.setdefault(name, {})
              continue
          if "=" in line:
              key, _, value = line.partition("=")
              section = current if current is not None else "DEFAULT"
              result.setdefault(section, {})[key.strip()] = value.strip()
      return result
hints:
