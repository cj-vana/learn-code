prompt_markdown: |
  A board-game cafe boots its table-booking server from a `.env` file — flat
  `KEY=value` lines, one per setting. Write `parse_env_file_string(text)` that
  parses that text into a dictionary of string values.

  ```python
  parse_env_file_string('HOST=localhost\nPORT=8080')
  # -> {"HOST": "localhost", "PORT": "8080"}
  ```

  Process the text line by line (split on newlines) with these rules:

  - Strip leading and trailing whitespace from each line first.
  - Skip a line that is empty, or whose first character is `#` (a comment).
  - If the line begins with `export ` (the word `export` and a space), drop that
    prefix before parsing the rest.
  - Split on the **first** `=`. The key is the left side, stripped. If the line has
    no `=`, or the key is empty, skip the line.
  - Every value is a **string**. Strip surrounding whitespace from the raw value,
    then interpret quoting:
    - **Double-quoted** (`"..."`): remove the quotes and process escape sequences
      inside — `\n` -> newline, `\t` -> tab, `\r` -> carriage return, `\\` ->
      backslash, `\"` -> double quote. Any other backslash pair is left as written.
    - **Single-quoted** (`'...'`): remove the quotes and keep the contents
      **literal** — no escape processing at all.
    - **Unquoted**: use the stripped text exactly (its inner spaces are kept; there
      is no comment stripping mid-value).
  - When the same key appears more than once, the **last** value wins.

  An empty string returns an empty dictionary.
