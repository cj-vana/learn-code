explanation_markdown: |
  A `.env` reader is a line-oriented parser, and the discipline is deciding what to
  strip and what to preserve. Stripping the whole line first cleans up blank lines,
  comments, and the `export ` prefix, but the *value* needs care: quoting is how a
  `.env` file protects meaningful whitespace and special characters, so you look at
  the quotes before deciding how much to trust.

  The double- versus single-quote split mirrors the shell and real dotenv loaders.
  Double quotes are "cooked": `\n` and `\t` become real control characters, which
  is why booking a banner across two lines works. Single quotes are "raw": a value
  like `/tables/$SECTION:back` stays exactly as typed, with no interpolation or
  escape handling — perfect for paths and secrets that contain `$` or backslashes.
  Because assigning the same dictionary key twice just overwrites it, "last one
  wins" comes for free, matching how a later line in a real `.env` shadows an
  earlier one.
common_mistakes:
  - Stripping quotes without processing escapes, so a double-quoted "\n" stays two literal characters instead of a newline.
  - Running escape processing inside single quotes, which corrupts literal values like paths containing backslashes or "$".
  - Splitting on every "=" instead of the first, truncating values that legitimately contain an equals sign.
  - Forgetting the "export " prefix, so "export TOKEN=abc" produces a key of "export TOKEN".
