prompt_markdown: |
  A community radio station boots its broadcast console from a base config, then
  lets the operator override individual settings with command-line flags like
  `--gain=2.5`. Write `config_from_cli_overrides(request)` that layers the flags on
  top of the base and returns the merged result **without mutating the base**.

  The function receives **one dictionary** with two keys:

  ```python
  config_from_cli_overrides({
      "base": {"gain": 1.0, "live": False},
      "overrides": ["--gain=2.5", "live=on"],
  })
  # -> {"gain": 2.5, "live": True}
  ```

  - `"base"` is the starting config dictionary.
  - `"overrides"` is a list of `key=value` strings, applied left to right.

  For each override string:

  - Split on the **first** `=` only. Strip surrounding whitespace from both sides,
    then strip any leading dashes off the key (so `--gain` and `gain` are the same).
  - An override with no `=`, or with an empty key, is **skipped**.
  - If the key already exists in `base`, coerce the string value to the **type of
    the existing base value**:
    - `bool` base value: `"true"`, `"1"`, `"yes"`, `"on"` (any case) become `True`;
      `"false"`, `"0"`, `"no"`, `"off"` become `False`.
    - `int` base value: convert with `int(value)`.
    - `float` base value: convert with `float(value)`.
    - `str` base value: keep the stripped string as-is.
  - If the key is **not** in `base`, add it with the stripped string value (no
    coercion — there is no existing type to match).
  - When the same key is overridden more than once, the **last** override wins, and
    coercion always matches the original base type.

  Return a new dictionary. With no overrides, return a copy of the base unchanged.

  Note: check `bool` before `int`, because in Python `bool` is a subclass of `int`.
