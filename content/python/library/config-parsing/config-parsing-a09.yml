solution_sketch: Copy the base dict. For each override, partition on the first "=", strip and de-dash the key, skip malformed entries, then coerce the value against the type of the original base value (checking bool before int) or store it as a raw string when the key is new.
sample_solution: |
  def config_from_cli_overrides(request):
      base = request["base"]
      overrides = request["overrides"]
      result = dict(base)
      for item in overrides:
          if "=" not in item:
              continue
          raw_key, _, raw_value = item.partition("=")
          key = raw_key.strip().lstrip("-")
          value = raw_value.strip()
          if not key:
              continue
          if key in base:
              target = base[key]
              if isinstance(target, bool):
                  low = value.lower()
                  if low in ("true", "1", "yes", "on"):
                      result[key] = True
                  elif low in ("false", "0", "no", "off"):
                      result[key] = False
                  else:
                      result[key] = value
              elif isinstance(target, int):
                  result[key] = int(value)
              elif isinstance(target, float):
                  result[key] = float(value)
              else:
                  result[key] = value
          else:
              result[key] = value
      return result
hints:
  - level: 1
