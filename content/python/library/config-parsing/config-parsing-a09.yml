explanation_markdown: |
  This is the CLI layer of the classic precedence chain (defaults < file < env <
  flags), and the subtle part is type-matching. Command-line values arrive as
  strings, but the base config already tells you what type each setting should be,
  so you coerce against the *existing* value's type rather than guessing. Copying
  the base first (`dict(base)`) keeps the merge non-destructive, which matters when
  the same defaults get reused across several boots.

  The one trap that bites almost everyone is that `bool` is a subclass of `int` in
  Python: `isinstance(True, int)` is `True`. If you test `int` first, a boolean
  setting like `live` would be run through `int("on")` and crash. Checking `bool`
  before `int` routes `"on"`/`"off"` through the truthiness table instead. Stripping
  leading dashes lets `--gain` and `gain` mean the same key, matching how real
  argument styles blend together.
common_mistakes:
  - Checking isinstance(target, int) before isinstance(target, bool), so boolean settings crash on int("on") or silently coerce wrong.
  - Mutating the base dict in place instead of copying it, leaking overrides back to the caller.
  - Splitting on every "=" with str.split so a value containing "=" is truncated; partition on the first one instead.
  - Coercing brand-new keys against a type they do not have, when they should simply be stored as strings.
