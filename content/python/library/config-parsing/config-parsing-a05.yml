prompt_markdown: |
  Environment variables always arrive as strings, so the Wharf Street cannery's
  loader has to decide what each one really means. Write
  `coerce_env_value(value)` that turns one environment string into the most
  natural Python type, checking these cases **in order** and returning the first
  that matches:

  1. Strip leading and trailing whitespace first; call the result `s`.
  2. **Boolean:** if `s` equals `"true"` or `"false"` ignoring case, return the
     bool `True` or `False`.
  3. **Integer:** if Python's `int(s)` succeeds, return that int (this covers a
     leading `-`, e.g. `"-7"`).
  4. **Float:** otherwise, if Python's `float(s)` succeeds, return that float
     (e.g. `"2.5"` or `"2e3"`).
  5. **String:** if none of the above apply, return `s` itself (the stripped
     string).

  Order matters: `"true"` becomes a bool, not the string `"true"`, and `"10"`
  becomes the int `10`, not the float `10.0`. An empty (or all-whitespace)
  string strips to `""`, which is not a bool, int, or float, so it comes back as
  the empty string `""`.

  Example: `coerce_env_value("  42  ")` returns the int `42`.
starter_code: |
  def coerce_env_value(value):
      return value
function_name: coerce_env_value
input_mode: function
solution_sketch: Strip the string, check case-insensitively for true/false, then try int() and float() in turn inside try/except blocks, and fall back to returning the stripped string.
sample_solution: |
  def coerce_env_value(value):
      s = value.strip()
      lowered = s.lower()
      if lowered == "true":
          return True
      if lowered == "false":
          return False
      try:
          return int(s)
      except ValueError:
          pass
      try:
          return float(s)
      except ValueError:
          pass
      return s
hints:
