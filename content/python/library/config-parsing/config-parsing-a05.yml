explanation_markdown: |
  Coercion is the step that turns flat string config into typed values a program
  can branch on, and the precedence order is the whole game. Booleans go first
  because `int("true")` would just fail and fall through — but the deeper reason
  is intent: `"true"` clearly means a flag, not text. Integers are tried before
  floats so `"10"` stays an `int` rather than becoming `10.0`, which keeps values
  that are meant to be counts from silently turning into floating point.

  Leaning on Python's own `int()` and `float()` inside `try`/`except` is both
  shorter and more correct than hand-checking digits: they already understand
  signs and scientific notation. The empty-string fallback is the safety net —
  an unset-looking value that strips to `""` is not a number or a flag, so
  returning it as-is lets a later layer decide whether that means "use the
  default."
common_mistakes:
  - Checking int/float before the true/false words, so a boolean flag never gets recognized.
  - Trying float before int, which turns whole numbers like "10" into 10.0.
  - Hand-rolling digit checks that miss negative signs or exponents instead of letting int() and float() do the parsing.
  - Letting the numeric conversions raise instead of catching ValueError and falling back to the string.
