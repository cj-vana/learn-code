function_name: validate_config_schema
input_mode: function
solution_sketch: Map the type-name strings to real types, collect required keys absent from config as missing, collect present keys whose exact type differs from the expected type as wrong_type, sort both, and set valid from whether they are empty.
sample_solution: |
  def validate_config_schema(request):
      config = request["config"]
      required = request["required"]
      types = request["types"]
      type_map = {
          "str": str,
          "int": int,
          "float": float,
          "bool": bool,
          "list": list,
          "dict": dict,
      }
      missing = [name for name in required if name not in config]
      wrong_type = []
      for name, type_name in types.items():
          if name in config and type(config[name]) is not type_map[type_name]:
              wrong_type.append(name)
      return {
          "missing": sorted(missing),
          "wrong_type": sorted(wrong_type),
          "valid": not missing and not wrong_type,
      }
