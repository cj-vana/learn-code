tests:
  public:
    - name: all_valid
      input:
        config:
          host: "localhost"
          port: 8080
          debug: true
        required:
          - "host"
          - "port"
        types:
          host: "str"
          port: "int"
          debug: "bool"
      expected:
        missing: []
        wrong_type: []
        valid: true
    - name: missing_required_key
      input:
        config:
          host: "localhost"
        required:
          - "host"
          - "port"
        types:
          host: "str"
      expected:
        missing:
          - "port"
        wrong_type: []
        valid: false
    - name: wrong_type_string_for_int
      input:
        config:
          port: "8080"
        required:
          - "port"
        types:
          port: "int"
      expected:
        missing: []
        wrong_type:
          - "port"
        valid: false
  validation:
    - name: bool_does_not_satisfy_int
      input:
        config:
          flag: true
        required: []
        types:
          flag: "int"
      expected:
        missing: []
        wrong_type:
          - "flag"
        valid: false
    - name: int_field_matches
      input:
        config:
          count: 5
        required:
          - "count"
        types:
          count: "int"
      expected:
        missing: []
        wrong_type: []
        valid: true
    - name: missing_and_wrong_type_sorted
      input:
        config:
          name: 42
          extra: []
        required:
          - "name"
          - "port"
        types:
          name: "str"
      expected:
        missing:
          - "port"
        wrong_type:
          - "name"
        valid: false
    - name: list_and_dict_types
      input:
        config:
          tags:
            - "a"
            - "b"
          meta:
            x: 1
        required:
          - "tags"
          - "meta"
        types:
          tags: "list"
          meta: "dict"
      expected:
        missing: []
        wrong_type: []
        valid: true
    - name: typed_key_absent_is_not_error
      input:
        config: {}
        required: []
        types:
          port: "int"
      expected:
        missing: []
        wrong_type: []
        valid: true
explanation_markdown: |
  A schema check answers two independent questions — is everything required
  actually here, and is everything that is here the right shape — so the report
  keeps them in separate lists rather than merging them into one pass/fail. The
  separation is what makes the output useful for a real error message: "you're
  missing `port`" and "`port` should be an int, not a string" are different fixes.

  The sharp edge is `bool`. Since `bool` is a subclass of `int` in Python,
  `isinstance(True, int)` is `True`, which would quietly let a stray boolean pass
  an `int` field. Comparing with `type(value) is int` demands an exact match and
  closes that gap. The other deliberate choice is only type-checking keys that
  are actually present: a key named in the schema's types but missing from the
  config is a presence question, handled by the required list, not a type error —
  otherwise every optional typed setting would look broken whenever it was
  omitted.
common_mistakes:
  - Using isinstance for the type check, which wrongly accepts a bool where an int is required.
  - Flagging a type error for keys that are named in types but absent from config, instead of leaving them to the required check.
  - Forgetting to sort the missing and wrong_type lists, so the output order depends on dict iteration.
  - Counting a required-but-untyped key as a type error, or a typed-but-not-required absent key as missing.
