prompt_markdown: |
  Before the Ironbark brewery starts a batch, it audits its loaded config against
  a tiny schema. Write `validate_config_schema(request)`, where `request` is a
  single dict with three keys:

  - `"config"` — the loaded settings dict (key name to value).
  - `"required"` — a list of key names that must be present in `config`.
  - `"types"` — a dict mapping some key names to an expected type **name**, one
    of `"str"`, `"int"`, `"float"`, `"bool"`, `"list"`, or `"dict"`.

  Return a report dict with exactly three keys:

  - `"missing"` — the sorted list of names in `"required"` that are **not**
    present in `config`.
  - `"wrong_type"` — the sorted list of names that **are** present in `config`,
    appear in `"types"`, and whose value's type does not exactly match the
    expected type name.
  - `"valid"` — `True` if both `"missing"` and `"wrong_type"` are empty,
    otherwise `False`.

  Rules that matter:

  - Type matching is **exact**. Because Python's `bool` is technically a subclass
    of `int`, a `True`/`False` value does **not** satisfy an expected type of
    `"int"`, and an integer does not satisfy `"bool"`. Match on the value's exact
    type, not on `isinstance`.
  - A name listed in `"types"` but **absent** from `config` is not a type error
    (there is nothing to check); it only counts as missing if it is in
    `"required"`.
  - A name in `"required"` that is not in `"types"` is only checked for presence,
    never for type.
  - Both output lists must be sorted alphabetically.

  Example: with `config` `{"port": "8080"}`, `required` `["port"]`, and `types`
  `{"port": "int"}`, the value is the string `"8080"`, so the report is
  `{"missing": [], "wrong_type": ["port"], "valid": False}`.
starter_code: |
  def validate_config_schema(request):
