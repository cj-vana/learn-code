prompt_markdown: |
  The Cerro Alto observatory builds its runtime settings from three stacked
  layers, from lowest priority to highest: built-in **defaults**, a settings
  **file**, and **environment** overrides. Higher layers win. Write
  `merge_config_layers(request)`, where `request` is a single dict with three
  keys, each mapping to a settings dict:

  - `"defaults"` — the built-in baseline.
  - `"file"` — values read from the config file, layered on top of defaults.
  - `"env"` — environment overrides, layered on top of everything.

  Return one merged settings dict produced by folding the layers in the order
  defaults, then file, then env, using this **deep-merge** rule when layering an
  upper dict on top of the accumulated result:

  - For each key in the upper layer: if that key already holds a dict in the
    result **and** the upper value is also a dict, merge those two dicts
    recursively (so nested sections combine instead of clobbering each other).
  - Otherwise the upper layer's value replaces whatever was there. A dict
    replaces a non-dict, and a non-dict replaces a dict, wholesale.
  - Keys that appear in only one layer are carried through.

  Do not mutate any of the three input dicts; build and return new dicts. All
  three keys are always present, though any layer may be an empty dict.

  Example: with `"defaults"` `{"db": {"host": "localhost", "port": 5432}}`,
  `"file"` `{"db": {"port": 6000}}`, and `"env"` `{}`, the nested `db` sections
  combine into `{"db": {"host": "localhost", "port": 6000}}`.
starter_code: |
  def merge_config_layers(request):
      return {}
function_name: merge_config_layers
input_mode: function
solution_sketch: Write a recursive deep-merge helper that copies the base dict and, for each override key, recurses when both sides are dicts and otherwise overwrites; fold defaults, file, then env through it.
sample_solution: |
  def merge_config_layers(request):
      def deep_merge(base, upper):
          result = dict(base)
          for key, value in upper.items():
              if key in result and isinstance(result[key], dict) and isinstance(value, dict):
                  result[key] = deep_merge(result[key], value)
              else:
                  result[key] = value
          return result

      merged = {}
      for layer in ("defaults", "file", "env"):
          merged = deep_merge(merged, request[layer])
      return merged
