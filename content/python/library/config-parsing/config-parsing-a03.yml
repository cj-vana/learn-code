explanation_markdown: |
  Layered configuration is the backbone of the 12-factor style: ship sensible
  defaults, let a file override them for a deployment, and let environment
  variables override the file for a single run. Folding the layers in a fixed
  order — defaults, then file, then env — makes "higher layer wins" fall out of
  the order you apply them.

  The subtlety is *nested* sections. A shallow `dict.update` would let the `env`
  layer's `{"db": {"host": ...}}` replace the entire `db` section, silently
  dropping keys the lower layers set. Recursing when both sides are dicts keeps
  each nested section additive, while still letting a scalar override a whole
  subtree when that is what a layer actually specifies. Copying the base dict at
  every level is what keeps the original layers untouched, so the same defaults
  stay reusable for the next merge.
common_mistakes:
  - Using a single dict.update per layer, which clobbers entire nested sections instead of deep-merging them.
  - Mutating the defaults or file dict in place, so a later merge sees already-modified baseline values.
  - Recursing into every value instead of only when both the existing and incoming values are dicts, which crashes on scalars.
