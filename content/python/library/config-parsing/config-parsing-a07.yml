prompt_markdown: |
  A harbor dispatch board stores route templates with `${NAME}` placeholders that
  get filled from an environment table at send time. Write
  `resolve_env_var_reference(request)` that expands the placeholders.

  The function receives **one dictionary** with two keys:

  ```python
  resolve_env_var_reference({
      "value": "host=${HOST}",
      "env": {"HOST": "dock-7"},
  })
  # -> "host=dock-7"
  ```

  - `"value"` is the template string.
  - `"env"` is a dictionary mapping names to **string** values.

  A reference is written `${...}`. Between the braces sits either a bare `NAME`
  (one or more letters, digits, or underscores) or `NAME:-fallback`. Resolve each
  reference with these rules:

  - `${NAME}` — if `NAME` is a key in `env`, substitute its value.
  - `${NAME:-fallback}` — if `NAME` is a key in `env`, use the env value and ignore
    the fallback; otherwise substitute the literal `fallback` text (everything
    after `:-` up to the closing `}`, which may itself be empty).
  - `${NAME}` where `NAME` is **not** in `env` and no fallback was given resolves to
    the empty string `""`.
  - A `$` that is **not** immediately followed by `{` is a plain dollar sign and is
    left untouched (so `$5` survives verbatim).
  - A `${` with no matching closing `}` is not a reference at all — leave that run
    of characters exactly as written.
  - Substitution is a **single left-to-right pass**: text pulled in from `env` is
    inserted literally and is **never** re-scanned for more `${...}`.

  Return the fully expanded string. A template with no references comes back
  unchanged.
