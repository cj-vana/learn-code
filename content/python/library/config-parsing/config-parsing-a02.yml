prompt_markdown: |
  A coffee roastery keeps its machine settings in a TOML file. TOML is the format
  Python's own `pyproject.toml` uses, and the standard library ships a parser for
  it: `tomllib` (added in Python 3.11). You should **not** hand-roll TOML parsing —
  reach for the right tool.

  Write `parse_toml_string(text)` that parses a TOML string into a dictionary using
  `tomllib.loads`. TOML gives you native Python types automatically:

  - `name = "ethiopia"` becomes a string.
  - `temperature = 218` becomes an int.
  - `ratio = 0.5` becomes a float.
  - `active = true` becomes a bool.
  - `stages = ["dry", "first"]` becomes a list.
  - A `[section]` header nests its keys inside a sub-dictionary.

  Example call:

  ```python
  parse_toml_string('name = "ethiopia"\ntemperature = 218')
  # -> {"name": "ethiopia", "temperature": 218}
  ```

  An empty string returns an empty dictionary. You only need one line inside the
  function body once you import the parser.
