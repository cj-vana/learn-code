explanation_markdown: |
  The lesson here is restraint: TOML has enough grammar (quoting, arrays, nested
  tables, typed literals) that a from-scratch parser would be long and bug-prone,
  and the standard library already solved it. `tomllib.loads` reads a TOML string
  and returns a ready-made dictionary where every value already has the right
  Python type, so `temperature = 218` arrives as an `int` and `active = true` as a
  `bool` without any coercion on your side.

  `tomllib` is read-only and parse-only by design — there is no `dumps`. That is
  fine for configuration loading, which is the one direction you need: text on
  disk into structured settings your program can branch on. Knowing which battles
  the stdlib has already fought for you is a real engineering skill.
common_mistakes:
  - Trying to hand-parse TOML with string splitting instead of calling tomllib.loads.
  - Reaching for a json or yaml function; TOML is its own format with its own stdlib parser (tomllib).
  - Forgetting to import tomllib, so the function raises NameError at call time.
  - Expecting numbers to come back as strings; tomllib already types 218 as int and 0.5 as float.
