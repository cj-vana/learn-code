solution_sketch: Lowercase the secret-key names into a set. Write a recursive helper that handles three shapes. For a dict, mask any value whose key (lowercased) is secret and otherwise recurse; for a list, recurse into each element; for a scalar, return it unchanged. Build fresh containers so the input is never mutated.
sample_solution: |
  def redact_secrets_in_config(request):
      config = request["config"]
      secret_lower = {name.lower() for name in request["secret_keys"]}

      def redact(node):
          if isinstance(node, dict):
              result = {}
              for key, value in node.items():
                  if isinstance(key, str) and key.lower() in secret_lower:
                      result[key] = "***"
                  else:
                      result[key] = redact(value)
              return result
          if isinstance(node, list):
              return [redact(item) for item in node]
          return node

      return redact(config)
