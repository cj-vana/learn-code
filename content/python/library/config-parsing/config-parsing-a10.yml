explanation_markdown: |
  Redaction is a tree walk, and the cleanest way to walk a tree of dicts, lists,
  and scalars is a recursive function that dispatches on the node's shape. The
  base case is a scalar (return it unchanged); the recursive cases are dict and
  list. Lowercasing the secret names once, into a set, keeps each key check
  case-insensitive and O(1).

  The rule that makes this a security tool rather than a toy is *masking the whole
  subtree*: when a key is secret you replace its value with `"***"` and stop, so a
  credentials block nested three levels deep never has its guts exposed even
  partially. And because you build brand-new dicts and lists on the way back up
  rather than editing the originals, the caller's manifest is safe to keep using —
  an accidental in-place mutation of config data is exactly the kind of bug that
  leaks secrets into the next log line.
common_mistakes:
  - Recursing into a secret value before masking it, so nested fields under a secret key still leak.
  - Comparing keys case-sensitively, letting "API_KEY" slip past a lowercase "api_key" rule.
  - Forgetting the list case, so secrets tucked inside a list of service definitions are never scrubbed.
  - Mutating the input dictionaries in place, which corrupts the caller's config and can leak the original values elsewhere.
