prompt_markdown: |
  Before a tea importer pastes its deploy manifest into a public support thread, it
  needs every secret scrubbed. Write `redact_secrets_in_config(request)` that walks
  the nested config and masks the sensitive values, returning a **new** structure
  and leaving the input untouched.

  The function receives **one dictionary** with two keys:

  ```python
  redact_secrets_in_config({
      "config": {"host": "db.internal", "password": "hunter2"},
      "secret_keys": ["password"],
  })
  # -> {"host": "db.internal", "password": "***"}
  ```

  - `"config"` is a nested structure made of dictionaries, lists, and scalar values.
  - `"secret_keys"` is a list of key names considered sensitive.

  Redaction rules:

  - Matching a key against the secret list is **case-insensitive**: with
    `"api_key"` in the secret list, a key `"API_KEY"` matches.
  - When a dictionary key is a secret, replace its value with the string `"***"` —
    **regardless** of the value's type, and **without** looking inside it. If the
    secret value was itself a dict or list, the whole subtree is masked to `"***"`.
  - For any non-secret dictionary key, **recurse** into its value.
  - Recurse into every element of a list.
  - Scalars that are not under a secret key pass through unchanged.
  - Preserve the original key order and list order. Do not mutate the input; build
    and return a new structure.

  An empty config returns an empty dictionary.
