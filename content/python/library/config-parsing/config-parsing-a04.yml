prompt_markdown: |
  The Fernvale greenhouse controller stores its settings as a nested dictionary,
  but its telemetry endpoint wants them as flat, dotted keys like
  `"zones.north.humidity"`. Write `flatten_nested_config(config)` that walks a
  nested config dict and returns a new **flat** dict, following these rules:

  - Walk into every dict value, joining the key path with a single `.` between
    levels. A value that is **not** a dict is a leaf: store it under its full
    dotted path.
  - **Lists are leaves.** Do not descend into them or index into them; keep the
    list as the value under its dotted key.
  - An **empty dict** has no leaves beneath it, so it contributes nothing to the
    result — its key simply does not appear.
  - Top-level keys whose values are already leaves keep their plain name (no
    dot).
  - An empty input dict returns an empty dict `{}`.

  Example: the config

  ```python
  {"zones": {"north": {"humidity": 55}}, "fan": "auto"}
  ```

  flattens to `{"zones.north.humidity": 55, "fan": "auto"}`.
starter_code: |
