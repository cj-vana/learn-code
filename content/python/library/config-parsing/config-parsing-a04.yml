function_name: flatten_nested_config
input_mode: function
solution_sketch: Recurse with a running dotted prefix; when the current value is a dict, descend into each child, and otherwise record the value at the accumulated prefix.
sample_solution: |
  def flatten_nested_config(config):
      flat = {}

      def walk(prefix, value):
          if isinstance(value, dict):
              for key, sub in value.items():
                  child = f"{prefix}.{key}" if prefix else key
                  walk(child, sub)
          else:
              flat[prefix] = value

      walk("", config)
      return flat
