explanation_markdown: |
  Flattening is the inverse of the deep-merge move: instead of combining nested
  sections, you collapse a path through the tree into one dotted key. The
  recursion carries a running prefix and only commits a value when it hits a
  non-dict leaf, which is why the empty-prefix special case matters — without it,
  top-level leaves would come out as `".fan"` with a leading dot.

  Two design decisions define the shape of the output. Treating lists as leaves
  keeps the contract simple: config values that happen to be arrays stay intact
  rather than exploding into `"ports.0"`, `"ports.1"` keys. And letting empty
  sub-dicts vanish is the honest result of "record only leaves" — there is no
  value beneath them to record. Flat, dotted keys are exactly the format that
  environment variables and many monitoring systems expect, so this transform
  shows up whenever structured config meets a flat key/value world.
common_mistakes:
  - Descending into lists and producing indexed keys instead of keeping the list as a single leaf value.
  - Forgetting the empty-prefix case, so top-level keys pick up a leading dot like ".fan".
  - Emitting a key for an empty sub-dict rather than letting it drop out because it has no leaves.
