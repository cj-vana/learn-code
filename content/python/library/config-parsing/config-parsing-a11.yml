explanation_markdown: |
  Building defaults from a schema is a recursion whose base cases are the leaf
  specs and whose recursive case is a group. The ordering of the checks encodes
  the precedence: a `"fields"` group is recognized first (so a group is never
  mistaken for a leaf), then an explicit `"default"`, and only when neither is
  present do you fall back to a type-based zero value. That fallback is why a fresh
  config comes up fully populated instead of riddled with missing keys.

  Two details keep it correct. Using the declared default *verbatim* means the
  schema author stays in charge — even a `default` that disagrees with `type` wins,
  because the schema is the source of truth, not your guess. And producing a fresh
  `[]` or `{}` for each zero value avoids the aliasing trap where two config keys
  would otherwise point at the same shared list, so appending to one silently
  changes the other.
common_mistakes:
  - Checking for "default" before "fields", so a nested group with no default collapses to a zero value and loses its structure.
  - Returning a single shared [] or {} for every zero value, causing two keys to alias the same mutable object.
  - Overriding the schema's explicit default because it does not match the declared type, instead of using it verbatim.
  - Handling only one level of nesting instead of recursing, so groups inside groups are left unbuilt.
