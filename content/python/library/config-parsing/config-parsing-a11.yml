prompt_markdown: |
  A rooftop apiary monitor is described by a schema, and on first boot the rig needs
  a full defaults dictionary built from that schema. Write
  `default_config_template(schema)` that turns the schema into a defaults dict.

  The function receives the schema dictionary directly. It maps each key name to a
  **spec**:

  ```python
  default_config_template({
      "interval": {"type": "int", "default": 30},
      "unit": {"type": "str"},
  })
  # -> {"interval": 30, "unit": ""}
  ```

  Interpret each spec in this order:

  - If the spec has a `"fields"` key, it is a **group**: its value is a nested
    schema. Recurse into it and store the resulting nested dictionary.
  - Otherwise, if the spec has a `"default"` key, use that default value **verbatim**
    (whatever it is, even if its type does not match `"type"`).
  - Otherwise, supply the **zero value** for the spec's `"type"`:
    - `"int"` -> `0`
    - `"float"` -> `0.0`
    - `"str"` -> `""`
    - `"bool"` -> `False`
    - `"list"` -> `[]`
    - `"dict"` -> `{}`

  Return the assembled defaults dictionary. An empty schema returns an empty
  dictionary. Groups may nest to any depth.
starter_code: |
  def default_config_template(schema):
      return {}
function_name: default_config_template
input_mode: function
solution_sketch: Walk the schema's items. When a spec has "fields", recurse to build the nested dict; when it has "default", copy that value; otherwise look up a fresh zero value for its declared type. Build a new zero container each time so nested lists and dicts are not shared.
sample_solution: |
  def _zero_value(type_name):
      zeros = {"int": 0, "float": 0.0, "str": "", "bool": False, "list": [], "dict": {}}
      return zeros[type_name]


  def default_config_template(schema):
      result = {}
      for key, spec in schema.items():
          if "fields" in spec:
              result[key] = default_config_template(spec["fields"])
          elif "default" in spec:
              result[key] = spec["default"]
          else:
              result[key] = _zero_value(spec["type"])
      return result
