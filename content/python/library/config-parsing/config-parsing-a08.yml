explanation_markdown: |
  Config diffing is a set problem wearing a dictionary costume. Converting each
  side's keys to a set turns "what's new" and "what vanished" into plain set
  difference (`new_keys - old_keys` and `old_keys - new_keys`), and the shared keys
  are the intersection. Sorting the key lists makes the output deterministic, which
  matters when a diff feeds a review tool or a test.

  For the shared keys, the only judgement call is equality, and using `!=` keeps it
  honest: `"5"` and `5` are different values, so a silent type change surfaces as a
  real change rather than hiding. Recording each change as an explicit
  `{"from": ..., "to": ...}` pair means a reader never has to guess which value was
  the old one, and it keeps the summary self-describing when logged.
common_mistakes:
  - Iterating one dict's keys and missing keys that exist only in the other config, so additions or removals go unreported.
  - Returning the key lists in dictionary-iteration order instead of sorting them, making the output nondeterministic.
  - Using == on the whole dicts instead of comparing per key, which tells you *that* something changed but not *what*.
  - Treating "5" and 5 as equal by coercing before comparing, which hides genuine type drift.
