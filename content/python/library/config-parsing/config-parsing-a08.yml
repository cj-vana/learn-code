prompt_markdown: |
  A greenhouse controller keeps its climate settings as a flat dictionary, and the
  crew wants to see what changed between last week's profile and this week's. Write
  `diff_configs(request)` that produces a change summary.

  The function receives **one dictionary** with two keys:

  ```python
  diff_configs({
      "old": {"humidity": 60, "fan": "low"},
      "new": {"humidity": 55, "fan": "low"},
  })
  # -> {
  #   "added": [],
  #   "removed": [],
  #   "changed": {"humidity": {"from": 60, "to": 55}},
  #   "unchanged": ["fan"],
  # }
  ```

  Both `"old"` and `"new"` are flat dictionaries (string keys, scalar values).
  Return a dictionary with exactly these four keys:

  - `"added"` — a **sorted** list of keys present in `new` but not in `old`.
  - `"removed"` — a **sorted** list of keys present in `old` but not in `new`.
  - `"changed"` — a dictionary. For every key present in **both** whose value
    differs, map the key to `{"from": <old value>, "to": <new value>}`. Compare
    with `!=`, so a value that changes type (for example `"5"` becoming `5`) counts
    as changed.
  - `"unchanged"` — a **sorted** list of keys present in both whose values are equal.

  When both inputs are empty, every list is empty and `"changed"` is `{}`.
starter_code: |
  def diff_configs(request):
      return {"added": [], "removed": [], "changed": {}, "unchanged": []}
function_name: diff_configs
input_mode: function
solution_sketch: Build key sets for old and new. Added is new-minus-old, removed is old-minus-new, both sorted. For the intersection, split keys into changed (unequal values, recorded as from/to dicts) and unchanged (equal values), sorting the unchanged list.
sample_solution: |
  def diff_configs(request):
      old = request["old"]
      new = request["new"]
      old_keys = set(old)
      new_keys = set(new)
      changed = {}
      unchanged = []
      for key in old_keys & new_keys:
          if old[key] != new[key]:
              changed[key] = {"from": old[key], "to": new[key]}
          else:
              unchanged.append(key)
      return {
          "added": sorted(new_keys - old_keys),
          "removed": sorted(old_keys - new_keys),
          "changed": changed,
          "unchanged": sorted(unchanged),
      }
hints:
  - level: 1
    text: Turn each config's keys into a set so you can use set difference and intersection to classify keys quickly.
  - level: 2
    text: new_keys - old_keys are the added keys and old_keys - new_keys are the removed keys; sort both before returning them.
  - level: 3
    text: Loop over the shared keys (old_keys & new_keys); when old[key] does not equal new[key], record a from/to entry in the changed dict, otherwise append the key to unchanged, then sort unchanged at the end.
