function_name: reduce_to_dict
input_mode: function
solution_sketch: Pick a key function and a value function from small registries, then fold the records with reduce into a dict, adding each record's value contribution to its group's running total.
sample_solution: |
  from functools import reduce


  def reduce_to_dict(spec):
      key_funcs = {
          "vendor": lambda record: record["vendor"],
          "fruit": lambda record: record["fruit"],
      }
      value_funcs = {
          "crates": lambda record: record["crates"],
          "count": lambda record: 1,
      }
      key_func = key_funcs[spec["key"]]
      value_func = value_funcs[spec["value"]]

      def accumulate(totals, record):
          group = key_func(record)
          totals[group] = totals.get(group, 0) + value_func(record)
          return totals

      return reduce(accumulate, spec["items"], {})
hints:
  - level: 1
    text: Folding into a dict means carrying one accumulator dict through every record and updating it as you go.
  - level: 2
    text: Turn the "key" and "value" names into functions that pull the group and the contribution out of a record, so the accumulation logic stays generic.
  - level: 3
    text: Use reduce with an initial empty dict; in the step function, read the current total with totals.get(group, 0), add this record's contribution, store it back, and return the dict.
