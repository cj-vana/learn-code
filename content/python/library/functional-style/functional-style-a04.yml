prompt_markdown: |
  An orchard market closes each day by folding its delivery slips into a summary
  ledger. Every slip is a record of one delivery, and the closing clerk chooses a
  grouping key and a value to accumulate, then reduces the whole list into a
  single dict of running totals.

  Write `reduce_to_dict(spec)`. The single argument `spec` is a dict:

  - `spec["items"]`: a list of delivery records. Each record is a dict with fields
    `"vendor"` (a string), `"fruit"` (a string), and `"crates"` (an integer).
  - `spec["key"]`: which field names the group, either `"vendor"` or `"fruit"`.
  - `spec["value"]`: what each record contributes, either `"crates"` (add that
    record's crate count) or `"count"` (add 1 per record).

  Fold the records left to right into a dict that maps each group to the sum of
  its contributions. Build the dict with a reduce-style accumulation: start from
  an empty dict, and for each record add its contribution to the entry for its
  group, creating the entry at zero the first time a group appears.

  Return the resulting dict. Key order does not matter. An empty `spec["items"]`
  returns an empty dict `{}`.

  Example: with records
  `[{"vendor": "Ana", "fruit": "plum", "crates": 3}, {"vendor": "Ben", "fruit": "plum", "crates": 2}, {"vendor": "Ana", "fruit": "pear", "crates": 4}]`,
  `key = "vendor"` and `value = "crates"` gives `{"Ana": 7, "Ben": 2}`.
