explanation_markdown: |
  Reducing into a dict is the accumulation pattern behind group-by: the fold keeps
  one dict of running totals and folds each record into it. Separating the key
  function from the value function is the functional-style discipline, the shape
  of the aggregation (group by X, sum Y) is expressed as data rather than hard
  coded, so the same fold handles vendor-by-crates and fruit-by-count without
  branching. Seeding a missing group with `totals.get(group, 0)` keeps the first
  contribution correct, and returning the accumulator each step is what lets
  `reduce` thread it through the whole list.
common_mistakes:
  - Forgetting to seed a new group at zero, so the first contribution raises a KeyError.
  - Not returning the accumulator dict from the step function, which makes reduce pass None into the next call.
  - Overwriting a group's total with the latest record instead of adding to the running sum.
