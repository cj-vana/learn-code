prompt_markdown: |
  A tournament scoring desk supports several house rules for turning a player's
  list of round scores into one final number. The desk picks a rule **by name** at
  scoring time and applies it to that player's scores.

  Write `score_tournament(payload)` that takes **one dictionary** with three
  entries:

  - `"scores"`: the player's round scores, a list of integers (possibly empty).
  - `"k"`: an integer parameter used by some rules (ignored by others, but always
    present).
  - `"strategy"`: the rule name, one of the five below.

  The five strategies:

  - `"sum_all"`: total of every score. `k` is ignored.
  - `"top_k"`: total of the `k` highest scores. If `k` is `0` or negative, the
    total is `0`; if `k` exceeds the number of scores, use all of them.
  - `"drop_k_lowest"`: total after removing the `k` lowest scores. If `k` is `0`
    or negative, drop nothing; if `k` is at least the number of scores, the total
    is `0`.
  - `"cap_each"`: total after capping each score at `k` first, i.e. sum of
    `min(score, k)` over every score.
  - `"count_at_least"`: how many scores are greater than or equal to `k` (a count,
    not a sum).

  Return the resulting **integer**. For any strategy an empty `scores` list yields
  `0`.

  Example call:

  ```python
  score_tournament({"scores": [4, 9, 1, 7], "k": 2, "strategy": "top_k"})
  # -> 9 + 7 -> 16
  ```

  Implement each rule as its own small function that **closes over** the shared
  `scores` and `k`, collect them in a **dispatch table** keyed by name, and call
  the one the `strategy` names -- the classic closures-as-strategy pattern.
