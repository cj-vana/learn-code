solution_sketch: Read scores and k once, then define one zero-argument closure per rule that captures them (sum_all, top_k using sorted-descending slice with k<=0 guard, drop_k_lowest using sorted-ascending slice with k<=0 guard, cap_each summing min(score,k), count_at_least counting score>=k). Put the closures in a dict keyed by strategy name and invoke the selected one.
sample_solution: |
  def score_tournament(payload):
      scores = payload["scores"]
      k = payload["k"]

      def sum_all():
          return sum(scores)

      def top_k():
          if k <= 0:
              return 0
          return sum(sorted(scores, reverse=True)[:k])

      def drop_k_lowest():
          if k <= 0:
              return sum(scores)
          return sum(sorted(scores)[k:])

      def cap_each():
          return sum(min(score, k) for score in scores)

      def count_at_least():
          return sum(1 for score in scores if score >= k)

      strategies = {
          "sum_all": sum_all,
          "top_k": top_k,
          "drop_k_lowest": drop_k_lowest,
          "cap_each": cap_each,
          "count_at_least": count_at_least,
      }
      return strategies[payload["strategy"]]()
