explanation_markdown: |
  Every rule needs the same two inputs -- the player's `scores` and the parameter
  `k` -- and differs only in what it does with them. Defining each rule as a nested
  function lets it **capture** those inputs from the enclosing scope, so the five
  closures are interchangeable, zero-argument behaviors. Collecting them in a dict
  keyed by name turns rule selection into a single dictionary lookup:
  `strategies[strategy]()`. That is the strategy pattern expressed with closures
  instead of classes, and adding a sixth rule is one more function plus one more
  table entry.

  The care is all in the boundary cases, which is why this is a hard exercise.
  `top_k` sorts descending and sums the first `k`, but a non-positive `k` must
  short-circuit to `0`, while a `k` past the end is harmless because a slice never
  raises. `drop_k_lowest` sorts ascending and sums from index `k` onward, so a `k`
  at or beyond the length leaves an empty slice (total `0`), and a non-positive `k`
  should drop nothing. `cap_each` and `count_at_least` are generator-driven
  reductions -- one sums `min(score, k)`, the other counts a boolean condition with
  `sum(1 for ...)`. Because `sum` of an empty iterable is `0`, every rule returns
  `0` for an empty `scores` list with no extra guard.
common_mistakes:
  - Forgetting the k <= 0 guard on top_k, so a negative slice bound quietly grabs the wrong scores instead of returning 0.
  - Using sorted(scores)[:k] for drop_k_lowest (keeping the lowest) instead of sorted(scores)[k:] (dropping them), inverting the rule.
  - Writing a long if/elif ladder on the strategy name rather than a dispatch table, which works but abandons the closures-as-strategy pattern the exercise teaches.
