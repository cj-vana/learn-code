explanation_markdown: |
  A map-then-filter chain keeps each responsibility separate: `map` reshapes the
  data uniformly, `filter` decides membership. Because the predicate always runs
  on the transformed value, the order of the two stages is part of the contract,
  swapping them would judge raw readings and give different survivors. Resolving
  the transform and predicate from registries keeps the pipeline data-driven, and
  wrapping `filter` around `map` means nothing materializes until the final
  `list(...)`, so the two passes fuse into one walk over the data.
common_mistakes:
  - Filtering the raw readings and then transforming, which tests the wrong values.
  - Returning the lazy map or filter object instead of calling list(...) to produce a real list.
  - Assuming "is_even" excludes negatives; in Python -2 % 2 == 0, so negative even numbers pass.
