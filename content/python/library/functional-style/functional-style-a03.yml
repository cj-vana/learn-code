solution_sketch: Resolve the named transform and predicate from two registries, map the transform across the items, then filter the mapped values by the predicate and return them as a list.
sample_solution: |
  def map_filter_chain(spec):
      transforms = {
          "double": lambda x: x * 2,
          "negate": lambda x: -x,
          "add_one": lambda x: x + 1,
          "square": lambda x: x * x,
          "identity": lambda x: x,
      }
      predicates = {
          "is_positive": lambda y: y > 0,
          "is_even": lambda y: y % 2 == 0,
          "is_nonzero": lambda y: y != 0,
          "gt_ten": lambda y: y > 10,
      }
      transform = transforms[spec["transform"]]
      predicate = predicates[spec["predicate"]]
      return list(filter(predicate, map(transform, spec["items"])))
hints:
  - level: 1
    text: Do the two steps in order, transform every reading first, then decide which transformed values to keep.
  - level: 2
    text: Look the transform and predicate up by name in two dicts so you have the actual one-argument functions to pass to map and filter.
  - level: 3
    text: map(transform, items) produces the transformed values lazily; wrap that in filter(predicate, ...) and call list(...) once to materialize the survivors in order.
