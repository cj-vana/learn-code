prompt_markdown: |
  An observatory logs raw integer readings from a sensor sweep. The reduction
  pipeline first **transforms** every reading, then **keeps** only the transformed
  values that pass a test. This is a classic map-then-filter chain: transform
  first, judge the transformed value second.

  Write `map_filter_chain(spec)`. The single argument `spec` is a dict:

  - `spec["items"]`: a list of integer readings.
  - `spec["transform"]`: the name of the transformation applied to each reading.
  - `spec["predicate"]`: the name of the test applied to each *transformed* value.

  Transformations, applied to a reading `x`:

  - `"double"` -> `x * 2`
  - `"negate"` -> `-x`
  - `"add_one"` -> `x + 1`
  - `"square"` -> `x * x`
  - `"identity"` -> `x`

  Predicates, applied to the transformed value `y` (keep it when the test is true):

  - `"is_positive"` -> `y > 0`
  - `"is_even"` -> `y % 2 == 0`
  - `"is_nonzero"` -> `y != 0`
  - `"gt_ten"` -> `y > 10`

  Return a list of the surviving transformed values, in their original order.
  The predicate always tests the value *after* transformation, never the raw
  reading. An empty `spec["items"]` returns an empty list.

  Example: `{"items": [1, 2, 3, 4, 5], "transform": "square", "predicate": "gt_ten"}`
  squares to `[1, 4, 9, 16, 25]` and keeps `[16, 25]`.
starter_code: |
