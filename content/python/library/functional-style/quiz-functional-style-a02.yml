questions:
  - id: q1
    prompt: 'reduce(lambda a, b: a + b, [], 0) versus reduce(lambda a, b: a + b, []) — what differs?'
    choices:
      - The first returns 0 (the initializer); the second raises TypeError on the empty sequence
      - Both return 0
      - Both raise TypeError
      - The first returns None
    correct_choice: The first returns 0 (the initializer); the second raises TypeError on the empty sequence
    explanation: |
      reduce needs a starting value or a non-empty sequence; the initializer
      makes the fold total over empty input — the same base-case role as in
      recursion.
    concepts:
      - python.functional_style
  - id: q2
    prompt: |
      pipe(f, g, h)(x) applies the functions in which order?
    choices:
      - f first, then g, then h - left to right, application order
      - h first, then g, then f - mathematical compose order
      - All at once
      - Undefined without an initial value
    correct_choice: f first, then g, then h - left to right, application order
    explanation: |
      pipe threads x through in listed order (unlike mathematical compose,
      which is right-to-left); choosing a convention and naming it is part
      of building the helper.
    concepts:
      - python.functional_style
  - id: q3
    prompt: 'partial(sorted, key=len) produces what?'
    choices:
      - A one-argument function that sorts its iterable argument by length
      - The sorted list of lengths
      - An error - sorted needs its iterable first
      - A function requiring both iterable and key again
    correct_choice: A one-argument function that sorts its iterable argument by length
    explanation: |
      partial binds the keyword key=len, leaving the iterable to supply
      later — the adapter that fits sorted into a pipeline or map.
    concepts:
      - python.functional_style
  - id: q4
    prompt: |
      funcs = [lambda: i for i in range(3)]; [f() for f in funcs] yields what,
      and why?
    choices:
      - "[2, 2, 2] - each closure captures the variable i, which ends at 2 (late binding)"
      - "[0, 1, 2] - each closure captures its own i"
      - "[0, 0, 0]"
      - A NameError - i is out of scope
    correct_choice: "[2, 2, 2] - each closure captures the variable i, which ends at 2 (late binding)"
    explanation: |
      Closures capture the variable, not its value at creation; all three
      see the final i. The fix binds per-iteration via a default argument
      (lambda i=i: i).
    concepts:
      - python.functional_style
  - id: q5
    prompt: |
      Why prefer a tuple over a list for a fixed 3-field record passed
      between functions in functional-style code?
    choices:
      - Immutability - no function can accidentally mutate a shared record, and it becomes hashable for use as a dict key
      - Tuples iterate faster
      - Lists cannot hold mixed types
      - Tuples are automatically sorted
    correct_choice: Immutability - no function can accidentally mutate a shared record, and it becomes hashable for use as a dict key
    explanation: |
      Fixed records as tuples encode "this will not change" in the type,
      removing a class of shared-mutation bugs and enabling use as keys and
      set members.
    concepts:
      - python.functional_style
