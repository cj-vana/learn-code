function_name: blend_batches
input_mode: function
solution_sketch: Build a dict mapping each op name to an operator-module function (or the built-in max/min), look up the chosen combiner, then map it over the two lists at once so the pairing stops at the shorter list, and materialize the map into a list.
sample_solution: |
  import operator


  def blend_batches(payload):
      combiners = {
          "add": operator.add,
          "subtract": operator.sub,
          "multiply": operator.mul,
          "max": max,
          "min": min,
      }
      combine = combiners[payload["op"]]
      return list(map(combine, payload["left"], payload["right"]))
