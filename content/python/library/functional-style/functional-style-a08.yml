prompt_markdown: |
  A bakery weighs ingredients twice: once for the morning batch and once for the
  afternoon batch. The two batches are recorded as parallel lists of gram amounts,
  and the head baker wants them combined **position by position** with one chosen
  operation.

  Write `blend_batches(payload)` that takes **one dictionary** with three entries:

  - `"left"`: the morning batch, a list of integers.
  - `"right"`: the afternoon batch, a list of integers.
  - `"op"`: the operation name, always one of `"add"`, `"subtract"`,
    `"multiply"`, `"max"`, or `"min"`.

  Return a **new list** where position `i` is the chosen operation applied to
  `left[i]` and `right[i]`. For `"subtract"` it is `left[i] - right[i]`.

  Example call:

  ```python
  blend_batches({"left": [5, 5], "right": [1, 2], "op": "subtract"})
  # -> [4, 3]
  ```

  Rules:

  - If the two lists have **different lengths**, stop at the end of the shorter
    one and ignore the extra tail.
  - If either list is empty, return an empty list.
  - Select the operation from a small **lookup table** rather than an if/elif
    chain, and lean on the `operator` module so no arithmetic lambdas are needed.
