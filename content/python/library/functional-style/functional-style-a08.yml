explanation_markdown: |
  `map(func, a, b)` walks two sequences together, calling `func(a[i], b[i])` at
  each step and stopping as soon as the shorter sequence is exhausted -- which is
  exactly the truncation rule, so you get it without writing any length checks.
  The `operator` module supplies the arithmetic as plain functions (`operator.add`
  is just `+` as a callable), and `max`/`min` are already two-argument built-ins,
  so the whole computation needs no hand-written lambdas.

  Choosing the combiner through a dict keyed by name is the functional-dispatch
  move: the data (`op`) selects a behavior (a function) from a table, and adding a
  sixth operation later is one new entry rather than another `elif`. Wrapping the
  `map` in `list(...)` materializes the lazy iterator into the concrete list the
  caller expects.
common_mistakes:
  - Iterating with range(len(left)) and indexing both lists, which raises IndexError when the lists differ in length instead of truncating cleanly.
  - Returning the map object directly, so an equality check against a list fails because a map iterator is not a list.
  - Replacing the lookup table with a long if/elif chain, which works but throws away the functional-dispatch point of the exercise.
