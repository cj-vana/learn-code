explanation_markdown: |
  A memoizer is a closure over a cache: the wrapper remembers past answers so the
  expensive function runs at most once per distinct input. The counter makes that
  saving visible, it rises only on cache misses, so it lands on the number of
  unique station numbers no matter how many repeats stream in. This is the core of
  what `functools.lru_cache` does for you, and building it by hand shows why the
  wrapped function must be *pure*: caching by argument is only safe when the same
  input always yields the same output. Negative and zero stations behave like any
  other key, so `-1` and `0` each cost exactly one computation.
common_mistakes:
  - Counting every call instead of only cache misses, so "computations" equals len(calls).
  - Storing the counter in a plain integer local rather than a mutable holder, so the inner function cannot update it.
  - Returning the cached value but forgetting to store it first, which recomputes on every call and never populates the cache.
