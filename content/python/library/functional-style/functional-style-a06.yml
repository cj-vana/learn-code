prompt_markdown: |
  A field surveyor computes each sightline from a station number, and the raw
  computation is costly enough that repeating it for a station already measured is
  pure waste. You will wrap the costly computation in a manual **memoizer**: a
  cache that computes a result the first time a station appears and serves it from
  memory on every repeat. The grader checks both the answers and how many real
  computations actually ran.

  Write `memoize_pure(spec)`. The single argument `spec` is a dict:

  - `spec["calls"]`: a list of integer station numbers, in the order they are
    requested (repeats are expected).

  Model the costly computation as squaring the station number (`n * n`), but count
  each time it truly runs. Build a memoizing wrapper around that computation using
  a closure over a cache dict: on a cache miss, run the computation, store it, and
  count it; on a cache hit, return the stored value and count nothing. Apply the
  wrapped function to each station in `spec["calls"]`, in order.

  Return a dict with exactly two fields:

  - `"results"`: a list of the squared values, one per call, in order (including
    repeats).
  - `"computations"`: the integer number of times the underlying squaring
    actually ran, which equals the count of distinct station numbers.

  An empty `spec["calls"]` returns `{"results": [], "computations": 0}`.

  Example: `{"calls": [3, 3, 5, 3, 5, 7]}` returns
  `{"results": [9, 9, 25, 9, 25, 49], "computations": 3}` because only stations
  3, 5, and 7 are ever computed; the rest are cache hits.
starter_code: |
