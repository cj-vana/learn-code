function_name: memoize_pure
input_mode: function
solution_sketch: Wrap a squaring function that increments a shared counter in a memoizer whose closure holds a cache dict; run each call through it, then report the results and the counter (which equals the number of distinct inputs).
sample_solution: |
  def memoize_pure(spec):
      counter = {"runs": 0}

      def costly_square(n):
          counter["runs"] += 1
          return n * n

      def memoize(func):
          cache = {}

          def wrapper(arg):
              if arg not in cache:
                  cache[arg] = func(arg)
              return cache[arg]

          return wrapper

      cached_square = memoize(costly_square)
      results = [cached_square(station) for station in spec["calls"]]
      return {"results": results, "computations": counter["runs"]}
hints:
  - level: 1
    text: Memoization trades memory for time; keep a cache of already-computed answers and only do the real work when the input is new.
  - level: 2
    text: Let the wrapper close over a cache dict; check whether the argument is already a key before computing, and only run (and count) the underlying function on a miss.
  - level: 3
    text: Give the costly function a shared counter it bumps every time it runs; because the wrapper only calls it on cache misses, the final counter equals the number of distinct station numbers.
