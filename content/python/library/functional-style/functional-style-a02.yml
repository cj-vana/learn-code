solution_sketch: Define a curry helper that nests two closures over a binary function, curry the chosen op, bind the base to get a reusable one-argument closure, then map that closure across the values.
sample_solution: |
  def curry_and_apply(spec):
      ops = {
          "add": lambda a, b: a + b,
          "mul": lambda a, b: a * b,
          "sub": lambda a, b: a - b,
          "power": lambda a, b: a ** b,
      }

      def curry_two_arg(func):
          def take_first(a):
              def take_second(b):
                  return func(a, b)
              return take_second
          return take_first

      bound = curry_two_arg(ops[spec["op"]])(spec["base"])
      return [bound(value) for value in spec["values"]]
hints:
  - level: 1
    text: Currying splits a two-argument call into two one-argument calls; the first call captures the base and hands back a function still waiting for the second argument.
  - level: 2
    text: Write a helper whose inner function closes over both the operation and the first argument, so calling it later with just the second argument completes the work.
  - level: 3
    text: Call the curry helper with the chosen op, then call the returned function once with spec["base"] to get a reusable closure; apply that same closure to every value in a comprehension.
