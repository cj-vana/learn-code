prompt_markdown: |
  A harbor toll booth settles on one **base charge** for the morning, then applies
  a two-argument operation between that base and each arriving vessel's number.
  Rather than pass the base every time, the clerk *curries* the operation: fix the
  first argument once, keep the returned one-argument function, and call it for
  every vessel.

  Write `curry_and_apply(spec)`. The single argument `spec` is a dict:

  - `spec["op"]`: the name of a two-argument operation (see below).
  - `spec["base"]`: the integer first argument, fixed once.
  - `spec["values"]`: a list of integers; each is the second argument for one call.

  Inside your solution, build a helper that takes a two-argument function `f` and
  returns a function of the first argument `a`, which in turn returns a function
  of the second argument `b` giving `f(a, b)`. Curry the chosen operation, bind
  `spec["base"]` as the first argument once, then apply the resulting one-argument
  function to each value in order.

  The operations, where `a` is the base and `b` is a vessel value:

  - `"add"` -> `a + b`
  - `"mul"` -> `a * b`
  - `"sub"` -> `a - b`
  - `"power"` -> `a ** b`

  Return a list of the results, one per value, in the same order. If
  `spec["values"]` is empty, return an empty list.

  Example: `{"op": "add", "base": 10, "values": [1, 2, 5]}` fixes the base at 10
  and returns `[11, 12, 15]`.
