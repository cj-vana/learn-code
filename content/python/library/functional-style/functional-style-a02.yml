explanation_markdown: |
  Currying rewrites `f(a, b)` as `f(a)(b)`: the outer call fixes `a` and returns a
  closure that remembers it. Because the base is captured once, every later call
  supplies only the vessel value, and the same closure is reused across the whole
  list. That is the functional-style payoff here, one configured behavior applied
  many times without re-passing shared state. The nested `def`s make the capture
  explicit: `take_second` closes over both `func` and `a`, so it can finish the
  computation whenever it is finally called.
common_mistakes:
  - Reversing the operands for "sub" or "power", computing b - a or b ** a instead of base first.
  - Rebuilding the curried function inside the loop instead of binding the base once and reusing the closure.
  - Returning the closure itself rather than the list of computed results.
