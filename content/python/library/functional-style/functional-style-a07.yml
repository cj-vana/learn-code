prompt_markdown: |
  A community seed library takes in donations on shallow trays. Each volunteer
  hands over **one tray**, which is a list of seed-packet codes, and at closing
  time the codes from every tray are folded into a single intake list.

  Write `merge_trays(trays)` that takes a **list of trays** (a list of lists of
  strings) and returns **one flat list** with the codes from every tray, in the
  order the trays appear and the order within each tray.

  Example call:

  ```python
  merge_trays([["basil", "dill"], ["sage"]])
  # -> ["basil", "dill", "sage"]
  ```

  Rules:

  - Flatten exactly **one level**: the trays hold plain strings, never nested
    trays.
  - An **empty tray** contributes nothing but must not break the fold.
  - Duplicate codes are kept as-is (do not deduplicate).
  - If `trays` is empty, return an empty list.

  Build the result as a **left fold** with `functools.reduce`, seeding it with an
  empty list so the empty-input and single-tray cases fall out for free.
starter_code: |
  from functools import reduce


  def merge_trays(trays):
      return []
function_name: merge_trays
input_mode: function
solution_sketch: Use functools.reduce with a two-argument combiner that concatenates the running intake list with the next tray, seeded with an empty list so an empty trays argument returns [] and the first tray is handled uniformly.
sample_solution: |
  from functools import reduce


  def merge_trays(trays):
      return reduce(lambda intake, tray: intake + tray, trays, [])
hints:
  - level: 1
    text: A left fold walks the trays one at a time, carrying a running result that starts empty and grows by one tray each step.
  - level: 2
    text: reduce(func, trays, []) passes an empty starting list as the accumulator, so func receives (running_list, next_tray) on every step.
  - level: 3
    text: Write the combiner as lambda intake, tray -> intake + tray, which builds a new concatenated list each step and never touches the caller's trays.
