explanation_markdown: |
  Flattening one level is a fold: you start with an empty intake list and, tray by
  tray, extend it with that tray's contents. `functools.reduce(func, trays, [])`
  expresses exactly that. The seed value `[]` is the important part -- it is what
  `reduce` returns when `trays` is empty, and it means the very first tray is
  combined against a real accumulator instead of being treated as a special case.

  Writing the combiner as `intake + tray` produces a brand-new list each step, so
  the caller's trays are never mutated. That purity is the whole point of the
  functional style here: the same inputs always fold to the same output with no
  side effects. If you wanted to trade a little clarity for speed you could reach
  for `operator.iconcat` with a fresh seed list, but the concatenation form reads
  as plainly what it is: fold the trays into one list.
common_mistakes:
  - Calling reduce without the third seed argument, which raises on an empty trays list and mishandles the single-tray case.
  - Seeding the fold with the first tray (or using operator.iadd), which appends into and mutates the caller's original list.
  - Recursing into inner elements and flattening more than one level when the trays are documented to hold plain strings only.
