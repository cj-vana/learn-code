explanation_markdown: |
  `functools.partial` is the built-in tool for pre-configuring a function: it
  captures the arguments you supply now and returns a callable that takes the
  rest later. Binding the two fixed settings once means every quote call passes
  only the run size, so the shared configuration lives in one place instead of
  being repeated at each call site. Because `partial` binds positionally,
  unpacking `spec["fixed"]` with `*` lines the two fixed values up with the
  operation's first two parameters, leaving `x` open for each value in the list.
common_mistakes:
  - Passing spec["fixed"] as a single list argument instead of unpacking it with * so the two values bind separately.
  - Binding the fixed args inside the loop, rebuilding the partial for every value instead of once.
  - Getting the clamp order wrong, e.g. max(min(x, hi), lo) is equivalent but min(max(x, lo), hi) is the specified form; mixing lo and hi flips the bounds.
