prompt_markdown: |
  A letterpress shop quotes jobs with a small formula. Once a job's fixed settings
  are chosen, only the run size changes from quote to quote, so the shop binds the
  fixed settings up front with `functools.partial` and reuses the resulting
  one-argument function for every run size.

  Write `partial_apply_chain(spec)`. The single argument `spec` is a dict:

  - `spec["op"]`: the name of a three-argument operation (see below).
  - `spec["fixed"]`: a list of exactly two integers, the fixed arguments to bind
    first, in order.
  - `spec["values"]`: a list of integers; each becomes the final argument of one
    call.

  The operations, where the two fixed arguments come first and the run value `x`
  comes last:

  - `"linear"` -> `setup + rate * x`, with `fixed = [setup, rate]`
  - `"clamp"` -> `min(max(x, lo), hi)`, with `fixed = [lo, hi]`
  - `"scale_shift"` -> `scale * x + shift`, with `fixed = [scale, shift]`

  Use `functools.partial` to bind the two fixed arguments once, producing a
  function that still expects only `x`. Apply that bound function to each value in
  order and return the list of results. An empty `spec["values"]` returns an empty
  list.

  Example: `{"op": "linear", "fixed": [5, 2], "values": [0, 1, 10]}` binds
  `setup = 5`, `rate = 2` and returns `[5, 7, 25]`.
starter_code: |
  from functools import partial


  def partial_apply_chain(spec):
      return []
function_name: partial_apply_chain
input_mode: function
solution_sketch: Resolve the named three-argument op, use functools.partial to bind the two fixed args positionally, then call the resulting one-argument function on each value.
sample_solution: |
  from functools import partial


  def partial_apply_chain(spec):
      ops = {
          "linear": lambda setup, rate, x: setup + rate * x,
          "clamp": lambda lo, hi, x: min(max(x, lo), hi),
          "scale_shift": lambda scale, shift, x: scale * x + shift,
      }
      func = ops[spec["op"]]
      bound = partial(func, *spec["fixed"])
      return [bound(value) for value in spec["values"]]
hints:
  - level: 1
    text: functools.partial freezes the leading arguments of a function and returns a new function that only needs the arguments you did not supply.
  - level: 2
    text: The two fixed values are the first two positional arguments, so unpack them into partial with partial(func, *spec["fixed"]).
  - level: 3
    text: Call the bound function once per value; because the fixed args are already baked in, each call passes only the run size and returns a plain number.
