prompt_markdown: |
  A farmers market keeps one record per stall, and the organizers want those
  records **bucketed** by a chosen field -- usually the market zone, but sometimes
  the stall size -- so they can hand each bucket to the right steward.

  Write `group_stalls(payload)` that takes **one dictionary** with two entries:

  - `"records"`: a list of stall records, where each record is a dictionary.
  - `"key"`: the field name to group by (a string present in every record).

  Return a **dictionary of lists**: each distinct value of the chosen field maps
  to the list of records that carry it, in the **order those records appear** in
  the input. Groups themselves appear in the order their field value is first
  seen.

  Example call:

  ```python
  group_stalls({
      "records": [
          {"name": "a", "zone": "north"},
          {"name": "b", "zone": "south"},
          {"name": "c", "zone": "north"},
      ],
      "key": "zone",
  })
  # -> {"north": [{"name": "a", "zone": "north"}, {"name": "c", "zone": "north"}],
  #     "south": [{"name": "b", "zone": "south"}]}
  ```

  If `records` is empty, return an empty dictionary. Build the result as a **left
  fold** with `functools.reduce`, using `setdefault` to get-or-create each bucket.
starter_code: |
