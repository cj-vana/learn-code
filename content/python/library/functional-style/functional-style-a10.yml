function_name: group_stalls
input_mode: function
solution_sketch: Fold the records with functools.reduce over a dict accumulator seeded with {}; for each record, setdefault(record[key], []) returns the existing or a freshly-created bucket list, then append the record to it so encounter order is preserved, and return the accumulator each step.
sample_solution: |
  from functools import reduce


  def group_stalls(payload):
      key = payload["key"]

      def place(groups, record):
          groups.setdefault(record[key], []).append(record)
          return groups

      return reduce(place, payload["records"], {})
hints:
  - level: 1
    text: A group-by result is a dict where each field value maps to the list of records that share it, so you are building a dict of lists.
  - level: 2
    text: groups.setdefault(record[key], []) returns the bucket list for that field value, creating an empty one the first time the value is seen, so you can append to it either way.
  - level: 3
    text: Seed reduce with an empty dict, and have the folding function append the record then return the dict so the accumulator carries forward to the next step.
