explanation_markdown: |
  Grouping is a fold that threads a growing dictionary through the records.
  `functools.reduce(place, records, {})` starts from a fresh empty dict and calls
  `place(accumulator, record)` for each record, always returning the same
  accumulator so it carries forward. The seed `{}` is what makes the empty-input
  case return `{}` with no special handling.

  The heart of the fold is `setdefault(record[key], [])`. On the first record for a
  given field value it inserts a new empty list and returns it; on later records it
  returns the existing list. Either way you `append` to that list, so records land
  in their buckets in encounter order and groups appear in first-seen order. This
  dict-of-lists shape is the canonical result of a group-by, and because the fold
  only ever mutates its own accumulator, the input records are left untouched.
common_mistakes:
  - Rebinding the bucket with groups[value] = [record] on every record, which discards all earlier members of that group.
  - Omitting the {} seed so reduce raises on an empty records list instead of returning an empty dict.
  - Using groups.get(value, []) without assigning the result back, so the appended record is dropped when the group is new.
