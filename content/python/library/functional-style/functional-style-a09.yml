explanation_markdown: |
  This is a find-first, not a filter-all. A list comprehension would build every
  match and then throw all but one away, and taking `[0]` from it would raise
  `IndexError` when nothing matched. The functional idiom is a **generator
  expression driven by `next`**: the generator yields qualifying readings lazily,
  `next` pulls exactly one, and the search short-circuits the moment a match
  appears.

  The second argument to `next` is its default: when the generator is exhausted --
  because no reading qualified, or because `heights` was empty -- `next` returns
  that default instead of raising `StopIteration`. That is what makes `fallback`
  the clean, no-branch answer for the calm-day case, and it can be any type at all,
  including a string. Using `>=` rather than `>` is what lets a reading sitting
  exactly on the threshold trip the alarm.
common_mistakes:
  - Building a full list comprehension of matches and indexing [0], which scans everything and raises IndexError when there is no match.
  - Calling next without a default, so a no-match or empty-input case raises StopIteration instead of returning the fallback.
  - Using a strict > comparison, which misses a reading that sits exactly on the threshold value.
