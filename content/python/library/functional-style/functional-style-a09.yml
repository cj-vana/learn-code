prompt_markdown: |
  A tide station logs the water height once an hour. Operators want to know the
  **first** reading in the day that reaches a flood threshold so they can sound a
  single alarm; if the water never gets that high, they report a calm-day value
  instead.

  Write `first_flood_height(payload)` that takes **one dictionary** with three
  entries:

  - `"heights"`: the hourly readings in order, a list of integers.
  - `"threshold"`: the flood trip point, an integer.
  - `"fallback"`: the value to return when no reading reaches the threshold.

  Scan the readings left to right and return the **first** height that is
  **greater than or equal to** the threshold. A reading exactly at the threshold
  counts as a match. If no reading qualifies (including when `heights` is empty),
  return `fallback` unchanged.

  Example call:

  ```python
  first_flood_height({"heights": [1, 2, 7, 9], "threshold": 6, "fallback": -1})
  # -> 7
  ```

  Do this the lazy, functional way: feed a **generator expression** to `next(...)`
  with `fallback` as its default, so the scan stops at the first qualifying
  reading and never inspects the rest.
starter_code: |
  def first_flood_height(payload):
      return None
function_name: first_flood_height
input_mode: function
solution_sketch: Pass next() a generator expression that yields readings at or above the threshold, and give next() the fallback as its default second argument so an exhausted (no-match or empty) generator returns the fallback instead of raising.
sample_solution: |
  def first_flood_height(payload):
      threshold = payload["threshold"]
      return next(
          (height for height in payload["heights"] if height >= threshold),
          payload["fallback"],
      )
hints:
  - level: 1
    text: You only need the first qualifying reading, so there is no reason to build a whole filtered list -- a lazy scan that can stop early is enough.
  - level: 2
    text: A generator expression (height for height in heights if height >= threshold) yields matches one at a time without materializing them all.
  - level: 3
    text: next(generator, fallback) returns the first yielded value, or the fallback default when the generator yields nothing, so no StopIteration ever escapes.
