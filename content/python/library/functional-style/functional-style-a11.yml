explanation_markdown: |
  The exercise pushes you from "loop and mutate a running value" to "assemble a
  function and apply it once". Each station spec is turned into a **closure**: the
  builder for `"add"` takes `arg` and returns `lambda x: x + arg`. Because `arg` is
  the builder's own parameter, every station captures its own frozen value -- which
  sidesteps the classic late-binding trap where lambdas built in a loop all share
  the final loop variable.

  Composition is then a fold over functions. `reduce(compose, stage_fns, identity)`
  starts from `lambda x: x` and, step by step, wraps the accumulated pipeline `f`
  with the next stage `g` as `lambda x: g(f(x))`. Because each new stage goes on the
  outside as `g(f(x))`, the stations fire in list order. The identity seed is what
  makes an empty `stages` list compose to a do-nothing function that returns `start`
  untouched. The final `pipeline(start)` is the only place a concrete value flows --
  everything before it is point-free, working with functions rather than numbers.
common_mistakes:
  - Building the stage lambdas so they read a shared loop variable instead of a captured argument, so every station ends up using the last spec's arg (late binding).
  - Composing right-to-left (f(g(x))), which runs the stations in reverse and breaks any order-sensitive line.
  - Seeding reduce with the first stage instead of an identity function, which crashes on an empty stages list rather than returning start.
