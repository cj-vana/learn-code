  - level: 3
    text: Compose the stage functions with reduce(lambda f, g -> (lambda x -> g(f(x))), stage_fns, lambda x -> x); the identity seed makes an empty line a no-op, and g(f(x)) applies them in list order. Then call the composed pipeline on start.
