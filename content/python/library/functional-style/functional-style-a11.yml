prompt_markdown: |
  A coffee roastery runs each batch through an ordered line of stations. Every
  station applies one numeric transform, and the roast master describes the whole
  line as a list of station specs, then feeds a starting reading through it.

  Write `run_roast_line(payload)` that takes **one dictionary** with two entries:

  - `"start"`: the starting integer reading.
  - `"stages"`: a list of station specs. Each spec is a **two-element list**
    `[name, arg]` where `arg` is an integer and `name` is one of:
    - `"add"` -> add `arg`
    - `"subtract"` -> subtract `arg`
    - `"scale"` -> multiply by `arg`
    - `"floor_at"` -> raise the value up to `arg` if it is below `arg`
      (i.e. `max(value, arg)`)
    - `"cap_at"` -> pull the value down to `arg` if it is above `arg`
      (i.e. `min(value, arg)`)

  Apply the stations **left to right**: the first spec transforms `start`, the
  second transforms that result, and so on. Return the final integer.

  Example call:

  ```python
  run_roast_line({"start": 5, "stages": [["add", 3], ["scale", 2]]})
  # -> (5 + 3) * 2 -> 16
  ```

  Order matters: `[["scale", 2], ["add", 3]]` on the same start of `5` gives `13`,
  not `16`. If `stages` is empty, return `start` unchanged.

  Build this the functional way: turn each spec into its own **one-argument
  function** (a closure that has captured its `arg`), then **compose** those
  functions into a single pipeline with `functools.reduce`, seeded with an identity
  function, and finally apply the pipeline to `start`.
starter_code: |
  from functools import reduce


  def run_roast_line(payload):
      return payload["start"]
function_name: run_roast_line
input_mode: function
solution_sketch: Map each spec to a closure capturing its arg via a builder table (add/subtract/scale/floor_at/cap_at). Fold the list of stage functions with functools.reduce using a compose combiner (lambda f, g -> lambda x -> g(f(x))) seeded with the identity lambda x -> x so composition runs left to right, then call the resulting pipeline on start.
sample_solution: |
  from functools import reduce


  def run_roast_line(payload):
      builders = {
          "add": lambda arg: (lambda x: x + arg),
          "subtract": lambda arg: (lambda x: x - arg),
          "scale": lambda arg: (lambda x: x * arg),
          "floor_at": lambda arg: (lambda x: arg if x < arg else x),
          "cap_at": lambda arg: (lambda x: arg if x > arg else x),
      }
      stage_fns = [builders[name](arg) for name, arg in payload["stages"]]
      pipeline = reduce(lambda f, g: (lambda x: g(f(x))), stage_fns, lambda x: x)
      return pipeline(payload["start"])
hints:
