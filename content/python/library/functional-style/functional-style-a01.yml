explanation_markdown: |
  Function composition turns a list of small steps into one callable. Reading the
  stages left to right, each step's result becomes the next step's argument, so
  the pipeline is really `stage_n(... stage_2(stage_1(x)) ...)`. Folding with
  `reduce` from an identity function builds that nesting for any length of list,
  including the empty case where the identity survives untouched and hands back
  the start value. The registry dict is the functional-style move here: names map
  to behavior, so the caller composes by data rather than by writing new code.
common_mistakes:
  - Applying the stages right to left, so a two-stage list runs in the wrong order.
  - Using true division for "halve" (x / 2), which returns a float and drifts from the expected integers.
  - Forgetting the empty-stages case and returning 0 or None instead of the untouched start value.
