prompt_markdown: |
  Crates ride down a warehouse conveyor belt in a single line. Each crate carries
  a color label. Whenever two crates with the **same** label end up next to each
  other, they lock together and are lifted off the belt, which may bring two new
  crates into contact so the collapsing repeats.

  Write `settle_crates(labels)` that takes a list of color-label strings in belt
  order and returns the list of labels that remain after every possible adjacent
  identical pair has been removed. An empty belt returns an empty list.
starter_code: |
  def settle_crates(labels):
      return []
function_name: settle_crates
input_mode: function
solution_sketch: Push each label onto a stack, popping instead whenever it matches the current top.
sample_solution: |
  def settle_crates(labels):
      stack = []
      for label in labels:
          if stack and stack[-1] == label:
              stack.pop()
          else:
              stack.append(label)
      return stack
hints:
  - level: 1
    text: Walk through the crates left to right and keep the ones that survive so far in a growing pile.
  - level: 2
    text: A stack (a plain list used with append and pop) lets you compare each new crate to the most recent survivor.
  - level: 3
    text: If the new label equals the label on top of the stack, pop that top instead of pushing; otherwise append the new label.
