explanation_markdown: |
  The stack always holds the crates that have survived so far, in belt order. For
  each incoming crate you only ever compare it to the top of the stack: if they
  match, both cancel and you pop; otherwise the crate becomes the new top. Because
  a pop can expose a fresh matching pair, this single left-to-right pass captures
  all the cascading removals in O(n) time.
common_mistakes:
  - Scanning the list repeatedly for pairs instead of letting the stack expose new adjacencies in one pass.
  - Forgetting to check that the stack is non-empty before reading its top element.
  - Returning a boolean or count instead of the remaining list of labels.
