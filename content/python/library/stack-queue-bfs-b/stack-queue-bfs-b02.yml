function_name: fewest_segments
input_mode: function
solution_sketch: Breadth-first search from the start with a queue, returning the level at which the target is first dequeued.
sample_solution: |
  from collections import deque

  def fewest_segments(data):
      trails = data["trails"]
      start = data["start"]
      target = data["target"]
      seen = {start}
      queue = deque([(start, 0)])
      while queue:
          junction, segments = queue.popleft()
          if junction == target:
              return segments
          for neighbor in trails.get(junction, []):
              if neighbor not in seen:
                  seen.add(neighbor)
                  queue.append((neighbor, segments + 1))
      return -1
hints:
  - level: 1
    text: Explore the map outward from the start one ring of junctions at a time, so the first time you reach the target you have used the fewest segments.
  - level: 2
    text: A queue processes junctions in first-in, first-out order; store each junction together with how many segments it took to get there.
  - level: 3
    text: Track visited junctions in a set so you never re-add one, and return the stored segment count when you dequeue the target; return -1 if the queue empties first.
