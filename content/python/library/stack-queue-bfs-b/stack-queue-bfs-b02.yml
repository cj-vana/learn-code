prompt_markdown: |
  A nature park is a network of junctions joined by two-way trail segments. The
  map is given as a dictionary where each key is a junction name and its value is
  the list of junctions reachable by one trail segment.

  Write `fewest_segments(data)` where `data` is a dict with keys:

  - `"trails"`: the junction-to-neighbors map described above
  - `"start"`: the junction where the hike begins
  - `"target"`: the junction to reach

  Return the fewest number of trail **segments** needed to walk from `start` to
  `target`. If `start` equals `target`, the answer is `0`. If no route exists,
  return `-1`.
starter_code: |
