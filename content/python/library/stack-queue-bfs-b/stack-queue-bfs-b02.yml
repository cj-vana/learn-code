explanation_markdown: |
  Every trail segment counts the same, so the shortest walk is the one that uses
  the fewest edges. Breadth-first search visits junctions in order of distance
  from the start: the queue holds a whole "ring" of junctions before moving to the
  next ring out. Pairing each junction with its segment count and marking junctions
  as seen when they enter the queue means the first time the target is dequeued it
  is guaranteed to be by a shortest route. If the queue drains without reaching the
  target, the two junctions are in separate parts of the park, so the answer is -1.
common_mistakes:
  - Using a stack (depth-first search) instead of a queue, which can report a longer route than the shortest one.
  - Marking a junction as seen only after dequeuing it, allowing the same junction into the queue many times.
  - Forgetting the start-equals-target case or the disconnected case that must return -1.
