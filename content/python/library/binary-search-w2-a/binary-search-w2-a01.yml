explanation_markdown: |
  Binary search maintains a window `[lo, hi]` that must contain the target if it
  is present. Each step checks the middle number and throws away the half that
  cannot hold `wanted`, so membership is decided in O(log n) instead of scanning
  every episode.
common_mistakes:
  - Returning the index instead of a boolean.
  - Using `while lo < hi` and missing a match when the window shrinks to one element.
  - Moving lo or hi to mid instead of mid + 1 / mid - 1, causing an infinite loop.
