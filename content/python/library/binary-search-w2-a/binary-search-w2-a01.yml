prompt_markdown: |
  A podcast archive stores its released episode numbers in strictly ascending
  order. Write `has_episode(data)` where `data` is a dict with keys `episodes`
  (the sorted list of numbers) and `wanted` (the episode number to look up).

  Return `True` if `wanted` appears in `episodes`, otherwise `False`. Use binary
  search so the check stays fast even for a long-running show.
starter_code: |
  def has_episode(data):
      return False
function_name: has_episode
solution_sketch: Halve the search window each step and report whether the middle value ever equals the target.
sample_solution: |
  def has_episode(data):
      episodes = data["episodes"]
      wanted = data["wanted"]
      lo, hi = 0, len(episodes) - 1
      while lo <= hi:
          mid = (lo + hi) // 2
          if episodes[mid] == wanted:
              return True
          if episodes[mid] < wanted:
              lo = mid + 1
          else:
              hi = mid - 1
      return False
hints:
  - level: 1
    text: Because the list is sorted you can discard half of it after each comparison.
  - level: 2
    text: Keep a low and high index and inspect the middle episode number between them.
  - level: 3
    text: Return True on an exact match; if the window empties without one, return False.
