    - name: single_false
      input: [false]
      expected: -1
explanation_markdown: |
  A sorted run of `False` then `True` is exactly the setup binary search needs:
  the reading flips from unripe to ripe once. A lower-bound search finds that
  boundary in O(log n). If it lands past the end of the belt, every pear was
  still unripe, so the answer is -1.
common_mistakes:
  - Scanning from the front, which is O(n) and ignores the sorted structure.
  - Moving lo to mid instead of mid + 1 when the middle reading is False, causing an infinite loop.
  - Forgetting to check whether the boundary actually points at a True reading.
