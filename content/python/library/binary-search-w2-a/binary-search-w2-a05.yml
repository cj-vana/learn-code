prompt_markdown: |
  A ripeness scanner walks a conveyor belt of pears ordered from greenest to
  ripest. Because they are sorted, the readings are a run of `False` (unripe)
  followed by a run of `True` (ripe). Write `first_ripe(readings)` where
  `readings` is that list of booleans.

  Return the index of the first ripe pear, or `-1` if none are ripe. Use binary
  search rather than scanning from the front.
starter_code: |
  def first_ripe(readings):
      return -1
function_name: first_ripe
solution_sketch: Binary search for the leftmost index whose reading is True, then confirm one exists.
sample_solution: |
  def first_ripe(readings):
      lo, hi = 0, len(readings)
      while lo < hi:
          mid = (lo + hi) // 2
          if readings[mid]:
              hi = mid
          else:
              lo = mid + 1
      if lo < len(readings):
          return lo
      return -1
hints:
  - level: 1
    text: All the False readings come before all the True ones, so there is a single crossover point.
  - level: 2
    text: When the middle reading is True, the first True is at mid or to its left; otherwise it is to the right.
  - level: 3
    text: If the search settles past the last index, no pear is ripe, so return -1.
tests:
  public:
    - name: middle
      input: [false, false, true, true]
      expected: 2
    - name: all_ripe
      input: [true, true, true]
