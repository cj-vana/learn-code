explanation_markdown: |
  In a sorted list, every age within `[low, high]` sits in one contiguous block.
  A lower-bound search finds the first age at least `low`, and a lower-bound search
  for `high + 1` finds the first age past `high`. The gap between those indices is
  the count, found in two O(log n) searches.
common_mistakes:
  - Searching for high instead of high + 1 and dropping ages equal to high.
  - Returning one of the boundary indices rather than their difference.
  - Adding an off-by-one fudge instead of using a clean upper boundary.
