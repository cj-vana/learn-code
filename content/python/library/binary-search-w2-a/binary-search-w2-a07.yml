prompt_markdown: |
  A science museum logs every visitor's age for the day in a list sorted in
  ascending order. Write `count_in_band(data)` where `data` has keys `ages` (the
  sorted list), `low`, and `high` (both whole-year ages).

  Return how many logged ages fall within the inclusive range `low` to `high`.
  Use binary search to find the two boundaries instead of counting each visitor.
starter_code: |
  def count_in_band(data):
      return 0
function_name: count_in_band
solution_sketch: Binary search the first index at or above low and the first index above high, then subtract.
sample_solution: |
  def count_in_band(data):
      ages = data["ages"]
      low = data["low"]
      high = data["high"]

      def bound(x):
          lo, hi = 0, len(ages)
          while lo < hi:
              mid = (lo + hi) // 2
              if ages[mid] < x:
                  lo = mid + 1
              else:
                  hi = mid
          return lo

      return bound(high + 1) - bound(low)
hints:
  - level: 1
    text: Ages inside the band form one contiguous stretch because the list is sorted.
  - level: 2
    text: Find where ages reach low and where they first pass high using boundary searches.
  - level: 3
    text: Searching for high + 1 gives the first index past the band; subtract the low boundary from it.
