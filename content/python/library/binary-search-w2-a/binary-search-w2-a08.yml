explanation_markdown: |
  Filing ties last is an upper-bound search: the target index is the first spot
  whose stamp is strictly greater than `new_stamp`. Counting stamps less than or
  equal to `new_stamp` as belonging to the left half slides the window past every
  equal timestamp, landing on the correct insertion point in O(log n).
common_mistakes:
  - Using `<` instead of `<=` and filing the new document before existing ties.
  - Setting the initial high to len(stamps) - 1 and never allowing an append at the end.
  - Returning a found value instead of the insertion index.
