prompt_markdown: |
  A digital filing cabinet keeps document timestamps in a list sorted in
  ascending order. A new document must be filed **after** any existing documents
  that share its timestamp. Write `file_position(data)` where `data` has keys
  `stamps` (the sorted list) and `new_stamp` (the incoming timestamp).

  Return the index at which `new_stamp` should be inserted to keep the list sorted
  while placing ties last. Use binary search.
starter_code: |
  def file_position(data):
      return 0
function_name: file_position
solution_sketch: Binary search for the first index whose stamp is strictly greater than new_stamp.
sample_solution: |
  def file_position(data):
      stamps = data["stamps"]
      new_stamp = data["new_stamp"]
      lo, hi = 0, len(stamps)
      while lo < hi:
          mid = (lo + hi) // 2
          if stamps[mid] <= new_stamp:
              lo = mid + 1
          else:
              hi = mid
      return lo
hints:
  - level: 1
    text: To file ties last, you need the position just after the final equal timestamp.
  - level: 2
    text: That is the first index whose stamp is strictly greater than new_stamp.
  - level: 3
    text: Treat stamps equal to new_stamp as belonging to the left half so the search moves past them.
