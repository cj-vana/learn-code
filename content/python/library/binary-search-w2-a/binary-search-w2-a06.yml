explanation_markdown: |
  Comparing a sample with its right neighbor reveals which way the trail slopes at
  that point: a downhill step means the valley lies to the right, while a level or
  uphill step means the valley is at that sample or to its left. Following the
  downhill direction narrows the window to the single lowest point in O(log n).
common_mistakes:
  - Comparing with the left neighbor and indexing out of range at mid - 1.
  - Returning the index instead of the elevation value there.
  - Using `while lo <= hi`, which can read elevations[mid + 1] past the end.
