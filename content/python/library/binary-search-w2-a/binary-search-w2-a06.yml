prompt_markdown: |
  A hiking trail's elevation samples strictly descend to a single lowest point
  and then strictly ascend. Write `lowest_point(elevations)` where `elevations`
  is that non-empty list of readings (a purely descending or purely ascending
  trail is allowed, with the valley at an end).

  Return the lowest elevation value. Use binary search by comparing each middle
  sample with its right neighbor rather than scanning the whole trail.
starter_code: |
  def lowest_point(elevations):
      return 0
function_name: lowest_point
solution_sketch: Binary search toward the descending side by comparing each midpoint with its right neighbor.
sample_solution: |
  def lowest_point(elevations):
      lo, hi = 0, len(elevations) - 1
      while lo < hi:
          mid = (lo + hi) // 2
          if elevations[mid] > elevations[mid + 1]:
              lo = mid + 1
          else:
              hi = mid
      return elevations[lo]
hints:
  - level: 1
    text: If the middle sample is higher than the one just after it, the trail is still going down, so the valley is to the right.
  - level: 2
    text: Otherwise the trail is already climbing at mid, so the valley is at mid or to its left.
  - level: 3
    text: Shrink the window until lo meets hi; that index holds the lowest elevation.
