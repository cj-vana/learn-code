prompt_markdown: |
  A bus stop posts its departure times as minutes past midnight, sorted in
  ascending order. Write `last_departure(data)` where `data` has keys `times`
  (the sorted list) and `arrival` (the minute you reach the stop).

  Return the latest departure time that is **at or before** `arrival`, or `-1` if
  every bus has already left. Use binary search.
starter_code: |
  def last_departure(data):
      return -1
function_name: last_departure
solution_sketch: Binary search for the rightmost time that does not exceed arrival, remembering the best candidate.
sample_solution: |
  def last_departure(data):
      times = data["times"]
      arrival = data["arrival"]
      lo, hi = 0, len(times) - 1
      best = -1
      while lo <= hi:
          mid = (lo + hi) // 2
          if times[mid] <= arrival:
              best = times[mid]
              lo = mid + 1
          else:
              hi = mid - 1
      return best
hints:
  - level: 1
    text: You want the largest departure value that is still not after your arrival minute.
  - level: 2
    text: When the middle time fits, record it and keep searching to its right for an even later one.
  - level: 3
    text: If no time ever fits, the best you can report is -1.
