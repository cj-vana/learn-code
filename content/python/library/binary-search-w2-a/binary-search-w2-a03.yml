explanation_markdown: |
  This is a "floor" search: the answer is the largest time less than or equal to
  `arrival`. Each time the middle value fits, it becomes the best candidate and
  the search moves right to look for a later one; otherwise the search moves left.
  The whole thing runs in O(log n).
common_mistakes:
  - Returning an index rather than the departure time itself.
  - Overwriting the best candidate when the middle time is already too late.
  - Forgetting the -1 case when every bus departs before you arrive.
