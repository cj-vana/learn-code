explanation_markdown: |
  Equal weights form one contiguous block in a sorted list. A lower-bound search
  finds where that block starts and an upper-bound search finds where it ends, so
  the count is the gap between the two indices. Two O(log n) searches beat a full
  O(n) scan on a large batch.
common_mistakes:
  - Returning a boundary index instead of the difference between the two.
  - Using `<=` in the lower-bound comparison and skipping the first equal weight.
  - Assuming the weights might be unsorted and re-sorting unnecessarily.
