prompt_markdown: |
  A bakery weighs every loaf at closing and records the grams in a list sorted
  in ascending order. Write `count_at_weight(data)` where `data` has keys
  `weights` (the sorted list) and `target` (a weight in grams).

  Return how many loaves weigh exactly `target`. Use binary search to find the
  first and just-past-last positions of `target` instead of counting one by one.
starter_code: |
  def count_at_weight(data):
      return 0
function_name: count_at_weight
solution_sketch: Binary search the first index at or above target and the first index above target, then subtract.
sample_solution: |
  def count_at_weight(data):
      weights = data["weights"]
      target = data["target"]

      def bound(x):
          lo, hi = 0, len(weights)
          while lo < hi:
              mid = (lo + hi) // 2
              if weights[mid] < x:
                  lo = mid + 1
              else:
                  hi = mid
          return lo

      return bound(target + 1) - bound(target)
hints:
  - level: 1
    text: The equal values sit together in one contiguous run because the list is sorted.
  - level: 2
    text: Find the first index whose weight is at least target, then the first index whose weight is above target.
  - level: 3
    text: The count is the distance between those two boundary indices.
