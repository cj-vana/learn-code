prompt_markdown: |
  A grocery crew builds a triangular display of soup cans: row 1 holds 1 can,
  row 2 holds 2 cans, and row k holds k cans. Write `complete_rows(total)` where
  `total` is the whole number of cans available.

  Return the greatest number of **complete** rows they can build. A row of k cans
  needs `k * (k + 1) / 2` cans in total up to and including it, so binary search
  the answer instead of adding rows one at a time.
starter_code: |
  def complete_rows(total):
      return 0
function_name: complete_rows
solution_sketch: Binary search the row count r, keeping the largest r whose triangular number stays within total.
sample_solution: |
  def complete_rows(total):
      lo, hi = 0, total
      best = 0
      while lo <= hi:
          mid = (lo + hi) // 2
          if mid * (mid + 1) // 2 <= total:
              best = mid
              lo = mid + 1
          else:
              hi = mid - 1
      return best
hints:
  - level: 1
    text: The cans needed to finish r rows is the triangular number r * (r + 1) / 2, which only grows as r grows.
  - level: 2
    text: That monotonic growth means you can binary search the largest r that still fits within total.
  - level: 3
    text: When a candidate r fits, record it and search higher; otherwise search lower.
