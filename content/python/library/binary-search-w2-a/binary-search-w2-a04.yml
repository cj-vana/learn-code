explanation_markdown: |
  Finishing r rows always costs the triangular number `r * (r + 1) / 2`, and that
  cost strictly increases with r. Because the "does r fit?" test flips from true
  to false exactly once, binary search over r lands on the largest complete count
  in O(log total) checks rather than looping row by row.
common_mistakes:
  - Looping row by row, which is slower and misses the point of the exercise.
  - Comparing against total with `<` and rejecting a triangle that fits exactly.
  - Returning the triangular number instead of the row count r.
