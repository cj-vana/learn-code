explanation_markdown: |
  `PurePosixPath.is_relative_to` asks whether one path can be reached by
  extending the other, comparing them one whole component at a time. That
  component-level view is exactly what makes it immune to the name-prefix trap:
  `database` and `data` are different components even though one string starts
  with the other, so `/var/database` is not inside `/var/data`.

  Because a path equal to the base is trivially "relative to" itself, equality
  returns `True` without a special case. And since an absolute path and a
  relative path have different anchors (`/` versus the first name), they can
  never contain one another, giving the `False` you want for a mixed pair.
common_mistakes:
  - Comparing raw strings with `startswith`, which wrongly reports `/var/database` as inside `/var/data`.
  - Forgetting that an exactly-equal path should count as contained and adding an incorrect strict-descendant check.
  - Not wrapping both values in PurePosixPath, so the anchor and component logic never runs.
