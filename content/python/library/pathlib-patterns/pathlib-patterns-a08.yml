prompt_markdown: |
  A harbor's cargo system only clears a delivery if its storage location sits
  inside the zone the courier is authorized for. Locations are POSIX-style path
  strings, and a delivery is allowed when its path is the authorized zone
  itself or lies somewhere beneath it.

  Write `is_subpath(payload)` where `payload` is a dictionary with two keys:

  - `"path"` — the delivery's storage location.
  - `"base"` — the authorized zone.

  Return `True` if `path` is the same location as `base` or is nested somewhere
  beneath `base`, and `False` otherwise. Rules:

  - Containment is measured **by whole path components**, never by matching
    partial names. So the zone `harbor/dock-4` does **not** contain
    `harbor/dock-40`, and `/var/data` does **not** contain `/var/database`.
  - A path exactly equal to the base counts as contained: with
    `path = "harbor/dock-4"` and `base = "harbor/dock-4"`, return `True`.
  - A relative path is never inside an absolute base and vice versa, so
    `path = "a/b"` with `base = "/a"` returns `False`.
  - Assume the inputs contain no `.` or `..` segments.

  Work purely on the path strings; never touch a real filesystem.
starter_code: |
  from pathlib import PurePosixPath


