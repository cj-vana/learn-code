solution_sketch: Map each character to an underscore if it is reserved or a control code, else keep it; collapse consecutive underscores; strip spaces, dots, and underscores from both ends; fall back to "untitled" when empty.
sample_solution: |
  def sanitize_filename(name):
      reserved = set('<>:"/\\|?*')
      swapped = []
      for ch in name:
          if ch in reserved or ord(ch) < 32:
              swapped.append("_")
          else:
              swapped.append(ch)
      collapsed = []
      for ch in swapped:
          if ch == "_" and collapsed and collapsed[-1] == "_":
              continue
          collapsed.append(ch)
      cleaned = "".join(collapsed).strip(" \t._")
      return cleaned if cleaned else "untitled"
