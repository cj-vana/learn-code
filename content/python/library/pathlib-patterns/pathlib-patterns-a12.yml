explanation_markdown: |
  The cleaning is a small pipeline. First a character-by-character pass swaps in
  an underscore for anything dangerous: the fixed reserved set of separators and
  shell/OS-hostile punctuation, plus every ASCII control character (ordinal
  below 32). Everything else — ordinary letters, accented letters, digits,
  hyphens, dots, and interior spaces — is copied through untouched, which is why
  `café münü.txt` survives intact.

  The second pass collapses underscore runs so a burst of reserved characters
  does not leave a long `____` scar, and it folds pre-existing double
  underscores too. The final `.strip(" \t._")` trims the noise that tends to
  cluster at the ends: leading/trailing spaces, the dots that some systems
  forbid at the edges, and leftover underscores. That single strip is what turns
  the traversal attempt `..\..\etc\passwd` into `etc_passwd` after its
  backslashes become underscores. When cleaning erases everything, the
  `"untitled"` fallback guarantees a usable name.
common_mistakes:
  - Stripping accented or other non-ASCII letters as if they were illegal; only the fixed reserved set and control characters should be replaced.
  - Skipping the run-collapse step, leaving multi-underscore scars like `log_2026___draft_`.
  - Forgetting the empty-result fallback, so inputs made entirely of reserved characters return `""` instead of `"untitled"`.
