prompt_markdown: |
  A neighbourhood bakery lets customers type a label for each custom order, and
  those labels become file names on the pickup board. Raw input is messy, so it
  has to be cleaned into a safe file name first.

  Write `sanitize_filename(name)` that returns a cleaned name by applying these
  rules **in order**:

  1. Replace every character that is a path separator or reserved character —
     any of `<`, `>`, `:`, `"`, `/`, `\`, `|`, `?`, `*` — or any ASCII control
     character (code point below 32) with a single underscore `_`.
  2. Collapse every run of consecutive underscores (including underscores that
     were already in the text) down to a single underscore.
  3. Strip any leading and trailing spaces, dots, and underscores.
  4. Keep every other character exactly as-is, including letters with accents
     and spaces in the middle of the name; preserve the original case.
  5. If nothing survives the cleaning, return the literal `"untitled"`.

  Worked examples:

  - `sanitize_filename("my/photo:final.png")` returns `"my_photo_final.png"`.
  - `sanitize_filename("  ..resume.doc.. ")` returns `"resume.doc"`.
  - `sanitize_filename("///")` returns `"untitled"` (every character becomes an
    underscore, they collapse to one, and stripping removes it).
  - `sanitize_filename("my__file.txt")` returns `"my_file.txt"` (an existing
    double underscore collapses too).
  - `sanitize_filename("café münü.txt")` returns `"café münü.txt"` (accented
    letters and internal spaces are not reserved, so they stay).

  Operate purely on the string; never touch a real filesystem.
