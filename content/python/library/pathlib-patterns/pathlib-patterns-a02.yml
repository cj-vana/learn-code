explanation_markdown: |
  Where `.suffix` gives the extension, `.stem` gives everything else in the final
  component: the name minus its last extension. `PurePosixPath` computes this
  purely from the string, so a trailing slash (`vault/`) is normalised away and
  the last real component is used. Only one extension is peeled, which is why
  `field.tar.gz` becomes `field.tar` rather than `field`. Hidden files such as
  `.seedlog` have no extension to strip, so the stem is the whole name including
  the leading dot. Relying on the attribute avoids fragile hand-written splits
  that mishandle multi-dot names and directories.
common_mistakes:
  - Using rsplit(".", 1) and dropping the wrong piece, which mangles hidden names like ".seedlog".
  - Stripping every extension so "field.tar.gz" collapses to "field" instead of "field.tar".
  - Forgetting the trailing slash case, then returning "" for "vault/" instead of "vault".
