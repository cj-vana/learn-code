prompt_markdown: |
  A wildlife sound archive stores every take under a path like
  `sessions/reef/hydrophone.wav`. To print a clean label you need the take's
  **stem**: the final path component with its extension removed.

  Write `get_stem(path_str)` that returns the stem of the last component. The
  rules:

  - `sessions/reef/hydrophone.wav` returns `hydrophone`.
  - A name with no extension returns itself: `harbor/manifest` returns
    `manifest`.
  - Only the final extension is stripped: `field.tar.gz` returns `field.tar`.
  - A hidden name keeps its leading dot: `.seedlog` returns `.seedlog`.
  - A trailing slash is ignored: `vault/` returns `vault`.

  Use `pathlib.PurePosixPath` so the parsing is pure string logic with no
  filesystem access.
starter_code: |
  from pathlib import PurePosixPath


  def get_stem(path_str):
      return ""
function_name: get_stem
input_mode: function
solution_sketch: Wrap the string in PurePosixPath and return its .stem attribute, which is the final component with only its last extension removed.
sample_solution: |
  from pathlib import PurePosixPath


  def get_stem(path_str):
      return PurePosixPath(path_str).stem
