prompt_markdown: |
  A museum's cold-storage vault records every artifact by a POSIX-style
  location path such as `vault/aisle-3/shelf/box-12`. When a curator pulls an
  item, the audit trail needs the full chain of enclosing halls, from the
  location's immediate container outward to the top.

  Write `parent_chain(path_str)` that returns a list of ancestor path strings,
  in order from the immediate parent first up to and including the top-most
  anchor. Match `pathlib`'s own `.parents` behaviour exactly:

  - For a **relative** path the last element is `.` (the current-directory
    anchor). Example: `parent_chain("vault/aisle-3/shelf/box-12")` returns
    `["vault/aisle-3/shelf", "vault/aisle-3", "vault", "."]`.
  - For an **absolute** path the last element is `/` (the root). Example:
    `parent_chain("/home/keeper")` returns `["/home", "/"]`.
  - A path that is already the root `/` or the bare current directory `.` has
    no ancestors, so return an empty list `[]`.
  - A single-component relative name such as `ledger.txt` has exactly one
    ancestor, `.`, so return `["."]`.

  Treat the path as text with forward slashes; do not touch any real
  filesystem.
starter_code: |
  from pathlib import PurePosixPath


  def parent_chain(path_str):
      return []
function_name: parent_chain
input_mode: function
solution_sketch: Wrap the string in PurePosixPath, iterate its .parents view, and stringify each ancestor into a list.
sample_solution: |
  from pathlib import PurePosixPath


  def parent_chain(path_str):
      return [str(ancestor) for ancestor in PurePosixPath(path_str).parents]
