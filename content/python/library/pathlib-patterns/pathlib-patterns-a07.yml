explanation_markdown: |
  `PurePosixPath` parses a path purely as text, so this works with no disk
  access and stays deterministic. Its `.parents` attribute is a lazy sequence
  that already yields ancestors from the closest parent outward to the anchor,
  which is exactly the order the audit trail wants. Converting each entry with
  `str()` turns the path objects back into plain strings.

  The anchor is the tell for whether a path is absolute or relative: relative
  chains bottom out at `.`, absolute chains bottom out at `/`. A path that *is*
  the anchor (`/` or `.`) has nothing enclosing it, so `.parents` is empty and
  the comprehension naturally returns `[]`.
common_mistakes:
  - Reversing the order by walking from the root down instead of from the immediate parent outward.
  - Forgetting that relative paths end at `.` and absolute paths end at `/`, so the final anchor is dropped or wrong.
  - Returning PurePosixPath objects instead of strings, which fails the equality check against the expected list.
