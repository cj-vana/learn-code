explanation_markdown: |
  `PurePosixPath(*parts)` is the pure-path way to join segments, and it bakes in
  several POSIX rules for free. Adjacent and trailing slashes collapse, empty
  strings are dropped, and — the surprising one — a segment that begins with `/`
  is absolute and **resets** the whole path, throwing away everything before it.
  That reset behaviour is why blindly concatenating user-supplied segments with
  `"/".join(...)` can silently produce the wrong key. An empty argument list
  yields `PurePosixPath()`, whose string form is `.`. Splatting the list lets one
  constructor call handle every case instead of a hand-rolled loop.
common_mistakes:
  - Using "/".join(parts), which keeps doubled slashes and does not apply the absolute-segment reset rule.
  - Passing the list itself, PurePosixPath(parts), instead of splatting it with PurePosixPath(*parts).
  - Returning the PurePosixPath object rather than str(...) of it, so the value never matches the expected string.
