prompt_markdown: |
  A parts warehouse builds a storage key by joining a list of segments, so
  `["aisle7", "binC", "bolt.m8"]` becomes `aisle7/binC/bolt.m8`.

  Write `join_paths(parts)` that joins a list of segment strings into a single
  path string using `pathlib.PurePosixPath`. The rules, which are exactly how
  `PurePosixPath` combines its arguments:

  - `["aisle7", "binC", "bolt.m8"]` returns `aisle7/binC/bolt.m8`.
  - An empty list has no segments; return `'.'` (the current-directory marker an
    empty `PurePosixPath()` produces).
  - If a segment is an absolute path (it starts with `/`), it **resets** the key:
    `["home/ada", "/var", "log"]` returns `/var/log`.
  - Redundant and trailing slashes collapse: `["a//b", "c"]` returns `a/b/c` and
    `["a/", "b"]` returns `a/b`.
  - Empty-string segments are skipped: `["ledger", "", "notes.txt"]` returns
    `ledger/notes.txt`.

  Pass the segments straight into `PurePosixPath(*parts)` and return its string
  form. No filesystem is ever touched.
starter_code: |
  from pathlib import PurePosixPath


  def join_paths(parts):
      return ""
function_name: join_paths
input_mode: function
solution_sketch: Splat the list into PurePosixPath(*parts) so every joining rule is applied, then return str() of the result; an empty list yields PurePosixPath('.').
sample_solution: |
  from pathlib import PurePosixPath


  def join_paths(parts):
      return str(PurePosixPath(*parts))
