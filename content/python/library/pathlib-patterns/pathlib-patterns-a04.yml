explanation_markdown: |
  `os.path.normpath` folds a path lexically: it drops `.` segments, cancels each
  `..` against the segment before it, and squeezes runs of `/` down to one. It
  does all of this as string arithmetic, never asking the operating system
  whether a path exists, which is why it is safe and deterministic in a sandbox.
  Two behaviours are worth remembering. On an absolute path, `..` cannot rise
  above the root, so `/var/../../etc` clamps to `/etc`. On a relative path there
  is no known root, so a leading `..` is preserved (`../attic` stays put). Note
  that `pathlib.PurePath` intentionally does **not** collapse `..`, because that
  would change meaning in the presence of symlinks — so `os.path.normpath` is the
  right tool when you specifically want the lexical fold.
common_mistakes:
  - Reaching for PurePosixPath and expecting it to resolve "..", which it deliberately leaves untouched.
  - Assuming ".." on an absolute path can escape the root, instead of being clamped there.
  - Returning "" for the empty-string input rather than the "." that normpath produces.
