prompt_markdown: |
  A harbor logs the route a crate takes between docks as a string like
  `dock/west/../east`, full of detours and doubled slashes. Before storing it the
  system normalizes the route **lexically** — collapsing `.`, `..`, and repeated
  slashes purely as text, without ever consulting a real map.

  Write `normalize_path(path_str)` that returns the normalized path using
  `os.path.normpath`. The rules:

  - `dock/./crate` returns `dock/crate` (a lone `.` means "stay put").
  - `dock/west/../east` returns `dock/east` (`..` cancels the previous segment).
  - `dock//crate` returns `dock/crate` (repeated slashes collapse to one).
  - An empty string returns `'.'`.
  - A `..` that would climb above an absolute root is clamped:
    `/var/../../etc` returns `/etc`.
  - A leading `..` on a relative path is kept: `../attic` returns `../attic`.

  Because this is pure string math, it never checks whether any dock exists.
