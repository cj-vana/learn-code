prompt_markdown: |
  A shipping line stores every manifest under a POSIX-style path. To fold many
  manifests into a single shared folder, the dispatcher needs the longest
  directory that **all** of the paths share as a leading run of components.

  Write `common_path_prefix(path_strs)` that takes a list of path strings and
  returns the longest shared leading path, joined back into a single string.

  - Compare **component by component**, never by partial characters.
    `["orchard/apple", "orchard/apricot"]` share only `orchard`, giving
    `"orchard"` — not `"orchard/ap"`.
  - When every path lands in the same folder, return it:
    `["fleet/ship-a/log", "fleet/ship-a/cargo", "fleet/ship-a/crew/list"]`
    returns `"fleet/ship-a"`.
  - Absolute paths share the root `/` as their first component, so
    `["/srv/www/index", "/srv/www/style", "/srv/www"]` returns `"/srv/www"`.
  - A mix of absolute and relative paths shares no leading component (their
    anchors differ), so return `""`.
  - If the paths share no leading component at all, return `""`.
  - An **empty input list** returns `""`.
  - A list with a **single path** returns that path unchanged.

  Assume the paths contain no `.` or `..` segments. Work on the path strings
  only; never read a real filesystem.
