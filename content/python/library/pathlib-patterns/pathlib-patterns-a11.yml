explanation_markdown: |
  Splitting each path into `PurePosixPath(...).parts` reduces the problem to a
  longest-common-prefix over lists of whole components. `zip(*part_lists)`
  transposes the paths into columns; the first column holds every path's first
  component, the second holds every second component, and so on. You collect a
  column only while all of its entries agree, and the moment one disagrees the
  shared prefix ends.

  Comparing components rather than characters is the crux: `apple` and
  `apricot` overlap in the letters `ap`, but as folder names they are simply
  different, so the shared route stops at `orchard`. Rebuilding with
  `PurePosixPath(*common)` restores the root anchor for absolute paths and joins
  relative names with `/`. Mixed absolute and relative inputs disagree in their
  very first component (`/` versus a name), so the shared prefix is empty and
  you return `""`.
common_mistakes:
  - Using string-level `os.path.commonprefix`-style character matching, which would return `orchard/ap` instead of `orchard`.
  - Forgetting the empty-list and single-path guards, causing an error or a wrong empty result.
  - Joining the shared components with a bare `"/".join`, which mishandles the absolute-path root anchor.
