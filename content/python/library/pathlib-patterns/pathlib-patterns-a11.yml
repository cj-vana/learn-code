solution_sketch: Split each path into PurePosixPath.parts, walk the zipped columns collecting components that agree across all paths, stop at the first mismatch, then rejoin the shared components into a path string.
sample_solution: |
  from pathlib import PurePosixPath


  def common_path_prefix(path_strs):
      if not path_strs:
          return ""
      part_lists = [PurePosixPath(p).parts for p in path_strs]
      common = []
      for column in zip(*part_lists):
          first = column[0]
          if all(part == first for part in column):
              common.append(first)
          else:
              break
      if not common:
          return ""
      return str(PurePosixPath(*common))
