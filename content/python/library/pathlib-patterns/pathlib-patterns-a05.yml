function_name: relative_path
input_mode: function
solution_sketch: Pull base and target from the dict, then return str(PurePosixPath(target).relative_to(base, walk_up=True)); walk_up lets the result include ".." when the target is not under the base.
sample_solution: |
  from pathlib import PurePosixPath


  def relative_path(job):
      base = job["base"]
      target = job["target"]
      return str(PurePosixPath(target).relative_to(base, walk_up=True))
