prompt_markdown: |
  A botanical greenhouse gives every bed a path like `greenhouse/beds/row3`. A
  watering robot standing at one bed needs directions to another: the **relative
  path** from a base location to a target.

  Write `relative_path(job)` where `job` is a single dict with two keys:

      {"base": "greenhouse/beds", "target": "greenhouse/beds/row3/tomato.txt"}

  Return the target expressed relative to `base`, as a string. The rules:

  - When the target sits inside the base, you just descend: the example returns
    `row3/tomato.txt`.
  - When the target is a sibling, step up with `..`: base
    `greenhouse/beds/north`, target `greenhouse/beds/south` returns `../south`.
  - When base and target are the same location, return `'.'`.
  - Climbing out entirely is allowed: base `greenhouse/beds/north`, target
    `greenhouse` returns `../..`.
  - `base` and `target` are always **both relative or both absolute**, so the
    comparison is purely lexical.

  Use `pathlib.PurePosixPath(target).relative_to(base, walk_up=True)`, which works
  out the needed `..` steps for you and never touches the filesystem.
