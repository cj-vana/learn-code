explanation_markdown: |
  `relative_to` answers "starting at `base`, how do I reach `target`?" Without
  `walk_up`, it only succeeds when the target lives underneath the base and raises
  `ValueError` otherwise. Passing `walk_up=True` (available since Python 3.12)
  lets it emit `..` steps to first climb out of the base and then descend, which
  is what you need for siblings and cousins. The computation is entirely lexical:
  it compares the two paths as sequences of parts, so both must be the same kind —
  both relative or both absolute — which the prompt guarantees. Identical paths
  collapse to `.`. This keeps the whole operation deterministic and filesystem-free,
  unlike `os.path.relpath`, which anchors relative inputs against the process's
  current directory.
common_mistakes:
  - Calling relative_to without walk_up=True, which raises ValueError as soon as the target is not inside the base.
  - Treating the input as two positional arguments instead of one dict with "base" and "target" keys.
  - Returning the PurePosixPath object instead of str(...), so it never equals the expected string.
