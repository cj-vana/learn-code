prompt_markdown: |
  A photo studio versions its prints by tucking a short marker onto the end of
  the file name but *before* the extension, so `photo.png` becomes
  `photo-thumb.png` rather than `photo.png-thumb`. The folder the file lives in
  must stay exactly where it is.

  Write `build_path_with_suffix(payload)` where `payload` is a dictionary with:

  - `"path"` — a POSIX-style path string to a file.
  - `"marker"` — the text to insert right after the file's stem.

  Return the rebuilt path string. Rules:

  - Insert the marker immediately after the stem and before the **final**
    extension. `{"path": "report.txt", "marker": "_final"}` gives
    `"report_final.txt"`.
  - Only the last suffix counts as the extension. For `archive.tar.gz` the stem
    is `archive.tar` and the extension is `.gz`, so
    `{"path": "data/archive.tar.gz", "marker": "_v2"}` gives
    `"data/archive.tar_v2.gz"`.
  - A name with **no extension** gets the marker appended to the whole name:
    `{"path": "README", "marker": "_old"}` gives `"README_old"`.
  - A **dotfile** like `.gitignore` is treated as an extensionless name (the
    leading dot is part of the name), so
    `{"path": ".gitignore", "marker": "_bak"}` gives `".gitignore_bak"`.
  - The directory portion, absolute or relative, is preserved unchanged.

  Operate on the path string only; never touch a real filesystem.
starter_code: |
  from pathlib import PurePosixPath


  def build_path_with_suffix(payload):
      return ""
function_name: build_path_with_suffix
input_mode: function
solution_sketch: Wrap the path in PurePosixPath, then use with_stem to replace the stem with stem + marker; the extension and parent are kept automatically.
sample_solution: |
  from pathlib import PurePosixPath


  def build_path_with_suffix(payload):
      path = PurePosixPath(payload["path"])
      return str(path.with_stem(path.stem + payload["marker"]))
