explanation_markdown: |
  `PurePosixPath` splits a name into a `stem` and a `suffix`, where the suffix
  is only the final `.ext`. Building `path.stem + marker` and handing it to
  `with_stem` reattaches the original suffix and keeps the parent directory, so
  the marker always lands in the one spot you want: after the base name, before
  the extension.

  The tricky names resolve themselves once you trust pathlib's definitions. For
  `archive.tar.gz` the stem is `archive.tar`, so the marker goes before `.gz`.
  For `README` and `.gitignore` the suffix is empty, so `with_stem` just gives
  a name that ends with the marker. A leading dot is treated as part of the
  name, not an extension, which is why `.gitignore` has no suffix.
common_mistakes:
  - Appending the marker to the whole path so it lands after the extension (`report.txt_final`).
  - Slicing on the first dot instead of the last, which mangles double extensions like `archive.tar.gz`.
  - Treating `.gitignore` as having extension `.gitignore`, producing an empty stem and the wrong result.
