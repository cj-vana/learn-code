explanation_markdown: |
  `PurePosixPath(path_str).parts` gives you the fully parsed segment tuple
  without any string juggling. The library folds three edge cases into that one
  attribute: it prepends the root anchor `/` as a distinct component for
  absolute paths, it collapses redundant and trailing separators so
  `recipes/soup/` and `recipes/soup` agree, and it treats `""` and `.` as the
  current directory, which has no named parts.

  Splitting on `"/"` by hand tends to leave stray empty strings from leading or
  trailing slashes and loses the notion of an anchor entirely. Leaning on
  `.parts` keeps the catalog indexer correct and short.
common_mistakes:
  - Using `path_str.split("/")`, which leaves an empty string at the front of absolute paths and at the end of trailing-slash paths.
  - Expecting the empty string or `.` to produce `[""]` or `["."]` instead of an empty list.
  - Returning the raw tuple from `.parts` when the caller compares against a list.
