prompt_markdown: |
  An observatory catalogues each instrument reading by a POSIX-style path such
  as `/observatory/dome/mirror.glass`. The indexer needs every path broken into
  its ordered segments so it can nest them under folders in the catalog tree.

  Write `split_path_components(path_str)` that returns a list of the path's
  components, in order, exactly as `pathlib` reports them:

  - For an **absolute** path the first component is the root anchor `/`. So
    `split_path_components("/observatory/dome/mirror.glass")` returns
    `["/", "observatory", "dome", "mirror.glass"]`.
  - For a **relative** path there is no anchor element:
    `split_path_components("kitchen/pantry/jar")` returns
    `["kitchen", "pantry", "jar"]`.
  - A **trailing slash carries no component**, so `recipes/soup/` splits the
    same as `recipes/soup` into `["recipes", "soup"]`.
  - The empty string `""` and the bare current directory `.` have no
    components at all, so both return `[]`.

  Parse the path as text with forward slashes; never read a real filesystem.
starter_code: |
  from pathlib import PurePosixPath


  def split_path_components(path_str):
      return []
function_name: split_path_components
input_mode: function
solution_sketch: Wrap the string in PurePosixPath and return list(path.parts); the anchor, trailing-slash, and empty cases fall out of pathlib's own parsing.
sample_solution: |
  from pathlib import PurePosixPath


  def split_path_components(path_str):
      return list(PurePosixPath(path_str).parts)
hints:
  - level: 1
    text: Splitting on "/" by hand invites trouble with anchors and trailing slashes. A pure path object already exposes its parsed segments.
  - level: 2
    text: Look at `PurePosixPath(path_str).parts`; it is a tuple that includes the root anchor for absolute paths and drops empty trailing segments.
  - level: 3
    text: Return `list(PurePosixPath(path_str).parts)`. The empty string and `.` both parse to no components, giving `[]` automatically.
