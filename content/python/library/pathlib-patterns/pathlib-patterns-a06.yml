explanation_markdown: |
  `with_suffix` returns a **new** `PurePosixPath` with the final extension
  swapped for the one you pass. If the name already has an extension it is
  replaced; if it has none, `with_suffix` appends the new one; and passing an
  empty string removes the extension entirely. Only the last extension is
  affected, so `field.tar.gz` becomes `field.tar.zip`. Two rules are easy to
  forget: a non-empty argument must include its leading dot (`with_suffix("png")`
  raises `ValueError`), and a hidden file such as `.seedlog` has no extension, so
  `with_suffix(".txt")` appends to give `.seedlog.txt`. Because `PurePosixPath`
  never reads a disk, this transformation is a safe, deterministic string
  operation.
common_mistakes:
  - Concatenating the new extension onto the raw string, which fails to strip the old one and yields "aurora.jpg.png".
  - Passing a suffix without the leading dot, so with_suffix raises ValueError.
  - Returning the PurePosixPath object instead of str(...), leaving the value unequal to the expected string.
