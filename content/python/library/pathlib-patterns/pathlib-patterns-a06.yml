function_name: change_extension
input_mode: function
solution_sketch: Read path and new_ext from the dict, then return str(PurePosixPath(path).with_suffix(new_ext)); with_suffix replaces the final extension, adds one when absent, and removes it when new_ext is "".
sample_solution: |
  from pathlib import PurePosixPath


  def change_extension(job):
      return str(PurePosixPath(job["path"]).with_suffix(job["new_ext"]))
