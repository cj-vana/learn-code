prompt_markdown: |
  A print gallery re-exports its scans into whatever format a client asks for, so
  it rewrites the **extension** on each stored path.

  Write `change_extension(job)` where `job` is a single dict with two keys:

      {"path": "gallery/aurora.jpg", "new_ext": ".png"}

  Return the `path` with its final extension replaced by `new_ext`, as a string.
  The rules:

  - Replacing an existing extension: `gallery/aurora.jpg` with `.png` returns
    `gallery/aurora.png`.
  - A path with no extension gains one: `harbor/manifest` with `.md` returns
    `harbor/manifest.md`.
  - Only the last extension changes: `field.tar.gz` with `.zip` returns
    `field.tar.zip`.
  - An empty `new_ext` **removes** the extension: `gallery/aurora.jpg` with `''`
    returns `gallery/aurora`.
  - `new_ext`, when non-empty, always includes its leading dot (for example
    `.png`).

  Use `pathlib.PurePosixPath(path).with_suffix(new_ext)` and return its string
  form. No filesystem is touched.
starter_code: |
