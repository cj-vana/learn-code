explanation_markdown: |
  `PurePosixPath` is the filesystem-free half of `pathlib`: it parses a path
  string into components you can query, but never reads a disk, so it is safe and
  deterministic. Its `.suffix` attribute returns the final extension **with** the
  leading dot, and an empty string when there is none. Two edge cases trip people
  up: a name like `field.tar.gz` has suffix `.gz` (only the last dot counts, use
  `.suffixes` for the full list), and a leading-dot name like `.seedlog` is
  treated as a hidden file with no extension rather than an extension of
  `seedlog`. Reading the attribute directly beats slicing the string by hand.
common_mistakes:
  - Splitting on "." and taking the last piece, which wrongly turns ".seedlog" into "seedlog" and loses the leading dot.
  - Returning the extension without the dot, so ".raw" comes back as "raw" and mismatches the expected value.
  - Treating "field.tar.gz" as a two-part ".tar.gz" extension instead of just the final ".gz".
