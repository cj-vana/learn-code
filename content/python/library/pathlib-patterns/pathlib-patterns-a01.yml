prompt_markdown: |
  A ridge-top observatory files every exposure it captures under a path like
  `logs/2026/aurora.raw`. The archivist needs each file's **extension** so the
  pipeline can hand the frame to the right decoder.

  Write `get_extension(path_str)` that returns the extension of the final path
  component, **including the leading dot** (so `logs/2026/aurora.raw` returns
  `.raw`). The rules:

  - A name with no dot, such as `harbor/manifest`, has no extension: return `''`.
  - Only the last extension counts: `field.tar.gz` returns `.gz`, not `.tar.gz`.
  - A leading-dot name like `.seedlog` is a hidden file, not an extension, so it
    returns `''`.
  - The extension keeps its original case: `cam/night.MP4` returns `.MP4`.

  Use `pathlib.PurePosixPath`, which parses the string as a pure path with no
  access to any real disk.
starter_code: |
  from pathlib import PurePosixPath


  def get_extension(path_str):
      return ""
function_name: get_extension
input_mode: function
solution_sketch: Wrap the string in PurePosixPath and return its .suffix attribute, which already includes the leading dot and is "" when there is no extension.
sample_solution: |
  from pathlib import PurePosixPath


  def get_extension(path_str):
      return PurePosixPath(path_str).suffix
hints:
