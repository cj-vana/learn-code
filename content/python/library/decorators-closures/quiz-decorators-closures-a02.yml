questions:
  - id: q1
    prompt: |
      What does this print?

          def make_counter():
              count = 0
              def tick():
                  nonlocal count
                  count += 1
                  return count
              return tick

          c = make_counter()
          print(c(), c(), c())
    choices:
      - 1 2 3
      - 1 1 1
      - 0 1 2
      - 3 3 3
    correct_choice: 1 2 3
    explanation: |
      The closure keeps count alive between calls and nonlocal lets tick rebind
      it, so each call returns the next integer: 1, then 2, then 3.
    concepts:
      - python.closures_decorators
  - id: q2
    prompt: |
      What does this print?

          funcs = [lambda: i for i in range(3)]
          print(funcs[0]())
    choices:
      - '2'
      - '0'
      - '1'
      - '3'
    correct_choice: '2'
    explanation: |
      Each lambda captures the same i and reads it when called, after the
      comprehension has finished with i equal to 2, so every function returns 2.
    concepts:
      - python.closures_decorators
  - id: q3
    prompt: |
      What does this print?

          def twice(f):
              def w(x):
                  return f(x) * 2
              return w

          @twice
          def add_ten(x):
              return x + 10

          print(add_ten(5))
    choices:
      - '30'
      - '20'
      - '15'
      - '25'
    correct_choice: '30'
    explanation: |
      The decorator wraps add_ten so the result is doubled: (5 + 10) is 15, and
      twice multiplies it by 2 to give 30.
    concepts:
      - python.closures_decorators
  - id: q4
    prompt: |
      What does this print?

          import functools

          def deco(f):
              @functools.wraps(f)
              def w(*args):
                  return f(*args)
              return w

          @deco
          def ping():
              return 1

          print(ping.__name__)
    choices:
      - ping
      - w
      - deco
      - wrapper
    correct_choice: ping
    explanation: |
      functools.wraps copies the original function's metadata onto the wrapper,
      so ping.__name__ is preserved as "ping" instead of becoming "w".
    concepts:
      - python.closures_decorators
  - id: q5
    prompt: |
      What does this print?

          def inc(f):
              def w(x):
                  return f(x) + 1
              return w

          def dbl(f):
              def w(x):
                  return f(x) * 2
              return w

          @inc
          @dbl
          def val(x):
              return x

          print(val(3))
    choices:
      - '7'
      - '8'
      - '6'
      - '9'
    correct_choice: '7'
    explanation: |
      The stack is inc(dbl(val)): dbl wraps first and runs 3 * 2 = 6, then inc
      adds 1 for a final result of 7.
    concepts:
      - python.closures_decorators
