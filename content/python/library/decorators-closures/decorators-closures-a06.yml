explanation_markdown: |
  Because `@double` over `@bump` is `double(bump(a))`, the innermost `bump`
  transforms first (`x + 1`) and the outer `double` transforms its output,
  giving `(x + 1) * 2`. Reversing the stack to `bump(double(b))` runs `double`
  first (`x * 2`) and `bump` last, giving `(x * 2) + 1`. The two results diverge
  for every input except where the algebra happens to coincide, which is why
  decorator order is a real design decision, not a formatting preference.
common_mistakes:
  - Assuming the top decorator runs first; the one nearest the def wraps first.
  - Swapping which order produces (x+1)*2 versus (x*2)+1.
  - Returning a flat list instead of a list of two-element pairs.
