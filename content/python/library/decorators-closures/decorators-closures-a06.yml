prompt_markdown: |
  A signal mixer applies two transforms to a reading. `bump` adds 1 to a
  function's result; `double` multiplies a function's result by 2. Because
  decorators compose from the bottom up, the *order* you stack them in changes
  the outcome.

  Write both decorators (`bump` and `double`), then finish
  `compare_orders(readings)`. For each reading it must compute two values from an
  identity function:

  - `double` stacked over `bump` (double is outer): result is `(x + 1) * 2`
  - `bump` stacked over `double` (bump is outer): result is `(x * 2) + 1`

  Return a list of `[double_over_bump, bump_over_double]` pairs, one per reading.
  For `compare_orders([3])` the result is `[[8, 7]]` because `(3+1)*2 = 8` and
  `(3*2)+1 = 7`.
starter_code: |
  import functools


  def bump(func):
      # Return a wrapper that adds 1 to func's result.
      return func


  def double(func):
      # Return a wrapper that multiplies func's result by 2.
      return func


  def compare_orders(readings):
      @double
      @bump
      def a(x):
          return x

      @bump
      @double
      def b(x):
          return x

      return [[a(r), b(r)] for r in readings]
function_name: compare_orders
input_mode: function
solution_sketch: Implement bump (+1) and double (*2) as wrappers; the two stacking orders yield (x+1)*2 and (x*2)+1.
sample_solution: |
  import functools


  def bump(func):
      @functools.wraps(func)
      def wrapper(*args, **kwargs):
          return func(*args, **kwargs) + 1
      return wrapper


  def double(func):
      @functools.wraps(func)
      def wrapper(*args, **kwargs):
          return func(*args, **kwargs) * 2
      return wrapper


  def compare_orders(readings):
      @double
      @bump
      def a(x):
          return x

      @bump
      @double
      def b(x):
          return x

      return [[a(r), b(r)] for r in readings]
hints:
  - level: 1
    text: Stacked decorators apply bottom-up; the one nearest the def wraps first and the outer one sees its result.
  - level: 2
    text: For @double over @bump, bump runs first so the value becomes x + 1, then double turns it into (x + 1) * 2.
  - level: 3
