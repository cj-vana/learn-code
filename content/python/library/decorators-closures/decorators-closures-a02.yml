explanation_markdown: |
  Inside the loop each lambda would ordinarily close over the *same* `factor`
  name, which by the time you call the functions has settled on the final value.
  Binding `f=factor` as a default argument sidesteps this: default arguments are
  evaluated once, at definition time, so each lambda freezes the factor from its
  own iteration. This is the standard cure for the loop late-binding trap and
  keeps the generated functions genuinely independent.
common_mistakes:
  - "Writing lambda value: value * factor, so every scaler multiplies by the final factor."
  - Reusing a shared mutable variable instead of a per-iteration snapshot.
  - Building the functions correctly but returning the scalers instead of their results on base.
