prompt_markdown: |
  A textile loom is configured with a list of thread multipliers. For each
  multiplier you must build a separate scaling function *inside a loop*, then
  apply every built function to one base length and return the results in order.

  Write `scaled_lengths(data)` where `data` is a dict with keys `"factors"` (a
  list of ints) and `"base"` (an int). Build one function per factor in a loop,
  each returning `base_value * factor`, then call them all on `base` and return
  the list of results.

  For `{"factors": [2, 3, 4], "base": 10}` the result is `[20, 30, 40]`. The
  catch: naive loop capture makes every function use the *last* factor. Capture
  each factor at definition time so the functions stay independent.
starter_code: |
  def scaled_lengths(data):
      factors = data["factors"]
      base = data["base"]
      scalers = []
      # Build one scaler per factor here, capturing the factor correctly.
      return [scaler(base) for scaler in scalers]
function_name: scaled_lengths
input_mode: function
solution_sketch: Bind the loop factor as a default argument so each closure freezes its own value, then apply each scaler to base.
sample_solution: |
  def scaled_lengths(data):
      factors = data["factors"]
      base = data["base"]
      scalers = []
      for factor in factors:
          scalers.append(lambda value, f=factor: value * f)
      return [scaler(base) for scaler in scalers]
hints:
  - level: 1
    text: Closures read captured variables when they run, not when they are defined, so a plain loop-variable capture will surprise you.
  - level: 2
    text: If every built function multiplies by the last factor, you captured the live loop variable instead of its per-iteration value.
  - level: 3
    text: "Snapshot the factor by binding it as a default argument, e.g. lambda value, f=factor: value * f, which evaluates f=factor immediately."
