explanation_markdown: |
  A decorator that accepts arguments is a factory that *returns* a decorator.
  Reading `@scale_by(factor)`, Python first evaluates `scale_by(factor)` to get
  the real decorator, then applies it to `identity`. The innermost `wrapper`
  closes over both the wrapped `func` and the captured `factor`, so it can
  multiply the result on every call. Three nested `def`s is the tell-tale shape
  of an argument-taking decorator.
common_mistakes:
  - Writing only two layers, so @scale_by(factor) fails because scale_by returns a wrapper instead of a decorator.
  - Capturing the wrong variable and multiplying by the value instead of the factor.
  - Forgetting to return decorator from scale_by, leaving the decoration as None.
