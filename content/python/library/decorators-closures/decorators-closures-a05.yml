prompt_markdown: |
  A dye vat scales recipe outputs by a configurable batch factor. Write a
  **decorator factory** named `scale_by(factor)` so that decorating a function
  with `@scale_by(factor)` multiplies its return value by `factor`.

  Then finish `apply_scaled(data)`, where `data` is a dict with keys `"factor"`
  (an int) and `"values"` (a list of ints). It decorates an identity function
  with `scale_by(factor)` and returns each scaled value.

  For `{"factor": 3, "values": [1, 2, 3]}` the result is `[3, 6, 9]`.
starter_code: |
  import functools


  def scale_by(factor):
      # Return a decorator that multiplies the wrapped function's result by factor.
      def decorator(func):
          return func
      return decorator


  def apply_scaled(data):
      factor = data["factor"]
      values = data["values"]

      @scale_by(factor)
      def identity(x):
          return x

      return [identity(v) for v in values]
function_name: apply_scaled
input_mode: function
solution_sketch: scale_by returns a decorator whose wrapper multiplies func's result by the captured factor; three nested functions.
sample_solution: |
  import functools


  def scale_by(factor):
      def decorator(func):
          @functools.wraps(func)
          def wrapper(*args, **kwargs):
              return func(*args, **kwargs) * factor
          return wrapper
      return decorator


  def apply_scaled(data):
      factor = data["factor"]
      values = data["values"]

      @scale_by(factor)
      def identity(x):
          return x

      return [identity(v) for v in values]
