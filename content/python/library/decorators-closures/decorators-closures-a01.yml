    - name: repeats
      input: [2, 2, 2, 2]
      expected: [2, 4, 6, 8]
explanation_markdown: |
  The inner `add` closes over `total` from the factory's scope. Because `total`
  lives in the enclosing frame rather than inside `add`, its value persists
  across calls, and `nonlocal` lets `add` rebind it instead of creating a fresh
  local. Calling the closure once per fare produces the cumulative sequence in a
  single pass, with the state hidden inside the closure rather than in a global.
common_mistakes:
  - Forgetting nonlocal, so total += fare raises UnboundLocalError or silently resets each call.
  - Storing the total in a global variable, which leaks state between separate tallies.
  - Returning only the final total instead of the running total after each fare.
