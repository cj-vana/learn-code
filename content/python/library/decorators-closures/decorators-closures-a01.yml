prompt_markdown: |
  A ferry booth wants a tally that remembers everything collected so far. Write
  `running_totals(amounts)` where `amounts` is a list of fares. Build a closure
  that keeps a private running total, feed it each fare in order, and return the
  list of running totals after each charge.

  For example, `running_totals([10, 5, 20])` returns `[10, 15, 35]`. An empty
  list returns `[]`.
starter_code: |
  def running_totals(amounts):
      # Build a closure that remembers the running total, then feed it each fare.
      return []
function_name: running_totals
input_mode: function
solution_sketch: A factory returns an inner function that uses nonlocal to accumulate; map it over the fares.
sample_solution: |
  def running_totals(amounts):
      def make_teller():
          total = 0
          def add(fare):
              nonlocal total
              total += fare
              return total
          return add
      teller = make_teller()
      return [teller(fare) for fare in amounts]
hints:
  - level: 1
    text: You need one variable that survives between calls without being global. A closure over a local variable does exactly that.
  - level: 2
    text: Write a factory that defines total = 0 and returns an inner add(fare) function; the inner function updates total and returns it.
  - level: 3
    text: Inside add, declare nonlocal total before doing total += fare, then build the result by calling the closure once per fare in order.
tests:
