prompt_markdown: |
  A solar-powered field logger evaluates a calibration sequence defined by the
  recurrence

  ```
  cal(0) = 1
  cal(1) = 1
  cal(k) = cal(k - 1) + 2 * cal(k - 2)   for k >= 2
  ```

  The logger memoizes results so it does not recompute the same term twice, but
  its chip has room for only `budget` cached entries. When the cache is full and a
  brand-new result needs to be stored, the logger **evicts the oldest-inserted
  entry** (first in, first out) to make room, and counts that eviction. An evicted
  term is simply gone: if the recurrence needs it again, it is recomputed from
  scratch, which may itself trigger further evictions.

  Write `memo_with_budget(job)` that takes **one dictionary**:

  - `"n"`: which term to compute (`cal(n)`), an int with `n >= 0`.
  - `"budget"`: the maximum number of entries the cache may hold at once, an int
    with `budget >= 1`.

  Compute `cal(n)` using a recursive helper wrapped by a memo that you keep in a
  **closure** (a dict for the values plus a record of insertion order). Follow
  these rules exactly so the eviction count is well defined:

  - Every term, including the base cases `cal(0)` and `cal(1)`, goes through the
    cache.
  - When evaluating `cal(k)` for `k >= 2`, compute `cal(k - 1)` **fully first**,
    then `cal(k - 2)` (this is just left-to-right evaluation of the sum).
  - A cache **hit** returns immediately and stores nothing. A cache **miss**
    computes the term, and *then* stores it: if the cache already holds `budget`
    entries, first evict the oldest-inserted key and add one to the eviction
    count, then insert the new key.

  Return a dictionary `{"value": ..., "evictions": ...}` where `value` is `cal(n)`
  and `evictions` is the total number of entries the cap forced out.

  Example:

  ```python
  memo_with_budget({"n": 5, "budget": 2})
  # -> {"value": 21, "evictions": 9}
  ```

  With room for only two terms, the logger keeps throwing away results it will
  need again, so computing `cal(5)` forces nine evictions. Give the cache enough
  budget and the eviction count drops to zero while the value stays the same.
