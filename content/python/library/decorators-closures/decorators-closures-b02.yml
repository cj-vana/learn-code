function_name: memo_with_budget
input_mode: function
solution_sketch: A recursive helper checks the closure dict first; on a miss it computes cal(k), and before inserting evicts the front of an insertion-order list when the dict is already at budget, tallying each eviction.
sample_solution: |
  def memo_with_budget(job):
      n = job["n"]
      budget = job["budget"]

      order = []
      cache = {}
      stats = {"evictions": 0}

      def cal(k):
          if k in cache:
              return cache[k]
          if k < 2:
              value = 1
          else:
              value = cal(k - 1) + 2 * cal(k - 2)
          if len(cache) >= budget:
              oldest = order.pop(0)
              del cache[oldest]
              stats["evictions"] += 1
          cache[k] = value
          order.append(k)
          return value

      result = cal(n)
      return {"value": result, "evictions": stats["evictions"]}
hints:
  - level: 1
    text: Keep two things alive in the closure across recursive calls -- a dict from k to its value, and a list recording the order keys were inserted so you know which is oldest.
  - level: 2
    text: Structure each call as check-then-store. Return early on a hit. On a miss compute the value first, then handle the budget before inserting.
  - level: 3
    text: When len(cache) is already at budget, pop the front of the order list, delete that key from the dict, and increment the eviction counter; only then set cache[k] and append k to the order list.
