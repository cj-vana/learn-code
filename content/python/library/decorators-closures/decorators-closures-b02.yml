explanation_markdown: |
  This combines memoization with a bounded cache, and the closure is what makes it
  possible: `cache`, `order`, and `stats` all live in the enclosing scope, so the
  recursive `cal` sees the same three objects on every call. Without that shared
  state there would be nothing to evict from and nothing to count.

  The subtle rule is *compute first, then store*. A term's value is produced by
  recursion before you ever touch the cache, so eviction only happens at the
  moment of insertion. When the dict already holds `budget` keys, you drop the
  front of the insertion-order list -- the oldest key -- which is plain FIFO
  eviction. Because an evicted term may be needed again, a small budget snowballs:
  `cal(5)` with a budget of two keeps discarding terms it must rebuild, so eleven
  misses occur and nine of them evict. A useful check on your logic is that once
  the cache first fills, it stays full, so `evictions` equals the number of misses
  minus `budget`. Preserving left-to-right evaluation (`cal(k - 1)` before
  `cal(k - 2)`) fixes exactly which key is oldest at each insertion, which is why
  the counts are reproducible at all.
common_mistakes:
  - Storing the result before the recursive calls finish, so the wrong key looks oldest and the eviction count drifts.
  - Forgetting to record insertion order, then evicting an arbitrary key instead of the true first-in entry.
  - Skipping the cache for the base cases, so cal(0) and cal(1) never occupy or free a slot and the counts come out wrong.
  - Counting a cache hit as a miss, or re-inserting a key that is already present, which inflates both misses and evictions.
