prompt_markdown: |
  A print shop prices jobs by page count and wants every price wrapped into a
  tidy receipt line. Write a decorator named `as_receipt` that wraps a function
  returning an integer price and instead returns the string
  `"Total: $<price>"`. Use `functools.wraps` so the wrapped function keeps its
  name.

  Then finish `make_receipts(page_counts)`, which decorates a pricing function
  with `as_receipt` and returns one receipt string per page count. Pricing is
  `pages * 3`.

  For `make_receipts([1, 4])` the result is `["Total: $3", "Total: $12"]`.
starter_code: |
  import functools


  def as_receipt(func):
      # Wrap func so its integer result becomes "Total: $<result>".
      return func


  def make_receipts(page_counts):
      @as_receipt
      def price(pages):
          return pages * 3
      return [price(count) for count in page_counts]
function_name: make_receipts
input_mode: function
solution_sketch: Define as_receipt returning a wraps-decorated wrapper that formats func's result as a receipt string.
sample_solution: |
  import functools


  def as_receipt(func):
      @functools.wraps(func)
      def wrapper(*args, **kwargs):
          return f"Total: ${func(*args, **kwargs)}"
      return wrapper


  def make_receipts(page_counts):
      @as_receipt
      def price(pages):
          return pages * 3
      return [price(count) for count in page_counts]
