explanation_markdown: |
  `as_receipt` follows the canonical decorator shape: accept `func`, define a
  `wrapper` that calls it and transforms the result, and return `wrapper`. The
  `@functools.wraps(func)` line copies the original's metadata so the decorated
  `price` still reports its real name and docstring. Because the wrapper accepts
  `*args, **kwargs`, the same decorator would work for any pricing signature,
  not just this one.
common_mistakes:
  - Returning func unchanged instead of returning a new wrapper.
  - 'Formatting the price but forgetting the exact "Total: $" prefix.'
  - Omitting functools.wraps, which silently strips the wrapped function's name and docstring.
