prompt_markdown: |
  When a decorator forgets `functools.wraps`, the wrapped function loses its
  identity: its `__name__` becomes `"wrapper"` and its docstring disappears.
  Your job is to write a decorator that preserves both.

  Write a decorator `traced` that wraps a function without changing its behavior
  but keeps its metadata. Several coffee-bar probe functions are already
  decorated with `@traced` in the starter code. Finish `identity_of(name)`,
  which looks up the decorated probe by `name` and returns the string
  `"<__name__>/<__doc__>"`.

  If `traced` uses `functools.wraps` correctly, `identity_of("pull")` returns
  `"pull/Pull a shot of espresso."` rather than `"wrapper/None"`.
starter_code: |
  import functools


  def traced(func):
      # Wrap func without changing its behavior, but preserve its metadata.
      def wrapper(*args, **kwargs):
          return func(*args, **kwargs)
      return wrapper


  @traced
  def pull():
      """Pull a shot of espresso."""
      return 1


  @traced
  def steam():
      """Steam the milk."""
      return 2


  @traced
  def grind():
      """Grind the beans."""
      return 3


  @traced
  def pour():
      """Pour the latte art."""
      return 4


  def identity_of(name):
      probes = {"pull": pull, "steam": steam, "grind": grind, "pour": pour}
      probe = probes[name]
      return f"{probe.__name__}/{probe.__doc__}"
function_name: identity_of
input_mode: function
solution_sketch: Add @functools.wraps(func) to the wrapper so __name__ and __doc__ are copied from the original probe.
sample_solution: |
  import functools


  def traced(func):
      @functools.wraps(func)
      def wrapper(*args, **kwargs):
          return func(*args, **kwargs)
      return wrapper


  @traced
  def pull():
      """Pull a shot of espresso."""
      return 1


  @traced
  def steam():
      """Steam the milk."""
      return 2


  @traced
  def grind():
      """Grind the beans."""
      return 3


  @traced
  def pour():
      """Pour the latte art."""
      return 4


  def identity_of(name):
      probes = {"pull": pull, "steam": steam, "grind": grind, "pour": pour}
      probe = probes[name]
      return f"{probe.__name__}/{probe.__doc__}"
