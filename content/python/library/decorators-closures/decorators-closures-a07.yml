explanation_markdown: |
  `functools.wraps(func)` is a decorator applied to your inner `wrapper`. It
  copies `__name__`, `__doc__`, `__module__`, and other attributes from the
  original function onto the wrapper, so introspection and tracebacks still see
  the true identity. Without it, every decorated probe would report
  `"wrapper/None"` and the lookup would return the wrong string. Preserving
  metadata is why `wraps` appears in nearly every well-behaved decorator.
common_mistakes:
  - Leaving the wrapper undecorated, so probe.__name__ is "wrapper" and probe.__doc__ is None.
  - Calling functools.wraps without passing func, so it has nothing to copy from.
  - Copying only the name by hand and forgetting the docstring.
