prompt_markdown: |
  A relay network counts signal routes with a two-step recurrence:
  `routes(k) = routes(k - 1) + routes(k - 2)` with `routes(0) = routes(1) = 1`.
  Computed naively this recomputes the same sub-values an exponential number of
  times. A memoizing decorator fixes that by caching each result the first time
  it is produced.

  Write a decorator `memoize` that caches results in a private dict keyed by the
  argument. Then finish `raw_call_count(n)`, which decorates a `routes` function
  with `memoize`, computes `routes(n)`, and returns **how many times the
  underlying body actually ran** (the number of cache misses).

  If your cache works, each `k` from `0` to `n` is computed exactly once, so
  `raw_call_count(5)` returns `6`. A missing or broken cache produces a much
  larger count and fails the tests.
starter_code: |
  import functools


  def memoize(func):
      # Cache results in a private dict so each argument is computed once.
      @functools.wraps(func)
      def wrapper(n):
          return func(n)
      return wrapper


  def raw_call_count(n):
      body_runs = {"count": 0}

      @memoize
      def routes(k):
          body_runs["count"] += 1
          if k < 2:
              return 1
          return routes(k - 1) + routes(k - 2)

      routes(n)
      return body_runs["count"]
function_name: raw_call_count
input_mode: function
solution_sketch: memoize keeps a dict in its closure; on a miss it runs func and stores the result, on a hit it returns the cached value.
sample_solution: |
  import functools


  def memoize(func):
      cache = {}

      @functools.wraps(func)
      def wrapper(n):
          if n not in cache:
              cache[n] = func(n)
          return cache[n]

      return wrapper


  def raw_call_count(n):
      body_runs = {"count": 0}

      @memoize
      def routes(k):
          body_runs["count"] += 1
          if k < 2:
              return 1
          return routes(k - 1) + routes(k - 2)

      routes(n)
      return body_runs["count"]
