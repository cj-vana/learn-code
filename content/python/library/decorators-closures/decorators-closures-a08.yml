explanation_markdown: |
  The `cache` dict lives in `memoize`'s closure, private to the decorated
  function yet persistent across calls. The first time an argument arrives it is
  a cache miss, so the body runs and the result is stored; every later request
  for that argument is a hit that skips the body entirely. Because the recursive
  calls also pass through `wrapper`, each `k` from `0` to `n` is computed exactly
  once, giving `n + 1` body runs and turning exponential work into a linear
  walk. The count is the visible proof the cache did its job.
common_mistakes:
  - Storing the cache as a local inside wrapper, so it resets on every call and never helps.
  - Returning func(n) directly on a hit instead of the cached value, defeating the point.
  - Caching only the top-level call while letting the recursion bypass the wrapper.
