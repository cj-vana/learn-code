explanation_markdown: |
  The `wrapper` runs the call inside a loop bounded by `max_attempts`. A
  successful call returns immediately, so the attempt count settles at
  `fail_times + 1`. Each `ValueError` is caught and remembered in `last`, then
  the loop tries again; if the loop exhausts without a success it re-raises the
  final error so a permanent failure is never silently hidden. The kiosk's
  `state["calls"]` counter, captured in the closure, records exactly how many
  attempts the retry loop consumed. The edge case worth noticing is a success on
  the very last allowed attempt, where `fail_times` equals `max_attempts - 1`.
common_mistakes:
  - Catching a bare Exception (or all errors), which would swallow unrelated bugs.
  - Retrying max_attempts extra times after the first call, giving one too many attempts.
  - Returning None or swallowing the final error instead of re-raising when every attempt fails.
