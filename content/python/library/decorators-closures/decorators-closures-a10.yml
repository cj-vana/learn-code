prompt_markdown: |
  A transit kiosk's ticket printer sometimes jams on its first few tries before
  succeeding. Write a decorator factory `retry(max_attempts)` that calls the
  wrapped function, and if it raises `ValueError`, tries again up to
  `max_attempts` total times. On the first success it returns that result; if
  every attempt fails, it re-raises the last `ValueError`.

  Then finish `attempts_until_success(data)`, where `data` is a dict with keys
  `"fail_times"` (how many leading calls jam) and `"max_attempts"` (the retry
  limit, always greater than `fail_times`). It decorates a `print_ticket`
  function with `retry(max_attempts)`, calls it once, and returns **how many
  attempts it took** to succeed.

  For `{"fail_times": 2, "max_attempts": 5}` the printer jams on attempts 1 and
  2 and succeeds on attempt 3, so the result is `3`.
starter_code: |
  import functools


  def retry(max_attempts):
      # Retry the wrapped call on ValueError up to max_attempts times.
      def decorator(func):
          @functools.wraps(func)
          def wrapper():
              return func()
          return wrapper
      return decorator


  def attempts_until_success(data):
      fail_times = data["fail_times"]
      max_attempts = data["max_attempts"]
      state = {"calls": 0}

      @retry(max_attempts)
      def print_ticket():
          state["calls"] += 1
          if state["calls"] <= fail_times:
              raise ValueError("jam")
          return "ticket"

      print_ticket()
      return state["calls"]
function_name: attempts_until_success
