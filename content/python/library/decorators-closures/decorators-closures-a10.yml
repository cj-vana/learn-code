solution_sketch: The wrapper loops up to max_attempts, returning on the first success and re-raising the last ValueError if all attempts fail.
sample_solution: |
  import functools


  def retry(max_attempts):
      def decorator(func):
          @functools.wraps(func)
          def wrapper():
              last = None
              for _ in range(max_attempts):
                  try:
                      return func()
                  except ValueError as exc:
                      last = exc
              raise last
          return wrapper
      return decorator


  def attempts_until_success(data):
      fail_times = data["fail_times"]
      max_attempts = data["max_attempts"]
      state = {"calls": 0}

      @retry(max_attempts)
      def print_ticket():
          state["calls"] += 1
          if state["calls"] <= fail_times:
              raise ValueError("jam")
          return "ticket"

      print_ticket()
      return state["calls"]
