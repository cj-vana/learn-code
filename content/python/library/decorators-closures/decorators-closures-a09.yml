solution_sketch: logged captures the list; the wrapper computes the result, appends a formatted record, and returns the result unchanged.
sample_solution: |
  import functools


  def logged(log):
      def decorator(func):
          @functools.wraps(func)
          def wrapper(arg):
              result = func(arg)
              log.append(f"{func.__name__}({arg}) -> {result}")
              return result
          return wrapper
      return decorator


  def trace_commands(degrees):
      log = []

      @logged(log)
      def slew(arg):
          return arg * 2

      for deg in degrees:
          slew(deg)
      return log
