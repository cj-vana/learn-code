prompt_markdown: |
  An observatory wants an audit trail of every command it sends to a telescope
  mount, without changing what the commands return. Write a decorator factory
  `logged(log)` that captures a list and, each time the wrapped function runs,
  appends a record of the form `"<func_name>(<arg>) -> <result>"` to that list.
  The wrapped function's own return value must pass through unchanged.

  Then finish `trace_commands(degrees)`, where `degrees` is a list of ints. It
  builds a fresh log, decorates a `slew` command (which returns `arg * 2`) with
  `logged(log)`, calls it once per degree, and returns the completed log.

  For `trace_commands([15, 4])` the result is
  `["slew(15) -> 30", "slew(4) -> 8"]`.
starter_code: |
  import functools


  def logged(log):
      # Return a decorator that records each call into log, then passes the result through.
      def decorator(func):
          @functools.wraps(func)
          def wrapper(arg):
              return func(arg)
          return wrapper
      return decorator


  def trace_commands(degrees):
      log = []

      @logged(log)
      def slew(arg):
          return arg * 2

      for deg in degrees:
          slew(deg)
      return log
function_name: trace_commands
