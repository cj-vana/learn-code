explanation_markdown: |
  `logged` is a decorator factory: it captures the `log` list in a closure and
  returns a decorator, whose `wrapper` records a line for every call. The
  crucial ordering is to compute `result = func(arg)` first, append the record,
  and then return `result` untouched, so logging is a pure side effect that
  never disturbs the command's output. Using `func.__name__` keeps the record
  honest even when several functions share the same wrapper shape. This is the
  standard way to grade a decorator by what it *did* rather than what it
  returned.
common_mistakes:
  - Appending the record but returning None, which corrupts the wrapped function's output.
  - Formatting the arg and result out of order, e.g. "30 -> slew(15)".
  - Deduplicating repeated calls, when every invocation should produce its own log line.
