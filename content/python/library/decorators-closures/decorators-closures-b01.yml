prompt_markdown: |
  A late-night community radio show takes listener calls, but the host can only
  put so many callers *on air* within any short stretch of time. The switchboard
  runs a sliding-window limiter: a caller is put on air only if fewer than
  `limit` callers have already gone on air within the preceding `window` seconds.
  A caller who is turned away simply hangs up and never counts against the limit.

  Write `build_rate_limiter(job)` that takes **one dictionary**:

  - `"limit"`: the most callers that may go on air within any window (an int,
    possibly `0`).
  - `"window"`: the length of the sliding window in seconds (a positive int).
  - `"calls"`: a list of integer timestamps in seconds, given in **non-decreasing**
    order, one per caller in the order they reach the switchboard.

  Build an inner limiter **closure** that remembers the timestamps of the callers
  it has already put on air, then apply that closure to each timestamp in `calls`.
  Return a **list of booleans**, one per caller: `True` if the caller is put on
  air, `False` if turned away.

  The rule for a caller arriving at time `t`: count how many *already-approved*
  callers have a timestamp **strictly greater than** `t - window`. If that count
  is less than `limit`, put this caller on air (and remember `t`); otherwise turn
  them away. In other words the window is the half-open span `(t - window, t]`, so
  an approval made exactly `window` seconds earlier has just aged out and no
  longer counts. Only approved callers occupy the window; a caller you turn away
  leaves no trace, so it can never block a later caller.

  Example:

  ```python
  build_rate_limiter({"limit": 2, "window": 5, "calls": [0, 1, 2, 6]})
  # -> [True, True, False, True]
  ```

  The callers at 0 and 1 go on air. The caller at 2 is turned away because 0 and 1
  are both still inside the 5-second window. By second 6 those two have aged out
  (only approvals with a timestamp greater than 1 still count), so the fourth
  caller goes on air.

  An empty `calls` list returns `[]`.
