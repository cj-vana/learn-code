solution_sketch: Define an inner allow(t) closure over a list of approved timestamps; it counts approvals newer than t - window and admits t only when that count is below limit, recording t on approval.
sample_solution: |
  def build_rate_limiter(job):
      limit = job["limit"]
      window = job["window"]
      calls = job["calls"]

      def make_limiter():
          allowed = []

          def allow(t):
              active = sum(1 for s in allowed if s > t - window)
              if active < limit:
                  allowed.append(t)
                  return True
              return False

          return allow

      limiter = make_limiter()
      return [limiter(t) for t in calls]
