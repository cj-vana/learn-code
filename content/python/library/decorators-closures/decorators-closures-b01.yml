explanation_markdown: |
  The whole exercise turns on where the limiter keeps its memory. A plain function
  cannot remember previous callers, so you build a closure: `allow` captures the
  `allowed` list defined in the enclosing scope, and that list survives from one
  call to the next. Each admitted caller appends its timestamp; each rejection
  changes nothing.

  The window test is a count, not a slice. For a caller at `t` you tally the
  approvals with `s > t - window`, which is the half-open interval `(t - window, t]`.
  Using strict `>` rather than `>=` is what makes an approval exactly `window`
  seconds old drop out, so `[0, 5, 10]` with a 5-second window admits all three.
  Because only approvals are recorded, a rejected caller leaves the state
  untouched and can never crowd out someone who arrives later. Timestamps arrive
  in non-decreasing order, so you never have to sort; you only ever look backward
  at what you have already approved.
common_mistakes:
  - Storing the approved list inside allow itself, so it resets on every caller and the limiter never remembers anyone.
  - Recording rejected callers too, which lets a turned-away caller wrongly block a later one.
  - Using s >= t - window instead of s > t - window, so approvals exactly one window old still count and boundary cases fail.
  - Comparing against limit with <= instead of <, admitting one caller too many in each window.
