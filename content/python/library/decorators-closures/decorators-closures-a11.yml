      return log
function_name: repeat_apply
input_mode: function
solution_sketch: repeat(n) closes over n and returns a wrapper that calls func n times; the inner stamp function appends to a shared log, and each item triggers n appends.
sample_solution: |
  def repeat(n):
      def decorator(func):
          def wrapper(arg):
              result = None
              for _ in range(n):
                  result = func(arg)
              return result
          return wrapper
      return decorator


  def repeat_apply(data):
      times = data["times"]
      items = data["items"]
      log = []

      @repeat(times)
      def stamp(name):
          log.append(name)

      for item in items:
          stamp(item)

      return log
