explanation_markdown: |
  `repeat(n)` is a decorator factory: it captures `n` in a closure and hands back
  a real decorator. That decorator wraps the target function in a `wrapper` that
  loops `range(n)` times, invoking the original function on each pass. Because the
  wrapper closes over `n`, the repetition count is baked in when the function is
  decorated.

  Inside `repeat_apply`, `stamp` appends its argument to the shared `log` list,
  which the closure keeps alive. Decorating `stamp` with `@repeat(times)` means a
  single `stamp(item)` call actually appends `item` to the log `times` times.
  Looping over `items` in order therefore produces each value repeated
  consecutively, preserving the overall order.

  The edge cases fall out naturally: when `times` is 0 the wrapper's loop body
  never executes, so no appends happen and the log stays empty; when `items` is
  empty the outer loop never calls `stamp`, giving the same empty result.
common_mistakes:
  - Writing a plain loop of length times inside repeat_apply instead of letting the repeat decorator do the repetition.
  - Forgetting that repeat needs three layers (factory, decorator, wrapper) and trying to make repeat itself the decorator.
  - Calling range(times) but appending outside the loop, so each item is stamped once regardless of times.
  - Rebinding log to a new list inside the inner function instead of mutating the shared list with append.
