prompt_markdown: |
  At a conference check-in desk, a badge printer stamps every guest's name onto a
  running lanyard log a fixed number of times before moving to the next guest.
  You'll build that behavior with a **parametrized decorator** written entirely
  from scratch.

  Write a decorator factory `repeat(n)`: a function that takes an integer `n` and
  returns a decorator, which in turn wraps a function so that calling the wrapped
  function actually invokes the original function `n` times in a row (each call
  receiving the same single argument).

  Then finish `repeat_apply(data)`, where `data` is a dict with keys:

  - `"times"`: a non-negative int, how many times each item should be stamped.
  - `"items"`: a list of values to stamp, in order.

  Inside `repeat_apply`, create a shared `log` list and define a small inner
  function that appends its single argument to `log`. Decorate that inner
  function with `repeat(times)`, then call the decorated function once per item
  in `items` (in order). Return the final `log`.

  For `{"times": 2, "items": ["a", "b"]}` the result is `["a", "a", "b", "b"]`.
  For `{"times": 0, "items": ["x"]}` the decorated function runs zero times per
  item, so the result is the empty list `[]`.

  You must genuinely use a closure-based `repeat` decorator factory to do the
  repetition. Do not just loop `times` times in the body of `repeat_apply`.
