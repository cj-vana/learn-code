explanation_markdown: |
  Each machine is a one-argument closure that captured its own `k` when
  `make_step` returned it, so `add` with dial `3` is permanently the function
  `lambda x: x + 3`. Composition is where the belt takes shape: `compose(first,
  second)` returns `lambda x: second(first(x))`, meaning `first` runs before
  `second`. By folding each new step onto the running `pipeline` starting from
  the identity function, the earliest op ends up innermost and therefore runs
  first, exactly matching the conveyor order. Applying the final composed
  function to `value` streams the blank through every machine in one call. The
  empty-`ops` case falls out for free: no steps are folded on, so `pipeline`
  stays the identity and returns `value` unchanged.
common_mistakes:
  - Composing in the wrong direction so the last op runs first instead of the first.
  - Reading k from the loop variable inside the wrapper instead of capturing it per closure, so every step uses the final dial value.
  - Forgetting the empty-ops case and returning None or 0 instead of value.
