prompt_markdown: |
  A candy factory lines up small tuning machines along a conveyor belt. Each
  machine nudges the running number that passes through it: an `"add"` machine
  adds its dial value, a `"mul"` machine multiplies by its dial value, and a
  `"sub"` machine subtracts its dial value. A blank the size of `value` enters
  the first machine, and whatever comes out feeds straight into the next.

  Write `apply_pipeline(data)`, where `data` is a dict with two keys:

  - `"ops"`: a list of `[name, k]` pairs. `name` is one of `"add"`, `"mul"`,
    or `"sub"`, and `k` is the machine's integer dial value.
  - `"value"`: the starting number that enters the belt.

  For each pair, build a small **closure** that captures its own `name` and `k`
  and performs that one machine's step. Then **compose those closures left to
  right into a single function** (the first machine runs first, and its output
  feeds the second, and so on), and return that composed function applied to
  `value`.

  For `{"ops": [["add", 3], ["mul", 2]], "value": 1}` the belt computes
  `(1 + 3) * 2`, so the result is `8`. An empty belt changes nothing:
  `{"ops": [], "value": 5}` returns `5`.
