function_name: apply_pipeline
input_mode: function
solution_sketch: Turn each [name, k] into a closure, fold them with a compose helper so the first op runs first, then apply the composed function to value.
sample_solution: |
  def apply_pipeline(data):
      ops = data["ops"]
      value = data["value"]

      def make_step(name, k):
          if name == "add":
              return lambda x: x + k
          if name == "mul":
              return lambda x: x * k
          return lambda x: x - k

      def compose(first, second):
          # Run first, feed its result into second.
          return lambda x: second(first(x))

      pipeline = lambda x: x
      for name, k in ops:
          pipeline = compose(pipeline, make_step(name, k))
      return pipeline(value)
hints:
