prompt_markdown: |
  After a trivia night you have two equal-length lists inside `data`: `players`
  (names) and `points` (their scores).

  Write `leaderboard(data)` returning a list of `[name, score]` pairs ordered
  from highest score to lowest. If two players share a score, order them
  alphabetically by name. Empty lists return an empty list.
starter_code: |
  def leaderboard(data):
      return []
function_name: leaderboard
input_mode: function
solution_sketch: Zip names with points, sort by (-score, name), and return name/score pairs.
sample_solution: |
  def leaderboard(data):
      players = data["players"]
      points = data["points"]
      pairs = list(zip(players, points))
      pairs.sort(key=lambda pair: (-pair[1], pair[0]))
      return [[name, score] for name, score in pairs]
hints:
  - level: 1
    text: Pair each player with their score before ranking.
  - level: 2
    text: zip(players, points) lines up the two lists into name/score pairs.
  - level: 3
    text: Sort by (-score, name) so high scores lead and ties go alphabetically.
