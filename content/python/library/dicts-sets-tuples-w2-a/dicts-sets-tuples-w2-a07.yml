explanation_markdown: |
  `zip` walks two parallel lists together, producing `(name, score)` pairs. A
  sort key of `(-score, name)` puts the highest scores first because negating a
  number flips the order, while the plain name breaks ties alphabetically.
  Rebuilding each pair as a `[name, score]` list gives the leaderboard rows the
  caller asked for.
common_mistakes:
  - Sorting scores ascending and forgetting to reverse for a leaderboard.
  - Losing the name/score pairing by sorting the two lists separately.
  - Ignoring the alphabetical tie-break when scores are equal.
