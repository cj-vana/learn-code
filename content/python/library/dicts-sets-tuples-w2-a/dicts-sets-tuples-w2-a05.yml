prompt_markdown: |
  Two storerooms each track how many of each part they hold. You are given
  `data`, a dict with keys `room_a` and `room_b`, each a dict mapping part names
  to counts.

  Write `best_stock(data)` returning a dict mapping every part that appears in
  either room to the larger of its two counts. A part missing from a room counts
  as 0 there. Two empty rooms return an empty dict.
starter_code: |
  def best_stock(data):
      return {}
function_name: best_stock
input_mode: function
solution_sketch: Union the two key sets, then take the max count per part with get defaults.
sample_solution: |
  def best_stock(data):
      room_a = data["room_a"]
      room_b = data["room_b"]
      result = {}
      for part in set(room_a) | set(room_b):
          result[part] = max(room_a.get(part, 0), room_b.get(part, 0))
      return result
hints:
  - level: 1
    text: You need to consider every part named in either room, not just one.
  - level: 2
    text: The union of the two dicts' key sets gives you all the part names.
  - level: 3
    text: For each part use max(room_a.get(p, 0), room_b.get(p, 0)).
