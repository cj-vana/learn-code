explanation_markdown: |
  Taking the union of `set(room_a) | set(room_b)` gives every part named in
  either room exactly once. For each part, `dict.get(part, 0)` supplies a 0 when
  a room lacks it, so `max` compares a real count against 0 or against the other
  room's real count. The result is a single dict holding the best available
  quantity per part.
common_mistakes:
  - Only iterating one room's keys and dropping parts unique to the other.
  - Summing the two counts instead of taking the larger one.
  - Assuming every part exists in both rooms and hitting a KeyError.
