prompt_markdown: |
  A gym records the member IDs who checked in each day. You are given `days`, a
  list where each element is a list of member IDs (ints) for one day.

  Write `perfect_attendance(days)` returning a sorted list of the IDs that
  appear on every single day. If `days` is empty, return an empty list.
starter_code: |
  def perfect_attendance(days):
      return []
function_name: perfect_attendance
input_mode: function
solution_sketch: Start from the first day's set and intersect it with each following day.
sample_solution: |
  def perfect_attendance(days):
      if not days:
          return []
      present = set(days[0])
      for day in days[1:]:
          present &= set(day)
      return sorted(present)
hints:
  - level: 1
    text: A member with perfect attendance is in the overlap of every day's set.
  - level: 2
    text: Set intersection keeps only IDs shared by both sides.
  - level: 3
    text: Begin with the first day's set and &= each later day into it.
