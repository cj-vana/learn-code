explanation_markdown: |
  Perfect attendance means an ID is present in the intersection of every day.
  Seeding `present` with the first day and applying `&=` for each later day
  keeps only IDs that survive in all of them. Handling the empty input up front
  avoids indexing `days[0]` when there are no days at all. Sorting the surviving
  set gives a stable, ordered result.
common_mistakes:
  - Starting from an empty set, which intersects down to nothing.
  - Using union instead of intersection and collecting everyone.
  - Indexing days[0] before checking that days is non-empty.
