prompt_markdown: |
  A small cinema logs the genre of every ticket sold as a list of strings.

  Write `top_genre(tickets)` returning the genre with the most tickets sold. If
  several genres tie for the most, return the one that comes first
  alphabetically. An empty list returns an empty string `""`.
starter_code: |
  def top_genre(tickets):
      return ""
function_name: top_genre
input_mode: function
solution_sketch: Count genres in a dict, then pick the key with the highest count, ties by name.
sample_solution: |
  def top_genre(tickets):
      counts = {}
      for genre in tickets:
          counts[genre] = counts.get(genre, 0) + 1
      if not counts:
          return ""
      return min(counts, key=lambda g: (-counts[g], g))
hints:
  - level: 1
