explanation_markdown: |
  A dictionary makes counting easy: `counts.get(genre, 0) + 1` starts a new
  genre at zero and bumps a known one. To choose the winner, sort each candidate
  by the tuple `(-count, name)`. The negative count puts the biggest tally first,
  and the plain name breaks ties alphabetically, so a single `min` call finds the
  answer.
