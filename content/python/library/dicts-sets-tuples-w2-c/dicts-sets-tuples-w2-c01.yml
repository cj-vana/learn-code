explanation_markdown: |
  A dictionary gives O(1) lookups, so one pass over the sales builds a count for
  every distinct name. Passing those names to `sorted` with a tuple key does the
  ranking in a single step: `-counts[name]` sorts the busiest pastries first
  (negating flips ascending order into descending), and the trailing `name`
  breaks ties alphabetically. Because the name is part of the key, the result is
  fully deterministic no matter what order the sales arrived in.
common_mistakes:
  - Sorting by count ascending and forgetting to negate it for a most-sold-first order.
  - Leaving out the name tie-breaker, so equal counts come back in an unpredictable order.
  - Returning the counts dict instead of just the ranked list of names.
