prompt_markdown: |
  A corner bakery scans the name of every pastry as it is sold. Write
  `popular_pastries(sales)` where `sales` is a list of pastry-name strings in
  the order they were sold.

  Return a list of the distinct pastry names ordered from most sold to least
  sold. When two pastries sold the same number of times, order those names
  alphabetically. An empty list of sales returns an empty list.
starter_code: |
  def popular_pastries(sales):
      return []
function_name: popular_pastries
input_mode: function
solution_sketch: Count each name in a dict, then sort the names by a (negative count, name) tuple key.
sample_solution: |
  def popular_pastries(sales):
      counts = {}
      for name in sales:
          counts[name] = counts.get(name, 0) + 1
      return sorted(counts, key=lambda name: (-counts[name], name))
