prompt_markdown: |
  When operations are stacked one after another, the chain rule says their
  gradients **multiply**. If a signal flows through a straight path of nodes and
  each node `i` has local derivative `d_i` (the derivative of its output with
  respect to its input), then the gradient at the start of the path is the product
  of every local derivative along the way:

  ```
  chain gradient = d_1 * d_2 * ... * d_k
  ```

  Picture a moth-eye sensor whose reading passes through a sequence of tiny
  transforms before reaching the loss. Each transform contributes one number, and
  the overall sensitivity is what you get by multiplying them together.

  The input `path` is a list of the local derivative values in order, for example
  `[0.5, 4.0, -1.0]`. Write `chain_grad(path)` that returns their **product**,
  **rounded to 6 decimal places** with `round(value, 6)`.

  An **empty path returns `1.0`**: multiplying nothing together is the identity
  for multiplication, which matches the idea that a path with no transforms leaves
  the gradient unchanged.
starter_code: |
  def chain_grad(path):
      # Multiply every local derivative together; empty path -> 1.0.
      product = 1.0
      return round(product, 6)
function_name: chain_grad
input_mode: function
solution_sketch: Start a running product at 1.0, multiply in each element of path, then round to 6 decimals.
sample_solution: |
  def chain_grad(path):
      product = 1.0
      for d in path:
          product *= d
      return round(product, 6)
