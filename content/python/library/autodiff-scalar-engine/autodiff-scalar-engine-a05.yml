explanation_markdown: |
  A deep network is, at heart, a long chain of functions, and backpropagation
  moves a gradient from the loss to an early value by multiplying the local
  derivative at every step. This exercise isolates that multiplication: the chain
  gradient is just the running product of the numbers on the path.

  Two behaviors fall out of the product and matter in practice. A single `0.0`
  anywhere forces the whole product to `0.0` -- that node blocks the gradient
  entirely. And a run of factors below `1` shrinks the product fast (here
  `0.1 * 0.2 * 0.3 = 0.006`), which is precisely why gradients can vanish across
  many layers. Starting the accumulator at `1.0` makes the empty path return
  `1.0`, the multiplicative identity, so "no transforms" correctly means "no
  change".
common_mistakes:
  - Initializing the running product at 0, which forces every result to zero.
  - Summing the local derivatives instead of multiplying them.
  - Returning an integer 1 for the empty path instead of the float 1.0, or forgetting to round the product.
