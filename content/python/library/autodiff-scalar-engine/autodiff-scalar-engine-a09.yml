prompt_markdown: |
  This is the heart of an autodiff engine: **reverse-mode differentiation**, also
  called backpropagation. After the forward pass computes every node's value, the
  backward pass computes how sensitive the output is to each input -- the gradient
  of the output with respect to each leaf.

  Write `backward_pass(job)`. The `job` has the **same shape as the forward-pass
  graph** (`job["nodes"]` and `job["output"]`), with the same three node kinds:

  - `{"op": "leaf", "value": v}`
  - `{"op": "add", "inputs": [names...]}` -- value is the sum of its inputs.
  - `{"op": "mul", "inputs": [names...]}` -- value is the product of its inputs.

  The gradient of the output with respect to itself is `1.0`. Push that seed
  backward using the **local derivative rules**, and return a dictionary mapping
  **each leaf name to its gradient**, rounded to 6 places.

  Local rules (let `g` be the gradient already arriving at a node):

  - **add** (`z = a + b + ...`): each input's derivative is `1`, so every input
    receives `g`.
  - **mul** (`z = a * b * ...`): input `i`'s derivative is the product of the
    **other** inputs' values, so input `i` receives `g * (product of the other
    inputs' values)`. For a two-input product `z = a * b`, `a` gets `g * b` and
    `b` gets `g * a`.

  **Accumulate**: a node used by several parents (or listed twice, as in a square
  `x * x`) collects the **sum** of the gradients from each use. Return
  `{leaf_name: round(grad, 6)}` for every leaf.

  Example:

  ```python
  backward_pass({
      "nodes": {
          "x": {"op": "leaf", "value": 3.0},
          "y": {"op": "leaf", "value": 4.0},
          "s": {"op": "add", "inputs": ["x", "y"]},  # s = x + y
          "L": {"op": "mul", "inputs": ["s", "y"]},  # L = s * y = (x + y) * y
      },
      "output": "L",
  })
  # dL/ds = y = 4  ->  dL/dx = 4, dL/dy gets 4 from s
  # dL/dy (direct) = s = 7  ->  total dL/dy = 7 + 4 = 11
  # -> {"x": 4.0, "y": 11.0}
  ```
