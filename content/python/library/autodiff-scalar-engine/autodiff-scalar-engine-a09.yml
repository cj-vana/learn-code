solution_sketch: Evaluate every node's value with memoized recursion, build a post-order list of the nodes reachable from the output, seed the output gradient at 1.0, then walk the list in reverse distributing each node's incoming gradient to its inputs by the add/mul rules while accumulating with +=.
sample_solution: |
  def backward_pass(job):
      nodes = job["nodes"]
      output = job["output"]
      value = {}

      def forward(name):
          if name in value:
              return value[name]
          node = nodes[name]
          op = node["op"]
          if op == "leaf":
              result = node["value"]
          elif op == "add":
              result = 0.0
              for child in node["inputs"]:
                  result += forward(child)
          else:
              result = 1.0
              for child in node["inputs"]:
                  result *= forward(child)
          value[name] = result
          return result

      forward(output)

      order = []
      seen = set()

      def visit(name):
          if name in seen:
              return
          seen.add(name)
          node = nodes[name]
          if node["op"] != "leaf":
              for child in node["inputs"]:
                  visit(child)
          order.append(name)

      visit(output)

      grad = {name: 0.0 for name in seen}
      grad[output] = 1.0
      for name in reversed(order):
          node = nodes[name]
          op = node["op"]
          incoming = grad[name]
          if op == "add":
              for child in node["inputs"]:
                  grad[child] += incoming
          elif op == "mul":
              inputs = node["inputs"]
              for i, child in enumerate(inputs):
                  product = 1.0
                  for j, other in enumerate(inputs):
                      if j != i:
                          product *= value[other]
                  grad[child] += incoming * product

      return {name: round(grad[name], 6)
              for name in seen if nodes[name]["op"] == "leaf"}
hints:
  - level: 1
    text: First run a forward pass to get every node's value; you need the input values to differentiate a multiply. Store them in a dict.
  - level: 2
    text: Process nodes from the output back toward the leaves. Seed grad[output] = 1.0 and use += so a node reached by several paths accumulates its gradient before you read it.
  - level: 3
    text: For an add node send the incoming gradient unchanged to every input. For a mul node send, to each input, the incoming gradient times the product of the other inputs' forward values. Return only the leaf gradients, each rounded to 6 places.
