explanation_markdown: |
  Reverse-mode autodiff applies the chain rule from the output backward. Each node
  has a **local derivative** with respect to each of its inputs, and the gradient
  reaching an input is the gradient at the node times that local derivative. For
  addition the local derivative is `1`, so the gradient passes straight through.
  For multiplication `z = a * b`, `dz/da = b` and `dz/db = a`, which generalizes
  to "the product of the other inputs" for more factors -- and it is why a
  multiply node needs the forward **values** you cached.

  Two details make it correct. First, you must visit nodes in **reverse
  topological order** so a node's gradient is fully accumulated before it is
  passed on. Second, you must **accumulate with `+=`**: a leaf feeding several
  nodes (like `x` in the shared test, or `x` used twice in `x * x`) collects a
  contribution from each use. The `x * x` case gives `dg/dx = 1.5 + 1.5 = 3.0`,
  exactly `2x` -- the same accumulation rule that lets one engine differentiate an
  entire network in a single backward sweep.
common_mistakes:
  - Sending the incoming gradient to a mul input as-is instead of scaling by the other inputs' values, which drops the product rule.
  - Overwriting a leaf's gradient instead of adding, so a shared input keeps only its last contribution.
  - Walking the graph forward (leaves first) during the backward sweep, so a node is read before all its parents have deposited gradient into it.
