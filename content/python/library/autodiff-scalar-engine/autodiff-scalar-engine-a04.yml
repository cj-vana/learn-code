function_name: tanh_pair
input_mode: function
solution_sketch: Compute t = math.tanh(x) once, then return [round(t, 6), round(1 - t ** 2, 6)].
sample_solution: |
  import math


  def tanh_pair(x):
      t = math.tanh(x)
      return [round(t, 6), round(1 - t ** 2, 6)]
