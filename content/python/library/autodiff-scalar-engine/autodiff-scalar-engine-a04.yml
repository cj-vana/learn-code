explanation_markdown: |
  Bundling the forward value and its derivative is the core trick behind
  efficient autodiff: during the forward pass you already know `tanh(x)`, and the
  identity `d(tanh(x))/dx = 1 - tanh(x) ** 2` means the backward pass costs almost
  nothing extra -- no exponentials, no second call, just one subtraction and a
  square of a value you already have.

  The derivative peaks at `1` when `x = 0` (the curve is steepest there) and
  shrinks toward `0` for large positive or negative `x`, where tanh flattens out.
  That flattening is exactly the "vanishing gradient" you may have heard about:
  once a neuron saturates, `1 - tanh(x)**2` is tiny, so very little gradient flows
  back through it.
common_mistakes:
  - Calling math.tanh twice with slightly different code paths instead of reusing one stored value.
  - Writing the derivative as 1 - tanh(x) (forgetting the square) or as tanh(x) ** 2 - 1 (wrong sign).
  - Rounding only one of the two list entries, so the other keeps a floating-point tail.
