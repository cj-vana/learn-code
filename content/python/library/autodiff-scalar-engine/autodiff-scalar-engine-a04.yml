prompt_markdown: |
  Real networks squash a neuron's raw score through an activation function so it
  stays in a bounded range. A classic choice is the hyperbolic tangent,
  `tanh(x)`, which maps any input into `(-1, 1)`.

  Your scalar engine wants both halves of this node at once: the **forward**
  value it will pass on, and the **local derivative** it will need on the way
  back. The neat fact about tanh is that its derivative is expressible from its
  own output:

  ```
  d(tanh(x))/dx = 1 - tanh(x) ** 2
  ```

  So the backward pass can reuse the forward result instead of recomputing
  anything.

  The input is a single number `x` (the neuron's pre-activation score), not a
  dictionary. Write `tanh_pair(x)` that returns a two-element list

  ```
  [tanh(x), 1 - tanh(x) ** 2]
  ```

  Use `math.tanh` for the forward value. **Round each of the two returned numbers
  to 6 decimal places** with `round(value, 6)`.
