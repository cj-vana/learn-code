function_name: mse_loss
input_mode: function
solution_sketch: Sum the squared differences of paired prediction and target values, divide by the count, and round to 6 places.
sample_solution: |
  def mse_loss(job):
      predictions = job["predictions"]
      targets = job["targets"]
      total = 0.0
      for p, t in zip(predictions, targets):
          total += (p - t) ** 2
      return round(total / len(predictions), 6)
