explanation_markdown: |
  Mean squared error is the average of the squared residuals. Squaring does two
  jobs: it makes positive and negative errors both count as "wrong" so they cannot
  cancel, and it grows quadratically, so a single large miss dominates several
  small ones. Dividing by `n` keeps the scale comparable across datasets of
  different sizes.

  The rounding to 6 places tames float artifacts: the `[1, 2, 4]` versus all-`2`
  case gives `(1 + 0 + 4) / 3 = 1.6666...`, which rounds to `1.666667`. In a full
  engine this scalar is exactly the value you would call `.backward()` on: its
  gradient with respect to each prediction is `2 * (prediction - target) / n`,
  which then flows back through the model.
common_mistakes:
  - Dividing by n before summing, or forgetting to divide at all, which reports total rather than mean error.
  - Taking the absolute value or leaving the raw difference instead of squaring it (that would be a different loss).
  - Averaging over the wrong count when predictions and targets differ in length; here they are always the same length.
