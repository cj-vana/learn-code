prompt_markdown: |
  Training a model means shrinking a **loss**: a single number saying how wrong the
  predictions are. The workhorse loss for regression is **mean squared error**. It
  is the scalar an autodiff engine sits on top of -- the output node whose gradient
  seeds the whole backward pass.

  Imagine a model predicting daily rainfall in millimetres; you compare its
  predictions against the gauge readings (targets). Write `mse_loss(job)` that
  takes **one dictionary**:

  - `job["predictions"]`: a list of predicted numbers.
  - `job["targets"]`: a list of true numbers, the same length.

  For each pair, take the error `predictions[i] - targets[i]`, square it, and
  return the **average** of those squared errors:

  `mse = (1 / n) * sum((predictions[i] - targets[i]) ** 2 for all i)`

  where `n` is the number of pairs. Return the result **rounded to 6 decimal
  places**. A perfect prediction scores `0.0`.

  Example:

  ```python
  mse_loss({"predictions": [2.0, 4.0], "targets": [3.0, 1.0]})
  # errors: (2-3)=-1 -> 1 ; (4-1)=3 -> 9
  # mean: (1 + 9) / 2 = 5.0
  # -> 5.0
  ```
starter_code: |
