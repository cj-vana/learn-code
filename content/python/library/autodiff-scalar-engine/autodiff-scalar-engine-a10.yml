prompt_markdown: |
  A neuron is the smallest learnable unit in a network, and it is just an
  expression graph you can differentiate. Picture a tiny sensor that predicts how
  brightly a firefly will glow from a few readings. It multiplies each reading by
  a learned **weight**, adds a **bias**, and squashes the result through `tanh`
  into the range `(-1, 1)`.

  Write `neuron_forward(job)` that takes **one dictionary**:

  - `job["weights"]`: a list of weights `w`.
  - `job["inputs"]`: a list of inputs `x`, the same length as `weights`.
  - `job["bias"]`: a single number `b`.

  Compute the weighted sum (dot product) `z = w[0]*x[0] + w[1]*x[1] + ... + b`,
  then return `tanh(z)` **rounded to 6 decimal places**. Use `math.tanh`. Recall
  `tanh(0) = 0`, and `tanh` saturates toward `1` for large positive `z` and `-1`
  for large negative `z`.

  Example:

  ```python
  neuron_forward({"weights": [0.2, 0.3, 0.5], "bias": 0.0, "inputs": [1.0, 1.0, 1.0]})
  # z = 0.2 + 0.3 + 0.5 + 0.0 = 1.0
  # tanh(1.0) = 0.761594...
  # -> 0.761594
  ```
