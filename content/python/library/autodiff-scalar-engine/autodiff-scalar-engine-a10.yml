explanation_markdown: |
  A neuron composes two simple operations: a linear pre-activation
  `z = w . x + b` and a nonlinear activation `tanh(z)`. The dot product is a
  running total of `w[i] * x[i]`, seeded with the bias so it folds in cleanly. The
  `tanh` keeps the output bounded, which is what makes stacked neurons stable.

  Notice the saturating test: a large `z` like `13` gives `tanh` so close to `1`
  that it rounds to exactly `1.0` at 6 places, even though it never truly reaches
  `1`. This flat region is also where the neuron's gradient nearly vanishes -- a
  detail that matters once you differentiate it -- but the forward value here is
  simply the rounded activation.
common_mistakes:
  - Forgetting the bias, so z is only the dot product.
  - Applying tanh to each term separately instead of to the single summed pre-activation.
  - Rounding z before calling tanh, which distorts the activation instead of just trimming the final result.
