function_name: neuron_forward
input_mode: function
solution_sketch: Sum the element-wise products of weights and inputs, add the bias, pass through math.tanh, and round to 6 places.
sample_solution: |
  import math


  def neuron_forward(job):
      total = job["bias"]
      for w, x in zip(job["weights"], job["inputs"]):
          total += w * x
      return round(math.tanh(total), 6)
hints:
  - level: 1
    text: The dot product pairs each weight with the input at the same index. Use zip(weights, inputs) to walk them together.
  - level: 2
    text: Start an accumulator at the bias value, then add w * x for each pair. That accumulator is z, the pre-activation.
  - level: 3
    text: Return round(math.tanh(z), 6). Do not round z before applying tanh; round only the final activation.
