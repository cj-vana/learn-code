solution_sketch: Recursively evaluate a node from its op, caching results in a dict so shared nodes are computed once, then round the output value to 6 places.
sample_solution: |
  def eval_expression(job):
      nodes = job["nodes"]
      cache = {}

      def value(name):
          if name in cache:
              return cache[name]
          node = nodes[name]
          op = node["op"]
          if op == "leaf":
              result = node["value"]
          elif op == "add":
              result = 0.0
              for child in node["inputs"]:
                  result += value(child)
          else:
              result = 1.0
              for child in node["inputs"]:
                  result *= value(child)
          cache[name] = result
          return result

      return round(value(job["output"]), 6)
