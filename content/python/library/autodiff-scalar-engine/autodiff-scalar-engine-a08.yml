prompt_markdown: |
  Before an autodiff engine can compute gradients, it runs a **forward pass**: it
  evaluates every node of an expression graph to a number. Here you build that
  forward evaluator for a graph whose only operations are addition and
  multiplication -- the two primitives a scalar engine is built from.

  Write `eval_expression(job)` that takes **one dictionary**:

  - `job["nodes"]` maps each node name to a small dict describing it:
    - `{"op": "leaf", "value": v}` -- a raw input holding the float `v`.
    - `{"op": "add", "inputs": [names...]}` -- the **sum** of the listed nodes'
      values.
    - `{"op": "mul", "inputs": [names...]}` -- the **product** of the listed
      nodes' values.
  - `job["output"]` is the name of the node whose value you must return.

  Evaluate the output node by evaluating its inputs first (recursively), then
  combining them. A node may be listed as an input more than once (for example a
  square `x * x` has `inputs: ["x", "x"]`), and a node may feed several parents;
  compute each value from its definition. Return the output value **rounded to 6
  decimal places** with `round(value, 6)`.

  Example:

  ```python
  eval_expression({
      "nodes": {
          "x": {"op": "leaf", "value": 3.0},
          "y": {"op": "leaf", "value": 4.0},
          "c": {"op": "leaf", "value": 2.0},
          "p": {"op": "mul", "inputs": ["x", "y"]},   # 3 * 4 = 12
          "out": {"op": "add", "inputs": ["p", "c"]}, # 12 + 2 = 14
      },
      "output": "out",
  })
  # -> 14.0
  ```
