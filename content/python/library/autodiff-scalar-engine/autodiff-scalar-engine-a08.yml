  - level: 2
    text: For an add node start an accumulator at 0.0 and add each input's value; for a mul node start at 1.0 and multiply. Recurse to get each input's value.
  - level: 3
    text: Cache each computed value in a dict keyed by node name so a shared node is not re-evaluated, then return round(value(job["output"]), 6).
