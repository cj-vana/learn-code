explanation_markdown: |
  Evaluating an expression graph is a post-order walk: a node's value depends on
  its inputs, so you resolve the inputs first and then combine them. Addition
  starts from the identity 0.0 and multiplication from 1.0, which also makes an
  add or mul node with a single input behave sensibly. Caching each node's value
  the first time it is computed means a node shared by several parents (or an
  input listed twice, like `x * x`) is only evaluated once -- the same reuse an
  autodiff framework relies on.

  The `round(..., 6)` at the end matters because floats are inexact: `0.1 + 0.2`
  is stored as `0.30000000000000004`, and rounding pins the reported result to a
  clean `0.3`. Every value in this exercise flows out of that single rounding step
  on the final output.
common_mistakes:
  - Initializing a mul accumulator at 0.0 instead of 1.0, which forces every product to zero.
  - Rounding intermediate node values instead of only the final output, which can drift the answer.
  - Re-evaluating shared nodes without a cache, which still gives the right number but does needless work and misses the point of a graph.
