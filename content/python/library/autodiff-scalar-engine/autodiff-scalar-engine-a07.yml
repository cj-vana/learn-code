explanation_markdown: |
  Kahn's algorithm places nodes whose prerequisites are all satisfied. The
  in-degree of a node is how many of its prerequisites remain unplaced; when it
  reaches zero the node becomes eligible. Building `dependents` (the reverse of
  `edges`) lets you cheaply decrement the right in-degrees each time you place a
  node. Using a min-heap for the eligible set means that whenever there is a
  choice, the alphabetically smallest name comes out first, so the output is a
  single deterministic topological order. The whole run is O((V + E) log V).

  This is the backbone of an autodiff engine: the forward pass evaluates nodes in
  a topological order, and reverse-mode differentiation (backpropagation) sends
  gradients along the **reverse** of that order, guaranteeing that every node's
  gradient is fully accumulated before it is passed further back.
common_mistakes:
  - Sorting only the initial roots but then appending newly-ready nodes in discovery order, which breaks the alphabetical tie-break later in the run.
  - Forgetting to include leaf nodes (empty prerequisite lists) in the output, so the order is missing its inputs.
  - Building the graph as prerequisite lists but decrementing in-degrees as if the edges pointed the other way, producing a reversed order.
