solution_sketch: Count each node's prerequisites as an in-degree, build a reverse map from prerequisite to dependents, then run Kahn's algorithm using a min-heap of eligible node names so ties break alphabetically.
sample_solution: |
  import heapq


  def topo_order(graph):
      edges = graph["edges"]
      indegree = {node: len(prereqs) for node, prereqs in edges.items()}
      dependents = {node: [] for node in edges}
      for node, prereqs in edges.items():
          for prereq in prereqs:
              dependents[prereq].append(node)
      ready = [node for node, deg in indegree.items() if deg == 0]
      heapq.heapify(ready)
      order = []
      while ready:
          node = heapq.heappop(ready)
          order.append(node)
          for child in dependents[node]:
              indegree[child] -= 1
              if indegree[child] == 0:
                  heapq.heappush(ready, child)
      return order
hints:
  - level: 1
    text: A node is ready to place once every name in its prerequisite list has already been placed. Start with the nodes whose lists are empty.
  - level: 2
    text: Track an in-degree (number of not-yet-placed prerequisites) per node and a reverse map from each prerequisite to the nodes that depend on it. Placing a node lowers its dependents' in-degrees.
  - level: 3
    text: Keep the currently ready node names in a min-heap so heappop always returns the alphabetically smallest. When a dependent's in-degree hits zero, push it onto the heap.
