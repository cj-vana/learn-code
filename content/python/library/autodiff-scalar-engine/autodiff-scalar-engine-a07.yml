prompt_markdown: |
  A differentiable model (think of a tiny neural network predicting greenhouse
  temperature) is really a **graph of small computations**. Each node either holds
  an input number or combines earlier nodes. Before you can evaluate a node, every
  node it depends on must already be computed. That ordering is a **topological
  order**, and it is exactly what a framework works out before running a forward
  pass -- the *backward* pass then walks this same order in reverse.

  Write `topo_order(graph)` that takes **one dictionary**:

  - `graph["edges"]` maps each node name (a string) to a list of the node names
    that must be computed **before** it (its inputs, the "children needed first").
  - Every node appears as a key. A leaf (a raw input) maps to an empty list `[]`.
  - The graph is a valid DAG: there are no cycles.

  Return a list containing **every** node name, ordered so that each node appears
  **after** all the names in its list. When several nodes are eligible at the same
  moment (all of their prerequisites are already placed), append the
  **alphabetically smallest** name first. This tie-break makes the answer unique.

  Example:

  ```python
  topo_order({"edges": {"a": [], "b": [], "c": [], "d": ["a", "b"], "e": ["d", "c"]}})
  # a, b, c have no prerequisites -> placed alphabetically: a, b, c
  # then d (needs a, b), then e (needs d, c)
  # -> ["a", "b", "c", "d", "e"]
  ```
