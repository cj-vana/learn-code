prompt_markdown: |
  Your scalar autodiff engine needs a **power node**: raising one value to a
  fixed exponent, `out = a ** n`. This single node covers squares (`n = 2`),
  square roots (`n = 0.5`), and reciprocals (`n = -1`), which show up constantly
  in normalization and distance calculations.

  A star-brightness model computes `out = a ** n` from a measured flux `a`. On
  the backward pass the node receives `grad_out = dL/dout`. The power rule gives
  the local derivative

  ```
  d(out)/da = n * a ** (n - 1)
  ```

  so by the chain rule the gradient flowing back to `a` is

  ```
  dL/da = grad_out * n * a ** (n - 1)
  ```

  You are given `job` with this shape:

  ```
  {"a": 2.0, "n": 3, "grad_out": 1.0}
  ```

  Write `grads_pow(job)` that returns the single gradient
  `dL/da = n * a ** (n - 1) * grad_out` as a number, **rounded to 6 decimal
  places** with `round(value, 6)`. The exponent `n` may be a whole number, a
  fraction like `0.5`, or negative like `-1`.
starter_code: |
  def grads_pow(job):
      a = job["a"]
      n = job["n"]
      grad_out = job["grad_out"]
      # Apply the power rule, then the chain rule.
      return 0.0
function_name: grads_pow
input_mode: function
solution_sketch: Compute n * a ** (n - 1) * grad_out and round to 6 decimals.
sample_solution: |
  def grads_pow(job):
      a = job["a"]
      n = job["n"]
      grad_out = job["grad_out"]
      return round(n * a ** (n - 1) * grad_out, 6)
