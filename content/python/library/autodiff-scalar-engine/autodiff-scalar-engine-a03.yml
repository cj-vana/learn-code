explanation_markdown: |
  The power rule `d(a ** n)/da = n * a ** (n - 1)` is the one derivative formula
  that quietly does the most work in a numerical engine, because so many
  operations are secretly powers. Squaring is `n = 2` (its gradient is the
  familiar `2a`), taking a square root is `n = 0.5`, and taking a reciprocal is
  `n = -1` (gradient `-1 / a**2`). Writing one node that trusts the formula means
  you never special-case those.

  After computing the local derivative you still owe the chain rule: multiply by
  `grad_out`. That single multiplication is what stitches this node into the
  larger network so the loss's influence flows correctly back to `a`.
common_mistakes:
  - Forgetting to subtract one from the exponent, computing n * a ** n instead of n * a ** (n - 1).
  - Dropping the grad_out factor, which returns the local derivative rather than the backpropagated gradient.
  - Assuming the formula only works for whole-number exponents; it is identical for roots and reciprocals.
