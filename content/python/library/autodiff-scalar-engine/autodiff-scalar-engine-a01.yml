explanation_markdown: |
  Backpropagation is the chain rule applied node by node. For any node the rule is
  `dL/dinput = grad_out * (local derivative)`. Addition is the friendliest case:
  because `total = a + b` changes one-for-one with each input, both local
  derivatives are exactly `1`, and multiplying by `1` leaves `grad_out`
  untouched. So a plus node acts like a splitter that copies the same gradient to
  every addend.

  This is why summing many things together (bias terms, residual connections,
  pooled scores) is cheap during the backward pass: the gradient simply fans out
  to each contributor with no rescaling.
common_mistakes:
  - Returning grad_out only once instead of once per input; an addition node feeds both addends.
  - Dividing grad_out in half, as if the gradient were shared; it is copied in full to each input.
  - Reading the wrong key from the job dict instead of "grad_out".
