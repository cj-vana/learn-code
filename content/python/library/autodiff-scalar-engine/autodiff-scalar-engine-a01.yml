prompt_markdown: |
  You are hand-building a tiny autodiff engine, the kind that powers neural
  networks. Every value in the network is a scalar, and every operation is a
  little node that knows how to pass gradients backward.

  Consider an **addition node**. A tide gauge combines two readings into one
  total: `total = a + b`. During training the engine works backward from a loss
  `L` and hands this node an incoming gradient `grad_out`, which is `dL/dtotal`
  (how much the loss changes when `total` changes).

  Your job is the **chain rule**. The local derivatives of `total = a + b` are

  ```
  d(total)/da = 1        d(total)/db = 1
  ```

  so the gradient reaching each input is

  ```
  dL/da = grad_out * 1 = grad_out
  dL/db = grad_out * 1 = grad_out
  ```

  In words: an addition node **routes the incoming gradient, unchanged, to both
  addends**. Nothing gets scaled.

  You are given `job` with this shape:

  ```
  {"grad_out": 2.5}
  ```

  Write `grads_add(job)` that returns the two input gradients as a list
  `[grad_a, grad_b]`. Because addition just copies the gradient, both entries
  equal `grad_out`.
starter_code: |
  def grads_add(job):
      grad_out = job["grad_out"]
      # Addition routes the same gradient to both inputs.
      return []
function_name: grads_add
input_mode: function
solution_sketch: Read grad_out from the job dict and return it twice in a list, since d(a+b)/da and d(a+b)/db are both 1.
sample_solution: |
  def grads_add(job):
      grad_out = job["grad_out"]
      return [grad_out, grad_out]
