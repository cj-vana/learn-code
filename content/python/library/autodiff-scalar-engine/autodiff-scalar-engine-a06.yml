prompt_markdown: |
  Here is the subtlety that trips up every from-scratch autodiff engine: when a
  single value feeds into **more than one** later operation, the backward pass
  reaches it several times, once along each path it fed. The correct total
  gradient for that value is the **sum** of all those contributions. That is why
  real engines write `node.grad += contribution` (add) instead of
  `node.grad = contribution` (overwrite) -- overwriting would throw away every
  contribution but the last.

  You are given `contributions`, a list of `[node_name, grad]` pairs collected
  during a backward pass, for example:

  ```
  [["a", 1.5], ["b", 2.5], ["a", 0.5]]
  ```

  Here node `"a"` was used twice and picked up two contributions.

  Write `accumulate_grads(contributions)` that returns a dictionary mapping each
  node name to the **sum** of its contributions. **Round each summed value to 6
  decimal places** with `round(value, 6)`. An empty list returns an empty
  dictionary `{}`. Sum first, then round the final total for each node.
starter_code: |
  def accumulate_grads(contributions):
      # Sum every contribution per node name, then round each total.
      totals = {}
      return totals
function_name: accumulate_grads
input_mode: function
solution_sketch: Add each pair's grad into a dict keyed by node name using +=, then round every accumulated total to 6 decimals.
sample_solution: |
  def accumulate_grads(contributions):
      totals = {}
      for name, grad in contributions:
          totals[name] = totals.get(name, 0.0) + grad
      return {name: round(total, 6) for name, total in totals.items()}
hints:
  - level: 1
    text: A node that appears in several pairs must have its gradients added together, not replaced.
  - level: 2
    text: Use totals.get(name, 0.0) + grad so the first sighting starts from zero and later ones add on.
  - level: 3
    text: After summing every pair, round each accumulated value with a dict comprehension so 0.1 + 0.2 becomes 0.3.
