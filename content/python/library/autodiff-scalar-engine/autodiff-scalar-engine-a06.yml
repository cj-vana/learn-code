explanation_markdown: |
  This is the rule that makes shared values work in a computation graph. If `x`
  is fed into two different downstream operations, then changing `x` moves the
  loss through *both* of them, and calculus says those effects add. During
  backprop each path independently reports its contribution to `x`, and the
  engine sums them. Overwriting instead of adding is the single most common bug
  when people first build autodiff by hand -- it silently drops gradients and the
  network trains wrong.

  Summing before rounding matters too: `0.1 + 0.2` is `0.30000000000000004` in
  floating point, so you round the finished total to `0.3` once, rather than
  rounding each piece and hoping the tails cancel.
common_mistakes:
  - Overwriting with totals[name] = grad instead of adding, so only each node's last contribution survives.
  - Rounding each contribution before summing rather than rounding the final per-node total.
  - Assuming a node appears at most once, so no accumulation is needed.
