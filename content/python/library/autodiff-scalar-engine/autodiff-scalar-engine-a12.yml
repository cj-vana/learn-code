prompt_markdown: |
  How do you know your backward pass is correct? You **gradient-check** it: compare
  the analytic gradient your engine produced against a numerical estimate from
  nudging the input slightly. The reliable estimate is the **central difference**,
  which cancels first-order error and is accurate to `O(eps^2)`.

  Here the function is a polynomial (think of a smooth "energy" curve). Write
  `numeric_gradient_check(job)` that takes **one dictionary**:

  - `job["poly"]`: coefficients `[c0, c1, c2, ...]` defining
    `f(x) = c0 + c1*x + c2*x**2 + c3*x**3 + ...` (coefficient `ck` multiplies
    `x**k`).
  - `job["x"]`: the point at which to check the gradient.
  - `job["analytic"]`: the gradient your engine claims at `x`.
  - `job["eps"]`: the small step for the numerical estimate.
  - `job["tol"]`: the tolerance.

  Compute the central-difference estimate

  `estimate = (f(x + eps) - f(x - eps)) / (2 * eps)`

  and return a **bool**: `True` if `abs(estimate - analytic) <= tol`, else `False`.

  Example:

  ```python
  numeric_gradient_check({"poly": [2.0, 3.0, 4.0], "x": 1.0,
                          "analytic": 11.0, "eps": 0.001, "tol": 1e-6})
  # f(x) = 2 + 3x + 4x**2, so f'(x) = 3 + 8x, and f'(1) = 11
  # the central difference of a quadratic is exact here, matching 11 within tol
  # -> True
  ```
starter_code: |
  def numeric_gradient_check(job):
