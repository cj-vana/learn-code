function_name: numeric_gradient_check
input_mode: function
solution_sketch: Define f(t) by summing ck * t**k over the coefficients, form the central difference (f(x+eps) - f(x-eps)) / (2*eps), and return whether it lands within tol of the analytic gradient.
sample_solution: |
  def numeric_gradient_check(job):
      poly = job["poly"]
      x = job["x"]
      eps = job["eps"]

      def f(t):
          total = 0.0
          for power, coeff in enumerate(poly):
              total += coeff * (t ** power)
          return total

      estimate = (f(x + eps) - f(x - eps)) / (2 * eps)
      return abs(estimate - job["analytic"]) <= job["tol"]
hints:
