  - level: 2
    text: The central difference evaluates f at x + eps and x - eps, subtracts, and divides by 2 * eps. It is more accurate than the one-sided (f(x+eps) - f(x)) / eps.
  - level: 3
    text: Compare abs(estimate - analytic) against tol with <=, and return that boolean directly. Do not round; just return the comparison result.
