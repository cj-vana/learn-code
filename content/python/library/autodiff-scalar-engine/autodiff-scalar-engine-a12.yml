explanation_markdown: |
  Central differences estimate a derivative by sampling the function just above and
  just below `x`. Subtracting the two samples cancels the even part of the local
  error, leaving an `O(eps^2)` approximation -- far better than a one-sided
  difference. For linear and quadratic `f`, the estimate is essentially exact
  (differing only by floating-point noise), which is why the linear and quadratic
  checks pass under an extremely tight tolerance.

  For higher-degree polynomials a real gap appears: for `f(x) = x**3` the central
  difference equals `3*x**2 + eps**2`, so with `eps = 0.01` at `x = 2` it reads
  `12.0001`, off by `1e-4`. That fails a `1e-6` tolerance but passes at `1e-3`.
  The quartic case is subtler: the claimed analytic value `4` is actually correct
  (the slope of `x**4` at `1` is `4`), yet the check still fails because with the
  large step `eps = 0.1` the estimate lands near `4.04` -- the `O(eps**2)` error
  alone exceeds a `1e-6` tolerance. The lesson is that the tolerance, not just the
  claim, must fit the step size and curvature. Tuning that trade-off is exactly
  what you do when gradient-checking a real engine.
common_mistakes:
  - Using a one-sided difference (f(x+eps) - f(x)) / eps, which is only O(eps) accurate and fails tight tolerances on curved functions.
  - Comparing with < instead of <=, so a difference exactly equal to tol is rejected.
  - Building the polynomial with the coefficients in reverse power order, so f evaluates a different function.
