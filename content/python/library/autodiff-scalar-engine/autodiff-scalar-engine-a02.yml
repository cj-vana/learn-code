explanation_markdown: |
  Multiplication is where autodiff starts to feel less obvious. The key fact is
  the swap: when `product = a * b`, nudging `a` changes the product at a rate set
  by `b` (its partner), so `d(product)/da = b`. The chain rule then gives
  `dL/da = grad_out * b`, and symmetrically `dL/db = grad_out * a`.

  A useful intuition: if `b` is large, then `a` has a lot of leverage over the
  product, so a small change in `a` moves the loss a lot -- hence its gradient is
  scaled by `b`. This cross-wiring is exactly what makes a real network's weights
  and inputs push gradients onto each other during training.
common_mistakes:
  - Pairing each input with itself (grad_a = grad_out * a), which ignores the product rule's swap.
  - Forgetting to multiply by grad_out, returning only the local derivatives b and a.
  - Skipping round(value, 6), so a floating-point tail makes the exact comparison fail.
