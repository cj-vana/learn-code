prompt_markdown: |
  You are still building your scalar autodiff engine. This time the node is a
  **multiplication node**: a tea-blend model multiplies a strength `a` by an
  amount `b` to get `product = a * b`.

  The backward pass hands the node an incoming gradient `grad_out`, meaning
  `dL/dproduct`. The local derivatives of `product = a * b` are

  ```
  d(product)/da = b        d(product)/db = a
  ```

  Notice the **swap**: the derivative with respect to `a` is the *other* factor
  `b`, and vice versa. Applying the chain rule:

  ```
  dL/da = grad_out * b
  dL/db = grad_out * a
  ```

  You are given `job` with this shape:

  ```
  {"a": 2.0, "b": -5.0, "grad_out": 1.0}
  ```

  Write `grads_mul(job)` that returns `[grad_a, grad_b]`, where
  `grad_a = grad_out * b` and `grad_b = grad_out * a`. **Round each returned
  value to 6 decimal places** with `round(value, 6)`.
starter_code: |
  def grads_mul(job):
      a = job["a"]
      b = job["b"]
      grad_out = job["grad_out"]
      # Each input's gradient uses the OTHER operand.
      return []
function_name: grads_mul
input_mode: function
solution_sketch: Multiply grad_out by b for a's gradient and by a for b's gradient, rounding each to 6 decimals.
sample_solution: |
  def grads_mul(job):
      a = job["a"]
      b = job["b"]
      grad_out = job["grad_out"]
      grad_a = round(grad_out * b, 6)
      grad_b = round(grad_out * a, 6)
      return [grad_a, grad_b]
