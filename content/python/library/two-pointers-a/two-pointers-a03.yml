prompt_markdown: |
  Two loading bays at a bus depot each record their buses' arrival minutes in
  ascending order. Dispatch needs one combined timetable, still sorted.

  Write `merge_arrivals(data)` where `data` is a dict with keys `first` and
  `second`, each a list of integers sorted in ascending order. Return a single
  list containing every arrival time from both bays in ascending order. Keep
  duplicates if the same minute appears in both.
starter_code: |
  def merge_arrivals(data):
      return []
function_name: merge_arrivals
input_mode: function
solution_sketch: Advance a pointer through each list, always copying the smaller current arrival.
sample_solution: |
  def merge_arrivals(data):
      first = data["first"]
      second = data["second"]
      i = 0
      j = 0
      merged = []
      while i < len(first) and j < len(second):
          if first[i] <= second[j]:
              merged.append(first[i])
              i += 1
          else:
              merged.append(second[j])
              j += 1
      merged.extend(first[i:])
      merged.extend(second[j:])
      return merged
hints:
  - level: 1
    text: Each list is already sorted, so the next smallest overall is at one of the two fronts.
  - level: 2
    text: Keep a pointer into each list and append whichever front value is smaller.
  - level: 3
    text: After one list runs out, append everything remaining in the other.
tests:
  public:
    - name: interleaved
      input: {first: [1, 4, 6], second: [2, 3, 5]}
      expected: [1, 2, 3, 4, 5, 6]
    - name: one_empty
      input: {first: [], second: [2, 4]}
      expected: [2, 4]
    - name: back_to_back
      input: {first: [1, 2], second: [3, 4]}
      expected: [1, 2, 3, 4]
  validation:
    - name: both_empty
      input: {first: [], second: []}
      expected: []
    - name: with_duplicates
      input: {first: [1, 1, 3], second: [1, 2]}
      expected: [1, 1, 1, 2, 3]
    - name: unequal_lengths
      input: {first: [5], second: [1, 2, 3, 4]}
      expected: [1, 2, 3, 4, 5]
explanation_markdown: |
  Merging two sorted lists is the core step of merge sort. Two pointers scan the
  inputs together in O(n + m) time: at each step the smaller front element is the
  next value overall. When one pointer reaches the end, the remaining tail of the
  other list is already sorted and can be appended directly.
common_mistakes:
  - Concatenating the lists and re-sorting instead of merging in linear time.
  - Forgetting to append the leftover tail once one list is exhausted.
  - Dropping duplicates that legitimately appear in both lists.
