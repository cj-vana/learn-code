    - name: subset
      input: {first: [1, 2, 3, 4], second: [2, 4]}
      expected: [2, 4]
explanation_markdown: |
  Because both rosters are sorted, a single synchronized walk finds the
  intersection in O(n + m) time. Matching IDs are collected and both pointers move
  on; when the values differ, the smaller ID cannot appear again on that side, so
  only that pointer advances. This avoids building any lookup structure.
common_mistakes:
  - Advancing both pointers when the IDs differ and skipping over a match.
  - Using nested loops that compare every ID against every other.
  - Assuming both rosters are the same length.
