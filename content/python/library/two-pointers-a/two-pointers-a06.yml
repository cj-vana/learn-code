prompt_markdown: |
  A rental dock pairs paddlers two to a kayak, and each kayak has a combined
  weight limit. Given every paddler's weight sorted in ascending order, count how
  many distinct pairs could share a kayak without exceeding the limit.

  Write `count_light_pairs(data)` where `data` is a dict with keys `weights`
  (a list of integers sorted ascending) and `limit` (an integer). Return the
  number of unordered pairs `(i, j)` with `i < j` whose weights sum to at most
  `limit`.
starter_code: |
  def count_light_pairs(data):
      return 0
function_name: count_light_pairs
input_mode: function
solution_sketch: With pointers at both ends, when the outer pair fits, every paddler between them also pairs with the left one.
sample_solution: |
  def count_light_pairs(data):
      weights = data["weights"]
      limit = data["limit"]
      left = 0
      right = len(weights) - 1
      count = 0
      while left < right:
          if weights[left] + weights[right] <= limit:
              count += right - left
              left += 1
          else:
              right -= 1
      return count
hints:
  - level: 1
    text: Sorting lets you reason about the lightest and heaviest remaining paddlers at once.
  - level: 2
    text: If the lightest and heaviest fit together, the lightest fits with everyone in between too.
  - level: 3
    text: When a pair fits, add right - left to the count and move left inward; otherwise move right inward.
