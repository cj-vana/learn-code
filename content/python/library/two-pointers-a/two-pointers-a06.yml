explanation_markdown: |
  The two-pointer trick turns an O(n^2) pair scan into O(n). When the lightest and
  heaviest remaining paddlers fit together, so does the lightest with every
  paddler between them, which is exactly `right - left` pairs, so you can add them
  all at once and advance the left pointer. If they do not fit, the heaviest cannot
  pair with anyone lighter that is still unpaired, so retreat the right pointer.
common_mistakes:
  - Counting only a single pair instead of the right - left pairs the left paddler forms.
  - Using a strict less-than when the limit itself should be allowed.
  - Falling back to nested loops and losing the linear-time benefit.
