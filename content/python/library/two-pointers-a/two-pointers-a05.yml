prompt_markdown: |
  A conference gate scanner records badge numbers in the order they beep, and the
  numbers already arrive sorted in non-decreasing order. Because attendees
  sometimes swipe twice, the same number can appear back to back.

  Write `unique_badges(badges)` where `badges` is a list of integers sorted in
  non-decreasing order. Return a new list with each badge number kept only once,
  still in ascending order.
starter_code: |
  def unique_badges(badges):
      return []
function_name: unique_badges
input_mode: function
solution_sketch: Keep a write pointer for the last kept value and copy a new value only when the read pointer differs.
sample_solution: |
  def unique_badges(badges):
      if not badges:
          return []
      result = badges[:]
      write = 0
      for read in range(1, len(result)):
          if result[read] != result[write]:
              write += 1
              result[write] = result[read]
      return result[:write + 1]
hints:
  - level: 1
    text: Equal values in a sorted list always sit next to each other.
  - level: 2
    text: Keep a write pointer at the last unique value while a read pointer scans ahead.
  - level: 3
    text: Only advance and overwrite at write when the read value differs from the last kept one.
tests:
