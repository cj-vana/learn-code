      expected: [1, 2, 5]
explanation_markdown: |
  Sorting guarantees duplicates are adjacent, so a single pass suffices. The write
  pointer marks the end of the unique region while the read pointer scans forward;
  each genuinely new value is copied just past the write pointer. Slicing up to
  `write + 1` returns exactly the distinct prefix in O(n) time.
common_mistakes:
  - Reaching for a set, which loses the guaranteed ascending order.
  - Comparing against the original element instead of the last kept value.
  - Returning the whole buffer instead of slicing to the unique prefix.
