explanation_markdown: |
  Squaring flips the ordering for negatives, but the extremes of the sorted input
  still hold the largest magnitudes. Two pointers at the ends compare the squared
  candidates and drop the larger into the next open slot from the back, so the
  result is built in descending-position order in O(n) time, beating a
  square-then-sort at O(n log n).
common_mistakes:
  - Squaring first and calling sort, which ignores the pattern and is slower.
  - Filling the result from the front, where the largest square does not belong.
  - Forgetting that a large-magnitude negative can outweigh a positive at the other end.
