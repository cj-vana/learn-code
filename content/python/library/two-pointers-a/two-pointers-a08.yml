prompt_markdown: |
  A greenhouse logs each day's temperature deviation from its target, and the
  readings are already sorted in ascending order (so cold days are negative and
  warm days positive). An analyst needs the squared deviations, sorted ascending.

  Write `sorted_squared(values)` where `values` is a list of integers sorted in
  ascending order. Return a new list of their squares in ascending order. Do this
  in a single pass rather than squaring and re-sorting.
starter_code: |
  def sorted_squared(values):
      return []
function_name: sorted_squared
input_mode: function
solution_sketch: The largest square is at one of the two ends; fill the result from the back while pointers close in.
sample_solution: |
  def sorted_squared(values):
      n = len(values)
      result = [0] * n
      left = 0
      right = n - 1
      pos = n - 1
      while left <= right:
          low = values[left] ** 2
          high = values[right] ** 2
          if low > high:
              result[pos] = low
              left += 1
          else:
              result[pos] = high
              right -= 1
          pos -= 1
      return result
hints:
  - level: 1
    text: After squaring, the biggest value comes from whichever end has the larger magnitude.
  - level: 2
    text: Compare the squares at the two ends and place the larger one at the back of the result.
  - level: 3
    text: Fill the result from the last index toward the front, moving whichever pointer supplied the bigger square.
