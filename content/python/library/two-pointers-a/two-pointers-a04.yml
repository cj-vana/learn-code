prompt_markdown: |
  A theatre stores a row's seat map as a list of integers. A non-zero value is a
  held seat number; a `0` marks a sold-out slot. The box office wants every held
  seat pushed to the front in its original order, with all the sold-out `0`s
  gathered at the end.

  Write `settle_seats(seats)` and return the rearranged list. The relative order
  of the held (non-zero) seats must be preserved.
starter_code: |
  def settle_seats(seats):
      return []
function_name: settle_seats
input_mode: function
solution_sketch: Keep a write pointer for the next held seat and swap non-zeros forward as a read pointer scans.
sample_solution: |
  def settle_seats(seats):
      result = seats[:]
      write = 0
      for read in range(len(result)):
          if result[read] != 0:
              result[write], result[read] = result[read], result[write]
              write += 1
      return result
hints:
  - level: 1
    text: Track the position where the next held seat should land.
  - level: 2
    text: A read pointer scans forward while a write pointer marks the front region of held seats.
  - level: 3
    text: When the read pointer finds a non-zero, swap it to the write position and advance write.
