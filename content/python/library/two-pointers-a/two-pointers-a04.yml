explanation_markdown: |
  A slow write pointer and a fast read pointer partition the list in one pass. The
  write pointer always points just past the settled held seats; each time the read
  pointer finds a non-zero value it swaps it into place. Because held seats are
  moved in the order they are seen, their relative order is preserved while the
  zeros fall to the back.
common_mistakes:
  - Deleting zeros and re-padding, which can reorder the held seats.
  - Advancing the write pointer even when the current value is a zero.
  - Assuming the input has no zeros or is never empty.
