prompt_markdown: |
  A vending machine lists its snack calorie counts in ascending order. A dietician
  wants to know whether any two different snacks together total exactly a target
  number of calories.

  Write `has_pair_summing_to(data)` where `data` is a dict with keys `values`
  (a list of integers sorted in ascending order) and `target` (an integer).
  Return `True` if two snacks at different positions sum to `target`, else `False`.
starter_code: |
  def has_pair_summing_to(data):
      return False
function_name: has_pair_summing_to
input_mode: function
solution_sketch: Start pointers at both ends of the sorted list and move them based on the running sum.
sample_solution: |
  def has_pair_summing_to(data):
      values = data["values"]
      target = data["target"]
      left = 0
      right = len(values) - 1
      while left < right:
          total = values[left] + values[right]
          if total == target:
              return True
          if total < target:
              left += 1
          else:
              right -= 1
      return False
hints:
  - level: 1
    text: Because the list is sorted, the smallest and largest values sit at the two ends.
  - level: 2
    text: If the current pair sums too low, you need a larger value; if too high, a smaller one.
  - level: 3
    text: Move left inward when the sum is below target and right inward when it is above.
