      expected: true
    - name: repeated_values
      input: {values: [1, 1, 1], target: 5}
      expected: false
explanation_markdown: |
  On a sorted list, two pointers converge in O(n) time without any extra storage.
  The sum of the outer pair tells you which way to move: raise the low end to
  increase the total, or lower the high end to decrease it. Requiring `left < right`
  guarantees the two snacks are at different positions.
common_mistakes:
  - Allowing the same position to be used twice by testing left <= right.
  - Scanning every pair with nested loops instead of exploiting the sorted order.
  - Moving the wrong pointer when the running sum overshoots the target.
