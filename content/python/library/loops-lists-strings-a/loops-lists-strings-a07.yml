prompt_markdown: |
  A weather station logs each day as `'S'` (sunny) or `'R'` (rainy) in one
  string, oldest day first. Write `longest_sunny_streak(log)` returning the
  length of the longest run of consecutive `'S'` characters. A log with no sunny
  days (or an empty log) returns 0.
starter_code: |
  def longest_sunny_streak(log):
      return 0
function_name: longest_sunny_streak
input_mode: function
solution_sketch: Track the current run of 'S' and the best run seen, resetting on 'R'.
sample_solution: |
  def longest_sunny_streak(log):
      best = 0
      current = 0
      for day in log:
          if day == 'S':
              current += 1
              if current > best:
                  best = current
          else:
              current = 0
      return best
hints:
  - level: 1
    text: Keep two counters, one for the current streak and one for the best streak.
  - level: 2
    text: Each sunny day extends the current streak; a rainy day resets it to 0.
  - level: 3
    text: After extending the current streak, update best whenever current exceeds it.
tests:
  public:
