explanation_markdown: |
  A `current` counter grows on each sunny day and resets to 0 on a rainy day,
  measuring the length of the run ending at the current position. Recording the
  largest `current` ever seen in `best` captures the longest streak, and one
  pass over the string makes it O(n).
common_mistakes:
  - Counting every 'S' instead of only consecutive ones.
  - Forgetting to reset the current streak on a rainy day.
  - Updating best only after the loop, missing a streak that ends mid-string.
