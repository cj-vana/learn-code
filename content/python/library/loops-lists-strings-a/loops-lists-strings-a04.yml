prompt_markdown: |
  A spelling club lists the words practiced during a session. Write
  `longest_word(words)` returning the longest word in the list. If two or more
  words tie for the longest length, return the first one that reaches that
  length. An empty list returns the empty string `''`.
starter_code: |
  def longest_word(words):
      return ''
function_name: longest_word
input_mode: function
solution_sketch: Track the best word so far, replacing it only on a strictly longer word.
sample_solution: |
  def longest_word(words):
      longest = ''
      for word in words:
          if len(word) > len(longest):
              longest = word
      return longest
hints:
  - level: 1
    text: Remember the best word seen so far while you loop.
  - level: 2
    text: Start with the empty string, whose length is 0.
  - level: 3
    text: Replace the best word only when the new word is strictly longer, so ties keep the earlier word.
tests:
  public:
    - name: empty
      input: []
      expected: ''
    - name: single
      input: ['garden']
      expected: 'garden'
    - name: clear_winner
      input: ['cat', 'hippo', 'ox']
      expected: 'hippo'
  validation:
