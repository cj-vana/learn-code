explanation_markdown: |
  A single pass keeps the longest word found so far. Comparing with strictly
  greater-than (`>`) means a later word of equal length never replaces an
  earlier one, so ties naturally resolve to the first word that reached the
  maximum length. Starting from `''` handles the empty-list case for free.
common_mistakes:
  - Using >= so a tie returns the last matching word instead of the first.
  - Initializing with words[0] and crashing on an empty list.
  - Comparing the words themselves instead of their lengths.
