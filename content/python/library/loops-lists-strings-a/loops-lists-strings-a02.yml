prompt_markdown: |
  A vineyard measures the sugar level of each grape batch. Write
  `ripe_batches(data)` where `data` is a dict with keys `levels` (a list of
  numbers) and `minimum` (a number). Return a new list containing only the
  levels that are at least `minimum`, keeping their original order.
starter_code: |
  def ripe_batches(data):
      return []
function_name: ripe_batches
input_mode: function
solution_sketch: Unpack the dict, then collect levels that meet the minimum in order.
sample_solution: |
  def ripe_batches(data):
      levels = data["levels"]
      minimum = data["minimum"]
      result = []
      for level in levels:
          if level >= minimum:
              result.append(level)
      return result
hints:
