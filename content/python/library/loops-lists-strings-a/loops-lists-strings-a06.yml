prompt_markdown: |
  A playlist app trims repeated songs but keeps the order they were first heard.
  Write `first_plays(songs)` returning a new list of the song ids in the order
  each one first appears, with every later duplicate removed.
starter_code: |
  def first_plays(songs):
      return []
function_name: first_plays
input_mode: function
solution_sketch: Track seen ids in a set and append each id the first time it appears.
sample_solution: |
  def first_plays(songs):
      seen = set()
      result = []
      for song in songs:
          if song not in seen:
              seen.add(song)
              result.append(song)
      return result
hints:
  - level: 1
    text: Walk the list once and decide whether each id is new.
  - level: 2
    text: A set remembers which ids have already been added and tests membership fast.
  - level: 3
    text: Append to the result and record in the set only when the id is not already seen.
