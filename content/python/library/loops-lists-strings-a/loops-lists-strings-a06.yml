explanation_markdown: |
  A set gives O(1) membership checks, so one pass keeps the whole routine O(n).
  The result list records each id the first time it is seen, which preserves
  first-appearance order, while the set prevents any later duplicate from being
  appended again.
common_mistakes:
  - Sorting the result and losing the first-appearance order.
  - Using a list instead of a set for membership, making the scan slow.
  - Adding an id to the result before checking whether it was already seen.
