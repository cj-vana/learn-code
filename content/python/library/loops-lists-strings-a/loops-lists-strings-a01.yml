prompt_markdown: |
  A park ranger records each segment of a trail as a single character in one
  string: `'F'` for flat, `'U'` for uphill, and `'D'` for downhill. Write
  `count_climbs(trail)` returning how many uphill (`'U'`) segments the trail has.
  Only an uppercase `'U'` counts. An empty string returns 0.
starter_code: |
  def count_climbs(trail):
      return 0
function_name: count_climbs
input_mode: function
solution_sketch: Loop over the characters and count how many equal 'U'.
sample_solution: |
  def count_climbs(trail):
      total = 0
      for step in trail:
          if step == 'U':
              total += 1
      return total
hints:
  - level: 1
    text: A string can be looped over one character at a time.
  - level: 2
    text: Keep a counter that starts at 0 before the loop.
  - level: 3
    text: Add 1 to the counter only when the character equals 'U'.
tests:
  public:
    - name: empty
      input: ''
      expected: 0
    - name: one_climb
      input: 'FFUF'
      expected: 1
    - name: mixed
      input: 'UFDUU'
      expected: 3
  validation:
    - name: no_climbs
      input: 'FFDDF'
