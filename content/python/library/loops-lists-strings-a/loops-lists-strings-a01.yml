explanation_markdown: |
  Iterating over a string yields one character per step. A running counter that
  increases only when the character is `'U'` measures the uphill segments in a
  single O(n) pass. Because the check is `== 'U'`, lowercase `'u'` is ignored.
common_mistakes:
  - Counting every character instead of only the uphill ones.
  - Treating lowercase 'u' as an uphill segment.
  - Resetting the counter inside the loop.
