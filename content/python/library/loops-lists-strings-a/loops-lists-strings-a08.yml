prompt_markdown: |
  A conveyor belt inspector checks every other package, starting with the first
  one. Write `inspected_packages(packages)` returning a new list containing the
  packages at positions 0, 2, 4, and so on, in their original order.
starter_code: |
  def inspected_packages(packages):
      return []
function_name: inspected_packages
input_mode: function
solution_sketch: Use a step-2 slice starting at index 0.
sample_solution: |
  def inspected_packages(packages):
      return packages[::2]
hints:
  - level: 1
    text: A slice can take a step value as its third part.
  - level: 2
    text: packages[start:stop:step] with step 2 skips every other item.
  - level: 3
    text: Leaving start and stop empty and using step 2 gives packages[::2].
