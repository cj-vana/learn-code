explanation_markdown: |
  The slice `packages[::2]` walks the list from the start to the end taking every
  second element, which are exactly indices 0, 2, 4, and so on. It returns a new
  list and works for any length, including empty and single-element lists.
common_mistakes:
  - Starting at index 1 and inspecting the wrong packages.
  - Using a step of 2 in a range but forgetting to collect the elements themselves.
  - Mutating the original list instead of returning a new one.
