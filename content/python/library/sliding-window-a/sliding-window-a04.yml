prompt_markdown: |
  A choir director writes a chant as a single lowercase string, one letter per
  beat. To find the most singable stretch, write `max_vowels_in_window(data)`
  returning the greatest number of vowels (`a`, `e`, `i`, `o`, `u`) found in any
  `k` consecutive letters.

  `data` is a dict: `{"chant": "...", "k": k}`. The chant is all lowercase, and
  `k` is at least 1 and no larger than the chant's length.
starter_code: |
  def max_vowels_in_window(data):
      return 0
function_name: max_vowels_in_window
input_mode: function
solution_sketch: Count vowels in the first window, then slide by adjusting for the entering and leaving letters.
sample_solution: |
  def max_vowels_in_window(data):
      chant = data["chant"]
      k = data["k"]
      vowels = set("aeiou")
      count = sum(1 for c in chant[:k] if c in vowels)
      best = count
      for i in range(k, len(chant)):
          if chant[i] in vowels:
              count += 1
          if chant[i - k] in vowels:
              count -= 1
          if count > best:
              best = count
      return best
hints:
  - level: 1
    text: Track how many vowels are inside the current window rather than recounting each time.
  - level: 2
    text: A set of vowels lets you test membership quickly.
  - level: 3
    text: When sliding, add 1 if the entering letter is a vowel and subtract 1 if the leaving letter was.
