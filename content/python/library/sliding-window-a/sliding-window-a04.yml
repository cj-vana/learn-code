explanation_markdown: |
  Keeping a running vowel count for the current window turns each slide into two
  constant-time checks: was the entering letter a vowel, and was the leaving
  letter a vowel? That makes the whole scan O(n). Because only the five lowercase
  vowels are in the set, consonants and any uppercase letters are ignored.
common_mistakes:
  - Recounting vowels across the whole window on every step.
  - Adjusting for the entering letter but forgetting the one that leaves the window.
  - Treating y or uppercase letters as vowels.
