prompt_markdown: |
  A food truck logs how many orders it takes each hour it is parked. Given the
  list `orders` and a window size `k`, write `busiest_window(data)` returning the
  largest total number of orders across any `k` consecutive hours.

  `data` is a dict: `{"orders": [...], "k": k}`. You may assume `k` is at least 1
  and no larger than the number of hours recorded.
starter_code: |
  def busiest_window(data):
      return 0
function_name: busiest_window
input_mode: function
solution_sketch: Sum the first k hours, then slide by adding the new hour and dropping the oldest, tracking the max.
sample_solution: |
  def busiest_window(data):
      orders = data["orders"]
      k = data["k"]
      window = sum(orders[:k])
      best = window
      for i in range(k, len(orders)):
          window += orders[i] - orders[i - k]
          if window > best:
              best = window
      return best
hints:
  - level: 1
    text: You never need to re-add every hour; keep a running total for the current window.
  - level: 2
    text: Start with the sum of the first k hours, then slide one hour at a time.
  - level: 3
    text: When you move the window right, add orders[i] and subtract orders[i - k].
