explanation_markdown: |
  A fixed-size sliding window avoids recomputing each window from scratch. After
  summing the first `k` hours, each step to the right adds the incoming hour and
  removes the hour that just left the window, so the whole scan is O(n) instead of
  O(n*k). Tracking the largest window total as you go yields the busiest stretch.
common_mistakes:
  - Recomputing sum(orders[start:start+k]) for every window, which is slower than needed.
  - Forgetting to subtract the hour that leaves the window when sliding.
  - Initializing best to 0, which breaks if every value is negative.
