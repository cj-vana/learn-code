explanation_markdown: |
  The running window sum lets each window be tested in constant time, and the
  function returns the moment a window's total reaches the target. The start index
  of a window ending at position `i` is `i - k + 1`. Using `>=` means a window that
  exactly equals the target counts as charged. If the loop finishes without a hit,
  the answer is `-1`.
common_mistakes:
  - Returning the ending index i instead of the starting index i - k + 1.
  - Skipping the check on the first window before the loop starts.
  - Using > so a window that exactly meets the target is missed.
