prompt_markdown: |
  A rooftop solar panel logs how much energy it produces each hour. A battery
  finishes charging once any `k` consecutive hours produce at least `target`
  energy in total. Write `first_charged_window(data)` returning the starting hour
  index (0-based) of the first such window, or `-1` if no window reaches the
  target.

  `data` is a dict: `{"energy": [...], "k": k, "target": target}`. You may assume
  `k` is at least 1 and no larger than the number of hours.
starter_code: |
  def first_charged_window(data):
      return -1
function_name: first_charged_window
input_mode: function
solution_sketch: Slide a running k-hour sum and return the start index of the first window that reaches the target.
sample_solution: |
  def first_charged_window(data):
      energy = data["energy"]
      k = data["k"]
      target = data["target"]
      window = sum(energy[:k])
      if window >= target:
          return 0
      for i in range(k, len(energy)):
          window += energy[i] - energy[i - k]
          if window >= target:
              return i - k + 1
      return -1
hints:
  - level: 1
    text: Check the first k-hour window before sliding, since it might already reach the target.
  - level: 2
    text: When the window ends at index i, its start index is i - k + 1.
  - level: 3
    text: Return as soon as a window's total is at least the target; return -1 if none ever is.
tests:
