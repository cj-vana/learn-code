explanation_markdown: |
  The window total is maintained incrementally, so each of the O(n) windows is
  checked in constant time. The comparison uses `>` rather than `>=`, so a stretch
  whose total exactly equals the target is treated as ordinary rather than busy.
  The first window is counted before the loop, then every slid window is checked.
common_mistakes:
  - Using >= and accidentally counting stretches that only tie the target.
  - Forgetting to check the very first window before sliding.
  - Re-summing each window from scratch instead of updating the running total.
