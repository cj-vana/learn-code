prompt_markdown: |
  A neighborhood bakery records how many loaves it sells each day. The owner
  wants to know how many `k`-day stretches were unusually busy. Write
  `count_busy_stretches(data)` returning how many windows of `k` consecutive days
  have a total strictly greater than `target`.

  `data` is a dict: `{"sales": [...], "k": k, "target": target}`. You may assume
  `k` is at least 1 and no larger than the number of days.
starter_code: |
  def count_busy_stretches(data):
      return 0
function_name: count_busy_stretches
input_mode: function
solution_sketch: Slide a running k-day sum across the list and count how often it exceeds the target.
sample_solution: |
  def count_busy_stretches(data):
      sales = data["sales"]
      k = data["k"]
      target = data["target"]
      window = sum(sales[:k])
      count = 1 if window > target else 0
      for i in range(k, len(sales)):
          window += sales[i] - sales[i - k]
          if window > target:
              count += 1
      return count
hints:
  - level: 1
    text: Every window of k days has a total; you are counting how many of those totals beat the target.
  - level: 2
    text: Keep the running k-day sum instead of re-summing each window.
  - level: 3
    text: Use strictly greater than (>), so a total exactly equal to the target does not count.
tests:
