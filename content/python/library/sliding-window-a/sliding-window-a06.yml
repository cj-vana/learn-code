explanation_markdown: |
  Because every leg cost is non-negative, the window's total only grows when the
  right edge moves and only shrinks when the left edge moves. Whenever the total
  exceeds the budget, advancing the left edge restores a valid window, and each
  index moves at most once, so the scan is O(n). Tracking the widest valid window
  gives the longest affordable run. A leg that alone exceeds the budget collapses
  the window to length 0 at that position.
common_mistakes:
  - Assuming a fixed window size instead of letting it grow and shrink.
  - Forgetting the left <= right guard, which can over-shrink past the current leg.
  - Using a nested restart of left for each right, which is slower than a single moving pointer.
