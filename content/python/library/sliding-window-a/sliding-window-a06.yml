prompt_markdown: |
  A road-trip planner lists the fuel cost of each leg between stops, in order. On
  one tank you can drive a run of consecutive legs only while their total cost
  stays within `budget`. Write `longest_affordable_run(data)` returning the length
  of the longest run of consecutive legs whose total fuel cost is at most
  `budget`.

  `data` is a dict: `{"legs": [...], "budget": budget}`. Every leg cost is a
  non-negative integer. If no leg fits (any single leg alone exceeds the budget),
  return 0.
starter_code: |
