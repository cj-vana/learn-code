      return 0
function_name: longest_affordable_run
input_mode: function
solution_sketch: Grow a window on the right and shrink from the left whenever the running total exceeds the budget.
sample_solution: |
  def longest_affordable_run(data):
      legs = data["legs"]
      budget = data["budget"]
      left = 0
      total = 0
      best = 0
      for right in range(len(legs)):
          total += legs[right]
          while total > budget and left <= right:
              total -= legs[left]
              left += 1
          if right - left + 1 > best:
              best = right - left + 1
      return best
hints:
  - level: 1
    text: The window can grow and shrink, so its size is not fixed; use two indices for its ends.
  - level: 2
    text: Extend the right edge one leg at a time and keep a running total of the window.
  - level: 3
    text: While the total exceeds the budget, drop legs from the left until it fits, then measure the length.
