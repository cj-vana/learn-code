explanation_markdown: |
  Each window of `k` visitors is turned into a set, which automatically collapses
  repeated exhibit labels, so its length is the count of distinct exhibits. Sliding
  the start index from 0 through `len(visits) - k` and keeping the largest count
  finds the most varied stretch. Building a fresh set per window is simple and
  fast enough for these inputs.
common_mistakes:
  - Letting the start index run past len(visits) - k, producing short final windows.
  - Counting total visitors in the window instead of distinct labels.
  - Comparing labels with case-insensitivity when the labels are meant to match exactly.
