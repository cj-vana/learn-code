prompt_markdown: |
  A museum greeter records which exhibit each visitor heads to first, in arrival
  order, as a list of labels. To spot the busiest mix, write
  `max_distinct_in_window(data)` returning the largest number of distinct exhibits
  represented by any `k` consecutive visitors.

  `data` is a dict: `{"visits": [...], "k": k}`. You may assume `k` is at least 1
  and no larger than the number of visitors.
starter_code: |
  def max_distinct_in_window(data):
      return 0
function_name: max_distinct_in_window
input_mode: function
solution_sketch: For each window of k consecutive visitors, count the distinct labels and keep the maximum.
sample_solution: |
  def max_distinct_in_window(data):
      visits = data["visits"]
      k = data["k"]
      best = 0
      for start in range(len(visits) - k + 1):
          window = visits[start:start + k]
          distinct = len(set(window))
          if distinct > best:
              best = distinct
      return best
hints:
  - level: 1
    text: A set discards duplicates, so its size is the number of distinct labels.
  - level: 2
    text: Slide the window one visitor at a time from the first valid start to the last.
  - level: 3
    text: The last valid start index is len(visits) - k; take len(set(window)) at each start.
