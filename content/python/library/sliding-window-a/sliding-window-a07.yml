      return 0
function_name: longest_open_stretch
input_mode: function
solution_sketch: Slide a window that may hold at most k closed days, shrinking from the left when it holds too many.
sample_solution: |
  def longest_open_stretch(data):
      log = data["log"]
      k = data["k"]
      left = 0
      closed = 0
      best = 0
      for right in range(len(log)):
          if log[right] == 'C':
              closed += 1
          while closed > k:
              if log[left] == 'C':
                  closed -= 1
              left += 1
          if right - left + 1 > best:
              best = right - left + 1
      return best
hints:
  - level: 1
    text: Count how many closed days are inside the current window instead of scanning it repeatedly.
  - level: 2
    text: Extend the right edge each step; when the window holds more than k closed days, shrink from the left.
  - level: 3
    text: Only decrement the closed count when the day leaving on the left was itself a closed day.
