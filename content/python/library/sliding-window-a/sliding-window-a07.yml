explanation_markdown: |
  The window tracks how many closed days it currently spans. Extending the right
  edge may push that count past `k`, so the left edge advances until at most `k`
  closed days remain, decrementing the count only when a closed day actually
  leaves. Each index moves forward at most once, giving an O(n) scan, and the
  widest valid window is the longest stretch that can be kept open.
common_mistakes:
  - Decrementing the closed count for every day that leaves rather than only closed days.
  - Treating the window as fixed size instead of letting it grow and shrink.
  - Off-by-one errors when measuring the window length as right - left + 1.
