prompt_markdown: |
  A ski resort logs each day as `'O'` (open) or `'C'` (closed by weather). Using
  snow machines, staff can force at most `k` closed days open. Write
  `longest_open_stretch(data)` returning the length of the longest run of
  consecutive days that could be kept open, i.e. the longest window containing at
  most `k` `'C'` characters.

  `data` is a dict: `{"log": "...", "k": k}`. The log contains only `'O'` and
  `'C'`, and `k` is a non-negative integer.
starter_code: |
