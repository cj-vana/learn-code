explanation_markdown: |
  Finding the minimum-sum window mirrors the maximum-sum version: sum the first
  `k` readings, then slide by adding the new minute and dropping the oldest, and
  keep whichever running total is smallest. The single O(n) pass beats summing
  every window independently.
common_mistakes:
  - Seeding best with 0 or a huge constant instead of the first window's sum.
  - Comparing with > (max) when the goal is the minimum.
  - Rebuilding the window sum from scratch each step instead of adjusting it.
