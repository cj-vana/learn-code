prompt_markdown: |
  An amateur observatory takes a sky-brightness reading every minute; smaller
  numbers mean darker skies. To pick the best stretch for a long exposure, write
  `darkest_window(data)` returning the smallest total brightness across any `k`
  consecutive minutes.

  `data` is a dict: `{"readings": [...], "k": k}`. You may assume `k` is at least
  1 and no larger than the number of readings.
starter_code: |
  def darkest_window(data):
      return 0
function_name: darkest_window
input_mode: function
solution_sketch: Track a running window sum and keep the smallest total seen as the window slides.
sample_solution: |
  def darkest_window(data):
      readings = data["readings"]
      k = data["k"]
      window = sum(readings[:k])
      best = window
      for i in range(k, len(readings)):
          window += readings[i] - readings[i - k]
          if window < best:
              best = window
      return best
hints:
  - level: 1
    text: This is the same sliding-window idea as a maximum, but you keep the minimum instead.
  - level: 2
    text: Seed best with the sum of the first k readings before you slide.
  - level: 3
    text: As you slide, update the running sum, then compare it against best with <.
