prompt_markdown: |
  A harbor ferry sells tickets whose price depends on the rider's age and whether
  they are a local resident. The function receives a single dictionary `booking`
  with two keys:

  - `"age"`: the rider's age in whole years (an int),
  - `"resident"`: a bool that is `True` for local residents.

  Write `ferry_fare(booking)` that returns the fare as a whole-dollar int using
  these rules, applied in order:

  1. Riders under 5 travel free (fare 0).
  2. Riders 65 or older pay the senior fare of 6.
  3. Everyone else pays the standard fare of 12.
  4. After the base fare is set, a resident takes 2 dollars off, but the fare
     never drops below 0 (a free child stays free).
starter_code: |
  def ferry_fare(booking):
      return 0
function_name: ferry_fare
input_mode: function
solution_sketch: Read the two keys, pick a base fare with if/elif/else, then subtract the resident discount only when the fare is positive.
sample_solution: |
  def ferry_fare(booking):
      age = booking["age"]
      resident = booking["resident"]
      if age < 5:
          fare = 0
      elif age >= 65:
          fare = 6
      else:
          fare = 12
      if resident and fare > 0:
          fare -= 2
      return fare
hints:
  - level: 1
    text: Pull age and resident out of the dictionary into their own variables first.
  - level: 2
    text: Decide the base fare with an if/elif/else chain before you think about the discount.
  - level: 3
    text: Apply the resident discount only when the fare is greater than 0 so a free child stays at 0.
tests:
