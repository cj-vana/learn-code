explanation_markdown: |
  The base fare comes from a single if/elif/else chain on age, so each rider lands
  in exactly one band: free under 5, senior at 65 and up, standard otherwise. The
  discount is a separate step because it applies on top of whatever base was chosen.
  Guarding it with `fare > 0` keeps a free child at 0 instead of going negative, and
  because `resident` is already a bool you can use it directly in the `if` without
  comparing it to True.
common_mistakes:
  - Applying the resident discount before choosing the base fare, or to a free child.
  - Using <= 5 or > 65 and getting the boundary ages 5 and 65 wrong.
  - Comparing resident == True instead of using the boolean directly, or forgetting to read it from the dict.
