explanation_markdown: |
  A queue is the natural fit for "first come, first served": names enter at the
  back and leave from the front, preserving arrival order. Guarding the dequeue
  with a non-empty check makes an early SERVE a harmless no-op. Using a deque
  keeps both ends O(1), so the whole simulation is O(n).
common_mistakes:
  - Serving the most recently added ticket instead of the oldest.
  - Calling popleft() on an empty queue and crashing.
  - Using list.pop(0) in a tight loop, which is O(n) per removal.
