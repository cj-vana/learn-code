prompt_markdown: |
  A help desk serves support tickets in first-in, first-out order. You are given
  a list of events. Each event is either `["ADD", name]`, which puts a new
  ticket for `name` at the back of the queue, or `["SERVE"]`, which serves and
  removes the ticket at the front.

  Write `serve_order(events)` returning the list of names in the order they were
  served. A `["SERVE"]` when the queue is empty is skipped.
starter_code: |
  def serve_order(events):
      return []
function_name: serve_order
input_mode: function
solution_sketch: Enqueue on ADD, dequeue from the front on SERVE, and record each served name.
sample_solution: |
  from collections import deque

  def serve_order(events):
      queue = deque()
      served = []
      for event in events:
          if event[0] == "ADD":
              queue.append(event[1])
          elif event[0] == "SERVE":
              if queue:
                  served.append(queue.popleft())
      return served
hints:
  - level: 1
    text: A queue serves the oldest waiting ticket first, not the newest.
  - level: 2
    text: Add names to the back and remove from the front so order is preserved.
  - level: 3
    text: A deque lets you append on the right and popleft from the front in O(1); skip SERVE when the queue is empty.
