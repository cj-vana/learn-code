prompt_markdown: |
  A community app stores mutual connections as an adjacency map: each name points
  to a list of the names directly connected to it. You are given a dict `data`
  with keys `"graph"`, `"start"`, and `"target"`.

  Write `hops(data)` returning the fewest connection hops needed to travel from
  `start` to `target`. If `start` equals `target`, return `0`. If `target`
  cannot be reached, return `-1`.
starter_code: |
  def hops(data):
      return -1
function_name: hops
input_mode: function
solution_sketch: Breadth-first search from start, tracking distance, and return it the first time target is reached.
sample_solution: |
  from collections import deque

  def hops(data):
      graph = data["graph"]
      start = data["start"]
      target = data["target"]
      if start == target:
          return 0
      visited = {start}
      queue = deque([(start, 0)])
      while queue:
          node, dist = queue.popleft()
          for neighbour in graph.get(node, []):
              if neighbour == target:
                  return dist + 1
              if neighbour not in visited:
                  visited.add(neighbour)
                  queue.append((neighbour, dist + 1))
      return -1
hints:
  - level: 1
    text: BFS explores everything one hop away before anything two hops away, so it finds the shortest path first.
  - level: 2
    text: Store each node together with its distance from the start and mark nodes visited as you enqueue them.
  - level: 3
    text: The first time you meet the target, its distance is the answer; if the queue empties without finding it, return -1.
