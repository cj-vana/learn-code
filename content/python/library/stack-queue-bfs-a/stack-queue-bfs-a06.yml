explanation_markdown: |
  Because every hop has the same cost, breadth-first search visits nodes in
  order of increasing distance, so the first time the target appears it is via a
  shortest path. Marking nodes visited as they are enqueued stops re-processing
  and avoids infinite loops on the cycles created by mutual connections. Each
  node and edge is touched once, giving O(V + E) time.
common_mistakes:
  - Using depth-first search, which can report a longer path than the shortest.
  - Forgetting to mark nodes visited, causing repeats or infinite loops on cycles.
  - Not handling start == target or an unreachable target.
