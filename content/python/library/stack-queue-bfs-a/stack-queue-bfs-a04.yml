prompt_markdown: |
  A factory control panel runs instructions in postfix (reverse Polish) form. The
  input is a list where each item is either an integer or one of the operator
  strings `"+"`, `"-"`, or `"*"`. A number is placed on a stack. An operator
  removes the top two numbers, applies itself with the **first-removed value on
  the right**, and puts the result back.

  Write `run_panel(tokens)` returning the single integer left on the stack after
  all instructions run. An empty program returns `0`. Assume the input is valid.
starter_code: |
  def run_panel(tokens):
      return 0
function_name: run_panel
input_mode: function
solution_sketch: Push numbers on a stack; each operator pops two operands, combines them, and pushes the result.
sample_solution: |
  def run_panel(tokens):
      stack = []
      for token in tokens:
          if token in ("+", "-", "*"):
              right = stack.pop()
              left = stack.pop()
              if token == "+":
                  stack.append(left + right)
              elif token == "-":
                  stack.append(left - right)
              else:
                  stack.append(left * right)
          else:
              stack.append(token)
      return stack[-1] if stack else 0
hints:
  - level: 1
    text: Numbers wait on a stack until an operator needs them.
  - level: 2
    text: On an operator, pop two values; the first one popped is the right-hand operand.
  - level: 3
