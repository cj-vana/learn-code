explanation_markdown: |
  Postfix removes the need for parentheses: operands are already in order on the
  stack when an operator arrives. Popping the right operand first matters for
  non-commutative operators like subtraction, which is why `[10, 4, "-"]` is `6`,
  not `-6`. Pushing each result back lets later operators build on it, and the
  final value on top is the answer. The scan is O(n).
common_mistakes:
  - Swapping the operands so subtraction and other order-sensitive ops come out backwards.
  - Forgetting to push the intermediate result back onto the stack.
  - Treating operator strings as numbers or vice versa.
