explanation_markdown: |
  On an unweighted grid every step costs one, so breadth-first search reaches
  each cell by a shortest path and the goal's distance is the answer. Marking
  cells visited when they are enqueued keeps the search from looping and bounds
  the work to O(rows * cols). Checking the start and goal up front handles the
  blocked-endpoint cases cleanly, and the 1x1 grid returns 0 because start and
  goal coincide.
common_mistakes:
  - Counting cells visited instead of moves made, which is off by one.
  - Marking a cell visited only when popped, letting it be enqueued many times.
  - Forgetting bounds checks or the case where the start or goal itself is blocked.
