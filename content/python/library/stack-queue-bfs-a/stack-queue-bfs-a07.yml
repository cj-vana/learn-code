prompt_markdown: |
  A warehouse floor is a grid of cells: `0` is an open aisle and `1` is blocked
  shelving. A robot starts at the top-left cell `(0, 0)` and wants to reach the
  bottom-right cell. It moves one cell at a time up, down, left, or right, and
  only through open cells.

  Write `shortest_route(grid)` returning the fewest moves to reach the
  bottom-right cell, or `-1` if it cannot be reached. Reaching a 1x1 open grid
  takes `0` moves. If the start or the goal cell is blocked, return `-1`.
starter_code: |
