function_name: shortest_route
input_mode: function
solution_sketch: Run BFS from the top-left over open cells, expanding in four directions and returning the distance at the goal.
sample_solution: |
  from collections import deque

  def shortest_route(grid):
      if not grid or not grid[0]:
          return -1
      rows = len(grid)
      cols = len(grid[0])
      goal = (rows - 1, cols - 1)
      if grid[0][0] == 1 or grid[goal[0]][goal[1]] == 1:
          return -1
      visited = {(0, 0)}
      queue = deque([((0, 0), 0)])
      while queue:
          (r, c), steps = queue.popleft()
          if (r, c) == goal:
              return steps
          for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
              nr, nc = r + dr, c + dc
              if 0 <= nr < rows and 0 <= nc < cols and grid[nr][nc] == 0 and (nr, nc) not in visited:
                  visited.add((nr, nc))
                  queue.append(((nr, nc), steps + 1))
      return -1
hints:
  - level: 1
    text: Each move costs the same, so breadth-first search finds the fewest moves.
  - level: 2
    text: Store each cell with its move count; from each cell try the four orthogonal neighbours that are open and in bounds.
  - level: 3
    text: Mark cells visited as you enqueue them and return the step count the moment you pop the goal; return -1 if the queue empties first.
