explanation_markdown: |
  A stack captures "last opened, first closed" perfectly. Each opener is pushed;
  each closer must match whatever is on top, so a mismatch or an empty stack
  means the script is unbalanced. Leftover openers at the end are also unbalanced.
  Every character is handled once, so the scan is O(n).
common_mistakes:
  - Only counting brackets instead of checking that kinds match in order.
  - Forgetting that a closer with an empty stack is immediately invalid.
  - Returning True while openers remain on the stack at the end.
