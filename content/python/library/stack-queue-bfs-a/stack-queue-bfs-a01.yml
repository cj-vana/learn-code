prompt_markdown: |
  A stage-lighting cue script groups cues with three kinds of brackets:
  round `()`, square `[]`, and curly `{}`. Any other character is ordinary text.

  Write `brackets_balanced(script)` returning `True` if every opening bracket is
  closed by a matching bracket of the same kind in the correct order, and `False`
  otherwise. All non-bracket characters are ignored. An empty string is balanced.
starter_code: |
  def brackets_balanced(script):
      return False
function_name: brackets_balanced
input_mode: function
solution_sketch: Push each opener on a stack and pop-match it when the matching closer appears.
sample_solution: |
  def brackets_balanced(script):
      pairs = {")": "(", "]": "[", "}": "{"}
      openers = set(pairs.values())
      stack = []
      for ch in script:
          if ch in openers:
              stack.append(ch)
          elif ch in pairs:
              if not stack or stack.pop() != pairs[ch]:
                  return False
      return not stack
hints:
  - level: 1
    text: The most recently opened bracket must be the first one to close.
  - level: 2
    text: Push every opening bracket onto a stack and check the top when you hit a closer.
  - level: 3
    text: A closer is valid only if the stack top is its matching opener; the string is balanced only if the stack ends empty.
