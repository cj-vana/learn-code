prompt_markdown: |
  An org chart maps each person to a list of their direct reports (a person with
  no reports maps to an empty list). You are given a dict `data` with keys
  `"chart"` and `"top"`, the name of the person at the root.

  Write `levels(data)` returning a list of lists: the names at each depth level,
  discovered by breadth-first search. Level 0 is `[top]`, level 1 is everyone who
  reports directly to `top`, and so on. Within a level, keep the order the names
  were discovered.
starter_code: |
