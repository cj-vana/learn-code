explanation_markdown: |
  Capturing `len(queue)` before draining fixes exactly how many names belong to
  the current level, so their reports (already being appended) become the next
  level without mixing depths. Because reports are enqueued in list order and
  processed front to back, discovery order within each level is preserved. Every
  name is enqueued and popped once, giving O(n) work over the chart.
common_mistakes:
  - Reading len(queue) inside the loop after it has already changed, blurring the levels.
  - Flattening everyone into one list instead of grouping by depth.
  - Enqueuing reports before snapshotting the level size for this round.
