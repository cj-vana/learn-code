      return []
function_name: levels
input_mode: function
solution_sketch: BFS level by level, popping exactly the current level's size before recording the next level.
sample_solution: |
  from collections import deque

  def levels(data):
      chart = data["chart"]
      top = data["top"]
      result = []
      queue = deque([top])
      while queue:
          level_size = len(queue)
          current = []
          for _ in range(level_size):
              node = queue.popleft()
              current.append(node)
              for report in chart.get(node, []):
                  queue.append(report)
          result.append(current)
      return result
hints:
  - level: 1
    text: Breadth-first search naturally visits the chart one level at a time.
  - level: 2
    text: Before draining a level, record how many names are currently in the queue.
  - level: 3
    text: Pop exactly that many names into one level's list while enqueuing their reports for the next round.
