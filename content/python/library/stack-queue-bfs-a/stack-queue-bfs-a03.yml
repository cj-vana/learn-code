explanation_markdown: |
  The stack top is always the closest surviving tile to the left, so comparing
  the next tile against it decides a cancellation instantly. Popping on a match
  naturally exposes the earlier tile as the new neighbour, which is exactly the
  chain-reaction the puzzle describes. Each tile is pushed and popped at most
  once, so the work is O(n).
common_mistakes:
  - Scanning for pairs repeatedly instead of resolving chains with one stack pass.
  - Checking stack[-1] without first confirming the stack is non-empty.
  - Forgetting that cancellations expose new adjacent pairs.
