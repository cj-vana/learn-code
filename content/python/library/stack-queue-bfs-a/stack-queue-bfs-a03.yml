prompt_markdown: |
  In a match puzzle, a row of tiles is a string of colour letters. Whenever two
  tiles of the same colour sit next to each other, they cancel and vanish. A
  cancellation can bring new neighbours together, so this repeats until no two
  adjacent tiles share a colour.

  Write `collapse_tiles(tiles)` returning the final row after all possible
  cancellations. An empty row stays empty.
starter_code: |
  def collapse_tiles(tiles):
      return ""
function_name: collapse_tiles
input_mode: function
solution_sketch: Walk left to right and pop the stack when the next tile equals the current top, else push it.
sample_solution: |
  def collapse_tiles(tiles):
      stack = []
      for tile in tiles:
          if stack and stack[-1] == tile:
              stack.pop()
          else:
              stack.append(tile)
      return "".join(stack)
hints:
  - level: 1
    text: A tile only ever cancels with the tile immediately before it that is still on the row.
  - level: 2
    text: Keep surviving tiles on a stack; the top is the current left neighbour.
  - level: 3
    text: If the next tile matches the stack top, pop it (they cancel); otherwise push the tile.
