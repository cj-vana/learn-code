function_name: can_partition
input_mode: function
solution_sketch: If the total is odd it is impossible; otherwise DP over which subset sums up to total/2 are reachable.
sample_solution: |
  def can_partition(chips):
      total = sum(chips)
      if total % 2 != 0:
          return False
      target = total // 2
      reachable = {0}
      for value in chips:
          reachable |= {r + value for r in reachable if r + value <= target}
          if target in reachable:
              return True
      return target in reachable
hints:
  - level: 1
    text: If the grand total of all chips is odd, no even split can exist.
  - level: 2
    text: An equal split means one stack must add up to exactly half the total, so the real question is whether some subset reaches total // 2.
  - level: 3
    text: Track a set of subset sums you can build. Start with {0}; for each chip, add it onto every sum you already have, and check whether the target appears.
