prompt_markdown: |
  Two friends just won a pile of numbered prize chips and want to divide them
  into two stacks worth exactly the same total. Every chip must go into one of
  the two stacks, and each chip's value is a positive whole number.

  Write `can_partition(chips)` where `chips` is a list of positive ints. Return
  `True` if the chips can be split into two groups whose sums are equal, and
  `False` otherwise. For an empty list, both stacks are empty and sum to zero, so
  return `True`.

  Example: `[1, 5, 11, 5]` returns `True` (11 and 1+5+5). `[1, 2, 3, 5]` returns
  `False`.
starter_code: |
