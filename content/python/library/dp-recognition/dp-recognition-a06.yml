explanation_markdown: |
  Splitting into two equal stacks is only possible when the whole pile has an
  even total, because each stack would carry exactly half. So the first check is
  `total % 2`: an odd total returns `False` immediately.

  When the total is even, the goal becomes a subset-sum decision: can any group of
  chips add up to `target = total // 2`? If it can, the leftover chips
  automatically sum to the same amount. The DP keeps a set of every subtotal you
  can currently form, starting from `{0}` (using no chips). For each chip you fold
  it into all existing subtotals, keeping only those still at or under the target.
  The moment `target` shows up, an equal split exists. This runs in
  O(n * target) time, far better than trying every possible grouping.
common_mistakes:
  - Forgetting the quick odd-total shortcut and doing needless work for sums that can never split.
  - Mutating the reachable set while iterating over it instead of building the new sums first.
  - Returning True only when a full subset uses every chip, rather than any subset that reaches half the total.
  - Assuming an empty list is False when two empty stacks each sum to zero.
