solution_sketch: Keep a 1-D array of best value per capacity and sweep it from high capacity down to the item's weight for each item, so each item is counted at most once.
sample_solution: |
  def pack_basket(manifest):
      capacity = manifest["capacity"]
      items = manifest["items"]
      best = [0] * (capacity + 1)
      for item in items:
          weight = item["weight"]
          value = item["value"]
          for cap in range(capacity, weight - 1, -1):
              best[cap] = max(best[cap], best[cap - weight] + value)
      return best[capacity]
hints:
  - level: 1
    text: For each item you face a yes-or-no choice, either skip it and keep the value you had, or take it and add its value to the best packing of the leftover capacity.
  - level: 2
    text: Track best[cap], the most value that fits in weight cap. Update it as you consider each item using best[cap - weight] + value.
  - level: 3
    text: Sweep cap from capacity down to weight for each item. The downward direction guarantees best[cap - weight] does not already include the current item, enforcing at most one copy.
