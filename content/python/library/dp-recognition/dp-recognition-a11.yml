prompt_markdown: |
  A hot-air-balloon crew is loading the basket for an expedition. The balloon can
  lift a fixed total weight, and each piece of gear has a weight and a usefulness
  value. Every item is unique: you either pack it or leave it behind, never a
  fraction and never two copies. The crew wants the most total usefulness the
  basket can carry without going over the weight limit.

  Write `pack_basket(manifest)` where `manifest` is a dict with two keys:

  - `capacity`: a non-negative integer, the maximum total weight the basket holds
  - `items`: a list of dicts, each with integer keys `weight` and `value`

  Return a single integer: the maximum total value of a subset of items whose
  combined weight is at most `capacity`, using each item at most once.

  Edges: if `items` is empty or `capacity` is `0`, nothing can be packed and the
  answer is `0`. An item heavier than `capacity` simply cannot be chosen.

  Example: with `capacity = 5` and items of `(weight, value)` `(2, 3)`, `(3, 4)`,
  `(4, 5)`, `(5, 6)`, the answer is `7` (pack the weight-2 and weight-3 items).
starter_code: |
