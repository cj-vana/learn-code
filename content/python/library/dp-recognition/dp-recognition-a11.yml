explanation_markdown: |
  This is the 0/1 knapsack: each item is taken at most once, and you want the most
  value within a weight limit. The per-item choice is binary, so the best value for
  a given capacity is the better of two options: skip the item and keep the value
  you already had at that capacity, or take it and add its value to the best packing
  of `capacity - weight`.

  The lesson's full 2-D table indexes by (items considered, capacity), but every
  transition reads only the previous item's row. That is the classic signal to drop
  to a **rolling array**: a single list `best` indexed by capacity, reused across
  items. The catch is the sweep direction. We iterate `cap` from `capacity`
  **downward** to the item's weight. Going high-to-low means that when we read
  `best[cap - weight]`, it still reflects the state *before* the current item was
  considered, so the item can be packed at most once.

  Sweeping low-to-high instead would let `best[cap - weight]` already include the
  current item, and the same item would be packed over and over, silently solving
  the unbounded knapsack. That direction bug is the single most common knapsack
  mistake. The rolling array cuts space from O(items * capacity) to O(capacity)
  while keeping O(items * capacity) time.
common_mistakes:
  - Sweeping capacity from low to high, which lets one item be packed repeatedly and solves a different (unbounded) problem.
  - Reusing a fresh zeroed array per item instead of carrying best forward, which forgets earlier items entirely.
  - Adding items whose weight exceeds the current capacity by not stopping the inner range at the item's weight.
  - Returning the max over the whole array rather than best[capacity]; the array already accounts for lighter packings at each index.
