solution_sketch: This is a maximum non-crossing bipartite matching, which is longest-common-subsequence in disguise. Fill a table dp[i][j] over prefixes of each rank; a compatible pair of the current two dancers extends the diagonal by one, otherwise carry the better of dropping one dancer from either side.
sample_solution: |
  def bridge_pairings(job):
      n = job["left_count"]
      m = job["right_count"]
      allowed = job["allowed"]
      compatible = [set(row) for row in allowed]
      dp = [[0] * (m + 1) for _ in range(n + 1)]
      for i in range(1, n + 1):
          for j in range(1, m + 1):
              best = dp[i - 1][j]
              if dp[i][j - 1] > best:
                  best = dp[i][j - 1]
              if (j - 1) in compatible[i - 1]:
                  paired = dp[i - 1][j - 1] + 1
                  if paired > best:
                      best = paired
              dp[i][j] = best
      return dp[n][m]
hints:
  - level: 1
    text: Because both ranks keep a fixed order and arms may not cross, a valid set of pairs matches earlier-left dancers to earlier-right dancers. That order-preserving structure is exactly what longest-common-subsequence exploits.
  - level: 2
    text: Let dp[i][j] be the best number of non-crossing pairs using only the first i left dancers and the first j right dancers. Grow the table from small prefixes upward.
  - level: 3
    text: For dp[i][j], you may skip left dancer i-1 (take dp[i-1][j]), skip right dancer j-1 (take dp[i][j-1]), or, if right j-1 is in allowed[i-1], pair them for dp[i-1][j-1] + 1. Take the largest. The answer is dp[left_count][right_count].
