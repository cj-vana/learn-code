prompt_markdown: |
  A folk-dance caller lines up two ranks of dancers facing each other. The left
  rank stands in a fixed order (positions `0, 1, 2, ...` from one end), and so does
  the right rank. A dancer may join hands with a partner across the gap, but only
  with someone they are *compatible* with, and every dancer joins at most one pair
  of hands.

  There is one more rule: joined arms must not cross. If left dancer `i` joins right
  dancer `j`, and left dancer `k` (standing further along, so `k > i`) joins right
  dancer `l`, then `l` must also stand further along than `j` (`l > j`). Otherwise
  the two arms would cross.

  Write `bridge_pairings(job)` where `job` is a dict with three keys:

  - `left_count`: the number of dancers in the left rank (a non-negative integer)
  - `right_count`: the number of dancers in the right rank (a non-negative integer)
  - `allowed`: a list of length `left_count`. Entry `allowed[i]` is a list of the
    right-rank positions (0-based integers) that left dancer `i` may join. The
    positions in a single entry may appear in any order and may be empty.

  Return a single integer: the maximum number of non-crossing pairs of joined hands.
  With `left_count` up to 40 and `right_count` up to 40, a clean table fits easily.

  Edges: if either rank is empty, or every `allowed` entry is empty, no hands can
  join and the answer is `0`.

  Example: with `left_count = 3`, `right_count = 3`, and
  `allowed = [[1, 2], [0], [2]]`, the best you can do is `2` pairs (for instance
  left 0 with right 1 and left 2 with right 2); joining left 1 with right 0 would
  force an arm to cross.
