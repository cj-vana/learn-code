explanation_markdown: |
  The non-crossing rule is the whole puzzle. Since both ranks are in fixed order,
  "no crossings" means the pairs you pick must respect that order on *both* sides:
  if you sort the chosen pairs by their left position, the right positions must also
  be increasing. That is precisely the shape of a longest common subsequence, so the
  same 2D tabulation solves it.

  Define `dp[i][j]` as the maximum number of non-crossing pairs you can form using
  only the first `i` left dancers and the first `j` right dancers. To fill an entry
  you consider the two "boundary" dancers, left `i-1` and right `j-1`:

  - Ignore left `i-1`: inherit `dp[i-1][j]`.
  - Ignore right `j-1`: inherit `dp[i][j-1]`.
  - If they are compatible, join them and add one to the best solution for the
    smaller prefixes that exclude both, `dp[i-1][j-1] + 1`.

  Take the maximum. Because pairing only ever uses the two current boundary dancers
  and then recurses into strictly smaller prefixes, the matched pairs are
  automatically ordered on both sides, so no arm can cross. Row 0 and column 0 stay
  `0` (an empty rank pairs with nobody), which also covers the empty-rank edges. The
  table is O(left_count * right_count) in both time and space. Converting each
  compatibility list to a `set` keeps the membership test O(1).
common_mistakes:
  - Treating it as ordinary bipartite matching and pairing any compatible dancers, which can produce crossing arms the rules forbid.
  - Only checking the diagonal (the compatible case) and forgetting the two skip options, so unpaired dancers are not carried forward correctly.
  - Adding one in the skip branch instead of only when the two boundary dancers are actually compatible, inflating the count.
  - Indexing allowed with i or j instead of i-1 and j-1, an off-by-one against the padded row and column of zeros.
