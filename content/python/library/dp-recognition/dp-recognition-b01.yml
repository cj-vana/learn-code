function_name: longest_zigzag
input_mode: function
solution_sketch: Track two running lengths, one for zigzags that end on a rising step and one that end on a falling step; a rise refreshes the up counter from the down counter plus one, and a fall does the mirror. The answer is the larger of the two.
sample_solution: |
  def longest_zigzag(readings):
      if not readings:
          return 0
      up = 1
      down = 1
      for i in range(1, len(readings)):
          if readings[i] > readings[i - 1]:
              up = down + 1
          elif readings[i] < readings[i - 1]:
              down = up + 1
      return max(up, down)
hints:
  - level: 1
    text: You never need the whole subsequence, only its length, and the only thing that matters going forward is whether the last kept step went up or down.
  - level: 2
    text: Keep two counters. up is the longest zigzag so far that ends with a rise, down the longest that ends with a fall. Both start at 1 for the first reading.
  - level: 3
    text: When readings[i] > readings[i-1], a new rise can extend the best falling zigzag, so up = down + 1. When it is smaller, down = up + 1. Equal readings change nothing. Answer is max(up, down).
