explanation_markdown: |
  The brute-force instinct is to try every subsequence, which is exponential. The
  DP insight is that when you are scanning left to right, the only state that
  matters for extending a zigzag is the *direction of its last step*. That collapses
  the whole problem into two numbers.

  Let `up` be the length of the longest zigzag ending at the current position with a
  rising step, and `down` the longest ending with a falling step. Both begin at `1`,
  since a lone reading is a valid zigzag of length one. When the next reading is
  higher than the previous one, you have a fresh rise; the best thing to attach it to
  is a zigzag that most recently *fell*, so `up = down + 1`. A lower reading is the
  mirror case, `down = up + 1`. Equal readings give no direction, so both counters
  stay put. Crucially you only ever overwrite the counter matching the new
  direction, so the other one keeps the best value seen so far.

  Reading the two counters as "best chain ending in an up-step / down-step" is what
  makes the greedy-looking update actually a dynamic program: each value is built
  from a previously computed subproblem. The answer is `max(up, down)`, and the whole
  pass is O(n) time and O(1) space.
common_mistakes:
  - Treating equal consecutive readings as a rise or a fall, which invents direction changes that are not there and overcounts flat runs.
  - Resetting both counters on every step instead of only the one matching the current direction, which forgets the alternation built up so far.
  - Solving for the longest strictly increasing run (or the longest contiguous alternating block) rather than an order-preserving subsequence that may skip readings.
  - Returning up (or down) alone instead of the max of the two, missing zigzags that happen to end on the other direction.
