prompt_markdown: |
  A harbor tide gauge records the water level once an hour as a list of integers.
  The keeper wants the longest *zigzag* stretch hidden in the log: a subsequence
  whose consecutive differences strictly alternate between rising and falling. The
  chosen readings do **not** have to sit next to each other in the log; you may
  skip any readings, but the ones you keep must go up, then down, then up, and so
  on (or down, then up, then down, ...). A single reading counts as a zigzag of
  length 1.

  Write `longest_zigzag(readings)` where `readings` is a list of integers. Return a
  single integer: the length of the longest such alternating subsequence.

  Rules and edges:

  - An empty log returns `0`.
  - Two equal readings in a row provide no direction (neither up nor down), so a
    flat stretch like `[4, 4, 4]` has a longest zigzag of just `1`.
  - A strictly rising (or strictly falling) log has a longest zigzag of `2`,
    because you can always pick its first and last readings for one up (or down)
    step.

  Example: for `readings = [1, 7, 4, 9, 2, 5]` every step already alternates
  (up, down, up, down, up), so the whole log is a zigzag of length `6`. For
  `readings = [1, 4, 7, 2, 5]` one longest zigzag is `1, 7, 2, 5`, length `4`.
starter_code: |
  def longest_zigzag(readings):
