function_name: lis_length
input_mode: function
solution_sketch: DP where best[i] is the longest strictly increasing subsequence ending at index i; take the max.
sample_solution: |
  def lis_length(nums):
      if not nums:
          return 0
      best = [1] * len(nums)
      for i in range(len(nums)):
          for j in range(i):
              if nums[j] < nums[i] and best[j] + 1 > best[i]:
                  best[i] = best[j] + 1
      return max(best)
hints:
  - level: 1
    text: For each reading, think about the longest rising streak that ENDS exactly at that reading.
  - level: 2
    text: Keep an array best[i]; a reading can extend any earlier streak whose last value is strictly smaller.
  - level: 3
    text: best[i] = 1 + max(best[j]) over all j < i with nums[j] < nums[i], defaulting to 1; answer is max(best).
