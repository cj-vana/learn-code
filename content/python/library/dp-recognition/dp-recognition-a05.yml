prompt_markdown: |
  A weather station logs a raw list of hourly temperature readings. An analyst
  wants the length of the longest *rising streak* they can extract by keeping
  some readings in their original order and dropping the rest. A streak is
  valid only when every kept reading is STRICTLY greater than the one before
  it (equal readings cannot both stay).

  Write `lis_length(nums)` where `nums` is a list of integers. Return a single
  integer: the length of the longest strictly increasing subsequence of
  `nums`. The readings need not be contiguous, but their relative order must be
  preserved.

  If `nums` is empty, return `0`. If every reading is identical (for example
  `[7, 7, 7]`), the longest valid streak keeps just one of them, so return `1`.
