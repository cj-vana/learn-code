explanation_markdown: |
  This is the classic "longest strictly increasing subsequence" problem, solved
  with dynamic programming. Define `best[i]` as the length of the longest rising
  streak that ends at index `i`. Every reading is a streak of length 1 on its
  own, so `best` starts filled with `1`.

  For each index `i`, look at every earlier index `j`. If `nums[j] < nums[i]`,
  the reading at `i` can be appended to the streak ending at `j`, giving a
  candidate length of `best[j] + 1`. Keep the largest such candidate. Because we
  require a *strict* increase, equal readings never chain together, which is why
  `[7, 7, 7]` yields `1`.

  The answer is the maximum value across `best`, since the best streak can end at
  any position. The double loop runs in O(n^2) time using O(n) extra space, which
  is plenty for a station's hourly log.
common_mistakes:
  - Using <= instead of < and letting equal readings chain, which overcounts plateaus.
  - Returning best[-1] (the streak ending at the last reading) instead of max(best).
  - Forgetting the empty-list case and calling max() on an empty sequence.
  - Looking only at the immediately previous reading instead of all earlier ones.
