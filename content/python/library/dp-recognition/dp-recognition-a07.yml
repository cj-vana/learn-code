explanation_markdown: |
  This is the maximum contiguous-sum problem, and the recognition step is that the
  best stretch *ending at a given day* depends only on the best stretch ending the
  day before. At each day you have two choices: glue today onto the run you were
  already building, or throw that run away and start a brand-new stretch at today.
  You pick whichever is larger with `current = max(value, current + value)`.

  Whenever the running total would go negative, carrying it into the next day can
  only drag that day down, so the `max` naturally restarts the stretch. Alongside
  the running total we keep a separate `best`, updated every step, because the
  winning stretch might end anywhere in the ledger, not necessarily on the last
  day.

  Seeding both `best` and `current` from the first element is what makes the
  all-negative case correct: there is no empty stretch worth `0` to fall back on,
  so the answer is simply the largest single day. The scan is O(n) time and O(1)
  extra space.
common_mistakes:
  - Initializing best or current to 0, which wrongly reports 0 on an all-negative ledger instead of the least-bad single day.
  - Returning current at the end instead of a separately tracked best, missing stretches that end before the last day.
  - Letting a negative running total carry forward instead of restarting the stretch at the current day.
  - Allowing an empty stretch, which changes the problem and breaks the all-losses requirement.
