prompt_markdown: |
  A street food cart keeps a ledger of daily results, one integer per day: a
  positive number is that day's profit, a negative number is a loss. The owner
  wants to know the single best *unbroken stretch* of days to point to, meaning
  the largest total you can get by summing a run of consecutive days.

  Write `best_daily_stretch(profits)` where `profits` is a list of integers with
  **at least one element**. Return a single integer: the maximum sum over every
  contiguous, non-empty run of days.

  Rules and edges:
  - The stretch must be contiguous (a slice of adjacent days) and must contain at
    least one day, so you can never report an empty stretch worth `0`.
  - If every day is a loss, the best you can do is the single least-bad day, so a
    ledger like `[-8, -3, -6, -2, -5]` returns `-2`.

  Example: `[-2, 1, -3, 4, -1, 2, 1, -5, 4]` returns `6`, the run `4, -1, 2, 1`.
starter_code: |
  def best_daily_stretch(profits):
      return 0
function_name: best_daily_stretch
input_mode: function
solution_sketch: Roll one running total forward, resetting to the current day whenever carrying the past would only hurt, and track the best total seen.
sample_solution: |
  def best_daily_stretch(profits):
      best = current = profits[0]
      for value in profits[1:]:
          current = max(value, current + value)
          best = max(best, current)
      return best
hints:
  - level: 1
    text: Walk day by day and ask a single question at each day, is it better to extend the stretch you were building or to start fresh from today?
  - level: 2
    text: Keep a running total for the best stretch that ends at the current day. If that total ever drops below the current day's own value, restarting from today is better.
  - level: 3
    text: current = max(value, current + value) updates the best stretch ending here; keep a separate best = max(best, current). Seed both from the first element so all-negative inputs still work.
