function_name: stitch_overlap
input_mode: function
solution_sketch: Build a table indexed by prefix lengths of each pattern; a matching pair extends the diagonal by one, otherwise take the better of dropping one stitch from either side.
sample_solution: |
  def stitch_overlap(patterns):
      a = patterns["a"]
      b = patterns["b"]
      m, n = len(a), len(b)
      table = [[0] * (n + 1) for _ in range(m + 1)]
      for i in range(1, m + 1):
          for j in range(1, n + 1):
              if a[i - 1] == b[j - 1]:
                  table[i][j] = table[i - 1][j - 1] + 1
              else:
                  table[i][j] = max(table[i - 1][j], table[i][j - 1])
      return table[m][n]
