explanation_markdown: |
  This is the longest common subsequence, the template two-string DP. The trick is
  to describe every subproblem by a pair of prefix lengths: `table[i][j]` is the
  overlap length using the first `i` stitches of `a` and the first `j` stitches of
  `b`. That pair of small numbers is exactly the "few small values" that make a
  slow recursion cacheable.

  Compare the current pair of stitches. When `a[i-1] == b[j-1]`, that shared stitch
  can be appended to the best overlap of the two prefixes that exclude it, so the
  entry is the diagonal `table[i-1][j-1]` plus one. When they differ, the shared
  run cannot use both current stitches, so you drop one from one side and keep the
  larger of `table[i-1][j]` and `table[i][j-1]`.

  The first row and first column are all `0` because comparing against an empty
  pattern yields no shared stitches, which also handles both empty-string edges.
  Filling the table row by row guarantees every entry reads already-computed
  neighbours. The work is O(m*n) time and O(m*n) space.
common_mistakes:
  - Requiring the shared stitches to be contiguous, which computes the longest common substring instead of subsequence.
  - Adding one in the mismatch branch instead of only on a real match, inflating the count.
  - Forgetting the extra row and column of zeros, so prefixes of length zero are mishandled.
  - Returning a table entry other than table[m][n], which uses only part of one pattern.
