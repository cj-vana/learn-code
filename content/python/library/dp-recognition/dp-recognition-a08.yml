prompt_markdown: |
  Two knitters each write down a pattern as a string of stitch symbols, one letter
  per stitch (for example `K` for knit, `P` for purl, `C` for cable). They want to
  measure how much their patterns *overlap*: the longest run of stitches that
  appears in both charts in the same relative order, though the shared stitches do
  not have to sit next to each other.

  Write `stitch_overlap(patterns)` where `patterns` is a dict with two keys:

  - `a`: the first pattern as a string of stitch letters
  - `b`: the second pattern as a string of stitch letters

  Return a single integer: the length of the longest common subsequence of `a`
  and `b`. A subsequence keeps letters in order but may skip any of them.

  Edges: if either pattern is the empty string `""`, the overlap length is `0`.
  If the two patterns share no stitch symbol at all, the answer is also `0`.

  Example: with `a = "ABCBDAB"` and `b = "BDCAB"`, the answer is `4` (one longest
  shared run is `BCAB`).
starter_code: |
