function_name: plaque_corrections
input_mode: function
solution_sketch: Fill a table indexed by prefix lengths; equal characters copy the diagonal, otherwise take one plus the cheapest of insert, delete, or replace.
sample_solution: |
  def plaque_corrections(job):
      source = job["source"]
      target = job["target"]
      m, n = len(source), len(target)
      dp = [[0] * (n + 1) for _ in range(m + 1)]
      for i in range(m + 1):
          dp[i][0] = i
      for j in range(n + 1):
          dp[0][j] = j
      for i in range(1, m + 1):
          for j in range(1, n + 1):
              if source[i - 1] == target[j - 1]:
                  dp[i][j] = dp[i - 1][j - 1]
              else:
                  dp[i][j] = 1 + min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1])
      return dp[m][n]
