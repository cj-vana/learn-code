prompt_markdown: |
  An engraver has cut the wrong text into a brass plaque and needs to fix it with
  as few corrections as possible. Three corrections are available, each costing
  exactly one operation:

  - **insert** a single character at any position,
  - **delete** a single character, or
  - **replace** one character with another.

  Write `plaque_corrections(job)` where `job` is a dict with two keys:

  - `source`: the string currently engraved on the plaque
  - `target`: the string it should read instead

  Return a single integer: the minimum number of insert/delete/replace operations
  that turn `source` into `target`.

  Edges: if `source` is empty, every character of `target` must be inserted, so the
  answer is `len(target)`; if `target` is empty, every character of `source` must
  be deleted, so the answer is `len(source)`. Identical strings need `0`
  corrections.

  Example: with `source = "kitten"` and `target = "sitting"`, the answer is `3`
  (replace k with s, replace e with i, insert g).
starter_code: |
