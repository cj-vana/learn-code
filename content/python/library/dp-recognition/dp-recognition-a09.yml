explanation_markdown: |
  This is edit distance (Levenshtein distance), a two-axis DP whose state is a pair
  of prefix lengths. Let `dp[i][j]` be the fewest corrections that turn the first
  `i` characters of `source` into the first `j` characters of `target`. The two
  fully-known edges anchor everything: turning the first `i` characters into an
  empty string costs `i` deletions, and building the first `j` characters from
  nothing costs `j` insertions, so `dp[i][0] = i` and `dp[0][j] = j`.

  For an interior cell, look at the current pair of characters. If they already
  match, they cost nothing and the answer copies the diagonal `dp[i-1][j-1]`. If
  they differ, you must pay one operation and then solve a smaller problem, choosing
  the cheapest of three moves: delete a source character (`dp[i-1][j]`), insert a
  target character (`dp[i][j-1]`), or replace one character with another
  (`dp[i-1][j-1]`). Take `1 + min(...)` of those three.

  Because each cell reads only its top, left, and diagonal neighbours, filling the
  table in row order guarantees they are ready. The bottom-right entry is the
  answer, in O(m*n) time and O(m*n) space.
common_mistakes:
  - Forgetting to seed the first row and column with 0..n and 0..m, which breaks every insertion-only or deletion-only case.
  - Adding one in the match branch instead of copying the diagonal, overcounting characters that need no change.
  - Taking the min over only two of the three neighbours, which forbids either replace or one of insert/delete.
  - Swapping which neighbour means insert versus delete, giving wrong counts on unequal-length strings.
