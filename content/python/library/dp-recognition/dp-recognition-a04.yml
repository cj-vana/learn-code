explanation_markdown: |
  The number of paths into a cell depends only on the cells the robot could have
  come from: the one directly above and the one directly to the left. That overlap
  of subproblems is the signal to use dynamic programming.

  Every cell in the first row or first column has exactly one path, because the robot
  can only travel straight along an edge. Seed those with `1`. For each interior cell
  `(r, c)`, the paths arriving there are the paths that reached `(r-1, c)` plus the
  paths that reached `(r, c-1)`, so `dp[r][c] = dp[r-1][c] + dp[r][c-1]`. Filling the
  table row by row guarantees both predecessors are already computed, and the
  bottom-right entry holds the answer. The work is `O(rows * cols)`.
common_mistakes:
  - Forgetting that a single-row or single-column grid still has exactly one path, and returning 0 instead of 1.
  - Initializing only dp[0][0] to 1 while leaving the rest of the first row and column at 0, which zeroes out the whole table.
  - Confusing cells with moves and computing paths for a (rows-1) by (cols-1) grid of edges instead of the given cells.
