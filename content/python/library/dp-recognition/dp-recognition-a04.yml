function_name: count_grid_paths
input_mode: function
solution_sketch: Fill a rows-by-cols DP table where each cell is the sum of the paths into the cell above and the cell to its left.
sample_solution: |
  def count_grid_paths(data):
      rows = data["rows"]
      cols = data["cols"]
      dp = [[1] * cols for _ in range(rows)]
      for r in range(1, rows):
          for c in range(1, cols):
              dp[r][c] = dp[r - 1][c] + dp[r][c - 1]
      return dp[rows - 1][cols - 1]
hints:
  - level: 1
    text: There is exactly one way to reach any cell in the first row or the first column, since the robot has no choice but to go straight.
  - level: 2
    text: The robot reaches an interior cell either from directly above or from directly to the left, so combine those two counts.
  - level: 3
    text: Build a table where dp[r][c] = dp[r-1][c] + dp[r][c-1], seed the edges with 1, and return the bottom-right entry.
