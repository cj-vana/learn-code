prompt_markdown: |
  A stocking robot starts in the top-left cell of a rectangular warehouse floor and
  must reach the storage bay in the bottom-right cell. On every move it may only roll
  one cell to the **right** or one cell **down** -- never up, left, or diagonally.

  Write `count_grid_paths(data)` where `data` is a dict with two keys, `rows` and
  `cols`, each an integer that is at least 1 describing the grid's dimensions. Return
  the number of distinct paths the robot can take from the top-left cell to the
  bottom-right cell.

  For example, `{"rows": 3, "cols": 3}` returns `6`, and a single-row floor like
  `{"rows": 1, "cols": 5}` returns `1` because the robot can only roll straight right.
starter_code: |
