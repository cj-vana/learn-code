prompt_markdown: |
  An arcade has a token dispenser that hands out prize credits. The machine
  is stocked with an unlimited supply of tokens in a fixed set of
  denominations, and it wants to pay out an exact credit total using as FEW
  tokens as possible.

  Write `min_coins(data)` where `data` is a dict with two keys:

  - `coins`: a list of positive integer token denominations
  - `amount`: a non-negative integer credit total to dispense

  Return the smallest number of tokens whose values sum exactly to `amount`.
  You may use each denomination any number of times. If no combination sums
  to `amount`, return `-1`.

  Edge case: when `amount` is `0`, the answer is `0` (dispense nothing),
  regardless of which denominations are stocked.

  For example, with `coins = [1, 2, 5]` and `amount = 11`, the answer is `3`
  (5 + 5 + 1). With `coins = [2]` and `amount = 3`, it is impossible, so the
  answer is `-1`.
starter_code: |
  def min_coins(data):
      return -1
function_name: min_coins
input_mode: function
solution_sketch: Bottom-up DP where dp[v] is the fewest tokens summing to v, built from smaller sub-totals.
sample_solution: |
  def min_coins(data):
      coins = data["coins"]
      amount = data["amount"]
      unreachable = amount + 1
      dp = [0] + [unreachable] * amount
      for value in range(1, amount + 1):
          for coin in coins:
              if coin <= value and dp[value - coin] + 1 < dp[value]:
                  dp[value] = dp[value - coin] + 1
      return dp[amount] if dp[amount] != unreachable else -1
hints:
  - level: 1
    text: The fewest tokens for a total depends on the fewest tokens for smaller totals, so solve every total from 0 up to amount.
  - level: 2
    text: Let dp[v] be the minimum tokens that sum to exactly v. Start dp[0] = 0 and mark every other total as unreachable.
  - level: 3
    text: For each total v, try every coin that fits and set dp[v] = min(dp[v], dp[v - coin] + 1). If dp[amount] stays unreachable, return -1.
