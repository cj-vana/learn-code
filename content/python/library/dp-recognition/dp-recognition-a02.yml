explanation_markdown: |
  This is the minimum-coin-change problem, a staple of dynamic programming.
  The key insight is that the fewest tokens summing to `amount` can be
  expressed in terms of smaller sub-totals: if the last token you place has
  value `c`, then the rest must optimally make `amount - c`, so the answer is
  `1 + min_coins(amount - c)` over every usable `c`.

  Rather than recomputing those sub-answers repeatedly, we build a table
  `dp` from the bottom up. `dp[v]` holds the fewest tokens that sum to exactly
  `v`. We seed `dp[0] = 0` (an empty payout) and mark every larger total as
  unreachable using the sentinel `amount + 1`, which can never be a real
  count. For each total `v` from `1` to `amount`, we try every denomination
  that fits and keep the best `dp[v - coin] + 1`.

  Because unlimited copies of each coin are allowed, we simply reuse the same
  table entries as we build up, so a single denomination can be picked many
  times. If `dp[amount]` never improves past the sentinel, no exact
  combination exists and we return `-1`. The work is O(amount * number of
  coins), which handles large totals far faster than trying every combination.

  A greedy "take the largest coin that fits" strategy is tempting but wrong:
  with `coins = [1, 3, 4]` and `amount = 6`, greedy grabs 4 then 1 then 1
  (three tokens), while the optimal answer is 3 + 3 (two tokens). The table
  considers all options and always finds the true minimum.
common_mistakes:
  - Using a greedy largest-coin-first approach, which fails on sets like [1, 3, 4] where two 3s beat a 4 plus two 1s.
  - Returning the sentinel value instead of -1 when the amount cannot be formed.
  - Forgetting that amount 0 should return 0 rather than -1 or an error, even when no coins are stocked.
  - Skipping the check that a coin fits (coin <= value), which reads a negative index and corrupts the table.
