prompt_markdown: |
  A bell-ringer stands at the foot of an old belltower staircase. On every move
  she hops up either 1 step or 2 steps. She wonders how many distinct sequences
  of hops carry her all the way to the top.

  Write `climb_stairs(n)` where `n` is an integer number of steps in the
  staircase, with `n >= 0`. Return the number of distinct ordered ways to reach
  the top using hops of size 1 or 2.

  There is exactly one way to climb a staircase of `0` steps: take no hops at
  all, so `climb_stairs(0)` returns `1`. As a larger example,
  `climb_stairs(4)` returns `5`, counting the sequences 1+1+1+1, 1+1+2, 1+2+1,
  2+1+1, and 2+2.
starter_code: |
  def climb_stairs(n):
      return None
function_name: climb_stairs
input_mode: function
solution_sketch: The count for n equals the count for n-1 plus the count for n-2, so roll two running totals upward from the base cases.
sample_solution: |
  def climb_stairs(n):
      prev, curr = 0, 1
      for _ in range(n):
          prev, curr = curr, prev + curr
      return curr
hints:
  - level: 1
    text: Think about the very last hop. It was either a single step from n-1 or a double step from n-2.
  - level: 2
    text: That splits the problem into two smaller ones, so ways(n) = ways(n-1) + ways(n-2) with ways(0) = ways(1) = 1.
  - level: 3
    text: Instead of recursion, keep two running totals and slide them upward n times so each answer is built from the two below it.
