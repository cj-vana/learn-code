explanation_markdown: |
  Every path to step `n` must finish with a final hop, and that hop is either a
  single step landing from step `n-1` or a double step landing from step `n-2`.
  Those two groups never overlap and together cover every possibility, so the
  number of ways obeys `ways(n) = ways(n-1) + ways(n-2)`.

  The base cases anchor the recurrence: an empty staircase (`n = 0`) has one way
  (do nothing), and a single step (`n = 1`) also has exactly one way. From there
  the counts follow the Fibonacci shape 1, 1, 2, 3, 5, 8, ...

  Rather than recompute overlapping subproblems with recursion, the solution
  carries just the two most recent counts in `prev` and `curr` and slides them
  upward `n` times. This runs in O(n) time and O(1) space.
common_mistakes:
  - Returning 0 for n = 0 instead of 1, breaking the base case of the recurrence.
  - Writing a plain recursion without memoization, which recomputes the same subproblems and becomes exponentially slow.
  - Mixing up the two running totals during the update so the sum is taken from the wrong pair of values.
