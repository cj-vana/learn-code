prompt_markdown: |
  You are walking down a single row of street-market stalls, each showing a
  prize value you could claim there. There is one catch enforced by the market
  rules: if you claim a prize at some stall, you are not allowed to claim at
  either stall immediately next to it. You may skip freely otherwise, and you
  want to walk away with the largest possible total.

  Write `max_non_adjacent_sum(values)` where `values` is a list of
  non-negative integers (the prize at each stall, in walking order). Return a
  single integer: the maximum total you can collect such that no two chosen
  stalls are adjacent in the list.

  Rules and edges:
  - You may choose any subset of stalls as long as no two picked positions are
    next to each other.
  - Choosing nothing is allowed, so the answer is never negative.
  - For an empty list `[]`, return `0`.
  - For a single stall like `[5]`, return that stall's value, `5`.

  Example: `[2, 7, 9, 3, 1]` returns `12` (take the 2, the 9, and the 1).
starter_code: |
  def max_non_adjacent_sum(values):
      return 0
function_name: max_non_adjacent_sum
input_mode: function
solution_sketch: Track best totals with and without taking the current stall, rolling the two states forward across the list.
sample_solution: |
  def max_non_adjacent_sum(values):
      take = 0      # best total if we take the current stall
      skip = 0      # best total if we skip the current stall
      for v in values:
          # If we take v, we must have skipped the previous stall.
          new_take = skip + v
          # If we skip v, carry the best of the previous two states.
          new_skip = max(skip, take)
          take, skip = new_take, new_skip
      return max(take, skip)
