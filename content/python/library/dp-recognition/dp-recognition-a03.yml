explanation_markdown: |
  This is the classic no-two-adjacent maximum-sum problem, and the key
  recognition step is that every stall is a small either/or decision that
  depends only on what happened just before it. If you decide to take the
  current stall, you could not have taken the one immediately before it, so the
  best total ending in a take is the best "skip" total from the previous step
  plus the current value. If you decide to skip the current stall, you are free
  to carry whichever previous state was larger, take or skip.

  Because each new answer depends only on the previous two states, you do not
  need a full table. Two rolling variables, `take` and `skip`, capture
  everything: at each stall you compute `new_take = skip + value` and
  `new_skip = max(take, skip)`, then advance. Starting both at 0 handles the
  empty list for free (the loop never runs and `max(0, 0)` is 0) and a single
  stall naturally becomes `max(value, 0)`. The final answer is the larger of the
  two states, and the whole scan is O(n) time with O(1) extra space.
common_mistakes:
  - Returning only the take state instead of max(take, skip), which misses cases where skipping the last stall is better.
  - Adding the current value to the previous take state, which illegally chains two adjacent stalls.
  - Assuming the best pick is always every other stall, which fails on inputs like [3, 2, 5, 10, 7].
  - Forgetting the empty list must return 0 rather than erroring on an empty scan.
