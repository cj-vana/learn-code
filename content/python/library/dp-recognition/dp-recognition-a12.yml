prompt_markdown: |
  A sign shop has a crate of pre-printed word tiles and wants to know whether a
  requested banner phrase can be spelled by lining tiles up left to right with no
  gaps and no leftover letters. Each tile carries a fixed piece of text, tiles may
  be reused as often as needed, and the whole banner string must be covered
  exactly by a sequence of tiles laid end to end.

  Write `can_spell_banner(job)` where `job` is a dict with two keys:

  - `text`: the banner phrase to spell, a string with no spaces
  - `pieces`: a list of strings, the text printed on the available tiles

  Return `True` if `text` can be formed by concatenating one or more tiles from
  `pieces` (each usable any number of times), and `False` otherwise.

  Edges: the empty banner `""` needs no tiles and is always spellable, so return
  `True`. If some middle stretch of the banner cannot be covered by any tile,
  return `False`.

  Example: with `text = "applepie"` and `pieces = ["apple", "pie", "app"]`, the
  answer is `True` (`apple` + `pie`).
starter_code: |
