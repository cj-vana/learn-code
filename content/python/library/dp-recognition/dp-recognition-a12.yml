explanation_markdown: |
  This is the word-break decision, and the state that makes it a DP is a single
  starting position in the banner: `can_break(start)` asks whether the substring
  from `start` to the end can be tiled. From `start`, try every possible end for the
  first tile. If `text[start:end]` is a tile *and* the remainder `can_break(end)`
  succeeds, the whole suffix is spellable.

  The reason this needs memoization is that the same starting position is reached
  along many different tile choices. Consider a banner where `"app"` and `"apple"`
  both match at the front: exploring `"app"` first fails, then exploring `"apple"`
  succeeds, and both paths ask about later positions again and again. Caching each
  `start` position's answer collapses that overlap so every position is solved once,
  turning an exponential search into O(n^2) substring checks over the banner.

  Putting `pieces` into a `set` makes each tile lookup O(1) on average. The base
  case `start == length` returns `True`: reaching the end means the banner was
  covered exactly, which also makes the empty banner spellable for free. A stretch
  no tile can cover leaves some `start` with no working end, so its cached answer is
  `False` and the failure propagates up.
common_mistakes:
  - Greedily committing to the first matching tile without trying other lengths, which misses splits like apple+pie when app also matches.
  - Skipping the cache, so overlapping suffixes are re-explored and the search blows up exponentially.
  - Requiring exactly one tile instead of any concatenation, which rejects valid multi-tile banners.
  - Treating the empty banner as False; with no letters left to cover it should return True.
