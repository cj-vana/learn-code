function_name: can_spell_banner
input_mode: function
solution_sketch: Ask whether the banner can be spelled starting at each position; a position works if some tile matches a prefix there and the rest of the banner can be spelled. Cache each position's answer.
sample_solution: |
  def can_spell_banner(job):
      text = job["text"]
      pieces = set(job["pieces"])
      length = len(text)
      cache = {}

      def can_break(start):
          if start == length:
              return True
          if start in cache:
              return cache[start]
          result = False
          for end in range(start + 1, length + 1):
              if text[start:end] in pieces and can_break(end):
                  result = True
                  break
          cache[start] = result
          return result

      return can_break(0)
