explanation_markdown: |
  This is an ordered-composition count: how many sequences of allowed plank lengths
  sum to `length`, where order matters. The recognition step is to look at the
  *last* plank laid. If that final plank has length `b`, everything before it is an
  ordered pattern filling `length - b`, which is the same question on a smaller
  bench. Summing over every choice of final plank gives the recurrence
  `ways[i] = sum(ways[i - b] for b in boards if b <= i)`.

  We build the table bottom-up. `ways[0] = 1` because there is exactly one way to
  fill a zero-length bench: lay nothing. Then for each length from `1` to `length`,
  we add up the counts of the shorter lengths reachable by removing one plank of
  each stocked size. Because every dependency `ways[i - b]` is smaller than `i`, it
  is already finished by the time we need it.

  Counting ordered sequences is why we loop lengths on the outside and boards on the
  inside: every plank size gets a chance to be the last plank at every length. (If
  you instead wanted unordered combinations, you would swap the loop nesting.) The
  work is O(length * number of boards).
common_mistakes:
  - Setting ways[0] to 0 instead of 1, which zeroes out the entire table.
  - Swapping the loop order (boards outside, lengths inside), which counts unordered combinations rather than ordered patterns.
  - Forgetting the board <= i guard, which reads a negative index and mixes in the wrong counts.
  - Assuming a length that cannot be filled should error, rather than returning 0.
