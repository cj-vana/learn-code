    text: Think about the last plank laid. If it has length b, the planks before it must fill length - b, which is a smaller version of the same counting question.
  - level: 2
    text: Let ways[i] be the number of ordered patterns that fill length i. Seed ways[0] = 1 for the empty bench, then build up.
  - level: 3
    text: For each length i, add ways[i - board] for every board with board <= i, so ways[i] = sum over boards of ways[i - board]. Return ways[length].
