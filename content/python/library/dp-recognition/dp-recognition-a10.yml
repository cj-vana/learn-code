prompt_markdown: |
  A woodworker is laying planks end to end to build a bench of a fixed length. The
  shop stocks planks in a handful of lengths, with an unlimited supply of each. She
  wants to count how many distinct *patterns* fill the bench exactly, where the
  order the planks are laid in matters: laying a short plank then a long plank is a
  different pattern from long then short.

  Write `bench_patterns(order)` where `order` is a dict with two keys:

  - `length`: a non-negative integer, the exact bench length to fill
  - `boards`: a list of positive integers, the plank lengths in stock

  Return a single integer: the number of ordered sequences of planks whose lengths
  add up to exactly `length`. Each plank length may be reused any number of times.

  Edges: a bench of `length` `0` has exactly one pattern, the empty sequence, so
  return `1`. If no sequence can total `length` (for example filling `1` with only
  a `2`-length plank), return `0`.

  Example: with `length = 4` and `boards = [1, 2]`, the answer is `5` (1+1+1+1,
  1+1+2, 1+2+1, 2+1+1, 2+2).
starter_code: |
