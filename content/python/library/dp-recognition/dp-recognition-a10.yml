function_name: bench_patterns
input_mode: function
solution_sketch: Build a table of pattern counts by total length, where each length sums the counts of the shorter lengths reachable by removing one plank.
sample_solution: |
  def bench_patterns(order):
      length = order["length"]
      boards = order["boards"]
      ways = [0] * (length + 1)
      ways[0] = 1
      for i in range(1, length + 1):
          for board in boards:
              if board <= i:
                  ways[i] += ways[i - board]
      return ways[length]
hints:
