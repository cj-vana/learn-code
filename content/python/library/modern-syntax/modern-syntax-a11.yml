prompt_markdown: |
  A weather station prints a compact debug line for its current readings. It
  mimics Python's self-documenting f-string form: writing `f"{temp=}"` produces
  the text `temp=` followed by the **repr** of the value, e.g. `temp=21`. Your
  job is to build that same line from a list of name/value pairs.

  Write `debug_line(readings)`. The single argument is a list of `[name, value]`
  pairs (each a two-element list), in the order they should appear. Return a
  single string where each pair is rendered as `name=<repr of value>` and the
  pairs are joined by `", "` (comma and one space).

  Because the value is rendered with `repr`, not `str`:

  - a string value keeps its surrounding quotes: `["site", "north"]` becomes
    `site='north'`;
  - a boolean renders as `True`/`False`: `["active", True]` becomes
    `active=True`;
  - numbers, and lists, render exactly as their `repr`: `["codes", [1, 2, 3]]`
    becomes `codes=[1, 2, 3]`.

  An empty input list returns the empty string `""`.
starter_code: |
  def debug_line(readings):
      return ""
function_name: debug_line
input_mode: function
solution_sketch: For each [name, value] pair build the fragment f"{name}={value!r}" — the !r conversion applies repr, matching what the f"{name=}" form emits — then join the fragments with ", ".
sample_solution: |
  def debug_line(readings):
      return ", ".join(f"{name}={value!r}" for name, value in readings)
hints:
  - level: 1
    text: The self-documenting form f"{x=}" is shorthand for the text "x=" followed by repr(x). You are reproducing that for arbitrary names held in variables.
  - level: 2
    text: For one pair, f"{name}={value!r}" writes the name, an equals sign, and the repr of the value. The !r conversion is what adds quotes around strings.
  - level: 3
    text: Build one fragment per pair with a generator expression and combine them with ", ".join(...). An empty list naturally joins to "".
