explanation_markdown: |
  The `=` specifier in f-strings (added in Python 3.8) is a debugging
  convenience: `f"{expr=}"` emits the source text of `expr`, an equals sign, and
  the value rendered with `repr`. It saves you from typing the variable name
  twice when scattering quick trace prints through code.

  Here the names arrive as data rather than as literal source, so you reproduce
  the behaviour explicitly with `f"{name}={value!r}"`. The load-bearing detail
  is the `!r` conversion: it calls `repr` instead of `str`, which is why strings
  come back quoted and a value like `True` (not `true`) or `[1, 2, 3]` renders
  in its unambiguous Python form. Joining the fragments with `", "` gives the
  same compact console line, and an empty reading list joins to `""`.
common_mistakes:
  - Using f"{name}={value}" without !r, so string values lose their quotes and the output no longer matches the self-documenting form.
  - Calling str(value) instead of repr(value); the two differ for strings, and only repr matches what f"{x=}" produces.
  - Joining with "," instead of ", ", producing a run-together line that fails the expected spacing.
