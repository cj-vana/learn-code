prompt_markdown: |
  A harbor master's console receives events as dictionaries and renders each one as
  a short line for the log. Write `describe_event(event)` that uses a `match`/`case`
  statement with **mapping patterns** (for example `case {"type": "delay", "minutes": mins}:`)
  and returns a string:

  - `{"type": "arrival", "ship": <name>, "berth": <berth>}` returns `"<name> docking at berth <berth>"`
  - `{"type": "departure", "ship": <name>}` returns `"<name> leaving port"`
  - `{"type": "delay", "minutes": <mins>}` returns `"delayed <mins> minutes"`
  - any other dictionary that still has a `"type"` key returns `"unknown event: <type>"`
  - anything with no `"type"` key returns `"malformed"`

  Two behaviors to rely on: a mapping pattern matches when the listed keys are
  present, so **extra keys are ignored** (an arrival that also carries a `"cargo"`
  key still matches the arrival case). And an empty dict `{}` has no `"type"` key,
  so it returns `"malformed"`. For example,
  `describe_event({"type": "arrival", "ship": "Aurora", "berth": 9, "cargo": "grain"})`
  returns `"Aurora docking at berth 9"`.
starter_code: |
  def describe_event(event):
      return "malformed"
function_name: describe_event
input_mode: function
solution_sketch: Match the fully specified event shapes first (arrival needs ship and berth, departure needs ship, delay needs minutes), then a catch-all mapping with just a captured type key, then a wildcard for anything lacking a type.
sample_solution: |
  def describe_event(event):
      match event:
          case {"type": "arrival", "ship": name, "berth": berth}:
              return f"{name} docking at berth {berth}"
          case {"type": "departure", "ship": name}:
              return f"{name} leaving port"
          case {"type": "delay", "minutes": mins}:
              return f"delayed {mins} minutes"
          case {"type": kind}:
              return f"unknown event: {kind}"
          case _:
              return "malformed"
hints:
