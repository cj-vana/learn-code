explanation_markdown: |
  A mapping pattern is a subset check: `case {"type": "arrival", "ship": name, "berth": berth}:`
  matches any dict that contains at least those three keys with `"type"` equal to
  `"arrival"`, and it binds the other two values. Keys the event carries beyond the
  ones you name are simply not inspected, which is why an arrival with an extra
  `"cargo"` key still matches. Ordering runs from most specific to least: the fully
  described shapes come first, then `case {"type": kind}:` captures the type of
  anything else that at least declares one, and the final `case _:` catches dicts
  with no `"type"` key at all. That last split is what separates an unrecognized but
  well-formed event from a genuinely malformed one.
common_mistakes:
  - Expecting a mapping pattern to fail on extra keys; it matches on the listed keys only and ignores the rest.
  - 'Placing `case {"type": kind}:` before the specific cases, so every typed event is reported as "unknown".'
  - 'Assuming `{}` reaches the `case {"type": kind}:` branch; with no "type" key it falls through to the wildcard and returns "malformed".'
