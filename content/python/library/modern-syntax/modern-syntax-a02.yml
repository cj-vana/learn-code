explanation_markdown: |
  A guard lets a `case` combine a pattern with an arbitrary boolean test. Here the
  pattern `n` captures the delta and the guard decides which band it belongs to.
  Because `match` evaluates cases in order and stops at the first success, you can
  lean on earlier cases to narrow the field: after `case 0` and `case n if n < 0`,
  the only values left are strictly positive, so the guard `n <= 20` cleanly splits
  gentle from strong and the wildcard mops up the rest. This top-down narrowing is
  what keeps each guard simple instead of restating `n > 0 and n <= 20`.
common_mistakes:
  - Putting the wildcard `case _:` before the guarded cases, which short-circuits every value into "strong-flood".
  - Writing `case n <= 20:` instead of `case n if n <= 20:`; a guard must be a separate `if` clause after the capture pattern.
  - Getting the boundary wrong by using `n < 20`, which mislabels a delta of exactly 20 as "strong-flood".
