prompt_markdown: |
  A harbor tide gauge reports the change in water level for the last hour as a
  single integer (positive means the water rose, negative means it fell). Write
  `band_tide(delta)` that uses a `match`/`case` statement with **guard clauses**
  (a `case` followed by `if ...`) and returns a band label:

  - a change of exactly `0` returns `"slack"`
  - any negative change returns `"ebb"`
  - a positive change of `20` or less returns `"gentle-flood"`
  - a positive change greater than `20` returns `"strong-flood"`

  Guards are tested top to bottom, so once you have handled `0` and the negative
  case, the remaining values are all positive and you only need to split them at
  the boundary of `20`. Boundary detail: a delta of exactly `20` is
  `"gentle-flood"`, and `21` is `"strong-flood"`.
starter_code: |
  def band_tide(delta):
      return "slack"
function_name: band_tide
input_mode: function
solution_sketch: Match on the literal 0 first, then use capture-with-guard cases (case n if n < 0, case n if n <= 20) and let a wildcard handle the strong-flood remainder.
sample_solution: |
  def band_tide(delta):
      match delta:
          case 0:
              return "slack"
          case n if n < 0:
              return "ebb"
          case n if n <= 20:
              return "gentle-flood"
          case _:
              return "strong-flood"
hints:
  - level: 1
    text: A guard is an if clause attached to a case, like `case n if n < 0:`. The case only matches when both the pattern and the guard are true.
  - level: 2
    text: Handle the literal 0 with `case 0:` first. After the negative case, every remaining delta is positive, so a single boundary check at 20 separates gentle from strong.
  - level: 3
    text: Order matters. `case 0`, then `case n if n < 0`, then `case n if n <= 20`, then `case _` for everything above 20.
