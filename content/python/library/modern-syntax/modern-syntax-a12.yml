solution_sketch: Define a @runtime_checkable Recorder Protocol requiring capture and save. For each driver, build a fresh empty object and setattr each listed member name to a callable, then isinstance(obj, Recorder). Collect the names that pass, preserving input order.
sample_solution: |
  from typing import Protocol, runtime_checkable


  @runtime_checkable
  class Recorder(Protocol):
      def capture(self): ...
      def save(self): ...


  def capture_ready(drivers):
      ready = []
      for driver in drivers:
          instrument = type("Instrument", (), {})()
          for member in driver["members"]:
              setattr(instrument, member, lambda: None)
          if isinstance(instrument, Recorder):
              ready.append(driver["name"])
      return ready
