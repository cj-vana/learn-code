explanation_markdown: |
  `typing.Protocol` describes a structural type — "anything with these members"
  — instead of a nominal one tied to a base class. Normally Protocols exist only
  for static checkers, but adding `@runtime_checkable` makes `isinstance` work
  against them. That runtime check is deliberately shallow: it verifies that the
  object **has** each protocol member by name, using ordinary attribute lookup.

  This drill leans on exactly that behaviour. Each driver becomes a blank object
  onto which the listed member names are attached with `setattr`, so
  `isinstance(instrument, Recorder)` returns `True` precisely when both
  `capture` and `save` are present. Extra members are irrelevant, and a missing
  one disqualifies the driver. The important caveat to remember beyond this
  exercise: `@runtime_checkable` checks presence, not call signatures or even
  whether the member is callable — so it confirms shape, not full behaviour.
common_mistakes:
  - Forgetting the @runtime_checkable decorator; isinstance against a plain Protocol raises TypeError instead of performing the structural check.
  - Reusing one shared object across drivers so members from an earlier driver leak into later checks; build a fresh object per driver.
  - Assuming isinstance verifies the members are callable or have the right signature — @runtime_checkable only checks that the names exist.
