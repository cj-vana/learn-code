prompt_markdown: |
  An observatory keeps a registry of instrument drivers. A driver is
  "capture-ready" only if it structurally matches the `Recorder` protocol, which
  requires two members: `capture` and `save`. Python's `typing.Protocol` with
  the `@runtime_checkable` decorator lets you test that at runtime with
  `isinstance` — it checks that the object **has** every protocol member by
  name.

  Write `capture_ready(drivers)`. The single argument is a list of driver
  descriptors, each a dict:

  ```python
  {"name": "cam-a", "members": ["capture", "save"]}
  ```

  For each driver, model an object that exposes exactly the member names listed
  in `members`, then use `isinstance` against a `@runtime_checkable` `Recorder`
  protocol (requiring `capture` and `save`) to decide if it qualifies. Return
  the list of `name` values of the drivers that qualify, in the input order.

  Details and edge cases:

  - A driver qualifies only if `members` contains **both** `capture` and
    `save`. Having just one of them does not qualify.
  - Extra members beyond the two required ones are fine; the driver still
    qualifies.
  - `@runtime_checkable` only checks that the members are **present** by name —
    it does not inspect their signatures — but for this drill every listed
    member is present as a callable, so presence is what decides the outcome.
  - An empty driver list returns an empty list.
