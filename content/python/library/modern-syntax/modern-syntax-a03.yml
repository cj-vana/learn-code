prompt_markdown: |
  A dockside crew works through a loading manifest, a list of crate codes in the
  order they will be lifted aboard. Write `bookend_manifest(crates)` that uses a
  `match`/`case` statement with a **star-rest sequence pattern**
  (`case [first, *middle, last]:`) and returns a summary dictionary with three
  keys:

  - `"first"` — the first crate in the manifest
  - `"last"` — the last crate in the manifest
  - `"middle_count"` — how many crates sit strictly between the first and last

  Handle the short manifests explicitly:

  - an empty list returns `{"first": None, "last": None, "middle_count": 0}`
  - a single-crate list `[x]` returns `{"first": x, "last": x, "middle_count": 0}`
  - a two-crate list `[a, b]` returns `{"first": a, "last": b, "middle_count": 0}`

  For example, `bookend_manifest(["A", "B", "C", "D"])` returns
  `{"first": "A", "last": "D", "middle_count": 2}`.
starter_code: |
  def bookend_manifest(crates):
      return {"first": None, "last": None, "middle_count": 0}
function_name: bookend_manifest
input_mode: function
solution_sketch: Match the empty list and the single-element list first, then let case [first, *middle, last] bind the ends and collect everything between into middle, whose length is the middle_count.
sample_solution: |
  def bookend_manifest(crates):
      match crates:
          case []:
              return {"first": None, "last": None, "middle_count": 0}
          case [only]:
              return {"first": only, "last": only, "middle_count": 0}
          case [first, *middle, last]:
              return {"first": first, "last": last, "middle_count": len(middle)}
hints:
  - level: 1
    text: A star pattern like `[first, *middle, last]` binds the ends to first and last and collects everything between them into a list called middle.
  - level: 2
    text: The star pattern needs at least two elements to have both a first and a last, so match the empty list and the one-element list with their own cases first.
  - level: 3
    text: For a two-element list the star target middle is simply an empty list, so len(middle) is 0. Return len(middle) as the middle_count in the general case.
tests:
  public:
    - name: empty_manifest
      input: []
      expected: {"first": null, "last": null, "middle_count": 0}
