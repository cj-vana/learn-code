      expected: {"first": "x", "last": "w", "middle_count": 2}
    - name: single_numeric_crate
      input: [42]
      expected: {"first": 42, "last": 42, "middle_count": 0}
explanation_markdown: |
  The star target in a sequence pattern soaks up "everything in between" after the
  fixed positions are bound. In `[first, *middle, last]`, Python binds the first and
  last elements and hands you the remainder as a real list, so `len(middle)` is the
  count you want without any slicing arithmetic. The catch is that this pattern
  requires at least two elements, because it must produce both a `first` and a
  `last`. That is why the empty and single-element lists need their own cases: for
  `[x]` there is no distinct last element, and for `[]` there is nothing to bind at
  all. Ordering the shortest cases first keeps the star pattern responsible only for
  the lengths it can actually satisfy.
common_mistakes:
  - Letting `[first, *middle, last]` handle a one-element list, which never matches and leaves the single-crate case unhandled.
  - Computing middle_count as len(crates) - 2 without guarding against short lists, producing a negative count for empty or single inputs.
  - Returning the middle list itself instead of its length under the middle_count key.
