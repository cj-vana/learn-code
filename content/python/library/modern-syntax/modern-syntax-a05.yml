explanation_markdown: |
  An or-pattern collapses several alternatives into a single case, matching if any
  one of them matches. For the literal slot codes it reads almost like a set of
  accepted values. The more interesting use is across the two dict shapes: `{"host":
  name} | {"presenter": name}` accepts either key spelling and, crucially, binds the
  captured value to the same name on both sides. Python enforces that rule at
  compile time. If the two alternatives bound different names (say `name` on one side
  and `who` on the other), the branch body could not know which variable was set, so
  it is a `SyntaxError`. Reusing one capture name is exactly what lets the body treat
  both spellings uniformly.
common_mistakes:
  - 'Binding different names in the two dict alternatives (for example `{"host": name} | {"presenter": who}`), which is a SyntaxError because or-pattern alternatives must bind the same names.'
  - Writing separate cases for "pm1" and "pm2" instead of a single or-pattern, which works but misses the point of the feature.
  - Assuming `{}` matches the dict alternative; with neither key present it falls through to the wildcard and returns "unscheduled".
