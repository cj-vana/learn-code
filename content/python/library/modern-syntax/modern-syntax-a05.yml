prompt_markdown: |
  A community radio station stores each schedule entry in one of two shapes: a
  short slot code string, or a dict naming who is on air. Write
  `read_schedule(entry)` that uses a `match`/`case` statement with **or-patterns**
  (alternatives joined by `|`) and returns a string:

  - a slot code of `"am1"`, `"am2"`, or `"am3"` returns `"morning"`
  - a slot code of `"pm1"` or `"pm2"` returns `"afternoon"`
  - a slot code of `"n1"` or `"n2"` returns `"overnight"`
  - a dict written as either `{"host": <name>}` or `{"presenter": <name>}`
    returns `<name>` (the two spellings are treated as equivalent)
  - anything else returns `"unscheduled"`

  The dict rule uses an or-pattern across two different key spellings that both bind
  the same capture name, so `{"host": "Dee"}` and `{"presenter": "Ravi"}` return
  `"Dee"` and `"Ravi"` respectively. If a dict has neither key (for example `{}`),
  it returns `"unscheduled"`.
starter_code: |
  def read_schedule(entry):
      return "unscheduled"
function_name: read_schedule
input_mode: function
solution_sketch: Use or-patterns over the literal slot codes for the three time-of-day labels, then an or-pattern over the two mapping shapes binding the same name, then a wildcard returning unscheduled.
sample_solution: |
  def read_schedule(entry):
      match entry:
          case "am1" | "am2" | "am3":
              return "morning"
          case "pm1" | "pm2":
              return "afternoon"
          case "n1" | "n2":
              return "overnight"
          case {"host": name} | {"presenter": name}:
              return name
          case _:
              return "unscheduled"
hints:
  - level: 1
    text: An or-pattern lets one case match several alternatives, like `case "pm1" | "pm2":`. It succeeds if the value matches any alternative.
  - level: 2
    text: 'Or-patterns also work across mapping shapes. `case {"host": name} | {"presenter": name}:` matches either key spelling and binds the value to name in both.'
  - level: 3
    text: Every alternative in an or-pattern must bind the same set of names, so use the same capture name (name) on both sides of the dict alternative. End with `case _:` returning "unscheduled".
