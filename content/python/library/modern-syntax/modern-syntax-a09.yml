function_name: split_booklets
input_mode: function
solution_sketch: Make one iterator from job["pages"]. In a while loop, bind batch := list(islice(pages_iter, size)); an empty batch ends the loop, otherwise append it. islice advances the shared iterator so each pass consumes the next size items.
sample_solution: |
  from itertools import islice


  def split_booklets(job):
      pages = iter(job["pages"])
      size = job["size"]
      booklets = []
      while (batch := list(islice(pages, size))):
          booklets.append(batch)
      return booklets
