prompt_markdown: |
  A print shop feeds a stack of pages into a binder that holds at most a fixed
  number of sheets per booklet. Split the pages into consecutive booklets of
  that size; the last booklet takes whatever is left over.

  Write `split_booklets(job)`. The single argument is a dict:

  ```python
  {"pages": [1, 2, 3, 4, 5], "size": 2}
  ```

  Return a list of booklets (a list of lists), each containing up to `size`
  pages in original order. `size` is always an integer that is at least 1.

  Build it as a **walrus-driven while loop** over an iterator: turn `pages`
  into an iterator once, then repeatedly pull the next `size` items with
  `itertools.islice`, binding the slice with `:=` in the `while` condition and
  stopping when the pulled slice is empty.

  Edge cases:

  - An empty `pages` list produces no booklets: return `[]`.
  - When `size` is larger than the number of pages, you get one booklet holding
    everything.
  - When the count divides evenly, every booklet is full and there is no short
    final booklet.
  - Page values may be numbers or strings; keep them unchanged and in order.
