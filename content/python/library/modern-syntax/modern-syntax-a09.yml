explanation_markdown: |
  Chunking an iterable is a classic place for the walrus operator. The naive
  version needs a priming read before the loop and a second read at the bottom;
  binding the slice inside the `while` condition folds both into one line:
  `while (batch := list(islice(pages, size))):`.

  The trick is that `pages` is a single iterator shared across every
  `islice` call. `islice(pages, size)` consumes the next `size` items and
  advances the iterator, so the following pass naturally starts where this one
  left off. When the iterator is exhausted, `islice` yields nothing, `list(...)`
  is empty and falsy, and the loop stops — which is why an empty input yields no
  booklets and an evenly divisible input has no trailing short booklet.
common_mistakes:
  - Calling islice on the original list instead of a single iterator, so every pass re-reads from the start and loops forever.
  - Forgetting to wrap islice in list(...), leaving an islice object in the condition — it is always truthy, causing an infinite loop.
  - Building slices with manual index arithmetic that drops or duplicates the final short booklet.
