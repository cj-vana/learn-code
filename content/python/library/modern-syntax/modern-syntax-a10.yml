explanation_markdown: |
  Positional-only (`/`) and keyword-only (`*`) parameters are how a Python API
  author freezes the calling convention: callers cannot rely on the internal
  name of a positional-only argument, and cannot accidentally pass a
  keyword-only flag by position. Rather than re-implement those rules, this
  exercise leans on `inspect.Signature.bind`, the exact same argument-matching
  logic the interpreter uses.

  Building the signature from `Parameter` objects — `POSITIONAL_ONLY` first,
  then `KEYWORD_ONLY` — and calling `bind(*args, **kwargs)` gives you a single
  source of truth. Every violation surfaces as a `TypeError`: a positional-only
  name in `kwargs`, a keyword-only name arriving positionally, a missing
  required argument, a surplus positional, or an unknown keyword. Catching that
  one exception type cleanly separates the valid calls (whose
  `bound.arguments` is the normalised name-to-value mapping) from the rejected
  ones.
common_mistakes:
  - Placing keyword-only parameters before positional-only ones when constructing the Signature, which itself raises a ValueError about parameter order.
  - Hand-writing the positional-only and keyword-only rules with if-statements and missing a case, instead of letting Signature.bind enforce the whole contract.
  - Catching a broad Exception (or none at all) rather than TypeError, so a genuine binding failure is not turned into the ok=False result.
