prompt_markdown: |
  An observatory's telescope API is strict about how commands are called. Some
  parameters are **positional-only** (the fast numeric arguments, which must be
  passed by position, never by name) and some are **keyword-only** (the safety
  flags, which must be passed by name, never by position). Python expresses this
  contract with the `/` and `*` markers in a signature; here you validate a call
  against that contract using the real `inspect` machinery.

  Write `bind_command(call)`. The single argument is a dict:

  ```python
  {
      "positional_only": ["azimuth", "altitude"],
      "keyword_only": ["confirm"],
      "args": [120, 45],
      "kwargs": {"confirm": True},
  }
  ```

  Build an `inspect.Signature` whose parameters are, in order, the
  `positional_only` names as `Parameter.POSITIONAL_ONLY`, then the
  `keyword_only` names as `Parameter.KEYWORD_ONLY` (all required, no defaults).
  Attempt to bind the supplied `args` and `kwargs` to it.

  Return a dict:

  - On a successful bind: `{"ok": True, "bound": <mapping of parameter name to
    value>}`, where the mapping contains every bound parameter.
  - If binding raises `TypeError`: `{"ok": False, "bound": {}}`.

  A bind fails (returns `ok` False) when, for example:

  - a positional-only name is supplied in `kwargs`;
  - a keyword-only name is supplied positionally in `args`;
  - a required parameter is missing;
  - there are more positional `args` than positional-only parameters;
  - `kwargs` contains a name that is not a parameter.

  With no parameters and an empty call, the bind succeeds with an empty mapping.
starter_code: |
  from inspect import Parameter, Signature


  def bind_command(call):
      return {"ok": False, "bound": {}}
function_name: bind_command
input_mode: function
solution_sketch: Assemble a list of Parameter objects (POSITIONAL_ONLY names first, then KEYWORD_ONLY names) and build a Signature. Call sig.bind(*args, **kwargs) inside try/except TypeError. On success return ok True with dict(bound.arguments); on TypeError return ok False with an empty mapping.
sample_solution: |
  from inspect import Parameter, Signature


  def bind_command(call):
      params = [Parameter(name, Parameter.POSITIONAL_ONLY) for name in call["positional_only"]]
      params += [Parameter(name, Parameter.KEYWORD_ONLY) for name in call["keyword_only"]]
      signature = Signature(params)
      try:
          bound = signature.bind(*call["args"], **call["kwargs"])
      except TypeError:
          return {"ok": False, "bound": {}}
      return {"ok": True, "bound": dict(bound.arguments)}
hints:
  - level: 1
    text: Create the parameters with inspect.Parameter(name, Parameter.POSITIONAL_ONLY) and inspect.Parameter(name, Parameter.KEYWORD_ONLY), keeping the positional-only ones first so the Signature order is valid.
  - level: 2
    text: Signature.bind(*call["args"], **call["kwargs"]) enforces the whole contract for you — it raises TypeError when the call violates positional-only or keyword-only rules, is missing an argument, or has an extra one.
  - level: 3
    text: 'Wrap the bind call in try/except TypeError. On success, dict(bound.arguments) is the name-to-value mapping to return under "bound"; on failure return the ok=False result with an empty mapping.'
