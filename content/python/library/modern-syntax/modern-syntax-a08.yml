explanation_markdown: |
  The walrus operator (`:=`, PEP 572) assigns a value as part of an expression,
  which is exactly what you need when a comprehension has to both test a value
  and keep it. Without it you would either compute `raw.strip().lower()` twice
  (once in the filter, once in the output) or fall back to a plain loop.

  The filter reads as one short-circuiting expression:
  `(name := raw.strip().lower()) not in seen and (seen.add(name) or True)`. If
  `name` is already in `seen`, the left side is `False` and Python skips the
  `add`, leaving `seen` untouched. If it is new, `seen.add(name)` records it and
  returns `None`, so `(None or True)` keeps the row. The result is
  order-preserving deduplication in a single pass, O(n) with the set doing the
  membership work.
common_mistakes:
  - Calling raw.strip().lower() twice — once to test, once to emit — instead of binding it once with the walrus operator.
  - Writing 'if seen.add(name)' as the whole filter; set.add returns None, so every row would be dropped.
  - Returning the original raw strings instead of the normalised forms, so whitespace and casing leak into the output.
