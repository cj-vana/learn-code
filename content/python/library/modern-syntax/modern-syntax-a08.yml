prompt_markdown: |
  A bakery's morning order sheet is typed by several staff, so the same
  ingredient shows up with stray spaces and mixed casing: `"Flour"`,
  `" flour "`, `"FLOUR"`. You want a clean list where each ingredient appears
  once, in the order it was first written, using its normalised spelling.

  Write `dedupe_orders(entries)`. The single argument is a list of strings.
  For each entry compute its normalised form by stripping leading/trailing
  whitespace and lower-casing it. Keep an entry only the first time its
  normalised form is seen, and return the list of normalised forms in
  first-seen order.

  The catch: normalise each entry exactly **once** and reuse that value for
  both the membership test and the output. Do it with the walrus operator
  (`:=`) inside a single list comprehension so the normalised value is captured
  as it is tested.

  Edge cases:

  - An empty input list returns an empty list.
  - Entries that differ only by surrounding whitespace or letter case collapse
    to one entry.
  - The value kept is the normalised (stripped, lower-cased) string, not the
    original raw text.
starter_code: |
  def dedupe_orders(entries):
      return []
function_name: dedupe_orders
input_mode: function
solution_sketch: Track a seen set. In one comprehension, use the walrus operator to bind name = raw.strip().lower(), include the row when name is not yet in seen, and add it to seen as part of the same condition so each name is computed once.
sample_solution: |
  def dedupe_orders(entries):
      seen = set()
      return [
          name
          for raw in entries
          if (name := raw.strip().lower()) not in seen and (seen.add(name) or True)
      ]
hints:
  - level: 1
    text: Keep a set called seen so you can tell whether a normalised name has already been emitted.
  - level: 2
    text: Inside the comprehension's if clause, bind the normalised value with (name := raw.strip().lower()) so it is computed a single time and then reused.
  - level: 3
    text: The filter is (name := raw.strip().lower()) not in seen and (seen.add(name) or True). set.add returns None, so 'or True' keeps the clause truthy while still recording the name.
