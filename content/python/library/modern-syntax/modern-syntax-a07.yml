explanation_markdown: |
  `add_note` (PEP 678, Python 3.11) solves a real problem: you want to enrich a
  failure with context discovered far from where it was raised, without losing
  the original message or wrapping it in a new exception. Each call appends to
  `exc.__notes__`, a plain list that starts out absent and is created on first
  use — which is why `getattr(exc, "__notes__", [])` is the safe way to read it.

  The key distinction this drill drives home: `str(exc)` reports only the
  constructor message. The notes are a separate channel, surfaced by the
  traceback machinery, not by string conversion. Returning the reason followed
  by the notes lets you see both halves and confirm that order is preserved and
  duplicates survive.
common_mistakes:
  - Expecting the notes to appear inside str(exc); string conversion returns only the original message, never the notes.
  - Reading exc.__notes__ directly when no note was added, which raises AttributeError because the attribute is created lazily on the first add_note call.
  - Deduplicating or sorting the notes; add_note appends in call order and keeps every duplicate.
