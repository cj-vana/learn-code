prompt_markdown: |
  A harbour's berth desk turns away a docking request by building a single
  rejection and then pinning extra context to it. Python 3.11 added
  `Exception.add_note(text)`, which appends a line to the exception's
  `__notes__` list. Those notes ride along with the exception (a traceback
  prints them) but `str(exc)` still returns only the original message.

  Write `annotate_rejection(request)`. The single argument is a dict of the
  shape:

  ```python
  {"reason": "Berth occupied", "notes": ["Occupied until 14:00 tide"]}
  ```

  - Build one exception whose message is `request["reason"]` (use any built-in
    exception type — only its message and notes are observed).
  - For each string in `request["notes"]`, in order, call `add_note` on that
    exception.
  - Return a list of report lines: element 0 is `str(exc)` (the reason alone),
    followed by every attached note in the order they were added.

  Rules and edge cases:

  - The `"notes"` key may be **absent** or an empty list; then return a
    one-element list containing just the reason.
  - Notes are never deduplicated: if the same note text is added twice, it
    appears twice.
  - The reason string is returned verbatim, including any punctuation such as a
    colon or a currency amount.
starter_code: |
  def annotate_rejection(request):
