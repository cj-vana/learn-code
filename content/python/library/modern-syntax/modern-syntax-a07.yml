function_name: annotate_rejection
input_mode: function
solution_sketch: Construct one exception from the reason, loop over the notes calling add_note on each, then return [str(exc)] extended by exc.__notes__ (defaulting to an empty list when no note was added).
sample_solution: |
  def annotate_rejection(request):
      reason = request["reason"]
      notes = request.get("notes", [])
      error = ValueError(reason)
      for note in notes:
          error.add_note(note)
      report = [str(error)]
      report.extend(getattr(error, "__notes__", []))
      return report
hints:
  - level: 1
    text: Create the exception once, for example error = ValueError(request["reason"]). Do not raise it; you only need to read its message and notes.
  - level: 2
    text: Loop over request.get("notes", []) and call error.add_note(note) for each. Using .get with a default handles the missing-key case cleanly.
  - level: 3
    text: str(error) gives only the reason. The notes live on error.__notes__, which does not exist until the first add_note call, so read it with getattr(error, "__notes__", []).
