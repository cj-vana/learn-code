explanation_markdown: |
  Class patterns match on `isinstance`, which is what makes `case int():` fire for
  any integer. The subtlety is that `bool` inherits from `int`, so `isinstance(True,
  int)` is `True`. If `case int():` came first it would capture `True` and `False`
  before the boolean branch ever ran. Ordering cases from most specific to most
  general is the same discipline you use when ordering `except` clauses. The `0`
  case reinforces the point from the other direction: `0` is falsy but it is still
  an `int`, not a `bool`, so it lands in the count branch.
common_mistakes:
  - Placing `case int():` before `case bool():`, which tags every True/False as "count".
  - Writing `case bool:` (the class object) instead of `case bool():` (a class pattern); the former is treated as a capture name, not a type check.
  - Forgetting the final `case _:` wildcard, so an unexpected type falls through with no branch matched.
