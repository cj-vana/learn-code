prompt_markdown: |
  An observatory's intake desk receives one raw telemetry value at a time and
  needs to tag it by its Python type. Write `tag_reading(value)` that uses a
  `match`/`case` statement with **class patterns** (for example `case int():`)
  and returns a tag string:

  - `None` returns `"missing"`
  - a `bool` (`True`/`False`) returns `"flag"`
  - an `int` returns `"count"`
  - a `float` returns `"measure"`
  - a `str` returns `"label"`
  - a `list` returns `"series"`
  - a `dict` returns `"record"`
  - anything else returns `"unknown"`

  The trap: in Python `bool` is a subclass of `int`, so `case bool()` must appear
  **before** `case int()`, otherwise every `True`/`False` would be tagged as a
  count. Note that `0` is an ordinary `int` (not a `bool`), so `tag_reading(0)`
  must return `"count"`.
starter_code: |
  def tag_reading(value):
      return "unknown"
function_name: tag_reading
input_mode: function
solution_sketch: Match the value against class patterns, listing bool() before int() so booleans are not swallowed by the int branch, and end with a wildcard case for anything unexpected.
sample_solution: |
  def tag_reading(value):
      match value:
          case None:
              return "missing"
          case bool():
              return "flag"
          case int():
              return "count"
          case float():
              return "measure"
          case str():
              return "label"
          case list():
              return "series"
          case dict():
              return "record"
          case _:
              return "unknown"
hints:
  - level: 1
    text: A class pattern like `case str():` matches by type using isinstance, so you can dispatch on the kind of value without calling type() yourself.
  - level: 2
    text: Because True and False are also ints, the order of your cases matters. Put the more specific type ahead of the more general one.
  - level: 3
    text: List `case bool():` before `case int():`, and handle `case None:` explicitly since None has no useful class pattern here. Finish with `case _:` returning "unknown".
