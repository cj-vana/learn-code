questions:
  - id: q1
    prompt: |
      What index does this function return for search([2, 5, 8, 12, 16, 23, 38], 23)?

      ```python
      def search(a, target):
          lo, hi = 0, len(a) - 1
          while lo <= hi:
              mid = (lo + hi) // 2
              if a[mid] == target:
                  return mid
              if a[mid] < target:
                  lo = mid + 1
              else:
                  hi = mid - 1
          return -1
      ```
    choices:
      - "5"
      - "6"
      - "3"
      - "-1"
    correct_choice: "5"
    explanation: |
      First mid is index 3 (value 12), which is less than 23, so lo moves to 4. The next
      mid is (4 + 6) // 2 = 5, and a[5] is 23, a match. The function returns 5.
    concepts:
      - patterns.binary_search
  - id: q2
    prompt: |
      This variant uses a strict `while lo < hi`. What does it return for
      search([1, 3, 5], 5), and is that correct?

      ```python
      def search(a, target):
          lo, hi = 0, len(a) - 1
          while lo < hi:
              mid = (lo + hi) // 2
              if a[mid] == target:
                  return mid
              if a[mid] < target:
                  lo = mid + 1
              else:
                  hi = mid - 1
          return -1
      ```
    choices:
      - "-1, which is a bug, because the loop exits before checking the final one-element window where 5 sits"
      - "2, the correct index of 5"
      - "1, because mid lands on the middle element"
      - It raises an IndexError
    correct_choice: "-1, which is a bug, because the loop exits before checking the final one-element window where 5 sits"
    explanation: |
      mid starts at 1 (value 3), which is below 5, so lo becomes 2. Now lo equals hi, the
      strict condition lo < hi is false, and the loop stops without ever testing index 2.
      It wrongly returns -1. Using `while lo <= hi` fixes it.
    concepts:
      - patterns.binary_search
  - id: q3
    prompt: |
      This is a lower-bound search. What does it return for lower([10, 20, 20, 30], 20)?

      ```python
      def lower(a, x):
          lo, hi = 0, len(a)
          while lo < hi:
              mid = (lo + hi) // 2
              if a[mid] < x:
                  lo = mid + 1
              else:
                  hi = mid
          return lo
      ```
    choices:
      - "1"
      - "2"
      - "3"
      - "0"
    correct_choice: "1"
    explanation: |
      The window collapses onto the leftmost index whose value is not less than 20. Index 1
      is the first 20, so the function returns 1, placing any new 20 ahead of the existing
      equal values.
    concepts:
      - patterns.binary_search
  - id: q4
    prompt: |
      A teammate wrote the snippet below and it hangs on search([1, 2], 2). What is the
      defect?

      ```python
      def search(a, target):
          lo, hi = 0, len(a) - 1
          while lo <= hi:
              mid = (lo + hi) // 2
              if a[mid] == target:
                  return mid
              elif a[mid] < target:
                  lo = mid
              else:
                  hi = mid - 1
          return -1
      ```
    choices:
      - The line `lo = mid` never advances past mid, so when the target is in the upper half lo and hi stop changing and the loop runs forever
      - The list is too short for binary search to work
      - The comparison should use `>` instead of `<`
      - "`mid` is computed with integer division, which is invalid inside a loop"
    correct_choice: The line `lo = mid` never advances past mid, so when the target is in the upper half lo and hi stop changing and the loop runs forever
    explanation: |
      With a = [1, 2] and target 2, mid is 0 and a[0] is less than 2, so lo is set to mid,
      which is still 0. Nothing changes on the next pass, so the loop spins forever. The fix
      is `lo = mid + 1`, which guarantees the window shrinks each step.
    concepts:
      - patterns.binary_search
