prompt_markdown: |
  A makerspace lets its coordinator configure how strict member passwords must be,
  because a shared laser cutter needs different rules than the front-door wiki. So
  the policy is data, not hardcoded, and your checker reports **every** way a
  password falls short — not just the first — so the sign-up form can list all the
  fixes at once.

  Write `check_password(request)` where `request` is a dict with two keys:

  - `"password"`: the candidate password string.
  - `"rules"`: a dict of policy settings. Only the settings that are present are
    enforced; a missing setting is simply not checked.

  The possible rule settings and the violation code each one produces when unmet:

  - `"min_length"` (int): the password must be at least this many characters.
    Code: `"too_short"`.
  - `"require_upper"` (true): must contain at least one character `A`-`Z`.
    Code: `"no_upper"`.
  - `"require_lower"` (true): must contain at least one character `a`-`z`.
    Code: `"no_lower"`.
  - `"require_digit"` (true): must contain at least one digit `0`-`9`.
    Code: `"no_digit"`.
  - `"require_symbol"` (true): must contain at least one character that is neither
    alphanumeric nor whitespace (for example `!`, `_`, or `#`). Code: `"no_symbol"`.
  - `"forbid_spaces"` (true): must contain no whitespace at all. Code: `"has_space"`.
  - `"forbidden"` (list of strings): the password must not contain any of these
    substrings, compared **case-insensitively** (so a rule of `"summer"` also
    rejects `"Summer2024"`). Code: `"contains_forbidden"`.

  For the boolean-style rules (`require_*` and `forbid_spaces`), enforce the rule
  only when its value is truthy; a value of `false` or an absent key means skip it.

  Return a list of the violation codes that apply, **sorted alphabetically**, with
  no duplicates. A password that satisfies the whole policy returns `[]`. An empty
  `rules` dict means nothing is checked, so it always returns `[]`.

  Example: `{"password": "short", "rules": {"min_length": 8, "require_upper": true}}`
  returns `["no_upper", "too_short"]`.
starter_code: |
