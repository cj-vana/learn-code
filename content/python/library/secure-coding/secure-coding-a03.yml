    - name: ampersand_before_lt
      input: a & b < c
      expected: 'a &amp; b &lt; c'
    - name: mixed_markup
      input: "<a href=\"x\">'go'</a>"
      expected: '&lt;a href=&quot;x&quot;&gt;&#x27;go&#x27;&lt;/a&gt;'
