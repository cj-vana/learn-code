function_name: sanitize_html_input
input_mode: function
solution_sketch: Chain str.replace calls, escaping '&' first, then the four other HTML-significant characters.
sample_solution: |
  def sanitize_html_input(text):
      text = text.replace("&", "&amp;")
      text = text.replace("<", "&lt;")
      text = text.replace(">", "&gt;")
      text = text.replace('"', "&quot;")
      text = text.replace("'", "&#x27;")
      return text
hints:
  - level: 1
    text: Each replacement is a str.replace call; the tricky part is the order they run in.
  - level: 2
    text: Escape "&" before anything else, because every other escape you produce contains an "&".
  - level: 3
    text: After the ampersand, replace "<", ">", double-quote with &quot;, and single-quote with &#x27; in turn.
tests:
  public:
    - name: script_tag
      input: <script>alert(1)</script>
      expected: '&lt;script&gt;alert(1)&lt;/script&gt;'
    - name: ampersand
