prompt_markdown: |
  A museum's public guestbook shows visitor comments back on a web page. If a
  comment is dropped into the page as raw HTML, a message like
  `<script>alert(1)</script>` would run as code — a cross-site scripting hole. The
  fix is output encoding: escape the characters that carry special meaning in HTML
  so they render as literal text.

  Write `sanitize_html_input(text)` that returns `text` with these five
  replacements applied, in exactly this order:

  1. `&`  becomes  `&amp;`
  2. `<`  becomes  `&lt;`
  3. `>`  becomes  `&gt;`
  4. `"`  becomes  `&quot;`
  5. `'`  becomes  `&#x27;`

  The ampersand MUST be escaped first. If you escaped `<` first, a later `&`
  replacement would corrupt the `&lt;` you just produced by turning its `&` into
  `&amp;`. An empty string returns an empty string, and text with none of these
  characters is returned unchanged.
starter_code: |
