      input: ''
      expected: ''
explanation_markdown: |
  Output encoding neutralizes injection by moving the decision about "is this
  markup or text?" back under your control. Once `<` becomes `&lt;`, the browser
  displays a literal less-than sign instead of opening a tag, so the injected
  `<script>` can never execute. The ordering rule is the subtle part: because
  every replacement you emit contains an ampersand (`&lt;`, `&quot;`, and so on),
  you must escape real ampersands first. Reverse the order and `a & b < c` would
  become `a &amp; b &amp;lt; c` — the `&` from your own `&lt;` gets double-escaped
  into `&amp;lt;`, which renders as the wrong text. In production you would reach
  for `html.escape`, which performs these same five replacements in this same
  order; doing it by hand once shows why that ordering is baked in.
common_mistakes:
  - Escaping "<" or ">" before "&", which double-escapes the ampersands inside your own entities.
  - Forgetting to escape quotes, leaving attribute-context injection possible when the text lands inside an HTML attribute.
  - Trying to blacklist the word "script" instead of encoding the characters, which is trivially bypassed.
