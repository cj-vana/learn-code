prompt_markdown: |
  A neighbourhood bakery prints a receipt that shows a customer's loyalty-card
  number so they can recognise it — but the printed copy must not reveal the whole
  number, in case the receipt is dropped in the street. The convention is to show
  only the last few characters and replace everything before them with asterisks.

  Write `mask_secret(record)` where `record` is a dict with two keys:

  - `"value"`: the string to mask (a card number, an API key, and so on).
  - `"visible"`: an integer, how many trailing characters may be shown.

  Return a masked string that is the **same length** as `value`, with the last
  `visible` characters kept as-is and every earlier character replaced by `"*"`.
  For example `{"value": "4111222233334444", "visible": 4}` returns
  `"************4444"`.

  The rules for the tricky inputs, all tested:

  - If `visible` is `0` or negative, reveal nothing: return a string of `"*"` the
    same length as `value`.
  - If `visible` is greater than or **equal to** the length of `value`, revealing
    "the last N" would expose the entire secret. A mask that shows everything
    protects nothing, so refuse it defensively and return an all-asterisk string
    the same length as `value`.
  - An empty `value` returns `""` regardless of `visible`.

  So the suffix is shown only when `0 < visible < len(value)`; in every other
  case the whole value is masked.
starter_code: |
  def mask_secret(record):
      # Show only the last `visible` characters; never reveal the whole value.
      return ""
function_name: mask_secret
input_mode: function
solution_sketch: Read value and visible; if visible <= 0 or visible >= len(value) return "*" * len(value); otherwise return "*" * (len(value) - visible) followed by the last visible characters.
sample_solution: |
  def mask_secret(record):
      value = record["value"]
      visible = record["visible"]
      if visible <= 0 or visible >= len(value):
          return "*" * len(value)
      return "*" * (len(value) - visible) + value[-visible:]
