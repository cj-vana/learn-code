explanation_markdown: |
  Masking is a display-layer defence: the full secret still lives in your data
  store, but any copy a human might see — a receipt, a log line, a support-tool
  screen — shows only enough to be recognisable, not enough to be reused. Keeping
  the output the same length as the input matters too: a mask that collapses
  `"4111222233334444"` to `"4444"` would leak the original length and hint at the
  format, so we pad the front with one asterisk per hidden character.

  The defensive rule is the `visible >= len(value)` branch. It is tempting to
  clamp and simply show the whole string when someone asks to reveal more
  characters than exist, but that turns the mask into a passthrough that exposes
  the entire secret — exactly what masking exists to prevent. Refusing that case
  and masking everything means a careless or malicious `visible` value can never
  widen the window past the secret's own length.
common_mistakes:
  - Returning a result shorter than the input (for example just the visible suffix), which leaks the original length and format.
  - Revealing the entire value when visible is greater than or equal to its length instead of masking everything.
  - Using value[-visible:] without guarding visible <= 0, where a slice like value[-0:] or value[2:] reveals the wrong characters.
  - Hard-coding four visible characters instead of honouring the visible field.
