  originality_notes: Deterministic pure-function analogue of secrets.token_hex — it encodes caller-supplied CSPRNG entropy bytes into a hex token so grading stays deterministic, themed around a harbor gate issuing session tokens.
prompt_markdown: |
  A harbor gatehouse hands each arriving skipper a session token to carry between
  kiosks. In production the token comes from `secrets.token_hex(n)`, which draws
  `n` cryptographically random bytes and renders them as a hex string. Because a
  grader must be deterministic, we split that job in two: assume the random bytes
  were already drawn for you, and write only the deterministic **encoding** step
  that turns those bytes into the token string.

  Write `assemble_hex_token(entropy_bytes)` where `entropy_bytes` is a list of
  integers, each already a valid byte in the range 0 to 255 (in real code these
  come from `secrets.token_bytes(n)`). Return the token as a lowercase hex string
  where **every byte becomes exactly two hex characters**.

  The two-characters-per-byte rule is the whole point. A byte less than 16 must
  still produce two characters with a leading zero: byte `15` becomes `"0f"` and
  byte `1` becomes `"01"`, never `"f"` or `"1"`. Dropping the leading zero would
  shorten the token and silently throw away entropy — a real weakness in
  hand-rolled token code.

  So the output length is always exactly twice the number of bytes. An empty list
  returns `""`.

  Example: `assemble_hex_token([255, 0, 16])` returns `"ff0010"` — `255` to
  `"ff"`, `0` to `"00"`, `16` to `"10"`.
starter_code: |
  def assemble_hex_token(entropy_bytes):
      # Render each byte as exactly two lowercase hex characters.
      return ""
function_name: assemble_hex_token
input_mode: function
solution_sketch: Format each byte with "02x" (two-wide, zero-padded, lowercase hex) and join the pieces; equivalently, bytes(entropy_bytes).hex().
sample_solution: |
  def assemble_hex_token(entropy_bytes):
      return "".join(format(byte, "02x") for byte in entropy_bytes)
