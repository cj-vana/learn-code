explanation_markdown: |
  This is the encoding half of `secrets.token_hex`. The security property that
  matters at this layer is faithful, fixed-width encoding: `n` random bytes carry
  `8n` bits of entropy, and the hex rendering must preserve every one of them.
  The classic bug is writing something like `hex(byte)[2:]`, which produces a
  single character for any byte below 16. A token built that way is shorter than
  intended and, worse, has non-uniform structure, so an attacker guessing tokens
  faces a smaller search space than the byte count suggests.

  Using `format(byte, "02x")` — width two, zero-padded, lowercase hex — guarantees
  each byte maps to exactly two characters, so the output length is deterministic
  at `2 * len(entropy_bytes)` and the full entropy survives. The idiomatic
  `bytes(entropy_bytes).hex()` does the same thing in one call and is what you
  would normally reach for; writing the join by hand once makes the padding rule
  concrete.
common_mistakes:
  - Using hex(byte)[2:], which drops the leading zero for any byte below 16 and shortens the token.
  - Producing uppercase hex when the convention here (and in secrets.token_hex) is lowercase.
  - Returning something other than "" for an empty list, or otherwise breaking the exactly-two-characters-per-byte length guarantee.
