explanation_markdown: |
  Control-character injection is a quietly dangerous class of bug because the
  characters are invisible. A null byte can cut a string short in any C-backed
  layer downstream; a bare carriage return can overwrite the start of a rendered
  line and forge log entries; terminal escape sequences (which begin with control
  bytes) can move the cursor and rewrite what an operator reads. Normalizing at
  the trust boundary — the moment untrusted text enters your system — means every
  layer after it can assume the text is printable and line-break policy is already
  enforced.

  The per-character decision order is what keeps it correct. Tab and newline are
  handled explicitly first because they are control characters you have opinions
  about (tab becomes a visible space; newline obeys the caller's policy). Only
  then do you sweep away everything else below `0x20` plus the `0x7f` delete
  character, which is how `"\r"` and `"\x00"` disappear without needing to be
  named individually. Applying `max_length` last is deliberate: capping the
  cleaned string means stripped control bytes can never eat into the visible
  budget, so a note padded with hidden characters cannot shrink its real content
  below the limit you intended.
common_mistakes:
  - Removing only the null byte and forgetting the other control characters like carriage return and delete.
  - Applying max_length to the raw text before cleaning, so removed control characters wrongly count against the cap.
  - Dropping newlines unconditionally (or keeping them unconditionally) instead of honouring allow_newlines.
  - Deleting tabs entirely instead of converting each to a single space, silently joining words that should stay separated.
