solution_sketch: Iterate characters; map tab to space, keep newline only when allowed, skip any char with ord below 0x20 or equal to 0x7f, keep everything else; join, then slice to max_length when it is not None.
sample_solution: |
  def sanitize_note(request):
      text = request["text"]
      allow_newlines = request["allow_newlines"]
      max_length = request["max_length"]

      cleaned = []
      for char in text:
          if char == "\t":
              cleaned.append(" ")
          elif char == "\n":
              if allow_newlines:
                  cleaned.append("\n")
          elif ord(char) < 0x20 or ord(char) == 0x7F:
              continue
          else:
              cleaned.append(char)

      result = "".join(cleaned)
      if max_length is not None and len(result) > max_length:
          result = result[:max_length]
      return result
