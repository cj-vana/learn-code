prompt_markdown: |
  An observatory ingests observation notes exported from all sorts of instruments
  and old field laptops. Before a note is stored or shown on a dashboard it must
  be scrubbed: raw control characters can smuggle a null byte that truncates a C
  string, a carriage return that forges a log line, or a terminal escape that
  rewrites what an operator sees. Your job is the defensive normalization pass.

  Write `sanitize_note(request)` where `request` is a dict with three keys:

  - `"text"`: the untrusted note string.
  - `"allow_newlines"`: a bool, whether real line breaks are permitted.
  - `"max_length"`: either an integer cap or `None` for no cap.

  Walk the text one character at a time and build the cleaned result with these
  rules, applied in this order per character:

  - A tab (`"\t"`) is converted to a single space `" "`.
  - A newline (`"\n"`) is kept **only if** `allow_newlines` is true; otherwise it
    is dropped.
  - Any other control character is removed entirely. "Control character" means a
    code point below `0x20` (this covers the null byte `"\x00"` and the carriage
    return `"\r"`, which is **always** dropped) or the delete character at `0x7f`.
  - Every other character — ordinary letters, digits, punctuation, spaces, and
    non-ASCII letters like `é` — is kept unchanged.

  After building the cleaned string, if `max_length` is not `None` and the
  cleaned string is longer than `max_length`, truncate it to the first
  `max_length` characters. The cap is applied **after** cleaning, so removed
  control characters never count toward the limit.

  An empty `text` returns `""`.

  Example: `{"text": "a\x00b\tc", "allow_newlines": false, "max_length": None}`
  returns `"ab c"` — the null byte is dropped and the tab becomes a space.
