function_name: verify_signature
input_mode: function
solution_sketch: Recompute hmac.new(key.encode(), message.encode(), hashlib.sha256).hexdigest(), then return secrets.compare_digest of that expected tag against the provided tag.
sample_solution: |
  import hashlib
  import hmac
  import secrets


  def verify_signature(payload):
      expected = hmac.new(
          payload["key"].encode("utf-8"),
          payload["message"].encode("utf-8"),
          hashlib.sha256,
      ).hexdigest()
      return secrets.compare_digest(expected, payload["tag"])
