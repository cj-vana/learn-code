explanation_markdown: |
  Signature verification is the backbone of trusting data from an untrusted
  channel: instead of trusting the message, you trust that only someone holding
  the shared key could have produced a matching HMAC over it. Recomputing the tag
  and comparing is exactly what webhook receivers do to confirm a payload came
  from the expected sender.

  The constant-time comparison is the subtle, load-bearing part. A normal string
  `==` is allowed to stop at the first byte that differs, so a comparison that
  fails on character 2 returns faster than one that fails on character 40. An
  attacker who can measure that timing can recover the correct tag one character
  at a time — a real class of exploit against naive verifiers. `secrets.compare_digest`
  (the same routine as `hmac.compare_digest`) is written to take time
  independent of where the first difference is, closing that side channel. It
  also treats a length mismatch as a plain `False`, so you never have to guard
  the lengths yourself.
common_mistakes:
  - Comparing the tags with == instead of secrets.compare_digest, reintroducing the timing side channel the exercise is about.
  - Forgetting to encode the key and message to bytes before passing them to hmac.new.
  - Comparing the raw digest bytes against a hex string, or vice versa, so a correct signature never matches.
  - Adding a manual length check that raises on a short tag instead of letting compare_digest return False.
