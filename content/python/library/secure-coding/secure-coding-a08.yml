prompt_markdown: |
  A mountaintop observatory receives control messages over an untrusted link — a
  message like `shutter open 21:15`. Each message arrives with a **signature
  tag**: the sender computed an HMAC-SHA256 of the message using a shared secret
  key and attached the resulting hex digest. The gate should act on a message
  only if it can recompute the same tag, proving the message was not forged or
  tampered with in transit.

  Write `verify_signature(payload)` where `payload` is a dict with three string
  keys:

  - `"message"`: the message text.
  - `"key"`: the shared secret key.
  - `"tag"`: the hex signature that came with the message.

  Recompute the expected tag as the HMAC-SHA256 of the message under the key,
  encoding both strings as UTF-8 and taking the lowercase hex digest. Return
  `True` if the provided tag matches the expected tag and `False` otherwise.

  Two rules matter for security:

  - Compare the two tags with `secrets.compare_digest`, **not** with `==`. A
    plain `==` on strings can short-circuit at the first differing character, and
    the tiny timing difference leaks how much of the tag an attacker guessed
    correctly. `compare_digest` takes the same time regardless of where the
    mismatch is.
  - `compare_digest` returns `False` (it does not raise) when the two tags have
    different lengths, so a truncated or padded tag is simply rejected.

  An empty message is still a real message: it has a well-defined HMAC, so a
  correct tag for it must return `True`.
