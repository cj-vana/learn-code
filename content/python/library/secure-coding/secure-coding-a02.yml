explanation_markdown: |
  Path traversal happens when an attacker supplies a name like `../../etc/passwd`
  that, once joined onto a base directory, climbs out of it. The defense is to
  reject anything that could act as a path instead of a plain name. Forward and
  back slashes turn a name into a multi-segment path, `..` means "go up a level",
  and an embedded null byte can truncate the string inside lower-level C calls, so
  all of them are refused. The lone `.` is also refused because it names the
  current directory rather than a file. Everything else — including names with
  dots that never form a `..` run, like `cargo.log.2026` — is allowed through.
  Screening the name before combining it with a directory is far safer than trying
  to sanitize a path after the fact.
common_mistakes:
  - Checking only for a leading "../" and missing traversal sequences buried later in the name.
  - Forgetting the backslash, which lets Windows-style traversal like ..\\windows through.
  - Rejecting every dot instead of only the ".." run, which would wrongly block ordinary names like cargo.log.2026.
