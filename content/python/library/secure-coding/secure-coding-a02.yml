prompt_markdown: |
  A harbor records desk accepts uploaded documents, and each upload arrives with a
  client-supplied file name. Before that name is ever joined onto a storage
  directory, it must be screened so it cannot escape into other folders. Write
  `is_safe_filename(name)` that returns `True` only when the name is safe to use
  as a plain file name inside one directory, and `False` otherwise.

  A name is **safe** only when ALL of these hold:

  - it is not empty,
  - it contains no forward slash `/` and no backslash `\`,
  - it contains no `..` sequence anywhere,
  - it contains no null byte (`\x00`),
  - it is not exactly `.` (the current-directory name).

  Any name that fails even one rule is unsafe. For example, `manifest.pdf` is
  safe, but `../secrets.txt`, `/etc/passwd`, `logs\\jan`, `..hidden`, `.`, and the
  empty string are all rejected. A name like `cargo.log.2026` is safe: it has
  dots, but never two in a row.
starter_code: |
  def is_safe_filename(name):
      return False
function_name: is_safe_filename
input_mode: function
solution_sketch: Return False if the name is empty, is ".", or contains any of "/", "\\", "..", or a null byte; otherwise True.
sample_solution: |
  def is_safe_filename(name):
      if not name or name == ".":
          return False
      forbidden = ("/", "\\", "..", "\x00")
      return not any(token in name for token in forbidden)
hints:
  - level: 1
    text: Think in terms of rejection rules; the name is safe only if it survives every check.
  - level: 2
    text: An empty string and a lone "." are unsafe up front; after that, look for dangerous substrings.
  - level: 3
    text: Reject the name if any of "/", "\\", "..", or "\x00" appears in it using the `in` operator.
