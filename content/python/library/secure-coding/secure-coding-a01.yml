prompt_markdown: |
  A community makerspace lets visitors type an email address on a sign-up tablet.
  Before that address is trusted anywhere else, its *shape* must be validated at
  the trust boundary. Write `validate_email_format(address)` that returns `True`
  only when the whole string matches this deliberately strict shape and `False`
  otherwise:

  - one or more characters that are neither `@` nor whitespace (the local part),
  - then a single `@`,
  - then one or more characters that are neither `@` nor whitespace,
  - then a literal `.`,
  - then one or more characters that are neither `@` nor whitespace.

  The match must cover the entire string end to end. That means:

  - `alex@maker.org` is valid.
  - A string with no `@`, or with two `@`, is rejected.
  - A domain with no dot (like `alex@localhost`) is rejected.
  - Any whitespace anywhere, including a trailing space, rejects the string.
  - An empty string is rejected.

  This is a format gate, not a proof the mailbox exists — but a strict format
  gate stops most malformed and injected input before it spreads.
starter_code: |
  import re


  def validate_email_format(address):
