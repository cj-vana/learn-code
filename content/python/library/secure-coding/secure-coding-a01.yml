function_name: validate_email_format
input_mode: function
solution_sketch: Use re.fullmatch with an anchored pattern that forbids '@' and whitespace in each part and requires a dot in the domain.
sample_solution: |
  import re


  def validate_email_format(address):
      pattern = r"[^@\s]+@[^@\s]+\.[^@\s]+"
      return re.fullmatch(pattern, address) is not None
hints:
  - level: 1
    text: The whole string must match, not just part of it, so reach for re.fullmatch rather than re.search.
  - level: 2
    text: A character class like [^@\s] means "not an at-sign and not whitespace"; require one or more of those on each side.
  - level: 3
    text: The pattern r"[^@\s]+@[^@\s]+\.[^@\s]+" needs a local part, one @, a domain, a literal dot, and a top-level part; compare the result to None.
