explanation_markdown: |
  `re.fullmatch` only succeeds when the pattern accounts for every character from
  start to end, which is exactly what a validation gate wants — no leftover
  characters can sneak past. The class `[^@\s]` excludes both the `@` separator
  and any whitespace, so `guest@@maker.org` fails (the second `@` cannot be
  consumed) and `alex@maker.org ` fails (the trailing space cannot be consumed).
  Requiring a literal `.` inside the domain rejects bare hosts like `localhost`.
  Comparing the match object to `None` turns the result into the clean boolean the
  caller expects. Strict-by-default validation like this is the first line of
  defense: reject anything that does not fit the expected shape instead of trying
  to guess what the user meant.
common_mistakes:
  - Using re.search instead of re.fullmatch, which accepts a valid fragment buried inside otherwise garbage input.
  - Forgetting to require a dot in the domain, so alex@localhost is wrongly accepted.
  - Allowing whitespace, which lets a trailing space or embedded space slip through the gate.
