      expected: false
explanation_markdown: |
  A shell interprets a whole family of punctuation characters as control syntax:
  `;` ends one command and starts another, `|` pipes output, `&` chains or
  backgrounds, `$` and backticks trigger substitution, parentheses open subshells,
  and `<`/`>` redirect streams. If any of those reaches the shell from untrusted
  input, the attacker controls more than the intended argument. Screening for the
  full set — including a raw newline, which acts as a command separator — rejects
  the injection before it runs. Storing the metacharacters in a set makes each
  membership test clear and lets you scan the command character by character. The
  stronger real-world fix is to avoid the shell entirely: pass an argument list to
  the process directly, or use `shlex.quote`, so the metacharacters are never
  interpreted. This screen is a defense-in-depth layer on top of that.
common_mistakes:
  - Forgetting the newline character, which a shell also treats as a command separator.
  - Checking only for ";" and missing pipes, substitution, and redirection metacharacters.
  - Blocking spaces or dashes, which are harmless and appear in normal ticket text.
