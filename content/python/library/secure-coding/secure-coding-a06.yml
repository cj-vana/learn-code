  originality_notes: Original shell-injection screening drill framed around a bakery kitchen-display system building printer commands, detecting shell metacharacters that could chain extra commands.
prompt_markdown: |
  A bakery's kitchen-display system builds a command string to print each order
  ticket. If an order field carrying a shell metacharacter is dropped into that
  command, an attacker could chain an extra command after the intended one. Before
  the string is ever handed to a shell, it must be screened. Write
  `has_shell_injection_risk(command)` that returns `True` when the command string
  contains any dangerous shell metacharacter and `False` otherwise.

  Treat each of these characters as dangerous:

  - `;` (command separator)
  - `|` (pipe)
  - `&` (background / chaining)
  - `$` (variable or command substitution)
  - `` ` `` (backtick command substitution)
  - `(` and `)` (subshell / `$(...)`)
  - `<` and `>` (redirection)
  - a newline character (`\n`)

  If the command contains none of those characters, it is considered safe. Plain
  text with letters, digits, spaces, dashes, dots, and slashes — like
  `print order-42 table-7` — is safe. As soon as even one dangerous character
  appears, the command is flagged.
starter_code: |
  def has_shell_injection_risk(command):
      return False
function_name: has_shell_injection_risk
input_mode: function
solution_sketch: Build a set of the dangerous metacharacters and return True if any character of the command is in that set.
sample_solution: |
  def has_shell_injection_risk(command):
      dangerous = set(";|&$`()<>\n")
      return any(char in dangerous for char in command)
hints:
  - level: 1
    text: You only need to know whether any single character in the command is on the dangerous list.
  - level: 2
    text: Put every dangerous character into a set so membership tests are quick and clear.
  - level: 3
    text: Use any(char in dangerous for char in command); do not forget to include the newline character.
tests:
  public:
    - name: safe_plain
      input: print ticket_42
      expected: false
    - name: semicolon_chain
      input: print ticket; rm -rf /
      expected: true
    - name: pipe_to_mail
      input: print ticket | mail attacker
      expected: true
  validation:
    - name: backtick_sub
      input: print `whoami`
      expected: true
    - name: command_substitution
      input: print $(cat secrets)
