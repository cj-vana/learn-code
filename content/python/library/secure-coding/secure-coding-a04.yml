prompt_markdown: |
  An observatory exposes a public API where visitors request a telescope exposure
  value. Untrusted numbers must be range-checked before they reach the hardware,
  and out-of-range requests are clamped to the nearest safe limit rather than
  rejected outright. Write `bounds_check_numeric(request)` where `request` is a
  dict with three keys: `value`, `low`, and `high` (the inclusive allowed range).

  Return a dict with two keys, `accepted` and `value`, following these rules in
  order:

  - If `value` is a Python `bool` (`True` or `False`), it is NOT a valid number —
    even though Python treats booleans as a kind of integer. Return
    `{"accepted": False, "value": low}`.
  - Otherwise, if `low <= value <= high`, the request is in range. Return
    `{"accepted": True, "value": value}`.
  - Otherwise, if `value < low`, clamp up to the floor. Return
    `{"accepted": False, "value": low}`.
  - Otherwise the value is above the ceiling. Return
    `{"accepted": False, "value": high}`.

  Values exactly equal to `low` or `high` are accepted. The bool check must come
  first, because `low <= True <= high` would otherwise sneak `True` through as the
  number `1`.
starter_code: |
  def bounds_check_numeric(request):
      value = request["value"]
      low = request["low"]
      high = request["high"]
      return {"accepted": False, "value": low}
function_name: bounds_check_numeric
input_mode: function
solution_sketch: Check isinstance(value, bool) first, then test the inclusive range, then clamp below to low and above to high.
sample_solution: |
  def bounds_check_numeric(request):
      value = request["value"]
      low = request["low"]
      high = request["high"]
      if isinstance(value, bool):
          return {"accepted": False, "value": low}
      if low <= value <= high:
          return {"accepted": True, "value": value}
      if value < low:
          return {"accepted": False, "value": low}
      return {"accepted": False, "value": high}
hints:
