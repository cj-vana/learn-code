explanation_markdown: |
  Range validation is a core input-hardening step: never let an untrusted number
  reach a subsystem without confirming it sits inside the allowed window. Clamping
  to the nearest bound keeps the device in a safe state while still signaling, via
  `accepted: False`, that the request was altered. The subtle security bug here is
  Python's type model: `bool` is a subclass of `int`, so `True == 1` and
  `low <= True <= high` quietly succeeds. If you compared before checking the
  type, a JSON `true` could pass a numeric gate and be treated as the value `1`.
  Testing `isinstance(value, bool)` first closes that hole. Because the checks are
  ordered and each returns immediately, exactly one branch fires per call.
common_mistakes:
  - Comparing the range before checking for bool, so True slips through as the number 1.
  - Using isinstance(value, int) as the accept test, which wrongly accepts booleans and rejects valid floats.
  - Rejecting out-of-range values entirely instead of clamping to low or high as specified.
