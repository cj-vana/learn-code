explanation_markdown: |
  The vulnerability being avoided here is twofold. First, `str.split()` has no
  concept of quoting, so any argument that legitimately contains a space is
  silently torn into pieces — a correctness bug that becomes a security bug the
  moment those pieces are treated as separate filenames or flags. Second, the
  tempting "just hand the whole string to the shell" approach (`shell=True`)
  invites shell-injection: metacharacters like `;`, `|`, and `$()` in the input
  would be interpreted as commands. `shlex.split` threads the needle: it applies
  shell **quoting** rules to produce a clean argument list, but it never executes
  anything, so a malicious argument stays inert data.

  Handling the unbalanced-quote case is the defensive touch. `shlex.split` raises
  `ValueError` when a quote is opened and never closed, because it genuinely
  cannot know where the token was meant to end. Returning `[]` refuses the
  ambiguous input instead of quietly producing a token list the operator never
  intended.
common_mistakes:
  - Using command_line.split() instead of shlex.split, which breaks any quoted argument that contains a space.
  - Leaving the surrounding quote characters in the tokens instead of letting shlex consume them.
  - Letting the ValueError from an unbalanced quote propagate and crash instead of returning an empty list.
  - Reaching for a real shell (shell=True) to honour the quotes, which reintroduces the injection risk shlex is meant to avoid.
