prompt_markdown: |
  A bookbindery drives its computer-controlled cutting table from a small console
  where an operator types a single command line, like `cut design.svg 3`. The
  first word is the verb, the rest are its arguments. Naively calling
  `command_line.split()` looks fine until a filename has a space in it: splitting
  on whitespace shatters `winter menu.svg` into two broken arguments, and the
  table cuts the wrong job.

  The right tool is `shlex.split`, which tokenizes a command line the way a shell
  would — honouring quotes — **without** handing the string to a real shell (so
  nothing gets executed or interpreted). Write `tokenize_command(command_line)`
  that returns the list of argument tokens.

  Rules, all of which are tested:

  - Split on runs of whitespace, so `a   b    c` becomes `['a', 'b', 'c']` — runs
    of spaces collapse, they do not create empty tokens.
  - A single- or double-quoted span becomes **one** token with its inner spaces
    intact: `cut 'winter menu.svg' 3` becomes `['cut', 'winter menu.svg', '3']`.
  - Quotes are consumed, not kept: the surrounding quote characters do not appear
    in the token. An apostrophe inside a double-quoted span is an ordinary
    character, so `score "it's ready"` becomes `['score', "it's ready"]`.
  - An empty string or a string of only whitespace returns `[]`.
  - If the command line has an **unbalanced quote** (a quote that is never
    closed), the input is ambiguous, so reject it defensively and return `[]`
    rather than guessing where the token ends.

  Example: `tokenize_command('plot "batch 12" --fast')` returns
  `['plot', 'batch 12', '--fast']`.
starter_code: |
  import shlex


  def tokenize_command(command_line):
      # Tokenize like a shell would, but without running a shell.
      return []
function_name: tokenize_command
input_mode: function
solution_sketch: Return shlex.split(command_line); wrap it in try/except ValueError to catch an unbalanced quote and return an empty list.
sample_solution: |
  import shlex


  def tokenize_command(command_line):
      try:
          return shlex.split(command_line)
      except ValueError:
          return []
hints:
  - level: 1
    text: str.split() cannot tell that a quoted filename with a space is a single argument; the standard library already solves shell-style tokenizing for you.
  - level: 2
    text: shlex.split honours single and double quotes and collapses whitespace runs, returning a list of tokens without the surrounding quote characters.
  - level: 3
    text: shlex.split raises ValueError when a quote is never closed, so wrap the call in try/except ValueError and return [] for that ambiguous case.
