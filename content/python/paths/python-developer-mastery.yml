id: path.career.python_developer_mastery
kind: path
path_type: career
version: 1
language: python
title: Python Developer Mastery
slug: python-developer-mastery
description: "The full beginner-to-advanced language arc: syntax fluency and core data structures, then\
  \ every professional Python skill \u2014 OOP, iterators and generators, decorators, error handling,\
  \ collections and itertools, regex, and pure-Python data wrangling \u2014 capped by mixed capstones."
outcomes:
- Write idiomatic Python from fundamentals through advanced idioms
- Model programs with classes, generators, and decorators
- Handle errors deliberately and process real-world text and records
- Finish with capstones that mix everything without hints
