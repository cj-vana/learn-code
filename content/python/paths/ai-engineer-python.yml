id: path.career.ai_engineer_python
kind: path
path_type: career
version: 1
language: python
title: AI Engineer Python
slug: ai-engineer-python
description: "Build the machinery behind modern AI with nothing but Python: classic ML algorithms, a scalar\
  \ autodiff engine, counting language models, byte-pair tokenization, embeddings and retrieval scoring,\
  \ and scaled dot-product attention \u2014 every formula implemented and tested by hand, no numpy, no\
  \ torch."
outcomes:
- Implement k-NN, k-means, and gradient descent from scratch
- Build and verify a micrograd-style backward pass
- Train a bigram language model and measure its perplexity
- Write BPE tokenization, cosine retrieval, and attention by hand
- Evaluate models with precision/recall, BLEU-style overlap, and calibration
assumed_concepts:
- concepts.probability
- concepts.testing
- patterns.brute_force
- patterns.graph_traversal
- patterns.hash_map_counting
- patterns.recursion
- patterns.running_total
- python.closures_decorators
estimated_hours: 44
review_status: published
source_status: original
