id: path.career.python_software_engineer
kind: path
path_type: career
version: 1
language: python
title: Python Software Engineer
slug: python-software-engineer
description: "The deep-internals arc that separates a Python user from a Python engineer: the object model\
  \ and descriptors, the memory system, concurrency, modern syntax, the functools/itertools toolbox, binary\
  \ data, numeric precision, introspection, and runtime typing \u2014 the knowledge you reach for when\
  \ other people's code misbehaves."
outcomes:
- Reason about descriptors, the MRO, and __slots__ from first principles
- Explain reference counting, cycles, and the GIL under pressure
- Choose threads, processes, or asyncio by workload with confidence
- Wield modern syntax, functools, struct, Decimal, and inspect fluently
- Understand where type hints act at runtime and where they don't
estimated_hours: 44
